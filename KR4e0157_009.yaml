body:
  text: 别録奏疏辭免重任乞恩養病疏嘉靖六年六月臣自正德十四年江西事平之後身罹讒構危疑洶洶不保朝夕幸遇聖上龍飛天開日朗鑒臣螻蟻之忠下詔褒揚洗滌出臣於覆盆之下進官封爵召還京師因乞便道歸省隨蒙賜勑遣官奬勞慰諭錫以銀幣犒以羊酒臣感激天恩雖粉骨碎身云何能報不幸遭繼父喪未獲赴闕陳􅒜服滿之後又連年病卧喘息奄奄苟避形迹皇上天髙地厚之恩迄今六年於此矣尚未能一覩天顔稽首闕廷之下臣實瞻戴戀慕晝夜熱中若身在芒刺邇者曾蒙謝恩之召臣之至願惟不能即時就道顧乃病卧呻吟徒北望感泣神魂飛馳而已今年六月初六日兵部差官齎文前到臣家內開奏奉欽依以兩廣未靖命臣總制軍務督同都御史姚鏌等勘處者臣聞命驚惶莫知攸措伏自思惟臣於君命之召當不俟駕而行矧兹軍旅何敢言辭顧臣病患久積潮熱痰嗽日甚月深每一發咳必至頓絶久始漸蘇乃者謝恩之行輕舟安卧尚未敢強又况兵甲驅勞豈復堪任夫委身以圖報臣之本心也若冒病輕出至於僨事死無及矣臣又伏思兩廣之役起於土官讐殺比之寇賊之攻劫郡縣荼毒生靈者勢尚差緩若處置得宜事亦可集姚鏌平日素稱老成慎重一時利鈍前却斯亦兵家之常要在責成難拘速效御史石金據事論奏是蓋忠於陛下將為國家弘仁覆久逺之圖所以激勵鏌等使之集謀決䇿收之桑榆也臣本書生不習軍旅往歲江西之役皆偶會機宜幸而成事臣之才識自視未及姚鏌且近年以來又巳多病况兹用兵舉事鏌等必嘗深思熟慮得其始末條貫中事少沮輒以臣之庸劣參與其間行事之際所見或有同異鏌等益難展布夫軍旅之任在號令嚴一賞罰信果而已慎擇主帥授鉞分梱當聽其所為臣以為兩廣今日之事宜專責鏌等隆其委任重其威權略其小過假以歲月而要其成功至於終無底績然後别選才能兼於民情土俗素相諳悉如南京工部尚書胡世寧刑部尚書李承勛者往代其任夫朝廷用人不貴其有過人之才而貴其有事君之忠苟無事君之忠而徒有過人之才則其所謂才者僅足以濟其一已之功利全軀保妻子而巳耳如臣之迂踈多病徒持文墨議論未必能濟實用者誠宜哀其不逮容令養疾田野俟病痊之後不終棄廢或可量置間散之地使自得效其涓埃則朝廷於任賢御將之體因物曲成之仁道並行而不相背矣臣不敢苟冒任使以欺國事不勝感恩激義懇切祈望之至赴任謝恩遂陳膚見疏六年十二月初一日臣於病廢之餘特蒙恩旨起用授以兩廣軍旅重寄臣自惟朽才病質深懼不任驅使以誤國事具本辭免過蒙聖旨卿識敏才髙忠誠體國今兩廣多事方籍卿威望撫定地方用紓朕南顧之懷姚鏌已致仕了卿宜星夜前去節制諸司調度軍馬撫勦賊冦安戢兵民勿再遲疑推諉以負朕望還差官鋪馬裏賫文前去敦趣赴任行事該部知道欽此欽遵兵部移咨到臣捧讀感泣莫知攸措伏念世受國恩粉骨虀骸亦無能報又况遭逄明聖溫旨勤拳若是何能復顧其他已於九月初八日扶病起程沿途就醫服藥調理晝夜前進奈秋暑旱澀舟行甚難至十一月二十日始抵梧州思恩田州之事尚未及會同各官查審區處然臣沿途涉歷訪諸士夫之論詢諸行旅之口頗有所聞不敢不為陛下一言其略臣惟岑猛父子固有可誅之罪然所以致彼若是者則前此當事諸人亦宜分受其責蓋兩廣軍門專為諸猺獞及諸流賊而設朝廷付之軍馬錢糧事權亦已不為不專且重若使振其軍威自足以制服諸蠻然而因循怠弛軍政日壞上無可任之將下無可用之兵一有驚急必須倚調土官狼兵若猛之屬者而後行事故此輩得以憑恃兵力日增其桀驁今夫父兄之於子弟苟役使頻勞亦且不能無倦况於此輩夷獷之性歲歲調發奔走道途不得顧其家室其能以無倦且怨乎及事之平則又功歸於上而彼無所與兼有不才有司因而需索引誘與之為姦其能以無怒且慢乎既倦且怨又怒以慢始而徴發愆期既而調遣不至上嫉下憤日深月積劫之以勢而威益褻籠之以詐而術愈窮由是諭之而益梗撫之而益疑遂至於有今日加以叛逆之罪而欲征之夫即其已暴之惡征之誠亦非過然所以致彼若是巳非一朝一夕之故且當反思其咎姑務自責自勵修我軍政布我威德撫我人民使內治外攘而我有餘力則近恱逺懷而彼將自服顧不復自反而一意憤怒之夫所可憤怒者不過岑猛父子及其黨惡數人而巳其下萬餘之衆固皆無罪之人也今岑猛父子及其黨惡數人既云誅戮已足暴揚所遺二酋原非有名惡目自可寬宥者也又不勝二酋之憤遂不顧萬餘之命竭兩省之財動三省之兵使民男不得耕女不得織數千里內騷然塗炭者兩年于兹然而二酋之憤至今尚未能雪也徒爾兵連禍結徴發益多財饋益殫民困益深無罪之民死者十已六七山猺海賊乘釁搖動窮迫必死之寇既從而煽誘之貧苦流亡之民又從而逃歸之其可憂危何啻十百於二酋者之為患其事已兆而變已形顧猶不此之慮而汲汲於二酋則當事者之過計矣今當事者之於是役其悴心憔思亦可謂勤且至矣特發於憤激而狃為其難是以勞而未效夫二酋者之沮兵拒險亦不過畏罪逃死苟為自全之計非如四方流劫之賊攻城堡掠鄉村虜財物殺良民日為百姓之患人人欲得而誅之者今驅困憊之民使裹糧荷戈以征不為民患素無讐怨之虜此人心之所以不奮而事之所以難濟也又今狼逹土漢官兵亦不下數萬與萬餘畏罪逋誅之虜相持已三月有餘而未能一決者蓋以我兵發機太早而四面防守太密是乃投之無所往而示之以必不活益使彼先慮預備并心協力堅其必死之志以抗我師就使我師將勇卒奮決能取勝亦必多殺士衆非全軍之道又况人無戰志而徒欲合圍待斃坐收成功此我兵之所以雖衆而勢日以懈賊雖寡而曰志以合備日密而氣日以鋭者也夫當事者之意固無非𣣔計出萬全然以用兵而言亦已失之巧遲所謂強弩之末不能穿魯縞矣臣愚以為且宜釋此二酋者之罪開其自新之路而彼猶頑梗自如然後從而殺之我亦可以無憾苟可曲全則且姑務息兵罷餉以休養瘡痍之民以絶覬覦之姦以弭不測之變逮於區處既定德威既洽蠻夷恱服之後此二酋者遂能改惡自新則我亦豈必固求其罪若其尚不知悛執而殺之不過一獄吏之事何至兵甲之煩哉或者以為征之不克而遽釋之則紀綱疑於不振臣竊以為不然夫天子於天下之民物如天覆地載無不欲愛養而生全之寧有撮爾小醜乃與之爭憤求勝而謂之振紀綱者惟後世貪暴諸侯強凌弱衆吞寡則必務於求勝而後巳斯固五霸之罪人也昔苗頑不即工舜使禹益徂征三旬苗民逆命禹乃班師振旅夫以三聖人者為之君帥以征一頑苗謂宜終朝而克捷顧歷三旬之久而復至於班師以歸自今言之其不振甚矣然終致有苗之格而萬世稱聖古之所謂振紀綱者固若是耳臣以匪才繆膺重命得總制四省軍務以從事於偏隅之小醜非不知乘此機會可以僥幸成功苟免於怯懦退避然此必多調軍兵多傷士卒多殺無罪多費糧餉又不足以振揚威武信服諸夷僅能取快於二酋之憤而忘其遺患於兩省之民但知徼功於目前而不知投艱於日後此人臣喜事者之利非國家之福生民之庇臣所不忍也臣又聞兩廣主計之吏謂自用兵以來所費銀兩已不下數十萬梧州庫藏所遺不滿五萬之數矣所食糧米巳不下數十萬梧州倉廪所存不滿一萬之數矣由是言之尚可用兵不息而不思所以善後之圖乎臣又聞諸兩省士民之言皆謂流官之設亦徒有虛名而反受實禍詰其所以皆云思恩未設流官之前土人歲出土兵三千以聽官府之調遣既設流官之後官府歲發民兵數千以防土人之反覆即此一事利害可知且思恩自設流官以來十八九年之間反者五六起前後征勦曾無休息不知調集軍兵若干費用糧餉若干殺傷良民若于朝廷曽不能得其分寸之益而反為之憂勞徴發浚良民之膏血而塗諸無用之地此流官之無益亦斷然可睹矣但論者皆以為既設流官而復去之則有更改之嫌恐啓人言而招物議是以寧使一方之民久罹塗炭而不敢明為朝廷一言寧負朝廷而不敢犯衆議甚哉人臣之不忠也茍利於國而庇於民死且為之矣而何人言物議之足計乎臣始至地方雖未能周知備歷然形勢大略亦可槩見田州切鄰交趾其間深山絶谷皆猺獞之所盤據動以千百必須仍存土官則可藉其兵力以為中土屏蔽若盡殺其人改土為流則邉鄙之患我自當之自撤藩籬非久安之計後必有悔思恩田州處置事宜俟事平之日遵照勑旨公同各官另行議奏但臣既有所聞見不敢不先為陛下一言使朝廷之上早有定處臣等得一意奉行不致往復查議失誤事機可以速安反側實地方之幸臣等之幸臣不勝受恩感激竭忠願效之至辭巡撫兼任舉能自代疏七年正月初二日嘉靖六年十二月初二日準本院咨節該吏部題奉聖旨王守仁暫令兼理巡撫兩廣等處地方寫勑與他欽此欽遵外臣聞命之餘愈增惶懼竊念臣以迂踈多病之軀繆承總制四省軍務之命既巳有不勝其任之憂矣方爾晝夜驅馳圖其所以仰副朝廷之重委者而尚未知所措今又加以巡撫之責豈其所能堪乎况兩廣地方比於他處尤繁且難蠻夷􅍹獞之巢穴處處而是攻劫搶虜之警報日日而有近年以來加之以師旅因之以飢饉郡縣之凋敝日甚小民之困苦益深巡撫之任非得才力精強者重其事權漸其官階而久其職任殆未可求效於歲月之間也蓋非重其事權則不可以漸其官階非漸其官階則不可以久其職任非久其職任則凡所奉動多苟且目前之計而不為日後久長之謀邀一時之虛名而或遺百年之實禍膏澤未洽於下而小民無愛戴感戀之誠德威未敷於逺而蠻夷無信服歸向之志此巡撫兩廣之任雖才能相繼而治效之所以未究也切見致仕副都御史伍文定質性勇果識見明逹往歲寧藩之變嘗從臣起兵討逆臣備知其能今年力未衰置之間散誠有可惜若起而用之以為巡撫其於經略之方撫綏之術必能不負所委及照刑部左侍郎梁材新升南贛副都御史汪鋐亦皆才能素著抑且舊在兩廣備諳土俗民情皆足以堪斯任乞勑吏部於三人之中選擇而使之臣之駑劣多病俾得專意思田之役幸而了事容令照舊回還原籍調理非獨巡撫得人地方有所倚賴而臣之不肖亦茍免於覆餗之謀矣奏報田州思恩平復疏七年二月十三日嘉靖七年正月二十七日據廣西田州府目民盧蘇陸豹黃笋胡喜邢相盧保羅黃王陳羅寬戴慶等連名具狀為悔罪投降陳情乞恩事投稱先因本府土官岑猛與泗城州屢年互相讐殺獲罪上司於嘉靖五年六月內致蒙奏請官兵征勦臨境岑猛自思原無反叛情由意得招撫先自同道士錢一真及親信家人逃躲歸順州界蘇等俱各畏避四散逃入山林止有各處寄住客户千餘躲避不及冒犯官軍俱蒙殺勦目民人等俱不敢抵抗官軍惟有陸綬不曾逺遁當被擒斬其餘韋好羅河等俱蒙官軍陸續搜山殺死驀於當年九月內歸順土官岑璋書報岑猛見在該州前月巳將道士錢一真功次假作岑猛解報軍門爾可作急平定地方來迎爾主蘇等聽信遣人節送衣服檳榔等件岑璋一一收受言説岑猛不可輕易見人官府得知纍我續於十月內岑猛又差人促令邀同王受招復鄉村因見府治空虛乘便入城休息又遣迎岑猛岑璋回説爾今地方未定姑候來春我當發兵三十餘營送爾主來且替爾防守蘇等因此逃命屯聚以候岑猛並無叛心嘉靖六年正月有人傳説岑猛於天泉嵒內急病身死尸骨被岑璋燒燬金銀盡被收獲隨遣人去歸順探問又𬒳岑璋殺死蘇等痛悔無由竊思官男岑邦彥先巳齊村病故今聞岑猛又死無主可靠欲出投訴切見四方軍馬充斥聲言務要盡勦又恐飛蟲附火必損其身又蒙上司隂使王受圖殺盧蘇又使盧蘇圖殺王受反覆難信投降無路日切苦痛今幸朝廷寬赦欽命總制天星體天行道按臨在此神鬼信服蘇等方敢捨命求生率領闔府目民男子大小人等共計四萬餘名口盡數投降伏乞憫念生靈草命赦死立功以贖前罪哀乞憐憫岑猛原無反叛情罪存其一脈俯順夷情辦納糧差實為萬幸等情并據思恩府頭目王受盧蘇黃容盧平韋文明侣馬黃留黃石陸宗覃鑑潘成等亦連名具狀告同前事投稱本府原係土官自改立流官開圖立里土俗不便奈緣小人冥頑不諳漢法屢次攘亂不定受等同辭懇乞上司仍立目甲不意反致官府嗔惟近又蒙官兵征勦田州要將受等一槩誅滅必要窮追逐捕只得逃遁山林兼以八寨蠻子原以剽掠為生乘機假受姓名每每攻圖城邑劫虜鄊村虛名受禍受等即欲挺身投訴見得四方軍馬把截兼聞隂使盧蘇圖殺王受又使王受圖殺盧蘇反覆難信以此連年抱苦控訴無由且受等頗知利害豈敢自速滅亡今幸朝廷寬恩命總制天星按臨在此神鬼信服受等方敢率領所部目民男女大小人等共計三萬餘名口捨命投降伏乞詳情赦死以全草命更望俯順夷情仍復目甲使得辦納糧差實為萬幸等因各投訴到臣據此照得先於嘉靖六年七月初七日為地方事節奉勑諭先該廣西田州地方逆賊岑猛為亂已令提督兩廣等官都御史姚鏌等督兵進勦隨該各官奏稱岑猛父子悉已擒斬巢穴蕩平捷音上聞已經降勑奬勵論功行賞續該各官復奏惡目盧蘇倡亂復叛王受攻陷思恩及節據石金所奏前項地方盧蘇王受結為死黨互相依倚禍孽日深將來不可收拾又參稱先後撫臣舉措失當姚鏌等攘夷無䇿輕信寡謀圖田州已不可得并思恩胥復失之要得通行查究追奪兵部議奏以各官先後所論事宜意見不同且兵連兩廣調遣事干鄰境地方必得重臣前去總制督同議處方得停當今特命爾提督兩廣及江西湖廣等處地方軍務星馳前去彼處即查前項夷情田州因何復叛思恩因何失守督同姚鏌等斟酌事勢將各夷叛亂未形者可撫則撫反形巳露者當勦即勦一應主客官軍從宜調遣主副將官及三司等官悉聽節制公同計議應設土官流官何者經久利便并先今撫鎮等官有功有過分别大小輕重明白奏聞區處事體十分重大者具奏定奪朕以爾勳迹久著才望素隆特兹簡任爾務以體國為心聞命就道竭忠盡力大展謀猷俾夷患殄除地方安靖以紓朕西南之憂仍須深慮却顧事出萬全一勞永逸以為廣人久逺之休毋得循例辭避以孤衆望欽此欽遵隨於九月內節該兵部咨為辭免重任乞恩養病事臣奏奉聖旨卿識敏才髙忠誠體國今兩廣多事方藉卿威望撫定地方用紓朕南顧之懷姚鏌已致仕了卿宜星夜前去節制諸司調度軍馬撫勦賊寇安戢兵民勿再遲疑推諉以負朕望還差官鋪馬裏齎文前去敦趣赴任行事該部知道欽此欽遵當即啓行至十一月二十一日抵梧州蒞任十二月內續準兵部咨為地方大計緊急用人事該禮部右侍郎方獻夫奏節奉聖旨方獻夫所奏關係地方大計鄭潤朱麟與姚鏌事同一體姚鏌已著致仕鄭潤等因賊情未寧暫且留用今既這等説鄭潤取回代替的朕自簡用朱麟應否去留著兵部會議并堪任更代的推舉相應官兩員來看田州應否設都御史在彼住劄還著王守仁議處具奏定奪欽此備咨前來知會俱經欽遵外本月初五日進至平南縣地方與都御史姚鏌交代二十二等日太監鄭潤總兵官朱麟陸續各回梧州廣州等處聽候新任總兵太監交代去訖當臣公同巡按紀功御史石金右布政林富參政汪必東鄒輗副使祝品林大輅僉事汪溱張邦信申惠吳天挺參將李璋沈希儀張經及舊任副總兵今間住都指揮同知張祐并各見在軍前用事等官會議得思恩田州之役兵連禍結兩省荼毒巳踰二年兵力盡於哨守民脂竭於轉輸官吏罷於奔走即今地方巳如破壞之舟漂泊於顛風巨浪中覆溺之患洶洶在目不待智者而知之矣今若必欲窮兵雪憤以收前功未論其不克縱復克之亦有十患何者今皇上方推至孝以治天下惻怛之仁覆𬒳海宇惟恐一物不得其所雖一夫之獄猶慮有所虧枉親臨斷決况兹數萬無辜之赤子而必欲窮搜極捕使之噍類不遺傷伐天地之和虧損好生之德其患一也屯兵十萬日費千金自始事以來所費銀米各已數十餘萬前歲之冬二酋復亂至今且餘二年未嘗與賊交一矢接一戰而其費已若此今若復欲進兵以近計之亦須數月省約其費亦須銀米各十餘萬計今梧州倉庫所餘銀不滿五萬米不滿一萬矣兵連不息而財匱糧絶其患二也調集之兵逺近數萬屯戍日久人懷歸思兼之水土不服而前歲之疫死者一二萬人衆情憂惑自頃以來疾病死者不可以數無日無之潰散逃亡追捕斬殺而不能禁其未見敵而巳若此今復驅之鋒鏑之下必有土崩瓦解之勢其患三也用兵以來兩省之民男不得耕女不得織已餘二年衣食之道日窮老稚轉乎溝壑今春若復進兵又將廢一年之耕百姓飢寒切身群起而為盜不逞之徒因而號召之其禍殆有甚於思田之亂者其患四也論者皆以不誅二酋則無以威服土官是殆不然今所賴以誅二酋者乃皆土官之兵而在我曾無一旅可恃之卒又不能宣布主上威德明示賞罰而徒以市井狙獪之謀相欺相誘計窮詐見益為彼所輕侮每一調發旗牌之官十餘往反而彼猶驁然不出反挾此以肆其貪求縱其吞噬我方有賴於彼縱之而不敢問彼亦知我之不能彼禁也益狂誕而無所忌岑猛之僣妄亦由此等積漸成之是欲誅一二逃死之遺孽而養成十數岑猛其患五也兩廣盜賊猺獞之巢穴動以數千百計軍衛有司營堡關隘之兵時嘗召募增輔然且不敷今復盡取而聚之思田之一隅山􅍹海寇乘間竊發遂至無可捍禦近益窺我空虛出掠愈頻為患愈肆今若復聞進兵彼知事未易息逺近相煽蜂起我兵勢難中輟救之不能棄之不可其為慘毒可憂尤有甚於飢寒之民其患六也軍旅一動饋運之夫騎征之馬各以千計每夫一名顧直一兩馬一匹四兩馬之死者則又追償其主之直是皆取辦於南寧諸屬縣百姓連年兵疲困苦已極而復重之以此其不亡而為盜者則亦溝中之瘠矣其患七也兩省土官於岑猛之滅已各懷唇齒之疑其各州土目於蘇受之討又皆有狐兔之憾是以遲疑觀望莫肯效力所憑恃者獨湖兵耳然前歲之疫湖兵死者過半其間固多借倩而來兵回之日死者之家例有償命銀兩總其所費亦以萬數今兹復調踣頓道途不得顧其家室亦巳三年勞苦怨鬱潛逃而歸者相望於道誅之不能止因一隅之小憤而重失三省土人之心其間伏憂隱禍殆難盡言其患八也田州外捍交址內屏各郡其間深山絶谷又皆􅍹獞之所盤據若必盡誅其人異時雖欲改土設流亦已無民可守非獨自撤藩籬勢有不可抑亦藉膏腴之田以資猺獞而為邉夷拓土開疆其患九也既以兵克必以兵守歲歲調發勞費無已秦時勝廣之亂實興於閭左之戍且一夫制馭變亂隨生反覆相尋禍將焉極其患十也故為今日之舉莫善於罷兵而行撫撫之有十善活數萬無辜之死命以明昭皇上好生之仁同符虞舜有苗之征使逺夷荒服無不感恩懷德培國家元氣以貽燕翼之謀其善一也息財省費得節縮􅑿餘以備他虞百姓無椎脂刻髓之苦其善二也久戍之兵得遂其思歸之碩而免於疾病死亡脫鋒鏑之慘無土崩瓦解之患其善三也又得及時耕種不費農作雖在困窮之際然皆獲顧其家室亦各漸有回生之望不致轉徙自棄而為盜其善四也罷散土官之兵各歸守其境土使知朝廷自有神武不殺之威而無所恃賴於彼隂消其桀驁之氣而沮懾其僣妄之心反側之姦自息其善五也逺近之兵各歸舊守窮邉沿海咸得修復其備禦盜賊有所憚而不敢肆城廓鄊村免於驚擾劫掠無虛內事外顧此失彼之患其善六也息饋運之勞省夫馬之役貧民解於倒懸得以稍稍蘇復起呻吟於溝壑之中其善七也土民釋兔死狐悲之憾土官無唇亡齒寒之危湖兵遂全師早歸之願莫不安心定志涵育深仁而感慕德化其善八也思田遺民得還舊土招集散亡復其家室因其土俗仍置酋長彼將各保其境土而人自為守內制􅍹獞外防邉夷中土得以安枕無事其善九也土民既皆誠心恱服不須復以兵守省調發之費歲以數千官軍免踣頓道途之苦居民無往來騷屑之患商旅通行農安其業近恱逺來德威覃被其善十也夫進兵行勦之患既如彼罷兵行撫之善復如此然而當事之人乃猶往往利於進兵者其間又有二幸四毁焉下之人幸有數級之獲以要將來之賞上之人幸成一時之捷以蓋日前之愆是謂二幸始謀請兵而終鮮成效則有輕舉妄動之毁頓兵竭餉而得不償失則有浪費財力之毀聚數萬之衆而竟無一戰之克則有退縮畏避之毁循土夷之情而拂士夫之議則有形迹嫌疑之毀是謂四毁二幸蔽於其中而四毁惕於其外是以寧犯十患而不顧棄十善而不為夫人臣之事君也殺其身而苟利於國滅其族而有禆於上皆甘心焉豈以僥幸之私毁譽之末而足以撓亂其志者今日之撫利害較然事在必行斷無可疑者矣於是衆皆以為然二十六日臣至南寧府乃下令盡撤調集防守之兵數日之內解散而歸者數萬有餘湖兵數千道阻且逺不易即歸仍使分留南寧賔州解甲休養待間而發初盧蘇王受等聞臣奉命前來查勘始知朝廷亦無必殺之意皆有投生之念日夜懸望惟恐臣至之不速巳而聞太監總兵等官復皆相繼召還至是又見防守之兵盡撤其投生之念益堅乃遣其頭目黃富等十餘人於正月初七日先付軍門訴告願得掃境投生惟乞宥免一死臣等諭以朝廷之意正恐爾等有所虧枉故特遣大臣前來查勘開爾等更生之路爾等果能誠心投順決當貸爾之死因復開陳朝廷威德備寫𥿄牌使各持歸省諭盧蘇王受等大意以為岑猛父子縱無叛逆之謀即其凶殘酷暴慢上虐下自有可誅之罪今其父子黨與俱已伏其辜爾等原非有名惡目本無大罪至於部下數萬之衆尤為無辜今因爾等阻兵負險致今數萬無辜之民破家失業父母死亡妻子離散奔逃困苦已將兩年又上煩朝廷興師命將勞擾三省之民爾等之罪固已日深但念爾等所以阻兵負險者亦無他意不過畏罪逃死苟為自全之計其情亦有可憫方今聖上推至孝之仁以子愛黎元惟恐一物不得其所雖一夫之獄尚恐或有虧枉親臨斷決何况爾等數萬之命豈肯輕意勦殺故今特遣大臣前來查勘開爾更生之路非獨救此數萬無辜之民亦使爾等得以改惡從善捨死投生牌至爾等部下兵夫即可解散各歸復業安生爾等即時出來投到決當宥爾之死全爾身家若遲疑觀望則天討遂行後悔無及限爾二十日內爾若不至是朝廷必欲開爾生路而爾必欲自求死路進兵殺爾亦可以無憾矣蘇受等得牌皆羅拜踴躍歡聲雷動當即撤守備具衣糧盡率其衆掃境來歸本月二十六日俱至南寧府城下分屯為四營明日蘇受等皆囚首自縳各與其頭目數百人赴軍門投見號哀控訴各具投狀告稱前情乞免一死願得竭力報效臣等看得蘇受等所訴情節亦與臣等前後所聞所訪大略相同其間雖有飾説亦多真情良可哀憫因復照前牌諭所稱諭以朝廷恩德以為朝廷既巳赦爾等之死許爾投降寧肯誘爾至此又復殺爾虧失信義爾之一死決當宥爾矣爾可勿復憂疑但爾蘇受二人擁衆負險雖由畏死然此一方為爾之故騷擾二年有餘至上煩九重之慮下疲三省之民若不略示責罰亦何以舒泄軍民之憤於是下盧蘇王受於軍門各杖之一百衆皆合辭扣首為之請命乃解其縛諭以今日宥爾一死者是朝廷天地好生之仁杖爾一百者乃我等人臣執法之義於是衆皆扣首恱服臣亦隨至其營撫定餘衆皆莫不感泣歡呼皆謂朝廷如此再生之恩我等誓以死報及據狀末告乞憐憫岑猛原無反叛情罪存其一脈俯順夷情辦納糧差一節自臣奉命而來沿途詢諸商賈行旅訪諸士夫軍民莫不以為宜從夷俗仍立土官庶可永久無變不然反覆之患終恐不免及臣至此又公同大小各官審度事勢屢經酌量議處亦皆以為治夷之道宜順其情臣於先次謝恩本內已經略具奏聞至是因其控告哀切當即遵照勑諭便宜事理許以其情奏請且諭以朝廷之意無非欲生全爾等爾等但要誠心向化改惡從善竭忠報國勿慮朝廷不能順爾之情於是又皆感泣歡呼皆謂朝廷如此再生之恩我等誓以死報且乞即願殺賊立功以贖前罪臣因諭以朝廷之意惟願生全爾等今爾方來投生豈忍又驅之兵創之下爾等逃竄日久家業破蕩且宜速歸完爾家室及時耕種修復生理至於各處盜賊軍門自有區處不須爾等勦除待爾家事稍定徐當調發爾等於是又皆感泣歡呼皆謂朝廷如此再生之恩我等誓以死報臣於是遂委右布政林富舊任總兵官張祐分投省諭安插其衆俱於二月初八日督令各歸復業去訖地方之事幸遂平定皆皇上至孝逹順之德感格上下神武不殺之威震懾鬼神風行於廟堂之上而草偃於百蠻之表是以班師不待七旬而頑夷即爾來格不析一矢不戮一卒而全活數萬生靈是所謂綏之斯來動之斯和者也臣以蹇劣繆承任使仰賴鴻休得免罪責快覩盛明豈勝慶幸除將設立土官及地方一應經久事宜遵照敕旨公同各官再行議處另行具奏外緣係奏報平復地方事理為此具本專差冠帶舍人王洪親齎謹具題知地方緊急用人疏七年二月十五日先該禮部右侍郎方獻夫奏前事節奉聖旨田州應否設都御史在彼住劄還著王守仁議處具奏定奪欽此兵部備咨前來知會除欽遵外隨於今年正月二十七日該思恩田州二府土目盧蘇王受等各率衆數萬自縛歸降該臣遵照勑諭事理悉已撫定當遣廣西右布政林富舊任副總兵張祐分投督領各夷各歸原土復業安生巳經具本奏報外照得思恩田州連年兵火殺戮之餘官府民居悉已燒燬破蕩雖蔀屋尋丈之廬亦遭翻穵發掘曾無完土荒村僻塢不遺片瓦尺椽傷心慘目誠不忍見各夷近巳誠心投服毁棄兵戈賣刀買牛見已各事田作自後反側之患以臣料之或已可免但其風景凄戚生意蕭條憂惶困苦之餘無以自存必得老成寬厚之人撫恤綏柔之臣等見其悲慘無聊之狀誠亦未忍一旦棄去而不顧况思田去梧州軍門水路一月之程一時照料有所不及近又與各官議欲於田州建立流官府治以制御土官修復城池廨宇等項必須勞民動衆自非素得夷情者為之經理區畫各夷雕弊之餘豈復堪此騷屑况議設知府等官皆未曾到一應事務莫有任其責者看得右布政林富慈祥愷悌識逹行堅素立信義見在思田地方安插各夷合無準如方獻夫所奏將林富量改憲職仍聼臣等節制暫於思田地方往來住劄撫循緝理其於事理亦甚相應臣又看得思田地方原係蠻夷􅍹獞之區不可治以中土禮法雖流官之設尚且不可又况常設重臣住劄其地豈其所堪則其供饋之費送迎之勞必且重貽地方異日之擾斯亦不可不預言之者合無將本官廩給口糧一應合用之費及往來夫馬一應合用之人俱於南寧府衛取辦銀兩於庫貯軍餉內支給一不以于思田之人俟一年之後各夷生理漸復府治城廓𪠘宇漸以完備則將林富量移别處任用而思田止存知府理治或設兵備官一員於賔州住劄或就以南寧兵備兼理不時往來撫循如此則目前既可以得撫定綏柔之益而日後又可以免困頓煩勞之擾臣之愚見所議如此惟復别有定奪均乞聖明裁處地方急缺官員疏七年二月十八日先據廣西副總兵李璋呈前事看得柳慶地方新任參將王繼善近因病故地方盜賊生發不可一日缺官乞暫委相應官一員前去代理等因到臣該臣看得柳慶地方近因思田用兵不息猺賊乘間出掠參將王繼善既已病故而該道守巡兵備等官又以思田之役皆在軍門督餉督哨地方重寄委無一官之托為照參將沈希儀雖係專設田州住箚官員然田州之事臣與各官見駐南寧自可分理本官舊在桞慶夷情土俗備能諳悉而謀勇才能足當一靣求可委用無踰本官者該臣遵照欽奉勑諭便宜事理就行暫委本官前去管理參將行事聼候奏請外近該思恩田州土目盧蘇王受等率衆歸降該臣行委右布政林富間住副總兵張祐分投督領各夷各歸原土復業安生今各夷見巳賣刀買牛爭事農作度其事勢將來或可以無反側之患則前項駐劄參將似亦可以無設但今議於田州修復流官府治以控制土官則城廓廨宇之役未免勞民動衆瘡痍大病之後各夷豈復堪此臣等議調腹裏安靖地方官軍打手之屬約二千名隱然有屯戍之形而實以備修建之役庶幾工可速就而又得免於起夫之擾然非統馭得人則於各夷或亦未免有所驚疑除布政林富巳另行議奏外看得間住總兵張祐才識通敏計慮周悉將略堪折衝之任文事兼撫綏之長今又見在思田地方安插各夷皆能得其歡心乞敕兵部俯從臣議將張祐復其舊職暫委督令前項各兵經理修建之役仍令與布政林富更互往來於思田之間省諭安撫諸夷其合用廩給夫馬之類悉照議處林富事例於南寧府衛取辦俟一二年後各夷生理盡復府治城廓𪠘宇悉巳完備則將張祐量改他處任用而田州止存知府理治仍乞將沈希儀或就改注柳慶地方守備惟復别有定奪均乞聖明裁處處置平復地方以圗久安疏七年四月初六日臣聞傳説之告髙宗曰明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民今天下郡縣之設乃有大小繁簡之别中土邉方之殊流官土襲之不同者豈故為是多端哉蓋亦因其廣谷大川風土之異氣人生其間剛柔緩急之異稟服食器用好惡習尚之異類是以順其情不違其俗循其故不易其宜要在使人各得其所固亦惟以亂民而已矣臣以迂庸繆膺重命勘處兵事於兹土節該欽奉勑諭謂可撫則撫當勦即勦是陛下之心惟在於除患安民未嘗有所意必也又節該欽奉勑諭謂賊平之後公同議處應設土官流官何者經久利便是陛下之心惟在於安民息亂未嘗有所意必也始者思田梗化既舉兵而加誅矣因其悔罪來投遂復宥而釋之固亦莫非仰體陛下不嗜殺人之心惓惓憂憫赤子之無辜也然而今之議者或以為流官之設中土之制也已設流官而復去之則嫌於失中土之制土官之設蠻夷之俗也已去土官而復設之則嫌於從蠻夷之俗二者將不能逃於物議其何以能建事而底績乎是皆不然夫流官設而夷民服何苦而不設流官乎夫惟流官一設而夷民因以騷亂仁人君子亦安忍寧使斯民之騷亂而必於流官之設者土官去而夷民服何苦而必土官乎夫惟土官一去而夷民因以背叛仁人君子亦安忍寧使斯民之背叛而必於土官之去者是皆虞目前之毀譽避日後之形迹苟為周身之慮而不為國家思久長之圖者也其亦安能仰窺陛下如天之仁固平平蕩蕩無偏無黨惟以亂民為心乎臣於思恩田州平復之後即已仰遵聖諭公同總鎮鎮巡副參三司等官太監張賜御史石金等議應設流官土官何者經久利便不得苟有嫌疑避忌而心有不盡謀有不忠乃皆以為宜仍土官以順其情分土目以散其黨設流官以制其勢蓋蠻夷之性譬猶禽獸麋鹿必欲制以中土之郡縣而繩之以流官之法是群麋鹿於堂室之中而欲其馴擾帖服終必觸樽爼翻几席狂跳而駭擲矣故必放之間曠之區以順適其獷野之性今所以仍土官之舊者是順適其獷野之性也然一惟土官之為而不思有以散其黨與制其猖獗是縱麋鹿於田野之中而無有乎墻墉之限豶牙童梏之道終必長奔直竄而無以維縶之矣今所以分立土目者是墻墉之限豶牙童梏之道也然分立土目而終無連屬綱維於其間是畜麋鹿於苑囿而無守視之人以時守其墻墉禁其群觸終將踰垣逺逝而不知踐禾稼決藩籬而莫之省矣今所以特設流官者是守視苑囿之人也議既僉同臣猶以為土夷之心未必盡得而窮山僻壤或有隱情也則亦安能保其必行乎則又備歷田州思恩之境按行其村落而輕理其城堡因而以其所以處之之道詢諸其目長率皆以為善又以詢諸其父老子弟又皆以為善又以詢諸其頑鈍無耻厮役下賤之徒則又亦皆以為善然後信其可以久行而庶或幸免於他日之戮也矣夫然後敢具本以請亦恃聖明在上洞見萬里而無微不燭故臣得以信其愚忠不復有所顧忌然猶反覆其辭而更互其説者非敢有虞於陛下不能亮臣之愚良以今之士人率多執巳見而倡臆説亦足以搖衆心而僨成事故臣不避頰舌之騰者亦欲因是以曉之也煩瀆聖聽臣不勝戰栗惶懼之至緣係處置平復地方以圖久安長治事理未敢擅便為此開坐具本請旨計開一特設流官知府以制土官之勢臣等議得思田初服朝廷威德方新今雖仍設土官數年之間決知可無反側之慮但十餘年後其衆日聚其力日強則其志日廣亦將漸有縱肆并兼之患故必特設流官知府以節制之其御之之道則雖不治以中土之經界而納其歲辦租稅之入使之知有所歸效雖不蒞以中土之等威而操其襲授調發之權使之知有所統攝雖不繩以中土之禮教而制其朝會貢獻之期使之知有所尊奉雖不嚴以中土之法禁而申其冤抑不平之鳴使之知有所赴訴因其歲時伏臘之請慶賀參謁之來而宣其間隔之情通其上下之義矜其不能教其不逮寓警戒於溫恤之中消倔強於涵濡之內使之日馴月習忽不自知其為善良之歸蓋含洪坦易以順其俗而委曲調停以制其亂此今日知府之設所以異於昔日之流官而為久安長治之䇿也臣等看得田州故地寬衍平曠堪以建設流官衙門但其衝射凶惡居民弗寧今擬因其城垣略加改創修理備立應設衙門地僻事簡官不必備環府之田二甲皆以屬之府官府官既無民事案牘之擾終歲可以專力於農為之闢其荒蕪備其旱潦通其溝洫丁力不足則聼其募人耕種官給牛具種子歲收其入三分之一以廪官吏而其餘以食佃人城之內外漸置佃人廬舍而歲益增募招徠以充實之田州舊有商課仍許設於河下薄取其稅以資祭祀賔旅柴薪馬夫之給凡流官之所須者一不以及於土夷如此則雖草創之地而三四年後亦可以漸為富庶之鄉若其經營之始則且須仰給於南寧府庫逮其城郭府治完備事體大定然後總會其土夷之所輸公田之所入商稅之所積每歲若干而官吏之所需者每歲若干斟酌通融立為經久之計又必上同之制用者務從寬假無太苛削官吏其土者得以優𥙿展布無局促牽制之繁此又體悉逺臣綏柔荒服之道也至於思恩舊巳設有流官但因開圖立里繩以郡縣之法是以其民遂亂今宜照舊仍設流官知府聽其土目各以土俗自治而其連屬制御之道悉如臣等前之所議庶可經久無患均乞聖明裁處一仍立土官知州以順土夷之情臣等議得岑氏世有田州其繫戀之私恩久結於人心今岑猛雖誅各夷無賢愚老少莫不悲愴懷思願得復立其後故蘇受之變翕然蜂起不約而同自官府論之則皆以為苗頑逆命之徒在各夷言之則皆自以為嬰臼存孤之義故自兵興以來逺近軍民往往亦有哀憐其志而反不直官府之為者况各夷告稱其先世岑伯顔者嘗欽奉太祖髙皇帝勑旨岑黃二姓五百年忠孝之家禮部好生看他著江夏侯護送岑伯顔為田州府土官知府職事傳授子孫代代相繼承襲欽此欽遵其後如岑永通岑祥岑紹岑鑑岑鏞岑漙皆嘗著征討之績有保障之功猛之暴虐騷縱罪雖可戮而往歲姚源之役近年劉召之勦亦皆間關奔走勤勞在人各夷告稱官兵未進之先猛尚遣人奉表朝賀貢獻又遣人賫本赴京控訴官兵將進之時猛遂率衆逺遁未嘗敢有抗拒以此言之其無反叛之謀蹤迹頗明今𣣔仍設土官以順各夷之情而著非岑氏之後彼亦終有未服故今日土官之立必須岑氏子孫而後可臣等看得田州府城之外西北一隅地形平坦堪以居民議以其地降為田州而於舊屬四十八甲之內割其八甲以屬之聼以其土俗自治立岑猛之子一人始授以署州事吏目三年之後地方寧靖效有勤勞則授以判官六年之後地方寧靖效有勤勞則授以為同知九年之後地方寧靖效有勤勞則授以為知州使承岑氏之祀而隸之流官知府其制御之道則悉如臣等前之所議如此則朝廷於討猛之罪記猛之勞追録其先世之忠俯順其下民之望者兼得之矣昔文武之政罪人不孥興滅繼絶而天下之民歸心逺近蠻夷見朝廷之所以處岑氏者若此莫不曰猛肆其惡而舉兵加誅法之正也明其非叛而不及其孥仁之至也録其先忠而不絶其祀德之厚也不利其上而復與其民義之盡也矜其冥頑而曲加生全恩之極也即此一舉而四方之土官莫不畏威懷德心悅誠服信義昭布而蠻夷自此大定矣此今日知州之設所以異於昔日之土官而為久安長治之䇿也臣等又看得岑猛之子存者二人其長者為岑邦佐其幼者為岑邦相邦佐自幼出繼武靖州為知州前者徒以誅猛之故有司奏請安置於漳州然彼實無可革之罪今日田州之立無有宜於邦佐者但武靖當徭賊之衝而邦佐素得其民心其才足能制御邇者武靖之民以盜賊焻熾州民無主之故往往來告願得復還邦佐為知州以保障地方臣等方欲為之上請如欲更一人諸夷未必肯服莫若仍以邦佐歸之武靖而立邦相於田州用其強立有能者於折衝捍禦之所而存其幼弱未立者於安守宗祀之區庶為兩得其宜至於思恩則岑濬之後已絶自不必復有土官之設矣均乞聖明裁處一分設土官巡檢以散各夷之黨臣等議得土官知州既立若仍以各土目之兵盡屬於知州則其勢并力衆驕恣易生數年之後必有報讐復怨吞弱暴寡之事則土官之患猶如故也且土目既屬於上官而操其生殺豫奪之權則彼但惟土官之是從寧復知有流官知府者則流官知府雖欲行其控御節制之道施其綏懷撫恤之仁亦無因而與各土目者相接矣故臣等議以舊屬八甲割以立州之外其餘四十甲者每三甲或二甲立以為一巡檢司而屬之流官知府每司立土巡檢一員以土目之素為衆所信服者為之而聽其各以土俗自治其始授以署巡檢司事土目三年之後而地方寧靖效有勤勞則授以冠帶六年之後而地方寧靖效有勤勞則授以為土巡檢其糧稅之入則徑納於流官知府而不必轉輸於州之土官以省其費其軍馬之出亦徑調於流官知府而不必轉發於州之土官以重其勞其官職土地各得以傳諸子孫則人人知自愛惜而不敢輕犯法其襲授豫奪皆必經由於知府則人人知所依附而不敢輒携二勢分難合息朋姦濟虐之謀地小易制絶恃衆跋扈之患如此則土官既無羽翼爪牙之助而不敢縱肆於為惡土目各有土地人民之保而不敢黨比以為亂此今日巡檢之設所以異於昔日之土目而為久安長治之䇿也至於思恩事體悉與田州無異亦宜割其目甲分立以為土巡檢司聼其以土俗自治而屬之流官知府其辦納兵糧與連屬制御之道一如田州則流官之設既不失朝廷之舊巡司之立又足以散土夷之黨而土俗之治復可以順逺人之情一舉而兩得矣均乞聖明裁處一田州既改流官亦宜更其府名初岑猛之將變忽有石自田州江心浮出傾卧岸側其時民間有田石傾田州兵田石平田州寧之謡猛甚惡之禁人勿言密起百餘人夜平其石旦即復傾如是者屢屢已而果有兵變今年二月盧蘇等既有投順歸視其石則已平矣皆共喜異傳以為祥臣至田州親視其石聞土人之言如此民間多取田寧二字私擬其名臣等欲乞朝廷遂以此意命之雖非大義所關亦足以新耳目而定人心之一端也其該府所設官員臣等擬於知府之外佐二則同知或通判一員首領則經歷知事各一員吏胥略具而已今見在者已有通判張華知事林光甫照磨李世亨其知府亦已選有一員陳能然至今尚未到任臣嘗訪詢其故咸謂陳能原奉朝旨升廣西布政司右參政管田州府事又賜之勑旨以重其權吏部奏有欽依令其先赴該司到任然後往蒞田州該司左布政嚴紘謂其既掌府事即係屬官不得於該司到任陳能遂竟還原籍至今亦不復來參照嚴紘妄自尊大但知立上司之體勢而輒敢慢視敕旨蔑廢部移固巳深為可罪陳能則𥚹狹使氣徒欲申一已之小憤而遂爾委朝命於草萊棄職任如敝屣使為人臣者而皆若是則地方之責焉所寄託而朝廷威令何以復行乎臣等所訪如此但未委虛的乞將二人通行提究重加懲戒以警將來臣觀陳能氣性悻悻若此亦非可使以綏柔新附之民者看得廣東化州知州林寬舊任南康通判翦緝安義諸賊甚得調理且其才識通敏幹辦勤勵臣時巡撫江西深知其有可用近因田州改建府治修復城垣地方無官可任巳經行文委令經理其事即若升以該府同知而使之久於其職其所建立必有可觀逮其纍有成績逐擢以為知府使終身其地彼亦欣然過望必且樂為不倦為益地方決知不少矣大抵田州之亂起於搜剔太甚今其歸附皆出誠心原非以兵力強取而得者故不必過為振厲駕抑急其機防反足生變但與之休飬生息略施控御其間可矣夫走狗逐兔而捕鼠以狸人之才器各有所宜也伏乞聖明乘擇一思恩府設立流官亦宜如田州之數其知府一員吳期英見在但巳屢有奔逃之辱難以復臨其下然未有可去之罪且宜改用於他所姑使之自效可矣看得柳州府同知桂鏊督餉賔州思恩之人聞其行事頗知信向近以修復思恩府治委之經理其所謀猷雖未見有大過於人然皆平實詳審不為浮飾似於思恩之人為宜苟未能灼知超然卓異之才舉而用之以一新政化則得如鏊者器而使之姑且修弊補鏬休勞息困以與久疲之民相安於無事當亦能有所濟也乞勑吏部再加裁酌而改用之一田州各甲今擬分設為九土巡檢司其思恩各城頭今擬分設為九土巡檢司各立土目之素為衆所信服者管之其連屬之制升授之差俱巳備有前議但各甲城頭既巳分析若無人管理復恐或生弊端臣等遵照敕諭便宜事理巳先行牌仰各頭目暫且各照分掌管辦納兵糧候奏請命下然後欽遵施行一田州凌時甲完冠寨陶甲腮水源坤官位甲舊朔勒甲兼州子半甲共四甲半擬立為凌時土巡檢司擬以土目龍寄管之緣龍寄先來投順故分甲比衆獨多一田州寨馬甲略羅博溫甲共三甲擬立為寨馬土巡檢司擬以土目盧蘇管之一田州大田子甲那帶甲錦飬甲共三甲擬立為大田土巡檢司擬以土目黃富管之一田州萬洞甲周甲共二甲擬立為萬洞土巡檢司擬以土目陸豹管之一田州陽院右鄧甲控講水册槐並畔甲共二甲擬立為陽院土巡檢司擬以土目林盛管之一田州思郎那召甲舍甲共二甲擬立為思郎土巡檢司擬以土目胡喜管之一田州纍彩甲子軒憂甲篤欣下甲共三甲擬立為纍彩土巡檢司擬以土目盧鳯管之一田州怕何甲速甲共二甲擬為怕何土巡檢司擬以土目羅玉管之一田州武龍甲里定甲共二甲擬立為武龍巡檢司擬以土目黃笋管之一田州拱甲白石甲共二甲擬立為栱甲土巡檢司擬以土目邢相管之一田州床甲寨例甲共二甲擬立為床甲土巡檢司擬以土目盧保管之一田州婪鳯甲工堯降甲共二甲擬立為婪鳯土巡檢司擬以土目黃陳管之一田州下隆甲周甲共二甲擬立為下隆土巡檢司擬以土目黃對管之一田州縣甲環甫蛙可甲共二甲擬立為縣甲土巡檢司擬以土目羅寬管之一田州篆甲煉甲共二甲擬立為篆甲土巡檢司擬以土目王萊管之一田州寨桑甲義寧江那半甲共一甲半擬立為寨桑土巡檢司擬以土目戴德管之一田州思幼東平夫棒甲盡甲子半甲共一甲半擬立為思幼土巡檢司擬以土目楊趙管之一田州侯周怕豐甲一甲擬立為侯周土巡檢司擬以土目戴慶管之一思恩興隆七城頭兼都陽十城頭擬立為土巡檢司擬以土目韋貴管之緣韋貴先來向官故授地比衆獨多一思恩白山七城頭兼丹良十城頭擬立為白山土巡檢司擬以土目王受管之一思恩定羅十二城頭擬立為定羅土巡檢司擬以土目徐五管之一思恩安定六城頭擬立為安定土巡檢司擬以土目潘良管之一思恩古零通感那學下半四堡四城頭擬立為古零土巡檢司擬以土目覃益管之一思恩舊城十一城頭擬立舊城土巡檢司擬以土目黃石管之一思恩那馬十六城頭擬立為那馬土巡檢司擬以土目蘇關管之一思恩下旺一城頭擬立為下旺土巡檢司擬以土目韋文明管之一思恩都陽中團一城頭擬立為都陽土巡檢司擬以土目王留管之右各目之內惟田州之龍寄思恩之韋貴徐五事體於各目不同而韋貴又與徐五龍寄稍異蓋韋貴於事變之始即來投順官府又嘗效有勤勞宜不待三年而即與之以實授土巡檢以旌其功徐五亦隨韋貴投順而效勞不及龍寄雖無功勞而投順在一年之前二人者宜次韋貴不待三年而即與之以冠帶三年而即與之以實授土巡檢如此則功罪之大小投順之先後皆有差等而勸懲之道著矣或又以盧蘇王受不當與各土目並立者臣等又以為不然方其率衆為亂則蘇受者固所謂罪之魁矣及其率衆來降則蘇受者又所謂功之首也况二府目民又皆素服二人今若立各土目而二人不與非但二人者未能帖然於衆目之下衆目固亦未敢安然而處其上非所以為定亂息爭之道也故臣等仍議以盧蘇王受為衆目之首庶幾事體穩帖而人心允服矣一田州思恩各官目人等見監家屬男婦初擬解京今各目人等既已投順則其家屬男婦相應給還領養均乞聖明裁允一田州新服用夏變夷宜有學校但瘡痍逃竄之餘尚無受􅒡之民焉有入學之士况齋膳廪餼俱無所出即欲建學亦為徒勞然風化之原終不可緩臣等議欲於附近府州縣學教官之內令提學官選委一員暫領田州學事聼各學生徒之願改田州府學及各處儒生之願來田州附籍入學者皆令寄名其間所委教官時至其地相與講肄遊息或於民間興起孝弟或倡逺近舉行鄉約隨事開引漸為之兆俟休養生息一二年後流移盡歸商旅奏集民居已覺既庶財力漸有可為則如學校及隂陽醫學之類典制之所宜備者皆聼該府官以次舉行上請然後為之設官定制如此則施為有漸而民不知擾似亦招徠填實之道鼓舞作新之機也均乞聖明裁處一思田去梧州水陸一月之程軍門隔逺難於控馭調度兼之府治雖立而規制未成流官雖設而職守未定且瘡痍未復人心憂惶須得重巨撫理臣等巳經具題乞將右布政林富量升憲職存留舊任副總兵張祐使之更迭往來於二府地方綏緝經理仍乞賜以便宜勑書將南寧賔州等府衛州縣及東蘭南丹泗城那地都康向武等土官衙門俱聼林富等節制臣等所議地方經久事宜候奏請命下之日悉以委之林富等使之欽遵以次施行庶幾事無墮墮而功可責成矣王文成公全書卷之二十六續編一德洪葺師文録始刻于姑蘇再刻于越再刻于天真行諸四方久矣同志又以遺文見寄俾續刻之洪念昔葺師録同門巳病太繁兹録若可緩者既而伏讀三四中多簡書墨迹皆尋常應酬瑣屑細務之言然而道理昭察仁愛惻怛有物各付物之意此師無行不與四時行而百物生言雖近而旨實逺也且師沒既久表儀日隔茍得一𥿄一墨如親面覿况當今師學大眀四方學者徒喜領悟之易而未究其躬踐之實或有離倫彞日用樂懸虛妙頓以為得者讀此能無省然激衷此吾師中行之證也而又奚以太繁為病邪同門唐子堯臣僉憲吾浙嘗謀刻未遂今年九月虬峯謝君來按吾浙刻師全書檢所未録盡刻之凡五卷題曰文録續編師胤子王正億嘗録陽眀先生家乘凡三卷今更名世德紀并刻于全書末卷云隆慶壬申一陽日德洪百拜識大學問吾師接𥘉見之士必借學庸首章以指示聖學之全功使知從入之路師征思田將彂先授大學問德洪受而録之大學者昔儒以為大人之學矣敢問大人之學何以在于眀眀德乎陽眀子曰大人者以天地萬物為一體者也其視天下猶一家中國猶一人焉若夫間形骸而分爾我者小人矣大人之能以天地萬物為一體也非意之也其心之仁本若是其與天地萬物而為一也豈惟大人雖小人之心亦莫不然彼顧自小之耳是故見孺子之入井而必有怵惕惻隱之心焉是其仁之與孺子而為一體也孺子猶同類者也見鳥獸之哀鳴􅷴觫而必有不忍之心焉是其仁之與鳥獸而為一體也鳥獸猶有知覺者也見草木之摧折而必有憫恤之心焉是其仁之與草木而為一體也草木猶有生意者也見瓦石之毁壞而必有顧惜之心焉是其仁之與瓦石而為一體也是其一體之仁也雖小人之心亦必有之是乃根于天命之性而自然靈昭不昧者也是故謂之眀德小人之心既巳分隔隘陋矣而其一體之仁猶能不昧若此者是其未動于欲而未蔽于私之時也及其動于欲蔽于私而利害相攻忿怒相激則將戕物圯類無所不為其甚至有骨肉相殘者而一體之仁亡矣是故茍無私欲之蔽則雖小人之心而其一體之仁猶大人也一有私欲之蔽則雖大人之心而其分隔隘陋猶小人矣故夫為大人之學者亦惟去其私欲之蔽以自眀其眀德復其天地萬物一體之本然而巳耳非能于本體之外而有所增益之也曰然則何以在親民乎曰眀眀德者立其天地萬物一體之體也親民者逹其天地萬物一體之用也故眀眀德必在于親民而親民乃所以眀其眀德也是故親吾之父以及人之父以及天下人之父而後吾之仁實與吾之父人之父與天下人之父而為一體矣實與之為一體而後孝之眀德始眀矣親吾之兄以及人之兄以及天下人之兄而後吾之仁實與吾之兄人之兄與天下人之兄而為一體矣實與之為一體而後弟之眀德始眀矣君臣也夫婦也朋友也以至于山川鬼神鳥獸草木也莫不實有以親之以逹吾一體之仁然後吾之眀德始無不眀而真能以天地萬物為一體矣夫是之謂眀眀德于天下是之謂家齊國治而天下平是之謂盡性曰然則又烏在其為止至善乎曰至善者眀德親民之極則也天命之性粹然至善其靈昭不昧者此其至善之發見是乃眀德之本體而即所謂良知者也至善之發見是而是焉非而非焉輕重厚薄隨感隨應變動不居而亦莫不自有天然之中是乃民彞物則之極而不容少有議擬增損于其間也少有擬議增損于其間則是私意小智而非至善之謂矣自非愼獨之至惟精惟一者其孰能與于此乎後之人惟其不知至善之在吾心而用其私智以揣摸測度于其外以為事事物物各有㝎理也是以昧其是非之則支離決裂人欲肆而天理亡眀德親民之學遂大亂于天下蓋昔之人固有欲眀其眀德者矣然惟不知止于至善而騖其私心于過髙是以失之虛罔空寂而無有乎家國天下之施則二氏之流是矣固有欲親其民者矣然惟不知止于至善而溺其私心于卑瑣是以失之權謀智術而無有乎仁愛惻怛之誠則五伯功利之徒是矣是皆不知止于至善之過也故止至善之于眀德親民也猶之規矩之于方圓也尺度之于長短也權衡之于輕重也故方圓而不止于規矩爽其則矣長短而不止于尺度乖其劑矣輕重而不止于權衡失其凖矣眀眀德親民而不止于至善亡其本矣故止于至善以親民而眀其眀德是之謂大人之學曰知止而后有㝎㝎而后能靜靜而后能安安而后能慮慮而后能得其説何也曰人惟不知至善之在吾心而求之于其外以為事事物物皆有㝎理也而求至善于事事物物之中是以支離決裂錯雜紛紜而莫知有一㝎之向今焉既知至善之在吾心而不假于外求則志有㝎向而無支離決裂錯雜紛紜之患矣無支離決裂錯雜紛紜之患則心不妄動而能靜矣心不妄動而能靜則其日用之間從容間暇而能安矣能安則凡一念之彂一事之感其為至善乎其非至善乎吾心之良知自有以詳審精察之而能慮矣能慮則擇之無不精處之無不當而至善于是乎可得矣曰物有本末先儒以眀德為本新民為末兩物而內外相對也事有終始先儒以知止為始能得為終一事而首尾相因也如子之説以新民為親民則本末之説亦有所未然歟曰終始之説大略是矣即以新民為親民而曰眀德為本親民為末其説亦未為不可但不當分本末為兩物耳夫木之幹謂之本木之梢謂之末惟其一物也是以謂之本末若曰兩物則既為兩物矣又何可以言本末乎新民之意既與親民不同則眀德之功自與新民為二若知眀眀德以親其民而親民以眀其眀德則民德親民焉可析而為兩乎先儒之説是蓋不知眀德親民之本為一事而認以為兩事是以雖知本末之當為一物而亦不得不分為兩物也曰古之欲眀眀德于天下者以至于先修其身以吾子眀德親民之説通之亦既可得而知矣敢問欲修其身以至于致知在格物其工夫次第又何如其用力歟曰此正詳言眀德親民止至善之功也蓋身心意知物者是其工夫所用之條理雖亦各有其所而其實只是一物格致誠正修者是其條理所用之工夫雖亦皆有其名而其實只是一事何謂身心之形體運用之謂也何謂心身之靈眀主宰之謂也何謂修身為善而去惡之謂也吾身自能為善而去惡乎必其靈眀主宰者欲為善而去惡然後其形體運用者始能為善而去惡也故欲修其身者必在于先正其心也然心之本體則性也性無不善則心之本體本無不正也何從而用其正之之功乎蓋心之本體本無不正自其意念發動而後有不正故欲正其心者必就其意念之所發而正之凡其發一念而善也好之真如好好色發一念而惡也惡之真如惡惡臭則意無不誠而心可正矣然意之所發有善有惡不有以眀其善惡之分亦將真妄錯雜雖欲誠之不可得而誠矣故欲誠其意者必在于致知焉致者至也如云喪致乎哀之致易言知至至之知至者知也至之者致也致知云者非若後儒所謂充廣其知識之謂也致吾心之良知焉耳良知者孟子所謂是非之心人皆有之者也是非之心不待慮而知不待學而能是故謂之良知是乃天命之性吾心之本體自然靈昭眀覺者也凡意念之發吾心之良知無有不自知者其善歟惟吾心之良知自知之其不善歟亦惟吾心之良知自知之是皆無所與于他人者也故雖小人之為不善既巳無所不至然其見君子則必厭然掩其不善而著其善者是亦可以見其良知之有不容于自昧者也今欲别善惡以誠其意惟在致其良知之所知焉爾何則意念之發吾心之良知既知其為善矣使其不能誠有以好之而復背而去之則是以善為惡而自昧其知善之良知矣意念之所發吾之良知既知其為不善矣使其不能誠有以惡之而復蹈而為之則是以惡為善而自昧其知惡之良知矣若是則雖曰知之猶不知也意其可得而誠乎今于良知所知之善惡者無不誠好而誠惡之則不自欺其良知而意可誠也已然欲致其良知亦豈影響恍惚而懸空無實之謂乎是必實有其事矣故致知必在于格物物者事也凡意之所發必有其事意所在之事謂之物格者正也正其不正以歸于正之謂也正其不正者去惡之謂也歸于正者為善之謂也夫是之謂格書言格于上下格于文祖格其非心格物之格實兼其義也良知所知之善雖誠欲好之矣茍不即其意之所在之物而實有以為之則是物有未格而好之之意猶為未誠也良知所知之惡雖誠欲惡之矣苟不即其意之所在之物而實有以去之則是物有未格而惡之之意猶為未誠也今焉于其良知所知之善者即其意之所在之物而實為之無有乎不盡于其良知所知之惡者即其意之所在之物而實去之無有乎不盡然後物無不格而吾良知之所知者無有虧缺障蔽而得以極其至矣夫然後吾心快然無復餘憾而自謙矣夫然後意之所發者始無自欺而可以謂之誠矣故曰物格而后知至知至而后意誠意誠而后心正心正而后身修蓋其功夫條理雖有先後次序之可言而其體之惟一實無先後次序之可分其條理功夫雖無先後次序之可分而其用之惟精固有纎毫不可得而缺焉者此格致誠正之説所以闡堯舜之正傳而為孔氏之心印也德洪曰大學問者師門之教典也學者𥘉及門必先以此意授使人聞言之下即得此心之知無出于民彝物則之中致知之功不外乎修齊治平之內學者果能實地用功一畨聽受一畨親切師常曰吾此意思有能直下承常只此修為直造聖域參之經典無不吻合不必求之多聞多識之中也門人有請録成書者曰此須諸君口口相傳若筆之于書使人作一文字看過無益矣嘉靖丁亥八月師起征思田將發門人復請師許之録既就以書貽洪曰大學或問數條非不願共學之士盡聞斯義顧恐藉寇兵而賫盜糧是以未欲輕出蓋當時尚有持異説以混正學者師故云然師既沒音容日逺吾黨各以已見立説學者稍見本體即好為徑超頓悟之説無復有省身克巳之功謂一見本體超聖可以跂足視師門誠意格物為善去惡之旨皆相鄙以為第一義簡略事為言行無顧甚者蕩滅禮教猶自以為得聖門之最上乘噫亦巳過矣自便徑約而不知已淪入佛氏寂滅之教莫之覺也古人立言不過為學者示下學之功而上逹之機待人自悟而有得言語知解非所及也大學之教自孟氏而後不得其傳者幾千年矣賴良知之眀千載一日復大明于今日兹未及一傳而紛錯若此又何望于後世耶是篇鄒子謙之嘗附刻于大學古本兹收録續編之首使學者開卷讀之思吾師之教平易切實而聖智神化之機固巳躍然不必更為别説匪徒惑人秪以自誤無益也教條示龍場諸生諸生相從于此甚盛恐無能為助也以四事相規聊以答諸生之意一曰立志二曰勤學三曰改過四曰責善其愼聽母忽立志志不立天下無可成之事雖百工技藝未有不本于志者今學者曠廢隳惰玩歲愒時而百無所成皆由于志之未立耳故立志而聖則聖矣立志而賢則賢矣志不立如無舵之舟無銜之馬漂蕩奔逸終亦何所底乎昔人有言使為善而父母怒之兄弟怨之宗族鄊黨賤惡之如此而不為善可也為善則父母愛之兄弟恱之宗族鄊黨敬信之何苦而不為善為君子使為惡而父母愛之兄弟恱之宗族鄊黨敬信之如此而為惡可也為惡則父母怒之兄弟怨之宗族鄊黨賤惡之何苦而必為惡為小人諸生念此亦可以知所立志矣勤學巳立志為君子自當從事于學凡學之不勤必其志之尚未篤也從吾逰者不以聰慧警捷為髙而以勤確謙抑為上諸生試觀儕輩之中苟有虛而為盈無而為有諱已之不能忌人之有善自矜自是大言欺人者使其人資稟雖甚超邁儕輩之中有弗疾惡之者乎有弗鄙賤之者乎彼固將以欺人人果遂為所欺有弗竊笑之者乎茍有謙默自持無能自處篤志力行勤學好問稱人之善而咎已之失從人之長而眀巳之短忠信樂易表裏一致者使其人資稟雖甚魯鈍儕輩之中有弗稱慕之者乎彼固以無能自處而不求上人人果遂以彼為無能有弗敬尚之者乎諸生觀此亦可以知所從事于學矣改過夫過者自大賢所不免然不害其卒為大賢者為其能改也故不貴于無過而貴于能改過諸生自思平日亦有缺于廉恥忠信之行者乎亦有薄于孝友之道陷于狡詐偷刻之習者乎諸生殆不至於此不幸或有之皆其不知而誤蹈素無師友之講習規飭也諸生試內省萬一有近于是者固亦不可以不痛自悔咎然亦不當以此自歉遂餒于改過從善之心但能一旦脫然洗滌舊染雖昔為寇盜今日不害為君子矣若曰吾昔已如此今雖改過而從善將人不信我且無贖于前過反懷羞澀凝沮而甘心于汙濁終焉則吾亦絶望爾矣責善責善朋友之道然須忠告而善道之悉其忠愛致其婉曲使彼聞之而可從繹之而可改有所感而無所怒乃為善耳若先暴白其過惡痛毁極詆使無所容彼將發其愧恥憤恨之心雖欲降以相從而勢有所不能是激之而使為惡矣故凡訐人之短攻彂人之隂私以沽直者皆不可以言責善雖然我以是而施于人不可也人以是而加諸我凡攻我之失者皆我師也安可以不樂受而心感之乎某于道未有所得其學鹵莽耳謬為諸生相從于此每終夜以思惡且未免况于過乎人謂事師無犯無隱而遂謂師無可諌非也諌師之道直不至于犯而婉不至于隱耳使吾而是也因得以眀其是吾而非也因得以去其非蓋斆學相長也諸生責善當自吾始五經億説十三條師居龍場學得所悟證諸五經覺先儒訓釋未盡乃遀所記億為之疏解閲十有九月五經略遍命曰億説既後自覺學益精工夫益簡易故不復出以示人洪嘗乘間以請師笑曰付秦火久矣洪請問師曰只致良知雖千經萬典異端曲學如執權衡天下輕重莫逃焉更不必支分句折以知解接人也後執師喪偶于廢稿中得此數條洪竊録而讀之乃嘆曰吾師之學于一處融徹終日言之不離是矣即此以例全經可知也元年春王正月人君即位之一年必書元年元者始也無始則無以為終故書元年者正始也大哉乾元天之始也至哉坤元地之始也成位乎其中則有人元焉故天下之元在于王一國之元在于君君之元在于心元也者在天為生物之仁而在人則為心心生而有者也曷為為君而始乎曰心生而有者也未為君而其用止于一身既為君而其用關于一國故元年者人君為國之始也當是時也羣臣百姓悉意眀目以觀維新之始則人君者尤當洗心滌慮以為維新之始故元年者人君正心之始也曰前此可無正乎曰正也有未盡焉此又其一始也改元年者人君改過遷善修身立德之始也端本澄源三綱五常之始也立政治民休戚安危之始也嗚呼其可以不愼乎元年者魯隱公之元年春者天之春王周王也王次春示王者之上承天道也正月者周王之正月周人以建子為天統則夏正之十一月也夫子以天下之諸侯不復知有周也于是乎作春秋以尊王室故書王正月以大一統也書王正月以大一統不以王年而以魯年者春秋魯史而書王正月斯所以為大一統也隱公未嘗即位也何以有元年乎曰隱公即位矣不即位何以有元年夫子削之不書欲使後人之求其實也曰隱公即位矣而不書何也曰隱公以桓之幼而攝焉其以攝告故不即位也然而天下知隱公讓國之善而爭奪覬覦者知所愧矣曰以攝告則宜以攝書而不書何也曰隱公兄也桓公弟也庶均以長隱公君也奚攝焉然而天下知嫡庶長幼之分而亂常失序者知所㝎也曰隱公君也非攝也則宜即位矣而不即位焉何也曰諸侯之立國也承之先君而命之天子隱無所承命也然而天下知父子君臣之倫而無父無君者知所懼矣一不書即位而隱公讓國之善見焉嫡庶長幼之分眀焉父子君臣之倫正焉善惡兼著而是非不相掩嗚呼此所以為化工之妙也歟鄭伯克假于鄢書鄭伯原殺假者惟鄭伯也假以弟篡兄以臣伐君王法之所必誅國人之所共討也而專罪鄭伯蓋授之大邑而不為之所縱使失道以至于敗者伯之心也假之惡既巳暴著于天下春秋無所庸誅矣書克原伯之心素視假為寇敵至是而始克之也假居于京而書于鄢見鄭伯之既伐諸京而復伐諸䣕必殺之而後已也鄭伯之于叔假始焉授之大邑而聽其收鄙若愛弟之過而過於厚也既其畔也王法所不赦鄭伯雖欲已焉若不容已矣天下之人皆以為假之惡在所必誅而鄭伯討之宜也是其迹之近似亦何以異于周公之誅管蔡故春秋特誅其意而書曰鄭伯克假于鄢辨似是之非以正人心而險譎無所容其姦矣天地感而萬物化生實理流行也聖人感人心而天下和平至誠發見也皆所謂貞也觀天地交感之理聖人感人心之道不過于一貞而萬物生天下和平焉則天地萬物之情可見矣恆所以亨而無咎而必利于貞者非恆之外復有所謂貞也久于其道而巳貞即常久之道也天地之道亦惟常久而不巳耳天地之道無不貞也利有攸往者常之道非滯而不通止而不動之謂也是乃始而終終而復始循環無端周流而不巳者也使其滯而不通止而不動是乃泥常之名而不知常之實者也豈能常久而不巳乎故利有攸往者示人以常道之用也以常道而行何所往而不利無所往而不利乃所以為常久不巳之道也天地之道一常久不巳而巳日月之所以能晝而夜夜而復晝而照臨不窮者一天道之常久而不巳也四時之所以能春而冬冬而復春而生運不窮者一天道之常久不巳也聖人之所以能成而化化而復成而妙用不窮者一天道之常久不巳也夫天地日月四時聖人之所以能常久而不巳者亦貞而巳耳觀夫天地日月四時聖人之所以能常久而不巳者不外乎一貞則天地萬物之情其亦不外乎一貞也亦可見矣恆之為卦上震為雷下巽為風雷動風行簸揚奮厲翕張而交作若天下之至變也而所以為風為雷者則有一㝎而不可易之理是乃天下之至恆也君子體夫雷風為恆之象則雖酬酢萬變妙用無方而其所立必有卓然而不可易之體是乃體常盡變非天地之至恆其孰能與于此遁隂漸長而陽退遁也彖言得此卦者能遁而退避則亨當此之時苟有所為但利小貞而不可大貞也夫子釋之以為遁之所以為亨者以其時隂漸長陽漸消故能自全其道而退遁則身雖退而道亨是道以遁而亨也雖當陽消之時然四陽尚盛而九五居尊得位雖當隂長之時然二隂尚微而六二處下應五蓋君子猶在于位而其朋尚盛小人新進勢猶不敵尚知順應于君子而未敢肆其惡故幾微君子雖巳知其可遁之時然勢尚可為則又未忍決然舍去而必于遁且欲與時消息盡力匡扶以行其道則雖當遁之時而亦有可亨之道也雖有可亨之道然終從隂長之時小人之朋日漸以盛苟一裁之以正則小人將無所容而大肆其惡是將以救敝而反速之亂矣故君子又當委曲周旋修敗補罅積小防微以隂扶正道使不至于速亂程子所謂致力于未極之間強此之衰艱彼之進圖其暫安者是乃小利貞之謂矣夫當遁之時道在于遁則遁其身以亨其道道猶可亨則亨其遁以行于時非時中之聖與時消息者不能與于此也故曰遁之時義大矣哉眀出地上晉君子以自昭眀德日之體本無不眀也故謂之大眀有時而不眀者入于地則不眀矣心之德本無不眀也故謂之眀德有時而不眀者蔽于私也去其私無不眀矣日之出地日自出也天無與焉君子之眀眀德自眀之也人無所與焉自昭也者自去其私欲之蔽而已初隂居下當進之始上與四應有晉如之象然四意方自求進不暇與初為援故又有見摧之象當此之時苟能以正自守則可以獲吉蓋當進身之始德業未著忠誠未顯上之人豈能遽相孚信使其以上之未信而遂汲汲于求知則將有失身枉道之恥懷憤用智之非而悔咎之來必矣故當寬𥙿雍容安處于正則德久而自孚誠積而自感又何咎之有乎蓋𥘉雖晉如而終不失其吉者以能獨行其正也雖不見信于上然以寬𥙿自處則可以無咎者以其始進在下而未嘗受命當職任也使其巳當職任不信于上而優𥙿廢弛將不免於曠官之責其能以無咎乎時邁十五句武王初克商巡守諸侯朝會祭告之樂歌言我不敢自逸而以時巡行諸侯之邦我勤民如此天其以我為子乎今以我巡行之事占之是天之實有以右序夫我有周矣何者我之巡行諸侯所以興廢舉墜削有罪黜不職者亦聊以警動震彂其委靡頽惰者耳而四方諸侯莫不警懼修省敦薄立懦而興起夫維新之政至于懷柔百神而河之深廣嶽之崇髙莫不感格焉則信乎天之以我為王而于以君臨夫天下矣于是我其宣眀昭布我有周之典章于以式序在位之諸侯我其戢斂夫干戈弓矢以偃夫武功我其旁求懿德之士陳布于中國以敷夫文德則亦信乎可以為王而能保有上天右序我有周之命矣執競十四句言武王持其自強不息之心其功烈之盛天下既莫得而強之矣成康繼之其德亦若是其顯而復為上帝之所皇焉夫繼武王之後蓋難乎其為德也然自成康之相繼為君而其德愈益彰眀則于武王無競之烈為有光而成康誠可謂善繼矣今我以三王之功德作之于樂以祈感格而果能降福之多且大若此我其可不反身修德而思有以成之乎我能反身修德而威儀之反則可享神之福既醉既飽而三王之所福我者益將反覆而無窮矣此蓋祭武王成王康王之詩也思文八句言思文后稷其德真可以配上天矣蓋凡使我蒸民之得以粒食者莫非爾后稷之德之所建也斯固后稷之德矣然來牟之種非天不生則是來牟之貽我者實由上帝以此命之后稷而使之遍養夫天下是以天下之民皆有所養而得以復其常道則后稷之德固亦莫非上天之德也此蓋郊祀后稷以配天之詩故頌后稷之德而卒歸之于天云臣工十五句戒農官之詩言嗟爾司農之臣工當各敬爾在公之事今王以治農之成法賜汝汝宜來咨來度而敬承毋怠也因并呼農官之屬而總詔之曰嗟爾保介當兹暮春之月牟麥在田而百榖未播蓋農工之暇也汝亦何所為乎因問汝所治之新田其牟麥亦如何哉夫牟麥之茂盛皆上帝之眀賜也牟麥漸熟則行將受上帝之眀賜矣上帝有是眀賜爾茍惰農自安是不克靈承而泯上帝之賜矣爾尚永力爾田以昭眀上帝之賜務底于豐年有成可也然則爾亦烏可謂兹農工之尚逺而遂一無所事乎汝當命爾衆農乘兹間暇預修播種之事以具乃田器奄忽之間又將艾麥而興東作矣暮春周正建寅之月夏之正月也有瞽十三句言有瞽有瞽在周之廷而樂工就列矣設業設虡崇牙樹羽應田縣鼓鞉磬柷圍而樂器具陳矣樂器既以備陳于是衆樂乃奏而簫管之屬亦皆備舉矣由是樂聲之喤喤其整密麗肅者莫非至敬之所寓而雍容暢逹者莫非至和之所宜其肅雍和鳴如此是以幽有以感乎神而先祖是聽眀有以感乎人而我客來觀厥成者蓋武王功成作樂使非繼述之孝真無愧于文考固無以致先祖之格而非其盛德之至伐紂救民之舉真有以順乎天應乎人而于湯有光焉其亦何以能使亡國者之子孫永觀厥成而略無忌嫉之心乎此蓋始作樂而合于祖廟之詩與滁陽諸生并問答語諸生之在滁者吾心未嘗一日而忘之然而濶焉無一字之往非簡也不欲以世俗無益之談徒往復為也有志者雖吾無一字固朝夕如面也其無志者蓋對面千里况千里之外盈尺之牘乎孟生歸聊寓此于有志者然不盡列名且為無志者諱其因是而尚能興起也或患思慮紛雜不能強禁絶陽眀子曰紛雜思慮亦強禁絶不得只就思慮萌動處省察克治到天理精眀後有箇物各付物的意思自然靜專無紛雜之念大學所謂知止而後有㝎也德洪曰滁陽為師講學首地四方弟子從逰日衆嘉靖癸丑秋太僕少卿吕子懷復聚徒于師祠洪往逰焉見同門髙年有能道師遺事者當時師懲未俗卑汚引接學者多就髙明一路以救時弊既後漸有流入空虛為脫落新奇之論在金陵時已心切憂焉故居贛則教學者存天理去人欲致省察克治實功而征寧藩之後專發致良知宗旨則益明切簡易矣兹見滁中子弟尚多能道靜坐中光景洪與吕子相論致良知之學無間于動靜則相慶以為新得是書孟源伯生得之金陵時聞滁士有身背斯學者故書中多憤激之辭後附問答語豈亦因靜坐頑空而不修省察克治之功者發耶家書墨迹四首四書墨迹先師胤子止億得之書匱中裝製卷册手澤宛然每篇乞洪跋其後一與克彰太叔克彰號石川師之族叔祖也聽講就弟子列退坐私室行家人禮别久缺奉狀得詩見邇來進修之益雖中間詞意未盡純瑩而大致加于時人一等矣願且玩心髙明涵泳義理務在反身而誠毋急于立論飾辭將有外馳之病所云善念才生惡念又在者亦足以見實嘗用力但于此處須加猛省胡為而若此也無乃習氣所纏耶自俗儒之説行學者惟事口耳講習不復知有反身克已之道今欲反身克已而猶狃于口耳講誦之事固宜其有所牽縳而弗能進矣夫惡念者習氣也善念者本性也本性為習氣所汨者由于志之不立也故凡學者為習所移氣所勝則惟務痛懲其志久則志亦漸立志立而習氣漸消學本于立志志立而學問之功巳過半矣此守仁邇來所新得者願毋輕擲若初往年亦常有意左屈當時不暇與之論至今缺然若初誠美質得遂退休與若初了夙心當亦有日見時為致此意務相砥礪以臻有成也人行遽不一一惡念者習氣也善念者本性也本性為習所勝氣所汨者志不立也痛懲其志使習氣消而本性復學問之功也噫此吾師眀訓昭昭告太叔者告吾人也可深省也夫德洪為億弟書二與徐仲仁仲仁即曰仁師之妹壻也北行倉率不及細話别後日聽捷音繼得鄊録知秋戰未利吾子年方英妙此亦未足深憾惟宜修德積學以求大成尋常一第固非僕之所望也家君舍衆論而擇子所以擇子者實有在于衆論之外子宜勉之勿謂隱微可欺而有放心勿謂聰眀可恃而有怠志養心莫善于義理為學莫要于精專毋為習俗所移毋為物誘所引求古聖賢而師法之切莫以斯言為迂濶也昔在張時敏先生時令叔在學聰眀蓋一時然而竟無所成者蕩心害之也去髙眀而就汙下念慮之間顧豈不易哉斯誠往事之鑒雖吾子質美而淳萬無是事然亦不可以不愼也意欲吾子來此讀書恐未能遂離侍下且未敢言此俟後便再議所不避其切切為吾子言者幸加熟念其親愛之情自有所不能巳也海日翁為女擇配人謂曰仁聰眀不逮于其叔海日翁舍其叔而妻曰仁既後其叔果以蕩心自敗曰仁卒成師門之大儒噫聰眀不足恃而學問之功不可誣也哉德洪跋三上海翁書寓吉安男王守仁百拜書上父親大人膝下江省之變昨遣來隆歸報大略想巳如此時寧王尚留省城未敢逺出蓋慮男之搗其虛躡其後也男處所調兵亦稍稍聚集忠義之風日以奮揚觀天道人事此賊不久斷成擒矣昨彼遣人賫檄至欲遂斬其使奈賫檄人乃參政季斆此人平日善士又其勢亦出于不得巳姑免其死械繫之巳彂兵至豐城諸處分布相機而動所慮京師遙逺一時題奏無由即逹命將出師緩不及事為可憂爾男之欲歸巳非一日急急圖此巳兩年今竟陷身于難人臣之義至此豈復容茍逃幸脫惟俟命師之至然後敢申前懇俟事勢稍㝎然後敢決意馳歸爾伏望大人陪萬保愛諸弟必能勉盡孝養旦暮切勿以不孝男為念天茍憫男一念血誠得全首領歸拜膝下當必有日矣因聞巡檢便草此臨書慌憒不知所云七月初二日右吾師逢寧濠之變上父海日翁第二書也自豐城聞變與幕士㝎興兵之策恐翁不知為賊所襲即日遣家人間道趨越至是發兵于吉安復為是報慰翁心也且自稱姓者別疑也嘗聞幕士龍光云時師聞變返風回舟濠追兵將及師欲易舟潛遁顧夫人諸公子正憲在舟夫人手提劒别師曰公速去母為妾母子憂脫有急吾恃此以自衛爾及退還吉安將發兵命積薪圍公署戒守者曰儻前報不利即舉火爇公署時鄒謙之在中軍聞之亦取其夫人來吉城同誓國難人勸海日翁移家避讐翁曰吾兒以孤旅急君上之難吾為國舊臣顧先去以為民望耶遂與有司㝎守城之䇿而自密為之防噫吾師于君臣父子夫婦之間一家感遇若此至今人傳忠義凛凛是書正億得于故𥿄堆中讀之愴然如身值其時晨夕展卷如侍對親顔嘉靖壬子海夷寇黃巖全城煨燼時正億逰北雍內子黃哀惶奔亡不擕他物而獨抱木主圖像以行是卷亦幸無恙噫豈正億平時孝感所積抑吾師精誠感通先時身離患難而一墨之遺神眀有以護之耶後世子孫受而讀之其知所重也哉德洪拜手跋四嶺南寄正憲男初到江西因聞姚公巳在賓州進兵恐我到彼則三司及各領兵官未免出來迎接反致阻撓其事是以遲遲其行意欲俟彼成功然後往彼公同與之一處十一月初七始過梅嶺乃聞姚公在彼以兵少之故尚未敢彂哨以是只得晝夜兼程而行今日巳度三水去梧州巳不逺再四五日可到矣途中皆平安只是咳嗽尚未全愈然亦不為大患書到可即告祖母汝諸叔知之皆不必挂念家中凡百皆只依我戒諭而行魏廷豹錢德洪王汝中當不負所托汝宜親近敬信如就芝蘭可也草二叔忠信好學擕汝讀書必能切勵汝不審近日亦有少進益否聰兒邇來眠食如何凡百只宜謹聽魏廷豹指教不可輕信奶婆之類至囑至囑一應租稅帳目自宜上緊須不俟我丁寧我今國事在身豈復能記念家事汝輩自宜體悉勉勵方是隹子弟爾十一月望正億初名聰師之命名也嘉靖壬辰秋依其舅氏黃久菴寓留都值時相更名于朝責洪為文告師請更今名當時問眠食如何今正億壯且立男女森列矣噫吾何以不負師托乎方今四方講會日殷相與出求同志研究師旨以成師門未盡之志庶乎可以慰遺靈于地下爾是在二子嘉靖丁巳端陽日門人錢德洪百拜跋于天真精舍之傳經樓贛州書示四姪正思等近聞爾曹學業有進有司考校獲居前列吾聞之喜而不寐此是家門好消息繼吾書香者在爾輩矣勉之勉之吾非徒望爾輩但取青𬗋榮身肥家如世俗所尚以誇市井小兒爾輩須以仁禮存心以孝弟為本以聖賢自期務在光前𥙿後斯可矣吾惟幼而失學無行無師友之助逮今中年未有所成爾輩當鑒吾既往及時勉力母又自貽他日之悔如吾今日也習俗移人如油漬麵雖賢者不免况爾曹初學小子能無溺乎然惟痛懲深創乃為善變昔人云脫去凡近以逰髙眀此言良足以警小子識之吾嘗有立志説與爾十叔爾輩可從抄録一通置之几間時一省覽亦足以發方雖傳于庸醫藥可療夫真病爾曹勿謂爾伯父只尋常人爾其言未必足法又勿謂其言雖似有理亦只是一場迂濶之談非我輩急務茍如是吾末如之何矣讀書講學此最吾所宿好今雖干戈擾攘中四方有來學者吾亦未嘗拒之所恨牢落塵網未能脫身而歸今幸盜賊稍平以塞責求退歸卧林間攜爾曹朝夕切磋砥礪吾何樂如之偶便先示爾等爾等勉焉毋虛吾望正德丁丑四月三十日又與克彰大叔日來德業想益進修但當兹末俗其于規切警勵恐亦未免有羣雌孤雄之嘆如何印弟凡劣極知有勞心力聞其近來稍有轉移亦有足喜所貴乎師者涵育薰陶不言而喻蓋不誠未有能動者也于此亦可以驗已德因便布此言不盡意正月草六日得旨令守仁與總兵各官解因至留都行及蕪湖復得旨回江西撫㝎軍民皆聖意有在無他足慮也家中凡百安心不宜為人搖惑但當嚴緝家衆掃除門庭清靜儉朴以自守謙虛卑下以待人盡其在我而已此外無庸慮也正憲輩狂稚望以此意曉諭之近得書聞老父稍失調心極憂苦老年之人只宜以宴樂戲逰為事一切家務皆當屏置亦望時時以此開勸家門之幸也至祝至祝事稍㝎即當先報歸期家中凡百全仗訓飭照管不一老父瘡疾不能歸侍日夜苦切真所謂欲濟無梁欲飛無翼近來誠到知漸平復始得稍慰早晚更望太叔寬解怡恱其心聞此時尚居喪次令人驚駭憂惶衰年之人妻孥子孫日夜侍奉承直尚恐居處或有未寧豈有復堪孤疾勞苦如此之理就使悉遵先王禮制則七十者亦惟衰麻在身飲酒食肉處于內宴飲從于逰可也况今七十五嵗之人乃尚爾煢煢獨苦若此妻孥子孫何以自安乎若使祖母在冥冥之中知得如此哀毁如此孤苦將何如為心老年之人獨不為子孫愛念乎况于禮制亦自過甚使人不可以繼在賢知者亦當俯就切望懇懇勸解必須入內安歇使下人亦好早晚服事時嘗逰嬉宴樂快適性情以調養天和此便自為子孫造無窮之福此等言語為子者不敢直致惟望太叔為我委曲開譬要在必從而後已千萬千萬至懇至懇正憲讀書一切舉業功名等事皆非所望但惟教之以孝弟而已來誠還草草不盡祖母岑太夫人百歲考終時海日翁夀七十有五矣尤煢煢苫塊哀毁踰制師十二失恃鞠于祖母在贛屢乞終養弗遂至是聞訃已不勝痛割又聞海日翁居喪之戚將何以為情欲濟無梁欲飛無翼讀之令人失涕師之學發眀同體萬物之旨使人自得其性故于人義天常無不懇至而居常處變神化妙應以成天下之務可由此出其道可以通諸萬世而無弊者得其道之中也録此可以想見其槩德洪跋寄正憲男手墨二卷正憲字仲肅師繼子也嘉靖丁亥師起征思田正億方二齡托家政于魏廷豹使飭家衆以字胤子托正憲于洪與汝中使切磨學問以飭內外延途所寄音問當軍旅􅹯偬之時猶字畫遒􅏙訓戒眀切至今讀之宛然若示嚴範師沒後越庚申鄒子謙之陳子惟濬來自懷玉奠師墓于蘭亭正憲擕卷請題其後噫今二子與正憲俱為泉下人矣而斯卷獨存正憲年十四襲師錦衣廕喜正億生遂辭職出就科試即其平生鄒子所謂授簡不忘夫子于昭之靈實寵嘉之其無愧于斯言矣乎即日舟巳過嚴灘足瘡尚未愈然亦漸輕減矣家中事凡百與魏廷豹相計議而行讀書敦行是所至囑內外之防須嚴門禁一應賓客來往及諸童僕出入悉依所留告示不得少有更改四官尤要戒飲博專心理家事保一謹實可託不得聽人哄誘有所改動我至前途更有書報也舟過臨江五鼓與叔謙遇于途次燈下草此報汝知之沿途皆平安咳嗽尚未巳然亦不大作廣中事頗急只得連夜速進南贛亦不能久留矣汝在家中凡宜從戒諭而行讀書執禮日進髙明乃吾之望魏廷豹此時想在家家衆悉宜遵廷豹教訓汝宜躬率身先之書至汝即可報祖母諸叔况我沿途平安凡百想能體悉我意鈐束下人謹守禮法皆不俟吾喋喋也廷豹德洪汝中及諸同志親友皆可致此意近兩得汝書知家中大小平安且汝自言能守吾訓戒不敢違越果如所言吾無憂矣凡百家事及大小童僕皆須聽魏廷豹斷決而行近聞守度頗不遵信致抵牾廷豹未論其間是非曲直只是抵牾廷豹便巳大不是矣紀聞其逰蕩奢縱如故想亦終難化導試問他畢竟如何乃可宜自思之守悌叔書來云汝欲出應試但汝本領未備恐成虛頭汝近來學業所進吾不知汝自量度而行吾不阻汝亦不強汝也德洪汝中及諸直諒髙明凡肯勉汝以德義規汝以過失者汝宜時時親就汝若能如魚之于水不能須臾而離則不及人不為憂矣吾平生講學只是致良知三字仁人心也良知之誠愛惻怛處便是仁無誠愛惻怛之心亦無良知可致矣汝于此處宜加猛省家中凡事不暇一一細及汝果能敬守訓戒吾亦不必一一細及也餘姚諸叔父昆弟皆以吾言告之前月曽遣舍人任鋭寄書曆此時當巳發回若未發回可將江西巡撫時奏報批行稿簿一册共計十四本封固付本舍帶來我今巳至平南縣此去田州漸近田州之事我承姚公之後或者可以因人成事但他處事務似此者尚多恐一置身其間一時未易解脫耳汝在家凡百務宜守我戒諭學做好人德洪汝中輩須時時親近請教求益聰兒已托魏廷豹時常一看廷豹忠信君子當能不負所托但家衆或有桀驁不肯遵奉其約束者汝須相與痛加懲治我歸來日斷不輕恕汝可早晚常以此意戒飭之草二弟近來砥礪如何守度近來修省如何保一近來管事如何保三近來改過如何王祥等早晚照管如何王禎不逺出否此等事我方有國事在身安能分念及此瑣瑣家務汝等自宜體我之意謹守禮法不致纍我懷抱乃可耳東廓鄒守益曰先師陽眀夫子家書二卷嗣子正憲仲肅甫什襲藏之益趨天真奠蘭亭獲覩焉喜曰是能授簡不忘矣書中讀書敦行日進髙明鈐束下人謹守禮法及切磋道義請益求教互相夾持接引來學真是一善一藥至吾平日講學只是致良知三字仁人心也良知之誠愛惻怛處便是仁無誠愛惻怛亦無良知可致是以繼志述事望吾仲肅也仲肅日孳孳焉進而書紳退而服膺則大慰吾黨愛助之懷而夫子于昭之靈實寵嘉之又去歲十二月草六日始抵南寧因見各夷皆有向化之誠乃盡散甲兵示以生路至正月草六日各夷果皆投戈釋甲自縳歸降凡七萬餘衆地方幸巳平㝎是皆朝廷好生之德感格上下神武不殺之威潛孚默運以能致此在我一家則亦祖宗德澤隂庇得無殺戮之慘以免覆敗之患俟處置略㝎便當上疏乞歸相見之期漸可卜矣家中自老奶奶以下想皆平安今聞此信益可以免勞挂念我有地方重寄豈能復顧家事弟輩與正憲只照依我所留戒諭之言時時與德洪汝中輩切磋道義吾復何慮餘姚諸弟姪書到咸報知之八月草七日南寧起程九月初七日巳抵廣城病勢今亦漸平復但咳嗽終未能脫體耳養病本北上巳二月餘不久當得報即踰嶺東下則抵家漸可計日矣書至即可上白祖母知之近聞汝從汝諸叔諸兄皆在杭城就試科第之事吾豈敢必于汝得汝立志向上則亦有足喜也汝叔汝兄今年利鈍如何想旬月後此間可以得報其時吾亦可以發舟矣因山隂林掌教歸便冗冗中寫此與汝知之我至廣城已踰半月因咳嗽兼水㵼未免再將息旬月候養病疏命下即發舟歸矣家事亦不暇言只要戒飭家人大小俱要謙謹小心餘姚八弟等事近日不知如何耳在京有進本者議論甚傳播徒取快讒賊之口此何等時節而可如此兄弟子姪中不肯略體息正所謂操戈入室助仇為寇者也可恨可痛兼因謝姨夫回便草草報平安書至即可奉白老奶奶及汝叔輩知之錢德洪王汝中及書院諸同志皆可上覆德洪汝中亦須上緊進京不宜太遲滯近因地方事巳平靖遂動思歸之懷念及家事乃有許多不滿人意處守度奢淫如舊非但不當重托兼亦自取敗壞戒之戒之尚期速改可也寶一勤勞亦有可取只是見小欲速想福分淺薄之故但能改創亦可寶三長惡不悛斷巳難留須急急遣回餘姚别求生理有容留者即是同惡相濟之人宜并逐之來貴姧惰略無改悔終須逐出來隆來價不知近來幹辦何如須痛自改省但看同輩中有能真心替我管事者我亦何嘗不知添福添㝎王三等輩只是終日營營不知為誰經理試自思之添保尚不改過歸來仍須痛治只有書童一人實心為家不顧毁譽利害真可愛念使我家有十箇書童我事皆有托矣來瑣亦老實可托只是太執戇又聽婦言不長進王祥王禎務要替我盡心管事但有闕失皆汝二人之罪俱要拱聽魏先生教戒不聽者責之眀水陳九川曰此先師廣西家書付正憲仲肅者也中間無非戒諭家人謹守素訓至致良知三字乃先師平素教人不倦者云誠愛惻怛之心即是致良知此晚年所以告門人者僅見一二于全集中至為緊要乃于家書中及之可見先師之所以丁寧告戒者無異于得力之門人矣仲肅宜世襲之王文成公全書卷之二十六終
