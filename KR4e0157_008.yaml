body:
  text: 别録五奏疏奏疏五乞寬免稅糧急救民困以弭災變疏十五年三月二十五日照得正德十四年七月內節據吉安等一十三府所屬廬陵等縣各申為旱災事開稱本年自三月至于秋七月不雨禾苗未及發生盡行枯死夏稅秋糧無從辦納人民愁嘆將及流離申乞轉逹寬免等因到臣節差官吏老人踏勘前項地方委百三月以來雨澤不降禾苗枯死續該寧王謀反乘釁鼓亂傳播偽命優免租稅小人惟利是趨洶洶思亂臣因通行告示許以奏聞優免稅糧諭以臣子大義申祖宗休養生息之澤暴寧王誅求無厭之惡由是人心稍稍安集背逆趨順老弱居守丁壯出征團保饋餉邑無遺户家無遺夫就使雨暘時若江西之民亦已廢耕耘之業事征戰之苦况軍旅旱乾一時併作雖富室大户不免飢饉下戶小民得無轉死溝壑流散四方乎設或飢寒所迫徴輸所苦人自為亂將若之何如蒙乞敕該部暫將正德十四年分稅糧通行優免以救殘傷之民以防變亂之階伏望皇上罷冗員之俸損不急之賞止無名之徴節用省費以足軍國之需天下幸甚緣由於本年七月三十日具題請旨未奉明降隨蒙大駕親征京邉官軍前後萬數沓至并臨填城塞郭百姓戍守鋒鏑之餘未及息肩弛擔又復救死扶傷呻吟奔走以給厮養一應誅求妻孥鬻於草料骨髓竭於徴輸當是之時鳥驚魚散貧民老弱流離棄委溝壑狡健者逃竄山澤群聚為盜獨遺其稍有家業與良善守死者十之二三又皆顛頓號呼於挺創捶撻之下郡縣官吏咸赴省城與兵馬住屯之所奔命聼役不復得親民事上下洶洶如駕漏船於風濤顛沛之中惟懼覆溺之不暇豈遑復顧其他為日後之慮憂及稅賦之不免征科之未完乎當是之時雖臣等亦皆奔走道路危疑倉皇恐不能為小民請一旦之命豈遑為歲月之慮憂及賦稅之不免征課之未完而暇為之復請乎若是者又數月京邉官軍始將有旅歸之期而户部歲額之徵已下漕運交兊之文已促督催之使切責之檄已交馳四集矣流移之民聞官軍之將去稍稍脅息延望歸尋其故業足未入境而頸已繫於追求者之手矣夫荒旱極矣而又因之以變亂變亂極矣而又加之以師旅師旅極矣而又竭之以供饋益之以誅求亟之以征斂當是之時有目者不忍睹有耳者不忍聞又從而其膏血有人心者而尚忍為之乎今逺近軍民號呼匍匐訴告喧騰求朝廷出帑藏以賑濟久而未獲反有追征之令閧然興怨謂臣等昔日蠲賦之言為詒已竊相傷嗟謂宸濠叛逆獨知優免租稅以要人心我輩朝廷赤子皆嘗竭骨髓出死力以勤國難今困窮巳極獨不蒙少加優恤又從而追征之將何以自全是以令之而益不信撫之而益憤憤諭之而益呶呶甫懷收復之望又為流徙之圖計窮勢迫匿而為姦肆而為寇兩月以來有司之以鼠竊警報者月無虛日無怪也彼無家業衣食之資無父母妻子之戀而又旁有追呼之苦上有捶剝之災自非禮義之士孰肯閉口枵腹坐以待死乎今朝廷亦嘗有寬恤之令矣亦嘗有賑濟之典矣然寬恤賑濟內無帑藏之發外無官府之儲而徒使有司措置措置者豈能神輸而鬼運必將取諸富民今富民則又皆貧民矣削貧以濟貧猶割心臠肉以啖口口未飽而身先斃且又有侵尅之弊又有漁獵之姦民之賴以生者不能什一民之坐而死者常十九矣故寬恤之虛文不若蠲租之實惠賑濟之難及不若免租之易行今不免租稅不息誅求而徒曰寬恤賑濟是奪其口中之食而曰吾將療汝之飢刳其腹腎之肉而曰吾將救汝之死凡有血氣皆將不信之矣夫戶部以國計為官漕運以轉輸為任今歲額之催交兊之促皆其職之使然但民者邦之本邦本一搖雖有粟吾得而食諸伏望皇上軫念地方塗炭之餘小民困苦已極思邦本之當固慮禍變之可憂乞敕該部速將正德十四十五年該省錢糧悉行寬免其南昌南康九江等府殘破尤甚者重加寬貸使得漸回喘息修復生理非但解江西一省之倒懸臣等無地方變亂之禍得免於誅戮實天下之幸宗社之福也夫免江西一省之糧稅不過四十萬石今吝四十萬石而不肯蠲異時禍變卒起即出數百萬石既已無救於難矣此其形迹巳見事理甚明者臣等上不能會計征斂以足國用下不能建謀設䇿以濟民窮徒痛哭流涕一言小民疾苦之狀惟陛下速將臣等黜歸田里早賜施行以紓禍變緣係寬免稅糧急救民困以弭災變事理為此具本請旨計處地方疏十五年五月十五日臣惟財者民之心也財散則民聚民者邦之本也本固則邦寧故文帝以賜租致富樂之效太宗以𥙿民成給足之風君民一體古今同符臣會同巡按江西監察御史唐龍議照寧賊宸濠志窮荒度謀肆併吞其於民間田地山塘房屋等項或用勢強占或減價賤買或因官本準折或托别事抄收有中人之家者一遭其毒即無棲身之所有上農之田者一中其姦即無用鋤之地尤且虛填契書以杜人言私置簿籍以增租額利歸一已害及萬家故先有副使胡世寧直言指陳續該科道等官交章舉發言皆有據事非無徴近奉詔書曰宸濠天性凶惡自作不靖強奪官民田産動以萬計則陛下明以燭姦深知宸濠田産皆奪諸百姓者也又曰占奪田産悉還本主則陛下仁以憫下盡𣣔舉百姓之田産而給還之也聖言猶在昭如日星國信不移堅如金石始者宸濠既敗該臣等已行守巡等官將該府及各賊黨田地房屋許令府縣等官俱抄沒在官造報在册矣但委官查勘之時正事變搶攘之際業主驚散俱未寧家上司督責急𣣔了事依契溷查慿人浪報多寡是較占買未分明詔雖有給主之條小民猶抱失業之恨昔之居不得而居也昔之田不得而食也澤未下究怨徒上歸况屋無主則毀地不耕則荒故兵馬之後瓦柱僅存田野之間草萊漸長兼以勢室豪強恣行包侵之計姦徒私竊動開埋沒之端及今審處不早將來遺失益多再照前項田産多在南昌新建二縣受害獨深人人𬒳其誅求家家𬒳其檢括且賊師起事抄掠尤慘官兵破圍傷殘未蘇財盡巳極民困莫加查得二縣額派兊軍淮安京庫三項糧米共十一萬九千石有零淮益二府祿米共四千二石節奏寬免未奉停徴運官守催旗校逼取勢急若火案積如山民納不前官宜為處及照一方之統會在於省城各府之錢糧併於司庫查得本布政司官庫先𬒳賊兵劫搶繼因軍餉動支官吏徒守乎空匱𥿄筆亦賖于鋪家大兵必有荒年民窮必有盜賊萬一變生無常釁起不測則寸兵尺鐵皆無所需束芻斗糧亦不能辦公私失恃緩急可憂再照省城各門城樓窩鋪及諸司衙門先是王府占據多屬踈隘近因兵火蔓延半遭蕩焚夫城樓者一方防禦之所關衙門者諸司政令之所出託始創新固無民力因陋就簡見有官房如蒙乞敕該部查議將前項抄沒過寧府及各賊黨下田地山塘房屋等項行令布政司會同按察司各掌印官及分守分巡官并府縣官從實覆行查勘明白委係占奪百姓者遵照詔書內事理給還本主管業及將於內官房酌量移改城樓窩鋪衙門餘外無礙田地山塘房屋仍令各官公同照依時估變價銀入官先儘撥輔南新二縣兊軍淮安京庫折銀糧米及王府祿米外有羡餘收貯布政司官庫用備緩急仍禁約勢豪之家不得用強占買各委官亦不得畏勢市恩致招物議九撥給變賣事情若有勢豪強占強買及委官畏勢市恩各情弊許撫按衙門指實紏劾懲究施行事完該司將各項數目徑自造册奏報并呈該部查考是蓋以百姓之業納百姓之糧以地方之財還地方之用民沾惠而國不費事就緒而財不傷書曰守邦在衆易曰聚人曰財惟陛下留意焉緣係計處地方事理未敢擅便為此具本請旨水災自劾疏十五年五月十五日臣惟有官守者不得其職則去受人之牛羊而為之牧者求牧與芻而不得則反諸其人臣以匪才繆膺江西巡撫之寄今且數月曾未能有分毫及民之政而地方日以多故民日益困財日益匱災變日興禍患日促自春入夏雨水連綿江湖漲溢經月不退自贛吉臨瑞廣撫南昌九江南康沿江諸郡無不被害黍苗淪沒室廬漂蕩魚鱉之民聚棲於木杪商旅之舟經行於閭巷潰城決隄千里為壑煙火斷絶惟聞哭聲詢諸父老皆謂數十年來所未有也除行各該司府州縣修省踏勘具奏外夫變不虛生緣政而起政不自弊因官而作官之失職臣實其端何所逃罪夫以江西之民遭歷宸濠之亂脂膏已竭而又因之以旱荒繼之以師旅遂使豐稔連年曲加賑恤尚恐生理未易完復今又重以非常之災危亟若此當是之時雖使稷契為牧周召作監亦恐計未有措况病廢昏劣如臣之尤者而畀之倀然坐尸其間譬使盲夫駕敗舟於顛風巨海中而責之以濟險不待智者知其覆溺無所矣又况部使之催徴益急意外之誅求未已在昔一方𬒳災鄰省尚有接濟之望今湖湘連歲兵荒閩浙頻年旱潦兩廣之征剿未息南畿之供餽日窮淮徐以北山東河南之間聞亦飢饉相屬由此言之自全之䇿既無所施而四鄰之濟又巳絶望悠悠蒼天誰任其咎靜言思究臣罪實多何者宸濠之變臣在接境不能圖於未形致令猖突震驚逺邇乃勞聖駕親征師徒暴於原野百姓殆於道路朝廷之政令因而閼隔四方之困憊由是日深臣之大罪一也徒避形迹之嫌苟為自全之計隱忍觀望幸而脫禍不能直言極諌以悟主聼臣之大罪二也徒以逢迎附和為忠而不知日陷於有過徒以變更遷就為權而不知日紊於舊章徒以掇拾羅織為能而不知日離天下之心徒以聚斂征索為計而不知日積小民之怨此臣之大罪三也上不能有禆於國下不能有濟於民坐視困窮淪胥以溺臣之大罪四也且臣憂悸之餘百病交作尫羸衰眊視息僅存以前四者之罪人臣有一於此亦足以召災而致變况備而有之其所以速天神之怒深下民之憤而致災沴之集又何疑乎伏惟皇上軫災恤變别選賢能代臣巡撫即以臣為顯戮彰大罰於天下臣雖隕首亦云幸也即不以之為顯戮削其祿秩黜還田里以為人臣不職之戒庶亦有位知警民困可息人怒可泄天變可弭而臣亦死無所憾重上江西捷音疏十五年七月十七日遵奉大將軍鈞帖照得先因宸濠圗危宗社興兵作亂已經具奏請兵征勦間蒙欽差總督軍務威武大將軍總兵官後軍都督府太師鎮國公朱鈞帖欽奉制敕內開一遇有警務要互相傳報彼此通知設伏勦捕務俾地方寧靖軍民按堵蒙此臣看得宸濠虐熖張熾臣以百數疲弱之卒未敢輕舉驟進乃退保吉安一面督率吉安府知府伍文定等調集軍民兵快召募四方報效義勇之士會計一應解留錢糧支給糧餉造作軍器戰船奏留回任監察御史謝源伍希儒分職任事一面約會該府鄊官致仕都御史王懋中飬病痊可編修鄒守益刑部郎中曾直評事羅僑丁憂御史張鰲山先任浙江僉事今赴部調用劉藍依親進士郭持平軍門參謀驛丞王思李中致仕按察使劉遜參政黃繡間住知府劉昭等相與激發忠義七月𥘉二日宸濠探知臣等兵尚未集乃留兵萬餘屬其心腹宗支郡王儀賔內官并偽授都督都指揮等官使守江西省城而日引兵向闕臣晝夜促各郡兵期以本月十五日會臨江之樟樹而嚴督知府等官伍文定等各領兵於十八日遂至豐城分布伍文定等攻廣閠等七門是日得報宸濠伏兵千餘於新舊墳厰以備省城之援臣遣知縣劉守緒等領兵從間道夜襲破之十九日申布朝廷之威再暴宸濠之惡約諸將二十日黎明各至信地我兵四面驟集遂破江西擒其居守宜春王拱樤及偽太監萬鋭等千有餘人宸濠宫中眷屬聞變縱火自焚延及居民房屋臣當令各官分道救火撫定居民散釋脅從搜獲原𬒳劫收大小衙門印信九十六顆三司脅從布政使胡濂參政劉斐參議許效廉副使唐錦僉事賴鳳都指揮王玘等皆自首投罪除將擒斬功次發御史謝源伍希儒權令審驗紀録及一面分兵四路追躡宸濠向往相機擒剿二十二日臣等駐兵省城督同知府伍文定等各領兵分道並進擊其不意都指揮余恩領兵往來湖上誘致賊兵知府等官陳槐等各領兵四面設伏二十三日復得諜報宸濠先鋒已至樵舍風帆蔽江前後數十里不能計其數二十四日早賊兵鼓噪乘風而前逼黃家渡臣督各兵四面擊賊遂大潰擒斬二千餘級落水死者萬數二十五日又督各兵殊死並進炮及宸譹舟宸濠退走遂大敗擒斬二千餘級溺水死者不計其數二十六日臣夜督伍文定等為火攻之具四面而集火及宸濠副舟衆逐奔敗宸濠與其妃嬪泣別妃嬪宫人皆赴水死我兵遂執宸濠并其世子郡王將軍儀賔及偽太師國師元帥參贊尚書都督都指揮指揮千百户等官李士實劉養正劉吉屠欽王綸熊瓊盧珩羅璜丁瞶王春吳十三秦榮葛江劉勳何鏜王信吳國七火信等數百餘人𬒳執脅從太監王宏御史王金主事金山按察使楊璋僉事王疇潘鵬參政程杲布政梁宸都指揮郟文馬驥白昻等擒斬賊黨三千餘落水死者萬餘棄其衣甲器仗財物與浮尸積聚橫亘十餘里餘賊數百艘四散逃潰二十七日戰樵舍等處又復擒斬千餘落水死者殆盡二十八日知府陳槐等各與賊戰於沿湖諸處擒斬各千餘級除將宸濠并其世子郡王將軍儀賔偽授太師國師元帥參贊尚書都督都指揮指揮等官各另監羈候解𬒳執脅從等官并各宗室别行議奏及將擒斬俘獲功次一萬一千有奇發御史謝源伍希儒暫令審驗紀録另行造册繳報外照得臣節該欽奉敕諭但有盜賊生發即便嚴督各該兵備守備守巡各軍衛有司設法調兵勦殺其管領兵快人等官員不問文職武職若在軍前違期并逗遛退縮俱聼以軍法從事生擒盜賊鞫問明白亦聼就行斬首示衆斬獲賊級行令各該兵備守巡官即時紀驗明白備行江西按察司造册奏繳查照升賞激勸欽此及準兵部咨為飛報賊情事該本部題稱合無本部通行申明今後但有草賊生發事情緊急該管官司即便依律調撥官軍乘機勦捕應合會捕者亦就調發䇿應如有仍前朦朧隱蔽不即申報以致聚衆滋蔓貽害地方從重參究決不輕貸等因題奉欽依備咨前來又蒙欽差總督軍門發遣太監張永前到江西查勘宸濠反叛事情安邊伯朱泰太監張忠左都督朱暉各領兵亦到南京江西征勦續蒙欽差總督軍務威武大將軍總兵官後軍都督府太師鎮國公朱統率六師奉天征討及統提督等官司禮監太監魏彬平虜伯朱彬等并督理糧餉兵部左侍郎等官王慮等亦各繼至南京臣續又節該奉敕如或江西别府報有賊情緊急移文至日爾要及時遣兵䇿應毋得違誤欽此俱經欽遵外臣竊照宸濠蒸淫姦暴腥穢彰聞數其罪惡世所未有不軌之謀已踰一紀積威所劫逺𬒳四方而旬月之間遂克堅城俘擒元惡是皆欽差總督威德指示方略之所致也及照御史謝源伍希儒監軍督哨謀畫居多知府伍文定邢珣徐璉戴德孺陳槐曽璵林珹周朝佐署都指揮僉事余恩通判胡堯元童琦談儲推官王暐徐文英知縣李楫李美王冕王軾劉源清劉守緒傅南喬通判楊昉陳旦指揮麻璽髙睿孟俊知縣張淮應恩王庭顧佖萬士賢馬津等雖效績輸能亦有等列然皆首從義師共收全功其伍文定邢珣徐璉戴德孺等冒險衝鋒功烈尤懋鄊官都御史王懋中編修鄒守益御山張鰲山郎中曽直評事羅僑僉事劉藍進士郭持平驛丞王思李中按察使劉遜參政黃繡知府劉昭等仗義興兵協張威武以上各官功勞雖在尋常征勦亦已難得伏望皇上論功朝錫之餘普加爵賞旌擢以勸天下之忠義以勵將來之懦怯緣係捷音事理為此具本請旨四乞省葬疏十五年閏八月二十日照得先準吏部咨該臣奏稱以父老祖喪屢疏乞休未蒙憐準近者奉命扶疾赴閩意圖了事即從彼地冒罪逃歸旬月之前亦已具奏不意行至中途遭值寧府反叛此係國家大變臣子之義不容舍之而去又闔省巡撫方面等官無一人見在者天下事機間不容髮故復忍死暫留於此為牽制攻討之圗俟命帥之至即從𥘉心死無所避臣思祖母自幼鞠育之恩不及一面為訣每一號痛割裂昏殞日加尫瘠僅存殘喘母喪權厝祖母之側今葬祖母亦𣣔因此改葬臣父衰老日甚近因祖喪哭泣過節見亦病卧苫廬臣今扶病驅馳兵革往來於廣信南昌之間廣信去家不數日𣣔從其地不時乘間抵家一哭略為經畫葬事一省父病臣區區報國血誠上通於天不辭滅宗之禍不避形迹之嫌冒非其任以勤國難亦望朝廷鑒臣此心不以法例繩縛使臣得少伸烏鳥之痛臣之感恩死且圖報搶攘哀控不知所云等因具本奏奉聖旨王守仁奉命巡視福建行至豐城一聞宸濠反叛忠憤激烈即便倡率所在官司起集義兵合謀勦殺氣節可嘉巳有旨著督兵討賊兼巡撫江西地方所奏省親事情待賊平之日來説該部知道欽此備咨到臣除欽遵外近照寧王逆黨皆已仰賴皇上神武廟堂成算悉就擒獲地方亦已平靖百姓室家相慶得免徴調之苦復有更生之樂莫不感激洪恩沾𬒳德澤獨臣以父病日深母喪未葬之故日夜哀苦憂疾轉劇犬馬驅馳之勞不足齒録而烏鳥迫切之情實可矜憫已蒙前旨許待賊平之日來説故敢不避斧鉞復申前請伏望皇上仁覆曲成容臣暫歸田里一省父病經紀葬事臣不勝苦切祈望之至等因又經具本於正德十四年八月二十五日差舍人來儀齎奏去後迄今已踰八月未奉明旨臣旦暮惶惶延頸以待內積悲痛之鬱外遭窘局之苦新患交乘舊病彌篤方寸既亂神氣益昏目眩耳聵一切世事皆如夢寐今雖抑情強處不過閉門伏枕呻吟喘息而已豈能供職盡分為陛下巡撫一方乎夫人臣竭忠委命以赴國事及事之定乃故使之不得一省其親之疾是沮義士之志而傷孝子之心也且陛下既以許之又復拘之亦何以信於後臣素貪戀官爵志在進取亦非髙潔獨行甘心寂寞者徒以疾患纒體哀苦切心不得已而為此今亦未敢便求休退惟乞暫回田里一省父疾經營母葬臣亦因得就醫調理少延喘息苟情事稍伸病不至甚即當奔走赴闕終效犬馬昔人所謂報劉之日短盡忠于陛下之日長也臣不勝哀痛號呼懇切控籲之至具本又於正德十五年三月二十五日差舍人王鼐齎奏去後迄今復六月未奉明旨臣之痛苦刻骨剜心憂病纒結與死為鄰已無足論而臣父衰疾日亟呻吟牀席思臣一見晝夜涕洟每得家書號慟顛殞蘇而復絶夫虎狼惡獸尚知父子烏鳥微禽猶懷反哺今臣父病狼狽至此惟欲望臣一歸而臣乃依依貪戀官爵未能決然逃去是禽獸之不若何以立身於天地乎夫人之大倫內則父子外則君臣事君以忠事父以孝不忠不孝為天下之大戮縱復幸免國憲然既辱於禽獸則生不如死臣之歸省父疾在朝廷視之則一人之私情自臣身言之則一生之大節往者寧藩之變臣時欲歸省父疾然宗社危急呼吸之間存亡攸係故臣捐九族之誅委身以死國難時則君臣之義為重今國難已平兵戈巳息臣待罪巡撫不過素餐尸位以苟歲月而臣父又衰老病篤若此尚爾貪戀祿位而不去此尚可以為子乎不可以為子者尚可以為臣乎臣今待罪巡撫若不請而逃竊恐傳聞逺邇驚駭視聼夫人臣死君之難則捐其九族之誅而不恤至其急父之危則亦捐其一身之戮而不顧今復候命不至臣必冒死逃歸若朝廷憫其前後懇迫之請赦而不戮臣死且圖􅋦結若遂正以國典臣獲一見老父而死亦瞑目於地下矣臣不勝痛隕苦切號控哀祈之至除冒死一而移疾舟次沿途問醫待罪候命外緣係四乞天恩歸省父疾回籍待罪事理為此具本奏聞開豁軍前用過錢糧疏十五年九月𥘉四日照得先因寧王變亂該臣備行南贛等府起調各項官軍兵快人等追勦合用糧餉等項就仰聼將在官錢糧支給間隨據吉安府申為處置軍餉事開稱動調兵快數萬本府錢糧數少乞為急處等情已經通行各府速將見貯不拘何項錢糧以三分為率內將二分解赴軍前接濟外續為地方事臣又看得各處軍兵雖已起調但前項事情係國家大難存亡所關誠恐兵力不敷未免誤事又行牌仰各該官司即選父子鄊兵在官操練聼將官錢支作口糧候臣另有明文一至隨即啓行去後續照前項首惡并其謀黨俱已擒斬原調各處軍兵久巳散歸就經備行江西布政司通將各府州縣自用兵日起至於掣兵日止用過一應在官錢糧等項逐一查明造報以慿施行未報查催間又據江西按察司呈為緊急軍情事開稱先準江西布政司照會正德十四年十月𥘉一日該蒙户部貟外郎黃著案驗內開蒙本部題奉欽依差在軍前整理糧草今照各哨官軍俱集江西省城又聞聖駕亦將征討跟隨官軍未知數目駐劄月日未知久近所有糧料草束合仰備行本司掌印等官從長設法處置或支動在官銀兩選委能幹官員趂早多買糧草預備支應庶無失誤等因到司彼時巡按御史唐龍未到本院押解逆犯宸濠等在途查得江西省城司府及南新二縣并南康二府庫藏俱𬒳寧賊搶劫空虛無從措置誠恐臨期失誤就經會同江西布政司一面議借軍門發候解京贓銀及南昌府縣追到官本等銀給發委官汪憲等各領買辦糧草供應一面議將各府派銀接濟緣由會呈本院奉批俱準議造册繳報查考等因依奉除南康九江南昌三府縣殘破未派備行撫州等十府動支在官銀兩接濟續因起解首惡宸濠等并逆黨宫眷等項及輔還原借解京賊銀官本等銀緊急又經會呈議行各該府縣暫借在官銀兩前來應濟共計用過銀九千七百七十一兩四錢其餘見存銀兩俱係該解之數悉行各府差人領回聼其收解外呈乞施行等因到臣看得所呈前項供應糧料買辦草料及自臣起兵以來費用過錢糧中間多係京庫折銀及兊準糧米等項俱係支給賞勞兵快人等及供應北來官軍并犒賑軍民緊急支用計出無聊事非得已别無浪費分文據法似應措輔但今兵荒殘破之餘庫藏無不空虛小民無不凋敝逺近人情洶洶方求公帑賑濟若復派輔必致變生不測其聼解賊贓官本等銀實係寧賊搶劫官庫積蓄刻剝小民脂膏相應存留以救困竭今又盡數解京地方空匱委果巳極查得各處用兵請給內帑或借别省錢糧接濟邇者寧賊非常之變事起倉卒雖𣣔請給內帑勢有不及後蒙該部議準許於廣東軍餉銀內支取十萬隨幸賊勢平定前項準借銀兩亦遂停止分毫不曾取用伏望皇上憫念地方師旅飢饉之餘民窮財盡困苦已極近又加以水災為患流離益甚乞敕該部查照轉行江西布按二司將自用兵以來支取用費過各該府縣京庫折銀及兊準糧米等項通行查明各計若干照數開豁免行追輔仍仰備造文册􅌳部查考庶軍民得以少蘇而地方可免於意外之虞矣徴收秋糧稽遲待罪疏十五年十二月𥘉十日據江西布政司呈準布政使陳䇿等咨照得正德十四年稅糧先準參議周文光奉户部勘合派屬徴解隨因聖駕南巡各府州縣官俱集省城聼用前項錢糧不暇追徴正德十五年正月𥘉二日蒙巡按江西監察御史唐龍案驗為乞救兵燹窮民以固邦本事該巡撫蘇松都御史李充嗣題稱江西變亂南昌南康九江等府首𬒳燒劫其餘府縣大軍臨省供應浩繁要將該年稅糧盡行停免等因備行分守南昌五道勘議得南昌府南新二縣𬒳害深重應免糧差三年其餘州縣并瑞州等一十二府屬縣俱應免糧差二年回報到司即轉呈本院具題外本年二月內續蒙欽差户部貟外郎龍誥案驗為儧運糧儲事備行本司督催該年兊淮錢糧交兊遵依節行催徴間本年三月𥘉五日隨準漕運衙門照劄坐到兊軍本色米八萬石折色米三十二萬石改兊米一十七萬石每石連耗折銀七錢備行作急徴完起運本月二十八日又蒙撫按衙門案驗為地方極疲速賜恩恤以安邦本事該南京工科給事中王紀等奏奉欽依自正德十四年以前一應錢糧果係小民拖欠未完的俱準暫且停徴還著各該官司設法賑濟毋視虛文欽遵通行外又蒙貟外郎龍誥案牌將糧里嚴加杖併急如星火小民紛紛援例赴司告豁呈蒙撫按衙門批行本司給示曉諭納糧人户先將兊軍徴解小民方肯完納轉行參議魏彥昭督運續因本官去任又經呈批參政邢珣暫管督兊本官於五月二十日遍歷催儧通將徴完本色米八萬石兊完起運訖其折色銀兩催據廣信等府屬縣陸續徴解近於十一月十三等日抄奉漕運衙門照劄備行本司將兊運折色銀三十四萬三千兩務要徴完足數差官協同運官解部等因依奉通行外今照該年稅糧委因事變兵荒經理不前及專管提督官貟更代不常况奉部院明文徴免不一小民不服輸納官府掣肘難行因而稽延若不預將前情轉逹誠恐查究罪及未便等因備呈到臣竊照江西錢糧小民所以不肯輸納與有司所以難於追徴者其故各有三而究其罪歸則責實在臣何者宸濠之叛首以偽檄除租要結人心臣時起兵旁郡恐其扇惑即時移文逺近宣布朝廷恩德蠲其租賦許以奏免諭以君臣之分激其忠義之心百姓丁壯出戰老弱居守既而旱災益熾民困益迫然而小民不即離散者以臣既為奏請雖明旨未下皆謂朝廷必能免其租稅尚可忍死以待也夫危急之際則啖之免租以竭其死力事平之後又罔民而刻取之人懷怨忿不平此其不肯輸納之故一也及宸濠之亂稍定而大軍隨至供饋愈煩誅求愈急其顛連困踣之狀臣於前奏巳略言之百姓不任其苦強者竄而為寇弱者匿而為姦繼而水災助禍千里之民皆為魚鱉號哭載途喧騰求賑其時臣等既無帑藏之儲又無倉廪可發所以綏勞撫定之者更無别計惟以奏免租稅為言百姓睊睊胥讒謂命在旦夕不能救我而徒曰免稅免稅豈可待邪蓋其心以為免稅巳不待言尚恨其無以賑之也已而既不能賑又從而追納之人怨益深不平愈甚此其不肯輸納之故二也當大軍之駐省臣等趨走奔命日不暇給亦以為既有前奏則賦稅必在所免不復申請其時巡撫蘇松等處都御史李充嗣奏稱江西首𬒳宸濠之害乞將該年稅糧軍需等項俱行停免該户部覆題奉聖旨是各𬒳害地方著撫按官嚴督所屬用心設法賑濟欽此又該給事中王紀奏本部覆題奉聖旨是這地方委的疲因已極自正德十四年以前一應錢糧果係小民拖欠未完的俱準暫且停徴還著各該官司設法賑濟毋視虛文欽此俱欽遵該部備咨前來臣等正苦百姓呶呶咨文一至如解倒懸即時宣布百姓聞之歡聲雷動遞相傳告旦夕之間深山窮谷無不畢逹自是而後堅守蠲免之説雖部使督臨或遣人下鄊催促小民悉以為詐妄群起而驅縛之催徴之令不復可行此其不肯輸納之故三也郡縣之官親見百姓之困苦又當震蕩顛危之日懼其為變其始惟恐百姓不信免租之説指天畫地誓以必不食言既而時事稍平則盡反其説而徴之固巳不能出諸其口矣况從而鞭笞捶撻之其遽忍乎此其難於追徴之故一也三司各官舊者既𬒳驅脅新者陸續而至至則正當優攘分投供應四出送迎官離其職吏失其守紏結紛拏事無專責如羣手雜繅於亂絲之中東牽西絆莫知端緒既而部使驟臨𣣔於旬月之間督併完集神輸鬼運有不能矣此其難於追徴之故二也夫背信而行勢巳不順若使民間尚有可徴之粟必不得巳剜剝而取之忍心者尚或能辦也而民之瘡痍巳極矣實無可輸之物矣别夫離婦棄子鬻女有耳者不忍聞有目者不忍睹也如是而必𣣔驅之死地其將可行乎此其難於追徴之故三也夫小民之不肯輸納既如彼而有司之難於追徴又如此後值部使身臨坐併急於風火百姓怨謗紛騰洶洶思亂復如將潰之隄臣於其時慮恐變生不測謂各官與其激成地方之禍無益國事身膏草野以貽朝廷之憂孰若姑靖地方寧以一身當遲慢之戮乎因諭各官追徴毋急以紓民怨各官內迫於部使外窘於窮民上調下輯如居顛屋之下東撑則西頽前文則後圯強顔陵詬之辱掩耳怨憝之言身營閭閻之下口説田野之間曉以京儲之不可缺諭以國計之不得巳或轉為借貸或教之典拆忍心於捶骨剝脂之痛而浚其血閉目於析骸食子之慘而責其逋共計江西十四年分兊軍本色米八萬石折色米三十二萬石改兊米一十七萬石臣始度其勢以為決無可完之理其後數月之間亦復陸續起解完納是皆出於意料之外在各官誠窘局艱苦疲瘁巳極亦可謂之勞而有功矣今聞部使參奏且將不免於罪臣竊寃之昔之人固有催科政拙而自署下考者亦有矯制發廪而願受其辜者各官之以此獲罪固亦其所甘心但始之因叛亂旱荒而為之奏免者臣也繼之因水災兵困而復為申奏者臣也又繼之因朝廷兩有停徴賑貸之旨而為之宣布於衆者亦臣也又繼之慮恐激成禍變而諭令各官從權緩徴者又臣也是各官之罪皆臣之罪也今使各官當遲慢之責而臣獨幸免臣竊恥之夫司國計者慮京儲之空匱𣣔重徴收後期者之罪而有罰俸降級之議此蓋切於謀國忠於事君者之不得已也亦豈不念江西小民之困苦與各官之難為哉顧𣣔警衆集事創前而戒後固有不得不然者正所謂救焚身之患不遑恤毛髮之焦攻心腹之疾不得避針灼之苦耳伏望皇上憫各官之罪出於事勢之無已特從青災肆赦之典寬而宥之則法雖若屈而理亦未枉必謂行令之始不𣣔苟撓則各官之罪實由於臣即請貶削臣之祿秩放還田里以伸國議如此則不惟情法兩得而臣亦可以藉口江西之民免於欺上罔下之耻矣臣不勝惶懼待罪之至緣係徴收秋糧稽遲待罪事理為此具本請旨巡撫地方疏十五年四月二十五日據江西布政司呈奉臣案驗照得本院前任巡撫衙門近遭兵火廢毁兼以地址僻隘低窪每遇淋雨潢潦浸灌見今本院在於都司貢院諸處衙門寄駐遷徙不常居無定止人無定向妨政失體深為未便合行議取為此仰抄案回司即便會同都按二司官從長議查省城官民沒官房屋及革毀一應衙門可以拆修改造者會議停當呈來定奪毋得違錯等因依奉會同都指揮僉事王繼善按察使伍文定議得前項衙門先年建於永和門內僻在一隅地勢低窪切近東湖一遇淫雨輒遭浸漫近因大軍駐劄人馬作踐俱各倒塌及查巡按衙門亦皆年久朽爛逼側俱難居住𣣔擇地蓋造緣今地方兵荒之後取之於官則官庫空竭斂之於民則民窮財盡反覆思惟無從措置查得承奉司并織造機房各一所係是沒官之數俱各空間地勢頗髙規模頗廣合無呈請將呈奉司暫改為都察院衙門機房改為巡按衙門委官相度趂時修理如此則工費不繁民力少節實為兩便緣由呈詳到臣查得先為計處地方事該臣會同巡按御史唐龍議奏乞將抄沒寧府及各賊黨田地房屋令布按二司掌印及守巡并府縣官員從實覆查委係占奪百姓遵照詔書內事理各給還本主管業及將於內官房酌量移改城樓窩鋪衙門餘外田地山塘房屋仍令各官公同照依時估變賣價銀入官先儘撥輔南新二縣兊軍淮安京庫折銀糧米及王府祿米外有餘羡收貯布政司官庫用備緩急緣由會本具題去後未奉明旨今呈前來為照各項衙門果已廢毀當茲兵火之餘民窮財盡改創實難今該司議將前項沒官房屋暫改不費於官不勞於民工省事易誠亦兩便似應準議除行該司一面委官趂時修改暫且移駐以便聼理候民困既蘇財用充給之日力可改創再行議處勦平安義叛黨疏十六年五月十五日據江西按察司按察使伍文定關稱奉臣批據南康府通判林寬安義縣知縣熊價奉新縣典史徐誠呈開俱奉本院𥿄牌及巡按御史唐龍朱節等計委追勦逆賊楊本榮等依奉前後誘捕及於沿湖各處敵戰擒斬共一百二十六名顆并於楊子橋巢內搜獲伊原助逆領授南昌護衛中千戶所印信一顆合就解呈奉批仰按察司會同都布二司官將解到賊級紀驗賊犯鞫審明白解赴軍門以慿遵照欽奉敕諭事理就行斬首示衆有功貟役分别等第呈來給賞施行并蒙巡按江西監察御史唐龍批按察司會同各掌印官審究及將有功官役并陳亡之人查明具招呈報又蒙巡按江西監察御史朱節批看得各犯罪惡貫盈致勤提督衙門調兵擒勦事情重大按察司會勘明白中間如有事出脅從情可矜疑者通具呈報等因依奉會同都指揮僉事髙厚左布政使陳䇿等議得賊犯楊正賢等纍世窮凶鄱湖劇患近復從逆幸而漏網嘯聚劫囚敵殺官兵滔天之罪逺近播聞通判林寬等克承方略首事緝捕雖有小衄竟收成功知縣熊價到任甫及半月倉卒偶當其衝終能有備多所擒獲典史徐誠奉調領兵破賊適中機會署都指揮僉事馮勳鼓勇而前賊遂奔潰其典史周祐隂謀散黨隱然之迹未可泯棄合無呈乞鈞裁將署都指揮僉事馮勳通判林寬知縣熊價典史徐誠俱優加犒奬林寬熊價仍旌其除暴安民之勞典史周祐另行賞賚隨征南昌前衛千戶馬喜新建縣縣丞黃仲仁南昌縣主簿陳紀安義縣主簿崔錠建昌縣稅課局大使江象安義縣領哨義官楊震七協守縣治安義縣縣丞何全典史陳恆昭把截九里三渡南昌前衛指揮梁端千户周鎮俱量行犒勞其餘獲賊吏兵哨長保長總小甲人等查照近日告示事理分别等第一一給賞陳亡陳傷義兵程碧程魁七等俱各優恤其家給賞湯藥之費如此庶使有功者録而人知所勸死事者酬而人無所憾矣仍行該府縣將逆賊楊正賢等妻男財産估變價銀修築縣城尤為便益緣由同查過功次文册關繳到司備由轉呈到臣簿查正德十五年十一月𥘉十日據江西按察司副使陳槐關稱原問犯人胡順并楊子橋等家屬財産通該查抄解報呈詳已批該司查照施行務得的實母致虧枉外續據安義縣申稱依奉拏獲楊子橋妻周氏男楊華五華七華八月保并伊同居親弟楊子樓收監起解間十二月二十二日辰時不期子樓未獲男楊本榮統集百十餘徒各持鎗刀衝縣當同巡捕主簿崔錠督領機兵防禦彼賊勢勇打入獄門劫去楊華五等并原監楊正江楊紹鑑及别犯胡清等一十八名燒燬總甲張惟勝房屋劫掠鋪戶傅甫七等貨物隨即起集哨長陳魁四等屯兵設法擒獲楊華五等仍舊收監一面追獲餘賊楊子樓等合行申報等情又據通判林寬呈稱首惡楊子榮楊華二等照舊立寨嘯聚批仰按察司會同各官議處隨據該司呈稱依奉會同署都指揮僉事王繼善左布政使陳䇿副使顧應祥等議得楊本榮等罪惡據法即當督兵擒捕但訪得楊姓一族稔惡從亂者有數若使兵刃一加未免玉石未辨合行該縣再諭楊本榮等作急投首庶幾楊紹鑑等之罪可辨楊本榮之情可原若使負固不服即將稔惡賊黨指實申來議處呈詳到臣照得本院前年駐兵省城擒勦叛賊之後即𣣔移兵撲滅逆黨楊子橋等彼因訪得各犯親族亦多良善連居若大兵一臨未免玉石俱焚方爾遲疑當據楊子橋等自行投赴軍門本院仰體朝廷好生之德正𣣔保全一方之生靈當即遵照詔書黃榜事理將子橋等量加杖責釋放回家諭令改惡遷善其餘黨惡悉不根究外後因解京逆黨劉吉陳賢等供攀不巳朝廷之意將復發兵加誅則恐失信於下將遂置而不問則一般從逆之人乃至極刑抄沒而子橋等獨不略加懲創亦何以警戒將來故照舊釋其黨從以示信獨行拘子橋以明罰其遷徙抄沒亦止及於子橋一身朝廷之處可謂仁至義盡矣為之親族黨與者正宜感激朝廷浩蕩再生之恩皆宜爭出到官輸誠效欵自相分别洗滌其既往之愆而顯明其維新之善却乃略不改創輒敢抗逆官府衝縣劫囚自求誅滅據法論情已在必誅無赦但念中間良善尚多止因楊子橋同居稔惡之徒繆以危言激誘族黨扇惑鼓動以至於此恐亦非其本心今據三司各官呈議亦與所訪略同準依所議姑且未即加兵就經批行該道守巡官先行分别善惡令其親族素非同惡者自行告明官司各另屯住其被脅之人若能投首到官亦準免罪有能并力擒捕首惡送官者仍一體給賞俱限一月之內投首輸服若過期不出即將各犯背叛情由備細呈來以慿發兵勦滅一面行仰該縣及各附近官司整集兵快義勇固守把截聼候本院進止仍備出告示曉諭逺近外續據通判林寬呈稱遵照明文密喚楊姓良善户丁楊庸楊邦十五等七名到職示以禍福給以犒賞著令分别良善止捕衝縣逆賊送官隨該楊庸等誘擒逆賊九名到縣又獲賊犯一十七名隨給牌面令通縣老人分投撫諭而各賊仍前立寨不服續又擒獲賊犯四名後聞官司要搗巢穴連夜鼓挾鄰族約有百十餘徒虜船奔入鄱陽湖𣣔即率兵追勦緣該縣空虛誠恐賊計中途回鋒衝突未可輕出除差人飛報沿河保長立寨防勦一面牒府督率星子建昌都昌兵沿湖巡捕外呈乞施行等因據呈臣會同巡按御史等官看得賊既入湖良善已分正可四面合兵追勦除行南昌守巡兵備點選兵快就行都司馮勳統領星夜前去跟躡賊蹤設法勦捕就經批仰按察司即便通行該道守巡官及沿湖各該官司地方保甲人等一體集兵防勦追捕毋令逺竄貽患臣等又慮安義縣治單弱恐各賊乘虛歸劫另行牌調奉新縣典史徐誠選兵四百密從間道星夜前去該縣會同知縣熊價協力防勦又行牌仰各官於九姓良善之中挑選義勇武藝及於沿湖諸處起集習水壯健慣戰之人各官身自督領密取知因鄉導四路爪探或躡賊蹤或截要路或歸防縣治張疑設伏聲東擊西一應事機俱聼從宜施行合用糧賞就於司府庫內原貯軍餉銀內支給及差官齎執令旗令牌前去督押行事軍兵人等但有軍前不聼號令及退縮逗遛侵優良善者遵照敕諭事理就以軍法從事各官俱要竭忠盡力慎重勇果殺賊立功以靖地方若畏避輕忽致賊滋蔓貽患地方軍令具存決難輕貸完日通將擒斬功次獲功人員等項一併開報以慿施行去後今呈前因照得臣先節該欽奉敕諭但有盜賊生發即便設法調兵勦殺聼爾隨宜處置欽此欽遵除將前項有功官貟支兵人等及陳亡𬒳傷等項俱準議於南昌府動支本院貯庫支剩軍餉銀兩除已犒奬給賞優恤外其未經奬犒給賞優恤者批仰該司查照等第逐一輔給賊屬男婦估價變賣銀兩亦準修築該縣城垣支用擒獲賊犯鞫問明白仍解軍門斬首示衆斬獲賊級行令造册繳報并行巡按衙門知會外臣等議照叛黨楊正賢等肆其凶獷之習恃其族類之繁稔惡一方流劫逺近既積有世代比復興兵助逆脫漏誅殄略無悔創乃敢攻縣劫獄聚衆稱亂惡貫滿盈天怒人怨遂爾一旦掃滅在朝廷固猶疥癬之搔爬在江西實亦疽癰之潰決巡按御史唐龍朱節運謀監督而按察使伍文定布政使陳䇿等相與協議贊畫都指揮馮勳及通判林寬知縣熊價等又各趨事效命并力于下論各勞績皆宜旌録臣守仁卧病待罪之餘僅存喘息幸賴諸臣苟免咎愆緣係勦平叛黨事理為此具本題知乞便道歸省疏臣於正德十六年六月十六日欽奉敕旨以爾昔能勦平亂賊安靖地方朝廷新政之𥘉特茲召用敕至爾可馳驛來京毋或稽遲欽此欽遵巳於本月二十日馳驛起程外竊念臣自兩年以來四上歸省之奏皆以親老多病懇乞暫歸省視實皆出於人子迫切之至情而其時復以權姦當事讒嫉交興非獨臣之愚悃無由自明且慮變起不測身罹曖昧之禍冀得因事退歸父子苟全首領於牖下故其時雖以暫歸為請而實有終身丘壑之念矣既而宗社有靈天啓神聖入承大統華故鼎新親賢任舊向之為讒嫉者皆巳誅斥略盡陽德興而公道顯臣於斯時固已欣然改易其退遁之心矣當明良之會聖人作而萬物睹天下之士孰不顒然有觀光之願而况臣之方在憂危驟獲申雪者若出陷穽而登之春臺其為喜幸感激何啻百倍豈不𣣔朝發夕至以一快其拜舞踴躍之私歸戴向往之誠乎顧臣父既老且病頃遭讒搆之厄危疑震恐洶洶朝夕常有父子不及相見之痛今幸脫洗殃咎復睹天日父子之情固思一見顔面以敘其悲慘離隔之懷以盡菽水歡欣之樂况臣取道錢塘迂程鄉土止有一日此在親交之厚將不能已於情而况父子天性之愛重以連年苦切之思乎故臣之此行其冒罪歸省亦情理之所必不容巳者然不以之明請於朝而私竊行之是欺君也懼稽延之戮而忍割情於所生是忘父也欺君者不忠忘父者不孝世固未有不孝於父而能忠於其君者也故臣敢冒罪以請伏望皇上以孝為治範圍曲成特寬稽命之誅使臣得以少伸烏鳥之私臣死且圖㗸結臣不勝惶懼懇切之至辭封爵普恩賞以彰國典疏嘉靖元年正月𥘉十日南京兵部尚書王守仁謹奏為辭免封爵普恩賞以彰國典事臣於正德十六年十二月十九等日節準兵部吏部咨俱為捷音事節該題奉聖旨江西反賊勦平地方安定各該官貟功績顯著你部裏既會官集議分别等第明白王守仁封伯爵給與誥劵子孫世世承襲照舊參贊機務欽此王守仁封新建伯奉天翊衛推誠宣力守正文臣特進光祿大夫柱國還兼南京兵部尚書照舊參贊機務歲支祿米一千石三代并妻一體追封欽此前後備咨到臣俱欽遵外臣聞命驚惶莫知攸措竊念臣以凡庸誤受國恩在正德𥘉年以狂言𬒳譴先帝察其無他隨加收録荐陟清顯繆膺軍旅之寄猥承巡撫之令後值寧藩肇變臣時適嬰禍鋒義當死難不量勢力與之掎角賴朝廷威靈幸無覆敗既而讒言朋興幾陷不測臣之心事未及自明先帝登遐無階控籲乃幸天啓神聖陛下龍飛開臣於覆盆之下而照之以日月憫惻慰勞至勤詔旨憐其烏鳥之情使得歸省推大孝之仁優之以存問超歷常資授以留都本兵之任懇疏辭免慰旨益勤在昔名臣碩輔鮮有獲是於其君者而况於臣之卑鄙淺劣亦將何以堪此乎今又加以封爵之崇臣懼功微賞重無其實而冒其名憂禍敗之將及也夫人主於嚬笑之微不以假於匪人而况爵賞之重乎人臣之事君也先其事而後其食食且不可而况於封爵乎且臣之所以不敢受爵其説有四然亦不敢不為陛下一陳其實矣寧藩不軌之謀積之十數年矣持滿應機而發不旬月而敗此非人力所及也上天之意厭亂思治將啓陛下之神聖以中興太平之業故蹶其謀而奪之魄斯固上天之為之也而臣𣣔冒之是叨天之功矣其不敢受者一也先寧藩之未變朝廷固已隂覺其謀故改臣以提督之任假臣以便宜之權使據上遊以制其勢故臣雖倉卒遇難而得以從宜調兵與之從事當時帷幄謀議之臣則有若大學士楊廷和等該部調度之臣則有若尚書王瓊等是皆有先事禦備之謀所謂發縱指示之功也今諸臣未蒙顯褒而臣獨冒膺重賞是掩人之善矣其不敢受者二也變之𥘉起勢熖焻熾人心疑懼退沮當時首從義師自伍文定邢珣徐璉戴德孺諸人之外又有知府陳槐曾璵胡堯元等知縣劉源清馬津傅南喬李美李楫及楊材王冕顧佖劉守緒王軾等鄉官都御史王懋中編修鄒守益御史張鰲山伍希儒謝源等諸人臣今不能悉數其間或摧鋒陷陳或遮邀伏擊或贊畫謀議監録經紀雖其平日人品或有清濁髙下然就茲一事而言固亦咸有捐軀效死之忠戮力勤王之績所謂同功一體者也今賞當其功者固已有之然施不酬勞之人尚多也其帳下之士若聼選官雷濟已故義官蕭禹致仕縣丞龍光指揮髙睿千戶王佐等或詐為兵檄以撓其進止壞其事機或偽書反間以離其心腹散其黨與隂謀祕計蓋有諸將士所不與知而辛苦艱難亦有諸部領所未嘗歷者臣於捷奏本內既不敢瑣瑣煩瀆今聞紀功文册復為改造者多所刪削其餘或力戰而死於鋒鏑或犯難而委於溝渠陳力效能者尤不可以枚舉是皆一時號召之人臣於顛沛搶攘之際今巳多不能記憶其姓名籍貫復有舉人冀元亨者為臣勸説寧濠反為姦黨搆陷竟死獄中以忠受禍為賊報讎抱冤齎恨實由於臣雖盡削臣職移報元亨亦無以贖此痛此尤傷心慘目負之於冥冥之中者夫倡義調兵雖起於臣然猶有先事者為之指措而戮力成功必賴於衆則非臣一人之所能獨濟也乃今諸將士之賞尚多未稱而臣獨蒙冒重爵是襲下之能矣其不敢受者三也夫周公之功大矣亦臣子之分所當為况區區犬馬之微勞又皆偶逢機會幸而集事者奚足以為功乎臣世受國恩虀身粉骨亦無以報繆當提督重任承乏戎行苟免鰥曠况又超擢本兵既已叨冒踰分且臣近年以來憂病相仍神昏志散目眩耳聾無復可用於世兼之親族顛危命在朝夕又不度德量分自知止足乃冒昧貪進據非其有是忘已之耻矣其不敢受者四也夫殃莫大於叨天之功罪莫甚於掩人之善惡莫深於襲下之能辱莫重於忘已之耻四者備而禍全故臣之不敢受爵非敢以辭榮也避禍焉爾已伏願陛下鑒臣之辭出於誠懇收還成命容臣以今職終飬老親苟全餘喘於林下以所以濫施於臣者普於衆以明賞罰之典以彰大小之功以慰不均之望以勵將來效忠赴義之臣臣死且不朽矣不勝受恩感激懇切願望之至緣係辭免封爵普恩賞以彰國典事理謹具本題再辭封爵普恩賞以彰國典疏嘉靖元年臣於正德十六年十二月節準兵部吏部咨節該題奉聖旨江西反賊勦平地方安靜各該官貟功績顯著你部裏既會官集議分别等第明白王守仁封伯爵給與誥劵子孫世世承襲照舊參贊機務欽此王守仁封新建伯奉天翊運推誠宣力守正文臣特進光祿大夫柱國還兼南京兵部尚書照舊參贊機務歲支祿米一千石三代并妻一體追封欽此臣聞命驚惶竊懼功微賞重禍敗將及已經具本辭免去後隨於嘉靖元年七月十九日準吏部咨該臣奏前事節奉聖旨論功行賞古今令典詩書所載具可考見卿倡義督兵勦除大患盡忠報國勞績可嘉特加封爵以昭公義宜勉承恩命所辭不允該部知道欽此欽遵臣以積惡深重禍延先人臣方煢然瘠疚僅未殞絶聞命悸栗魂魄散亂已而伏塊沉思臣以微勞冒膺重賞所謂叨天之功掩人之善襲下之能忘已之耻者臣於前奏已具陳之矣然而聖旨殷優獨加於臣餘皆未蒙採録者豈以江西之功果臣一人之所能獨辦乎朝廷爵賞本以公於天下而臣以一身掠衆美而獨承之是臣擁閼朝廷之大澤而使天下有不均之望也罪不滋重已乎夫廟堂之賞朝廷之議也臣不敢僣及至於臣所相與協力同事之人則有不得不為一申白者古者賞不踰時𣣔人速得為善之報也今效忠赴義之士延頸而待已三年矣此而更不一言事日已逺而意日已衰誰復有為之論列者故臣輒敢割痛忍哀冒斧鉞而控籲氣息奄奄之中忽不自覺其言之躁妄亦其事有所感於昔而情有所激於其中也竊惟宸濠之變實起倉卒其氣勢張皇積威凌劫雖在數千里外無不震駭失措而况江西諸郡縣近切剝牀觸目皆賊兵隨處有賊黨當此之時臣以逆旅孤身舉事其間雖仰仗威靈以號召逺近然而未受巡撫之命則各官非統屬也未奉討賊之旨其事乃義倡也若使其時郡縣各官果懷畏死偷生之心但以未有成命各保土地為辭則臣亦可何如哉然而聞臣之調即皆感激奮勵或提兵而至或挺身而來是非真有捐軀赴難之義戮力報主之忠孰肯甘粉虀之禍從赤族之誅蹈必死之地以希萬一難冀之功乎然則凡在與臣共事者皆有忠義之誠者也夫均秉忠義之誠以同赴國難而功成行賞臣獨當之人將不食其餘矣此臣所為不敢受也且宸濠之變天實隂奪其魄而摧敗之速是以功成之後不復以此同事諸人者為庸使其時不幸而一蹶塗地則粉身滅族之慘亦同事諸人者自當之乎將猶可以藉衆議之解救而除免之乎夫下之人犯必死之難以赴義則上之人有必行之賞以報功今臣獨崇爵而此同事諸人者乃或賞或否或不行其賞而并削其績或賞未及播而罰已先行或虛受升職之名而因使退間或冒蒙不忠之號而隨以廢斥由此言之亦何苦捐身赴義以來此呶呶之口而自求無實之殃乎乃不若退縮引避反可以全身逺害安處富貴而逭於衆口之誹也夫披堅執鋭身親行伍以及期赴難而猶不免於不忠之罰則容有托故推姦坐而觀望者又將何以加之今不彼之議而獨此之察則已過矣昔人有蹊田而奪牛者君子以為蹊田固有責而奪牛則已甚今人驅牛以耕我之田既種且獲矣而追究其耕之未盡善也復從而奪之牛無乃太逺於人情乎方今議者或以某也素貪而鄙某也素躁而狂故雖有功而當抑其賞雖有勞而不贖其罪噫是亦過矣當宸濠之變撫按三司等官咸𬒳驅縛或死或從其餘大小之職近者就縻逺者逃潰矣當此之時苟知有從我者皆可以為忠義之士尚得追論其平時邪况所謂若貪與鄙者或出於讒嫉之口而未皆真邪若居常處易選擇而使猶不免於失人况一時烏合之衆而顧以此概之其責於人終無已乎夫考素行别賢否以激揚士風者考課之常典較功力信賞罰以振作士氣者軍旅之大權故鄙猥之行平時不耻於士列而使貪使詐軍事有所不廢也急難呼吸之際要在摧鋒克敵而已而暇逆計其他乎當此之時雖有禦人國門之寇苟能效其智力以協濟吾事亦將用之用之而事果有成亦必賞之况乎均在士人之列同有勤事之忠者乎人於平居無事扼腕抵掌而談孰不曰我能臨大節死大難及當小小利害未必至於死也而或有倉皇失措者有矣又况矢石之下劒創之間前有必死之形而後有夷滅之禍人亦何不設以身處其地而少亮之乎夫考課之典軍旅之政固並行而不相悖然亦不可以混而施之今人方有可録之功吾且遂行其賞可矣縱有既往之愆亦得以今而贖但據其顯然可見者毋深求其隱然不可見者賞行矣而其人之過猶未改也則從而行其黜謪人將曰昔以功而賞今以罪而黜功罪顯而勸懲彰矣今也將明軍旅之賞而隂以考課之意行於其間人但見其賞未施而罰已及功不録而罪有加不能創姦警惡而徒以阻忠義之氣快讒嫉之心譬之投杯醪於河水而曰是有醪焉亦可飲而醉也非易牙之口將不能辨之矣而求飲者之醉可得乎人臣於國家之難凡其心之可望力之可為塗肝腦而膏髓骨皆其職分所當然則此同事諸臣者遂敢以此自為之功而邀賞於其上乎顧臣與之同事同功今賞積於臣而彼有未逮臣復抗顔直受而不以一言是使朝廷之上果以其功獨歸於臣而此諸人者之績因臣之為蔽而卒無以自顯於世也且自平難以來此同事諸人者非獨為已斥諸權姦之所誣搆挫辱而巳也群憎衆嫉惟事指摘搜羅以為快曽未見有鳴其不平而伸其屈抑者幸而陛下龍飛赫然開日月之光英賢輔翼廓清風而鼓震電於是隂氣始散而魍魎潛消然而覆盆之下尚或有未能自露者也故臣敢不避矜誇僣妄之戮而輒為諸臣者一訴其艱難抑鬱之情昔漢臣趙充國破羌而歸人有諷之謙讓功能者充國曰吾老矣爵位巳極豈嫌伐一時事以欺明主哉兵政國之大事當為後法老臣不以餘命一為主上明言其利害卒使誰當復言之者卒以實對夫人之忠於國也殺身夷族有不避而乃避其自矜功伐之嫌乎臣始遇變於豐城也蓋舉事於倉卒茫昧之中其時豈能逆睹其功之必就謂有今日爵賞之榮而為哉徒以事關宗社是以不計成敗利鈍捐身家棄九族但以輸忠憤而死節是臣之𥘉心也至於號告三軍則雖激之以忠義而實歆之以爵祿延世之榮勵之以名節而復動之以恩賞絢耀之美是非敢以虛言誘之也以為功而克成則此爵祿恩賞亦有國之常典理所必有也今臣受殊賞而衆有未逮是臣以虛言罔誘其下竭衆人之死而共成之掩衆人之美而獨取之見利忘信始之以忠信終之以貪鄙外以欺其下而內失其𥘉心亦何顔面以視其人乎故臣之不敢獨當殊賞者非不知封爵之為榮也所謂有重於封爵者故不為苟得耳伏願陛下鑒臣之言不以為誇也而因以察諸臣之隱允臣之辭不以為偽也而因以普諸臣之施果以其賞在所薄與則臣亦不得而獨厚果以其賞或可厚與則諸臣亦不得而遂薄也江西同事諸臣臣於前奏亦巳略舉且該部具有成册可查不敢復有所塵瀆臣在衰絰憂苦之中非可有言之日事不容巳而有是舉不勝受恩感激含哀冒死戰栗惶懼懇切祈禱之至王文成公全書卷之八文録五雜著書汪汝成格物卷癸酉豫於汝成格物致知之説博文約禮之説博學篤行之説一貫忠恕之説蓋不獨一論再論五六論數十論不止矣汝成於吾言始而駭以拂既而疑焉又既而大疑焉又既而稍釋焉而稍喜焉而又疑焉最後與豫遊於玉泉蓋論之連日夜而始快然以釋油然以喜冥然以契不知豫言之非汝成也不知汝成之言非豫言也於戲若汝成可謂不苟同於豫亦非茍異於豫者矣卷首汝成之請蓋其時尚有疑於豫今既釋然豫可以無言也已敘其所以而歸之書石川卷甲戌先儒之學得有淺深則其為言亦不能無同異學者惟當反之於心不必苟求其同亦不必故求其異要在於是而已今學者於先儒之説苟有未合不妨致思思之而終有不同固亦未為甚害但不當因此而遂加非毁則其為罪大矣同志中往往似有此病故特及之程先生云賢且學他是處未須論他不是處此言最可以自警見賢思齊焉見不賢而內自省則不至於責人已甚而自治嚴矣議論好勝亦是今時學者大病今學者於道如管中窺天少有所見即自足自是傲然居之不疑與人言論不待其辭之終而已先懷輕忽非笑之意訑訑之聲音顔色拒人於千里之外不知有道者從傍視之方為之踈息汗顔若無所容而彼悍然不顧略無省覺斯亦可哀也已近時同輩中往往亦有是病者相見時可出此以警勵之某之於道雖亦略有所見未敢盡以為是也其於後儒之説雖亦時有異同未敢盡以為非也朋友之來問者皆相愛者也何敢以不盡吾所見正期體之於心務期真有所見其孰是孰非而身發明之庶有益於斯道也若徒入耳出口互相標立門戶以為能學則非某之𥘉心其所以見罪之者至矣近聞同志中亦有類此者切須戒勉乃為無負孔子云默而識之學而不厭斯乃深望於同志者也與傅生鳳甲戌祁生傅鳳志在養親而苦於貧徐曰仁之為祁也憫其志嘗育而教之及曰仁去祁生乃來京師謁豫遂從豫而南聞豫言若有省將從事於學然痛其親之貧且老其繼母弟又瞽而愚無所資以為養乃記誦訓詁學文辭冀以是干升斗之祿日夜不息遂以是得危疾幾不可救同門之士百計寬譬之不能已乃以質於豫豫曰嘻若生者亦誠可憐者也生之志誠出於孝親然已陷於不孝而不之覺矣若生者亦誠可憐者也生聞之悚然來問曰家貧親老而不為祿仕得為孝乎豫曰不得為孝矣𣣔求祿仕而至於成疾以殞其軀得為孝乎生曰不得為孝矣殞其軀而𣣔讀書學文以求祿仕祿仕可得乎生曰不可得祿仕矣曰然則爾何以能免於不孝於是泫然泣下甚悔且曰鳯何如而可以免於不孝豫曰保爾精毋絶爾生正爾情毋辱爾親盡爾職毋以得失為爾惕安爾命毋以外物戕爾性斯可以免矣其父聞其疾危來視遂𣣔携之同歸豫憐鳯之志而不能成也哀鳯之貧而不能賑也憫鳯之去而不能留也臨别書此遺之書王天宇卷甲戌徐曰仁數為豫言天宇之為人豫既知之矣今年春始與相見於姑蘇話通宵益信曰仁之言天宇誠忠信者也才敏而沉潛者也於是乎慨然有志於聖賢之學非豪傑之士能然哉出茲卷請豫言豫不敢虛則為誦古人之言曰聖誠而巳矣君子之學以誠身格物致知者立誠之功也譬之植焉誠其根也格致其培壅而灌溉之者也後之言格致者或異於是矣不以植根而徒培壅焉灌溉焉弊精勞力而不知其終何所成矣是故聞日博而心日外識益廣而偽益增涉獵考究之愈詳而所以緣飾其姦者愈深以甚是其為弊亦既可覩矣顧猶泥其説而莫之察也獨何歟今之君子或疑豫言之為禪矣或疑子言之求異矣然吾不敢苟避其説而內以誣於己外以誣於人也非吾天宇之髙明其孰與信之書王嘉秀請益卷甲戌仁者以天地萬物為一體莫非已也故曰己𣣔立而立人己欲逹而逹人古之人所以能見人之善若已有之見人之不善則惻然若已推而納諸溝中者亦仁而已矣今見善而妬其勝己見不善而疾視輕蔑不復比數者無乃自陷於不仁之甚而弗之覺者邪夫可欲之謂善人之秉彛好是懿德故凡見惡於人者必其在己有未善也瑞鳳祥麟人爭快覩虎狼蛇蝎見者持挺創而向之矣夫虎狼蛇蝎未必有害人之心而見之必惡為其有虎狼蛇蝎之形也今之見惡於人者雖其自取未必盡惡無亦在外者猶有惡之形歟此不可以不自省也君子之學為己之學也為己故必克己克己則無己無己者無我也世之學者執其自私自利之心而自任以為為己􅐯焉入於墮墮斷滅之中而自任以為無我者吾見亦多矣嗚呼自以為有志聖人之學乃墮於末世佛老邪僻之見而弗覺亦可哀也夫有一言而可以終身行之者其恕乎強恕而行求仁莫近焉恕之一言最學者所喫緊其在吾子則猶對病之良藥宜時時勤服之也見賢思齊焉見不賢而內自省夫能見不賢而內自省則躬自厚而薄責於人矣此逺怨之道也書孟源卷乙亥聖賢之學坦如大路但知所從入苟循循而進各隨分量皆有所至後學厭常喜異往往時入斷蹊曲徑用力愈勞去道愈逺向在滁陽論學亦懲末俗卑汚未免專就髙明一路開導引接蓋矯枉救偏以拯時弊不得不然若終迷陋習者已無所責其間亦多興起感發之士一時趨向皆有可喜近來又復漸流空虛為脫落新奇之論使人聞之甚為足憂雖其人品髙下若與終迷陋習者亦微有間然究其歸極相去能幾何哉孟源伯生復來金陵請益察其意向不為無進而説談之斃亦或未免故因其歸而告之以此遂使歸告同志務相勉於平實簡易之道庶無負相期云耳書楊思元卷乙亥楊生思元自廣來學既而告歸曰夫子之教思元既略聞之懼不克任請所以砭其疾者而書諸紳豫曰子強明者也警敏者也強明者病於矜髙是故亢而不能下警敏者病於淺陋是故浮而不能實砭子之疾其謙默乎謙則虛虛則無不容是故受而不溢德斯聚矣默則慎慎則無不密是故積而愈堅誠斯立矣彼少得而自盈者不知謙者也少見而自衒者不知默者也自盈者吾必惡之自衒者吾必耻之而人有不我惡者乎有不吾耻者乎故君子之觀人而必自省也其謙默乎書玄默卷乙亥玄默志於道矣而猶有詩文之好何耶奕小技也不專心致志則不得况君子之求道而可分情於他好乎孔子曰詞逹而巳矣蓋世之為詞章者莫不以是藉其口亦獨不曰有德者必有言有言者不必有德乎德猶根也言猶枝葉也根之不植而徒以枝葉為者吾未見其能生也豫别玄默久友朋得玄默所為詩者見其辭藻日益以進其在玄默固所為根盛而枝葉茂者耶玄默過留都示豫以斯卷書此而遺之玄默尚有以告我矣書顧維賢卷辛巳維賢以豫將逺去持此卷求書警戒之辭只此警戒二字便是豫所最丁寧者今時朋友大患不能立志是以因循懈弛散漫度日若立志則警戒之意當自有不容巳故警戒者立志之輔能警戒則學問思辨之功切磋琢磨之益將日新又新沛然莫之能禦矣程先生云學者為氣所勝習所奪只好責志又云凡為詩文亦喪志又言且省外事但明乎善惟盡誠心其文章雖不中不逺矣所守不約泛濫無功學問之道四書中備矣後儒之論未免互有得失其得者不能出於四書之外失者遂有毫釐千里之謬故莫如專求之四書四書之言簡實苟以忠信進德之心求之亦自明白易見與不善人居如入鮑魚之肆久而不覺其臭則與之俱化孔子大聖尚賴三益之資致三損之戒吾儕從事於學顧隨俗同汙不思輔仁之友欲求致道恐無是理矣非笑詆毁聖賢所不免伊川有涪州之行孔子尚微服過宋今日風俗益偷人心日以淪溺苟𣣔自立違俗拂衆指摘非笑紛然而起勢所必至亦多由所養未深髙自標榜所致學者便不當自立門户以招謗速毁亦不當故避非毁同流合汚維賢溫雅朋友中最為難得似非微失之弱恐詆笑之來不能無動讒為所動即依阿隱忍久將淪胥以溺每到此便須反身痛自切責為巳之志未能堅定亦便志氣激昻奮發但知明巳之善立巳之誠以求快足乎巳豈暇顧人非笑指摘故學者只須責自家為巳之志未能堅定志苟堅定則非笑詆毁不足動搖反皆為砥礪切磋之地矣今時人多言人之非毀亦當顧恤此皆隨俗習非之久相沿其説莫知以為非不知裡許盡是私意為害不小不可以不察也壁帖壬午守仁鄙劣無所知識且在憂病奄奄中故凡四方同志之辱臨者皆不敢相見或不得已而相見亦不敢有所論説各請歸而求諸孔孟之訓可矣夫孔孟之訓昭如日月凡支離決裂似是而非者皆異説也有志於聖人之學者外孔孟之訓而他求是舍日月之明而希光於螢爝之微也不亦繆乎有負逺來之情聊此以謝荒迷不次書王一為卷癸未王生一為自惠負笈來學居數月皆隨衆參謁默然未嘗有所請視其色津津若有所喜然一日衆皆退乃獨復入堂下而請曰致知之訓千聖不傳之祕也一為既領之矣敢請益豫曰千丈之木起於膚寸之萌芽子謂膚寸之外無所益歟則何以至於千丈子謂膚寸之外有所益歟則膚寸之外子將何以益之一為躍然起拜曰聞教矣又三月思其母老於家告歸省視因書以與之書朱守諧卷甲申守諧問為學豫曰立志而巳問立志豫曰為學而已守諧未逹豫曰人之學為聖人也非有必為聖人之志雖𣣔為學誰為學有其志矣而不日用其力以為之雖𣣔立志亦烏在其為志乎故立志者為學之心也為學者立志之事也譬之奕焉奕者其事也專心致志者其心一也以為鴻鵠將至者其心二也惟奕秋之為聽其事專也思援弓繳而射之其事分也守諧曰人之言曰知之未至行之不力豫未有知也何以能行乎豫曰是非之心知也人皆有之子無患其無知惟患不肯知耳無患其知之未至惟患不致其知耳故曰知之非艱行之惟艱今執途之人而告之以凡為仁義之事彼皆能知其為善也告之以凡為不仁不義之事彼皆能知其為不善也途之人皆能知之而子有弗知乎如知其為善也致其知為善之知而必為之則知至矣如知其為不善也致其知為不善之知而必不為之則知至矣知猶水也人心之無不知猶水之無不就下也決而行之無有不就下者決而行之者致知之謂也此吾所謂知行合一者也吾子疑吾言乎夫道一而已矣書諸陽卷甲申妻姪諸陽伯復請學既告之以格物致知之説矣他日復請曰致知者致吾心之良知也是既聞教矣然天下事物之理無窮果惟致吾之良知而可盡乎抑尚有所求於其外也乎復告之曰心之體性也性即理也天下寧有心外之性寧有性外之理乎寧有理外之心乎外心以求理此告子義外之説也理也者心之條理也是理也發之於親則為孝發之於君則為忠發之於朋友則為信千變萬化至不可窮竭而莫非發於吾之一心故謂端莊靜一為養心而以學問思辨為窮理者析心與理而為二矣若吾之説則端莊靜一亦所以窮理而學問思辨亦所以養心非謂養心之時無有所謂理而窮理之時無有所謂心也此古人之學所以知行並進而收合一之功後世之學所以分知行為先後而不免於支離之病者也曰然則朱子所謂如何而為溫凊之節如何而為奉養之宜者非致知之功乎曰是所謂知矣而未可以為致知也知其如何而為溫凊之節則必實致其溫凊之功而後吾之知始至知其如何而為奉養之宜則必實致其奉養之力而後吾之知始至如是乃可以為致知耳若但空然知之為如何溫凊奉養而遂謂之致知則孰非致知者耶易曰知至至之知至者知也至之者致知也此孔門不易之教百世以俟聖人而不惑者也書張思欽卷乙酉三原張思欽元相將葬其親卜有日矣南走數千里而來請銘於豫豫之不為文也久矣辭之固而請弗已則與之坐而問曰子之乞銘於我也將以圗不朽於其親也則亦寧非孝子之心乎雖然子以為孝子之圗不朽於其親也盡於是而已乎將猶有進於是者也夫圗之於人也則曷若圖之於子乎傳之於其人之口也則曷若傳之於其子之身乎故子為賢人也則其父為賢人之父矣子為聖人也則其父為聖人之父矣其與托之於人之言也孰愈夫叔梁紇之名至今為不朽矣則亦以仲尼之為子耶抑亦以他人為之銘耶思欽蹙然而起稽顙而後拜曰元相非至於夫子之門則幾失所以圗不朽於其親者矣明日入而問聖人之學則語以格致之説焉求格致之要則語之以良知之説焉思欽躍然而起拜而復稽曰元相苟非至於夫子之門則尚未知有其心又何以圗不朽於其親乎請歸葬吾親而來卒業於夫子之門則庶幾其不朽之圗矣書中天閣勉諸生乙酉雖有天下易生之物一日暴之十日寒之未有能生者也承諸君之不鄙每豫來歸咸集於此以問學為事甚盛意也然不能旬日之留而旬日之間又不過三四會一别之後輒復離群索居不相見者動經年歲然則豈惟十日之寒而已乎若是而求萌蘖之暢茂條逹不可得矣故豫切望諸君勿以豫之去留為聚散或五六日八九日雖有俗事相妨亦須破冗一會於此務在誘掖奬勸砥礪切磋使道德仁義之習日親日近則世利紛華之染亦日逺日踈所謂相觀而善百工居肆以成其事者也相會之時尤須虛心遜志相親相敬大抵朋友之交以相下為益或議論未合要在從容涵育相感以誠不得動氣求勝長傲遂非務在默而成之不言而信其或矜己之長攻人之短粗心浮氣矯以沽名訐以為直挾勝心而行憤嫉以圯族敗群為志則雖日講時習於此亦無益矣諸君念之念之書朱守乾卷乙酉黃州朱生守乾請學而歸為書致良知三字夫良知者即所謂是非之心人皆有之不待學而有不待慮而得者也人孰無是良知乎獨有不能致之耳自聖人以至於愚人自一人之心以逹於四海之逺自千古之前以至於萬代之後無有不同是良知也者是所謂天下之大本也致是良知而行則所謂天下之逹道也天地以位萬物以育將富貴貧賤患難夷狄無所入而弗自得也矣書正憲扇乙酉今人病痛大假只是傲千罪百惡皆從傲上來傲則自高自是不肯屈下人故為子而傲必不能孝為弟而傲必不能弟為臣而傲必不能忠象之不仁丹朱之不肖皆只是一傲字便結果了一生做箇極惡大罪的人更無解救得處汝曹為學先要除此病根方才有地步可進傲之反為謙謙字便是對症之藥非但是外貌卑遜須是中心恭敬撙節退讓常見自己不是真能虛己受人故為子而謙斯能孝為弟而謙斯能弟為臣而謙斯能忠堯舜之聖只是謙到至誠處便是允恭克讓溫恭允塞也汝曹勉之敬之其毋若伯魯之簡哉書魏師孟卷乙酉心之良知是謂聖聖人之學惟是致此良知而巳自然而致之者聖人也勉然而致之者賢人也自蔽自昧而不肯致之者愚不肖者也愚不肖者雖其蔽昧之極良知又未嘗不存也苟能致之即與聖人無異矣此良知所以為聖愚之同具而人皆可以為堯舜者以此也是故致良知之外無學矣自孔孟既沒此學失傳幾千百年賴天之靈偶復有見誠千古之一快百世以俟聖人而不惑者也每以啓夫同志無不躍然以喜者此亦可以驗夫良知之同然矣間有聼之而疑者則是支離之習沒溺既久先橫不信之心而然使能姑置其舊見而平氣以繹吾説蓋亦未有不憣然而悔悟者也南昌魏氏兄弟舊學於豫既皆有得於良知之説矣其季良貴師孟因其諸兄而來請其資稟甚頴而意向甚篤然以偕計北上不得久從於此吾雖略以言之而未能悉也故特書此以遺之書朱子禮卷甲申子禮為諸暨宰問政陽明子與之言學而不及政子禮退而者其身懲己之忿而因以得民之所惡也窒己之欲而因以得民之所好也舍己之利而因以得民之所趨也惕己之易而因以得民之所忽也去己之蠧而因以得民之所患也明巳之性而因以得民之所同也三月而政舉嘆曰吾乃今知學之可以為政也巳他日又見而問學陽明子與之言政而不及學子禮退而修其職平民之所惡而因以懲巳之忿也從民之所好而因以窒巳之欲也順民之所趨而因以舍巳之利也警民之所忽而因以惕巳之易也拯民之所患而因以去巳之蠧也復民之所同而因以明己之性也期年而化行嘆曰吾乃今知政之可以為學也巴他日又見而問政與學之要陽明子曰明德親民一也古之人明明德以親其民親民所以明其明德也是故明明德體也親民用也而止至善其要矣子禮退而求至善之説炯然見其良知焉曰吾乃今知學所以為政而政所以為學皆不外乎良知焉信乎止至善其要也矣書林司訓卷丙戊林司訓年七十九矣走數千里謁豫於越豫憫其既老且貧愧無以為濟也嗟乎昔王道之大行也分田制祿四民皆有定制壯者修其孝弟忠信老者衣帛食肉不負戴於道路死徙無出鄉出入相友疾病相扶持烏有耄耋之年而猶走衣食於道路者乎周衰而王迹熄民始有無恆産者然其時聖學尚明士雖貧困猶有固窮之節里閭族黨猶知有相恤之義逮其後世功利之説日浸以盛不復知有明德親民之實士皆巧文博詞以飾詐相規以偽相軋以利外冠裳而內禽獸而猶或自以為從事於聖賢之學如是而𣣔挽而復之三代嗚呼其難哉吾為此懼揭知行合一之説訂致知格物之謬思有以正人心息邪説以求明先聖之學庶幾君子聞大道之要小人蒙至治之澤而嘵嘵者皆視以為狂惑喪心詆笑訾怒豫亦不自知其力之不足日擠於顛危莫之救以死而不顧也不亦悲夫豫過彭澤時嘗憫林之窮使邑令延為社學師至是又失其業於歸也不能有所資給聊書此以遺之書黃夢星卷丁亥潮有處士黃翁保號坦夫者其子夢星來越從豫學越去潮數千里夢星居數月輒一告歸省其父去二三月輒復來如是者屢屢夢星質性溫然善人也而甚孝然稟氣差弱若不任於勞者竊怪其乃不憚道途之阻逺而勤苦無巳也因謂之曰生既聞吾説可以家居養親而從事矣奚必往來跋涉若是乎夢星跽而言曰吾父生長海濱知慕聖賢之道而無所從求入既乃獲見吾鄉之薛楊諸子者得夫子之學與聞其説而樂之乃以責夢星曰吾衰矣吾不希汝業舉以干祿汝但能若數子者一聞夫子之道焉吾雖啜粥飲水死填溝壑無不足也矣夢星是以不逺數千里而來從每歸省求為三月之留以奉菽水不許則求為踰月之留亦不許居未旬日即已具資糧戒童僕促之啓行夢星涕泣以請則責之曰唉兒女子𣣔以是為孝我乎不能黃鵠千里而思為翼下之雛徒使吾心益自苦故亟遊夫子之門者固夢星之本心然不能久留於親側而倐往倐來吾父之命不敢違也豫曰賢哉處士之為父孝哉夢星之為子也勉之哉卒成乃父之志斯可矣今年四月上旬其家忽使人來訃云處士沒矣嗚呼惜哉嗚呼惜哉聖賢之學其久見棄於世也不啻如土苴苟有言論及之則衆共非笑詆斥以為怪物惟世之號稱賢士大夫者乃始或有以之而相講究然至考其立身行己之實與其平日家庭之間所以訓督期望其子孫者則又未嘗不汲汲焉惟功利之為務而所謂聖賢之學者則徒以資其談論粉飾文具於其外如是者常十而八九矣求其誠心一志實以聖賢之學督教其子如處士者可多得乎而今亡矣豈不惜哉豈不惜哉阻逺無由往哭遙寄一奠以致吾傷悼之懷而敘其遣子來學之故若此以風勵夫世之為父兄者亦因以益勵夢星使之務底於有成以無忘乃父之志王文成公全書卷之八終
