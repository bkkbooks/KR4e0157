body:
  text: 語録三傳習録下正德乙亥九川初見先生于龍江先生與甘泉先生論格物之説甘泉持舊説先生曰是求之于外了甘泉曰若以格物理為外是自小其心也九川甚喜舊説之是先生又論盡心一章九川一聞却遂無疑後家居復以格物遺質先生答云但能實地用功久當自釋山間乃自録大學舊本讀之覺朱子格物之説非是然亦疑先生以意之所在為物物字未明己卯歸自京師再見先生于洪都先生兵務倥偬乘隙講授首問近年用功何如九川曰近年體驗得明明德功夫只是誠意自明明德于天下步步推入根源到誠意上再去不得如何以前又有格致工夫後又體驗覺得意之誠偽必先知覺乃可以顔子有不善未嘗知之知之未嘗復行為證豁然若無疑却又多了格物功夫又思來吾心之靈何有不知意之善惡只是物欲蔽了須格去物欲始能如顔子未嘗不知耳又自疑功夫顚倒與誠意不成片假後問希顔希顔曰先生謂格物致知是誠意功夫極好九川曰如何是誠意功夫希顔令再思體看九川終不悟請問先生曰惜哉此可一言而悟惟濬所舉顔子事便是了只要知身心意知物是一件九川疑曰物在外如何與身心意知是一件先生曰耳目口鼻四肢身也非心安能視聽言動心欲視聽言動無耳目口鼻四肢亦不能故無心則無身無身則無心但指其充塞處言之謂之身指其主宰處言之謂之心指心之發動處謂之意指意之靈明處謂之知指意之涉著處謂之物只是一件意未有懸空的必著事物故欲誠意則隨意所在某事而格之去其人欲而歸于天理則良知之在此事者無蔽而得致矣此便是誠意的功夫九川乃釋然破數年之疑又問甘泉近亦信用大學古本謂格物猶言造道又謂窮理如窮其巢穴之窮以身至之也故格物亦只是隨處體認天理似與先生之説漸同先生曰甘泉用功所以轉得來當時與説親民字不須改他亦不信今論格物亦近但不須換物字作理字只還他一物字便是後有人問九川曰今何不疑物字曰中庸曰不誠無物程子曰物來順應又如物各付物胸中無物之類皆古人常用字也他日先生亦云然九川問近年因厭泛濫之學每要靜坐求屏息念慮非惟不能愈覺擾擾如何先生曰念如何可息只是要正曰當自有無念時否先生曰實無無念時曰如此却如何言靜曰靜未嘗不動動未嘗不靜戒謹恐懼即是念何分動靜曰周子何以言定之以中正仁義而主靜曰無欲故靜是靜亦定動亦定的定字主其本體也戒懼之念是活潑地此是天機不息處所謂維天之命于穆不巳一息便是死非本體之念即是私念又問用功收心時有聲色在前如常聞見恐不是專一曰如何欲不聞見除是稿木死灰耳聾目盲則可只是雖聞見而不流去便是曰昔有人靜坐其子隔壁讀書不知其勤惰程子稱其甚敬何如曰伊川恐亦是譏他又問靜坐用功頗覺此心收斂遇事又斷了旋起箇念頭去事上省察事過又尋舊功還覺有內外打不作一片先生曰此格物之説未透心何嘗有內外即如惟濬今在此講論又豈有一心在內照管這聽講説時專敬即是那靜坐時心功夫一貫何須更起念頭人須在事上磨鍊做功夫乃有益若只好靜遇事便亂終無長進那靜時功夫亦差似收斂而實放溺也後在洪都復與于中國裳論內外之説渠皆云物自有內外但要內外並著功夫不可有間耳以質先生曰功夫不離本體本體原無內外只為後來做功夫的分了內外失其本體了如今正要講明功夫不要有內外乃是本體功夫是日俱有省又問陸子之學何如先生曰濂溪明道之後還是象山只還粗些九川曰看他論學篇篇説出骨髓句句似針膏肓却不見他粗先生曰然他心上用過功夫與揣摹依倣求之文義自不同但細看有粗處用功久當見之庚辰往虔州再見先生問近來功夫雖若稍知頭腦然難尋箇穩當快樂處先生曰爾却去心上尋箇天理此正所謂理障此間有箇訣竅曰請問如何曰只是致知曰如何致曰爾那一點良知是爾自家底凖則爾意念著處他是便知是非便知非更暪他一些不得爾只不要欺他實實落落依著他做去善便存惡便去他這裏何等穩當快樂此便是格物的真訣致知的實功若不靠著這些真機如何去格物我亦近年體貼出來如此分明初猶疑只依他恐有不足精細看無些小欠闕在虔與于中謙之同侍先生曰人胸中各有箇聖人只自信不及都自埋倒了因顧于中曰爾胸中原是聖人于中起不敢當先生曰此是爾自家有的如何要推于中又曰不敢先生曰衆人皆有之况在于中却何故謙起來謙亦不得于中乃笑受又論良知在人隨你如何不能泯滅雖盜賊亦自知不當為盜喚他做賊他還忸怩于中曰只是物欲遮蔽良心在內自不會失如雲自蔽日日何嘗失了先生曰于中如此聰明他人見不及此先生曰這些子看得透徹隨他千言萬語是非誠偽到前便明合得的便是合不得的便非如佛家説心印相似真是箇試金石指南針先生曰人若知這良知訣竅隨他多少邪思枉念這裏一覺都自消融真箇是靈丹一粒點鐡成金崇一曰先生致知之旨發盡精藴看來這裏再去不得先生曰何言之易也再用功半年看如何又用功一年看如何功夫愈久愈覺不同此難口説先生問九川于致知之説體驗如何九川曰自覺不同往時操持常不得箇恰好處此乃是恰好處先生曰可知是體來與聽講不同我初與講時知爾只是忽易未有滋味只這箇要妙再體到深處日見不同是無窮盡的又曰此致知二字真是箇千古聖傳之祕見到這裏百世以俟聖人而不惑九川問曰伊川説到體用一原顯微無間處門人已説是泄天機先生致知之説莫亦泄天機太甚否先生曰聖人已指以示人只為後人掩匿我發明耳何故説泄此是人人自有的覺來甚不打緊一般然與不用實功人説亦甚輕忽可惜彼此無益與實用功而不得其要者提撕之甚沛然得力又曰知來本無知覺來本無覺然不知則遂淪埋先生曰大凡朋友須針規指􅎥處少誘掖獎勸意多方是後又戒九川云與朋友論學須委曲謙下寬以居之九川卧病虔州先生云病物亦難格覺得如何對曰功夫甚難先生曰常快活便是功夫九川問自省念慮或涉邪妄或預料理天下事思到極處井井有味便繾綣難屏覺得早則易覺遲則難用力克治愈覺扞格惟稍遷念他事則隨兩忘如此廓淸亦似無害先生曰何須如此只要在良知上著功夫九川曰正謂那一時不知先生曰我這裏自有功夫何緣得他來只為爾功夫斷了便蔽其知既斷了則繼續舊功便是何必如此九川曰直是難鏖雖知丢他不去先生曰須是勇用功久自有勇故曰是集義所生者勝得容易便是大賢九川問此功夫却于心上體驗明白只解書不通先生曰只要解心心明白書自然融會若心上不通只要書上文義通却自生意見有一屬官因久聽講先生之學曰此學甚好只是簿書訟獄繁難不得為學先生聞之曰我何嘗教爾離了簿書訟獄懸空去講學爾既有官司之事便從官司的事上為學才是真格物如問一詞訟不可因其應對無狀起箇怒心不可因他言語圎轉生箇喜心不可惡其囑托加意治之不可因其請求屈意從之不可因自已事務煩冗隨意苟且斷之不可因旁人譛毁羅織隨人意思處之這許多意思皆私只爾自知須精細省察克治惟恐此心有一毫偏倚杜人是非這便是格物致知簿書訟獄之間無非實學若離了事物為學却是著空虔州將歸有詩别先生云良知何事繫多聞妙合當時已種根好惡從之為聖學將迎無處是乾元先生曰若未來講此學不知説好惡從之從箇甚麼敷英在座曰誠然嘗讀先生大學古本序不知所説何事及來聽講許時乃稍知大意于中國裳輩同侍食先生曰凡飲食只是要養我身食了要消化若徒蓄積在肚裏便成痞了如何長得肌膚後世學者博聞多識留滯胸中皆傷食之病也先生曰聖人亦是學知衆人亦是生知問曰何如曰這良知人人皆有聖人只是保全無些障蔽兢兢業業亹亹翼翼自然不息便也是學只是生的分數多所以謂之生知安行衆人自孩提之童莫不完具此知只是障蔽多然本體之知自難泯息雖問學克治也只慿他只是學的分數多所以謂之學知利行黃以方問先生格致之説隨時格物以致其知則知是一節之知非全體之知也何以到得溥博如天淵泉如淵地位先生曰人心是天淵心之本體無所不該原是一箇天只為私欲障礙則天之本體失了心之理無窮盡原是一箇淵只為私欲窒塞則淵之本體失了如今念念致良知將此障礙窒塞一齊去盡則本體巳復便是天淵了乃指天以示之曰比如面前見天是昭昭之天四外見天也只是昭昭之天只為許多房子牆壁遮蔽便不見天之全體若撤去房子牆壁總是一箇天矣不可道眼前天是昭昭之天外面又不是昭昭之天也于此便見一節之知即全體之知全體之知即一節之知總是一箇本體已下門人黃直録先生曰聖賢非無功業節氣但其循著這天理則便是道不可以事功氣節名矣發憤忘食是聖人之志如此真無有已時樂以忘憂是聖人之道如此真無有戚時恐不必云得不得也先生曰我輩致知只是各隨分限所及今日良知見在如此只隨今日所知擴充到底明日良知又有開悟便從明日所知擴充到底如此方是精一功夫與人論學亦須隨人分限所及如樹有這些萌芽只把這些水去灌溉萌芽再長便又加水自拱把以至合抱灌溉之功皆是隨其分限所及若些小萌芽有一桶水在盡要傾上便浸壞他了問知行合一先生曰此須識我立言宗旨今人學問只因知行分作兩件故有一念發動雖是不善然却未曾行便不去禁止我今説箇知行合一正要人曉得一念發動處便即是行了發動處有不善就將這不善的念克倒了須要徹根徹底不使那一念不善潛伏在胸中此是我立言宗旨聖人無所不知只是知箇天理無所不能只是能箇天理聖人本體明白故事事知箇天理所在便去盡箇天理不是本體明後却于天下事物都便知得便做得來也天下事物如名物度數草木鳥獸之類不勝其煩聖人須是本體明了亦何緣能盡知得但不必知的聖人自不消求知其所當知的聖人自能問人如子入太廟每事問之類先儒謂雖知亦問敬謹之至此説不可通聖人于禮樂名物不必盡知然他知得一箇天理便自有許多節文度數出來不知能問亦即是天理節文所在問先生嘗謂善惡只是一物善惡兩端如氷炭相反如何謂只一物先生曰至善者心之本體本體上才過當些子便是惡了不是有一箇善却又有一箇惡來相對也故善惡只是一物直因聞先生之説則知程子所謂善固性也惡亦不可不謂之性又曰善惡皆天理謂之惡者本非惡但于本性上過與不及之間耳其説皆無可疑先生嘗謂人但得好善如好好色惡惡如惡惡臭便是聖人直初時聞之覺甚易後體驗得來此箇功夫著實是難如一念雖知好善惡惡然不知不覺又夾雜去了才有夾雜便不是好善如好好色惡惡如惡惡臭的心善能實實的好是無念不善矣惡能實實的惡是無念及惡矣如何不是聖人故聖人之學只是一誠而巳問修道説言率性之謂道屬聖人分上事修道之謂教屬賢人分上事先生曰衆人亦率性也但率性在聖人分上較多故率性之謂道屬聖人事聖人亦修道也但修道在賢人分上多故修道之謂教屬賢人事又曰中庸一書大抵皆是説修道的事故後面凡説君子説顔淵説子路皆是能修道的説小人説賢知愚不肖説庶民皆是不能修道的其他言舜文周公仲尼至誠至聖之類則又聖人之自能修道者也問儒者到三更時分掃蕩胸中思慮空空靜靜與釋氏之靜只一般兩下皆不用此時何所分别先生曰動靜只是一箇那三更時分空空靜靜的只是存天理即是如今應事接物的心如今應事接物的心亦是循此天理便是那三更時分空空靜靜的心故動靜只是一箇分别不得知得動靜合一釋氏毫釐差處亦自莫掩矣門人在座有動止甚矜持者先生曰人若矜持太過終是有弊曰矜持太過何如有弊曰人只有許多精神若專在容貌上用功則于中心照管不及者多矣有太直率者先生曰如今講此學却外面全不檢束又分心與事為二矣門人作文送友行問先生曰作文字不免費思作了後又一二日常記在懷曰文字思索亦無害但作了常記在懷則為文所纍心中有一物矣此則未可也又作詩送人先生看詩畢謂曰凡作文字要隨我分限所及若説得太過了亦非修辭立誠矣文公格物之説只是少頭腦如所謂察之于念慮之微此一句不該與求之文字之中驗之于事為之著索之講論之際混作一例看是無輕重也問有所忿􅓰一條先生曰忿􅓰幾件人心怎能無得只是不可有耳凡人忿􅓰著了一分意思便怒得過當非廓然太公之體了故有所忿􅓰便不得其正也如今于凡忿􅓰等件只是箇物來順應不要著一分意思便心體廓然太公得其本體之正了且如出外見人相鬪其不是的我心亦怒然雖怒却此心廓然不曾動些子氣如今怒人亦得如此方才是正先生嘗言佛氏不著相其實著了相吾儒著相其實不著相請問曰佛怕父子纍却逃了父子怕君臣纍却逃了君臣怕夫婦纍却逃了夫婦都是為箇君臣父子夫婦著了相便須逃避如吾儒有箇父子還他以仁有箇君臣還他以義有箇夫婦還他以别何曾著父子君臣夫婦的相黃勉叔問心無惡念時此心空空蕩蕩的不知亦須存箇善念否先生曰既去惡念便是善念便復心之本體矣譬如日光被雲來遮蔽雲去光已復矣若惡念既去又要存箇善念即是日光之中添燃一燈已下門人黃修易録問近來用功亦頗覺妄念不生但腔子裏黑窣窣的不知如何打得光明先生曰初下手用功如何腔子裏便得光明譬如奔流濁水才貯在缸裏初然雖定也只是昏濁的須俟澄定既久自然渣滓盡去復得淸來汝只要在良知上用功良知存久黑窣窣自能光明矣今便要責效却是助長不成功夫先生曰吾教人致良知在格物上用功却是有根本的學問日長進一日愈久愈覺精明世儒教人事事物物上去尋討却是無根本的學問方其壯時雖暫能外面修飾不見有過老則精神衰邁終須放倒譬如無根之樹移栽水邊雖暫時鮮好終久要憔悴問志于道一章先生曰只志道一句便含下面數句功夫自住不得譬如做此屋志于道是念念要去擇地鳩材經營成箇區宅據德却是經畫巳成有可據矣依仁却是常常住在區宅內更不離去遊藝却是加些畫采美此區宅藝者義也理之所宜者也如誦詩讀書彈琴習射之類皆所以調習此心使之熟于道也苟不志道而遊藝却如無狀小子不先去置造區宅只管要去買畫挂做門面不知將挂在何處問讀書所以調攝此心不可缺的但讀之之時一種科目意思牽引而來不知何以免此先生曰只要良知真切雖做舉業不為心纍總有纍亦易覺克之而已且如讀書時良知知得強記之心不是即克去之有欲速之心不是即克去之有誇多鬪靡之心不是即克去之如此亦只是終日與聖賢印對是箇純乎天理之心任他讀書亦只是調攝此心而巳何纍之有曰雖蒙開示奈資資庸下實難免纍竊聞窮通有命上智之人恐不屑此不肖為聲利牽纒甘心為此徒自苦耳欲屏棄之又制于親不能舍去奈何先生曰此事歸辭于親者多矣其實只是無志志立得時良知千事萬為只是一事讀書作文安能纍人人自纍于得失耳因嘆曰此學不明不知此處擔閣了幾多英雄漢問生之謂性告子亦説得是孟子如何非之先生曰固是性但告子認得一邊去了不曉得頭腦若曉得頭腦如此説亦是孟子亦曰形色天性也這也是指氣説又曰凡人信口説任意行皆説此是依我心性出來此是所謂生之謂性然却要有過差若曉得頭腦依吾良知上説出來行將去便自是停當然良知亦只是這口説這身行豈能外得氣别有箇去行去説故曰論性不論氣不備論氣不論性不明氣亦性也性亦氣也但須認得頭腦是當又曰諸君功夫最不可助長上智絶少學者無超入聖人之理一起一伏一進一退自是功夫節次不可以我前日用得功夫了今却不濟便要矯強做出一箇沒破綻的模樣這便是助長連前些子功夫都壞了此非小過譬如行路的人遭一蹶跌起來便走不要欺人做那不曾跌倒的樣子出來諸君只要常常懷箇遁世無悶不見是而無悶之心依此良知忍耐做去不管人非笑不管人毁謗不管人榮辱任他功夫有進有退我只是這致良知的主宰不息久久自然有得力處一切外事亦自能不動又曰人若著實用功隨人毁謗隨人欺慢處處得益處處是進德之資若不用功只是魔也終被纍倒先生一日出遊禹穴顧田間禾曰能幾何時又如此長了范兆期在傍曰此只是有根學問能自植根亦不患無長先生曰人孰無根良知即是天植靈根自生生不息但著了私纍把此根戕賊蔽塞不得發生耳一友常易動氣責人先生警之曰學須反已若徒責人只見得人不是不見自已非若能反已方見自已有許多未盡處奚暇責人舜能化得象的傲其機括只是不見象的不是若舜只要正他的姦惡就見得象的不是矣象是傲人必不肯相下如何感化得他是友感悔曰你今後只不要去論人之是非凡當責辨人時就把做一件大已私克去方可先生曰凡朋友問難縱有淺近粗踈或露才揚已皆是病發當因其病而藥之可也不可便懷鄙薄之心非君子與人為善之心矣問易朱子主卜筮程傳主理何如先生曰卜筮是理理亦是卜筮天下之理孰有大于卜筮者乎只為後世將卜筮專主在占卦上看了所以看得卜筮似小藝不知今之師友問答博學審問愼思明辨篤行之類皆是卜筮卜筮者不過求決狐疑神明吾心而已易是問諸天人有疑自信不及故以易問天謂人心尚有所涉惟天不容偽耳黃勉之問無適也無莫也義之與比事事要如此否先生曰固是事事要如此須是識得箇頭腦乃可義即是良知曉得良知是箇頭腦方無執著且如受人餽送也有今日當受的他日不當受的也有今日不當受的他日當受的你若執著了今日當受的便一切受去執著了今日不當受的便一切不受去便是適莫便不是良知的本體如何喚得做義已下門人黃省曽録問思無邪一言如何便蓋得三百篇之義先生曰豈特三百篇六經只此一言便可該貫以至窮古今天下聖賢的話思無邪一言也可該貫此外更有何説此是一了百當的功夫問道心人心先生曰率性之謂道便是道心但著些人的意思在便是人心道心本是無聲無臭故曰微依著人心行去便有許多不安穩處故曰惟危問中人以下不可以語上愚的人與之語上尚且不進况不與之語可乎先生曰不是聖人終不與語聖人的心憂不得人人都做聖人只是人的資質不同施教不可躐等中人以下的人便與他説性説命他也不省得也須謾謾琢磨他起來一友問讀書不記得如何先生曰只要曉得如何要記得要曉得已是落第二義了只要明得自家本體若徒要記得便不曉得若徒要曉得便明不得自家的本體問逝者如斯是説自家心性活潑潑地否先生曰然須要時時用致良知的功夫方才活潑潑地方才與他川水一般若須臾間斷便與天地不相似此是學問極至處聖人也只如此問志士仁人章先生曰只為世上人都把生身命子看得來太重不問當死不當死定要宛轉委曲保全以此把天理却丢去了忍心害理何者不為若違了天理便與禽獸無異便偷生在世上百千年也不過做了千百年的禽獸學者要于此等處看得明白比干龍逢只為他看得分明所以能成就得他的人問叔孫武叔毁仲尼大聖人如何猶不免于毁謗先生曰毁謗自外來的雖聖人如何免得人只貴于自修若自已實實落落是箇聖賢縱然人都毁他也説他不著却若浮雲掩日如何損得日的光明若自已是箇象恭色莊不堅不介的縱然沒一箇人説他他的惡慝終須一日發露所以孟子説有求全之毁有不虞之譽毁譽在外的安能避得只要自修何如爾劉君亮要在山中靜坐先生曰汝若以厭外物之心去求之靜是反養成一箇驕惰之氣了汝若不厭外物復于靜處涵養却好王汝中省曾侍坐先生握扇命曰你們用扇省曾起對曰不敢先生曰聖人之學不是這等捆縳苦楚的不是粧做道學的模樣汝中曰觀仲尼與曾點言志一章略見先生曰然以此章觀之聖人何等寬洪包含氣象且為師者問志于羣弟子三子皆整頓以對至于曾點飄飄然不看那三子在眼自去鼓起瑟來何等狂態及至言志又不對師之問目都是狂言設在伊川或斥罵起來了聖人乃復稱許他何等氣象聖人教人不是箇束縛他通做一般只如狂者便從狂處成就他狷者便從狷處成就他人之才氣如何同得先生語陸元靜曰元靜少年亦要解五經志亦好博但聖人教人只怕人不簡易他説的皆是簡易之規以今人好博之心觀之却似聖人教人差了先生曰孔子無不知而作顔子有不善未嘗不知此是聖學真血脈路何廷仁黃正之李侯璧汝中德洪侍坐先生顧而言曰汝輩學問不得長進只是未立志侯璧起而對曰珙亦願立志先生曰難説不立未是必為聖人之志耳對曰願立必為聖人之志先生曰你真有聖人之志良知上更無不盡良知上留得些子别念挂帶便非必為聖人之志矣洪初聞時心若未服聽説到不覺悚汗先生曰良知是造化的精靈這些精靈生天生地成鬼成帝皆從此出真是與物無對人若復得他完完全全無少虧欠自不覺手舞足蹈不知天地間更有何樂可代一友靜坐有見馳問先生答曰吾昔居滁時見諸生多務知解口耳異同無益于得姑教之靜坐一時窺見光景頗收近效久之漸有喜靜厭動流入枯稿之病或務為玄解妙覺動人聽聞故邇來只説致良知良知明白隨你去靜處體悟也好隨你去事上磨錬也好良知本體原是無動無靜的此便是學問頭腦我這箇話頭自滁州到今亦較過幾畨只是致良知三字無病醫經折肱方能察人病理一友問功夫欲得此知時時接續一切應感處反覺照管不及若去事上周旋又覺不見了如何則可先生曰此只認良知未真尚有內外之間我這裏功夫不由人急心認得良知頭腦是當去朴實用功自會透徹到此便是內外兩忘又何心事不合一又曰功夫不是透得這箇真機如何得他充實光輝若能透得時不由你聰明知解接得來須胸中渣滓渾化不使有毫髮沾帶始得先生曰天命之謂性命即是性率性之謂道性即是道修道之謂教道即是教問如何道即是教曰道即是良知良知原是完完全全是的還他是非的還他非是非只依著他更無有不是處這良知還是你的明師問不睹不聞是説本體戒愼恐懼是説功夫否先生曰此處須信得本體原是不睹不聞的亦原是戒愼恐懼的戒愼恐懼不曾在不睹不聞上加得些子見得真時便謂戒愼恐懼是本體不睹不聞是功夫亦得問通乎晝夜之道而知先生曰良知原是知晝知夜的又問人睡熟時良知亦不知了曰不知何以一呌便應曰良知常知如何有睡熟時曰向晦宴息此亦造化常理夜來天地混沌形色俱泯人亦耳目無所睹聞衆竅俱翕此即良知收斂凝一時天地既開庶物露生人亦耳目有所睹聞衆竅俱闢此即良知妙用發生時可見人心與天地一體故上下與天地同流今人不會宴息夜來不是昏睡即是妄思魘寐曰睡時功夫如何用先生曰知晝即知夜矣日間良知是順應無滯的夜間良知即是收斂凝一的有夢即先兆又曰良知在夜氣發的方是本體以其無物欲之雜也學者要使事物紛擾之時常如夜氣一般就是通乎晝夜之道而知先生曰仙家説到虛聖人豈能虛上加得一毫實佛氏説到無聖人豈能無上加得一毫有但仙家説虛從養生上來佛氏説無從出離生死苦海上來却于本體上加却這些子意思在便不是他虛無的本色了便于本體有障礙聖人只是還他良知的本色更不著些子意在良知之虛便是天之太虛良知之無便是太虛之無形日月風雷山川民物凡有貌象形色皆在太虛無形中發用流行未嘗作得天的障礙聖人只是順其良知之發用天地萬物俱在我良知的發用流行中何嘗又有一物超于良知之外能作得障礙或問釋氏亦務養心然要之不可以治天下何也先生曰吾儒養心未嘗離却事物只順其天則自然就是功夫釋氏却要盡絶事物把心看做幻相漸入虛寂去了與世間若無些子交涉所以不可治天下或問異端先生曰與愚夫愚婦同的是謂同德與愚夫愚婦異的是謂異端先生曰孟子不動心與告子不動心所異只在毫釐間告子只在不動心上著功孟子便直從此心原不動處分曉心之本體原是不動的只為所行有不合義便動了孟子不論心之動與不動只是集義所行無不是義此心自然無可動處若告子只要此心不動便是把捉此心將他生生不息之根反阻撓了此非徒無益而又害之孟子集義工夫自是養得充滿並無餒歉自是縱橫自在活潑潑地此便是浩然之氣又曰孟子病源從性無善無不善上見來性無善無不善雖如此説亦無大差但告子執定看了便有箇無善無不善的性在內有善有惡又在物感上看便有箇物在外却做兩邊看了便會差無善無不善性原是如此悟得及時只此一句便盡了更無有內外之間告子見一箇性在內見一箇物在外便見他于性有未透徹處朱本思問人有虛靈方有良知若草木瓦石之類亦有良知否先生曰人的良知就是草木瓦石的良知若草木瓦石無人的良知不可以為草木瓦石矣豈惟草木瓦石為然天地無人的良知亦不可為天地矣蓋天地萬物與人原是一體其發竅之最精處是人心一點靈明風雨露雷日月星辰禽獸草木山川土石與人原只一體故五榖禽獸之類皆可以養人藥石之類皆可以療疾只為同此一氣故能相通耳先生遊南鎮一友指岩中花樹問曰天下無心外之物如此花樹在深山中自開自落于我心亦何相關先生曰你未看此花時此花與汝心同歸于寂你來看此花時則此花顔色一時明白起來便知此花不在你的心外問大人與物同體如何大學又説箇厚薄先生曰惟是道理自有厚薄比如身是一體把手足捍頭目豈是偏要薄手足其道理合如此禽獸與草木同是愛的把草木去養禽獸又忍得人與禽獸同是愛的宰禽獸以養親與供祭祀燕賔客心又忍得至親與路人同是愛的如簞食豆羮得則生不得則死不能兩全寧救至親不救路人心又忍得這是道理合該如此及至吾身與至親更不得分别彼此厚薄蓋以仁民愛物皆從此出此處可忍更無所不忍矣大學所謂厚薄是良知上自然的條理不可踰越此便謂之義順這箇條理便謂之禮知此條理便謂之智終始是這條理便謂之信又曰目無體以萬物之色為體耳無體以萬物之聲為體鼻無體以萬物之臭為體口無體以萬物之味為體心無體以天地萬物感應之是非為體問夭壽不二先生曰學問功夫于一切聲利嗜好俱能脫落殆盡尚有一種生死念頭毫髮挂帶便于全體有未融釋處人于生死念頭本從生身命根上帶來故不易去若于此處見得破透得過此心全體方是流行無礙方是盡性至命之學一友問欲于靜坐時將好名好色好貨等根逐一搜尋掃除廓淸恐是剜肉做瘡否先生正色曰這是我醫人的方子真是去得人病根更有大本事人過了十數年亦還用得著你如不用且放起不要作壞我的方子是友愧謝少間曰此量非你事必吾門稍知意思者為此説以誤汝在坐者皆悚然一友問功夫不切先生曰學問功夫我已曾一句道盡如何今日轉説轉逺都不著根對曰致良知蓋聞教矣然亦須講明先生曰既知致良知又何可講明良知本是明白實落用功便是不肯用功只在語言上轉説轉糊塗曰正求講明致之之功先生曰此亦須你自家求我亦無别法可道昔有禪師人來問法只把麈尾提起一日其徒將麈尾藏過試他如何設法禪師尋麈尾不見又只空手提起我這箇良知就是設法的麈尾舍了這箇有何可提得少間又一友請問功夫切要先生旁顧曰我麈尾安在一時在坐者皆躍然或問至誠前知先生曰誠是實理只是一箇良知實理之妙用流行就是神其萌動處就是幾誠神幾曰聖人聖人不貴前知禍福之來雖聖人有所不免聖人只是知幾遇變而通耳良知無前後只知得見在的幾便是一了百了若有箇前知的心就是私心就有趨避利害的意邵子必于前知終是利害心未盡處先生曰無知無不知本體原是如此譬如日未嘗有心照物而自無物不照無照無不照原是日的本體良知本無知今却要有知本無不知今却疑有不知只是信不及耳先生曰惟天下至聖為能聰明睿知舊看何等玄妙今看來原是人人自有的耳原是聰目原是明心思原是睿知聖人只是一能之爾能處正是良知衆人不能只是箇不致知何等明白簡易問孔子所謂逺慮周公夜以繼日與將迎不同何如先生曰逺慮不是茫茫蕩蕩去思慮只是要存這天理天理在人心亘古亘今無有終始天理即是良知千思萬慮只是要致良知良知愈思愈精明若不精思漫然隨事應去良知便粗了若只著在事上茫茫蕩蕩去思教做逺慮便不免有毁譽得喪人欲攙入其中就是將迎了周公終夜以思只是戒愼不睹恐懼不聞的功夫見得時其氣象與將迎自别問一日克已復禮天下歸仁朱子作效驗説如何先生曰聖賢只是為已之學重功夫不重效驗仁者以萬物為體不能一體只是已私未忘全得仁體則天下皆歸于吾仁就是八荒皆在我闥意天下皆與其仁亦在其中如在邦無怨在家無怨亦只是自家不怨如不怨天不尤人之意然家邦無怨于我亦在其中但所重不在此問孟子巧力聖智之説朱子云三子力有餘而巧不足何如先生曰三子固有力亦有巧巧力實非兩事巧亦只在用力處力而不巧亦是徒力三子譬如射一能步箭一能馬箭一能逺箭他射得到俱謂之力中處俱可謂之巧但步不能馬馬不能逺各有所長便是才力分限有不同處孔子則三者皆長然孔子之和只到得柳下惠而極淸只到得伯夷而極任只到得伊尹而極何曾加得些子若謂三子力有餘而巧不足則其力反過孔子了巧力只是發明聖知之義若識得聖知本體是何物便自然了先生曰先天而天弗違天即良知也後天而奉天時良知即天也良知只是箇是非之心是非只是箇好惡只好惡就盡了是非只是非就盡了萬事萬變又曰是非兩字是箇大規矩巧處則存乎其人聖人之知如靑天之日賢人如浮雲天日愚人如隂霾天日雖有昏明不同其能辨黑白則一雖昏黑夜裏亦影影見得黑白就是日之餘光未盡處困學功夫亦只從這點明處精察去耳問知譬日欲譬雲雲雖能蔽日亦是天之一氣合有的欲亦莫非人心合有否先生曰喜怒哀懼愛惡欲謂之七情七者俱是人心合有的但要認得良知明白比如日光亦不可指著方所一隙通明皆是日光所在雖雲霧四塞太虛中色象可辨亦是日光不滅處不可以雲能蔽日教天不要生雲七情順其自然之流行皆是良知之用不可分别善惡但不可有所著七情有著俱謂之欲俱為良知之蔽然才有著時良知亦自會覺覺即蔽去復其體矣此處能勘得破方是簡易透徹功夫問聖人生知安行是自然的如何有甚功夫先生曰知行二字即是功夫但有淺深難易之殊耳良知原是精精明明的如欲孝親生知安行的只是依此良知實落盡孝而已學知利行者只是時時省覺務要依此良知盡孝而巳至于困知勉行者蔽錮已深雖要依此良知去孝又為私欲所阻是以不能必須加人一已百人十已千之功方能依此良知以盡其孝聖人雖是生知安行然其心不敢自是肯做困知勉行的功夫困知勉行的却要思量做生知安行的事怎生成得問樂是心之本體不知遇大故於哀哭時此樂還在否先生曰須是大哭一畨了方樂不哭便不樂矣雖哭此心安處即是樂也本體未嘗有動問良知一而巳文王作彖周公繫爻孔子贊易何以各自看理不同先生曰聖人何能拘得死格大要出于良知同便各為説何害且如一園竹只要同此枝節便是大同若拘定枝枝節節都要髙下大小一樣便非造化妙手矣汝輩只要去培養良知良知同更不妨有異處汝輩若不肯用功連笋也不曾抽得何處去論枝節鄉人有父子訟獄請訴於先生侍者欲阻之先生聽之言不終辭其父子相抱慟哭而去柴鳴治入問曰先生何言致伊感悔之速先生曰我言舜是世間大不孝的子瞽瞍是世間大慈的父鳴治愕然請問先生曰舜常自以為大不孝所以能孝瞽瞍常自以為大慈所以不能慈瞽瞍只記得舜是我提孩長的今何不曾豫恱我不知自心已為後妻所移了尚謂自家能慈所以愈不能慈舜只思父提孩我時如何愛我今日不愛只是我不能盡孝日思所以不能盡孝處所以愈能孝及至瞽瞍底豫時又不過復得此心原慈的本體所以後世稱舜是箇古今大孝的子瞽瞍亦做成箇慈父先生曰孔子有鄙夫來問未嘗先有知識以應之其心只空空而已但叩他自知的是非兩端與之一剖決鄙夫之心便已了然鄙夫自知的是非便是他本來天則雖聖人聰明如何可與增減得一毫他只不能自信夫子與之一剖決便已竭盡無餘了若夫子與鄙夫言時留得些子知識在便是不能竭他的良知道體即有二了先生曰蒸蒸乂不格姦本注説象已進進于義不至大為姦惡舜徵庸後象猶日以殺舜為事何大姦惡如之舜只是自進於乂以乂薰蒸不去正他姦惡凡文過掩慝此是惡人常態若要指􅎥他是非反去激他惡性舜初時致得象要殺已亦是要象好的心太急此就是舜之過處經過來乃知功夫只在自已不去責人所以致得克諧此是舜動心忍性增益不能處古人言語俱是自家經􅍓過來所以説得親切遺之後世曲當人情若非自家經過如何得他許多苦心處先生曰古樂不作久矣今之戲子尚與古樂意思相近未逹請問先生曰韶之九成便是舜的一本戲子武之九變便是武王的一本戲子聖人一生實事俱播在樂中所以有德者聞之便知他盡善盡美與盡美未盡善處若後世作樂只是做些詞調于民俗風化絶無關涉何以化民善俗今要民俗反朴還淳取今之戲子將妖淫詞調俱去了只取忠臣孝子故事使愚俗百姓人人易曉無意中感激他良知起來却于風化有益然後古樂漸次可復矣曰洪要求元聲不可得恐于古樂亦難復先生曰你説元聲在何處求對曰古人制管候氣恐是求元聲之法先生曰若要去葭灰黍粒中求元聲却如水底撈月如何可得元聲只在你心上求曰心如何求先生曰古人為治先養得人心和平然後作樂比如在此歌詩你的心氣和平聽者自然恱懌興起只此便是元聲之始書云詩言志志便是樂的本歌永言歌便是作樂的本聲依永律和聲律只要和聲和聲便是制律的本何嘗求之於外曰古人制候氣法是意何取先生曰古人具中和之體以作樂我的中和原與天地之氣相應候天地之氣協鳳凰之音不過去驗我的氣果和否此是成律已後事非必待此以成律也今要候灰管先須定至日然至日子時恐又不準又何處取得準來先生曰學問也要點化但不如自家解化者自一了百當不然亦點化許多不得孔子氣魄極大凡帝王事業無不一一理會也只從那心上來譬如大樹有多少枝葉也只是根本上用得培養功夫故自然能如此非是從枝葉上用功做得根本也學者學孔子不在心上用功汲汲然去學那氣魄却倒做了人有過多於過上用功就是補甑其流必歸於文過今人於喫飯時雖無一事在前其心常役役不寧只緣此心忙慣了所以收攝不住琴瑟簡編學者不可無蓋有業以居之心就不放先生嘆曰世間知學的人只有這些病痛打不破就不是善與人同崇一曰這病痛只是箇好髙不能忘已爾問良知原是中和的如何却有過不及先生曰知得過不及處就是中和所惡於上是良知毋以使下即是致知先生曰蘇秦張儀之智也是聖人之資後世事業文章許多豪傑名家只是學得儀秦故智儀秦學術善揣摸人情無一些不中人肯綮故其説不能窮儀秦亦是窺見得良知妙用處但用之於不善爾或問未發巳發先生曰只緣後儒將未發巳發分説了只得劈頭説箇無未發巳發使人自思得之若説有箇巳發未發聽者依舊落在後儒見解若真見得無未發巳發説箇有未發已發原不妨原有箇未發巳發在問曰未發未嘗不和巳發未嘗不中譬如鐘聲未扣不可謂無既扣不可謂有畢竟有箇扣與不扣何如先生曰未扣時原是驚天動地既扣時也只是寂天寞地問古人論性各有異同何者乃為定論先生曰性無定體論亦無定體有自本體上説者有自發用上説者有自源頭上説者有自流弊處説者總而言之只是這箇性但所見有淺深爾若執定一邊便不是了性之本體原是無善無惡的發用上也原是可以為善可以為不善的其流弊也原是一定善一定惡的譬如眼有喜時的眼有怒時的眼直視就是看的眼微視就是覷的眼總而言之只是這箇眼若見得怒時眼就説未嘗有喜的眼見得看時眼就説未嘗有覷的眼皆是執定就知是錯孟子説性直從源頭上説來亦是説箇大槩如此荀子性惡之説是從流弊上説來也未可盡説他不是只是見得未精耳衆人則失了心之本體問孟子從源頭上説性要人用功在源頭上明徹荀子從流弊説性功夫只在末流上救正便費力了先生曰然先生曰用功到精處愈著不得言語説理愈難若著意在精微上全體功夫反蔽泥了楊慈湖不為無見又著在無聲無臭上見了人一日間古今世界都經過一畨只是人不見耳夜氣淸明時無視無聽無思無作淡然平懷就是羲皇世界平旦時神淸氣朗雍雍穆穆就是堯舜世界日中以前禮儀交會氣象秩然就是三代世界日中以後神氣漸昏往來雜擾就是春秋戰國世界漸漸昏夜萬物寢息景象寂寥就是人消物盡世界學者信得良知過不為氣所亂便常做箇羲皇已上人薛尚謙鄒謙之馬子莘王汝止侍坐因嘆先生自征寧藩已來天下謗議益衆請各言其故有言先生功業勢位日隆天下忌之者日衆有言先生之學日明故為宋儒爭是非者亦日博有言先生自南都以後同志信從者日衆而四方排阻者日益力先生曰諸君之言信皆有之但吾一假自知處諸君俱未道及耳諸友請問先生曰我在南都已前尚有些子鄉願的意思在我今信得這良知真是真非信手行去更不著些覆藏我今才做得箇狂者的胸次使天下之人都説我行不掩言也罷尚謙出曰信得此過方是聖人的真血脈先生煆錬人處一言之下感人最深一日王汝止出遊歸先生問曰遊何見對曰見滿街人都是聖人先生曰你看滿街人是聖人滿街人到看你是聖人在又一日董蘿石出遊而歸見先生曰今日見一異事先生曰何異對曰見滿街人都是聖人先生曰此亦常事耳何足為異蓋汝止圭角未融蘿石恍見有悟故問同答異皆反其言而進之洪與黃正之張叔謙汝中丙戌會試歸為先生道途中講學有信有不信先生曰你們拏一箇聖人去與人講學人見聖人來都怕走了如何講得行須做得箇愚夫愚婦方可與人講學洪又言今日要見人品髙下最易先生曰何以見之對曰先生譬如泰山在前有不知仰者須是無目人先生曰泰山不如平地大平地有何可見先生一言翦裁剖破終年為外好髙之病在座者莫不悚懼癸未春鄒謙之來越問學居數日先生送别于浮峰是夕與希淵諸友移舟宿延夀寺秉燭夜坐先生慨悵不已曰江濤煙柳故人倐在百里外矣一友問曰先生何念謙之之深也先生曰曾子所謂以能問於不能以多問於寡有若無實若虛犯而不較若謙之者良近之矣丁亥年九月先生起復征思田將命行時德洪與汝中論學汝中舉先生教言曰無善無惡是心之體有善有惡是意之動知善知惡是良知為善去惡是格物德洪曰此意如何汝中曰此恐未是究竟話頭若説心體是無善無惡意亦是無善無惡的意知亦是無善無惡的知物是無善無惡的物矣若説意有善惡畢竟心體還有善惡在德洪曰心體是天命之性原是無善無惡的但人有習心意念上見有善惡在格致誠正修此正是復那性體功夫若原無善惡功夫亦不消説矣是夕侍坐天泉橋各舉請正先生曰我今將行正要你們來講破此意二君之見正好相資為用不可各執一邊我這裏接人原有此二種利根之人直從本源上悟入人心本體原是明瑩無滯的原是箇未發之中利根之人一悟本體即是功夫人已內外一齊俱透了其次不免有習心在本體受蔽故且教在意念上實落為善去惡功夫熟後渣滓去得盡時本體亦明盡了汝中之見是我這裏接利根人的德洪之見是我這裏為其次立法的二君相取為用則中人上下皆可引入于道若各執一邊眼前便有失人便於道體各有未盡既而曰已後與朋友講學切不可失了我的宗旨無善無惡是心之體有善有惡是意之動知善知惡的是良知為善去惡是格物只依我這話頭隨人指點自沒病痛此原是徹上徹下功夫利根之人世亦難遇本體功夫一悟盡透此顔子明道所不敢承當豈可輕易望人人有習心不教他在良知上實用為善去惡功夫只去懸空想箇本體一切事為俱不著實不過養成一箇虛寂此箇病痛不是小小不可不早説破是日德洪汝中俱有省先生初歸越時朋友蹤迹尚寥落既後四方來遊者日進癸未年已後環先生而居者比屋如天妃光相諸剎每當一室常合食者數十人夜無卧處更相就席歌聲徹昏旦南鎮禹穴陽明洞諸山逺近寺剎徙足所到無非同志遊寓所在先生每臨講座前後左右環坐而聽者常不下數百人送往迎來月無虛日至有在侍更歲不能遍記其姓名者每臨别先生常嘆曰君等雖别不出在天地間苟同此志吾亦可以忘形似矣諸生每聽講出門未嘗不跳躍稱快嘗聞之同門先輩曰南都以前朋友從遊者雖衆未有如在越之盛者此雖講學日久孚信漸博要亦先生之學日進感召之機申變無方亦自有不同也此後黃以方録黃以方問博學于文為隨事學存此天理然則謂行有餘力則以學文其説似不相合先生曰詩書六藝皆是天理之發見文字都包在其中考之詩書六藝皆所以學存此天理也不特發見于事為者方為文耳餘力學文亦只博學於文中事或問學而不思二句曰此亦有為而言其實思即學也學有所疑便須思之思而不學者蓋有此等人只懸空去思要想出一箇道理却不在身心上實用其力以學存此天理思與學作兩事做故有罔與殆之病其實思只是思其所學原非兩事也先生曰先儒解格物為格天下之物天下之物如何格得且謂一草一木亦皆有理今如何去格縱格得草木來如何反來誠得自家意我解格作正字義物作事字義大學之所謂身即耳目口鼻四肢是也欲修身便是要目非禮勿視耳非禮勿聽口非禮勿言四肢非禮勿動要修這箇身身上如何用得功夫心者身之主宰目雖視而所以視者心也耳雖聽而所以聽者心也口與四肢雖言動而所以言動者心也故欲修身在于體當自家心體常令廓然太公無有些子不正處主宰一正則發竅于目自無非禮之視發竅于耳自無非禮之聽發竅于口與四肢自無非禮之言動此便是修身在正其心然至善者心之本體也心之本體那有不善如今要正心本體上何處用得工必就心之發動處才可著力也心之發動不能無不善故須就此處著力便是在誠意如一念發在好善上便實實落落去好善一念發在惡惡上便實實落落去惡惡意之所發既無不誠則其本體如何有不正的故欲正其心在誠意工夫到誠意始有著落處然誠意之本又在于致知也所謂人雖不知而已所獨知者此正是吾心良知處然知得善却不依這箇良知便做去知得不善却不依這箇良知便不去做則這箇良知便遮蔽了是不能致知也吾心良知既不能擴充到底則善雖知好不能著實好了惡雖知惡不能著實惡了如何得意誠故致知者意誠之本也然亦不是懸空的致知致知在實事上格如意在于為善便就這件事上去為意在于去惡便就這件事上去不為去惡固是格不正以歸於正為善則不善正了亦是格不正以歸於正也如此則吾心良知無私欲蔽了得以致其極而意之所發好善去惡無有不誠矣誠意工夫實下手處在格物也若如此格物人人便做得人皆可以為堯舜正在此也先生曰衆人只説格物要依晦翁何曾把他的説去用我著實曾用來初年與錢友同論做聖賢要格天下之物如今安得這等大的力量因指亭前竹子令去格看錢子早夜去窮格竹子的道理竭其心思至於三日便致勞神成疾當初説他這是精力不足某因自去窮格早夜不得其理到七日亦以勞思致疾遂相與嘆聖賢是做不得的無他大力量去格物了及在夷中三年頗見得此意思乃知天下之物本無可格者其格物之功只在身心上做決然以聖人為人人可到便自有擔當了這裏意思却要説與諸公知道門人有言邵端峯論童子不能格物只教以灑掃應對之説先生曰灑掃應對就是一件物童子良知只到此便教去灑掃應對就是致他這一點良知了又如童子知畏先生長者此亦是他良知處故雖嬉戲中見了先生長者便去作揖恭敬是他能格物以致敬師長之良知了童子自有童子的格物致知又曰我這裏言格物自童子以至聖人皆是此等工夫但聖人格物便更熟得些子不消費力如此格物雖賣柴人亦是做得雖公卿大夫以至天子皆是如此做或疑知行不合一以知之匪艱二句為問先生曰良知自知原是容易的只是不能致那良知便是知之匪艱行之惟艱門人問曰知行如何得合一且如中庸言博學之又説箇篤行之分明知行是兩件先生曰博學只是事事學存此天理篤行只是學之不已之意又問易學以聚之又言仁以行之此是如何先生曰也是如此事事去學存此天理則此心更無放失時故曰學以聚之然常常學存此天理更無私欲間斷此即是此心不息處故曰仁以行之又問孔子言知及之仁不能守之知行却是兩箇了先生曰説及之已是行了但不能常常行已為私欲間斷便是仁不能守又問心即理之説程子云在物為理如何謂心即理先生曰在物為理在字上當添一心字此心在物則為理如此心在事父則為孝在事君則為忠之類先生因謂之曰諸君要識得我立言宗旨我如今説箇心即理是如何只為世人分心與理為二故便有許多病痛如五伯攘夷狄尊周室都是一箇私心便不當理人却説他做得當理只心有未純往往恱慕其所為要來外面做得好看却與心全不相干分心與理為二其流至于伯道之偽而不自知故我説箇心即理要使知心理是一箇便來心上做工夫不去襲義于義便是王道之真此我立言宗旨又問聖賢言語許多如何却要打做一箇曰我不是要打做一箇如曰夫道一而已矣又曰其為物不二則其生物不測天地聖人皆是一箇如何二得心不是一塊血肉凡知覺處便是心如耳目之知視聽手足之知痛癢此知覺便是心也以方問曰先生之説格物凡中庸之愼獨及集義博約等説皆為格物之事先生曰非也格物即愼獨即戒懼至于集義博約工夫只一般不是以那數件都做格物底事以方問尊德性一條先生曰道問學即所以尊德性也晦翁言子靜以尊德性誨人某教人豈不是道問學處多了些子是分尊德性道問學作兩件且如今講習討論下許多工夫無非只是存此心不失其德性而已豈有尊德性只空空去尊更不去問學問學只是空空去問學更與德性無關涉如此則不知今之所以講習討論者更學何事問致廣大二句曰盡精微即所以致廣大也道中庸即所以極髙明也蓋心之本體自是廣大底人不能盡精微則便為私欲所蔽有不勝其小者矣故能細微曲折無所不盡則私意不足以蔽之自無許多障礙遮隔處如何廣大不致又問精微還是念慮之精微是事理之精微曰念慮之精微即事理之精微也先生曰今之論性者紛紛異同皆是説性非見性也見性者無異同之可言矣問聲色貨利恐良知亦不能無先生曰固然但初學用功却須掃除蕩滌勿使留積則適然來遇始不為纍自然順而應之良知只在聲色貨利上用工能致得良知精精明明毫髮無蔽則聲色貨利之交無非天則流行矣先生曰吾與諸公講致知格物日日是此講一二十年俱是如此諸君聽吾言實去用功見吾講一畨自覺長進一畨否則只作一場話説雖聽之亦何用先生曰人之本體常常是寂然不動的常常是感而遂通的未應不是先已應不是後一友舉佛家以手指顯出問曰衆曾見否衆曰見之復以手指入袖問曰衆還見否衆曰不見佛説還未見性此義未明先生曰手指有見有不見爾之見性常在人之心神只在有覩有聞上馳騖不在不覩不聞上著實用功蓋不覩不聞是良知本體戒愼恐懼是致良知的工夫學者時時刻刻常覩其所不覩常聞其所不聞工夫方有箇實落處久久成熟後則不須著力不待防檢而真性自不息矣豈以在外者之聞見為纍哉問先儒謂鳶飛魚躍與必有事焉同一活潑潑地先生曰亦是天地間活潑潑地無非此理便是吾良知的流行不息致良知便是必有事的工夫此理非惟不可離實亦不得而離也無往而非道無往而非工夫先生曰諸公在此務要立箇必為聖人之心時時刻刻須是一棒一條痕一摑一掌血方能聽吾説話句句得力若茫茫蕩蕩度日譬如一塊死肉打也不知得痛癢恐終不濟事回家只尋得舊時伎倆而已豈不惜哉問近來妄念也覺少亦覺不曾著想定要如何用功不知此是工夫否先生曰汝且去著實用工便多這些著想也不妨久久自會妥帖若才下得些功便説效驗何足為恃一友自嘆私意萌時分明自心知得只是不能使他即去先生曰你萌時這一知處便是你的命根當下即去消磨便是立命功夫夫子説性相近即孟子説性善不可專在氣質上説若説氣質如剛與柔對如何相近得惟性善則同耳人生初時善原是同的但剛的習于善則為剛善習于惡則為剛惡柔的習于善則為柔善習于惡則為柔惡便日相逺了先生嘗語學者曰心體上著不得一念留滯就如眼著不得些子塵沙些子能得幾多滿眼便昏天黑地了又曰這一念不但是私念便好的念頭亦著不得些子如眼中放些金玉屑眼亦開不得了問人心與物同體如吾身原是血氣流通的所以謂之同體若于人便異體了禽獸草木益逺矣而何謂之同體先生曰你只在感應之幾上看豈但禽獸草木雖天地也與我同體的鬼神也與我同體的請問先生曰你看這箇天地中間甚麼是天地的心對曰嘗聞人是天地的心曰人又甚麼教做心對曰只是一箇靈明可知充天塞地中間只有這箇靈明人只為形體自間隔了我的靈明便是天地鬼神的主宰天沒有我的靈明誰去仰他髙地沒有我的靈明誰去俯他深鬼神沒有我的靈明誰去辨他吉凶災祥天地鬼神萬物離却我的靈明便沒有天地鬼神萬物了我的靈明離却天地鬼神萬物亦沒有我的靈明如此便是一氣流通的如何與他間隔得又問天地鬼神萬物千古見在何沒了我的靈明便俱無了曰今看死的人他這些精靈遊散了他的天地萬物尚在何處先生起行征思田德洪與汝中追送嚴灘汝中舉佛家實相幻相之説先生曰有心俱是實無心俱是幻無心俱是實有心俱是幻汝中曰有心俱是實無心俱是幻是本體上説功夫無心俱是實有心俱是幻是功夫上説本體先生然其言洪于是時尚未了逹數年用功始信本體功夫合一但先生是時因問偶談若吾儒指點人處不必借此立言耳嘗見先生送二三耆宿出門退坐于中軒若有憂色德洪趨進請問先生曰頃與諸老論及此學真員鑿方柄此道坦如道路世儒往往自加荒塞終身陷荆棘之場而不悔吾不知其何説也德洪退謂朋友曰先生誨人不擇衰朽仁人憫物之心也先生曰人生大病只是一傲字為子而傲必不孝為臣而傲必不忠為父而傲必不慈為友而傲必不信故象與丹朱俱不肖亦只一傲字便結果了此生諸君常要體此人心本是天然之理精精明明無纎介染著只是一無我而巳胸中切不可有有即傲也古先聖人許多好處也只是無我而已無我自能謙謙者衆善之基傲者衆惡之魁又曰此道至簡至易的亦至精至微的孔子曰其如示諸掌乎且人于掌何日不見及至問他掌中多了文理却便不知即如我良知二字一講便明誰不知得若欲的見良知却誰能見得問曰此知恐是無方體的最難捉摸先生曰良知即是易其為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要惟變所適此知如何捉摸得見得透時便是聖人問孔子曰回也非助我者也是聖人果以相助望門弟子否先生曰亦是實話此道本無窮盡問難愈多則精微愈顯聖人之言本自周遍但有問難的人胸中窒礙聖人被他一難發揮得愈加精神若顔子聞一知十胸中丁然如何得問難故聖人亦寂然不動無所發揮故曰非助鄒謙之嘗語德洪曰舒國裳曾持一張𥿄請先生寫拱把之桐􅎚一章先生懸筆為書到至于身而不知所以飬之者顧而笑曰國裳讀書中過狀元來豈誠不知身之所以當養還須誦此以求警一時在侍諸友皆惕然嘉靖戊子冬德洪與王汝中奔師喪至廣信訃告同門約三年收録遺言繼後同門各以所記見遺洪擇其切于問正者合所私録得若千條居吳時將與文録並刻矣適以憂去未遂當是時也四方講學日衆師門宗旨既明若無事于贅刻者故不復營念去年同門曾子才漢得洪手抄復傍為采輯名曰遺言以刻行于荆洪讀之覺當時采録未精乃為刪其重復削去蕪蔓存其三之一名曰傳習續録復刻于寧國之水西精舍今年夏洪來遊蘄沈君思畏曰師門之教久行于四方而獨未及于蘄蘄之士得讀遺言若親炙夫子之教指見良知若重覩日月之光惟恐傳習之不博而未以重復之為繁也請裒其所逸者增刻之若何洪曰然師門致知格物之旨開示來學學者躬修默悟不敢以知解承而惟以實體得故吾師終日言是而不憚其煩學者終日聽是而不厭其數蓋指示專一則體悟日精幾迎于言前神發于言外感遇之誠也今吾師之沒未及三紀而格言微旨漸覺淪晦豈非吾黨身踐之不力多言有
