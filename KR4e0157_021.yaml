front:
  text: 王文成公全書卷之三十二
  hash: sha256:d6654857503612a23ac9515e03585f4eb0a1753599a2d869ba09f7a47346a638
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_021-1a}
body:
  text: 附録一年譜一先生諱守仁字伯安姓王氏其先出晋光禄大夫覽之裔本瑯琊人至曾孫右軍将軍羲之徙居山隂又二十三世廸功郎夀自逹溪徙餘姚今遂為餘姚人夀五世孫綱善鑑人有文武才國𥘉誠意伯劉伯温薦為兵部郎中擢廣東叅議死苗難子彦逹綴羊革褁尸歸是為先生五世祖御史郭純上其事扵朝廟祀增城彦逹號秘湖漁隠生髙祖諱與凖精禮易嘗著易微數千言永樂間朝廷舉遺逸不起號遁石翁曾祖諱世傑人呼爲槐里子以明經貢太學卒祖諱天叙號竹軒魏嘗齋瀚嘗立傳叙其環堵蕭然雅歌豪唫胸次灑落方之陶靖節林和靖所著有竹軒稿江湖雜稿行扵世封翰林院脩撰自槐里子以下兩世皆贈嘉議大夫禮部右侍郎追贈新建伯父諱華字徳輝别號實菴晚稱海日翁嘗讀書龍泉山中又稱為龍山公成化辛丑賜進士及第第一人仕至南京吏部尚書進封新建伯龍山公常思山隂山水佳麗又為先世故居復自姚徙越城之光相坊居之先生甞築室陽明洞洞距越城東南二十里學者咸稱陽明先生云憲宗成化八年壬辰九月丁亥先生生是為九月三十日太夫人鄭娠十四月祖母岑夣神人衣緋玉雲中皷吹送兒授岑岑驚窹已聞啼聲祖竹軒公異之即以雲名鄉人傳其夣指所生樓曰瑞雲樓十有二年丙申先生五歲先生五歲不言一日與群児嬉有神僧過之曰好箇孩児可惜道破竹軒公悟更今名即能言一日誦竹軒公所嘗讀過書訝問之曰聞祖讀時已黙記矣十有七年辛丑先生十歲皆在越是年龍山公舉進士第一甲第一人十有八年壬寅先生十一歲寓京師龍山公迎養竹軒翁因擕先生如京師先生年纔十一翁過金山寺與客酒酣擬賦詩未成先生從傍賦曰金山一點大如拳打破維揚水底天醉倚妙髙臺上月玉簫吹徹洞龍眠客大驚異復命賦蔽月山房詩先生隨口應曰山近月逺覺月小便道此山大扵月若人有眼大如天還見山小月更闊明年就塾師先生豪邁不覊龍山公常懐憂惟竹軒公知之一日與同學生走長安街遇一相士異之曰吾為爾相後湏憶吾言鬚拂領其時入聖境鬚至上丹臺其時結聖胎鬚至下丹田其時聖果圓先生感其言自後毎對書輙靜坐凝思嘗問塾師曰何為第一等事塾師曰惟讀書登第耳先生疑曰登第恐未為第一等事或讀書學聖賢耳龍山公聞之笑曰汝𣣔做聖賢耶二十年甲辰先生十三歲寓京師母太夫人鄭氏卒居䘮哭泣甚哀二十有二年丙午先生十五歲寓京師先生出逰居庸三關即慨然有經畧四方之志詢諸夷種落悉聞備禦䇿逐胡児騎射胡人不敢犯經月始返一日夣謁伏波将軍廟賦詩曰卷甲歸来馬伏波早年兵法鬢毛皤雲埋銅柱雷轟折六字題文尚不磨時畿内石英王勇盗起又聞秦中石和尚劉千斤作亂屢𣣔為書獻扵朝龍山公斥之為狂乃止孝宗弘治元年戊申先生十七歲在越七月親迎夫人諸氏扵洪都外舅諸公養和為江西布政司叅議先生就官署委禽合卺之日偶閑行入鐡柱宫遇道士跌坐一榻即而叩之因聞養生之說遂相與對坐忘歸諸公遣人追之次早始還官署中蓄𥿄數篋先生日取學書比歸數篋皆空書法大進先生嘗示學者曰吾始學書對模古帖止得字形後舉筆不輕落𥿄凝思静慮擬形扵心乆之始通其法既後讀明道先生書曰吾作字甚敬非是要字好只此是學既非要字好又何學也乃知古人隨時隨事只在心上學此心精明字好亦在其中矣後與學者論格物多舉此爲證二年巳酉先生十八歲寓江西十二月夫人諸氏歸餘姚是年先生始慕聖學先生以諸夫人歸舟至廣信謁婁一齋諒語宋儒格物之學謂聖人必可學而至遂深契之明年龍山公以外艱歸姚命從弟冕階宫及妹壻牧相與先生講析經義先生日則隨衆課業夜則搜取諸經子史讀之多至夜分四子見其文字日進嘗愧不及後知之曰彼已㳺心舉業外矣吾何及也先生接人故和易善謔一日悔之遂端坐省言四子未信先生正色曰吾昔放逸今知過矣自後四子亦漸歛容五年壬子先生二十一歲在越舉浙江鄉試是年塲中夜半見二巨人各衣緋緑東西立自言曰三人好作事忽不見已而先生與孫忠烈燧胡尚書世寧同舉其後宸濠之變胡發其奸孫死其難先生平之咸以為竒驗是年為宋儒格物之學先生始侍龍山公于京師徧求考亭遺書讀之一日思先儒謂衆物必有表裏精麄一草一木皆涵至理官署中多竹即取竹格之沉思其理不得遂遇疾先生自委聖賢有分乃隨世就辭章之學明年春㑹試下第縉紳知者咸来慰諭宰相李西涯戲曰汝今歲不第来科必為状元試作来科状元賦先生懸筆立就諸老驚曰天才天才退有忌者曰此子取上第目中無我軰矣及丙辰㑹試果為忌者所抑同舎有以不第為耻者先生慰之曰世以不得第為耻吾以不得第動心為耻識者服之歸餘姚結詩社龍泉山寺致仕方伯魏瀚平時以雄才自放與先生登龍山對奕聮詩有佳句輙為先生得之乃謝曰老夫當退數舎十年丁已先生二十六歲寓京師是年先生學兵法當時邉報甚急朝廷推舉將才莫不遑遽先生念武舉之設僅得騎射搏撃之士而不可以收韜畧統馭之才扵是留情武事凡兵家秘書莫不精究每遇賔宴甞聚果核列陣勢為戯十一年戊午先生二十七歲寓京師是年先生談養生先生自念辭章藝䏻不足以通至道求師友于天下又不數遇心持惶惑一日讀晦翁上宋光宗䟽有曰居敬持志為讀書之本循序致精為讀書之法乃悔前日探討雖愽而未甞循序以致精宜無所得又循其序思得漸漬洽浹然物理吾心終若判而爲二也沉鬱既久舊疾復作益委聖賢有分偶聞道士談養生遂有遺世入山之意十有二年已未先生二十八歲在京師舉進士出身是年春㑹試舉南宫第二人賜二甲進士出身第七人觀政工部䟽陳邉務先生未第時甞夣威寕伯遺以弓劍是秋欽差督造威寕伯王越墳馭役夫以什伍法休食以時睱即驅演八陣圖事竣威寕家以金帛謝不受乃出威寕所佩寳劍為贈適與夣符遂受之時有星變朝廷下詔求言及聞逹虜猖獗先生復命上邉務八事言極剴切十有三年庚申先生二十九歲在京師授刑部雲南清吏司主事十有四年辛酉先生三十歲在京師奉命審録江北先生録囚多所平反事竣遂逰九華作逰九華賦宿無相化城諸寺是時道者蔡蓬頭善談仙待以客禮請問蔡曰尚未有頃屏左右引至後亭再拜請問蔡曰尚未問至再三蔡曰汝後堂後亭禮雖隆终不忘官相一笑而别聞地藏洞有異人坐卧松毛不火食歴嵓險訪之正熟睡先生坐傍撫其足有頃醒驚曰路險何得至此因論最上乗曰周濂溪程明道是儒家兩箇好秀才後再至其人已他移故後有㑹心人逺之歎十有五年壬戍先生三十一嵗在京師八月䟽請告是年先生漸悟仙釋二氏之非先是五月復命京中舊逰俱以才名相馳騁學古詩文先生歎曰吾焉能以有限精神為無用之虚文也遂告病歸越築室陽明洞中行導引術乆之遂先知一日坐洞中友人王思輿等四人来訪方出五雲門先生即命僕迎之且歴語其来蹟僕遇諸途與語良令衆驚異以為得道乆之悟曰此簸弄精神非道也又屏去已而靜乆思離世逺去惟祖母岑與龍山公在念因循未决乆之又忽悟曰此念生扵孩提此念可去是㫁滅種性矣明年遂移疾錢塘西湖復思用世徃来南屏虎跑諸刹有禪僧坐關三年不語不視先生喝之曰這和尚終日口巴巴說甚麽终日眼睁睁㸔甚麽僧驚起即開視對語先生問其家對曰有母在曰起念否對曰不能不起先生即指愛親本性諭之僧涕泣謝明日問之僧已去矣十有七年甲子先生三十三歲在京師秋主考山東鄉試廵按山東監察御史陸偁聘主鄕試試録皆出先生手筆其䇿問議國朝禮樂之制老佛害道由扵聖學不明綱紀不振由扵名器太濫用人太急求效太速及分封清戎禦夷息訟皆有成法録出人占先生經世之學九月改兵部武選清吏司主事十有八年乙丑先生三十四歲在京師是年先生門人始進學者溺扵詞章記誦不復知有身心之學先生首倡言之使人先立必為聖人之志聞者漸覺興起有願執贄及門者至是專志授徒講學然師友之道乆廢咸目以為立異好名惟甘泉湛先生若水時為翰林庶吉士一見定交共以倡明聖學為事武宗正徳元年丙寅先生三十五歲在京師二月上封事下詔獄謫龍埸驛驛丞是時武宗𥘉政奄瑾竊柄南京科道戴銑薄彦徽等以諫忤旨逮繋詔獄先生首抗䟽救之其言君仁臣直銑等以言為責其言如善自宜嘉納如其未善亦宜包容以開忠讜之路乃今赫然下令逺事拘囚在陛下不過少示懲創非有意怒絶之也下民無知妄生疑懼臣切惜之自是而後雖有上關宗社危疑不制之事陛下孰從而聞之陛下聰明超絶苟念及此寕不寒心伏願追收前㫖使銑等仍舊供職擴太公無我之仁明改過不吝之勇聖徳昭布逺邇人民胥恱豈不休㢤䟽入亦下詔獄已而廷杖四十既絶復甦㝷謫貴州龍埸驛驛丞二年丁卯先生三十六歲在越夏赴謫至錢塘先生至錢塘瑾遣人隨偵先生度不免乃托言投江以脫之因附啇船逰舟山偶遇颶風大作一日夜至閩界比登岸奔山徑數十里夜扣一寺求宿僧故不納趨野廟倚香案卧盖虎穴也夜半虎遶廊大吼不敢入黎明僧意必斃于虎将收其囊見先生方熟睡呼始醒驚曰公非常人也不然得無恙乎邀至寺寺有異人甞識于鐡柱宫約二十年相見海上至是出詩有二十年前曾見君今来消息我先聞之句與論出䖏且将逺遁其人曰汝有親在萬一瑾怒逮爾父誣以北走胡南走奥何以應之因為蓍得明夷遂决䇿返先生題詩璧間曰險夷原不滯胸中何異浮雲過太空夜静海濤三萬里月明飛錫下天風因取間道由武夷而歸時龍山公官南京吏部尚書從鄱陽徃省十二月返錢塘赴龍埸驛是時先生與學者講授雖隨地興起未有出身承當以聖學為已任者徐愛先生妹婿也因先生將赴龍埸納贄北面奮然有志于學愛與蔡宗兖朱節同舉鄉貢先生作别三子序以贈之三年戊辰先生三十七歲在貴陽春至龍場先生始悟格物致知龍場在貴州西北萬山叢棘中蛇虺魍魉蠱毒瘴癘與居夷人鴃舌難語可通語者皆中土亡命舊無居始教之範上架木以居時瑾憾未巳自計得失榮辱皆能超脫惟生死一念尚覺未化乃為石墎自誓曰吾惟俟命而已日夜端居澄黙以求静一乆之胸中灑灑而從者皆病自析薪取水作糜飼之又恐其懐抑鬱則與歌詩又不恱復調越曲雜以詼笑始能忘其為疾病夷狄患難也因念聖人䖏此更有何道忽中夜大悟格物致知之㫖窹寐中若有人語之者不覺呼躍從者皆驚始知聖人之道吾性自足向之求理扵事物者誤也乃以黙記五經之言證之莫不脗合因著五經億說居乆夷人亦日来親狎以所居湫濕乃伐木搆龍岡書院及寅賔堂何陋軒君子亭玩易窩以居之思州守遣人至驛侮先生諸夷不平共毆辱之守大怒言諸當道毛憲副科令先生請謝且諭以禍福先生致書復之守慚服水西安宣慰聞先生名使人餽米肉給使令既又重以金帛鞍馬俱辤不受始朝廷議設衛扵水西既置城已而中止驛傳尚存安惡據其腹心𣣔去之以問先生先生遺書折其不可且申朝廷威信令甲議遂寝已而宋氏酋長有阿賈阿札者叛宋氏為地方患先生復以書詆諷之安悚然率所部平其難民頼以寧四年已已先生三十八歲在貴陽提學副使席書聘主貴陽書院是年先生始論知行合一始席元山書提督學政問朱陸同異之辨先生不語朱陸之學而告之以其所悟書懐疑而去明日復来舉知行本體證之五經諸子漸有省徃復數四豁然大悟謂聖人之學復覩扵今日朱陸異同各有得失無事辯詰求之吾性本自明也遂與毛憲副脩葺書院身率貴陽諸生以所事師禮事之後徐愛因未㑹先生知行合一之訓决扵先生先生曰試舉㸔愛曰如今人已知父當孝兄當弟矣廼不能孝弟知與行分明是两事先生曰此𬒳私欲隔㫁耳非本體也聖賢教人知行正是要人復本體故大學指出真知行以示人曰如好好色如惡惡臭夫見好色属知好好色属行只見色時已是好矣非見後而始立心去好也聞惡臭属知惡惡臭属行只聞臭時已是惡矣非聞後而始立心去惡也又如稱某人知孝某人知弟必其人已曾行孝行弟方可稱他知孝知弟此便是知行之本體愛曰古人分知行為二恐是要人用工有分暁否先生曰此正失却古人宗㫖某甞説知是行之主意行實知之功夫知是行之始行實知之成已可理㑹矣古人立言所以分知行為二者縁世間有一種人懵懵然任意去做全不觧思惟省察是之為冥行妄作所以必說知而後行無繆又有一種人茫茫然懸空去思索全不肯着實躬行是之為揣摸影響所以必說行而後知始真此是古人不得已之教若見得時一言足矣今人却以為必先知然後能行且講習討論以求知俟知得真時方去行故遂終身不行亦遂終身不知某今説知行合一使學者自求本體庶無支離决裂之病五年庚午先生三十九嵗在吉陞廬陵縣知縣先生三月至廬陵為政不事威刑惟以開導人心為本蒞任𥘉首詢里役察各鄉貧富奸良之實而低昻之獄牒盈庭不即㫁射稽國𥘉舊制慎選里正三老坐申明亭使之委曲勸諭民胥悔勝氣嚚訟至有涕泣而歸者由是囹圄日清在縣七閱月遺告示十有六大抵諄諄慰父老使教子弟母令蕩僻城中失火身禱返風以血禳火而火即滅因使城中闢火巷定水次兊運絶鎮守橫征杜神㑹之借辦立保甲以弭盗清驛逓以延賔旅至今數十年猶踵行之語學者悟入之功先是先生赴龍埸時隨地講授及歸過常徳辰州見門人冀元亨蔣信劉觀時軰俱能卓立喜曰謫居两年無可與語者歸途乃幸得諸友悔昔在貴陽舉知行合一之教紛紛異同罔知所入兹来乃與諸生静坐僧寺使自悟性體顧恍恍若有可即者既又途中寄書曰前在寺中所云静坐事非𣣔坐禪入定也蓋因吾軰平日為事物紛拏未知為已欲以此𥙷小學收放心一叚功夫耳明道云纔學便湏知有用力䖏既學便湏知有得力䖏諸友宜扵此䖏着力方有進歩異時始有得力處也冬十有一月入覲先生入京舘扵大興隆寺時黄宗賢綰為後軍都督府都事因儲柴墟巏請見先生與之語喜曰此學乆絶子何所聞對曰雖粗有志實未用功先生曰人惟患無志不患無功明日引見甘泉訂與终日共學按宗賢至嘉靖壬午春復執贄稱門人十有二月陞南京刑部四川清吏司主事論實踐之功先生與黄綰應良論聖學久不明學者欲爲聖人必湏廓清心體使纎翳不留真性始見方有操持涵養之地應良疑其難先生曰聖人之心如明鏡纎翳自無所容自不消磨刮若常人之心如斑垢駁蝕之鏡湏痛刮磨一畨盡去駁蝕然後纎塵即見纔拂便去亦不消費力到此已是識得仁體矣若駁蝕未去其間固自有一點明䖏塵埃之落固亦見得纔拂便去至于堆積扵駁蝕之上終弗之能見也此學利困勉之所由異幸勿以為難而疑之也凡人情好易而惡難其間亦自有私意氣習纏蔽在識破後自然不見其難矣古之人至有出萬死而樂為之者亦見得耳向時未見得裏面意思此功夫自無可講䖏今已見此一層却恐好易惡難便流入禪釋去也按先生立教皆經實踐故所言懇篤若此自掲良知宗㫖後吾黨又覺領悟太易認虚見為真得無復向裏着已之功矣故吾黨頴悟承速者徃徃多無成甚可憂也六年辛未先生四十歲在京師正月調吏部驗封清吏司主事論晦菴象山之學王輿菴讀象山書有契徐成之與辯不决先生曰是朱非陸天下論定乆矣乆則難變也雖微成之之争輿菴亦豈能遽行其說乎成之謂先生漫為含糊兩解君有以隂助輿菴而為之地者先生以書解之曰輿菴是象山而謂其專以尊徳性為主今觀象山文集所載未甞不教其徒讀書而自謂理㑹文字頗與人異者則其意實𣣔體之扵身其亟所稱述以誨人者曰居䖏恭執事敬與人忠曰克已復禮曰萬物皆備扵我反身而誠樂莫大焉曰學問之道無他求其放心而已曰先立乎其大者而小者不能奪是數言者孔子孟軻之言也烏在其為空虚乎獨其易簡覺悟之説頗為當時所疑然易簡之説出扵繋辭覺悟之説雖有同于釋氏然釋氏之說亦自有同于吾儒而不害其為異者惟在扵㡬㣲毫忽之間而已亦何必諱扵其同而遂不敢以言狃扵其異而遂不以察之乎是輿菴之是象山固猶未盡其所以是也吾兄是晦菴而謂其專以道問學為事然晦菴之言曰居敬窮理曰非存心無以致知曰君子之心常存敬畏雖不見聞亦不敢忽所以存天理之本然而不使離扵湏臾之頃也是其為言雖未盡瑩亦何甞不以尊徳性為事而又烏在其為支離乎獨其平日汲汲扵訓解雖韓文楚辭隂符参同之屬亦必與之註釋考辯而論者遂疑玩物又其心慮恐學者之躐等而或失之扵妄作必先之以格致而無不明然後有以實之扵誠正而無所謬世之學者掛一漏萬求之愈煩而失之愈逺至有弊力終身苦其難而卒無所入而遂議其支離不知此乃後世學者之弊而當時晦菴之自為則亦豈至是乎是吾兄之是晦菴固猶未盡其所以是也夫二兄之所信而是者既未盡其所以是則其所疑而非者亦豈盡其所以非乎僕甞以為晦菴之與象山雖其所以為學者若有不同而要皆不失爲聖人之徒今晦菴之學天下之人童而習之既已入人之深有不容扵論辯者而獨惟象山之學則以其甞與晦菴之有言而遂藩籬之使若由賜之殊科焉則可矣而遂擯放廢斥若碔砆之與美玉則豈不過甚矣乎故僕甞𣣔冐天下之譏以爲象山一暴其説雖以此得罪無恨晦菴之學既已章明扵天下而象山猶蒙無實之誣于今且四百年莫有為之一洗者使晦菴有知将亦不能一日安享扵廟廡之間矣此僕之至情终亦必為兄一吐露者亦何肯漫為两解之説以隂助于輿菴已乎二月爲㑹試同考試官是年僚友方獻夫受學獻夫時為吏部郎中位在先生上比聞論學深自感悔遂執贄事以師禮是冬告病歸西樵先生為叙别之十月陞文選清吏司員外郎送甘泉奉使安南先是先生陞南都甘泉與黄綰言扵冡宰楊一清改留吏部職事之暇始遂講聚方期各相砥切飲食啓䖏必共之至是甘泉出使安南封國将行先生懼聖學難明而易惑人生别易而㑹難也乃為文以贈畧曰顔子沒而聖人之學亡曾子唯一貫之㫖傳之孟軻絶又二千餘年而周程續自是而後言益詳道益晦孟氏患楊墨周程之際釋老大行今世學者皆知尊孔孟賤楊墨擯釋老聖人之道若大明扵世然吾從而求之聖人不得而見之矣其能有若墨氏之兼愛者乎其能有若楊氏之為我者乎其能有若老氏之清浄自守釋氏之究心性命者乎吾何以楊墨老釋之思㢤彼扵聖人之道異然猶有自得也而世之學者章繪句琢以誇俗詭心色取相餙以偽謂聖人之道勞苦無功非復人之所可為而徒取辯扵言辭之間古之人有終身不能究者今吾皆能言其畧自以爲若是亦足矣而聖人之學遂廢則今之所大患者豈非記誦辭章之習而弊之所從来無亦言之太詳析之太精者之過歟某㓜不問學䧟溺扵邪僻者二十年而始究心扵老釋賴天之靈因有所覺始乃沿周程之説求之而若有得焉顧一二同志之外莫予冀也岌岌乎仆而復興晚得扵甘泉湛子而後吾之志益堅毅然若不可遏則予之資扵甘泉多矣甘泉之學務求自得者也世未之能知其知者且疑其為禪誠禪也吾猶未得而見而况其所志卓爾君此則如甘泉者非聖人之徒歟多言又烏足病也夫多言不足以病甘泉與甘泉之不為多言病也吾信之吾與甘泉有意之所在不言而㑹論之所及不約而同期扵斯道斃而後已者今日之别吾容無言夫惟聖人之學難明而易惑習俗之降愈下而抑不可囬任重道逺雖巳無俟扵言顧復扵吾心若有不容已也則甘泉亦豈以予言為綴乎七年壬申先生四十一歲在京師三月陞考功清吏司郎中按同志考是年穆孔暉顧應祥鄭一𥘉方獻科王道梁穀萬潮陳鼎唐鵬路迎孫瑚魏廷霖蕭鳴鳳林逹陳洸及黄綰應良朱節蔡宗兖徐愛同受業十二月陞南京太僕寺少卿便道歸省與徐愛論學愛是年以祁州知州考滿進京陞南京工部員外郎與先生同舟歸越論大學宗㫖聞之踴躍痛快如狂如醒者數日胸中混沌復開仰思尭舜三王孔孟千聖立言人各不同其㫖則一今之傳習録所載首卷是也其自叙云愛因舊說汨沒始聞先生之教實駭愕不定無入頭䖏其後聞之既久漸知反身實踐然後始信先生之學爲孔門嫡傳舎是皆傍蹊小徑㫁港絶河矣如説格物是誠意功夫明善是誠身功夫窮理是盡性功夫道問學是尊徳性功夫博文是約禮功夫惟精是惟一功夫諸如此類皆落落難合其後思之既乆不覺手舞足蹈八年癸酉先生四十二歲在越二月至越先生𥘉計至家即與徐愛同逰台蕩宗族親友絆弗能行五月终與愛数友期候黄綰不至乃從上虞入四明觀白水㝷龍谿之源登杖錫至雪竇上千丈巖以望天姥華頂𣣔遂從奉化取道赤城適乆旱山田盡龜折慘然不樂遂自寧波還餘姚綰以書迎先生復書曰此行相從諸友亦微有所得然無大發明其最所歉然宗賢不同茲行耳後軰習氣巳深雖有美質亦漸消盡此事正如淘沙㑹有見金時但目下未可必得耳先生茲逰雖為山水實注念愛綰二子盖先生點化同志多得之登逰山水間也冬十月至滁州滁山水佳勝先生督馬政地僻官閑日與門人逰遨瑯琊瀼泉間月夕則環龍潭而坐者數百人歌聲振山谷諸生隨地請正踴躍歌舞舊學之士皆日来臻扵是從逰之衆自滁始孟源問静坐中思慮紛雜不能强禁絶先生曰紛雜思慮亦强禁絶不得只就思慮萌動䖏省察克治到天理精明後有箇物各付物的意思自然精專無紛雜之念大學所謂知止而後有定也九月甲戍先生四十三歲在滁四月陞南京鴻臚寺卿滁陽諸友送至烏衣不能别留居江浦候先生渡江先生以詩促之歸曰滁之水入江流江潮日復来滁州相思若潮水来徃何時休空相思亦何益𣣔慰相思情不如崇令徳掘地見泉水隨䖏無弗得何必驅馳為千里逺相即君不見尭羔與舜墻又不見孔與蹠對面不相識逆旅主人多慇懃出門轉盻成路人五月至南京自徐愛来南都同志日親黄宗明薛侃馬明衡陸澄季本許相卿王激諸偁林逹張寰唐愈賢饒文璧劉觀時鄭騮周積郭慶欒惠劉暁何鰲陳傑楊杓白説彭一之朱箎軰同聚師門日夕漬礪不懈客有道自滁游學之士多放言髙論亦有漸背師教者先生曰吾年来欲懲末俗之卑汚引接學者多就髙明一路以救時弊今見學者漸有流入空虚為脱落新竒之論吾已悔之矣故南畿論學只教學者存天理去人欲為省察克治實功王嘉秀蕭惠好談仙佛先生嘗警之曰吾㓜時求聖學不得亦甞篤志二氏其後居夷三載始見聖人端緒悔錯用功二十年二氏之學其妙與聖人只有毫釐之間故不易辨惟篤志聖學者始能究析其隱微非測億所及也十年乙亥先生四十四嵗在京師正月䟽自陳不允是年當两京考察例上䟽立再從子正憲為後正憲字仲肅季叔易直先生兖之孫西林守信之第五子也先生年四十四與諸弟守儉守文守章俱未舉子故龍山公為先生擇守信子正憲立之時年八齡是年御史楊典薦改祭酒不報八月擬諌迎佛䟽時命太監劉允烏思藏齎幡供諸佛奉迎佛徒允奏請鹽七萬引以為路費許之輔臣楊廷和等與户部及言官各䟽執奏不聼先生欲因事納忠擬疏𣣔上後中止疏請告是年祖母岑太夫人年九十有六先生思乞恩歸一見為訣疏凡再上矣故辭甚懇切十有一年丙子先生四十五歲在南京九月陞都察院左僉都御史廵撫南贛汀漳等䖏是時汀漳各郡皆有巨㓂尚書王瓊特舉先生十月歸省至越王思輿語季本曰陽明此行必立事功本曰何以知之曰吾觸之不動矣十有二年丁丑先生四十六歲正月至贛先生過萬安遇流賊數百沿途肆劫商舟不敢進先生乃聮商舟結爲陣勢揚旗鳴鼓如趨戰状賊乃羅拜于岸呼曰饑荒流民乞求賑濟先生泊岸令人諭之曰至贛後即差官撫挿各安生理毋作非爲自取戮滅賊懼散歸以是年正月十六日開府行十家牌法先是贛民爲洞賊耳目官府舉動未形而賊已先聞軍門一老􅊢奸尤甚先生偵知之呼入卧室使之自擇生死􅊢乃輸情吐實先生許其不死試所言悉驗乃扵城中立十家牌法其法編十家爲一牌開列各户籍貫姓名年貌行業日輪一家沿門按牌審察遇面生可疑人即行報官究理或有隱匿十家連坐仍告諭父老子弟務要父慈子孝兄愛弟敬夫和婦隨長惠㓜順小心以奉官法勤謹以辦國課恭儉以守家業謙和以䖏鄉里心要平恕毋得輕易忿爭事要含忍毋得輙興詞訟見善互相勸勉有悪互相懲戒務興禮讓之風以成敦厚之俗選民兵先生以南贛地連四省山險林深盗賊盤據三居其一窺伺剽掠大為民患當事者毎遇盗賊猖獗輙復㑹奏請調上軍狼逹徃返經年糜費逾萬逮至集兵舉事即已魍魉潜形班師旋旅則又䑕狐聚黨是以機冝屢失而備禦益弛先生乃使四省兵備官扵各屬弩手打手機快等項挑選驍勇絶群膽力出衆者毎縣多或十餘人少或八九人務求魁傑或懸召募大約江西福建二兵備各以五六百名為率廣東湖廣二兵備各以四五百名為率中間更有出衆者優其廪餼署為将領除南贛兵備自行編選餘四兵備官仍扵毎縣原額數内揀選可用者量留三分之二委詼縣賢能官統練專以守城防隘為事其餘一分楝退疲弱不堪者免其着役止出工食追解該道以益募賞所募精兵專隨各兵備官屯劄别選官分隊統押教習之如此則各縣屯戍之兵既足以護守防截而兵備募召之士又可以應變出竒盗賊漸知所畏平良益有所恃而無恐矣二月平漳宼𥘉先生道聞漳宼方熾兼程至贛即移文三省兵備剋期起兵自正月十六日蒞任纔旬日即議進兵兵次長富村遇賊大戰斬獲頗多賊奔象湖山拒守我兵追至蓮花石與賊對壘㑹廣東兵至方欲合圍賊見勢急遂潰圍而出指揮覃桓縣丞紀鏞馬䧟死之諸将請調狼兵俟秋再舉先生乃責以失律罪使立功自贖諸將議猶未决先生曰兵宜隨時變在呼吸豈宜各持成說耶福建諸軍稍緝咸有立功贖罪心利在速戰若當集謀之始即掩賊不備成功可必今既聲勢彰聞各賊必聮黨設械以禦我師且宜示以寛懈而猶執乗機之説以張皇扵外是徒知吾卒之可撃而不知敵之未可撃也廣東之兵意在倚重狼逹土軍然後舉事諸賊亦候吾土兵之集以卜戰期乗此機候正可奮怯為勇變弱為强而猶執持重之説以坐失事機是徒知吾卒之未可撃而不知敵之正可撃也善用兵者因形而借勝扵敵故其戰勝不復而應形扵無窮勝負之算間不容髪烏可執滯㢤扵是親率諸道銳卒進屯上杭宻敕群哨佯言犒衆退師俟秋再舉宻遣義官曾崇秀覘賊虚實乗其懈選兵分三路俱扵二月十九日乗晦夜㗸枚並進直搗象湖奪其隘口諸賊失險復據上層峻壁四面滚木礧石以死拒戰我兵奮勇鏖戰自辰至午呼聲振地三省竒兵從間鼓噪突登乃驚潰奔走遂乗勝追勦已而福建兵攻破長富村等巢三十餘所廣東兵攻破水竹大重坑等巢一十三所斬首從賊詹師富温火焼等七千有竒俘獲賊属輜重無算而諸洞蕩滅是役僅三月漳南數十年逋宼悉平是月奏捷具言福建僉事胡璉叅政陳䇿副使唐澤知府鍾湘廣東僉事顧應祥都指揮楊懋知縣張戬劳績賜敕奨賚其餘陞賞有差𥘉議進兵諭諸將曰賊雖據險而守尚可出其不意掩其不備則用鄧艾破蜀之䇿從間道以出若賊果盤據持重可以計困難以兵尅則用充國破羗之謀減冗兵以省費務在防隱禍于顯利之中絶深奸扵意料之外此萬全無失者也已而桓等狃扵小勝不從間道故違節制以致挫䘐諸将志沮遂請濟師先生獨以為見兵二十有餘已為不少不宜坐待濟師以自懈遥制以失機也遂親督兵而出卒成功四月班師時三月不雨至于四月先生方駐軍上杭禱于行臺得雨以爲未足及班師一雨三日民大恱有司請名行䑓之堂曰時雨堂取王師若時雨之義也先生乃爲記五月立兵符先生謂習戰之方莫要扵行伍治衆之法莫先扵分數将調集各兵毎二十五人編爲一伍伍有小甲五十人爲一隊隊有總甲二百人爲一哨哨有長有恊哨二人四百人爲一營營有官有叅謀二人一千二百人爲一陣陣有偏將二千四百人爲一軍軍有副将偏将無定貟臨事而設小甲扵各伍之中選才力優者爲之總甲扵小甲之中選才力優者爲之哨長扵千百户義官之中選材識優者爲之副将得以罰偏将偏将得以罰營官營官得以罰哨長哨長得以罰總甲總甲得以罰小甲小甲得以罰伍衆務使上下相維大小相承如身之使臂臂之使指自然舉動齊一治衆如寡庶㡬有制之兵矣編選既定仍毎五人給一牌備列同伍二十五人姓名使之連絡習熟謂之伍符毎隊各置兩牌編立字號一付總甲一藏本院謂之隊符毎哨各置两牌編立字號一付哨長一藏本院謂之哨符毎營各置两牌編立字號一付營官一藏本院謂之營符凡遇征調發符比號而行以防奸偽其諸緝養訓練之方旗皷進退之節務濟實用行之奏設平和縣移枋頭廵檢司先生以賊據險久爲民患今幸破滅湏爲拊背扼吭之䇿乃奏請設平和縣治于河頭移河頭廵檢司于枋頭盖以河頭爲諸巢之咽喉而枋頭又河頭之唇齒也且曰方賊之據河頭也窮兇極惡至動三軍之衆合二省之力而始克蕩平若不及今爲乆逺之圖不過數年勢将復起後悔無及矣盖盗賊之患譬諸病人興師征討者針藥攻治之方建縣撫輯者飲食調攝之道徒恃攻治而不務調攝則病不旋踵後雖扁鵲倉公無所施其術也按是月聞蔡宗兖許相卿季本薛侃陸澄同舉進士先生曰入仕之始意况未免揺動如絮在風中若非粘泥貼網亦自主張未得不知諸友却何如想平時工夫亦湏有得力䖏耳又聞曰仁在告買田霅上爲諸友乆聚之計遺二詩慰之六月䟽請䟽通鹽法始都御史陳金以流賊軍餉扵贛州立厰抽分廣鹽許至袁臨吉三府發賣然起正徳六年至九年而止至是先生以勅諭有便冝䖏置語䟽請暫行待平定之日仍舊停止從之九月改授提督南贛汀漳等䖏軍務給旗牌得便宜行事南贛舊止以廵撫蒞之至都御史周南㑹請旗牌事畢􅌳還不為定制至是先生䟽請遂有提督之命後不復更䟽以我國家有罰典有賞格然罰典止行于參提之後而不行于臨陣對敵之時賞格止行于大軍征勦之日而不行扵㝷常用兵之際故無成功今後凡遇討賊領兵官不拘軍衛有司所領兵衆有退縮不用命者許領兵官軍前以軍法從事領兵官不用命者許總統官軍前以軍法從事所領兵衆有對敵擒斬功次或赴敵陣亡從實具報覆實奏聞陞賞如制若生擒賊徒問明即押赴市曹斬之以狥庶使人知警畏亦可比于令典决不待時者如此則賞罰既明人心激勵盗起即得撲滅糧餉可省事功可建又曰古者賞不踰時罰不後事過時而賞與無賞同後事而罰與不罰同况過時而不賞後事而不罰其何以齊一人心作興士氣雖使韓白為将亦不能有所成誠得以大軍誅賞之法責而行之扵平時假臣等令旗令牌便宜行事如是而兵有不精賊有不滅臣等亦無以逃其死矣事下兵部尚書王瓊覆奏以為宜從所請扵是改廵撫為提督得以軍法從事欽給旗牌八面悉聽便宜既而鎮守太監畢眞謀于近倖請監其軍瓊奏以為兵法最忌遥制若使南贛用兵而必待謀扵省城鎮守㫁乎不可惟省城有警則聽南贛䇿應事遂寝按敕諭有曰江西南安贛州也方與福建汀漳二府廣東南韶潮惠四府及湖廣郴州桂陽縣壌地相接山嶺相連其間盗賊不時生發東追則西竄南捕則北奔盖因地方各省事無統屬彼此推調難為䖏置先年甞設有都御史一員廵撫前項地方就令督勦盗賊但責任不專類多因循苟且不能申明賞罰以勵人心致令盗賊滋多地方受禍今日所奏及各該部覆奏事理特改命爾提督軍務撫安軍民脩理城池禁革奸弊一應軍馬錢糧事宜但聽便宜區畫以足軍餉但有盗賊生發即便設法調兵勦殺不許踵襲舊弊招撫蒙蔽重為民患其管領兵快人等官員不問文職武職若在軍前違期并逗遛退縮者俱聽軍法從事生擒盗賊鞠問明白亦聼就行斬首示衆撫諭賊巢是時漳宼雖平而樂昌龍川諸賊巢尚多嘯聚将用兵勦之先犒以牛酒銀布復諭之曰人之所共恥者莫過扵身𬒳為盗賊之名人心之所共憤者莫過扵身遭刼掠之苦今使有人罵爾等為盗爾必憤然而怒又使人焚爾室廬刼爾財貨掠爾妻女爾必懐恨切骨寧死必報爾等以是加人人其有不怨者乎人同此心爾寧獨不知乃必𣣔為此其間想亦有不得已者或是為官府所迫或是為大户所侵一時錯起念頭誤入其中後遂不敢出此等苦情亦甚可憫然亦皆由爾等悔悟不切耳爾等當時去做賊時是生人㝷死路尚且要去便去今𣣔改行從善是死人求生路乃反不敢耶若爾等肯如當𥘉去做賊時拚死出来求要改行從善我官府豈有必要殺汝之理爾等乆習惡毒忍扵殺人心多猜疑豈知我上人之心無故殺一鷄犬尚且不忍况扵人命關天若輕易殺之㝠㝠之中㫁有還報殃禍及扵子孫何苦而必欲為此我毎為爾等思念及此輙至扵終夜不能安寝亦無非欲為爾等㝷一生路惟是爾等㝠頑不化然後不得已而興兵此則非我殺之乃天殺之也今謂我全無殺人之心亦是誑爾若謂必欲殺爾又非吾之本心爾等今雖從惡其始同是朝廷赤子譬如一父母同生十子八人為善二人背逆要害八人父母之心湏去二人然後八人得以安生均之為子父母之心何故必𣣔偏殺二子不得已也吾扵爾等亦正如此若此二子者一旦悔惡遷善號泣投誠為父母者亦必哀憫而赦之何者不忍殺其子者乃父母之本心也今得遂其本心何喜何幸如之吾扵爾等亦正如此聞爾等為賊所得苦亦不多其間尚有衣食不充者何不以爾爲賊之勤苦精力而用之扵耕農運之扵商賈可以坐致饒富而安享逸樂放心縦意逰觀城市之中優㳺田野之内豈如今日出則畏官避讐入則防誅懼勦潜形遁跡憂苦終身卒之身滅家破妻子戮辱亦有何好乎爾䓁若能聽吾言改行從善吾即視爾爲良民更不追爾舊惡若習性已成難更改動亦由爾等任意爲之吾南調两廣之狼逹西調湖湘之土兵親率大軍圍爾巢穴一年不盡至扵两年两年不盡至于三年爾之財力有限吾之兵糧無窮縦爾等皆為有翼之虎諒亦不能迯扵天地之外矣嗚呼民吾同胞爾等皆吾赤子吾终不䏻撫恤爾等而至扵殺爾痛㢤痛哉興言至此不覺淚下按是諭文藹然哀憐無辜之情可以想見虞廷干羽之化矣故當時酋長若黄金巢盧珂等即率衆来投碩效死以報疏謝陞賞朝廷以先生平漳宼功陞一級銀二十两紵絲二表裏降敕奨勵故有謝疏疏䖏南贛商稅始南安稅商貨于折梅亭以資軍餉後多奸弊仍併府北龜角尾以䟽聞十月平横水桶岡諸宼南贛西接湖廣桂陽有桶岡横水諸賊巢南接廣東樂昌東接廣東龍川有浰頭諸賊巢大賊首謝志珊號征南王紏率大賊鍾明貴蕭䂓模陳曰䏻等約樂昌髙快馬等大脩戰具并造吕公車聞廣東官兵方有事府江欲先破南康乗虚入廣先是湖廣廵撫都御史陳金題請三省夾攻先生以桶岡横水左溪諸賊荼毒三省其患雖同而事勢各異以湖廣言之則桶岡為賊之咽喉而横水左溪為之腹心以江西言之則橫水左溪為之腹心而桶岡為之羽翼今議者不去腹心而𣣔與湖廣夾攻桶岡進兵两宼之間腹背受敵勢必不利今議進兵横水左溪剋期在十一月朔賊見我兵未集師期尚逺必以為先事桶岡覲望未備乗此急擊之可以得志由是移兵臨桶岡破竹之勢成矣扵是决意先攻橫水左溪分定哨道指授方畧宻以十月已酉進兵至十一月已已凡破賊巢五十餘擒斬大賊首謝志珊等五十六從賊首級二千一百六十八俘獲賊属二千三百二十四衆請乗勝進兵桶岡先生復以桶岡天險四塞中堅其所由入惟瑣匙龍葫蘆洞察坑十八磊新池五䖏然皆架棧梯壑扵崖巔坐發磥石可以禦我師雖上章一路稍平然迂廻半月始逹湖兵從入我師復徃事皆非便况橫水左溪餘賊悉奔入同難合勢為守必力善戰者其勢險其節短今我欲乗全勝之鋒兼三日之程争百里之利以頓兵于幽谷所謂強弩之末不䏻穿魯縞矣莫若移屯近地休兵養威使人諭以禍福彼必懼而請伏或有不從乗而襲之乃可以逞因使其黨徃説之賊喜方集議而横水左溪奔入之賊果堅持不可徃復遅疑不睱為備而我兵分道疾進前後合擊賊遂大敗破巢三十餘摛斬大賊首藍天鳯等三十四從賊首級一千一百四俘獲賊屬二千三百捷聞賜敕奨諭是役也監軍副使楊璋叅議黄宏領兵都指揮許清指揮使郟文知府邢珣季斆伍文定唐淳知縣王天與張戬指揮余恩馮翔縣丞舒富隨征叅謀等官指揮謝㫤馮廷瑞姚壐同知朱憲推官危夀徐文英知縣陳允諧黄文鸑宋瑢陸璥千户陳偉髙􅌖等咸上功酋長謝志珊就擒先生問曰汝何得黨類之衆若此志珊曰亦不容易曰何曰平生見世上好漢㫁不輕易放過多方鈎致之或縦其酒或助其急待其相徳與之吐實無不應矣先生退語門人曰吾儒一生求朋友之益豈異是㢤十二月班師師至南康百姓沿途頂香迎拜所經州縣隘所各立生祠逺鄉之民各肖像于祖堂歲時尸祝閏十二月奏設崇義縣治及茶寮隘上堡鉛厰長龍三廵檢司先生上言橫水左溪桶岡諸賊巢凡八十餘界乎上猶大庾南康之中四方相距各三百餘里號令不及以故爲賊所據今幸削平必建立縣治以示控制議割上猶崇義等三里大庾義安三里南康至坪一里而特設縣治于横水道里適均山水合抱土地平坦仍設三廵檢司以遏要害茶陵復當桶岡之中西通桂陽桂東南連仁化樂昌北接龍泉永新東入萬安興國宜設隘保障令千户孟俊伐木立柵移皮𫀆洞隘兵而益以隣近隘夫守焉議上悉從之縣名崇義十有三年戊寅先生四十七歲在贛正月征三浰與薛侃書曰即日已抵龍南明日入巢四路皆如期並進賊有必破之勢矣向在橫水甞寄書仕徳云破山中賊易破心中賊難區區翦除䑕竊何足爲異若諸賢掃蕩心腹之宼以收廓清平定之功此誠大丈夫不世之偉績數日来諒巳得必勝之䇿奏捷有期矣何喜如之梁日孚楊仕徳誠可與共學廨中事累尚謙小兒正憲猶望時賜督責時延尚謙為正憲師兼倚以衙中政事故云二月奏移小溪驛小溪驛舊當南康南安中丙子大庾峰山里民懼賊讐殺自碩築城為衛至是年二月奏移驛其中三月疏乞致仕不允以病也襲平大㡌浰頭諸宼先生議攻取之宜先横水次桶岡次與廣東徐圖浰頭方進兵橫水時恐浰頭乗之乃為告諭頗多感動惟池仲容曰我等為賊非一年官府来招非一次告諭何足憑待金巢等無事降未晚也金巢等至乃釋罪推誠撫之各願目投扵是擇其衆五百人從征横水横水既破仲容等始懼遣其弟池仲安来附意以緩兵先生覺之比征桶岡使截路上新池以迂其歸内嚴警備外若寛假𬒳害者皆言池氏㓙狡两經夾勦無功其曰狼兵易與耳調来湏半年我避不湏一月謂来不䏻速留不䏻久也咸請濟師不從乃宻晝方畧使各歸部集候期遏賊及桶岡破賊益懼私為戰守之備復使人賜酋牛酒以察其變賊度不可隱詐稱龍川新民盧珂鄭志髙等將行掩襲故豫為防非虞官兵也佯信之因怒珂等擅兵讐殺移檄龍川使廉實将伐木開道討之賊聞且信且懼復使来謝㑹珂等告變先生欲藉珂以紿三浰宻語珂曰吾姑毀狀汝當再来来則受杖三十繋數旬乃可珂知既喜諾先生復授其意叅隨宻示行杖人令極輕至是假怒珂數罪状且将逮其屬盡斬之而隂縦其弟集兵先生先期召廵捕官佯曰今大征已畢時和年豊可令民家盛作皷樂大張燈㑹樂之亦數十年一竒事也又曰樂戸多住龜角尾恐招盗曷遷入城来扵是街巷俱然燈鳴皷已旬餘又遣指揮俞恩及黄表頒暦三浰推心招徕之時仲容等疑先生圖已既得暦稍安黄表軰從容曰若軰新民禮節生踈我来頒暦若可髙坐乎扵是仲容率其黨九十二人皆猂酋来營教塲而自以數人入見先生呵曰若皆吾新民不入見而營教塲疑我乎仲容惶恐曰聽命耳即遣人引至祥符宫見物宇整潔喜出望外是時十二月二十三也先生既遣叅隨數人舘伴復製青衣油靴教之習禮以察其志意所向審其貪殘終不可化而士民咸詬于道曰此養㓂貽害先生始决殱魁之念矣踰日辭歸先生曰自此至三浰八九日今即徃歲内未必至家即至又當走拜正節徒自取勞苦耳聞贛州今歲有燈曷以正月歸乎數日復辭先生曰正節尚未犒賞柰何𥘉二日令有司大烹扵宫以次日宴是夕令龍光潜入甲士詰旦盡殱之先生自惜終不䏻化日已過未刻不食大昡暈嘔吐先時甞宻遣千戸孟俊督珂弟集兵以防其變及是夜将半自率軍從龍南冷水直搗下浰賊故阻水石錯立水中先生躡屩先行諸軍繼之無溺者門堅甚先生摘百人捲旗持炮火縁後山登湏臾後山炮火四發旗幟滿山守者狼顧門遂破時正月七日丁未也兵備副使楊璋守備指揮郟文知府陳祥邢珣季斆推官危夀指揮余恩姚壐縣丞舒富皆從凡破巢三十有八擒斬賊首五十八從賊二千餘餘奔九連山徃議九連山横亘數百里四面陡絶湏半月始逹而賊已據險先生選精鋭七百餘皆衣賊衣佯奔潰乗暮至賊崖下賊下招之我兵佯應既度險扼其後路次日從上下撃西路伏起一皷擒之撫其降酋張仲全等二百餘人視地里險易立縣置隘留兵防守而歸先生未至贛時已聞有三省夾攻之議即謂夾攻大舉恐不足以滅賊乃進攻治疏謂朝廷若假以賞罰使得便宜行事動無掣肘可以相機而發一寨可攻則攻一寨一巢可樸則撲一巢量其罪惡之淺深而為剿撫之先後則可以省供饋征調之費日剪月削澌盡灰滅此則如昔人㧞齒之喻齒㧞而兒不覺者也若欲夾攻以快一朝之忿則計賊二萬湏兵十萬積粟料財數月而事始集兵未出境賊已深迯鋒刃所加不過老弱脇從之軰耳况狼兵所過不減于盗近年江西有姚源之役福建有汀漳之宼府江之師方集扵两廣偏撟之討未息扵湖湘若復加以大兵民将何以堪命此則一㧞去齒而児亦隨斃者也是疏方上而夾攻成命已下矣先生又以爲夾攻之䇿名雖三省大舉其實舉動次第自有先後如江西之南安有上猶大庾桶岡等䖏賊巢與湖廣桂東桂陽接境夾攻之舉止宜江西與湖廣㑹合而廣東扵仁化縣要害把截不與焉贛州之龍南有浰頭賊巢與廣東龍川接境夾攻之舉止宜江西與廣東㑹合而湖廣不與焉廣東樂昌乳源賊巢與湖廣宜章縣接境惠州賊巢與湖廣臨武縣接境仁化縣賊巢與湖廣桂陽縣接境夾攻之舉止宜湖廣廣東二省㑹合而江西扵大庾縣要害把截不與焉若不此之察必𣣔通待三省兵齊然後進剿則老師費財為害匪細矣今併力扵上猶也則姑遣人佯撫樂昌諸賊以安其心彼見廣東既未有備而湖廣之兵又不及已乃幸旦夕之生必不敢越界以援上猶及上猶既舉而湖廣移兵以合廣東則樂昌諸賊其勢已孤二省兵力益專其舉益易當是之時龍川賊巢相去遼絶自以為風馬牛不相及彼見江西之兵又徹意必不疑班師之日出其不意囬軍合撃蔑有不濟者矣䟽上朝廷許以便宜行事桶岡既滅湖廣兵期始至恐其徒勞逺渉即奨勵統兵叅将史春使之即日囬軍及計斬浰頭廣東尚不及聞皆與前議合四月班師立社學先生謂民風不善由扵教化未明今幸盗賊稍平民困漸息一應移風易俗之事雖未䏻盡舉姑且就其淺近易行者開導訓誨即行告諭發南贛所屬各縣父老子弟互相戒勉興立社學延師教子歌詩習禮出入街衢官長至俱义手拱立先生或賛賞訓誘之乆之市民亦知冠服朝夕歌聲逹扵委巷雍雍然漸成禮譲之俗矣按訓蒙大意示教讀劉伯頌等曰今教童子者當以孝悌忠信禮義㢘耻為專務其培植􅉼養之方則宜誘之歌詩以發其志意遵之習禮以肅其威儀諷之讀書以開其知覺今人徃徃以歌詩習禮為不切時務此皆末俗庸鄙之見烏足以知古人立教之意㢤大抵童子之情樂嬉戯而憚拘檢如草木之始萌芽舒暢之則條逹摧撓之則衰痿故凡誘之歌詩者非但發其志意而已亦所以洩其跳號呼嘯扵咏歌宣其幽抑結滯扵音節也導之習禮者非但肅其威儀而已亦所以周旋揖讓而動盪其血脉拜起屈伸而固束其筋骸也諷之讀書者非但開其知覺而已亦所以沉潜反復而存其心抑揚諷誦以宣其志也若責其檢束而不知導之以禮求其聰明而不知養之以善彼視學舎如囹獄而不肯入視師長如宼讐而不欲見矣求其為善也得乎五月奏設和平縣和平縣治本和平峒羊子地為三省賊衝要路其中山水環抱土地坦平人烟輳集千有餘家東去興寜長樂安逺西抵河源南界龍川北際龍南各有數日程其山水阻隔道路遼逺人跡既稀奸宄多萃相傳原非循州龍川雷鄉一州二縣之地後爲賊據止存龍川一縣洪武中賊首謝士真等相繼作亂遂極陵夷先生謂宜乗時脩復縣治以嚴控制改和平廵檢司扵浰頭以遏要害議上悉從之六月陞都察院右副都御史廕子錦衣衛世襲百户辭免不允旌橫水桶岡功也先生具䟽辭免曰臣過蒙國恩授以廵撫之寄時臣方抱病請告偶值前官有托疾避難之嫌朝廷譴之簡書臣遂狼狽蒞事當是時兵耗財匱盗熾民窮束手無䇿朝廷念民命之顛危慮臣力之薄劣本兵議假臣以賞罰則從之議給臣以旗牌則從之議改臣以提督則從之授之方畧而不拘以制責其成功而不限以時由是臣得以伸縮如志舉動自由一皷而破横水再皷而滅桶岡振旅復舉又一鼓一破三浰再皷而下九連皆本兵之議朝廷之㫁也臣亦何功之有而敢冐承其賞乎况臣福過災生已甞懇䟽求告今乃求退獲進引咎蒙賚其如賞功之典何奏入不允七月刻古本大學先生出入賊壘未暇寕居門人薛侃歐陽徳梁焯何廷仁黄弘綱薛俊楊驥郭治周仲周衝周魁郭持平劉道袁夣麟王舜鵬王學益余光黄槐宻黄鎣吳倫陳稷劉魯扶黻吳鶴薛僑薛宗銓歐陽昱皆講聚不散至是囬軍休士始得專意于朋友日與發明大學本㫖指示入道之方先生在龍塲時疑朱子大學章句非聖門本㫖手録古本伏讀精思始信聖人之學本簡易明白其書止爲一篇原無經傳之分格致本扵誠意原無缺傳可𥙷以誠意爲主而爲致知格物之功故不必增一敬字以良知指示至善之本體故不必假扵見聞至是録刻成書傍為之釋而引以叙刻朱子晚年定論先生序畧曰昔謫官龍塲居夷䖏困動心忍性之餘恍若有悟證諸六經四子洞然無復可疑獨扵朱子之說有相牴牾恒疚扵心切疑朱子之賢而豈其扵此尚有未察及官留都復取朱子之書而檢求之然後知其晚歲固已大悟舊說之非痛悔極艾至以為自誑誑人之罪不可勝贖世之所傳集註或問之類乃其中年未定之說自咎以為舊本之誤思改正而未及而其諸語類之屬又其門人挾勝心以附巳見固扵諸子平日之說猶有大相繆戾者而世之學者局扵見聞不過持循講習扵此其扵悟後之論㮣乎其未有聞則亦何恠乎予言之不信而朱子之心無以自暴扵後世也乎予既自幸説之不繆扵朱子又喜朱子之先得我心之同然且慨夫世之學者徒守朱子中年未定之說而不復知求其晚歲既悟之論競相呶呶以亂正學不自知其已入扵異端輙採録而裒集之私以示夫同志庶幾無疑扵吾説而聖學之明可冀矣與安之書曰留都時偶因饒舌遂至多口攻之者環四面取朱子晚年悔悟之説集為定論聊藉以解紛耳門人軰近刻之雩都𥘉聞甚不喜然士夫見之乃徃徃遂有開發者無意中得此一助亦頗省頰舌之勞近年篁墩諸公甞有道一等編見者先懐黨同伐異之念故卒不能有入反激而怒今但取朱子之所自言者表章之不加一辭雖有𥚹心将無所施其怒矣有志向者一出指示之八月門人薛侃刻傳習録侃得徐愛所遺傳習録一卷序二篇與陸澄各録一卷刻于􅐚是年愛卒先生哭之慟愛及門獨先聞道亦早甞逰南岳夣一瞿曇撫其背曰爾與顔子同徳亦與顔子同夀自南京兵部郎中告病歸與陸澄謀耕霅上之田以俟師年纔三十一先生毎語輙傷之九月脩濂溪書院四方學者輻輳始寓射圃至不䏻容乃脩濂溪書院居之先生大征既上捷一日設酒食勞諸生且曰以此相報諸生瞿然問故先生曰始吾登堂毎有賞罰不敢肆常恐有愧諸君比與諸君相對乆之尚覺前此賞罰猶未也扵是思求其過以改之直至登堂行事與諸君相對時無少增損方始心安此即諸君之助固不必事事煩口齒為也諸生聞言愈省各畏十月舉鄉約先生自大征後以為民雖格面未知格心乃舉鄉約告諭父老子弟使相警戒辭有曰頃者頑卒倡亂震驚逺邇父老子弟甚憂苦騷動彼㝠頑無知逆天叛倫自求誅戮究言思之實足憫悼然亦豈獨㝠頑者之罪有司撫養之有缺訓廸之無方均有責焉雖然父老之所以倡率飾勵扵平日無乃亦有所未至歟今倡亂渠魁皆就擒滅脇從無辜悉巳寛貸地方雖以寧復然創今圖後父老所以教約其子弟者自此不可以不豫故今特爲保甲之法以相警戒聯属父老其率子弟慎行之務和爾鄰里齊爾姻族徳義相勸過失相䂓敦禮譲之風成淳厚之俗十有一月再請疏通鹽法據戸部覆疏所允南贛暫行鹽稅例止三年先生念連年兵餉不及小民而止取鹽稅所謂不加賦而財足所助不少且廣鹽止行扵南贛其利小而淮鹽必行扵袁臨吉以灘髙也故三府之民長苦乏鹽而私販者水發舟多蔽河而下寡不敵衆勢莫䏻遏乃上議以為廣鹽行則商稅集而用資扵軍餉賦省扵貧民廣鹽止則私販興而弊滋扵奸宄利歸扵豪右况南贛巢穴雖平殘黨未盡方圖保安之䇿未有撤兵之期若鹽稅一革軍餉之費苟非科取扵貧民必湏仰給扵内帑夫民已貧而歛不休是驅之從盗也外已竭而殫其内是復殘其本也臣竊以為宜開復廣鹽著為定例朝廷從之至今軍民受其利王文成公全書卷之三十二終
