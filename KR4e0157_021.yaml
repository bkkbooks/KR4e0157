front:
  text: 王文成公全書卷之三十二
  hash: sha256:d6654857503612a23ac9515e03585f4eb0a1753599a2d869ba09f7a47346a638
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_021-1a}
body:
  text: 附録一年譜一先生諱守仁字伯安姓王氏其先出晉光祿大夫覽之裔本琅琊人至曾孫右軍將軍羲之徙居山隂又二十三世迪功郎夀自逹溪徙餘姚今遂為餘姚人夀五世孫綱善鑑人有文武才國𥘉誠意伯劉伯溫薦為兵部郎中擢廣東參議死苗難子彥逹綴羊革褁尸歸是為先生五世祖御史郭純上其事于朝廟祀增城彥逹號祕湖漁隱生髙祖諱與凖精禮易嘗著易微數千言永樂間朝廷舉遺逸不起號遁石翁曾祖諱世傑人呼為槐里子以明經貢太學卒祖諱天敘號竹軒魏嘗齋瀚嘗立傳敘其環堵蕭然雅歌豪吟胸次灑落方之陶靖節林和靖所著有竹軒稿江湖雜稿行于世封翰林院修撰自槐里子以下兩世皆贈嘉議大夫禮部右侍郎追贈新建伯父諱華字德輝别號實菴晚稱海日翁嘗讀書龍泉山中又稱為龍山公成化辛丑賜進士及第第一人仕至南京吏部尚書進封新建伯龍山公常思山隂山水佳麗又為先世故居復自姚徙越城之光相坊居之先生嘗築室陽明洞洞距越城東南二十里學者咸稱陽明先生云憲宗成化八年壬辰九月丁亥先生生是為九月三十日太夫人鄭娠十四月祖母岑夢神人衣緋玉雲中鼓吹送兒授岑岑驚窹已聞啼聲祖竹軒公異之即以雲名鄉人傳其夢指所生樓曰瑞雲樓十有二年丙申先生五歲先生五歲不言一日與群兒嬉有神僧過之曰好箇孩兒可惜道破竹軒公悟更今名即能言一日誦竹軒公所嘗讀過書訝問之曰聞祖讀時已默記矣十有七年辛丑先生十歲皆在越是年龍山公舉進士第一甲第一人十有八年壬寅先生十一歲寓京師龍山公迎養竹軒翁因擕先生如京師先生年才十一翁過金山寺與客酒酣擬賦詩未成先生從傍賦曰金山一點大如拳打破維揚水底天醉倚妙髙臺上月玉簫吹徹洞龍眠客大驚異復命賦蔽月山房詩先生隨口應曰山近月逺覺月小便道此山大于月若人有眼大如天還見山小月更闊明年就孰師先生豪邁不羈龍山公常懷憂惟竹軒公知之一日與同學生走長安街遇一相士異之曰吾為爾相後須憶吾言鬚拂領其時入聖境鬚至上丹臺其時結聖胎鬚至下丹田其時聖果圓先生感其言自後每對書輒靜坐凝思嘗問孰師曰何為第一等事孰師曰惟讀書登第耳先生疑曰登第恐未為第一等事或讀書學聖賢耳龍山公聞之笑曰汝𣣔做聖賢耶二十年甲辰先生十三歲寓京師母太夫人鄭氏卒居喪哭泣甚哀二十有二年丙午先生十五歲寓京師先生出逰居庸三關即慨然有經略四方之志詢諸夷種落悉聞備禦䇿逐胡兒騎射胡人不敢犯經月始返一日夢謁伏波將軍廟賦詩曰卷甲歸來馬伏波早年兵法鬢毛皤雲埋銅柱雷轟折六字題文尚不磨時畿內石英王勇盜起又聞秦中石和尚劉千斤作亂屢𣣔為書獻于朝龍山公斥之為狂乃止孝宗弘治元年戊申先生十七歲在越七月親迎夫人諸氏于洪都外舅諸公養和為江西布政司參議先生就官署委禽合卺之日偶間行入鐡柱宫遇道士跌坐一榻即而叩之因聞養生之説遂相與對坐忘歸諸公遣人追之次早始還官署中蓄𥿄數篋先生日取學書比歸數篋皆空書法大進先生嘗示學者曰吾始學書對模古帖止得字形後舉筆不輕落𥿄凝思靜慮擬形于心久之始通其法既後讀明道先生書曰吾作字甚敬非是要字好只此是學既非要字好又何學也乃知古人隨時隨事只在心上學此心精明字好亦在其中矣後與學者論格物多舉此為證二年巳酉先生十八歲寓江西十二月夫人諸氏歸餘姚是年先生始慕聖學先生以諸夫人歸舟至廣信謁婁一齋諒語宋儒格物之學謂聖人必可學而至遂深契之明年龍山公以外艱歸姚命從弟冕階宫及妹壻牧相與先生講析經義先生日則隨衆課業夜則搜取諸經子史讀之多至夜分四子見其文字日進嘗愧不及後知之曰彼已遊心舉業外矣吾何及也先生接人故和易善謔一日悔之遂端坐省言四子未信先生正色曰吾昔放逸今知過矣自後四子亦漸斂容五年壬子先生二十一歲在越舉浙江鄉試是年場中夜半見二巨人各衣緋緑東西立自言曰三人好作事忽不見已而先生與孫忠烈燧胡尚書世寧同舉其後宸濠之變胡發其姦孫死其難先生平之咸以為竒驗是年為宋儒格物之學先生始侍龍山公于京師遍求考亭遺書讀之一日思先儒謂衆物必有表裏精粗一草一木皆涵至理官署中多竹即取竹格之沉思其理不得遂遇疾先生自委聖賢有分乃隨世就辭章之學明年春會試下第縉紳知者咸來慰諭宰相李西涯戲曰汝今歲不第來科必為狀元試作來科狀元賦先生懸筆立就諸老驚曰天才天才退有忌者曰此子取上第目中無我輩矣及丙辰會試果為忌者所抑同舍有以不第為耻者先生慰之曰世以不得第為耻吾以不得第動心為耻識者服之歸餘姚結詩社龍泉山寺致仕方伯魏瀚平時以雄才自放與先生登龍山對奕聮詩有佳句輒為先生得之乃謝曰老夫當退數舍十年丁已先生二十六歲寓京師是年先生學兵法當時邉報甚急朝廷推舉將才莫不遑遽先生念武舉之設僅得騎射搏擊之士而不可以收韜略統馭之才于是留情武事凡兵家祕書莫不精究每遇賔宴嘗聚果核列陳勢為戲十一年戊午先生二十七歲寓京師是年先生談養生先生自念辭章藝能不足以通至道求師友于天下又不數遇心持惶惑一日讀晦翁上宋光宗疏有曰居敬持志為讀書之本循序致精為讀書之法乃悔前日探討雖博而未嘗循序以致精宜無所得又循其序思得漸漬洽浹然物理吾心終若判而為二也沉鬱既久舊疾復作益委聖賢有分偶聞道士談養生遂有遺世入山之意十有二年已未先生二十八歲在京師舉進士出身是年春會試舉南宫第二人賜二甲進士出身第七人觀政工部疏陳邉務先生未第時嘗夢威寧伯遺以弓劍是秋欽差督造威寧伯王越墳馭役夫以什伍法休食以時睱即驅演八陳圖事竣威寧家以金帛謝不受乃出威寧所佩寶劍為贈適與夢符遂受之時有星變朝廷下詔求言及聞逹虜猖獗先生復命上邉務八事言極剴切十有三年庚申先生二十九歲在京師授刑部雲南清吏司主事十有四年辛酉先生三十歲在京師奉命審録江北先生録囚多所平反事竣遂逰九華作逰九華賦宿無相化城諸寺是時道者蔡蓬頭善談仙待以客禮請問蔡曰尚未有頃屏左右引至後亭再拜請問蔡曰尚未問至再三蔡曰汝後堂後亭禮雖隆終不忘官相一笑而别聞地藏洞有異人坐卧松毛不火食歷嵓險訪之正熟睡先生坐傍撫其足有頃醒驚曰路險何得至此因論最上乘曰周濂溪程明道是儒家兩箇好秀才後再至其人已他移故後有會心人逺之歎十有五年壬戍先生三十一嵗在京師八月疏請告是年先生漸悟仙釋二氏之非先是五月復命京中舊逰俱以才名相馳騁學古詩文先生歎曰吾焉能以有限精神為無用之虛文也遂告病歸越築室陽明洞中行導引術久之遂先知一日坐洞中友人王思輿等四人來訪方出五雲門先生即命僕迎之且歷語其來迹僕遇諸途與語良令衆驚異以為得道久之悟曰此簸弄精神非道也又屏去已而靜久思離世逺去惟祖母岑與龍山公在念因循未決久之又忽悟曰此念生于孩提此念可去是斷滅種性矣明年遂移疾錢塘西湖復思用世往來南屏虎跑諸剎有禪僧坐關三年不語不視先生喝之曰這和尚終日口巴巴説甚麼終日眼睁睁看甚麼僧驚起即開視對語先生問其家對曰有母在曰起念否對曰不能不起先生即指愛親本性諭之僧涕泣謝明日問之僧已去矣十有七年甲子先生三十三歲在京師秋主考山東鄉試巡按山東監察御史陸稱聘主鄉試試録皆出先生手筆其䇿問議國朝禮樂之制老佛害道由于聖學不明綱紀不振由于名器太濫用人太急求效太速及分封清戎禦夷息訟皆有成法録出人占先生經世之學九月改兵部武選清吏司主事十有八年乙丑先生三十四歲在京師是年先生門人始進學者溺于詞章記誦不復知有身心之學先生首倡言之使人先立必為聖人之志聞者漸覺興起有願執贄及門者至是專志授徒講學然師友之道久廢咸目以為立異好名惟甘泉湛先生若水時為翰林庶吉士一見定交共以倡明聖學為事武宗正德元年丙寅先生三十五歲在京師二月上封事下詔獄謫龍埸驛驛丞是時武宗𥘉政奄瑾竊柄南京科道戴銑薄彥徽等以諫忤旨逮繫詔獄先生首抗疏救之其言君仁臣直銑等以言為責其言如善自宜嘉納如其未善亦宜包容以開忠讜之路乃今赫然下令逺事拘囚在陛下不過少示懲創非有意怒絶之也下民無知妄生疑懼臣切惜之自是而後雖有上關宗社危疑不制之事陛下孰從而聞之陛下聰明超絶苟念及此寧不寒心伏願追收前旨使銑等仍舊供職擴太公無我之仁明改過不吝之勇聖德昭布逺邇人民胥恱豈不休哉疏入亦下詔獄已而廷杖四十既絶復蘇尋謫貴州龍埸驛驛丞二年丁卯先生三十六歲在越夏赴謫至錢塘先生至錢塘瑾遣人隨偵先生度不免乃托言投江以脫之因附啇船逰舟山偶遇颶風大作一日夜至閩界比登岸奔山徑數十里夜扣一寺求宿僧故不納趨野廟倚香案卧蓋虎穴也夜半虎繞廊大吼不敢入黎明僧意必斃于虎將收其囊見先生方熟睡呼始醒驚曰公非常人也不然得無恙乎邀至寺寺有異人嘗識于鐡柱宫約二十年相見海上至是出詩有二十年前曾見君今來消息我先聞之句與論出處且將逺遁其人曰汝有親在萬一瑾怒逮爾父誣以北走胡南走奧何以應之因為蓍得明夷遂決䇿返先生題詩璧間曰險夷原不滯胸中何異浮雲過太空夜靜海濤三萬里月明飛錫下天風因取間道由武夷而歸時龍山公官南京吏部尚書從鄱陽往省十二月返錢塘赴龍埸驛是時先生與學者講授雖隨地興起未有出身承當以聖學為已任者徐愛先生妹壻也因先生將赴龍埸納贄北面奮然有志于學愛與蔡宗兖朱節同舉鄉貢先生作别三子序以贈之三年戊辰先生三十七歲在貴陽春至龍場先生始悟格物致知龍場在貴州西北萬山叢棘中蛇虺魍魎蠱毒瘴癘與居夷人鵙舌難語可通語者皆中土亡命舊無居始教之範上架木以居時瑾憾未巳自計得失榮辱皆能超脫惟生死一念尚覺未化乃為石墎自誓曰吾惟俟命而已日夜端居澄默以求靜一久之胸中灑灑而從者皆病自析薪取水作糜飼之又恐其懷抑鬱則與歌詩又不恱復調越曲雜以詼笑始能忘其為疾病夷狄患難也因念聖人處此更有何道忽中夜大悟格物致知之旨窹寐中若有人語之者不覺呼躍從者皆驚始知聖人之道吾性自足向之求理于事物者誤也乃以默記五經之言證之莫不吻合因著五經億説居久夷人亦日來親狎以所居湫濕乃伐木搆龍岡書院及寅賔堂何陋軒君子亭玩易窩以居之思州守遣人至驛侮先生諸夷不平共毆辱之守大怒言諸當道毛憲副科令先生請謝且諭以禍福先生致書復之守慚服水西安宣慰聞先生名使人餽米肉給使令既又重以金帛鞍馬俱辭不受始朝廷議設衛于水西既置城已而中止驛傳尚存安惡據其腹心𣣔去之以問先生先生遺書折其不可且申朝廷威信令甲議遂寢已而宋氏酋長有阿賈阿札者叛宋氏為地方患先生復以書詆諷之安悚然率所部平其難民賴以寧四年已已先生三十八歲在貴陽提學副使席書聘主貴陽書院是年先生始論知行合一始席元山書提督學政問朱陸同異之辨先生不語朱陸之學而告之以其所悟書懷疑而去明日復來舉知行本體證之五經諸子漸有省往復數四豁然大悟謂聖人之學復覩于今日朱陸異同各有得失無事辨詰求之吾性本自明也遂與毛憲副修葺書院身率貴陽諸生以所事師禮事之後徐愛因未會先生知行合一之訓決于先生先生曰試舉看愛曰如今人已知父當孝兄當弟矣乃不能孝弟知與行分明是兩事先生曰此𬒳私欲隔斷耳非本體也聖賢教人知行正是要人復本體故大學指出真知行以示人曰如好好色如惡惡臭夫見好色屬知好好色屬行只見色時已是好矣非見後而始立心去好也聞惡臭屬知惡惡臭屬行只聞臭時已是惡矣非聞後而始立心去惡也又如稱某人知孝某人知弟必其人已曾行孝行弟方可稱他知孝知弟此便是知行之本體愛曰古人分知行為二恐是要人用工有分曉否先生曰此正失却古人宗旨某嘗説知是行之主意行實知之功夫知是行之始行實知之成已可理會矣古人立言所以分知行為二者緣世間有一種人懵懵然任意去做全不解思惟省察是之為冥行妄作所以必説知而後行無繆又有一種人茫茫然懸空去思索全不肯著實躬行是之為揣摸影響所以必説行而後知始真此是古人不得已之教若見得時一言足矣今人却以為必先知然後能行且講習討論以求知俟知得真時方去行故遂終身不行亦遂終身不知某今説知行合一使學者自求本體庶無支離決裂之病五年庚午先生三十九嵗在吉升廬陵縣知縣先生三月至廬陵為政不事威刑惟以開導人心為本蒞任𥘉首詢里役察各鄉貧富姦良之實而低昻之獄牒盈庭不即斷射稽國𥘉舊制慎選里正三老坐申明亭使之委曲勸諭民胥悔勝氣嚚訟至有涕泣而歸者由是囹圄日清在縣七閲月遺告示十有六大抵諄諄慰父老使教子弟母令蕩僻城中失火身禱返風以血禳火而火即滅因使城中闢火巷定水次兊運絶鎮守橫征杜神會之借辦立保甲以弭盜清驛遞以延賔旅至今數十年猶踵行之語學者悟入之功先是先生赴龍埸時隨地講授及歸過常德辰州見門人冀元亨蔣信劉觀時輩俱能卓立喜曰謫居兩年無可與語者歸途乃幸得諸友悔昔在貴陽舉知行合一之教紛紛異同罔知所入兹來乃與諸生靜坐僧寺使自悟性體顧恍恍若有可即者既又途中寄書曰前在寺中所云靜坐事非𣣔坐禪入定也蓋因吾輩平日為事物紛拏未知為已欲以此輔小學收放心一假功夫耳明道云才學便須知有用力處既學便須知有得力處諸友宜于此處著力方有進步異時始有得力處也冬十有一月入覲先生入京館于大興隆寺時黃宗賢綰為後軍都督府都事因儲柴墟巏請見先生與之語喜曰此學久絶子何所聞對曰雖粗有志實未用功先生曰人惟患無志不患無功明日引見甘泉訂與終日共學按宗賢至嘉靖壬午春復執贄稱門人十有二月升南京刑部四川清吏司主事論實踐之功先生與黃綰應良論聖學久不明學者欲為聖人必須廓清心體使纎翳不留真性始見方有操持涵養之地應良疑其難先生曰聖人之心如明鏡纎翳自無所容自不消磨刮若常人之心如斑垢駁蝕之鏡須痛刮磨一畨盡去駁蝕然後纎塵即見才拂便去亦不消費力到此已是識得仁體矣若駁蝕未去其間固自有一點明處塵埃之落固亦見得才拂便去至于堆積于駁蝕之上終弗之能見也此學利困勉之所由異幸勿以為難而疑之也凡人情好易而惡難其間亦自有私意氣習纏蔽在識破後自然不見其難矣古之人至有出萬死而樂為之者亦見得耳向時未見得裏面意思此功夫自無可講處今已見此一層却恐好易惡難便流入禪釋去也按先生立教皆經實踐故所言懇篤若此自揭良知宗旨後吾黨又覺領悟太易認虛見為真得無復向裏著已之功矣故吾黨頴悟承速者往往多無成甚可憂也六年辛未先生四十歲在京師正月調吏部驗封清吏司主事論晦菴象山之學王輿菴讀象山書有契徐成之與辨不決先生曰是朱非陸天下論定久矣久則難變也雖微成之之爭輿菴亦豈能遽行其説乎成之謂先生漫為含糊兩解君有以隂助輿菴而為之地者先生以書解之曰輿菴是象山而謂其專以尊德性為主今觀象山文集所載未嘗不教其徒讀書而自謂理會文字頗與人異者則其意實𣣔體之于身其亟所稱述以誨人者曰居處恭執事敬與人忠曰克已復禮曰萬物皆備于我反身而誠樂莫大焉曰學問之道無他求其放心而已曰先立乎其大者而小者不能奪是數言者孔子孟軻之言也烏在其為空虛乎獨其易簡覺悟之説頗為當時所疑然易簡之説出于繫辭覺悟之説雖有同于釋氏然釋氏之説亦自有同于吾儒而不害其為異者惟在于幾微毫忽之間而已亦何必諱于其同而遂不敢以言狃于其異而遂不以察之乎是輿菴之是象山固猶未盡其所以是也吾兄是晦菴而謂其專以道問學為事然晦菴之言曰居敬窮理曰非存心無以致知曰君子之心常存敬畏雖不見聞亦不敢忽所以存天理之本然而不使離于須臾之頃也是其為言雖未盡瑩亦何嘗不以尊德性為事而又烏在其為支離乎獨其平日汲汲于訓解雖韓文楚辭隂符參同之屬亦必與之注釋考辨而論者遂疑玩物又其心慮恐學者之躐等而或失之于妄作必先之以格致而無不明然後有以實之于誠正而無所謬世之學者挂一漏萬求之愈煩而失之愈逺至有弊力終身苦其難而卒無所入而遂議其支離不知此乃後世學者之弊而當時晦菴之自為則亦豈至是乎是吾兄之是晦菴固猶未盡其所以是也夫二兄之所信而是者既未盡其所以是則其所疑而非者亦豈盡其所以非乎僕嘗以為晦菴之與象山雖其所以為學者若有不同而要皆不失為聖人之徒今晦菴之學天下之人童而習之既已入人之深有不容于論辨者而獨惟象山之學則以其嘗與晦菴之有言而遂藩籬之使若由賜之殊科焉則可矣而遂擯放廢斥若碔砆之與美玉則豈不過甚矣乎故僕嘗𣣔冒天下之譏以為象山一暴其説雖以此得罪無恨晦菴之學既已章明于天下而象山猶蒙無實之誣于今且四百年莫有為之一洗者使晦菴有知將亦不能一日安享于廟廡之間矣此僕之至情終亦必為兄一吐露者亦何肯漫為兩解之説以隂助于輿菴已乎二月為會試同考試官是年僚友方獻夫受學獻夫時為吏部郎中位在先生上比聞論學深自感悔遂執贄事以師禮是冬告病歸西樵先生為敘别之十月升文選清吏司員外郎送甘泉奉使安南先是先生升南都甘泉與黃綰言于冡宰楊一清改留吏部職事之暇始遂講聚方期各相砥切飲食啓處必共之至是甘泉出使安南封國將行先生懼聖學難明而易惑人生别易而會難也乃為文以贈略曰顔子沒而聖人之學亡曾子唯一貫之旨傳之孟軻絶又二千餘年而周程續自是而後言益詳道益晦孟氏患楊墨周程之際釋老大行今世學者皆知尊孔孟賤楊墨擯釋老聖人之道若大明于世然吾從而求之聖人不得而見之矣其能有若墨氏之兼愛者乎其能有若楊氏之為我者乎其能有若老氏之清淨自守釋氏之究心性命者乎吾何以楊墨老釋之思哉彼于聖人之道異然猶有自得也而世之學者章繪句琢以誇俗詭心色取相飾以偽謂聖人之道勞苦無功非復人之所可為而徒取辨于言辭之間古之人有終身不能究者今吾皆能言其略自以為若是亦足矣而聖人之學遂廢則今之所大患者豈非記誦辭章之習而弊之所從來無亦言之太詳析之太精者之過歟某幼不問學陷溺于邪僻者二十年而始究心于老釋賴天之靈因有所覺始乃沿周程之説求之而若有得焉顧一二同志之外莫豫冀也岌岌乎仆而復興晚得于甘泉湛子而後吾之志益堅毅然若不可遏則豫之資于甘泉多矣甘泉之學務求自得者也世未之能知其知者且疑其為禪誠禪也吾猶未得而見而况其所志卓爾君此則如甘泉者非聖人之徒歟多言又烏足病也夫多言不足以病甘泉與甘泉之不為多言病也吾信之吾與甘泉有意之所在不言而會論之所及不約而同期于斯道斃而後已者今日之别吾容無言夫惟聖人之學難明而易惑習俗之降愈下而抑不可回任重道逺雖巳無俟于言顧復于吾心若有不容已也則甘泉亦豈以豫言為綴乎七年壬申先生四十一歲在京師三月升考功清吏司郎中按同志考是年穆孔暉顧應祥鄭一𥘉方獻科王道梁穀萬潮陳鼎唐鵬路迎孫瑚魏廷霖蕭鳴鳳林逹陳洸及黃綰應良朱節蔡宗兖徐愛同受業十二月升南京太僕寺少卿便道歸省與徐愛論學愛是年以祁州知州考滿進京升南京工部員外郎與先生同舟歸越論大學宗旨聞之踴躍痛快如狂如醒者數日胸中混沌復開仰思堯舜三王孔孟千聖立言人各不同其旨則一今之傳習録所載首卷是也其自敘云愛因舊説汨沒始聞先生之教實駭愕不定無入頭處其後聞之既久漸知反身實踐然後始信先生之學為孔門嫡傳舍是皆傍蹊小徑斷港絶河矣如説格物是誠意功夫明善是誠身功夫窮理是盡性功夫道問學是尊德性功夫博文是約禮功夫惟精是惟一功夫諸如此類皆落落難合其後思之既久不覺手舞足蹈八年癸酉先生四十二歲在越二月至越先生𥘉計至家即與徐愛同逰台蕩宗族親友絆弗能行五月終與愛數友期候黃綰不至乃從上虞入四明觀白水尋龍溪之源登杖錫至雪竇上千丈巖以望天姥華頂𣣔遂從奉化取道赤城適久旱山田盡龜折慘然不樂遂自寧波還餘姚綰以書迎先生復書曰此行相從諸友亦微有所得然無大發明其最所歉然宗賢不同茲行耳後輩習氣巳深雖有美質亦漸消盡此事正如淘沙會有見金時但目下未可必得耳先生茲逰雖為山水實注念愛綰二子蓋先生點化同志多得之登逰山水間也冬十月至滁州滁山水佳勝先生督馬政地僻官間日與門人逰遨琅琊瀼泉間月夕則環龍潭而坐者數百人歌聲振山谷諸生隨地請正踴躍歌舞舊學之士皆日來臻于是從逰之衆自滁始孟源問靜坐中思慮紛雜不能強禁絶先生曰紛雜思慮亦強禁絶不得只就思慮萌動處省察克治到天理精明後有箇物各付物的意思自然精專無紛雜之念大學所謂知止而後有定也九月甲戍先生四十三歲在滁四月升南京鴻臚寺卿滁陽諸友送至烏衣不能别留居江浦候先生渡江先生以詩促之歸曰滁之水入江流江潮日復來滁州相思若潮水來往何時休空相思亦何益𣣔慰相思情不如崇令德掘地見泉水隨處無弗得何必驅馳為千里逺相即君不見堯羔與舜墻又不見孔與跖對面不相識逆旅主人多殷勤出門轉盻成路人五月至南京自徐愛來南都同志日親黃宗明薛侃馬明衡陸澄季本許相卿王激諸稱林逹張寰唐愈賢饒文璧劉觀時鄭騮周積郭慶欒惠劉曉何鰲陳傑楊杓白説彭一之朱箎輩同聚師門日夕漬礪不懈客有道自滁遊學之士多放言髙論亦有漸背師教者先生曰吾年來欲懲末俗之卑汚引接學者多就髙明一路以救時弊今見學者漸有流入空虛為脫落新竒之論吾已悔之矣故南畿論學只教學者存天理去人欲為省察克治實功王嘉秀蕭惠好談仙佛先生嘗警之曰吾幼時求聖學不得亦嘗篤志二氏其後居夷三載始見聖人端緒悔錯用功二十年二氏之學其妙與聖人只有毫釐之間故不易辨惟篤志聖學者始能究析其隱微非測億所及也十年乙亥先生四十四嵗在京師正月疏自陳不允是年當兩京考察例上疏立再從子正憲為後正憲字仲肅季叔易直先生兖之孫西林守信之第五子也先生年四十四與諸弟守儉守文守章俱未舉子故龍山公為先生擇守信子正憲立之時年八齡是年御史楊典薦改祭酒不報八月擬諌迎佛疏時命太監劉允烏思藏齎幡供諸佛奉迎佛徒允奏請鹽七萬引以為路費許之輔臣楊廷和等與户部及言官各疏執奏不聼先生欲因事納忠擬疏𣣔上後中止疏請告是年祖母岑太夫人年九十有六先生思乞恩歸一見為訣疏凡再上矣故辭甚懇切十有一年丙子先生四十五歲在南京九月升都察院左僉都御史巡撫南贛汀漳等處是時汀漳各郡皆有巨寇尚書王瓊特舉先生十月歸省至越王思輿語季本曰陽明此行必立事功本曰何以知之曰吾觸之不動矣十有二年丁丑先生四十六歲正月至贛先生過萬安遇流賊數百沿途肆劫商舟不敢進先生乃聮商舟結為陳勢揚旗鳴鼓如趨戰狀賊乃羅拜于岸呼曰飢荒流民乞求賑濟先生泊岸令人諭之曰至贛後即差官撫插各安生理毋作非為自取戮滅賊懼散歸以是年正月十六日開府行十家牌法先是贛民為洞賊耳目官府舉動未形而賊已先聞軍門一老􅊢姦尤甚先生偵知之呼入卧室使之自擇生死􅊢乃輸情吐實先生許其不死試所言悉驗乃于城中立十家牌法其法編十家為一牌開列各户籍貫姓名年貌行業日輪一家沿門按牌審察遇面生可疑人即行報官究理或有隱匿十家連坐仍告諭父老子弟務要父慈子孝兄愛弟敬夫和婦隨長惠幼順小心以奉官法勤謹以辦國課恭儉以守家業謙和以處鄉里心要平恕毋得輕易忿爭事要含忍毋得輒興詞訟見善互相勸勉有惡互相懲戒務興禮讓之風以成敦厚之俗選民兵先生以南贛地連四省山險林深盜賊盤據三居其一窺伺剽掠大為民患當事者每遇盜賊猖獗輒復會奏請調上軍狼逹往返經年糜費逾萬逮至集兵舉事即已魍魎潛形班師旋旅則又鼠狐聚黨是以機冝屢失而備禦益弛先生乃使四省兵備官于各屬弩手打手機快等項挑選驍勇絶群膽力出衆者每縣多或十餘人少或八九人務求魁傑或懸召募大約江西福建二兵備各以五六百名為率廣東湖廣二兵備各以四五百名為率中間更有出衆者優其廪餼署為將領除南贛兵備自行編選餘四兵備官仍于每縣原額數內揀選可用者量留三分之二委詼縣賢能官統練專以守城防隘為事其餘一分楝退疲弱不堪者免其著役止出工食追解該道以益募賞所募精兵專隨各兵備官屯劄别選官分隊統押教習之如此則各縣屯戍之兵既足以護守防截而兵備募召之士又可以應變出竒盜賊漸知所畏平良益有所恃而無恐矣二月平漳寇𥘉先生道聞漳寇方熾兼程至贛即移文三省兵備剋期起兵自正月十六日蒞任才旬日即議進兵兵次長富村遇賊大戰斬獲頗多賊奔象湖山拒守我兵追至蓮花石與賊對壘會廣東兵至方欲合圍賊見勢急遂潰圍而出指揮覃桓縣丞紀鏞馬陷死之諸將請調狼兵俟秋再舉先生乃責以失律罪使立功自贖諸將議猶未決先生曰兵宜隨時變在呼吸豈宜各持成説耶福建諸軍稍緝咸有立功贖罪心利在速戰若當集謀之始即掩賊不備成功可必今既聲勢彰聞各賊必聮黨設械以禦我師且宜示以寬懈而猶執乘機之説以張皇于外是徒知吾卒之可擊而不知敵之未可擊也廣東之兵意在倚重狼逹土軍然後舉事諸賊亦候吾土兵之集以卜戰期乘此機候正可奮怯為勇變弱為強而猶執持重之説以坐失事機是徒知吾卒之未可擊而不知敵之正可擊也善用兵者因形而借勝于敵故其戰勝不復而應形于無窮勝負之算間不容髮烏可執滯哉于是親率諸道鋭卒進屯上杭密敕群哨佯言犒衆退師俟秋再舉密遣義官曾崇秀覘賊虛實乘其懈選兵分三路俱于二月十九日乘晦夜㗸枚並進直搗象湖奪其隘口諸賊失險復據上層峻壁四面滚木礧石以死拒戰我兵奮勇鏖戰自辰至午呼聲振地三省竒兵從間鼓噪突登乃驚潰奔走遂乘勝追勦已而福建兵攻破長富村等巢三十餘所廣東兵攻破水竹大重坑等巢一十三所斬首從賊詹師富溫火燒等七千有竒俘獲賊屬輜重無算而諸洞蕩滅是役僅三月漳南數十年逋寇悉平是月奏捷具言福建僉事胡璉參政陳䇿副使唐澤知府鍾湘廣東僉事顧應祥都指揮楊懋知縣張戬勞績賜敕奬賚其餘升賞有差𥘉議進兵諭諸將曰賊雖據險而守尚可出其不意掩其不備則用鄧艾破蜀之䇿從間道以出若賊果盤據持重可以計困難以兵尅則用充國破羌之謀減冗兵以省費務在防隱禍于顯利之中絶深姦于意料之外此萬全無失者也已而桓等狃于小勝不從間道故違節制以致挫衄諸將志沮遂請濟師先生獨以為見兵二十有餘已為不少不宜坐待濟師以自懈遙制以失機也遂親督兵而出卒成功四月班師時三月不雨至于四月先生方駐軍上杭禱于行臺得雨以為未足及班師一雨三日民大恱有司請名行臺之堂曰時雨堂取王師若時雨之義也先生乃為記五月立兵符先生謂習戰之方莫要于行伍治衆之法莫先于分數將調集各兵每二十五人編為一伍伍有小甲五十人為一隊隊有總甲二百人為一哨哨有長有協哨二人四百人為一營營有官有參謀二人一千二百人為一陳陳有偏將二千四百人為一軍軍有副將偏將無定貟臨事而設小甲于各伍之中選才力優者為之總甲于小甲之中選才力優者為之哨長于千百户義官之中選材識優者為之副將得以罰偏將偏將得以罰營官營官得以罰哨長哨長得以罰總甲總甲得以罰小甲小甲得以罰伍衆務使上下相維大小相承如身之使臂臂之使指自然舉動齊一治衆如寡庶幾有制之兵矣編選既定仍每五人給一牌備列同伍二十五人姓名使之連絡習熟謂之伍符每隊各置兩牌編立字號一付總甲一藏本院謂之隊符每哨各置兩牌編立字號一付哨長一藏本院謂之哨符每營各置兩牌編立字號一付營官一藏本院謂之營符凡遇征調發符比號而行以防姦偽其諸緝養訓練之方旗鼓進退之節務濟實用行之奏設平和縣移枋頭巡檢司先生以賊據險久為民患今幸破滅須為拊背扼吭之䇿乃奏請設平和縣治于河頭移河頭巡檢司于枋頭蓋以河頭為諸巢之咽喉而枋頭又河頭之唇齒也且曰方賊之據河頭也窮凶極惡至動三軍之衆合二省之力而始克蕩平若不及今為久逺之圖不過數年勢將復起後悔無及矣蓋盜賊之患譬諸病人興師征討者針藥攻治之方建縣撫輯者飲食調攝之道徒恃攻治而不務調攝則病不旋踵後雖扁鵲倉公無所施其術也按是月聞蔡宗兖許相卿季本薛侃陸澄同舉進士先生曰入仕之始意况未免搖動如絮在風中若非粘泥貼網亦自主張未得不知諸友却何如想平時工夫亦須有得力處耳又聞曰仁在告買田霅上為諸友久聚之計遺二詩慰之六月疏請疏通鹽法始都御史陳金以流賊軍餉于贛州立厰抽分廣鹽許至袁臨吉三府發賣然起正德六年至九年而止至是先生以敕諭有便冝處置語疏請暫行待平定之日仍舊停止從之九月改授提督南贛汀漳等處軍務給旗牌得便宜行事南贛舊止以巡撫蒞之至都御史周南會請旗牌事畢􅌳還不為定制至是先生疏請遂有提督之命後不復更疏以我國家有罰典有賞格然罰典止行于參提之後而不行于臨陳對敵之時賞格止行于大軍征勦之日而不行于尋常用兵之際故無成功今後凡遇討賊領兵官不拘軍衛有司所領兵衆有退縮不用命者許領兵官軍前以軍法從事領兵官不用命者許總統官軍前以軍法從事所領兵衆有對敵擒斬功次或赴敵陳亡從實具報覆實奏聞升賞如制若生擒賊徒問明即押赴市曹斬之以徇庶使人知警畏亦可比于令典決不待時者如此則賞罰既明人心激勵盜起即得撲滅糧餉可省事功可建又曰古者賞不踰時罰不後事過時而賞與無賞同後事而罰與不罰同况過時而不賞後事而不罰其何以齊一人心作興士氣雖使韓白為將亦不能有所成誠得以大軍誅賞之法責而行之于平時假臣等令旗令牌便宜行事如是而兵有不精賊有不滅臣等亦無以逃其死矣事下兵部尚書王瓊覆奏以為宜從所請于是改巡撫為提督得以軍法從事欽給旗牌八面悉聽便宜既而鎮守太監畢真謀于近幸請監其軍瓊奏以為兵法最忌遙制若使南贛用兵而必待謀于省城鎮守斷乎不可惟省城有警則聽南贛䇿應事遂寢按敕諭有曰江西南安贛州也方與福建汀漳二府廣東南韶潮惠四府及湖廣郴州桂陽縣壤地相接山嶺相連其間盜賊不時生發東追則西竄南捕則北奔蓋因地方各省事無統屬彼此推調難為處置先年嘗設有都御史一員巡撫前項地方就令督勦盜賊但責任不專類多因循苟且不能申明賞罰以勵人心致令盜賊滋多地方受禍今日所奏及各該部覆奏事理特改命爾提督軍務撫安軍民修理城池禁革姦弊一應軍馬錢糧事宜但聽便宜區畫以足軍餉但有盜賊生發即便設法調兵勦殺不許踵襲舊弊招撫蒙蔽重為民患其管領兵快人等官員不問文職武職若在軍前違期并逗遛退縮者俱聽軍法從事生擒盜賊鞠問明白亦聼就行斬首示衆撫諭賊巢是時漳寇雖平而樂昌龍川諸賊巢尚多嘯聚將用兵勦之先犒以牛酒銀布復諭之曰人之所共恥者莫過于身𬒳為盜賊之名人心之所共憤者莫過于身遭劫掠之苦今使有人罵爾等為盜爾必憤然而怒又使人焚爾室廬劫爾財貨掠爾妻女爾必懷恨切骨寧死必報爾等以是加人人其有不怨者乎人同此心爾寧獨不知乃必𣣔為此其間想亦有不得已者或是為官府所迫或是為大户所侵一時錯起念頭誤入其中後遂不敢出此等苦情亦甚可憫然亦皆由爾等悔悟不切耳爾等當時去做賊時是生人尋死路尚且要去便去今𣣔改行從善是死人求生路乃反不敢耶若爾等肯如當𥘉去做賊時拚死出來求要改行從善我官府豈有必要殺汝之理爾等久習惡毒忍于殺人心多猜疑豈知我上人之心無故殺一雞犬尚且不忍况于人命關天若輕易殺之冥冥之中斷有還報殃禍及于子孫何苦而必欲為此我每為爾等思念及此輒至于終夜不能安寢亦無非欲為爾等尋一生路惟是爾等冥頑不化然後不得已而興兵此則非我殺之乃天殺之也今謂我全無殺人之心亦是誑爾若謂必欲殺爾又非吾之本心爾等今雖從惡其始同是朝廷赤子譬如一父母同生十子八人為善二人背逆要害八人父母之心須去二人然後八人得以安生均之為子父母之心何故必𣣔偏殺二子不得已也吾于爾等亦正如此若此二子者一旦悔惡遷善號泣投誠為父母者亦必哀憫而赦之何者不忍殺其子者乃父母之本心也今得遂其本心何喜何幸如之吾于爾等亦正如此聞爾等為賊所得苦亦不多其間尚有衣食不充者何不以爾為賊之勤苦精力而用之于耕農運之于商賈可以坐致饒富而安享逸樂放心縱意逰觀城市之中優遊田野之內豈如今日出則畏官避讐入則防誅懼勦潛形遁迹憂苦終身卒之身滅家破妻子戮辱亦有何好乎爾等若能聽吾言改行從善吾即視爾為良民更不追爾舊惡若習性已成難更改動亦由爾等任意為之吾南調兩廣之狼逹西調湖湘之土兵親率大軍圍爾巢穴一年不盡至于兩年兩年不盡至于三年爾之財力有限吾之兵糧無窮縱爾等皆為有翼之虎諒亦不能逃于天地之外矣嗚呼民吾同胞爾等皆吾赤子吾終不能撫恤爾等而至于殺爾痛哉痛哉興言至此不覺淚下按是諭文藹然哀憐無辜之情可以想見虞廷干羽之化矣故當時酋長若黃金巢盧珂等即率衆來投碩效死以報疏謝升賞朝廷以先生平漳寇功升一級銀二十兩紵絲二表裏降敕奬勵故有謝疏疏處南贛商稅始南安稅商貨于折梅亭以資軍餉後多姦弊仍併府北龜角尾以疏聞十月平橫水桶岡諸寇南贛西接湖廣桂陽有桶岡橫水諸賊巢南接廣東樂昌東接廣東龍川有浰頭諸賊巢大賊首謝志珊號征南王紏率大賊鍾明貴蕭規模陳曰能等約樂昌髙快馬等大修戰具并造吕公車聞廣東官兵方有事府江欲先破南康乘虛入廣先是湖廣巡撫都御史陳金題請三省夾攻先生以桶岡橫水左溪諸賊荼毒三省其患雖同而事勢各異以湖廣言之則桶岡為賊之咽喉而橫水左溪為之腹心以江西言之則橫水左溪為之腹心而桶岡為之羽翼今議者不去腹心而𣣔與湖廣夾攻桶岡進兵兩寇之間腹背受敵勢必不利今議進兵橫水左溪剋期在十一月朔賊見我兵未集師期尚逺必以為先事桶岡覲望未備乘此急擊之可以得志由是移兵臨桶岡破竹之勢成矣于是決意先攻橫水左溪分定哨道指授方略密以十月已酉進兵至十一月已已凡破賊巢五十餘擒斬大賊首謝志珊等五十六從賊首級二千一百六十八俘獲賊屬二千三百二十四衆請乘勝進兵桶岡先生復以桶岡天險四塞中堅其所由入惟瑣匙龍葫蘆洞察坑十八磊新池五處然皆架棧梯壑于崖巔坐發磊石可以禦我師雖上章一路稍平然迂回半月始逹湖兵從入我師復往事皆非便况橫水左溪餘賊悉奔入同難合勢為守必力善戰者其勢險其節短今我欲乘全勝之鋒兼三日之程爭百里之利以頓兵于幽谷所謂強弩之末不能穿魯縞矣莫若移屯近地休兵養威使人諭以禍福彼必懼而請伏或有不從乘而襲之乃可以逞因使其黨往説之賊喜方集議而橫水左溪奔入之賊果堅持不可往復遲疑不睱為備而我兵分道疾進前後合擊賊遂大敗破巢三十餘摛斬大賊首藍天鳯等三十四從賊首級一千一百四俘獲賊屬二千三百捷聞賜敕奬諭是役也監軍副使楊璋參議黃宏領兵都指揮許清指揮使郟文知府邢珣季斆伍文定唐淳知縣王天與張戬指揮余恩馮翔縣丞舒富隨征參謀等官指揮謝昶馮廷瑞姚璽同知朱憲推官危夀徐文英知縣陳允諧黃文鸑宋瑢陸璥千户陳偉髙􅌖等咸上功酋長謝志珊就擒先生問曰汝何得黨類之衆若此志珊曰亦不容易曰何曰平生見世上好漢斷不輕易放過多方鈎致之或縱其酒或助其急待其相德與之吐實無不應矣先生退語門人曰吾儒一生求朋友之益豈異是哉十二月班師師至南康百姓沿途頂香迎拜所經州縣隘所各立生祠逺鄉之民各肖像于祖堂歲時尸祝閏十二月奏設崇義縣治及茶寮隘上堡鉛厰長龍三巡檢司先生上言橫水左溪桶岡諸賊巢凡八十餘界乎上猶大庾南康之中四方相距各三百餘里號令不及以故為賊所據今幸削平必建立縣治以示控制議割上猶崇義等三里大庾義安三里南康至坪一里而特設縣治于橫水道里適均山水合抱土地平坦仍設三巡檢司以遏要害茶陵復當桶岡之中西通桂陽桂東南連仁化樂昌北接龍泉永新東入萬安興國宜設隘保障令千户孟俊伐木立柵移皮𫀆洞隘兵而益以鄰近隘夫守焉議上悉從之縣名崇義十有三年戊寅先生四十七歲在贛正月征三浰與薛侃書曰即日已抵龍南明日入巢四路皆如期並進賊有必破之勢矣向在橫水嘗寄書仕德云破山中賊易破心中賊難區區翦除鼠竊何足為異若諸賢掃蕩心腹之寇以收廓清平定之功此誠大丈夫不世之偉績數日來諒巳得必勝之䇿奏捷有期矣何喜如之梁日孚楊仕德誠可與共學廨中事纍尚謙小兒正憲猶望時賜督責時延尚謙為正憲師兼倚以衙中政事故云二月奏移小溪驛小溪驛舊當南康南安中丙子大庾峰山里民懼賊讐殺自碩築城為衛至是年二月奏移驛其中三月疏乞致仕不允以病也襲平大帽浰頭諸寇先生議攻取之宜先橫水次桶岡次與廣東徐圖浰頭方進兵橫水時恐浰頭乘之乃為告諭頗多感動惟池仲容曰我等為賊非一年官府來招非一次告諭何足憑待金巢等無事降未晚也金巢等至乃釋罪推誠撫之各願目投于是擇其衆五百人從征橫水橫水既破仲容等始懼遣其弟池仲安來附意以緩兵先生覺之比征桶岡使截路上新池以迂其歸內嚴警備外若寬假𬒳害者皆言池氏凶狡兩經夾勦無功其曰狼兵易與耳調來須半年我避不須一月謂來不能速留不能久也咸請濟師不從乃密晝方略使各歸部集候期遏賊及桶岡破賊益懼私為戰守之備復使人賜酋牛酒以察其變賊度不可隱詐稱龍川新民盧珂鄭志髙等將行掩襲故豫為防非虞官兵也佯信之因怒珂等擅兵讐殺移檄龍川使廉實將伐木開道討之賊聞且信且懼復使來謝會珂等告變先生欲藉珂以紿三浰密語珂曰吾姑毀狀汝當再來來則受杖三十繫數旬乃可珂知既喜諾先生復授其意參隨密示行杖人令極輕至是假怒珂數罪狀且將逮其屬盡斬之而隂縱其弟集兵先生先期召巡捕官佯曰今大征已畢時和年豐可令民家盛作鼓樂大張燈會樂之亦數十年一竒事也又曰樂戶多住龜角尾恐招盜曷遷入城來于是街巷俱然燈鳴鼓已旬餘又遣指揮俞恩及黃表頒曆三浰推心招徠之時仲容等疑先生圖已既得曆稍安黃表輩從容曰若輩新民禮節生踈我來頒曆若可髙坐乎于是仲容率其黨九十二人皆悍酋來營教場而自以數人入見先生呵曰若皆吾新民不入見而營教場疑我乎仲容惶恐曰聽命耳即遣人引至祥符宫見物宇整潔喜出望外是時十二月二十三也先生既遣參隨數人館伴復製青衣油靴教之習禮以察其志意所向審其貪殘終不可化而士民咸詬于道曰此養寇貽害先生始決殱魁之念矣踰日辭歸先生曰自此至三浰八九日今即往歲內未必至家即至又當走拜正節徒自取勞苦耳聞贛州今歲有燈曷以正月歸乎數日復辭先生曰正節尚未犒賞奈何𥘉二日令有司大烹于宫以次日宴是夕令龍光潛入甲士詰旦盡殱之先生自惜終不能化日已過未刻不食大昡暈嘔吐先時嘗密遣千戶孟俊督珂弟集兵以防其變及是夜將半自率軍從龍南冷水直搗下浰賊故阻水石錯立水中先生躡屩先行諸軍繼之無溺者門堅甚先生摘百人捲旗持炮火緣後山登須臾後山炮火四發旗幟滿山守者狼顧門遂破時正月七日丁未也兵備副使楊璋守備指揮郟文知府陳祥邢珣季斆推官危夀指揮余恩姚璽縣丞舒富皆從凡破巢三十有八擒斬賊首五十八從賊二千餘餘奔九連山往議九連山橫亘數百里四面陡絶須半月始逹而賊已據險先生選精鋭七百餘皆衣賊衣佯奔潰乘暮至賊崖下賊下招之我兵佯應既度險扼其後路次日從上下擊西路伏起一鼓擒之撫其降酋張仲全等二百餘人視地里險易立縣置隘留兵防守而歸先生未至贛時已聞有三省夾攻之議即謂夾攻大舉恐不足以滅賊乃進攻治疏謂朝廷若假以賞罰使得便宜行事動無掣肘可以相機而發一寨可攻則攻一寨一巢可朴則撲一巢量其罪惡之淺深而為剿撫之先後則可以省供饋征調之費日剪月削澌盡灰滅此則如昔人拔齒之喻齒拔而兒不覺者也若欲夾攻以快一朝之忿則計賊二萬須兵十萬積粟料財數月而事始集兵未出境賊已深逃鋒刃所加不過老弱脅從之輩耳况狼兵所過不減于盜近年江西有姚源之役福建有汀漳之寇府江之師方集于兩廣偏嬌之討未息于湖湘若復加以大兵民將何以堪命此則一拔去齒而兒亦隨斃者也是疏方上而夾攻成命已下矣先生又以為夾攻之䇿名雖三省大舉其實舉動次第自有先後如江西之南安有上猶大庾桶岡等處賊巢與湖廣桂東桂陽接境夾攻之舉止宜江西與湖廣會合而廣東于仁化縣要害把截不與焉贛州之龍南有浰頭賊巢與廣東龍川接境夾攻之舉止宜江西與廣東會合而湖廣不與焉廣東樂昌乳源賊巢與湖廣宜章縣接境惠州賊巢與湖廣臨武縣接境仁化縣賊巢與湖廣桂陽縣接境夾攻之舉止宜湖廣廣東二省會合而江西于大庾縣要害把截不與焉若不此之察必𣣔通待三省兵齊然後進剿則老師費財為害匪細矣今併力于上猶也則姑遣人佯撫樂昌諸賊以安其心彼見廣東既未有備而湖廣之兵又不及已乃幸旦夕之生必不敢越界以援上猶及上猶既舉而湖廣移兵以合廣東則樂昌諸賊其勢已孤二省兵力益專其舉益易當是之時龍川賊巢相去遼絶自以為風馬牛不相及彼見江西之兵又徹意必不疑班師之日出其不意回軍合擊蔑有不濟者矣疏上朝廷許以便宜行事桶岡既滅湖廣兵期始至恐其徒勞逺涉即奬勵統兵參將史春使之即日回軍及計斬浰頭廣東尚不及聞皆與前議合四月班師立社學先生謂民風不善由于教化未明今幸盜賊稍平民困漸息一應移風易俗之事雖未能盡舉姑且就其淺近易行者開導訓誨即行告諭發南贛所屬各縣父老子弟互相戒勉興立社學延師教子歌詩習禮出入街衢官長至俱義手拱立先生或贊賞訓誘之久之市民亦知冠服朝夕歌聲逹于委巷雍雍然漸成禮讓之俗矣按訓蒙大意示教讀劉伯頌等曰今教童子者當以孝悌忠信禮義廉耻為專務其培植􅉼養之方則宜誘之歌詩以發其志意遵之習禮以肅其威儀諷之讀書以開其知覺今人往往以歌詩習禮為不切時務此皆末俗庸鄙之見烏足以知古人立教之意哉大抵童子之情樂嬉戲而憚拘檢如草木之始萌芽舒暢之則條逹摧撓之則衰痿故凡誘之歌詩者非但發其志意而已亦所以泄其跳號呼嘯于咏歌宣其幽抑結滯于音節也導之習禮者非但肅其威儀而已亦所以周旋揖讓而動蕩其血脈拜起屈伸而固束其筋骸也諷之讀書者非但開其知覺而已亦所以沉潛反復而存其心抑揚諷誦以宣其志也若責其檢束而不知導之以禮求其聰明而不知養之以善彼視學舍如囹獄而不肯入視師長如寇讐而不欲見矣求其為善也得乎五月奏設和平縣和平縣治本和平洞羊子地為三省賊衝要路其中山水環抱土地坦平人煙輳集千有餘家東去興寧長樂安逺西抵河源南界龍川北際龍南各有數日程其山水阻隔道路遼逺人迹既稀姦宄多萃相傳原非循州龍川雷鄉一州二縣之地後為賊據止存龍川一縣洪武中賊首謝士真等相繼作亂遂極陵夷先生謂宜乘時修復縣治以嚴控制改和平巡檢司于浰頭以遏要害議上悉從之六月升都察院右副都御史廕子錦衣衛世襲百户辭免不允旌橫水桶岡功也先生具疏辭免曰臣過蒙國恩授以巡撫之寄時臣方抱病請告偶值前官有托疾避難之嫌朝廷譴之簡書臣遂狼狽蒞事當是時兵耗財匱盜熾民窮束手無䇿朝廷念民命之顛危慮臣力之薄劣本兵議假臣以賞罰則從之議給臣以旗牌則從之議改臣以提督則從之授之方略而不拘以制責其成功而不限以時由是臣得以伸縮如志舉動自由一鼓而破橫水再鼓而滅桶岡振旅復舉又一鼓一破三浰再鼓而下九連皆本兵之議朝廷之斷也臣亦何功之有而敢冒承其賞乎况臣福過災生已嘗懇疏求告今乃求退獲進引咎蒙賚其如賞功之典何奏入不允七月刻古本大學先生出入賊壘未暇寧居門人薛侃歐陽德梁焯何廷仁黃弘綱薛俊楊驥郭治周仲周衝周魁郭持平劉道袁夢麟王舜鵬王學益余光黃槐密黃鎣吳倫陳稷劉魯扶黻吳鶴薛僑薛宗銓歐陽昱皆講聚不散至是回軍休士始得專意于朋友日與發明大學本旨指示入道之方先生在龍場時疑朱子大學章句非聖門本旨手録古本伏讀精思始信聖人之學本簡易明白其書止為一篇原無經傳之分格致本于誠意原無缺傳可輔以誠意為主而為致知格物之功故不必增一敬字以良知指示至善之本體故不必假于見聞至是録刻成書傍為之釋而引以敘刻朱子晚年定論先生序略曰昔謫官龍場居夷處困動心忍性之餘恍若有悟證諸六經四子洞然無復可疑獨于朱子之説有相抵牾恆疚于心切疑朱子之賢而豈其于此尚有未察及官留都復取朱子之書而檢求之然後知其晚歲固已大悟舊説之非痛悔極艾至以為自誑誑人之罪不可勝贖世之所傳集注或問之類乃其中年未定之説自咎以為舊本之誤思改正而未及而其諸語類之屬又其門人挾勝心以附巳見固于諸子平日之説猶有大相繆戾者而世之學者局于見聞不過持循講習于此其于悟後之論概乎其未有聞則亦何怪乎豫言之不信而朱子之心無以自暴于後世也乎豫既自幸説之不繆于朱子又喜朱子之先得我心之同然且慨夫世之學者徒守朱子中年未定之説而不復知求其晚歲既悟之論競相呶呶以亂正學不自知其已入于異端輒採録而裒集之私以示夫同志庶幾無疑于吾説而聖學之明可冀矣與安之書曰留都時偶因饒舌遂至多口攻之者環四面取朱子晚年悔悟之説集為定論聊藉以解紛耳門人輩近刻之雩都𥘉聞甚不喜然士夫見之乃往往遂有開發者無意中得此一助亦頗省頰舌之勞近年篁墩諸公嘗有道一等編見者先懷黨同伐異之念故卒不能有入反激而怒今但取朱子之所自言者表章之不加一辭雖有𥚹心將無所施其怒矣有志向者一出指示之八月門人薛侃刻傳習録侃得徐愛所遺傳習録一卷序二篇與陸澄各録一卷刻于􅐚是年愛卒先生哭之慟愛及門獨先聞道亦早嘗逰南嶽夢一瞿曇撫其背曰爾與顔子同德亦與顔子同夀自南京兵部郎中告病歸與陸澄謀耕霅上之田以俟師年才三十一先生每語輒傷之九月修濂溪書院四方學者輻輳始寓射圃至不能容乃修濂溪書院居之先生大征既上捷一日設酒食勞諸生且曰以此相報諸生瞿然問故先生曰始吾登堂每有賞罰不敢肆常恐有愧諸君比與諸君相對久之尚覺前此賞罰猶未也于是思求其過以改之直至登堂行事與諸君相對時無少增損方始心安此即諸君之助固不必事事煩口齒為也諸生聞言愈省各畏十月舉鄉約先生自大征後以為民雖格面未知格心乃舉鄉約告諭父老子弟使相警戒辭有曰頃者頑卒倡亂震驚逺邇父老子弟甚憂苦騷動彼冥頑無知逆天叛倫自求誅戮究言思之實足憫悼然亦豈獨冥頑者之罪有司撫養之有缺訓迪之無方均有責焉雖然父老之所以倡率飾勵于平日無乃亦有所未至歟今倡亂渠魁皆就擒滅脅從無辜悉巳寬貸地方雖以寧復然創今圖後父老所以教約其子弟者自此不可以不豫故今特為保甲之法以相警戒聯屬父老其率子弟慎行之務和爾鄰里齊爾姻族德義相勸過失相規敦禮讓之風成淳厚之俗十有一月再請疏通鹽法據戶部覆疏所允南贛暫行鹽稅例止三年先生念連年兵餉不及小民而止取鹽稅所謂不加賦而財足所助不少且廣鹽止行于南贛其利小而淮鹽必行于袁臨吉以灘髙也故三府之民長苦乏鹽而私販者水發舟多蔽河而下寡不敵衆勢莫能遏乃上議以為廣鹽行則商稅集而用資于軍餉賦省于貧民廣鹽止則私販興而弊滋于姦宄利歸于豪右况南贛巢穴雖平殘黨未盡方圖保安之䇿未有撤兵之期若鹽稅一革軍餉之費苟非科取于貧民必須仰給于內帑夫民已貧而斂不休是驅之從盜也外已竭而殫其內是復殘其本也臣竊以為宜開復廣鹽著為定例朝廷從之至今軍民受其利王文成公全書卷之三十二終
