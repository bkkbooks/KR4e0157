front:
  text: 王文成公全書卷之十七
  hash: sha256:fd0d1ef265566aa94f9c0bee58b2a496a9cd8feacee5a5c2d6ec3448d7d3e797
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_012-1a}
body:
  text: 别録九公移公移二巡撫江西征寧藩牌行贛州府集兵䇿應正德十四年六月十八日照得本院奉敕前往福建公幹於六月初九日自贑州啓行由水路十五日至豐城縣地名黃土腦節據知縣顧佖等並沿途地方總甲等稟報江西省城突然變亂撫巡三司等官俱遭拘執殺害逺近軍民甚是驚惶再三阻遏本院且勿前進本院原未帶有官軍勢難輕進欲馳還贛州起兵則地里相去益逺已暫回吉安府就近住劄一面調集兵糧號召義勇一面差人分投瓜探的確另行外為此牌仰本府官吏照牌事理並行附近衛所各行所屬起集父子鄉兵軍餘人等晝夜加謹固守城池以保不測仍仰知府邢珣查將貯庫錢糧盡數開具印信乎本先行呈報毋得隱匿一面行取安逺等縣原操不論上下班次官兵各備鋒利器械通到教場日逐操練重加犒餉選委謀勇官貟管領聽候本院公文一至即刻就便發行敢有違誤定以軍法處治決不輕貸咨兩廣總制都御史楊共勤國難節該欽奉敕福州三衛軍人進貴等脅衆謀反特命爾暫去彼處地方會同查議處置參奏定奪欽此欽遵於六月初九日自贑啓行於本月十五日行至豐城縣地名黃土腦據知縣顧佖等稟稱本月十四日寧府將巡撫孫都御史許副使等官殺死巡按及三司府縣大小官員不從者俱𬒳執縳各衙門印信盡數收去庫藏搬搶一空聲言直取南京一面分兵北上各官競阻本職不宜輕進本職自顧單旅危途勢難復進方爾回程隨有兵卒千餘已夾江並進來追偶遇北風大作本職亦張疑設計整舟安行兵不敢逼幸而獲免本月十八日回至吉安府據知府伍文定等稟稱地方無主乞留暫為區畫逺近居民亦皆遮擁呼號隨又據臨江府拜新淦豐城奉新等縣各差人飛報寧府遣兵四出攻掠拘收印信等因本職奉有前旨𣣔遂徑往福建但天下之事莫急於君父之難若彼順流東下萬一南都失備為彼所襲彼將乘勝北趨動搖京輔如此則勝負之算末有所歸此誠天下安危之大機慮念及此痛心寒骨義不忍舍之而去故遂入城撫慰軍民督同知府伍文定等調集兵糧號召義勇定謀設䇿收合渙散之心作起忠義之氣牽其舉動而使進不得前搗其巢穴而使退無所據庶幾叛逆可擒大難可靖本職自惟弱劣多病屢疏乞休况地方之責亦非本職原任今兹扶疾赴閩實亦意圖便道歸省適當君父之急不忍失此事機姑復暫留期紓國難除具奏外為照前項事情係國家大難存亡所關雖經起調吉安等府兵快非惟武藝無素尤恐兵力不敷必須添調兵馬方克濟事照得南韶惠潮等府各有慣戰精兵堪以調用擬合移咨督發為此今咨貴院煩為選取驍勇精壯兵快夫欵打手人等大約四五千名各備鋒利器械選委謀勇膽略官員或就委嶺南道兵備僉事王大用監統給與各兵行糧不分雨夜兼程前來共勤國難諒貴院素秉忠孝之節久負剛大之氣聞此必將奮㭈而起秉鉞長驅當在郭汾陽之先肯居祖士逺之後哉紛擾之中莫罄懇切惟髙明速圖之案行南安等十二府及奉新等縣募兵䇿應六月二十六日切照叛逆天下之大惡討賊天下之大義國家優禮藩封恩德隆重乃敢輒萌異圖以干憲辟上逆天道下犯衆怒滅亡之期計日可待本院職任雖非專責危難安忍坐視仗順伐逆鼓率忠義豪傑四起發謀協力除行吉安等府縣起調兵快防守地方及行廣東福建湖廣等處各調兵䇿應外照得本省所屬各府州縣衙所見今巡撫都布按等衙門俱各缺官事無統束擬合通行為此仰抄案回府即行所屬縣分拜衛所衙門各起調官軍鄉兵固守城池保障地方仍一面分調兵快散布關隘嚴加把截一面選募驍勇精兵大縣約四五千名小縣約二三千名以上各備鋒利器械供給糧草擇委能幹勇力官員管領操練其各項錢糧費用聼將在官錢糧動支隨申本院查考其濵江去處多備船隻聼候本院差官齎捧旗牌至日即刻依期啓行進攻仍選差慣便人役多方探聼消息不時飛報以慿區畫此係守土官員切責而臣子效忠致身正在今日各宜奮發義氣鼓動軍民共成滅賊之功以輸報國之念毋得遲違觀望失誤軍機自取罪戾寬恤禁約照得江西省城近遭變亂各府州縣兵戈騷動供億勞費兼值天時亢旱秋成無望人民窘迫言之痛心中間恐有無賴之徒乘機竊發驚擾地方理合寬恤禁約但巡撫衙門見今缺官本院駐軍境內不容坐視合就權宜處置通行為此除一面奏聞外仰抄案回府照依案驗內事理并行所屬各縣官員務須軫念地方痛恤民隱凡一應不急詞訟工役俱各停止其軍前合用兵夫糧草各官俱要持廉秉公親自編派毋得因而科擾及聼信下人受財作弊仍嚴加曉諭軍民人等務要各守本分安居田里不許扇惑搬移妄生事端大户毋逼債負小民毋激仇嫌鄉落居民各自會推家道殷實行止端莊一人充為約長二人副之將各人户編定排甲自相巡警保守各勉忠義共勤國難敢有抗違生事驚擾地方者就便拏解赴官治以軍法約長若有乘機侵害衆戶及受財不舉許𬒳害之人告發重治仍仰各縣將前項寬恤禁約事宜翻刻告示發仰鄉村張挂曉諭俟巡撫官員到日再行議處俱無違錯奬瑞州府通判胡堯元擒斬叛黨六月二十七日據瑞州府通判胡堯元報稱擒獲從叛儀賔李蕃斬獲叛黨九十四名等因看得逆賊稱亂天怒人怨誅滅非久然今勢熖正張本官乃能獨奮忠勇首挫賊鋒逺近聞之義氣自倍合行奬勞以勵人心為此牌仰瑞州府官吏即行動支官錢買辦花紅羊酒委官率領官吏師生送至本官用見本院奬勸之意其餘有功人員分别等第量加犒賞被傷兵夫給與湯藥陳亡者厚恤其家候功成之日通行造册申報升賞仍一面起調驍勇精兵固守城池聼候本院調發毋得違誤䇿應豐城牌據豐城縣知縣顧佖稟稱本縣起調鄉兵固守城池惟恐兵力不敷必須請兵䇿應庶保無虞等因看係地方重務已經調發龍泉安福永新等縣并吉安千户所機快軍兵陸續前去䇿應照得發去官兵必須選委謀勇膽略官員統領庶幾調度得宜為此仰通判楊昉即將後開軍兵名數督同千户蕭英監統協同知縣顧佖等計議攻守方略相度險夷要害逺斥堠以防姦勤訓練以齊衆探知賊人入境即便設竒布伏以逸待勞擊其不意務在先發制人毋令乘間抵隙軍兵人等務要嚴為約束毋令侵擾敢有違犯退縮許以軍法從事各官尤要同心并力協和行事共效忠貞之節以紓國家之難如或執拗參錯觀望逗遛違犯節制致有踈虞軍令具存決難輕貸調取吉水縣八九等都民兵牌訪得吉水縣八九等都民人王益題曽思溫易弘爵王昭隆等各戶下人丁素習武勇人多尚義前任知縣周廣曾經起調征進皆係驍勇慣戰之人今兹逆黨倡亂民遭荼毒應合調取以赴國難為此訪差致仕縣丞龍光齎牌前去吉水縣著落當該官吏即將各户義兵照數調集各備鋒利器械編成行伍僉選百長總小甲管領就仰該縣查支官錢給與口糧暫且就屯本縣操演武藝聽候本院指日東下隨軍進剿照得江西一省人民久𬒳寧府毒害侵肌削骨破家蕩産冤困已極控訴無門今其惡貫滿盈天假義兵為民除暴尚聞愚昧之徒阻避寧府威勢不敢舉動殊不知寧府未叛之前尚為親王人不敢犯今逆謀既著即係反賊人人得而誅之復何所憚爾等義民正宜感激忠義振揚威武為百姓報讐泄憤共立不世之勳以收勤王之績毋得稽遲觀望自取軍法重究差去官員不許假此擾害妄生事端體訪得出罪不輕貸預備水戰牌案照巳經行仰起調軍馬前來䇿應日久尚未見到近據探報逆黨南下將攻南都計此時南都必已有備各逆黨進無所獲必退保九江如此則水戰之具為急不可不備為此牌仰福建布政司即行選募海滄打手一萬名動支官庫不拘何項銀兩從厚給與衣裝行糧各備鋒利器械就仰左布政使席書兵備僉事周期雍自行統領星夜前赴軍門相機前進并力擒剿仍行巡撫等衙門同心協力後先監督應援此係叛逆謀危宗社天下荼毒所關呼吸存亡旦暮成敗間不容髮非比尋常賊情不得遲違觀望有虧臣節嗚呼主憂臣辱主辱臣死凡有血氣孰無是心况各官忠義自任剛大素聞必將奮臂疾驅有不容巳兵快及領兵人等敢有違犯節制有誤軍機者仰即遵照本院欽奉勑諭事理許以軍法從事無得姑息咨都察院都御史顔權宜進剿七月初五日節該欽奉云云除具題及咨南京兵部知會外為照前項事情係國家大難安危所關已經起調吉安等府兵快前去征剿并備行湖廣廣東福建各調兵䇿應外照得南畿係朝廷根本重地今寧王謀逆搆亂舉兵北行圖據南都必得四面合攻庶克有濟及照貴院奉命行勘前事即今逆迹已露别無可勘事情合咨前去煩為隨處行令所屬選取驍勇精兵及民間忠義約二三萬名選委謀勇官員分領會約鄰近省郡合勢刻期進討仍煩貴院親督兼程前來共勤國難諒貴院平日忠義存心剛直自許况今奉命查勘寧藩正可權宜行事號召逺邇主憂臣辱主辱臣死他復付言紛擾之中莫罄懇切惟髙明速圖之權處行糧牌據撫州府申稱建昌撫州廣信饒州四府正德十三年兊軍糧米不下十餘萬石原蒙撥在龍窟聼與撫州建安鉛山廣信饒州五所軍旗交兌因運船阻凍回遲於今年六月始行較斛開兌其已兌者裝載軍船未兌者仍在民艘不意十五日省城有變遂行停兌至十八日逆黨乘機劫奪各船順流放至饒州河下得無驚擾但今江河梗塞難以兌運節奏明文動調大軍征討叛逆要將兌軍淮糧暫留以備軍餉申詳到院查得先據吉安等府申稱為各府官軍將臨𣣔將官庫𥿄米贓罰等銀并京庫等銀及將兌淮糧米從權給支借用等情巳經批仰依擬查取去後今申前因擬合準行為此仰府官吏郎行掌印官查將見在饒州灣泊兌軍淮糧準從權宜坐委能幹官員無分雨夜督運江西省城聼候支給各兵行糧毋違時刻候事平之日備造印信文册繳報查照仍令委官前去查照免致下人因而侵欺未便牌行吉安府敦請鄉士夫共守城池七月初八日照得寧府反叛本院調兵進剿即日啓行各府縣掌印正官既該統兵前進所據各該府縣城池雖巳行委各佐二官防守但艱危之際事變不測必須歷練老成之人相與維持鎮定庶幾人心不致驚疑政務有所倚賴為此案行吉安府官吏通行各縣署印官員徑自以禮敦請老成鄉宦衆所推服者一二員在城以備緊急協同行事該府城池關係尤重查得致仕按察使劉遜素有才望忠義奮激就仰該府請至公館仍仰署印官待以賔師之禮托以咨決之事一應軍機事宜咨稟計議而行以安人心以濟大事仍行本官務以國家大難為心盡心竭力共圖殄賊毋以休致自嫌諒朝廷報功之典當亦自不相負如誤大事咎亦有歸通無違錯牌行各哨統兵官進攻屯守七月十七日仰一哨統兵官吉安府知府伍文定即統部下官軍兵快四千四百二十一員名進攻廣潤門就留兵防守本門直入布政司屯兵分兵把守王府內門仰二哨統兵官贛州府知府邢珣即統部下官軍兵快三千一百三十餘員名進攻順化門就留兵防守本門直入鎮守府屯兵仰三哨統兵官袁州府知府徐璉即統部下官軍兵快三千五百三十員名進攻惠民門就留兵防守本門直入按察司察院屯兵仰四哨統兵臨江府知府戴德孺即統部下官軍兵快新喻二縣三千六百七十五員名進攻永和門就留兵防守本門直入都察院提學分司屯兵仰五哨統兵官瑞州府通判胡堯元童琦即統部下官軍兵快四千員名進攻章江門就留兵防守本門直入南昌前衛屯兵仰六哨統兵官泰和縣知縣李楫即統部下官軍兵快一千四百九十二員名夾攻廣潤門直入王府西門屯兵守把仰七哨統兵官新淦縣知縣李美即統部下官軍兵快二千員名進攻德勝門就留兵防守本門直入王府東門屯兵守把仰中軍營統兵官贛州衛都指揮余恩即統部下官軍兵快四千六百七十員名進攻進賢門直入都司屯兵仰八哨統兵官寧都知縣王天與即統部下官軍兵快一千餘員名夾攻進賢門留兵防守本門直入鍾樓下屯兵仰九哨統兵官吉安府通判談儲即統部下官軍兵快一千五百七十六員名夾攻德勝門直入南昌左衛屯兵仰十哨統兵官萬安縣知縣王冕即統部下官軍兵快一千二百五十七員名夾攻進賢門就守把本門直入陽春書院屯兵仰十一哨統兵官吉安府推官王暐即統部下官軍兵快一千餘員名夾攻順化門直入南新二縣儒學屯兵仰十二哨統兵官撫州通判鄒琥知縣傅南喬即統部下官兵三千餘員名夾攻德勝門就留兵防守本門隨於城外天寧寺屯兵承委官員務要竭忠奮勇擒剿叛逆以靖國難如或退縮觀望違犯節制定以軍法論處軍兵人等敢有臨陳退縮者就仰本官遵照本院欽奉勑諭事理就於軍前斬首示衆牌候事完日繳告示在城官七月十八日照得寧王造謀作亂神人共憤法所必誅在城宗支郡王儀賔皆被逼脅如鍾寧王無罪削爵建安王父子俱死軍民人等或覆宗滅族或蕩家傾産或勒取子女皆恨入骨髓敢怒而不敢言今日之事豈其本心本院仰仗朝廷威靈調集兩廣并本省狼逹漢土官兵二十餘萬即日臨城亦無非因民之怨惟首惡是問告示至日宗支郡王儀賔各閉門自保啇賈買賣如故軍民棄甲投戈各歸生理無得驚疑該府內臣校尉把守人員開門出首或反兵助順擒斬首惡一體奏聞升賞其有懷姦稔惡從逆不悛者必殺不赦凡我良善軍民即便去惡從善毋陷族滅故示示諭江西布按三司從逆官員照得寧王悖逆天道造謀作亂殺戮大臣都布按三司官員各悚於暴虐保其妻子以致臨難之際不能自擇或俯首幽囚或甘心􅑙伏貪生畏死反面事仇春秋之義雖嚴於無將之誅而志圖興復者尚不忍於峻絶探得各官見今在城閉門自訟者有之臨城巡閘者有之出入府庫運籌畫䇿者有之此皆大義未分孤立無助揆之法理固不容誅推之人情實為可憫即今本院統集狼逹漢土官軍二十餘萬後先臨城各官果能去逆歸順尚可轉禍為福故今特遣牌諭兵臨之日仰各開門出首仍一面將本院發去告示給散張挂撫諭良善百姓宗支儀賔人等各閉門自保毋輕出街市橫遭殺戮該府把守內臣校尉人等亦各諭以大義俾知昔逆向順尚可免死投甲釋戈蓬頭面縛候本院臨審定奪敢有從惡不悛執迷不誤拒敵官兵者必殺無赦仍具改正緣由親齎投首以慿施行毋得遲違自取族滅牌具依準繳來告示七門從逆軍民七月二十一日督府示諭省城七門內外軍民雜役人等除身犯黨逆不赦另議外其原被寧府迫脅偽授指揮千百户校尉護衛及南昌前衛一應從亂雜色人役家屬在省城者仰各安居樂業毋得逃竄有能寄聲父兄子弟改過遷善擒獲首惡詣軍門報捷者一體論功給賞逃回報首者免其本罪仍仰各地方將前項人役一名名赴合該管門官處開報令各親屬一名每五日一次打卯其有收藏軍器許盡數送官各宜悔過毋取流亡牌行江西二司安葬寧府宫眷照得寧王造反稱兵向闕行委偽官萬鋭等把守省城音信不通本院所行告示負固不納以致討賊安民之義俱未知悉及至統兵攻城該府宫眷一聞銃炮震響閉門縊死燒焚宫空雖寧王背逆罪在不赦而朝廷惇睦之仁何所不至本院已同宗支并原任布按二司及吉安等府知府等官伍文定等親赴該府驗看未焚庫藏巳封號訖所據各宫眷身尸相應埋葬為此合行案仰布按二司即便啓知建安王選委各郡王府老成內使火者三四貟會同南昌府南新二縣官措置棺木以禮安􅌾毋得違錯不便手本南京內外守備追襲叛首七月二十三日本年七月二十日準欽差南京內外守備揭帖內開煩念南京根本重地宗廟陵寢所在作急整點精鋭軍兵數萬名擇將統領星夜兼程前來粘蹤追襲攻擊其後保固根本重地所統官軍煩沿途經過去處應付廩給口糧馬匹草料事寧之日獲功官軍具奏升賞請勿遲延等因卷查先為飛報地方謀反重情事照得本院奉勑前往福建地方公幹行至豐城縣聞寧府謀反遂返吉安住劄看係謀危宗社重情隨即具題并行吉安贛州等府起調官兵俟釁而發及咨南京兵部并巡撫應天都御史李煩為通行在京大小衙門會謀集議作急繕完城守簡練舟師設伏沿江旁檄列郡先發操江之兵聲義而西約會湖湘互為掎角本院亦砥鈍䇿駑牽躡其後以義取暴以直加曲不過兩月之間斷然一鼓可縛去後續據本院瓜探人役回報寧王巳下南京留有逆黨內官驅脅官民人等一萬餘貟名固守城池虐熖昌熾阻絶往來等因又經節催府縣兵快分布哨道親自統領刻期於七月二十日寅時直抵省城進攻仍𬒳逆黨砌塞城門分兵拒固當幸官兵用命奮勇攻破城門各賊遂皆奔潰當即分兵擒搜及差人分投瓜探叛首句往的確并發官兵前去追襲外今準前因合用手本前去煩為查照施行咨兩廣總督都御史楊停止調集狼兵案照本院看得前項事情係國家大難存亡所關雖調各府兵快非惟武藝無素尤恐兵力不敷即隨備咨欽差總督右都御史楊煩為選取驍勇兵快大約三五千名就委嶺南道兵備僉事王大用監統給與各兵行糧兼程前來共勤國難及行廣東布政司轉行各道并呈鎮守撫按等衙門一體查照知會去後節據知縣顧佖等報寧王已下南京留有逆黨內官驅脅官民人等一萬餘貟名固守城池阻絶往來等情隨該本院催督所調兵快分布哨道親自統領刻期於七月二十日寅時直抵省城進攻仍𬒳逆黨砌塞城門分兵固拒當幸官兵用命奮勇攻破城門各賊遂皆奔潰隨即分兵搜擒外今照前項事情見該欽命京邉官軍二十餘萬前來會剿及本院見統官兵五萬餘員名俱在江西省城即今分遣委官監督前去約會併勢追襲所據原調廣東土漢狼兵人等未審曽否齊集但今南贛吉安南昌等處沿江人民俱各畏懼狼兵悉皆驚惶及又訪得狼逹土兵曽受寧王贓物私許助謀效力今調各兵本以為國除害惟恐返為民害不無有誤大事擬合停止為此合行移咨貴院煩為查照希將起調兵快停留本省應用施行牌行撫州知府陳槐等收復南康九江七月二十四日照得寧王謀反興兵向闕南康九江見𬒳攻破分留逆黨據守二府城池意圖西扼湖兵之應援南遏我師之追躡仰賴宗社威靈克復省城除遣知府伍文定等分布哨道邀擊寧賊務在得獲外所據逆黨占據府縣應合分兵勦復為此牌仰知府陳槐等各選精兵身自統領星夜前去南康九江地方相機行事務要攻復城池平靖反側仍將地方人民加意賑恤激以忠義撫以寬仁權舉有司之職以理庶事查處倉庫之積以足軍資一靣分兵邀誘寧賊毋令東下并差人瓜探飛報軍門各官務要同心併力協和行事毋得人懷一心彼此參錯致誤事機兵快人等敢有違犯節制者仰照本院欽奉勑諭事理以軍法從事一應事機呈稟往復慮有稽緩俱聼一靣從宜區畫一靣呈報軍門仍備查各官棄城逃走致賊焚掠屠戮之故具由申報以憑參拿究治犒賞福建官軍據福建按察司整飭兵備兼管分巡漳南道僉事周期雍呈稱依奉本院案驗起取上杭等處軍兵共五千餘名分委指揮劉欽知縣邢暄等及起取漳州府海滄打手三千餘名行委通判李一寧等管領本道躬親統督先後啓行前來等因到院案照先為飛報地方謀反重情事看係國家大難存亡所關隨即備咨南京兵部及巡撫兩廣湖廣等衙門并福建三司等官選取驍勇兵快選委謀勇官員監統兼程前來共勤國難去後今據前因看得逆賊已經成擒餘黨悉漸殄滅除將各該官兵先行發回外切照福建漳南相距江西省城約計程途有一千七八百里之遙該道乃能不滿旬月調集官軍兵快八千員名之衆首先各省而至足見本官勇略多謀預備有素忠義之誠足以感激人心敏捷之才足以綜理庶務故一呼而集兼程赴難除另行旌奬外及照調來官兵衝冒炎暑逺赴國難忠義既有可嘉勞苦尤為足憫合加犒賞以勵將來為此除將支出官銀差官領齎該道仰抄案回司即將原調領兵官員并軍兵鄉夫人等酌量犒賞用見本院奬勞之心以為將來忠勤之勸仍仰該道備查各兵原係操練者照舊在班操練以備緊急調用添募者省令回還田里各安生業務為良善之民共嚮太平之福毋得分外為非致招身家之纍備行巡按衙門知會釋放投首牌據吳國七林十一等口稱閔念四等落水身死今訪得閔念四等見在寧州界上告要投招前者巳曾發有告示許令脅從新民俱準投首免死給照復業生理近日朝廷􅑙有黃榜亦準投首免死今聞各地方居民不體朝廷及本院好生之意輒便起兵勦殺激使不敢出身投首反使朝廷及本院失信於人本當綁拿重究姑且再行誡諭為此牌仰寧州知州汪憲探訪前項一起投首之人是否閔念四等正身若果有投首真情即便帶領前赴軍門發落準與楊子橋等一例釋放給與執照各自復業當差如或聚衆不散星夜飛報軍門以憑發軍勦滅俱毋違錯牌仰沿途各府州縣衛所驛遞巡司衙門慰諭軍民照得先因寧王謀反請兵征剿續該本院親督各哨於七月二十日攻復省城二十四等日在鄱陽湖連日與賊大戰至二十六日遂將寧王俘執及其謀黨李士實等賊首林十一等俱巳前後擒獲餘黨蕩平地方稍靖巳於本月三十日具本奏捷訖近因傳報京軍復來愚民妄相逃竄往往溺水自縊本院親行撫諭尚未能息殊不知朝廷出兵專為誅剿寧賊救民水火之中况統兵將帥皆係素有威望老臣宿將紀律嚴明逺近素所稱服縱使復來亦必自無擾害况今寧賊已擒地方巳靖京軍豈有無事逺涉之理愚民無知轉相驚惑深為可憫誠恐沿途一帶居民亦多聼信傳聞不實之言而北來京軍尚或未知寧王已就擒獲合行差官沿途曉諭軍民及一靣迎候北來官兵煩請就彼回轉除將寧王反逆黨與本院親自量帶官兵徑從水路解赴京師外仰沿途軍衛有司驛遞等衙門照牌事理即行抄牌備出告示曉諭逺近鄉村軍民人等使知寧賊巳擒京軍巳轉免致驚疑釀成他變差去官員仍仰程程護送同與迎候京軍堅請就彼回轉以免沿途百姓供給之苦仍諭以本院押解賊犯量帶官兵皆自備行糧廩給沿途經過有司等衙門止備人夫牽拽船隻及略供柴草給付各兵燒用其他一無所擾不得因此科害里甲軍民差去官員晝夜前進毋得在途遲滯抄牌官吏各俱依準候本院經過日繳案行江西按察司停止獻俘呈據江西按察司呈奉欽差提督軍務御馬監太監張劄付內開會同欽差提督軍務平賊將軍充總兵官左都督朱得止兵息民不為無見但照奔潰黨惡見該各屬日報嘯聚流劫亦非已靖黨惡閔念四等又係職等行文之後拿獲之數亦或尚多撫按守臣當此新亂之餘正宜留心撫綏地方聼候勘明解京良由不知前因固執一見輒要自行獲解私請回師再照妃媵係宗藩眷屬外官押解恐有妨礙設或越分擅為咎歸何人職等體念民力不堪供給軍餉責令將官將所領官兵分布各府住劄聼掣當職止帶合用參隨執打旗號等項人員徑趨江西公同巡撫等官查驗巢穴及遍給告示曉諭撫安地方一靣具請定示另行除差委錦衣衛都指揮僉事馬驥前來外劄仰本司各該官吏照依劄付內事理即便遵照鈞帖內事理備行巡撫都御史王等將已獲賊犯留彼聼候明旨欽遵施行等因備呈到院卷查先為飛報地方謀反重情事云云本職將寧王并其逆黨親自量帶官兵徑赴水路照依原擬日期啓行解赴京師已至廣信地方今準前因為照前項逆黨俱已擒獲其餘脅從遵照欽􅑙黃榜事例俱已許令投首解散宗藩眷屬俱係取到各將軍府內使管伴監守保無他嫌今欽差提督贊畫機密軍務御用監太監張及欽差提督軍務御馬監太監張欽差提督軍務平賊將軍充領兵官左都督朱憂國愛民之心素聞逺近况號令嚴明秋毫無犯今來體勘逆賊巢穴果已破平百姓貧困顛連必能大加撫諭安輯以仰布朝廷懷惠小民之仁本職縱使復回省城亦安能少效一籌不過牲返道途違誤奏過程期有損無益為此仰抄案回司著落當該官吏照依案驗內事理即便備呈前去煩請徑自查照施行咨兵部查驗文移照得本職巳將寧王宸濠并其黨與及宫眷人等照依原擬具奏日期起程親自解赴闕下間隨據南康府申并江西按察司呈各奉欽差提督軍務御馬監太監張劄付內開訪得宸濠巳該本職擒獲克復省城等語未曾親到江西又無堪信文移止是見人傳説遽難憑據况係宗藩人衆中間恐有撥置同謀逆黨未盡等因及節準欽差提督贊畫機密軍務御用監太監張揭帖開稱將各犯委的當人員用心防守調攝飲食獻俘闕下會官封記庫藏俱候按臨地方區畫等因又準欽差提督軍務充總兵官安邊伯朱手本開稱即查節次共擒斬叛賊級若干內各處原奏報有名若干無名若干有名未獲漏網并自首及得獲馬騾器械等項各若干連獲官軍衛所職役姓名備查明白俱各存留江西省城聼候審驗仍查餘黨有無奔潰及曾否殄滅盡絶緣由通行開報以慿回報等因各到職為照宸濠并其同謀黨與俱已擒獲餘孽亦就誅戮雖有脅從數亦不多皆非得巳隨即遵奉欽􅑙黃榜曉諭俱赴所在官司投首解散其庫藏等項該本職會同多官於未準揭帖之先眼同封貯在官聼候命下定奪官軍兵快擒斬功次見該原經奏留兩廣監察御史謝源伍希儒查造奏繳及照宸濠并各重犯宫眷人等見解廣信地方設若往返恐致踈虞及違誤本職奏報原擬日期除照舊督解前赴闕下獻俘以昭聖武及具揭帖各另回覆外今照前因照得本職繆當軍旅重寄地方安危所關三軍死生攸係一應事機若非奉有御寶勑旨及兵部印信咨文安敢輕易慿信今前頃各官文移既非祖宗舊章成憲就使果皆出於上意亦須貴部行有知會公文萬一姦人假托各官名目乘間作弊致有不測變亂本職雖死亦何所及除奉欽差總督軍務威武大將軍總兵官後軍都督府太師鎮國公朱鈞帖曾奉朝旨相應遵奉其餘悉遵舊章施行外緣前項各官文移未委虛的俱合備行咨報貴部為此備抄揭帖粘連咨請查驗施行案行浙江按察司交割逆犯暫留養病十月初九日照得當職先因患病具本乞休間奉敕扶病前往福建公幹六月十五日行至江西豐城地方適遇寧王興兵作亂看係君父大難義不忍去復回吉安府督同知府伍文定等起調兵夫招集義勇扶病親行統領於七月二十日攻復省城本月二十四五六等日於鄱陽湖連日大戰擒獲寧王宸濠及逆黨李士實劉飬正王春等賊首吳十三凌十一閔念四吳國七閔念八等先後具本奏報外隨聞大駕南征禮當解赴軍門又因宸濠連日不食慮恐物故無以獻俘奏凱彰朝廷討賊之義兼之合省內外人情洶洶或生他變當具本題知於九月十一日啓行將宸濠及逆黨宫眷解赴軍門當職力疾沿途醫藥親行押解行至廣信地方又奉欽差總督軍務鈞帖備仰照依制諭內事理即便轉行所屬司府衛所州縣驛遞等衙門欽遵施行等因遵依通行間續準欽差提督軍務御馬太監張照會及準欽差總督軍務充總兵官安邊伯朱手本各遣官邀回本職并將所解宸濠等逆犯回省聼候會審本職看得既奉總督軍門鈞帖自合解赴面受節制若復退還省城坐待駕臨恐涉遲謾且誤奏過程期又復扶病日夜前進行至浙江杭州府地方前病愈加沉重不能支持請醫調治間適遇欽差提督贊畫機密軍務御用監太監張奉命前來江西體勘宸濠等反逆事情及查理庫藏宫眷等事當準鈞帖開稱宸濠等待親臨地方覆審明白具奉軍門定奪等因為照本職先因父老祖喪纍疏乞休未蒙俞允隨扶病赴閩意圖了事即從彼地冒罪逃歸旬日之前亦已具奏不意行至中途遭值寧王反叛此係國家大變臣子之義不容舍之而去又闔省巡撫地方等官無一人見在天下事機間不容髮故復忍死暫留為牽制攻討之圖候命師既至地方稍靖即從初心死無所避臣區區報國血誠上通於天不辭滅宗之禍不避形迹之嫌冒非其任以勤國難亦望朝廷鑒臣此心不以法例繩縛使得少申烏鳥之私等情具奏外今照前事本職自度病勢日重猝未易愈前進既有不能退回愈有不可若再遲延必成兩誤除本職暫留當地請醫調治俟稍痊可一靣仍回省城或仍前進沿途迎駕一靣具本乞恩養病另行外所據原解逆犯合就查明交割帶回省城聼候駕臨審處通行為此仰抄案回司著落官吏備呈欽差提督軍務贊畫機密軍務御用監太監張煩請會同監軍御史公同當省都布按三司等官將見解逆首宸濠及逆黨劉吉等各犯并宫眷馬匹等項逐一交查明白仍請經自另委相應官貟兵快人等管押帶回省城從宜審處施行仍備呈兵部查照知會抄案依準并行過日期先行呈來告諭軍民十二月十五日告諭軍民人等爾等困苦已極本院才短知窮坐視而不能救徒含羞負愧言之實切痛心今京邉官軍驅馳道路萬里逺來皆無非為朝廷之事拋父母棄妻子𬒳風霜冒寒署顛頓道路經年不得一顧其家其為疾苦殆有不忍言者豈其心之樂居於此哉况南方卑濕之地尤非北人所宜今春氣漸動瘴疫將興久客思歸情懷益有不堪爾等居民念自己不得安寧之苦即須念諸官軍久離鄉土拋棄家室之苦務敦主客之情勿懷怨恨之意亮事寧之後凡遭兵困之民朝廷必有優恤今軍馬塞城有司供應日不暇給一應爭鬪等項詞訟俱宜含忍止息勿輒告擾各安受爾命寧奈爾心本院心有餘而力不足聊布此苦切之情於爾百姓其各體悉無怨欽奉詔書寬宥脅從節該伏覩詔書朕親統六師正名討罪除首惡宸濠并同謀有名逆賊不赦外其餘脅從之徒盡行寬宥釋放欽此欽遵照得先因寧府作亂該本院出給告示官兵臨城之日惟首惡是問宗支郡王儀賔人等各閉門自保商賈買賣如故軍民棄甲投戈各歸生理毋得驚疑其有懷姦稔惡不悛者必殺無赦脅從人等但能赴官投首即與釋放免罪等情已經發仰逺近張挂曉諭外後宸濠既擒被脅之徒前後赴官投首不下千餘皆經查審釋放其間尚有𣣔赴首官司多被地方攔阻本院隨又督解逆犯出外以是一向遲疑未即出投續該欽差提督軍務各衙門臨省前項被脅之人始各赴官投首就與本院事體一同即是去惡從善之民近訪得有等無籍之徒用言扇惑乘機詐害致使驚疑未安生理除訪拿究問外仰按察司抄捧回司即便大書出給告示發仰人煙輳集去處常川張挂曉諭自破城以後但有𬒳脅旗校軍民人等改惡遷善已經赴官投首驗有執照者皆係良善俱仰遵照前項詔書內事理盡行寬宥釋放各安生理毋得信人恐嚇自生猜疑地方里鄰總甲人等敢有懷挾私讐羅織擾害誑言扇惑詐騙財物者仰即赴院告理以慿拏問發遣仍取各首到官姓名并給過告示曉諭緣由呈報批追徴錢糧呈據江西布政司呈看得江西一省重遭大患民困已極屢經奏免糧稅日久未奉明旨近因南科奏停隨復部使催督一以為蠲免一以為追徴非惟下民無所遵守亦且官府難於施行今該司議謂兌淮起運係京儲額數而王府祿米亦歲月難缺要行所屬先納兌淮次及京庫折銀次及南京倉米次及王府祿米其餘俱候明降等因此亦深覩民患𣣔濟不能委曲調停計出無奈仰司即如所議備行各該府州縣查照施行後有恩旨當亦止免十五年以後錢糧其十四年以前拖欠必須帶徴終有不免莫若速了為便各府州縣宜以此意備曉下民姑忍割肉之痛以救燃眉之急嗚呼目擊貧民之疾苦而不能救坐視徴求之急迫而不能止徒切痛楚之懷曾無拯援之術傷心慘目汗背赧顔此皆本院之罪其亦將誰歸咎各府州縣官務體此意雖在催科恆存撫字仍備出告示使各知悉此繳再批追徴錢糧呈據江西布政司呈看得本省十四年以前一應錢糧已經給事等官奉奏明旨果係小民拖欠俱準暫且停徴還著各該官司設法賑濟毋視虛文此朝廷之深仁厚德憫念窮民誠愛惻怛之所發小民莫不歡欣鼓舞臣子所當遵守奉行乃今停徴之令甫下而催併之檄復行賑濟之仁未布而箠橽之苦巳加法令如此有司何以奉行下民何所取信夫為人臣者上有益於國下有益於民雖死亦井為之今日所行上使朝廷失信於民下使百姓歸怨於上重貧民之困益地方之災縱使錢糧果可立辦忍心害理亦不能為况旬月之間而𣣔追併了絶就使神輸鬼運亦於事勢不能徒使斂怨殃民何益於事除本院身為巡撫不能為國為民自行住俸待罪外仰布政司行各該府縣官以理勸化小民且諭以今日之舉非關朝廷失信實由京儲缺乏司國計者勢不得已興起其忠君親上之心勉令漸次刻期完納果克濟事兩月之後亦未為遲其各該官員本非其罪不必住俸革去冠帶行令照舊盡心職業勿因事變之難有灰愛民之志後有違慢之戮本院自當其罪仍呈提督漕運行督糧官及巡按衙門知會此繳批南昌府追徴錢糧呈據南昌府所申凋弊徴求之苦本院繆當斯任實切憂慚部堂諸公非無恤民之念但身司國計不得不以空乏為虞在外有司非無國計之憂但目擊民痍不能不以撫恤為重若使平民尚堪朘削一時忍痛并徴以輸國用豈非臣子之心但恐徒爾虐民無濟國事非徒無濟兼恐生虞斟酌調停事在善處仰布政司會同二司各官將該府所申事理即加酌議或先徴新糧將舊糧減半帶徵或儘其力量可及分作幾限令民依期逐漸辦納但可通融調攝皆須悉心議處務使窮民不致重傷而國用終亦無損一靣備行各該府縣查照施行一靣具由呈來以慿咨奏此繳褒崇陸氏子孫正德十五年正月據撫州府金溪縣三十六都儒籍陸時慶告看得宋儒陸象山先生兄弟得孔孟之正傳為吾道之宗派學術久晦致使湮而未顯廟堂尚缺配享之典子孫未沾褒崇之澤仰該縣官吏將陸氏嫡派子孫差役查照各處聖賢子孫事例俱與優免其間有聰明俊秀堪以入學者具名送提學官處選送學肄業務加崇重之義以扶正學之哀具依準繳告諭安義等縣漁户告諭安義縣等漁户及逺近軍民人等地方不幸近遭大變加以師旅征輸人民困苦已極府官思𣣔休養賑恤而無其由近聞漁户人等曾𬒳寧王驅脅者慮恐官府追論舊惡心不自安往往廢棄生業詢其所以皆由讐家煽動意在激使為惡因而陷之死地以快其憤不知朝廷巳屢有搒文凡被寧賊驅脅者一槩釋而不問况訪得安義等處漁户各係詩禮大家素敦良善雖或間有染於非僻及為王府所脅誘者然鄉里逺近自有公論善惡終不可混近據通判林寬稟稱各戶痛懲既往巳將漁船折缷似此誠心改行亦復何所憂懼為此特仰南康府通判林寬將本院告諭真寫翻刋親齎各戶逐一頒諭務使舍舊圖新各安生理不得輕信人言妄有疑猜自求罪纍其素敦詩禮良善者愈加勸勉務益興行禮讓講信修睦以為改惡從善者之倡族黨之中果有長惡不悛不聼勸諭者衆共拘執送官明正典刑以安善類毋容稂莠致害嘉禾若舊雖為顯惡今能誠心改化者亦不得懷記舊讐搜求羅織激使為非事發究竟責有所歸嗚呼吾民同胞不幸陷於罪戮側然尚不忍見豈有追尋舊惡必𣣔置之死地之理本院舊在南贛曾行十家牌式軍民頗安盜賊頗息除各該地方行分巡分守官編置外前項漁戶人等就仰通判林寬照式逐一編置務在著實舉行以收成效特兹告諭各宜知悉批按察使伍文定患病呈據江西按察司呈看得按察使伍文定茂著戎功新膺憲命當其衆難交攻尚以一身獨任偶兹微恙豈妨供職諒本官自切百姓瘡痍之憂豈遑一身痛癢之顧仰該司即行本官照舊管事果有疾患一靣調理毋得再呈辭致曠職業繳批臨江府耆民建立生祠呈據臨江府清江縣耆民董惟謙等呈立知府戴德孺生祠看得知府戴德孺素堅清白之守久著循良之政今其去任而郡民建祠報德此亦可見天理之在人心自不容巳仰該府縣官俯順民情量行撥人看守非徒激勵後人俾有所興且以成就民德使歸於厚繳批吉安府救荒申據吉安府申備廬陵縣申看得所申要將陳腐倉榖賑給貧民此本有司之事當兹災患正宜舉行但誠於愛民者不徒虛文之舉忠於謀國者必有深長之思故目前之災雖所宜恤而日後之患尤所當防以今事勢而觀後患決有難測近據崇仁縣知縣祝鰲申要將預備倉榖凶荒之時則倍數借給以濟貧民收成之日則減半還官以實儲蓄頗有官民兩便已經本院批準照議施行看得各縣事體不甚相逺此議或可通行仰布政司再加裁酌議處施行各屬遇災地方凡積有稻榖者俱查照此議而行仍仰各該掌印官務要身親給散使貧民得實惠之沾官府無虛出之弊乃可其一應科派物料等項當兹兵亂之餘加以水災民不聊生豈堪追併仰布政司酌量緩急分别重輕略定徴收先後之次備行各屬以漸而行庶幾用一緩二之意少免醫瘡剜肉之苦通仰該司定議施行回報批撫州府同知汪嵩乞休呈據撫州府同知汪嵩呈看得同知汪嵩久存恬退遇難復留以盡報國之忠仍堅歸田之請出處得宜誠可嘉尚但本官政素獲民年未甚老已經勉留照舊供職而本官稱疾愈篤求退益懇仰府再行查看如果病勢難留準令就彼致仕該府以禮起送還鄉仍備行原籍官司歲時以禮優待務奬恬退以勵鄙薄此繳批提學僉事邵鋭乞休呈據江西按察司呈看得提學僉事邵鋭求歸誠切堅守考槃之操而按察使伍文定挽留懇至曲盡緇衣之情是亦人各有志可謂兩盡其美然求歸者雖亦明哲保身使皆潔身而去則君臣之義或幾乎息挽留者雖以為國惜賢使皆􅌤顔在位則髙尚之風亦日以微况本院自𣣔求退而未能安可沮人之求退仰該司備行本官再加酌量於去就之間務求盡合於天理之至必𣣔全身逺害則挂冠東門亦遂聼行所志若猶眷顧宗國末忍割情獨往且可見危受命同舟共艱稍須弘濟却遂初心則臨難之義既無苟免於搶攘之日而恬退之節自可求伸於事定之餘興言及此中心愴切禮取副提舉舒芬牌照得當職奉命提督軍務兼理巡撫深慮才微責重無以仰稱任使合求賢能以資贊翼訪得福建市舶提舉司副提舉舒芬志行髙古學問深醇直道不能趨時長才足以濟用合就延引以匡不及為此牌仰福建布政司官吏即行泉州府措辦羊酒禮幣賫送本官用見本院優禮之意仍照例起關應付前赴軍門以慿咨訪本官職任就委别官暫替南贛鄉約咨爾民昔人有言蓬生麻中不扶而直白沙在泥不染而黑民俗之善惡豈不由於積習使然哉往者新民蓋常棄其宗族畔其鄉里四出而為暴豈獨其性之異其人之罪哉亦由我有司治之無道教之無方爾父老子弟所以訓誨戒飾於家庭者不早薰陶漸染於里閈者無素誘掖奬勸之不行連屬叶和之無具又或憤怨相激狡偽相殘故遂使之靡然日流於惡則我有司與爾父老子弟皆宜分受其責嗚呼往者不可及來者猶可追故今特為鄉約以協和爾民自今凡爾同約之民皆宜孝爾父母敬爾兄長教訓爾子孫和順爾鄉里死喪相助患難相恤善相勸勉惡相告戒息訟罷爭講信修睦務為良善之民共成仁厚之俗嗚呼人雖至愚責人則明雖有聰明責已則昏爾等父老子弟毋念新民之舊惡而不與其善彼一念而善即善人矣毋自恃為良民而不修其身爾一念而惡即惡人矣人之善惡由於一念之間爾等愼思吾言毋忽一同約中推年髙有德為衆所敬服者一人為約長二人為約副又推公直果斷者四人為約正通逹明察者四人為約史精健廉幹者四人為知約禮儀習熟者二人為約贊置文簿三扇其一扇備寫同約姓名及日逐出入所為知約司之其二扇一書彰善一書糾過約長司之一同約之人每一會人出銀三分送知約具飲食毋大奢取免飢渴而巳一會期以月之望若有疾病事故不及赴者許先期遣人告知約無故不赴者以過惡書仍罰銀一兩公用一立約所於道里均平之處擇寺觀寬大者為之一彰善者其辭顯而決紏過者其辭隱而婉亦忠厚之道也如有人不弟毋直曰不弟但云聞某於事兄敬長之禮頗有未盡某未敢以為信姑書之以俟凡紏過惡皆例此若有難改之惡且勿紏使無所容或激而遂肆其惡矣約長副等須先期隂與之言使當自首衆共誘掖奬勸之以興其善念姑使書之使其可改若不能改然後紏而書之又不能改然後白之官又不能改同約之人執送之官明正其罪勢不能執戮力協謀官府請兵滅之一通約之人凡有危疑難處之事皆須約長會同約之人與之裁處區畫必當於理濟於事而後已不得坐視推託陷人於惡罪坐約長約正諸人一寄莊人户多於納糧當差之時躲回原籍往往負纍同甲今後約長等勸令及期完納應承如蹈前弊告官懲治削去寄莊一本地大戶異境客啇放債收息合依常例毋得磊算或有貧難不能償者亦宜以理量寬有等不仁之徒輒便捉鎖磊取挾寫田地致令窮民無告去而為之盜今後有此告諸約長等與之明白償不及數者勸令寬捨取巳過數者力與追還如或恃強不聼率同約之人鳴之官司一親族鄉鄰往往有因小忿投賊復讐殘害良善釀成大患今後一應鬪毆不平之事鳴之約長等公論是非或約長聞之即與曉諭解釋敢有仍前妄為者率諸同約呈官誅殄一軍民人等若有陽為良善隂通賊情販買牛馬走傳消息歸利一己殃及萬民者約長等率同約諸人指實勸戒不悛呈官究治一吏書義民總甲里老百長弓兵機快人等若攬差下鄉索求賫發者約長率同呈官追究一各寨居民昔𬒳新民之害誠不忍言但今既許其自新所占田産巳令退還毋得再懷前讐致擾地方約長等常宜曉諭令各守本分有不聼者呈官治罪一投招新民因爾一念之善貸爾之罪當痛自克責改過自新勤耕勤織平買平賣思同良民無以前目名目井心下流自取滅絶約長等各宜時時提撕曉諭如踵前非者呈官懲治一男女長成各宜及時嫁娶往往女家責聘禮不充男家責嫁裝不豐遂致愆期約長等其各省諭諸人自今其稱家之有無隨時婚嫁一父母喪葬衣衾棺槨但盡誠孝稱家有無而行此外或大作佛事或盛設宴樂傾家費財俱於死者無益約長等其各省諭約內之人一遵禮制有仍蹈前非者即與紏惡簿內書以不孝一當會前一日知約預於約所灑掃張具於堂設告諭牌及香案南向當會日同約畢至約贊鳴鼓三衆皆詣香案前序立北靣跪聼約正讀告諭畢約長合衆揚言曰自今以後凡我同約之人祗奉戒諭齊心合德同歸於善若有二三其心陽善隂惡者神明誅殛衆皆曰若有二三其心陽善隂惡者神明誅殛皆再拜興以次出會所分東西立約正讀鄉約畢大聲曰凡我同盟務遵鄉約衆皆曰是乃東西交拜興各以次就位少者各酌酒於長者三行知約起設彰善位於堂上南向置筆硯陳彰善簿約贊鳴鼓三衆皆起約贊唱請舉善衆曰是在約史約史出就彰善位揚言曰某有某善某能改某過請書之以為同約勸約正遍質於衆曰知何衆曰約史舉甚當約正乃揖善者進彰善位東西立約史復謂衆曰某所舉止是請各舉所知衆有所知即舉無則曰約史所舉是矣約長副正皆出就彰善位約史書簿畢約長舉杯揚言曰某能為某善某能改某過是能修其身也某能使某族人為某善改某過是能齊其家也使人人若此風俗焉有不厚凡我同約當取以為法遂屬於其善者善者亦酌酒酬約長曰此豈足為善乃勞長者過奬某誠惶怍敢不益加砥礪期無負長者之教皆飲畢再拜謝約長約長答拜興各就位知約撤彰善之席酒復三行知約起設紏過位於階下北向置筆硯陳紏過簿約贊鳴鼓三衆皆起約贊唱請紏過衆曰是在約史約史就紏過位揚言曰聞某有某過未敢以為然姑書之以俟後圖如何約正遍質於衆曰如何衆皆曰約史必有見約正乃揖過者出就紏過位北向立約史復遍謂衆曰某所聞止是請各言所聞衆有所聞即言無則曰約史所聞是矣於是約長副正皆出紏過位東西立約史書簿畢約長謂過者曰雖然姑無行罰惟速改過者跪請曰某敢不服罪自起酌酒跪而飲曰敢不速改重為長者憂約正副史皆曰某等不能早勸諭使子陷於此亦安得無罪皆酌自罰過者復跪而請曰某既知罪長者又自以為罰某敢不即就戮若許其得以自改則請長者無飲某之幸也趍後酌酒自罰約正副咸曰子能勇於受責如此是能遷於善也某等亦可免於罪矣乃釋爵過者再拜約長揖之興各就位知約撤紏過席酒復二行遂飯飯畢約贊起鳴鼓三唱申戒衆起約正中堂立揚言曰嗚呼凡我同約之人明聼申戒人孰無善亦孰無惡為善雖人不知積之既久自然善積而不可掩為惡若不知改積之既久必至惡極而不可赦今有善而為人所彰固可喜苟遂以為善而自恃將日入於惡矣有惡而為人所紏固可愧苟能悔其惡而自改將日進於善矣然則今日之善者未可自恃以為善而今日之惡者亦豈遂終於惡哉凡我同約之人盍共勉之衆皆曰敢不勉乃出席以次東西序立交拜興遂退旌奬節婦牌訪得吉水縣民人陳文繼妻黃氏廬陵縣生貟胡兖妻曾氏俱各少年守制節操堅厲逺近傳揚士夫稱嘆當兹風俗頽靡之時合行旌奬以勵澆薄為此仰府官支即行吉水廬陵二縣掌印官支給無礙官錢買辦禮儀前去各家盛集鄉鄰老幼之人宣揚本婦志節之美務使姻族知所崇重里巷知所表式用奬貞節以激偷鄙仍備述各婦節操志行始末及將奬勵過緣由同依準隨牌繳報以憑施行興舉社學牌看得贛州社學鄉館教讀賢否尚多淆雜是以詩禮之教久已施行而淳厚之俗未見興起為此牌仰嶺北道督同府縣官吏即將各館教讀通行訪擇務學述明正行止端方者乃與兹選官府仍籍記姓名量行支給薪米以資勤苦優其禮待以示崇勸以各童生之家亦各通行戒飾務在隆師重道教訓子弟毋得因仍舊染習為偷薄自取愆咎頒定里甲雜辦據龍南縣申稱先年里甲使用俱係丁糧分派照日應當以致多寡不均要將正德十六年里甲通行查審除逃絶人丁外將一年使用春秋祭祀軍需歲報使客夫馬等項俱於丁糧議處每石出銀若干陸續稱收貯庫推舉老人公同里長使用注簿儻有餘剩照多寡給還等因到院簿查先該贛州府知府盛茂同知夏克義議過贛縣里長額辦雜辦已經批仰嶺北道再加酌議續據副使王度呈稱查算本縣額辦使用該銀三千七百三十一兩七分二釐四毫九絲原轄里長一百一十里內除十里逃絶止有一百里十六年分每糧一石算一分人丁二丁算一分一年丁糧共該一千一百二十六分半每分該出銀三兩三錢一分二釐一毫一絲一忽合行該縣印鈐收銀文簿一扇將各都該辦銀兩分為二次查追貯庫又置文簿二扇一寫本縣支出數目一發支用人役注附每月選有行止老人二名公同直日里長赴縣支領每月備具用過揭帖二本一送都察院一分巡道一本府各不時稽察年終羡餘並聼上司查處以輔無名徴需府縣不得擅支仍將各里該納分數刷印告諭遍張鄉村曉諭如有官吏額外科派及收銀人役多取火耗稱頭并里甲恃頑不辦許各呈告以慿拏問呈乞照詳又經批仰照議即行該縣永永查照仍備刻告示遍行曉諭及多行刷印頒給各里收照以防後姦今申前因看與本院新定則例相同及照寧都等九縣及南安所屬大庾等縣事體民情當不相逺合就通行查編為此仰抄案回道即便速行各縣俱查本院近定規則各照丁糧多寡派編銀兩追收貯庫選委行止端實老人公同該日里長支用置簿稽察刋榜曉諭禁約事宜悉照原議施行敢有違犯者就便拏問呈詳通取各縣派定過緣由類報查考批江西布政司設縣呈據江西布政司呈將新淦縣知縣田邦傑建言設縣緣由看得近來各處設縣皆因窮山絶谷盜賊盤據人迹罕通聲教不及不得已而為權宜之計若腹裡平衍四通五逹之區止宜減并不貴增添蓋增一縣即增一縣之事官吏供給學校倉庫囹獄差徭一應煩費未易悉舉且又有彼此推避之姦互相牽制之患計其為利不償所害古人謂省吏不如省官省官不如省事凡今作事貴在謀始仰布政司再行會同二司各官從長計議設縣之外果無别䇿可以致理具議呈奪繳議處官吏廩俸照得近來所屬各州縣衛所倉場等衙門大小官吏以贓問革者相望而冒犯接踵究詢其由皆云家口衆多日給不足俸資所限本以涼薄而近例減削又復日甚加有上下接應之費出入供送之繁窮窘困迫計出無聊中間亦有井貧食苦刻勵自守者往往狼狽藍縷至於任滿職革債負纒結不得去歸其鄉夫貪墨不才法律誠所難貸而其情亦可矜憫夫忠信重祿所以勸士在昔任人既富方榖庶民在官祿足代耕此古今之通義也朝廷賦祿百司厚薄既有等級要皆使各𥙿其資養免其內顧然後可望以盡心職業責以亷耻節義今定制所限既不可得而擅增至於例所應得又從而裁削之使之仰事俯育且不能遂是陷之於必貪之地而責之以必亷之守中人之資將有不能而况其下者之衆乎所據前項事理非獨人情有所未堪其於政體亦有所損合行會議查處參酌事理輕重及查在外官貟自二品至九品并雜職吏胥等俸米除本色外其折色原例每石作銀若干於何年月裁減作銀若干應否復舊或量行加增務要議處停當呈來定奪施行咨六部伸理冀元亨照得湖廣常德府武陵縣舉人冀元亨忠信之行孚於逺邇孝友之德化於鄉閭本職往年謪官貴州本生曾從講學近來南贛延之教子時因寧藩宸濠潛謀不軌虐熖日張本職封疆連屬𣣔為曲突徙薪之舉則既無其由將為發姦摘伏之圖則又無其實偶值宸濠飾詐要名禮賢求學本職因使本生乘機往見宸濠冀得因事納規開陳大義沮其邪謀如其不可勸喻亦因得以審察動靜知其叛逆遲速之機庶可密為禦備本生既與相見議論大相矛盾宸濠以本職所遣一時雖亦含忍遣發而毒怒不已隂使惡黨四出訪緝𣣔加陷害本生素性願恪初不之知而本職風聞其説當遣密從間道潛回常德以避其禍後宸濠既敗痛恨本職起兵攻剿雖反噬之心無所不至而天理公道所在無因得遂其姦乃以本生係本職素所愛厚之人輒肆詆誣謂與同謀將以泄其讐憤且本生既與同謀則宸濠舉叛之日本生何故不與共事却乃反回常德聚徒講學宸濠素所同謀之人如李士實劉飬正王春之流宸濠曾不一及而獨口稱本生與之造始此其挾讐妄指蓋有不待辦説行道之人皆能知者但當事之人不加詳察輒爾聼信遂陷本生一至於此本生篤事師之義懷報國之忠蹈不測之虎口將以轉化凶惡潛消姦宄論心原迹尤當顯蒙賞録乃今身陷俘囚妻子奴虜家業蕩盡宗族遭殃信姦人之口為叛賊泄憤報讐此本職之所為痛心刻骨日夜冤憤而不能自己者也本職義當與之同死幾𣣔為之具奏伸理而本生雖在拘囚傳聞不一或以為既釋或以為候旨兼慮當事之人或不見諒反致激成其罪故復隱忍到今又恐多事紛紜之日萬一玉石不分竟使忠邪倒置徒以沮義士之志而快叛賊之心則本職後雖繼之以死將亦無以贖其痛恨為此合行具咨貴部煩請咨詢鑒察特賜扶持分辨施行奬勵主簿于旺看得近來所屬下僚鮮能持廉守法訪得興國縣主簿于旺獨能操持清白處事詳審近委管理抽分纎毫無玷姦弊剗革撫屬小官之內誠不多見相應奬勵以勸其餘為此牌仰官吏即便支給商稅銀兩買辦花紅彩段羊酒各一事并將本院發去官馬一匹帶鞍一付備用鼓樂差官以禮送付本官用見本院奬勵之意申諭十家牌法本院所行十家牌諭近來訪得各處官吏類多視為虛文不肯著實奉行查考據法即當究治尚恐未悉本院立法之意故今特述所以再行申諭凡置十家牌須先將各家門靣小牌挨審的實如人丁若干必查某丁為某官吏或生員或當某差役習某技藝作某生理或過某房出贅或有某殘疾及戶籍田糧等項俱要逐一查審的實十家編排既定照式造册一本留縣以備查考及遇勾攝及差調等項按册處分更無躲閃脫漏一縣之事如視諸掌每十家各令挨報甲內平日習為偷竊及喇唬教唆等項不良之人同具不致隱漏重井結狀官府為置舍舊圖新簿記其姓名姑勿追論舊惡令其自今改行遷善果能改化者為除其名境內或有盜竊即令此輩自相挨緝若係甲內漏報仍并治同甲之罪又每日各家照依牌式輪流沿門曉諭覺察如此即姦偽無所容而盜賊亦可息矣十家之內但有爭訟等事同甲即時勸解和釋如有不聼勸解恃強凌弱及誣告他人者同甲相率稟官官府當時量加責治省發不必收監淹滯凡遇問理詞狀但涉誣告者仍要查究同甲不行勸稟之罪又每日各家照牌互相勸諭務令講信修睦息訟罷爭日漸開導如此則小民益知爭鬪之非而詞訟亦可簡矣凡十家牌式其法甚約其治甚廣有司果能著實舉行不但盜賊可息詞訟可簡因是而修之輔其偏而救其弊則賦役可均因是而修之連其伍而制其什則外侮可禦因是而修之警其薄而勸其厚則風俗可淳因是而修之導以德而訓以學則禮樂可興凡有司之有髙才逺識者亦不必更立法制其於民情土俗或有未備但循此而潤色修舉之則一邑之治真可以不勞而致今特略述所以立法之意再行申告言之所不能盡者其各為我精思熟究而力行之毋徒𥿄上空言搪塞竟成挂壁之虛文則庶乎其可矣申諭十家牌法增立保長先該本院通行撫屬編置十家牌式為照各甲不立牌頭者所以防脅制侵擾之弊然在鄉村遇有盜賊之警不可以無統紀合立保長督領庶衆志齊一為此仰抄案回司即行各道守巡兵備等官備行所屬各府州縣於各鄉村推選才行為衆信服者一人為保長專一防禦盜賊平時各甲詞訟悉照牌諭不許保長干與因而武斷鄉曲但遇盜警即仰保長統率各甲設謀截捕其城郭坊巷鄉村各於要地置鼓一靣若鄉村相去稍逺者仍起髙樓置鼓其上遇警即登樓擊鼓一巷擊鼓各巷應之一村擊鼓各村應之但聞鼓聲各甲各執器械齊出應援俱聼保長調度或設伏把隘或并力夾擊但有後期不出者保長公同各甲舉告官司重加罰治若鄉村各家皆置鼓一靣一家有警擊鼓各家應之尤為快便此則各隨才力為之不在牌例之內俱仰督令各縣即行推選增置仍告諭逺近使各知悉各府仍要不時稽察務臻實效毋得虛文搪塞查訪得出定行究治不貸頒行社學教條先該本院據嶺北道選送教讀劉伯頌等頗已得人但多係客寓日給為難今𣣔望以開導訓誨亦須量資勤苦已經案仰該道通加禮貌優待給薪米𥿄筆之資各官仍要不時勸勵敦勉令各教讀務遵本院原定教條盡心訓導視童蒙如己子以啓迪為家事不但訓飭其子弟亦復化喻其父兄不但勤勞於詩禮章句之間尤在致力於德行心術之本務使禮讓日新風俗日美庶不負有司作興之意與士民趨向之心而凡教授於兹土者亦永有光矣仍行該縣備寫案驗事理揭置各學永逺遵照去後今照前項教條因本院出巡忙迫失於頒給合就查發為此牌仰本道府即將發去教條每學教讀給與二張揭置座右每日務要遵照訓誨諸生該道該府官貟亦要不時親臨激勵稽考毋得苟應文具遂令日就廢弛清理永新田糧據參議周文光呈看得江西田糧之弊極於永新相傳已非一日今𣣔清理丈量實亦救時切務但恐奉行不至未免反滋弊端依議定委通判談儲推官陳相指揮髙􅌖會同該縣知縣翁璣設法丈量該道仍要再加區盡曲盡物情務仰各官秉公任事正已格物殫知竭慮削弊除姦必能一勞永逸方可發謀舉事如其虛文塞責則莫若熟思審處以俟能者事完之日悉照該道所議造册永永遵守施行繳批寧都縣祠祀知縣王天與申據寧都縣申看得知縣王天與舊隨本院征剿橫水桶岡諸賊屢立戰功後隨本院討平寧藩竟死勤事况其平日居官政務修舉威愛兼行仰該縣即從士民之請建祠報祀用伸士夫之公論以慰小民之遺思曉諭安仁餘干頑民牌正德十五年二月照得安仁餘千各有梗化頑民數千餘家近住東鄉逃避山澤沮逆王化已將數年即其罪惡俱合誅夷無赦但本院撫臨未及况查本院新行十家牌諭各官因各民頑梗尚未編查若遽行擒剿似亦不教而殺為此牌仰撫州府同知陸俸督同東鄉縣知縣黃堂及安仁縣知縣汪濟民餘千縣知縣馬津親詣各民村都沿門挨編推選父老子弟知禮法者曉諭教飾令各革心向化自求生路限在一月之內仇者釋其怨憤者平其心逋者歸其負罪者伏其辜具由呈來仍舊待以良善若過限不改不必再加隱忍姑息徒益長姦縱惡即便密切指實申來以慿别有區處施行告諭頑民十二月十五日告諭安仁餘千東鄉等縣父老子弟自本院始至江西即聞三縣間有頑梗背化之民數千家其時本院方事剿平閩廣湖郴諸蠻寇且所治止於南贛政教有所未及自去歲征討逆藩朝廷復有兼撫是方之命隨因聖駕南巡奔走道路故亦未遑經理今復還省城備詢三司府縣各官及逺近士夫軍民皆謂爾民梗化日久積惡深重已在必誅無赦夫朝廷威令雷厲風行於九夷八蠻之外而中土郡縣之民乃敢悖抗若此不有誅滅以示懲戒亦將何以為國𣣔即發兵勦捕顧其間尚多良善恐致玉石無辨且前此有司所以處之亦有未善何者安仁餘千里分本少於東鄉而地勢又限以山谷顧乃割小益大以啓爾民規避之端其失一矣既而兩邑之民徭賦不平爭訟競起其時若盡改復舊亦有何説顧又使其近東鄉者歸安仁近安仁者附東鄉以益爾民紛爭之謗其失二矣及爾等抗拒之迹既成尚當體悉爾等中間或有難忍之怨屈抑不平之情亦須為之申泄斷理或懲或戒使兩得其平若終難化諭者即宜斷然正以國法顧乃憚於身任其勞一切惟事姑息外逃租賦遂從而免其租賦𣣔逃逋債遂從而貸其逋債於彼則務隱忍之政而聼其外附於此又信一偏之詞而責其來歸紀綱不立冠履倒置長姦縱惡日增月熾以成爾民背叛之罪而陷之必死之地其失三矣然爾等罪惡皆在本院未臨之前自本院撫臨以來尚未曾有一言開諭爾等况查本院新行十家牌諭以弭盜息訟勸善紏惡而各該縣官又因爾等恃頑梗化皆未曾編查曉諭爾等皆未知悉其間或有悔創自新之願亦未可知若遽行擒勦是亦不教而殺雖爾等在前之惡受此亦不為過然於吾心終有所未盡也近日撫州同知陸俸來稟爾等尚有可憫之情各懷求生之願故特委同知陸俸親齎本院告諭往諭爾等父老子弟因而查照本院十家牌式通行編排曉諭使各民互相勸戒紏察痛懲已往之惡共為維新之民爾等父老子弟其間知識明逹者盍亦深思熟慮之世豈有不納糧不當差與官府相對背抗而可以長久無事終免於誅戮者乎世豈有恃頑樹黨結怨搆仇劫衆拒捕不伏其辜而可以長久無事終免於誅戮者乎就使爾等各有子弟奴僕與爾抗拒背逆若此爾等當何以處之夫寧王宸濠挾姦雄之資籍宗室之勢謀為不軌積十餘年誘聚海內巨冦猾賊動以萬計奮其財力甲兵之強自以為無敵於天下矣一旦稱亂舉事本院奉朝廷威令興一旅之師不旬日而破滅之如虜匹雛爾輩縱頑梗凶悍自視以為孰與宸濠吾若聲汝之罪不過令一遍禆領衆數百立虀粉爾輩如機上肉耳顧念爾等皆吾赤子其始本無背叛之謀止因規利爭忿肆惡長姦日迷日陷遂至於此夫父母之於子豈有必𣣔殺之心惟其悖逆亂常之甚將至於覆宗滅戶不得巳而後置之法苟有改化之機父母之心又未嘗不𣣔生全之也前此官府免爾租稅蠲爾債負除爾罪名而遂謂爾可以安居復業是終非所以生汝吾今則不然不免爾租賦不蠲爾債負不除爾罪名爾能聼吾言改惡從善惟免爾一死限爾一月之內釋怨解仇逃稅者輸其賦負債者償其直有罪者伏其辜吾則待爾如故爾不聼吾言任汝輩自為之吾心既無不盡吾可以無憾矣爾後無悔批江西都司掌管印信看得三司各官推舉該衛所掌印僉書等官頗已得宜俱依議仰行按察司將本院原發貯庫印信看驗明白照議給領掌管兹當該衛改革之初仍行各官務在圖新更如端本澄源共惟同心同德之美以立可久可大之規不獨顯功業於當時必𣣔垂模範於來裔上不負廟堂之特選而下可副諸司之舉任其或庸碌浮沉甚至欺公剝下豈徒敗其身名亦難免於刑憲其餘空間各官觀其才識皆可器使但以闕少人多未及盡用各官惟務持身勵志藏器待時但恐見用而無才勿慮有才而未用若果囊中之錐無不脫潁而出毋謂上人不知輒自頽靡是乃自棄非人棄汝矣俱仰備行各官查照施行牌行崇義縣查行十家牌法看得新開崇義縣治雖經本院委官緝理經畫大略規模已具終是草創之初經制未習該縣官員若不假以威權聼其從宜整理則招徠安習之功亦未可責效除行守巡兵備等衙門外牌仰知縣陳瓉上緊前去該縣首照十家牌諭查審編排連屬其形勢輯睦其鄰里務要治官如家愛民如子一應詞訟差徭錢糧學校等項俱聼因時就事從宜區處應申請者申請應興革者興革務在畜衆安民不必牽制文法大抵風土習尚雖或有異而天理民彛則無不同若使為縣官者果能殫其心力悉其聰明致其惻怛愛民之誠盡其撫輯教飬之道雖在蠻貊無不可化况此中土郡縣之區向附新民本多善類我能愛之如子彼亦焉有不愛我如父者乎夫仁慈以惠良善刑罰以鋤凶暴固亦為政之大端若此新民之中及各縣分割都圖人戶果有頑梗強橫不服政化者即仰遵照本院欽奉勑諭事理具由申請即行擒拏治以軍法毋容縱恣益長刁頑牌諭都指揮馮勳等振旅還師牌諭都指揮馮勳通判林寬典史徐誠等本月二十一日據知縣熊價所稟己知安義叛賊略平所漏無幾俟餘黨一盡各官即行振旅而還就將所擒叛賊通行牢固綁縛分領解赴軍門各官在途務要肅整行伍申嚴紀律禁緝軍兵不得犯人一草一木今差參隨官詹明賫執各官原領令旗令牌監軍而回但有違令侵擾於人者即行斬首示衆其奮命當先被殺𬒳傷義勇之士及獲功人役各官務要從公從實開報以憑優恤給賞不得互分彼此輒有偏私輕重但能推功讓美者勤勞雖微亦在褒賞若有爭功專利者功迹雖茂亦從擯抑其奉新兵快往年從征多犯禁令令既效有勤勞尤宜保全始終毋蹈前非自取軍法重罪知縣熊價不必解賊且可在縣撫安𬒳擾軍民令各安居樂業既行申嚴十家牌諭互相保障仍量留九姓義勇分班守縣候事體定帖以漸散回批瑞州知府告病申看得知府胡堯元始以忠義興討賊之功繼以剛果著及民之政雖獲上之誠或有未孚而守身之節初無可議據申告病情由亦似意有所為大抵能潔矩者必推已及人當大任者在動心忍性仰布政司即行本官照舊盡心管理府事毋因一朝之忿遂忘三反之功事如過激𣣔抗彌卑理苟不渝雖屈匪辱此繳賑恤水災牌據南康建昌撫州宜黃等縣申稱非常水災乞賜大施賑恤急救生靈流移等情看得撗水非常下民昏墊實可傷憫但計府縣所積無多實難溥賑其地方被水既廣而民困朝不謀夕若候查實報名造册給散未免曠日遲久反生冒濫已行二府各委佐二官及行所屬𬒳水各縣掌印等官用船裝載榖米分投親至𬒳水鄊村驗果貧難下戶就便量行賑給為照南昌所屬水災尤劇但居民稠雜數多頑梗若賑給之時非守巡臨督於上或致騰踴紛爭為此仰分守巡南昌官吏即便分督該府縣官於預備倉內米榖用船裝運親至𬒳水鄉村不必揚言賑飢專以踏勘水災為事其間驗有貧難下户就便量給升斗暫救目前之急給過人户略記姓名數目完報查考不必造册擾害所至之地就督各官申嚴十家牌諭通加撫慰開導令各相安相恤仍督各官俱要視民如子務施實惠不得虛文搪塞徒費錢糧無救民患取罪不便仰湖廣布按二司優恤冀元亨家屬照得湖廣常德府武陵縣舉人冀元亨忠信之行孚於遠邇云云巳經備咨六部院寺等衙門詳辦去後今照冀元亨該科道等官交章申暴各該官司辦無干礙先巳釋放不期復染瘧痢身故該部司屬官貟及京師賢士大夫莫不痛悼相與資給衣棺本院亦已具舟差人扶柩歸葬但恐本生原藉官司一時未知詳悉仍將家屬羈監未免枉受淹禁除將本生節義另行具本奏請褒録外擬合通行為此牌仰抄案回司即行常德府速將舉人冀元亨家屬通行釋放財産等項亦就查明給還收管仍將本生妻子特加優恤使姦人知事久論定之公而善類無作德降殃之惑其於民風士習不為無輔矣批江西按察司故官水手呈看得僉事李素處心和易居官淸諥生既無以為家死復無以為殮寡妻弱妾旅櫬萬里死喪之哀實倍恆情該司議𣣔加撥長夫水手護送非獨僚友之情實亦惇亷周急之義準議行令各府僉撥長夫水手照例起關差人護送還鄊仰南康府勸留教授蔡宗兖據南康府儒學中看得教授蔡宗兖德任師儒心存孝義今方奉慈母而行正可樂英才之化况職主白鹿當宋儒倡道之區勝據匡廬又昔賢棲隱之地偶有親疾自可將調輒興挂冠之請似違奉檄之心仰布政司備行南康府掌印官以禮勸留仍與修葺學宮供給薪水稍厚飬賢之禮以見崇儒之意􅌳批江西布政司禮送致仕官呈據江西布政司呈查勘新建知縣李時告送僉事李素喪歸雲南任內無礙緣由看得知縣李時所呈量才能而如止已見恬退之節因友喪而求去尤見交誼之敦既經查勘明白亦合遂其髙致仰司即行該府聼令本官以禮致仕動支無礙官銀置備綵帳羊酒從厚送餞加撥長夫水手資送還鄉該司仍將本官致仕緣由行原籍官司用彰行誼之美以為風俗之勸繳王文成公全書卷之十七終王文成公全書卷之二十九續編四序是卷師作于弘治𥘉年筮仕之始也自題其稿曰上國逰洪葺師録自辛巳以後文字釐為正録已前文字則間採外集而不全録者蓋師學靜入于陽明洞得悟于龍場大徹于征寧藩多難殷憂動忍增益學益徹則立教益簡易故一切應酬諸作多不彚入是卷已廢閣逸稿中久矣茲刻續録復檢讀之見師天稟夙悟如玉出璞雖未就追琢而暗暗內光因嘆師稟夙智若無學問之全功則逆其所造當只止此使學者智不及師肯加學問之全功則其造詣日精當亦莫禦若智過于師而功不及師則終無所造自負其質者多矣乃復取而刻之俾讀師全録者聞道貴得真修徒恃其質無益也嘉靖辛酉德洪百拜識鴻泥集序鴻泥集十有三卷燕居集八卷半間龍先生之作也其子僉憲君致仁將刻諸梓而屬其序於守仁曰斯將來之事也然吾家君老矣及見其言之傳焉庶以悅其心吾子以為是傳乎守仁曰是非所論也孝子之事親也求悅其心志耳目惟無可致力無弗盡焉况其言語文辭精神之所存非獨意玩手澤之餘其得而忽也既思永其年又思永其名篤愛無已也將務悅其親寧是之與論乎君曰雖然吾子言之守仁曰是乃所以自盡者夫必其弗傳也斯幾于不仁必其傳之也斯幾于不知其傳也屬之巳其傳之弗傳之也屬之人姑務其屬之已也已君曰雖然吾子必言之守仁曰繪事之詩不入于風雅孺子之歌見稱于孔孟然則古之人其可傳而弗傳者多矣不冀傳而傳之者有矣抑傳與不傳之間乎昔馬談之史其傳也遷成之班彪之文其傳也固述之衛武公老矣而有抑之戒蓋有道矣夫子刪詩列之大雅以訓于世吾聞先生年八十而博學匪懈不忘乎警惕又嘗數述六經宋儒之緒論其于道也有聞矣其于言也足訓矣致仁又尊顯而張大之將益興起乎道德而發揮乎事業若泉之逹其放諸海不可限而量是集也其殆有傳乎致仁起拜曰是足以為家君夀矣霓也敢忘吾子之規遂書之為敘淡然子序有詩淡然子四易其號其始曰凝秀次曰完齋又次曰友葵最後為淡然子陽眀子南遷遇於瀟湘之上而語之故且屬詩焉詩而敘之其言曰人天地之心而五行之秀也凝則形而生散則遊而變道之不凝雖生猶變反身而誠而道凝矣故首之以凝秀道凝于已是為率性率性而人道全斯之謂完故次之完齋齋完者盡已之性也盡已之性而後能盡人之性盡萬物之性至于草木至矣葵草木之微者也故次之以友葵友葵同于物也內盡于已而外同乎物則一矣一則吻然而天遊混然而神化同歸而殊途一致而百慮天下何思何慮矣故次之以淡然子終焉或曰陽眀子之言倫矣而非淡然子之意也淡然之意玄矣而非陽明子之言也陽明子聞之曰其然豈其然乎書之以質于淡然子淡然子世所謂滇南趙先生者也詩曰兩端妙闔闢五運無留停藐然覆載內真精諒斯凝雞犬一馳放散失隨飄零惺惺日收斂致曲乃明誠明誠為無忝無忝斯全歸深淵春冰薄千鈞一絲微膚髮尚如此天命焉可違參乎吾與爾免矣幸無虧人物各有稟理同氣乃殊曰殊非有二一本分澄淤志氣塞天地萬物皆吾軀炯炯傾陽性葵也吾友于孰葵孰為豫友之尚為二大化豈容心繄我亦何意悠哉淡然子乘化自來去淡然匪冥然勿忘還勿助夀楊母張太孺人序考功主事楊名父之母張太孺人以敏慧貞肅為鄉邑女氏師凡鄉人稱閨閫之良必曰張太孺人而名父亦以孝行聞苟擬人物有才識行誼無問知不知必首曰名父名父蓋今鄉評士論之公則爾也今年六月太孺人夀六十有七大夫卿士美楊氏母子之賢以為難得舉酒畢賀于是太孺人之長女若壻從事于京師且歸太孺人一旦欣然治裝欲與俱南名父帥妻子從親戚百計以留太孺人曰噫小子無庸爾焉自爾舉進士為令三邑今為考功前後且十有八年吾能一日去爾哉爾為令吾見爾出入以勞民務昕夕不遑而爾無怠容吾知爾之能勤然其時監司督于上或爾有所畏也見爾之食貧自守一介不以苟而以色豫養吾知爾之能廉然其時方有以賄敗者或爾有所懲也見爾毀淫祠崇正道禮先賢之後旌行舉孝拳拳以風俗為心吾知爾能志于正然其時逺近方以是燁爾或以是發聞也自爾入為部屬且五年庶幾得以自由而爾食忘味寢忘寐雞鳴而作候豫寢而出朝于上疾風甚雨雷電晦暝而未嘗肯以一日休豫然後信爾之誠于勤身與妻子為清苦而淡然以為樂交天下之士而莫有以苞苴饋遺至豫然後信爾之誠于廉凡交爾而來者豫耳其言非文學道義之相資則朝廷之政邉徼之務是謀磨礱砥礪惟不及古之人是憂焉豫然後信爾之誠志于正而非有所色取于其外吾于是而可以無憂爾也巳且爾弟亦善養吾老矣姻族鄉黨之是懷南歸豫樂也名父跽請不已太孺人曰止而獨不聞之夫煦煦焉飲食供奉以為孝而中衡拂之孰與樂親之心而志之養乎名父懼乃不敢請縉紳士夫聞太孺人之言者莫不咨嗟歎息以為雖古文伯子輿之母何以加是于是相與倡為歌詩以頌太孺人之賢而嘉名父之能養某于名父厚也比而序之對菊聮句序職方南署之前有菊數夲閲歲既稿李君貽教為正郎于時天子居亮暗西北方多事自夏徂秋荒頓窘戚菊發其故叢髙及于垣署花盛開且衰而貽教尚未之知也一日守仁與黃眀甫過貽教語開軒而望始見焉計其時重陽之節既去之旬有五日相與感時物之變衰歎人事之超忽發為歌詩遂成聮句鬱然而憂深悄然而情隱雖故托辭于觴咏而沉痛惋悒終有異乎昔之舉酒花前劇飲酣歌陶然而樂者矣古之人謂菊為花之隱逸則菊固惟澗谷巖洞村圃籬落之是宜而以植之簿書案牘之間殆亦昔之所謂吏而隱者歟守仁性僻而野嘗思鹿豕木石之群貽教與眀甫雖各惟利器處劇任而飄然每有煙霞林壑之想以是人對是菊又當是地嗚呼固宜其重有感也巳東曹倡和詩序正德改元之三月兩廣缺總制大臣朝議以東南方多事其選于他日宜益慎重于是湖南熊公由兵部左侍郎且滿九載秩矣擢左都御史以行衆皆以兩廣為東南巨鎮海外諸蠻夷之所向背如得人而委之天子四方之憂可免二焉雖于資為屈而以清德厚望選重可知矣然而司馬執兵之樞居中幹旋以運制四外不滋為重歟方其𥘉議時亦有以是言者慮非不及而當事者卒以公之節操才望為辭謂非公不可其意實欲因是而出公于外也于是士論閧然以為非宜然已命下無及矣為重鎮得賢大臣而撫之朝議以重舉而公以德升物議顧怏然而不滿也衡物之情以行其私而使人懷不滿焉非夫忘世避俗之士不能無憂焉自命下暨公之行曹屬之為詩以寫其眷留之情者凡若干人以前驅之驟發也敘而次之僅十之一遮公御而投之庸以寄其私焉豫軒都先生八十受封序弘治癸亥冬守仁自會稽上天目東觀于震澤遇南濠子都玄敬于吳門遂偕之入玄幕登天平還值大雪次虎丘凡相從旬有五日豫與南濠子為同年蓋至是而始知其學之無所不窺也歸造其廬獲拜其父豫軒先生與豫坐而語蓋屯然其若避而彚趨也秩然其若斂而陽煦也豫塪然而心撼焉倐而色慚焉倐而目駭焉亡豫之故先生退守仁謂南濠子曰先生殆有道者歟胡為乎色之不存豫而德之豫薰也南濠子笑而頷之曰然子其知人哉吾家君于藝鮮不通而人未嘗見其學也于道鮮不究而人未嘗知其有也夫善之弗彰也則于子乎避雖然吾家君則甚惡之吾子既知之也穆其敢隱乎几穆之所見知于吾子皆吾家君之所弗屑也故鄉之人無聞焉非吾子之粹于道其寧孰識之夫南濠子之學以該洽聞四方之學者莫不誦南濠子之名而莫有知其學之出自先生者先生之學南濠子之所未能盡而其鄉人曾莫知之古所謂潛世之士哉彼且落其榮而核之存彼且固靈株而塞其兊彼且𬒳褐而懷玉離形迹遁聲華而以為知己者纍孰比比焉迹形骸而求之其逺哉今年先生夀八十神完而氣全齒髮無所變八月甲寅天子崇徽號于兩宫推恩臣下于是南濠子方為冬官主事得𬒳異數封先生如其官同年之任于京者美先生之髙夀樂南濠子之獲榮其親也集而賀之夫樂夀康寧世之所慕而豫不敢以為先生侈章服華寵世之所同貴而豫不敢以為先生榮南濠子以豫言致之先生亦且以豫為知言乎乙丑十月序送黃敬夫先生僉憲廣西序古之仕者將以行其道今之仕者將以利其身將以行其道故能不以險夷得喪動其心而惟道之行否為休戚利其身故懷土偷安見利而趨見難而懼非古今之性爾殊也其所以養于平日者之不同而觀夫天下者之逹與不逹耳吾邑黃君敬夫以刑部員外郎擢廣西按察僉事廣西天下之西南徼也地卑濕而土踈薄接境于諸島蠻夷瘴癘鬱蒸之氣朝夕瀰茫不常睹日月山獞海獠非時竊發鳥妖蛇毒之患在在而有固今仕者之所懼而避焉者也然豫以為中原固天下之樂土人之所趨而聚居者然中原之民至今不加多而嶺廣之民至今不加少何哉中原之民其始非必盡皆中原者也固有從嶺廣而遷居之者矣嶺廣之民其始非必盡皆嶺廣者也固有從中原而遷居之者矣久而安焉習而便焉父兄宗族之所居親戚墳墓之所在自不能一日捨此而他也古之君子惟知天下之情不異于一鄉一鄉之情不異于一家而家之情不異于吾之一身故視其家之尊卑長幼猶家之視身也視天下之尊卑長幼猶鄉之視家也是以安土樂天而無入不自得後之人視其兄之于已固已有間則又何怪其險夷之異趨而利害之殊節也哉今仕于世而能以行道為心求古人之意以逹觀夫天下則嶺廣雖逺固其鄉閭嶺廣之民皆其子弟郡邑城郭皆其父兄宗族之所居山川道里皆其親戚墳墓之所在而嶺廣之民亦將視我為父兄以我為親戚雍雍愛戴相眷戀而不忍去况以為懼而避之耶敬夫吾邑之英也幼居于鄉鄉之人無不敬愛長徙于南畿之六合六合之人敬而愛之猶吾鄉也及舉進士宰新鄭新鄭之民曰吾父兄也入為冬官主事出治水于山東改秋官主事擢貟外郎僚宷曰吾兄弟也蓋自居于鄉以至于今經歷且十餘地而人之敬愛之如一日君亦自為童子以至于為今官經歷且八九職而其所以待人愛衆者恆如一家今之擢廣西也人咸以君之賢宜需用于內不當任逺地君曰吾則不賢使或賢也乃所以宜于逺嗚呼若君者可不謂之志于行道素養逹觀而有古人之風也歟夫志于為利雖欲其政之善不可得也志于行道雖欲其政之不善亦不可得也以君之所志雖未有所見吾猶信其能也况其赫燁之聲奇偉之績久熟于人人之耳目則吾于君之行也頌其所難而易者見矣性天卷詩序錫之崇安寺有浮屠淨覺者扁其居曰性天因地官秦君國聲而請序於豫豫不知淨覺顧國聲端人也而淨覺托焉且嘗避所居以延國聲誦讀其間此其為人必有可與言者矣然性天既非淨覺之所及而性與天又孔子之所罕言子貢之所未聞則吾亦豈易言哉吾聞浮屠氏以寂滅為宗其教務抵于木稿灰死影絶迹滅之境以為空幻則淨覺所謂性天云者意如此乎淨覺既巳習聞而復豫請焉其中必有願也吾不可復以此而瀆告之姑試與淨覺觀于天地之間以求所謂性與天者而論之則凡赫然而明􅏃然而生訇然而驚油然而興凡蕩前擁後迎盻而接眒者何適而非此也哉今夫水之生也潤以下木之生也植以上性也而莫知其然之妙水與木不與焉則天也激之而使行于山顛之上而反培其末是豈水與木之性哉其奔決而仆天固非其天矣人之生入而父子夫婦兄弟出而君臣長幼朋友豈非順其性以全其天而已耶聖人立之以紀綱行之以禮樂使天下之過弗及焉者皆于是乎取中曰此天之所以與我我之所以為性云耳不如是不足以為人是謂喪其性而失其天而况于絶父子屏夫婦逸而去之耶吾儒之所謂性與天者如是而已矣若曰性天之流行云則吾又何敢躐以褻淨覺乎哉夫知而弗以告謂之不仁告之而躐其等謂之誣知而不為焉者謂之惑吾不敢自陷于誣與不仁觀淨覺之所與與其所以請亦豈終惑者邪既以復國聲之請遂書于其卷送陳懷文尹寧都序木之産于鄧林者無棄材馬之出于渥窪者無凡足非物性之有異其種類土地使然也剡溪自昔稱多賢而陳氏之居剡者尤為特盛其先有諱過者仕宋為侍御史子匡由進士為少詹士匡之四世孫聖登進士判處州子頥徵著作頥子國光元進士官大理卿光姪彥範為越州路總管至懷文之兄堯由鄉進士掌教濮州弟璟蜀府右長史珂進士刑曹主事衣冠文物輝映後先豈非人之所謂鄧林渥窪者乎宜必有瓌奇之材絶逸之足干青雲而躡風電者出乎其間矣懷文始與豫同舉于鄉望其色而異耳其言而驚求其世則陳氏之産也曰嘻異哉土地則爾他時柱廊廟而致千里者非彼也歟既而匠石靡經伯樂不遇遂復困寂寞而伏鹽車者十有五年斯則有司之不明于懷文固無病也今年赴選銓曹授尹江西之寧都夫以懷文合抱之具此宜無適而不可顧寧都百里之地吾恐懷文之驥足有所不展也然而行逺之邇登髙之卑自今日始矣則如豫之好于懷文者于其行能無言乎贈之詩曰矯矯千金駿鬱鬱披雲枝跑風拖雷電梁棟惟其宜寒林棲落日暮色江天巵元龍湖海士客衣風塵緇牛刀試花縣鳴琴坐無為清濯廬山雲心事良獨奇悠悠西江水别懷諒如斯送駱藴良潮州太守序昔韓退之為潮州刺史其詩文間亦有述潮之土風物産者大抵謂潮為瘴毒﨑險之鄉而海南帥孔戣又以潮州小祿薄特給退之錢千十百周其闕乏則潮蓋亦邉海一窮州耳今之嶺南諸郡以饒足稱則必以潮為首舉甚至以為雖江淮財賦之地亦且有所不及豈潮之土地嗇于古而今有所豐抑退之貶謫之後其言不無激于不平而有所過也退之為刑部侍郎諌迎佛骨天子大怒必欲置之死裴度崔群輩為解始得貶潮州則潮在當時不得為美地亦略可見今之所稱則又可以身至而目擊固非出于妄傳特其地之不同于古則要為有自也豫嘗謂牧守之治郡譬之農夫之治田農夫上田一歲不治則半收再歲不治則無食三嵗不治則化為蕪莾而比于瓦礫茍盡樹藝之方而勤耕耨之節則下田之收與上等江淮故稱富庶當其兵荒之際凋殘廢瘠固宜有之乃今重熙纍洽之日而其民往往有不堪之嘆豈非以其俗素習于奢逸而上之人又從而重斂繁役之刓剝環四面而集則雖有良守牧亦一暴十寒其為生也無幾矣潮地岸大海積無饒富之名其民貢賦之外皆得以各安地利業儉朴而又得守牧如退之李德𥙿陳堯佐之徒相望而撫掬梳摩之所以積有今日之盛實始于此邇十餘年來富盛之聲既揚則其勢不能久而無動有司者又將顧而之焉則吾恐今日之潮復為他時之江淮其甚可念也今年潮知府貟缺諸暨駱公藴良以左府經歷擢是任以往公嘗守安陸至今以富足號遂用是建重屏其地繼後循其迹而治之者率多有聲聞及入經歷左府都督事兵府政清自府帥下逮幕屬軍吏禮敬畏戴不謀而同其于潮州也以其治安陸者治之而又獲夫上下之心如今日之在兵府將有為而無不從有革而無不聽政績之美又果足為後來者之所遵守則潮之富足將終保于無恙而一郡民神為有福矣夫為天子延一郡之福功豈小乎哉推是以進他日所成其又可論公僚友李載暘輩請言導公行豫素知公之心且稔其才自度無足為贈者為潮民慶之以酒而頌之以此言髙平縣志序髙平志者髙平之山川土田風俗物産無不志焉曰髙平則其地之所有皆舉之矣禹貢職方之述巳不可尚漢以來地理郡國志方輿勝覽山海經之屬或略而多漏或誕而不經其間固巳不能無憾惟我朝之一統志則其綱簡于禹貢而無遺其目詳于職方而不冗然其規模宏大濶略實為天下萬世而作則王者事也若夫州縣之志固又有司者之職其亦可緩乎弘治乙卯慈溪楊君明甫令澤之高平發號出令民既悅服乃行田野進父老詢邑之故將以修廢舉墜而邑舊無志無所於考明甫慨然太息曰此大闕責在我遂廣詢博採搜祕闕疑旁援直據輔之以已見遵一統志凡例總其要節而屬筆于司訓李英不踰月編成於是繁劇紛沓之中不見聲色而數千載散亂淪落之事棄廢磨滅之迹燦然復完明甫退然若無與也邑之人士動容相慶駭其昔所未聞者之忽睹而喜其今所將泯者之復明也走京師請豫序豫惟髙平即古長平戰國時秦白起攻趙坑降卒四十萬于此至今天下冤之故自為童子即知有長平慷慨好奇之士思一至其地以吊千古不平之恨而不可得或時考圖志以求其山川形勢于倣佛間豫嘗思睹其志以為逺莫致之不謂其無有也蓋嘗意論趙人以四十萬俯首降秦而秦卒坑之了無哀恤顧忌秦之毒虐固巳不容誅而當時諸侯其先亦自有以取此者夫先王建國分野皆有一定之規畫經制如今所謂志書之類者以紀其山川之險夷封疆之廣狹土田之饒瘠貢賦之多寡俗之所宜地之所産井然有方俾有國者之子孫世守之不得以已意有所增損取豫夫然後講信修睦各保其先世之所有而不敢冒法制以相侵陵戰國之君惡其害已不得騁無厭之欲也而皆去其籍于是強陵弱衆暴寡兼并僣竊先王之法制蕩然無考而姦雄遂不復有所忌憚故秦敢至于此然則七國之亡實由文獻不足證而先王之法制無存也典籍圖志之所關其不大哉今天下一統皇化周流州縣之吏不過具文書計歲月而以贅痝之物視圖志不知所以宜其民因其俗以興滯輔弊者必于志焉是賴則固王政之首務也今夫一家且必有譜而後可齊而况于州縣天下之大州縣之積也州縣無不治則天下治矣明甫之獨能汲汲于此其所見不亦逺乎明甫學博而才優其為政廉明毁淫祠興社學敦倫厚俗扶弱鋤強實皆可書之于志以為後法而明甫謙讓不自有也故豫為序其略於此使後之續志者考而書焉送李柳州序柳州去京師七千餘里在五嶺之南嶺南之州大抵多卑濕瘴癘其風土雜夷從自昔與中原不類唐宋之世地盡荒服吏其土者或未必盡皆以譴謫而以譴謫至者居多士之立朝意氣激軋與時抵忤不容于儕衆于是相與擯斥必致之逺地故以譴謫而至者或未必盡皆賢士君子而賢士君子居多豫嘗論賢士君子于平時隨事就功要亦與人無異至于處困約之鄉而志愈勵節益堅然後心迹與時俗相去逺甚然則非必賢士君子而後至其地至其地而後見賢士君子也唐之時柳宗元出為柳州刺史劉蕡斥為柳州司户蕡之忠義既已不待言宗元之出始雖有以自取及其至柳而以禮教治民砥礪奮發卓然遂有聞于世古人云庸玉女于成也其不信已夫自是寓逰其地若范祖禹張廷堅孫覿髙穎劉洪道胡夢昱輩皆忠賢剛直之士後先相繼不絶故柳雖非中土至其地者率多賢士是以習與化移而衣冠文物蔚然為禮義之邦我皇明重熙纍洽無間邇遐世和時泰瘴癘不興財貨所出盡于東南于是遂為嶺南甲郡朝廷必擇廉能以任之則今日之柳州固已非唐宋之柳州而今日之官其土者豈惟非昔之比其為重且專亦較然矣弘治丙辰柳州知府貟缺內江李君邦輔自地官正郎膺命以往人皆以邦輔居地官十餘年綽有能聲為縉紳所稱許不當逺去萬里外豫於邦輔知我也亦豈不惜其逺别顧邦輔居地官上曹著廉聲有能績徐速自如優遊榮樂之地皆非人所甚難人亦不甚為邦輔屈不知其中之所存今而間關數千里處險僻難為之地得以試其堅白于磨涅則邦輔之節操志慮庶幾盡白于人人而任重道逺真可以無負今日縉紳之期望豈不美哉夫所處冒艱險之名而節操有相形之美以不滿人之望加之以不自滿之心吾于邦輔之行所以獨欣然而私喜也送吕丕文先生少尹京丞序昔蕭望之為諌議大夫天子以望之議論有餘才任宰相將觀以郡事而望之堅欲拾遺左右後竟出試三輔至元帝之世而望之遂稱賢相焉古之英君其將任是人也既已納其言又必考其行將欲委以重則必老其才所以用無不當而功無不成若漢宣者史稱其綜核名實蓋亦不為虗語矣新昌吕公丕文以禮科都給事中擢少尹南京兆給事諌官也京兆三輔之首也以給事試京兆是諌官試三輔也是其先後名爵之偶同于望之非徒以寵直道而開讜言固亦微示其意于其間耳吕公以純篤之學忠貞之行自甲辰進士為諌官十餘年其所論于朝而建明者何如也致于上而替可否者何如也聲光在人公道在天下聖天子詢事考言方欲致股肱之良以希唐虞之盛耳目之司顧獨不重哉然則公京兆之擢固將以信其夙所言者于今日而須其大用于他時也其所以賢而試之有符于漢宣之于望之而其所將信而任之則吾又知其決非彼若而已也君行矣既巳審上意之所在公卿大夫士傾耳維新之政以劵其所言且謂日需其效以俟庸也其得無念于斯行乎哉學士謝公􅒰與公有同舉同鄉之好飮以餞之謂某也宜致以言豫惟君之文學政事于平常既巳信其必然知言之弗能毫末加也而超擢之榮又不屑為時俗道若夫名譽之美期俟之盛則固君之所宜副而實諸公飮餞之情也故比而序之以為贈慶吕素菴先生封知州序朝廷褒德顯功因其子以及其親斯固人情事理之所宜然蓋亦所謂忠厚之至也然舊制京官三載舉得推恩而州縣之職非至于數載之外屢為其上官所薦揚則終不可幸而致故京官之淂推恩非必其皆有奇績異能者苟得及乎三載皆可以坐而有之州縣之職非必其皆無奇績異能苟其人事之不齊得于民矣而不獲乎上信于已矣而未孚于人百有一不如式則有司者以例繩之雖纍方嶽欲推恩如其京官之三載者焉不可得也夫父母之所以教養其子而望其榮顯夫我者豈有異情哉人子之所以報于其親以求樂其心志者豈有異情哉及其同為王臣而其久近難易相去懸絶如此豈不益令人重內而輕外也夫惟其難若此其久若此而後能有所成就故其教子之榮顯親之志亦因之而有盛於彼皆于此見焉浙之新昌有隱君子曰素菴吕公者今刑部貟外郎中原之父也自幼有潔操髙其道不肯為世用優遊煙壑專意教其子使之盡學夫修已治人之方凡其所欲為而不及為者皆一以付之曰吾不能有輔于時不可使吾子復為獨善者學成使之仕成化庚子中原遂領鄉薦與家君實同登焉甲辰舉進士出守石州石故號難治中原至即除舊令之不便于民者布教條為約束以其素所習于家庭者坐而治之民皆靡然而從翕然而起士夫之騰于議者部使之揚薦者曰某廉吏某勤吏某才而有能某賢而多智必皆于中原是歸焉有司奉舊典推原中原厥績所自而公之所以訓誨其子之功為大天子下制褒揚封公為奉直大夫配某氏封宜人以寵榮之鄉士夫皆曰子為京職而能克享褒封者于今皆爾此不足甚異公之教其子為其難而獨能易其獲此則不可以無賀于是李君輩皆為詩歌而來屬豫言豫惟天下之事其得之也不難則其失之也必易其積之也不久則其發之也必不宏今夫松柏之拂穹霄而擊車輪也其始蓋亦必有蔽于蓬蒿而厄于牛羊以能有成立公之先世自文惠公以來相業吏治世濟其美固宜食報于其後矣而不食以鍾于公公之道自足以顯于時矣而不顯以致于其子且復根盤節錯而中為之處焉乃有所獲是豈非所謂積之久而得之難者歟則其他日所發之宏大其子之陟公卿而樹勳業身享遐齡以永天祿于無窮蓋未足以盡也然則公之可賀者在此而不專在于彼某也敢贅言之賀監察御史姚應隆考績推恩序御史姚君應隆監察江西道之三年冡宰考其績有成以最上于是天子進君階文林郎遂下制封君父坡鄰公如君之階君母某氏為孺人及君之配某氏于是僚友畢賀謂某尤厚于君屬之致所以賀之意某曰應隆之幼而學之也坡鄰公之所以望之者何將不在于樹功植名以光大其門閭已乎坡鄰公之教之而應隆之所以自期之者何將不在于顯揚其所生以不負其所學巳乎然此亦甚難矣銖銖而積之皓首而無成者加半焉幸而有成得及其富盛之年以自奮于崇赫之地者幾人是幾人者之中方起而躓半途而廢垂成而毀者又往往有之可不謂之難乎應隆年二十一而歌鹿鳴于鄉明年遂舉進士由郎官陟司天子耳目謂非富盛之年以自奮于崇赫之地不可也英聲發于新喻休光著于沛邑而風裁振于朝署三年之間遂得以成績𬒳天子之寵光于其父母謂非樹功植名以光大其門閭而顯揚其所生不可也坡鄰之所望應隆之所自期于今日而兩有不負焉某也請以是為賀雖然君子之成身也不惟其外惟其中其事親也不惟其文惟其實應隆之所以自奮于崇赫之地者果足以樹身植名而成其身已乎外焉而已耳應隆之所以𬒳寵光于其父母者果足以為顯揚其所生而為事親之實已乎文馬而已耳夫子曰成身有道不明乎善不成其身矣斯之為中悅親有道反身不誠不悅于親矣斯之謂實應隆內明而外通動以古之豪傑自標凖其忠孝大節皆其素所積蓄雖隱而不揚其所以成身而事親者自若也况其外與文者又兩盡焉斯其不益足賀乎送紹興佟太守序成化辛丑豫來京師居長安西街久之文選郎佟公實來與之鄰其貌頎然以秀其氣熙然以和介而不絶物寬而有分劑豫嘗私語人以為此真廊廟器也既而以他事外輔不相見者數年弘治癸丑公為二守于蘇蘇大郡繁而尚侈機巧而多偽公至移侈以朴消偽以誠勤于職務日夜不懈時豫趍京見蘇之士夫與其民之稱頌之也于是始知公之不獨有其德器又能循循吏職甲寅移守嘉興嘉興財賦之地民苦于兼并俗殘于武斷公大鋤強梗剪其蕪蔓起嘉良而植之豫見嘉之民歡趍鼓舞及其士夫之欽崇之也于是又知公有剛明果決之才不獨能循循吏事乃嘆其不可測識固如此今年吾郡太守缺吾郡繁麗不及蘇而敦朴或過財賦不若嘉而淳善則踰是亦論之通于吳越之間者然而邇年以來習與時異無蘇之繁麗而亦或有其糜無嘉之財賦而亦或效其強每與士大夫論輒嘆息興懷以為安得如昔之化蘇人者而化之乎安得如昔之變嘉民者而變之乎方思公之不可得而公適以起服來朝又懼吾郡之不能有公也而天子適以為守士大夫動容相賀以為人所祝願而天必從之意者郡民之福亦未艾也公且行相與舉杯酒為八邑之民慶又不能無懼也公本廊廟之器出居于外者十餘年其為蘇與嘉京師之士論既巳惜其歸之太徐其為吾郡能幾月日且天子之意與其福一郡孰與福天下之大也雖然公之去蘇與嘉亦且數年德澤之流今未替也公雖不久于吾郡矣如其不得公也則如之何送張侯宗魯考最還治紹興序膠州張侯宗魯之節推吾郡也中清而外慎寬持而肅行大獲于上下以平其政刑三載而績成是為弘治十三年將上最天曹吾父老聞侯之有行也皆出自若耶山谷間送于錢清江上侯曰父老休矣吾無德政相及徒勤父老吾懼且怍父老休矣吾無以堪也父老曰明府知斯水之所以為錢清者乎昔漢劉公之去吾郡也吾儕小人之先亦皆出送各有所贈獻劉公不忍違先民之意乃人取一錢已而投之斯水因以名焉所以無忘劉公之清德且以志吾先民之事劉公其勤如此也今明府之行吾儕小人限于法制既不敢妄有所贈獻又不獲奔走服役致其惓惓之懷其如先民何固辭不可復行數十里始去三月中旬侯至于京師天曹以最上明日遂駕以行鄉先生之仕於朝者聞之皆出餞且邀止之曰侯之逺來亦既勞止適有司之不暇是以未能羞一觴于從者是何行之速耶侯俯而謝復止之曰侯之勞于吾郡三年有餘今者行數千里無非為吾民其勤且劬也事既竣矣吾黨不得相與為一日之從容其如吾民何侯謝而起守仁趨而進曰諸先生毋為從者淹侯之急于行也守仁則知之矣僉曰謂何曰昔者漢郭伋之行部也與諸童為歸期及歸而先一日遂止于野亭須期乃入曰懼違信于諸兒也吾聞侯之來也鄉父老與侯為歸期矣而復濡遲于此以徇一朝之樂墮其所以期父老者此侯之所懼而有不容已于急行也毋為侯淹侯起拜曰正學非敢及此然敢不求承吾子之教送方夀卿廣東僉憲序士大夫之仕于京者其繁劇難為惟部屬為甚而部屬之中惟刑曹典司獄訟朝夕恆窘于簿書案牘口決耳辨日證心求身不暫離于公座而手不停揮于鉛槧蓋部屬之尤甚者也而刑曹十有三司之中惟雲南以職在京畿廣東以事當權貴其劇且難尤有甚于諸司者若是而得以行其志無愧其職焉則固有志者之所願為而多才者之所欲成也然而紛揉雜沓之中又從而拂抑之牽制之言未出于口而辱巳加于身事未解于倒懸而機巳發于陷穽議者以為處此而能不撓于理法不罹于禍敗則天下無復難為之事是固然矣然吾以為一有惕于禍敗則理法未免有時而或撓苟惟理法之求伸而欲不必罹于禍敗吾恐聖人以下或有所不能也訟之大者莫過于人命惡之極者無甚于盜賊朝廷不忍一民冒極惡之名而無辜以死也是俗之論皆然而夀卿獨以僉事為樂此其間夫亦容有所未安是以寧處其薄與淹者以求免于過慝歟夫知其不安而不處過慝之懼而淹薄是井焉是古君子之心也吾于夀卿之行請以此為贈提牢廳壁題名記京師天下獄訟之所歸也天下之獄分聽于刑部之十三司而十三司之獄又并繫于提牢廳故提牢廳天下之獄皆在焉獄之繫歲以萬計朝則皆自提牢廳而出以分布于十三司提牢者目識其狀貌手披其姓名口詢耳聽魚貫而前自辰及午而始畢暮自十三司而歸自未及酉其勤亦如之固天下之至繁也其間獄之巳成者分為六監其輕若重而未成者又自為六監其桎梏之緩急扄鑰之啓閉寒暑早夜之異防飢渴疾病之殊養其微至于箕帚刀錐其賤至于滌垢除下雖各司于六監之吏而提牢者一不與知即弊興害作執法者得以議擬于其後又天下之至猥也獄之重者入于死其次亦皆徒流夫以共工之罪惡而舜姑以流之于幽州則夫拘繫于此而其情之苟有未得者又可以輕棄之于死地哉是以雖其至繁至猥而其勢有不容于不身親之者是蓋天下之至重也舊制提牢月更主事一人至是弘治庚申之十月而豫適來當事夫豫天下之至拙也其平居無恙一遇紛擾且支離厭倦不能酬酢况茲多病之餘疲頓憔悴又其平生至不可強之日而每歲決獄皆以十月下旬人懷疑懼多亦變故不測之虞則又至不可為之時也夫其天下之至繁也至猥也至重也而又適當天下至拙之人值其至不可強之日與其至不可為之時是亦豈非天下之至難也以豫之難不敢忘昔之治于此者將求私淑之而廳壁舊無題名搜諸故牒則存者僅百一耳大懼泯沒使昔人之善惡無所考徵而後來者益以畏難苟且莫有所觀感于是乃悉取而書之廳壁雖其既亡者不可復追而將來者尚無窮巳則後賢猶將有可别擇以為從違而其間苟有天下之至拙如豫者亦得以取法明善而免過愆將不為無小輔然後知豫之所以為此者固亦推己及物之至情自有不容于巳也矣弘治庚申十月望重修提牢廳司獄司記弘治庚申七月重修提牢廳工畢又兩越月而司獄司成于是餘姚王守仁適以次來提督獄事六監之吏皆來言曰惟兹廳若司建自正統破敝傾圯且二十年其卑淺隘陋則草創之制無尤焉矣是亦豈惟無以凛觀瞻而嚴法制將治事者風雨霜雪之不免又何暇于職務之舉而姦細之防哉然茲部之制修廢補敗有主事一人以專其事又壞不理吾儕小人無得而知之者獨惟拓隘以廣易朽以堅則自吾劉公實始有是吾儕目覩其成而身享其逸劉公之功不敢忘也又曰六監之囚其罪大惡極何所不有作孽造姦吏數逢其殃而民徒益其死獨禁防之不密哉亦其間容有以生其心自吾劉公始出己意創為木間令不苛而密姦不弭而消桎梏可弛縲絏可無吾儕得以安枕無事而囚亦或免于法外之誅則劉公之功于是為大小人事微而謀窒無能為也敢以布于執事實重圖之于是守仁既無以禦其情又與劉公為同僚嫌于私相美譽也乃謂之曰吾為爾記爾所言書劉公之名姓使承劉公之後者益修劉公之職繼爾輩而居此者亦無忘劉公之功則于爾心其亦已矣皆應曰是小人之願也遂記之曰劉君名璉字廷美江西鄱陽人也由弘治癸丑進士今為刑部四川司主事云弘治庚申十月十九日黃樓夜濤賦朱君朝章將復黃樓為子言其故夜泊彭城之下子瞻呼豫曰吾將與子聽黃樓之夜濤乎覺則夢也感子瞻之事作黃樓夜濤賦子瞻與客宴于黃樓之上已而客散日夕瞑色橫樓明月未出乃隱几而坐哈焉以息忽有大聲起於穹窿徐而察之乃在西山之麓倐焉改聽又似夾河之曲或隱或隆若斷若逢若揖讓而樂進歙掀舞以相雄觸孤憤于崖石駕逸氣于長風爾乃乍闔復闢既橫且縱摐摐渢渢洶洶瀜瀜若風雨驟至林壑崩奔振長平之屋瓦舞泰山之喬松咽悲吟于下浦激高響于遙空恍不知其所止而忽已過于吕梁之東矣子瞻曰噫嘻異哉是何聲之壯且悲也其烏江之兵散而東下感帳中之悲歌慷慨激烈吞聲飮泣怒戰未巳憤氣決臆倒戈曵載紛紛籍籍狂奔疾走呼號相及而復會于彭城之側者乎其赤帝之子威加海內思歸故鄉千乘萬騎霧奔雲從車轍轟霆旌旗蔽空擊萬夫之鼓撞千石之鍾唱大風之歌按節翺翔而將返于沛宮者乎于是慨然長噫欠伸起立使童子啓户憑欄而望之則煙光巳散河影垂虹帆檣泊于洲渚夜氣起于郊埛而明月固已出于芒碭之峯矣子瞻曰噫嘻豫固疑其為濤聲也夫風水之遭于澒洞之濵而為是也兹非南郭子綦之所謂天籟者乎而其誰倡之乎其誰和之乎其誰聽之乎當其滔天浴日湮谷崩山橫奔四潰茫然東翻以與吾城之爭于尺寸間也吾方計窮力屈氣索神憊懍孤城之岌岌覬須臾之未壞山頺于目懵霆擊于耳瞶而豈復知所謂天籟者乎及其水退城完河流就道脫魚腹而出塗泥乃與二三子徘徊兹樓之上而聽之也然後見其汪洋涵浴潏潏汨汨澎湃掀簸震蕩滭渤吁者為竽噴者為箎作止疾徐鍾磬祝敔奏文以始亂武以居呶者嗃者囂者嘷者翕而同者繹而從者而啁啁者而嘐嘐者蓋吾俯而聽之則若奏簫咸于洞庭仰而聞焉又若張鈞天于廣野是蓋有無之相激其殆造物者將以寫千古之不平而用以蕩吾胸中之一鬱者乎而吾亦胡為而不樂也客曰子瞻之言過矣方其奔騰漂蕩而以厄子之孤城也固有莫之為而為者而豈水之能為之乎及其安流順道風水相激而為是天籟也亦有莫之為而為者而豈水之能為之乎夫水亦何心之有哉而子乃欲據其所有者以為歡而追其既往者以為戚是豈逹人之大觀將不得為上士之妙識矣子瞻展然而笑曰客之言是也乃作歌曰濤之興兮吾聞其聲兮濤之息兮吾泯其迹兮吾將乘一氣以逰于鴻濛兮夫孰知其所極兮弘治甲子七月書于百步洪之養浩軒來雨山雪圖賦昔年大雪會稽山我時放迹逰其間巖岫皆失色崖壑俱改顔歷髙林兮入深巒銀幢寶纛森圍圜長矛利戟白齒齒駭心栗膽如穿虎豹之重關澗溪埋沒不可辨長松之杪修竹之下時聞寒溜聲潺潺沓嶂連天凝華積鉛嵯峨嶄削浩蕩無顛嶙峋眩耀勢欲倒溪回路轉忽然當之却立仰視不敢前嵌竇飛瀑忽然中瀉氷磴崚嶒上通天罅枯藤古葛倚􅑐嶅而高挂如瘦蛟老螭之蟠糾蛻皮換骨而將化舉手攀援足未定鱗甲紛紛而亂下側足登龍虬傾耳俯聽寒籟之颼颼陸風蹀躡直際縹眇恍惚最高之上頭乃是仙都玉京中有上帝遨逰之三十六瑶宫傍有玉妃舞婆娑十二層之瓊樓下隔人世知幾許真境倒照見毛髮凡骨高寒難久留劃然長嘯天花墜空素屏縞障坐不厭琪林珠樹窺玲瓏白鹿來飮澗騎之下千峰置猿怨鶴時一呌倣佛深谷之底呼其侣蒼茫之外爭行蹙陳排天風鑑湖萬頃寒𪷟𪷟雙袖拂開湖上雲照我鬚眉忽然皓白成衰翁手掬湖水洗雙眼回看群山萬朵玉芙蓉草團蒲帳青莎蓬浩歌夜宿湖水東夢魂清徹不得寐乾坤俯仰真在氷壺中幽朔隂巖地歲暮常多雪獨無湖山之勝使我每每對雪長欎結朝回䇿馬入秋臺高堂大壁寒崔嵬恍然昔日之湖山雙目驚喜三載又一開誰能縮地法此景何來石田畫師我非爾胸中胡為亦有此來君神骨清莫比此景奇絶酷相似石田此景非爾不能摸來君來君非爾不可當此圖我嘗親遊此景得其趣為君題詩非我其誰乎詩雨霽逰龍山次五松韻晴日須登獨秀臺碧山重疊畫圗開間心自與澄江老逸興誰還白髮來潮入海門舟亂發風臨松頂鶴雙回夜憑虗閣窺星漢殊覺諸峰近斗魁嚴光亭子勝雲臺雨後髙憑逺目開鄉里正須吾輩在湖山不負此公來江邉秋思丹楓盡霜外緘書白鴈回幽朔會傳戈甲散巳聞南檄授渠魁雪窗間卧夢回雙闕曙光浮懶卧茅齋且自由巷僻料應無客到景多唯擬作詩酬千巖積素供開卷疊嶂回溪好放舟破虜玉關真細事未將吾筆遂輕投次韻畢方伯寫懷之作孔顔心迹臯夔業落落乾坤無古今公自平生懷真氣誰能晚節負𥘉心獵情老去驚猶在此樂年來不費尋矮屋低頭真局促且從峰頂一髙吟春晴散步清晨急雨過林霏餘點煙稍尚滴衣隔水霞明桃亂吐沿溪風暖藥𥘉肥物情到底能容懶世事從前且任非對眼春光唯自領如誰歌咏月中歸又祗用舞霓裳巖花自舉觴古崖松半朽陽谷草長芳徑竹穿風磴雲蘿繡石床孤吟動梁甫何處卧龍岡次魏五松荷亭晚興入座松隂盡日淸當軒野鶴復時鳴風光於我能留意世味酣人未解醒長擬心神窺物外休將姓字重鄉評飛騰豈必皆伊吕歸去山田亦可耕又醉後飛觴亂擲梭起從風竹舞婆娑踈慵已分投箕頴事業無勞問保阿碧水層城來鶴駕紫雲雙闕笑金娥搏風自有天池翼莫倚蓬蒿斥鷃窠次張體仁聮句韻眼底湖山自一方晚林雲石坐高涼間心最覺身多繫逰興還堪鬢未蒼樹杪風泉長滴翠霜前巖菊尚餘芳秋江畫舫休輕發忍負良宵燈燭光又山寺幽尋亦惜忙長松落落水浪浪深冬平野風煙淡斜日滄江鷗鷺翔海內交遊唯酒伴年來蹤迹半僧房相過未盡青雲話無奈官程促去航又青林人靜一燈歸回首諸天隔翠微千里月明京信逺百年行樂故人稀已知造物終難定唯有煙霞或可依總為迂踈多抵牾此生何忍便脂韋題郭詡濂溪圖郭生作濂溪像其類與否吾何從辨之使無手中一圈蓋不知其為誰矣然筆畫老健超然自不妨為名筆郭生揮寫最超群夢想形容恐未真霽月光風千古在當時黃九解傳神西湖醉中謾書湖光瀲灔晴偏好此語相傳信不誣景中况有佳賔主世上更無真畫圖溪風欲雨吟堤樹春水新添沒渚蒲南北雙峰引髙興醉携靑竹不須扶文衡堂試事畢書壁棘闈秋鎖動經旬事了驚看白髮新造作曾無酣蟻句支離莫作畫蛇人寸絲擬得長才輔五色兼愁過眼頻袖手虗堂聽明發此中豪傑定誰真諸君以豫白髮之句試觀豫鬢果見一絲豫作詩實未嘗知也謾書一絶識之忽然相見尚非時豈亦殷勤效一絲總使皓然吾不恨此心還有爾能知逰泰山飛湍下雲窟千尺瀉高寒昨向山中見真如畫裏看松風吹短鬢霜氣肅群巒好記相從地秋深十八盤雪巖次蘇頴濵韻客途亦幽尋窈窕穿谷底塵土填胸臆到此方一洗仰視劔戟鋒巑岏顙有泚俯窺蛟龍窟匍伏首如稽絶境固靈祕兹逰實天啓𣑽宇遍巖壑簷牙相角抵山僧出延客經營設酒醴道引入雲霧峻陟歷堂陛石田唯種椒晚炊仍有米張燈坐小軒矮榻便倦體清逰感疇昔陳李兩昆弟侵晨訪舊迹古碣埋荒薺試諸生有作醉後相看眼倍明絶憐詩骨逼人清菁莪見辱真慚我膠􅃮常存底用盟滄海浮雲悲絶域碧山秋月動新情憂時謾作中宵坐共聽蕭蕭落木聲再試諸生草堂深酌坐寒更蠟炬煙消落絳英旅况最憐文作會客心聊喜困還亨春回馬帳慙桃李花滿田家憶紫荆世事浮雲堪一笑百年持此竟何成夏日登易氏萬卷樓用唐韻高樓六月自生寒沓嶂回峰擁碧闌久客巳忘非故土此身兼喜是間官幽花傍晚煙𥘉暝深樹新晴雨未乾極目海天家萬里風塵關塞欲歸難再試諸生用唐韻天涯猶未隔年回何處嚴光有釣臺樽酒可憐人獨逺封書空有鴈飛來漸驚雪色頭顱改莫漫風情笑口開遙想陽明舊詩石春來應自長莓苔次韻陸文順僉憲春王正月十七日薄暮甚雨雷電風捲我茅堂豈足念傷兹歲事難為功金縢秋日亦巳異魯史冬月將無同老臣正憂元氣泄中夜起坐心忡忡太子橋乍寒乍暖早春天隨意尋芳到水邉樹裏茅亭藏小景竹間石溜引清泉汀花照日猶含雨岸柳垂隂漸滿川欲把橋名尋野老凄涼空説建文年與胡少參小集細雨𥘉晴蠛蜢飛小亭花竹晚涼微後期客到停杯久逺道春來得信稀翰墨多憑消旅况道心無賴入禪機何時喜遂風泉賞草作山中一白衣再用前韻賦鸚鵡低垂猶憶隴西飛金鎖長羈念力微秪為能言離土逺可憐折翼歎群稀春林羞比黃鸝巧晴渚思忘白鳥機千古正平名正賦風塵誰與惜毛衣送客過二橋下馬溪邉偶共行好山當靣正如屏不緣送客何因到還喜門人伴獨醒小洞巧容危膝坐淸泉不厭洗心聽經過轉眼俱陳迹多少高崖漫勒銘復用杜韻一首濯纓何處有清流三月尋幽始得幽送客正逢催驛騎笑人且復任沙鷗崖傍石偃門雙啓洞口蘿垂箔半鈎淡我平生無一好獨于泉石尚多求先日與諸友有郊園之約是日因送客後期小詩寫懷郊園隔宿有幽期送客三橋故故遲樽酒定應須我久諸君且莫向人疑同逰更憶春前日歸醉先拚日暮時郤笑相望才咫尺無因走馬送新詩自欲探幽肯後期若為塵事故能遲緩歸已受山童促久坐翻令溪鳥疑竹裏清醅應幾酌水邉相候定多時臨風無限停雲思回首空歌伐木詩三橋客散赴前期縱轡還嫌馬足遲好鳥花間先報語浮雲山頂尚堪疑曾傳江閣邀賔句頗似籬邉送酒時便與諸公須痛飮日斜潦倒更題詩待諸友不至花間望眼欲崇朝何事諸君迹尚遙自處豈宜同俗駕相期不獨醉春瓢忘形爾我雖多缺義重師生可特招自是清逰須秉燭莫將風雨負良宵夏日逰陽明小洞天喜諸生偕集偶用唐韻古洞間來日日遊山中宰相勝封侯絶糧每自嗟尼父愠見還時有仲由雲裏高崖微入暑石間寒溜已含秋他年故國懷諸友魂夢還須到水頭將歸與諸生别於城南蔡氏樓天際層樓樹杪開夕陽下見鳥飛回城隅碧水光連座檻外青山翠作堆頗恨眼前離别近惟餘他日夢魂來新詩好記同遊處長掃溪南舊釣臺諸門人送至龍里道中二首蹊路高低入亂山諸賢相送愧間關溪雲壓帽兼愁重峰雪吹衣著鬢斑花燭夜堂還共語桂枝秋殿聽躋攀躋攀之説甚陋聊取其對偶耳相思不用勤書札别後吾言在訂頑雪滿山城入暮天歸心别意兩茫然及門真愧從陳日微服還思過宋年樽酒無因同歲晚緘書有鴈寄春前莫辭秉燭通宵坐明日相思隔隴煙贈陳宗魯學文須學右脫俗去陳言譬若千丈木勿為藤蔓纒又如崑崙派一瀉成大川人言古今異此語皆虗傳吾苟得其意今古何異焉子才良可進望汝師聖賢學文乃餘事聊云子所偏醉後歌用燕思亭韻萬峰櫕簇高連天貴陽久客經徂年思親謾想斑衣舞寄友空歌伐木篇短鬢蕭踈夜中老急管哀絲為誰好斂翼樊籠恨巳遲奮翮雲霄苦不早𬗟懷冥寂巖中人蘿衣􅉅佩芙蓉巾黃精紫芝滿山谷採石不愁倉菌貧淸溪常伴明月夜小洞自報梅花春高間豈説商山皓綽約真如藐姑神封書逺寄貴陽客胡不來歸浪相憶記取靑松澗底枝莫學楊花滿阡陌題施總兵所翁龍君不見所翁所畫龍雖畫兩目不點瞳曾聞弟子誤落筆即時雷雨飛騰空運精入神奪元化淺夫未識徒驚詫操蛇移山律回陽世間不獨所翁畫高堂四壁生風雲黑雷紫電白晝昏山崩谷陷屋瓦震雨聲如㵼長平軍頭角峥嶸幾千丈倐忽神靈露乾象小臣正抱烏號思一墮胡髯不可上視久眩定凝心神生綃漠漠開嶙峋乃知所翁遺筆迹當年為寫蒼龍真只今旱劇枯原野萬國蒼生望霑灑憑誰拈筆點雙睛一作甘霖遍天下王文成公全書卷之二十九終
