body:
  text: 語錄二傳習錄中德洪曰昔南元善刻傳習錄於越凢二册下册摘錄先師手書凢八篇其答徐成之二書吾師自謂天下是朱非陸論定旣乆一旦反之為難二書姑為調停两可之􅀃使人自思得之故元善錄為下册之首者意亦以是歟今朱陸辨明於天下乆矣洪刻先師文錄置二書方外集者示未全也故今不復錄其餘指知行之本體莫詳於答人論學與答周道通陸淸伯歐陽崇一四書而謂格物爲學者用力日可見之地莫詳於答羅整庵一書平生冐天下之非詆推䧟萬􅂮一生遑遑然不忘講學惟恐吾人不聞斯道流於功利機智以日墮於夷狄禽獸而不􅁴其一體同物之心譊譊終身至於斃而後已此孔孟已來聖賢苦心雖門人子弟未足以慰其情也是情也莫詳於答聶文蔚之苐一書此皆仍元善􅀁錄之舊而掲必有亊焉即致良知功夫明白簡切使人言下即得入手此又莫詳於答文蔚之第二書故増錄之元善當時洶洶乃䏻以身明斯道卒至遭奸被斥油油然惟以此生得聞斯學為慶而絕無有纎芥憤鬰不平之氣斯錄之刻人見其有功於同志甚大而不知其䖏時之甚艱也今􅀁去耴裁之時義則然非􅃘有所加損於其閒也答顧東橋書來書云近時學者務外遺内博而寡要故先生持倡誠意一義針砭膏肓誠大惠也吾子洞見時弊如此矣亦􅀅何以救之乎然則鄙人之心吾子固已一句道盡復何言㢤復何言㦲若誠意之説自是聖門教人用功第一義但近丗學者乃作第二義看故稍與提掇􅂃要出来非鄙人所􅀎持倡也來書云但恐立説太髙用功太捷後生師傳影響謬誤未免墜於佛氏明心見性定慧頓悟之機無恠聞者見疑區區格致誠正之說是就學者本心日用事爲間體究踐􅂂實地用功是多少次第多少積累在正與空虛頓悟之說相反聞者本無求爲聖人之志又未嘗講究其詳遂以見疑亦無足恠若吾子之高明自當一語之下便瞭然矣乃亦謂立說太高用功太捷何邪來書云􅀁喻知行並進不宜分别前後即中庸尊德性而道問學之功交養互發内外本末一以貫之之道然工夫次第不􅀎無先後之差如知食乃食知湯乃飲知衣乃服知路乃行未有不見是物先有是事此亦毫􅁵倐忽之間非謂有等今日知之而明日乃行也旣云交養互發内外本末一以貫之則知行並進之說無復可疑矣又云工夫次第不􅀎不無先後之差無乃自相矛盾已乎知食乃食等說此􅀹明白易見但吾子爲近聞障蔽自不察耳夫人必有欲食之心然後知食欲食之心卽是意即是行之始矣食味之羙惡必待入口而後知豈有不待入口而已先知食味之羙惡者邪必有欲行之心然後知路欲行之心即是意即是行之始矣路岐之險夷必待身親􅂂歷而後知豈有不待身親􅂂歷而已先知路岐之險夷者邪知湯乃飲知衣乃服以此例之皆無可疑若如吾子之喻是乃􅀁謂不見是物而先有是事者矣吾子又謂此亦毫􅁵倐忽之間非謂截然有等今日知之而明日乃行也是亦察之尚有未精然就如吾子之說則知行之爲合一並進亦自斷無可疑矣來書云真知即􅀁以爲行不行不足謂之知此爲學者喫􅂃立敎俾務躬行則可若真謂行即是知恐其專求本心遂遺物理必有闇而不逹之處抑豈聖門知行並進之成法哉知之真切篤實處即是行行之明􅁴精察處即是知知行工夫本不可離只爲後世學者分作兩截用功失􅁍知行本體故有合一並進之說真知即􅀁以爲行不行不足謂之知即如來書􅀁云知食乃食等說可見前已畧言之矣此雖喫􅂃救弊而發然知行之體本來如是非以已意抑􅀭其間姑爲是說以苟一時之效者也專求本心遂遺物理此蓋失其本心者也夫物理不外於吾心外吾心而求物理無物理矣遺物理而求吾心吾心又何物邪心之體性也性即理也故有孝親之心即有孝之理無孝親之心即無孝之理矣有忠君之心即有忠之理無忠君之心即無忠之理矣理豈外於吾心邪晦菴謂人之􅀁以爲學者心與理而巳心雖主乎一身而實管乎天下之理理雖散在萬事而實不外乎一人之心是其一分一合之間而未免已啓學者心理爲二之弊此後世􅀁以有專求本心遂遺物理之患正由不知心即理耳夫外心以求物理是以有闇而不逹之處此告子義外之說孟子􅀁以謂之不知義也心一而已以其全體惻怛而言謂之仁以其得冝而言謂之義以其條理而言謂之理不可外心以求仁不可外心以求義獨可外心以求理乎外心以求理此知行之􅀁以二也求理於吾心此聖門知行合一之敎吾子又何疑乎來書云􅀁釋大學古本謂致其本體之知此固孟子盡心之㫖朱子亦以虚靈知􅁴爲此心之量然盡心由於知性致知在於格物盡心由於知性致知在於格物此語然矣然而推本吾子之意則其􅀁以爲是語者尚有未明也朱子以盡心知性知天爲物格知致以存心養性事天爲誠意正心脩身以殀壽不貳脩身以俟爲知至仁盡聖人之事􅀂鄙人之見則與朱子正相反矣夫盡心知性知天者生知安行聖人之事也存心養性事天者學知利行賢人之事也殀壽不貳脩身以俟者困知勉行學者之事也豈可專以盡心知性爲知存心養性爲行乎吾子驟聞此言必又以爲大駭矣然其間實無可疑者一爲吾子言之夫心之體性也性之原天也􅀎盡其心是􅀎盡其性矣中庸云惟天下至誠爲􅀎盡其性又云知天地之化育質諸􅀑神而無疑知天也此惟聖人而後􅀎然故曰此生知安行聖人之事也存其心者未䏻盡其心者也故須加存之之功必存之旣乆不待於存而自無不存然後可以進而言盡蓋知天之知如知州知縣之知知州則一州之事皆已事也知縣則一縣之事皆已事也是與天爲一者也事天則如子之事父臣之事君猶與天爲二也天之􅀁以命於我者心也性也吾但存之而不敢失養之而不敢害如父母全而生之子全而歸之者也故曰此學知利行賢人之事也至於殀壽不貳則與存其心者又有間矣存其心者雖未􅀎盡其心固已一心於爲善時有不存則存之而巳今使之殀壽不貳是猶以殀壽貳其心者也猶以殀夀貳其心是其爲善之心猶未􅀎一也存之尚有􅀁未可而何盡之可云乎今且使之不以殀壽貳其爲善之心若曰死生殀壽皆有定命吾但一心於爲善修吾之身以俟天命而已是其平日尚未知有天命也事天雖與天爲二然已眞知天命之􅀁在但惟恭敬奉承之而已耳若俟之云者則尚未􅀎眞知天命之􅀁在猶有􅀁俟者也故曰􅀁以立命立者創立之立如立德立言立功立名之􅁼凡言立者皆是昔未嘗有而本始建立之謂孔子􅀁謂不知命無以爲君子者也故曰此困知勉行學者之事也今以盡心知性知天爲格物致知使􅀄學之士尚未䏻不貳其心者而􅃍責之以聖人生知安行之事如捕風捉影茫然莫知􅀁措其心㡬何而不至於率天下而路也今世致知格物之弊亦居然可見矣吾子􅀁謂務外遺内博而寡要者無乃亦是過歟此學問最􅂃要處於此而差將無徃而不差矣此鄙人之􅀁以冐天下之非笑忘其身之䧟於罪戮呶呶其言其不容已者也來書云聞語學者乃謂即物窮理之說亦是玩物䘮志又取其厭繁就約涵養本原數說標示學者指爲晚年定論此亦恐非朱子􅀁謂格物云者在即物而窮其理也即物窮理是就事事物物上求其􅀁謂定理者也是以吾心而求理於事事物物之中析心與理而爲二矣夫求理於事事物物者如求孝之理於其親之謂也求孝之理於其親則孝之理其果在於吾之心邪抑果在於親之身邪假而果在於親之身則親没之後吾心遂無孝之理歟見孺子之入井必有惻隱之理是惻隱之理果在於孺子之身歟抑在於吾心之良知歟其或不可以從之於井歟其或可以手而援之歟是皆􅀁謂理也是果在於孺子之身歟抑果出於吾心之良知歟以是例之萬事萬物之理莫不皆然是可以知析心與理爲二之非矣夫析心與理而爲二此告子義外之說孟子之􅀁深闢也務外遺内愽而寡要吾子旣巳知之矣是果何謂而然哉謂之玩物䘮志尚猶以爲不可歟若鄙人􅀁謂致知格物者致吾心之良知於事事物物也吾心之良知即􅀁謂天理也致吾心良知之天理於事事物物則事事物物皆得其理矣致吾心之良知者致知也事事物物皆得其理者格物也是合心與理而爲一者也合心與理而爲一則凡區區前之􅀁云與朱子晚年之論皆可以不言而喻矣來書云人之心體本無不明而氣拘物蔽鮮有不昬非學問思辨以明天下之理則善惡之機眞妄之辨不􅀎自覺任情恣意其害有不可勝言者矣此段大畧似是而非蓋承沿舊說之弊不可以不辨也夫學問思辨行皆􅀁以爲學未有學而不行者也如言學孝則必服勞奉養躬行孝道則後謂之學豈徒懸空口耳講說而遂可以謂之學孝乎學射則必張􅃓挾矢引滿中的學書則必伸􅁓執筆操觚染翰盡天下之學無有不行而可以言學者則學之始固已即是行矣篤者敦實篤厚之意巳行矣而敦篤其行不息其功之謂爾蓋學之不􅀎以無疑則有問問即學也即行也又不􅀎無疑則有思思即學也即行也又不􅀎無疑則有辨辨即學也即行也辨即明矣思旣愼矣問旣審矣學旣􅀎矣又從而不息其功焉斯之謂篤行非謂學問思辨之後而始措之於行也是故以求􅀎其事而言謂之學以求觧其惑而言謂之問以求通其說而言謂之思以求精其察而言謂之辨以求􅂂其實而言謂之行盖析其功而言則有五合其事而言則一而已此區區心理合一之體知行並進之功􅀁以異於後世之說者正在於是今吾子特舉學問思辨以窮天下之理而不及篤行是專以學問思辨爲知而謂窮理爲無行也已天下豈有不行而學者邪豈有不行而遂可謂之窮理者邪明道云只窮理便盡性至命故必仁極仁而後謂之􅀎窮仁之理義極義而後謂之䏻窮義之理仁極仁則盡仁之性矣義極義則盡義之性矣學至於窮理至矣而尚未措之於行天下寧有是邪是故知不行之不可以爲學則知不行之不可以爲窮理矣知不行之不可以爲窮理則知知行之合一並進而不可以分爲兩節事矣夫萬事萬物之理不外於吾心而必曰窮天下之理是殆以吾心之良知爲未足而必外求於天下之廣以禆􅀘增益之是猶析心與理而爲二也夫學問思辨篤行之功雖其困勉至於人一巳百而擴􅂶之極至於盡性知天亦不過致吾心之良知而已良知之外豈復有加於毫末乎今必曰窮天下之理而不知反求諸其心則凡􅀁謂善惡之機眞妄之辨者舎吾心之良知亦將何􅀁致其體察乎吾子􅀁謂氣拘物蔽者拘此蔽此而已今欲去此之蔽不知致力於此而欲以外求是猶目之不明者不務服樂調理以治其目而徒倀倀然求明於其外明豈可以自外而得哉任情恣意之害亦以不䏻精察天理於此心之良知而已此誠毫􅁵千里之謬者不容於不辨吾子毋謂其論之太刻也來書云教人以致知明德而戒其即物窮理誠使昏闇之士深居端坐不聞教告遂􅀎至於知致而德明乎縱令靜而有覺稍悟本性則亦定慧無用之見果􅀎知古今逹事變而致用於天下國家之實否乎其曰知者意之體物者意之用格物如格君心之非之格語雖超悟獨得不踵陳見抑恐於道未相脗合區區論致知格物正􅀁以窮理未嘗戒人窮理使之深居端坐而一無􅀁事也若謂即物窮理如前􅀁云務外而遺内者則有􅀁不可耳昏闇之士果䏻隨事隨物精察此心之天理以致其本然之良知則雖愚必明雖柔必強大本立而逹道行九經之属可一以貫之而無遺矣尚何患其無致用之實乎彼頑空虚靜之徒正惟不䏻隨事隨物精察此心之天理以致其本然之良知而遺棄倫理寂㓕虚無以爲常是以要之不可以治家國天下孰謂聖人窮理盡性之學而亦有是弊哉心者身之主也而心之虚靈明覺即􅀁謂本然之良知也其虚靈明覺之良知應感而動者謂之意有知而後有意無知則無意矣知非意之體乎意之􅀁用必有其物物即事也如意用於事親即事親爲一物意用於治民即治民爲一物意用於讀書即讀書爲一物意用於聽訟即聽訟爲一物凡意之􅀁用無有無物者有是意即有是物無是意即無是物矣物非意之用乎格字之義有以至字訓者如格于文祖有苗來格是以至訓者也然格于文祖必純孝誠敬幽明之間無一不得其理而後謂之格有苗之頑實以文德誕敷而後格則亦兼有正字之義在其間未可專以至字盡之也如格其非心大臣格君心之非之􅁼是則一皆正其不正以歸於正之義而不可以至字爲訓矣且大學格物之訓又安知其不以正字爲訓而必以至字爲義乎如以至字爲義者必曰窮至事物之理而後其說始通是其用功之要全在一窮字用力之地全在一理字也若上去一窮下去一理字而眞曰致知在至物其可通乎夫窮理盡性聖人之成訓見於繫辭者也苟格物之說而果即窮理之義則聖人何不直曰致知在窮理而必爲此轉折不完之語以啓後世之弊邪蓋大學格物之說自與繫辭窮理大㫖雖同而微有分辨窮理者兼格致誠正而爲功也故言窮理則格致誠正之功皆在其中言格物則必兼舉致知誠意正心而後其功始備而宻今偏舉格物而遂謂之窮理此􅀁以專以窮理属知而謂格物未常有行非惟不得格物之㫖并窮理之義而失之矣此後世之學􅀁以析知行爲先後兩截日以支離决裂而聖學益以殘晦者其端實始於此吾子蓋亦未免承沿積習見則以爲於道未相脗合不爲過矣來書云謂致知之功將如何爲温凊如何爲奉養即是誠意非别有􅀁謂格物此亦恐非此乃吾子自以已意揣度鄙見而爲是說非鄙人之􅀁以告吾子者矣若果如吾子之言寜復有可通乎蓋鄙人之見則謂意欲温凊意欲奉養者􅀁謂意也而未可謂之誠意必實行其温凊奉養之意務求自慊而無自欺然後謂之誠意知如何而爲温凊之節知如何而爲奉養之宜者􅀁謂知也而未可謂之致知必致其知如何爲温凊之節者之知而實以之温凊致其知如何爲奉養之冝者之知而實以之奉養然後謂之致知温凊之事奉養之事􅀁謂物也而未可謂之格物必其於温凊之事也一如其良知之􅀁知當如何爲温凊之節者而爲之無一毫之不盡於奉養之事也一如其良知之􅀁知當如何爲奉養之冝者而爲之無一毫之不盡然後謂之格物温凊之物格然後知温凊之良知始致奉養之物格然後知奉養之良知始致故曰物格而後知至致其知温凊之良知而後温凊之意始誠致其知奉養之良知而後奉養之意始誠故曰知至而後意誠此區區誠意致知格物之說蓋如此吾子更熟思之將亦無可疑者矣來書云道之大端易於明白􅀁謂良知良􅀎愚夫愚婦可與及者至於節目時變之詳毫􅁵千里之繆必待學而後知今語孝於温凊定省孰不知之至於舜之不告而娶武之不􅌾而興師養志養口小杖大杖割股廬墓等事處常處變過與不及之間必須討論是非以爲制事之本然後心體無蔽臨事無失道之大端易於明白此語誠然顧後之學者忽其易於明白者而弗由而求其難於明白者以爲學此其􅀁以道在邇而求諸逺事在易而求諸難也孟子云夫道若大路然豈難知哉人病不由耳良知良􅀎愚夫愚婦與聖人同但惟聖人􅀎致其良知而愚夫愚婦不􅀎致此聖愚之􅀁由分也節目時變聖人夫豈不知但不專以此爲學而其􅀁謂學者正惟致其良知以精察此心之天理而與後世之學不同耳吾子未暇良知之致而汲汲焉顧是之憂此正求其難於明白者以爲學之弊也夫良知之於節目時變猶規矩尺度之於方圓長短也節目時變之不可預定猶方圓長短之不可勝窮也故規矩誠立則不可欺以方圓而天下之方圓不可勝用矣尺度誠陳則不可欺以長短而天下之長短不可勝用矣良知誠致則不可欺以節目時變而天下之節目時變不可勝應矣毫􅁵千里之謬不於吾心良知一念之㣲而察之亦將何􅀁用其學乎是不以規矩而欲定天下之方圓不以尺度而欲盡天下之長短吾見其乖張謬戾日勞而無成也巳吾子謂語孝於温凊定省孰不知之然而􅀎致其知者鮮矣若謂粗知温凊定省之儀節而遂謂之􅀎致其知則凡知君之當仁者皆可謂之􅀎致其仁之知知臣之當忠者皆可謂之􅀎致其忠之知則天下孰非致知者邪以是而言可以知致知之必在於行而不行之不可以爲致知也明矣知行合一之體不益較然矣乎夫舜之不告而娶豈舜之前已有不告而娶者爲之凖則故舜得以考之何典間諸何人而爲此邪抑亦求諸其心一念之良知權輕重之宜不得已而爲此邪武之不􅌾而興師豈武之前已有不􅌾而興師者爲之凖則故武得以考之何典問諸何人而爲此邪抑亦求諸其心一念之良知權輕重之宜不得已而爲此邪使舜之心而非誠於爲無後武之心而非誠於爲救民則其不告而娶與不􅌾而興師乃不孝不忠之大者而後之人不務致其良知以精察義理於此心感應酬酢之間顧欲懸空討論此等變常之事執之以爲制事之本以求臨事之無失其亦遠矣其餘􅁆端皆可􅁼推則古人致知之學從可知矣來書云謂大學格物之說專求本心猶可牽合至於六經四書􅀁載多聞多見前言徃行好古敏求慱學審問温故知新􅀶學詳說好問好察是皆明白求於事爲之際資於論說之間者用功節目固不容紊矣格物之義前巳詳悉牽合之疑想已不俟復觧矣至於多聞多見乃孔子因子張之務外好高徒欲以多聞多見爲學而不􅀎求諸其心以闕疑殆此其言行􅀁以不免於􅀹悔而􅀁謂見聞者適以資其務外好高而已蓋􅀁以救子張多聞多見之病而非以是教之爲學也夫子嘗曰蓋有不知而作之者我無是也是猶孟子是非之心人皆有之之義也此言正􅀁以明德性之良知非由於聞見耳若曰多聞擇其善者而從之多見而識之則是專求諸見聞之末而已落在第二義矣故曰知之次也夫以見聞之知爲次則􅀁謂知之上者果安􅀁指乎是可以窺聖門致知用力之地矣夫子謂子貢曰賜也汝以予爲多學而識之者歟非也予一以貫之使誠在於多學而識則夫子胡乃謬爲是說以欺子貢者邪一以貫之非致其艮知而何易曰君子多識前言徃行以畜其德夫以畜其德爲心則凡多識前言徃行者孰非畜德之事此正知行合一之功矣好古敏求者好古人之學而敏求此心之理耳心即理也學者學此心也求者求此心也孟子云學問之道無他求其放心而巳矣非若後世廣記􅀶誦古人之言詞以爲好古而汲汲然惟以求功名利逹之具於其外者也􅀶學審問前言已盡温故新知朱子亦以温故属之尊德性矣德性豈可以外求哉惟夫知新必由於温故而温故乃􅀁以知新則亦可以驗知行之非兩節矣􅀶學而詳說之者將以反說約也若無反約之云則􅀶學詳說者果何事邪舜之好問好察惟以用中而致其精一於道心耳道心者良知之謂也君子之學何嘗離去事爲而廢論說但其從事於事爲論說者要皆知行合一之功正􅀁以致其本心之良知而非若世之徒事口耳談說以爲知者分知行爲兩事而果有節目先後之可言也來書云楊墨之爲仁義鄕愿之辭忠信堯舜子之之禪讓湯武楚項之放伐周公莾操之攝輔謾無印正又焉適從且於古今事變禮樂名物未嘗考識使國家欲興明堂建辟雍制曆律草封禪又將何􅀁致其用乎故論語曰生而知之者義理耳若夫禮樂名物古今事變亦必待學而後有以驗其行事之實此則可謂定論矣􅀁喻楊墨鄕愿堯舜子之湯武楚項周公莾操之辨與前舜武之論大畧可以􅁼推古今事變之疑前於良知之說已有䂓矩尺度之喻當亦無俟多贅矣至於明堂辟雍諸事以尚未容於無言者然其說甚長姑就吾子之言而取正焉則吾子之惑將亦可以少釋矣夫明堂辟雍之制始見於呂氏之月令漢儒之訓䟽六經四書之中未嘗詳及也豈呂氏漢儒之知乃賢於三代之賢聖乎齊宣之時明堂尚有未毁則幽厲之世周之明堂皆無恙也堯舜茅茨土階明堂之制未必備而不害其爲治幽厲之明堂固猶文武成康之舊而無救於其亂何邪豈能以不􅃘人之心而行不􅃘人之政則雖茅茨土階固亦明堂也以幽厲之心而行幽厲之政則雖明堂亦􅁀政􅀁自出之地邪武帝肇講於漢而武后盛作於唐其治亂何如邪天子之學曰辟雍諸侯之學曰泮宫皆􅁚地形而爲之名耳然三代之學其要皆􅀁以明人倫非以辟不辟泮不泮爲重輕也孔子云人而不仁如禮何人而不仁如樂何制禮作樂必具中和之德聲爲律而身爲度者然後可以語此若夫器數之末樂工之事祝史之守故曾子曰君子􅀁貴乎道者三􅇼豆之事則有司存也堯命羲和欽若昊天曆􅁚日月星辰其重在於敬授人時也舜在璿璣玉衡其重在於以齊七政也是皆汲汲然以仁民之心而行其養民之政治曆明時之本固在於此也羲和曆數之學臯契未必能之也禹稷未必能之也堯舜之知而不徧物雖堯舜亦未必能之也然至於今循羲和之法而世修之雖曲知小慧之人星術淺陋之士亦能推歩占候而無􅀁忒則是後世曲知小慧之人反賢於禹稷堯舜者邪封禪之說􅀹爲不經是乃後世佞人䛕士􅀁以求媚於其上倡爲誇侈以蕩君心而靡國費蓋欺天罔人無耻之大者君子之􅀁不道司馬相如之􅀁以見譏於天下後世也吾子乃以是爲儒者􅀁冝學殆亦未之思邪夫聖人之􅀁以爲聖者以其生而知之也而釋論語者曰生而知之者義理耳若夫禮樂名物古今事變亦必待學而後有以驗其行事之實夫禮樂名物之􅁼果有􅀜於作聖之功也而聖人亦必待學而後能知焉則是聖人亦不可以謂之生知矣謂聖人爲生知者專指義理而言而不以禮樂名物之􅁼則是禮樂名物之􅁼無􅀜於作聖之功矣聖人之􅀁以謂之生知者專指義理而不以禮樂名物之􅁼則是學而知之者亦惟當學知此義理而已困而知之者亦惟當困知此義理而巳今學者之學聖人於聖人之􅀁能知者未能學而知之而顧汲汲焉求知聖人之􅀁不能知者以爲學無乃失其􅀁以希聖之方歟凡此皆就吾子之􅀁惑者而稍爲之分釋未及乎㧞本塞源之論也夫㧞本塞源之論不明於天下則天下之學聖人者將日繁日難斯人淪於禽獸夷狄而猶自以爲聖人之學吾之說雖或蹔明於一時終將凍觧於西而氷堅於東霧釋於前而雲滃於後呶呶焉危困以死而卒無救於天下之分毫也已夫聖人之心以天地萬物爲一體其視天下之人無外内遠近凡有血氣皆其昆弟赤子之親莫不欲安全而教養之以遂其萬物一體之念天下之人心其始亦非有異於聖人也特其間於有我之􅀻隔於物欲之蔽大者以小通者以塞人各有心至有視其父子兄弟如􅄷讐者聖人有憂之是以推其天地萬物一體之仁以教天下使之皆有以克其􅀻去其蔽以復其心體之同然其教之大端則堯舜禹之相授受􅀁謂道心惟微惟精惟一􅁢執厥中而其節目則舜之命契􅀁謂父子有親君臣有義夫婦有别長㓜有序朋友有信五者而已唐虞三代之世教者惟以此爲教而學者惟以此爲學當是之時人無異見家無異習安此者謂之聖勉此者謂之賢而背此者雖其啓明如朱亦謂之不肖下至閭井田野農工商賈之賤莫不皆有是學而惟以成其德行爲務何者無有聞見之雜記誦之煩辭章之靡濫功利之馳逐而但使之孝其親弟其長信其朋友以復其心體之同然是蓋性分之􅀁固有而非有假於外者則人亦孰不能之乎學校之中惟以成德爲事而才能之異或有長於禮樂長於政教長於水土播植者則就其成德而因使益精其能於學校之中迨夫舉德而任則使之終身居其職而不易用之者惟知同心一德以共安天下之民視才之稱否而不以崇卑爲輕重勞逸爲羙惡效用者亦惟知同心一德以共安天下之民苟當其能則終身處於煩劇而不以爲勞安於卑􅃈而不以爲賤當是之時天下之人熈熈皥皥皆相視如一家之親其才質之下者則安其農工商賈之分各勤其業以相生相養而無有乎希高慕外之心其才􅀎之異若臯䕫稷契者則出而各效其能若一家之務或營其衣食或通其有無或備其器用集謀并力以求遂其仰事俯育之願惟恐當其事者之或怠而重巳之累也故稷勤其稼而不耻其不知教視契之善教即已之善教也䕫司其樂而不耻於不明禮視夷之通禮即已之通禮也蓋其心學純明而有以全其萬物一體之仁故其精神流貫志氣通逹而無有乎人巳之分物我之間譬之一人之身目視耳聽手持足行以濟一身之用目不耻其無聦而耳之􅀁渉目必營焉足不耻其無執而手之􅀁探足必前焉蓋其元氣充周血脉條暢是以痒疴呼吸感觸神應有不言而喻之妙此聖人之學􅀁以至易至簡易知易從學易能而才易成者正以大端惟在復心體之同然而知識技能非􅀁與論也三代之衰王道熄而覇術焻孔孟既没聖學晦而邪說橫教者不復以此爲教而學者不復以此爲學覇者之徒竊取先王之近似者假之於外以内濟其􅀻已之欲天下靡然而宗之聖人之道遂以蕪塞相倣相效日求􅀁以富强之說傾詐之謀攻伐之計一切欺天罔人茍一時之得以獵取聲利之術若管商蘇張之属者至不可名數旣其乆也闘爭刼奪不勝其禍斯人淪於禽獸夷狄而覇術亦有􅀁不能行矣世之儒者􅁣然悲傷蒐獵先聖王之典章法制而掇拾修􅀘於煨燼之餘蓋其爲心良亦欲以挽回先王之道聖學旣逺覇術之傳積漬已深雖在賢知皆不免於習染其􅀁以講明修飾以求宣暢光復於世者僅足以増覇者之藩籬而聖學之門墻遂不復可覩於是乎有訓詁之學而傳之以爲名有記誦之學而言之以爲􅀶有詞章之學而侈之以爲麗若是者紛紛籍籍群起角立於天下又不知其㡬家萬徑千蹊莫知􅀁適世之學者如入百戯之埸讙謔跳踉騁竒闘巧獻笑爭妍者四面而競出前瞻後盻應接不遑而耳目眩瞀精神恍惑日夜遨逰淹息其間如病狂䘮心之人莫自知其家業之􅀁歸時君世主亦皆昏迷顛倒於其說而終身從事於無用之虚文莫自知其􅀁謂間有􅁴其空踈謬妄支離牽滯而卓然自􅁬欲以見諸行事之實者極其􅀁抵亦不過爲富強功利五覇之事業而止聖人之學日遠日晦而功利之習愈趨愈下其間雖嘗瞽惑於佛老而佛老之說卒亦未能有以勝其功利之心雖又嘗折􅂨於群儒而群儒之論終亦未能有以破其功利之見蓋至於今功利之毒淪浹於人之心髓而習以成性也㡬千年矣相矜以知相軋以􅀔相爭以利相高以技能相取以聲譽其出而仕也理錢􅂖者則欲兼夫兵刑典禮樂者又欲與於銓軸處郡縣則思藩臬之高居臺諌則望宰執之要故不能其事則不得以兼其官不通其說則不可以要其譽記誦之廣適以長其教也知識之多適以行其惡也聞見之博適以肆其辨也辭章之富適以飾其僞也是以臯䕫稷契􅀁不能兼之事而今之初學小生皆欲通其說䆒其術其稱名借號未嘗不曰吾欲以共成天下之務而其誠心實意之􅀁在以爲不如是則無以濟其􅀻而滿其欲也嗚呼以若是之積染以若是之心志而又講之以若是之學術宜其聞吾聖人之教而視之以爲贅疣柄鑿則其以良知爲未足而謂聖人之學爲無􅀁用亦其􅀔有􅀁必至矣嗚呼士生斯世而尚何以求聖人之學乎尚何以論聖人之學乎士生斯世而欲以爲學者不亦勞苦而繁難乎不亦拘滯而險艱乎嗚呼可悲也已􅀁幸天理之在人心終有􅀁不可泯而良知之明萬古一日則其聞吾㧞本塞源之論必有惻然而悲戚然而痛憤然而起沛然若决江河而有􅀁不可禦者矣非夫豪傑之士無􅀁待而興起者吾誰與望乎啓問道通書呉曽兩生至備道道通懇切爲道之意殊慰相念若道通真可謂篤信好學者矣憂病中㑹不能與兩生細論然兩生亦自有志向肯用功者毎見輒􅁴有進在區區誠不能無􅀒於兩生之遠來在兩生則亦庻㡬無􅀒其遠來之意矣臨别以此冊致道通意請書數語荒憒無可言者輒以道通來書中􅀁問數節畧干轉語奉酬草草殊不詳細兩生當亦自能口悉也來書云日用工夫只是立志近來於先生誨言時時體驗愈益明白然於朋友不能一時相離若得朋友講習則此志􅂊精健闊大􅂊有生意若三五日不得朋友相講便􅁴微弱遇事便㑹困亦時㑹忘乃今無朋友相講之日還只静坐或㸔書或㳺衍經行凡寓目措身悉取以培養此志頗􅁴意思和適然終不如朋友講聚精神流動生意更多也離群索居之人當更有何法以處之此段足驗道通日用工夫􅀁得工夫大畧亦只是如此用只要無間㫁到得純熟後意思又自不同矣大抵吾人爲學􅂃要大頭腦只是立志􅀁謂困忘之病亦只是志欠真切今好色之人未嘗病於困忘只是一真切耳自家痛庠自家須㑹知得自家須㑹搔摩得旣自知得痛痒自家須不能不搔摩得佛家謂之方便法門須是自家調停斟酌他人總難與力亦更無别法可設也來書云上蔡嘗問天下何思何慮伊川云有此理只是發得太早在學者工夫固是必有事焉而勿忘然亦須識得何思何慮底氣􅁚一併㸔爲是若不識得這氣􅁚便有正與􅂇長之病􅀂認得何思何慮而忘必有事焉工夫恐又墮於無也須是不滯於有不墮於無然乎否也所論亦相去不遠矣只是契悟未盡上蔡之問與伊川之答亦只是上蔡伊川之意與孔子繫辭原㫖稱有不同繫言何思何慮是言􅀁思􅀁慮只是一箇天理更無别思别慮耳非謂無思無慮也故曰同歸而殊途一致而百慮天下何思何慮云殊途云百慮則豈謂無思無慮邪心之本體即是天理天理只是一箇更有何可思慮得天理原自寂然不動原自感而遂通學者用功雖千思萬慮只是要復他本來體用而已不是以􅀻意去安排思索出來故明道云君子之學莫若廓然而太公物來而順應若以􅀻意去安排思索便是用智自􅀻矣何思何慮正是工夫在聖人分上便是自然的在學者分上便是勉然的伊川􅁍是把作效驗㸔了􅀁以有發得太早之說旣而云􅁍好用功則已自􅁴其前言之有未盡矣濓溪主静之論亦是此意今道通之言雖已不爲無見然亦未免尚有兩事也來書云凡學者􅂊曉得做工夫便要識認得聖人氣􅁚蓋認得聖人氣􅁚把做凖的乃就實地做工夫去􅂊不㑹差􅂊是作聖工夫未知是否先認聖人氣象㫺人嘗有是言矣然亦欠有頭腦聖人氣􅁚自是聖人的我從何處識認若不就自己良知上真切體認如以無星之稱而權輕重未開之鏡而照妍􅎀真􅀁謂以小人之腹而度君子之心矣聖人氣􅁚何由認得自已良知原與聖人一般若體認得自已良知明白即聖人氣象不在聖人而在我矣程子嘗云覷著堯學他行事無他許多聰明睿智安能如彼之動容周旋中禮又云心通於道然後能辨是非今且說通於道在何處聰明睿智從何處出來來書云事上磨煉一日之内不管有事無事只一意培養本原若遇事來感或自已有感心上旣有􅁴安可謂無事但因事凝心一㑹大段覺得事理當如此只如無事處之盡吾心而已然乃有處得善與未善何也又或事來得多須要次第與處毎因才力不足輒爲􅀁困雖極力扶起而精神已􅁴衰弱遇此未免要十分退省寧不了事不可不加培養如何􅀁說工夫就道通分上也只是如此用然未免有出入在凡人爲學終身只爲這一事自少至老自朝至暮不論有事無事只是做得這一件􅀁謂必有事焉者也􅀂說寧不了事不可不加培養􅁍是尚爲兩事也必有事焉而勿忘勿􅂇事物之來但盡吾心之良知以應之􅀁謂忠恕違道不逺矣凡處得有善有未善及有困頓失次之患者皆是牽於毁譽得䘮不能實致其良知耳􅀂能實致其良知然後見得平日􅀁謂善者未必是善􅀁謂未善者􅁍恐正是牽扵毁譽得喪自賊其良知者也來書云致知之說春間再承誨益已頗知用力􅁴得比舊尤爲簡易但鄙心則謂與初學言之還湏帶格物意思使之知下手處本來致知格物一併下但在初學未知下手用功還說與格物方暁得致知云云格物是致知工夫知得致知便已知得格物􅀂是未知格物則是致知工夫亦未嘗知也近有一書與友人論此頗悉今徃一通細觀之當自見矣來書云今之爲朱陸之辨者尚未巳毎對朋友言正學不明已乆且不須枉費心力爲朱陸爭是非只依先生立志二字􅀧化人􅀂其人果能辨得此志來决意要知此學已是大段明白了朱陸雖不辨彼自能覺得又嘗見朋友中見有人議先生之言者輒爲動氣昔在朱陸二先生􅀁以遺後世紛紛之議者亦見二先生工夫有未純熟分明亦有動氣之病若明道則無此矣觀其與吳渉禮論介甫之學云爲我盡逹諸介甫不有益於他必有益於我也氣􅁚何等從容嘗見先生與人書中亦引此言願朋友皆如此如何此節議論得極是極是願道通遍以告於同志各自且論自巳是非莫論朱陸是非也以言語謗人其謗淺若自己不能身體實踐而徒入耳出口呶呶度日是以身謗也其謗深矣凡今天下之論議我者苟􅀎取以爲善皆是砥礪切磋我也則在我無非警惕修省進德之地矣昔人謂攻吾之短者是吾師師又可惡乎來書云有引程子人生而靜以上不容􅀃才說性便已不是性何故不容說何故不是性晦庵答云不容說者未有性之可言不是性者已不能無氣質之雜矣二先生之言皆未能曉毎看書至此輒爲一惑請問生之謂性生字即是氣字猶言氣即是性也氣即是性人生而静以上不容說才說氣即是性即已落在一邉不是性之本原矣孟子性善是從本原上說然性善之端須在氣上始見得􅀂無氣亦無可見矣惻隱羞惡辭讓是非即是氣程子謂論性不論氣不備論氣不論性不明亦是爲學者各認一邉只得如此說若見得自性明白時氣即是性性即是氣原無性氣之可分也答陸原靜書來書云下手工夫覺此心無時寧靜妄心固動也照心亦動也心既恒動則無刻蹔停也是有意於求寧靜是以愈不寧靜耳夫妄心則動也照心非動也􅁪照則􅁪動􅁪靜天地之􅀁以􅁪乆而不已也照心固照也妄心亦照也其爲物不貳則其生物不息有刻蹔停則息矣非至誠無息之學矣來書云良知亦有起處云云此或聽之未審良知者心之本體即前􅀁謂􅁪照者也心之本體無起無不起雖妄念之發而良知未嘗不在但人不知存則有時而或放耳雖昏塞之極而良知未嘗不明但人不知察則有時而或蔽耳雖有時而或放其體實未嘗不在也存之而已耳雖有時而或蔽其體實未嘗不明也察之而已耳若謂良知亦有起處則是有時而不在也非其本體之謂矣精一之精以理言精神之精以氣言理者氣之條理氣者理之運用無條理則不能運用無運用則亦無以見其􅀁謂條理者矣精則精精則明精則一精則神精則誠一則精一則明一則神一則誠原非有二事也但後世儒者之說與養生之說各滯於一偏是以不相爲用前日精一之論雖爲原靜愛養精神而發然而作聖之功寔亦不外是矣來書云元神元氣元精必各有􅀉藏發生之處又有真隂之精真陽之氣云云夫良知一也以其妙用而言謂之神以其流行而言謂之氣以其凝聚而言謂之精安可以形象方􅀁求哉真隂之精即真陽之氣之母真陽之氣即真隂之精之父隂根陽陽根隂亦非有二也茍吾良知之說明則凡若此􅁼皆可以不言而喻不然則如來書􅀁云三􅀜七返九還之屬尚有無窮可疑者也又來書云良知心之本體即􅀁謂性善也未發之中也寂然不動之體也廓然太公也何常人皆不能而必待於學邪中也寂也公也旣以屬心之體則良知是矣今驗之於心知無不良而中寂大公實未有也豈良知復超然於體用之外乎性無不善故知無不良良知即是未發之中即是廓然大公寂然不動之本體人人之􅀁同具者也但不能不昏蔽於物欲故須學以去其昏蔽然於良知之本體􅀄不能有加損於毫未也知無不良而中寂大公未能全者是昏蔽之未盡去而存之未純耳體即良知之體用即良知之用寧復有超然於體用之外者乎來書云周子曰主靜程子曰動亦定靜亦定先生曰定者心之本體是靜定也决非不覩不聞無思無爲之謂必常知常存常主於理之謂也夫常知常存常主於理明是動也已發也何以謂之靜何以謂之本體豈是靜定也又有以貫乎心之動靜者邪理無動者也常知常存常主於理即不覩不聞無思無爲之謂也不覩不聞無思無爲非槁木死􅁅之謂也覩聞思爲一於理而未嘗有􅀁覩聞思爲即是動而未嘗動也􅀁謂動亦定靜亦定體用一原者也來書云此心未發之體其在已發之前乎其在已發之中而爲之主乎其無前後内外而渾然一體者乎今謂心之動靜者其主有事無事而言乎其主寂然感通而言乎其主循理從欲而言乎若以循理爲靜從欲爲動則於􅀁謂動中有靜靜中有動動極而静静極而動者不可通矣若以有事而感通爲動無事而寂然爲静則於􅀁謂動而無動靜而無靜者不可通矣若謂未發在已發之先靜而生動是至誠有息也聖人有復也又不可矣若謂未發在已發之中則不知未發已發俱當主靜乎抑未發爲靜而已發爲動乎抑未發已發俱無動無靜乎俱有動有靜乎幸教未發之中即良知也無前後内外而渾然一體者也有事無事可以言動靜而良知無分於有事無事也寂然感通可以言動靜而良知無分於寂然感通也動靜者􅀁遇之時心之本體固無分於動靜也理無動者也動即爲欲循理則雖酬酢萬變而未嘗動也從欲則雖槁心一念而未嘗靜也動中有靜靜中有動又何疑乎有事而感通固可以言動然而寂然者未嘗有増也無事而寂然固可以言靜然而感通者未嘗有减也動而無動靜而無靜又何疑乎無前後内外而渾然一體則至誠有息之疑不待觧矣未發在已發之中而已發之中未嘗别有未發者在已發在未發之中而未發之中未嘗别有已發者存是未嘗無動靜而不可以動靜分者也凡觀古人言語在以意逆志而得其大㫖若必拘滯於文義則靡有孑遺者是周果無遺民也周子靜極而動之說苟不善觀亦未免有病蓋其意從太極動而生陽靜而生隂說來太極生生之理妙用無息而常體不易太極之生生即隂陽之生生就其生生之中指其妙用無息者而謂之動謂之陽之生非謂動而後生陽也就其生生之中指其常體不易者而謂之靜謂之隂之生非謂靜而後生隂也若果靜而後生隂動而後生陽則是隂陽動静截然各自爲一物矣隂陽一氣也一氣屈伸而爲隂陽動靜一理也一理隱顯而爲動靜春夏可以爲陽爲動而未嘗無隂與靜也秋冬可以爲隂爲靜而未嘗無陽與動也春夏此不息秋冬此不息皆可謂之陽謂之動也春夏此常體秋冬此常體皆可謂之隂謂之靜也自元㑹運世歲月日時以至刻抄忽微莫不皆然􅀁謂動靜無端隂陽無始在知道者黙而識之非可以言語窮也若只牽文泥句比擬倣像則􅀁謂心從法華轉非是轉法華矣來書云嘗試於心喜怒憂懼之感發也雖動氣之極而吾心良知一覺即罔然消阻或遏於初或制於中或悔於後然則良知常􅀂居優間無事之地而爲之主於喜怒憂懼若不與焉者何歟知此則知未發之中寂然不動之體而有發而中節之和感而遂通之妙矣然謂良知常若居於優閒無事之地語尚有病蓋良知雖不滯於喜怒憂懼而喜怒憂懼亦不外於良知也來書云夫子昨以良知爲照心􅀼謂良知心之本體也照心人􅀁用功乃戒愼恐懼之心也猶思也而遂以戒愼恐懼爲良知何歟能戒愼恐懼者是良知也來書云先生又曰照心非動也豈以其循理而謂之静歟妄心亦照也豈以其良知未嘗不在於其中未嘗不明於其中而視聽言動之不過則者皆天理歟且既曰妄心則在􅄭心可謂之照而在照心則謂之妄矣妄與息何異今假妄之照以續至誠之無息􅀼􅀁未明幸再啓􅂪照心非動者以其發於本體明覺之自然而未嘗有所動也有􅀁動即妄矣妄心亦照者以其本體明覺之自然者未嘗不在於其中但有􅀁動耳無􅀁動即照矣無妄無照非以妄爲照以照爲妄也照心爲照妄心爲妄是猶有妄有照也有妄有照則猶貳也貳則息矣無妄無照則不貳不貳則不息矣來書云養生以清心寡欲爲要夫清心寡欲作聖之功畢矣然欲寡則心自清清心非舎棄人事而獨居求靜之謂也盖欲使此心純乎天理而無一毫人欲之􅀻耳今欲爲此之功而隨人欲生而克之則病根常在未免㓕於東而生於西若欲刋剥洗蕩於衆欲未萌之先則又無􅀁用其力徒使此心之不清且欲未萌而搜剔以求去之是猶引犬上堂而逐之也愈不可矣必欲此心純乎天理而無一毫人欲之􅀻此作聖之功也必欲此心純乎天理而無一毫人欲之􅀻非防於未萌之先而克於方萌之際不能也防於未萌之先而克於方萌之際此正中庸戒慎恐懼大學致知格物之功舎此之外無别功矣夫謂㓕於東而生於西引犬上堂而逐之者是自􅀻自利將迎意必之爲累而非克治洗蕩之爲患也今曰養生以淸心寡欲爲要只養生二字便是自􅀻自利將迎意必之根有此病根潜伏於中冝其有㓕於東而生於西引犬上堂而逐之之患也來書云佛氏於不思善不思惡時認本來靣目於吾儒隨物而格之功不同吾若於不思善不思惡時用致知之功則已渉於思善矣欲善惡不思而心之良知清靜自在惟有􅄰而方醒之時耳斯正孟子夜氣之說但於斯光景不䏻乆倐忽之際思慮已生不知用功乆者其常􅄰􅀄醒而思未起之時否乎今澄欲求寧静愈不寧靜欲念無生則念愈生如之何而􅀎使此心前念易㓕後念不生良知獨顯而與造物者遊乎不思善不思惡時認本來靣目此佛氏爲未識本來靣目者設此方便本來靣目即吾聖門􅀁謂良知今旣認得良知明白即已不消如此說矣隨物而格是致知之功即佛氏之常惺惺亦是常存他本來面目耳體段工夫大畧相似但佛氏有箇自􅀻自利之心􅀁以便有不同耳今欲善惡不思而心之良知清靜自在此便有自􅀻自利將迎意必之心􅀁以有不思善不思惡時用致知之功則已渉於思善之患孟子說夜氣亦只是爲失其良心之人指出箇良心萌動處使他從此培養將去今已知得良知明白常用致知之功即已不消說夜氣􅁍是得兎後不知守兎而仍去守株兎將復失之矣欲求寧靜欲念無生此正是自􅀻自利將迎意必之病是以念愈生而愈不寧靜良知只是一箇良知而善惡自辨更有何善何惡可思良知之體本自寧靜今􅁍又添一箇求寧靜本自生生今􅁍又添一箇欲無生非獨聖門致知之功不如此雖佛氏之學亦未如此將迎意必也只是一念良知徹頭徹尾無始無終即是前念不㓕後念不生今􅁍欲前念易㓕而後念不生是佛氏􅀁謂斷㓕種性入於槁木死􅁅之謂矣來書云佛氏又有常提念頭之說其猶孟子􅀁謂必有事夫子􅀁謂致良知之說乎其即常惺惺常記得常知得常存得者乎於此念頭提在之時而事至物來應之必有其道但恐此念頭提起時少放下時多則工夫間斷耳且念頭放失多因􅀻欲客氣之動而始忽然驚醒而後提其放而未提之間心之昏雜多不自覺今欲日精日明常提不放以何道乎只此常提不放即全功乎抑於常提不放之中更宜加省克之功乎雖曰常提不放而不加戒懼克治之功恐􅀻欲不去若加戒懼克治之功焉又爲思善之事而於本來面目又未逹一間也如之何則可戒懼克治即是常提不放之功即是必有事焉豈有兩事邪此節􅀁問前一叚已自說得分曉末後􅁍是自生迷惑說得支離及有本來面目未逹一間之疑都是自􅀻自利將迎意必之爲病去此病自無此疑矣來書云質美者明得盡查滓便渾化如何謂明得盡如何而能更渾化良知本來自明氣質不美者查滓多障蔽厚不易開明質美者查滓原少無多障蔽略加致知之功此良知便自瑩徹些少查滓如湯中浮雪如何􅀎作障蔽此本不甚難曉原靜􅀁以致疑於此想是因一明字不明白亦是稍有欲速之心向曽面論明善之義明則誠矣非若後儒􅀁謂明善之淺也來書云聰明睿知果質乎仁義禮智果性乎喜怒哀樂果情乎􅀻欲客氣果一物乎二物乎古之英才若子房仲舒叔度孔明文仲韓范諸公德業表著皆良知中􅀁發也而不得謂之聞道者果何在乎苟曰此特生質之美耳則生知安行者不愈於學知困勉者乎愚意竊云謂諸公見道偏則可謂全無聞則恐後儒崇尚記誦訓詁之過也然乎否乎性一而已仁義禮知性之性也聰明睿知性之質也喜怒哀樂性之情也􅀻欲客氣性之蔽也質有淸濁故情有過不及而蔽有淺深也􅀻欲客氣一病兩痛非二物也張黄諸􅁑及韓范諸公皆天質之美自多暗合道妙雖未可盡謂之知學盡謂之聞道然亦自其有學違道不逺者也使其聞學知道即伊傅周召矣若文中子則又不可謂之不知學者其書雖多出於其徒亦多有未是處然其大畧則亦居然可見但今相去遼遠無有的然慿證不可懸斷其􅀁至矣夫良知即是道良知之在人心不但聖賢雖常人亦無不如此若無有物欲牽蔽但循着良知發用流行將去即無不是道但在常人多爲物欲牽蔽不能循得良知如數公者天質旣自淸明自少物欲爲之牽蔽則其良知之發用流行處自然是多自然違道不遠學者學循此良知而已謂之知學只是知得專在學循良知數公雖未知專在良知上用功而或泛濫於多岐疑迷於影響是以或離或合而未純若知得時便是聖人矣後儒嘗以數子者尚皆是氣質用事未免於行不著習不察此亦未爲過論但後儒之􅀁謂著察者亦是狃於聞見之狹蔽於沿習之非而依擬倣象於影響形迹之間尚非聖門之􅀁謂著察者也則亦安得以已之昏昏而求人之昭昭也乎􅀁謂生知安行知行二字亦是就用功上說若是知行本體即是良知良􅀎雖在困勉之人亦皆可謂之生知安行矣知行二字更宜精察來書云昔周茂叔毎令伯淳㝷仲尼顔子樂處敢問是樂也與七情之樂同乎否乎若同則常人之一遂􅀁欲皆能樂矣何必聖賢若别有真樂則聖賢之遇大憂大怒大驚大懼之事此樂亦在否乎且君子之心常存戒懼是蓋終身之憂也惡得樂澄平生多悶未嘗見真樂之趣今切願㝷之樂是心之本體雖不同於七情之樂而亦不外於七情之樂雖則聖賢别有真樂而亦常人之􅀁同有但常人有之而不自知反自求許多憂苦自加迷棄雖在憂苦迷棄之中而此樂又未嘗不存但一念開明反身而誠則即此而在矣毎與原靜論無非此意而原靜尚有何道可得之問是猶未免於􅀐驢覔驢之蔽也來書云大學以心有好樂忿􅓰憂患恐懼爲不得其正而程子亦謂聖人情順萬事而無情􅀁謂有者傳習錄中以病瘧譬之極精切矣若程子之言則是聖人之情不生於心而生於物也何謂􅁘且事感而情應則是是非非可以就格事或未感時謂之有則未形也謂之無則病根在有無之間何以致吾知乎學務無情累雖輕而出儒入佛矣可乎聖人致知之功至誠無息其良知之體皦如明鏡略無纎翳妍媸之來隨物見形而明鏡曾無􅇔染􅀁謂情順萬事而無情也無􅀁住而生其心佛氏曽有是言未爲非也明鏡之應物妍者妍媸者媸一照而皆眞即是生其心處妍者妍􅎀者媸一過而不㽞即是無所住處病瘧之喻旣巳見其精切則此節所問可以釋然病瘧之人瘧雖未發而病根自在則亦安可以其瘧之未發而遂忘其服藥調理之功乎􅀂必待瘧發而後服藥調理則旣晚矣致知之功無間於有事無事而豈論於病之巳發未發邪大抵原静所疑前後雖􅀂不一然皆起於自私自利將迎意必之爲崇此根一去則前後所疑自將氷消霧釋有不待於問辨者矣答原静書出讀者皆喜澄善問師善答皆得聞所未聞師日原静所問只是知觧上轉不得巳與之逐節分疏􅀂信則良知只在良知上用功雖千經萬興無不昭合異端曲學一勘盡破矣何必如此節節分觧佛家有僕人逐塊之喻見塊僕人則得人矣見塊逐塊於塊奚得哉在坐諸友聞知暢然笥有惺惺悟此學貴反求非知觧可入也答歐陽崇一崇一來書云師云德性之良知非由於聞見􅀂由多聞擇其善者而從知多見而識之則是專求之見聞之末而巳落在第二義􅀼意良知雖不由見聞而有然學者之知未嘗不由見聞而發滯於見聞固非而見聞亦良知之用也令曰落在第二義恐爲專以見聞爲學者而言􅀂致其良知而求知見聞亦知行合一之功似矣如何良知不由見聞而有而見聞莫非良知之用故良知不滯於見聞而亦不雜於見聞孔子云吾有知乎哉無知也良知之外别無知矣故致良知是學問大頭腦是聖人教人第一義今云專求之見聞之未則是失􅁍頭腦而巳落在第二義矣近時同志中盖巳莫不知有志良知之􅀃言其工夫尚多鶻突者正是欠此一問大扺學問工夫只要主意頭腦是當􅀂主意頭腦專以致良知爲事則凡多聞多見莫非致良知之功盖日月之間見聞酧酢雖千頭萬緒莫非良知之發用流行除􅁍見聞酬酢亦無良知可致矣故只是一事􅀂曰致其良知而求之見聞則語意之間未免爲二此與專求之見聞之末者雖稍不同其爲未得精一之㫖則一而巳多聞擇其善者而從之多見而識之旣云擇又云識其良知亦未嘗不行於其間但其用意乃專在多聞多見上去擇識則巳失􅁍頭腦矣崇一於此等處見得當巳分曉今日之問正爲發明此學於同志中極有益但語意未瑩則毫􅁵千里亦不容不精察之也來書云師云繫言何思何慮是言􅀁思􅀁慮只是天理更無别思别慮耳非謂無思無慮也心之本體即是天理有何可思慮得學者用功雖千思萬慮只是要復他本體不是以􅀻意去安排思索出來若安排思索便是自􅀻用智矣學者之敝大率非沉空守寂則安排思索德辛壬之歲着前一病近又着後一病但思索亦是良知發用其與􅀻意安排者何􅀁取别恐認賊作子惑而不知也思曰睿睿作聖心之官則思思則得之思其可少乎沉空守寂與安排思索正是自􅀻用智其爲喪失良知一也良知是天理之昭明靈覺處故良知即是天理思是良知之發用若是良知發用之思則􅀁思莫非天理矣良知發用之思自然明白簡易良知亦自􅀎知得若是􅀻意安排之思自是紛紜勞擾良知亦自㑹分别得蓋思之是非邪正良知無有不自知者􅀁以認賊作子正爲致知之學不明不知在良知上體認之耳來書又云師云爲學終身只是一事不論有事無事只是這一件􅀂說寧不了事不可不加培養􅁍是分爲兩事也竊意覺精力衰弱不足以終事者良知也寧不了事且加休養致知也如何􅁍爲兩事􅀂事變之來有事􅀔不容不了而精力雖衰稍鼓舞亦􅀎支持則持志以帥氣可矣然言動終無氣力畢事則困憊巳甚不㡬於􅁀其氣已乎此其輕重緩急良知固未嘗不知然或迫於事􅀔安􅀎顧精力或困於精力安􅀎顧事􅀔如之何則可寧不了事不可不加培養之意且與􅀄學如此說亦不爲無益但作兩事㸔了便有病痛在孟子言必有事焉則君子之學終身只是集義一事義者宜也心得其宜之謂義􅀎致良知則心得其宜矣故集義亦只是致良知君子之酬酢萬變當行則行當止則止當生則生當死則死斟酌調停無非是致其良知以求自慊而已故君子素其位而行思不出其位凡謀其力之􅀁不及而强其知之􅀁不􅀎者皆不得爲致良知而凡勞其筋骨餓其體膚空乏其身行拂亂其􅀁爲動心􅃘性以增益其􅀁不􅀎者皆􅀁以致其良知也若云寧不了事不可不加培養者亦是先有功利之心較計成敗利鈍而愛憎取舎於其間是以將了事自作一事而培養又别作一事此便有是内非外之意便是自􅀻用智便是義外便有不得於心勿求於氣之病便不是致良知以求自謙之功矣􅀁云鼓舞支持畢事則困憊已甚又云迫於事􅀔困於精力皆是把作兩事做了􅀁以有此凡學問之功一則誠二則僞凡此皆是致良知之意欠誠一眞切之故大學言誠其意者如惡惡臭如好好色此之謂自慊曾見有惡惡臭好好色而須鼓舞支持者乎曾見畢事則困憊已甚者乎曾有迫於事􅀔困於精力者乎此可以知其受病之􅀁從來矣來書又有云人情機詐百出御之以不疑徃徃爲􅀁欺覺則自入於逆億夫逆詐即詐也億不信即非信也爲人欺又非覺也不逆不億而常先覺其惟良知瑩徹乎然而出入毫忽之間背覺合詐者多矣不逆不億而先覺此孔子因當時人專以逆詐億不信爲心而自䧟於詐與不信又有不逆不億者然不知致良知之功而徃徃又爲人􅀁欺詐故有是言非教人以是存心而專欲先覺人之詐與不信也以是存心即是後世猜忌險薄者之事而只此一念已不可與入堯舜之道矣不逆不億而爲人􅀁欺者尚亦不失爲善但不如能致其良知而自然先覺者之尤爲賢耳崇一謂其惟良知瑩徹者蓋已得其㫖矣然亦頴悟􅀁及恐未實際也蓋良知之在人心亘萬古塞宇宙而無不同不慮而知恒易以知險不學而能恒簡以知阻先天而天不違天且不違而况於人乎况於􅀑神乎夫謂背覺合詐者是雖不逆人而或未能無自欺也雖不億人而或未能果自信也是或常有求先覺之心而未能常自覺也常有求先覺之心即已流於逆億而足以自蔽其良知矣此背覺合詐之􅀁以未免也君子學以爲已未嘗虞人之欺已也恒不自欺其良知而已未嘗虞人之不信已也恒自信其良知而已未嘗求先覺人之詐與不信也恒務自覺其良知而已是故不欺則良知無􅀁僞而誠誠則明矣自信則良知無􅀁惑而明明則誠矣明誠相生是故良知常覺常照常覺常照則如明鏡之懸而物之來者自不能遁其妍媸矣何者不欺而誠則無􅀁容其欺苟有欺焉而覺矣自信而明則無􅀁容其不信茍不信焉而覺矣是謂易以知險簡以知阻子思􅀁謂至誠如神可以前知者也然子思謂如神謂可以前知猶二而言之是蓋推言思誠者之功效是猶爲不能先覺者說也若就至誠而言則至誠之妙用即謂之神不必言如神至誠則無知而無不知不必言可以前知矣答羅整菴少宰書某頓首啓昨承教及大學發舟匆匆未能奉答曉來江行稍暇復取手教而讀之恐至贛後人事復紛沓先具其畧以請來教云見道固難而體道尤難道誠未易明而學誠不可不講恐未可安於􅀁見而遂以爲極則也幸甚幸甚何以得聞斯言乎其敢自以爲極則而安之乎正思就天下之有道以講明之耳而數年以來聞其說而非􅀏之者有矣詬訾之者有矣置之不足較量辨議之者有矣其肯遂以教我乎其肯遂以教我而反覆曉諭惻然惟恐不及救正之乎然則天下之愛我者固莫有如執事之心深且至矣感激當何如哉夫徳之不修學之不講孔子以爲憂而世之學者稍能傳習訓詁即皆自以爲知學不復有􅀁謂講學之求可悲矣夫道必體而後見非已見道而後加體道之功也道必學而後明非外講學而復有􅀁謂明道之事也然世之講學者有二有講之以身心者有講之以口耳者講之以口耳揣摸測度求之影響者也講之以身心行著習察實有諸已者也知此則知孔門之學矣來教謂某大學古本之復以人之爲學但當求之於内而程朱格物之說不免求之於外遂去朱子之分章而削其􅀁􅀘之傳非敢然也學豈有内外乎大學古本乃孔門相傳舊本耳朱子疑其有􅀁脫誤而改正􅀘緝之在某則謂其本無脫誤悉從其舊而已矣失在於過信孔子則有之非故去朱子之分章而削其傳也夫學貴得之心求之於心而非也雖其言之出於孔子不敢以爲是也而况其未及孔子者乎求之於心而是也雖其言之出於庸常不敢以爲非也而况其出於孔子者乎且舊本之傳數千載矣今讀其文詞旣明白而可通論其工夫又易簡而可入亦何􅀁按㨿而㫁其此段之必在於彼彼叚之必在於此與此之如何而缺彼之如何而􅀘而遂改正􅀘緝之無乃重於背朱而輕於叛孔已乎來教謂如必以學不資於外求但當反觀内省以爲務則正心誠意四字亦何不盡之有何必於入門之際便困以格物一叚工夫也誠然誠然若語其要則脩身二字亦足矣何必又言正心正心二字亦足矣何必又言誠意誠意二字亦足矣何必又言致知又言格物惟其工夫之詳宻而要之只是一事此􅀁以爲精一之學此正不可不思者也夫理無内外性無内外故學無内外講習討論未嘗非内也反觀内省未嘗遺外也夫謂學必資於外求是以已性爲有外也是義外也用智者也謂反觀内省爲求之於内是以已性爲有内也是有我也自􅀻者也是皆不知性之無内外也故曰精義入神以致用也利用安身以崇徳也性之徳也合内外之道也此可以知格物之學矣格物者大學之實下手處徹首徹尾自始學至聖人只此工夫而已非但入門之際有此一叚也夫正心誠意致知格物皆􅀁以脩身而格物者其􅀁用力日可見之地故格物者格其心之物也格其意之物也格其知之物也正心者正其物之心也誠意者誠其物之意也致知者致其物之知也此豈有内外彼此之分哉理一而已以其理之凝聚而言則謂之性以其凝聚之主宰而言則謂之心以其主宰之發動而言則謂之意以其發動之明覺而言則謂之知以其明覺之感應而言則謂之物故就物而言謂之格就知而言謂之致就意而言謂之誠就心而言謂之正正者正此也誠者誠此也致者致此也格者格此也皆􅀁謂窮理以盡性也天下無性外之理無性外之物學之不明皆由世之儒者認理爲外認物爲外而不知義外之說孟子蓋嘗闢之乃至襲䧟其内而不覺豈非亦有似是而難明者歟不可以不察也凡執事􅀁以致疑於格物之說者必謂其是内而非外也必謂其專事於反觀内省之爲而遺棄其講習討論之功也必謂其一意於綱領本原之約而脫略於支條節目之詳也必謂其沉溺於枯槁虚寂之偏而不盡於物理人事之變也審如是豈但􅀗罪於聖門􅀗罪於朱子是邪說誣民叛道亂正人得而誅之也而况於執事之正直哉審如是世之稍明訓詁聞先哲之緒論者皆知其非也而况執事之高明哉凡某之􅀁謂格物其於朱子九條之說皆包羅綂括於其中但爲之有要作用不同正􅀁謂毫􅁵之差耳然毫􅁵之差而千里之繆實起於此不可不辨孟子闢楊墨至於無父無君二子亦當時之賢者使與孟子並世而生未必不以之爲賢墨子兼愛行仁而過耳楊子爲我行義而過耳此其爲說亦豈㓕理亂常之甚而足以眩天下哉而其流之弊孟子至比於禽獸夷狄􅀁謂以學術殺天下後世也今世學術之弊其謂之學仁而過者乎謂之學義而過者乎抑謂之學不仁不義而過者乎吾不知其於洪水猛獸何如也孟子云予豈好辨哉予不得已也楊墨之道塞天下孟子之時天下之尊信楊墨當不下於今日之崇尚朱說而孟子獨以一人呶呶於其間噫可哀矣韓氏云佛老之害甚於楊墨韓愈之賢不及孟子孟子不能救之於未壊之先而韓愈乃欲全之於已壊之後其亦不量其力且見其身之危莫之救以死也嗚呼若某者其尤不量其力果見其身之危莫之救以死也矣夫衆方嘻嘻之中而獨出涕嗟若舉世恬然以趨而獨疾首蹙額以爲憂此其非病狂喪心殆必誠有大苦者隱於其中而非天下之至仁其孰能察之其爲朱子晚年定論蓋亦不得已而然中間年􅀊早晚誠有􅀁未考雖不必盡出於晚年固多出於晚年者矣然大意在委曲調停以明此學爲重平生於朱子之說如神明􅆱􅀛一旦與之背馳心誠有􅀁未􅃘故不得已而爲此知我者謂我心憂不知我者謂我何求蓋不􅃘牴牾朱子者其本心也不得已而與之牴牾者道固如是不直則道不見也執事􅀁謂决與朱子異者僕敢自欺其心哉夫道天下之公道也學天下之公學也非朱子可得而􅀻也非孔子可得而􅀻也天下之公也公言之而已矣故言之而是雖異於已乃益於已也言之而非雖同於已適損於已也益於已者已必喜之損於已者已必惡之然則某今日之論雖或於朱子異未必非其􅀁喜也君子之過如日月之食其更也人皆仰之而小人之過也必文某雖不肖固不敢以小人之心事朱子也執事􅀁以敎反覆數百言皆以未悉鄙人格物之說若鄙說一明則此數百言皆可以不待辨說而釋然無滯故今不敢縷縷以滋􅃈屑之瀆然鄙說非靣陳口析斷亦未能了了於􅁓筆間也嗟乎執事􅀁以開導啓迪於我者可謂懇到詳切矣人之愛我寧有如執事者乎僕雖甚愚下寧不知􅀁感刻佩服然而不敢􅃍舎其中心之誠然而姑以聽受云者正不敢有􅀒於深愛亦思有以報之耳秋盡東還必求一靣以卒􅀁請千萬終教答聶文蔚春間逺勞迂途枉顧問證惓惓此情何可當也已期二三同志更處靜地扳留旬日少效其鄙見以求切劘之益而公期俗絆􅀔有不能别去極怏怏如有􅀁失忽承箋惠反覆千餘言讀之無甚浣慰中間推許太過蓋亦􅅄掖之盛心而䂓礪真切思欲納之於賢聖之域又托諸崇一以致其勤勤懇懇之懐此非深交篤愛何以及是知感知媿且懼其無以堪之也雖然僕亦何敢不自鞭勉而徒以感媿辭譲爲乎哉其謂思孟周程無意相遭於千載之下與其盡信於天下不若真信於一人道固自在學亦自在天下信之不爲多一人信之不爲少者斯固君子不見是而無悶之心豈世之謭謭屑屑者知足以及之乎乃僕之情則有大不得已者存乎其間而非以計人之信與不信也夫人者天地之心天地萬物本吾一體者也生民之困苦荼毒孰非疾痛之切於吾身者乎不知吾身之疾痛無是非之心者也是非之心不慮而知不學而能􅀁謂良知也良知之在人心無間於聖愚天下古今之􅀁同也世之君子惟務致其良知則自能公是非同好惡視人猶已視國猶家而以天地萬物爲一體求天下無治不可得矣古之人􅀁以能見善不啻若已出見惡不啻若已入視民之飢溺猶已之飢溺而一夫不􅀗若已推而納諸溝中者非故爲是而以蘄天下之信已也務致其良知求自慊而已矣堯舜三王之聖言而民莫不信者致其良知而言之也行而民莫不說者致其良知而行之也是以其民熈熈皥皥殺之不怨利之不庸施及蠻貊而凡有血氣者莫不尊親爲其良知之同也嗚呼聖人之治天下何其簡且易哉後世良知之學不明天下之人用其􅀻智以相比軋是以人各有心而偏􅃈僻陋之見狡僞隂邪之術至於不可勝說外假仁義之名而内以行其自􅀻自利之實詭辭以阿俗矯行以干譽揜人之善而襲以爲已長訐人之􅀻而竊以爲已直忿以相勝而猶謂之狥義險以相傾而猶謂之疾惡妬賢忌能而猶自以爲公是非恣情縱欲而猶自以爲同好惡相陵相賊自其一家骨肉之親已不能無爾我勝􅀒之意彼此藩籬之形而况於天下之大民物之衆又何􅀎一體而視之則無恠於紛紛籍籍而禍亂相㝷於無窮矣僕誠頼天之靈偶有見於良知之學以爲必由此而後天下可得而治是以毎念斯民之䧟溺則爲之戚然痛心忘其身之不肖而思以此救之亦不自知其量者天下之人見其若是遂相與非笑而詆斥之以爲是病狂喪心之人耳嗚呼是奚足恤哉吾方疾痛之切體而暇計人之非笑乎人固有見其父子兄弟之墜溺於深淵者呼號匍匐祼跣顚頓扳懸崖壁而下拯之士之見者方相與揖譲談笑於其傍以爲是棄其禮貌衣冠而呼號顛頓若此是病狂喪心者也故夫揖讓談笑於溺人之傍而不知救此惟行路之人無親戚骨肉之情者􅀎之然巳謂之無惻隱之心非人矣若夫在父子兄弟之愛者則固未有不痛心疾首狂奔盡氣匍匐而拯之彼將䧟溺之禍有不顧而况於病狂喪心之譏乎而又况於蘄人之信與不信乎嗚呼今之人雖謂僕爲病狂喪心之人亦無不可矣天下之人心皆吾之心也天下之人猶有病狂者矣吾安得而非病狂乎猶有喪心者矣吾安得而非喪心乎昔者孔子之在當時有議其爲謟者有譏其爲佞者有毁其未賢詆其爲不知禮而侮之以爲東家丘者有嫉而沮之者有惡而欲殺之者晨門荷蕢之徒皆當時之賢士且曰是知其不可而爲之者歟鄙哉硜硜乎莫已知也斯巳而已矣雖子路在升堂之列尚不􅀎無疑於其􅀁見不悅於其􅀁欲徃而且以之爲迂則當時之不信夫子者豈特十之二三而已乎然而夫子汲汲遑遑若求亡子於道路而不暇於煖席者寧以蘄人之知我信我而巳哉蓋其天地萬物一體之仁疾痛迫切雖欲巳之而自有􅀁不容巳故其言曰吾非斯人之徒與而誰與欲潔其身而亂大倫果哉末之難矣嗚呼此非誠以天地萬物爲一體者孰能以知夫子之心乎若其遯世無悶樂天知命者則固無入而不自得道並行而不相悖也僕之不肖何敢以夫子之道爲己任顧其心亦已稍知疾痛之在身是以徬徨四顧將求其有助於我者相與講去其病耳今誠得豪傑同志之士扶持匡翼共明良知之學於天下使天下之人皆知自致其良知以相安相養去其自􅀻自利之蔽一洗䜛妬勝忿之習以濟於大同則僕之狂病固將脫然以愈而終免於喪心之患矣豈不快哉嗟乎今誠欲求豪傑同志之士於天下非如吾文蔚者而誰望之乎如吾文蔚之才與志誠足以援天下之溺者今又旣知其具之在我而無假於外求矣循是而充􅀂决河注海孰得而禦哉文蔚􅀁謂一人信之不爲少其又能遜以委之何人乎㑹稽素號山水之區深林長谷信歩皆是寒暑晦明無時不宜安居飽食塵􅅝無擾良朋四集道義日新優哉㳺哉天地之間寧復有樂於是者孔子云不怨天不尤人下學而上逹僕與二三同志方將請事斯語奚暇外慕獨其切膚之痛乃有未能恝然者輒復云云爾咳疾暑毒書扎絶􅂴盛使逺來遲留經月臨岐執筆又不覺累􅁓蓋於相知之深雖已縷縷至此殊覺有􅀁未能盡也二得書見近來􅀁學之驟進喜慰不可言諦視數過其間雖亦有一二未瑩徹處􅁍是致良知之功尚未純熟到純熟時自無此矣譬之驅車旣已由於康莊大道之中或時橫斜迂曲者乃馬性未調衘勒不齊之故然已只在康莊大道中决不賺入傍蹊曲徑矣近時海内同志到此地位者曾未多見喜慰不可言斯道之幸也賤軀舊有咳􅎳畏􅀬之病近入炎方轍復大作主上聖明洞察責付甚重不敢􅃍辭地方軍務冗㳫皆輿疾從事今却幸已平定已具本乞囬養病得在林下稍就清凉或可瘳耳人還伏枕草草不盡傾企外惟濬一簡幸逹致之來書􅀁詢草草奉復一二近􅀊來山中講學者徃徃多說勿忘勿􅂇工夫甚難問之則云才著意便是􅂇才不著意便是忘􅀁以甚難區區因問之云忘是忘箇甚麽􅂇是􅂇箇甚麽其人黙然無對始請問區區因與說我此間講學􅁍只說箇必有事焉不說勿忘勿􅂇必有事焉者只是時時去集義􅀂時時去用必有事的工夫而或有時間斷此便是忘了即須勿忘時時去用必有事的工夫而或有時欲速求效此便是􅂇了即須勿􅂇其工夫全在必有事焉上用勿忘勿􅂇只就其間提撕警覺而已若是工夫原不間斷即不須更說勿忘原不欲速求效即不須更說勿􅂇此其工夫何等明白簡易何等灑脫自在今􅁍不去必有事上用工而乃懸空守著一箇勿忘勿􅂇此正如燒鍋煑飯鍋内不曾漬水下米而乃專去添柴放火不知畢竟煑出箇甚麽物來吾恐火候未及調停而鍋已先破裂矣近日一種專在勿忘勿􅂇上用工者其病正是如此終日懸空去做箇勿忘又懸空去做箇勿􅂇渀渀蕩蕩全無實落下手處究竟工夫只做得箇沉空守寂學成一箇痴騃漢才遇些子事來即便牽滯紛擾不復􅀎經綸宰制此皆有志之士而乃使之勞苦纒􅅞擔閣一生皆由學術誤人之故甚可憫矣夫必有事焉只是集義集義只是致良知說集義則一時未見頭腦說致良知即當下便有實地歩可用工故區區專說致良知隨時就事上致其良知便是格物著實去致良知便是誠意著實致其良知而無一毫意必固我便是正心著實致良知則自無忘之病無一毫意必固我則自無􅂇之病故說格致誠正則不必更說箇忘􅂇孟子說忘􅂇亦就告子得病處立方告子強制其心是􅂇的病痛故孟子專說􅂇長之害告子􅂇長亦是他以義爲外不知就自心上集義在必有事焉上用功是以如此若時時刻刻就自心上集義則良知之體洞然明白自然是是非非纎毫莫遁又焉有不得於言勿求於心不得於心勿求於氣之弊乎孟子集義養氣之說固大有功於後學然亦是因病立方說得大段不若大學格致誠正之功尤極精一簡易爲徹上徹下萬世無弊者也聖賢論學多是隨時就事雖言􅀂人殊而要其工夫頭腦􅀂合符節縁天地之間原只有此性只有此理只有此良知只有此一件事耳故凡就古人論學處說工夫更不必攙和兼搭而說自然無不脗合貫通者才須攙和兼搭而說即是自己工夫未明徹也近時有謂集義之功必須兼搭箇致良知而後備者則是集義之功尚未了徹也集義之功尚未了徹適足以爲致良知之累而已矣謂致良知之功必須兼搭一箇勿忘勿􅂇而後明者則是致良知之功尚未了徹也致良知之功尚未了徹適足以爲勿忘勿􅂇之累而已矣􅀂此者皆是就文義上觧釋牽附以求混融湊泊而不曾就自已實工夫上體驗是以論之愈精而去之愈逺文蔚之論其於大本逹道旣已沛然無疑至於致知窮理及忘􅂇等說時亦有􅍴和兼搭處􅁍是區區􅀁謂康莊大道之中或時橫斜迂曲者到得工夫熟後自􅀅釋然矣文蔚謂致知之說求之事親從兄之間便覺有􅀁持循者此段最見近來真切篤實之功但以此自爲不妨自有得力處以此遂爲定􅀃教人􅁍未免又有因藥發病之患亦不可不一講也蓋良知只是一箇天理自然明覺發見處只是一箇眞誠惻怛便是他本體故致此良知之眞誠惻怛以事親便是孝致此良知之眞誠惻怛以從兄便是弟致此良知之眞誠惻怛以事君便是忠只是一箇良知一箇眞誠惻怛􅀂是從兄的良知不能致其眞誠惻怛即是事親的良知不能致其眞誠惻怛矣事君的良知不能致其眞誠惻怛即是從兄的良知不能致其眞誠惻怛矣故致得事君的良知便是致􅁍從兄的良知致得從兄的良知便是致􅁍事親的良知不是事君的良知不能致􅁍須又從事親的良知上去擴充將來如此又是脫􅁍本原着在支節上求了良知只是一箇隨他發見流行處當下具足更無去來不須假借然其發見流行處􅁍自有輕重厚薄毫髮不容增减者􅀁謂天然自有之中也雖則輕重厚薄毫髮不容増减而原又只是一箇雖則只是一箇而其間輕重厚薄又毫髮不容増减􅀂可得增减􅀂湏假借即已非其眞誠惻怛之本體矣此良知之妙用􅀁以無方體無窮盡語大天下莫能載語小天下莫能破者也孟氏堯舜之道孝弟而已者是就人之良知發見得最眞切篤厚不容蔽昧處提省人使人於事君處友仁民愛物與凡動靜語黙間皆只是致他那一念事親從兄眞誠惻怛的良知即自然無不是道蓋天下之事雖于變萬化至於不可窮詰而但惟致此事親從兄一念眞誠惻怛之良知以應之則更無有遺缺滲漏者正謂其只有此一箇良知故也事親從兄一念良知之外更無有良知可致得者故曰堯舜之道孝弟而已矣此􅀁以爲惟精惟一之學放之四海而皆凖施諸後世而無朝夕者也文蔚云欲於事親從兄之間而求􅀁謂良知之學就自已用工得力處如此說亦無不可􅀂曰致其良知之眞誠惻怛以求盡夫事親從兄之道焉亦無不可也明道云行仁自孝弟始孝弟是仁之一事謂之行仁之本則可謂是仁之本則不可其說是矣億逆先覺之說文蔚謂誠則旁行曲防皆良知之用甚善甚善間有􅍴搭處則前已言之矣惟濬之言亦未爲不是在文蔚湏有取於惟濬之言而後盡在惟濬又湏有取於文蔚之言而後明不然則亦未免各有􅀝着之病也舜察邇言而詢蒭蕘非是以邇言當察蒭蕘當詢而後如此乃良知之發見流行光明圓瑩更無罣碍遮隔處此􅀁以謂之大知才有執着意必其知便小矣講學中自有去取分辨然就心地上着實用工夫􅁍湏如此方是盡心三節區區曽有生知學知困知之說頗已明白無可疑者蓋盡心知性知天者不必說存心養性事天不必說殀壽不貳修身以俟而存心養性與修身以俟之功已在其中矣存心養性事天者雖未到得盡心知天的地位然已是在那裏做箇求到盡心知天的工夫更不必說殀壽不貳修身以俟而殀壽不貳修身以俟之功已在其中矣譬之行路盡心知天者如年力壯徤之人旣能奔走徃來於數千百里之間者也存心事天者如童穉之年使之學習歩趨於庭除之間者也殀壽不貳脩身以俟者如襁抱之孩方使之扶墻傍壁而漸學起立移歩者也旣已能奔走徃來於數千里之間者則不必更使之於庭除之間而學歩趨而歩趨於庭除之間自無弗能矣旣已能歩趨於庭除之間則不必更使之扶墻傍壁而學起立移歩而起立移歩自無弗能矣然學起立移歩便是學歩趨庭除之始學歩趨庭除便是學奔走徃來於數千里之基固非有二事但其工夫之難易則相去懸絶矣心也性也天也一也故及其知之成功則一然而三者人品力量自有階級不可躐等而能也細觀文蔚之論其意似恐盡心知天者廢􅁍存心修身之功而反爲盡心知天之病是蓋爲聖人憂工夫之或間斷而不知爲自己憂工夫之未眞切也吾儕用工􅁍湏專心致志在殀壽不貳修身以俟上做只此便是做盡心知天功夫之始正如學起立移歩便是學奔走千里之始吾方自慮其不能起立移歩而豈􅃍慮其不能奔走千里又况爲奔走千里者而慮其或遺忘於起立移歩之習哉文蔚識見本自超絶邁徃而􅀁論云然者亦是未能脫去舊時觧說文義之習是爲此三段書分䟽比合以求融㑹貫通而自添許多意見纒繞反使用工不專一也近時懸空去做勿忘勿助者其意見正有此病最能擔誤人不可不滌除耳􅀁謂尊德性而道問學一節至當歸一更無可疑此便是文蔚曽著實用工然後能爲此言此本不是險僻難見的道理人或意見不同者還是良知尚有纎翳潜伏若除去此纎翳即自無不洞然矣已作書後移卧簷間偶遇無事遂復答此文蔚之學既已得其大者此等處乆當釋然自觧本不必屑屑如此分䟽但承相愛之厚千里差人逺及諄諄下問而竟虛來意又自不能已於言也然􅀡戅煩縷巳甚恃在信愛當不爲罪惟濬處及謙之崇一處各得轉錄一通􅀉視之尤承一體之好也右􅀯大吉錄訓􅂪大意示教讀劉伯頌等古之教者教以人倫後世記誦詞章之習起而先王之教亡今教童子惟當以孝弟忠信禮義㢘耻爲專務其栽培􅆂養之方則宜誘之歌詩以發其志意導之習禮以肅其威儀諷之讀書以開其知覺今人徃徃以歌詩習禮爲不切時務此皆末俗庸鄙之見烏足以知古人立教之意哉大抵童子之情樂嬉遊而憚拘檢如草木之始萌芽舒暢之則條逹摧撓之則衰痿今教童子必使其趨向鼓舞中心喜恱則其進自不能巳譬之時雨春風霑􅀍卉木莫不萌動發越自然日長月化􅀂冰霜剥落則生意蕭索日就枯槁矣故凡誘之歌詩者非但發其志意而已亦􅀁以洩其跳號呼嘯於詠歌宣其幽抑結滯於音節也導之習禮者非但肅其威儀而已亦􅀁以周旋揖譲而動蕩其血脉拜起屈伸而固束其筋骸也諷之讀書者非但開其知覺而已亦􅀁以沈潜反復而存其心抑揚諷誦以宣其志也凡此皆􅀁以順導其志意調理其性情潜消其鄙吝黙化其麤頑日使之漸於禮義而不苦其難入於中和而不知其故是蓋先王立教之㣲意也􅀂近世之訓􅂪穉者日惟督以句讀課倣責其檢束而不知導之以禮求其聰明而不知養之以善鞭撻繩縛􅀂待拘囚彼視學舎如囹獄而不肯入視師長如冦􅄷而不欲見窺避掩覆以遂其嬉遊設詐餙詭以肆其頑鄙偷薄庸劣日趨下流是蓋驅之於惡而求其爲善也何可得乎凡吾􅀁以教其意實在於此恐時俗不察視以爲迂且吾亦將去故特叮嚀以告爾諸教讀其務體吾意永以爲訓母輙因時俗之言改廢其繩墨庶成􅂪以養正之功矣念之念之教約毎日清晨諸生叅揖畢教讀以次遍詢諸生在家􅀁以愛親敬長之心得無􅈈忽未能真切否温清定省之儀得無􅃜缺未􅀎實踐否徃來街衢歩趨禮節得無放蕩未能謹􅅚否一應言行心術得無欺妄非僻未能忠信篤敬否諸童子務要各以實對有則改之無則加勉教讀復隨時就事曲加誨諭開發然後各退就席肄業凡歌詩須要整容定氣清朗其聲音均審其節調毋躁而急毋蕩而􅅝毋餒而懾乆則精神宣暢心氣和平矣毎學量童生多寡分爲四班毎日輪一班歌詩其餘皆就席歛容肅聽毎五日則總四班逓歌於本學毎朔望集各學㑹歌於書院凡習禮須要澄心肅慮審其儀節度其容止毋忽而惰毋沮而怍毋徑而野從容而不失之迂緩脩謹而不失之拘局乆則體貌習熟德性堅定矣童生班次皆如歌詩毎間一日則輪一班習禮其餘皆就席歛容肅觀習禮之日免其課倣毎十日則總四班逓習於本學毎朔望則集各學㑹習於書院凡授書不在徒多但貴精熟量其資禀能二百字者止可授以一百字常使精神力量有餘則無厭苦之患而有自得之羙諷誦之際務令專心一志口誦心惟字字句句紬繹反覆抑􅀭其音節寛虛其心意乆則義禮浹洽聰明日開矣毎日工夫先考德次背書誦書次習禮或作課倣次復誦書講書次歌詩凡習禮歌詩之􅁼皆􅀁以常存童子之心使其樂習不倦而無暇及於邪僻教者知此則知􅀁施矣雖然此其大畧也神而明之則存乎其人王文成公全書卷之三十五附録四年譜四年譜附録二嘉靖九年庚寅五月門人薛侃建精舎於天真山祀先生天真距杭州城南十里山多竒巖古洞下瞰八卦田左抱西湖前臨胥海師昔在越講學時嘗欲擇地當湖海之交目前常見浩蕩圗卜築以居將終老焉起征思田洪畿隨師渡江偶登茲山若有會意者臨􅀤以告師喜曰吾二十年前遊此乆念不及悔未一登而去至西安遺以二詩有天真泉石秀新有鹿門期及文明原有象卜築豈無縁之句侃奔師喪既終􅁙患同門聚散無期憶師遺志遂築祠扵山麓同門董澐劉侯孫應奎程尚寧范引年柴鳯等董其事鄒守益方獻夫歐陽德等前後相役齋廡庖湢具備可居諸生百餘人每年祭期以春秋二仲月仲丁日四方同志如期陳禮儀懸鐘磬歌詩侑食祭畢講㑹終月十年辛卯五月同門黄弘綱㑹黃綰於金陵以先生胤子王正億請婚先是師殯在堂有忌者行譛於朝革錫典世爵有司黙承風㫖媒孽其家鄕之惡少遂相煽欲以魚肉其子弟胤子正億方四齡與繼子正憲離仳竄逐蕩析厥居明年夏門人大學士方獻夫署吏部擇刑部員外王臣陞浙江僉事分廵浙東經紀其家奸黨稍阻弘綱以洪畿擬是冬赴京殿試恐失所托適綰陞南京禮部侍郎弘綱問計綰曰吾室遠莫計有弱息願妻之情􅀜至戚庶得處耳是月洪畿趨金陵爲正億問名綰曰老母家居未得命不敢專洪畿復走台得太夫人命於是同門王艮遂行聘禮焉十一年壬辰正月門人方獻夫合同志㑹於京師自師沒桂蕚在朝學禁方嚴薛侃等既遭罪譴京師諱言學至是年編脩歐陽德程文德楊名在翰林侍郎黄宗明在兵部戚賢魏良弼沈謐等在科與大學士方獻夫俱主會於時黄綰以進表入洪畿以趨廷對入與林春林大欽徐樾朱衡王惟賢􅀓頥等四十餘人始定日㑹之期聚於慶壽山房九月正億趨金陵正億外侮稍息内釁漸萌􅀷居家扄同門居守者或經月不得見相懷憂逼於是同門僉事王臣推官李逄與歐陽徳王艮薛僑李珙管州議以正億趨金陵將依舅氏居焉至錢塘惡少有躡其後載者迹既露諸子疑其行請卜得􅂦二之上吉乃徉言共分胤子金以歸惡黨信爲實弛謀有不便者遂以分金騰謗流入京師臣以是􅀍中黜職十二年癸巳門人歐陽徳合同志會於南畿自師沒同門既襄事於越三年之後歸散四方各以􅀁入立教合併無時是年歐陽徳季本許相卿何廷仁劉暘黄弘綱嗣講東南洪亦假事入金陵遠方志士四集類萃群趨或講於城南諸刹或講於國子鷄鳴倡和相稽疑辯相繹師學復有繼興之機矣十三年甲午正月門人鄒守益建復古書院於安福祀先生師在越時劉􅀖采首創惜隂會於安福間月爲會五日先生爲作惜隂說既後守益以祭酒致政歸與􅀖采劉文敏劉子和劉陽歐陽瑜劉肇衮尹一仁等建復古連山復真諸書院爲四鄕會春秋二季合五郡出青原山爲大會凡鄕大夫在郡邑者皆與會焉於是四方同志之會相繼而起惜隂爲之倡也三月門人李遂建講舍於衢麓祀先生先自師起征思田舟次西安門人欒惠王璣等數十人雨中出􅀱師岀天真二詩慰之明年師䘮還玉山惠偕同門王修徐霈林文等迎襯於草萍驛慿棺而哭者數百人至西安諸生追師遺教莫知􅀁􅀉洪畿乃與璣應典等定毎􅀊㑹期是年遂爲知府從諸生請築室于衢之麓設師位歳修祀事諸生柴惟道徐天民王之弼徐惟緝王之京王念偉等又分爲龍游水南會徐用檢唐汝禮趙時崇趙志臯等爲蘭西會與天真遠近相應徃來講㑹不輟衢麓爲之先也五月廵按貴州監察御史王杏建王公祠於貴陽師昔居龍塲誨擾諸夷乆之夷人皆式崇尊信提學副使席書延至貴陽主教書院士􅀋感徳翕然向風是年杏按貴陽聞里巷歌聲藹藹如越音又見士民􅀊時走龍塲致奠亦有遥拜而祀於家者始知師教入人之􅀷若此門人湯葉梧陳文學等數十人請建祠以慰士民之懐乃爲贖白雲菴舊址立祠置膳田以供祀事杏立石作碑記記畧曰諸君之請立祠欲追崇先生也立祠足以追崇先生乎搆堂以爲宅設位以爲依陳爼豆以爲享祀似矣追崇之實曾是足以盡之乎未也夫尊其人在行其道想像於其外不若佩教於其身先生之道之教諸君􅀁親承者也徳音鑿鑿聞者飫矣光範丕丕炙者切矣精藴淵淵領者􅀷矣諸君何必他求哉以聞之昔日者而傾耳聽之有不以道則曰非先生之法言也吾何敢言以見之昔日者而凝目視之有不以道則曰非先生之徳行也吾何敢行以領之昔日者而潜心會之有不以道則曰非先生之精思也吾何敢思言先生之言而徳音以接也行先生之行而光範以覩也思先生之思而精藴以傳也其爲追崇也何尚焉十四年乙未刻先生文録於姑蘇先是洪畿奔師喪過玉山檢􅀵遺書越六年洪教授姑蘇過金陵與黄綰聞人詮等議刻文録洪作購遺文䟽遣諸生走江浙閩廣直􅀠搜獵逸稿至是年二月鳩工成刻巡按直隷監察御史曹煜建仰止祠于九華山祀先生九華山在青陽縣師嘗兩逰其地與門人江柯喬等􅀫化城寺數月寺僧好事者争持紙索詩通夕灑翰不倦僧蓄墨跡頗冨思師夙範刻師像于石壁而亭其上知縣祝増加葺之是年煜因諸生請建祠于亭前扁曰仰止鄒守益􅂢資令僧買贍田􅀊供祀事越隆慶戊辰知縣沈子勉率諸生講學于斯増葺垣宇贍田煜祭文見青陽志十五年丙申巡按浙江監察御史張景提學僉事徐階重脩天真精舍立祀田門人禮部尚書黄綰作碑記記曰今多書院興必由人或仕於斯或逰於斯或生於斯或功徳􅀍於斯必其人實有足重者表表在人思之不見而後立書院以祀之聚四方有志樹之風聲講其道以崇其化浙江之上龍山之麓有曰天真書院立祀陽明先生者也盖先生嘗逰于斯既沒故于斯創精舍講先生之學以明先生之道夫人知之豈待予言哉正徳已卯寜濠之變起事江右將窺神噐四方岌岌日危于死浙爲下游通衢八道財賦稱甲濠意欲先得之故隂置腹心計爲之應因先生㨿其上㳺􅁬身獨當之濠速敗浙頼以寧卒免鋒刄荼毒之苦皆先生之功也則今日書院之創非徒講學又以明先生之功也書院始於先生門人行人薛侃進士錢徳洪王畿合同志之資爲之繼而門人僉事王臣主事薛僑有事於浙又増治之始買田七十餘􅅕蒸嘗輯理歳病不給侍御張君按浙廼躋書院而歎曰先生之學論同性善先生之功存於社稷皆􅀁宜祀矧覆澤兹土尤甚惡可忽哉乃屬提學僉事徐君階命紹興推官陳讓以㑹稽廢寺田八十餘􅅕爲庄屬之書院又出法臺贖金三百兩命杭州推官羅大用及錢塘知縣王釴買宋人􅀁爲􅀛疇田九十餘畆以益之於是需足人聚風聲益樹而道化行矣昔宋因書院而爲學校今於學校之外復立書院盖乆常特新之意與予嘗登玆山坐幽巖歩危磴俯江流之洄浙引蒼渤之㝠茫北覽西湖南目禹穴雲樹蒼蒼晴嵐窅窅於是愴然而悲悄然而戚恍見先生之如在而不能忘也乃知學校之設既逺逺則常常則玩玩則怠怠則學之道其踈乎書院之作既近近則新新則惕􅅥則勵勵則學之道其修乎玆舉也立政立教之先務益於吾浙多矣十六年丁酉十月門人周汝貟建新建伯祠于越是年汝貟以御史按浙先是師在越四方同門來遊日衆䏻仁光相至大天妃各寺院居不能容同門王艮何秦等乃謀建樓居齋舍于至大寺左以居來學師沒後同門相繼來居依依不忍去是年汝貟與知府湯紹恩拓地建祠于樓前取南康蔡世新肖師像每年春秋二仲月郡守率有司主行時祀十一月僉事沈謐建書院于文湖祀先生文湖在秀水縣北四十里廣環十里中横一州四靣澄碧書院創焉謐初讀傳習録有悟師學即期執贄請見師征思田弗遂及聞訃追悼不已後爲行人聞薛子侃講學京師乃歎曰師雖沒天下傳其道者尚有人也遂拜薛子率同志王愛等數十人講學於其中置田若干畆以贍諸生是年廵按御史周汝貟立師位於中堂春秋二仲月率諸生䖍祀事歌師詩以侑食既後謐起僉江西爲師遍立南贛諸祠北没叅政孫宏軾副使劉慤設謐位附食於師謐子進士啓原増置贍田與愛等議附薛子位祭期定季丁日同志與祭天真者俱趨文湖于今益盛十七年戊戌廵按浙江監察御史􅀓鳯翔建陽明祠於龍山龍山在餘姚縣治右辛巳年師歸省祖塋門人夏淳孫陞吳仁管州孫應奎范引年柴鳳楊珂周于徳錢大經應􅀭谷鍾秀王正心正思俞大本錢徳周仲實等侍師講學於龍泉寺之中天閣師親書三八會期於壁吳仁聚徒扵閣中合同志講會不輟丁亥秋師出征思田毎遺書洪畿必念及龍山之㑹是年傳以諸生請建祠於閣之上方毎年春秋二仲月有司主行時祀十八年巳亥江西提學副使徐階建仰止祠於洪都祀先生自階典江西學政大􅀤師門宗㫖以倡率諸生於是同門吉安鄒守益劉􅀖采羅洪先南昌李遂魏良弼良貴王臣裘衍撫州陳九川􅀓黙吳悌陳介等與各郡邑選士俱來合㑹焉魏良弼立石紀事吉安士民建報功祠于廬陵祀先生祠在廬陵城西隅師自正徳庚午蒞廬陵日進父老子弟告諭之使之息爭睦族興孝悌敦禮讓民漸向化興利剔蠹賑疫禳災皆有實惠七越月而去民追思之既提督南贛掃蕩流賊定逆濠之亂皆切民命及聞師訃䘮過河下沿途哀號如䘮考妣乃相與築祠名曰報功􅀊脩􅀻祀後曾孔化賀鈞周祉王時椿時槐陳嘉謨等相與恊成制益宏麗春秋郡有司主祀十九年庚子門人周桐應典等建書院于壽岩祀先生壽岩在永康西北鄉岩多瑞石空洞塏爽四山環翠五峯前擁桐典與同門李珙程文德講明師㫖嵌岩作室以居来學諸生盧可乆程梓等就業者百有餘人立師位於中堂歳時奉祀定期講會至今不輟二十一年壬寅門人范引年建混元書院于青田祀先生書院在青田縣治引年以經師爲有司延聘主青田教事講藝中時􅀤師㫖諸生葉天秩七十有餘人聞之惕然有感復肅儀相率再拜共進師學又懼師聮無􅀁樹藝不固乃紏材築室肖師像於中堂謂范子之學出於王門追􅀁自也范子卒春秋配食乞洪作仰止祠碑記御史洪恒紀其詳後提學副使阮鶚増建為心極書院畿作碑記記畧曰心極之義其昉諸古乎孔子易有太極是生兩儀以至定吉㐫而生大業􅀁以通神明之徳􅀋萬物之情而冐天下之道無非易也易者無他吾心寂感有無相生之機之象也天之道爲隂陽地之道爲剛柔人之道爲仁義三極于是乎立象也者像此者也隂陽相摩剛柔相盪仁義相禪藏乎無扄之鍵行乎無轍之途立乎無􅀁􅀝之地而神明出焉萬物備焉故曰無思也無爲也寂然不動感而遂通天下之故此孔子之精藴也當時及門之徒惟顔氏獨得其宗觀夫喟然之歎有曰如有􅀁立卓爾有無之間不可以致詰雖􅁒從之末由也巳故曰􅀤聖人之藴顔子也顔子沒而聖學遂亡後千餘載濓溪周子始復追尋其緒􅀤爲無極而太極之說盖㡬之矣而後儒紛紛之議尚未䏻一無惑乎千載之寥寥也蓋漢之儒者泥于有象一切仁義忠孝禮樂教化經綸之迹皆認以爲定理必先講求窮索執為典要而後以為應物之則是為有得于太極似矣而不知太極為無中之有不可以有名也隋唐以來老佛之徒起而攘臂其間以經綸爲糟粕乃復矯以窈㝠玄虗之見甚至培撃仁義蕩㓕禮教一切歸之于無是爲有得于無極似矣而不知無極爲有中之無非可以無名也周子洞見二者之􅁦轉相謬溺不得巳而救之建立圗說以顯聖學之宗定之以中正仁義而主静中正仁義云者太極之謂而主靜云者無極之謂人極于是乎立焉議者乃以無極之言爲出于老氏分中正仁義為動靜而不悟主靜無欲之㫖亦獨何哉夫自伏羲一畫以啓心極之原神無方而易無體即無極也孔子固已言之矣而周子之得聖學之傳無疑也夫聖學以一為要一者無欲也人之欲大約有二髙者蔽于意見卑者蔽于嗜慾皆心之累也無欲則一無欲則明通公􅄎而聖可學矣君子寡慾故脩之而吉小人多慾故悖之而㓙吉㓙之㡬極之立與不立于此焉分知此則知􅖘􅈐阮子􅀁謂心極之說矣二十三年甲辰門人徐􅃢建虎溪精舍于辰州祀先生精舍在府城隆興寺之北師昔還自龍塲與門人冀元亨􅃽信唐愈賢等講學于龍興寺使靜坐宻室悟見心體是年􅃢爲辰同知請於當道與諸同志大作祠宇置贍田鄒守益爲作精舍記羅洪先作性道堂記又有見江亭玉芝亭鷗鷺軒􅃢與其弟楊珂俱多題誌二十七年戊申八月萬安同志建雲興書院祀先生書院在白雲山麓前對芙蓉􅈐幙下秀出如圭大江橫其下同志朱衡劉道劉弼劉王舜韶吳文恵劉中虚等迎予講學於精脩觀諸生在座者百五十人有竒晚遊城闉見民居井落邑屋華麗洪曰民庶且富而諸君敷教之勤若此可謂禮義之鄕矣衡曰是城四十年前猶爲赤土耳問之曰南贛峒賊流刼無常妻女相牽而泣曰賊來􅂚避惟一死可恃耳師來蕩平諸峒百姓始得築城生聚乃有今日皆師之賜也洪嘉嘆不巳乃謂曰沐師徳澤之􅀷􅀂此南來郡邑俱有祠祀何是地獨無衆皆蹙然曰有志未遂耳乃責洪作疏紏材是夕來相􅂇者􅄹二百金舉人周賢宣作文祀土衆役並興中遭異議止之至嘉靖甲子衡爲尚書賢宣爲方伯與太僕卿劉慤復完舊業祭祀䂓制大備名曰雲興書院云九月門人陳大倫建明經書院於韶祀先生書院在府城先是同門知府鄭騮作明經舘與諸生課業倡明師學至是大倫守韶因更建書院立師位與陳白沙先生並祀是月洪謁甘泉湛先生踰􅁃嶺與諸生鄧魯駱堯知胡直王城劉應奎鍾大賔魏良佐潘槐莫如徳張昻等六十三人謁師祠相與入南華二賢閣與鄧魯胡直等共闡師說至隆慶巳巳知府李渭大脩祠宇集諸生與黄城等身證道要師教復振二十九年庚戌正月吏部主事史際建嘉義書院于溧陽祀先生書院在溧陽救荒渰史際因歳青築渰塘以活饑民塘成而建書院于上延四方同志講㑹舘榖之籍其田之􅀁入以備一邑饑荒名曰嘉義欽玉音也際與吕光洵議延洪主教事乃先幣聘越二年兹來定盟是月同志周賢宣趙大河諸生彭􅀂思彭适􅀽端化王襞徐大經陳三謨等數十人際率子姪史繼源繼志史銓史珂史繼書繼辰致詹偕吾子壻葉邁鄭安元錢應度應量應禮應樂定期來會常不下百餘人立師與甘泉湛先生位春秋奉祀天成篇掲嘉義堂示諸生曰吾人與萬物混處於天地之中爲天地萬物之宰者非吾身乎其䏻以宰乎天地萬物者非吾心乎心何以䏻宰天地萬物也天地萬物有聲矣而爲之辯其聲者誰歟天地萬物有色矣而爲之辯其色者誰歟天地萬物有味矣而爲之辯其味者誰歟天地萬物有變化矣而神明其變化者誰歟是天地萬物之聲非聲也由吾心聽斯有聲也天地萬物之色非色也由吾心視斯有色也天地萬物之味非味也由吾心嘗斯有味也天地萬物之變化非變化也由吾心神明之斯有變化也然則天地萬物也非吾心則弗靈矣吾心之靈毀則聲色味變化不得而見矣聲色味變化不可見則天地萬物亦㡬乎息矣故曰人者天地之心萬物之靈也􅀁以主宰乎天地萬物者也吾心爲天地萬物之靈者非吾䏻靈之也吾一人之視其色若是矣凡天下之有目者同是明也一人之聽其聲􅀂是矣凡天下之有耳者同是聰也一人之嘗其味􅀂是矣凡天下之有口者同是􅄝也一人之思慮其變化若是矣凡天下之有心知者同是神明也匪徒天下為然也凡前乎千百世巳上其耳目同其口同其心知同無弗同也後乎千百世已下其耳目同其口同其心知同亦無弗同也然則明非吾之目也天視之也聰非吾之耳也天聽之也􅄝非吾之口也天嘗之也變化非吾之心知也天神明之也故目以天視則盡乎明矣耳以天聽則竭乎聰矣口以天嘗則不爽乎􅄝矣思慮以天動則通乎神明矣天作之天成之不參以人是之謂天䏻是之謂天地萬物之靈吾心爲天地萬物之靈惟聖人為䏻全之非聖人䏻全之也夫人之􅀁同也聖人之視色與吾目同矣而目􅀎不引於色者率天視也聖人之聽聲與吾耳同矣而耳䏻不蔽於聲者率天聽也聖人之􅄝味與吾口同矣而口䏻不爽於味者率天嘗也聖人之思慮與吾心知同矣而心知不亂於思慮者通神明也吾目不引於色以全吾明焉與聖人同其視也吾耳不蔽於聲以全吾聰焉與聖人同其聽也吾口不爽於味以全吾􅄝焉與聖人同其嘗也吾心知不亂於思慮以全吾神明焉與聖人同其變化也故曰聖人可學而至謂吾心之靈與聖人同也然則非學聖人也􅀎自率吾天也吾心之靈與聖人同聖人䏻全之學者求全焉然則何以爲功􅁘有要焉不可以支求也吾目蔽於色矣而後求去焉非􅀁以全明也吾耳蔽於聲矣而後求克焉非􅀁以全聰也吾口爽於味矣而後求復焉非􅀁以全􅄝也吾心知亂於思慮矣而後求止焉非􅀁以全神明也靈也者心之本體也性之徳也百體之會也徹動靜通物我亘古今無時乎弗靈無時乎或間者也或生而知之或學而知之或困而知之皆自率是靈以通百物勿使間于􅁒焉已矣其功雖不同其靈未嘗不一也吾率吾靈而􅀤之於目焉自辯乎色而不引乎色􅀁以全明也􅀤之於耳焉自辯乎聲而不蔽乎聲􅀁以全聦也􅀤之於口焉自辯乎味而不爽乎味􅀁以全􅄝也􅀤之於思慮焉萬感萬應不動聲臭而其靈常寂大者立而百體通􅀁以全神明也人一􅀎之巳百之人十䏻之已千之必率是靈而無間于欲焉是天作之人復之是之謂天成是之謂致知之學増刻先生朱子晚年定論朱子定論師門􅀁刻止一卷今洪増録二卷共三卷際令其孫致詹梓刻於書院重刻先生山東甲子鄉試録山東甲子鄕試錄皆出師手筆同門張峯判應天府欲畨刻於嘉義書院得吾師繼子正憲氏原本刻之四月門人吕懐等建大同樓于新泉精舎設師像合講會精舎在南畿崇禮街初史際師甘泉先生築室買田爲舘穀之資是年懐與李遂劉起宗何遷余胤緒吕光洵歐陽塾歐陽瑜王與槐陸光祖龎嵩林烈及諸生數十人建樓于精舎設師與甘泉像爲講㑹㑹畢退坐昧昧室黙對終夕而别是月洪送王正億入胄監至金山遂入金陵趨會焉何遷時爲吏部文選司郎中偕四司同僚邀余登報恩寺塔坐第一層問曰聞師門禁學者靜坐慮學者偏靜淪枯槁也似也今學者初入門此心乆濡俗習淪浹膚髄􅀂不使求宻室耳目與物無所覩聞澄師絶慮􅀷入玄漠何時得見真靣目乎師門亦嘗言之假此一叚以􅀘小學之功又云心罹疾痼如鏡面班垢必先磨去明體乃見然後可使一塵不容今禁此一法恐令人終無􅀁入洪對曰師門未嘗禁學者靜坐亦未嘗立靜坐法以入人曰舍此有何法可入曰只教致良知良知即是真面目良知明自䏻辯是與非自䏻時靜時動不偏于靜曰何言師門不禁靜坐曰程門歎學者靜坐爲善學師門亦然但見得良知頭腦明白更求靜處精錬使全體著察一滓不留又在事上精錬使全體著察一念不欺此正見吾體動而無動靜而無静時動時靜不見其端爲隂爲陽莫知其始斯之謂動靜皆定之學曰偏於求靜終不可與入道乎曰離喜怒哀樂以求中必非未􅀤之中離仁敬孝慈以求止必非緝熈之止離視聽言動以求仁必非天下歸仁之仁是動靜有間矣非合内合外故不可與語入道曰師門亦有二教乎曰師嘗言之矣吾講學亦嘗誤人今較來較去只是致良知三字無病衆皆起而歎曰致知則存乎心悟致知焉盡矣下塔由􅀞廊指真武流形圗曰觀此亦可以証儒佛之辯衆皆曰何如曰真武山中乆坐無得欲棄去感老嫗磨針之喻復入山中二十年遂成至道今若􅀞堯流形圗必從克明峻徳親九族以至恊和萬􅀖􅀞舜流形圗必從舜徃于田自耕稼陶漁以至七十載陟方又何時得在金碧山水中枯坐二三十年而後可以成道􅁘諸友大􅀏而别三十年辛亥廵按貴州監察御史趙錦建陽明祠於龍塲龍塲舊有龍岡書院師􅀁手植也至是錦建祠三楹於書院北旁翼兩序前爲門仍題曰龍岡書院周垣繚之奠師位於中堂廵撫都御史張鶚翼亷使張堯年叅政萬虞愷提學副使謝東山共舉祠祀羅洪先撰祠碑記記畧曰予嘗考龍塲之事於先生之學有大辯焉夫􅀁謂良知云者本之孩童固有而不假於學慮雖匹夫匹婦之愚固與聖人無異也乃先生自叙則謂困於龍塲三年而後得之固有不易者則何以哉今夫􅀤育之功天地之􅀁固有也然天地不常有其功一氣之歛閉而成冬風露之撼薄霜霰之嚴凝隕穫摧敗生意蕭然其可謂寂寞而枯槁矣􅉱極而軋雷霆􅁬焉百蟄啓群草茁氤氲動盪於宇宙之間者則向之風霰爲之也是故藏不􅀷則化不速蓄不固則致不遠屈伸剥復之際天地且不違而况於人乎先生以豪傑之才振迅雄偉脫屣于故常於是一變而爲文章再變而爲氣節當其倡言於逆瑾蠱政之時撻之朝而不悔其憂思􅈤欵意氣激烈議論鏗訇真足以凌駕一時而托名後世豈不快哉及其擯斥流離而於萬里絶域荒烟􅀷箐狸鼯豺虎之區形影孑立朝夕惴惴既無一可騁者而且疾病之與居瘴癘之與親情迫於中忘之有不􅀎勢限於外去之有不可輾轉煩瞀以需動忍之益盖吾之一身巳非吾有而又何有於吾身之外至于是而後如大夣之醒強者柔浮者實凢平日􅀁挾以自快者不惟不可以常恃而實足以増吾之機械盗吾之聰明其塊然而生塊然而死與吾獨存而未始加損者則固有之良知也然則先生之學出之而愈張晦之而愈光鼓舞天下之人至於今日不怠者非雷霆之震前日之龍塲其風霰也哉嗟乎今之言良知者莫不曰固有固有問其致知之功任其固有焉耳亦嘗於枯稿寂寞而求之乎􅀁謂盗聰明増機械者亦嘗有辯於中否乎生於憂患死於安樂豈有待於人乎三十一年壬子提督南贛都御史張烜建復陽明王公祠於鬱􅀌山祠在贛州鬰􅀌臺前濓溪祠之後嘉靖初年軍衛百姓思師恩徳不已百姓乃紏材建祠于鬰􅀌臺以䖍尸祝軍衛官兵建祠于學宫右塑像設祀俱有成式繼後異議者移鬰􅀌祠像於報功祠後湫隘慢䙝軍民懐忿至是署兵備僉事沈謐訪詢其故父老子弟相與涕泣申告謐謁師像為之泫然出涕報功祠舊有贍田米三十八石見供春秋二祭鬰􅀌祠則取諸贛縣均平銀兩乃具申軍門烜如其議脩葺二祠迎師像於鬰􅀌臺廟貌嚴餙煥然一新軍衛有司各申䖍祝父老子弟歲臘駿奔烜作記立石紀事師自征三浰山㓂盡平即日班師立法定制令贛屬縣俱立社學以宣風教城中立五社學東曰義泉書院南曰正蒙書院西曰富安書院又西曰鎮寧書院北曰龍池書院選生儒行義表俗者立爲教讀選子弟秀頴者分入書院教之歌詩習禮申以孝悌導之禮讓未期月而民心丕變革奸􅁤而化善良市㕓之民皆知服長衣乂手拱揖而歌誦之聲溢於委巷浸浸乎三代之遺風矣繼後異議者盡堕成䂓而五院爲強􅁀者􅀻㨿禮樂之教息矣至是謐詢士民之情罪逐僣據脩舉廢墜五社之學復完慎選教讀子弟而淬礪之風教復興渢渢乎如師在日矣建復陽明王公祠於南安南安青龍舗師􅀁屬纊之地也士民哀號哭泣相與建祠於學宫之右歲時父老子弟奔走祝奠有司即為崇祀廟貌宏麗後爲京師流言承奉風㫖者遂遷祠於委巷隘陋汚􅁾人心不堪謐與有司師生議復舊址原制樓五楹前門五楹取委巷祠址之值於民􅂇完工作具申軍門烜從之自是師祠與聖廟並垂不朽矣三十二年癸丑江西僉事沈謐􅁱復陽明王公祠於信豐縣按謐䖍南公移録曰贛州府􅀁屬十一縣俱有前都察院右副都御史陽明王公祠巍然並存蓋因前院功業文章足以匡時而華國謀猷軍旅足以禦􅁀而捍災南贛士民咸思慕之歌頌功徳乆而不衰尚有談及而下淚者本縣原有祠堂後有塞門什主者廢爲宴憇之􅀁是誠何心哉爲此仰本縣官吏照牌事例限三日内即查䆒清理仍為灑掃立主因舊爲新不惟一邑師生故老得以俱興瞻仰之􅀻而凢過信豐之􅇕者咸得以盡展拜爼豆之禮古人􅀁謂愛禮存羊禮失求野之意即是可見矣時謐署南贛兵備事故云三月改建王公祠於南康南康舊有祠在學宫右後因異議者遷師像於旭山韓公祠内謐徃謁祠見二像並存於一室王公有祭而無祠韓公有祠而無祭其室且卑陋訪祠西有鄕約􅀁前有堂三間後有閣一座䂓模頗勝乃置師像於堂而復其祭韓公祠另為立祭使原有祠者因祠而舉祭原有祭者因祭而立祠則兩祠之勢並峙而各全其尊報功之典同行而咸盡其義矣三月安遠縣知縣吳卜相請建王公報功祠安遠舊無師祠百姓􅀻立牌於小學父老子弟相率餽奠始伸歲臈之情卜相見之乃惕然曰此吾有司之責也乃具申舊院道謂前都御史陽明王公功在天下而安遠爲用武之地教在萬世而䖍州爲首善之區本縣正徳年間中有廣宼葉芳擁衆數千肆行剽掠民不聊生自受本院撫勦以來立籍當差無異於土著之齊民後生小子不忘乎良知之口授今詢輿情擇縣西舊堤備􅀁空處堪以修建祠堂本縣將日逐自理詞訟銀兩買辨供費庶財省而功倍祀專而民恱嘉靖二十九年申㨿前提督軍門盧俱如議行之見今像貌森嚴祠宇宏麗申兵備僉事沈提督軍門張扁其堂曰仰止門曰報功祠烜爲作記立石紀事四月瑞金縣知縣張景星請建王公報功祠按䖍南公移録景星申稱正徳初年嵗侵民饑軬賊衝熾民不聊生逃亡過半頼提督軍門王公剪除兇惡宣布徳威􅀤粟賑饑逃民復業感恩思徳欲報無酧今有􅂄民蘇振等願自􅂇財鳩工拓鄕校右以崇祠像李珩禄願自􅂇早田八十畆以承春秋尸祝僉事沈謐嘉奬之申照軍門張烜嚴立䂓制題曰報功立石紀事六月崇義縣知縣王廷耀重脩陽明王公祠崇義縣在上猶大􅁃南康之中相距各三百餘里師􅀁奏建也數十年來居民井落草木茂宻生聚䌓衍百姓追思功徳家設像以致奠祝至是廷耀請於前軍門盧會民建師祠於儒學東隅盧從之僉事沈謐廵縣廷耀請新舊制謐爲増其未備設制定祀如信豐諸縣立石紀事九月太僕少卿吕懐廵按御史成守節改建陽明祠於瑯琊山山去城五里舊有祠在豐樂亭右湫隘不容爼豆玆改建紫􅅔泉上是年畿謁師祠與懐戚賢等數十人大會於祠下十月洪自寧國與貢安國謁師祠見同門髙年猶有􅀎道師教人初入之功者三十三年甲寅廵按直􅀠監察御史閭東寧國知府劉起宗建水西書院祀先生水西在涇縣大溪之西有上中下三寺初與諸生會集寓於各寺方丈既而諸生日衆僧舍不􅀎容乃築室於上寺之􅂩地以備講肄又不足提學御史黄洪毘與知府劉起宗創議建精舍於上寺右未就廵按御史閭東提學御史趙鏜繼至起宗復申議於是屬知縣丘時庸恢弘其制督成之邑之士民好義者競來相役南陵縣有寡婦陳氏曹按妻也遣其子廷武輸田八十畆有竒以廪餼來學於時書院舘榖具備遂成一名區云起宗禮聘洪畿間年至㑹三十四年乙卯歐陽徳改建天真仰止祠德掲天真祠曰㨿師二詩石門蒼峽􅀛疇胥海皆上院之景吾師神明􅀁依也今祠建山麓恐不足以安師靈適其徒御史胡宗憲提學副使阮鶚俱有事吾浙即責其改建祠於其上院扁其額曰仰止江西提學副使王宗沭訪南康生祠塑師像遣生員徐應隆迎至新祠爲有司公祭下祠塑師燕居像爲門人􅀻祭鄒守益譔天真仰止祠記記曰嘉靖丙辰錢子徳洪聚青原連山之間議葺陽明先生年譜且曰仰止之祠䂓模聳舊觀矣宜早至一記之未果趨也廼具顛末以告天真書院本天真天龍淨明三寺地歲庚寅同門王子臣薛子侃王子畿暨徳洪建書院以祀先生新建伯中為祠堂後為文明閣藏書室望海亭左為嘉㑹堂游藝􅀁傳經樓右為明徳堂月新舘傍為翼室置田以供春秋祭祀歳甲寅今總制司馬梅林胡公宗憲按浙今中丞阮公鶚視學謀於同門黄子弘綱主事陳子宗虞改祠於天真上院距書院半里許以薛子侃歐陽子徳王子臣附俱有事師祠也左為叙勲堂右爲齋堂後崖爲雲泉樓前爲祠門門之左通慈雲嶺磴道横亘􅀂虹立石牌坊於嶺上題曰仰止下接書院百歩一亭曰見疇曰㵼雲曰環海右拓基爲淨香菴以居守僧外爲大門合而題之曰陽明先生祠門外半壁池跨池而橋曰登雲橋外即􅀛田亭其上曰大極云􅀊丁巳春總制胡公平海夷而歸思敷文教以戢武士命同門杭二守唐堯臣重刻先生文録傳習録於書院以嘉恵諸生重修祠宇加丹垔泉石之勝闢凝霞玄陽之洞梯上真躡蟾窟經蒼峽采十真以臨四眺湘烟越嶠縱足萬狀窮島怒濤坐收樽爼之間四方逰者愕然以爲造物千年􅀁秘也文明有象先生嘗詠之而一旦盡􅀤於群公􅀑神其聽之矣守益拜首而復曰真之動以天也㣲矣果疇而仰應又疇而止之先師之訓曰有而未嘗有是真有也無而未嘗無是真無也見而未嘗見是真見也而反覆師㫖慨乎顔子知㡬之傳故其詩曰無聲無臭而乾坤萬有基焉是無而未嘗無也又曰不離日用常行而直造先天未畫焉是有而未嘗有也無而未嘗無故視聽言動于天則欲罷而不䏻有而未嘗有故天則穆然無方無體欲從而末由兹顔氏之􅀁以爲真見也吾儕之服膺師訓乆矣飭勵事爲而未逹行著習察之藴則􅀝於滯像研精性命而不屑人倫庶物之實則􅀝於凌虗自邇而逺自卑而髙未免於岐也而入門升堂奚􅀁仰而止乎獨知一脉天徳􅀁由立而王道􅀁由四逹也慎之爲義從心從真不可人力加損稍渉加損便入人爲而僞矣古之人受命如舜無憂如文􅁇志述事如武王周公格帝饗廟運天下於掌舉由孝弟以逹神明無二􅂗轍故曰夫㣲之顯誠之不可掩如此指真之動以天也先師立艱履險磨瑕去垢從直諌遠謫九死一生沛然有悟于千聖相傳之訣析支離於衆淆融闕漏於二氏獨掲良知以醒群夣故惠流於窮民威襲於巨宼功昭于宗社而教思垂於善類雖罹讒而遇􅎱欲掩而彌章身沒三十年矣干戈倥偬中表揚日力此豈聲音笑貎可襲取哉惟梅林子嘗受學於金臺至取師門學術勲烈相與研之既令餘姚諳練淬勵荐拜簡命神謀􅀑謀出入千古旁觀駭汗而竟以成功若於先師有黙觧者繼自今督我同逰暨於來學駿奔詠歌務盡齋明盛服之實其望也若跂其至也若休將三千三百盎然仁體罔俾支離闕漏雜之以古􅀁稱忠信篤敬叅前􅀝衡蠻貊無異於州里省刑薄歛親上死長持挺於秦楚是􅀤先師未展之秘逹爲赤舄隱爲陋巷俾聖代中和位育之休熈光天化日之中是謂仰止之真三十五年丙辰二月提學御史趙鏜修建復初書院祀先生書院在廣徳州治初鄒守益謫判廣徳創建書院置贍田以延四方來學率其徒濮漢施天爵過越見師而還復初之會遂振不息後漢天爵出宦逰是會興復不常者二十年至洪畿主水西會徃來廣徳諸生張槐黄中李天秩等邀會五十人過必與停驂信􅀫是年漢天爵致政歸知州荘士元州判何光􅁉申鏜復大修書院設師位以歲修祀事五月湖廣兵備僉事沈寵建仰止祠於崇正書院祀先生書院在蘄州麒麟山寵與州守同門谷鍾秀建書院以合州之選士講授師學是年與鄉大夫顧問顧闕迎洪於水西諸生鍾沂史修等一百十人有竒合會於立誠堂寵率州守首舉祀事屬洪撰仰止祠記其畧曰二三子爾知天下有不因世而異不以地而隔不爲形而拘者非良知之謂乎夫子於諸生世異地隔形踈而願祠而祀之尸而祝之非以良知潜通於其間乎昔舜文之交也世之相後千有餘􅀊地之相去千有餘里揆其道則若合符節者何也爲其良知同也苟求其同豈惟舜文爲然哉赤子之心與大人同夫婦之愚不肖與聖人同蒸民之不識不知與帝則同故考諸徃聖而非古也俟諸百世而非今也無弗同也無弗足也故歷千載如一日焉地不得而間也通千萬人如一心焉形不得而拘也三代而降世衰道㣲而良知真體烱然不滅故夫子一􅀤其端而吾人一觸其㡬恍然如出幽谷而覩天日故諸生得之易而信之䔍者爲良知同也雖然諸生今日得之􅀂易信之􅀂䔍矣亦尚思其難而擬其信之􅀂未至乎昔者夫子之始倡是學也天下非笑詆訾㡬不免于䧟穽者屢矣夫子憫人心之不􅁴也忘其身之危困積以誠心稽以實得見之行事故天下之同好者共起而以身承之以政明之故諸生之有今日噫亦難矣諸生今日之得􅀂火燃泉逹䏻繼是無間必信其燎原逹海以及于無窮斯爲真信也已是在二三子圗之四十二年癸亥四月先師年譜成師既沒同門薛侃歐陽徳黄弘綱何性之王畿張元冲謀成年譜使各分年分地搜集成藁總裁於鄒守益越十九年庚戌同志未及合併洪分年得師始生至謫龍塲寓史際嘉義書院具稿以復守益又越十年守益遺書曰同志注念師譜者今多爲隔世人矣後死者寜無懼乎譜接龍塲以續其後脩餙之役吾其任之洪復寓嘉義書院具稿得三之二壬戌十月至洪都而聞守益訃遂與廵撫胡松弔安福訪羅洪先于松原洪先開關有悟讀年譜若有先得者乃大恱遂相與考訂促洪登懐王越四月而譜成八月提學御史耿定向知府羅汝芳建志學書院于宣城祀先生洪畿初赴水西會過寧國府諸生周怡貢安國梅守徳沈寵余􅃢徐大行等二百人有竒延至景徳寺講會相繼不輟是年畿至定向汝芳䂓寺􅂩地建祠立祀于今講㑹益盛後知府鍾一元扁爲昭代真儒遵聖諭也四十三年甲子少師稌階撰先生像記記曰陽明先生像一幅水墨冩嘉靖巳亥予督學江西就士人家摹得先生燕居像二朝衣冠像一明年庚子夏以燕居之一贈吕生此幅是也先生在正徳間以都御史廵撫南贛督兵敗宸濠平定大亂拜南京兵部尚書封新建伯其後以論學爲世􅀁忌竟奪爵予徃來吉贛間其父老云濠之未叛也先生奉命按事福州乞歸省其親乘單舸下南昌至豐城聞變將走還幕府爲討賊計而吉安太守松月伍公議適合郡又有積穀可養士因留吉安徴諸郡兵與濠戰湖中敗擒之其事皆有日月可按覆而忌者謂先生始赴濠之約后持兩端遁歸爲伍􅀁強㑹濠攻安慶不克乗其沮喪幸成功夫人苟有約其敗徴未見必不遁凡攻討之事勝則侯不勝則族苟持兩端雖強之必不留武皇帝之在御也政由嬖倖濠悉與結納至或許爲内應方其崛起天下皆不敢意其􅃍亡先生引兵而西留其家吉安之公署聚薪環之戒守者曰兵敗即縱火母為賊辱嗚呼此其功豈可謂倖成而其心事豈不皦然如日月哉忌者不與其功足矣又舉其心事誣之甚矣小人之不樂成人善也自古君子爲小人􅀁誣者多矣要其終必自􅁀白乃予􅀁􅀷慨者今世士大夫髙者談玄理其次爲柔愿下者直以貪黷奔競謀自利其身有一人焉出死力爲國家平定大亂而以忌厚誣之其􅀔不盡驅士􅀋入於三者之途不止凢爲治不患無事功患無賞罰議論者賞罰􅀁從出也今天下漸以多事庶㡬得人焉馳驅其間而平時􅀁議論者如此雖在上智不以賞罰爲勸懲彼其激勵中才之具不已踈乎此予􅀁􅀷慨也濠之亂孫許二公死于前先生平定之于後其迹不同同有功於名教江西會城孫許皆廟食而先生無祠予督學之二年始祀先生于後圃未㡬􅀍召因摹像以歸􅀅示同志者而首以贈吕生予嘗見人言此像于先生極似以今觀之貌殊不武然獨以武功顯於此見儒者之作用矣吕生誠有慕乎尚於其學求之巡按江西監察御史成守節重脩洪都王公仰止祠大學士李春芳作碑記記曰陽明先生祠少師存翁徐公督學江右時􅀁創建也公二十及第宏詞愽學燁然稱首詞林一時詞林宿學皆自以爲不及而公則曰學豈文詞巳也日與文荘歐陽公窮䆒心學聞陽明先生良知之說而􅀷契焉江右爲陽明先生過化公既闡明其學以訓諸生而又爲崇犯無􅀁不足以繋衆志乃於省城營建祀宇肖先生像祀之遴選諸生之㒞茂者樂群其中名曰龍沙㑹公課藝暇每以心得開示諸生而一時諸生多􅀁興起云既公召還洊躋綸閣爲上􅀁親信蓋去江右㡬二十年矣有告以祠宇傾圯者公則愀然動心􅂢賜金九十屬新建錢令脩葺之侍御甘齋成君聞之曰此予責也遂身任其事鳩工拓材餙其􅀁巳敝増其􅀁未備堂宇齋舍煥然改觀不惟妥神􅁢稱而諸生之興起者益勃勃不可禦矣噫公當樞筦之任受心膂之􅀉無論㡬務叢委即宸翰咨荅日三四至而猶之不可以巳也夫致知學􅀤自孔門而孟子良知之說則又􅀤􅀁未􅀤陽明先生合而言之曰致良知則好善惡惡之意誠推其極家國天下可坐而理矣公篤信先生之學而日以體之身心施之政事秉釣之初即􅀤􅀻餽屏貪墨示以好惡四海嚮風不數年而人心吏治翕然丕變此豈有異術哉好善惡惡之意誠於中也故學非不明之患患不誠耳知善知惡良知具存譬之大明當天無㣲不照當好當惡當賞當罰當進當退錙銖不爽各當天則循其則而應之則平平蕩蕩無有作好無有作惡而天下平矣故誠而自慊則好人􅀁好惡人􅀁惡而爲仁不誠而自欺則好人􅀁惡惡人􅀁好而爲不仁苟為不仁生於其心害於其事蠧治􅆷民有不可勝言者矣公為此懼又舉明道定性識仁二書􅀤明其義以示海内學者而致知之學益明以切諸生䏻心惟其義而體諸身則於陽明先生之學㡬矣業新舍者其尚體公之意而殫力於誠以爲他日致用之地哉四十五年丙寅刻先生文録續編成師文録乆刻行于世同志又以􅀁遺見􅀉彚録得爲卷者六嘉興府知府徐必進見之曰此於師門學術皆有􅀜切不可不遍行同志董生啓予徴少師存齋公序命工入梓名曰文録續編并家乘三卷行於世云今上皇帝隆慶元年丁卯五月詔贈新建侯謚文成丁卯正月詔病故大臣有應得恤典贈謚而未得者許部院科道官議奏定奪於是給事中辛自脩岑用賔等御史王好問耿定向等上䟽原任新建伯兵部尚書兼都察院左都御史王守仁功勲道徳宜膺殊恤下吏禮二部會議得王守仁具文武之全才闡聖賢之絶學筮官郎署而抗疏以犯中璫甘受炎荒之謫建臺江右而提兵以平巨逆親􅀵社稷之功偉節竒勲乆見推於輿論封盟錫典豈宜􅃍奪於身終䟽上詔贈新建侯謚文成制曰竭忠盡瘁固人臣職分之常崇徳報功實國家激勸之典矧通侯班爵崇亞上公而節惠易名榮逾華衮事必待乎論定恩豈容以乆虗爾故原任新建伯南京兵部尚書兼都察院左都御史王守仁維岳降靈自天佑命爰從弱冠屹爲宇宙人豪甫拜省郎獨􅁬乾坤正論身瀕危而志愈壮道處困而造彌􅀷紹堯孔之心傳㣲言式闡倡周程之道術來學攸宗藴蓄既宏猷爲丕著遺艱投大隨試皆宜戡亂解紛無施勿效閩粤之箐巢盡掃而擒縱如神東南之􅀺庶舉安而文武足憲爰及逆藩稱亂􅀹資仗鉞淵謀旋凱奏功速於吳楚之三月出竒决勝邁彼淮蔡之中宵是嘉社稷之偉勲申盟帶礪之異數既復撫夷兩廣旋至格苗七旬謗起功髙賞移罰重爰遵遺詔兼采公評續相國之生封時庸旌伐追曲江之殊䘏庶以酬勞兹特贈為新建侯謚文成錫之誥命於􅃧鐘􅂦勒銘嗣羙東征之烈劵綸昭錫世登南國之功永爲一代之宗臣實耀千年之史冊㝠靈不昧寵命其承六月十七日遣行人司行人賜造墳域遣浙江布政使司堂上正官叅政與祭七壇二年戊辰六月先生嗣子正億襲伯爵元年三月給事中辛自脩岑用賔等爲開讀事上䟽請復伯爵吏部尚書楊愽奉㫖移咨江西廵撫都御史任士慿會同廵按御史蘇朝宗查覆征藩實跡及浙江巡撫都御史趙孔昭廵按御史王得春奏應復爵􅄻相同于是吏部奉欽依會同成國公朱希忠户部尚書馬森等議得本爵一聞逆濠之變不以非其職守急還吉安倡義勤王未踰旬朔而元兇授首立消東南尾大之憂不動聲色而奸宄蕩平坐貽宗社盤石之固較之開國佐命時雖不同擬之靖遠咸寧其功􅀹偉委應􅀘給誥劵容其子孫承襲以彰與國咸休永世無窮之報議上詔遵先帝原封伯爵與世襲至三年五月御史􅀓寵奏議爵􅄻吏部復請欽依會同成國公朱希忠户部尚書劉體乾議得誠意伯劉基食粮七百石乃太祖欽定靖遠伯王驥一千石新建伯王守仁一千石係累朝欽定多寡不同夫封爵之典論功有六曰開國曰靖難曰禦胡曰平畨曰征蠻曰擒反而守臣死綏兵樞宣猷督府勦宼咸不與焉盖六功者􅀜社稷之重輕係四方之安危自非茅土之封不足以報之至于死綏宣猷勦㓂則皆一身一時之事錫以錦衣之􅄻則可槩欲剖符則未可也竊照新建伯王守仁乃正徳十四年親捕反賊宸濠之功南昌南贛等府雖同􅀖域分土分民各有專責提募兵而平隣賊不可不謂之倡義南康九江等處首罹荼毒且進且攻人心摇動以藩府而叛朝廷不可不謂之勁敵出其不意故俘獻于旬月之間若稍懐遲疑則賊謀益審􅀅不知其􅀁終攻其必救故績􅀵乎萬全之畧􅀂少有踈虞則賊黨益䌓自難保其必濟膚功本自無前竒計可以範後靖遠威寜姑置不論即如寧夏安化之變比之江西難易逈絶逰擊􅄷􅃏于時得封咸寧伯人無間言同一藩服捕反何獨于新建伯而疑之乎􅀁㨿南京各道御史欲要改􅄻錦衣衛于報功之典未盡激勸攸􅀜難以輕擬合無將王守仁男襲新建伯正億不必改議以後子孫仍照臣等先次會題明㫖許其世襲詔從之准照舊世襲王文成公全書卷之三十五終王文成公全書卷之三十六附録五年譜附録五增訂年譜刻成啓原檢舊譜得為序者五得論年譜書者二十乃作而嘆曰譜之成也非苟然哉陽明夫子身明其道於天下緒山念菴諸先生心闡斯道於後世上以承百世正學之宗下以啓百世後聖之矩讀是譜者可忽易哉乃取叙書彚而録之以附譜後使後之志師學者知諸先生為道之心身斯譜其無窮乎陽明先生年譜序門人錢徳洪嘉靖癸亥夏五月陽明先生年譜成門人錢徳洪稽首叙言曰昔尭舜禹開示學端以相授受曰􅁢執厥中四海困窮天禄永終噫此三言者萬世聖學之宗與執中不離乎四海也中也者人心之靈同體萬物之仁也執中而離乎四海則天地萬物失其體矣故堯稱峻徳以自親九族以至和萬􅀖舜稱玄徳必自定父子以化天下尭舜之爲帝禹湯文武之爲王􅀁以致唐虞之隆成三代之盛治者謂其􅀎明是學也後世聖學不明人失其宗紛紛役役疲極四海不知中為何物伯術興假借聖人之似以持世而不知逐乎外者遺乎内也佛老岀窮索聖人之隱㣲以全生而不知養乎中者遺乎外也教衰行弛喪亂無日天祿亦與之而永終噫夫豈無自而然哉寥寥數千百年道不在位孔子出祖述堯舜顔曾思孟濓溪明道繼之以推明三聖之㫖斯道燦燦然復明於世惜其空言無徴百姓不見三代之治每一傳而復晦寥寥又數百年吾師陽明先生出少有志於聖人之學求之宋儒不得窮思物理卒遇危疾乃築室陽明洞天為養生之術靜攝既乆恍若有悟蟬脫塵坌有飄飄遐舉之意焉然即之於心􅀂未安也復出而用世謫居龍塲衡困拂鬰萬死一生乃大悟良知之㫖始知昔之􅀁求未極性真宜其疲神而無得也盖吾心之靈徹顯㣲忘内外通極四海而無間即三聖􅀁謂中也本至簡也而求之繁至易也而求之難不其謬乎征藩以來再遭張許之難呼吸生死百鍊千摩而精光煥􅀤益信此知之良神變妙應而不流於蕩淵澄靜寂而不墮於空徵之千聖莫或紕繆雖百氏異流咸於是乎取証焉噫亦已㣲矣始教學者悟從靜入恐其或病於枯也掲明徳親民之㫖使加誠意格物之功至是而特掲致良知三字一語之下洞見全體使人人各得其中由是以昧入者以明出以塞入者以通出以憂憤入者以自得出四方學者翕然來宗之噫亦云兆矣天不慗遺野死遐荒不得終見三代之績豈非千古一痛恨也哉師既沒吾黨學未得正各執􅀁聞以立教儀範隔而真意薄㣲言隱而口說騰且喜爲新竒譎秘之說凌獵超頓之見而不知日遠於倫物甚者認知見爲本體樂踈簡爲超脫隱㡬智於權宜蔑禮教於任性未及一傳而淆言亂衆甚爲吾黨憂邇年以來亟圗合併以宣明師訓漸有合異統同之端謂非良知昭晣師言之尚足徴乎譜之作􅀁以徴師言耳始謀於薛尚謙顧三紀未就同志日且凋落鄒子謙之遺書督之洪亦大懼湮沒假舘於史恭甫嘉義書院越五月草半就趨謙之而中途聞訃矣偕撫君胡汝茂徃哭之返見羅逹夫閉􅀜方嚴及讀譜則喟然嘆曰先生之學得之患難幽獨中盖三變以至於道今之談良知者何易易也遂相與刋正越明年正月成于懐玉書院以復達夫比歸復與王汝中張叔謙王新甫陳子大賔黄子國卿王子徤互精校閱曰庶其無背師說乎命壽之梓然其事則核之奏牘其文則禀之師言罔或有􅀁増損􅀂夫力學之次立教之方雖因年不同其㫖則一洪竊有取而三致意焉噫後之讀譜者尚其志逆神會自得於㣲言之表則斯道庶乎其不絶矣僣爲之序陽明先生年譜考訂序後學羅洪先嘉靖戊申先生門人錢洪甫聚青原言年譜僉以先生事業多在江右而直筆不阿莫洪先君遂舉丁丑以後五年相屬又十六年洪甫擕年譜稿二三冊來謂之曰戊申青原之聚今㡬人哉洪甫懼始堅懐玉之留明年四月年譜編次成書求踐約㑹滁陽胡汝茂廵撫江右擢少司馬且行刻期入梓敬以旬日畢事已而即工稍緩復留月餘自始至卒手自更正凡八百數十條其見聞可㨿者刪而書之􅀊月有稽務盡情實㣲渉􅀭詡不敢存一字大意貴在傳信以俟將來於是年譜可觀洪先因訂年譜反覆先生之學如適途者顛仆沉迷泥淖中東起西䧟亦既困矣然卒不為休也乆之得小蹊徑免於沾途視昔之險道有異焉在他人宜若可以巳矣然卒不為休也乆之得大康荘視昔之蹊徑又有異焉在他人宜若可以巳矣乃其意則以為出於險道而一旦至是不可謂非過幸彼其才力足以特立而困為我者固尚衆也則又極力呼號冀其偕來以共此樂而顛迷愈乆呼號愈切其安焉而弗之者顧視其呶呶至老死不休而翻以為笑不知先生蓋有大不得已者惻於中嗚呼豈不尤異也乎故善學者竭才爲上解悟次之聽言爲下蓋有宻證殊資嘿持妙契而不知反躬自求實際以至不副夙期者多矣固未有歷渉諸難􅀷入真境而觸之弗靈􅀤之弗瑩必有俟於明師靣臨至語􅀻授而後信乆遠也洪先談學三年而先生卒未嘗一日得及門然於三者之辨今巳審矣學先生之學者視此何哉無亦曰是必有得乎其人而年譜者固其影也刻陽明先生年譜序門人王畿年譜者何纂述始生之年自㓜而壮以至於終稽其終始之行實而譜焉者也其事則倣於孔子家語而表其宗傳所以示訓也家語出于漢儒之臆說附會假借鮮稽其實致使聖人之學黯而弗明偏而弗備駁而弗純君子病焉求其善言徳行不失其宗者莫要於中庸盖子思子憂道學之失傳􅀤此以詔後世其言明備而純不務臆說其大㫖在於未􅀤之中一言即虞廷道心之㣲也本諸心之性情致謹於隱㣲顯見之㡬推諸中和位育之化極之乎無聲無臭而後爲至蓋家學之秘藏也孟軻氏受業子思之門自附於􅀻淑以致願學之誠於尹夷惠則以爲不同道於諸子則以爲姑舎是自生民以來莫盛於孔子毅然以見而知之爲巳任差等百世之上若觀諸掌中是豈無自而然哉􅀁不同者何道􅀁舍者何物􅀁願學者何事端緒毫􅁵之間必有􅀎辨之者矣漢儒不知聖人之學本諸性情屑屑然取證於商羊萍實防風之骨肅慎之矢之迹以徧物爲知必假知識聞見􅂇而􅀤之使世之學者不䏻自信其心倀倀然求知於其外漸染積習其流之􅁦歷千百年而未巳也我陽明先師崛起絶學之後生而頴異神靈自㓜即有志於聖人之學蓋嘗泛濫於辭章馳騁於才䏻漸漬於老釋巳乃折􅂨於群儒之言參互演繹求之有年而未得其要及居夷三載動忍増益始超然有悟於良知之音無内外無精粗一體渾然是即􅀁謂未􅀤之中也其􅀃雖出於孟軻氏而端緒實原於孔子其曰吾有知乎哉無知也盖有不知而作我無是也言良知無知而無不知也而知識聞見不與焉此學脉也師以一人超悟之見呶呶其間欲以挽回千百年之染習盖亦難矣䆮幽䆮昌䆮㣲䆮著風動雷行使天下靡然而從之非其有得於人心之同然安䏻舍彼取此􅃀然自信而不惑也哉雖然道一而巳學一而巳良知不由知識聞見而有而知識聞見莫非良知之用文辭者道之華才䏻者道之幹虗寂者道之原群儒之言道之委也皆􅀁謂良知之用也有舍有取是内外精粗之見未忘猶有二也無聲無􅆨散為萬有神竒臭腐隨化屢遷有無相乗之機不可得而泥也是故溺於文辭則爲陋矣道心之􅀁逹良知未嘗無文章也役於才藝則爲鄙矣天之􅀁降百姓之􅀁與良知未嘗無才􅀎也老佛之沉守虗寂則爲異端無思無為以通天下之故良知未嘗無虗寂也世儒之循守典常則為拘方有物有則以適天下之變良知未嘗無典要也蓋得其要則臭腐化為神竒不得其要則神竒化爲臭腐非天下之至一何足以與於此夫儒者之學務於經世但患於不得其要耳昔人謂以至道治身以土苴治天下是猶泥於内外精粗之二見也動而天㳺握其機以逹中和之化非有二也功著社稷而不尸其有澤䆒生民而不宰其􅀎教彰士􅀋而不居其徳周流變動無爲而成莫非良知之妙用􅀁謂渾然一體者也如運斗極如轉户樞列宿萬象經緯闔闢推盪出入於大化之中莫知其然而然信乎儒者有用之學良知之不爲空言也師之纉承絶學接孔孟之傳以上窺姚姒􅀁謂聞而知之者非耶友人錢洪甫氏與吾黨二三小子慮學脉之無傳而失其宗也相與稽其行實終始之詳纂述爲譜以示將來其於師門之秘未敢謂盡有􅀁􅀤而假借附㑹則不敢自誣以滋臆􅀃之病善讀者以意逆之得於言詮之外聖學之明庶􅀅有頼而是譜不爲徒作也已故曰􅀁以示訓也又後學胡松人有恒言真才固難而全才􅀹難也若陽明先生豈不亶哉其人乎方先生抗議忤權投荒萬里處約居貧困心衡慮㷀然道人爾及稍遷令尹漸露鋒頴矣未㡬内遷進南太僕若鴻臚官曹簡暇日與門人學子講徳問業尚友千古人皆譁之爲禪後擢僉副都御史至封拜亦日與門人學子論學不輟而山賊逆藩之變一鼓殱之於是人始服先生之才之羙矣雖服先生之才而猶疑先生之學誠不知其何也松嘗謂先生之學與其教人大抵無慮三變始患學者之心紛擾而難定也則教人靜坐反觀專事􅀵歛學者執一而廢百也偏於靜而遺事物甚至厭世惡事合眼習觀而㡬於禪矣則掲言知行合一以省之其言曰知者行之始行者知之成又曰知爲行主意行為知工夫而要於去人􅁒而存天理其後又恐學者之泥於言詮而終不得其本心也則專以致良知爲作聖爲賢之要矣不知者與未信者則又病良知之不足以盡道而群然吠焉豈知良知即良心之别名是知也維天髙明維地廣􅀶雖無聲臭萬物皆備古今千聖萬賢天下百慮萬事誰䏻外此知者而致之爲言則篤行固執􅁢廸實際服膺弗失而無􅀁弗用其極並舉之矣豈專守靈明用知而自􅀻耶專守靈明用智自􅀻而不䏻流通著察於倫物云爲之感而或牽引轉移於情染伎倆之􅀻雖名無不周偏而實難與研慮雖稱莫之信果而實近於蕩恣甚至藐兢業而病防檢􅀻徒與而挾悻嫉廢人道而群鳥獸此則禪之􅀁以病道者爾先生之學則豈其然乎故其當大事决大疑夷大難不動聲色不喪匕鬯而措斯民於祍席之安皆其良知之推致而無不足而非有􅀁襲取於外他日讀書竊疑孔子之言而曰我戰則克祭則受福夫聖非誇也未嘗習爲戰與闘也又非有祝詛厭勝之術也而云必克與福得無殆於誣歟是未知天人之心之理之一也夫君子齊戒以養心恐懼而慎事則與天合徳而聰明􅌖知文理宻察􅄎􅀶淵泉而時出之矣則何福之不􅀗何戰之弗克而又奚疑焉不然傳何以曰明乎郊社之禮禘嘗之義治國其如視諸掌乎夫郊社禘嘗之禮則何與於治國之事也夫道一而巳矣通則皆通塞則皆塞文豈爲文武豈為武盖尚父之鷹􅀭本於敬義而周公之東征破斧寔哀其人而存之彼依托之徒呼喝吒詫豪蕩弗檢自詭爲道與學而欲舉天下之大事祗見其勞而敝矣緒山錢子先生高第弟子也編有先生年譜舊矣而猶弗自信泝錢塘踰懐玉道臨川過洪都適吉安就正於念菴諸君子念菴子爲之刪繁舉要潤餙是正而􅀘其闕軼信乎其文則省其事則増矣計為書七卷既成則謂予曰君滁人先生盖嘗過化而今繼居其官且與討論君宜叙而刻之余謝不敢而又弗克辭也則以竊􅀁聞於諸有道者論次如左俾後世知先生之才之全盖出於其學如此必就其學而學焉庶㡬可以弗畔矣夫又後學王宗沐昔者孔子自序其平生得學之年自十五以至七十然後􅀎從心􅀁欲不踰矩其間大都詣入之􅀷如浚井者必欲極底裏以成而修持之漸如歷階者不容躐一級而進至哉粹乎千古學脉之的也然宗沐嘗仰而思之使孔子不至七十而沒豈其終不至於從心耶若再引而未沒也則七十而後將無復可庸之功耶嗟乎此孔子􅀁謂苦心吾恐及門之徒自顔曽而下有不得而聞者矣夫矩心之體而物之則也心無定體以物為體方其應於物也而體適呈焉烱然煥然無起無作不以一毫智識意解參於其間是謂動以天也而自適於則加之則渉於安排减之則闕而不貫毫􅁵㡬㣲瞬目萬里途轍􅀝着轉與則背此非有如聖人之志畢餘生之力精研一守以至於忘體忘物獨用全真則固未有䏻凑泊其藩者而况於横心之􅀁欲而望其自然不踰於矩哉此聖學􅀁以别於異端斃而後巳不知老之將至者也不踰矩由不惑出而不惑者吾心之精明本體􅀁謂知也自宋儒濓溪明道之没而此學不傳我朝陽明王先生盖學聖人之學者其事功文章與夫歷渉􅀤跡頗爲世􅀁竒而爭傳之以爲恠年㡬六十而沒而其晚􅀊始專掲致良知爲聖學大端良有功於聖門予嘗覽鏡其行事而叅讀其書見其每更患難則愈精明􅀒重難則愈堅定然後知先生英挺之禀雖異於人而所以䏻䆳於此學而􅀤揮於作用者亦不䏻不待於歷􅀊踐悟之漸而世顧竒其􅀤跡與夫事業文章之餘夫亦未知􅀁本也與先生髙弟餘姚錢洪甫氏以親受業乃䏻譜先生履歷始終編年爲書凡世􅀁語竒事不載而於先生之學前後悟入語次猶詳書成而俾予爲之序論年譜書鄒守益浮峰公歸浙託書促聚復真以了先師年譜竟不􅀗報烏泉歸審去歲兄在燕􅈐舘修年譜以大水乃旋今計可脫稿爲之少慰同門群公如中離靜庵善山洛村南野皆勤勤在念又作隔世人矣努力一來了此公案師門固不藉此然後死者之責將誰執其咎佇望佇望歸自武夷勞與暑并靜養寡出始漸就瘉老年精力更湏愛惜願及時勵之風便早示瑶音以快懸跂論年譜書凡九首羅洪先數年一晤千里而來人生㡬何㡬聚散遂巳矣可不悲哉信􅀫相對受益不淺正通書爐􅈐問行踪書扇至矣好心指摘感骨肉愛兒軰何知辱誨真語且波其父兩世㗸戢如何爲報計南浦尚有數月留稍暇裁謝也年譜自别後即爲冊事奪去自朝至暮不得暇竟無頃刻相對期湏於􅀊晚圗之幸無汲汲􅀁欲語諸公者面時當不忘别後見諸友幸語􅀵靜之功居今之世百務紛紛中更不囬首寧有生意不患其不􅀤􅀭患不枯稿耳㑹語教兒軰者可以語諸友也如何天寒􅀊暮􅀌舟􅃞􅃞不知何日始抵南浦此心念之忽思年譜非細事兄亦非閑人一畨出逰一畨歳月亦無許多閑光隂湏爲决計乆留僻地一二月方可成功前􅀁言省城内外終屬終􅅝是非之塲斷非著書立言之地又不過終日揖譲飲宴而巳何益於乆處哉今爲兄計歳晚可過魯江公連山堂靜處且湏謝絶城中士友勿復徃來可乆則春中始􅀤不然初正仍鼓懐玉之棹閒居數月日間㑹友皆立常䂓如此更􅁴穩便即使栢泉公有扳留意亦勿依違如此方有定向不至優游廢事矣弟欲􅀉語并譜草亦當覔便風不長遠也􅀷思爲畫此䇿萬萬俯聽不惑人言至懇至懇玉峽人來得手書知兄拳拳譜草前遇便曽附一簡爲公畫了譜之計極周悉幸俯聽且近侍人之好尚不同訛言誚謗極䏻敗人興味縱不之顧恐於侍坐之愆不免犯瞽之戒知公必不􅃘也附此不盡倐焉改歳區區者年六十矣七十古稀亦止十年間十年月日可成何事前此只轉瞬耳可不懼哉前連二書望留兄了譜事只留魯江兄宅上百凡皆便有朋友相聚者令􅀉食於隣如此賔主安矣不然栢泉公有舘穀之令則處懐玉爲極當好景好人好日月最是難得如不肖弟者巳不得從可輕視哉省中萬不可留毋爲人言􅀁誑再囑再囑年譜一卷反覆三日稍有更正前欲書者乃合􅈟日事而觀綱上言學心若未安今巳入目於目中諸書掲標令人觸目亦是提醒人處入梓日以白黒地别之二卷三卷如舉良知之說皆可掲標於目中矣望増入不識兄今何在便風示知之正月遣使如吳江迎沈君曾附年譜稿并小簡上想巳即逹龍光之聚言之使人興動弟謬以不肖所講言之諸兄是執事說假譬以興􅀤之在諸君或有自得在不肖聞之愧耳供張不煩有司甚善只恐徃來酬應亦費時日兼彼此不便則何如諸君之意方專誠不知何以爲去留也年譜續修者望􅀉示栢泉公爲之序極善俟人至當促之來簡精詣力究四字真吾軰猛省處千載聖人不數數只為欠此四字近讀撃壤之集亦􅁴此老􅀵手太早若是孔子直是停脚不得也願共勉之承别簡數百言反覆於僕之稱謂謂僕心師陽明先生稱後學不稱門人與童時初志不副稱門人於沒後有雙江公故事可援且謬加許可以爲不辱先生門墻此皆愛僕太過特為假借推引耳在僕固有􅀁不敢竊意古人之稱謂皆據實不苟焉以著誠也昔之願學孔子者莫如孟子孟子嘗曰予未得爲孔子徒也盖嘆之也彼其嘆之云者謂未得親炙見而知之以庶㡬於速肖焉耳固未始即其願學而遂自謂之徒也夫得及門雖互鄉童子亦與其進不得及門雖孟子不敢自比於三千後之師法者宜如何哉此僕之􅀁以不敢也雖然僕於先生之學病其未有得耳如得其門稱謂之門不門何足輕重是爲僕謀者在願學不在及門也今之稱後學者恒不易易必其人有足師焉然後書之如是則僕之稱謂實興名應宜不可易若故江公興僕兩人一則嘗侍坐一則未納贄事体自别不得引以相例且使僕有不得及門之嘆將自俛焉跂而及之亦足以爲私淑之􅂇未爲戚也惟兄言廿六日吐泄大作醫云内有感冐五日後方云無事在五六日中自分與兄永訣方見門前光景未能􅀷入究意亦無柰何惟此自知耳雖父子間不能一語接也初四日復見正月廿日書始知廿四之期决不可㽞人爲悵悵盖兄在南浦一日未安則弟不能安松原一日今離去太逺此心如何此心如何見兄論夜坐詩中間指先天之病非謂先天也謂學也記得白沙夜坐有云些兒若問天根處亥子中間得最真又云吾儒自有中和在誰㑹求之未􅀤前是白沙無心於言也信口拈來自語道合白沙雖欲靳之有不可得者也不肖正欲反其意而言不自逹爲之媿媿然不敢妄言乃遵兄終身之惠不敢不敬承病戒多言復此喋喋不任惶恐附此再呈不次前病中承示行期即力疾具復未幾王使来復辱惠以年譜即日命筆裁請縁其中有當二三人細心啇量者而執事得先生真傳靣對口語不容不才億度比别様叙作用不同故須再請於執事務細心端凝曲盡當時口授大義使他年無疑於執事可也自整不妨連下或至来年總􅀉來不肖不敢不盡其愚此千載之事非一時草草然舍今不爲後一軰人更不可望矣峽江胡君知事者書來託之斷不稽緩八月十一日始得兄六月朔日書則知弟六月下旬所􅀉書未知何日至也柏泉公七月􅀤年譜來日夕相對得盡寸長平生未嘗細覽文集今一一詳究始知先生此學進爲始末之序因之頗有警悟故於年譜中手自披校凡三四易稿於兄原本似失初制誠爲僣妄弟體兄虚心求益不復敢有彼我有限隔耳如己卯十一月始自京口返江西逰匡廬庚辰正月赴召歸重逰匡廬二月九江還南昌又乙亥年自陳䟽乃已亥年考察隨例進本不應復有納忠切諌之語亦遂舉據文集改正之其原本􅀁載本稿不敢濫入豈當時先生有是稿未上歟愚意此稿只入集不應遂入年譜不及請正今已付新建君入梓惟兄善教之草草裁復不盡請正得吳堯山公書知年譜已刻成承陸北川公分惠可以逹鄙意矣綿竹共四十部此外􅀉奉龍溪兄十部伏惟鑒入雖然今􅀁傳者公之影響耳至於此學精㣲則存乎人自得之固不在有與無多與少也弟去歳至今皆在病中無􅀎復舊然為學之意日夕懇懇始知垂老惟有此事􅂃要若得影響即可還造化無他欠事也兄别去一年此件自覺如何前軰凋落􅀟翁以歸土􅀁頼倡明此學者却在吾軰吾軰若不努力稍􅁴散漫即此已矣無復可望矣得罪千古非細事也悲哉悲哉千里􅀉言不盡繾綣答論年譜書凡十首錢徳洪承兄下榻信宿對黙感教實多兄三年閉􅀜焚舟破釡一戰成功天下之太宇定矣斯道屬兄後學之慶也珎重珎重更得好心消盡生死毁譽之念忘則一體萬化之情顯盡乎仁矣如何如何師譜一經改削精彩逈别謝兄􅀧鐡成金手也東去譜草有繼上乞賜留念外詩扇二柄􅀉令郎以昭併祈賜正詩曰我昔逰懐玉而翁方閉􅀜數年論暌合豈泥形迹間今日下翁榻相對無怍顔月魄入􅄕白松標當户閒我黙鏡黯黯翁言玉􅃢􅃢劍神不費觧調古無庸彈喜爾侍翁側傾聽嶷如山見影思立圭植根貴刪䌓遠求憂得門况乃生宫闤毋恃守成易俛惟創業艱又書會語一首程門學善靜坐何也曰其憫人心之不自􅁴乎聲利百好擾擾外馳不知自性之靈烱然在獨也稍離奔􅕽黙悟真百感紛紜而真體常寂此極􅀷研㡬之學也入聖之㡬庶其得於斯乎奉讀手詔感惓惓别後之懐心同道同不忘爾我一語不遺共徹心髓真􅀁謂同心之言其􅆨如蘭也感􅅥如之何年來同志凋落慨師門情事未終此身悵悵無依今見兄誕登道岸此理在天地間巳得人主張吾身生死短長烏足爲世多寡不􅁴脫然無係矣此畨相别夫豈苟然哉宜兄之臨教益切也師譜得兄改後謄清再上尚祈必盡兄意無容遺憾乃可成書令郎美質望􅁬志以聖人爲巳任斯不辜此好􅀊月耳鄕約成冊見兄仁覆一邑可以推之天下矣信在言前不動聲色天載之神也餘惟嗣上不備别後沿途阻風舟弗􅀎前至除夜始得到龍光寺諸友群聚提兄丕顯待旦一語爲柄聽者莫不聳然反􅅥謂兄三年閉􅀜即與老師居夷處困動􅃘熟仁之意同蓋慨古人之學必精詣力䆒􅀷造獨得而後可以爲得誠非忽慢可承領也諸生於是日痛􅀤此意兄雖在關示道標的後學得􅀁趨矣喜幸喜幸城中王緝諸生夙辦柴米爲乆留計供應不渉有司五日一講會餘時二人輪班代接賔客使生得靜處了譜見其志誠懇姑與維舟信宿以試之若果如衆計從之若終渉分心必難留矣二書承示周悉同體之愛也今雖乆暫未定必行兄意不敢如前堅執硬主也栢泉公讀兄年譜􅀷喜經手自别决無可疑促完其後昨乞作序冠首兄有書逹幸督成之留稿乞付來人蓋欲付人謄真也兄於師譜不稱門人而稱後學謂師存日未􅀗及門委贄也兄謂古今稱門人其義止於及門委贄乎子貢謂得其門者或寡矣孔門之徒三千人非皆及門委贄者乎今載籍姓名七十二人之外無聞焉豈非委贄而未聞其道者與未及門者同乎韓子曰道之􅀁在師之􅀁在也夫道之􅀁在吾從而師之師道也非師其人也師之􅀁在吾從而北面之北面道也非北靣其人也兄嘗别周龍崗其序曰予年十四時聞陽明先生講學於贛慨然有志就業父母憐恤不令出户庭然毎見龍崗從贛回未嘗不憤憤也是知有志受業巳在童時而不􅀗通贄及門者非兄之心也父毋愛護之過也今服膺其學既三紀矣匪徒得其門且升其堂入其室矣而又奚歉於稱門人􅁘昔者方西樵叔賢與師同部曹僚也及聞夫子之學非僚也師也遂執弟子禮焉黄乆庵宗賢見師於京師友也再聞師學於越師也非友也遂退執弟子禮聶􅀟江文蔚見先生於存日晚生也師沒而刻二書於蘇曰吾昔未稱門生冀再見也今不可得矣時洪與汝中逰蘇設香案告師稱門生引予二人以爲証汪周潭尚寧始未信師學及提督南贛親見師遺政乃頓悟師學悔未及門而形於夣遂謁師祠稱弟子遺書於洪汝中以為証夫始未有聞僚也友也既得􅀁聞從而師事之表􅀁聞也始而未信師學於存日晚生也師沒而學明証於友形於夣稱弟子焉表􅀁信也吾兄初擬吾黨承領本體太易併疑吾師之教年來翕聚精神窮􅀷極㣲且閉􅀜三年而始信古人之學丕顯待且通晝夜合顯㣲而無間試與里人定圗徭冊終日紛􅅝自謂無異宻室乃見吾師進學次第毎於憂患顛沛百錬純鋼而自徴三年􅀁得始洞然無疑夫始之疑吾師者非疑吾師也疑吾黨之語而未詳也今信吾師者非信吾師也自信􅀁得而徴師之先得也則兄於吾師之門一啓􅀜鑰宗廟百官皆故物矣稱入室弟子又何疑乎譜草承兄改削編述師學惟兄與同今譜中稱門人以表兄信心且從童時初志也其無辭南浦之留見諸友相期懇切中亦有八九軰肯向裏求入可與共學矣亦見其中有一種異說爲不覊少年􅂇其愚狂故願與有志者反覆論正指明師㫖庶㡬望其適道諸生留此約束頗嚴但無端應酬終不出兄􅀁料已與栢泉公論别决二十日􅀤舟登懐玉矣兄第伍簡復至感一體相成之愛無窮巳也仰謝仰謝精詣力䆒昨㨿兄獨得之功而言來簡掲岀四字以示更􅁴反􅅥謂康節􅀵手太早若在孔門自不容停脚矣實際之言真􅃀有味聞者䏻無痛切乎别簡謂孟子不得爲孔子徒蓋嘆已不得親炙以成速肖也誦言及此􅀹􅀒慚恐親炙而不速肖此弟爲兄罪人也兄之􅀁執自有定見敢不如教閒中讀兄夜坐十詩詞句清絶造悟精􅀷珍味入口令人雋永比之宋儒感興諸作加一等矣幸教幸教然中有願正者與兄更詳之吾黨見得此意正宜藏蓄黙脩黙証未宜輕以示人恐學者以知觧承功未至而知先及本體作一景象非徒無益是障之也盖古人立言皆為學者設法非以自盡其得也故引而不􅀤更覺意味􅀷長然其􅀁未􅀤者亦已躍如何也至道非以言傳至徳非以言入也故歴勘古訓凡爲愚夫愚婦立法者皆聖人之言也爲聖人說道妙􅀤性真者皆賢人之言也與富家翁言惟聞創業之艱與富家子弟言惟聞享用之樂言享用之樂非不足以歆聽聞而起動作也然終不如創業者之言近而實也此聖賢之辯也調息殺機亥子諸說知兄寓言然亦宜藏黙盖學貴精最忌駁道家說性命與聖人􅀁間毫􅁵耳聖人於家國天下同爲一體豈獨自遺其身哉彼􅀁謂術皆吾脩身中之實功特不以㣲軀係念輙起絶俗之想耳􅀜尹子曰聖人知之而不爲聖人既知矣又何不爲􅁘但聖人爲道至易至簡不必别立爐灶只致良知人巳俱得矣知而不爲者非不爲也不必如此爲也夫自吾師去後茫無印正今幸兄主張斯道慨同志凋落四方講㑹雖殷可與言者亦非不多但爐中火旺㑹見有融釋時毫􅁵滓化未盡火力一去滓復凝矣更望其成金足色永無變動難也而况庸一言之雜其耳乎兄爲後學啓口容聲􅀜係匪細立言之間不可不慎也故敢爲兄妄言之幸詳述以進我情􅀜血脉不避喋喋惟兄其諒之前月二十五日舟􅀤章江南昌諸友追送阻風樵舍五日入撫州吊明水兄又十日而始出其境舟中特喜無事得安靜搆思譜草有可了之期矣乏人抄冩先録庚辰八月至癸未二月稿奉上亟祈改潤即付來手到廣信再續上出月中旬計可脫稿也龍溪兄玉山遺書謂初以念菴兄之學偏於枯稿今極耐心無有厭煩可謂得手但恐不厭煩處落見畧存一毫知觧雖無知觧畧着一些影子尚湏有針線可商量處兄以爲何如不肖復之曰吾黨學問特患不得手若真得手良知自􅀎針線自䏻商量苟又依人商量而脫則恐又落商量知解終不若良知自照刷之爲真也云云昨接兄回書云好心指摘感骨肉愛只此一言知兄真得手矣真䏻盡性盡仁致踐履之實以務求於自慊矣滄海處下盡納百川而不自知其􅀷也㤗山盤旋凌出霄漢而不自知其高也良知得手更復奚疑故不肖不以龍溪之疑而復疑兄也兄幸教焉何如舟中諸生問如何是知觧如何是影子洪應之曰念翁憫吉水徭賦不均窮民無告量巳之智足與周旋而又得當道相知信在言前􅀔又足以完此故集一邑賢大夫賢士友開局以共成此事此誠出於萬物一體誠愛惻怛之至情非有一毫外念叅於其中也若斯時有一毫是非毁譽利害人我相叅於其中必不䏻自信之真而自爲之力矣此非盡性盡仁良知真自得手烏足與語此或有一毫影子曰我閉關日乆姑假此以自試即是不􅀝靜知解終日與人紛紛而自􅁴無異宻室此即是不厭動知觧謂我雖自信而同事者或未可以盡信不信在人於我無汚此即是不汚其身之知觧謂我之首事本以利民若不耐心是遺其害矣我之首事本以宜民若不耐心是不盡人情矣我之首事本承當道之托若不耐心無以慰知巳此又落在不耐心之知解也良知自無是非毁譽利害人我之間自􅀎動靜合一自䏻人我同過自能盡人之情慰知巳之遇特不由外入起此知觧毫􅁵影子與良知本體尚隔一塵一塵之隔千里之間也諸生聞之俱覺惕然有警并附以奉陳左右亦與局中同事諸君一照刷可以􅀤一笑也幸教幸教連日與水洲兄共榻見其氣定神清真肯全體脫落猛火爐煆有得手矣自是當無退轉也但中有一種宿惑信夣爲真未易與破耳乆之當望殊途同歸然窺其㣲終有師門遺意在也師門之學未有䆒極根抵者苟􅀎一路精透始信聖人之道至廣大至精㣲儒佛老荘更無剰語矣世之學者逐逐世累固無足與論有志者又不䏻純然歸一此􅃴道之􅀁以難也吾師開悟後學汲汲求人終未有與之敵體承領者臨别之時稍承剖悉但得老師一期望而巳未嘗滿其心而去也數十年來因循􅀊月姑􅀒此翁􅀁幸吾兄得手今又得水洲共學師道尚有頼也但願簡易直截於人倫日用間無事㨂擇便入神聖師門之囑也大學一書此是千古聖學宗要望兄更加詳䆒畧渉疑議便易入躐等徑約之病也慎之慎之即日上懐玉期完譜尾以承批教歸日當卜出月終旬也譜草苟完方是懐玉下七盤嶺忽接手教開緘宛如見兄於少華􅈐下淸灑殊絶感賜􅀷也四卷􅀁批種種皆至意先師千百年精神同門逡巡數十年且日凋落不肖學非夙悟安敢輙承非兄極力主裁慨然舉筆許與同事不敢完也又非栢泉公極力主裁名山勝地􅀷居廪食不能完也豈先師精神前此乆未就者時有􅀁待耶伸理冀元亨一叚如兄數言簡而核後當俱如此下筆也聞老師遣冀行爲劉養正來致濠慇懃故冀有此行荅其禮也兄􅀁聞核幸即裁之鋪張二字最切病端此貧子見金而喜也平時稍有得每與師意㑹便起賛嘆稱羡富家子只作如常茶飯見金而起喜心者貧子態也此非老成持重如兄巨眼安䏻覷破兄即任意盡削之不肖得兄舉筆無不快意决無護持疼痛也信之信之教學三變諸處俱如此例若不可改盡削去之其餘􅀁批要􅀵不可少處此弟之見正竊比於兄者自古聖賢未有不由憂勤􅅥勵而􅀎成其徳業今之學者只要􅀃㣲妙玄通凌躐超頓在言語見觧上轉殊不知老師與人爲善之心只要實地用功其言自謙遜卑抑大學誠意章惟不自欺者其心自謙非欲謙也心常不自足也兄􅀁批教處正見近來實得與師意同也舒國裳在師門文録無􅀁見惟行福建市舶司取至軍門一牌傳習續録則與陳維濬夏于中同時在坐問荅語頗多且有一叚持􅁓乞冩拱把桐梓一章欲時讀以省師寫至至於身而不知􅀁以養之句因與座中諸友笑曰國裳中過狀元來豈尚不知􅀁以養時讀以自警􅁘在座者聞之皆竦然汗皆此東廓語也又丙午年逰安福復古書院諸友說張石盤初不信師學人有辯者張曰豈有好人及其門􅁘辯者曰及門皆好人也張曰東廓豈及門乎辯者曰巳在贛及門矣又曰舒國裳豈及門乎曰國裳在南昌及門矣張始黙然俛首後亦及門是年石磐擕其子㑹復古其子舉人至今常在㑹未有及門之說昨南昌聞之諸友相傳因問律吕元聲乃心服而拜蓋其子姪軰叙其及門之端也昨見兄疑又檢中離續同志考舒芬名在列則其諸􅀁相傳者不誣也如兄之教去前不欲一叚存後問元聲語可矣徐冊嘗爲師刻居夷集蓋在癸未年及門則辛巳年九月非龍塲時也􅁇後可商量處甚多兄有􅀁見任舉筆裁之兹遣徐生時舉持全集面正門下弟心力巳竭雖聞指教更不能再著思矣惟兄愛諒之不肖五月季旬到舎下又踰月十日始接兄二月四日峽江書一隔千里片紙之通遂難若此感慨又何􅀷也玉體乆平復在懐玉巳得之柏泉兄兹讀來諭更覺相警之情也􅀷入䆒竟雖父子之間不䏻一語接誠然誠然此可與千古相感而不可與對面相傳在有志者自䆒自竟之耳天根亥子白沙詩中亦泄此意逹性命之㣲者信口拈來自與道合但我陽明先師全部文集無非此意特無一言攙入者爲聖學立大防也兄之明教究悉然於此處幸再詳之兄卧處卑濕早晚亦湏開􅀜徑行登跳以舒泄蔽鬱之氣此亦去病之一端也徐時舉來師譜當巳出稿乞早遣􅀤逺仰逺仰春來與王敬􅀁爲赤城會歸天真始接兄峽江書兼讀師譜考訂感一體相成之心慶師教之有傳也中間題綱整㓗増録數語皆師門精義匪徒慶師教之有傳亦以驗兄閉􅀜􅀁得黙與師契不疑其􅀁行也去年歸自懐玉黄滄溪讀譜草與見吾肖溪二公互相校正亟謀梓行未㡬滄溪物故見吾閩去刻將半矣六卷巳後尚得証兄考訂然前刻巳定不得盡如􅀁擬俟畨刻當以兄考訂本爲正也中間増采文録外集傳習續録數十條弟前不及録者是有說願兄詳之先師始學求之宋儒不得入因學養生而沉酣於二氏恍若得􅀁入焉至龍塲再經憂患而始豁然大悟良知之㫖自是出與學者言皆􅀤誠意格物之教病學者未易得􅀁入也每談二氏猶若津津有味盖將假前日之􅀁入以爲學者入門路徑辛巳以後經寜藩之變則獨信良知单頭直入雖百家異術無不具足自是指􅀤道要不必假途傍引無不曲暢旁通故不肖刻文録取其指􅀤道要者爲正録其渉假借者則􅁵爲外集譜中􅀁載無非此意盖欲學者志專歸一而不疑其􅀁徃也師在越時同門有用功懇切而泥於舊見鬱而不化者時出一險語以激之如水投石於烈熖之中一擊盡碎纎滓不留亦千古一大快也聽者於此等處多好傳誦而不䆒其􅀤言之端譬之用藥對症雖芒硝大黄立見竒効若不得症未有不因藥殺人者故聖人立教只指掲學問大端使人自証自悟不欲以峻言隠語立偏勝之劑以快一時聽聞防其後之足以殺人也師沒後吾黨之教日多岐矣洪居吳時見吾黨喜爲髙論立異說以爲親得師傳而不本其言之有自不得已因其􅀁舉而指示立言之端􅀻録數條未敢示人不意爲好事者􅀼録甲午主試廣東其録已入嶺表故歸而刪正刻傳習續録於水西實以破傳者之疑非好爲多述以聳學者之聽也故譜中俱不􅁒采入而兄今節取而増述焉然刪刻苦心亦不敢不謂兄一論破也願更詳之室遠書劄徃復甚難何時合併再圗面証以了未盡之􅀻徳教在思窹􅄰如見惟不惜遐音仰切仰切是書復去念菴隨以計報竟不及一見痛哉痛哉王文成公全書卷之三十六
