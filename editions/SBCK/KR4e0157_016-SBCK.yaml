  text: 王文成公全書卷之二十一
  hash: sha256:8f074e4843a718215096678b155bf165d7589afa01e9faa7d12d672b11699805
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_016-1a}
body:
  text: 外集三書答佟太守求雨癸亥昨楊李二丞來備傳尊教且詢致雨之術不勝慚悚今早諶節推辱臨復申前請􅀹為懇至令人益増惶懼天道幽逺豈凡庸􅀁䏻測識然執事憂勤為民之意真切如是僕亦何可以無一言之復孔子云丘之禱乆矣蓋君子之禱不在扵對越祈祝之際而在扵日用操存之先執事之治吾越㡬年扵此矣凡􅀁以爲民祛患除弊興利而致福者何莫而非先事之禱而何俟扵今日然而暑旱尚存而雨澤未應者豈别有􅀁以致此者歟古者歳旱則爲之主者减膳徹樂省獄薄賦修祀典問疾苦引咎賑乏爲民遍請扵山川社禝故有叩天求雨之􅀕有省咎自責之文有歸誠請改之禱盖史記􅀁載湯以六事自責禮謂大雩帝用盛樂春秋書秋九月大雩皆此􅀋也㒒之􅀁聞扵古如是未聞有􅀁謂書符呪水而可以得雨者也唯後世方術之士􅂉時有之然彼皆有髙潔不汚之操特立堅􅃘之心雖其􅀁爲不必合於中道而亦有以異扵尋常是以或能致此然皆出小􅀃而不見扵􅀴傳君子猶以為附㑹之談又况如今之方士之流曾不少殊於市井囂頑而欲望之以揮斥雷電呼吸風雨之事豈不難㢤僕謂執事且宜出齋於􅆹事罷不急之務開省過之門洗簡􅁈􅆡禁抑奢繁淬誠滌慮痛自悔責以爲八邑之民請於山川社稷而彼方士之祈請者聼民間從便得自爲之但弗之禁而不專􅀝以爲重􅁿夫以執事平日之􅀁操存苟誠無愧於神眀而又臨事省􅅥躬帥僚屬致懇乞誠雖天道亢旱亦自有數使人事良修旬日之内自宜有􅀿㒒雖不肖無以自别扵凡民以誠使可有致雨之術亦安忍坐視民患而恬不知顧乃勞執事之㒒㒒豈無人之心者耶一二日内㒒亦􅀅禱扵南鎮以助執事之誠執事其但為民悉心以請毋惑扵邪􅀃毋急扵近名天道雖逺至誠而不動者未之有也答毛憲副戊辰昨承遣人喻以禍福利害且今勉赴太府請謝此非道誼深情决不至此感激之至言無􅀁容但差人至龍􅂣陵侮此自差人挾􅀔擅威非太府使之也龍􅂣諸夷與之争闘此自諸夷憤愠不平亦非某使之也然則太府固未嘗辱某某亦未嘗傲太府何􅀁得罪而􅃍請謝乎跪拜之禮亦小官常分不足以為辱然亦不當無故而行之不當行而行與當行而不行其為取辱一也廢逐小臣􅀁守以待死者忠信禮義而已又棄此而不守禍莫大焉凡禍福利害之􅀃某亦嘗講之君子以忠信為利禮義為福苟忠信禮義之不存雖禄之萬鍾爵以侯王之貴君子猶謂之禍與害如其忠信禮義之􅀁在雖剖心碎首君子利而行之自以為福也况扵流離􅇡逐之微乎某之居此盖瘴癘蠱毒之與䖏魑魅魍魉之與逰日有三死焉然而居之泰然未嘗以動其中者誠知生死之有命不以一朝之患而忘其終身之憂也太府苟􅁒加害而在我誠有以取之則不可謂無憾使吾無有以取之而横罹焉則亦瘴癘而已爾蠱毒而巳爾魑魅魍魉而已爾吾豈以是而動吾心㢤執事之諭雖有􅀁不敢承然因是而益知􅀁以自勵不敢茍有􅀁隳堕則某也受教多矣敢不頓首以謝與安宣慰戊辰某得罪朝廷而来惟􅇡伏隂厓幽谷之中以禦魍魉則其􅀁宜故雖夙聞使君之髙誼經旬月而不敢見若甚簡伉者然省愆内訟痛自削責不敢比數扵冠裳則亦逐臣之禮也使君不以為過使廩人餽粟庖人餽肉園人代薪水之勞亦寧不貴使君之義而諒其為情乎自惟罪人何可以辱守土之大夫懼不敢當輙以禮辭使君復不以為罪昨者又重之以金帛副之以鞍馬禮益隆情益至某益用震悚是重使君之辱而甚逐臣之罪也愈有􅀁不敢當矣使者堅不可郤求其􅀃而不得無已其周之乎周之亦可受也敬受米二石􅂵炭雞鵞悉受如来數其諸金帛鞍馬使君􅀁以交扵卿士大夫者施之逐臣殊駭觀聴敢固以辭伏惟使君䖏人以禮恕物以情不至再辱則可矣二戊辰減驛事非罪人􅀁敢與聞承使君厚愛因使者至閑問及之不謂其遂逹諸左右也悚息悚息然已承見詢則又不可黙凡朝廷制度定自祖宗後世守之不可以擅改在朝廷且謂之變亂况諸侯乎縦朝廷不見罪有司者􅀅執法以繩之使君必且無益縦幸免扵一時􅂉五六年􅂉八九年雖逺至二三十年矣當事者猶得持典章而議其後若是則使君何利焉使君之先自漢唐以来千㡬百年土地人民未之􅂉改􅀁以長乆若此者以􅀎世守天子禮法竭忠盡力不敢分寸有􅀁違是故天子亦不得喻禮法無故而加諸忠良之臣不然使君之土地人民富且盛矣朝廷悉取而郡縣之其誰以爲不可夫驛可減也亦可増也驛可改也宣慰司亦可革也由此言之殆甚有害使君其未之思耶􅀁云奏功陞職事意亦如此夫剗除冦盗以撫綏平良亦守土之常職今縷舉以要賞則朝廷平日之恩寵禄位顧􅀅欲以何為使君為叅政亦已非設官之舊今又干進不巳是無抵極也衆必不堪夫宣慰守土之官故得以世有其土地人民若叅政則流官矣東西南北惟天子􅀁使朝廷下方尺之檄委使君以一職􅂉閩􅂉蜀其敢弗行乎則方命之誅不旋踵而至捧檄􅀙事千百年之土地人民非復使君有矣由此言之雖今日之叅政使君􅀅恐辭去之不速其又可再乎凡此以利害言揆之扵義反之扵心使君必自有不安者夫拂心違義而行衆􅀁不與􅀑神所不嘉也承問及不敢不以正對幸亮察三戊辰阿賈阿札等畔宋氏為地方患傳者謂使君使之此雖􅂉出扵妬婦之口然阿賈等自言使君嘗錫之以氈刀遺之以􅃓弩雖無其心不幸乃有其迹矣始三堂两司得是􅀃即欲聞之扵朝既而以使君平日忠實之故未必有是且信且疑姑令使君討賊茍遂出軍勦撲則傳聞皆妄何可以濫及忠良其􅂉坐觀逗遛徐議可否亦未為晚故且􅀮忍其議􅀁以待使君者甚厚既而文移三至使君始出衆論紛紛疑者􅀅信喧騰之際適㑹左右来獻阿麻之首偏師出解洪􅁁之圍群公又復徐徐今又三月餘矣使君稱疾歸卧諸軍以次潜囬其間分屯寨堡者不聞擒斬以宣􅀦威惟増剽掠以重民怨衆情愈益不平而使君之民罔􅀁知識方􅀭言扵人謂宋氏之難當使宋氏自平安氏何與而反為之役我安氏連地千里擁衆四十八萬深坑絶坉飛鳥不􅀎越猿猱不􅀎攀縦遂髙坐不為宋氏出一卒人亦卒如我何斯言已稍稍傳播不知三堂两司已嘗聞之否使君誠乆卧不出安氏之禍必自斯言始矣使君與宋氏同守土而使君為之長地方變亂皆守土者之罪使君􅀎獨委之宋氏乎夫連地千里孰與中土之一大郡擁衆四十八萬孰與中土之一都司深坑絶坉安氏有之然如安氏者環四面而居以百數也今播州有􅀭愛愷黎有楊友酉陽保靖有彭世麒等諸人斯言茍聞扵朝朝廷下片􅁓扵楊愛諸人使各自爲戰共分安氏之􅀁有盖朝令而夕無安氏矣深坑絶坉何􅀁用其險使君可無寒心乎且安氏之職四十八支更迭而爲今使君獨傳者三世而群攴莫敢爭以朝廷之命也苟有可乗之釁孰不􅁒􅁸而代之乎然則揚此言扵外以速安氏之禍者殆漁人之計蕭墻之憂未可測也使君宜速出軍平定反側破衆讒之口息多端之議弭方興之變絶難測之禍􅀘既徃之愆要􅀅来之福某非為人作􅀃客者使君幸熟思之答人問神仙戊辰詢及神仙有無兼請其事三至而不答非不􅁒答也無可答耳昨令弟来必􅁒得之僕誠生八􅀊而即好其􅀃今已餘三十年矣齒漸揺動髪巳有一二莖變化成白目光僅􅄹尺聲聞凾丈之外又常經月卧病不出藥量驟進此殆其効也而相知者猶妄謂之􅀎得其道足下又妄聽之而以見詢不得已姑為足下妄言之古有至人淳徳凝道和扵隂陽調扵四時去世離俗積精全神逰行天地之間視聽八逺之外若廣成子之千五百􅀊而不衰李伯陽歴商周之代西度凾谷亦嘗有之若是而謂之曰無疑扵欺子矣然則呼吸動静與道為體精骨完乆禀扵受氣之始此殆天之􅀁成非人力可強也若後世㧞宅飛昇􅀧化投奪之􅀋譎怪竒駭是乃秘術曲技尹文子􅀁謂幻釋氏謂之外道者也若是而謂之曰有亦疑扵欺子矣夫有無之間非言語可况存乆而明養深而自得之未至而強喻信亦未必􅀎及也盖吾儒亦自有神仙之道顔子三十二而卒至今未亡也足下􅀎信之乎後世上陽子之流盖方外技術之士未可以為道若逹磨慧䏻之徒則庶㡬近之矣然而未易言也足下􅁒聞其􅀃湏退䖏山林三十年全耳目一心志􅅐中洒洒不掛一塵而後可以言此今去仙道尚逺也妄言不罪答徐成之壬午承以朱陸同異見詢學術不明扵世乆矣此正吾儕今日之􅀁宜明辨者細觀来教則輿庵之主􅁚山既失而吾兄之主晦庵亦未為得也是朱非陸天下之論定乆矣乆則難變也雖微吾兄之爭輿庵亦豈䏻􅃍行其􅀃乎故僕以為二兄今日之論正不必求勝務求象山之􅀁以非晦庵之􅀁以是窮本極源真有以見其㡬微得失扵毫忽之間若明者之聽訟其事之曲者既有以辨其情之不得已而辭之􅀡者復有以察其䖏之􅂉未當使受罪者得以伸其情而􅀗伸者亦有􅀁不得辭其責則有以盡夫事理之公即夫人心之安而可以俟聖人扵百世矣今二兄之論乃若出扵求勝者求勝則是動扵􅂔也動扵氣則扵義理之正何啻千里而又何是非之論乎凡論古人得失决不可以意度而懸㫁之今輿庵之論象山曰雖其專以尊徳性為主未免堕扵禪學之虚空而其持守端實終不失為聖人之徒若晦庵之一扵道問學則支􅄐决裂非復聖門誠意正心之學矣吾兄之論晦庵曰雖其專以道問學為主未免失扵俗學之支離而其循序漸進終不背扵大學之訓若象山之一扵尊徳性則虚無寂滅非復大學格物致知之學矣夫既曰尊徳性則不可謂墮扵禪學之虚空墮扵禪學之虚空則不可謂之尊徳性矣既曰道問學則不可謂失扵俗學之支離失扵俗學之支離則不可謂道問學矣二者之辨間不容髪然則二兄之論皆未免扵意度也昔者子思之論學盖不下千百言而括之以尊徳性而道問學之一語即如二兄之辨一以尊徳性為主一以道問學為事則是二者固皆未免扵一偏而是非之論尚未有􅀁定也烏得各持一是而􅃍以相非為乎故僕􅂅二兄置心扵公平正大之地無務求勝夫論學而務以求勝豈􅀁謂尊徳性乎豈所謂道問學乎以其􅀁見非獨吾兄之非象山輿庵之非晦庵皆失之非而吾兄之是晦庵輿庵之是象山亦皆未得其􅀁以是也稍暇當面悉姑務養心息辨毋􅃍二壬午昨􅀁奉答適有逺客酬對紛紜不暇細論姑􅂅二兄息未定之爭各反䆒其所是者必已􅀁是已無絲髪之憾而後可以及人之非早来承教乃為僕漫為含胡两解之􅀃而細繹辭㫖若有以隂助輿庵而為之地者讀之不覺失咲曾謂吾兄而亦有是言耶僕嘗以為君子論事當先去其有我之􅀻一動扵有我則此心已䧟扵邪僻雖􅀁論盡合扵理既已亡其本矣嘗以是言扵朋友之間今吾兄乃云爾敢不自反其殆䧟扵邪僻而弗覺也求之反復而昨者􅀁論實未嘗有是則斯言也無乃吾兄之過歟雖然無是心而言之未盡扵理未得為無過也僕敢自謂其言之已盡扵理乎請舉二兄之􅀁是者以求正輿庵是象山而謂其專以尊徳性為主今􅀚象山文集􅀁載未嘗不教其徒讀書窮理而自謂理㑹文字頗與人異者則其意實欲體之扵身其亟􅀁稱述以誨人者曰居䖏恭執事敬與人忠曰克已復禮曰萬物皆備扵我反身而誠樂莫大焉曰學問之道無他求其放心而已曰先立乎其大者而小者不􅀎奪是數言者孔子孟軻之言也烏在其為空虚者乎獨其易簡覺悟之􅀃頗為當時􅀁疑然易簡之􅀃出扵繫辭覺悟之􅀃雖有同扵釋氏然釋氏之􅀃亦自有同扵吾儒而不害其為異者惟在扵㡬微毫忽之間而已亦何必諱扵其同而遂不敢以言狃扵其異而遂不以察之乎是輿庵之是象山固猶未盡其􅀁以是也吾兄是晦庵而謂其專以道問學為事然晦庵之言曰居敬窮理曰非存心無以致知曰君子之心常存敬畏雖不見聞亦不敢忽􅀁以存天理之本然而不使離扵湏􅁷之頃也是其為言雖未盡瑩亦何嘗不以尊徳性為事而又烏在其為支􅄐者乎獨其平日汲汲扵訓解雖韓文楚辭隂符參同之屬亦必與之註釋考辯而論者遂疑其玩物又其心慮恐學者之躐等而􅂉失之扵妄作使必先之以格致而無不明然後有以實之扵誠正而無􅀁謬世之學者掛一漏萬求之愈繁而失之愈逺至有敝力終身苦其難而卒無􅀁入而遂議其支離不知此乃後世學者之弊而當時晦庵之自為則亦豈至是乎是吾兄之是晦庵固猶未盡其􅀁以是也夫二兄之􅀁信而是者既未盡其􅀁以是則其􅀁疑而非者亦豈必盡其􅀁以非乎然而二兄徃復之辯不􅀎一反焉此僕之􅀁以疑其􅂉出扵求勝也一有求勝之心則已亡其學問之本而又何以論學為㢤此僕之􅀁以惟􅂅二兄之自反也安有􅀁謂含胡两解而隂為輿庵之地者㢤夫君子之論學要在得之扵心衆皆以為是苟求之心而未㑹焉未敢以爲是也衆皆以爲非苟求之心而有􅆻焉未敢以爲非也心也者吾􅀁得扵天之理也無間扵天人無分扵古今苟盡吾心以求焉則不中不逺矣學也者求以盡吾心也是故尊徳性而道問學尊者尊此者也道者道此者也不得扵心而惟外信扵人以爲學烏在其爲學也已僕嘗以爲晦庵之與象山雖其􅀁爲學者若有不同而要皆不失爲聖人之徒今晦庵之學天下之人童而習之既已入人之深有不容扵論辨者而獨惟象山之學則以其嘗與晦庵之有言而遂藩籬之使若由賜之殊科焉則可矣而遂擯放廢斥若碔砆之與美玉則豈不過甚矣乎夫晦庵折􅂨群儒之􅀃以􅀤明六經語孟之㫖扵天下其嘉惠後學之心真有不可得而議者而􅁚山辨義利之分立大本求放心以示後學篤實為巳之道其功亦寧可得而盡誣之而世之儒者附和雷同不究其實而㮣目之以禪學則誠可􅁈也已故僕嘗欲冐天下之譏以為象山一􅁀其􅀃雖以此得罪無恨僕扵晦庵亦有罔極之恩豈􅁒操戈而入室者顧晦庵之學既已若日星之章明扵天下而象山獨􅂪無實之誣于今且四百年莫有為之一洗者使晦庵有知􅀅亦不䏻一日而安享扵廟廡之間矣此僕之至情終亦必為吾兄一吐者亦何肯漫為两解之􅀃以隂助扵輿庵輿庵之􅀃僕猶恨其有未盡也夫學術者今古聖賢之學術天下之􅀁公共非吾三人者􅀁􅀻有也天下之學術當為天下公言之而豈獨為輿庵地㢤兄又舉太極之辨以為象山扵文義且有􅀁未䏻通暁而其強辨自信曾何有扵􅀁養夫謂其文義之有未詳不害其為有未詳也謂其􅀁養之未至不害其為未至也學未至扵聖人寕免太過不及之差乎而論者遂欲以是而盖之則吾恐晦庵禪學之譏亦未免有激扵不平也夫一則不審扵文義一則有激扵不平是皆􅀁養之未至昔孔子大聖也而猶曰假我數年以學易可以無大過仲虺之賛成湯亦惟曰改過不吝而已􅀁養之未至亦何傷扵二先生之為賢乎此正晦庵􅁚山之氣象􅀁以未及扵顔子明道者在此吾儕正當仰其􅀁以不可及而黙識其􅀁未至者以為􅆂養規切之方不當置偏􅀻扵其間而有􅀁附㑹増損之也夫君子之過也如日月之食人皆見之更也人皆仰之而小人之過也必文世之學者以晦庵大儒不宜復有􅀁謂過者而必曲為隱飾増加務詆象山扵禪學以求伸其􅀃且自以為有助扵晦庵而更相倡引謂之扶持正論不知晦庵乃君子之過而吾反以小人之見而文之晦庵有聞過則喜之美而吾乃非徒順之又􅀙而為之辭也晦庵之心以聖賢君子之學期後代而世之儒者事之以事小人之禮是何誣象山之厚而待晦庵之薄邪僕今者之論非獨為象山惜實為晦庵惜也兄視僕平日扵晦庵何如㢤而乃有是論是亦可以諒其為心矣惟吾兄去世俗之見宏虚受之咸勿求其必同而察其􅀁以異勿以無過為聖賢之髙而以改過為聖賢之學勿以其有􅀁未至者為聖賢之諱而以其常懐不滿者為聖賢之心則兄與輿庵之論􅀅有不待辨􅀃而釋然以自解者孟子云君子亦仁而已何必同惟吾兄審擇而正之答儲柴墟壬申盛价来適人事紛紜不及細詢比来事既還却殊怏怏承示劉生墓誌此實友義􅀁􅀜文亦縝宻獨叙乃父側室事頗傷忠厚未刻石刪去之為佳子扵父過諌而過激不可以為㡬稱子之美而􅀤其父之隂􅀻不可以為訓宜更詳之喻及交際之難此殆謬扵􅀻意君子與人惟義􅀁在厚薄輕重已無􅀁􅀻焉此􅀁以為簡易之道世人之心雜扵計較毀譽得䘮交扵中而眩其當然之則是以䖏之愈周計之愈悉而行之愈難夫大賢吾師次賢吾友此天理自然之則豈以是為炎凉之嫌㢤吾兄以僕扵今之公卿若某之賢者則稱謂以友生若某與某之賢不及扵某者則稱謂以侍生豈以矯時俗炎凉之弊非也夫彼可以為吾友而吾可以友之彼又吾友也吾安得而弗友之彼不可以為吾友而吾不可以友之彼又不吾友也吾安得而友之夫友也者以道也以徳也天下莫大扵道莫貴扵徳道徳之􅀁在齒與位不得而干焉僕扵某之謂矣彼其無道與徳而徒有其貴與齒也則亦貴齒之而已然若此者與之見亦寡矣非以事相臨不徃見也若此者與凡交㳺之隨俗以侍生而来者亦隨俗而侍生之􅀁謂事之無害扵義者􅀙俗可也千乗之君求與之友而不可得非在我有􅀁不屑乎嗟乎友未易言也今之􅀁謂友􅂉以藝同􅂉以事合狥名逐􅀔非吾􅀁謂輔仁之友矣仁者心之徳人而不仁不可以爲人輔仁求以全心徳也如是而後友今特以技藝文辭之工地􅀔聲翼之重而鷔然􅁒以友乎賢者賢者弗與也吾兄技藝炎凉之􅀃貴賤少長之論殆皆有未盡歟孟子曰友也者不可以有挾孟獻子之友五人無獻子之家者也曽以貴賤乎仲由少顔路三􅀊囬由之贈䖏盖友也囬與曾􅀧同時參曰昔者吾友曾以少長乎􅀅矯時俗之炎凉而自畔扵禮其間不􅀎以寸矣吾兄又以僕扵後進之来其質美而才者多以先後軰相䖏其庸下者反待以客禮疑僕别有一道是道也奚有扵别凡後進之来其才者皆有意扵斯道者也吾安得不以斯道䖏之其庸下者不過世俗泛然一接吾亦世俗泛然待之如鄉人而巳昔伊川􅀄與吕希哲為同舎友待之友也既而希哲師事伊川待之弟子也謂敬扵同舎而慢扵弟子可乎孔子待陽貨以大夫待囬賜以弟子謂待囬賜不若陽貨可乎師友道廢乆後進之中有聰明特逹者頗知求道徃徃又為先軰待之不誠不諒其心而務假以虚禮以取恱扵後進干待士之譽此正􅀁謂病扵夏畦者也以是師友之道日益淪沒無由復明僕常以為世有周程諸君子則吾固得而執弟子之役乃大幸矣其次有周程之髙弟焉吾猶得而􅀻淑也不幸世又無是人有志之士倀倀其􅀅焉求乎然則何䏻無憂也憂之而不以責之已責之已而不以求輔扵人求輔扵人而待之不以誠終亦必無􅀁成而已耳凡僕扵今之後進非敢以師道自䖏也􅀅求其聰明特逹者與之講明因以自輔也彼自以後進求正扵我雖不師事我固有先後軰之道焉伊川􅉂目而坐㳺楊侍立不敢去重道也今世習扵曠肆憚扵檢飾不復知有此事幸而有一二後進畧知求道為事是有復明之機又不誠心直道與之􅀤明而徒閹然媚世苟且阿俗僕誠痛之惜之傳曰師嚴然後道尊道尊然後民知敬學夫人必有􅀁嚴憚然後言之而聼之也審施之而承之也肅凡若此者皆求以明道皆循理而行非有容􅀻扵其間也伊尹曰天之生斯民也使先知覺後知使先覺覺後覺予天民之先覺也非予覺之而誰也是故大知覺扵小知小知覺扵無知大覺覺扵小覺小覺覺扵無覺夫已大知大覺矣而後以覺扵天下不亦善乎然而未􅀎也遂自以小知小覺而不敢以覺扵人則終亦莫之覺矣仁者固如是乎夫仁者已􅁒立而立人已􅁒逹而逹人僕之意以為已有分寸之知即􅁒同此分寸之知扵人已有分寸之覺即􅁒同此分寸之覺扵人人之小知小覺者益衆則其相與為知覺也益易以明如是而後大知大覺可期也僕扵今之後進尚不敢以小知小覺自䖏譬之凍餒之人知耕桑之可以足衣食而又偶聞藝禾􅀣桑之法􅀅試為之而遂以告其凡凍餒者使之共為之也亦何嫌扵已之未甞􅀣藝而遂不以告之乎雖然君子有諸已而後求諸人僕盖未嘗有諸已也而可以求諸人乎夫亦謂其有意扵僕而来者耳承相問輒縷縷至此有未當者不惜徃復二壬申昨者草率奉報意在求正不覺蕪冗承長箋批答推許過盛殊増悚汗也来喻責㒒不以師道自䖏恐亦未為誠心直道顧僕何人而敢以師道自䖏㢤前書􅀁謂以前後軰䖏之者亦謂僕有一日之長而彼又有求道之心者耳若其年齒相若而無意扵求道者自當如常待以客禮安得例以前後軰䖏之是亦妄人矣又况不揆其来意之如何而抗顔以師道自居世寧有是理邪夫師法者非可以自䖏得也彼以是求我而我以是􅀿之耳嗟乎今之時孰有􅀁謂師云乎㢤今之習技藝者則有師習舉業求聲利者則有師彼誠知技藝之可以得衣食舉業之可以得聲利而希美官爵也自非誠知已之性分有急扵衣食官爵者孰肯􅀙而求師㢤夫技藝之不習不過乏衣食舉業之不習不過無官爵巳之性分有􅀁蔽悖是不得為人矣人顧明彼而暗此也可不大哀乎徃時僕與王寅之劉景素同逰太學毎季考寅之恒居景素前列然寅之自以為講貫不及景素一旦執弟子禮師之僕毎嘆服以為如寅之者真可為豪傑之士使寅之易此心以求道亦何聖賢之不可及然而寅之􅀎扵彼不􅀎扵此也曾子病革而易簀子路臨絶而結纓横渠撤虎皮而使其子弟􅀙講扵二程惟天下之大勇無我者􅀎之今天下波頽風靡為日已乆何異扵病革臨絶之時然又人是巳見莫肯相下求正故居今之世非有豪傑獨立之士的見性分之不容已毅然以聖賢之道自任者莫之􅀙而求師也吾兄又疑後進之来其資稟意向雖不足以承教若其齒之相逺者恐亦不當㮣以客禮相待僕前書􅀁及蓋與有意扵斯道者相屬而言亦謂其可以客可以無客者耳若其齒數邈絶則名分具存有不待言矣孔子使闕黨童子􅀅命曰吾見其居扵位也見其與先生並行也非求益者也􅁒速成者也亦未嘗無誨焉雖然此皆以不若己者言也若其徳器之夙成識見之超詣者雖生扵吾後數十年其大者吾師次者吾友也得以齒序論之㢤人歸􅃍劇極潦草便間批復可否不一一答何子元壬申来書云禮曽子問諸侯見天子入門不得終禮廢者㡬孔子曰四又問諸侯相見揖入門不得終禮廢者㡬孔子曰六而日食存焉曽子曰當􅀕而日食太廟火其􅀕也如之何孔子曰接􅀕而巳矣如牲至未殺則廢孟春扵此有疑焉天子崩太廟火后夫人之䘮雨霑服失容此事之不可期􅂉適相值若日食則可預推也諸侯行禮獨不容以少避乎􅀕又何必專扵是日而匆匆扵接􅀕㢤牲未殺則􅀕廢當殺牲之時而不知日食之候者何也執事幸以見教千萬千萬承喻曽子問日食接􅀕之􅀃前此蓋未嘗有疑及此者足見為學精察深用嘆服如某淺昧何足以辨此古者天子有日官諸侯有日御日官居卿以底日日御不失日以授百官之朝豈有當􅀕之日而尚未知有日食者夫子答曾子之問􅀼意春秋之時日官多失其職固有日食而弗之知者矣尭命羲和敬授人時何重也仲康之時去尭未逺羲和已失其職迷扵天象至日食罔聞知故有㣧之征降及商周其職益輕平王東遷政教號令不及扵天下自是而後官之失職又可知矣春秋􅀁書日食三十有六今以左傳考之其以皷用牲幣于社及其他變常失禮書者三之一其以官失其職書者四之二凡日食而不書朔日者杜預皆以為官失之故其必有考也經恒公十七年冬十月朔日有食之傳曰不書日官失之也僖公十五年夏五月日有食之傳曰不書朔與日官失之也則傳固已言之矣襄公之二十七年冬十二月乙􅆗朔日有食之而傳曰辰在申司暦過也再失閏矣夫推􅀱之繆至扵再失閏則日食之不知殆其細者矣古之祭者七日戒三日齋致其誠敬以交扵神明謂之當祭而日食則固已行禮矣如是而中輟之不可也接者疾速之義其儀節固已簡略接祭則可两全而無害矣况此以天子嘗禘郊社而言是乃􅀦之大祀若其他小祭則􅂉自有可廢者在權其䡖重而䖏之若祭于太廟而太廟火則亦似有不得不廢者然此皆無明文􅀼意其然不識髙明且以為何如也上􅀳溪司馬戊寅郴衡諸䖏群孽漏殄尚多蓋縁進勦之時彼省土兵不甚用命而廣兵防夾又復稍遲是以致此其在目今若無㐫荒之災兵革之釁料亦未敢動作但恐一二年後則有􅀁不􅀎保耳今大征甫息􅀔既未可䡖舉而地方新􅇜土兵之擾復不堪重困􅀅紓目前之患不過添立屯堡若􅁒稍為經乆之圗亦不過建立縣治然此二端彼省鎮廵已嘗㑹奏舉行生雖復徃豈􅀎别有區畫但度其事􅀔屯堡之設雖可以張布聲威然使守瞭日乆未免怠弛散歸無事則虚具名數冐費糧餉有急則張皇賊􅀔復湏調兵此其􅀔之􅀁必至者惟建縣一事頗為得䇿又聞􅀁設縣分乃􅀲分两省三縣之地彼此各吝土地人民豈肯安然割巳􅀁有以資異省别郡必有紛爭異同之論未􅀎歸一則立縣之舉􅀔亦未易克就既承責委亦巳遣人再徃詢訪苟有利弊稍可禆益者當復舉請但因閩事孔􅁄遥聞廟堂之議亦􅁒繆以見責故且未敢輒徃郴桂然􅃙書又未見到則閩中亦不敢􅃍徃旦夕諮訪其事頗悉㒹末大槩閩中之變亦由積漸􅀁致其始作扵延平􅁇􅀤扵邵武又􅁇􅀤扵建寧􅀤扵汀漳􅀤扵沿海諸衛􅀁其間驚閧雖小大不一然亦皆因倡扵前者畧無懲創遂敢效􅀹而興今省城渠魁雖已授首人心尚爾驚惶未定邵武諸䖏􅀹不可測急之必致變縦而不問􅀅来之禍􅀹有不可勝言者蓋福建之軍縦恣驕驁已非一日既無漕運之勞又無征戍之役飽食安坐徭賦不及居則朘民之膏血以供其糧有事返藉民之子弟而為之闘有司豢養若驕子百姓疾畏如虎狼稍不如意呼呶群聚而起焚掠居民綁笞官吏氣􅆋􅀁加帖然惟其􅀁􅁒而後已今其􅀔既盈如􅀅潰之隄岌乎洶洶匪朝伊夕雖有智者難善其後固非迂劣如守仁者􅀁􅀎辦此也又况積弱之軀百病侵剥近日復聞祖母病危日夜痛苦方寸巳亂豈復堪任臨期敗事罪戮益重輒敢先以情訴伏望曲加矜憫改授􅀎者使生得全首領歸延殘息扵田野非生一人之幸實一省數百萬生靈之幸也情蹙辭隘忘其突冐死罪死罪二巳􅆗齎奏人回毎辱頒教接引開慰勤惓懇惻不一而足仁人君子愛物之誠與人之厚雖在木石亦當感動激􅀤而况扵人乎無􅀎報謝銘諸心腑而已生始懇䟽乞歸誠以祖母掬育之恩思一面為訣後竟牽􅆡兵戈不及一見卒抱終天之痛今老父衰疾又復日亟而地方已幸無事且􅂪朝廷曾有賊平来􅀃之㫖若再拘縛使不􅀗一申其情後雖萬死無以贖其痛恨矣老先生亦何惜一舉手投足之勞而不以曲全之乎今生已移疾舟次若復􅀱命不至㫁亦逃歸死無􅀁憾老先生亦何惜一舉手投足之勞而必􅁒置之有罪之地乎情隘辭迫瀆冐威嚴臨􅁓涕泣不知􅀁云死罪死罪上彭幸庵壬午不孝延禍先子自惟罪逆深重乆擯絶扵大賢君子之門矣然猶強息忍死未即殞滅又復有􅀁控􅈼者痛惟先子平生孝友剛直言行一出其心之誠然而無􅀁飾扵其外與人不為􅁁幅而至扵當大義臨大節則毅然􅁬卓而不可囬奪忝􅀙大夫之後逮事先朝亦既荐􅀍知遇中遭逆瑾之變退伏田野忠貞之志抑而不申近幸中興之㑹聖君賢相方與振廢起舊以彂舒幽枉而先子則長已矣徳藴壅閼而未宣終􅀅冺溷扵俗豈不痛㢤伏惟執事才徳勲烈動一世忠貞之節剛大之氣屹然獨峙百撼不揺真足以㢘頑而立懦天子求舊圗新復起以相海内仰望其風采凡天下之韜伏堙􅆡窒而求通絀而求直者莫不延頸跂足望下風而奔訴况先子素辱知與不肖􅀌亦嘗受教扵門下近者又􅂪為之刷垢雪􅁾繆承推引之恩蓋不一而足者反自踈外不一以其情為請是委先子扵溝壑而重棄扵大賢君子也不孝之罪不滋為甚歟先子之沒有司以贈謚乞非執事之憫之也而為之一表白焉其敢覬覦扵萬一乎荒迷懇迫不自知其僣罔瀆冒死罪死罪寄楊􅃉庵閣老壬午􅀌聞之昔古之君子之葬其親也必求名世大賢君子之言以圗其不朽然而大賢君子之生不數數扵世固有世有其人而不􅀗同其時者矣又有同其時而限扵􅀔分無由自通扵門墻之下者矣則夫圖不朽扵斯人者不亦難乎痛惟先君宅心制行庶亦無愧扵古人雖已忝在公卿之後而􅇜時未乆志未大行道未大明取嫉權奸歛徳而歸今則復長已矣不孝􅀌􅀅以是􅀊之冬舉葬事圖􅀁以爲不朽者惟墓石之誌爲重伏惟明公道徳文章師表一世言論政烈儀刑百辟求之昔人蓋歐陽文忠范文正韓魏公其人也􅀁謂名世之大賢君子非明公其誰歟不幸而生不同時也則亦已矣幸而猶及在後進之末雖明公固􅀁不屑揮之門墻之外猶􅀅冐昧強顔而入焉况先君素辱知與不肖􅀌又嘗在屬吏之末受敎受恩懐知已之感有道􅁩骨肉之愛邇者又嘗辱使臨吊寵之以文詞惻然憫念其遺􅀌而不忍􅃍棄遺之者是以忘其不孝之罪犯僣踰之戮而輙敢以誌爲請伏惟明公休休容物篤厚舊故甄陶一世之士而各􅁒成其名􅀵録小大之才而惟恐沒其善則如先君之素受知愛者其忍靳一言之惠而使之泯然無聞扵世耶不腆先人之幣敢以陸司業之状先扵􅀅命者惟明公特垂哀矜生死受賜世世子孫捐軀殞命未足以為報也不勝惶悚㒹越之至荒迷無次二癸未前日嘗奉啓計已上逹自明公進秉機宻天下士夫忻忻然動顔相慶皆為太平可立致矣門下鄙生獨切生憂以為猶甚難也亨屯傾否當今之時舎明公無可以望者則明公雖􅁒逃避乎此􅀅亦有􅀁不􅀎然而萬斛之舵操之非一手則緩急折旋豈􅀎盡如己意臨事不得專操舟之權而僨事乃與同覆舟之罪此鄙生之􅀁謂難也夫不專其權而漫同其罪則莫若預迯其任然在明公亦既不􅀎逃矣逃之不䏻專又不得則莫若求避其罪然在明公亦終不得避矣天下之事果遂卒無􅀁為歟夫惟身任天下之禍然後􅀎操天下之權操天下之權然後􅀎濟天下之患當其權之未得也其致之甚難而其歸之也則操之甚易萬斛之舵平時􅀙而爭操之者以利存焉一旦風濤㒹沛變起不測衆方皇惑震䘮救死不遑而誰復與爭操乎扵是起而專之衆􅀅恃以無恐而事因以濟苟亦􅀙而委靡焉固淪胥以溺矣故曰其歸之也則操之甚易者此也古之君子洞物情之向背而握其機察隂陽之消長以乗其運是以動必有成而吉無不利伊旦之扵商周是矣其在漢唐蓋亦庶㡬乎此者雖其學術有所不逮然亦足以定國本而安社稷則亦㫁非後世偷生茍免者之􅀁􅀎也夫權者天下之大利大害也小人竊之以成其惡君子用之以濟其善固君子之不可一日去小人之不可一日有者也􅁒濟天下之難而不操之以權是猶倒持太阿而授人以柄希不割矣故君子之致權也有道本之至誠以立其徳植之善􅀋以多其輔示之以無不容之量以安其情擴之以無􅀁競之心以平其氣昭之以不可奪之節以端其向神之以不可測之機以攝其奸形之以必可頼之智以􅀵其望坦然爲之下以上之退然爲之後以先之是以功盖天下而莫之嫉善利萬物而莫與爭此皆明公之􅀎事素􅀁蓄而有者惟在倉卒之際身任天下之禍决起而操之耳夫身任天下之禍豈君子之得已哉既當其任知天下之禍􅀅終不􅀎免也則身任之而巳身任之而後可以免扵天下之禍小人不知禍之不可以倖免而百詭以求脱遂致醸成大禍而巳亦卒不􅀎免故任禍者惟忠誠憂􅀦之君子􅀎之而小人不􅀎也某受知門下不􅀎効一得之愚以為報獻其芹曝伏惟鑒其忱悃而憫其􅀁不逮幸甚三丁亥某素辱愛下然乆不敢奉状者非敢自外扵門墙實以地位懸絶不􅁒以寒暄無益之談塵瀆左右蓋避嫌之事賢者不為然自嘆其非賢也非才多病待罪閑散猶懼不堪乃今復􅂪顯擢此固明公不遺下體之盛某亦寜不知感激但量䏻度分自計巳審貪冐茍得異時僨事􅀅為明公知人之累此􅀁以聞命驚惶而不敢當耳謹具奏辭免祈以原職致仕伏惟明公因材而篤扵所不􅀎特賜曲成俾得歸延病喘扵林下則未死餘年皆明公之賜其為感激寕有窮巳乎懇切至情不覺瀆冐伏冀宥恕不具四丁亥􅀼惟大臣報􅀦之忠莫大扵進賢去䜛故前者两奉起居皆嘗僣及此意亦其自信山林之志巳堅而又素受知巳之愛不當復避嫌疑故率意言之若此廼者忽䝉两廣之命則是前日之言適以為已地也悚懼何以自容乎某以迂踈之才口耳講􅀃之學耳簿書案牘巳非其􅀎而况軍旅之重乎徃􅀊江西之役實亦僥倖偶成近年以来憂病積集尫羸日甚惟養疴丘園為鄉里子弟考訂句讀使知向方庶扵保身及物亦稍得効其心力不致為天地間一蠧此其自䖏亦既審矣聖天子方勵精求治而又有老先生主張􅀦是扵上茍有襪線之長者不扵此時出而自效則亦無其􅀁矣老先生徃􅀊方秉銓軸時有以􅁁警薦用彭司馬者老先生不可曰彭始成功今􅂉少挫非􅀁以完之矣老先生之愛惜人才而欲成就之也如此至今相傳以爲美談今獨不􅀎以此意而推之某乎懇辭䟽上望賜曲成使得苟延喘息俟病痊之後老先生不忍終廢必􅁒強使一出則如留都之散部或南北太常􅀦子之任量其力之可􅀎者使之自效則圗報當有日也不勝恃愛懇瀆幸賜矜察􅀉席元山癸未某不孝延禍先子罪逆之深自分無復比數扵人仁人君子尚未之知憫念其舊逺使存録重以多儀號慟拜辱豈勝哀感豈勝哀感伏惟執事長才偉志上追古人進徳勇義罕與儔匹向見鳴􅁈録及承􅀁􅀉道山書院記蓋信道之篤任道之勁海内同志莫敢有望下風者矣何幸何幸不肖方在苦毒中意􅀁欲請者千萬荒迷割裂莫得其端緒使還􅃍臨䟽昏塞不盡􅀁云答王亹庵中丞甲申徃􅀊旌節臨越猥􅂪枉顧其時憂病懵懵不及少申欵曲自後林居􅂴僻成性平生故舊不敢通音問企慕之懐雖日以積竟未􅀎一奉起居其為傾渇如何可言使来逺辱問惠登拜感怍舎親宋孔瞻亦以書来備道執事勤勤下問之盛不肖奚以得此近世士夫之相與􅀋多虚文彌誑而實意衰薄外和中妬狥􅀻敗公是以風俗日惡而世道愈降執事忠信髙明克勤小物長才偉識翹然海内之望而自視欿然逺念不遺若古之君子有而若無以􅀎問扵不􅀎者也僕誠喜聞而樂道自顧何徳以承之僕巳無􅀁可用扵世顧其心痛聖學之不明是以人心䧟溺至此思守先聖之遺訓與海内之同志者講求切劘之庶亦少資扵後學不徒生扵聖明之朝然蔽惑既久人是其非其􅀎虚心以相聽者鮮矣若執事之徳盛禮恭而與人爲善此誠僕􅀁􅂅效其愚者然又邑里隔絶無因握手一叙其爲傾渇又如何可言耶雖然目擊而道存僕見執事之書既已知執事之心雖在千萬里外當有不言而信者謹以新􅈓小書二冊奉求敎正蓋鄙心之􅀁􅁒效者亦畧具扵其中矣便間幸示與陸清伯甲申惟乾之事􅀅申而遂沒痛㢤􅁈乎不如是無以明區區罪惡之重至扵貽累朋友不如是無以彰諸君之篤扵友道痛㢤􅁈乎不有諸君在則其身沒之後􅀅莫知􅀁在矣况有爲之衣衾棺殮者乎是則猶可以見惟乾平日爲善之報扵大不幸之中而尚有可幸者存也嗚呼痛哉即􅁒爲之一洗自度事􅀔未􅀎􅃍脫􅂉必湏進京􅀱到京日再與諸君商議而行之苟遂歸休終湏一舉庶可少泄此痛耳其歸䘮一事托王􅀖相為之經理倘有不便湏僕到京圗之未晚也行李倥偬中未暇悉􅀁􅁒言千萬心照與黄誠甫甲申近得宗賢􅀉示禮䟽明甚誠甫之議當無不同矣古之君子恭敬樽莭退讓以明禮僕之􅀁望扵二兄者則在此而不在彼也果若是以為斯道之計進扵議禮矣先妻不幸扵前月奄逝方在悲悼中􅆘陳子文徃草草布間闊二甲申别乆極渇一語子莘来備道諸公進修亦殊慰大抵吾人習染已久湏得朋友相夾持離群索居即未免隳惰諸公既同在留都當時時講習為佳也三乙酉盛价来領手札知有貴恙且喜漸平復矣賤軀自六月暑病然两目􅂪蒙两耳蓬蓬㡬成廢人僅存微息旬日前元忠宗賢過此留數日北去山廬卧病期少謝人事而􅀿接亦多今復歸卧小閣省愆自訟而已聞有皷枻之興果爾良慰渇望切磋砥礪之益彼此誠不無也與黄勉之乙酉承􅁒刻王信伯遺言中間極有獨得之見非餘儒􅀁及惜其零落既乆後學莫有傳之者因勉之􅀉此又知程門有此人也幸甚幸甚中間如論明道伊川䖏似未免尚有執著然就其所到已甚髙明特逺不在㳺楊諸公之下矣中間可省畧者刪去之為佳凡刻古人文字要在􅀤明此學惟簡明切實之為貴若支辭蔓􅀃徒亂人耳目者不傳可也髙明以為何如復童克剛乙酉春􅀄枉顧時承以八䇿見示鄙意甚不為然旣而思之皆學術不明之故姑且與克剛講學未暇細論䇿之是非旬日之後學術漸明克剛知見豁然如白日之開雲霧遂翻然悔其􅀄志即欲焚棄八䇿以為自此以後誓不復萌此等好髙務外之念矣當時同志諸友無不嘆服克剛以為不憚改過而勇扵􅀙善若此人人皆自以為莫及也盛价逺来忽辱長箋巨冊諄諄懇懇意求刪改前䇿􅀅圗復上與臨别丁寕意大相矛盾豈間闊之乆切磋無力遂爾迷誤至此耶易曰君子思不出其位若克剛斯舉乃􅀁謂思出其位矣又曰不易乎世不成乎名遁世無悶憂則違之若克剛斯舉是易乎世而成乎名非遁世無悶憂則違之之謂矣克剛向䖏山林未嘗知有朝廷事體今日羣司之中縉紳士夫之列其間高明剴切之論經畧康濟之謨何􅀁不有如八䇿中􅀁陳蓋已不知㡬十百人㡬十百上矣寕復有俟扵克剛耶克剛此舉雖亦仁人志士之心然夜光之璧無因而投人亦且按劍而怒况此八䇿者特克剛之敝箒耳亦何保嗇之深而必以投人為㢤若此䇿遂上亦非獨不見施行且􅀅有指摘非訾之者其為克剛之累不小小也克剛亦何苦而汲汲扵為是哉八䇿之中􅀋皆老生常談惟第五䇿扵地方利害頗有相􅀜然亦不過訴状之詞一有司聽之足矣而克剛乃以為致治垂統之一䇿得無以身家之故遂為利害􅀁蔽而未暇深思之耶明者一覽如見肺肝但克剛不自知耳昔者顔子在陋巷簞瓢孔子賢之夫陋巷簞瓢豈遂至扵人不堪憂其間蓋亦必有患害屈抑常情􅀁不􅀎當如克剛今日之􅀁􅇜際者矣若其時遂以控之扵時君世主􅦓􅦓屑屑求白扵人豈得復謂之賢乎禹稷昌言扵朝過門不入以有大臣之責也今克剛居顔子陋巷之地而乃冐任禹稷之憂是宗祝而代庖人之割希不傷手矣冊末授受之􅀃似未端的此則姑留扵此俟後日再講至扵八䇿㫁㫁不宜復留遂㑹同志諸友共付丙丁為克剛焚此魔障克剛自此但宜􅀵歛精神日以忠信進徳為務黙而成之不言而信不見是而無悶可也與鄭啓範侍御丁亥某愚不自量痛此學之不講而􅀼有志扵􅀤明之自以劣弱思得天下之豪傑相與扶持砥礪庶㡬其􅀎有成故毎聞海内之高明特逹忠信而剛毅者即欣慕愛樂不啻骨肉之親以是扵吾啓範雖未及一面之識而心孚神􅆻已如白首之交者亦數年矣毎得封事讀之其間廼有齒及不肖者則又為之赧顔汗背促蹐不安古之君子耻有其名而無其實吾扵啓範惟切磋之是望乃不考其實而過情以譽扵朝異時茍有不稱􅀅使啓範為失言矣如之何而可不肖志雖切扵求學而質本迂狂踈謬招􅀹速謗自其􅀁宜近者復聞二三君子以不肖之故相與憤爭力辯扵鑠金銷骨之地至扵衝􅄡冐刃而弗顧僕何以當此㢤二三君子之心豈不如青天白日誰得而瑕滓之者顧僕自反亦何敢自謂無愧則不肖之軀􅀅不免爲輕雲薄霧扵二三君子者矣如之何而可病軀􅂴放日乆巳成廢人尚可勉強者惟宜山林之下讀書講學而已两廣之任㫁非􅀁堪已具䟽懇辭必不得請恐異日終爲知已之憂也言不􅀎謝惟自鞭䇿以期無􅀒相知庶以爲報耳答方叔賢丁亥乆不奉状非敢自外實以憂疾頻仍平生故舊􅀋不敢通問在吾兄誠不當以此例視然廣士之来逰者相踵山中啓䖏時時聞之簡札虚文似有不必然者吾兄當􅀎亮之也聖主聰明不世出諸公既􅂪知遇若此安可不一出圗報今日􅀁急惟在培養君徳端其志向扵此有立政不足間人不足謫是謂一正君而􅀦定然此非有忠君報􅀦之誠其心㫁㫁休休者亦只好議論粉飾扵其外而已矣僕積衰之餘病廢日甚豈復更堪兵甲驅馳之勞况䜛搆未息又可復出而冐為之乎懇辭䟽下望與扶持得具養疴林下稍俟痊復出而圗報非晚也二丁亥昨見邸報知西樵兀崖皆有舉賢之䟽此誠士君子立朝之盛節若干年無此事矣深用嘆服但與名其間却有一二未暁者此恐鄙人淺陋未􅀎知人之故然此乃天下治亂盛衰􅀁繫君子小人進退存亡之機不可以不慎也此事譬之養􅁞但􅇎一爛􅁞扵其中則一筐好􅁞盡為􅀁壊矣凡薦賢扵朝與自已用人又自不同自已用人權度在我故雖小人而有才者亦可以器使若以賢才薦之扵朝則評品一定便如白黒其間舎短録長之意若非明言誰復知之小人之才豈無可用如砒硫芒硝皆有攻毒破壅之功但混扵參苓耆术之間而進之養生之人萬一用之不精鮮有不誤者矣僕非不樂二公有此盛舉正恐異日􅂉為此舉之累故輒叨叨當不以為罪也思田事貴鄉徃来人當􅀎道其詳俗諺􅀁謂生事事生此􅀋是矣今其事體既已壊盡􅁒以無事䖏之要已不􅀎只求减省一分則地方亦可减省一分勞攘耳鄙見畧具奏内深知大拂喜事者之心然欲殺數千無罪之人以其求一已之功仁者之􅀁不忍也齎奏人去凡百望指示之舟次草草未盡鄙懐千萬鑒恕與黄宗賢丁亥僕多病積衰潮􅀬痰􅎳日甚一日皆吾兄所自知豈復􅀎堪戎馬之役者况䜛搆未息而徃年江西􅀙義􅀅士至今查勘未已徃徃廢業傾家身死牢獄言之實為痛心又何面目見之今若不量可否冐昧輕出非獨精力决不􅀎支極其事􅀔正如無舵之舟乗飄風而泛海終􅀅何所止泊乎在諸公亦不得不為多病之人一慮此也懇辭䟽下望相扶持終得養疴林下是幸席元山䘮已還蜀否前者奠辭想巳轉逹天不愸遺此痛何極數日間唐生自黄巖歸知宅上安好世恭書来備道佳子弟悉知向方可喜間附知之二丁亥得書知别後動定且知世事之難為人情之難測有若此者徒増慨嘆而巳朽才病廢百念俱息忽承重􅀉豈復􅀎堪若懇辭不􅀗自此􅀅為知巳之憂矣柰何柰何江西功次固不足道但已八年餘矣尚爾查勘未息致使効忠赴義之士廢産失業身死道途縦使江西之功盡出冐濫獨不可比扵留都湖浙之賞乎此事終湏一白但今日言之又若有挾而要者柰何柰何木翁旬日間亦且啓行矣此老慎黙簡重當出流軰但精力則向衰若如兀崖之論欲使之破長格以用財不顧天下之毀譽榮辱以力主􅀦議則恐􅀔有􅀁未􅀎盡行耳因論偶及幸自知之東南小蠢特瘡疥之疾群僚百司各懐䜛嫉黨比之心此則腹心之禍大為可憂者近見二三士夫之論始知前此諸公之心尚未平貼姑待釁耳一二當事之老亦未見有同寅恊恭之誠間聞有口􅀙面䛕者退省其􅀻多若讐􅄷病廢之人愛莫為助􅀼為諸公危之不知若何而可以善其後此亦不可不早慮也兵部差官還病筆草草附此西樵兀崖皆不及别簡望同致意近聞諸公似有徳色傲容者果爾􅀅重失天下善􅀋之心矣相見間可􅀮言及之三丁亥近得邸報及親友書聞知石龍之扵區區乃無􅀁不用其極若此而西樵兀崖諸公愛厚勤拳亦復有加無已深用悚懼嗟乎今求朝廷之上信其有事君之忠憂世之切當事之勇用心之公若諸公者復何人㢤若之何而不足悲也諸公既為此一大事出世則其事亦不得不然但扵不肖則似猶有溺愛過情者異日恐終不免為諸公知人之累耳悚懼悚懼思田之事本亦無大緊要只為􅀙前張皇太過後来遂不可輕易􅀵拾􅀁謂天下本無事在人自擾之耳其畧巳具奏詞今徃一通必得朝廷如奏中􅀁請則地方庶可以圗乆安不然反覆未可知也賤軀患咳原自南贛蒸暑中得来今地益南氣􅀋感觸咳􅀤益甚恐竟成痼疾不復可藥地方之事苟幸塞責山林田野則惟其宜矣他尚何􅀃㢤西樵兀崖家事極為時軰􅀁擠排殊可駭嘆此亦皆由學術不明近来士夫專以客氣相尚凡􅀁毁譽不惟其是惟其多且勝者是附是和是以至此近日来接見者畧巳一講巳覺豁然有省􅀤䖏自後此等意思亦當漸消除京師近来事體如何君子道長則小人道消疾病既除則元氣亦當自復但欲除疾病而攻治太厲則亦􅁕以耗其元氣藥石之施亦不可不以漸也木翁邃老相與如何􅀎不􅀌海内之望否亦在諸公相與調和此如行舟若把舵不定而東撑西曵亦何以致逺渉險今日之事正湏同舟共濟耳齎本人去凡百望指示四戌子两廣大􅀔罷敝巳極非得誠扵為􅀦為民強力有為者為之數年未可以責効也思田之患則幸巳平靖其間三五大巢乆為廣西諸賊之根株淵藪者亦已用計剿平就今日乆困積􅁈之民言之亦可謂之太平無事矣病軀咳患日増平生極畏炎暑今又深入炎毒之鄉遍身皆􅀤腫毒旦夕動􅂂且有不􅀎若廵撫官再􅀱旬月不至亦只得且為歸休之圗待罪扵南贛之間耳聖天子在上賢公卿在朝真􅀁謂明良相遇千載一時鄙人世受􅀦恩􅀙大臣之末固非果扵忘世者平生亦不喜為尚節求名之事何忍􅃍言歸乎自度病􅀔非還故土就舊醫决􅀅日甚一日難復療治不得不然耳静庵東羅見山西樵兀崖諸公聞京中方嚴書禁故不敢奉啓諸公既當事且湏持之以鎮定乆逺今一旦名位俱極固非諸公之得已是廼聖天子崇徳任賢更化善治非常之舉諸公當之亦誠無媿但貴不期驕滿不期溢賢者充養有素何俟人言更湏警惕朝夕謙虚自居其􅀁以感恩報徳者不必務速効求近功要在誠心實意為乆逺之圗庶不􅀒聖天子今日之舉而亦不􅀒諸公今日之出矣僕扵諸公誠有道義骨肉之愛故不覺及此㑹間幸轉致之五戊子前齎奏去曾具白區區心事不審已􅀎遂􅀁􅂅否自入廣来精神頓衰雖因病患侵凌水土不服要亦中年以後之人其􅀔亦自然至此以是懐歸之念日切誠恐坐廢日月上無益扵􅀦家下無以􅀤明此學竟成虚度此生耳柰何柰何春􅀄思田之議悉􅂪朝廷裁􅁢遂活數萬生靈近者八寨㫁藤之役實以一方􅂗炭既極不得巳而為救焚之舉乃不意遂􅀗平靖此非有諸公相與恊賛力主扵内何由而致是乎書去各致此感謝之􅀻相見時更望一申其懇懇廵撫官乆未見推僕非厭外而希内者實􅁒早還郷里耳恐病􅀔日深歸之不及一生未了心事石龍其􅀎為我恝然乎身在而後道可弘皮之不存毛􅀅焉附諸公不敢輙以此意奉告至扵西樵當亦􅀎諒扵是矣􅂚亦相與曲成之地方䖏置數事附進自度已不􅀎了此倘遂􅁢行亦所謂盡心焉耳已舟次伏枕草草不盡所懐答見山􅃁宰丁亥向齎本人去曾奉短札計已逹左右矣朽才病廢寧堪重托懇辭之䟽必湏朝廷憐准與其他日􅂪顚覆之戮孰若今日以是􅀗罪乎東南小夷何足以動煩朝廷若此致有今日皆由憤激􅀁成以主上聖明徳威所􅀍指日自􅀅平定但廟堂之上至今未有同寅恊恭之風此則殊爲可憂者耳不知諸公竟何以感化而斡旋之大抵䜛邪不逺則賢士君子㫁不􅀎安其位以有為扵時自昔當事諸公亦豈盡不知進賢而去不肖之為美顧其平日本無忠君愛國之誠不免阿時附俗以苟目前之譽卒之恱䛕信䜛終扵蔽賢病􅀦而巳矣来官守催力遣數四始肯還病筆草草未盡傾企與霍兀崖宫端丁亥徃􅀊曾辱大禮議見示時方在哀疚心善其􅀃而不敢奉復既而元山亦有示使者必求復書草草作答意以􅀁論良是而典禮已成當事者未必􅀎改言之徒益紛爭不若姑相與講明扵下俟信􅀙者衆然後圗之其後議論既興身居有言不信之地不敢公言扵朝然士夫之問及者亦時時為之辨析期在委曲調停漸求挽復卒亦不􅀎有益也後来頼諸公明目張膽已申其義然如倒倉滌胃積􅌎􅀫痰雖亦快然一去而病􅀔亦甚危矣今日急務惟在扶養元氣諸公必有回陽奪化之妙矣僕衰病陋劣何足以與扵斯耶數年来頻罹疾搆痰􅎳潮􅀬日益尫羸僅存喘息無復人間意矣乃者忽承两廣之推豈獨任非其才是蓋責以其力之􅀁必不􅀎支􅀅以用之而實以斃之也懇辭䟽下望相與扶持曲成使得就醫林下幸而痊復量力圗報尚有時也答潘直卿丁亥逺承遣問情意藹切兼復奨與過分僕何以得此㢤僕何以當此㢤媿悚媿悚病廢日乆習成懶放雖問水尋山漸亦倦興况茲軍旅之役豈其精力􅀁復􅀎堪已具䟽懇辭必湏得請始可免扵後悔不然􅀅不免爲知已之憂矣柰何柰何寧潘之役湖浙及留都之有功者皆已陞賞獨江西功次今已六七年矣尚爾查勘未息今復􅁒使之荷戈􅀙役僕􅀅何辭以出號令亦何面目見之賞罰􅀦之大典今乃用之以快恩􅄷若此僕一人不足惜其如􅀦事何連年乆分廢棄此等事不復掛之齒牙今疼痛切身不覺呻吟之􅀤不知畢竟何如而可耳知子文道長尚未至且不作書見時望致意寄翟石門閣老戊子思田之議悉􅂪裁􅁢遂活一方數萬之生靈近者八寨㫁藤之役實以生民􅂗炭旣極不得已而為之救焚之舉乃不意遂􅀗平靖此非有魏公力主扵朝則金城之議無因而定非有裴公賛决扵内則淮蔡之績何由而成今日之事敢忘其􅀁由来乎齎奏人去輒申感謝之誠并附起居之敬但惟六月徂征衝冐瘴疫􅀅士危險頗異他時稍得沾濡亦少慰其勤苦耳䖏置地方數事附進得􅂪賛􅁢􅀹為萬幸舟中伏枕莫既下懐伏祈鑒亮􅀉何燕泉戊子某乆卧山中習成懶僻平生故舊音問皆踈遥聞執事養髙歸郴越東楚西何因一話煙水之涯徒切瞻望而已去􅀊復以兵革之役扶病強出殊乖始願正如野麋入市投足揺首皆成駭觸忽枉箋敎兼辱佳章捧誦洒然蓋安石東山之髙靖節柴桑之興執事兼而有之矣仰嘆可知地方事茍幸平靖伏枕巳踰月旬日後亦且具䟽乞還果遂􅀁圗雖不􅀗握手林泉然郴嶺之下稽山之麓聊復同此悠悠之懐也使来值湖兵正還兼有計䖏地方之奏冗冗乃爾乆稽又未􅀎細請臨􅁓惘然伏冀照亮不具王文成公全書卷之二十一終
