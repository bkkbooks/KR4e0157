front:
  text: 王文成公全書卷之十二
  hash: sha256:eb240fcc813a517e679da55415c31d28256f72a44e98f29568240b1ab4f7e388
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_007-1a}
body:
  text: 别録四奏䟽飛報寜王謀反䟽十四年六月十九日正徳十四年六月􅀄五日節該欽奉勑福州三衛軍人進貴等脅衆謀反特命爾暫去彼處地方㑹同查議處置叅奏定奪欽此欽遵臣扵本月􅀄九日自贛州啓行至本月十五日行至豐城縣地名黄土腦據該縣知縣等官顧佖等禀稱本月十四日寜府稱亂将孫都御史許副使并都司等官殺死巡按及三司府縣大小官員不從者俱􅀍執縛不知存亡各衙門印信盡數􅀵去庫藏搬搶一空見􅁥重囚俱行釋放舟楫蔽江而下聲言直取南京一靣分兵北上各官皆來沮臣不宜輕進其時臣尚未信然迯亂之民果已四散奔潰人情洶洶臣亦自顧單旅危途􅀔難復進方爾回程随有兵卒千餘已夾江並進前來追臣偶遇北風大作臣亦張疑設計整舟安行兵不敢逼幸而􅀗免本月十八日回至吉安府據知府伍文定等禀稱地方無主乞留暫回區畫逺近軍民亦皆遮擁呼號随據臨江府并新淦豐城奉新等縣各差人飛報寜府遣兵四出攻掠拘收印信及拿掌印官員調取兵快水兊糧船盡􅀍驅脅而去等因臣奉前㫖欲遂徑徃福建但天下之事莫急扵君父之難若彼順流東下萬一南都失備為彼􅀁襲彼将乗勝北趨旬月之間必且動揺京輔如此則勝􅀒之算未有􅀁歸此誠天下安危之大機慮念及此痛心寒骨義不􅃘舎之而去故遂入城撫慰軍民督同知府等官武文定等調集兵糧號召義勇又約㑹致仕鄉官右副都御史王懋中飬病評事羅僑等與之定謀設策收合渙散之心作起忠義之氣相機乗間務為躡後之圖共成掎角之􅀔牽其舉動而使進不得前搗其巢穴而使退無􅀁據日望天兵之速至庶觧東南之倒懸伏望皇上省愆咎巳命将出師因難興􅀖未必非此臣以弱劣多病屢䟽乞休况此地方之責本亦非臣之任今兹扶疾赴閩實亦意圖便道歸省臨發之前已具哀懇齎奏之人去􅂊數日適當君父之急不忍失此事機姑復暫留期紓國難候區畫少定各官畧可展布朝廷命師一臨亦遂遵照前㫖入閩了事就彼歸省父疾進不避嫌退不避罪惟民是保而利扵主臣之心也直行其報國之誠而忘其緩命之罪求伸其哀痛之情而甘冐棄職之誅臣之罪也竊照都御史王懋中評事羅僑忠義自許才識練逹知府伍文定果捷能㫁忠勇有謀累立戰功皆抑而不賞乆淹外郡實屈而未伸今江西闔省見無一官若待他求緩無􅀁及乞遂将各官授以􅂃要職任庶可責之拯溺救焚其餘若裁革兵備副使羅循飬病副使羅欽徳􅀰中曾直御史周魯同知郭祥鵬省親進士郭持平驛丞李中王思等雖皆本土之人咸秉忠貞之節况亦見在同事當多難之日事宜􅀙􅁠庶克有濟再照寕府逆謀既著彼若北趨不遂必将還取兩浙南􅅰湖湘窺留都以㫁南北收閩廣以益軍資若不即為控制急遣重兵必将噬臍無及及照撫州府知府陳槐臨江府知府戴徳孺贛州府知府邢珣􅀽州府知府徐璉寜都縣知縣王天與豐城縣知縣顧佖新淦縣知縣李羙奉新縣知縣劉守緒㤗和縣知縣李楫南安府同知朱憲贛州府同知夏克義龍泉縣知縣陳􅁢諧及闔省各官今見在者乞勑吏部就扵其中推􅀘本省方面知府兵備等官庶可速令供職其有城守之責者亦各量陞職銜重其􅁠􅀔使可展布又照南贛軍餉惟資塩啇諸稅近因戸部奏革顧募之兵無􅀁仰給悉巳散遣今未兩月即遇此變復欲召募将􅀝何資輒復遵依勑㫖便宜事理仍舊舉行然亦緩不及濟必湏先扵兩廣積儲軍餉數内量借一十餘萬庶㡬軍衆可集地方有頼國難可平縁係飛報地方謀反重情事理為此具本專差舎人來儀親齎謹題請㫖再報謀反䟽十四年六月二十一日節該欽奉勑福州三衛云云縁係飛報地方謀反重情事理為此具本先扵本月十九日專差舎人來儀奏報外但叛黨方盛恐中途爲􅀁攔截合再具本專差舎人任光親齎謹題請㫖乞便道省葬䟽十四年六月二十一日臣以父老祖䘮屢䟽乞休未􅂪憐准近者奉命扶􅍚赴閩意圖了事即􅀙此地冐罪迯歸旬日之前亦巳具奏不意行至中途遭值寕府反叛此係􅀦家大變臣子之義不容舎之而去又闔省撫巡方面等官無一人見在者天下事機間不容髮故復􅃘死暫留扵此爲牽制攻討之圖俟命師之至即􅀙􅀄心死無􅀁避臣思祖毋自㓜鞠育之㤙不及一面爲訣毎一號慟割裂昬殞日加尫瘠僅存殘喘毋䘮權厝祖墓之側今葬祖毋亦欲因此改葬臣父衰老日甚近因祖䘮􅂘泣過節見亦病卧苫廬臣今扶病驅馳兵革徃來扵廣信南昌之間廣信去家不數日欲􅀙其地不時乗間抵家一哭略爲經畫葬事一省父病臣區區報􅀦血誠上通扵天不辭㓕宗之禍不避形迹之嫌冐非其任以勤國難亦望朝廷鍳臣之心不以法例䋲縛使臣得少伸烏鳥之痛臣之感恩死且圖報搶攘哀控不知􅀁云縁係懇乞天恩便道省葬事理為此具本奏聞奏聞宸濠偽造檄榜䟽十四年七月􅀄五日正徳十四年七月􅀄一日據吉安府知府伍文定申准領哨通判楊昉千戸蕭英在扵墨潭地方捉􅀗寕府齎檄榜官趙承芳等二十員名觧送到臣㸔得檄榜妄言惑衆譏訕主上當即毁裂又以事合聞奏随即固封以進審據趙承芳供係南昌府學教授六月十三日寕府生日次日各官謝宴突起反謀殺死孫都御史許副使囚死黄叅議馬主事其餘大小職官脅􅀙不遂者俱􅀍􅁥禁追奪印信放囚刼庫邀截兊米分遣逋㓂四散摽掠聲言要取南京就徃北京十六日親出城外迎取安福縣舉人劉飬正十七日迎取致仕都御史李士實該入府内號稱軍師太師名目二十一日将原禁各官放回各司差人看守二十二日令承芳并叅政季斆代齎偽檄榜文赴豐城吉安贛州南安并王都御史及廣東南雄等處俱各不寫正徳年號止稱大明已卯􅀊比承芳等不合怕死及因妻子􅀍拘旗校管押只得依聴齎至墨池地方􅂪本院防哨官兵将承芳等拿􅀗随審季斆供係先任南安府知府近陞廣西叅政装帶家小由水路赴任行至省城適遇寕王生日傳令慶賀次日随衆謝宴變起倉卒俱􅀍􅁥禁比斆自分死􅀦因妻女在船寫書令妻要死夫女俱死毋後因㸔守愈嚴求死不遂至二十一日放囬本船懵死良乆方甦二十二日又将妻女拘執急呼斆進府将前偽檄榜差旗校十二人督押斆與承芳代齎斆計欲投赴軍門脫身報効不期官兵執送前來等因案照先為飛報地方謀反重情事已􅀴二次差人具奏去後今審據前因叅照寕王不守藩服敢此稱亂睥眤神器指斥乗輿擅殺大臣放囚刼庫稔不韙之罪犯無将之誅致仕都御史李士實恩遇四朝實託心膂舉人劉飬正舊假恬退之名新叨録用之典今皆反面事讐為之出謀􅀤慮既同狗􅇾之行難逭斧􅃏之誅叅政季斆教授趙承芳義未决扵舎生令已承扵捧檄但暴虐之威恐動扵中鷹犬之徒鈐制扵外在法固􅀁當罪㩀情亦有可憫除将趙承芳季斆􅁥禁一面檄召兵民随機應變竭力討賊一應事宜陸續奏聞處置外臣聞多難興􅀖殷􅁨啓聖陛下在位一十四年屢經變難民心騷動尚爾巡逰不已致宗室謀動干戈冀竊大寳且今天下之覬覦豈特一寕王天下之奸雄豈特在宗室言念及此懔骨寒心昔漢武帝有輪臺之悔而天下向治唐徳宗下奉天之詔而士民感泣伏望皇上痛自刻責易轍改絃罷出奸䛕以囬天下豪傑之心絶迹巡逰以杜天下奸雄之望定立國本勵精求治則太平尚有可圖羣臣不勝幸甚為此具本并将偽檄一􅁓封固專差舎人秦沛親齎謹題請㫖留用官員䟽十四年七月􅀄五日照得江西寕府謀反據城練兵分兵攻刼囚禁方面官員有操戈向闕之􅀔此君父之大難臣子憤心之日也臣在吉安地方調兵討賊四路阻絶並無堪用官員適遇欽差兩廣清軍御史謝源刷卷御史伍希儒各赴京復命道經該府不能前進各官􅁬激思効力討賊以報朝廷臣亦思軍務􅂃急各官俱有印勑方便行事遂留軍前同心戮力經濟大難待事寕之日赴京復命縁係留用官員事理未敢擅便為此具本請㫖江西捷音䟽十四年七月三十日照得先因寕王圖危宗社興兵作亂巳經具奏請兵征剿外随㸔得寕王隂謀不􅁤巳将十年畜飬死士二萬餘人招誘四方盗賊渠魁亦以萬數舉事之日復驅其護衞黨與并脅從之徒又六七萬人虐熖張熾臣以百數疲弱之卒􅀔不敢􅁿舉驟進乃退保吉安姑為宰制之圖時逺近軍民刼於寕王之積威道路以目莫敢出聲臣一面督率吉安府知府伍文定等調集軍民兵快召募四方報効義勇之士會計一應觧留錢粮支給糧賞造作軍噐戰船奏留公差囬任監察御史謝源伍希儒分職任事一面約㑹該府鄉官先任右副都御史致仕王懋中飬病痊可編修鄒守益刑部􅀰中曾直評事羅僑丁􅁨監察御史張鰲山先任浙江僉事今赴部調用劉藍依親進士郭持平軍門叅謀驛丞王思李中先任福建按察使致仕劉遜先任叅政致仕黄繡先任嘉興府知府閒住劉昭等相與激􅀤忠義譬諭禍福移檄逺近布朝廷之深仁暴寕王之罪惡扵是豪傑響應人始思􅁬區畫旬日官兵稍稍四集時寕王聲言先取南京臣慮南京尚未有俻恐一時為彼􅀁襲乃先張疑兵扵豐城示以欲攻之􅀔故寕王先遣兵出攻南康九江諸處而自留居省城以禦臣至是七月􅀄二日探知臣等兵尚未集乃留兵萬餘屬其心腹宗支郡王儀賔内官并偽授都督都指揮等官使守江西省城而自引兵向闕臣晝夜促各郡兵期以本月十五日㑹臨江之樟􅀣而身督知府伍文定等兵徑下扵是知府戴徳孺引兵自臨江來知府徐璉引兵自􅀽州來知府邢珣引兵自贛州來通判胡尭元童􅄾引兵自瑞州來通判談儲推官王暐徐文英新淦知縣李羙㤗和知縣李楫寕都知縣王天與萬安知縣王冕亦各以其兵來赴十八日遂至豐城分布哨道使知府伍文定為一哨攻廣􅃳門入知府邢珣為二哨攻順化門入知府徐璉攻惠民門入知府戴徳孺攻永和門入通判胡尭元童琦攻章江門入知縣李羙攻徳勝門入都指揮余㤙攻進賢門入通判談儲推官王暐知縣李楫王天與王冕等各以其兵乗七門之釁傍夾攻擊以佐其􅀔是日得諜報寕王伏兵千餘於新舊墳厰以俻省城之援臣乃遣奉新知縣劉守緒典史徐誠領兵四百􅀙間道夜襲破之以揺城中十九日􅀤市􅆜臣乃大誓各軍申布朝廷之威再暴寕王之惡約諸将一鼓而附城再鼓而登三鼓而不克誅伍四鼓而不克斬将已誓莫不切齒痛心踴躍激憤薄暮齊􅀤二十日􅀺明各至信地先是城中為俻甚嚴滚木灰瓶火炮石弩機毒之械無不畢具及臣􅀁遣兵已破新舊墳厰敗潰之卒皆奔告城中城中已驚懼至是復聞我師四面驟集皆震駭奪氣我師乗其動揺呼譟並進梯絙而登城中之兵土崩瓦觧皆倒戈退奔城遂破擒其居守宜春王栱樤及偽太監萬銳等千有餘人寕王宫中眷屬聞變縦火自焚延及居民房屋臣當令各官分道救火撫定居民散釋脅􅀙封府庫謹關防搜􅀗原􅀍刼收大小衙門印信九十六顆三司脅􅀙官布政使胡濂叅政劉斐叅議許效廉副使唐錦僉事頼鳯都指揮王玘等皆自首投罪除将擒斬功次􅀤御史謝源伍希儒􅁠令審驗紀録一應事宜查審明白陸續具奏及一面分兵四路追躡寕王向徃相機擒勦另行奏報外􅀼照寕王逆熖熏天衆號一十八萬屠城破郡逺近震懾今其猖獗已一月有餘而四方赴難之師尚未有一人應者前項領哨各官及􅁥軍御史本主飬病丁􅁨致仕等官皆􅀙臣起於顛沛危急之際并心恊謀倡率義勇䧟陣先登以克破此堅城據其巢穴此雖臣子職分當然亦其激切痛憤之本心但當此物情暌貳動摇之日非賞罰無以鼓士氣今逆賊殺人如草芥又挾其厚貨賞賚所及一人動以千萬伏願皇上䖏變從􅁠速將前項各官量加陞賞以勵逺近事􅀔難為之日覆宗㓕族之禍臣且不避况敢避邀賞之嫌乎縁係捷音事理為此具本專差千户詹明親齎謹具題知擒􅀗宸濠捷音䟽十四年七月三十日照得先因寧王圗危宗社興兵作亂巳經具奏請兵征勦外隨㸔得寜王虐熖張熾臣以百數疲弱之卒未敢輕舉驟進乃退保吉安姑為牽制之圗時逺近軍民刼於寜王之積威道路以目莫敢出聲臣一面督率吉安府知府伍文定等調集軍民兵快召募四方報効義勇之士奏留監察御史謝源伍希儒分職任事一面約會該府鄉官都御史王懋中編􅁱鄒守益郎中曾􅀡評事羅僑監察御史張鰲山僉事劉藍進士郭持平􅂙謀驛丞王思李中按察使劉遜􅂙政黄繡知府劉昭等相與激發忠義移檄逺近布朝廷之深仁暴寍王之罪惡於是豪傑響應人始思奮時寍王聲言先取南京臣慮南京尚未有備恐為所襲乃先張疑兵於豐城示以􅁒攻之􅀔故寍王先遣兵出攻南康九江而自留居省城以禦臣至七月􅀄二日探知臣等兵尚未集乃留兵萬餘使守江西省城而自引兵向􅆣臣晝夜促兵期以本月十五日㑹臨江之樟􅀣而身督知府伍文定等兵徑下於是知府戴徳孺徐璉邢珣通判胡尭元童􅄾談儲推官王暐徐文英知縣李羙李楫王天與王冕各以其兵来赴十八日遂至豐城分哨道使知府伍文定等進攻廣潤等七門是日得諜報寍王伏兵千餘於新舊墳厰以援省城臣乃遣奉新知縣劉守緒等􅀙間道夜襲破之以摇城中十九日􅀤市􅆜大誓各軍申布朝廷之威再􅁀寍王之惡莫不切齒痛心踴躍激憤薄暮齊􅀤二十日黎明各至信地先是城中爲備甚嚴滚木􅁅瓶火炮機械無不畢具臣所遣兵巳破新舊墳厰敗潰之䘚皆奔告城中城中皆已驚懼至是復聞我師四面驟集益震駭奪氣我師乗其動摇呼譟並進梯絙而登城中之兵皆倒戈退奔城遂破擒其居首宜春王拱樤及偽太監萬銳等千有餘人寍王宫中眷屬聞變縦火自焚延各居民房屋臣當令各官分道救火散釋脅􅀙封府庫謹􅀜防以撫軍民除將擒斬功次發御史謝源伍希儒􅁠令審驗紀録及一而分兵四路追躡寍王向徃相機擒勦於本月二十二日已經具題外當於本日據諜報及據安慶迯囬􅀍虜船戸十餘人報稱寍王於十六日攻圍安慶未下自督兵夫運土填塹期在必尅是日有守城軍門官差人来報贛州王都堂已引兵至豐城城中軍民震駭乞作急分兵歸援寍王聞之大恐即􅁒囬舟因太師李士實等阻􅂆以為必須徑徃南京既登大寳則江西自服寍王不應次日遂觧安慶之圍移兵泊阮子江㑹議先遣兵二萬歸援江西寍王亦自後督兵随来等因先是臣等駐兵豐城衆議安慶􅀍圍宜引兵􅀡趨安􅂟臣以九江南康皆已為賊所據而南昌城中數萬之衆精悍亦且萬餘食貨充積我兵若抵安慶賊必囬軍死闘安􅂟之兵僅僅自守必不能援我於湖中南昌之兵絶我糧道而九江南康之賊合勢撓躡四方之援又不可望事難圖矣今我師驟集先聲所加城中必已震懾因而并力急攻其􅀔必下已破南昌賊先破膽奪氣失其根本􅀔必歸救如此則安慶之圍自解而寍王亦可以坐擒矣至是得報果如臣等所料當臣督同領兵知府會集監軍及倡義各鄉官等官議所以禦之之䇿衆多以寍王兵勢衆盛氣熖所及有如燎毛今四方之援尚未有一人至者彼慿其憤怒悉衆并力而萃於我􅀔必不支且宜歛兵入城堅壁自守以待四鄰之援然後徐圖進止臣以寍王兵力雖強軍鋒雖銳然其所過徒恃焚掠屠戮之惨以威刼逺近未嘗逢大敵與之竒正相角所以鼓動扇惑其下者全以進取封爵之利為􅀃今出未旬月而輒退歸士心既已携沮我若先出銳卒乗其惰歸要迎掩擊一挫其鋒衆将不戰自潰所謂先人有奪人之氣攻瑕則堅者瑕也是日撫州府知府陳槐兵亦至扵是遣知府伍文定邢珣徐璉戴徳孺合領精兵伍百分道並進擊其不意又遣都指揮余恩以兵四百徃来湖上以誘致賊兵知府陳槐通判胡尭元童􅄾談儲推官王暐徐文英知縣李羙李楫王見王軾劉守緒劉源清等使各領兵百餘四面張疑設伏候伍文定等兵交然後四起合撃分布既定臣乃大賑城中軍民慮宗室郡王将軍或為内應生變親慰諭之以安其心又出給告示凢脅􅀙皆不問雖嘗受賊官爵能迯歸者皆免死斬賊徒歸降者給賞使内外居民及鄉道人等四路傳播以解散其黨二十三日復得諜報寍王先鋒已至樵舍風㠶蔽江前後數十里不能計其數臣乃分督各兵乗夜趨進使伍文定以正兵當其前余恩􅁇其後邢珣引兵繞出賊背徐璉戴徳孺張両翼以分其勢二十四日早賊兵鼓譟乗風而前逼黄家渡其氣驕甚伍文定余恩之兵佯北以致之賊争進趨利前後不相及邢珣之兵前後横擊􅀡貫其中賊敗走文定恩督兵乗之璉徳孺合􅀔夾攻四面伏兵亦呼譟並起賊不知所為遂大潰追奔十餘里擒斬二千餘級落水死者以萬數賊氣大沮引兵退保八字腦賊衆稍稍遁散寍王震懼乃身自激勵将士賞其當先者以千金􅀍傷者人百兩使人盡􅀤九江南康守城之兵以益師是日建昌知府曽璵引兵亦至臣以九江不破則湖兵終不敢越九江以援我南康不復則我兵亦不能踰南康以躡賊乃遣知府陳槐領兵四百合饒州知府林珹之兵乗間以攻九江知府曾璵領兵四百合廣信知府周朝佐之兵乗間以取南康二十五日賊復并力盛氣挑戰時夙􅀔不便我兵少􅁍死者數十人臣急令人斬取先􅁍者頭知府伍文定等立於銃砲之間火燎其􅂡不敢退􅁬督各兵殊死並進砲及寍王舟寍王退走遂大敗擒斬二千餘級溺水死者不計其數賊復退保樵舍連舟為方陣盡出其金銀以賞士臣乃夜督伍文定等為火攻之具邢珣撃其左徐璉戴徳孺出其右余恩等各官分兵四伏期火發而合二十六日寍王方朝群臣拘集所執三司各官責其間以不致死力坐􅀚成敗者将引出斬之争論未决而我兵已奮撃四面而集火及寍王副舟衆遂奔散寍王與妃嬪泣别妃嬪宫人皆赴水死我兵遂執寍王并其世子郡王將軍儀賔及偽太師國師元帥􅂙賛尚書都督都指揮千百户等官李士實劉養正劉吉屠欽王編熊瓊盧珩羅璜丁饋王春呉十三凌十一秦榮葛江劉勲何鏜王信呉國七火信等數百餘人􅀍執脅􅀙宫大監王宏御史王金主事金山按察使楊璋僉事王疇潘鵬􅂙政程果布政梁辰都指揮郟文馬驥白昻等擒斬賊黨三千餘級落水死者約三萬餘棄其衣甲器仗財物與浮尸積聚横亘若洲焉於是餘賊數下艘四散迯潰臣復遣各官分路追勦毋令逸入他境為患二十七日及之於樵舍大破之又破之於呉城擒斬復千餘級落水死者殆盡二十八日得知府陳槐等報亦各與賊戰於沿湖諸䖏擒斬各千餘級臣等既擒寍王而入闔城内外軍民聚􅀚者以數萬􅂬呼之聲震動天地莫不舉首加額真若解倒懸之苦而出於水火之中也除将寍王并其世子郡王將軍儀賔偽授太師國師元帥都督都指揮等官各另監覊候解􅀍執脅􅀙等官并各宗室别行議奏及將擒斬俘􅀗功次一萬一千有奇發御史謝源伍希儒暫令審驗紀録另行造册繳報外照得臣節該欽奉􅃙諭但有盗賊生發即便嚴督各該兵備守備守巡并各軍衛有司設法調兵勦殺其管領兵快人等官員不問文職武職若在軍前違期并逗遛退縮者俱聼以軍法􅀙事生擒盗賊鞠問明白亦聼就行斬首示衆斬􅀗賊級行令各該兵備守巡守備官即時紀驗明白備行江西按察司造冊繳報查照事例陞賞激勸欽此及准兵部題稱今後但草賊生􅀤事情􅂃急該管官司即便依律調撥官軍乗機剿捕應合㑹捕者亦即調􅀤䇿應等因節奉欽依備咨前来又節該奉􅃙如或江西别府報有賊情􅂃急移文至日爾亦要及時遣兵䇿應毋得違誤欽此俱經欽遵外竊照寍王烝淫奸􅁀腥穢彰聞賊䃑善􅁼剥害細民數其罪惡世所未有不􅁤之謀已踰一紀積威所刼逺􅀍四方士夫雖在千里之外皆蔽目摇手莫敢論其是非小人雖在幽僻之中且吞聲飲恨不敢訴其􅁈抑兼又招納叛亡誘致劇賊渠魁如呉十三凌十一之屬牽引數千餘衆召募四方武藝驍勇力能㧞􅀣排􅀜者亦萬有餘徒又使其黨王春等分齎金銀數萬隂置奸徒於滄州淮揚山東河南之間亦各數十比其起事之日􅀙其䕶衛姻族連其黨與朋私驅脅商旅軍民分遣其官屬親䁥使各募兵􅀙行多者數千少者數百㠶檣蔽江衆號一十八萬其􅀙之東下者實亦不下八九萬餘且又矯稱宻㫖以脅制逺近偽傳檄諭以揺惑人心故其舉兵倡亂一月有餘而四方震懾畏避皆謂其大事已定莫敢抗義出身與之争衡􅀙亊抱節者僅堅城而自守忠憤者惟集兵以俟時非知謀忠義之不足其氣熖使然也臣以孱弱多病之質才不逮於凢庸知毎失之迂繆當玆大變輒敢冐非其任以行旅百數之卒起事於顛沛危疑之中毎月之間遂能克復堅城俘擒元惡以萬餘烏合之兵而破強㓂十萬之衆是固上天之隂隲宗社之黙佑陛下之威靈而廟廊謀議諸臣消禍於􅀅萌而預為之䖏見㡬於未動而潜為之制改臣提督使得扼制上流而凛然有虎豹在山之威申明律例使人自為戰而翕然有臂指相使之形􅃙臣以及時䇿應不限以地而􅀮然有常山首尾之勢故臣得以不俟詔㫖之下而調集数郡之兵數郡之民亦不待詔㫖之督而自有以赴􅀦家之難長驅越境􅀡搗窮追不以非任為嫌是乃伏至險於無形之中蔵不測於常制之外人徒見嬖奚之多􅀗而不知王良之善御有以致之也然則今日之舉廟廊諸臣預謀早計之功其又孰得而先之乎及照御史謝源伍希儒監軍督哨謀畫居多倡勇宣威勞苦備嘗領哨知府伍文定邢珣徐璉戴徳孺陳槐曾璵林珹周朝佐署都指揮僉事余恩分哨通判胡堯元童琦談儲推官王暐徐文英知縣李楫李羙王冕王軾劉源清劉守緒􅀓南喬随哨通判楊昉陳旦指揮麻璽髙睿孟俊知縣張淮應恩王庭顧佖萬士賢馬津等雖効績輸能亦有等列然皆首􅀙義師争赴􅀦難恊謀并力共收全功其間若伍文定邢珣徐璉戴徳孺等冒險衝鋒功烈尤懋鄉官都御史王懋中編􅁱鄒守益御史張鰲山郎中曽􅀡評事羅僑僉事劉藍進士郭持平驛丞王思李中按察使劉遜􅂙政黄繡知府劉昭等仗義興兵恊張威武運籌賛畫夾輔折衝以上各官功勞雖在尋常征勦亦巳甚為難得况當震恐摇惑四方知勇莫敢一膺其鋒而各官激烈忠憤􅂢身狥􅀦乃能若此伏願皇上論功朝錫之餘普加爵賞旌擢以􅂆天下之忠義以勵將来之懦怯仍詔示天下使知奸雄若寍王者蓄其不􅁤之謀已十有餘年而􅀤之旬月輒就擒㓕于以見天命之有在神器之不可窺以定天下之志尤願皇上罷息巡幸建立國本端拱勵精以承宗社之洪休以絶奸雄之覬覦則天下幸甚臣等幸甚縁係捷音事理為此具本專差千户王佐親齎謹具題知奏聞益王助軍餉䟽十四年七月三十日近䝉益府長史司呈該本司啓案查寍藩有變巳經啓行外今照見奉提督都御史王案驗内稱本院已於七月􅀄九日領兵前徃豐城縣市􅆜等䖏住劄刻日進攻省城牌差百戸楊銳前来建昌府守取掌印官親自統兵毋分日夜兼程前進期本月十五十六日俱赴軍門面授約束并􅀔追勦及照知府曾璵報稱即日領兵起程前赴軍門聼調進攻等因㸔得國家之事莫大於戎今寍藩不􅁤驚動多方提督都御史等官倡義恊謀進攻憤忠思勦上以紓朝廷南顧之􅁨下以觧生民荼毒之苦况我殿下􅀦朝分封至親理宜助餉軍門共紓國難具本啓奉令㫖􅀤銀一千兩差官胡敬儀衛副陸澄書辦官并旗校官等前去提督軍務王都御史䖏犒賞敬此敬遵除将銀兩差官管送前来外合行備由呈乞施行等因到臣為照寜王謀叛稔釁多年積威所刼無不萎靡况其舉事之􅀄擅殺重臣衆號一十八萬肆然東下雖平日士夫號􅁛忠義莫敢指斥今益王殿下廼心宗社出私帑以給軍餉非忠義奮發急於討賊豈能倡言助正以作興軍士之氣如此伏望皇上特勑奨勵以激宗室之義以永益王殿下為善之心以夾輔帝室天下臣民不勝幸甚除將原􅀤白銀一千兩唱名給散軍士外縁係宗室出私帑以給軍餉事理為此具本請㫖旱災䟽十四年七月三十日據吉安等一十三府所属廬陵等縣各申稱本年自三月至於秋七月不雨禾苗未及生􅀤盡行枯死夏稅秋糧無􅀙辦納人民愁嘆将及流離理合申乞轉逹寛免等因到臣節差官吏老人􅂿勘委自三月以来雨澤不䧏禾苗枯死續該寍王謀反乗釁鼓亂傳布偽命􅄖免租稅小人惟利是趨洶洶思亂臣因通行告示許以奏聞􅄖免稅糧諭以臣子大義申祖宗休飬之徳澤􅁀寍王誅求無厭之悪由是人心稍稍安集背逆趨順老弱居守丁壯出征團保饋餉邑無遺户家無遺夫就使雨暘時若江西之民亦已廢耕耘之業事征戰之苦况軍旅乾旱一時併作雖富室大户不免饑饉下户小民得無轉死溝壑流散四方乎設􅂉饑寒所迫徴輸所苦人自為亂将若之何如䝉乞􅃙該部暫将江西正徳十四年分稅糧通行􅄖免以救殘傷之民以防變亂之階伏望皇上罷冗貟之俸損不急之賞止無名之徴節用省費以足軍􅀦之需天下幸甚請止親征䟽十四年八月十七日正徳十四年八月十六日准兵部咨該本部等衙門題内開南京守備􅂙賛官連奏十分􅂃急軍情相應急為議䖏合無請命将官一員掛平賊將軍印充緫兵官􅀜領符嬐旗牌挑選各營精銳官軍三千餘名各給賞賜銀兩布疋交兊正䭾馬匹􅀜給軍火器械上􅂃前去南京相機戰守再有的報就便會合各路人馬征進再請勑都御史王守仁選調堪用官軍民快親自督領於江西東南要路住劄把截相機行事仍委浙江布政司左􅂙政閔楷選募䖏州民兵統領定擬住劄地方聴調䇿應勦捕再請􅃙一道齎付都御史王守仁不妨提督軍務原任兼廵撫江西地方前項所報軍情如果南京守備差人體勘再有的報聼前項領軍官出給榜文告示徧􅀤江西地方張掛傳􅀃曉諭但有能聚集義兵擒敘反逆賊犯者量其功蹟大小封拜侯伯及陞授都指揮千百户等官世襲賊夥内有能自相擒斬首官者與免本罪具奏定奪等因具題節該奉聖㫖這江西寍王謀為不法事情重大你部裏既會官議䖏停當朕當親率六師奉天征討不必命將王守仁暫且准行欽此欽遵備咨到臣案查先為飛報地方謀反重情事属者寍王宸濠殺害守臣舉兵謀逆臣於六月十九日具本奏聞之後調集軍兵擇委官属激勵七氣振揚武勇七月二十日先攻省城墟其巢穴本月二十四等日兵至鄱陽湖與賊連日大戰至二十六日宸濠遂已就擒謀黨李士實等賊首凌十一等俱已擒􅀗賊􅀙俱已掃蕩閩廣赴調兵士俱已散還地方驚􅅰之民俱已撫帖臣一念忠憤誓不與賊俱生而迂踈薄劣之才實亦何能辦此是皆祖宗在天之靈我皇上聖武之懋昭本兵謀畧之素定官属恊力士卒用命所致臣巳節次具本奏報外竊惟宸濠擅作辟威虐㷔已張干逺睥睨神器隂謀乆蓄於中招納叛亡輦轂之動静探無遺迹廣致姦細臣下之奏白百無一通發謀之始逆料大駕必將親征先於沿途伏有姦黨期為􅀶浪荆軻之謀今逆不旋踵遂已成擒法宜觧赴􅆣門式昭天討然􅁒付之部下各官押觧誠恐舊所潜布之徒尚有存者乗隙竊􅀤或致意外之虞臣死且有遺憾况平賊獻俘固國家之常典亦臣子之職分臣謹於九月十一日親自量帶官軍將宸濠并逆賊情重人犯督觧赴闕外縁係獻俘馘以昭聖武事理為此具木專差舍人金昇親齎謹具題知奏留朝覲官䟽十四年八月十七日正徳十四年八月十六日臣駐軍江西省城據各領哨知府吉安府伍文定贛州府邢珣􅀽州府徐璉臨江府戴徳孺撫州府陳槐饒州府林珹廣信府周朝佐建昌府曾璵連名呈稱正徳十五年正月􅀄一日例應朝覲近因寍王謀反􅀩臣督委各職并各縣掌印正官領兵征討今雖掃平尚留在省防禦及安輯地方未得囬任其各縣掌印官雖未曽領兵縁各在任防禦城池措辦糧餉况布按二司及南昌府知府鄭瓛瑞州府宋以方俱自本年六月内先􅀍拘執未經復職管事南康九江二府亦􅀍殘破近方􅀵復前項文冊多未成造縁查舊規行期在即恐致遅誤合行呈乞奏知及通行各府州縣將册造完行委佐貳首領官員齎繳應朝及布按二司亦乞裁䖏施行等因到臣據此為照三年述職係朝廷大典例該掌印正官赴京應朝但今叛亂雖平地方未輯徴調尚存瘡痍之民須撫旱荒猶熾意外之患當防况各官在省方圖防守之規未有還任之日若不查例奏留未免顧此失彼後悔無及合准所呈􅁒候奏請命下之日行令各府州縣佐貳首領官齎冊應朝復恐遅誤除一面通行各府州縣造冊完備行委佐貳首領官依期啓行其布按二司􅀱有新任官員及南昌府行見在通判陳旦各造冊赴朝其九江南康府縣并南康新建二縣委係官俱戴罪聼候吏部徑自裁䖏外縁係朝覲事理未敢擅便爲此具本請㫖奏聞淮王助軍餉䟽十四年八月十七日近該淮府長史司呈該本司啓案查寍藩有變已經啓行外今照見奉提督都御史王案驗内稱本院已於七月􅀄九日領兵前徃豐城縣市􅆜等䖏住劄尅日進攻省城牌差百户任全善前来饒州府守取掌印官親自統兵毋分雨夜兼程前進期本月十五十六日俱赴軍門面授約束并􅀔追勦及照知府林珹報稱即日領兵起程前赴軍門聼調進攻等因㸔得寍王敢爲逆謀肆奸天紀提督都御史王首倡忠義作率智勇身任􅀦家之急事關宗社之虞殿下藩翰之親憂心既切饋餉之助於理爲宜具本啓奉令㫖長史司將􅀤下銀伍百兩差官胡祥等速齎前去少資提督軍門之用敬此敬遵除將銀兩差官管送前来外合行備由呈乞施行等因到臣照得先該益府出帑餉軍助義効忠已經具題外今淮王殿下亦能不靳私帑以助軍餉良由身同休戚之情心切門庭之㓂所致伏望皇上特􅃙奨勵以彰淮王殿下助正之心以為宗藩為善之􅂆天下臣民不勝幸甚恤重刑以實軍伍䟽十四年八月二十五日據江西按察司呈據本司經歷司呈䝉廵按兩廣監察御史謝源伍希儒各􅁓牌前事俱奉本院送發犯人裘良輔等二百六十六名轉送本司問報等因依􅀩問得犯人裘良輔招係南昌府新建縣三十二都民納粟監生給假在家正徳九等年月日不等與同在官南昌前左二衛舍餘楊滋楊富軍餘董俞周大貴及指揮何鏜等家人何祥曹成等各不合出入王府生事害人向未事􅀤正徳十四年六月十四日寍王謀反良輔與楊滋等各因畏懼寍王威惡各不合知情􅀙逆做兵領受盤費銀二兩米一石跟同前去安慶等䖏攻打城池各將銀米費用訖於七月十二等日行至湖口等縣思係叛逆懼怕官兵就行四散逃囬各􅀍南昌等府縣統兵知府等官并地方人等陸續拿􅀗觧赴提督王都御史䖏䝉將良輔等一百八十四名轉送謝御史將夏景周大貴熊受等八十二名轉送伍御史俱􅀤按察司審問蒙將良輔等研審前情明白取問罪犯楊滋等二百六十五名各招與裘良輔楊滋楊富王偉夏景黄俞周大貴何祥曹成丁進受楊􅂟童楊貴萬徐七萬羊七徐四保孫住保周江胡勝福朱潑飬宋貴王明熊明秦蘭王仲鑑張雄朱其添喜䔥崇真朱祥彭隆保徐仕貴郭宣舒鑾萬岳䔥述羅俊江潮漢魏鳯萬三羅秀熊福䔥曰貴䔥勝雷天富䔥文尹天受胡進保李鑾鄭鳯黄信劉勝殷醮仔甘奇余福童郭進福沈仕英李洪􅃢許鳯李景良江鑾江仁李欽鄧倫胡福受譚黒仔趙正七朱環二鄒秋狗陳良二聶景祥魏仲華王福李壽余􅑻王貫劉松牛才陳珂陳興陳釗劉添鳯余似虎甘朴謝天鳯鄭貴沈昌容萬清向楚秀郭鑾丁勝福萬全龔受熊六保陳諫何晚仔王􅇐一王琪胡宣楊正曽受王鳯王明雷清皮志淵鄒奎髙溤軒四毛守松熊天祥李伯錦楊子秀陳天一廖進禄魏紹魏天孫呉富陳昭弟李伯奇姜福廖奇四夏䒶奇陳善五羅勝七郭謹羅璽朱長子陳瑞竹漢王寛冮天友陳良善召一陳子政廬䔥勝馬龍陳大倫陳子偷李錢陳九信徐義徐釗劉儀熊孟華王尚文王天爵傅十二徐受萬奇趙仕奇鄭朴馮軒二馮進禄周孟貞周江劉朋唐朝賢歐陽南馬興周興王毛子泰進興羅興李保一萬元林三十八馬爵張進孫髙四譚受呉俊萬鏜熊守貴錢龍胡通金萬春曹太喻欽劉後濟胡二王世通魏友子楊章熊禄熊剋名童保子余景陳四保許虎保熊受蕭文榮楊廷貴羅富丁􅀜保江仕言劉貴丁朋歐陽正王引弟熊富唐天禄王貴周受丘松胡秀李福洪江曽興丘桂劉鎮鄧山蕭清夏勝四夏由孫甘􅁇張錦謝魯仙熊華謝鳯夏龍婁奇陸仲英余勝虎李進胡勝阮天祥張全彭天祥洪經仔徐受樂福張奇馮進隆馮詔馮喜子楊燁掲文興萬孔湖易忠黄延曹天右徐大貴蕭曰髙䔥曰廣李鑾呉顯二李貴陳英陳昇李勝祖蕭天佐陸九成郭欽楊順丁祖李萬杜楊銮􅀽富楊黄子呉文張銮方燦萬天銮胡進童黃勝徳凃祖唐歷所犯除不應輕罪外合依謀反知情故縦者律斬决不待時但寍王平昔威惡惨毒上下人心罔不震懾各犯􅀙逆雖是可惡原情終非得已及照南昌前衛軍餘多係脅􅀙􅀍殺見今軍伍缺人合無將各犯免其前罪俱編􅀤本衛永逺充軍庶使情法交申衛所填實呈詳到臣􅂙㸔得裘良輔等俱曾􅀙逆應該䖏斬但該司􅂙稱寍王平昔威惡惨毒上下人心罔不震懾據法在所難容原情亦非得已宥之則失於輕䖏斬似傷于重合無俯順輿情乞􅃙該部查照酌量或将各犯免其死罪令其永逺充軍不惟情法得以兩盡抑且軍伍不致缺人縁係恤重刑以實軍伍事理為此具本請㫖䖏置官員署印䟽十四年八月二十五日照得先因寍王圖危宗社興兵作亂刼奪江西都布按三司并南昌府縣大小衙門印信臣随調集各府官軍民快於本年七月二十日攻復省城當於府内搜􅀗前項印信共計一百六顆到臣􅀵候已經捷報外今照寍王已擒餘黨誅戮地方幸已稍寍所有三司府縣衙門俱係錢糧刑名軍馬城池等項重務關涉匪輕况今兵亂之後人民困苦不可一日缺官幹辦撫輯但三司等官俱係􅀍脅有罪人數若待别除官員到日非惟人心惶惑抑且事無統紀臣遵照欽奉􅃙諭便宜事理将三司印信布政司暫令布政使胡濓按察司暫令按察使楊璋各戴罪護管随該新任􅂙議周文光按察使伍文定先後到任各已替管外其都司暫令都指揮馬􅂹提學道􅀜防令副使唐錦南昌道印信令僉事王疇南昌府印信令知府鄭瓛南新二縣印信令知縣陳大道鄭公奇各戴罪暫且管理外及照南昌前左二衛并各撫所衙門印信俱各無官管理除用木匣收盛封􅀤按察司仍候事寍有官之日該司徑發掌管外縁係䖏置官員署印以安地方事理為此具本題知二乞便道省塟䟽十四年八月二十五日照得先准吏部咨該臣奏稱以父老祖䘮屢䟽乞休未䝉憐准近者奉命扶疾赴閩意圖了事即􅀙彼地冒罪迯歸旬日之前亦已具奏不意行至中途遭値寍府反叛係􅀦家大變臣子之義不容舎之而去又闔省撫廵方面等官無一人見在者天下事機間不容髪故復忍死暫留於此而爲牽制攻討之圖俟命帥之至即􅀙􅀄心死無所避臣思祖母自㓜鞠育之恩不及一面爲訣毎一號慟割裂昏殞日加尫瘠僅存殘喘母䘮􅁠厝祖墓之側今葬祖母亦􅁒因此改塟臣父衰老日甚近因祖䘮哭泣過節見亦病卧苫廬臣今扶病驅馳兵革徃来於廣信南昌之間廣信去家不數日􅁒􅀙其地不時乗間抵家一哭畧爲經畫塟事一省父病臣區區報􅀦血誠上通於天不辭㓕宗之禍不避形迹之嫌冒非其任以勤􅀦難亦望朝廷鍳臣此心不以法例繩縳使臣得少伸烏鳥之痛臣之感恩死且圗報搶攘哀控不知所云等因具本奏奉聖㫖王守仁奉命巡視福建行至豐城一聞宸濠反叛忠憤激烈即便倡率所在官司起集義兵合謀勦殺氣節可嘉已有㫖着督兵討賊兼巡撫江西地方所奏省親事情待賊平之日来􅀃該部知道欽此備咨到臣除欽遵外近照寍王逆黨皆已仰賴皇上神武廟堂神筭悉就擒􅀗地方亦已平靖百姓室家相慶得免徴調之苦復有更生之樂莫不感激洪恩沾􅀍徳澤獨臣以父病日深母䘮未塟之故日夜哀苦憂疾轉劇犬馬驅馳之勞不足齒録而烏鳥迫切之情實可矜憫已􅀩前㫖許待賊平之日来􅀃故敢不避斧􅃏復伸前請伏望皇上仁覆曲成容臣暫歸田里一省父病經紀塟事臣不勝哀懇苦切祈望之至䖏置􅀙逆官貟䟽十四年八月二十五日正徳十四年七月二十三日㩀南昌府知府鄭瓛自寍王賊中迯出投到本月二十六日又據領兵官臨江府知府戴徳孺等臨陣奪􅀗先􅀍寍王脅去巡按監察御史王金户部公差主事金山左布政使梁宸􅂙政程杲按察使楊璋副使賀銳僉事王疇潘鵬都指揮同知馬􅂹許清都指揮僉事白昻守備南贛都指揮僉事郟文并脅􅀙用事􅂙政王綸及據先􅀍脅􅀙令赴九江用事僉事師䕫先􅀍脅􅀙賊敗脫走鎮守太監王宏各投送到臣照得先因寍王宸濠於六月十四日殺害廵撫右副都御史孫燧副使許逵將各官綁縛迫脅時臣奉命福建勘事行至豐城聞變顧惟地方之責雖職各有專而亂賊之討實義不容避遂連夜奔還吉安督同知府伍文定等調集南贛等府軍兵􅂢軀進勦至七月二十日攻破省城搗其巢穴随有􅀍脅在城右布政使胡濂􅂙政劉斐􅂙議許效㢘副使唐錦僉事賴鳯都指揮僉事王紀各投首到臣彼時軍務方殷暫將各官省候督兵擒􅀗宸濠并逆黨李士實劉吉凌十一等臣已先後具本奏報去後本年八月二十三日會集知府伍文定等將各事情逐一研審得布政梁宸等各執稱本年六月十三日寍王生日延待各官酒席次日進府謝酒不期寍王謀逆喝令官校多人將前各官并先存後監故户部公差主事馬思聰叅議黄宏原任叅議今陞陜西􅂙政楊學禮等俱各背綁要殺當將孫都御史許副使押出斬首其餘各官俱杻鐐發儀衞司等處監禁王綸留府用事知府鄭瓛先􅀍寍王誣奏見監按察司瑞州府知府宋以方縁事在省本日俱拏􅁥儀衛司差人將各衙門印信搜奪入府後􅂙議黄宏主事馬思聰各不食相􅁇在􅁥身故寍王差人入􅁥踈放各官杻鐐王疇鄭瓛二人不放本月二十一日將梁宸胡濂劉斐賀銳各放囬本司本日寍王傳檄各䖏令人寫成布政司咨呈備云檄文轉呈府部自將搜去印信印使付與梁宸僉押梁宸不合畏死聼􅀙僉押訖本月二十三日寍王告廟出師􅀕旗加授王綸賛理軍務與劉吉等一同領兵王綸不合畏死聼􅀙本日乆差柴内官等帶領人衆將兩司庫内官銀強搬入府梁宸賀銳在司署印不合畏死不行阻當本日將楊璋仍拘儀衛司各官改􅁥湖東道本月二十六七等日寍王差儀賔李琳等將伊收積米榖給散省城軍民以邀人心着令程杲潘鵬􅁥放各不合畏死到彼㸔放二十七日寍王因先遣承奉屠欽等帶領賊兵徃攻南京各賊屯劄鄱陽湖上乆􅀱寍王不出自行攻破南康九江掠取財物二府人民走散寍王要得招撫以收人心押令師䕫前去曉諭不合畏死徃彼安撫本月二十八日寍王因要起程徃取南京恐省城變動􅁒結人心又差偽千户朱真送銀五百兩與布政司梁宸胡濂劉斐程杲許效廉各不合畏死暫收入巳又将銀七百兩送按察司楊璋唐錦賀銳王疇師䕫潘鵬賴鳯亦不合畏死暫收入巳又押令劉斐王玘替伊廵守并押令許效廉賴鳯替伊接管放粮各不合畏死守城放米七月􅀄一日差人將胡濂唐錦送還本司楊學禮放令之任􅀅梁宸程杲楊璋賀銳王疇潘鵬馬驥許清白昻郟文鄭瓛宋以方脅拘上船隨行分投差撥儀賔等官張嵩等帶領舍校㸔守又將銀二百兩差偽千户呉景賢分送梁宸胡濂劉斐許效廉等及差萬銳送銀三百兩分送楊璋唐錦賀銳師䕫潘鵬賴鳯各又不合畏死暫􅀵入巳本月􅀄八日至安慶見攻城不克因潘鵬係安慶人差今迯引禮白泓押同潘鵬不合畏死聼從賫捧檄文到彼招降本月十五日寜王因聞提督王都御史兵將至省囬兵歸救省城行至鄱陽湖地方屢戰屢敗至二十六日早􅀩大兵突至寍王􅀍擒各官因得脫走前来知府宋以方不知存亡等因隨㨿布按二司呈開布政司梁宸胡濂劉斐程斐許效廉按察使楊璋唐錦賀銃王疇師䕫潘鵬賴鳯各令家人首送前銀各在本司貯庫等因尤恐不的吊取見監擒􅀗逆黨劉吉屠欽凌十一等各供稱相同為照􅂙政王綸脅受賛理僉事潘鵬師䕫􅀍脅招降撫民情罪尤重王綸師夔又該􅀡􅀠湖廣撫按等衙門各具本􅂙奏知府鄭瓛已經别案問結奏請俱合候命下之日遵奉另行外叅照布政梁宸􅂙政劉斐程杲􅂙議許效廉副使賀銳僉事賴鳯都指揮王玘或行咨撫守或盤庫放糧􅀔雖由於迫脅事已涉於順從鎮守太監王宏御史王金主事金山布政胡濂按察使楊璋副使唐錦僉事王疇都指揮馬驥許清白昻郟文或􅀍拘於城内或脅随於舟中事雖渉於順從勢實由於迫脅以上各官甘􅀍囚虜而不能死忍受賊賄而不敢拒責以人臣守身之節皆巳不能無虧就其情罪輕重而言尚亦不能無等伏願皇上大􅁬乾剛取其罪犯之顯􅁀者明正典刑以為臣子不忠之戒酌其心迹之堪憫者量加黜謫以存罪疑惟輕之仁庶㡬奸䛕知警國憲可明䖏置府縣從逆官員䟽十四年八月二十五日正徳十四年七月二十日該臣興舉義兵勦除逆賊攻開省城本日進城之後隨據都布按三司首領等官邢清等南昌府等衙門同知等官何維周等各投首到臣于時逆賊未􅀗軍務方殷暫将各官省候本月二十六日宸濠就縳逆黨盡擒除已奏報去後随拘邢清等到官審得各供稱本年六月十四日寍王謀反將鎮廵三司等官俱各􅀍綁脅當將孫都御史許副使殺害随差人將南昌府同知何維周通判張元澄檢校曹楫南昌縣知縣陳大道縣丞王儒新建縣知縣鄭公奇南浦驛驛丞王洪南浦逓運所大使張秀俱拿紐鐐􅀤監儀衛司随將各官行李并各掌印俱搜檢入府彼有邢清與本司都事翟瓉檢校董俊理問張􅁉案牘陳學司獄張逹廣濟庫大使胡玉副使姚麟織染局大使秦尚䕫副使戴瓛按察司經歷尹鵾知事張澍照磨雷爕都指揮使司㫁事章璠吏目周鶴司獄沈海南昌前衛署指揮僉事夏􅁇春經歷周孟禮鎮撫忻偉吕昇正副千户徐賢鄭春張斌􅀓英唐榮杜昻李瀚陳偉姚􅃏呉耀百戸徐隆陳韜張綱王春龔昇陳詔馮淮黄鑑李欽梅㮙茆富陳瓉王昇吕輔趙昻董鈺姚芳劉璘李琇李祥陸奇南昌府儒學訓導張桓瞿雲汪潭稅課司大使楊純廣濟倉大使左儀副使王大本李譜守支大使卓文正陳琳副使鄧諤李彬南昌縣主簿張譽典史方汝實儒學訓導逹賔新建縣縣丞劉萬鍾主簿熊辟典史楊儒儒學訓導區賔金清俱各聞風迯躱不曽􅀍拿後寍王臨行將何維周等釋放又將知事張澍拘拿上船至今未知存亡本年七月二十日􅀩大兵征勦攻八省城邢清等方得奔走軍門投首等因據此除􅀅各官覊候其鎮巡并三司堂上官南昌府知府另巳叅奏外􅂙照邢清等􅀍執不死全無伏節之忠聞變即迯莫知討賊之義俱合重罪但責任既輕賊􅀔復盛力難設施情可矜憫合無行撫按衙門依律問擬以為將来之戒惟復别有定奪􅀵復九江南康􅂙失事官員䟽十四年九月􅀄十日據委官江西撫州府知府陳槐饒州府知府林城建昌府知府曾璵廣信府知府周朝佐各呈先因寍王謀反奉臣案驗備㣔各府起兵擒勦各遵依先後㑹集市􅆜等䖏刻期破城之後又奉臣牌照得九江南康二府先􅀍寍王攻破分留逆黨據守城池西扼湖兵之應援南遏我師之追躡仰賴宗杜威靈幸已克復省城除遣知府伍文定邢珣徐璉戴徳孺分布哨道邀擊寍賊務在得􅀗所據逆黨占據府縣應合分兵勦復牌仰知府陳槐林珹前去九江曾璵周朝佐前去南康相機行事務要攻復城池以扼賊人之咽喉平靖反側以剪逆黨之羽翼居民人等不幸􅀍脅或因而迯竄者就行出給告示分投撫諭使各囬生理務將人民加意賑恤激以忠義撫以寛仁權舉有司之職以理庶事查䖏倉庫之積以足軍資一面分兵邀誘寍賊毋令東下仍備查各官棄城逃走致賊焚掠屠戮之故具由囬報以慿􅂙拿究治等因依奉陳槐選帶知縣傅南喬陶諤等林珹選帶知縣馬津趙榮顯等曽璵選帶檢校典節知縣余瑩縣丞陳全等周朝佐選帶知縣譚縉杜民表等各兵快一千餘名由水路分哨勦賊十月二十四等日寍賊囬援省城舟至鄱陽湖等處與吉贛等官兵相遇大戰職等各行領兵連日在湖䇿應與賊對敵撫州府官兵擒斬賊犯共二百九十餘名顆饒州府擒斬賊犯共五百餘名顆建昌府擒斬賊犯共四百八十餘名顆廣信府擒斬賊犯共五百餘名顆陸續各解本院轉送監察御史謝源伍希儒處覈實䖏决審􅀤訖各官随各統兵􅀡至九江南康府地方照臣牌内行事知府陳槐林珹呈稱先該九江兵備副使曹雷同該府知府汪穎等亦行督􅀤瑞昌等縣兵快與同九江衛掌印指揮劉勲等􅀵召操軍前来聲復城池􅀍賊探知官兵齊集先行望風迯遁九江軍兵至城守劄仍又分兵追至湖口等䖏勦殺賊黨職等入城撫囬迯竄男婦萬餘名口復業生理會案行拘九江府衛里老旗軍查訪得副使曹雷先於六月􅀄二日帶同通判張雲鵬前徃彭澤縣水次兊糧知府汪頴先因瘧痢兼以母病不能視事於十五日暫將印信牒行推官陳深署掌庫蔵未經交盤至十七日丑時徳化縣老人羅倫口報寍王謀反殺害巡撫等官彼有汪潁㑹同陳深并劉勲等點集城内官軍機兵火夫上城照依原分南門迤東由盤石門福星門城上朶子軍衞把守南門迤西由湓浦門至望京門城上朶子有司把守東門把守官指揮丁睿等三十四員南門把守官指揮蕭綱等二十一員西門把守官指揮孫璋等二十員九江門把守官指揮董方等十二員福星北門把守官指揮李泮等十八員共一百零五員該衛軍人先因放操囬屯數多一時不能齊集十八日卯時逆黨凃承奉等領船二百餘隻装載兵至福星北門外劄營就臨城下喝呌開門指揮李泮等不􅀙各賊忿怒分兵燒毀西門外軍民房屋潯陽驛官􅆹等處殺死虜来四人臨門􅀕旗随用銃砲火槍火箭等噐併力攻打至辰時賊遂梯援上城泮等俱各迯散􅀍賊將鎻鑰打脫擁入口稱省城南康等府俱已􅀵服廵撫等官俱各􅀍害官民不必迯散只將印信来降時汪頴陳深劉勲等俱在各把門守因見力不能支同徳化縣知縣徐志道并前各門把守指揮千户鎮撫及府縣儒學訓導倉􅂣局務大小官員各懐印信􅀙南門迯避去訖内九江衛左千户所百户白昇馬貴各遺失本所銅印一顆隨􅀍各賊將大盈庫銀九千一百七十兩零徳化縣􅀉庫銀二百六十三兩零湖口縣寄庫銀四百五十九兩零鈔厰􅀉庫銀三千餘兩司獄司囚重犯十二名輕犯二十九名廣盈倉粮米二千四百四十石零盡行刼取釋放又將軍器庫盔甲刀鎗刼去共一十一萬九千二百二十四件九江衛􅀍賊刼去軍器二千六百三十九件演武􅈦軍器一萬六百三十件并響器八十餘件鎮撫監賊犯蔡日竒等七名盡行刼取釋放及燒毀大哨船五隻軍舍房屋七十六間駕去大哨船二隻小哨船十一隻徳化縣􅀍賊將縣庫銀共三百二兩零預備倉稻榖一萬七千二百石零縣監輕重囚犯二十名盡行刼放及燒毁官民房屋七百五十九間殺死男婦一十五名潯陽驛􅀍賊燒毀官􅆹一座耳房二間及站船鋪陳等物惟指揮劉勲將兵備衙門賞功支剰銀三十兩六錢及􅂍罰銀三十二兩并運軍行粮折銀二十九兩六錢􅀵貯私家捏開在衛􅀍刼事渉侵欺及查九江府鈔厰􅀉庫銀兩行拘庫子皮廷貴等審供侵分料銀一千一百零六兩四錢情由在官將各犯送府監候拘齊未到人犯追問囬報及查得僉事師䕫持奉偽檄前至九江安撫因見府衛等官不􅀙偽命駕船去訖續查得該俯所屬湖口縣於六月十七日西時􅀍逆黨熊内官等押兵到縣因無城池知縣章玄梅等帶印暫避縣後嶺背集兵次日對敵殺死逆黨魏清等􅀍賊殺死民快壯丁共一百二十名殺死居民一十一名放出縣監重囚三名輕犯一十一名燒毀房屋二十間民房一千八百三十五間本縣官庫銀兩先已窖蔵及各衙門印信俱各見在止􅀍刼去在倉米一百五十九石在庫皮盔鐡銃􅃓弩三百件鐡彈子三十二斤及衣服靴鈔等物并將逺近年分卷册俱各毀壊彭澤縣於六月十八日卯時􅀍賊蜂擁上街延燒房屋吏舍一百餘間並無擄掠男婦當有知縣潘琨督同廵捕官兵守保印信倉庫錢糧文卷俱全徳化縣於六月十七日􅀍􅀙逆䕶衛指揮丁綱等統帶旗校到屯􅀧取軍丁致􅀍驚散鄉村男婦該縣嚴督兵快人等保守城池俱各無虞除重復查勘明白將湖口彭澤二縣􅀍害人民行令該府斟酌􅀍害重輕将見在錢糧加意賑恤其徳化縣􅀍害之家縁無錢可支已行該府徑申本院請􅀤錢糧賑恤使􅀍害殘民得以存濟職等仍行多方撫諭激以忠義戒以勤儉人皆感服遵聴遂有更生之樂等因又據知府曾璵周朝佐呈稱查勘得南康府六月十六日夜􅀍賊船一千餘隻衝入本府彼有該府通判俞椿推官王詡公出未囬知府陳霖同知張禄通判蔡譲因見城池新築未完民兵寡少同附郭星子縣掌印佐貳并府縣儒學倉場局務等官各帶卬信潜避廬山賊遂入城殺死官舍民快劉大等一十二名􅀍搬刼府庫金一兩五錢零紫陽遺惠倉原貯榖一千七石零刼放府獄重輕囚犯一百一十一名燒毀六房卷宗黃冊及掠刼居民房屋家財知府陳霖等潜住各鄉集兵陸續擒斬賊犯共二百三十餘名顆至二十七日餘賊五百餘人奔来河下知府陳霖同州縣各官督兵擒斬賊犯一百餘名顆適遇委官知府曽璵周朝佐各帶官兵自王家渡一路追賊到府恊力勦殺各起餘賊又擒殺賊共三百三十餘名顆各解審訖查得星子縣知縣王淵之􅀍賊追跌致死署印縣丞曹時中當将印信付與吏熊正背􅀒同主簿楊本禄俱入廬山曹時中迯躱不知去向兵快胡碧玉等五名􅀍賊殺死及刼虜居民男婦徐仲徳等五十八名口焚燒房屋并刼掠居民共五百三十六人家刼放獄囚􅃓正道等四十四名縣廊庫銀九十七兩零及􅂍物鈔貫俱􅀍刼去止有銀二百一十三兩四錢八分係庫子戴汶泗收藏囬家首出還官陸續擒􅀗賊犯顔濟等二十名又查得都昌縣原無城池聞賊入境署印主簿王􅂦典史王仲祥率兵迎敵保守倉庫俱不曽􅀍刼􅀍賊殺死渰死兵快居民叚容等三十一名焚燒刼掠居民共一千二百一十六家又查建昌縣原無城池逆黨儀賔李世英等帶領賊兵三百餘名来縣知縣方鐸縣丞錢惠主簿王􅃏同儒學敎諭唐汶等見勢不敵各帶印信潜避集兵當􅀍李世英將獄禁囚犯熊澄等八十四名盡行刼放並無刼掠焚燒倉庫錢糧官民房屋随􅀍方鐸陸續擒􅀗李世英等一百七十五名口觧報訖又查訪勘得安義縣新創城池未完􅀍逆黨旗校火信等領兵到縣将官􅆹燒毀三間六房文卷俱􅀍棄毀知縣王軾因見賊􅀔衆多退避集兵主簿董􅀦宣因男董茂隆投入寍府懼罪迯走儒學訓導陳仕端等亦随縣官避出其倉庫獄禁居民房屋俱不曽􅀍焚刼王軾同各官前後領兵擒斬賊共一千餘名顆轉觧訖撫囬南康府各屬縣復業迯民一萬二千四百餘家遵奉通行各屬暫令管事及賑恤事宜另行申請等因各呈到臣㑹同各官訪勘相同臣等議得九江南康府衛所縣大小官員均有守土之􅀉俱犯失事之律􅁒将各官通革管事待罪縁地方殘破之餘又係朝覲年分無官可委更代姑􅀙􅁠宜暫行管事其各府縣􅀍害人民并缺乏軍資已於先取見在錢粮内量數查發前去賑給外􅂙照九江地方當水陸之衝據湖湘之要朝廷以其控􅅁南圻屏蔽江右實為要地故既有府衞之守又特為兵備之設其城池三面臨水地􅀔四圍險固平時守備若嚴臨變必難驟破各該守備官員安於承平寛縦軍士雖預知賊報而倉惶無備及一聞賊至而望風奔走指揮劉勲除監守自盗官錢外與李泮等棄城先遁致賊殘破知府汪潁推官陳深知縣徐志道等因見守戰無兵亦各懐印迯難百户白昇等一印不保安望守城副使曹雷職專兵備防守不嚴雖城破之日偶幸不與而失事之責終為有因再照南康地方固稱土瘠民稀然亦􅀒山阻水雖新創之城尚爾􅁱築未完而守土之職惟當效死勿去該府知府陳霖同知陳禄通判蔡讓星子縣主簿楊永禄等畏縮無備迯難棄城湖口建昌二縣知縣章玄梅方鐸聞賊先遁致殘縣治安義縣知縣王軾賊黨在境不知先事之圗後雖有功無救地方之變彭澤縣知縣潘琨都昌縣主簿王􅂦等印信倉庫雖􅀗無虞而都昌􅀍賊殺死兵快彭澤􅀍賊燒刼居民失事之責亦有攸歸星子縣縣丞曹時中安義縣主簿董國宣一則脫迯不首一則縦子投賊至於各該府縣首領儒學倉場局務等官雖無守土之責俱有棄職之罪以上各官求情固有輕重揆義俱犯憲條雖有後􅀗之功難掩先失之罪及照近年以来士氣不振兵律欠嚴蓋由姑息屢行激勵之方不立規利避害者􅀗免委身効職者難容是以偷靡成習節義鮮彰伏望皇上大奮乾剛肅清綱紀乞􅃙法司􅂙詳情罪􅁿重通将各官究治如律雖或量功末减亦必各示懲創庶有作新之機足為将来之警王文成公全書卷之七文錄四序記說别三子序丁􅆗自程朱諸大儒没而師友之道遂亡六經分裂於訓詁支離蕪蔓於辭章業舉之習聖學㡬於息矣有志之士思起而興之然卒徘􅆦嗟咨逡廵而不振因弛然自廢者亦志之弗立弗講於師友之道也夫一人爲之二人從而翼之已而翼之者益衆焉雖有難爲之事其弗成者鮮矣一人爲之三人從而危之己而危之者益衆焉雖有易成之功其克濟者亦鮮矣故凢有志之士必求助於師友無師友之助者志之弗立弗求者也自予始知學即求師於天下而莫予誨也求友於天下而與予者寡矣又求同志之士二三子之外邈乎其寥寥也殆予之志有未立邪蓋自近年而又得蔡希顔朱守中於山隂之白洋得徐曰仁於餘姚之馬堰曰仁予妹婿也希顔之深潜守中之明敏曰仁之温恭皆予所不逮三子者徒以一日之長視予以先軰予亦居之而弗辭非能有加也姑􅁒假三子者而為之證遂忘其非有也而三子者亦姑欲假予而存師友之餼羊不謂其不可也當是之時其相與也亦􅄅乎難㢤予有歸􅀮之圖方將與三子就雲霞依泉石追濂洛之遺風求孔顔之真趣灑然而樂超然而遊忽焉而忘吾之老也今年三子者為有司所選一舉而盡之何予得之之難而有司者襲取之之易也予未暇以得舉為三子喜而先以失助為予憾三子亦無喜於其得舉而方且戚於其去予也􅃮雕開有言吾斯之未能信斯三子之心歟曾􅀧志於詠歌浴沂而夫子喟然與之斯予與三子之㝠然而契不言而得之者歟三子行矣遂使舉進士任職就列吾知其能也然而非所􅁒也使遂不進而歸詠歌優㳺有日吾知其樂也然而未可必也天將降大任於是人必先違其所樂而投之於其所不􅁒所以衡心拂慮而增其所不能是玉之成也其在玆行歟三子則焉徃而非學矣而予終寡於同志之􅂇也三子行矣沉潜剛克髙明柔克非箕子之言乎温恭亦沉潜也三子識之焉徃而非學矣苟三子之學成雖不吾邇其為同志之助也不多乎㢤増城湛原明宦於京師吾之同道友也三子徃見焉猶吾見也巳贈林以吉歸省序辛未陽明子曰求聖人之學而弗成者殆以志之弗立歟天下之人志輪而輪焉志裘而裘焉志巫醫而巫醫焉志其事而弗成者吾未之見也輪裘巫醫遍天下求聖人之學者間數百年而弗一二見為其事之難歟亦其志之難歟弗志其事而能有成者吾亦未之見也林以吉将求聖人之事過予而論學予曰子盍論子之志乎志定矣而後學可得而論子閩也將閩是求而予言子以越之道路弗之聼也予越也將越是求而子言予以閩之道路弗之聼也夫乆溺於流俗而驟語以求聖人之事其始也必將有自餒而不敢當已而舊習牽焉又必有自眩而不能决已而外議奪焉又必有自沮而或以懈夫餒而求有以勝之眩而求有以信之沮而求有以進之吾見立志之難能也巳志立而學半四子之言聖人之學備矣苟志立而於是乎求焉其切磋講明之益以吉自取之尚其有窮也㢤見素先生子諸父也子歸而以予言正之且以爲何如送宗伯喬白巖序辛未大宗伯白巖喬先生將之南都過陽明子而論學陽明子曰學貴專先生曰然予少而好奕食忘味􅆍忘􅄰目無改觀耳無改聼蓋一年而詘鄉之人三年而國中莫有予當者學貴專㢤陽明子曰學貴精先生曰然予長而好文詞字字而求焉句句而鳩焉研衆史覈百氏蓋始而希迹於宋唐終焉浸入於漢魏學貴精㢤陽明子曰學貴正先生曰然予中年而好聖賢之道奕吾悔焉文詞吾媿焉吾無所容心矣子以為奚若陽明子曰可㢤學奕則謂之學學文詞則謂之學學道則謂之學然而其歸逺也道大路也外是荆􅁄之蹊鮮克逹矣是故專於道斯謂之專精於道斯謂之精專於奕而不專於道其專溺也精於文詞而不精於道其精僻也夫道廣矣大矣文詞技能於是乎出而以文詞技能為者去道逺矣是故非專則不能以精非精則不能以明非明則不能以誠故曰惟精惟一精精也專一也精則明矣明則誠矣是故明精之為也誠一之基也一天下之大本也精天下之大用也知天地之化育而况於文詞技能之末乎先生曰然㢤予將終身焉而悔其晚也陽明子曰豈易㢤公卿之不講學也乆矣昔者衛武公年九十而猶詔於國人曰毋以老耄而棄予先生之年半於武公而功可倍之也先生其不媿於武公㢤某也敢忘國士之交警贈王尭卿序辛未終南王尭卿為諌官三月以病致其事而去交逰之贈言者以十數而猶乞言於予甚㢤吾黨之多言也夫言日茂而行益荒吾􅁒無言也乆矣自學術之不明世之君子以名為實凢今之所謂務乎其實皆其務乎其名者也可無察乎尭卿之行人皆以為髙矣才人皆以為羙矣學人皆以為博矣是可以無察乎自喜於一節者不足與進於全徳之地求免於鄉人者不可以語於聖賢之途氣浮者其志不確心麄者其造不深外誇者其中日陋已矣吾惡夫言之多也虎谷有君子􅀋無言者尭卿過焉其以予言質之别張常甫序辛未太史張常甫將歸省告别於司封王某曰期之别也何以贈我乎某曰䖏九月矣未嘗有言焉期之别又多乎㢤常甫曰斯􅀖期之過也雖然必有以贈我某曰工文詞多論􅀃廣探極覧以爲博也可以爲學乎常甫曰知之辯名物考度數釋􅀴正史以爲宻也可以爲學乎常甫曰知之整容色􅁱辭氣言必信動必果談􅀃仁義以爲行也可以爲學乎常甫曰知之曰去是三者而恬淡其心專一其氣廓然而虚湛然而定以爲静也可以爲學乎常甫黙然良乆曰亦知之某曰然知之古之君子惟有所不知也而後能知之後之君子惟無所不知是以容有不知也夫道有本而學有要是非之辯精矣義利之間㣲矣斯吾未之能信焉曷亦姑無以為知之也而姑疑之而姑思之乎常甫曰唯吾姑無以為知之而姑疑之而姑思之期而見吾有以復於子别湛甘泉序壬申顔子没而聖人之學亡曽子唯一貫之㫖傳之孟軻終又二千餘年而周程續自是而後言益詳道益晦析理益精學益支離無本而事於外者益繁以難蓋孟氏患楊墨周程之際釋老大行今世學者皆知宗孔孟賤楊墨擯釋老聖人之道若大明於世然吾從而求之聖人不得而見之矣其能有若墨氏之兼愛者乎其能有若楊氏之為我者乎其能有若老氏之清淨自守釋氏之究心性命者乎吾何以楊墨老釋之思㢤彼於聖人之道異然猶有自得也而世之學者章繪句􅅣以誇俗詭心色取相飾以偽謂聖人之道勞苦無功非復人之所可為而徒取辯於言詞之間古之人有終身不能究者今吾皆能言其畧自以為若是亦足矣而聖人之學遂廢則今之所大患者豈非記誦詞章之習而弊之所從来無亦言之太詳析之太精者之過歟夫楊墨老釋學仁義求性命不得其道而偏焉固非若今之學者以仁義為不可學性命之為無益也居今之時而有學仁義求性命外記誦辭章而不為者雖其陷於楊墨老釋之偏吾猶且以為賢彼其心猶求以自得也夫求以自得而後可與之言學聖人之道某㓜不問學陷溺於邪僻者二十年而始究心於老釋賴天之靈因有所覺始乃沿周程之􅀃求之而若有得焉顧一二同志之外莫予翼也岌岌乎仆而後興晚得友於甘泉湛子而後吾之志益堅毅然若不可遏則予之資於甘泉多矣甘泉之學務求自得者也世未之能知其知者且疑其為禪誠禪也吾猶未得而見而况其所志卓爾若此則如甘泉者非聖人之徒歟多言又烏足病也夫多言不足以病甘泉與甘泉之不為多言病也吾信之吾與甘泉友意之所在不言而㑹論之所及不約而同期於斯道斃而後巳者今日之别吾容無言夫惟聖人之學難明而易惑習俗之降愈下而益不可囬任重道逺雖已無俟於言顧復於吾心若有不容巳也則甘泉亦豈以予言為綴乎别方叔賢序辛未予與叔賢䖏二年見叔賢之學凢三變始而尚辭再變而講􅀃又再變而慨然有志聖人之道方其辭章之尚於予若氷炭焉講􅀃矣則違合者半及其有志聖人之道而沛然於予同􅃐將遂去之西樵山中以成其志叔賢亦可謂善變矣聖人之學以無我為本而勇以成之予始與叔賢為僚叔賢以郎中故事位吾上及其學之毎變而禮予日恭䘚乃自稱門生而待予以先覺此非脫去世俗之見超然於無我者不能也雖横渠子之勇徹臯比亦何以加於此獨愧予之非其人而何以當之夫以叔賢之善變而進之以無我之勇其於聖人之道也何有斯道也絶響於世餘三百年矣叔賢之羙有若是是以樂為吾黨道之别王純甫序辛未王純甫之掌敎應天也陽明子既勉之以孟氏之言純甫謂未盡也請益曰道未之嘗學而以敎為職鰥官其罪矣敢問敎何以㢤陽明子曰其學乎盡吾之所以學者而敎行焉耳曰學何以㢤曰其敎乎盡吾之所以敎者而學成焉耳古之君子有諸巳而後求諸人也曰剛柔淳漓之異質矣而盡之我敎其可一乎曰不一所以一之也天之於物也巨微􅁱短之殊位而生成之一也惟技也亦然􅃓冶不相為能而其足於用亦一也匠斵也陶垣也圬墁也其足以成室亦一也是故立法而考之技也各詣其巧矣而同足於用因人而施之敎也各成其材矣而同歸於善仲尼之答仁孝也孟氏之論貨色也可以觀敎矣曰然則敎無定法乎昔之辯者則何嚴也曰無定矣而以之必天下則􅃓焉而冶廢匠焉而陶圬廢聖人不欲人人而聖之乎然而質人人殊故辯之嚴者曲之致也是故或失則隘或失則支或失則流矣是故因人而施者定法矣同歸於善者定法矣因人而施質異也同歸於善性同也夫敎以復其性而巳由尭舜而来未之有改而謂無定乎别黄宗賢歸天台序壬申君子之學以明其心其心本無昧也而欲為之蔽習為之害故去蔽與害而明復匪自外得也心猶水也汚入之而流濁猶鍳也垢積之而光昧孔子告顔淵克巳復禮為仁孟軻氏謂萬物皆備於我反身而誠夫巳克而誠固無待乎其外也世儒既叛孔孟之􅀃昧於大學格致之訓而徒務博乎其外以求益乎其内皆入汚以求清積垢以求明者也弗可得已守仁㓜不知學陷溺於邪僻者二十年疾疚之餘求諸孔子子思孟軻之言而恍若有見其非守仁之能也宗賢於我自為童子即知棄去舉業勵志聖賢之學循世儒之􅀃而窮之愈勤而益難非宗賢之罪也學之難易失得也有原吾嘗為宗賢言之宗賢於吾言猶渴而飲無弗入也毎見其溢於面今既豁然吾黨之良莫有及者謝病去不忍予别而需予言夫言之而莫予聼倡之而莫予和自今失吾助矣吾則忍於宗賢之别而容無言乎宗賢歸矣為我結廬天台鴈蕩之間吾將老焉終不使宗賢之獨徃也贈周瑩歸省序乙亥永康周瑩徳純嘗學於應子元忠既乃復見陽明子而請益陽明子曰子從應子之所来乎曰然應子則何以敎子曰無他言也惟日誨之以希聖希賢之學毋溺於流俗且曰斯吾所嘗就正於陽明子者也子而不吾信則盍親徃焉瑩是以不逺千里而来謁曰子之来也猶有所未信乎曰信之曰信之而又来何也曰未得其方也陽明子曰子既得其方矣無所事於吾周生悚然有間曰先生以應子之故望卒賜之敎陽明子曰子既得之矣無所事於吾周生悚然而起茫然有間曰瑩愚不得其方先生毋乃以瑩為戯􅉷䘚賜之敎陽明子曰子之自永康而来也程㡬何曰千里而遥曰逺矣從舟乎曰從舟而又登陸也曰勞矣當兹六月亦暑乎曰途之暑特甚也曰難矣具資糧從童僕乎曰中途而僕病乃舍貸而行曰玆益難矣曰子之来既逺且勞其難若此也何不遂返而必来乎將亦無有強子者乎曰瑩至於夫子之門勞苦艱難誠樂之寧以是而遂返又俟乎人之強之也乎曰斯吾之所謂子之既得其方也子之志􅁒至於吾門也則遂至於吾門無假於人子而志於聖賢之學有不至於聖賢者乎而假於人乎子之舍舟從陸􅂢僕貸糧冐毒暑而来也則又安所從受之方也生躍然起拜曰玆乃命之方也已抑瑩由於其方而迷於其􅀃必俟夫子之言而後躍如也則何居陽明子曰子未覩乎爇石以求􅁅者乎火力具足矣乃得水而遂化子歸就應子而足其火力焉吾將儲擔石之水以俟子之再見贈林典卿歸省序乙亥林典卿與其弟遊於大學且歸辭於陽明子曰元叙嘗聞立誠於夫子矣今兹歸敢請益陽明子曰立誠典卿曰學固此乎天地之大也而星辰麗焉日月明焉四時行焉引􅁼而言之不可窮也人物之富也而草木蕃焉禽獸群焉中國夷狄分焉引􅁼而言之不可盡也夫古之學者殫智慮弊精力而莫究其緒焉靡晝夜極年􅀊而莫竟其􅀃焉析􅁞絲擢牛尾而莫既其奥焉而曰立誠立誠盡之矣乎陽明子曰立誠盡之矣夫誠實理也其在天地則其麗焉者則其明焉者則其行焉者則其引􅀋而言之不可窮焉者皆誠也其在人物則其蕃焉者則其群焉者則其分焉者則其引􅀋而言之不可盡焉者皆誠也是故殫智慮弊精力而莫究其緒也靡晝夜極年􅀊而莫竟其􅀃也析蠶絲擢牛尾而莫既其奥也夫誠一而已矣故不可復有所益益之是爲二也二則偽故誠不可益不可益故至誠無息典卿起拜曰吾今乃知夫子之敎若是其要也請终身事之不敢復有所疑陽明子曰子歸有黄宗賢氏者應元忠氏者方與講學於天台鴈蕩之間倘遇焉其遂以吾言諗之贈陸清伯歸省序乙亥陸清伯澄歸歸安與其友二三子論繹所學贈䖏焉二三子或曰清伯之學日進矣始吾見清伯其氣􅀭􅀭然若浮雲其言滔滔然若流波今而日黙黙爾日慊慊爾日雍雍爾日休休爾有大徑庭焉以是知其進也或曰清伯始見夫子一月一至既而旬一至又既而五六日三四日而一至又既而遷居於夫子之傍後乃請於夫子掃􅁃下之室而旦暮侍焉夫徳莫淑於尊賢學莫遄於親師故趨􅁠門者日進於勢逰市肆者日進於利清伯於夫子之道日加親附焉吾未遑其他即是可以知其學之進也矣清伯曰有是㢤澄則以為日退也澄聞夫子之敎而茫然已而歆然忽耿然而疑已而大疑焉又閃然大駭乃忽闖然若有覩也當是時則亦㡬有所益矣自是且數月蓋悠焉游焉業不加􅁱焉反而求焉倀倀然頽頽然昏蔽擴而愈進私累息而愈興衆妄攻而愈固如上灘之舟屢失屢下力挽而不能前以為日退也明日又辭於陽明子二三子偕焉各言其所以陽明子曰其然乎其然乎謂已為日退者進􅁱之勵善日進矣謂人爲日進者與人為善者其善亦日進矣雖然謂已爲日退也而意阻焉能無日退乎謂人為日進也而氣歉焉亦能無日退乎斯又進退之機吉凶之所由分也可無慎乎贈周以善歸省序乙亥江山周以善究心格物致知之學有年矣苦其難而不能有所進也聞陽明子之􅀃而異之意其或有見也就而問之聞其􅀃戚然若有所省歸求其故而不合則遅疑旬日又徃聞其說則又戚然若有所省歸求其故而不合則又遅疑者旬日如是徃復數月求之既無所􅀗去之又弗能也乃徃告之以其故陽明子曰子未聞昔人之論奕乎奕之爲數小數也不專心致志則亦不可以得也今子入而聞吾之􅀃出而有鴻鵠之思焉亦何怪乎勤而弗􅀗矣於是退而齋潔而以弟子之禮請陽明子與之坐蓋黙然良乆乃告之以立誠之􅀃聳然若仆而興也明日又言之加宻焉證之以大學明日又言之加密焉證之以論孟明日又言之加密焉證之以中庸乃躍然喜避席而言曰積今而後無疑於夫子之言而後知聖賢之教若是其深切簡易也而後知所以格物致知以誠吾之身吾喜焉吾悔焉十年之攻徒以斃精神而亂吾之心術也悲夫積将以夫子之言告同志俾及時從事於此無若積之底於悔也庶以報夫子之徳而無􅀒於夫子之敎居月餘吿歸陽明子叙其言以遺之使無忘於得之之難也贈郭善甫歸省序乙亥郭子自黄来學踰年而告歸曰慶聞夫子立志之􅀃亦既知所從事矣今玆將逺去敢請一言以為夙夜朂陽明子曰君子之於學也猶農夫之於田也既善其嘉種矣又深耕易耨去其蝥莠時其灌漑早作而夜思皇皇惟嘉種之是憂也而後可望於有秋夫志猶種也學問思辯而篤行之是耕耨灌溉以求於有秋也志之弗端是荑稗也志端矣而功之弗􅁇是五榖之弗熟弗如荑稗也吾嘗見子之求嘉種矣然猶懼其或荑稗也見子之勤耕耨矣然猶懼其荑稗之弗如也夫農春種而秋成時也由志學而至於立自春而徂夏也由立而至於不惑去夏而秋矣已過其時猶種之未定不亦大可懼乎過時之學非人一己百未之敢望而猶或作輟焉不亦大可哀乎從吾游者衆矣雖開􅀃之多未有出於立志者故吾於子之行卒不能舍是而别有所􅀃子亦可以無疑於用力之方矣贈鄭徳夫歸省序乙亥西安鄭徳夫将學於陽明子聞士大夫之議者以為禪學也復已之則與江山周以善者姑就陽明子之門人而考其說若非禪者也則又姑與就陽明子親聼其􅀃焉蓋旬有九日而後釋然於陽明子之學非禪也始具弟子之禮師事之問於陽明子曰釋與儒孰異乎陽明子曰子無求其異同於儒釋求其是者而學焉可矣曰是與非孰辨乎曰子無求其是非於講説求諸心而安焉者是矣曰心又何以能定是非乎曰無是非之心非人也口之於甘苦也與易牙同目之於妍􅎀也與離婁同心之於是非也與聖人同其有昧焉者其心之於道不能如口之於味目之於色之誠切也然後私得而蔽之子務立其誠而已子惟慮夫心之於道不能如口之於味目之於色之誠切也而何慮夫甘苦妍􅎀之無辯也乎曰然則五經之所載四書之所傳其皆無所用乎曰孰為而無所用乎是甘苦妍􅎀之所在也使無誠心以求之是談味論色而已也又孰從而得甘苦妍􅎀之真乎既而告歸請陽明子爲書其􅀃遂書之紫陽書院集序乙亥豫章熊侯世芳之守徽也既敷政其境内乃大新紫陽書院以明朱子之學萃七校之秀而躬敎之於是校士程曽氏採摭書院之興廢爲集而弁以白鹿之規明政教也来請予言以諗多士夫爲學之方白鹿之規盡矣警勸之道熊侯之意勤矣興廢之故程生之集備矣又奚以予言爲乎然予聞之徳有本而學有要不於其本而泛焉以從事髙之而虛無卑之而支離终亦流蕩失宗勞而無得矣是故君子之學惟求得其心雖至於位天地育萬物未有出於吾心之外也孟氏所謂學問之道無他求其放心而已矣者一言以蔽之故博學者學此者也審問者問此者也慎思者思此者也明辯者辯此者也篤行者行此者也心外無事心外無理故心外無學是故於父子盡吾心之仁於君臣盡吾心之義言吾心之忠信行吾心之篤敬懲心忿窒心􅁒遷心善改心過䖏事接物無所徃而非求盡吾心以自慊也譬之植焉心其根也學也者其培擁之者也灌溉之者也扶植而刪鋤之者也無非有事於根焉耳矣朱子白鹿之規首之以五敎之目次之以為學之方又次之以䖏事接物之要若各為一事而不相䝉者斯殆朱子平日之意所謂隨事精察而力行之庶㡬一旦貫通之妙也歟然而世之學者徃徃遂失之支離􅃈屑色荘外馳而流入於口耳聲利之習豈朱子之敎使然㢤故吾因諸士之請而特原其本以相朂庶㡬乎操存講習之有要亦所以發明朱子未盡之意也朱子晚年定論序戊寅洙泗之傳至孟子而息千五百餘年濂溪明道始復追㝷其緒自後辯析日詳然亦日就支離决裂旋復湮晦吾嘗深求其故大抵皆世儒之多言有以亂之守仁蚤􅀊業舉溺志辭章之習既乃稍知從事正學而苦於衆􅀃之紛撓疲爾茫無可入因求諸老釋欣然有㑹於心以爲聖人之學在此矣然於孔子之敎間相出入而措之日用徃徃闕漏無歸依違徃返且信且疑其後謫官龍場居夷䖏困動心忍性之餘恍若有悟體驗探求再更寒暑證諸六經四子沛然若决江河而放之海也然後嘆聖人之道坦如大路而世之儒者妄開竇徑蹈荆􅁄隨坑塹究其為􅀃反出二氏之下宜乎世之髙明之士厭此而趨彼也此豈二氏之罪㢤間嘗以此語同志而聞者競相非議自以為立異好奇雖毎痛反深抑務自搜剔斑瑕而愈益精明的確洞然無復可疑獨於朱子之􅀃有相牴牾恒疚於心切疑朱子之賢而豈其於此尚有未察及官留都復取朱子之書而檢求之然後知其晚􅀊固巳大悟舊􅀃之非痛悔極艾至以為自誑誑人之罪不可勝贖世之所傳集註或問之􅁼乃其中年未定之􅀃自咎以爲舊本之誤思改正而未及而其諸語􅀋之屬又其門人挾勝心以附巳見固於朱子平日之􅀃猶有大相繆戾者而世之學者局於見聞不過持循講習於此其於悟後之論槩乎其未有聞則亦何怪乎予言之不信而朱子之心無以自暴於後世也乎予旣自幸其説之不繆於朱子又喜朱子之先得我心之同然且慨夫世之學者徒守朱子中年未定之􅀃而不復知求其晚􅀊既悟之論競相呶呶以亂正學不自知其巳入於異端輒採録而裒集之私以示夫同志庶㡬無疑於吾􅀃而聖學之明可冀矣别梁日孚序戊寅聖人之道若大路雖有跛蹩行而不巳朱有不至而世之君子顧以為聖人之異於人若彼其甚逺也其為功亦必若彼其甚難也而淺易若此豈其可及乎則從而求之艱深恍愡溺於支離騖於虚髙率以為聖人之道必不可至而甘於其質之所便日以淪於汚下有從而求之者競相􅅓訕曰狂誕不自量者也嗚呼其弊也亦豈一朝一夕之故㢤孟子云徐行後長者謂之弟疾行先長者謂之不弟夫徐行者豈人所不能㢤所不為也世之人不知咎其不為而歸咎於其不能其亦不思而巳矣進士梁日孚携家謁選於京過贛停舟見予始與之語移時而别明日又来與之語日昃而别又明日又来日入而未􅃘去又明日則假館而請受業焉同舟之人強之北者開譬百端日孚皆􅀏而不應莫不􅅝且異其最親愛者曰子有萬里之行戒僮㒒聚資斧具舟楫又挈其家室經營閱􅀊而始就道行未數百里而中止此不有大苦必有大樂者乎子亦可以語我乎日孚􅀏曰吾今則有大苦亦誠有大樂者然未易以語子也子見病狂䘮心者乎方其昬逸瞶亂赴湯火蹈荆􅁄莫不恬然自信以為是也比遇良醫沃之以清冷之漿而投之以神明之劑始甦然以醒告之以其向之所為又始駭然以苦示之以其所從歸之途又始欣然以喜且恨遇斯人之晚也彼病狂不復者反從而哂唁之以為是變其常今吾與子之事亦何以異於此矣居無何予以軍旅之役出而逺日孚者且兩月謂日孚既去矣及旋而日孚居然以待既以委其資斧於逆旅歸其家室於故鄉泊然而樂若將終身焉扣其學日有所明而月有所異矣然後益嘆聖人之學非夫自暴自棄未有不可由之而至而日孚出於流俗殆孟子所謂豪傑之士者矣復留餘三月其母使人来謂曰姑北行以畢吾􅂅然後從爾所好知日孚者亦交以是勸日孚請曰焯焉能一日而去夫子將復赴湯火蹈荆􅁄矣予曰其然㢤子以聖人之道爲有方體乎爲可拘之以時限之以地乎世未有既醒之人而復赴湯火蹈荆􅁄者子務醒其心毋徒湯火荆􅁄之爲懼日孚良乆曰焯近之矣聖人之道求之於心故不滯於事出之以理故不泥於物根之以性故不拘以時動之以神故不限以地苟知此矣焉徃而非學也奚必恒於夫子之門乎焯請暫辭而北疑而復求正予莞爾而笑曰近之矣近之矣大學古本序戊寅大學之要誠意而已矣誠意之功格物而已矣誠意之極止至善而巳矣止至善之則致知而已矣正心復其體也􅁱身著其用也以言乎己謂之明徳以言乎人謂之親民以言乎天地之間則備矣是故至善也者心之本體也動而後有不善而本體之知未嘗不知也意者其動也物者其事也致其本體之知而動無不善然非即其事而格之則亦無以致其知故致知者誠意之本也格物者致知之實也物格則知致意誠而有以復其本體是之謂止至善聖人懼人之求之於外也而反覆其辭舊本析而聖人之意亡矣是故不務於誠意而徒以格物者謂之支不事於格物而徒以誠意者謂之虚不本於致知而徒以格物誠意者謂之妄支與虛與妄其於至善也逺矣合之以敬而益綴􅀘之以傳而益離吾懼學之日逺於至善也去分章而復舊本傍爲之什以引其義庶㡬復見聖人之心而求之者有其要噫乃若致知則存乎心悟致知焉盡矣禮記纂言序庚辰禮也者理也理也者性也性也者命也維天之命於穆不已而其在於人也謂之性其粲然而條理也謂之禮其純然而粹善也謂之仁其截然而裁制也謂之義其昭然而明覺也謂之知其渾然於其性也則理一而已矣故仁也者禮之體也義也者禮之宜也知也者禮之通也經禮三百曲禮三千無一而非仁也無一而非性也天叙天秩聖人何心焉蓋無一而非命也故克己復禮則謂之仁窮理則盡性以至於命盡性則動容周旋中禮矣後之言禮者吾惑焉紛紜器數之爭而牽制刑名之未窮年矻矻弊精於祝吏之糟粕而忘其所謂經綸天下之大經立天下之大本者禮云禮云玉帛云乎而人之不仁也其如禮何㢤故老莊之徒外禮以言性而謂禮爲道徳之衰仁義之失既已堕於空虛渀蕩而世儒之􅀃復外性以求禮遂謂禮止於器數制度之間而議擬倣像於影響形迹以爲天下之禮盡在是矣故凢先王之禮煙􅀩􅁅散而卒以煨燼於天下要亦未可專委罪於秦火者僣不自度嘗欲取禮記之所載掲其大經大本而䟽其條理節目庶㡬器道本末之一致又懼其徳之弗任而時亦有所未及也間嘗為之􅀃曰禮之於節文也猶規矩之於方圎也非方圎無以見規矩之用非節文則亦無從而睹所謂禮矣然方圎者規矩之所出而不可遂以方圓為規矩故執規矩以為方圎則方圎不可勝用舎規矩以為方圎而遂以方圎為之規矩則規矩之用息矣故規矩者無一定之方圎而方圎者有一定之規矩此學禮之要盛徳者之所以動容周旋而中也宋儒朱仲晦氏慨禮經之蕪亂嘗欲考正而刪定之以儀禮為之經禮記為之傳而其志竞亦弗就其後吴㓜清氏因而為纂言亦不數數於朱􅀃而於先後䡖重之間固已多所發明二子之見其規條指畫則旣出於漢儒矣其所謂觀其㑹通以行其典禮之原則尚恨吾生之晚而未及與聞之也雖然後聖而有作則無所容言矣後聖而未有作也則如纂言者固學禮者之箕裘筌蹄而可以少之乎姻友胡汝登忠信而好禮其為寧國也將以是而施之刻纂言以敷其􅀃而屬序於予予將進汝登之道而推之於其本也故為序之若此云象山文集序庚辰聖人之學心學也堯舜禹之相授受曰人心惟危道心惟微惟精惟一允執厥中此心學之源也中也者道心之謂也道心精一之謂仁所謂中也孔孟之學惟務求仁蓋精一之傳也而當時之弊固已有外求之者故子貢致疑於多學而識而以博施濟衆為仁夫子告之以一貫而敎以能近取譬蓋使之求諸其心也迨於孟氏之時墨氏之言仁至於摩頂放踵而告子之徒又有仁内義外之􅀃心學大壞孟子闢義外之􅀃而曰仁人心也學問之道無他求其放心而已矣又曰仁義禮智非由外鑠我也我固有之弗思耳矣蓋王道息而伯術行功利之徒外假天理之近似以濟其私而以欺於人曰天理固如是不知旣無其心矣而尚何有所謂天理者乎自是而後析心與理而爲二而精一之學亡世儒之支離外索於刑名器數之末以求明其所謂物理者而不知吾心即物理􅀄無假於外也佛老之空虚遺棄其人倫事物之常以求明其所謂吾心者而不知物理即吾心不可得而遺也至宋周程二子始復追㝷孔顔之宗而有無極而太極定之以仁義中正而主静之􅀃動亦定静亦定無内外無將迎之論庶幾精一之㫖矣自是而後有象山陸氏雖其純粹和平若不逮於二子而簡易􅀡截真有以接孟子之傳其議論開闢時有異者乃其氣質章見之殊而要其學之必求諸心則一而已故吾嘗㫁以陸氏之學孟氏之學也而世之議者以其嘗與晦翁之有同異而遂詆以為禪夫禪之􅀃棄人倫遺物理而要其歸極不可以爲天下國家苟陸氏之學而果若是也乃所以為禪也今禪之􅀃與陸氏之􅀃其書具存學者苟取而觀之其是非同異當有不待於辯􅀃者而顧一倡群和勦􅀃雷同如矮人之觀場莫知悲笑之所自豈非貴耳賤目不得於言而勿求諸心者之過歟夫是非同異毎起於人持勝心便舊習而是已見故勝心舊習之為患賢者不免焉撫守李茂元氏將重刋象山之文集而請一言為之序予何所容言㢤惟讀先生之文者務求諸心而無以舊習已見先焉則糠粃精鑿之羙惡入口而知之矣觀徳亭記戊寅君子之於射也内志正外體􅀡持􅃓矢審固而後可以言中故古者射以觀徳徳也者得之於其心也君子之學求以得之於其心故君子之於射以存其心也是故懆於其心者其動妄蕩於其心者其視浮歉於其心者其氣餒忽於其心者其貌惰傲於其心者其色矜五者心之不存也不存也者不學也君子之學於射以存其心也是故心端則體正心敬則容肅心平則氣舒心專則視審心通故時而理心純故譲而恪心宏故勝而不張􅀒而不弛七者備而君子之徳成君子無所不用其學也於射見之矣故曰為人君者以為君鵠為人臣者以為臣鵠為人父者以為父鵠為人子者以為子鵠射也者射巳之鵠也鵠也者心也各射巳之心也各得其心而巳故曰可以觀徳矣作觀徳亭記重􅁱文山祠記戊寅宋丞相文山文公之祠舊在廬陵之當田今螺川之有祠實肇於我孝皇之朝然亦因廢爲新多缺陋而未稱正徳戊寅縣令邵徳容始恢其議於郡守伍文定相與白諸廵撫廵按守巡諸司皆以是爲風化之所係也争措財鳩工圗拓而新之恊守令之力不再踰月而工萃圮者完隘者闢遺者舉巍然煥然不獨廟貌之改觀而吉之人士奔走瞻嘆翕然益起其忠孝之心則是舉之有益於名敎也誠大矣使来請記嗚呼公之忠天下之逹忠也結椎異􅁼猶知敬慕而况其鄉之人乎逆旅經行猶存尸祝而况其鄉之土乎凢有職守皆知尊尚而况其土之官乎然而鄉人之慕之也三有司之崇尚之也文公之没今且三百年矣吉士之以氣節行義後先炳燿謂非聞公之風而興不可也然忠義之降激而為氣節氣節之弊流而為客氣其上焉者無所為而為固公所謂成仁取義者矣其次有所為矣然猶其氣之近於正者也迨其弊也遂有慿其憤戾粗鄙之氣以行其􅎱嫉􅄶驁之私士流於矯拂民入於健訟人欲熾而天理㓕而猶自視以為氣節若是者容有之乎則於公之道非所謂操戈入室者歟吾故備而論之以朂夫兹鄉之後進使之去其偏以歸於全克其私以反於正不媿於公而已矣今廵撫暨諸有司之表勵崇飾固將以行其好徳之心振􅀭風敎詩所謂民之秉彛好是懿徳者也人亦孰無是心苟能充之公之忠義在我矣而又何羡乎然而時之表勵崇飾有好其實而崇之者有慕其名而崇之者有假其迹而崇之者忠義有諸巳思以喻諸人因而表其祠宇􅀣之風聲是好其實者也知其美而未能誠諸身姑以􅁱其祠宇彰其事迹是慕其名者也飾之祠宇而壊之於其身矯之文具而敗之於其行奸以掩其外而襲以阱其中是假其迹者也若是者容有之乎則於公之道非所謂毀瓦畫墁者歟吾故備而論之以朂夫後之官兹土者使無徒慕其名而務求其實毋徒􅁱公之祠而務􅁱公之行不媿於公而已矣某嘗令兹邑睹公祠之圯陋而未能恢既有媿於諸有司慨其風聲氣習之􅂉弊而未能講去其偏復有媿於諸人士樂兹舉之有成也推其愧心之言而為之記􅀙吾道人記乙酉海寍董蘿石者年六十有八矣以能詩聞江湖間與其鄉之業詩者十數軰為詩社旦夕操􅁓吟嗚相與求句字之工至廢􅆍食遺生業時俗共非􅀏之不顧以為是天下之至樂矣嘉靖甲申春蘿石来㳺㑹稽聞陽明子方與其徒講學山中以杖肩其瓢笠詩卷来訪入門長揖上坐陽明子異其氣貌且年老矣禮敬之又詢知其為董蘿石也與之語連日夜蘿石辭彌謙禮彌下不覺其席之彌側也退謂陽明子之徒何生秦曰吾見世之儒者支離􅃈屑􅁱飾邉幅為偶人之狀其下者貪饕争奪於富貴利欲之塲而嘗不屑其所為以為世豈真有所謂聖賢之學乎直假道於是以求濟其私耳故遂篤志於詩而放浪於山水今吾聞夫子良知之􅀃而忽若大􅄰之得醒然後知吾向之所為日夜弊精勞力者其與世之營營利禄之徒特清濁之分而其間不能以寸也幸㢤吾非至於夫子之門則幾於虚此生矣吾将北面夫子而終身焉得無既老而有所不可乎秦起拜賀曰先生之年則老矣先生之志何壯㢤入以請於陽明子陽明子喟然嘆曰有是㢤吾未或見此翁也雖然齒長於我矣師友一也苟吾言之見信奚必北面而後為禮乎蘿石聞之曰夫子殆以予誠之未積歟辭歸兩月棄其瓢笠持一縑而来謂秦曰此吾老妻之所織也吾之誠積若玆縷矣夫子其許我乎秦入以請陽明子曰有是㢤吾未或見此翁也今之後生晚進苟知執筆為文辭稍記習訓詁則已侈然自大不復知有從師學問之事見有或從師問學者則閧然共非􅀏指斥若怪物翁以能詩訓後進從之遊者遍於江湖蓋居然先軰矣一旦聞予言而棄去其數十年之成業如敉屣遂求北面而屈禮焉豈獨今之時而未見若人将古之記傳所載亦未多數也夫君子之學求以變化其氣質焉爾氣質之難變者以客氣之為患而不能以屈下於人遂至自是自欺飾非長敖卒歸於兇頑鄙倍故凢世之為子而不能孝為弟而不能敬為臣而不能忠者其始皆起於不能屈下而客氣之為患耳苟惟理是從而不難於屈下則客氣消而天理行非天下之大勇不足以與於此則如蘿石固吾之師也而吾豈足以師蘿石乎蘿石曰甚㢤夫子之拒我也吾不能以俟請矣入而強納拜焉陽明子固辭不􅀗則計之以師友之間與之探禹穴登爐峯陟秦望尋蘭亭之遺迹徜徉於雲門若耶鑑湖剡曲蘿石日有所聞益充然有得欣然樂而忘歸也其鄉黨之子弟親友與其平日之爲社者或􅀏而非或爲詩而招之返且曰翁老矣何乃自苦若是耶蘿石􅀏曰吾方幸逃於苦海方知憫若之自苦也顧以吾爲苦耶吾方􅀭鬐於渤澥而振羽於雲霄之上安能復投網􅅈而入樊籠乎去矣吾將從吾之所好遂自號曰從吾道人陽明子聞之嘆曰卓㢤蘿石血氣既衰戒之在得矣孰能挺特奮發而復若少年英銳者之為乎真可謂之能從吾所好矣世之人從其名之好也而競以相髙從其利之好也而貪以相取從其心意耳目之好也而詐以相欺亦皆自以為從吾所好矣而豈知吾之所謂真吾者乎夫吾之所謂真吾者良知之謂也父而慈焉子而孝焉吾良知所好也不慈不孝焉斯惡之矣言而忠信焉行而篤敬焉吾良知所好也不忠信焉不篤敬焉斯惡之矣故夫名利物欲之好私吾之好也天下之所惡也良知之好真吾之好也天下之所同好也是故從私吾之好則天下之人皆惡之矣將心勞日拙而憂苦終身是之謂物之役從真吾之好則天下之人皆好之矣將家國天下無所䖏而不當富貴貧賤患難夷狄無入而不自得斯之謂䏻從吾之所好也矣夫子嘗曰吾十有五而志於學是從吾之始也七十而從心所欲不踰矩則從吾而化矣蘿石踰耳順而始知從吾之學毋自以為既晚也充蘿石之勇其進扵化也何有㢤嗚呼世之營營於物􅁒者聞蘿石之風亦可以知所適從也乎親民堂記乙酉南子元善之治越也過陽明子而問政焉陽明子曰政在親民曰親民何以乎曰在明明徳曰明明徳何以乎曰在親民曰明徳親民一乎曰一也明徳者天命之性􅂕昭不昧而萬理之所從出也人之於其父也而莫不知孝焉於其兄也而莫不知弟焉於凢事物之感莫不有自然之明焉是其靈昭之在人心亘萬古而無不同無或昧者也是故謂之明徳其或蔽焉物􅁒也明之者去其物􅁒之蔽以全其本體之明焉耳非能有以増益之也曰何以在親民乎曰徳不可以徒明也人之欲明其孝之徳也則必親於其父而後孝之徳明矣欲明其弟之徳也則必親於其兄而後弟之徳明矣君臣也夫婦也朋友也皆然也故明明徳必在於親民而親民乃所以明其明徳也故曰一也曰親民以明其明徳􅁱身焉可矣而何家國天下之有乎曰人者天地之心也民者對巳之稱也曰民焉則三才之道舉矣是故親吾之父以及人之父而天下之父子莫不親矣親吾之兄以及人之兄而天下之兄弟莫不親矣君臣也夫婦也朋友也推而至於鳥獸草木也而皆有以親之無非求盡吾心焉以自明其明徳也是之謂明明徳於天下是之謂家齊國治而天下平曰然則烏在其為止至善者乎昔之人固有􅁒明其明徳矣然或失之虗罔空寂而無有乎家國天下之施者是不知明明徳之在於親民而二氏之流是矣固有欲親其民者矣然或失之知謀􅁠術而無有乎仁愛惻怛之誠者是不知親民之所以明其明徳而五伯功利之徒是矣是皆不知止於至善之過也是故至善也者明徳親民之極則也天命之性粹然至善其􅂕昭不昧者皆其至善之發見是皆明徳之本體而所謂良知者也至善之􅀤見是而是焉非而非焉固吾心天然自有之則而不容有所擬議加損於其間也有所擬議加損於其間則是私意小智而非至善之謂矣人惟不知至善之在吾心而用其私智以求之於外是以昧其是非之則至於横騖决裂人欲肆而天理亡明徳親民之學大亂於天下故止至善之於明徳親民也猶之規矩之於方圓也尺度之於長短也權衡之於䡖重也方圎而不止於䂓矩爽其度矣長短而不止於尺度乖其制矣輕重而不止於權衡失其凖矣明徳親民而不止於至善亡其則矣夫是之謂大人之學大人者以天地萬物為一體也夫然後能以天地萬物爲一體元善喟然而嘆曰甚㢤大人之學若是其易簡也吾乃今知天地萬物之一體矣吾乃今知天下之為一家中國之為一人矣一夫不􅀍其澤若已推而内諸溝中伊尹其先得我心之同然乎於是名其蒞政之堂曰親民而曰吾以親民為職者也吾務親吾之民以求明吾之明徳也夫爰書其言于壁而為之記萬松書院記乙酉萬松書院在浙省南門外當湖山之間弘治􅀄叅政周君近仁因廢寺之趾而改爲之廟貌規制畧如學宮延孔氏之裔以奉祀事近年以来有司相繼緝理地益以勝然亦止爲遊􅀚之所而講誦之道未備也嘉靖乙酉侍御潘君景哲奉命来廵憲度丕肅文風聿新既簡鄉闈􅀵一省之賢而上之南宫矣又以遺才之不能盡取爲憾思有以大成之乃増􅁱書院益廣樓居齋舍爲三十六楹具其器用置贍田若干頃掲白鹿之規掄彦選俊肄習其間以倡列郡之士而以屬之提學僉事萬君汝信汝信曰是固潮之責也藩臬諸君咸賛厥成使知事嚴綱董其役知府陳力推官陳箎軰相恊􅀴理閱月踰旬工訖事舉乃来請言以紀其事惟我皇明自􅀦都至於郡邑咸建廟學群士之秀專官列職而敎育之其於學校之制可謂詳且備矣而名區勝地徃徃復有書院之設何㢤所以匡翼夫學校之不逮也夫三代之學皆所以明人倫今之學宫皆以明倫名堂則其所以立學者固未嘗非三代意也然自科舉之業盛士皆馳騖於記誦辭章而功利得䘮分惑其心扵是師之所敎弟子之所學者逐不復知有明倫之意矣懐世道之憂者思挽而復之卒亦未知所措其力譬之兵事當玩弛偷惰之餘則必選將閱伍更其號令旌旗懸非格之賞以倡敢勇然後士氣可得而振也今書院之設固亦此􅁼也歟士之来集於此者其必相與思之曰既進我扵學校矣而復優我於是何爲乎寧獨以精吾之舉業而巳乎便吾之進取而巳乎則學校之中未嘗不可以精吾之業而進取之心自吾所汲汲非有待於人之從而趨之也是必有進於是者矣是固期我以古聖賢之學也古聖賢之學明倫而已尭舜之相授受曰人心惟危道心惟微惟精惟一允執厥中斯明倫之學矣道心也者率性之謂也人心則偽矣不雜於人偽率是道心而發之於用也以言其情則爲喜怒哀樂以言其事則爲中節之和爲三千三百經曲之禮以言其倫則為父子之親君臣之義夫婦之别長㓜之序朋友之信而三才之道盡此矣舜使契為司徒以敎天下者敎之以此也是固天下古今聖愚之所同具其或未焉者物􅁒蔽之非其中之所有不備而假求之於外者也是固所謂不慮而知其良知也不學而能其良能也孩提之童無不知愛其親者也孔子之聖則曰所求乎子以事父未能也是明倫之學孩提之童亦無不能而及其至也雖聖人有所不能盡也人倫明於上小民親於下家齊國治而天下平矣是故明倫之外無學矣外此而學者謂之異端非此而論者謂之邪􅀃假此而行者謂之伯術飾此而言者謂之文辭背此而馳者謂之功利之徒亂世之政雖今之舉業必自此而精之而謂不愧於敷奏明試雖今之仕進必由此而施之而後無忝於行義逹道斯固􅀦家建學之􅀄意諸君緝書院以興多士之盛心也故為多士誦之稽山書院尊經閣記乙酉經常道也其在於天謂之命其賦於人謂之性其主於身謂之心心也性也命也一也通人物逹四海塞天地亘古今無有乎弗具無有乎弗同無有乎或變者也是常道也其應乎感也則爲惻隱爲羞惡爲辭譲爲是非其見於事也則爲父子之親爲君臣之義爲夫婦之别爲長㓜之序爲朋友之信是惻􅀮也羞惡也辭譲也是非也是親也義也序也别也信也一也皆所謂心也性也命也通人物逹四海塞天也亘古今無有乎弗具無有乎弗同無有乎或變者也是常道也是常道也以言其隂陽消息之行焉則謂之易以言其紀綱政事之施焉則謂之書以言其歌詠性情之發焉則謂之詩以言其條理節文之著焉則謂之禮以言其欣喜和平之生焉則謂之樂以言其誠偽邪正之辯焉則謂之春秋是隂陽消息之行也以至於誠偽邪正之辯也一也皆所謂心也性也命也通人物逹四海塞天地亘古今無有乎弗具無有乎弗同無有乎或變者也夫是之謂六經六經者非他吾心之常道也故易也者志吾心之隂陽消息者也書也者志吾心之紀綱政事者也詩也者志吾心之歌詠性情者也禮也者志吾心之條理節文者也樂也者志吾心之欣喜和平者也春秋也者志吾心之誠偽邪正者也君子之於六經也求之吾心之隂陽消息而時行焉所以尊易也求之吾心之紀綱政事而時施焉所以尊書也求之吾心之歌詠性情而時發焉所以尊詩也求之吾心之條理節文而時著焉所以尊禮也求之吾心之欣喜和平而時生焉所以尊樂也求之吾心之誠偽邪正而時辨焉所以尊春秋也蓋昔者聖人之扶人極憂後世而述六經也猶之富家者之父祖慮其産業庫蔵之積其子孫者或至於遺忘散失卒困窮而無以自全也而記籍其家之所有以貽之使之世守其産業庫蔵之積而享用焉以免於困窮之患故六經者吾心之記籍也而六經之實則具於吾心猶之産業庫蔵之實積種種色色具存於其家其記籍者特名狀數目而已而世之學者不知求六經之實於吾心而徒考索於影響之間牽制於文義之末硜硜然以為是六經矣是猶富家之子孫不務守視享用其産業庫蔵之實積日遺忘散失至於窶人丐夫而猶􅅝􅅝然指其記籍曰斯吾産業庫蔵之積也何以異於是嗚呼六經之學其不明於世非一朝一夕之故矣尚功利崇邪􅀃是謂亂經習訓詁傳記誦沒溺於淺聞小見以􅂗天下之耳目是謂侮經侈淫辭競詭辯飾奸心盗行逐世壟㫁而猶自以為通經是謂賊經若是者是并其所謂記籍者而割裂棄毁之矣寧復知所以為尊經也乎越城舊有稽山書院在卧龍西岡荒廢乆矣郡守渭南南君大吉既敷政於民則慨然悼末學之支離將進之以聖賢之道於是使山隂令呉君瀛拓書院而一新之又為尊經之閣於其後曰經正則庶民興庶民興斯無邪慝矣閣成請予一言以諗多士予旣不􅀗辭則為記之若是嗚呼世之學者得吾􅀃而求諸其心焉其亦庶乎知所以為尊經也矣重􅁱山隂縣學記乙酉山隂之學􅀊乆彌敝敎諭汪君瀚軰以謀於縣尹顧君鐸而一新之請所以詔士之言於予時予方在疚辭未有以告也已而顧君入為秋官郎洛陽呉君瀛来代復增其所未備而申前之請昔予官留都因京兆之請記其學而嘗有􅀃矣其大意以為朝廷之所以養士者不專於舉業而實望之以聖賢之學今殿廡堂舍拓而輯之餼􅅒條敎具而察之者是有司之􅁱學也求天下之廣居安宅者而􅁱諸其身焉此爲師爲弟子者之􅁱學也其時聞者皆惕然有省然於凢所以爲學之􅀃則猶未之及詳今請爲吾越之士一言之夫聖人之學心學也學以求盡其心而已尭舜禹之相授受曰人心惟危道心惟㣲惟精惟一允執厥中道心者率性之謂而未雜於人無聲無臭至微而顯誠之源也人心則雜於人而危矣偽之端矣見孺子之入井而惻􅀮率性之道也從而内交於其父母焉要譽於鄉黨焉則人心矣飢而食渴而飲率性之道也從而極滋味之羙焉恣口腹之饕焉則人心矣惟一者一於道心也惟精者慮道心之不一而或二之以人心也道無不中一於道心而不息是謂允執厥中矣一於道心則存之無不中而􅀤之無不和是故率是道心而發之於父子也無不親發之於君臣也無不義􅀤之於夫婦長㓜朋友也無不别無不序無不信是謂中節之和天下之逹道也放四海而皆凖亘古今而不窮天下之人同此心同此性同此逹道也舜使契為司徒而敎以人倫敎之以此逹道也當是之時人皆君子而比屋可封蓋敎者惟以是為敎而學者惟以是為學也聖人旣没心學晦而人偽行功利訓詁記誦辭章之徒紛沓而起支離决裂􅀊盛月新相沿相襲各是其非人心日熾而不復知有道心之㣲間有覺其紕繆而畧知反本求源者則又閧然指為禪學而羣訾之嗚呼心學何由而復明乎夫禪之學與聖人之學皆求盡其心也亦相去毫釐耳聖人之求盡其心也以天地萬物為一體也吾之父子親矣而天下有未親者焉吾心未盡也吾之君臣義矣而天下有未義者焉吾心未盡也吾之夫婦别矣長㓜序矣朋友信矣而天下有未别未序未信者焉吾心未盡也吾之一家飽暖逸樂矣而天下有未飽暖逸樂者焉其能以親乎義乎别序信乎吾心未盡也故於是有紀綱政事之設焉有禮樂敎化之施焉凢以裁成輔相成巳成物而求盡吾心焉耳心盡而家以齊􅀦以治天下以平故聖人之學不出乎盡心禪之學非不以心爲說然其意以為是逹道也者固吾之心也吾惟不昧吾心於其中則亦已矣而亦豈必屑屑於其外其外有未當也則亦豈必屑屑於其中斯亦其所謂盡心者矣而不知已陷於自私自利之偏是以外人倫遺事物以之獨善或能之而要之不可以治家􅀦天下蓋聖人之學無人已無内外一天地萬物以為心而禪之學起於自私自利而未免於内外之分斯其所以為異也今之為心性之學者而果外人倫遺事物則誠所謂禪矣使其未嘗外人倫遺事物而專以存心養性為事則固聖門精一之學也而可謂之禪乎㢤世之學者承沿其舉業詞章之習以荒􅁾戕伐其心既與聖人盡心之學相背而馳日騖日逺莫知其所抵極矣有以心性之􅀃而招之来歸者則顧駭以為禪而反仇讐視之不亦大可哀乎夫不自知其為非而以非人者是舊習之為蔽而未可遽以為罪也有知其非者矣藐然視人之非而不以告人者自私者也既告之矣旣知之矣而猶㝠然不以自反者自棄者也吾越多豪傑之士其特然無所待而興者為不少矣而亦容有蔽於舊習者乎故吾因諸君之請而特為一言之嗚呼吾豈特為吾越之士一言之而已乎梁仲用黙齋􅀃辛未仲用識髙而氣豪既舉進士銳然有志天下之務一旦責其志曰於呼予乃太早烏有己之弗治而能治人者於是專心爲巳之學深思其氣質之偏而病其言之易也以黙名庵過予而請其方予亦天下之多言人也豈足以知黙之道然予嘗自驗之氣浮則多言志􅁿則多言氣浮者耀於外志輕者放其中予請誦古之訓而仲用自取之夫黙有四偽疑而不知問蔽而不知辯㝠然以自罔謂之黙之愚以不言餂人者謂之黙之狡慮人之覘其長短也掩覆以爲黙謂之黙之誣深爲之情厚爲之貌淵毒阱狠自託於黙以售其奸者謂之黙之賊夫是之謂四偽又有八誠焉孔子曰君子耻其言而過其行古者言之不出耻躬之不逮也故誠知耻而後知黙又曰君子􅁒訥於言而敏於行夫誠敏於行而後欲黙矣仁者言也訒非以為黙而黙存焉又曰黙而識之是故必有所識也終日不違如愚者也黙而成之是故必有所成也退而省其私亦足以發者也故善黙者莫如顔子闇然而日章黙之積也不言而信而黙之道成矣天何言㢤四時行焉萬物生焉而黙之道至矣非聖人其孰能與於此㢤夫是之謂八誠仲用盍亦知所以自取之示弟立志􅀃乙亥予弟守文来學告之以立志守文因請次第其語使得時時觀省且請淺近其辭則易於通暁也因書以與之夫學莫先於立志志之不立猶不種其根而徒事培擁灌漑勞苦無成矣世之所以因循苟且隨俗習非而卒歸於汚下者凡以志之弗立也故程子曰有求為聖人之志然後可與共學人苟誠有求為聖人之志則必思聖人之所以為聖人者安在非以其心之純乎天理而無人欲之私歟聖人之所以為聖人惟以其心之純乎天理而無人欲則我之欲為聖人亦惟在於此心之純乎天理而無人欲耳欲此心之純乎天理而無人欲則必去人欲而存天理務去人􅁒而存天理則必求所以去人欲而存天理之方求所以去人欲而存天理之方則必正諸先覺考諸古訓而凢所謂學問之功者然後可得而講而亦有所不容己矣夫所謂正諸先覺者既以其人為先覺而師之矣則當專心致志惟先覺之為聼言有不合不得棄置必從而思之思之不得又從而辨之務求了釋不敢輒生疑惑故記曰師嚴然後道尊道尊然後民知敬學苟無尊崇篤信之心則必有􅁿忽慢易之意言之而聼之不審猶不聼也聼之而思之不慎猶不思也是則雖曰師之猶不師也夫所謂考諸古訓者聖賢垂訓莫非敎人去人欲而存天理之方若五經四書是已吾惟欲去吾之人欲存吾之天理而不得其方是以求之於此則其展卷之際真如饑者之於食求飽而已病者之於藥求愈而巳暗者之於燈求照而已跛者之於杖求行而巳曽有徒事記誦講􅀃以資口耳之弊㢤夫立志亦不易矣孔子聖人也猶曰吾十有五而志于學三十而立立者志立也雖至於不踰矩亦志之不踰矩也志豈可易而視㢤夫志氣之帥也人之命也木之根也水之源也源不濬則流息根不植則木枯命不續則人死志不立則氣昬是以君子之學無時無䖏而不以立志為事正目而視之無他見也傾耳而聼之無他聞也如猫捕䑕如鷄覆􅆑精神心思凝聚融結而不復知有其他然後此志常立神氣精明義理昭著一有私􅁒卽便知覺自然容住不得矣故凢一毫私欲之萌只責此志不立即私欲便退聼一毫客氣之動只責此志不立即客氣便消除或怠心生責此志即不怠忽心生責此志即不忽懆心生責此志即不懆妬心生責此志即不妬忿心生責此志即不忿貪心生責此志即不貪傲心生責此志即不傲吝心生責此志即不吝蓋無一息而非立志責志之時無一事而非立志責志之地故責志之功其於去人􅁒有如烈火之燎毛太陽一出而魍魎潜消也自古聖賢因時立敎雖若不同其用功大指無或少異書謂惟精惟一易謂敬以􅀡内義以方外孔子謂格致誠正博文約禮曽子謂忠恕子思謂尊徳性而道問學孟子謂集義飬氣求其放心雖若人自為説有不可強同者而求其要領歸􅀫合若符契何者夫道一而已道同則心同心同則學同其卒不同者皆邪􅀃也後世大患尤在無志故今以立志為􅀃中間字字句句莫非立志蓋終身問學之功只是立得志而已若以是􅀃而合精一則字字句句皆精一之功以是􅀃而合敬義則字字句句皆敬義之功其諸格致博約忠恕等􅀃無不脗合但能實心體之然後信予言之非妄也約齋説甲戌滁陽劉生韶既學於陽明子乃自悔其平日所嘗致力者泛濫而無功􅃈雜而不得其要也思得夫簡易可乆之道而固守之乃以約齋自號求所以為約之􅀃於予予曰子欲其約乃所以為煩也其惟循理乎理一而已人欲則有萬其殊是故一則約萬則煩矣雖然理亦萬殊也何以求其一乎理雖萬殊而皆具於吾心心固一也吾惟求諸吾心而巳求諸心而皆出乎天理之公焉斯其行之簡易所以為約也己彼其膠於人􅁒之私則利害相攻毁譽相制得失相形榮辱相􅅶是非相傾顧瞻牽􅆡紛紜舛戾吾見其煩且難也然而世之知約者鮮矣孟子曰學問之道無他求其放心而已其知所以為約之道歟吾子勉之吾言則亦以煩見齋􅀃乙亥辰陽劉觀時學於潘子既有見矣復學於陽明子嘗自言曰吾名觀時􅀚必有所見而吾猶懵懵無睹也扁其居曰見齋以自勵問於陽明子曰道有可見乎曰有有而未嘗有也曰然則無可見乎曰無無而未嘗無也曰然則何以為見乎曰見而未嘗見也觀時曰弟子之惑滋甚矣夫子則明言之以敎我乎陽明子曰道不可言也強為之言而益晦道無可見也妄為之見而益逺夫有而未嘗有是真有也無而未嘗無是真無也見而未嘗見是真見也子未􅀚於天乎謂天為無可見則蒼蒼耳昭昭耳日月之代明四時之錯行未嘗無也謂天為可見則即之而無所指之而無定執之而無得未嘗有也夫天道也道天也風可捉也影可拾也道可見也曰然則吾終無所見乎古之人則亦終無所見乎曰神無方而道無體仁者見之謂之仁知者見之謂之知是有方體者也見之而未盡者也顔子則如有所立卓爾夫謂之如則非有也謂之有則非無也是故雖􅁒從之末由也已故夫顔氏之子為庶㡬也文王望道而未之見斯真見也已曰然則吾何所用心乎曰淪於無者無所用其心者也蕩而無歸滯於有者用其心於無用者也勞而無功夫有無之間見與不見之妙非可以言求也而子顧切切焉吾又從而強言其不可見是以瞽導瞽也夫言飲者不可以為醉見食者不可以爲飽子求其醉飽則盍飲食之子求其見也其惟人之所不見乎夫亦戒慎乎其所不覩也已斯真覩也已斯求見之道也已矯亭􅀃乙亥君子之行順乎理而已無所事乎矯然有氣質之偏焉偏於柔者矯之以剛然或失則傲偏於慈者矯之以毅然或失則刻偏於奢者矯之以儉然或失則陋凢矯而無節則過過則復爲偏故君子之論學也不曰矯而曰克克以勝其私私勝而理復無過不及矣矯猶未免於意必也意必亦私也故克巳則矯不必言矯者未必能盡於克己之道也雖然矯而當其可亦克己之道矣行其克己之實而矯以名焉何傷乎古之君子也其取名也㢘後之君子實未至而名先之故不曰克而曰矯亦矯世之意也方君時舉以矯名亭請予為之􅀃謹齋􅀃君子之學心學也心性也性天也聖人之心純乎天理故無事於學下是則心有不存而汨其性䘮其天矣故必學以存其心學以存其心者何求㢤求諸其心而已矣求諸其心何為㢤謹守其心而已矣博學也審問也慎思也明辯也篤行也皆謹守其心之功也謹守其心者無聲之中而常若聞焉無形之中而常若睹焉故傾耳而聼之惟恐其或繆也注目而視之惟恐其或逸也是故至微而顯至􅀮而見善惡之萌而纎毫莫遁由其能謹也謹則存存則明明則其察之也精其存之也一昧焉而弗知過焉而弗覺弗之謹也已故謹守其心於其善之萌焉若食之充飽也若抱赤子而􅂂春氷惟恐其或䧟也若捧萬金之璧而臨千仞之崖惟恐其或墜也其不善之萌焉若鴆毒之投於􅅅也若虎蛇横集而思所以避之也若盗賊之侵陵而思所以勝之也古之君子所以凝至道而成盛徳未有不由於斯者雖尭舜文王之聖然且兢兢業業而况於學者乎後之言學者舍心而外求是以支離决裂愈難而愈逺吾甚悲焉吾友侍御楊景瑞以謹名其齋其知所以為學之要矣景瑞嘗遊白沙陳先生之門歸而求之自以為有見又二十年而忽若有得然後知其向之所見猶未也一旦告病而歸將從事焉必底於成而後出君之篤志若此其進於道也孰禦乎君遣其子思元從予學亦將別予以歸因論君之所以名齋之義以告思元而遂以為君贈夜氣􅀃乙亥天澤毎過輒與之論夜氣之訓津津旣有所興起至是告歸請益復謂之曰夜氣之息由於旦晝所養苟梏亡之反復則亦不足以存矣今夫師友之相聚於玆也切磋於道義而砥礪乎徳業漸而入焉反而媿焉雖有非僻之萌其所滋也亦已罕矣迨其離群索居情可得肆而莫之警也􅁒可得縦而莫之泥也物交引焉志交䘮焉雖有理義之萌其所滋也亦罕矣故曰苟得其養無物不長苟失其養無物不消夫人亦孰無理義之心乎然而不得其養者多矣是以若是其寥寥也天澤勉之􅁱道􅀃戊寅率性之謂道誠者也􅁱道之謂敎誠之者也故曰自誠明謂之性自明誠謂之敎中庸為誠之者而作􅁱道之事也道也者性也不可須􅁷離也而過焉不及焉離也是故君子有􅁱道之功戒慎乎其所不睹恐懼乎其所不聞㣲之顯誠之不可掩也􅁱道之功若是其無間誠之也夫然後喜怒哀樂之未􅀤謂之中􅀤而皆中節謂之和道􅁱而性復矣致中和則大本立而逹道行知天地之化育矣非至誠盡性其孰能與於此㢤是􅁱道之極功也而世之言􅁱道者離矣故特著其􅀃自得齋􅀃甲申孟子云君子深造之以道欲其自得之也自得之則居之安居之安則資之深資之深則取之左右逢其原故君子欲其自得之也夫率性之謂道道吾性也性吾生也而何事於外求世之學者業辭章習訓詁工技藝探􅄨而索􅀮弊精極力勤苦終身非無所謂深造之者然亦辭章而已耳訓詁而已耳技藝而已耳非所以深造於道也則亦外物而巳耳寧有所謂自得逢原者㢤古之君子戒慎不睹恐懼不聞致其良知而不敢須􅁷或離者斯所以深造乎是矣是以大本立而逹道行天地以位萬物以育於左右逢原乎何有黄勉之省曾氏以自得名齋蓋有志於道者請學於予而蘄為之􅀃予不能有出於孟氏之言也為之書孟氏之言嘉靖甲申六月朔博約􅀃乙酉南元真之學於陽明子也聞致知之􅀃而恍若有見矣既而疑於博約先後之訓復来請曰致良知以格物格物以致其良知也則既聞敎矣敢問先博我以文而後約我以禮也則先儒之􅀃得無亦有所不同歟陽明子曰理一而已矣心一而已矣故聖人無二敎而學者無二學博文以約禮格物以致其良知一也故先後之􅀃後儒支繆之見也夫禮也者天理也天命之性具于吾心其渾然全體之中而條理節目森然畢具是故謂之天理天理之條理謂之禮是禮也其􅀤見於外則有五常百行酬酢變化語黙動静升降周旋隆殺厚薄之屬宣之於言而成章措之於爲而成行書之於册而成訓炳然蔚然其條理節目之繁至於不可窮詰是皆所謂文也是文也者禮之見於外者也禮也者文之存於中者也文顯而可見之禮也禮微而難見之文也是所謂體用一源而顯微無間者也是故君子之學也於酬酢變化語黙動静之間而求盡其條理節目焉非他也求盡吾心之天理焉耳矣於升降周旋隆殺厚薄之間而求盡其條理節目焉非他也求盡吾心之天理焉耳矣求盡其條理節目焉者博文也求盡吾心之天理焉者約禮也文散於事而萬殊者也故曰博禮根于心而一本者也故曰約博文而非約之以禮則其文為虛文而後世功利辭章之學矣約禮而非博學於文則其禮為虚禮而佛老空寂之學矣是故約禮必在於博文而博文乃所以約禮二之而分先後焉者是聖學之不明而功利異端之􅀃亂之也昔者顔子之始學於夫子也蓋亦未知道之無方體形像也而以為有方體形像也未知道之無窮盡止極也而以為有窮盡止極也是猶後儒之見事事物物皆有定理者也是以求之仰鑚瞻忽之間而莫得其所謂及聞夫子博約之訓既竭吾才以求之然後知天下之事雖千變萬化而皆不出於此心之一理然後知殊途而同歸百慮而一致然後知斯道之本無方體形像而不可以方體形像求之也本無窮盡止極而不可以窮盡止極求之也故曰雖􅁒從之末由也已蓋顔子至是而始有真實之見矣博文以約禮格物以致其良知也亦寧有二學乎㢤惜隂􅀃丙戌同志之在安成者間月為㑹五日謂之惜隂其志篤矣然五日之外孰非惜隂時乎離羣而索居志不能無少懈故五日之㑹所以相稽切焉耳嗚呼天道之運無一息之或停吾心良知之運亦無一息之或停良知即天道謂之亦則猶二之矣知良知之運無一息之或停者則知惜隂矣知惜隂者則知致其良知矣子在川上曰逝者如斯天不舍晝夜此其所以學如不及至於發憤忘食也尭舜兢兢業業成湯日新又新文王純亦不已周公坐以待旦惜隂之功寧獨大禹為然子思曰戒慎乎其所不睹恐懼乎其所不聞知微之顯可以入徳矣或曰鷄鳴而起孳孳為利凶人為不善亦惟日不足然則小人亦可謂之惜隂乎
