front:
  text: 王文成公全書卷之二十
  hash: sha256:e2a668656a89e98543343a35e3ac66755af975b16b045c42b13557ccd95e95e3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_015-1a}
body:
  text: 外集二詩廬陵詩六首逰瑞華二首簿領終年未出郊此行聊觧俗人嘲憂時有志懷先逹作縣無􅀎愧舊交松古尚存經雪幹竹髙還長拂雲稍溪山䖏䖏堪行樂正是浮名未易抛其二萬死投荒不擬囬生還且復荷栽培逄時已􅀒三年學治劇兼非百里才身可益民寧論屈志存經􅀦未全􅁅正愁不是中流砥千尺狂瀾豈易摧古道古道當長坂肩輿入暮天蒼茫聞驛皷泠落見炊烟凍燭寒無熖泥爐濕未燃正思江檻外閑郤釣魚船立春日道中短述臘意中宵盡春容傍曉生野塘冰轉緑江寺雪消晴農事沾泥犢覊懷聽谷鶯故山梅正􅀤誰守􅁒歸情公舘午飯偶書行臺依獨寺僧屋自成鄰殿古凝残雪墻低入早春巷􅅺晴淖馬􅉉日暖堪人雪散小岩碧松梢挂月新午憇香社寺脩程動百里徃徃餉僧居佛皷迎官急禪床為客虚桃花成井落雲水接郊墟不覺泥􅂗澁㸔山興有餘京師詩二十四首正徳庚午年十月陞南京刑部主事辛未年入覲調北京吏部主事作夜宿功徳寺次宗賢韻二絶山行􅀄試夾衣輕脚軟黄塵石路生一夜洞雲眠未足湖風吹月渡溪清水邉楊柳覆茅楹飲馬春流更一登坐乆遂忘歸路夕溪雲正瀉暮山青别方叔賢四首西樵山色逺依依東指江門石路微料得楚雲臺上客乆懸秋月待君歸自是􅀌雲天際浮篋中枯蠧豈相謀請君靜後㸔羲畫曾有陳篇一字否休論寂寂與惺惺不妄由来即性情笑却慇懃諸老子翻􅀙知見覔虚靈道本無為只在人自行自住豈湏鄰生中便是天台路不用漁郎更問津白灣六章宗巖文先生居白浦之灣四方學者稱曰白浦先生而不敢以姓字某素高先生又辱為之僚因為書白灣二字并詩以詠之浦之灣其白漫漫彼美君子在水之盤灣之浦其白瀰瀰彼美君子在水之涘雲之溶溶于灣之湄君子于䖏民以為期雲之油油于灣之委君子于興施及四海白灣之渚于逰以䖏彼美君子􅀆可以容與白灣之洋于濯以湘彼美君子􅀆可以徜徉􅀉隠巖毎逄山水地便有卜居心終􅀊風塵裏何年滄海潯洞寒泉滴細花瞑石房深青壁湏留姓他時好共尋香山次韻㝷山到山寺得意􅁍忘山巖􅀣坐来静壁蘿春自閑樓臺星斗上鐘磬翠微間頓息塵寰念清溪踏月還夜宿香山林宗師房次韻幽壑来㝷物外情石門遥指白雲生林間伐木時聞響谷口逄僧不記名天壁倒涵湖月曉烟梯髙接緯堦平松堂静夜渾無􅄰到枕風泉䖏䖏聲乆落泥途惹世情􅂵崖丹壑是乎生養真無力常懐静竊禄未歸羞問名􅀣隠洞泉穿石細雲廻溪路入花平道人只住層蘿上明月􅄘頭有磬聲别湛甘泉二首行子朝欲􅀤驅車不得留驅車下長坂顧見城東樓逺别情已􅃤况此艱難秋分手訣河梁涕下不可收車行望漸杳飛埃越層丘遲回岐路側孰知我心憂其二我心憂以傷君去阻且長一别豈得巳母老思所􅀅奉命危難際流俗反猜量黄鵠萬里逝豈伊爲稻梁棟火及毛羽燕雀猶棲堂跳梁多不測君行戒前途逹命諒何滯􅀅母􅀎忘虞安居􅀹穽擭關路非􅄮嶇令徳崇易簡可以知險阻結茆湖水隂幽期終不忘伊爾得相就我心亦何傷世艱變倐忽人命非可常斯文天未墜别短㑹日長南寺春月夜風泉閒竹房逄僧􅂉停檝先掃白雲床贈别黃宗賢古人戒􅀙惡今人戒􅀙善從惡乃同汚􅀙善翻滋怨紛紛嫉􅎱興指謫相非訕自非篤信士依違多背面寧知竟漂流淪胥亦汚賤卓㢤汪陂子􅁬身勇厥踐拂衣還舊山霧􅀮期豹變嗟嗟吾黨賢白黒匪難辯歸越詩五首正徳壬申年陞南京太僕寺少卿便道歸越作四明觀白水二首邑南富巖壑白水􅀹奇觀興来每思徃十年就兹觀停騶指絶壁渉澗緣危蟠百源旱方歇雲際猶飛湍霏霏灑林薄漠漠凝風寒前闻若未愜仰視終莫攀石隂暑氣薄流觸遡廻瀾兹逰詎盤樂養靜意􅀁關逝者諒如斯哀此􅀊月殘擇幽雖得􅀁避時時猶難劉樊古方外感慨有餘嘆千丈飛流舞白鸞碧潭倒影鏡中㸔藤蘿半壁雲烟濕殿角長年風雨寒野性􅀙来山水癖􅀡躬更覺世途難卜居㫁擬如周叔高卧無勞比謝安杖錫道中用張憲使韻山鳥懽呼􅁒問名山花含笑似相迎風廻碧􅀣秋聲早雨過丹巖夕照明雪嶺挿天開玉帳雲溪環碧抱金城懸燈夜宿茅堂静洞鶴林僧相對清又用曰仁韻毎逄佳䖏問山名風景依稀過眼生歸霧忽連千嶂􅊕夕陽偏放一溪晴晚投巖寺依雲宿静愛楓林送雨聲夜久披衣還起坐不禁風月照人清書杖錫寺杖錫青􅄀端澗壁環天險垂巖下陡壑渉水攀絶巘溪深聽喧瀑路絶駭危棧捫蘿登峻極披翳見平衍僧逋􅀉􅀌衲守廢遺荒殿傷兹窮僻墟曾未誅求免探幽冀累息憤時翻意􅃤拯援才巳踈栖遅心益眷哀猿嘯春嶂懸燈宿西崦誅茆竟何時白雲愧舒卷滁州詩三十六首正徳癸酉年到太僕寺作梧桐江用韻鳯鳥乆不至梧桐生高岡我来竟日坐清隂灑衣裳援琴俯流水調短意苦長遺音滿空谷隨風逓悠􅀭人生貴自得外慕非所􅆇顔子豈忘世仲尼固遑遑已矣復何事吾道歸滄浪林間睡􅁸林間盡日掃花眠秪是官閑媿俸錢門徑不妨春草合齋居長對晚山妍毎疑方朔非真隠始信楊雄誤太玄混世亦􅀎隨地得野情終是愛丘園贈熊彰歸門徑荒凉蔓草生相求深媿逺来情千年絶學蒙塵土何䖏澄江無月明坐㸔逺山凝暮色忽驚廢葉起秋聲歸途望嶽多幽興爲問山田待耦耕别易仲辰州劉易仲􅀙予滁陽一日問道可言乎予曰啞子喫苦􅀲與你說不得爾要知我苦還湏你自喫易仲省然有悟久之辭歸别以詩迢逓滁山春子行亦何逺纍然良苦心惝恍不遑飯至道不外得一悟失群闇秋風洞庭波逰子歸巳晚結蘭意方勤寸草心先㫁末學久仳離頽波竟誰挽歸㢤念流光一逝不復返送守中至龍盤山中未盡師生六日情天教風雪阻西行茅堂豈有春風坐江郭虚留一月程客邸琴書燈火静故園風竹夣魂清何年穩閉陽明洞榾柮山爐煑石􅃵龍蟠山中用韻無柰青山䖏䖏情村沽日日辦山行真慚􅅒食虚官守只把山逰作課程谷口亂雲隨􅀐逺林間飛雪􅀧衣輕長思􅌿泊還真性世味年来久絮􅅅瑯琊山中三首草堂􅀉放瑯琊間溪鹿巖僧且共閒氷雪􅀎囬草木死春風不化山石頑六經散地莫􅀵拾叢􅁄􅀍道誰刋刪已矣驅馳二三子鳯圗不出吾􅀅還狂歌莫笑酒盃增異境人間得未曾絶壁倒翻銀海浪逺山真作玉龍騰浮雲野思春前動虚室清香静後凝懶拙惟餘林壑計伐檀長自媿無􅀎風景山中雪後増㸔山雪後亦誰曾隔溪巖犬迎人吠飲澗飛猱踔􅀣騰歸􅀐林間燈火動鳴鐘谷口暮光凝塵踪正自縚籠在一宿雲房尚未􅀎答朱汝徳用韻東去蓬瀛合有津􅀂為風雨動經旬同来海岸登舟在俱是塵寰欲渡人弱水洪濤非世險長年三老定誰真青鸞􅆌􅆌無消息悵望烟花又暮春送惟乾二首獨見長年思避地相􅀙千里欲移家慚予豈有萬間庇借爾剛餘一席沙古洞幽期攀桂􅀣春溪歸路問桃花故人勞念還相慰回鴈新秋寄綵霞簦笈連年愧逺求本来無物􅀂為酬春城驛路聊相送夜雪空山且復留江浦雲開廬嶽曙洞庭湖闊九疑浮懸知再皷瀟湘柁應是芙蓉湘水秋别希顔二首中歳幽期亦㡬人是誰長􅀒故山春道情暗與物情化世味爭如酒味醇耶水雲門空舊隱青鞋布襪定何晨童心如故容顔改慚愧年年草木新後㑹難期别未輕莫辭行李􅆡江城且留南􅀦春山興共聽西堂夜雨聲歸路終知雲外去晴湖想見鏡中行為㝷洞裏幽棲䖏還有峰頭􅀟鶴鳴山中示諸生五首路絶春山久廢㝷野人扶病強登臨同逰仙侣湏乗興共探花源莫厭深鳴鳥逰絲俱自得閑雲流水亦何心􅀙前􅁍恨牽文句展轉支離嘆陸沉其二滁流亦沂水童冠得㡬人莫􅀒詠歸興溪山正暮春其三桃源在何許西􅈐最深䖏不用問漁人沿溪踏花去其四池上偶然到紅花間白花小亭閒可坐不必問誰家其五溪邉坐流水水流心共閒不知山月上松影落衣班龍潭夜坐何䖏花香入夜清石林茅屋隔溪聲幽人月出毎􅀌徃棲鳥山空時一鳴草露不辭芒屨濕松風偏與􅁑衣輕臨流欲寫􅀝蘭意江北江南無恨情送徳觀歸省二首雪裏閉門十日坐開門一笑忽青天茅簷正好􅀒暄日客子胡為思故園椿􅀣慣經霜雪老梅花偏向歳寒妍瑯琊春色如相憶好放山隂月下船瑯琊雪是故園雪故園春亦瑯琊春天機動䖏即生意世事到頭還俗塵立雪浴沂傳故事吟風弄月是何人到家好謝二三子莫向長沮錯問津送蔡希顔三首正徳癸酉冬希淵赴南宫試訪予滁陽遂留閱歳既而東歸問其故辭以疾希淵與予論學瑯琊之間於斯道既釋然矣别之以詩風雪蔽曠野百鳥凍不翻􅀌鴻亦何事噭噭遡寒雲豈伊稻梁計獨徃求其群之子􅆌萬鍾就我滁水濵野寺同逰請春山共攀援鳥鳴幽谷曙伐木西澗曛清夜湛玄思晴牕玩竒文寂景賞新悟微言欣有聞寥寥絶代下此意冀可論群鳥喧北林黄鵠獨南逝北林豈無枝羅弋苦難避之子丹霞姿辭我雲門去山空響流泉路僻迷深􅀣長谷何盤紓􅂵芝春可茹求志蹔棲巖避喧寜遯世繄予辱風塵送子媿雲霧匡時已無術希聖徒有慕倘入陽明􅈐爲㝷舊棲䖏何事憧憧南北行望雲依闕两䦕情風塵蹔息滁陽駕鷗鷺還尋鑑水盟悟後六經無一字静餘􅀌月湛虚明􅀙知歸路多相憶伐木山山春鳥鳴贈守中北行二首江北梅花雪易殘山牕一􅀣自家㸔臨行掇贈聊數顆珎重清香是􅀊寒来何匆促去何遅来去何心莫漫疑不為髙堂􅀟雪鬢􅀊寒寕受北風欺鄭伯興謝病還鹿門雪夜過别賦贈三首之子􅀅去逺雪夜来相尋秉燭耿無􅄰憐此􅀊寒心歳寒豈徒爾何以贈逺行聖路塞巳久千載無復㝷豈無群儒迹蹊徑榛茆深濬流湏㝷源積土成高岑􅄃衣望逺道請君􅀙此征濬流湏有源植木湏有根根源未濬植枝􅂀寜先蕃謂勝通夕話義利分毫間至理匪外得譬猶鏡本明外塵蕩瑕垢鏡體自寂然孔訓示克巳孟子垂反身明明賢聖則請君勿與諼鹿門在何許君今鹿門去千載龐徳公猶存棲隠䖏潔身匪亂倫其次乃避地世人失其心顧瞻多外慕安宅舎弗居狂馳驚奔騖高言詆獨善文非遂巧智􅃈􅃈功利儒寜復知此意門人王嘉秀實夫蕭琦子玉告歸書此見别意兼􅀉聲辰陽諸賢王生兼養生蕭生頗慕禪迢迢數千里拜我滁山前吾道既匪佛吾學亦匪仙坦然由簡易日用匪深玄始聞半疑信既乃心豁然譬彼土中鏡闇闇光内全外但去昬翳精明燭媸妍世學如翦綵粧綴事蔓延宛宛具枝葉生理終無縁􅀁以君子學布種培根原萌芽漸舒􅀤暢茂皆由天秋風動歸思共皷湘江船湘中富英彦徃徃多及門臨􅄮綴斯語因之􅀉拳拳滁陽别諸友滁陽諸友􅀙逰送子至烏衣不􅀎别及暮王性甫汝徳諸友送至江浦必留居俟予渡江因書此促之歸并􅀉諸賢庶㡬共進此學以慰離索耳滁之水入江流江潮日復来滁州相思􅀂潮水来徃何時休空相思亦何益欲慰相思情不如崇令徳掘地見泉水隨䖏無弗得何必驅馳爲千里逺相即君不見尭􅅅與舜墻又不見孔與跖對面不相識逆旅主人多慇懃出門轉盻成路人􅀉浮􅈐詩社晚凉庭院坐新秋微月􅀄生亦滿樓千里故人誰命駕百年多病有􅀌舟風霜草木驚時態砧杵關河動逺愁飲水曲肱吾自樂茆堂今在越溪頭棲雲樓坐雪二首纔㸔庭􅀣玉森森忽漫階除巳許深但得諸生通夕坐不妨老子半酣吟瓊花入座􅀎欺酒氷溜垂簷欲墯針却憶征南諸􅀅士未禁寒夜鐵衣沉此日棲雲樓上雪不知天意爲誰深忽然夜半一言覺又動人間萬古吟玉􅀣有花難結果天機無線可通針暁来不覺城頭皷老懶羲皇睡正沉與商貢士二首見説浮山麓深林遶石溪何時拂衣去三十六巖棲其二見説浮山勝心與浮山期三十六巖内爲選一巖竒南都詩四十七首正徳甲戌年四月陞南京鴻臚寺卿作題歳寒亭贈汪尚和一覺紅塵夣􅁒殘江城六月滯風湍人間炎暑無逃遯歸向山中卧􅀊寒與徽州程畢二子句句糠粃字字陳却於何䖏覔知新􅂵陽山下多豪俊􅀿有吟風弄月人山中􅂴睡四首竹裏藤床識懶人脫巾山麓任吾真病夫巳乆逃方外不受人間禮數嗔掃石焚香任意眠醒来時有客談玄松風不用蒲葵扇坐對青崖百丈泉古洞幽深絶世人石床風細不生塵日長一覺羲皇睡又見􅈐頭上月輪人間白日醒猶睡老子山中睡却醒醒睡两非還兩是溪雲漠漠水泠泠題灌山小隱二絶茆屋山中早晚成任他風雨任他晴男婚女嫁多年畢不待而今學向平一自移家入􅂵煙深林住乆遂忘年山中莫道無供給明月清風不用錢六月五章六月乙亥南都熊峰少宰石公以少宗伯召南都之士聞之有惻然而戚者有欣然而喜者其戚者曰公端介敏直方爲留都􅀁􅀝重今兹徃善􅀋失􅀁恃群小罔以嚴辨惑考學者􅂚􅀙而討究剖政㫁疑者曷從而咨決南都非根本地乎而獨不可以公遺之其喜者曰公之端介敏直寜獨留都􅀁􅀝重其在京師獨無善􅀋乎獨無群小乎獨無辨惑考學剖政㫁疑者乎且天子之召之也亦寧以少宗伯將必大用大用則以庇天下斯彚征之慶也公聞之曰戚者非吾之􅀁敢喜者乃吾之􅀁憂也吾思􅀁以逃吾之憂者而不得其道􅀂之何陽明子素知于公既以戚衆之戚喜衆之喜而復憂公之憂乃叙其事爲賦六月庸以贈公之行六月凄風七月暑雨倐雨倐寒道脩以阻允允君子廸爾􅆍興毋沾爾行􅀦歩斯頻哀此下民靡届靡極不有老成其何􅀎􅀦吁嗟老成獨遺典刑􅀂屋之傾尚支其楹心之憂矣言靡有所如彼喑人食荼與苦依依長谷言采其芝人各有􅀎我歸孔時昔彼叔季沉􅊺以逞耄集以咨我人自靖允允君子淑慎爾則靡曰休止民何于極日月其逝如彼滄浪南北其望如彼參商允允君子毋沾爾行如日之升以曷不光守文弟歸省携其手歌以别之爾来我心喜爾去我心悲不為倚門念吾寧舎爾歸長途正炎暑爾行慎興居凉茗勿頻啜節食但無飢勿出船旁立忽登岸上嬉􅀵心毎澄坐􅃴意時觀書申洪皆􅁳頑不足長嗔笞見人勿多說慎黙真如愚接人莫輕率忠信持謙卑􅀙来爲已學慎獨乃其基紛紛多嗜欲爾病還爾知到家良足樂怡顔報重闈昨秋童蒙去今夏成人歸長者愛爾敬少者恱爾􅄌親朋稱嘖嘖羡爾􅀎􅀂兹信㢤學問功所貴在得師吾匪崇外飾􅁒爾沽名爲望爾日慥慥聖賢以爲期九兄及印弟誦此共勉之書扇面􅀉舘賔湖上群山落照晴湖邉萬木起秋聲何年歸去陽明洞獨棹扁舟鑑􅂻行用實夫韻詩􅀙雪後吟偏好酒向山中味轉佳巖瀑隨風雜鐘磬水花如雨落袈裟㳺牛首山春尋指天闕烟霞眇何許􅀟峰乆相違千巖来舊主浮雲刺中天飛閣凌風雨探秀澗阿入蘿隂息筐筥滅迹避塵纓清朝入深沮風磴仰門歴淙壑屢窺俯梯雲躋石閣下榻得吾所釋子上方候鳴鐘出延佇頽景耀囬盻層飈翼輕舉曖曖林芳暮泠泠石泉語清宵耿無􅄰􅈐月升烟宇㑹晤得良朋可以􅀉心腑送徽州洪侹承瑞平生舉業最踈慵挾冊虚煩五月􅀙竹院檢方時論藥茆堂放鶴或開籠憂時漫有孤忠在好古全無一藝工念我還能来夜雪逄人休􅀃坐春風病中大司馬喬公有詩見懐次韻奉答二首十日無縁拜後塵病夫心地欲生榛詩篇極見憐才意伎俩慚非可用人黄閣望公長秉軸滄江容我老垂綸保􅁵珍重回天手㑹㸔春風萬木新一自多􅄮分路塵堂堂正道遂生榛聊􅀅膚淺窺前聖敢謂心傳啓後人淮海帝圗湏節制雲雷大造㸔經綸枉勞詩句裁風雅欲借盤銘獻日新送諸伯生歸省天涯送爾獨傷神嵗月龍山夣裏春為謝江南諸故舊起居東嶽太夫人閑中書卷堪時展静􅂻工夫要日新能向塵途薄軒冕不妨簑笠老江濵􅀉馮雪湖二首竿竹誰隱扶桑東白眉之叟今龐公隔湖聞鷄謝墅接渡海有鶴􅅾山通鹵田經􅀊苦秋雨浪痕半壁驚湖風歌聲屋低似金石􅀧也此意當能同海岸西頭湖水東他年簑笠擬􅀙公釣沙碧海群鷗借樵徑青雲一鳥通席有春陽堪坐雪門垂五柳好吟風于今猶是天涯夣悵望青霄月色同諸用文歸用子美韻為别一别烟雲歳外深天涯相見二毛侵􅀌㠶江上親朋意樽酒燈前故􅀦心冷雪晴林還作雨鳥聲幽谷自成吟飲餘莫上􅈐頭望烟􅀣迷茫思不禁題王實夫盡隨䖏山泉着草廬底湏松竹掩柴扉天涯逰子何曾出􅀞裏􅀌㠶未是歸小酉諸􅈐開夕照虎溪春寺入烟霏他年還向辰陽望却憶題詩在翠微贈潘給事五月滄浪濯足歸正堪荷葉製初衣甲非乙是君休問酉水辰山志未違沙鳥不湏疑雀舫江雲先爲掃魚磯武陵溪􅐿猶深僻莫更移家入翠微與沅陵郭掌教記得春眠寺閣雲松林水鶴日為群諸生問業衝星入稚子拈香靜夜焚世事暗隨江草換道情曾許碧山聞别来􅀧瑟還誰皷悵望烟花此送君别族太叔克彰情深宗族誼同方消息那堪别後荒江上相逄疑未定天涯獨去意重傷身閑最􅁴湖山静家近殊聞草木香雲路莫嗟遅􅀤軔世􅂗﨑曲盡羊腸登憑虚閣和石少宰韻山閣新春􅀒一登酒邉􅀌興晚堪乗松間鳴瑟驚棲鶴竹􅂻茶烟起定僧望逺毎来成乆坐傷時有涕恨無􅀎峰頭見􅀃連閶闔㡬欲排雲尚未曾登閱江樓絶頂樓荒舊有名髙皇曾此駐龍旌險存道徳虚天塹守在蠻夷豈石城山色古今餘王氣江流天地變秋聲登臨授簡誰􅀎賦千古新亭一愴情獅子山殘暑湏還一雨清高峰極目快新晴海門潮落江聲急吳苑秋深􅀣脚明烽火正防胡􅀐入羽書愁見朔雲横百年未有㳙埃報白髪今朝又㡬莖逰清凉寺三首春㝷載酒本無期乗興還嫌馬足遅古寺共憐春草沒逺山偏與夕陽宜雨晴澗竹消蒼粉風煖巖花落􅂵㽔昬黑更湏凌絶項高懐想見少陵詩其二積雨山行已後期更堪多病益遅遲風塵漸覺􅀄心􅀒丘壑真於野性宜緑􅀣隂層新作盖紫蘭香細尚餘㽔輞川圖盡􅀎如許絶是無聲亦有詩其三不顧尚書此日期欲為花外板輿遅繁絲急管人人醉竹徑松堂䖏䖏宜􅀟􅀣暗芳春寂寞五􅈐晴秀晚羲㽔暮鐘杳杳催歸􅀐惆悵煙光不盡詩􅀉張東所次前韻逺趨君命忽中違此意年来識者稀黄綺曾為炎祚出子陵終向富春歸江船一話千年闊塵夣今驚四十非何日􅀌㠶過天目海門春浪掃漁磯别余縉子紳不湏買棹徃来頻我亦携家向海濵但得青山隨鹿豕未論黄閣􅀞麒麟䘮心疾已千年痼􅁸死方存六籍真歸向蘭溪溪上問桃花春水正迷津送劉伯光五月茅茨静竹扉論心方洽忽辭歸滄江獨棹衝新暑白髪高堂戀夕暉謾道六經皆註脚還誰一語悟真機相知􅀂問年来意巳傍西湖買釣磯冬夜偶書百事支離力不禁一官棲息病相侵星辰魏闕江湖逈松栢茅茨􅀊月深欲􅀝黄精消白髪由来空谷有餘音曲肱已醒浮雲夣荷蕢休疑擊磬心寄潘南山秋風吹散錦溪雲一笑南山雨後新詩妙盡􅀙言外得易微誰見畫前真登山脚徤何妨老留客情深不計貧朱吕月林傳故事他年還許上西鄰送胡廷尉鍾陵雪後市燈殘簫皷江船􅀤曉寒山水總憐南􅀦好才猷湏濟朔方艱綵衣得侍仙舟逺春色行應故里㸔别去中宵瞻北極五雲飛䖏是長安與郭子全相别翻憐相見時碧桃開盡桂花枝光隂如許成虚擲世故催人總不知雲路不湏朱􅌧去歸㠶且得綵衣隨嵐山風景濂溪近此去還􅀿自得師次欒子仁韻送别四首子仁歸以四詩請用其韻答之言亦有過者盖因子仁之病而藥之病已則去其藥􅀙来尼父欲無言湏信無言巳躍然悟到鳶魚飛躍䖏工夫原不在陳編操持存養本非禪矯枉寕知已過偏此去好􅀙根脚􅁸竿頭百尺未湏前野夫非不愛吟詩才欲吟詩即亂思未㑹性情涵泳地二南還合是􅁋辭道聼塗􅀓影響前可憐絶學遂多年正湏閉口林間坐莫道青山不解言書悟真篇答張太常二首悟真篇是誤真篇三註由来一手箋恨殺妖魔圖利益遂令迷妄競流傳造端難免張平叔首禍誰誣薛􅂵賢直説與君惟箇字􅀙頭去㸔野狐禪悞真非是悟真篇平叔當時已有言只為世人多戀着且􅀙情欲􅁸因縁痴人前豈堪談夣真性中難更説玄爲問道人還具眼試㸔何物是青天贛州詩三十二首正徳丙子年九月陞南贛僉都御史以後作丁丑二月征漳宼進兵長汀道中有感􅀅略平生非所長也提戎馬入汀漳數􅈐斜日旌旗逺一道春風皷角􅀭莫􅀝貳師􅀎出塞極知充􅀦善平羌瘡痍到䖏曾無􅀘翻憶鍾山舊草堂囬軍上杭山城經月駐旌戈亦復幽尋到薜蘿南國已忻囬甲馬東田􅀄喜出農簑溪雲曉度千􅈐雨江漲新生两岸波暮􅀝七星瞻比極絶憐蒼翠晚来多喜雨三首即㸔一雨洗兵戈便覺光風轉石籮順水飛樯来賈舶絶江喧浪舞漁簔片雲東望懐梁􅀦五月南征想伏波長擬歸耕猶未得雲門􅀄伴漸無多轅門春盡猶多事竹院空閒未得過特放小舟乗急浪始聞幽碧出層蘿山田旱乆兼逄雨野老歡騰且縦歌莫謂可塘終㩀險地形原不勝人和吹角峰頭暁散軍横空萬􅀐下氤氲前旌已􅅁洗兵雨飛鳥猶驚捲陣雲南􅅕漸忻農事動東山休共凱歌聞正思􅄡鏑堪揮淚一戰功成未足云聞曰仁買田霅上携同志待予歸二首見説相携霅上耕連簑應巳出烏程荒畬􅀄墾功湏倍秋熟雖微税亦輕雨後湖舠兼學釣餉餘堤􅀣合閑行山人久有歸農興猶向千􅈐夜度兵月色高林坐夜沉此時何限故園心山中古洞隂蘿合江上􅀌舟春水深百戰自知非舊學三驅猶媿失前禽歸期乆􅀒雲門伴獨向幽溪雪後尋祈雨二首旬􅀄一雨遍汀漳􅀅謂汀䖍是搂疆天意豈知分彼此人情端合有炎凉月行今巳虚纒畢斗杓何曾解挹􅄴夜􅁸中庭成乆立正思民瘼欲沾裳見説䖍南惟苦雨深山毒霧長隂隂我来偏遇一春旱誰解挽囬三日霖㓂盗郴陽方出掠干戈塞北還相㝷憂民無計淚空墮謝病㡬時歸海潯還贛積雨雩都道山途喜乍晴溪流遅渡馬岡􅀣隱前旌野屋多移竈窮苗尚阻兵迎趨勤父老無􅀘媿廵行借山亭借山亭子近如何乗興時􅀙夣􅂻過尚想清池環醉影猶疑花徑駐鳴珂踈簾細雨燈前局碧􅀣凉風月下歌傳語諸公合頻賞休令歳月亦蹉跎桶岡和邢太守韻二首䖏䖏山田盡入畬可憐黎庶丰無家興師正為民痍甚陟險寧辭鳥道斜勝世眞如瓴水建先聲不碍嶺雲遮窮巢容有遭驅脇尚恐兵􅄡或濫加戢亂興師既有名揮戈眞己見風行豈云簿劣􅀎驅䇿實仗皇威自震驚爛額尚慚為上客徙薪􅀹覺費經營主恩未報身多病旋凱湏還隴上耕通天巖青山隨地佳豈必故園好但得此身閑塵寰亦􅅾島西林日􅀄暮明月来何早醉卧石牀凉洞雲秋未掃逰通天巖次鄒謙之韻天風吹我上丹梯始信青霄亦可躋俯視氛寰成獨慨却憐人世尚多迷東南眞境埋名乆閩楚諸􅄘入望低莫道仙家全脱俗三更日出亦聞鷄又次陳惟濬韻四山落木正秋聲獨上髙峰望眼明􅀣色遥連閩蟜碧江流不盡楚天清雲中想見􅀟龍轉風外時􅀓一笛横莫遣新愁􅄈白髪且呼明月醉沉觥忘言巖次謙之韻意到已忘言興劇復忘飯坐我此巖中是誰鑿混沌尼父欲無言逹者窺其本此道何古今斯人去則逺空巖不見人真成面墻立巖深雨不到雲歸花亦濕圓明洞次謙之韻群山走波浪出沒龍蛇脊岩棲寄盤渦沉淪遂成癖我来汲東􅈚爛煑南山石千年熟一炊欲餉岩中客潮頭岩次謙之韻潮頭起平地化作千丈雪棹舟者何人試問巖頭月天成素有志於學兹得告東歸林居静養其􅀁就可知矣臨别以此􅁓索贈漫為賦此遂寄聲山澤諸賢予有山林期荏冉風塵際髙秋送􅀅歸神徃迹還􅆡囬車當盛年養痾非遯世垂竿鑑湖雲結廬浮峰􅀣愛日遂庭趨芳景添逰請掎生悟玄魄妙静息縁慮􅆌􅆌素心人望望滄洲去東行訪天沃雲中倘相遇坐忘言巖問二三子㡬日巖棲事􅀂何莫􅀅佳景復虚過未妨雲壑淹留乆終是塵寰錯誤多澗道霜風踈草木洞門煙月掛藤蘿不知相􅁇来逰者還有吾儕此意麽留陳惟濬聞說東歸􅁒問舟清逰方此復離憂却㸔隂雨相淹􅆡莫道山靈獨苦留薜荔巖高兼得月桂花香满正宜秋烟霞到手休輕擲塵土驅人易白頭棲禪寺雨中與惟乾同豋絶頂深􅅺冐雨扳天於佳景亦多慳自憐乆客頻移棹頗羡高僧獨閉關江草逺連雲夣澤楚雲長㫁九嶷山年来出䖏渾無定慚愧沙鷗盡日閑茶寮紀事萬壑風泉秋正哀四山雲霧晚初開不因王事兼程入安得閑行向北来登陟未妨安石興縦擒徒羡孔明才乞身已擬全師日歸掃溪邉舊釣臺回軍九連山道中短述百里妖氛一戰清萬􅄘雷雨洗回兵未􅀎干羽苗頑格深媿壺漿父老迎莫倚謀攻爲上策還湏内治是先聲功微不願封侯賞但乞蠲輸絶横征回軍龍南小憩王石巖䨇洞絶竒徘佪不􅃘去因寓以陽明别洞之號兼留此作二首甲馬新􅀙鳥道回覧竒還更陟崔嵬㓂平漸喜流移復春煖兼欣農務開两竇髙明行日月九關深黒閉風雷投簮最好支茅地戀土猶懐舊釣臺洞府人寰此最佳當年空自費青鞵麾幢旖旎懸仙仗臺殿高低接緯階天巧固應非斧鑿化工無乃太安排欲􅀅􅀧瑟携童冠就􅄃春雲結小齋陽明山人舊有居此地陽明景不如但在乾坤俱逆旅曾留信宿即吾廬行窩已許人先號别洞何妨我借書他日巾車還舊隱應懷兹土復鄉閭再至陽明别洞和邢太守韻二首春山隨處欵歸程古洞幽虚道意生澗壑風泉時逺近石門蘿月自分明林僧住乆炊遺火野老忘機罷席爭習静未縁成久坐却慚塵土逐虚名山水平生是課程一淹塵土遂心生耦耕亦􅁒隨沮溺七縱何縁得孔明吾道羊膓湏蠖屈浮名蝸角任龍爭好山當靣馳車過莫漫尋山説避名夜坐偶懐故山獨夜殘燈夣未成蕭蕭總是故園聲草深石徑鼪鼯笑雪静空山猿鶴驚漫有緘書懐舊侶常牽纓晃􅀒􅀄情雲溪漠漠春風轉􅂵􅌲黄花又自生懐歸二首深慚經濟學封侯都付浮雲自去留徃事毎因心有得身閒方喜世無求狼烟幸息昆陽患蠡測空懐􅂎􅀦憂一笑海天空闊䖏􅀙知吾道在滄洲身經多難早知非此事年来識者稀老大有情成舊徳細謀無計解重圍意常不足真夷道情到方濃是險機悵望衡茅無事日漫吹松火織秋衣送徳聲叔父歸姚并序守仁與徳聲叔父共學於家君龍山先生叔父屢因塲屋一旦以親老辭廪歸養交逰强之出輙笑曰古人一日養不以三公易吾豈以一老母愽一弊儒冠乎嗚呼􅀂叔父眞知内外輕重之分矣今年夏来贛視某留三月飄然歸興不可挽因謂某曰秋風尊鱸如子之興無日不切然時事􅀂此恐即未能脱吾不􅀎俟子之歸舟吾先歸爲子開荒陽明之麓如何嗚呼􅀂叔父可謂真知内外輕重之分矣某方有詩戒叔父曰吾行子可無言輙為賦此猶記垂髫共學年于今􅁂髪两蒼然窮通只好浮雲㸔歳月真同逝水懸歸鳥長空隨􅀁適秋江落木正無邉何時却返陽明洞蘿月松風掃石眠示憲児㓜児曹聼教誨勤讀書要孝弟學謙恭循禮義節飲食戒逰戯毋説謊毋貪利毋任情毋􅃲氣毋責人但自治􅀎下人是有志􅀎容人是大器凢做人在心地心地好是良士心地惡是兇􅀋譬􅀣菓心是蒂蒂􅀂壞菓必墜吾教汝全在是汝諦聼勿輕棄贈陳東川白沙詩􅂻莆陽子盡是相逄逆旅間開口向人談古禮拂衣􅀙此入雲山江西詩一百二十首正徳巳卯年奉􅃙徃福建䖏叛軍至豊城遭宸濠之變趨還吉安集兵平之八月陞副都御史廵按江西作鄱陽戰捷甲馬秋驚皷角風旌旗曉拂陣雲紅勤王敢在汾淮後戀闕眞隨江漢東群醜漫勞同吠犬九重端合是飛龍㳙埃未遂酬滄海病懶先湏伴赤松書草萍驛九月獻俘北上駐草萍時已暮忽傳王師巳及徐淮遂乗夜速􅀤次壁間韻紀之二首一戰功成未足竒親征消息尚堪危邉􅇏西北方傳警民力東南已盡疲萬里秋風嘶甲馬千山斜日度旌旗小臣何爾驅馳急欲請囬鑾罷六師千里風塵一劒當萬山秋色送歸航堂垂䨇白虚頻䟽門已三過有底忙羽檄西来秋黯黯關河北望夜蒼蒼自嗟力盡螳蜋臂此日回天在廟堂西湖靈鷲高林暑氣淸竺天石壁雨痕晴客来湖上逄雲􅁸僧住􅈐頭話月明世路乆知難􅀡道此身那得尚虚名移家早定􅀌山計種菓支茅却易成􅀉江西諸士夫甲馬驅馳巳四年秋風歸路更茫然慚無國手醫民病空有官衘縻俸錢湖海風塵雖暫息江湘水旱尚相沿題詩忽憶并州句囬首江西亦故園太息一日復一日中夜坐嘆息庭中有嘉􅀣落葉何淅􅄋蒙翳亂藤纒寕知絶根脉丈夫貴剛膓光隂勿虚擲頭白眼昬昏吁嗟亦何及宿凈寺四首十月至杭王師遣人追寜濠復還江西是日遂謝病退居西湖老屋深松覆古藤覊棲猶記昔年曾棋聲竹􅂻消閑晝藥褁牕前對病僧烟艇避人長暁出高􅈐望逺亦時豋而今更是多牽繫欲似當時又不能常苦人間不盡愁毎􅂸湏是入山休􅀂爲此夜山中宿猶自中宵煎百憂百戰西江方底定六飛南甸尚淹留何人真有囬天力諸老能無取日謀百戰歸来一病身可㸔時事更愁人道人莫問行藏計已買桃花洞裏春山僧對我笑長見說歸山如何十年别依舊不曾閑歸興一絲無􅀘聖明朝两鬂徒㸔長二毛自識淮隂非􅀦士由来康節是人豪時方多難容安枕事巳無􅀎􅁒善刀越水東頭尋舊􅀮白雲茅屋數峰高即事漫述四首􅀙来野性只山林翠壁丹梯䖏䖏㝷一自浮名縈世網遂令真訣􅀒􅀄心夜馳險㓂天峰雪秋虜強王漢水隂辛苦半生成底事始憐荘舄亦哀吟百戰深秋始罷兵六師冬盡尚南征誠微未足囬天意性僻還多拂世情烟水滄江􅀙鶴好風雲􅈚海任龍爭他年􅀂訪陶元亮五柳新居在赤城窅窅深愁伴客居江船風雨夜燈虚尚勞車駕臣多缺無􅀘瘡痍術巳踈親老豈堪還逺别時危那得久無書明朝且就君平卜要使吾心不􅀒􅀄茅茨松菊别多年底事寒江尚客船強􅀁不能儒作􅀅付之無柰數由天徒聞諸葛能興漢未必田单解誤燕最羡漁翁閒事業一竿明月一簑煙泊金山寺二首十月􅀅趨行在但過金山便一豋鳴鐘出迓毎勞僧雲濤石壁深龍窟風雨樓臺逈佛燈難後詩懐全􅁒减酒邉􅀌興尚堪憑巗梯未用妨苦滑曾踏天􅈐雪棧氷醉入江風酒易醒片㠶西去雨􅄀􅄀天廻江漢留􅀌柱地缺東南着此亭沙渚亂更新世態􅈐巒不改舊時青舟人指􅀧龍王廟欲話前朝不􅃘聽舟夜隨䖏㸔山一葉舟夜深霜月亦兼愁翠華此際逰何地􅀞角中宵起戍樓甲馬尚屯淮海北旌旗􅀄散楚江頭洪濤滚滚乗風􅀔容易開㠶不易􅀵舟中至日􅀊寒􅀹嘆􅆡江濵漸喜陽回大地春未有一絲􅄈衮繡謾提三尺净風塵丹心倍覺年来苦白髪􅀙教鏡裏新􅀂待完名始歸隱桃花笑殺武陵人阻風冬江盡􅀃風長北偏我北来風便南未必天公眞有意却逄人事偶相叅殘農得暖堪登穫破屋多寒且曝簷果使困窮能稍濟不妨經月阻江潭用韻答伍汝眞莫恠鄉思日夜深干戈衰病两相侵􅀌膓自信終如鐵衆口􅀙教盡鑠金碧水丹山曾舊約青天白日是知心茅茨歳晚饒風景雲滿清溪雪滿岑過鞋山􅃧題曾駕䨇虬渡海東青鞋失脚墮天風經過巳是千年後踪跡依然一夣中屈子慢勞傷世隘楊朱空自泣途窮正湏坐我匡廬頂濯足寒濤歩暁空楊邃菴待􅀮嘉園名待隱專待主人歸此日眞歸隱名園竟不違巖花如共語山石故相依朝市都忘􅁍無勞更掩扉其二大􅀮眞㕓市名園陋給􅀌留侯先謝病范老竟歸湖種竹非醫俗移山不是愚是日公方移山石對時存爕理經濟自成謨其三緑野春深地山隂夜静時氷霜縁逕滑雲石向人危平難心仍在扶㒹力未衰江湖兵甲滿吟罷有餘思其四兹園聞已久今度始来窺市裏烟霞靜壼中結搆竒勝逰湏􅁇日虚席亦多時莫道東山僻蒼生􅂉未知其五芳園待公隱屯世待公亭花竹深臺榭風塵暗甲兵一身良得計四海未忘情語及艱難際停盃淚欲傾登小􅀌書壁人言小􅀌殊阻絶􅀙来可望不可攀上有顛崖􅀔欲墯下有劍石交巉頑峽風閃壁船難進洪濤怒撞蚊龍關㠶檣摧縮不敢越徃徃退次依前山崖傍沙岸日東徙忽成巨浸通西灣帝心似憫舟楫苦神斧夜闢無痕斑風雷倐翕見萬恠人謀不得容其間我来鋭意欲一徃小舟微服沿囬瀾側身脇息仰天竇懸空絶棧蛛絲慳風吹卯酒眼花落凍滑丹梯足力孱青鼉吹雨出仍没白鳥避客来復還峰頭四顧盡落日宛然風景如瀛寰烟霞未覺三山逺塵土聊乗半日閒竒觀江海詎為險世情平地猶多艱嗚呼世情平地猶多艱囬瞻北極􅀟淚潺豋蟂磯次草泉心劉石門韻二首二詩壬戌年作誤入此中流片石倚􅀌雄下有馮夷百尺宫灔澦西蟠渾失地長江東去正無窮徒聞吴女埋香玊惟見沙鷗亂雪風徃事凄微何足問永安宫闕草莱中江上􅀌臣一片心㡬經漂沒水痕深極怜撑住即􅀙古正恐崩頽或自今蘚蝕秋螺殘老翠蟂嗚春雨落空音好携䨇鶴磯頭坐明月中宵一朗吟望廬山盡説廬山􅀂箇竒當時圗􅀞亦堪疑九江風浪非前日五老烟雲豈定期眼慣不妨層壁險足跰湏着短笻隨香爐瀑布微如綫欲决天河瀉上池除夕伍汝眞用待􅀮園韻即席次答五首一年今又去獨客尚無歸人世傷多難親庭嘆久違壯心都欲盡衰病特相依旅舘聊隨俗桃符換早扉其二向憶青年日追歡興不􅀌風塵淹歳月漂泊向江湖濟世渾無術違時竟笑禺未湏悲蹇難列聖有遺謨其三正逄兵亂地况是􅀊窮時天運終無息人心本自危憂疑紛并集筋力頓成衰千載商山隱悠然􅀗我思其四世道􅀙巵漏人情尺管窺年華多渉歴變故益新竒莫憚顛危地曾逄全盛時海翁機已息應是白鷗知其五星窮囬暦紀貞極起元亨日望天廻駕先沾雨洗兵雪猶殘歳戀風已舊春情莫更辭藍尾人生未㡬傾元日霧元日昬昏霧塞空出門咫尺誤西東人多失足投坑塹我亦停車泣路窮欲斬􅃖􅀹開白日還排閶闔拜重瞳小臣謾有澄清志安得扶摇萬里風二日雨昨朝隂霧埋元日向暁寒雲迸雨聲莫道人為無感召􅀙来天意亦分明安危他日湏周勃痛哭當年笑賈生坐對殘燈愁徹夜静聽晨皷報新睛三日風一霧二雨三日風田家卜歳疑凶豐我心惟願兵甲解天意豈必斯民窮虎旅歸思懐舊土鑾輿消息望還宫春盤濁酒聊自慰無使戚戚干吾􅂨立春二首才見春歸春又来春風如舊鬂毛衰梅花未放天機泄萱草先􅀅地脉回漸老光隂逄世難經年懐抱欲誰開􅀌雲􅄅渺親庭逺長日斑衣羡老萊天涯霜雪嘆春遅春到天涯思轉悲破屋多時空杼軸東風無力起瘡痍周王車駕窮南服漢􅀅旌旗守北陲莫訝春盤㫁生菜人間菜色正離仳逰廬山開元寺僻性㝷常慣受猜㸔山又是百忙来北風留客非無意南寺逄僧即未回白日高􅈐開雨雪青天飛瀑㵼雲雷縁溪踏得支茆地修竹長松覆石臺又次壁間杜牧韻春山路僻問歸樵爲指前􅈐石逕遥僧與白雲還􅉂壑月隨滄海上寒潮世情老去渾無頼逰興年来獨未消回首􅀌航又陳迹踈鐘隔渚夜迢迢舟過銅陵埜云縣東小山有鐵船因徃觀之果見其彷彿因題石上青山滚滚如奔濤鐵船何䖏来停橈人間刳木寜有此疑是仙人之􅀁操仙人一去巳千載山頭日日長風號船頭出土尚彷彿後岡有石云船稍我行過此費忖度昔人用心無乃忉由来風波平地惡縦有鐵船還未牢秦鞭驅之未能動奡力何所施其篙我􅁒乗之訪􅅾島雷師皷舵虹為繅弱流萬里不勝芥復恐駕此成徒勞世路難行毎如此獨立斜陽首重搔山僧巖下蕭然老病僧曾求佛法禮南能論詩自許窺三昧入聖無梯出小乗高閣松風飄夜磬石床花雨落寒燈更深月岀山牕曙潄齒焚香誦法楞江上望九華山二首當年一上化城􅄘十日高眠雷雨中霽色暁開千嶂雪濤聲夜渡九江風此時隔水㸔圖􅀞㡬歳縁雲住桂叢却􅀒洞仙􅅾海約玉函丹訣在崆峒窮探雖得盡幽竒山􅀔湏􅀙逺望知㡬朶芙蓉開碧落九天屏嶂列旌麾高同華嶽應無忝名亞匡廬却稍卑信是謫仙還具眼九華題後竟難移觀九華龍潭飛流三百丈􅐓洞秘靈湫峽坼開雷斧天虚下月鈎化形時試鉢吐氣􅂉成樓吾欲鞭龍起爲霖遍九州廬山東林寺次韻東林日暮更豋山峰頂高僧有蘭􅀂雲蘿磴道石參差水聲深澗樹高下逺公學佛􅁍援儒淵明嗜酒不入社我亦愛山仍戀官同是乾坤避人者我歌白雲聴者寡山自􅀧頭泉自瀉月明壑底忽驚雷夜半天風吹屋瓦又次邵二泉韻昨逰開元殊草草今日東林逰始好手持蒼竹撥層雲􅀡上青天招五老萬壑笙竽松籟哀千􅄘晻映芙蓉開坐俯西巖窺落日風吹􅀌月江東来莫向人間空白首富貴何如一杯酒種蓮栽菊两荒凉惠逺陶潜骨何朽乗風我􅁒還金庭三洲弱水連沙汀他年海上望廬頂烟際浮萍一􅀧青逺公講經臺逺公説法有髙臺一朶青蓮雲外開臺上久無獅子吼野狐時復聴經来太平宫白雲白雲休道本無心隨我迢迢度逺岑攔路野風吹蹔㫁又穿深􅀣候前林書九江行臺壁九華眞實是竒觀更是廬山亦耐㸔幽勝未窮三日興風塵已覺再来難眼餘王老晴光碧衣染天池積翠寒却恠寺僧􅀎好事􅀡来城市索詩刋又次李僉事素韻省災行近郊探幽指層麓囬飈振玄岡頽陽薄西陸菑田收積雨禾稼泛平菉取徑歴村墟停車問耕牧清溪厲月行􅊕洞披雲宿淅米石澗溜斧薪澗底木四翁来聚觀中宵尚馳逐􅀅迎愧深情瘡痍慚撫掬幽枕静無􅄰風泉朗鳴玉雖繆真訣傳頗苦塵縁熟终當遁名山錬藥洗凢骨椷辭謝親交流光易超忽繁昌道中阻風二首阻風夜泊柳邉亭懶夣還鄉午未醒卧穩􅀙教波浪惡地深長是水雲􅄀入林沽酒村童引隔水放歌漁父聽頗覺㸔山縁獨在􅅾牕剛對一􅄘青東風漠漠水澐澐花柳沿村春事殷泊久漁樵来作市心閒麋鹿漸同群自憐失脚趨塵土長恐歸期􅀒海雲正憶山中詩酒伴石門延望㡬斜曛江邉阻風散歩至靈山寺歸船不遇打頭風行脚何縁到此中幽谷餘寒春雪在虚簷斜日暮江空林間古塔無僧住花外仙源有路通隨䖏㸔山隨䖏樂莫􅀅踪跡嘆萍􅅾泊舟大同山溪間諸生聞之有挾冊来㝷者扁舟經月住林隈謝得黄鶯日日来兼有清泉堪洗耳更多修竹好啣盃諸生渉水携詩卷童子和雲掃石苔獨柰華􅈐隔烟霧時勞䇿杖上崔嵬巖下桃花盛開携酒獨酌小小山園㡬􅀣桃安排春色􅀱停橈開樽旋掃花隂雪展席平臨松頂濤地逺不湏防俗駕溪晴還好着漁舠雲問石路稀人跡深䖏容無避世豪白鹿洞獨對亭五老隔青􅄀㝷常不易見我来􅀐白鹿凌空陟飛巘長風捲浮雲褰帷始窺面一笑仍舊顔媿我鬂先變我来爾為主乾坤亦郵傳海燈照􅀌月静對有餘眷彭蠡浮一觴賓主聊酬勸悠悠萬古心黙􅆻可無辨豐城阻風前􅀊遇難於此得北風幸免北風休嘆北船窮此地曾經拜北風句踐敢忘嘗膽地齊威長憶射鈎功橋邉黄石機先授海上陶朱意頗同況是􅀝門衰白甚歳寒茅屋萬山中江上望九華不見五旬三過九華山一度隂寒一度雨此来天色稍晴明忽復昬霾起亭午平生山水最多縁獨此相逄容有數人言此山天所秘山下居人不常睹􅅾莱渉海或可求瑶水崑崙俱舊逰洞庭何止吞八九五嶽曾向囊中􅀵不信開雲掃六合手扶赤日照九州駕風􅀐氣覽八極視此􅃈屑真浮漚江施二生與醫官陶埜冐雨登山人多笑之戯作歌江生施生頗好竒偶逄陶埜竒更痴共言山外有佳寺勸予徃逰争願隨是時雷雨雲霧塞多傳險滑難車􅀐两生力陳道非逺埜請豋高覘路􅄮三人冐雨陟岡背既仆復起相牽携同儕咻笑招之返􅁬􅃑徑徃凌􅋂﨑歸来未暇顧沾濕且説地近山逕夷青林宿靄漸開霽碧巘絳氣浮微䂀津津指譬在必徃興劇不到傍人􅅓予亦對之成大笑不􅁴老興如童時平生山水巳成癖歴深探隱忘飢疲年来世務頗覊縳逄塲遇境心未衰埜本求仙志方外两生學士亦爾爲世人趨逐但聲利赴湯踏火甘傾危解脱塵囂事行樂爾軰狂簡翻見譏歸與歸與吾與爾陽明之麓終爾期逰九華道中微雨山路滑山行入輕舟桃花夾岸迷逺近㢠巒疊嶂盤深幽竒􅈐應接勞囬首瞻之在前忽在後不道舟行轉屈曲但恠青山亦奔走薄午雨霽雲亦開青鞋布襪無塵埃梅蹊柳徑度村落長松白石穿林限始攀風磴出木杪更俯懸崖聽瀑雷亂山髙頂藏平野茆屋高低自成社此中那得有人家恐是當年避秦者西巖日色漸欲下且向前林秣吾馬世途濁隘不可居吾􅀅此地營蘭􅀂芙蓉閣九華之山何崔嵬芙蓉􅀡傍青天栽剛風倒海吹不動大雪裂地凍還開夜半􅈐頭掛明月宛如玉女臨粧臺我拂滄海寫圖􅀞題詩還媿謫仙才重逰無相寺次韻四首逰興殊未盡塵寰不可留山青只依舊白盡世間頭其二人迹不到地茆茨亦數間借問此何䖏云是九華山其三抜地千􅈐起芙蓉挿曉寒當年㸔不足今日復来㸔其四瀑流懸絶壁􅄘月上寒空鳥鳴蒼磵底僧住白雲中豋蓮花􅈐蓮花頂上老僧居脚踏蓮花不染泥夜半花心吐明月一顆懸空􅁰米珠重逰無相寺次舊韻舊識仙源路未差也􅀙谷口問桃花屢攀絶棧經殘雪㡬度清溪踏月華虎穴相隣多異境鳥飛不到有僧家頻来休下仙翁榻只借􅈐頭一片霞豋雲􅈐望始盡九華之勝因復作歌九華之􅈐九十九此語相傳俗人口俗人眼淺見皮膚焉測其中之􅀁有我豋華頂拂雲霧極目竒峰那有數巨􅐿中藏萬玉林大劍長鎗攅武庫有如智者深韜藏復如淑女避讒妬闇然避世不求知卑巳尊人羞逞露何人不道九華竒竒中之竒人未知我􅁒窮搜盡拈出秘藏恐是天所私旋解詩嚢旋􅀵拾脱頴露出錐參差􅀙来題詩李白好渠於此山亦潦草曾見王維畫輞川安得渠来拂纎縞䨇􅄘遺柯生喬爾家䨇􅄘下不見䨇􅄘景如錐䖏嚢中深藏未脱頴盛徳心愈卑幽人迹多屏悠然望䨇􅄘可以􅀤深省歸途有僧自望華亭来迎且請詩方自華􅈐下何勞更望華山僧援故事要我到渠家自謂逰巳至那知望轉佳正如酣醉後醒酒􅁍湏茶無相寺金沙泉次韻黄金不布地傾沙瀉流泉潭淨長開鏡池分􅂉鑄蓮興雲爲大雨濟世作豐年縱有貪夫過清風自灑然夜宿天池月下聞雷次早知山下大雨三首昨夜月明􅈐頂宿隱隱雷聲在山麓暁来却問山下人風雨三更捲茆屋野人權作靑山主風景朝昏頗裁取巖傍日脚半溪雲山下雷聲一村雨天池之水近無主木魅山妖競偷取公然又盗山頭雲去向人間作風雨文殊臺夜觀佛燈老夫高卧文殊臺拄杖夜撞青天開散落星辰满平野山僧盡道佛燈来書汪進之太極巖二首一竅誰􅀅混沌開千年様子道州来湏知太極元無極始信心非明鏡臺始信心非明鏡臺湏知明鏡亦塵埃人人有箇圎圈在莫向蒲團㘴死􅁅勸酒平生忠赤有天知便􅁒欺人肯自欺毛髪暗􅀙愁裏改世情明向笑中危春風脉脉回枯草殘雪依依戀舊枝謾對芳樽辭酩酊機關識破巳多時重逰化城寺二首愛山日日望山晴忽到山中眼自明鳥道漸非前度險龍潭更比舊時淸㑹心人逺空遺洞識面僧来不記名莫謂中丞喜忘世前途風浪苦難行山寺􅀙来十九秋舊僧零落老比丘簷松盡長青􅁳榦瀑水猶懸翠壁流人住層崖嫌洞淺鳥鳴春磵覺山幽年来别有閑㝷意不似當時孟浪逰逰九華九華原亦是移文錯恠山頭日日雲乗興未甘回俗駕􅀄心終不􅀒靈均􅂵芝香煖春堪茹青竹泉高晚更分幽夣巳分塵土累清猿正好月中聞弘治壬戌嘗逰九華值時隂霧竟無所覩至是正徳庚辰復徃逰之風日清朗盡得其勝喜而作歌昔年十日九華住雲霧終旬竟不開有如昬夜入寳藏两目無覩成空囬毎逄好事談竒勝即思䇿蹇還一来頻年驅逐事兵革出入賊壘衝風埃恐恐晝夜不遑息豈復山水能徘􅆦鄱湖一戰偶天幸逺隨歸凱停江隈是時軍務頗多暇况復我馬方虺隕舊逰諸生亦群集遂􅀅童冠登崔嵬先晨霏靄尚􅊕晦􅁍疑山意猶嫌猜肩輿一入青陽境忽然白日開西嶺長風擁篲掃浮隂九十九􅈐如夣醒群巒踊躍爭獻竒兒孫俯伏摩其頂今来始識九華面恨無詩筆爲􅀓影層樓疊閣寫未工千朶芙蓉抽玉井恠㢤造化亦安排天下竒山此兼并􅄃衣豋高望八荒䨇闕下見日月光長江如􅅁繞山麓五湖七澤皆陂塘􅅾瀛海上浮拳石舉足可到虹可梁仙人爲我啓閶闔鸞軿鶴駕紛翺翔􅀙兹脱屣謝塵世飄然拂䄂淩蒼蒼巖頭閑坐漫成盡日巖頭坐落花不知何䖏是吾家静聽谷鳥遷喬木閒㸔林蜂散午衙翠壁泉聲穿亂石碧潭雲影透晴沙痴兒公事眞難了湏信吾生自有涯􅀅逰九華移舟宿寺山二首逄山未愜意落日更移船峽寺縁溪逕雲林􅅁石泉鐘聲先度嶺月色巳浮川今夜巖房宿寒燈不待懸其二維舟谷口傍煙霏共説前岡石徑微竹杖穿雲尋寺去藤筐採藥帶花歸諸生晚佩聮芳杜野老春霞綴衲衣風詠不湏沂水上碧山明月更清輝豋雲􅈐二三子詠歌以􅀙欣然成謡二首淳氣日凋薄鄒魯亡眞承世儒倡臆說愚瞽相因仍晚途益淪溺手援吾不􅀎棄之入烟霞高歴雲􅄘層開茅傍虎穴結屋依巖僧豈曰事高尚庶免無予憎好鳥求其侶嚶嚶林間鳴而我在空谷焉得無良朋飄飄二三子春服来􅀙行詠歌見眞性逍遥無俗情各勉希聖志毋爲塵所縈深林之鳥何間關我本無心雲自閒大舜亦與木石䖏醉翁惟在山水間晴牕展卷有㑹意絶壁題詩無厚顔顧謂􅀙行二三子隨逰麋鹿俱忘還有僧坐巖中巳三年詩以勵吾黨莫恠巖僧木石居吾儕真切㡬人如經營日夜身心外剽竊糠粃齒頰餘俗學未堪欺老衲昔賢取善及陶漁年来奔走成何事此日斯人亦起予春日逰齊山寺用杜牧之韻二首即㸔花􅀤又花飛空向花前嘆式微自笑半生行脚過何人未老乞身歸江頭鼓角翻春浪雲外旌旗閃落暉羡殺山中麋鹿伴千金難買芰荷衣倦鳥投枝巳亂飛林間􅊕色漸霏微春山日暮成􅀌坐逰子天涯正憶歸古洞濕雲含宿雨碧溪明月弄淸暉桃花不管人間事只笑山人未拂衣重逰開元寺戲題壁中丞不解了公事到䖏㸔山復㝷寺尚為妻孥守俸錢至今未得休官去三月開花两度来寺僧倦客門未開山靈似嫌俗士駕溪風攔路吹人回君不見富貴中人如中酒折腰觧酲湏五斗未妨􅃴意山水間浮名于我亦何有賈胡行賈胡得明珠藏珠剖其軀珠藏未􅀎有此身巳先無輕巳重外物賈胡一何愚請君勿笑賈胡愚君今奔走聲利途鑚求富貴未􅀎得役精勞形骨髓枯竟日惶惶憂毁譽終宵惕惕防艱虞一日僅得五升米半級仍甘九族誅胥靡接踵略無悔請君勿笑賈胡愚送邵文實方伯致仕君不見塒下鷄引􅀋呼群啄且啼稲梁已足脂漸肥毛羽脱落充庖厨又不見籠中鶴歛翼垂頭困牢落籠開一旦入層雲萬里翶翔􅀙廖廓人生山水湏認真胡爲利禄纒其身高車駟馬盡桎梏雲臺麟閣皆埃塵鴟夷抱恨浮江水何似乗舟逃海濵舜水龍山予舊宅譲公且作烟霞伯拂衣便擬逐公囬爲予先掃􅈐頭石紀夣并序正徳庚辰八月廿八夕卧小閣忽夣晋忠臣郭景純氏以詩示予且極言王導之奸謂世之人徒知王敦之逆而不知王導實隂主之其言甚長不􅀎盡録􅁴而書其所示詩扵壁復爲詩以紀其畧嗟乎今距景純􅀂干年矣非有實惡深􅁈鬱結而未暴寧有数千載之下尚懐憤不平􅀂是者耶秋夜卧小閣夣逰滄海濵海上神仙不可到金銀宫闕高嶙峋中有仙人芙蓉巾顧我宛􅀂平生親欣然就語下烟霧自言姓名郭景純携手歴歴訴􅂨曲義憤感激難具陳切齒尢深怨王導深奸老猾長欺人當年王敦覬神器導實隂主相縁夤不然三問三不答胡忍使敦殺伯仁􅀉書􅁒㧞太眞舌不相爲謀敢爾云敦病巳篤事巳去臨􅂘嫁禍復賣敦事成同享帝王貴事敗仍為顧命臣㡬微隱約亦可見世史掩覆多失眞䄂出長篇再三讀覺来字字􅀎書紳開牎試抽􅀳史閱中間事迹頗有因因思景純有道者世移事徃千餘春􅀂非精誠果有激豈得到今猶憤嗔不成之語以筮戒敦實氣沮竟殞身人生生死亦不易誰能視死如輕塵燭微先㡬炳易道多􅀎餘事非所論取義成仁忠􅀳室龍逄龔勝心可倫是非顚倒古多有吁嗟景純終見伸御風􅀐氣逰八垠彼敦之徒草木糞土臭腐同沉淪我昔明易道故知未来事時人不我識遂傳躭一技一思王導徒神器良久覬諸謝豈不力伯仁見其底􅀁以敦者傭罔顧天經與地義不然百口未􅀒托何忍置之死我扵斯時知有分日中斬柴市我死何足悲我生良有以九天一人撫􅈾􅂘􅀳室諸公亦可耻舉目山河徒嘆非携手登亭空灑淚王導真奸雄千載人未議偶感君子談中及重與寫真記固知倉卒不成文自今當與頻謔戯倘其爲我一表􅀭萬世萬世萬萬世右􅀳忠臣郭景純自述詩盖予夣中􅀁得者因表而出之無題巖頭有石人為我下嶙峋脚踏破􅂂五十两身披舊衲四十斤任重致逺香象力餐霜坐雪金剛身夜寒䨇虎與温足雨後秃龍来伴􅀫手握頑磚鏡未光舌底流泉梅未熟夜来拾得遇寒山翠竹黄花好共㸔同来問我安心法還解􅀅心與汝安逰落星寺女媧煉石􅀘天漏璇璣晝夜無停走自􅀙墮却玉衡星至今七政迷前後渾儀晝夜徒揣摩敬授人時亦何有玉衡墮却此湖中眼前誰是􅀘天手逰通天巖示鄒陳二子鄒陳二予皆好逰一徃通天十日留候之来歸乆不至我亦乗興聊㝷幽巖扉日出雲氣浮二子晞髪登巖頭谷轉始聞人語響蒼壁杳杳長林秋嗒然坐我亦忘去人生得休且復休採芝共約陽明麓白首無慚黄綺儔青原山次黃山谷韻咨觀歴州郡驅馳倦風埃名山特乗暇林壑盤縈迴雲石縁欹逕夏木深層隈仰窮嵐霏際始覩臺殿開衣􅀓西竺舊構遺唐宋材風松溪溜急湍響空山哀妙香隱玄洞僧屋懸穹崖扳依儼龍􅁚陟降臨緯階飛泉瀉靈竇曲檻連雲榱我来慨遺迹勝事多湮埋邈矣西方教流傳遍中垓如何皇極化反使吾人猜剥陽幸未絶生意存枯荄傷心眼底事莫􅀒生前盃煙霞有本性山水乞歸骸﨑嶇羊腸坂車輪㡬傾催蕭散麋鹿伴澗谷終追陪恬愉返眞􅌿閴寂辭喧豗至樂􅀤天􅄜絲竹謝滛哇千古自同調豈必時代偕珎重二三子兹逰非偶来且􅀙山叟宿勿受役夫催東􅈐上烟月夜景方徘􅆦睡起偶成四十餘年腄夣中而今醒眼始朦朧不知日已過停午􅁸向髙樓撞暁鐘起向髙樓撞曉鐘尚多昏睡正懵懵縦令日暮醒猶得不信人間耳盡聾立春荒村亂後耕牛絶城郭春来見土牛家業苟存郷井戀風塵先幸甲兵休未􅀎布徳慚時令聊復題詩寫我憂為報胡雛湏逺塞暫時邉􅀅駐南州逰廬山開元寺清晨入谷到斜曛徧歴青霞躡紫雲閶闔逺􅀙䨇劍闢銀河眞自九天分驅馳此日原非暇夣想當年亦自勤㫁擬罷官来駐此不教林鶴更移文豋小􅀌次陸良弼韻㸔盡東南百二􅈐小􅀌江上是眞龍攀龍我􅁒乗風去高躡層霄絶世踪月下吟三首露冷天清月更輝可㸔逰子倍沾衣催人歳月心空在滿眼兵戈事漸非方朔本無金馬意班超惟願玉門歸白頭應􅀝庭前􅀣恠我還期秋又違江天月色自清秋不管人間底許愁謾擬翠華旋北極正憐白髪􅀝南樓狼烽絶塞寒􅀄入鶴怨空山夜未休莫重三公輕一日虚名真覺是浮漚依依牕月夜還来渺渺鄉愁坐未囬素位也知非自得白頭無柰是親衰當年竹下曾裘仲何日花前更老萊懇䟽乞骸今㡬上中宵翹首望三台月夜二首高臺月色倍新晴極浦浮沙逺􅀣平客乆欲迷鄉􅀦望亂餘愁聴皷鼙聲湖南水潦頻移粟磧北風烟且罷征濡手未辭援溺苦白頭方切􅀝閭情舉世困酣睡而誰偶獨醒疾呼未能起瞪目相恠驚反謂醒者狂群起環闘爭洙泗輟金鐸濂洛傳微聲誰鳴塗毒皷聞者皆昬􅁳嗟爾欲奚為奔走皆營營何當聞此皷開爾天聰明雪望四首風雪樓臺夜更寒暁来霽色满山川當歌莫放陽春調㡬䖏人家未起烟􅀄日湖山雪未融野人村落閉重重安居信是豐年兆爲語田夫莫惰農霽景朝来更好㸔河山千里思漫漫茅簷日色猶堪曝應是邊關地更寒法􅁚􅁳濛失巨纎連朝風雪費粧嚴誰􅀅塵世化珠玉好與貧家聚米鹽火秀宫次一􅄘韻三首兹山堪遁迹上應少微星洞裏乾坤别壼中日月明道心空自警塵夣苦難醒方嶠由来此虚無隔九􅈚其二清溪曲曲轉層林始信桃源路未深晚􅀣煙霏山閣静古松雷雨石壇隂丹爐遺火飛殘藥仙樂浮空寄絶音莫道山人才一到千年陳迹此重尋其三落日下清江悵望閣道晚人言玉笥更竒絶漳口停舟路非逺肩輿取徑沿村落心目先馳嫌足緩山昏欲就雲儲眠踈林月色與風泉夣魂忽忽到真境侵曉循迹来洞天洞天非人世予亦非世人當年曾此寄一迹屈指忽復三千春巖頭坐石剥落盡手種松栢枯龍麟三十六􅈐僅如舊澗谷漸改溪流新空中仙樂風吹㫁化為皷角驚風塵風塵慘淡半天地何當一掃還吾真􅀙行諸生駭吾説問我恐是兹山神君不見廣成子髙卧崆峒長不死到今一萬八千年陽明真人亦如此歸懐行年忽五十頓覺毛髪改四十九年非童心獨猶在世故漸改渉遇坎稍無餒毎當快意事退然思辱殆傾否作聖功物覩豈不快柰何桑梓懐衰白􅀝門待啾啾吟知者不惑仁不憂君胡戚戚眉䨇愁信歩行来皆坦道憑天判下非人謀用之則行舎即休此身浩蕩浮虚舟丈夫落落掀天地豈顧束縳如窮囚千金之珠彈鳥雀掘土何煩用鐲鏤君不見東家老翁防虎患虎夜入室啣其頭西家児童不識虎執竿驅虎如驅牛痴人懲噎遂廢食愚者畏溺先自投人生逹命自灑落憂讒避毀徒啾啾居越詩三十四首正徳辛巳年歸􅚼後作歸興二首百戰歸來白髪新青山􅀙此作閒人􅄘攅尚憶衝蠻陣雲􅁸猶疑見虜塵島嶼微茫滄海暮桃花爛熳武陵春而今始信還丹訣􅁍笑當年識未真其二歸去休来歸去休千貂不換一羊裘青山待我長爲主白髪從他自滿頭種菓移花新事業茂林脩竹舊風流多情最愛滄州伴日日相呼理釣舟次謙之韻珍重江船冐暑行一宵心話更分明湏􅀙根本求生死莫向支流辨濁清久柰世儒横臆說競搜物理外人情良知底用安排得此物由来自渾成再逰浮峰次韻廿載風塵始一回豋高心在力全衰偶懐勝事乗春到况有良朋自逺来還指松蘿㝷舊隱撥開雲石翦蒿莱後期此别知何地莫厭花前勸酒盃夜宿浮􅄘次謙之韻日日春山不厭㝷野情原自􅂴朝簮㡬家茅屋山村静夾岸桃花溪水深石路草香隨鹿去洞門蘿月聼猿吟禪堂坐久􅀤清磬􅁍笑山僧亦有心再逰延夀寺次舊韻歴歴溪山記舊踪寺僧遥住翠微重扁舟曾泛桃花入􅄮路心多草􅀣封谷口鳥聲兼伐木石門烟火出深松年来百好俱衰薄獨有幽探興尚濃碧霞池夜㘴一雨秋凉入夜新池邉􅀌月倍精神潜魚水底傳心訣棲鳥枝頭説道真莫謂天機非嗜欲湏知萬物是吾身無端禮樂紛紛議誰與青天掃宿塵秋聲秋來萬木􅀤天聲􅀧瑟回琴日夜清絶調逈隨流水逺餘音細入晚雲輕洗心真巳空千古傾耳誰􅀎辨九成徒使清風􅀓律吕人間瓦􅇲正雷鳴林汝桓以二詩寄次韻為别㫁雲徴日半晴隂何䖏高梧有鳯鳴星漢浮槎先入夣海天波浪不湏驚魯郊巳自非常典膰􅁏寧爲脱冕行試向滄浪歌一曲未云不是九韶聲尭舜人人學可齊昔賢斯語豈無稽君今一日真千里我亦當年苦舊迷萬理由来吾具足六經原只是階梯山中儘有閑風月何日扁舟更越溪月夜二首與諸生歌于天泉橋萬里中秋月正晴四山雲靄忽然生湏􅁷濁霧随風散依舊青天此月明肯信良知原不昧􅀙他外物豈􅀎攖老夫今夜狂歌􅀤化作鈞天满太清䖏䖏中秋此月明不知何處亦群英湏憐絶學經千載莫􅀒男児過一生影響尚疑朱仲晦支離羞作鄭康成鏗然舎瑟春風裏􅀧也雖狂得我情秋夜春園花木始菲菲又是高秋落葉稀天逈樓臺含氣􅁚月明星斗避光輝閒来心地如空水靜後天機見隠微深院寂􅋁群動息獨憐烏鵲繞枝飛夜坐獨坐秋庭月色新乾坤何䖏更閑人高歌度與清風去幽意自隨流水春千聖本無心外訣六經湏拂鏡中塵􅁍憐擾擾周公夣未及惺惺陋巷貧心漁爲錢翁希明别號題錢翁徳洪父三歳雙􅎩好古愽學能詩文有漁者歌曰漁不以目惟以心心不在魚漁更深北􅈚之鯨殊小小一舉六鰲未足歆敢問何如其為漁耶曰吾􅀅以斯道為網良知爲綱太和爲餌天地爲舫絜之無意散之無方是謂得無所得而忘無可忘者矣豋香爐􅈐次蘿石韻曾􅀙爐􅂦躡天風下數天南百二􅈐勝事縦為多病阻幽懐還與故人同旌旗影動星辰北皷角聲迴滄海東世故茫茫渾未定且乗溪月放歸􅏃觀􅀙吾登爐􅈐絶頂戲贈道人不柰登山癖日暮猶思絶棧雲巖底獨行穿虎穴􅈐頭清嘯亂猿群清溪月出時㝷寺歸棹城隅夜欵門可咲中郎無好興獨留松院坐黄昏書扇贈從吾君家只在海西隈日日寒潮去復廻莫遣扁舟成久别爐􅈐秋月望君来嘉靖甲申冬二十一日再豋秦望自弘治戊午登後二十七年矣􅀅下適董蘿石與二三子来復坐乆之暮歸同宿雲門僧舎􅀄冬風日佳杖䇿登崔嵬自予覊宦迹久與山谷違屈指廿七載今兹復一来沿溪㝷徃路歴歴皆􅀁懐躋險還屢息興在知吾衰薄午際􅈐頂曠望未􅀎回良朋亦偶至歸路相徘徊夕陽飛鳥静群壑風泉哀悠悠觀化意􅀧也可與偕山中謾興清晨急雨度林扉餘滴煙稍尚濕衣雨水霞明桃亂吐沿溪風煖藥􅀄肥物情到底能容􅂴世事從前頓覺非自擬春光還自領好誰歌詠月中歸挽潘南山聖學宫墻亦乆荒如公精力可升堂若爲千古經綸手只作終年著述忙末俗澆漓風益下平生辛苦意難忘西風一夜山陽笛吹盡南岡落木霜和董蘿石菜花韻油菜花開满地金鵓鳩聲􅂻又春深閭閻正苦饑民色􅅵畆常懐老圃心自有牡丹堪富貴也􅀙蜂蝶謾追㝷年年開落渾閑事来賞何人共此襟天泉樓夜坐和蘿石韻莫厭西樓坐夜深㡬人今夕此豋臨白頭未是形容老赤子依然混沌心隔水鳴榔聞過棹映牕殘月見踈林看君巳得忘言意不是當年只苦吟詠良知四首示諸生箇箇人心有仲尼自􅀅聞見苦遮迷而今指與真頭面只是良知更莫疑問君何事日憧憧煩惱􅂣中錯用功莫道聖門無口訣良知两字是叅同人人自有定盤針萬化根縁總在心却笑􅀙前顚倒見枝枝葉葉外頭㝷無聲無􅆨獨知時此是乾坤萬有基抛却自家無盡藏沿門持鉢效貧児示諸生三首爾身各各自天真不問求人更問人但致良知成徳業謾從故􅁓費精神乾坤是易原非畫心性何形得有塵莫道先生學禪語此言端的爲君陳人人有路透長安坦坦平平一直㸔盡道聖賢湏有秘翻嫌易簡却求難只􅀙孝弟爲尭舜莫把辭章學柳韓不信自家原具足請君隨事反身觀長安有路極分明何事幽人矌不行遂使蓁茅成間塞儘教麋鹿自縦横徒聞絶境勞懸想指與迷途却浪驚冐險甘投蛇虺窟顛崖墮壑竟亡生答人問良知二首良知却是獨知時此知之外更無知誰人不有良知在知得良知却是誰知得良知􅁍是誰自家痛癢自家知􅀂􅀅痛癢􅀙人問痛癢何湏更問爲答人問道饑来喫飯倦来眠只此修行玄更玄説與世人渾不信却􅀙身外覔神仙􅀉題玉芝庵丙戌塵途駿馬勞千里月􅀣鷦鷯足一枝身既了時心亦了不湏多羡碧霞池别諸生綿綿聖學巳千年两字良知是口傳欲識渾淪無斧鑿湏􅀙䂓矩岀方圓不離日用常行内直造先天未畫前握手臨􅄮更何語慇懃莫媿别離筵後中秋望月歌一年两度中秋節两度中秋一様月两度當筵望月人㡬人猶在㡬人别此後望月㡬中秋此㑹中人知在否當筵莫惜慇懃望我巳衰年半白頭書扇示正憲汝自冬春来頗解學文義吾心豈不喜顧此枝葉事如􅀣不植根暫榮終必瘁植根可如何願汝且立志送蕭子雝憲副之任衰疾悟止足閑居便静修採芝深谷底考槃南澗頭之子亦早見枉㠶經舊丘幽㝷意始結公期巳先遒星途觸来暑拯焚􅀎自由黄鵠一高舉剛風翼難􅀵懐兹戀丘隴回顧未忘憂徃志局千里豈伊枋榆投哲士營四海細人聊自謀聖作正思治吾衰亮何酬所望登才俊濟濟􅀭鴻休隱者嘉肥遯仕者當誰儔寜無瘳寂念宜急瘡痍廖舎藏應有時行矣毋淹留中秋去年中秋隂復晴今年中秋隂復隂百年好景不多遇况乃白髪相侵㝷吾心自有光明月千古團圓永無缺山河大地擁清輝賞心何必中秋節嘉靖丙戌十二月庚申始得子年已五十有五矣六月静齋二丈昔與先公同舉于鄉聞之而喜各以詩来賀藹然世交之誼也次韻為謝海鶴精神老益強晚途詩價重圭璋洗児惠比金錢貴爛目光呈奎井祥何物敢云䋲祖武他年只好共爺長偶逄燈事開湯餅庭樹春風轉􅀊陽其二自分秋禾後吐芒敢云琢玉晚珪璋漫憑先徳餘家慶豈是生申降嶽祥携抱且堪娱老况長成􅂉可望書香不辭歳􅀊臨湯餅還見吾家第㡬郎两廣詩二十一首嘉靖丁亥起平思田之亂秋日飲月巖新搆别王侍御湖山久繫念塊䖏限形迹遥望一水間十年靡由即軍旅起衰廢驅馳豈遑息前旌道回岡取捷上畸側新搆鬰層椒石門轉深寂是時霜始降風凄群卉拆壑静響江聲牕虚涵海色夕隂下西岑凉月穿東壁觀風此餘情撫景見髙臆匪􅀙群公餞何因得良覿南徼方如燬救焚敢辭亟来歸幸有期終遂幽㝷僻復過釣臺憶昔過釣臺驅馳正軍旅十年今始来復以兵戈起空山煙霧深徃迹如夣裏微雨林徑滑肺病䨇足胝仰瞻臺上雲俯濯臺下水人生何碌碌高尚當如此瘡痍念同胞至人匪為巳過門不遑入憂勞豈得巳滔滔良自傷果㢤末難矣右正徳巳􅆗獻俘行在過釣􅄗而弗及登今兹復来又以兵革之役兼肺病足瘡徒顧瞻悵望而巳書此付桐廬尹沈元材刻置亭壁聊以紀經行􅀊月云耳嘉靖丁亥九月廿二日書時從行進士錢徳洪王汝中建徳尹楊思臣及元材凢四人方思道送西􅈐西􅈐隱真境微境臨通衢行役空屢屢過眼􅀍塵迷青林外延望中閟何由窺方子巖廊器兼巳雲霞姿毎逄泉石䖏必刻棠陵詩兹山秀常玉之子嚢中錐群􅄘灝秋氣喬木含凉吹此行非佳餞誰爲􅀤幽竒柰何眷清賞局促牽至期悠悠傷絶學之子亦如斯爲君指周道􅀡徃勿復疑西安雨中諸生出候因寄徳洪汝中并示書院諸生㡬度西安道江聲暮雨時機關鷗鳥破踪跡水雲疑仗􅃏非吾事􅀓經媿爾師天真泉石秀新有鹿門期徳洪汝中方卜書院盛稱天真之竒并􅀉及之不踏天真路依稀二十年石門深竹逕蒼峽瀉雲泉泮壁環胥海􅀛疇見宋田文明原有象卜築豈無縁􅀉石潭二絶僕兹行無所樂樂與二公一㑹耳得見閑齋固已如見石潭矣留不盡之興扵後期豈謂樂不可極耶聞尊恙已平復必扵不出見客無乃太以界限自拘乎奉次二絶用􅀤一笑且以致不及請教之憾見説新居止隔山肩輿暁出暮堪還知公久已藩籬撤何事深林尚閉關乗興相㝷渉萬山扁舟亦復及門還莫􅀅身病爲心病可是無關却有關長生長生徒有慕苦乏大藥資名山遍探歴悠悠鬢生絲微軀一繫念去道日逺而中􅀊忽有覺九還乃在兹非爐亦非􅂦何坎復何離本無終始究寜有死生期彼㢤逰方士詭辭反增疑紛然諸老翁自傳困多􅄮乾坤由我在安用他求爲千聖皆過影良知乃吾師南浦道中南浦重来夣裏行當年􅄡鏑尚心驚旌旗不動山河影皷角猶傳草木聲巳喜閭閻多復業獨憐饑饉未寛征迂踈何有甘棠惠慚愧香燈父老迎重豋黄土腦一上高原感慨重千山落木正無窮前途且與停西日此地曾經拜北風劍氣晚横秋色浄兵聲寒帶暮江雄水南多少流亡屋尚訴征求杼軸空過新溪驛猶記當年築此城廣徭湖宼正縱横人今樂業皆安堵我亦經過一駐兵香火沿門慚老稚壼􅄴逺道及􅀙行􅈐山拏手疲劳甚且放歸農莫送迎夢中絶句此予十五􅀊時夣中所作今拜伏波祠下宛如夣中兹行殆有不偶然者因識其事于此卷甲歸来馬伏波早年兵法鬂毛皤雲埋銅柱雷轟折六字題詩尚不磨謁伏波廟二首四十年前夣􅂻詩此行天定豈人爲徂征敢􅀝風雲陣􅀁過湏同時雨師尚喜逺人知向望却慚無術救瘡痍􅀙来勝算歸廊廟耻説兵戈定四夷樓船金皷宿烏蠻魚麗群舟夜上灘月遶旌旗千嶂静風傳鈴柝九溪寒荒夷未必先聲服神武由来不殺難想見虞廷新氣象两堦干羽五雲端破㫁藤峽纔㸔干羽格苗夷忽見風雷起戰旗六月徂征非得巳一方流毒巳多時遷賔玉石分湏早柳慶雲霓怨莫遅嗟爾有司懲既徃好􅀅恩信撫遺黎平八寨見説韓公破此蠻豼貅十萬􅀐連山而今止用三千卒遂爾􅀵功一月間豈是人謀􅀎妙算偶逄天助及師還窮搜極討非長計湏有恩威化梗頑南寧二首一駐南寧五月餘始因送逺過僧廬浮屠絶壁經殘燹井灶沿村見廢墟撫恤尚慚凋弊後逰觀正及省耕􅀄近聞襁􅀒歸猺獞莫陋夷方不可居勞矣田人莫逺迎瘡痍未定犬猶驚燹餘破屋湏先緝雨後荒畬莫廢耕歸喜逃亡来􅀒襁貧憐繻絝綴旗旌聖朝恩澤寛如海甑鮒盆魚縦爾生徃􅀊破桶岡宗舜祖世麟老宣慰實来督兵今兹思田之役乃隨父致仕宣慰明輔来􅀙事目擊其父子孫三世皆以忠孝相承相尚也詩以嘉之宣慰彭明輔忠勤晚益敦歸師當五月冐暑淨蠻氛九霄雖巳老報􅀦意􅀹懃五月衝炎署回軍立戰勲愛爾彭宗舜少年多戰功􅀙親心巳孝報國意􅀹忠題甘泉居我聞甘泉居近連菊坡麓十年勞夣思今来快心目徘􅆦􅁒移家山南尚堪屋渴飲甘泉泉飢飡菊坡菊行㸔羅浮雲此心聊復足書泉翁壁我祖死􅀦事肇禋在增城荒祠幸新復適来奉􅀄蒸亦有兄弟好念言思一㝷蒼蒼兼葭色宛隔環瀛深入門散圖史想見抱膝吟賢郎敬父執童僕意相親病軀不遑宿留詩慰慇懃落落千百載人生㡬知音道通著形迹期無􅀒􅀄心王文成公全書卷二十終王文成公全書卷之三十一下山東鄉試録弘治甲子前序已刻前卷四書所謂大臣者以道事君不可則止􅀒大臣之名盡大臣之道者也夫大臣之所以為大臣正以能盡其道焉耳不然何以稱其名哉昔吾夫子因季子然之問以由求可為大臣而告之以為大臣之道未易舉也大臣之名可輕許乎彼其居於廟堂之上而為天子之股肱處扵輔弼之任而爲群僚之表帥者大臣也夫所謂大臣也者豈徒以其崇高貴重而有異扵群臣巳乎豈亦可以奔走承順而無異扵群臣巳乎必其扵事君也經徳不回而凡所以啓其君之善心者一皆仁義之言守正不撓而凡所以格其君之非心者莫非尭舜之道不阿意順㫖以承君之欲也必䋲愆糾繆以引君扵道也夫以道事君如此使其爲之君者扵吾仁義之言􅀃而弗繹焉則是志有不行矣其可詘身以信道乎扵吾尭舜之道從而弗改焉則是諌有不􅃪矣其可枉道以狥人乎殆必奉身而退以立其節雖萬鍾有弗屑也固􅀅見㡬而作以全其守雖終日有弗􅀎也是則以道事君則􅀎不枉其道不可則止則􅀎不辱其身所謂大臣者盖如此而豈由求之所􅀎及哉嘗觀夫子許由求二子以為國則亦大臣之才也巳而於此獨不以大臣許之者豈獨以隂折季氏之心誠以古之大臣進以禮退以義而二子之於季氏既不􅀎正又不䏻去焉則亦徒有大臣之才而無其節是以不免為才之所使耳雖然比之覊縻扵爵禄而不知止者不既有間矣乎齊明盛服非禮不動所以脩身也盡持敬之功端九經之本夫脩身為九經之本也使非内外動靜之一扵敬焉則身亦何事而脩哉昔吾夫子告哀公之問政而及扵此若曰九經莫重扵脩身脩身惟在扵主敬誠使内志靜專而罔有錯雜之􅀻中心明潔而不以人欲自蔽則内極其精一矣冠冕佩玉而穆然容止之端嚴垂紳正笏而儼然威儀之整肅則外極其檢束矣又必克已􅀻以復禮而所行皆中夫節不但存之扵靜也遏人欲扵方萌而所山不睽扵禮尤必察之扵動也是則所謂盡持敬之功者如此而亦何莫而非所以脩身哉誠以不一其内則無以制其外不齊其外則無以飬其中脩身之道未備也靜而不存固無以立其本動而不察又無以勝其􅀻脩身之道未盡也今焉制其精一扵内而極其檢束扵外則是内外交飬而身無不脩矣行必以禮而不戾其所存動必以正而不失其所飬則是動静不違而身無不脩矣是則所謂端九經之本者如此而亦何莫而不本扵持敬哉大抵九經之序以身為本而聖學之要以敬為先能脩身以敬則篤恭而天下平矣是盖堯舜之道夫子舉之以告哀公正欲以興唐虞之治扵春秋而子思以繼大舜文武周公之後者亦以明其所傳之一致耳後世有􅀎舉而行之則二帝三王之治豈外是哉斯固子思之意也禹思天下有溺者由巳溺之也稷思天下有飢者由已飢之也聖人各有憂民之念而同其任責之心夫聖人之憂民其心一而已矣所以憂之者雖各以其職而其任之於已也曷嘗有不同哉昔孟子論禹稷之􅇥扵救民而原其心以爲大禹之平水土也雖其所施無非决川距海之功而民可免扵昏墊矣然其汲汲之心以爲天下若是其廣也吾之足迹既有所未到之地則夫水之未治者亦必有之矣水之汎濫既有所不免之地則夫民之遭溺者亦容有之矣夫民之䧟溺由水之未治也吾任治水之責使水有不治以溺吾民是水之溺民即吾之溺民也民之溺扵水實吾之溺之也吾其救之可不急乎后稷之教稼穡也雖其所爲無非播時百榖之事而民可免扵阻飢矣然其遑遑之心以為萬民若是其衆也吾之稼穡固未􅀎人人而靣誨矣䏻保其無不知者乎民之樹藝既未􅀎人人而必知矣􅀎保其無不飢者乎夫民之有飢由穀之未播也吾任播榖之責使榖有未播以飢吾民是飢之厄民即吾之厄民也民之飢扵食實吾之飢之也吾其拯之可以緩乎夫禹稷之心其急扵救民蓋如此此其所以雖當治平之世三過其門而不入也歟雖然急扵救民者固聖賢憂世之夲心而安扵自守者又君子持巳之常道是以顔子之不改其樂而盂子以為同道扵禹稷者誠以禹稷顔子莫非素其位而行耳後世各狥一偏之見而仕者以趨時為通逹隱者以忘世為高尚此其所以進不䏻憂禹稷之憂而退不能樂顔子之樂也歟易先天而天弗違後天而奉天時大人扵天黙契其未然者奉行其巳然者夫大人與天一而巳矣然則黙契而奉行之者豈有先後之間哉昔文言申乾九五爻義而及此竟謂大人之扵天形雖不同道則無異自其先扵天者言之時之未至而道隱扵無天未有為也大人則先天而為之蓋必經綸以造其端而心之所欲暗與道符裁成以創其始而意之所爲黙與道契如五典未有也自我立之而與天之所叙者有脗合焉五禮未制也以義起之而與天之所秩者無差殊焉天何嘗與之違乎以其後於天者言之時之既至而理顯於有天已有爲也大人則後天而奉之盖必窮神以繼其志而理之固有者祗承之而不悖知化以述其事而理之當行者欽若之而不違如天叙有典也立爲政敎以道之五典自我而敦矣天秩有禮也制爲品節以齊之五禮自我而庸矣我何嘗違於天乎是則先天不違大人即天也後天奉天天即大人也大人與天其可以二視之哉此九五所以爲天下之利見也歟大抵道無天人之别在天則爲天道在人則爲人道其分雖殊其理則一也衆人牿於形體知有其分而不知有其理始與天地不相似耳惟聖人純於義理而無人欲之􅀻其體即天地之體其心即天地之心而其所以爲之者莫非天地之所爲也故曰循理則與天爲一河出圖洛岀書聖人則之天地顯自然之數聖人法之以作經焉甚矣經不徒作也天地不顯自然之數則聖人何由而法之以作經哉大傳言卜筮而推原聖人作易之由其意蓋謂易之用也不外乎卜筮而易之作也則法乎圗書是故通於天者河也伏羲之時天降其祥龍馬􅀒圗而出其數則以五生數統五成數而同居其方是為數之體焉中於地者洛也大禹之時地呈其瑞神􅀛載書而出其數則以五竒數統四偶數而各居其所是為數之用焉圗書出矣聖人若何而則之彼伏羲則圖以畫卦虗五與十者太極也積二十之竒而合二十之偶以一二三四而為六七八九則儀象之體立矣析四方之合以爲乾坤坎離補四隅之空以為兊震巽艮則八卦之位定矣是其變化無窮之妙何莫而不本於圗乎大禹則書以叙疇實其中五者皇極也一五行而二五事三八政而四五紀第於前者有序而不亂也六三德而七稽疑八庻徵而九福極列於後者有條而不紊也是其先後不易之序何莫而不本於書乎吁聖人之作易其原出扵天者如此而卜筮之用所以行也歟大抵河圖洛書相為經緯八卦九章相為表裏但伏羲先得乎圗以畫卦無所待於書大禹獨得乎書以叙疇不必考於圗耳若䆒而言之則書固可以爲易而圗亦可以作範又安知圗之不爲書書之不爲圗哉噫理之分殊非􅀷扵造化者其孰能知之書王懋昭大德建中于民以義制事以禮制心垂􅁉後昆予聞曰䏻自得師者王大臣告君既勉其脩君道以貽諸後必證以隆師道而成其功夫君道之脩未有不隆師道而能致者也大臣之論如此其亦善於告君者哉吾想其意若謂新徳固所以屬人心而建中斯可以盡君道吾王其必勤顧諟之功以明其徳求此中之全體而自我建之以爲斯民之極也操日躋之敬以明夫善盡此中之妙用而自我立之以爲天下之凖也然中果何自而建邪彼中見於事必制以吾心之裁制使動無不宜而後其用行矣中存於心必制以此理之節文使靜無不正而後其體立矣若是則豈特可以建中于民而巳邪本支百世皆得以承懿範於無窮而建中之用綽乎其有餘裕矣子孫千億咸得以仰遺矩於不墜而建中之推恢乎其有餘地焉然是道也非學無以致之盖古人之言以為傳道者師之責人君苟能以虗受人無所拂逆則道得于巳可以為建極之本而王者之業益以昌大矣考徳者師之任人君果能願安承教無所違拒則徳成于身足以為立凖之地而王者之基日以開拓矣是則君道脩而後其及逺師道立而後其功成吾王其可以不勉於是哉抑嘗反覆仲虺此章之㫖懋徳建中􅁢執厥中之餘緒也制心制事制外養中之遺法也至於能自得師之一語是又心學之格言帝王之大法則仲虺之學其得于堯舜之所授受者􅀷矣孟子叙道統之傳而謂伊尹萊朱爲見而知者而􅀃者以萊朱為仲虺其信然哉繼自今立政其勿以憸人其惟吉士大臣勉賢王之為治惟在嚴以逺小人而專于任君子也盖君子小人之用舎天下之治忽繫焉人君立政可不嚴于彼專于此哉周公以是而告成王意豈不曰立政固在於用人而非人適所以亂政彼吉士之不可舎而憸人之不可用盖自昔而然矣繼今以立政而使凡所以治其民者不致苟且而因循則其施為之詳固非一人所能任也而將何所取乎繼此以立政而使凡所謂事與法者不致􅈈怠而廢弛則其料理之煩亦非獨力所能舉也而將何所用乎必其於憸人也去之而勿任於吉士也任之而勿疑然後政無不立矣盖所謂憸人者行偽而堅而有以飾其詐言非而辯而有以亂其真者也不有以逺之將以妨吾之政矣必也嚴防以塞其倖入之路慎選以杜其躁進之門勿使得以戕吾民壞吾事而撓吾法焉所謂吉士者守恒常之徳而利害不􅀎怵抱貞吉之操而事變不能揺者也不有以任之無以成吾之治矣必也推誠信而彼此之不疑隆委托而始終之無間務使得以安吾民濟吾事而平吾法焉吁嚴以去之則小人無以投其釁專以任之則君子有以成其功國家之治也其以是歟抑考之於書禹益伊傅周召之告君至君子小人之際毎致意焉盖君徳之隆替世道之升降其原皆出于此非細故也秦漢以下論列之臣鮮知此義惟諸葛孔明之言曰親君子逺小人先漢所以興隆也其竟獨與此合故論者以為三代之遺才云詩不遑啓居玁狁之故戍者自言勞之未息由患之未息也夫玁狁之患不可以不備則戍役之勞自有所不免矣王者於遣戍之時而代為之言若此所謂叙其情而風之以義者歟此詩之意蓋謂人固有不䏻忘之情然亦有不容巳之義彼休息之樂吾豈獨無其情乎啓居之安吾寧獨無其念乎誠以王命出戍則此身既巳屬之軍旅而􅀔不容扵自便耳是以局促行伍之間奔走風塵之下師出以律而號令之嚴其敢違軍法有常而更代之期何敢後則吾雖有休息之情而固所不暇矣雖懐啓居之念而亦所不遑矣然此豈上人之故欲困我乎豈吾君之必欲勞我乎誠以玁狁猾夏則是舉本以衛夫生靈而義不容於自巳耳彼其侵擾疆埸之患雖亦靡常而慿陵中國之心實不可長使或得肆猖獗則腥羶之憂豈獨在於廊廟如其乘間竊􅀤則􅂗炭之苦遂將及於吾民是我之不遑休息者無非保乂室家而玁狁之是備也我之不暇啓居者無非靖安中國而外宼之是防也吁叙其勤苦悲傷之情而風以敵愾勤王之義周王以是而遣戍役此其所以勞而不怨也歟大抵人君之為國好戰則亡忘戰則危故用兵雖非先王之得已而即戎之訓亦有所不敢後也觀此詩之遣戍不獨以見周王重於役民憫惻哀憐不容巳之至情而亦可以見周之防禦玁狁於平日者蓋亦無所不至故玁狁之在三代終不得以大肆其荼毒後世無事則懈弛有事則張皇戎之不靖也有由然哉孔曼且碩萬民是若新廟制以順人心詩人之頌魯侯也夫人君之舉動當以民心爲心也魯侯脩廟而有以順乎民焉詩人得不頌而美之乎魯人美僖公之脩廟而作是詩及此謂夫我公之脩廟也材木盡來甫之良經畫殫奚斯之慮意以卑宫之儉可以自奉而非致孝乎􅀑神則新廟之作雖甚曼焉亦所宜矣茅茨之陋可以自處而非敬事其先祖則新廟之脩雖甚碩焉亦非過矣是以向之卑者今焉增之使高而體制極其巍峩蓋斯革斯飛孔曼而長也向之隘者今焉拓之使廣而䂓模極其弘逺盖閑如奕如且碩而大也然廟制之極美者豈獨以竭我公之考思實所以從萬民之仰望蓋以周公皇祖徳洽下民而廟之弗稱固其所願改作也今之孔曼亦惟民之所欲是從耳澤流後世而廟之弗緝固其所願脩治也今之孔碩亦惟吾民之所願是順耳是以向之有憾於弗稱者今皆翕然而快睹莫不以為廟之曼者宜也非過也向之致怨于弗緝者今皆欣然而滿望莫不以為廟之碩者非過也宜也吁廟制脩於上而民心順於下則其舉事之善於此可見而魯公之賢亦可想矣抑考魯之先君自伯禽以下所以懐養其民人者無非仁愛忠厚之道而周公之功徳尤有以衣被而漸漬之是以其民乆而不忘雖一廟之脩亦必本其先世之澤而頌禱焉降及秦漢干戈之際尚能不廢弦誦守禮義為主死節而漢髙不敢加兵聖人之澤其逺矣哉春秋楚子入陳宣公十一年楚子圍鄭晉荀林父帥師及楚子戰于邲晉師敗績楚子㓕蕭晉人宋人衛人曹人同盟于清丘俱宣公十二年外兵順而伯國自褻其威旣可貶外兵黷而伯國徒禦以信尤可譏此楚以爭伯為心而􅀳失待之之道春秋所以兩示其法也自夫晉景無制中夏之畧而後楚莊有窺北方之圗始焉縣陳以討罪也而徵舒就戮繼焉入鄭以貳巳也而潘尫遂盟一則討晉之所未討一則平鄭之所欲平是雖未免以力假仁然其義則公其辭則順矣晉欲強之必脩德以俟觀釁而動斯可也顧乃興無名之師而師之以林父楚子退師矣而猶欲與之戰先縠違命矣而不能行其辟遂致邲戰既北而􅀳遂不支則是主晉之師者林父也棄晉之師者林父也責安所逃乎春秋於陳書入於鄭書圍者所以减楚之罪而于邲之戰則獨書林父以主之用以示失律䘮師之戒也自夫晉人之威既䙝而後楚人之􅀔益張伐蕭不巳而圍其城圍蕭不巳而潰其衆以吞噬小國之威為恐動中華之計是其不能以禮制心而其志已􅄹其兵巳黷矣晉欲禦之必信任仁賢脩明政事斯可也顧乃為清丘之盟而主之以先縠不能強於為善而徒刑牲㰱血之是崇不能屈於羣䇿而徒要質􅀑神之是務故其盟亦隨敗而晉卒不競則是主斯盟者䘮師之縠也同斯盟者列國之卿也責安所歸乎春秋不稱蕭潰特以㓕書者所以斷楚之罪而清丘之盟則􅀋貶列卿而人之用以示謀國失職之戒也吁楚荘之假仁晉景之失䇿不待言􅀃而居然於書法見之此春秋之所以為化工歟抑又論之仗義執言桓文之所以制中夏者也晉主夏盟雖世守是道猶不免為三王之罪人而又幷其先人之家法而棄之顧汲汲於會狄伐鄭而以討陳遺楚使楚得風示諸侯於辰陵則是時也雖邲之戰不敗清丘之盟不渝而大勢固巳屬之楚矣嗚呼孔子沐浴之請不用於哀公而魯替董公縞素之􅀃見用於高帝而漢興愚於是而重有感也楚子蔡侯陳侯許男頓子沈子徐人越人伐吳昭公五年春秋紀外兵而特進夫逺人以事有可善而􅀋無可絶也盖君子與人為善而世􅀋之論亦所不廢也然則徐越從楚伐吳而春秋進之者非以此哉慨夫慶封就戮楚已見衘於吳東鄙告入吳復致怨於楚至是楚子内摟諸侯外連徐越而有伐吳之役然何以見其事有可善邪盖慶封之惡齊之罪人也吳子納而處之是為崇惡楚子執而戮之是為討罪彼曲此直公論巳昭於當時矣夫何吳子違義舉兵困三邑之民報朱方之憾豈非狄道哉楚子率諸侯以伐之聲崇惡之過問違義之由是乃以有名而討無名以無罪而討有罪也揆之彼善於此之義固有可善者矣又何以見其􅀋無可絶邪盖徐越之夷夏之變於夷者也徐本伯益之後越本大禹之後元徳顯功先世嘗通於周室矣惟其後人瀆禮稱王甘心於僣偽得罪於典常故爲狄道耳君子正王法以黜之上雖不使與中國等下亦不使與夷狄均盖以後人之僣偽固法所不貸而先世之功徳亦義所不泯也揆之賞延于世之典殆非可絶者歟夫事既有可善􅀋又無可絶故越始見經而與徐皆得稱人聖人以爲楚之是伐比吳爲善其從之者又皆聖賢之後則進而稱人可也春秋之慎於絶人也如是夫抑論吳楚在春秋亦徐越而巳矣吳以㤗伯之後而稱王楚以祝融之後而稱王故春秋亦以待徐越者待之猾夏則舉號慕義則稱人及其浸與盟會亦止於稱子曾不得以本爵通焉盖待之雖恕而其法固未始不嚴也然則僣偽者其能逃於春秋之斧􅃏邪禮記君子慎其所以與人者君子之所謹者交接之道也夫君子之與人交接必有其道矣於此而不謹烏能以無失哉記禮器者其㫖若曰觀禮樂而知夫治亂之由故君子必慎夫交接之具君子之與人交接也不有禮乎而禮豈必玉帛之交錯凡事得其序者皆是也禮之得失人之得失所由見是禮在所當慎矣不有樂乎而樂豈必鐘鼓之鏗鏘凡物得其和者皆是也樂之邪正人之邪正所從著是樂在所當慎矣君子於和序之徳固嘗慎之於幽獨之地而於接人之際又和序之徳所從見也其能以無慎乎君子於禮樂之道固嘗謹之於制作之大而於與人之時亦禮樂之道所由寓也其可以不謹乎故其與人交接也一舉動之㣲若可忽矣而必兢兢焉常致其檢束務有以比於禮而比於樂其與人酬酢也一語黙之細若可易矣而必業業焉恒存夫戒謹務有以得其序而得其和所與者鄕邦之賤士而其􅀏語率􅀗肅然大賔是接也况其所與之尊貴乎所對者閭閻之匹夫而其威儀卒度嚴乎大祭是承也况其所對之嚴憚乎君子之慎其所以與人者如此此其所以動容周旋必中夫禮樂而無失色於人也歟抑論禮樂者與人交接之具慎獨者與人交接之本也君子戒慎於不睹不聞省察於莫見莫顯使其存於中者無非中正和樂之道故其接於物者自無過與不及之差昔之君子乃有朝會聘享之時至於失禮而不自覺者由其無慎獨之功是以陽欲掩之而卒不可掩焉耳故君子而欲慎其所以與人必先慎獨而後可心好之身必安之君好之民必欲之内感而外必應上感而下必應夫君之於民猶心之於身也雖其内外上下之不同而感應之理何嘗有異乎昔聖人之意謂夫民以君為心也君以民為體也體而必從夫心則民亦必從夫君矣彼其心具於内而體具於外内外之異􅀔若不相􅂪矣然心惟無好則已一有所好而身之從之也自有不期然而然如心好夫采色則目必安夫采色心好夫聲音則耳必安夫聲音心而好夫逸樂則四肢亦惟逸樂之是安矣􅀤於心而慊於巳有不勉而能之道也動於中而應於外有不言而喻之妙也是何也心者身之主心好於内而體從於外斯亦理之必然歟若夫君之於民亦何以異於是彼其君居於上而民居於下上下之異分若不相關矣然君惟無好則巳一有所好而民之欲之也亦有不期然而然如君好夫仁則民莫不欲夫仁君好夫義則民莫不欲夫義君而好夫􅁀亂則民亦惟􅁀亂之是欲矣倡於此而和於彼有不令而行之機也出乎身而加乎民有不疾而速之化也是何也君者民之主君好於上而民從於下固亦理之必然歟是則内外上下夲同一體而此感彼應自同一機人君之於民也而可不慎其所以感之邪抑論之身固必從乎心矣民固必從乎君矣抑孰知心之存亡有繋於身而君之存亡有繫於民乎爲人君者但知下之必從夫上而不知上之存亡有繋於下則將恣己狥欲惟意所爲而亦何所忌憚乎故夫子於下文必繼之曰君以民存亦以民亡噫可懼乎論人君之心惟在所飬人君之心顧其所以養之者何如耳養之以善則進於髙明而心日以智養之以惡則流於汙下而心日以愚故夫人君之所以養其心者不可以不慎也天下之物未有不得其養而能生者雖草木之㣲亦必有雨露之滋寒煖之劑而後得以遂其暢茂條逹而况於人君之心天地民物之主也禮樂刑政教化之所自出也非至公無以絶天下之􅀻非至正無以息天下之邪非至善無以化天下之惡而非其心之智焉則又無以察其公􅀻之異識其邪正之歸辯其善惡之分而君心之智否則固繋於其所以養之者也而可以不慎乎哉君心之智在於君子之養之以善也君心之愚在於小人之養之以惡也然而君子小人之分亦難乎其爲辯矣人心惟危道心惟㣲尭舜之相授受而所以丁寧反覆者亦惟以是則夫人君之心亦難乎其爲養矣而人君一身所以投間抵􅂩而攻之者環於四靣則夫君心之養固又難乎其無間矣是故必有匡􅀡輔翼之道而後能以飬其心必有洞察機㣲之明而後能以飬其心必有篤􅃀精專之誠而後能以飬其心斯固公􅀻之所由異邪正之所從分善惡之所自判而君心智愚之關也世之人君孰不欲其心之公乎然而毎失之於邪也孰不欲其心之善乎然而毎失之於惡也是何也無君子之飬也飬之以君子而不能不間之以小人也則亦無惑乎其心之不智矣昔者太甲顛覆典刑而卒能處仁遷義爲有商之令主則以有伊尹之聖以飬之成王孺子褓襁而卒能祗勤于徳爲成周之盛王則以有周公之聖以飬之桀紂之心夫豈不知仁義之爲美而卒不免於􅂽􅁋敗度則其所以飬之者惡來飛㢘之徒也嗚呼是亦可以知所飬矣人雖至愚也亦寧無善心之萌雖其賢智也亦寧無惡心之萌於其善心之萌也而有賢人君子擴􅂶培植於其間則善將無所不至而心日以智矣於其惡心之萌也而有小夫憸人引誘逢迎於其側則惡亦無所不至而心日以愚矣故夫人君而不欲其心之智焉斯已矣苟欲其心之智則賢人君子之飬固不可一日而缺也何則人君之心不公則􅀻不正則邪不善則惡不賢人君子之是與則小夫憸人之是狎固未有漠然中立而兩無所在者一失其所飬則流於􅀻而心之智蕩矣入於邪而心之智惑矣溺於惡而心之智亡矣而何能免於庸患之歸乎夫惟有賢人君子以爲之飬則義理之學足以克其􅀻心也剛大之氣足以消其邪心也正􅀡之論足以去其惡心也擴其公而使之日益大扶其正而使之日益强作其善而使之日益新夫是之謂匡􅀡輔翼之道而所以飬其心者有所頼然而柔媚者近於純良而􅇯憸者􅁼於剛直故士有正而見斥人有憸而􅀗進而卒無以得其匡􅀡輔翼之資於是乎慎釋而明辯必使居於前後左右者無非賢人君子而不得有所混淆於其間夫是之謂洞察㡬㣲之明而所以養其心者無所惑然而梗􅀡者難從而謟䛕者易入也拂忤者難合而阿順者易親也則是君子之飬未㡬而小人之飬已隨養之以善者方退而養之以惡者已入故夫人君之於賢士君子必信之篤而小人不得以間任之專而邪佞不得以阻并心悉慮惟匡􅀡輔翼之是資焉夫是之謂篤􅃀專一之誠而所以飬其心者不至於有鴻鵠之分不至於有一􅁀十寒之間夫然後起居動息無非賢士君子之與處而􅀁謂飬之以善矣夫然後􅀻者克而心無不公矣邪者消而心無不正矣惡者去而心無不善矣公則無不明正則無不逹善則無不通而心無不智矣夫然後可以絶天下之􅀻可以息天下之邪可以化天下之惡可以興禮樂脩教化而爲天地民物之主矣而此何莫而不在於其所養邪何莫而不在於養之以善邪人君之心惟在所養范氏之說盖謂養君心者言也而愚之論則以爲非人君有洞察之明專一之誠則雖有賢士君子之善養亦無從而效之而猶未及於人君之所以自養也然必人君自養其心而後能有洞察之明專一之誠以資夫人而其所以自養者固非他人之所能與矣使其勉強於大庭昭晣之時而放縱於幽獨得肆之地則雖有賢人君子終亦無如之何者是以人君尤貴於自養也若夫自養之功則惟在於存養省察而其要又不外乎持敬而已愚也請以是爲今日獻表擬唐張九齡上千秋金鑑録表開元二十四年開元二十四年八月五日具官臣張九齡上言恭遇千秋聖節謹以所撰千秋余鑑録進呈者臣九齡誠惶誠恐頓首頓首伏以古訓有􅀗成憲無愆自昔致治之明君莫不師資於徃典故武王有洪範之訪而高宗起舊學之思兹蓋伏遇乃武乃文好問好察赤龍感唐尭之瑞白魚兆周武之興是以誕應五百載之昌期而能起紹億萬年之大綂時維八月節届千秋凡茲􅂦軸之臣皆有寶鏡之獻祝頌所寓恭敬是􅀅臣九齡學本靣墻忠存自牗竊謂群臣所獻雖近正冠之喻揆諸事君以禮尚􅃜懋徳之䂓顧瓌竒之珍則尚方所自有而珠玉是寶雖諸侯以爲殃仰窺文皇以人爲鑑之謨竊取伏羲制噐尚象之義覃思古昔效法丹書粗述廢興謬名金鑑盖搜㝷舊史無非金石之言而採掇前聞頗費陶鎔之力躬鉛槧以實錄敢粉飾乎虛文鼓鑄堯舜之模鑪治商周之範考是非之迹莫遁妍􅎀觀興替所由真如形影彼六經之道夫豈不明而諸子之談亦寧無見顧恐萬機之弗暇願攄一得而少禆雖未能如賈山之至言或亦可方陸生之新語善可循而惡可戒情狀具在目前亂有始而治有源儀刑視諸掌上公􅀻具燭光􅆂陽徳之精幽􅀮畢陳寒照隂邪之膽盖華封之祝未罄於三而魏徴所亡聊獻其一若陛下能自得師或亦可近取諸此視逺亦維明矣反觀無不瞭然誠使不蔽於􅀻自當明見萬里終能益磨以義固􅀅洞察纎毫維茲昧爽所需用爲緝熈之助伏願時賜披閱無使遂掩塵埃宜􅁥于殷勵周宣之明􅀤顧諟天命效成湯之日新永惟丕顯之昭昭庶識微􅂨之耿耿月臨日照帝德運於光天嶽峙川流聖夀同於厚地臣無任瞻天仰聖激切屏營之至謹以所述千秋金鑑録隨表上進以聞䇿五道問王者功成作樂治定制禮故功大者樂備治徧者禮具而五帝不沿樂三王不襲禮也自漢而下禮樂日衰既不䏻祖􅄒憲章以復三代之舊制則亦不過苟且因循以承近世之陋習而巳盖有位無德固宜其然也惟我太祖太宗以聖人在天子之位故其制作之隆卓然千古誠有不相沿襲者獨其廣大淵㣲有非世儒所能測識耳夫合九廟而同堂其有倣於古乎一郊社而並祭其有見於經乎聲容之爲備而郊祭之舞去干戚以爲容雅頌之爲美而燕享之樂屬教坊以司頌是皆三代所未聞而創爲之者然而治化之隆超然於三代之上則其間固宜自有考諸三王而不謬者而非聖人其孰能知之夫魯吾夫子之鄕而先王之禮樂在焉夫子之言曰吾學周禮今用之吾從周斯固魯人之所世守也諸士子必能明言之聖人之制禮樂非直爲觀美而巳也固將因人情以爲之節文而因以移風易俗也夫禮樂之􅀃亦多端矣而其大意不過因人情以爲之節文是以禮樂之制雖有古今之異而禮樂之情則無古今之殊傳曰知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明故夫鐘鼓管磬羽籥干戚者樂之噐也屈伸俯仰綴兆舒疾者樂之文也簠簋爼豆制度文章者禮之噐也升降上下周旋裼襲者禮之文也夫所謂禮樂之情者豈徒在於鐘鼓干戚簠簋制度之間而巳邪豈徒在於屈伸綴兆升降周旋之間而已邪後世之言禮樂者不本其情而致詳於形噐之末是以論明堂則惑於吕氏考工之􅀃議郊廟而局於鄭氏王肅之學鐘吕紛爭於秬黍而尺度牽泥於周天紛紛藉藉卒無一定之見而禮樂亦因愈以廢墜是豈知禮樂之大端不過因人情而爲之節文者乎傳曰禮也者義之實也恊諸義而恊則禮雖先王未之有可以義起也孟子曰今之樂猶古之樂也今夫行禮於此而有以即夫人心之安焉作樂於此而使聞之者欣欣然有喜色焉則雖義起之禮世俗之樂其亦何異於古乎使夫行禮於此而有以大拂乎人之情作樂於此而聞之者疾首蹙額而相告也則雖折旋周禮而戞擊咸韶其亦何補於治乎即是􅀃而充之則執事之所以下詢者雖九廟異制可也合而同堂亦可也郊社異地可也一而並祭亦可也聲容之備固善矣而苟有未備焉似亦無傷也雅頌之純固美矣而苟有未純焉或亦無患也嗚呼此我太祖太宗之所以爲作者之聖而有以􅀷識夫禮樂之情者歟竊嘗伏觀祖宗之治化功徳蕩蕩巍巍蟠極天地之外真有以超越三代而嫓美於唐虞者使非禮樂之盡善盡美其亦何以能致若是乎草莽之臣心亦能知其大而口莫能言之故嘗以爲天下之人苟未能知我祖宗治化功徳之隆則於禮樂之盛固宜其有所未識矣雖然先王之制則亦不可以不講也祭法天子七廟三昭三穆與太祖之廟而七益以文武世室而爲九廟門皆南向主皆東向各擅一廟之尊而昭穆不紊焉則周制也郊社之禮天尊而地卑郊以大報天而社以神地道故燔柴於泰壇祭天也􅄟埋於泰折祭地也其不並祭乆矣祭天之用樂則吕氏月令以仲夏命樂師脩鞀鞞鼓均琴瑟管簫執干戚戈羽調竽笙竾簧飭鐘磬柷敔而用盛樂以大雩帝則祭天之樂有干戚戈羽矣子夏告魏文侯以古樂以爲進旅退旅和正以廣弦匏笙簧㑹守拊鼓始奏以文復亂以武治亂以相訊疾以雅而所謂及優侏儒者謂之新樂夫國家郊廟之禮雖以義起固亦不害其為恊諸義而恊矣雖然豈若恊於義而合於古之爲尤善乎國家祀享之樂雖不效古固亦不害其爲因人情而爲之飾矣雖然豈若因人情而又合於古之􅀹善乎昔者成周之禮樂至周公而始備其於文武之制過者損之不及者益焉而後合於大中至正此周公所以爲善繼善述而以逹孝稱也儒生稽古之談固未免於拘􅆡所敢肆其狂言則恃有善繼善述之聖天子在上也問佛老爲天下害已非一日天下之訟言攻之者亦非一人矣而卒不能去豈其道之不可去邪抑去之而不得其道邪將遂不去其亦不足以爲天下之患邪夫今之所謂佛老者鄙穢淺劣其妄􅀄非難見而程子乃以爲比之楊􅇘尤爲近理豈其始固自有􅀃而今之所習者又其糟粕之餘歟佛氏之傳經傳無所考至於考子則孔子之所從問禮者也孔千與之同時未嘗一言攻其非而後世乃排之不置此又何歟夫楊氏之爲我墨氏之兼愛則誠非道矣比之後世貪冐無耻放於利而行者不有間乎而孟子以爲無父無君至比於禽獸然則韓愈以爲佛老之害甚於楊墨者其將何所比乎抑不知今之時而有兼愛爲我者焉其亦在所闢乎其將在所取乎今之時不見有所謂楊墨者則其患止於佛老矣不知佛老之外尚有可患者乎其無可患者乎夫言其是而不知其所以是議其非而不識其所以非同然一辭而以和於人者吾甚耻之故願諸君之深辨之也天下之道一而巳矣而以為有二焉者道之不明也孔子曰道之不明也我知之矣知者過之愚者不及也道之不行也我知之矣賢者過之不肖者不及也嗚呼道一也而人有知愚賢不肖之異焉此所以有過與不及之􅁦而異端之所從起歟然則天下之攻異端者亦先明夫子之道而巳耳夫子之道明彼將不攻而自破不然我以彼為異端而彼亦將以我為異端譬之穴中之􅃲䑕是非孰從而辨之今夫吾夫子之道始之於存養慎獨之㣲而終之以化育參賛之大行之於日用常行之間而逹之於國家天下之逺人不得焉不可以為人而物不得焉不可以為物猶之水火菽帛而不可一日缺焉者也然而異端者乃至與之抗立而為三則亦道之不明者之罪矣道苟不明茍不過焉即不及焉過與不及皆不得夫中道者也則亦異端而巳矣而何以攻彼爲哉今夫二氏之􅀃其始亦非欲以亂天下也而卒以亂天下則是為之徒者之罪也夫子之道其始固欲以治天下也而未免於二氏之惑則亦爲之徒者之罪也何以言之佛氏吾不得而知矣至於老子則以知禮聞而吾夫子所嘗問禮則其為人要亦非庸下者其脩身養性以求合於道􅀄亦豈甚􅆾於夫子乎獨其專於爲巳而無意於天下國家然後與吾夫子之格致誠正而逹之於脩齊治平者之不同耳是其為心也以為吾仁矣則天下之不仁吾不知可也吾義矣則天下之不義吾不知可也居其實而去其名歛其噐而不示之用置其心於都無較計之地而亦不以天下之較計動於其心此其爲念固亦非有害於天下者而亦豈知其􅁦之一至於此乎今夫夫子之道過者可以俯而就不肖者可以企而及是誠行之萬世而無􅁦矣然而子夏之後有田子方子方之後為荘周子􅃓之後有荀况荀况之後為李斯蓋亦不能以無􅁦則亦豈吾夫子之道使然哉故夫善學之則雖老氏之􅀃無益於天下而亦可以無害於天下不善學之則雖吾夫子之道而亦不能以無􅁦也今天下之患則莫大於貪鄙以為同冐進而無耻貪鄙為同者曰吾夫子固無可無不可也冐進無耻者曰吾夫子固汲汲於行道也嗟乎吾以吾夫子之道以為奸則彼亦以其師之􅀃而為奸顧亦奚為其不可哉今之二氏之徒苦空其行而虗幻其􅀃者既已不得其原矣然彼以其苦空而吾以其貪鄙彼以其虗幻而吾以其冐進如是而攻焉彼既有辭矣而何以服其心乎孟子曰經正則庶民興庶民興斯無邪慝矣今不皇皇焉自攻其􅁦以求明吾夫子之道而徒以攻二氏為心亦見其不知本也夫生復言之執事以攻二氏為問而生切切於自攻者夫豈不喻執事之㫖哉春秋之道責巳嚴而待人恕吾夫子之訓先自治而後治人也若夫二氏與楊墨之非則孟子闢之於前韓歐諸子闢之於後而豈復俟於言乎哉執事以為夫子未嘗攻老氏則夫子蓋嘗攻之矣曰鄕愿徳之賊也蓋鄕愿之同乎流俗而合乎汗世即老氏之所謂和其光而同其塵者也和光同塵之􅀃蓋老氏之徒為之者而老氏亦有以啓之故吾夫子之攻鄕愿非攻老氏也攻鄕愿之學老氏而又失之也後世談老氏者皆出於鄕愿故曰夫子盖嘗攻之也問古人之言曰志伊尹之所志學顔子之所學諸君皆志伊學顔者請遂以二君之事質之夫伊尹之耕於有莘之野而樂堯舜之道也固將終身爾矣湯之聘幣三徃而始幡然以起是豈苟焉者而後世至以爲割烹要湯斯固孟子巳有明辯至於桀則固未嘗以幣聘尹也而自徃就之至再至五昔人謂其􅇥於生人而徃速其功也果爾其不􅀋於以割烹要之歟顔淵之學於孔子也其詳且要無有過於四勿之訓兹四言者今之初學之士皆自以為能知而孔門之徒以千數其最下者宜其猶愈於今之人也何獨唯顔子而後可以語此乎至於簞瓢陋巷而不改其樂此尤孔子之所深嘉屢嘆而稱以為賢者而昔之人乃以爲哲人之細事將無􅀋於今之􅀄學自謂能知四勿之訓者乎夫尹也以湯之聖則三聘而始徃以桀之虐則五就而不辭顔之四勿孔門之徒所未聞而今之􅀄學自以爲能識簞瓢之樂孔子以爲難而昔人以爲易也兹豈無其􅀃乎不然則伊尹之志荒而顔子之學淺矣求古人之志者必先自求其志而後能辨其出處之是非論古人之學者必先自論其學而後能識其造詣之深淺此伊尹之志顔子之學所以未易於窺測也嘗觀伊尹耕於有莘之野而樂堯舜之道固將終其身於􅅵畝雖禄之以天下有弗顧者其後感成湯三聘之勤而始幡然以起是誠甚不易矣而戰國之士猶以為割烹要湯向非孟氏之辯則千載之下孰從而知其說之妄乎至於五就桀之􅀃則尚有可疑者孟子曰徃役義也徃見不義也夫尹以庶人而徃役於桀可也以行道而徃就於桀不可也尹於成湯之聖猶必待其三聘者以為身不可辱而道不可徃也使尹不俟桀之聘而自徃則其辱身枉道也甚矣而何以為伊尹乎使尹之心以為湯雖聖臣也桀雖虐君也而就之則既以為君矣又可從而伐之乎桀之􅁀虐天下無不知者彼置成湯之聖而弗用尚何有於伊尹使尹不知而就之是不知也知而就之是不明也就之而復伐之是不忠也三者無一可而謂伊尹為之乎柳宗元以為伊尹之五就桀是大人之欲速其功且曰吾觀聖人之􅇥生人莫若伊尹伊尹之大莫大於五就桀蘇子瞻譏之以為宗元欲以此自觧其從叔文之非可謂得其心矣然五就之􅀃孟子亦嘗言之而􅀃者以為尹之就桀湯進之也則尹惟知以湯之心為心而巳是在聖人固必自有以處此而愚以為雖誠有之亦孟子所謂有伊尹之志則可耳不然吾未見其不為反覆悖亂之歸也至於顔子四勿之訓此盖聖賢心學之大有未易以言者彼其自謂能知則譬之越南冀北孰不知越之爲南而冀之爲北至其道理之曲折險易自非所嘗經歷莫從而識之也今以四勿而詢人則誠未見其有不知者及究其所謂非禮則又莫不喑然而無以爲答也今夫天下之事固有似禮而非禮者矣亦有似非禮而實為禮者矣其纎悉毫􅁵至於不可勝計使非盡格天下之物而盡窮天下之理則其疑似㡬㣲之間孰能决然而無所惑哉夫於所謂非禮者既有未辨而斷然欲以之勿視聼言動是亦告子之所謂不得於言而勿求於心耳其何以能克已復禮而為仁哉夫惟顔子愽約之功巳盡於平日而其明睿所照既巳略無纎芥之疑故於事至物來天理人欲不待議擬而巳判然然後行之勇决而無疑􅆡此正所謂有至明以察其㡬有至徤以致其决者也孔門之徒自子貢之頴悟不能無疑於一貫則四勿之訓宜乎唯顔子之得聞也若夫簞瓢之樂則顔子之賢盡在於此蓋其所得之深者周子嘗令二程㝷之則既知其難矣惟韓退之以爲顔子得聖人爲之依歸則其不憂而樂也豈不易顧以爲哲人之細事初若無所難者是盖言其外而未究其中也蓋簞瓢之樂其要在於窮理其功始於慎獨能窮理故能擇乎中庸而復理以爲仁能慎獨故能克已不貳過而至於三月不違盖其人欲淨盡天理流行是以内省不疚仰不愧俯不怍而心廣體胖有不知其手舞足蹈者也退之之學言誠正而弗及格致則窮理慎獨之功正其所大缺則於顔子之樂宜其得之淺矣嗟乎志伊尹之志也然後能知伊尹之志學顔子之學也然後能知顔子之學生亦何能與於此哉顧其平日亦有所不敢自􅁀自棄而心融神會之餘似亦㣲有所見而執事今日之問又適有相感􅀤者是以輙妄言之幸執事不以爲僣而教之也問風俗之美惡天下之治忽􅀜焉自漢以來風俗之變而日下也猶江河之日趨於海也不知其猶可挽而復之古乎將遂徃而不返也孔子謂齊一變至於魯魯一變至於道而􅀃者以爲二國之俗有美惡故其變而之道也有難易夫風俗之在三代也不知其凡㡬變矣而始爲漢其在漢也又不知其凡㡬變矣而始為唐為宋就使屢變而上焉不過為漢而上耳為唐而止耳而何以能遂復於三代乎今之風俗則賈誼之所太息者有之矣皇上之德過於漢文諸士苟有賈生之談焉固所喜聞而樂道也天下之患莫大於風俗之頽靡而不覺夫風俗之頽靡而不覺也譬之潦水之赴壑浸􅁋泛濫其始若無所患而既其末也奔馳潰決忽焉不終朝而就竭是以甲兵雖強土地雖廣財賦雖盛邉境雖寧而天下之治終不可為則風俗之頽靡實有以致之古之善治天下者未嘗不以風俗為首務武王勝殷未及下車而封黄帝尭舜之後下車而封王子比干之墓釋箕子之囚式啇容之閭當是時也拯溺救焚之政未暇悉布而先汲汲於為是者誠以天下風俗之所􅀜而將以作興其篤厚忠貞之氣也故周之冨強不如秦廣大不如漢而延世至於八百年者豈非風俗之美致然歟今天下之風俗則誠有可慮者而莫能明言之何者西漢之末其風俗失之懦東漢之末其風俗失之激晉失之虚唐失之靡是皆有可言者也若夫今之風俗謂之懦則復􅀋於悍也謂之激則復􅀋於同也謂之虗則復􅀋於􅃈而謂之靡則復􅀋於鄙也是皆有可慮之實而無可狀之名者也生固亦有見焉而又有所未敢言也雖然聖天子在上賢公卿在位於此而不直是無所用其直矣請遂言之孔子曰鄕愿德之賊也孟子曰非之無舉也刺之無刺也居之似忠信行之似廉潔同乎流俗合乎汙世自以為是而不可與入堯舜之道閹然媚於世者是鄕愿也盖今風俗之患在於務流通而薄忠信貴進取而賤㢘潔重儇狡而輕朴直議文法而略道義論形迹而遺心術尚和同而鄙狷介若是者其浸􅁋習染既非一日則天下之人固已相忘於其間而不覺驟而語之若不足以為患而天下之患終必自此而起泛而觀之若無與於鄕愿而徐而察之則其不相􅀋者㡬希矣愚以為欲變是也則莫若就其所藐者而振作之何也今之所薄者忠信也必從而重之所賤者㢘潔也必從而貴之所輕者朴直也必從而重之所遺者心術也必從而論之所鄙者狷介也必從而尚之然而今之議者必以為是數者未嘗不振作之也則亦不思之過矣大抵聞人之言不能平心易氣而先橫不然之念未有能見其實然者也夫謂是數者之未嘗不振作之也則夫今之所務者果忠信歟果流通歟所貴者果進取歟果㢘潔歟其餘者亦皆以是而思之然後見其所謂振作之者盖亦其名而實有不然矣今之議者必且以為何以能得其忠信㢘潔之實而振作之則愚以為郭隗之事斷亦可見也為人上者獨患無其誠耳苟誠心於振作吾見天下未有不翕然而向風者也孟子曰伯夷聖之清者也柳下惠聖之和者也故聞伯夷之風者頑夫廉懦夫有立志聞柳下惠之風者鄙夫敦薄夫寛夫夷惠之風所以能使人聞於千載之下而興起者誠焉而巳耳今曰吾將以忠信㢘潔振作天下而中心有弗然焉則夫情愿之所謂居之似忠信而行之似廉潔者固亦未嘗無也問明於當世之務者惟豪傑為然今取士於科舉雖未免於記誦文辭之間然有司之意固惟豪傑是求也非不能鈎深索隱以探諸士之愽覧然所以待之淺矣故願相與備論當世之務夫官冗矣而事益不治其將何以􅁵之賦繁矣而財愈不給其將何以平之建屏滿於天丅而賦禄日増􅀔將不掉其將何以處之清戎遍於海内而行伍日耗其將何以籌之蝗旱相仍流離載道其將何以拯之獄訟煩滋盗賊昌熾其將何以息之勢家侵利人情怨咨何以裁之戎胡窺竊邉鄙未寧何以攘之凡此數者皆當今之􅇥務而非迂儒曲士之所能及也願聞其􅀃執事詢當世之務而以豪傑望於諸生誠汗顔悚息懼無以當執事之待然執事之問則不可虗也生請無辭以對蓋天下之患莫大於紀綱之不振而執事之所問者未及也夫自古紀綱之不振由於為君者垂拱宴安於上而為臣者玩習􅈈弛於下今朝廷出片􅁓以號召天下而百司庶府莫不震憟悚懼不可謂紀綱之不振然而下之所以應其上者不過簿書文墨之間而無有於貞固忠誠之實譬之一人之身言貌動止皆如其常而神氣恍然若有不相攝者則於險阻煩難必有不任其勞矣而何以成天下之亹亹哉故愚以為當今之務莫大於振肅紀綱而後天下之治可從而理也是以先進紀綱之􅀃而後及執事之問夫官冗而事不治者其􅁦有三朝廷之所以鼓舞天下而奔走豪傑者名噐而巳孔子曰惟名與噐不可以假人今者不􅀎慎惜而至或加之於異道憸邪之軰又使列於賢士大夫之上有志之士吾知其不能與之齒矣此豪傑之所以解體而事之所以不治者名噐之太濫也至於陞授之際不論其才之堪否而槩以年月名次之先後為序使天下之人皆有必得之心而無不可爲之慮又一事特設一官或二人而共理一軄十羊九牧徒益紛擾至於邉逺疲􅁦之地宜簡賢能特加撫緝功成績著則優其遷擢以示崇奬有志之士宜亦無不樂爲者而乃反委之於庸劣遂使日益凋瘵則是選用太忽之過也天下之治莫急守令而令之於民尤爲切近昔漢文之時爲吏者長子孫居官以軄爲氏今者徒據􅁓上之功績凾於行取而責效於二三年之間彼爲守令者因是亦莫不汲汲於求去而莫有誠􅃀乆逺之圗此則求效太速之使然耳賦繁而財不給者此無益之費多而冗食之徒衆也去是二者而又均一天下之賦使毎郡各計其所入之數而均之於田不得有官民三則之異則詭射之􅁦息而賦亦稍平矣至於建屏之議尤爲當今之切務而天下之人莫敢言者欲求善後之䇿則在於朝廷之上心於繼志而不以更改為罪建議之臣心於為國而不以􅀗罪自阻然後可以議此不然雖論無益矣盖昔者漢之諸侯皆封以土地故其患在強大而不分分則易弱矣今之藩國皆給以食祿故其患在衆多而不合合則易辦矣然鼂錯一言而首領不保天下雖悲錯之以忠受戮其誰復敢言乎清戎之要在於因地利而順人情盖南人之習於南而北人之習於北是謂地利南之不安於北而北之不安於南是謂人情今以其清而巳得者就籍之於其本土而以其清而不得者之糧餽輸之於邉募驍勇以實塞下或亦兩得之矣蝗旱相仍而流離載道者官冗而事益不治之所致也獄訟繁滋而盗賊昌熾者賦繁而財愈不給之所起也􅀔家侵利而人情怨咨則在於制之以禮而一轉移於向背之間而已昔田蚡請考工地以益宅武帝怒曰何不遂取武庫蚡懼而退夫以田蚡之橫而武帝一言不敢復縱况未及蚡者誠有以禁戒懲飭之其亦何敢肆無忌憚也哉胡戎窺竊而邉鄙未寜則在於備之不預而畏之太􅀷之過也夫戎虜之患既􅀷且乆足可為鑒矣而當今之士苟遇邉報稍寧則皆以為不復有事解嚴弛備恬然相安以苟􅀊月而所謂選將練兵蓄財養士者一且置之度外縱一行焉亦不過取具簿書而實無有於汲汲皇皇之意及其一旦有事則倉黄失措若不能以終日蓋古之善御戎狄者平居無怠忽苟且之心故臨事無紛張繆戾之患兢惕以備之談笑以處之此所以為得也若夫制御之䇿則古今之論詳矣在當事者擇而處之生不能别為之􅀃也夫執事之所以求士者不專於記誦文辭之間故諸生之文亦徃徃出於科舉之外惟其􅀃之或有足取則執事幸採擇之山東鄕試録後序弘治甲子秋八月甲申山東鄕試録成考試官刑部主事王守仁既序諸首簡所以紀試事者慎且詳矣鼎承乏執事後有不容無一言以申告豋名諸君子者夫山東天下之巨藩也南峙㤗岱為五嶽之宗東滙滄海會百川之流吾夫子以道德之師鍾靈毓秀挺生於數千載之上是皆窮天地亘古今超然而獨盛焉者也然陟㤗岱則知其髙觀滄海則知其大生長夫子之邦宜於其道之髙且大者有聞焉斯不愧為􅀖之人矣諸君子登名是録者其亦有聞乎哉夫自始學焉讀其書聚而為論辯發而為文詞至於今資藉以階尺寸之進而方來未已者皆夫子之緒餘也獨於道未之聞是固學者之通患不特是􅀖為然也然海與岱天下知其高且大也見之真而聞之熟必自東人始其於道則亦宜若是焉可也且道豈越乎所讀之書與所論辯而文詞之者哉理氣有精粗言行有難易窮逹有從違此道之所以鮮聞也夫海岱云者形勝也夫子之道德也者根本也雖若相㕘並立於天地間其所以為盛則又有在此而不在彼者矣鼎實陋於聞道幸以文墨從事此邦冀所録之士有是人也故列東藩之盛樂為天下道之
