front:
  text: 王文成公全書卷之十七
  hash: sha256:fd0d1ef265566aa94f9c0bee58b2a496a9cd8feacee5a5c2d6ec3448d7d3e797
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_012-1a}
body:
  text: 别録九公移公移二廵撫江西征寜藩牌行贛州府集兵䇿應正徳十四年六月十八日照得本院奉􅃙前徃福建公幹於六月初九日自贑州啓行由水路十五日至豐城縣地名黃土腦節㩀知縣顧佖等幷沿途地方總甲等禀報江西省城突然變亂撫廵三司等官俱遭拘執殺害逺近軍民甚是驚惶再三阻遏本院且勿前進本院原未􅅁有官軍􅀔難輕進欲馳還贛州起兵則地里相去益逺已暫囬吉安府就近住劄一面調集兵糧號召義勇一面差人分投􅀲探的􅃀另行外爲此牌仰本府官吏照牌事理幷行附近衞􅀁各行􅀁屬起集父子鄉兵軍餘人等晝夜加謹固守城池以保不測仍仰知府邢珣查将貯庫錢糧盡數開具印信乎本先行呈報毋得隠匿一面行取安逺等縣原操不論上下班次官兵各備􅄡利噐械通到敎塲日逐操練重加犒餉選委謀勇官貟管領聴􅀱本院公文一至即刻就便􅀤行敢有違誤定以軍法䖏治决不輕貸咨兩廣總制都御史楊共勤國難節該欽奉􅃙福州三衛軍人進貴等脅衆謀反特命爾暫去彼䖏地方㑹同查議䖏置叅奏定奪欽此欽遵於六月初九日自贑啓行於本月十五日行至豐城縣地名黄土腦㩀知縣顧佖等禀稱本月十四日寧府將廵撫孫都御史許副使等官殺死廵按及三司府縣大小官員不從者俱􅀍執縳各衙門印信盡數􅀵去庫藏搬搶一空聲言􅀡取南京一面分兵北上各官競阻本職不宜輕進本職自顧单旅危途􅀔難復進方爾回程隨有兵卒千餘已夾江並進來追偶遇北風大作本職亦張疑設計整舟安行兵不敢逼幸而􅀗免本月十八日回至吉安府㩀知府伍文定等禀稱地方無主乞留暫為區畫逺近居民亦皆遮擁呼號隨又㩀臨江府拜新淦豐城奉新等縣各差人飛報寜府遣兵四出攻掠拘收印信等因本職奉有前㫖􅁒遂徑徃福建但天下之亊莫急於君父之難若彼順流東下萬一南都失備為彼􅀁襲彼将乗勝北趨動揺京輔如此則勝􅀒之筭末有􅀁歸此誠天下安危之大機慮念及此痛心寒骨義不􅃘舎之而去故遂入城撫慰軍民督同知府伍文定等調集兵糧號召義勇定謀設䇿􅀵合渙散之心作起忠義之氣牽其舉動而使進不得前搗其巢穴而使退無􅀁㩀庶幾叛逆可擒大難可靖本職自惟弱劣多病屢䟽乞休况地方之責亦非本職原任今兹扶疾赴閩實亦意圖便道歸省適當君父之急不􅃘失此事機姑復暫留期紓國難除具奏外為照前項事情係國家大難存亡􅀁關雖經起調吉安等府兵快非惟武藝無素􅀹恐兵力不敷必須􅄈調兵馬方克濟事照得南韶惠潮等府各有慣戰精兵堪以調用擬合移咨督􅀤為此今咨貴院煩為選取驍勇精壮兵快夫欵打手人等大約四五千名各備􅄡利噐械選委謀勇膽畧官員或就委嶺南道兵備僉事王大用監統給與各兵行糧不分雨夜兼程前來共勤國難諒貴院素秉忠孝之節乆􅀒剛大之氣聞此必将􅁬㭈而起秉􅃏長驅當在郭汾陽之先肯居祖士逺之後哉紛擾之中莫罄懇切惟髙明速圖之案行南安等十二府及奉新等縣募兵䇿應六月二十六日切照叛逆天下之大惡討賊天下之大義國家優禮藩封恩徳隆重乃敢輙萌異圖以干憲辟上逆天道下犯衆怒㓕亡之期計日可待本院職任雖非專責危難安􅃘坐視仗順伐逆鼓率忠義豪傑四起􅀤謀恊力除行吉安等府縣起調兵快防守地方及行廣東福建湖廣等䖏各調兵䇿應外照得本省􅀁屬各府州縣衙􅀁見今廵撫都布按等衙門俱各缺官事無統束擬合通行為此仰抄案回府即行􅀁屬縣分拜衞所衙門各起調官軍鄉兵固守城池保障地方仍一面分調兵快散布關隘嚴加把截一面選募驍勇精兵大縣約四五千名小縣約二三千名以上各備􅄡利噐械供給糧草擇委能幹勇力官員管領操練其各項錢糧費用聼将在官錢糧動支隨申本院查考其濵江去䖏多備船隻聼􅀱本院差官齎捧旗牌至日即刻依期啓行進攻仍選差慣便人役多方探聼消息不時飛報以慿區畫此係守土官員切責而臣子効忠致身正在今日各宜􅁬􅀤義氣鼓動軍民共成㓕賊之功以輸報國之念毋得遲違觀望失誤軍機自取罪戾寛恤禁約照得江西省城近遭變亂各府州縣兵戈騷動供億勞費兼值天時亢旱秋成無望人民窘迫言之痛心中間恐有無頼之徒乗機竊􅀤驚擾地方理合寛恤禁約但廵撫衙門見今缺官本院駐軍境内不容坐視合就權宜䖏置通行爲此除一面奏聞外仰抄案回府照依案驗内事理并行所屬各縣官員務湏軫念地方痛恤民隱凡一應不急詞訟工役俱各停止其軍前合用兵夫糧草各官俱要持㢘秉公親自編派毋得因而科擾及聼信下人受財作弊仍嚴加暁諭軍民人等務要各守本分安居田里不許扇惑搬移妄生事端大户毋逼債負小民毋激仇嫌鄉落居民各自㑹推家道殷實行止端荘一人充為約長二人副之将各人户編定排甲自相廵警保守各勉忠義共勤國難敢有抗違生亊驚擾地方者就便拏觧赴官治以軍法約長若有乗機侵害衆戸及受財不舉許􅀍害之人告􅀤重治仍仰各縣将前項寛恤禁約事宜翻刻告示􅀤仰鄉村張掛暁諭俟廵撫官員到日再行議䖏俱無違錯奬瑞州府通判胡尭元擒斬叛黨六月二十七日㩀瑞州府通判胡尭元報稱擒􅀗從叛儀賔李蕃斬􅀗叛黨九十四名等因看得逆賊稱亂天怒人怨誅㓕非乆然今􅀔熖正張本官乃能獨􅁬忠勇首挫賊􅄡逺近闻之義氣自倍合行奬勞以勵人心為此牌仰瑞州府官吏即行動支官錢買辦花紅羊酒委官率領官吏師生送至本官用見本院奬勸之意其餘有功人員分别等第量加犒賞被傷兵夫給與湯藥陣亡者厚恤其家􅀱功成之日通行造册申報陞賞仍一面起調驍勇精兵固守城池聼􅀱本院調􅀤毋得違誤䇿應豐城牌㩀豐城縣知縣顧佖禀稱本縣起調鄉兵固守城池惟恐兵力不敷必湏請兵䇿應庶保無虞等因㸔係地方重務已經調􅀤龍泉安福永新等縣并吉安千户所機快軍兵陸續前去䇿應照得􅀤去官兵必湏選委謀勇膽畧官員統領庶㡬調度得宜為此仰通判楊昉即􅀅後開軍兵名數督同千户蕭英監統恊同知縣顧佖等計議攻守方畧相度險夷要害逺斥堠以防奸勤訓練以齊衆探知賊人入境即便設竒布伏以逸待勞擊其不意務在先􅀤制人毋令乗間抵􅂩軍兵人等務要嚴為約束毋令侵擾敢有違犯退縮許以軍法從事各官尤要同心并力恊和行事共効忠貞之節以紓國家之難如或執抝參錯觀望逗遛違犯節制致有踈虞軍令具存决難輕貸調取吉水縣八九等都民兵牌訪得吉水縣八九等都民人王益題曽思温易弘爵王昭隆等各戸下人丁素習武勇人多尚義前任知縣周廣曾經起調征進皆係驍勇慣戰之人今兹逆黨倡亂民遭荼毒應合調取以赴國難爲此訪差致仕縣丞龍光齎牌前去吉水縣着落當該官吏即将各户義兵照數調集各備􅄡利噐械編成行伍僉選百長總小甲管領就仰該縣查支官錢給與口糧暫且就屯本縣操演武藝聴􅀱本院指日東下隨軍進剿照得江西一省人民乆􅀍寧府毒害侵肌削骨破家蕩産􅁈困已極控訴無門今其惡貫满盈天假義兵為民除暴尚聞愚昧之徒阻避寧府威勢不敢舉動殊不知寧府未叛之前尚為親王人不敢犯今逆謀既著即係反賊人人得而誅之復何所憚爾等義民正宜感激忠義振􅀭威武為百姓報讐泄憤共立不世之勲以􅀵勤王之績毋得稽遲觀望自取軍法重究差去官員不許假此擾害妄生事端體訪得出罪不輕貸預備水戰牌案照巳經行仰起調軍馬前來䇿應日乆尚未見到近㩀探報逆黨南下􅀅攻南都計此時南都必已有備各逆黨進無所􅀗必退保九江如此則水戰之具為急不可不備為此牌仰福建布政司即行選募海滄打手一萬名動支官庫不拘何項銀兩從厚給與衣装行糧各備􅄡利噐械就仰左布政使席書兵備僉事周期雍自行統領星夜前赴軍門相機前進并力擒剿仍行廵撫等衙門同心恊力後先監督應援此係叛逆謀危宗社天下荼毒所關呼吸存亡旦暮成敗間不容髮非比尋常賊情不得遲違觀望有虧臣節嗚呼主憂臣辱主辱臣死凡有血氣孰無是心况各官忠義自任剛大素聞必将􅁬臂疾驅有不容巳兵快及領兵人等敢有違犯節制有誤軍機者仰即遵照本院欽奉勑諭事理許以軍法從事無得姑息咨都察院都御史顔權宜進剿七月初五日節該欽奉云云除具題及咨南京兵部知㑹外為照前項事情係國家大難安危所關已經起調吉安等府兵快前去征剿并備行湖廣廣東福建各調兵䇿應外照得南畿係朝廷根本重地今寧王謀逆搆亂舉兵北行圖㩀南都必得四面合攻庶克有濟及照貴院奉命行勘前事即今逆跡已露别無可勘事情合咨前去煩為隨䖏行令所屬選取驍勇精兵及民間忠義約二三萬名選委謀勇官員分領㑹約鄰近省郡合􅀔刻期進討仍煩貴院親督兼程前來共勤國難諒貴院平日忠義存心剛􅀡自許况今奉命查勘寜藩正可權宜行事號召逺邇主憂臣辱主辱臣死他復付言紛擾之中莫罄懇切惟髙明速圖之權䖏行糧牌㩀撫州府申稱建昌撫州廣信饒州四府正徳十三年兊軍糧米不下十餘萬石原蒙撥在龍窟聼與撫州建安鉛山廣信饒州五所軍旗交兌因運船阻凍囬遲於今年六月始行較斛開兌其已兌者装載軍船未兌者仍在民艘不意十五日省城有變遂行停兌至十八日逆黨乗機刼奪各船順流放至饒州河下得無驚擾但今江河梗塞難以兌運節奏明文動調大軍征討叛逆要将兌軍淮糧暫留以備軍餉申詳到院查得先㩀吉安等府申稱為各府官軍􅀅臨􅁒将官庫􅁓米􅂍罰等銀并京庫等銀及将兌淮糧米從權給支借用等情巳經批仰依擬查取去後今申前因擬合准行為此仰府官吏􅀰行掌印官查将見在饒州灣泊兌軍淮糧准從權宜坐委能幹官員無分雨夜督運江西省城聼􅀱支給各兵行糧毋違時刻􅀱事平之日備造印信文冊繳報查照仍令委官前去查照免致下人因而侵欺未便牌行吉安府敦請鄉士夫共守城池七月初八日照得寜府反叛本院調兵進剿即日啓行各府縣掌印正官旣該統兵前進所㩀各該府縣城池雖巳行委各佐貳官防守但艱危之際事變不測必須歷練老成之人相與維持鎮定庶幾人心不致驚疑政務有所􅀝頼為此案行吉安府官吏通行各縣署印官員徑自以禮敦請老成鄉宦衆所推服者一二員在城以備􅂃急恊同行事該府城池關係􅀹重查得致仕按察使劉遜素有才望忠義􅁬激就仰該府請至公舘仍仰署印官待以賔師之禮托以咨决之事一應軍機事宜咨禀計議而行以安人心以濟大事仍行本官務以國家大難為心盡心竭力共圖殄賊毋以休致自嫌諒朝廷報功之典當亦自不相􅀒如誤大事咎亦有歸通無違錯牌行各哨統兵官進攻屯守七月十七日仰一哨統兵官吉安府知府伍文定即統部下官軍兵快四千四百二十一員名進攻廣潤門就留兵防守本門􅀡入布政司屯兵分兵把守王府内門仰二哨統兵官贛州府知府邢珣即統部下官軍兵快三千一百三十餘員名進攻順化門就留兵防守本門直入鎮守府屯兵仰三哨統兵官袁州府知府徐璉即統部下官軍兵快三千五百三十員名進攻惠民門就留兵防守本門􅀡入按察司察院屯兵仰四哨統兵臨江府知府戴徳孺即統部下官軍兵快新喻二縣三千六百七十五員名進攻永和門就留兵防守本門􅀡入都察院提學分司屯兵仰五哨統兵官瑞州府通判胡尭元童􅄾即統部下官軍兵快四千員名進攻章江門就留兵防守本門􅀡入南昌前衞屯兵仰六哨統兵官泰和縣知縣李楫即統部下官軍兵快一千四百九十二員名夾攻廣潤門􅀡入王府西門屯兵守把仰七哨統兵官新淦縣知縣李美即統部下官軍兵快二千員名進攻徳勝門就留兵防守本門􅀡入王府東門屯兵守把仰中軍營統兵官贛州衞都指揮余恩即統部下官軍兵快四千六百七十員名進攻進賢門􅀡入都司屯兵仰八哨統兵官寜都知縣王天與即統部下官軍兵快一千餘員名夾攻進賢門留兵防守本門􅀡入鍾樓下屯兵仰九哨統兵官吉安府通判談儲即統部下官軍兵快一千五百七十六員名夾攻徳勝門􅀡入南昌左衞屯兵仰十哨統兵官萬安縣知縣王冕即統部下官軍兵快一千二百五十七員名夾攻進賢門就守把本門􅀡入陽春書院屯兵仰十一哨統兵官吉安府推官王暐即統部下官軍兵快一千餘員名夾攻順化門􅀡入南新二縣儒學屯兵仰十二哨統兵官撫州通判鄒琥知縣傅南喬即統部下官兵三千餘員名夾攻徳勝門就留兵防守本門隨於城外天寜寺屯兵承委官員務要竭忠􅁬勇擒剿叛逆以靖國難如􅂉退縮觀望違犯節制定以軍法論䖏軍兵人等敢有臨陣退縮者就仰本官遵照本院欽奉勑諭事理就於軍前斬首示衆牌􅀱事完日繳告示在城官七月十八日照得寜王造謀作亂神人共憤法所必誅在城宗支郡王儀賔皆被逼脅如鍾寜王無罪削爵建安王父子俱死軍民人等􅂉覆宗㓕族􅂉蕩家傾産􅂉勒取子女皆恨入骨髓敢怒而不敢言今日之亊豈其本心本院仰仗朝廷威靈調集兩廣并本省狼逹漢土官兵二十餘萬即日臨城亦無非因民之怨惟首惡是問告示至日宗支郡王儀賔各閉門自保啇賈買賣如故軍民棄甲投戈各歸生理無得驚疑該府内臣校尉把守人員開門出首􅂉反兵􅂇順擒斬首惡一體奏聞陞賞其有懐奸稔惡從逆不悛者必殺不赦凡我良善軍民即便去惡從善毋䧟族㓕故示示諭江西布按三司從逆官員照得寜王悖逆天道造謀作亂殺戮大臣都布按三司官員各悚於暴虐保其妻子以致臨難之際不能自擇􅂉俛首幽囚或甘心􅑙伏貪生畏死反面事􅄷春秋之義雖嚴於無将之誅而志圖興復者尚不􅃘於峻絶探得各官見今在城閉門自訟者有之臨城廵閘者有之出入府庫運籌畫䇿者有之此皆大義未分􅀌立無􅂇揆之法理固不容誅推之人情實為可憫即今本院統集狼逹漢土官軍二十餘萬後先臨城各官果能去逆歸順尚可轉禍為福故今特遣牌諭兵臨之日仰各開門出首仍一面将本院􅀤去告示給散張掛撫諭良善百姓宗支儀賔人等各閉門自保毋輕出街市橫遭殺戮該府把守内臣校尉人等亦各諭以大義俾知昔逆向順尚可免死投甲釋戈􅅾頭面縛􅀱本院臨審定奪敢有從惡不悛執迷不悞拒敵官兵者必殺無赦仍具改正縁由親齎投首以慿施行毋得遲違自取族㓕牌具依准繳來告示七門從逆軍民七月二十一日督府示諭省城七門内外軍民雜役人等除身犯黨逆不赦另議外其原被寜府迫脅偽授指揮千百户校尉䕶衞及南昌前衞一應從亂雜色人役家屬在省城者仰各安居樂業毋得逃􅇡有能􅀉聲父兄子弟改過遷善擒􅀗首惡詣軍門報捷者一體論功給賞逃囬報首者免其本罪仍仰各地方将前項人役一名名赴合該管門官䖏開報令各親屬一名毎五日一次打卯其有􅀵藏軍噐許盡數送官各宜悔過毋取流亡牌行江西二司安塟寜府宫眷照得寜王造反稱兵向闕行委偽官萬鋭等把守省城音信不通本院所行告示􅀒固不納以致討賊安民之義俱未知悉及至統兵攻城該府宫眷一聞銃砲震響閉門縊死焼焚宫空雖寜王背逆罪在不赦而朝廷惇睦之仁何所不至本院已同宗支并原任布按二司及吉安等府知府等官伍文定等親赴該府驗㸔未焚庫藏巳封號訖所㩀各宫眷身屍相應埋塟為此合行案仰布按二司即便啓知建安王選委各郡王府老成内使火者三四貟㑹同南昌府南新二縣官措置棺木以禮安􅌾毋得違錯不便手本南京内外守備追襲叛首七月二十三日本年七月二十日准欽差南京内外守備掲帖内開煩念南京根本重地宗廟陵􅆍所在作急整㸃精鋭軍兵數萬名擇将統領星夜兼程前来粘踪追襲攻擊其後保固根本重地所統官軍煩沿途經過去䖏應付􅅒給口糧馬匹草料事寜之日􅀗功官軍具奏陞賞請勿遲延等因卷查先為飛報地方謀反重情亊照得本院奉勑前徃福建地方公幹行至豐城縣闻寜府謀反遂返吉安住劄看係謀危宗社重情隨即具題并行吉安贛州等府起調官兵俟釁而􅀤及咨南京兵部并廵撫應天都御史李煩為通行在京大小衙門㑹謀集議作急繕完城守簡練舟師設伏沿江旁檄列郡先􅀤操江之兵聲義而西約㑹湖湘互為掎角本院亦砥鈍䇿駑牽躡其後以義取暴以􅀡加曲不過两月之間㫁然一鼔可縛去後續㩀本院􅀲探人役囬報寜王巳下南京留有逆黨内官驅脅官民人等一萬餘貟名固守城池虐熖昌熾阻絶徃来等因又經節催府縣兵快分布哨道親自統領刻期於七月二十日寅時􅀡抵省城進攻仍􅀍逆黨砌塞城門分兵拒固當幸官兵用命􅁬勇攻破城門各賊遂皆奔潰當即分兵擒搜及差人分投􅀲探叛首句徃的􅃀并􅀤官兵前去追襲外今准前因合用手本前去煩爲查照施行咨兩廣總督都御史楊停止調集狼兵案照本院看得前項事情係􅀦家大難存亡所關雖調各府兵快非惟武藝無素􅀹恐兵力不敷即隨備咨欽差總督右都御史楊煩為選取驍勇兵快大約三五千名就委嶺南道兵備僉事王大用監統給與各兵行糧兼程前来共勤􅀦難及行廣東布政司轉行各道并呈鎮守撫按等衙門一體查照知㑹去後節㩀知縣顧佖等報寜王已下南京留有逆黨内官驅脅官民人等一萬餘貟名固守城池阻絶徃来等情隨該本院催督所調兵快分布哨道親自統領刻期於七月二十日寅時􅀡抵省城進攻仍􅀍逆黨砌塞城門分兵固拒當幸官兵用命􅁬勇攻破城門各賊遂皆奔潰隨即分兵搜擒外今照前項事情見該欽命京邉官軍二十餘萬前来㑹剿及本院見統官兵五萬餘員名俱在江西省城即今分遣委官監督前去約㑹併􅀔追襲所㩀原調廣東土漢狼兵人等未審曽否齊集但今南贛吉安南昌等䖏沿江人民俱各畏懼狼兵悉皆驚惶及又訪得狼逹土兵曽受寧王􅂍物􅀻許􅂇謀効力今調各兵本以為國除害惟恐返為民害不無有悞大事擬合停止為此合行移咨貴院煩為查照希􅀅起調兵快停留本省應用施行牌行撫州知府陳槐等􅀵復南康九江七月二十四日照得寜王謀反興兵向闕南康九江見􅀍攻破分留逆黨㩀守二府城池意圖西扼湖兵之應援南遏我師之追躡仰賴宗社威靈克復省城除遣知府伍文定等分布哨道邀擊寜賊務在得􅀗外所㩀逆黨占㩀府縣應合分兵勦復為此牌仰知府陳槐等各選精兵身自統領星夜前去南康九江地方相機行事務要攻復城池平靖反側仍􅀅地方人民加意賑恤激以忠義撫以寛仁權舉有司之職以理庶事查䖏倉庫之積以足軍資一靣分兵邀誘寕賊毋令東下并差人􅆶探飛報軍門各官務要同心併力恊和行事毋得人懐一心彼此参錯致誤事機兵快人等敢有違犯節制者仰照本院欽奉勑諭事理以軍法從事一應事機呈禀徃復慮有稽緩俱聼一靣從宜區畫一靣呈報軍門仍備查各官棄城迯走致賊焚掠屠戮之故具由申報以憑􅂙挐究治犒賞福建官軍㩀福建按察司整飭兵備兼管分廵漳南道僉事周期雍呈稱依奉本院案驗起取上杭等䖏軍兵共五千餘名分委指揮劉欽知縣邢暄等及起取漳州府海滄打手三千餘名行委通判李一寕等管領本道躬親統督先後啓行前来等因到院案照先為飛報地方謀反重情事看係國家大難存亡所関随即備咨南京兵部及廵撫兩廣湖廣等衙門并福建三司等官選取驍勇兵快選委謀勇官員監統兼程前来共勤國難去後今據前因㸔得逆賊已經成擒餘黨悉漸殄滅除将各該官兵先行􅀤回外切照福建漳南相距江西省城約計程途有一千七八百里之遥該道乃􅀎不满旬月調集官軍兵快八千員名之衆首先各省而至足見本官勇畧多謀預備有素忠義之誠足以感激人心敏捷之才足以綜理庶務故一呼而集兼程赴難除另行旌奨外及照調来官兵衝冒炎暑逺赴國難忠義既有可嘉勞苦􅀹為足憫合加犒賞以勵将来為此除将支出官銀差官領齎該道仰抄案回司即将原調領兵官員并軍兵郷夫人等酌量犒賞用見本院奨勞之心以為将来忠勤之􅂆仍仰該道備查各兵原係操練者照舊在班操練以備􅂃急調用􅄈募者省令回還田里各安生業務為良善之民共嚮太平之福毋得分外為非致招身家之累備行廵按衙門知㑹釋放投首牌㩀呉國七林十一等口稱閔念四等落水身死今訪得閔念四等見在寜州界上告要投招前者巳曾􅀤有告示許令脅従新民俱准投首免死給照復業生理近日朝廷􅑙有黃榜亦准投首免死今闻各地方居民不體朝廷及本院好生之意輙便起兵勦殺激使不敢出身投首反使朝廷及本院失信於人本當綁拿重究姑且再行誡諭為此牌仰寜州知州汪憲探訪前項一起投首之人是否閔念四等正身若果有投首真情即便􅅁領前赴軍門􅀤落准與楊子橋等一例釋放給與執照各自復業當差如或聚衆不散星夜飛報軍門以憑􅀤軍勦㓕俱毋違錯牌仰沿途各府州縣衛所驛逓廵司衙門慰諭軍民照得先因寜王謀反請兵征剿續該本院親督各哨於七月二十日攻復省城二十四等日在鄱陽湖連日與賊大戰至二十六日遂将寜王俘執及其謀黨李士實等賊首林十一等俱巳前後擒􅀗餘黨蕩平地方稍靖巳於本月三十日具本奏㨗訖近因傳報京軍復来愚民妄相迯􅇡徃徃溺水自縊本院親行撫諭尚未􅀎息殊不知朝廷出兵專為誅剿寕賊救民水火之中况統兵將帥皆係素有威望老臣宿将紀律嚴明逺近素所稱服縱使復来亦必自無擾害况今寕賊已擒地方巳靖京軍豈有無事逺渉之理愚民無知轉相驚惑深為可憫誠恐沿途一􅅁居民亦多聼信傳聞不實之言而北来京軍尚或未知寜王已就擒􅀗合行差官沿途暁諭軍民及一靣迎候北来官兵煩請就彼囬轉除将寕王反逆黨與本院親自量􅅁官兵徑從水路觧赴京師外仰沿途軍衛有司驛逓等衙門照牌事理即行抄牌備出告示暁諭逺近鄉村軍民人等使知寕賊巳擒京軍巳轉免致驚疑釀成他變差去官員仍仰程程䕶送同與迎候京軍堅請就彼囬轉以免沿途百姓供給之苦仍諭以本院押觧賊犯量帯官兵皆自備行糧􅅒給沿途經過有司等衙門止備人夫牽拽船􅃗及畧供柴草給付各兵焼用其他一無所擾不得因此科害里甲軍民差去官員晝夜前進毋得在途遲滯抄牌官吏各俱依准􅀱本院經過日繳案行江西按察司停止獻俘呈㩀江西按察司呈奉欽差提督軍務御馬監太監張劄付内開㑹同欽差提督軍務平賊将軍充總兵官左都督朱得止兵息民不為無見但照奔潰黨惡見該各屬日報嘯聚流刼亦非已靖黨惡閔念四等又係職等行文之後拿􅀗之數亦或尚多撫按守臣當此新亂之餘正宜留心撫綏地方聼􅀱勘明觧京良由不知前因固執一見輙要自行􅀗觧􅀻請回師再照妃媵係宗藩眷屬外官押觧恐有妨礙設或越分擅為咎歸何人職等體念民力不堪供給軍餉責令将官将所領官兵分布各府住劄聼掣當職止􅅁合用􅂙隨執打旗號等項人員徑趨江西公同廵撫等官查驗巢穴及遍給告示暁諭撫安地方一靣具請定示另行除差委錦衣衛都指揮僉事馬驥前来外劄仰本司各該官吏照依劄付内事理即便遵照鈞帖内事理備行廵撫都御史王等将已􅀗賊犯留彼聼􅀱明㫖欽遵施行等因備呈到院卷查先為飛報地方謀反重情事云云本職将寧王并其逆黨親自量􅅁官兵徑赴水路照依原擬日期啓行觧赴京師已至廣信地方今准前因為照前項逆黨俱已擒􅀗其餘脅從遵照欽􅑙黄榜事例俱已許令投首觧散宗藩眷屬俱係取到各将軍府内使管伴監守保無他嫌今欽差提督賛畫機宻軍務御用監太監張及欽差提督軍務御馬監太監張欽差提督軍務平賊將軍充領兵官左都督朱憂國愛民之心素聞逺近况號令嚴明秋毫無犯今来體勘逆賊巢穴果已破平百姓貧困顛連必能大加撫諭安輯以仰布朝廷懐惠小民之仁本職縱使復回省城亦安能少効一籌不過牲返道途違誤奏過程期有損無益為此仰抄案回司着落當該官吏照依案驗内事理即便備呈前去煩請徑自查照施行咨兵部查驗文移照得本職巳将寜王宸濠并其黨與及宫眷人等照依原擬具奏日期起程親自觧赴闕下間隨㩀南康府申并江西按察司呈各奉欽差提督軍務御馬監太監張劄付内開訪得宸濠巳該本職擒􅀗克復省城等語未曾親到江西又無堪信文移止是見人傳􅀃􅃍難憑㩀况係宗藩人衆中間恐有撥置同謀逆黨未盡等因及節准欽差提督賛畫機宻軍務御用監太監張揭帖開稱将各犯委的當人員用心防守調攝飲食獻俘闕下㑹官封記庫藏俱􅀱按臨地方區畫等因又准欽差提督軍務充總兵官安􅁁伯朱手本開稱即查節次共擒斬叛賊級若干内各䖏原奏報有名若干無名若干有名未􅀗漏網并自首及得􅀗馬騾器械等項各若干連􅀗官軍衞所職役姓名備查明白俱各存留江西省城聼􅀱審驗仍查餘黨有無奔潰及曾否殄㓕盡絶縁由通行開報以慿回報等因各到職為照宸濠并其同謀黨與俱已擒􅀗餘孽亦就誅戮雖有脇從數亦不多皆非得巳隨即遵奉欽􅑙黄榜暁諭俱赴所在官司投首觧散其庫藏等項該本職㑹同多官於未准掲帖之先眼同封貯在官聼􅀱命下定奪官軍兵快擒斬功次見該原經奏留兩廣監察御史謝源伍希儒查造奏繳及照宸濠并各重犯宫眷人等見觧廣信地方設若徃返恐致踈虞及違悞本職奏報原擬日期除照舊督觧前赴闕下獻俘以昭聖武及具掲帖各另回覆外今照前因照得本職繆當軍旅重寄地方安危所關三軍死生攸係一應事機若非奉有御寳勑㫖及兵部印信咨文安敢輕易慿信今前頃各官文移旣非祖宗舊章成憲就使果皆出於上意亦湏貴部行有知㑹公文萬一奸人假托各官名目乗間作弊致有不測變亂本職雖死亦何所及除奉欽差總督軍務威武大将軍總兵官後軍都督府太師鎮􅀦公朱鈞帖曾奉朝㫖相應遵奉其餘悉遵舊章施行外縁前項各官文移未委虚的俱合備行咨報貴部為此備抄掲帖粘連咨請查驗施行案行浙江按察司交割逆犯暫留養病十月初九日照得當職先因患病具本乞休間奉􅃙扶病前徃福建公幹六月十五日行至江西豐城地方適遇寧王興兵作亂看係君父大難義不􅃘去復回吉安府督同知府伍文定等起調兵夫招集義勇扶病親行統領於七月二十日攻復省城本月二十四五六等日於鄱陽湖連日大戰擒􅀗寜王宸濠及逆黨李士實劉飬正王春等賊首呉十三凌十一閔念四呉國七閔念八等先後具本奏報外隨聞大駕南征禮當觧赴軍門又因宸濠連日不食慮恐物故無以獻俘奏凱彰朝廷討賊之義兼之合省内外人情洶洶或生他變當具本題知於九月十一日啓行将宸濠及逆黨宫眷觧赴軍門當職力疾沿途醫藥親行押觧行至廣信地方又奉欽差總督軍務鈞帖備仰照依制諭内事理即便轉行所屬司府衞所州縣驛逓等衙門欽遵施行等因遵依通行間續准欽差提督軍務御馬太監張照㑹及准欽差總督軍務充總兵官安􅁁伯朱手本各遣官邀回本職并将所觧宸濠等逆犯回省聼􅀱㑹審本職看得既奉總督軍門鈞帖自合觧赴面受節制若復退還省城坐待駕臨恐渉遲謾且誤奏過程期又復扶病日夜前進行至浙江杭州府地方前病愈加沉重不能支持請醫調治間適遇欽差提督賛畫機宻軍務御用監太監張奉命前来江西體勘宸濠等反逆事情及查理庫藏宫眷等事當准鈞帖開稱宸濠等待親臨地方覆審明白具奉軍門定奪等因爲照本職先因父老祖䘮累䟽乞休未䝉俞允隨扶病赴閩意圖了事即從彼地冐罪迯歸旬日之前亦已具奏不意行至中途遭值寜王反叛此係國家大變臣子之義不容舎之而去又闔省廵撫地方等官無一人見在天下事機間不容髪故復􅃘死暫留爲牽制攻討之圖候命師既至地方稍靖即從初心死無所避臣區區報􅀦血誠上通於天不辭㓕宗之禍不避形迹之嫌冒非其任以勤國難亦望朝廷鑒臣此心不以法例繩縛使得少申烏鳥之􅀻等情具奏外今照前事本職自度病勢日重猝未易愈前進既有不能退回愈有不可若再遅延必成兩誤除本職暫留當地請醫調治俟稍痊可一靣仍回省城或仍前進沿途迎駕一靣具本乞恩養病另行外所㩀原觧逆犯合就查明交割􅅁回省城聼候駕臨審䖏通行為此仰抄案回司着落官吏備呈欽差提督軍務賛畫機宻軍務御用監太監張煩請㑹同監軍御史公同當省都布按三司等官将見觧逆首宸濠及逆黨劉吉等各犯并宫眷馬匹等項逐一交查明白仍請經自另委相應官貟兵快人等管押帯回省城從宜審䖏施行仍備呈兵部查照知㑹抄案依准并行過日期先行呈来告諭軍民十二月十五日告諭軍民人等爾等困苦已極本院才短知窮坐視而不能救徒含羞􅀒愧言之實切痛心今京邉官軍驅馳道路萬里逺来皆無非為朝廷之事抛父母棄妻子􅀍風霜冐寒署顛頓道路經年不得一顧其家其為疾苦殆有不􅃘言者豈其心之樂居於此㢤况南方卑濕之地􅀹非北人所宜今春氣漸動瘴疫将興乆客思歸情懐益有不堪爾等居民念自己不得安寧之苦即湏念諸官軍乆離鄉土抛棄家室之苦務敦主客之情勿懐怨恨之意亮事寧之後凡遭兵困之民朝廷必有優恤今軍馬塞城有司供應日不暇給一應爭闘等項詞訟俱宜含􅃘止息勿輙告擾各安受爾命寧柰爾心本院心有餘而力不足聊布此苦切之情於爾百姓其各體悉無怨欽奉詔書寛宥脅從節該伏覩詔書朕親統六師正名討罪除首惡宸濠并同謀有名逆賊不赦外其餘脅從之徒盡行寛宥釋放欽此欽遵照得先因寧府作亂該本院出給告示官兵臨城之日惟首惡是問宗支郡王儀賔人等各閉門自保商賈買賣如故軍民棄甲投戈各歸生理毋得驚疑其有懐奸稔惡不悛者必殺無赦脅從人等但能赴官投首即與釋放免罪等情已經􅀤仰逺近張掛暁諭外後宸濠既擒被脅之徒前後赴官投首不下千餘皆經查審釋放其間尚有􅁒赴首官司多被地方攔阻本院隨又督觧逆犯出外以是一向遲疑未即出投續該欽差提督軍務各衙門臨省前項被脅之人始各赴官投首就與本院事體一同即是去惡從善之民近訪得有等無籍之徒用言扇惑乗機詐害致使驚疑未安生理除訪挐究問外仰按察司抄捧回司即便大書出給告示􅀤仰人煙輳集去䖏常川張掛暁諭自破城以後但有􅀍脅旗校軍民人等改惡遷善已經赴官投首驗有執照者皆係良善俱仰遵照前項詔書内事理盡行寛宥釋放各安生理毋得信人恐嚇自生猜疑地方里鄰總甲人等敢有懐挾􅀻讐羅織擾害誑言扇惑詐騙財物者仰即赴院告理以慿拏問􅀤遣仍取各首到官姓名并給過告示曉諭縁由呈報批追徴錢糧呈㩀江西布政司呈看得江西一省重遭大患民困已極屢經奏免糧稅日乆未奉明㫖近因南科奏停隨復部使催督一以為蠲免一以為追徴非惟下民無所遵守亦且官府難於施行今該司議謂兌淮起運係京儲額數而王府禄米亦􅀊月難缺要行所屬先納兌淮次及京庫折銀次及南京倉米次及王府禄米其餘俱候明降等因此亦深覩民患􅁒濟不能委曲調停計出無柰仰司即如所議備行各該府州縣查照施行後有恩㫖當亦止免十五年以後錢糧其十四年以前拖欠必湏􅅁徴終有不免莫若速了為便各府州縣宜以此意備暁下民姑􅃘割肉之痛以救燃眉之急嗚呼目擊貧民之疾苦而不能救坐視徴求之急迫而不能止徒切痛楚之懐曾無拯援之術傷心􅃤目汗背赧顔此皆本院之罪其亦将誰歸咎各府州縣官務體此意雖在催科恒存撫字仍備出告示使各知悉此繳再批追徴錢糧呈㩀江西布政司呈看得本省十四年以前一應錢糧已經給事等官奉奏明㫖果係小民拖欠俱准暫且停徴還着各該官司設法賑濟毋視虚文此朝􅋝之深仁厚徳憫念窮民誠愛惻怛之所􅀤小民莫不歡欣鼓舞臣子所當遵守奉行乃今停徴之令甫下而催併之檄復行賑濟之仁未布而箠橽之苦巳加法令如此有司何以奉行下民何所取信夫爲人臣者上有益於國下有益於民雖死亦􅅴爲之今日所行上使朝廷失信於民下使百姓歸怨於上重貧民之困益地方之災縱使錢糧果可立辦􅃘心害理亦不能爲况旬月之間而􅁒追併了絶就使神輸鬼運亦於事􅀔不能徒使歛怨殃民何益於事除本院身爲廵撫不能爲國爲民自行住俸待罪外仰布政司行各該府縣官以理勸化小民且諭以今日之舉非關朝廷失信實由京儲缺乏司國計者􅀔不得已興起其忠君親上之心勉令漸次刻期完納果克濟事兩月之後亦未爲遲其各該官員本非其罪不必住俸革去冠􅅁行令照舊盡心職業勿因亊變之難有􅁅愛民之志後有違慢之戮本院自當其罪仍呈提督漕運行督糧官及廵按衙門知㑹此繳批南昌府追徴錢糧呈㩀南昌府所申凋弊徴求之苦本院繆當斯任實切憂慚部堂諸公非無恤民之念但身司國計不得不以空乏為虞在外有司非無國計之憂但目擊民痍不能不以撫恤為重若使平民尚堪朘削一時􅃘痛并徴以輸國用豈非臣子之心但恐徒爾虐民無濟國事非徒無濟兼恐生虞斟酌調停事在善䖏仰布政司㑹同二司各官将該府所申事理即加酌議或先徴新糧将舊糧减半􅅁徵或儘其力量可及分作㡬限令民依期逐漸辦納但可通融調攝皆湏悉心議䖏務使窮民不致重傷而國用終亦無損一靣備行各該府縣查照施行一靣具由呈来以慿咨奏此繳褒崇陸氏子孫正徳十五年正月㩀撫州府金谿縣三十六都儒籍陸時慶告㸔得宋儒陸象山先生兄弟得孔孟之正傳爲吾道之宗派學術乆晦致使湮而未顯廟堂尚缺配享之典子孫未沾褒崇之澤仰該縣官吏将陸氏嫡派子孫差役查照各䖏聖賢子孫事例俱與優免其間有聰明俊秀堪以入學者具名送提學官䖏選送學肄業務加崇重之義以扶正學之哀具依准繳告諭安義等縣漁户告諭安義縣等漁户及逺近軍民人等地方不幸近遭大變加以師旅征輸人民困苦已極府官思􅁒休養賑恤而無其由近聞漁户人等曾􅀍寕王驅脅者慮恐官府追論舊惡心不自安徃徃廢棄生業詢其所以皆由讐家煽動意在激使為惡因而䧟之死地以快其憤不知朝廷巳屢有搒文凡被寜賊驅脅者一槩釋而不問况訪得安義等䖏漁户各係詩禮大家素敦良善雖或間有染於非僻及為王府所脅誘者然鄉里逺近自有公論善惡終不可混近㩀通判林寛禀稱各戸痛懲旣徃巳将漁船折缷似此誠心改行亦復何所憂懼為此特仰南康府通判林寛将本院告諭眞寫翻刋親齎各戸逐一頒諭務使舎舊圖新各安生理不得輕信人言妄有疑猜自求罪累其素敦詩禮良善者愈加勸勉務益興行禮讓講信修睦以為改惡從善者之倡族黨之中果有長惡不悛不聼勸諭者衆共拘執送官明正典刑以安善􅀋毋容稂莠致害嘉禾若舊雖為􅂋惡今能誠心改化者亦不得懷記舊讐搜求羅織激使為非事􅀤究竟責有所歸嗚呼吾民同胞不幸䧟於罪戮側然尚不􅃘見豈有追尋舊惡必􅁒置之死地之理本院舊在南贛曾行十家牌式軍民頗安盗賊頗息除各該地方行分廵分守官編置外前項漁戸人等就仰通判林寛照式逐一編置務在着實舉行以收成効特兹告諭各宜知悉批按察使伍文定患病呈㩀江西按察司呈㸔得按察使伍文定茂著戎功新膺憲命當其衆難交攻尚以一身獨任偶兹㣲恙豈妨供職諒本官自切百姓瘡痍之憂豈遑一身痛痒之顧仰該司即行本官照舊管事果有疾患一靣調理毋得再呈辭致曠職業繳批臨江府􅂄民建立生祠呈㩀臨江府清江縣耆民董惟謙等呈立知府戴徳孺生祠㸔得知府戴徳孺素堅清白之守乆著循良之政今其去任而郡民建祠報徳此亦可見天理之在人心自不容巳仰該府縣官俯順民情量行撥人㸔守非徒激勵後人俾有所興且以成就民徳使歸於厚繳批吉安府救荒申㩀吉安府申備廬陵縣申㸔得所申要将陳腐倉榖賑給貧民此本有司之事當兹灾患正宜舉行但誠於愛民者不徒虚文之舉忠於謀國者必有深長之思故目前之灾雖所宜恤而日後之患尤所當防以今事􅀔而觀後患决有難測近㩀崇仁縣知縣祝鰲申要将預備倉榖㐫荒之時則倍數借給以濟貧民􅀵成之日則减半還官以實儲蓄頗有官民兩便已經本院批准照議施行㸔得各縣事體不甚相逺此議或可通行仰布政司再加裁酌議䖏施行各屬遇灾地方凡積有稻榖者俱查照此議而行仍仰各該掌印官務要身親給散使貧民得實惠之沾官府無虚出之􅁦乃可其一應科派物料等項當兹兵亂之餘加以水灾民不聊生豈堪追併仰布政司酌量緩急分别重輕畧定徴􅀵先後之次備行各屬以漸而行庶㡬用一緩二之意少免醫瘡剜肉之苦通仰該司定議施行回報批撫州府同知汪嵩乞休呈㩀撫州府同知汪嵩呈㸔得同知汪嵩乆存恬退遇難復留以盡報國之忠仍堅歸田之請出䖏得宜誠可嘉尚但本官政素􅀗民年未甚老已經勉留照舊供職而本官稱疾愈篤求退益懇仰府再行查㸔如果病􅀔難留准令就彼致仕該府以禮起送還鄉仍備行原籍官司􅀊時以禮優待務奬恬退以勵鄙薄此繳批提學僉事邵銳乞休呈㩀江西按察司呈㸔得提學僉事邵銳求歸誠切堅守考槃之操而按察使伍文定挽留懇至曲盡緇衣之情是亦人各有志可謂兩盡其羙然求歸者雖亦明哲保身使皆㓗身而去則君臣之義或㡬乎息挽留者雖以為國惜賢使皆􅌤顔在位則髙尚之風亦日以㣲况本院自􅁒求退而未能安可沮人之求退仰該司備行本官再加酌量於去就之間務求盡合於天理之至必􅁒全身逺害則掛冠東門亦遂聼行所志若猶眷顧宗國末􅃘割情獨徃且可見危受命同舟共艱稍湏弘濟􅁍遂初心則臨難之義既無苟免於搶攘之日而恬退之節自可求伸於事定之餘興言及此中心愴切禮取副提舉舒芬牌照得當職奉命提督軍務兼理廵撫深慮才㣲責重無以仰稱任使合求賢能以資賛翼訪得福建市舶提舉司副提舉舒芬志行髙古學問深醇􅀡道不能趨時長才足以濟用合就延引以匡不及為此牌仰福建布政司官吏即行泉州府措辦羊酒禮幣賫送本官用見本院優禮之意仍照例起關應付前赴軍門以慿諮訪本官職任就委别官暫替南贛鄉約咨爾民昔人有言􅅾生蔴中不扶而􅀡白沙在泥不染而黒民俗之善惡豈不由於積習使然㢤徃者新民盖常棄其宗族畔其鄉里四出而爲暴豈獨其性之異其人之罪㢤亦由我有司治之無道敎之無方爾父老子弟所以訓誨戒􅅚於家庭者不早薰陶漸染於里閈者無素誘掖奬勸之不行連屬叶和之無具又或憤怨相激狡偽相殘故遂使之靡然日流於惡則我有司與爾父老子弟皆宜分受其責嗚呼徃者不可及来者猶可追故今特為鄉約以恊和爾民自今凡爾同約之民皆宜孝爾父母敬爾兄長教訓爾子孫和順爾鄉里死䘮相􅂇患難相恤善相勸勉惡相告戒息訟罷爭講信修睦務為良善之民共成仁厚之俗嗚呼人雖至愚責人則明雖有聰明責已則昏爾等父老子弟毋念新民之舊惡而不與其善彼一念而善即善人矣毋自恃為良民而不修其身爾一念而惡即惡人矣人之善惡由於一念之間爾等愼思吾言毋忽一同約中推年髙有徳為衆所敬服者一人為約長二人為約副又推公直果㫁者四人為約正通逹明察者四人為約史精徤廉幹者四人為知約禮儀習熟者二人為約賛置文簿三扇其一扇備寫同約姓名及日逐岀入所為知約司之其二扇一書彰善一書糾過約長司之一同約之人毎一㑹人出銀三分送知約具飲食毋大奢取免饑渴而巳一㑹期以月之望若有疾病事故不及赴者許先期遣人告知約無故不赴者以過惡書仍罰銀一兩公用一立約所於道里均平之䖏擇寺觀寛大者為之一彰善者其辭顯而决紏過者其辭隠而婉亦忠厚之道也如有人不弟毋􅀡曰不弟但云聞某於事兄敬長之禮頗有未盡某未敢以為信姑書之以俟凡紏過惡皆例此若有難改之惡且勿紏使無所容或激而遂肆其惡矣約長副等湏先期隂與之言使當自首衆共誘掖奬勸之以興其善念姑使書之使其可改若不能改然後紏而書之又不能改然後白之官又不能改同約之人執送之官明正其罪􅀔不能執戮力恊謀官府請兵㓕之一通約之人凡有危疑難䖏之亊皆湏約長㑹同約之人與之裁䖏區畫必當於理濟於亊而後已不得坐視推託䧟人於惡罪坐約長約正諸人一􅀉庄人户多於納糧當差之時躱回原籍徃徃􅀒累同甲今後約長等􅂆令及期完納應承如蹈前􅁦告官懲治削去􅀉庄一本地大戸異境客啇放債􅀵息合依常例毋得磊􅄸或有貧難不能償者亦宜以理量寛有等不仁之徒輙便捉鎻磊取挾寫田地致令窮民無告去而為之盗今後有此告諸約長等與之明白償不及數者勸令寛捨取巳過數者力與追還如或恃強不聼率同約之人鳴之官司一親族鄉鄰徃徃有因小忿投賊復讐殘害良善釀成大患今後一應闘毆不平之事鳴之約長等公論是非或約長聞之即與暁諭觧釋敢有仍前妄為者率諸同約呈官誅殄一軍民人等若有陽為良善隂通賊情販買牛馬走傳消息歸利一己殃及萬民者約長等率同約諸人指實勸戒不悛呈官究治一吏書義民總甲里老百長􅃓兵機快人等若攬差下鄉索求賫􅀤者約長率同呈官追究一各寨居民昔􅀍新民之害誠不􅃘言但今既許其自新所占田産巳令退還毋得再懐前讐致擾地方約長等常宜暁諭令各守本分有不聼者呈官治罪一投招新民因爾一念之善貸爾之罪當痛自克責改過自新勤耕勤織平買平賣思同良民無以前目名目􅅴心下流自取㓕絶約長等各宜時時提撕暁諭如踵前非者呈官懲治一男女長成各宜及時嫁娶徃徃女家責聘禮不充男家責嫁装不豐遂致愆期約長等其各省諭諸人自今其稱家之有無隨時婚嫁一父母䘮􅁙衣衾棺槨但盡誠孝稱家有無而行此外或大作佛事或盛設宴樂傾家費財俱於死者無益約長等其各省諭約内之人一遵禮制有仍蹈前非者即與紏惡簿内書以不孝一當㑹前一日知約預於約所灑掃張具於堂設告諭牌及香案南向當㑹日同約畢至約賛鳴皷三衆皆詣香案前序立北靣跪聼約正讀告諭畢約長合衆􅀭言曰自今以後凡我同約之人祗奉戒諭齊心合徳同歸於善若有二三其心陽善隂惡者神明誅殛衆皆曰若有二三其心陽善隂惡者神明誅殛皆再拜興以次出㑹所分東西立約正讀鄉約畢大聲曰凡我同盟務遵鄉約衆皆曰是乃東西交拜興各以次就位少者各酌酒於長者三行知約起設彰善位於堂上南向置筆硯陳彰善簿約賛鳴皷三衆皆起約賛唱請舉善衆曰是在約史約史出就彰善位􅀭言曰某有某善某能改某過請書之以為同約勸約正遍質於衆曰知何衆曰約史舉甚當約正乃揖善者進彰善位東西立約史復謂衆曰某所舉止是請各舉所知衆有所知即舉無則曰約史所舉是矣約長副正皆出就彰善位約史書簿畢約長舉杯揚言曰某能為某善某能改某過是能修其身也某能使某族人為某善改某過是能齊其家也使人人若此風俗焉有不厚凡我同約當取以為法遂屬於其善者善者亦酌酒酬約長曰此豈足為善乃勞長者過奨某誠惶怍敢不益加砥礪期無􅀒長者之教皆飲畢再拜謝約長約長答拜興各就位知約撤彰善之席酒復三行知約起設紏過位於堦下北向置筆硯陳紏過簿約賛鳴皷三衆皆起約賛唱請紏過衆曰是在約史約史就紏過位揚言曰聞某有某過未敢以為然姑書之以俟後圖如何約正遍質於衆曰如何衆皆曰約史必有見約正乃揖過者出就紏過位北向立約史復遍謂衆曰某所聞止是請各言所聞衆有所聞即言無則曰約史所聞是矣於是約長副正皆出紏過位東西立約史書簿畢約長謂過者曰雖然姑無行罰惟速改過者跪請曰某敢不服罪自起酌酒跪而飲曰敢不速改重為長者憂約正副史皆曰某等不能早勸諭使子䧟於此亦安得無罪皆酌自罰過者復跪而請曰某既知罪長者又自以為罰某敢不即就戮若許其得以自改則請長者無飲某之幸也趍後酌酒自罰約正副咸曰子能勇於受責如此是能遷於善也某等亦可免於罪矣乃釋爵過者再拜約長揖之興各就位知約撤紏過席酒復二行遂飯飯畢約賛起鳴鼓三唱申戒衆起約正中堂立􅀭言曰嗚呼凡我同約之人明聼申戒人孰無善亦孰無惡為善雖人不知積之既乆自然善積而不可掩為惡若不知改積之既乆必至惡極而不可赦今有善而為人所彰固可喜苟遂以為善而自恃将日入於惡矣有惡而為人所紏固可愧苟能悔其惡而自改将日進於善矣然則今日之善者未可自恃以為善而今日之惡者亦豈遂終於惡㢤凡我同約之人盍共勉之衆皆曰敢不勉乃出席以次東西序立交拜興遂退旌奬節婦牌訪得吉水縣民人陳文􅁇妻黄氏廬陵縣生貟胡兖妻曾氏俱各少年守制節操堅厲逺近傳􅀭士夫稱嘆當兹風俗頽靡之時合行旌奬以勵澆薄為此仰府官支即行吉水廬陵二縣掌印官支給無礙官錢買辦禮儀前去各家盛集鄉鄰老㓜之人宣􅀭本婦志節之羙務使姻族知所崇重里巷知所表式用奬貞節以激偷鄙仍備述各婦節操志行始末及将奨勵過縁由同依准隨牌繳報以憑施行興舉社學牌㸔得贛州社學鄉舘敎讀賢否尚多淆雜是以詩禮之教乆已施行而淳厚之俗未見興起為此牌仰嶺北道督同府縣官吏即将各舘敎讀通行訪擇務學述明正行止端方者乃與兹選官府仍籍記姓名量行支給薪米以資勤苦優其禮待以示崇勸以各童生之家亦各通行戒􅅚務在隆師重道教訓子弟毋得因仍舊染習爲偷薄自取愆咎頒定里甲雜辦㩀龍南縣申稱先年里甲使用俱係丁糧分派照日應當以致多寡不均要将正徳十六年里甲通行查審除逃絶人丁外将一年使用春秋􅀕祀軍需􅀊報使客夫馬等項俱於丁糧議䖏毎石出銀若干陸續稱收貯庫推舉老人公同里長使用註簿儻有餘剰照多寡給還等因到院簿查先該贛州府知府盛茂同知夏克義議過贛縣里長額辦雜辦已經批仰嶺北道再加酌議續㩀副使王度呈稱查􅄸本縣額辦使用該銀三千七百三十一两七分二􅁵四毫九絲原轄里長一百一十里内除十里迯絶止有一百里十六年分毎糧一石􅄸一分人丁二丁算一分一年丁糧共該一千一百二十六分半毎分該出銀三兩三錢一分二􅁵一毫一絲一忽合行該縣印鈐收銀文簿一扇将各都該辦銀兩分為二次查追貯庫又置文簿二扇一寫本縣支出數目一􅀤支用人役註附毎月選有行止老人二名公同􅀡日里長赴縣支領毎月備具用過揭帖二本一送都察院一分廵道一本府各不時稽察年終羡餘並聼上司查䖏以􅀘無名徴需府縣不得擅支仍将各里該納分數刷印告諭遍張鄉村曉諭如有官吏額外科派及收銀人役多取火耗秤頭并里甲恃頑不辦許各呈告以慿拏問呈乞照詳又經批仰照議即行該縣永永查照仍備刻告示遍行曉諭及多行刷印頒給各里􅀵照以防後奸今申前因㸔與本院新定則例相同及照寜都等九縣及南安所屬大􅁃等縣事體民情當不相逺合就通行查編為此仰抄案回道即便速行各縣俱查本院近定規則各照丁糧多寡派編銀兩追􅀵貯庫選委行止端實老人公同該日里長支用置簿稽察刋榜暁諭禁約事宜悉照原議施行敢有違犯者就便拏問呈詳通取各縣派定過縁由􅀋報查考批江西布政司設縣呈㩀江西布政司呈将新淦縣知縣田􅀖傑建言設縣縁由㸔得近来各䖏設縣皆因窮山絶谷盗賊盤㩀人迹罕通聲教不及不得已而爲權宜之計若腹􅂻平衍四通五逹之區止宜减并不貴増添盖增一縣即增一縣之事官吏供給學校倉庫囹獄差徭一應煩費未易悉舉且又有彼此推避之奸互相牽制之患計其爲利不償所害古人謂省吏不如省官省官不如省事凡今作事貴在謀始仰布政司再行㑹同二司各官從長計議設縣之外果無别䇿可以致理具議呈奪繳議䖏官吏􅅒俸照得近来所屬各州縣衞所倉塲等衙門大小官吏以􅂍問革者相望而冒犯接踵究詢其由皆云家口衆多日給不足俸資所限本以凉薄而近例减削又復日甚加有上下接應之費出入供送之繁窮窘困迫計出無聊中間亦有􅅴貧食苦刻勵自守者徃徃狼狽藍縷至於任满職革債􅀒纒結不得去歸其鄉夫貪墨不才法律誠所難貸而其情亦可矜憫夫忠信重禄所以勸士在昔任人既富方榖庶民在官禄足代耕此古今之通義也朝廷賦禄百司厚薄既有等級要皆使各􅁉其資養免其内顧然後可望以盡心職業責以亷耻節義今定制所限既不可得而擅增至於例所應得又從而裁削之使之仰事俯育且不能遂是䧟之於必貪之地而責之以必亷之守中人之資将有不能而况其下者之衆乎所㩀前項事理非獨人情有所未堪其於政體亦有所損合行㑹議查䖏叅酌事理輕重及查在外官貟自二品至九品并雜職吏胥等俸米除本色外其折色原例毎石作銀若干於何年月裁减作銀若干應否復舊或量行加增務要議䖏停當呈来定奪施行咨六部伸理冀元亨照得湖廣常徳府武陵縣舉人冀元亨忠信之行孚於逺邇孝友之徳化於鄉閭本職徃年謪官貴州本生曾從講學近来南贛延之教子時因寜藩宸濠潜謀不􅁤虐熖日張本職封􅆠連屬􅁒為曲突徙薪之舉則既無其由将為􅀤奸摘伏之圖則又無其實偶值宸濠飾詐要名禮賢求學本職因使本生乗機徃見宸濠冀得因事納規開陳大義沮其邪謀如其不可勸喻亦因得以審察動静知其叛逆遲速之機庶可宻為禦備本生旣與相見議論大相矛盾宸濠以本職所遣一時雖亦含􅃘遣􅀤而毒怒不已隂使惡黨四出訪緝􅁒加䧟害本生素性愿恪初不之知而本職風聞其說當遣宻從間道潜回常徳以避其禍後宸濠既敗痛恨本職起兵攻剿雖反噬之心無所不至而天理公道所在無因得遂其奸乃以本生係本職素所愛厚之人輙肆詆誣謂與同謀将以泄其讐憤且本生既與同謀則宸濠舉叛之日本生何故不與共事􅁍乃反回常徳聚徒講學宸濠素所同謀之人如李士實劉飬正王春之流宸濠曾不一及而獨口稱本生與之造始此其挾讐妄指盖有不待辦說行道之人皆能知者但當亊之人不加詳察輙爾聼信遂䧟本生一至於此本生篤事師之義懐報􅀦之忠蹈不測之虎口将以轉化㐫惡潜消奸宄論心原迹尤當顯䝉賞錄乃今身䧟俘囚妻子奴虜家業蕩盡宗族遭殃信奸人之口爲叛賊泄憤報讐此本職之所爲痛心刻骨日夜􅁈憤而不能自己者也本職義當與之同死㡬􅁒爲之具奏伸理而本生雖在拘囚傳聞不一或以爲既釋或以爲􅀱㫖兼慮當事之人或不見諒反致激成其罪故復隱􅃘到今又恐多事紛紜之日萬一玉石不分竟使忠邪倒置徒以沮義士之志而快叛賊之心則本職後雖􅁇之以死将亦無以贖其痛恨為此合行具咨貴部煩請咨詢鍳察特賜扶持分辯施行奬勵主簿于旺㸔得近来所屬下僚鮮能持㢘守法訪得興國縣主簿于旺獨能操持清白䖏事詳審近委管理抽分纎毫無玷奸􅁦剗革撫屬小官之内誠不多見相應奬勵以勸其餘為此牌仰官吏即便支給商稅銀兩買辦花紅彩段羊酒各一事并将本院􅀤去官馬一匹帶鞍一付備用皷樂差官以禮送付本官用見本院奬勵之意申諭十家牌法本院所行十家牌諭近来訪得各䖏官吏􅀋多視為虚文不肯着實奉行查考㩀法即當究治尚恐未悉本院立法之意故今特述所以再行申諭凡置十家牌湏先将各家門靣小牌挨審的實如人丁若干必查某丁為某官吏或生員或當某差役習某技藝作某生理或過某房出贅或有某殘疾及戸籍田糧等項俱要逐一查審的實十家編排既定照式造冊一本留縣以備查考及遇勾攝及差調等項按冊䖏分更無躱閃脱漏一縣之事如視諸掌毎十家各令挨報甲内平日習爲偷􅀼及喇唬教唆等項不良之人同具不致隱漏重􅅴結状官府爲置舎舊圖新簿記其姓名姑勿追論舊惡令其自今改行遷善果能改化者爲除其名境内或有盗竊即令此軰自相挨緝若係甲内漏報仍并治同甲之罪又毎日各家照依牌式輪流沿門暁諭覺察如此即奸偽無所容而盗賊亦可息矣十家之内但有爭訟等事同甲即時勸觧和釋如有不聼勸觧恃強凌弱及誣告他人者同甲相率禀官官府當時量加責治省􅀤不必􅀵監淹滯凡遇問理詞状但渉誣告者仍要查究同甲不行勸禀之罪又毎日各家照牌互相勸諭務令講信修睦息訟罷爭日漸開導如此則小民益知爭闘之非而詞訟亦可簡矣凡十家牌式其法甚約其治甚廣有司果能着實舉行不但盗賊可息詞訟可簡因是而修之􅀘其偏而救其􅁦則賦役可均因是而修之連其伍而制其什則外侮可禦因是而修之警其薄而勸其厚則風俗可淳因是而修之導以徳而訓以學則禮樂可興凡有司之有髙才逺識者亦不必更立法制其於民情土俗或有未備但循此而潤色修舉之則一邑之治真可以不勞而致今特畧述所以立法之意再行申告言之所不能盡者其各為我精思熟究而力行之毋徒􅁓上空言搪塞竟成掛壁之虚文則庶乎其可矣申諭十家牌法增立保長先該本院通行撫屬編置十家牌式為照各甲不立牌頭者所以防脅制侵擾之􅁦然在鄉村遇有盗賊之警不可以無統紀合立保長督領庶衆志齊一為此仰抄案囘司即行各道守廵兵備等官備行所屬各府州縣於各鄉村推選才行為衆信服者一人為保長專一防禦盗賊平時各甲詞訟悉照牌諭不許保長干與因而武㫁鄉曲但遇盗警即仰保長統率各甲設謀截捕其城郭坊巷鄉村各於要地置皷一靣若鄉村相去稍逺者仍起髙樓置皷其上遇警即登樓擊皷一巷擊皷各巷應之一村擊皷各村應之但闻皷聲各甲各執器械齊出應援俱聼保長調度或設伏把隘或并力夾擊但有後期不出者保長公同各甲舉告官司重加罰治若鄉村各家皆置皷一靣一家有警撃皷各家應之尤為快便此則各隨才力為之不在牌例之内俱仰督令各縣即行推選増置仍告諭逺近使各知悉各府仍要不時稽察務臻實效毋得虚文搪塞查訪得出定行究治不貸頒行社學教條先該本院㩀嶺北道選送教讀劉伯頌等頗已得人但多係客寓日給為難今􅁒望以開導訓誨亦湏量資勤苦已經案仰該道通加禮貎優待給薪米􅁓筆之資各官仍要不時勸勵敦勉令各教讀務遵本院原定教條盡心訓導視童䝉如己子以啓廸為家事不但訓飭其子弟亦復化喻其父兄不但勤勞於詩禮章句之間尤在致力於徳行心術之本務使禮讓日新風俗日羙庶不􅀒有司作興之意與士民趨向之心而凡教授於兹土者亦永有光矣仍行該縣備寫案驗事理掲置各學永逺遵照去後今照前項教條因本院出廵忙迫失於頒給合就查􅀤為此牌仰本道府即将􅀤去教條毎學教讀給與二張掲置座右毎日務要遵照訓誨諸生該道該府官貟亦要不時親臨激勵稽考毋得苟應文具遂令日就廢弛清理永新田糧㩀叅議周文光呈㸔得江西田糧之􅁦極於永新相傳已非一日今􅁒清理丈量實亦救時切務但恐奉行不至未免反滋􅁦端依議定委通判談儲推官陳相指揮髙􅌖會同該縣知縣翁璣設法丈量該道仍要再加區盡曲盡物情務仰各官秉公任事正已格物殫知竭慮削􅁦除奸必能一勞永逸方可􅀤謀舉亊如其虚文塞責則莫若熟思審䖏以俟能者事完之日悉照該道所議造冊永永遵守施行繳批寜都縣祠祀知縣王天與申㩀寜都縣申㸔得知縣王天與舊隨本院征剿横水桶岡諸賊屢立􅀾功後隨本院討平寧藩竟死勤事况其平日居官政務修舉威愛兼行仰該縣即從士民之請建祠報祀用伸士夫之公論以慰小民之遺思暁諭安仁餘干頑民牌正徳十五年二月照得安仁餘千各有梗化頑民数千餘家近住東鄉迯避山澤沮逆王化已将數年即其罪惡俱合誅夷無赦但本院撫臨未及况查本院新行十家牌諭各官因各民頑梗尚未編查若遽行擒剿似亦不教而殺為此牌仰撫州府同知陸俸督同東鄉縣知縣黄堂及安仁縣知縣汪濟民餘千縣知縣馬津親詣各民村都沿門挨編推選父老子弟知禮法者暁諭敎􅅚令各革心向化自求生路限在一月之内仇者釋其怨憤者平其心逋者歸其􅀒罪者伏其􅇳具由呈来仍舊待以良善若過限不改不必再加隱􅃘姑息徒益長奸縱惡即便宻切指實申来以慿别有區䖏施行告諭頑民十二月十五日告諭安仁餘千東鄉等縣父老子弟自本院始至江西即聞三縣間有頑梗背化之民數千家其時本院方事剿平閩廣湖郴諸蠻㓂且所治止於南贛政教有所未及自去􅀊征討逆藩朝廷復有兼撫是方之命隨因聖駕南廵奔走道路故亦未遑經理今復還省城備詢三司府縣各官及逺近士夫軍民皆謂爾民梗化日乆積惡深重已在必誅無赦夫朝廷威令雷厲風行於九夷八蠻之外而中土郡縣之民乃敢悖抗若此不有誅㓕以示懲戒亦将何以為􅀦􅁒即􅀤兵勦捕顧其間尚多良善恐致玉石無辨且前此有司所以䖏之亦有未善何者安仁餘千里分本少於東鄉而地􅀔又限以山谷顧乃割小益大以啓爾民規避之端其失一矣既而两邑之民徭賦不平爭訟競起其時若盡改復舊亦有何說顧又使其近東鄉者歸安仁近安仁者附東鄉以益爾民紛爭之謗其失二矣及爾等抗拒之迹既成尚當體悉爾等中間或有難􅃘之怨屈抑不平之情亦湏爲之申泄㫁理或懲或戒使兩得其平若終難化諭者即宜㫁然正以􅀦法顧乃惮於身任其勞一切惟事姑息外迯租賦遂從而免其租賦􅁒迯逋債遂從而貸其逋債於彼則務隱忍之政而聼其外附於此又信一偏之詞而責其来歸紀綱不立冠􅂂倒置長奸縱惡日增月熾以成爾民背叛之罪而䧟之必死之地其失三矣然爾等罪惡皆在本院未臨之前自本院撫臨以来尚未曾有一言開諭爾等况查本院新行十家牌諭以弭盗息訟勸善紏惡而各該縣官又因爾等恃頑梗化皆未曾編查暁諭爾等皆未知悉其間或有悔創自新之願亦未可知若遽行擒勦是亦不敎而殺雖爾等在前之惡受此亦不為過然於吾心終有所未盡也近日撫州同知陸俸来禀爾等尚有可憫之情各懐求生之願故特委同知陸俸親齎本院告諭徃諭爾等父老子弟因而查照本院十家牌式通行編排暁諭使各民互相勸戒紏察痛懲已徃之惡共為維新之民爾等父老子弟其間知識明逹者盍亦深思熟慮之世豈有不納糧不當差與官府相對背抗而可以長乆無事終免於誅戮者乎世豈有恃頑樹黨結怨搆􅄷刼衆拒捕不伏其􅇳而可以長乆無事終免於誅戮者乎就使爾等各有子弟奴僕與爾抗拒背逆若此爾等當何以䖏之夫寧王宸濠挾奸雄之資籍宗室之􅀔謀為不􅁤積十餘年誘聚海内巨冦猾賊動以萬計􅁬其財力甲兵之強自以為無敵於天下矣一旦稱亂舉事本院奉朝廷威令興一旅之師不旬日而破㓕之如虜疋雛爾軰縦頑梗􅇯悍自視以為孰與宸濠吾若聲汝之罪不過令一徧禆領衆數百立虀粉爾軰如機上肉耳顧念爾等皆吾赤子其始本無背叛之謀止因規利爭忿肆惡長奸日迷日䧟遂至於此夫父母之於子豈有必􅁒殺之心惟其悖逆亂常之甚将至於覆宗㓕戸不得巳而後置之法苟有改化之機父母之心又未嘗不􅁒生全之也前此官府免爾租稅蠲爾債􅀒除爾罪名而遂謂爾可以安居復業是終非所以生汝吾今則不然不免爾租賦不蠲爾債負不除爾罪名爾能聼吾言改惡從善惟免爾一死限爾一月之内釋怨觧􅄷迯稅者輸其賦負債者償其􅀡有罪者伏其􅇳吾則待爾如故爾不聼吾言任汝軰自爲之吾心既無不盡吾可以無憾矣爾後無悔批江西都司掌管印信㸔得三司各官推舉該衛所掌印僉書等官頗已得宜俱依議仰行按察司将本院原􅀤貯庫印信㸔驗明白照議給領掌管兹當該衛改革之初仍行各官務在圖新更如端本澄源共惟同心同徳之美以立可乆可大之規不獨顯功業於當時必􅁒垂模範於来裔上不負廟堂之特選而下可副諸司之舉任其或庸碌浮沉甚至欺公剥下豈徒敗其身名亦難免於刑憲其餘空閒各官觀其才識皆可器使但以闕少人多未及盡用各官惟務持身勵志藏器待時但恐見用而無才勿慮有才而未用若果囊中之錐無不脫潁而出毋謂上人不知輙自頽靡是乃自棄非人棄汝矣俱仰備行各官查照施行牌行崇義縣查行十家牌法㸔得新開崇義縣治雖經本院委官緝理經畫大畧規模已具終是草創之初經制未習該縣官員若不假以威權聼其從宜整理則招徕安習之功亦未可責效除行守廵兵備等衙門外牌仰知縣陳瓉上􅂃前去該縣首照十家牌諭查審編排連屬其形􅀔輯睦其鄰里務要治官如家愛民如子一應詞訟差徭錢糧學校等項俱聼因時就事従宜區䖏應申請者申請應興革者興革務在畜衆安民不必牽制文法大抵風土習尚雖或有異而天理民􅃔則無不同若使為縣官者果能殚其心力悉其聰明致其惻怛愛民之誠盡其撫輯敎飬之道雖在蠻貊無不可化况此中土郡縣之區向附新民本多善􅀋我能愛之如子彼亦焉有不愛我如父者乎夫仁慈以惠良善刑罰以鋤􅇯暴固亦為政之大端若此新民之中及各縣分割都圖人戸果有頑梗強横不服政化者即仰遵照本院欽奉勑諭事理具由申請即行擒拏治以軍法毋容縱恣益長刁頑牌諭都指揮馮勲等振旅還師牌諭都指揮馮勲通判林寛典史徐誠等本月二十一日據知縣熊价所禀己知安義叛賊畧平所漏無㡬俟餘黨一盡各官即行振旅而還就将所擒叛賊通行牢固綁縛分領觧赴軍門各官在途務要肅整行伍申嚴紀律禁緝軍兵不得犯人一草一木今差叅隨官詹明賫執各官原領令旗令牌監軍而回但有違令侵擾於人者即行斬首示衆其􅁬命當先被殺􅀍傷義勇之士及􅀗功人役各官務要從公從實開報以憑優恤給賞不得互分彼此輒有偏私輕重但能推功讓羙者勤勞雖微亦在褒賞若有爭功專利者功蹟雖茂亦從擯抑其奉新兵快徃年從征多犯禁令令既効有勤勞尤宜保全始終毋蹈前非自取軍法重罪知縣熊价不必觧賊且可在縣撫安􅀍擾軍民令各安居樂業既行申嚴十家牌諭互相保障仍量留九姓義勇分班守縣候事體定帖以漸散回批瑞州知府告病申㸔得知府胡堯元始以忠義興討賊之功􅁇以剛果著及民之政雖􅀗上之誠或有未孚而守身之節初無可議據申告病情由亦似意有所為大抵能絜矩者必推已及人當大任者在動心􅃘性仰布政司即行本官照舊盡心管理府事毋因一朝之忿遂忘三反之功事如過激􅁒抗彌卑理苟不渝雖屈匪辱此繳賑恤水災牌㩀南康建昌撫州宜黄等縣申稱非常水災乞賜大施賑恤急救生靈流移等情㸔得撗水非常下民昬墊實可傷憫但計府縣所積無多實難溥賑其地方被水既廣而民困朝不謀夕若候查實報名造冊給散未免曠日遲乆反生冒濫已行二府各委佐貳官及行所屬􅀍水各縣掌印等官用船裝載榖米分投親至􅀍水鄊村驗果貧難下戸就便量行賑給為照南昌所屬水災􅀹劇但居民稠雜數多頑梗若賑給之時非守廵臨督於上或致騰踴紛爭為此仰分守廵南昌官吏即便分督該府縣官於預備倉内米榖用船裝運親至􅀍水鄉村不必􅀭言賑饑專以踏勘水災為事其間驗有貧難下户就便量給升斗暫救目前之急給過人户畧記姓名數目完報查考不必造冊擾害所至之地就督各官申嚴十家牌諭通加撫慰開導令各相安相恤仍督各官俱要視民如子務施實恵不得虚文搪塞徒費錢糧無救民患取罪不便仰湖廣布按二司優恤冀元亨家屬照得湖廣常徳府武陵縣舉人冀元亨忠信之行孚於遠邇云云巳經備咨六部院寺等衙門詳辦去後今照冀元亨該科道等官交章申暴各該官司辦無干碍先巳釋放不期復染瘧痢身故該部司屬官貟及京師賢士大夫莫不痛悼相與資給衣棺本院亦已具舟差人扶柩歸葬但恐本生原藉官司一時未知詳悉仍将家屬覊監未免枉受淹禁除将本生節義另行具本奏請褒錄外擬合通行為此牌仰抄案囬司即行常徳府速将舉人冀元亨家屬通行釋放財産等項亦就查明給還􅀵管仍将本生妻子特加優恤使奸人知事乆論定之公而善􅁼無作徳降殃之惑其於民風士習不為無􅀘矣批江西按察司故官水手呈㸔得僉事李素䖏心和易居官淸諥生既無以為家死復無以為殮寡妻弱妾旅櫬萬里死䘮之哀實倍恒情該司議􅁒加撥長夫水手護送非獨僚友之情實亦惇亷周急之義准議行令各府僉撥長夫水手照例起關差人䕶送還鄊仰南康府勸留敎授蔡宗兖據南康府儒學中㸔得敎授蔡宗兖徳任師儒心存孝義今方奉慈母而行正可樂英才之化况職主白鹿當宋儒倡道之區勝據匡廬又昔賢棲隱之地偶有親疾自可将調輙興掛􅃣之請似違奉檄之心仰布政司備行南康府掌印官以禮勸留仍與􅁱葺學宮供給薪水稍厚飬賢之禮以見崇儒之意􅌳批江西布政司禮送致仕官呈據江西布政司呈查勘新建知縣李時告送僉事李素䘮歸雲南任内無礙縁由㸔得知縣李時所呈量才能而如止已見恬退之節因友䘮而求去􅀹見交􅁩之敦既經查勘明白亦合遂其髙致仰司即行該府聼令本官以禮致仕動支無礙官銀置備綵帳羊酒從厚送餞加撥長夫水手資送還郷該司仍将本官致仕縁由行原籍官司用彰行􅁩之羙以為風俗之勸繳王文成公全書卷之十七終王文成公全書卷之二十九續編四序是卷師作扵弘治􅀄年筮仕之始也自題其稿曰上國逰洪葺師錄自辛巳以後文字􅁵爲正錄已前文字則間採外集而不全錄者盖師學静入于陽明洞得悟于龍塲大徹于征寧藩多難殷憂動忍增益學益徹則立教益簡易故一切應酬諸作多不彚入是卷已廢閣逸稿中乆矣茲刻續錄復檢讀之見師天禀夙悟如玉岀璞雖未就追􅅣而闇闇内光因嘆師禀夙智􅀂無學問之全功則逆其􅀁造當只止此使學者智不及師肯加學問之全功則其造詣日精當亦莫禦􅀂智過扵師而功不及師則終無􅀁造自􅀒其質者多矣乃復取而刻之俾讀師全錄者聞道貴得真修徒恃其質無益也嘉靖辛酉德洪百拜識鴻泥集序鴻泥集十有三卷燕居集八卷半閒龍先生之作也其子僉憲君致仁􅀅刻諸梓而屬其序於守仁曰斯􅀅來之事也然吾家君老矣及見其言之傳焉庻以悦其心吾子以為是傳乎守仁曰是非􅀁論也孝子之事親也求悅其心志耳目惟無可􅃱力無弗盡焉况其言語文辭精神之􅀁存非獨意玩手澤之餘其得而忽也旣思永其年又思永其名篤愛無已也􅀅務悅其親寧是之與論乎君曰雖然吾子言之守仁曰是乃􅀁以自盡者夫必其弗傳也斯㡬扵不仁必其傳之也斯幾扵不知其傳也屬之巳其傳之弗傳之也屬之人姑務其屬之已也已君曰雖然吾子必言之守仁曰繪事之詩不入扵風雅孺子之歌見稱扵孔孟然則古之人其可傳而弗傳者多矣不冀傳而傳之者有矣抑傳與不傳之間乎昔馬談之史其傳也遷成之班彪之文其傳也固述之衛武公老矣而有抑之戒盖有道矣夫子删詩列之大雅以訓扵世吾聞先生年八十而愽學匪􅈈不忘乎警惕又嘗數述六經宋儒之緒論其扵道也有聞矣其扵言也足訓矣􅆀仁又尊顯而張大之􅀅益興起乎道德而發揮乎事業􅀂泉之逹其放諸海不可限而量是集也其殆有傳乎􅃱仁起拜曰是足以為家君夀矣霓也敢忘吾子之規遂書之為敘澹然子序有詩澹然子四易其號其始曰凝秀次曰完齋又次曰友葵最後為澹然子陽眀子南遷遇於瀟湘之上而語之故且屬詩焉詩而敘之其言曰人天地之心而五行之秀也凝則形而生散則游而變道之不凝雖生猶變反身而誠而道凝矣故首之以凝秀道凝扵已是為率性率性而人道全斯之謂完故次之完齋齋完者盡已之性也盡已之性而後􅀎盡人之性盡萬物之性至扵草木至矣葵草木之㣲者也故次之以友葵友葵同扵物也内盡扵已而外同乎物則一矣一則脗然而天游混然而神化同歸而殊途一􅃱而百慮天下何思何慮矣故次之以澹然子終焉或曰陽眀子之言倫矣而非澹然子之意也澹然之意玄矣而非陽明子之言也陽明子聞之曰其然豈其然乎書之以質扵澹然子澹然子世􅀁謂滇南趙先生者也詩曰兩端妙闔闢五運無留停藐然覆載内真精諒斯凝雞犬一馳放散失随飄零惺惺日收歛􅃱曲乃明誠明誠為無忝無忝斯全歸深淵春冰薄千鈞一絲㣲膚髪尚如此天命焉可違參乎吾與爾免矣幸無􅉻人物各有禀理同氣乃殊曰殊非有二一本分澄淤志氣塞天地萬物皆吾軀炯炯傾陽性葵也吾友于孰葵孰為予友之尚為二大化豈容心繄我亦何意悠㢤澹然子乗化自來去澹然匪㝠然勿忘還勿助夀楊母張太孺人序考功主事楊名父之母張太孺人以敏慧貞肅為鄉邑女氏師凢鄉人稱閨閫之良必曰張太孺人而名父亦以孝行聞苟擬人物有才識行􅁩無問知不知必首曰名父名父蓋今鄉評士論之公則爾也今年六月太孺人夀六十有七大夫􅀸士羙楊氏母子之贒以爲難得舉酒畢賀扵是太孺人之長女􅀂婿􅀙事扵京師且歸太孺人一旦欣然治装欲與俱南名父帥妻子從親戚百計以留太孺人曰噫小子無庸爾焉自爾舉進士爲令三邑今爲考功前後且十有八年吾䏻一日去爾㢤爾爲令吾見爾岀入以勞民務昕夕不遑而爾無怠容吾知爾之䏻勤然其時監司督扵上􅂉爾有􅀁畏也見爾之食貧自守一介不以苟而以色予養吾知爾之􅀎㢘然其時方有以賄敗者􅂉爾有􅀁懲也見爾毀滛祠崇正道禮先贒之後旌行舉孝拳拳以風俗爲心吾知爾䏻志扵正然其時逺近方以是燁爾􅂉以是發聞也自爾入爲部属且五年庶㡬得以自由而爾食忘味􅆍忘􅄰雞鳴而作􅀱予􅆍而岀朝扵上疾風甚雨雷電晦􅊕而未嘗肯以一日休予然後信爾之誠扵勤身與妻子為清苦而澹然以為樂交天下之士而莫有以苞苴饋遺至予然後信爾之誠扵㢘凡交爾而來者予耳其言非文學道義之相資則朝廷之政邉徼之務是謀磨礱砥礪惟不及古之人是憂焉予然後信爾之誠志扵正而非有􅀁色取扵其外吾扵是而可以無憂爾也巳且爾弟亦善養吾老矣姻族鄉黨之是懐南歸予樂也名父跽請不已太孺人曰止而獨不聞之夫煦煦焉飲食供奉以為孝而中衡拂之孰與樂親之心而志之養乎名父懼乃不敢請縉紳士夫聞太孺人之言者莫不咨嗟歎息以為雖古文伯子輿之母何以加是扵是相與倡為歌詩以頌太孺人之賢而嘉名父之􅀎養某扵名父厚也比而序之對菊聮句序職方南署之前有菊數夲閱􅀊旣稿李君貽教為正郎于時天子居亮闇西北方多事自夏徂秋荒頓窘戚菊發其故叢髙及扵垣署花盛開且衰而貽教尚未之知也一日守仁與黃眀甫過貽教語開軒而望始見焉計其時重陽之節旣去之旬有五日相與感時物之變衰歎人事之超忽發為歌詩遂成聮句鬰然而憂深悄然而情隱雖故托辭扵觴咏而沉痛惋悒終有異乎昔之舉酒花前劇飲酣歌陶然而樂者矣古之人謂菊為花之隱逸則菊固惟澗谷巖洞村圃籬落之是宜而以植之簿書案牘之間殆亦昔之􅀁謂吏而隱者歟守仁性僻而野嘗思鹿豕木石之群貽教與眀甫雖各惟利噐䖏劇任而飄然毎有煙霞林壑之想以是人對是菊又當是地嗚呼固宜其重有感也巳東曹倡和詩序正德改元之三月兩廣缺總制大臣朝議以東南方多事其選扵他日宜益慎重扵是湖南熊公由兵部左侍郎且滿九載秩矣擢左都御史以行衆皆以兩廣為東南巨鎮海外諸蠻夷之􅀁向背如得人而委之天子四方之憂可免二焉雖扵資為屈而以清德厚望選重可知矣然而司馬執兵之樞居中幹旋以運制四外不滋為重歟方其􅀄議時亦有以是言者慮非不及而當事者卒以公之節操才望爲辭謂非公不可其意實欲因是而出公扵外也扵是士論閧然以爲非宜然已命下無及矣爲重鎮得贒大臣而撫之朝議以重舉而公以德升物議顧怏然而不滿也衡物之情以行其私而使人懐不滿焉非夫忘世避俗之士不􅀎無憂焉自命下暨公之行曹属之爲詩以寫其睠留之情者凡􅀂干人以前驅之驟發也敘而次之僅十之一􅃒公御而投之庸以寄其私焉豫軒都先生八十受封序弘治癸亥冬守仁自會稽上天目東􅀚扵震澤遇南濠子都玄敬扵吴門遂偕之入玄幕登天平還值大雪次虎丘凢相􅀙旬有五日予與南濠子為同年蓋至是而始知其學之無􅀁不窺也歸造其廬􅀗拜其父豫軒先生與予坐而語蓋屯然其􅀂避而彚趨也秩然其􅀂歛而陽煦也予塪然而心撼焉倐而色慚焉倐而目駭焉亡予之故先生退守仁謂南濠子曰先生殆有道者歟胡為乎色之不存予而德之予薫也南濠子笑而頷之曰然子其知人㢤吾家君扵藝鮮不通而人未嘗見其學也扵道鮮不䆒而人未嘗知其有也夫善之弗彰也則扵子乎避雖然吾家君則甚惡之吾子旣知之也穆其敢隱乎几穆之􅀁見知扵吾子皆吾家君之􅀁弗屑也故鄉之人無聞焉非吾子之粹扵道其寧孰識之夫南濠子之學以該洽聞四方之學者莫不誦南濠子之名而莫有知其學之岀自先生者先生之學南濠子之􅀁未􅀎盡而其鄉人曾莫知之古􅀁謂潜世之士㢤彼且落其榮而核之存彼且固靈株而塞其兊彼且􅀍􅄄而懐玉離形迹遁聲華而以為知己者累孰比比焉跡形骸而求之其逺㢤今年先生夀八十神完而氣全齒髪無􅀁變八月甲寅天子崇徽號扵兩宫推恩臣下扵是南濠子方為冬官主事得􅀍異數封先生如其官同年之任扵京者羙先生之髙夀樂南濠子之􅀗榮其親也集而賀之夫樂夀康寧世之􅀁慕而予不敢以為先生侈章服華寵世之􅀁同貴而予不敢以為先生榮南濠子以予言􅃱之先生亦且以予為知言乎乙丑十月序送黃敬夫先生僉憲廣西序古之仕者將以行其道今之仕者將以利其身􅀅以行其道故䏻不以險夷得䘮動其心而惟道之行否為休戚利其身故懐土偷安見利而趨見難而懼非古今之性爾殊也其􅀁以養扵平日者之不同而觀夫天下者之逹與不逹耳吾邑黃君敬夫以刑部員外郎擢廣西按察僉事廣西天下之西南徼也地卑濕而土踈薄接境扵諸島蠻夷瘴癘欝蒸之氣朝夕瀰茫不常睹日月山獞海獠非時􅀼發鳥妖蛇毒之患在在而有固今仕者之􅀁懼而避焉者也然予以為中原固天下之樂土人之􅀁趨而聚居者然中原之民至今不加多而嶺廣之民至今不加少何㢤中原之民其始非必盡皆中原者也固有従嶺廣而遷居之者矣嶺廣之民其始非必盡皆嶺廣者也固有從中原而遷居之者矣乆而安焉習而便焉父兄宗族之􅀁居親戚墳墓之􅀁在自不䏻一日捨此而他也古之君子惟知天下之情不異扵一鄉一鄉之情不異扵一家而家之情不異扵吾之一身故視其家之尊卑長㓜猶家之視身也視天下之尊卑長㓜猶鄉之視家也是以安土樂天而無入不自得後之人視其兄之扵已固已有間則又何怪其險夷之異趨而利害之殊節也㢤今仕扵世而䏻以行道為心求古人之意以逹􅀚夫天下則嶺廣雖逺固其鄉閭嶺廣之民皆其子弟郡邑城郭皆其父兄宗族之􅀁居山川道里皆其親戚墳墓之􅀁在而嶺廣之民亦􅀅視我為父兄以我為親戚雍雍愛戴相眷戀而不忍去况以為懼而避之耶敬夫吾邑之英也㓜居扵鄉鄉之人無不敬愛長徙扵南畿之六合六合之人敬而愛之猶吾鄉也及舉進士宰新鄭新鄭之民曰吾父兄也入為冬官主事岀治水扵山東改秋官主事擢貟外郎僚宷曰吾兄弟也盖自居扵鄉以至扵今經歷且十餘地而人之敬愛之如一日君亦自為童子以至扵為今官經歷且八九職而其􅀁以待人愛衆者恒如一家今之擢廣西也人咸以君之贒宜需用扵内不當任逺地君曰吾則不贒使或贒也乃􅀁以宜扵逺嗚呼􅀂君者可不謂之志扵行道素養逹觀而有古人之風也歟夫志扵為利雖欲其政之善不可得也志扵行道雖欲其政之不善亦不可得也以君之􅀁志雖未有􅀁見吾猶信其䏻也况其赫燁之聲奇偉之績乆熟扵人人之耳目則吾扵君之行也頌其􅀁難而易者見矣性天卷詩序􅃬之崇安寺有浮屠浄覺者扁其居曰性天因地官秦君國聲而請序於予予不知浄覺顧國聲端人也而浄覺托焉且嘗避􅀁居以延國聲誦讀其間此其為人必有可與言者矣然性天旣非浄覺之􅀁及而性與天又孔子之􅀁罕言子貢之􅀁未聞則吾亦豈易言㢤吾聞浮屠氏以寂㓕為宗其教務抵扵木稿􅁅死影絶迹㓕之境以為空幻則净覺􅀁謂性天云者意如此乎浄覺旣巳習聞而復予請焉其中必有願也吾不可復以此而瀆告之姑試與浄覺􅀚扵天地之間以求􅀁謂性與天者而論之則凡赫然而明􅏃然而生訇然而驚油然而興凡蕩前擁後迎盻而接眒者何適而非此也㢤今夫水之生也潤以下木之生也植以上性也而莫知其然之妙水與木不與焉則天也激之而使行扵山顛之上而反培其末是豈水與木之性㢤其奔決而仆天固非其天矣人之生入而父子夫婦兄弟岀而君臣長㓜朋友豈非順其性以全其天而已耶聖人立之以紀綱行之以禮樂使天下之過弗及焉者皆扵是乎取中曰此天之􅀁以與我我之􅀁以為性云耳不如是不足以為人是謂䘮其性而失其天而况扵絶父子屏夫婦逸而去之耶吾儒之􅀁謂性與天者如是而已矣􅀂曰性天之流行云則吾又何敢躐以䙝浄覺乎㢤夫知而弗以告謂之不仁告之而躐其等謂之誣知而不為焉者謂之惑吾不敢自䧟扵誣與不仁􅀚浄覺之􅀁與與其􅀁以請亦豈終惑者邪旣以復國聲之請遂書扵其卷送陳懐文尹寧都序木之産扵鄧林者無棄材馬之岀扵渥洼者無凡足非物性之有異其種􅀋土地使然也剡溪自昔稱多贒而陳氏之居剡者尤為特盛其先有諱過者仕宋為侍御史子􅋌由進士為少詹士匡之四世孫聖登進士判䖏州子頥徵著作頥子國光元進士官大理􅀸光姪彦範為越州路總管至懐文之兄尭由鄉進士掌教濮州弟璟蜀府右長史珂進士刑曹主事衣冠文物輝映後先豈非人之􅀁謂鄧林渥洼者乎宜必有􅅛奇之材絶逸之足干青雲而躡風電者出乎其間矣懐文始與予同舉扵鄉望其色而異耳其言而驚求其世則陳氏之産也曰嘻異㢤土地則爾他時柱廊廟而致千里者非彼也歟旣而匠石靡經伯樂不遇遂復困寂寞而伏塩車者十有五年斯則有司之不明扵懐文固無病也今年赴選銓曹授尹江西之寕都夫以懐文合抱之具此宜無適而不可顧寕都百里之地吾恐懐文之驥足有􅀁不展也然而行逺之邇登髙之卑自今日始矣則如予之好扵懐文者扵其行􅀎無言乎贈之詩曰矯矯千金駿欝欝披雲枝跑風拖雷電梁棟惟其宜寒林棲落日暮色江天巵元龍湖海士客衣風塵緇牛刀試花縣鳴琹坐無為清濯廬山雲心事良獨奇悠悠西江水别懐諒如斯送駱藴良潮州太守序昔韓退之為潮州刺史其詩文間亦有述潮之土風物産者大抵謂潮為瘴毒﨑險之鄉而海南帥孔戣又以潮州小祿薄特給退之錢千十百周其闕乏則潮盖亦邉海一窮州耳今之嶺南諸郡以饒足稱則必以潮為首舉甚至以為雖江淮財賦之地亦且有􅀁不及豈潮之土地嗇扵古而今有􅀁豐抑退之貶謫之後其言不無激扵不平而有􅀁過也退之為刑部侍郎諌迎佛骨天子大怒必欲置之死裴度崔群軰為解始得貶潮州則潮在當時不得為羙地亦畧可見今之􅀁稱則又可以身至而目擊固非出扵妄傳特其地之不同扵古則要為有自也予嘗謂牧守之治郡譬之農夫之治田農夫上田一􅀊不治則半􅀵再􅀊不治則無食三嵗不治則化為蕪莾而比扵瓦礫茍盡樹藝之方而勤耕耨之節則下田之收與上等江淮故稱富庻當其兵荒之際凋殘廢瘠固宜有之乃今重熈累洽之日而其民徃徃有不堪之嘆豈非以其俗素習扵奢逸而上之人又􅀙而重歛繁役之刓剝環四面而集則雖有良守牧亦一􅁀十寒其為生也無㡬矣潮地岸大海積無饒富之名其民貢賦之外皆得以各安地利業儉朴而又得守牧如退之李德􅁉陳堯佐之徒相望而撫掬梳摩之􅀁以積有今日之盛實始扵此邇十餘年來富盛之聲旣􅀭則其􅀔不䏻乆而無動有司者又􅀅顧而之焉則吾恐今日之潮復為他時之江淮其甚可念也今年潮知府貟缺諸暨駱公藴良以左府經歷擢是任以徃公嘗守安陸至今以富足號遂用是建重屏其地繼後循其迹而治之者率多有聲聞及入經歷左府都督事兵府政清自府帥下迨幕属軍吏禮敬畏戴不謀而同其扵潮州也以其治安陸者治之而又􅀗夫上下之心如今日之在兵府􅀅有為而無不􅀙有革而無不􅃪政績之羙又果足為後來者之􅀁遵守則潮之富足􅀅終保扵無恙而一郡民神為有福矣夫為天子延一郡之福功豈小乎㢤推是以進他日􅀁成其又可論公僚友李載􅊙軰請言導公行予素知公之心且稔其才自度無足為贈者為潮民慶之以酒而頌之以此言髙平縣志序髙平志者髙平之山川土田風俗物産無不志焉曰髙平則其地之􅀁有皆舉之矣禹貢職方之述巳不可尚漢以來地理郡國志方輿勝覽山海經之屬􅂉畧而多漏􅂉誕而不經其間固巳不䏻無憾惟我朝之一統志則其綱簡扵禹貢而無遺其目詳扵職方而不冗然其規模宏大濶畧實為天下萬世而作則王者事也􅀂夫州縣之志固又有司者之職其亦可緩乎弘治乙卯慈谿楊君明甫令澤之高平發號出令民旣悦服乃行田野進父老詢邑之故􅀅以􅁱廢舉墜而邑舊無志無􅀁於考明甫嘅然太息曰此大闕責在我遂廣詢愽採搜秘闕疑旁援直㩀輔之以已見遵一統志凡例總其要節而属筆扵司訓李英不踰月編成於是繁劇紛沓之中不見聲色而數千載散亂淪落之事棄廢磨㓕之迹燦然復完明甫退然􅀂無與也邑之人士動容相慶駭其昔􅀁未聞者之忽睹而喜其今􅀁􅀅泯者之復明也走京師請予序予惟髙平即古長平戰國時秦白起攻趙坑降卒四十萬扵此至今天下􅁈之故自為童子即知有長平慷􅁣好奇之士思一至其地以吊千古不平之恨而不可得或時考圖志以求其山川形􅀔扵彷彿間予嘗思睹其志以為逺莫􅆀之不謂其無有也盖嘗意論趙人以四十萬俯首降秦而秦卒坑之了無哀恤顧忌秦之毒虐固巳不容誅而當時諸侯其先亦自有以取此者夫先王建國分野皆有一定之規畫經制如今􅀁謂志書之􅀋者以紀其山川之險夷封􅆠之廣狹土田之饒瘠貢賦之多寡俗之􅀁宜地之􅀁産井然有方俾有國者之子孫世守之不得以已意有􅀁增損取予夫然後講信修睦各保其先世之􅀁有而不敢冐法制以相侵陵戰國之君惡其害已不得騁無厭之欲也而皆去其籍扵是強陵弱衆􅁀寡兼并僣􅀼先王之法制蕩然無考而奸雄遂不復有􅀁忌憚故秦敢至扵此然則七國之亡實由文獻不足證而先王之法制無存也典籍圖志之􅀁關其不大㢤今天下一統皇化周流州縣之吏不過具文書計歲月而以贅痝之物視圖志不知􅀁以宜其民因其俗以興􅆡􅀘弊者必扵志焉是頼則固王政之首務也今夫一家且必有譜而後可齊而况扵州縣天下之大州縣之積也州縣無不治則天下治矣明甫之獨䏻汲汲扵此其􅀁見不亦逺乎明甫學愽而才優其為政㢘明毁􅁋祠興社學㪟倫厚俗扶弱鋤強實皆可書之扵志以為後法而明甫謙讓不自有也故予為序其畧於此使後之續志者考而書焉送李柳州序柳州去京師七千餘里在五嶺之南嶺南之州大抵多卑濕瘴癘其風土雜夷從自昔與中原不􅀋唐宋之世地盡荒服吏其土者或未必盡皆以譴謫而以譴謫至者居多士之立朝意氣激軋與時抵忤不容扵儕衆扵是相與擯斥必􅃱之逺地故以譴謫而至者􅂉未必盡皆贒士君子而贒士君子居多予嘗論賢士君子扵平時随事就功要亦與人無異至扵䖏困約之鄉而志愈勵節益堅然後心跡與時俗相去逺甚然則非必賢士君子而後至其地至其地而後見贒士君子也唐之時柳宗元岀為柳州刺史劉蕡斥為柳州司户蕡之忠義旣已不待言宗元之岀始雖有以自取及其至柳而以禮教治民砥礪􅁬發卓然遂有聞扵世古人云庸玉女扵成也其不信已夫自是寓逰其地􅀂范祖禹張廷堅孫覿髙穎劉洪道胡夢昱軰皆忠贒剛直之士後先相繼不絶故柳雖非中土至其地者率多贒士是以習與化移而衣冠文物蔚然為禮義之􅀖我皇明重熈累洽無間邇遐世和時㤗瘴癘不興財貨􅀁岀盡扵東南扵是遂為嶺南甲郡朝廷必擇㢘􅀎以任之則今日之柳州固已非唐宋之柳州而今日之官其土者豈惟非昔之比其為重且專亦較然矣弘治丙辰柳州知府貟缺内江李君􅀖輔自地官正郎膺命以徃人皆以􅀖輔居地官十餘年綽有􅀎聲為縉紳􅀁稱許不當逺去萬里外予於􅀖輔知我也亦豈不惜其逺别顧􅀖輔居地官上曹著㢘聲有􅀎績徐速自如􅄖㳺榮樂之地皆非人􅀁甚難人亦不甚為􅀖輔屈不知其中之􅀁存今而間關數千里䖏險僻難為之地得以試其堅白扵磨涅則􅀖輔之節操志慮庻㡬盡白扵人人而任重道逺真可以無􅀒今日縉紳之期望豈不羙㢤夫􅀁䖏冐艱險之名而節操有相形之羙以不滿人之望加之以不自滿之心吾扵􅀖輔之行􅀁以獨欣然而私喜也送吕丕文先生少尹京丞序昔蕭望之為諌議大夫天子以望之議論有餘才任宰相􅀅􅀚以郡事而望之堅欲拾遺左右後竟岀試三輔至元帝之世而望之遂稱贒相焉古之英君其􅀅任是人也旣已納其言又必考其行􅀅欲委以重則必老其才􅀁以用無不當而功無不成􅀂漢宣者史稱其綜核名實盖亦不為虗語矣新昌吕公丕文以禮科都給事中擢少尹南京兆給事諌官也京兆三輔之首也以給事試京兆是諌官試三輔也是其先後名爵之偶同扵望之非徒以寵直道而開讜言固亦㣲示其意扵其間耳吕公以純篤之學忠貞之行自甲辰進士為諌官十餘年其􅀁論扵朝而建明者何如也致于上而替可否者何如也聲光在人公道在天下聖天子詢事考言方欲􅃱股肱之良以希唐虞之盛耳目之司顧獨不重㢤然則公京兆之擢固􅀅以信其夙􅀁言者扵今日而須其大用扵他時也其􅀁以贒而試之有符扵漢宣之扵望之而其􅀁將信而任之則吾又知其决非彼􅀂而已也君行矣旣巳審上意之􅀁在公􅀸大夫士傾耳維新之政以劵其􅀁言且謂日需其效以俟庸也其得無念扵斯行乎㢤學士謝公􅒰與公有同舉同鄉之好飮以餞之謂某也宜􅃱以言予惟君之文學政事扵平常旣巳信其必然知言之弗􅀎毫末加也而超擢之榮又不屑為時俗道􅀂夫名譽之羙期俟之盛則固君之􅀁宜副而實諸公飮餞之情也故比而序之以為贈慶吕素菴先生封知州序朝廷褒德顯功因其子以及其親斯固人情事理之􅀁宜然盖亦􅀁謂忠厚之至也然舊制京官三載舉得推恩而州縣之職非至扵數載之外屢為其上官􅀁薦揚則終不可幸而􅃱故京官之淂推恩非必其皆有奇績異䏻者苟得及乎三載皆可以坐而有之州縣之職非必其皆無奇績異􅀎苟其人事之不齊得扵民矣而不􅀗乎上信扵已矣而未孚扵人百有一不如式則有司者以例䋲之雖累方岳欲推恩如其京官之三載者焉不可得也夫父母之􅀁以教養其子而望其榮顯夫我者豈有異情㢤人子之􅀁以報扵其親以求樂其心志者豈有異情㢤及其同為王臣而其乆近難易相去懸絶如此豈不益令人重内而輕外也夫惟其難􅀂此其乆􅀂此而後䏻有􅀁成就故其教子之榮顯親之志亦因之而有盛於彼皆扵此見焉浙之新昌有隱君子曰素菴吕公者今刑部貟外郎中原之父也自㓜有㓗操髙其道不肯為世用優㳺煙壑專意教其子使之盡學夫修已治人之方凡其􅀁欲為而不及為者皆一以付之曰吾不􅀎有􅀘扵時不可使吾子復為獨善者學成使之仕成化庚子中原遂領鄉薦與家君實同登焉甲辰舉進士出守石州石故號難治中原至即除舊令之不便扵民者布教條為約束以其素􅀁習扵家庭者坐而治之民皆靡然而􅀙翕然而起士夫之騰扵議者部使之􅀭薦者曰某㢘吏某勤吏某才而有䏻某贒而多智必皆扵中原是歸焉有司奉舊典推原中原厥績􅀁自而公之􅀁以訓誨其子之功為大天子下制褒􅀭封公為奉直大夫配某氏封宜人以寵榮之鄉士夫皆曰子為京職而䏻克享褒封者于今皆爾此不足甚異公之教其子為其難而獨􅀎易其􅀗此則不可以無賀扵是李君軰皆為詩歌而來属予言予惟天下之事其得之也不難則其失之也必易其積之也不乆則其發之也必不宏今夫松栢之拂穹霄而擊車輪也其始盖亦必有蔽扵􅅾蒿而厄扵牛羊以䏻有成立公之先世自文惠公以來相業吏治世濟其羙固宜食報扵其後矣而不食以鍾扵公公之道自足以顯扵時矣而不顯以􅃱扵其子且復根盤節錯而中為之䖏焉乃有􅀁􅀗是豈非􅀁謂積之乆而得之難者歟則其他日􅀁發之宏大其子之陟公􅀸而樹勲業身享遐齡以永天祿扵無窮盖未足以盡也然則公之可賀者在此而不專在扵彼某也敢贅言之賀監察御史姚􅀿隆考績推恩序御史姚君應隆監察江西道之三年􅃁宰考其績有成以􅆟上扵是天子進君階文林郎遂下制封君父坡隣公如君之階君母某氏為孺人及君之配某氏扵是僚友畢賀謂某尤厚扵君属之􅃱􅀁以賀之意某曰應隆之㓜而學之也坡隣公之􅀁以望之者何􅀅不在扵樹功植名以光大其門閭已乎坡隣公之教之而應隆之􅀁以自期之者何􅀅不在扵顯􅀭其􅀁生以不􅀒其􅀁學巳乎然此亦甚難矣銖銖而積之皓首而無成者加半焉幸而有成得及其富盛之年以自奮扵崇赫之地者㡬人是㡬人者之中方起而躓半途而廢垂成而毀者又徃徃有之可不謂之難乎應隆年二十一而歌鹿鳴扵鄉明年遂舉進士由郎官陟司天子耳目謂非富盛之年以自􅁬扵崇赫之地不可也英聲發扵新喻休光著扵沛邑而風裁振扵朝署三年之間遂得以成績􅀍天子之寵光扵其父母謂非樹功植名以光大其門閭而顯􅀭其􅀁生不可也坡隣之􅀁望應隆之􅀁自期扵今日而兩有不􅀒焉某也請以是為賀雖然君子之成身也不惟其外惟其中其事親也不惟其文惟其實應隆之􅀁以自􅁬扵崇赫之地者果足以樹身植名而成其身已乎外焉而已耳應隆之􅀁以􅀍寵光扵其父母者果足以為顯􅀭其􅀁生而為事親之實已乎文馬而已耳夫子曰成身有道不明乎善不成其身矣斯之為中悅親有道反身不誠不悦扵親矣斯之謂實應隆内明而外通動以古之豪傑自標凖其忠孝大節皆其素􅀁積蓄雖隱而不􅀭其􅀁以成身而事親者自􅀂也况其外與文者又兩盡焉斯其不益足賀乎送紹興佟太守序成化辛丑予來京師居長安西街乆之文選郎佟公實來與之隣其貌頎然以秀其氣熈然以和介而不絶物寛而有分劑予嘗私語人以為此真廊廟噐也旣而以他事外􅀘不相見者數年弘治癸丑公為貳守扵蘇蘇大郡繁而尚侈機巧而多偽公至移侈以朴消偽以誠勤扵職務日夜不懈時予趍京見蘇之士夫與其民之稱頌之也扵是始知公之不獨有其德噐又䏻循循吏職甲寅移守嘉興嘉興財賦之地民苦扵兼并俗殘扵武斷公大鋤強梗剪其蕪蔓起嘉良而植之予見嘉之民􅂬趍鼓舞及其士夫之欽崇之也扵是又知公有剛明果决之才不獨􅀎循循吏事乃嘆其不可測識固如此今年吾郡太守缺吾郡繁麗不及蘇而㪟朴􅂉過財賦不􅀂嘉而淳善則踰是亦論之通扵吳越之間者然而邇年以來習與時異無蘇之繁麗而亦􅂉有其糜無嘉之財賦而亦􅂉效其強毎與士大夫論輙嘆息興懐以為安得如昔之化蘇人者而化之乎安得如昔之變嘉民者而變之乎方思公之不可得而公􅃴以起服來朝又懼吾郡之不􅀎有公也而天子適以為守士大夫動容相賀以為人􅀁祝願而天必􅀙之意者郡民之福亦未艾也公且行相與舉杯酒為八邑之民慶又不䏻無懼也公本廊廟之噐出居扵外者十餘年其為蘇與嘉京師之士論旣巳惜其歸之太徐其為吾郡􅀎㡬月日且天子之意與其福一郡孰與福天下之大也雖然公之去蘇與嘉亦且數年德澤之流今未替也公雖不乆扵吾郡矣如其不得公也則如之何送張侯宗魯考􅆟還治紹興序膠州張侯宗魯之節推吾郡也中清而外慎寛持而肅行大􅀗扵上下以平其政刑三載而績成是為弘治十三年􅀅上㝡天曹吾父老聞侯之有行也皆出自􅀂耶山谷間送扵錢清江上侯曰父老休矣吾無德政相及徒勤父老吾懼且怍父老休矣吾無以堪也父老曰明府知斯水之􅀁以為錢清者乎昔漢劉公之去吾郡也吾儕小人之先亦皆出送各有􅀁贈獻劉公不忍違先民之意乃人取一錢已而投之斯水因以名焉􅀁以無忘劉公之清德且以志吾先民之事劉公其勤如此也今明府之行吾儕小人限扵法制旣不敢妄有􅀁贈獻又不􅀗奔走服役􅃱其惓惓之懐其如先民何固辭不可復行數十里始去三月中旬侯至扵京師天曹以㝡上明日遂駕以行鄉先生之仕於朝者聞之皆出餞且邀止之曰侯之逺來亦旣勞止適有司之不暇是以未䏻羞一觴扵􅀙者是何行之速耶侯俯而謝復止之曰侯之勞扵吾郡三年有餘今者行數千里無非為吾民其勤且劬也事旣竣矣吾黨不得相與為一日之􅀙容其如吾民何侯謝而起守仁趨而進曰諸先生毋為􅀙者淹侯之急扵行也守仁則知之矣僉曰謂何曰昔者漢郭伋之行部也與諸童爲歸期及歸而先一日遂止于野亭湏期乃入曰懼違信扵諸兒也吾聞侯之來也鄉父老與侯爲歸期矣而復濡遲扵此以狥一朝之樂􅈥其􅀁以期父老者此侯之􅀁懼而有不容已扵急行也毋爲侯淹侯起拜曰正學非敢及此然敢不求承吾子之教送方夀􅀸廣東僉憲序士大夫之仕扵京者其繁劇難爲惟部屬爲甚而部屬之中惟刑曹典司獄訟朝夕恒窘扵簿書案牘口决耳辯日證心求身不暫離扵公座而手不停揮扵鉛槧盖部屬之尤甚者也而刑曹十有三司之中惟雲南以職在京畿廣東以事當􅁠貴其劇且難尤有甚扵諸司者􅀂是而得以行其志無愧其職焉則固有志者之􅀁願爲而多才者之􅀁欲成也然而紛揉雜沓之中又􅀙而拂抑之牽制之言未岀扵口而辱巳加扵身事未解扵倒懸而機巳發扵䧟穽議者以爲䖏此而􅀎不撓扵理法不罹扵禍敗則天下無復難為之事是固然矣然吾以為一有惕扵禍敗則理法未免有時而或撓苟惟理法之求伸而欲不必罹扵禍敗吾恐聖人以下或有􅀁不􅀎也訟之大者莫過扵人命惡之極者無甚扵盗賊朝廷不􅃘一民冐極惡之名而無辜以死也是俗之論皆然而夀􅀸獨以僉事為樂此其間夫亦容有􅀁未安是以寕䖏其薄與淹者以求免扵過慝歟夫知其不安而不䖏過慝之懼而淹薄是􅅴焉是古君子之心也吾扵夀􅀸之行請以此為贈提牢􅆹壁題名記京師天下獄訟之􅀁歸也天下之獄分􅃪扵刑部之十三司而十三司之獄又并繋扵提牢􅆹故提牢㕔天下之獄皆在焉獄之繋􅀊以萬計朝則皆自提牢㕔而岀以分布扵十三司提牢者目識其状貌手披其姓名口詢耳􅃪魚貫而前自辰及午而始畢暮自十三司而歸自未及酉其勤亦如之固天下之至繁也其間獄之巳成者分為六監其輕􅀂重而未成者又自為六監其桎梏之緩急扄鑰之啓閉寒暑早夜之異防饑渇疾病之殊養其㣲至扵箕箒刀錐其賤至扵滌垢除下雖各司扵六監之吏而提牢者一不與知即弊興害作執法者得以議擬扵其後又天下之至猥也獄之重者入扵死其次亦皆徒流夫以共工之罪惡而舜姑以流之扵幽州則夫拘繋扵此而其情之苟有未得者又可以輕棄之扵死地㢤是以雖其至䌓至猥而其􅀔有不容扵不身親之者是盖天下之至重也舊制提牢月更主事一人至是弘治庚申之十月而予􅃴來當事夫予天下之至拙也其平居無恙一遇紛擾且支離厭倦不􅀎酬酢况茲多病之餘疲頓憔悴又其平生至不可強之日而毎歲决獄皆以十月下旬人懐疑懼多亦變故不測之虞則又至不可爲之時也夫其天下之至繁也至猥也至重也而又􅃴當天下至拙之人值其至不可強之日與其至不可爲之時是亦豈非天下之至難也以予之難不敢忘昔之治扵此者􅀅求私淑之而㕔壁舊無題名搜諸故牒則存者僅百一耳大懼泯沒使昔人之善惡無􅀁考徵而後來者益以畏難苟且莫有􅀁􅀚感扵是廼悉取而書之㕔壁雖其旣亡者不可復追而􅀅來者尚無窮巳則後賢猶􅀅有可别擇以為􅀙違而其間苟有天下之至拙如予者亦得以取法明善而免過愆􅀅不為無小􅀘然後知予之􅀁以為此者固亦推己及物之至情自有不容扵巳也矣弘治庚申十月望重修提牢㕔司獄司記弘治庚申七月重修提牢㕔工畢又兩越月而司獄司成扵是餘姚王守仁􅃴以次來提督獄事六監之吏皆來言曰惟兹㕔􅀂司建自正統破敝傾圯且二十年其卑淺隘陋則草創之制無尤焉矣是亦豈惟無以凛􅀚瞻而嚴法制􅀅治事者風雨霜雪之不免又何暇扵職務之舉而奸細之防㢤然玆部之制修廢補敗有主事一人以專其事又壊不理吾儕小人無得而知之者獨惟拓隘以廣易朽以堅則自吾劉公實始有是吾儕目覩其成而身享其逸劉公之功不敢忘也又曰六監之囚其罪大惡極何􅀁不有作孽造奸吏數逢其殃而民徒益其死獨禁防之不宻㢤亦其間容有以生其心自吾劉公始岀己意創為木閑令不苛而宻奸不弭而消桎梏可弛縲絏可無吾儕得以安枕無事而囚亦􅂉免扵法外之誅則劉公之功扵是為大小人事㣲而謀窒無䏻為也敢以布扵執事實重圖之扵是守仁旣無以禦其情又與劉公為同僚嫌扵私相羙譽也乃謂之曰吾為爾記爾􅀁言書劉公之名姓使承劉公之後者益修劉公之職繼爾軰而居此者亦無忘劉公之功則扵爾心其亦已矣皆應曰是小人之願也遂記之曰劉君名璉字廷羙江西鄱陽人也由弘治癸丑進士今為刑部四川司主事云弘治庚申十月十九日黃樓夜濤賦朱君朝章􅀅復黄樓為子言其故夜泊彭城之下子瞻呼予曰吾􅀅與子聴黄樓之夜濤乎覺則夢也感子瞻之事作黄樓夜濤賦子瞻與客宴扵黃樓之上已而客散日夕􅉂色横樓明月未岀乃隱几而坐哈焉以息忽有大聲起於穹窿徐而察之乃在西山之麓倐焉改聴又似夾河之曲􅂉􅀮􅂉隆􅀂斷􅀂逢􅀂揖讓而樂進歙掀舞以相雄觸孤憤扵厓石駕逸氣扵長風爾乃乍闔復闢旣横且縦㧿㧿渢渢洶洶瀜瀜􅀂風雨驟至林壑崩奔振長平之屋瓦舞㤗山之喬松咽悲吟扵下浦激高響扵遥空恍不知其􅀁止而忽已過扵吕梁之東矣子瞻曰噫嘻異㢤是何聲之壮且悲也其烏江之兵散而東下感帳中之悲歌慷􅁣激烈吞聲飮泣怒戰未巳憤氣決臆倒戈曵載紛紛籍籍狂奔疾走呼號相及而復會扵彭城之側者乎其赤帝之子威加海内思歸故鄉千乗萬騎霧奔雲從車轍轟霆旌旗蔽空擊萬夫之皷撞千石之鍾唱大風之歌按節翺翔而􅀅返扵沛宮者乎扵是􅁣然長噫欠伸起立使童子啓户憑欄而望之則煙光巳散河影垂虹㠶檣泊扵洲渚夜氣起扵郊埛而明月固已岀扵芒碭之􅄘矣子瞻曰噫嘻予固疑其爲濤聲也夫風水之遭扵澒洞之濵而爲是也兹非南郭子綦之􅀁謂天􅄜者乎而其誰倡之乎其誰和之乎其誰聴之乎當其滔天浴日湮谷崩山横奔四潰茫然東翻以與吾城之争扵尺寸間也吾方計窮力屈氣索神憊懍􅀌城之岌岌覬湏􅁷之未壊山頺扵目懵霆擊扵耳瞶而豈復知􅀁謂天􅄜者乎及其水退城完河流就道脫魚腹而岀􅂗泥乃與二三子徘徊兹樓之上而聴之也然後見其汪洋涵浴潏潏汨汨澎湃掀簸震蕩滭渤吁者為竽噴者為箎作止疾徐鍾磬祝敔奏文以始亂武以居呶者嗃者􅅝者嘷者翕而同者繹而從者而啁啁者而嘐嘐者蓋吾俯而聴之則􅀂奏簫咸扵洞庭仰而聞焉又􅀂張鈞天扵廣野是蓋有無之相激其殆造物者􅀅以寫千古之不平而用以盪吾􅅐中之壹欝者乎而吾亦胡爲而不樂也客曰子瞻之言過矣方其奔騰漂蕩而以厄子之􅀌城也固有莫之爲而爲者而豈水之䏻爲之乎及其安流順道風水相激而爲是天􅄜也亦有莫之爲而爲者而豈水之䏻爲之乎夫水亦何心之有㢤而子乃欲㩀其􅀁有者以爲􅂬而追其旣徃者以爲戚是豈逹人之大􅀚􅀅不得爲上士之妙識矣子瞻展然而笑曰客之言是也乃作歌曰濤之興􅀆吾聞其聲兮濤之息兮吾泯其迹兮吾􅀅乗一氣以逰扵鴻濛兮夫孰知其􅀁極兮弘治甲子七月書于百歩洪之養浩軒來雨山雪圖賦昔年大雪會稽山我時放迹逰其間巖岫皆失色崖壑俱改顔歷髙林兮入深巒銀幢寳纛森圍圜長矛利㦸白齒齒駭心慄膽如穿虎豹之重􅀜澗谿埋沒不可辨長松之杪修竹之下時聞寒溜聲潺潺沓嶂連天凝華積鉛嵯峨嶃削浩蕩無顛嶙峋眩耀􅀔欲倒溪􅅆路轉忽然當之􅁍立仰視不敢前嵌竇飛瀑忽然中瀉氷磴崚嶒上通天罅枯藤古􅁑倚􅑐㠂而高掛如痩蛟老螭之蟠糾蛻皮換骨而􅀅化舉手攀援足未定鱗甲紛紛而亂下側足登龍虬傾耳俯聴寒􅄜之颼颼陸風蹀躡直際縹緲恍惚最高之上頭廼是仙都玉京中有上帝遨逰之三十六瑶宫傍有玉妃舞婆娑十二層之瓊樓下隔人世知㡬許真境倒照見毛髪凡骨高寒難乆㽞劃然長嘯天花墜空素屏縞障坐不厭琪林珠樹窺玲瓏白鹿來飮澗􅀐之下千􅈐寘猿怨鶴時一呌彷彿深谷之底呼其侣蒼茫之外爭行蹙陣排天風鑑湖萬頃寒􅄥􅄥雙䄂拂開湖上雲照我􅂡眉忽然皓白成衰翁手掬湖水洗雙眼回㸔群山萬朶玉芙蓉草團蒲帳青莎􅅾浩歌夜􅀫湖水東夢魂清徹不得􅄰乾坤俯仰真在氷壺中幽朔隂巖地􅀊暮常多雪獨無湖山之勝使我毎毎對雪長欎結朝回䇿馬入秋臺高堂大壁寒崔嵬恍然昔日之湖山雙目驚喜三載又一開誰􅀎縮地法此景何來石田畫師我非爾􅅐中胡為亦有此來君神骨清莫比此景奇絶酷相似石田此景非爾不䏻摸來君來君非爾不可當此圖我嘗親遊此景得其趣為君題詩非我其誰乎詩雨霽逰龍山次五松韻晴日須登獨秀臺碧山重􅑋􅀞圗開閒心自與澄江老逸興誰還白髪來潮入海門舟亂發風臨松頂鶴雙廻夜憑虗閣窺星漢殊覺諸􅈐近斗魁嚴光亭子勝雲臺雨後髙憑逺目開鄉里正湏吾軰在湖山不􅀒此公來江邉秋思丹楓盡霜外緘書白鴈廻幽朔㑹傳戈甲散巳聞南檄授渠魁雪窓閒卧夣廻雙闕曙光浮􅂴卧茅齋且自由巷僻料應無客到景多唯擬作詩酬千巖積素供開卷疊嶂廻溪好放舟破虜玉關真細事未將吾筆遂輕投次韻畢方伯寫懐之作孔顔心迹臯䕫業落落乾坤無古今公自平生懐真氣誰􅀎晚節􅀒􅀄心獵情老去驚猶在此樂年來不費㝷矮屋低頭真局促且從􅈐頂一髙吟春晴散歩清晨急雨過林霏餘點煙稍尚滴衣隔水霞明桃亂􅄍沿溪風暖藥􅀄肥物情到底􅀎容􅂴世事從前且任非對眼春光唯自領如誰歌咏月中歸又祗用舞霓裳巖花自舉觴古崖松半朽陽谷草長芳徑竹穿風磴雲蘿繡石床􅀌吟動梁甫何䖏卧龍岡次魏五松荷亭晚興入座松隂盡日淸當軒野鶴復時鳴風光於我􅀎留意世味酣人未解醒長擬心神窺物外休􅀅姓字重鄉評飛騰豈必皆伊吕歸去山田亦可耕又􅋨後飛觴亂擲梭起從風竹舞婆娑踈慵已分投箕頴事業無勞問保阿碧水層城來鶴駕紫雲雙闕笑金娥搏風自有天池翼莫倚􅅾蒿斥鷃窠次張體仁聮句韻眼底湖山自一方晚林雲石坐高凉閒心最覺身多繋逰興還堪􅁂未蒼樹杪風泉長滴翠霜前巖菊尚餘芳秋江􅀞舫休輕發忍􅀒良宵燈燭光又山寺幽㝷亦惜忙長松落落水浪浪深冬平野風煙淡斜日滄江鷗鷺翔海内交㳺唯酒伴年來踪跡半僧房相過未盡青雲話無柰官程促去航又青林人静一燈歸囘首諸天隔翠㣲千里月明京信逺百年行樂故人稀已知造物終難定唯有煙霞或可依總為迂踈多牴牾此生何忍便脂韋題郭詡濂溪圖郭生作濂溪像其􅀋與否吾何􅀙辨之使無手中一圈蓋不知其為誰矣然筆畫老徤超然自不妨為名筆郭生揮寫最超群夣想形容恐未真霽月光風千古在當時黃九解傳神西湖􅋨中謾書湖光㶑灔晴偏好此語相傳信不誣景中况有佳賔主世上更無真􅀞圖溪風欲雨吟堤樹春水新添沒渚蒲南北雙􅈐引髙興􅋨携靑竹不湏扶文衡堂試事畢書壁􅁄闈秋鎻動經旬事了驚㸔白髪新造作曾無酣蟻句支離莫作􅀞蛇人寸絲擬得長才􅀘五色兼愁過眼頻䄂手虗堂聴明發此中豪傑定誰真諸君以予白髪之句試觀予􅁂果見一絲予作詩實未嘗知也謾書一絶識之忽然相見尚非時豈亦殷勤效一絲緫使皓然吾不恨此心還有爾䏻知逰㤗山飛湍下雲窟千尺瀉高寒昨向山中見真如􅀞裏㸔松風吹短􅁂霜氣肅群巒好記相􅀙地秋深十八盤雪巖次蘇頴濵韻客途亦幽㝷窈窕穿谷底塵土填胸臆到此方一洗仰視劔㦸􅄡㠝岏顙有泚俯窺蛟龍窟匍伏首如稽絶境固靈秘兹逰實天啓􅆊宇遍巖壑簷牙相角觝山僧出延客經營設酒醴道引入雲霧峻陟歷堂陛石田唯種椒晚炊仍有米張燈坐小軒矮榻便倦體清逰感疇昔陳李兩昆弟侵晨訪舊跡古碣埋荒薺試諸生有作醉後相㸔眼倍明絶憐詩骨逼人清菁莪見辱真慚我膠􅃮常存底用盟滄海浮雲悲絶􅏾碧山秋月動新情憂時謾作中宵坐共聴蕭䔥落木聲再試諸生草堂深酌坐寒更蠟炬煙消落絳英旅况最憐文作會客心􅂓喜困還亨春囘馬帳慙桃李花滿田家憶紫荆世事浮雲堪一􅀏百年持此竟何成夏日登易氏萬卷樓用唐韻高樓六月自生寒沓嶂􅅆􅈐擁碧䦨乆客巳忘非故土此身兼喜是閒官幽花傍晚煙􅀄􅊕深樹新晴雨未乾極目海天家萬里風塵關塞欲歸難再試諸生用唐韻天涯猶未隔年囘何䖏嚴光有釣􅄗樽酒可憐人獨逺封書空有鴈飛來漸驚雪色頭顱改莫漫風情􅀏口開遥想陽明舊詩石春來應自長莓苔次韻陸文順僉憲春王正月十七日薄暮甚雨雷電風捲我茅堂豈足念傷兹􅀊事難爲功金縢秋日亦巳異魯史冬月􅀅無同老臣正憂元氣泄中夜起坐心忡忡太子橋乍寒乍煖早春天随意㝷芳到水邉樹裏茅亭藏小景竹間石溜引清泉汀花照日猶含雨岸柳垂隂漸滿川欲把橋名㝷野老凄凉空􅀃建文年與胡少叅小集細雨􅀄晴蠛蜢飛小亭花竹晚凉㣲後期客到停杯乆逺道春來得信稀翰墨多憑消旅况道心無頼入禪機何時喜遂風泉賞卝作山中一白衣再用前韻賦鸚鵡低垂猶憶隴西飛金鎻長覊念力㣲秪為䏻言離土逺可憐折翼歎群稀春林羞比黃鸝巧晴渚思忘白鳥機千古正平名正賦風塵誰與惜毛衣送客過二橋下馬溪邉偶共行好山當靣正如屏不縁送客何因到還喜門人伴獨醒小洞巧容危􅂰坐淸泉不厭洗心􅃪經過轉眼俱陳迹多少高厓漫勒銘復用杜韻一首濯纓何䖏有清流三月㝷幽始得幽送客正逢催驛􅀐􅀏人且復任沙鷗厓傍石􅅯門雙啓洞口蘿垂箔半鈎淡我平生無一好獨扵泉石尚多求先日與諸友有郊園之約是日因送客後期小詩寫懐郊園隔􅀫有幽期送客三橋故故遲樽酒定應湏我乆諸君且莫向人疑同逰更憶春前日歸醉先􅂸日暮時郤笑相朢才咫尺無因走馬送新詩自欲探幽肯後期􅀂為塵事故􅀎遲緩歸已受山童促乆坐翻令溪鳥疑竹裏清醅應㡬酌水邉相􅀱定多時臨風無限停雲思囘首空歌伐木詩三橋客散赴前期縦轡還嫌馬足遲好鳥花間先報語浮雲山頂尚堪疑曾傳江閣邀賔句頗似籬邉送酒時便與諸公湏痛飮日斜潦倒更題詩待諸友不至花間望眼欲崇朝何事諸君迹尚遥自䖏豈宜同俗駕相期不獨醉春瓢忘形爾我雖多缺義重師生可特招自是清逰湏秉燭莫􅀅風雨􅀒良宵夏日逰陽明小洞天喜諸生偕集偶用唐韻古洞閒來日日遊山中宰相勝封侯絶糧每自嗟尼父愠見還時有仲由雲裏高厓㣲入暑石間寒溜已含秋他年故國懐諸友䰟夣還湏到水頭􅀅歸與諸生别於城南蔡氏樓天際層樓樹杪開夕陽下見鳥飛囘城隅碧水光連座檻外青山翠作堆頗恨眼前離别近惟餘他日夣䰟來新詩好記同遊䖏長掃溪南舊釣􅄗諸門人送至龍里道中二首蹊路高低入亂山諸贒相送愧間􅀜溪雲壓㡌兼愁重峰雪吹衣着􅁂斑花燭夜堂還共語桂枝秋殿聴躋攀躋攀之􅀃甚陋􅂓取其對偶耳相思不用勤書札别後吾言在訂頑雪滿山城入暮天歸心别意兩茫然及門真愧從陳日㣲服還思過宋年樽酒無因同歲晚緘書有鴈􅀉春前莫辭秉燭通宵坐明日相思隔隴煙贈陳宗魯學文湏學右脫俗去陳言譬􅀂千丈木勿為藤蔓纒又如崑崙派一瀉成大川人言古今異此語皆虗傳吾苟得其意今古何異焉子才良可進望汝師聖贒學文乃餘事􅂓云子􅀁偏醉後歌用燕思亭韻萬峰櫕簇高連天貴陽乆客經徂年思親謾想斑衣舞􅀉友空歌伐木篇短􅁂蕭踈夜中老急管哀絲為誰好歛翼樊籠恨巳遲􅁬翮雲霄苦不早􅃡懐􅄀寂巖中人蘿衣􅉅佩芙蓉巾黃精紫芝滿山谷採石不愁倉菌貧淸溪常伴明月夜小洞自報梅花春高閒豈􅀃商山皓綽約真如藐姑神封書逺􅀉貴陽客胡不來歸浪相憶記取靑松澗底枝莫學楊花滿阡陌題施總兵所翁龍君不見所翁所􅀞龍雖􅀞兩目不􅀧瞳曾聞弟子誤落筆即時雷雨飛騰空運精入神奪元化淺夫未識徒驚詫操蛇移山律囘陽世間不獨所翁􅀞高堂四壁生風雲黒雷紫電白晝昏山崩谷䧟屋瓦震雨聲如㵼長平軍頭角峥嵘㡬千丈倐忽神靈露乾象小臣正抱烏號思一堕胡髯不可上視乆眩定凝心神生綃漠漠開嶙峋乃知所翁遺筆迹當年爲寫蒼龍真只今旱􅇵枯原野萬國蒼生望霑灑憑誰拈筆􅀧雙睛一作甘霖遍天下王文成公全書卷之二十九終
