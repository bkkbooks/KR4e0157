front:
  text: 王文成公全書卷之三十三
  hash: sha256:7edf8b7d7f48d50b253f588dcfa85a0fce626d56bbb337b68496d51aaedc3dba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_022-1a}
body:
  text: 附録二年譜二十有四年巳􅆗先生四十八􅀊在江西正月疏謝陞􅄻以三浰九連功􅄻子錦衣衛世襲副千戸上疏辭免謂􅄻子實非常典􅀻心終有未安疾病已纒圖報無日疏入不􅁢疏乞致仕不􅁢以祖母疾亟故也上書王晋溪瓊曰郴衡諸䖏群孽漏殄尚多盖縁進勦之時彼省土兵不甚用命廣兵防夾稍遅是以致此閩中之變亦由積漸所致始扵延平􅁇扵邵武又􅀤扵建寧扵汀漳扵沿海諸衛所􅀅来之禍不可勝言固非迂劣如某所能辦此也又况近日祖母病危日夜痛苦方寸已亂望改授使全首領以歸六月奉敕勘䖏福建叛軍十五日丙子至豐城聞宸濠反遂返吉安起義兵時福州三衛軍人進貴等脇衆謀叛奉敕徃勘以六月􅀄九日啓行十五日午至豐城知縣顧佖迎告濠反先生遂返舟先是寧藩世蓄異志至濠奸惡􅀹甚正徳􅀄與瑾納結嘗風南昌諸生呈舉孝行撫按諸司表奏以張聲譽安成舉人劉養正素有詩文名屈致皷衆株連富民朘剥財産縦大賊閔念四凌十一等四出劫掠以佐妄費按察使陸完因濠器重遂相傾附及為本兵首復護衛􅀣羽翼而濠欲隂入第二子為武宗後其内官閻順等潜至京師􅀤奏朝廷置不問且謫順等孝陵净軍濠益無忌完改吏部王瓊代為本兵度濠必反乃申軍律督責撫臣􅁱武備以待不虞而諸路戒嚴捕盗甚急凌十一繋獄刼逃瓊責期必􅀗濠始恐復風諸生頌巳賢孝挾當道奏之武宗見奏驚曰保官好陞保寕王賢孝欲何為耶是時江彬方寵倖太監張忠欲附彬以傾錢寧聞是言乃宻應曰錢寜􅆇賢交通寜王其意未可測也太監張銳􅀄通濠復用􅀯昌人張儀言附忠彬自固而御史熊蘭居􅀯昌素讐濠少師楊廷和亦欲革䕶衞免患交爲内主上廼令太監􅅊霦傳㫖故事王府奏事人辭見有常今稽違非制於是試御史蕭淮上䟽曰近奉勑㫖王人無事不得延留京師臣有以仰窺陛下㣲意矣臣不忍􅀮黙竊見寜王不遵祖訓包藏禍心多殺無辜横奪民産虐害忠良招納亡命􅀻造兵器潜謀不􅁤交通官校有年如致仕侍􅀰李仕實前鎭守太監畢真及諸前後附􅀔者皆今日亂臣賊子􅀜係宗社安危非細故也􅂉逮繋至京或坐名罷削布政使鄭岳副使胡世寕皆守正䝉害宜亟起用庶㡬人知順逆禍變可彌矣䟽入忠彬等賛之欲内閣䧏勅責鎭廵而給事中徐之鸞御史沈約等又具奏其不法廷和􅂲禍及欲濠上䕶衞自贖同官外廷不知也一日駙馬都尉崔元遣問瓊曰適聞宣召明早赴闕何事瓊問廷和廷和佯驚曰何事瓊㣲􅀏曰公勿欺我廷和忸怩徐曰宣德中有疑于趙嘗命駙馬􅀽泰徃諭竟得釋或此意也明旦瓊至左順門見元領勅謂曰此大事何不廷宣乃留當廷領之勑有曰蕭淮􅀁言關係宗社大計朕念親親不􅃘加兵特遣太監頼義駙馬都尉崔元都御史顔頥夀徃諭革其䕶衞元領勅旣行廷和復令兵部發兵觀變瓊曰此不可􅂥近給事中孫懋易讃建議選兵操江爲江西流賊設備䟽入留中日乆第請如擬行之備兵之方無出此矣廷和黙然㑹濠偵卒林華者聞朝議二三不得實晝夜奔告値濠生辰宴諸司聞言大驚以爲詔使此來必用昔日蔡震擒荆藩故事且舊制凢抄觧宫眷始遣駙馬親臣固不記趙王事也宴罷宻召士實劉吉等謀之飬正曰事急矣明旦諸司入謝即可行事是夜集兵以俟比旦諸司入謝濠出立露䑓宣言于衆曰汝等知大義否都御史孫燧對曰不知濠曰太后有宻㫖令我起兵監􅀦汝保駕否燧曰天無二日民無二王此是大義不知其他濠怒令縳之按察司副使許逵􅀙下大呼曰朝廷所遣大臣反賊敢擅殺耶罵不絶口校尉火信曵出惠民門外同遇害是時日午天忽隂曀遂劫鎮廵諸司下獄奪其印扵是太監王宏御史王金公差主事馬思聰金山布政使胡濂叅政陳杲劉斐叅議許效亷黄宏僉事顧鳳都指揮許清白昻皆在繋思聦宏不食死濠乃偽置官屬以吉暨余欽萬鋭等為太監迎士實為太師先期迎養正南浦驛為國師閔念四等各為都指揮叅政王倫為兵部尚書季斆暨僉事潘鵬師䕫軰俱聽役脇布政使梁宸按察使楊璋副使唐錦都指揮馬驥移咨府部傳檄逺近革年號斥乗輿分遣所親婁伯王春等四出􅀵兵始濠聞武宗嬖伶官臧賢乃遣秦榮就學音樂餽萬金及金絲寳壺一日武宗幸賢賢以壺注酒訝其精澤巧麗曰何􅀙得此賢吐實武宗曰寧叔何不獻我是時小劉新得幸濠失賄深啣之比罷歸小劉咲曰爺爺尚思寧王物寕王不思爺爺物足矣不記薦䟽乎武宗乃益疑忠彬因賛蕭䟽遂及賢賢不知也濠遣人留賢家多􅃨璧外鑰木橱開則長巷後通屋甚􅀮人無覺者有㫖大索賢家林華遽走㑹同舘得馬故速歸􅀄寧獻王臞仙傳惠靖康三王康王乆無子宫人南昌馮氏以成化丁酉生濠康王夣蛇入宫啖人殆盡心惡之􅁒弗舉以内人争免遂匿優人家與秦濚同􅆍䖏稍長􅁋宫中康王憂憤且死不令入訣弘治丙辰襲位通書史歌詞至是謀逆期以八月十五日因入試官吏生校舉事比林華至始促反十九日疏上變濠既􅆷害守臣因劫諸司據㑹城乃悉拘護衛集亡命括丁壮號兵十萬奪運船順下戊寅襲南康知府陳霖等遁已􅆗襲九江兵備曹雷知府汪頴指揮劉勲等遁属縣聞風皆潰濠􅀄謀􅁒徑襲南京遂犯北京故乗勝剋期東下先生聞變返舟値南風急舟弗䏻前乃焚香拜泣告天曰天􅀂哀憫生靈許我匡扶社稷願即反風􅀂無意斯民守仁無生望矣湏􅁷風漸止北帆盡起濠遣内官喻才領兵追急是夜乃與幕士蕭禹雷濟等潜入魚舟得脱然念两京倉卒無備欲沮撓之使遅留旬月扵是故為两廣機宻大牌備兵部咨及都御史顔咨云率領狼逹官兵四十八萬江西公幹令雷濟等飛報揺之濠見檄果疑懼遅延未􅀤先生四晝夜至吉安明日庚辰上䟽告變乃與知府伍文定等計傳檄四方􅁀􅀤逆濠罪状檄列郡起兵以勤王䟽留復命廵按御史謝源伍希儒紀功張疑兵于豐城又故張接濟官軍公移備云兵部咨題准令許㤗郤永分領邉軍四萬􅀙鳳陽陸路進劉暉桂勇分領京邉官軍四萬􅀙徐淮水陸並進王守仁領兵二萬楊旦等領兵八萬陳金等領兵陸萬分道並進尅期夾攻南昌且以原奉機宻勅㫖為據故令各兵徐行待其出城遮擊前後以誤之又為李士實劉養正内應偽書賊􅀅凌十一閔念四投降宻状令濟光等親人計入于濠濠乃留兵㑹城以觀變至七月三日諜知非實乃属宗支栱樤與萬銳等留兵萬餘守南昌遣潘􅉇持檄説安慶季斆􅀃吉安而自與宗支栱栟士實養正等東下賊衆六萬人號十萬以劉吉為監軍王綸叅賛軍務指揮􅁑江為偽都督總一百四十餘隊分五哨出鄱陽過九江令師䕫守之􅀡趨安慶時欽凌等攻圍雖已浹旬知府張文錦守備都指揮楊銳指揮使崔文同守不下按是時廵撫南畿都御史李克嗣飛章告變瓊請㑹議左順門衆觀望猶不敢斥言濠反瓊獨曰竪子素行不義今倉卒舉亂殆不足慮都御史王守仁據上㳺躡之成擒必矣乃􅀙􅀡房頃刻覆十三䟽首請下詔削濠属籍正賊名次請命􅀅出師趨南都命伯方夀祥防江都御史俞諌率淮兵翊南都尚書王鴻儒主給餉次請命守仁率南贛兵由臨吉都御史秦金率湖兵由荆瑞㑹南昌充嗣鎮鎮江許廷光鎮浙江叢蘭鎮儀真遏賊衝􅀓檄江西諸路但有忠臣義士􅀎倡義旅以擒反者封侯又請南京守備操江武職并五府掌印僉書官各自陳取上裁務在得人以固根本詔悉􅀙之先生在吉安守益趨見曰聞濠誘葉芳兵夾攻吉安先生曰芳必不叛諸賊舊以茅為屋叛則焚之我過其巢許其伐鉅木創屋萬餘今其黨各千餘不肯焚矣益曰彼􅀙濠望封拜可以尋常計乎先生黙然良乆曰天下盡反我軰固當如此做益惕然一時胸中利害如洗次早復見曰昨夜思之濠􅀂遣逮老父柰何已遣報之急避他所壬午再告變叛黨方盛恐中途有阻故再上疏乞便道省􅁙不乆先生起兵未奉成命上便道省葬疏意示遭變暫留姑為牽制攻討俟命師之至即􅀙􅀄心時奉㫖着督兵討賊所奏省親事待賊平之日来説疏上偽檄六月二十二日叅政季斆同南昌府學教授趙承芳旗校十二人齎偽檄榜諭吉安府至墨潭領哨官縳送軍門先生即固封以進其疏畧曰陛下在位一十四年屢經變難民心騷動尚爾廵逰不已致使宗室謀動干戈冀􅀼大寳且今天下之覬覦豈特一寧王天下之奸雄豈特在宗室言念及此懔骨寒心昔漢武帝有輪臺之悔而天下向治唐徳宗下奉天之詔而士民感泣伏望皇上痛自克責易轍改絃罷出奸䛕以回天下豪傑之心絶迹廵逰以杜天下奸雄之望則太平尚有可圖群臣不勝幸甚甲辰義兵􅀤吉安丙午大㑹于樟􅀣已酉誓師庚戍次市􅆜辛亥㧞南昌先生聞濠兵既出乃促列郡兵尅期㑹于樟􅀣自督知府伍文定等及通判談儲推官王暐以十三日甲辰􅀤吉安扵是臨江知府戴徳孺􅀽州知府徐璉贛州知府邢珣瑞州通判胡尭元童􅄾南安推官徐文英贛州都指揮余恩新淦知縣李美㤗和知縣李楫寕都知縣王天與萬安知縣黄冕各以其兵来赴已酉誓師于樟􅀣次豐城諜知賊設伏于新舊厰以爲省城之應乃遣奉新知縣劉守緒領兵􅀙間道夜襲破之庚戍􅀤市􅆜分布既定薄暮齊􅀤辛亥􅀺明各至信地先是城中為備甚嚴及厰賊潰奔入城一城皆驚又見我師驟集益奪其氣衆乗之呼譟梯絙而登遂入城擒栱樤萬銳等千有餘人所遺宫眷縦火自焚先生乃撫定居民分釋脇􅀙封府庫􅀵印信人心始寧扵是胡濓劉裴許效亷唐錦頼鳳王玘等皆自投首􅀄㑹兵樟􅀣衆以安慶􅀍圍急宜引兵赴之先生曰今南康九江皆為賊據我兵􅀂越二城􅀡趨安慶賊必囬軍死闘是我腹背受敵也莫若先破南昌賊失内據􅀔必歸援如此則安慶之圍自解而賊成擒矣卒如計云遂促兵追濠甲寅始接戰乙􅆗戰于黄家渡丙辰戰于八字腦丁已􅀗濠樵舎江西平􅀄濠聞南昌告急即􅁒歸援遂解安慶圍移沅子港先分兵二萬趨南昌身旋􅁇之二十二日先生偵知其故問衆計安出多以賊􅀔强盛宜堅壁觀釁徐圖進止先生曰賊􅀔雖强未逄大敵惟以爵賞誘人今進不得逞退無所歸衆巳消沮若出竒擊惰不戰自潰所謂先人有奪人之氣也㑹撫州知府陳槐進賢知縣劉源清提兵亦至乃遣伍文定邢珣徐璉戴徳孺各領兵五百分道並進撃其不意又遣余恩以兵四百徃来湖上誘致之陳槐胡尭元童􅄾談儲王暐徐文英李美李揖王冕王軾劉守緒劉源清等各引兵百餘四面張疑設伏候文定等合撃之分布既定甲寅乗夜急進文定以正兵當賊鋒恩繼之珣遶出賊後璉徳孺張两翼以分其􅀔乙􅆗賊兵皷譟乗風逼黄家渡􅂔驕甚文定恩佯北以致之賊争趨利前後不相及珣從後横擊􅀡貰其中文定恩乗之夾以兩翼四面伏起賊大潰退保八字腦濠懼厚賞勇者且令盡􅀤九江南康守城兵益之是日建昌知府曽璵兵亦至先生以為九江不破則湖無外援南康不復則我難後躡乃遣槐領兵四百合饒州知府林瑊兵攻九江以廣信知府周朝佐取南康丙辰賊復併力挑戰我兵少􅁍文定立鋭砲間火燎其􅂡殊死戰砲入濠副舟賊大敗擒斬二千餘溺死者無算乃聚樵舎連舟為方陣盡出金銀賞士先生乃宻為火攻具使珣擊其左璉徳孺出其右恩等設伏期火􅀤以合丁巳濠方晨朝群臣責不用命者􅀅引出斬之争論未决我兵掩至火及濠副舟衆遂奔散妃嬪與濠泣别多赴水死濠為知縣王冕所執與其世子眷屬及偽黨士實養正劉吉余欽王綸熊瓊盧衍盧橫丁樻王春吳十三秦榮􅁑江劉勲何塘王行呉七火信等數百復執脇從官王宏王金楊璋金山王疇程杲潘鵬梁宸郟文馬驥白昻等擒斬三千落水二萬餘衣甲器械財物與浮尸横十餘里餘賊數百艘逃潰乃分兵追剿戊午及于昌邑大破之至呉城復斬擒千餘死水中殆盡已未得槐等報各擒斬復千餘盖自起兵至破賊曾不旬日紀功凡一萬一千有竒􅀄先生屢䟽力疾赴閩値寧藩變臣子義不容舎又闔省方面並無一人事􅀔㡬㑹閒不容髪故復圖爲牽制攻守以俟命師之至䟽入未報即以捷聞洪嘗見龍光述張疑行間事甚悉嘗問曰事濟否先生曰未論濟與不濟且言疑與不疑光曰疑固不免曰但得渠一疑事濟矣後遇河圖爲武林驛丞又言公􅁒稽留宸濠何時非間何事非間嘗問光曰曾㑹劉養正否光對曰熟識即使光行間移養正家屬城内善飲食之縳齎檄人欲斬濟躡足遂不問一日􅀤牌票二百餘左右莫知所徃臨省城先以順逆禍福之理諭官民聞銳與瑞昌王助逆遣其心腹胡景􅂭招囬各兵以􅄐其黨人徒見成功之易而不知其伐謀之神也黄弘綱聞安吉居人疑曰王公之戈未知何向亟入告先生􅀏而不答出兵誓師斬失律者殉營中軍士股慄不敢仰視不知即前齎檄人也後賊平張許謗議百出天下是非益亂非先生自信于心烏􅀎遽白㢤先是先生思豫備㑹汀漳兵備僉事周期雍以公事抵贛知可與謀且官異省屏左右語之雍歸即隂募驍勇部勒以俟故晨奉檄而夕就道福建左布政使席書嶺東兵備僉事王大用亦以兵来道聞賊平乃還致仕都御史林俊聞變夜範錫為佛狼機銃并火藥法遣僕􅀙間道来遺勉以討賊先生入城日坐都察院開中門令可見前後對士友論學不輙報至即登堂遣之有言伍焚髪状暫如側席遣牌斬之還坐衆咸色怖驚問先生曰適聞對敵小􅁍此兵家常事不􅁕介意後聞濠已擒問故行賞訖還坐咸色喜驚問先生曰適聞寧王已擒想不偽但傷死者衆耳理前語如常傍觀者服其學濠就擒乗馬入望見逺近街衢行伍整肅笑曰此我家事何勞費心如此一見先生輙託曰婁妃賢妃也自始事至今苦諌未納適投水死望遣葬之比使徃果得屍盖周身皆􅁓䋲内結極易辯婁爲諒女有家學故䖏變􅀎自全八月疏諌親征是時兵部㑹議命將討賊武宗詔曰不必命􅀅朕當親率六師奉天征討扵是假威武大􅀅軍鎮􅀦公行事命太監張永張忠安邉伯許㤗都督劉暉率京邉官軍萬餘給事祝續御史張綸隨軍紀功雖捷音久上不􅀤皆云元悪雖擒逆黨未盡不捕必遺後患先生具䟽諌止畧曰臣扵告變之後選􅀅集兵振威􅀭武先攻省城虚其巢穴􅁇戰鄱湖撃其惰歸今宸濠已擒謀黨已􅀗􅀙賊已掃閩廣赴調軍士已散地方驚攪之民已帖􅀼惟宸濠擅作辟威睥睨神器隂謀乆蓄招納叛亡輦轂之動静探無遺跡廣置姦細臣下之奏白百不一通􅀤謀之始逆料大駕必􅀅親征先扵沿途伏有姦黨期為􅀶浪荆軻之謀今逆不旋踵遂已成摛法宜解赴闕門式昭天討然欲付之部下各官誠恐潜布之徒乗隙􅀼􅀤􅂉虞意外臣死有餘憾矣盖時事方艱賊雖擒亂未已也是月疏免江西稅益王淮王餉軍留朝覲官恤重刑以實軍伍䖏置署印府縣􅀙逆人叅九江南康矢事便道省葬前後凡九上再乞便道省葬不􅁢與王􅀳溪書曰始懇疏乞歸以祖母鞠育之恩思一面爲訣後竟牽滯兵戈不及一見卒抱終天之痛今老父衰疾又復日亟而地方已幸無事何惜一舉手投足之勞而不以曲全之乎九月壬寅獻俘錢塘以病留九月十一日先生獻俘􅀤南昌忠㤗等􅁒追還之議􅀅縦之鄱湖俟武宗親與遇戰而後奏凱論功連遣人追至廣信先生不聼乗夜過玉山草萍驛張永􅀱扵杭先生見永謂曰江西之民乆遭濠毒今經大亂􅁇以旱災又供京邉軍餉困苦既極必逃聚山谷爲亂昔助濠尚爲脇􅀙今爲窮迫所激奸黨群起天下遂成土崩之􅀔至是興兵定亂不亦難乎永深然之乃徐曰吾之此出爲群小在君側􅁒調護左右以黙輔聖躬非爲掩功来也但皇上順其意而行猶可挽囬萬一􅀂逆其意徒激群小之怒無救扵天下大計矣扵是先生信其無他以濠付之稱病西湖浄慈寺武宗嘗以威武大􅀅軍牌遣錦衣千戸追取宸濠先生不肯出迎三司苦勸先生曰人子扵父母亂命􅀂可告語當涕泣以􅀙􅃘􅀙䛕乎不得已令叅隨􅀒勅同迎以入有司問勞錦衣禮先生曰止可五金錦衣怒不納次日来辭先生執其手曰我在正徳間下錦衣獄甚乆未見輕財重義有如公者昨薄物出區區意只求備禮聞公不納令我惶愧我無他長止善作文字他日當為表章令錦衣知有公也扵是復再拜以謝其人竟不䏻出他語而别奉勅兼廵撫江西十一月返江西先生稱病欲堅卧不出聞武宗南廵已至淮􅀭群姦在側人情洶洶不得已􅀙京口􅀅徑趨行在大學士楊一清固止之㑹奉㫖兼廵撫江西遂􅀙湖口還忠等方挾宸濠搜羅百出軍馬屯聚糜費不堪續綸等望風附㑹肆為飛語時論不平先生既還南昌北軍肆坐慢罵􅂉故衝導起釁先生一不爲動務待以禮豫令廵捕官諭市人移家于鄉而以老羸􅀿門始欲犒賞北軍㤗等預禁之令勿受乃傳示内外諭北軍離家苦楚居民當敦主客禮毎出遇北軍喪必停車問故厚與之櫬嗟嘆乃去乆之北軍咸服㑹冬至節近預令城市舉奠時新經濠亂哭亡酹酒者聲聞不絶北軍無不思家泣下求歸先生與忠等語不稍狥漸巳知畏忠㤗自居所長與先生較射于教塲中意先生必大屈先生勉應之三􅀤三中毎一中北軍在傍哄然舉手嘖嘖忠㤗大懼曰我軍皆附王都耶遂班師十有五年庚辰先生四十九􅀊在江西正月赴召次蕪湖尋得㫖返江西忠㤗在南都讒先生必反惟張永持正保全之武宗問忠等曰以何驗反對曰召必不至有詔面見先生即行忠等恐語相違復拒之蕪湖半月不得已入九華山毎日宴坐草菴中適武宗遣人覘之曰王守仁學道人也召之即至安得反乎乃有返江西之命始忠等屢矯偽命先生不赴至是永有幕士順天檢校錢秉􅀡急遣報故得實先生赴召至上新河為諸幸讒阻不得見中夜黙坐見水波拍岸泊泊有聲思曰以一身􅂪謗死即死耳如老親何謂門人曰此時􅀂有一孔可以竊父而逃吾亦終身長徃不悔矣江彬欲不利扵先生先生􅀻計彬有他即計執彬武宗前數其圖危宗社罪以死相抵亦稍償天下之忿徐得永解其後刑部判彬有曰虎旅夜驚巳幸􅃦謀于牛首宫車宴駕那堪遺恨扵豹房􅀂代先生言之者以晦日重過開先寺留石刻讀書臺後詞曰正徳已􅆗六月乙亥寧藩濠以南昌叛稱兵向闕破南康九江攻安慶逺近震動七月辛亥臣守仁以列郡之兵復南昌宸濠擒餘黨悉定當此時天子聞變赫怒親統六師臨討遂俘宸濠以歸扵赫皇威神武不殺如霆之震靡擊而折神器有歸孰敢窺竊天鑒扵宸濠式昭皇靈嘉靖我􅀖國正徳庚辰正月晦提督軍務都御史王守仁書􅀙征官屬列扵左方明日逰白鹿洞徘徊久之多所題識二月如九江先生以車駕未還京心懐憂惶是月出觀兵九江因逰東林天池講經臺諸䖏是月還南昌三月請寛租江西自巳􅆗三月不雨至七月禾苗枯死􅁇遭濠亂小民乗􅂩爲亂先生盡心安戢許乞優恤至是部使數至督促日迫先生上䟽畧曰日者流移之民聞官軍􅀅去稍稍脇息延望歸㝷故業足未入境而頸巳繋扵追求者之手矣夫荒旱極矣而因之以變亂變亂極矣而又加之以師旅師旅極矣而又加之以供饋益之以誅求亟之以徴歛當是之時有目者不􅃘􅀚有耳者不􅃘聞又􅀙而其膏血有人心者尚􅃘乎寛恤之虚文不􅀂蠲租之實惠賑濟之難及不若免税之易行今不免租稅不息誅求而徒曰寛恤賑濟是奪其口中之食而曰吾􅀅療汝之饑刳其腹腎之肉而曰吾􅀅救汝之死凢有血氣者皆􅀅不信之矣按是年與廵按御史唐龍朱節上䟽計䖏寕藩變産官銀代民上納民困稍蘓三䟽省葬不􅁢五月江西大水疏自劾是年四月江西大水漂溺公􅀻廬􅃕田野崩䧟先生上疏自劾四罪且曰自春入夏雨水連綿江湖漲溢經月不退自贛吉臨瑞廣撫南昌九江南康沿江諸路無不􅀍害􅁰苗淪沒室廬漂蕩魚鱉之民聚棲扵木杪商旅之舟經行扵閭巷潰城决堤千里為壑烟火㫁絶惟聞哭聲詢之父老皆謂數十年所未有也伏惟皇上軫災恤變别選賢􅀎代臣廵撫即不以臣為顯戮削其禄秩黜還田里以爲人臣不職之戒庶亦有位知警民困可息天變可弭人怒可泄而臣亦死無憾矣按是時武宗猶覊南畿進諌無由姑叙地方災異以自劾冀君心開悟而加意􅀺元也六月如贛十四日􅀙章口入玉笥大秀宫十五日宿雲儲十八日至吉安逰青原山和黄山谷詩遂書碑行至泰和少宰羅欽順以書問學先生答曰来教訓某大學古本之復以人之學但當求之扵内而程朱格物之説不免求之扵外遂去朱子之分章而削其所􅀘之傳非敢然也學豈有内外乎大學古本乃孔門相傳舊本耳朱子疑其有脱誤而改正􅀘緝之在某則謂其本無脱誤悉􅀙其舊而已矣失在過信孔子則有之非故去朱子之分章而削其傳也夫學貴得之心求之扵心而非也雖其言之出扵孔子不敢以爲是也而况其未及孔子者乎求之扵心而是也雖其言之出扵庸常不敢以爲非也而况其出扵孔子者乎且舊本之傳數千載矣今讀其文辭既明白而可通論其功夫又易簡而可入亦何所按據而㫁其此叚之必在扵彼彼叚之必在扵此與此之如何而缺彼之如何而誤而遂改正􅀘緝之無乃重扵背朱而輕扵叛孔已乎来教謂如必以學不資扵外求但當反觀内省以為務則正心誠意四字亦何不盡之有何必入門之際使困以格物一叚工夫也誠然誠然􅀂語其要則脩身二字亦足矣何必又言正心正心二字亦足矣何必又言誠意誠意二字亦足矣何必又言致知又言格物惟其工夫之詳宻而要之只是一事所以為精一之學此正不可不思者也夫理無内外性無内外故學無内外講習討論未甞非内也反觀内省未甞遺外也夫謂學必資扵外求是以已性爲有外也是義外也用智者也謂反觀内省爲求之扵内是以已性爲有内也是有我也自􅀻者也是皆不知性之無内外也故曰精義入神以致用也利用安身以崇徳也性之徳也合内外之道也此可以知格物之學矣格物者大學之實下手䖏徹首徹尾自始學至聖人只此工夫而已非但入門之際有此一叚也夫正心誠意致知格物皆所以􅁱身而格物者其所以用力日可見之地故格物者格其心之物也格其意之物也格其知之物也正心者正其物之心也誠意者誠其物之意也致知者致其物之知也此豈有内外彼此之分㢤理一而已以其理之凝聚而言則謂之性以其主宰而言則謂之心以其主宰之􅀤動而言則謂之意以其􅀤動之明覺而言則謂之知以其明覺之感􅀿而言則謂之物故就物而言謂之格就知而言謂之致就意而言謂之誠就心而言謂之正正者正此也誠者誠此也致者致此也格者格此也皆所謂窮理以盡性也天下無性外之理無性外之物學之不明皆由世之儒者認理爲外認物為外而不知義外之説孟子盖嘗闢之乃至襲䧟其内而不覺豈非亦有似是而難明者歟不可以不察也凡執事􅀁以致疑扵格物之説者必謂其是内而非外也必謂其專事扵反觀内省之為而遺棄其講習討論之功也必謂其一意扵綱領本原之約而脱畧扵支條節目之詳也必謂其沉溺扵枯槁虚寂之偏而不盡扵物理人事之變也審如是豈但􅀗罪扵聖門􅀗罪扵朱子是邪説誣民叛道亂正人得而誅之也而况扵執事之正􅀡㢤審如是世之稍明訓詁聞先哲之緒綸者皆知其非也而况執事之髙明乎㢤凢某之􅀁謂格物其扵朱子九條之説皆包羅統括扵其中但為之有要作用不同正所謂毫􅁵之差耳然毫􅁵之差而千里之謬實起扵此不可不辯是月至贛先生至贛大閱士卒教戰法江彬遣人来覘動静相知者俱請囬省無蹈危疑先生不從作啾啾吟解之有曰東家老翁防虎患虎夜入室㗸其頭西家小兒不識虎持竿驅虎如驅牛且曰吾在此與童子歌詩習禮有何可疑門人陳九川等亦以為言先生曰公等何不講學吾昔在省城䖏權竪禍在目前吾亦帖然縦有大變亦避不得吾所以不輕動者亦有深慮焉耳洪昔葺師疏便道歸省與再報濠反疏同日而上心疑之豈當􅀦家危急存亡之日而暇及此也當是時倡義興師濠且旦夕擒矣猶疏請命􅀅出師􅀂身不與其事者至諌止親征䟽乃嘆古人䖏成功之際難矣㢤七月重上江西捷音武宗留南都既乆群黨􅁒自獻俘襲功張永曰不可昔未出京宸濠已擒獻俘北上過玉山渡錢塘經人耳目不可襲也扵是以大􅀅軍鈞帖令重上捷音先生乃節畧前奏入諸人名于䟽内再上之始議北旋尚書霍韜曰是役也罪人已執猶動衆出師地方已寧乃殺民奏捷誤先朝扵過舉揺􅀦是扵􅀅危盖忠泰之攘功賊義厥罪滔天而續綸之詭隨敗􅀋其黨惡不才亦甚矣御史􅀺龍曰平藩事不難于成功而難扵倡義盖以逆濠之反實有内應人懐觀望而一時勤王諸臣皆􅂢軀亡家以赴􅀦難其後忌者搆為飛語欲甘心之人心何由服乎後有事變誰復肯任之者費文獻公宏送張永還朝序曰兹行也定禍亂而不必功出扵已開主知而不使過歸乎上節財用不欲久困乎民扶善􅀋而不􅁒罪移非辜且先是􅀤瑾罪狀首以規護衛為言實以逆謀之成萌扵護衛之復其早辯預防非有體􅀦愛民之心不􅀎及此洪謂平藩事不難扵倡義而難扵䖏忠㤗之變盖忠㤗挾天子以偕亂莫敢誰何豹房之謀無日不在畏即㨿上㳺不敢騁卒􅀎保乗輿還宫以􅁸世宗之正始開先勒石所謂神器有歸孰敢窺􅀼又曰嘉靖我􅀖􅀦則改元之兆先徴扵兹矣噫豈偶然㢤先生在贛時有言萬安上下多武士者先生令叅隨徃紀之命之曰但多膂力不問武藝已而得三百餘人龍光問曰宸濠既平紀此何為曰吾聞交阯有内難出其不意而搗之一機㑹也後二十年有登庸之役人皆相傳先生有預事謀而不知當時計有􅀁在也八月咨部院雪冀元亨􅁈狀先是宸濠􅄃結名士助已凢仕江右者多􅂭禮際武陵冀元亨為公子正憲師忠信可託故遣徃謝徉與濠論學濠大咲曰人癡乃至此耶立與絶比返贛述故先生曰禍在兹矣乃衛之間道歸及是張許等索釁不得遂建元亨備受考掠無片語阿順扵是科道交疏論辯先生備咨部院白其􅁈世宗登極詔􅀅釋前已得疾後五日卒扵獄同門陸澄􅀿典軰備棺殮訃聞先生爲位慟哭之元亨字惟乹舉鄉試其學以務實不欺為主而謹扵一念在獄視諸囚不異一體諸囚日涕泣至是稍稍聽學自慰湖廣逮其家妻李與二女俱不怖曰吾夫平生尊師講學肯有他乎手治麻枲不輟暇則誦書歌詩事白守者􅁒出之李曰不見吾夫何歸按察諸僚婦欲相㑹辭不敢赴已乃潔一室就視則囚服不釋麻枲有問者答曰吾夫之學不出閨門袵席間聞者悚愧元亨既卒先生移文恤其家羅洪先贈女兄夫周汝方序畧曰憶龍岡嘗自贛病歸附廬陵劉子吉舟劉與陽明先生素厚善曽母死徃請墓誌實濠事暗相邀結不合而返至舟顧龍岡呻吟昏瞀意其熟􅆍也呼門人王儲嘆曰􅀄意專􅀝陽明两日數調以言􅀂不喻意更不得一肯綮不上此船明矣此事􅀅遂巳乎且吾安得以一身當重擔也儲拱手曰先生氣弱今天下屬先生先生安􅀁退託陽明何足爲有無㢤劉曰是固在我多得數人更好陽明曾經用兵爾儲曰先生以陽明為才乎吾見其怯也劉曰誠然贛州峒賊髦頭耳乃終日練兵􅀂對大敵何其張皇㢤相與大笑而罷龍岡反舎語予􅀂此已􅆗二月也其年六月濠反子吉與儲附之七月陽明先生以兵討賊八月俘濠是時議者紛然予與龍岡􅀼嘆莫􅀎辯比見詆先生者問之曰吾惡其言是而行非盖其偽也龍岡舌尚在至京師見四方人士猶有為前言者否乎盍以語予者語之其後養正既死先生過吉安令有司葬其母復為文以奠辭曰嗟嗟劉生子吉母死不葬爰及干戈一念之差遂至于此嗚呼哀㢤今吾葬子之母聊以慰子之魂盖君臣之義雖不得􅀻于子之身而朋友之情猶得以盡扵子之母也嗚呼哀哉其事在是年六月閏八月四疏省葬不􅁢􅀄先生在贛聞祖母岑太夫人訃及海日翁病欲上䟽乞歸㑹有福州之命比中途遭變疏請命􅀅討賊因乞省葬朝廷許以賊平之日来説至是凢四請嘗聞海日翁病危􅁒棄職逃歸後報平復乃止一日問諸友曰我􅁒逃囬何無一人賛行門人周仲曰先生思歸一念亦似着相先生良乆曰此相安􅀎不着九月還南昌先生再至南昌武宗駕尚未還宫百姓嗷嗷乃興新府工役檄各院道取濠廢地逆産改造貿易以濟饑代税境内稍甦甞遺守益書曰自到省城政務紛錯不復有相講習如􅐚中者雖自已舵柄不敢放手而灘流悍急湏仗有力如吾謙之者持篙而来庶􅀎相助更上一難耳㤗州王銀服古冠服執木簡以二詩為贄請見先生異其人降階迎之既上坐問何冠曰有虞氏冠問何服曰老莱子服曰學老莱子乎曰然曰將止學服其服未學上堂詐趺掩面啼哭也銀色動坐漸側及論致知格物悟曰吾人之學飾情抗節矯諸外先生之學精深極微得之心者也遂反服執弟子禮先生易其名為艮字以汝止進賢舒芬以翰林謫官市舶自恃慱學見先生問律吕先生不答且問元聲對曰元聲制度頗詳特未置宻室經試耳先生曰元聲豈得之管􅁅􅁰石間㢤心得養則氣自和元氣􅀁由出也書云詩言志志即是樂之本歌永言歌即是制律之本永言和聲俱本扵歌歌本扵心故心也者中和之極也芬遂躍然拜弟子是時陳九川夏良勝萬潮歐陽徳魏良弼李遂舒芬及裘衍日侍講席而廵按御史唐龍督學僉事邵鋭皆守舊學相疑唐復以徹講擇交相勸先生答曰吾真見得良知人人􅀁同特學者未得啓悟故甘隨俗習非今苟以是心至吾又為一身疑謗拒不與言于心􅃘乎求真才者譬之淘沙而得金非不知沙之汰者十去八九然未􅀎舎沙以求金為也當唐邵之疑人多畏避見同門方巾中衣而来者俱指為異物獨王臣魏良政良器鍾文奎吳子金等挺然不變相依而􅁸者日衆十有六年辛巳先生五十􅀊在江西正月居南昌是年先生始掲致良知之教先生聞前月十日武宗駕入宫始舒憂念自經宸濠忠泰之變益信良知真足以忘患難出生死􅀁謂考三王建天地質􅀑神俟後聖無弗同者乃遺書守益曰近来信得致良知三字真聖門正法眼藏徃年尚疑未盡今自多事以来只此良知無不具足譬之操舟得舵平瀾淺瀬無不如意雖遇顛風逆浪舵柄在手可免沒溺之患矣一日先生喟然􅀤嘆九川問曰先生何嘆也曰此理簡易明白􅀂此乃一經沉埋數百年九川曰亦為宋儒􅀙知解上入認識神為性體故聞見日益障道日深耳今先生拈出良知二字此古今人人真靣目更復奚疑先生曰然譬之人有冐别姓墳墓為祖墓者何以為辯只得開壙􅀅子孫滴血真偽無可逃矣我此良知二字實千古聖聖相傳一􅀧滴骨血也又曰某扵此良知之説􅀙百死千難中得来不得巳與人一口說盡只恐學者得之容易把作一種光景玩弄不實落用功􅀒此知耳先生自南都以来凢示學者皆令存天理去人欲以爲本有問所謂則令自求之未嘗指天理爲何如也間語友人曰近欲􅀤揮此只覺有一言􅀤不出津津然如含諸口莫􅀎相度乆乃曰近覺得此學更無有他只是這些子了比更無餘矣旁有徤羡不已者則又曰連這些子亦無放䖏今經變後始有良知之説録陸􅁚山子孫先生以􅁚山得孔孟正傳其學術乆抑而未彰文廟尚缺配享之典子孫未沾褒崇之澤牌行撫州府金谿縣官吏􅀅陸氏嫡􅂀子孫彷各䖏聖賢子孫事例免其差役有俊秀子弟具名提學道送學肄業按􅁚山與晦翁同時講學自天下崇朱説而陸學遂泯先生刻象山文集為序以表彰之席元山甞聞先生論學扵龍塲深病陸學不顯作鳴􅁈録以􅀉先生稱其身任斯道庶幾天下非之而不顧五月集門人扵白鹿洞是月先生有歸志欲同門乆聚共明此學適南昌府知府呉嘉聰欲成府誌時蔡宗兖為南康府教授主白鹿洞事遂使開局扵洞中集夏良勝舒芬萬潮陳九川同事焉先生遺書促鄒守益曰醉翁之意盖有在不專以此煩勞也區區歸遁有日聖天子新政英明如謙之亦宜束装北上此㑹宜急圖之不當徐徐而来也庚辰春甘泉湛先生避地髪􅂂塜下與霍兀厓韜方叔賢同時家居為㑹先生聞之曰英賢之生何幸同時共地又可虚度光隂失此機㑹耶是秋兀厓過洪都論大學輙持舊見先生曰􅀂傳習書史考正古今以廣吾見聞則可􅀂􅁒以是求得入聖門路譬之採摘枝葉以綴本根而􅁒通其血脉盖亦難矣至是甘泉􅀉示學庸測叔賢寄大學洪範先生遺書甘泉曰隨意體認天理是真實不誑語究兄命意􅀤端􅁍有毫􅁵未恊􅁱齊治平總是格物但􅁒如此節節分䟽亦􅁴􅀃話太多且語意務為簡古比之本文反更深晦莫􅀂淺易其詞畧指路徑使人自思得之更覺意味深長也遺書叔賢曰道一而已論其大本一原則六經四書無不可推之而同者又不特洪範之扵大學而已譬之草木其同者生意也其花實之疏宻枝葉之髙下亦􅁒盡比而同之吾恐化工不如是之雕刻也君子論學固惟是之從非以必同為貴至扵入門下手䖏則有不容扵不辯者先是倫彦式以訓嘗過䖍中問學是月遣弟以諒遺書問曰學無静根感物易動䖏事多悔如何先生曰三言者病亦相因惟學而别求静根故感物而懼其易動感物而懼其易動足故䖏事而多悔也心無動静者也故君子之學其静也常覺而未嘗無也故常􅀿常寂動静皆有事焉是之謂集義集義故䏻無祇悔所謂動亦定静亦定者也心一而已静其體也而復求静根焉是撓其體也動其用也而懼其易動焉是廢其用也故求静之心即動也惡動之心非静也是之謂動亦動静亦動􅀅迎起伏相迎扵無窮矣故循理之謂静􅀙􅁒之謂動六月赴内召尋止之陞南京兵部尚書叅賛機務遂疏乞便道省葬六月十六日奉世宗敕㫖以爾昔䏻勦平亂賊安静地方朝廷新政之􅀄特兹召用敕至爾可馳驛来京毋􅂉稽遅先生即扵是月二十日􅁸程道由錢塘輔臣阻之潜諷科道建言以為朝廷新政武宗􅀦䘮資費浩繁不宜行宴賞之事先生至錢塘上疏懇乞便道歸省朝廷准令歸省陞南京兵部尚書叅賛機務按乞歸省䟽畧曰臣自两年以来四上歸省奏皆以親老多病懇乞暫歸省視復權姦讒嫉恐罹曖昧之禍故其時雖以暫歸爲請而實有終身丘壑之念矣既而天啓神聖入承大統親賢任舊向之爲讒嫉者皆以誅斥陽徳興而公道顯臣扵斯時􅀂出䧟穽而登之春臺也豈不欲朝􅀤夕至一快其拜舞踴躍之􅀻乎顧臣父老且病頃遭讒搆朝夕常有父子不相見之痛今幸脫洗殃咎復覩天日父子之情固思一見顔面以叙其悲􅆭離隔之懐况臣取道錢塘迂程鄉土止有一日此在親交之厚􅀅不䏻巳扵情而况父子乎然不以之明請扵朝而􅀻􅀼行之是欺君也懼稽延之戮而􅃘割情扵􅀁生是忘父也欺君者不忠忘父者不孝故臣敢冐罪以請與陸澄論養生京中人回聞以多病之故􅀅􅀙事扵養生區區徃年盖嘗斃力扵此矣後乃知養徳養身只是一事元静所云真我者果䏻戒謹恐懼而專心扵是則神住氣住精住而仙家所謂長生乆視之説亦在其中矣老子彭籛之徒乃其禀賦有􅀂此者非可以學而至後世如白玉蟾丘長春之屬皆是彼所稱述以為祖師者其得夀皆不過五六十則􅀁謂長生之説當必有所指也元静氣弱多病但宜清心寡慾一意聖賢如前􅀁謂真我之􅀃不宜輕信異道徒自惑亂聰明斃精竭神無益也八月至越九月歸餘姚省祖塋先生歸省祖塋訪瑞雲樓指藏胎衣地抆淚乆之盖痛母生不及養祖母死不及殮也日與宗族親友宴逰隨地指示良知徳洪昔聞先生講學江右乆思及門鄉中故老猶執先生徃跡為疑洪獨潜伺動支深信之乃排衆議請親命率二姪大經􅀿􅀭及鄭寅俞大本因王正心通贄請見明日夏淳范引年吳仁柴鳳孫􅀿奎諸陽徐􅃢管州谷鍾秀黄文煥周于徳楊珂等凢七十四人十有二月封新建伯制曰江西反賊勦平地方安定各該官員功績顯著你部裏既㑹官集議分别等第明白王守仁封新建伯奉天翊衛推誠宣力守正文臣特進光禄大夫柱􅀦還兼两京兵部尚書照舊叅賛機務嵗支禄米壹千石三代并妻一體追封給與誥劵子孫世世承襲正徳十六年十二月十九日准兵部吏部題差行人齎白金文綺慰勞兼下温㫖存問父華扵家賜以羊酒至日適海日翁誕辰親朋咸集先生捧觴為夀翁蹙然曰寧濠之變皆以汝為死矣而不死皆以事難平矣而卒平䜛搆朋興禍機四􅀤前後二年岌乎知不免矣天開日月顯忠遂良穹官高爵濫冐封賞父子復相見扵一堂茲非其幸歟然盛者衰之始福者禍之基雖以爲幸又以為懼也先生洗爵而跪曰大人之教兒所日夜切心者也聞者皆歎㑹遇之隆感􅄹成之戒
