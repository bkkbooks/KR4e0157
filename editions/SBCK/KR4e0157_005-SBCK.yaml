臣俱經行江西廣東湖廣各道兵備守巡等官一體欽遵調取官軍兵快尅期夾攻及咨巡撫江西都御史孫燧并行巡按御史屠僑各查照外續㩀領兵縣丞舒富等呈稱各輋賊首聞知湖廣土兵將到集衆㩀險四出殺掠猖熾日甚乞爲急䖏等因到臣當將進兵機宜督同兵備副使楊璋分守􅂙議黄宏統兵知府等官邢珣等議得桶岡横水左溪諸賊荼毒三省其患雖同而事􅀔各異以湖廣言之則桶岡諸巢爲賊之咽喉而横水左溪諸巢爲之腹心以江西言之則横水左溪諸巢為賊之腹心而桶岡諸巢為之羽翼今不先去横水左溪腹心之患而􅁒與湖廣夾攻桶岡進兵兩宼之間腹背受敵􅀔必不利今議者紛紛皆以為必湏先攻桶岡而湖廣尅期乃在十一月􅀄一日賊見我兵未集而師期尚逺且以為必先桶岡􅀔必觀望未備今若出其不意進兵速擊可以得志已破横水左溪移兵而臨桶岡破竹之􅀔篾不濟矣於是臣等乃决意先攻横水左溪宻切分布哨道使都指揮僉事許清率兵千餘自南康縣所溪入知府邢珣率兵千餘自上猶縣石人坑入知縣王天與率兵千餘自上猶縣白面入令其皆㑹横水使守備指揮郟文率兵千餘自大􅁃縣義安入知府唐淳率兵千餘自大􅁃縣聶都入知府季斆率兵千餘自大􅁃縣穩下入縣丞舒富率兵千餘自上猶縣金坑入令其皆會左溪知府伍文定知縣張戬􅀱各兵齊集令其亦從上猶南康分入以遏奔衝臣亦親率兵千餘自南康進屯至坪期􅀡搗横水以與諸軍㑹而使兵備副使楊璋分守􅂙議黄宏􅁥督各營官兵徃来給餉以促其後分布既定乃於十月􅀄七日夜各哨齊發􅀄九日臣兵至南康􅀄十日進屯至坪使間諜四路分探皆以為諸賊不虞官兵猝進各巢皆鳴鑼聚衆􅰯来呼噪奔走為分投禦敵之狀􅀔甚張皇然巳於各險隘皆設有滚木礧石度此時賊已㩀險􅀔未可近臣兵乗夜遂進十一日小餉未至賊巢三十里止舎使人伐木立栅開塹設堠示以乆屯之形夜使報効聴選官雷濟義民蕭􅁃分率鄉兵及樵竪善登山者四百人各與一旗齎銃砲鉤䥥使由間道攀崖懸壁而上分列逺近極髙山頂以覘賊張立旗幟􅅡茅爲數千竈度我兵且至險則舉砲燃火相應十二日早臣兵進至十八靣隘賊方據險迎敵驟聞逺近山頂砲聲如雷煙熖四起我兵復呼噪􅁬逼銃箭齊發賊皆驚潰失措以爲我兵已盡入破其巢穴遂棄險退走臣預遣千户陳􅊆髙睿分率壯士數十縁崖上奪賊險盡發其滚木礧石我兵乗勝驟進呼聲震天地指揮謝昶馮廷瑞兵由間道先入盡焚賊巢賊退無所㩀乃大敗奔潰遂破長龍巢破入八靣隘巢破先鵞頭巢破狗脚嶺巢破菴背巢破白藍横水大巢先是大賊首謝志􅃢蕭貴模等皆以横水居衆險之中􅀝以為固聞官兵四進倉卒分衆扼險出禦甚力至是見横水煙熖障天銃砲之聲撼摇山谷亦各失􅀔棄險走各哨官兵乗之皆奮勇力戰而入知府邢珣遂破磨刀坑巢破荼坑巢破荼潭巢知縣王天與破樟木坑巢破石王巢都指揮許清破鷄湖巢破新溪巢破楊梅巢俱至横水知府唐淳破羊牯腦巢破上關巢破下􅀜巢破左溪大巢守備指揮郟文破獅寨巢破義安巢破苦竹坑巢指揮余恩破長流坑巢破牛角窟巢破鼈坑巢縣丞舒富破箬坑巢破赤坑巢破竹􅄵巢知府季斆破上西􅈐巢破狐狸坑巢破鉛厰巢俱至左溪守巡各官亦隨後督兵而至是日擒斬首從賊人賊級并俘􅀗賊屬男婦奪回􅀍虜人口牛馬􅂍仗數多其餘自相蹂踐堕岸填谷而死者不可勝計當是時賊路所由入皆刋崖倒􅀣設阱埋簽不可行我兵盡夜渉深澗蹈叢􅁄遇險絶則掛繩崖樹魚貫而上猿臂而下徃徃失足墮深谷幸而不死經數日始􅀎出各兵已至横水左溪皆困甚不復䏻驅逐㑹日已暮遂令收兵屯劄次日大霧雨咫尺不辯連數日不開乃令各營休兵享士而使鄉導數十人分探潰賊所徃并未破巢穴動静十五日得各鄉導報謂諸賊分陣預於各山絶險崖壁立有柵寨為退保之計有復合聚於未破之巢者俱不意我兵驟入未及搬運糧榖若分兵四散追擊可以盡􅀗臣等􅀼計湖廣夾攻在十一月􅀄一期已漸迫此去桶岡尚百餘里山路嶮峻三日始􅀎逹若此中之賊圍之不克而移兵桶岡􅀔分備多前後顧瞻非計之得乃令各營皆分兵為竒正二哨一攻其前一襲其後冐霧速進分投急撃十六日知府邢珣攻破旱坑巢窵井巢知府季斆守備指揮郟文攻破穩下巢李家巢十七日知府唐淳攻破絲茅􅄵巢十八日都指揮許清攻破朱雀坑巢村頭坑巢黄竹㘭巢觀音山巢十九日指揮余恩攻破梅伏坑巢石頭坑巢二十日知府邢珣又攻破白封龍巢芒背巢知縣王天與攻破黄泥坑巢大富湾巢二十二日縣丞舒富攻破白水洞巢本日知府伍文定知縣張戩兵亦至二十四日知府伍文定攻破寨下巢知縣張戩攻破杞州坑巢二十五日知縣張戩又破朱坑巢知府伍文定破楊家山巢二十六日知府季斆又破李坑巢都指揮許清又破川㘭巢二十七日守備指揮郟文又破長河洞巢連日各擒斬首從賊人賊級并俘􅀗賊屬男婦奪回􅀍虜人口牛馬􅂍仗數多是日各營官兵請乗勝進攻桶岡臣復議得桶岡天險四靣青壁萬􅌇中盤百餘里連􅄘参天深林絶谷不睹日月中所産旱榖薯蕷之􅁼足餉㐫􅀊徃者亦嘗夾攻坐困數月不能俘其一卒竟以招撫爲名而罷及詢訪鄉導其所由入惟鎻匙龍葫蘆洞茶坑十八磊新地五䖏然皆架棧梯壑夤懸絶壁而上賊使數人於崖巔坐􅀤鑘石可無執兵而禦我師惟上章一路稍平然深入湖廣迂回取道半月始至湖兵既從彼入而我師復徃事皆非便今横水左溪餘賊皆已奔入其中同難合􅀔為守必力善戰者其􅀔險其節短今我􅁒乗全勝之鋒兼三日之程長驅百餘里而爭利彼若拒而不前䪺兵幽谷之底所謂強弩之末不能穿魯縞矣今若移屯近地休兵養銳振􅀭威聲先使人諭以禍福彼必懼而請服其或有不從者乗其猶豫襲而擊之乃可以逞乃使素與賊通戴罪義官李正巖醫官劉福泰釋其罪并縦所􅀗桶岡賊鍾景於二十八日夜懸壁而入期以􅀄一日早使人於鎻匙龍受降賊方甚恐見三人至皆喜乃集衆㑹議而横水左溪奔入之賊果堅持不可徃復遲疑不睱爲備臣遣縣丞舒富率數百人屯鎻匙龍促使出􅑙而使知府邢珣入茶坑知府伍文定入西山界知府唐淳入十八磊知縣張戩入葫蘆洞皆於三十日乗夜各至分地遇大雨不得進􅀄一日早冐雨疾登大賊首藍天鳳方就鎻匙龍聚議聞各兵已入險皆驚愕散亂猶驅其衆男婦千餘人㩀内隘絶壁隔水爲陣以拒知府邢珣之兵渡水前擊張戩之兵衝其右伍文定之兵自張戩右懸崖而下遶賊傍擊賊不能支且戰且􅁍及午雨霽各兵鼓􅁬而前乃敗走縣丞舒富知縣王天與所領兵聞前山兵已入亦從鎻匙龍並登各軍乗勝擒斬賊悉奔十八磊知府唐淳之兵復嚴陣迎賊又敗然㑹日晚猶扼險相持次早諸軍復合􅀔併擊大戰良乆遂大敗知府邢珣破桶岡大巢破梅伏巢破烏池巢知縣張戩破西山界巢鎻匙龍巢破黃竹坑巢知府唐淳破十八磊巢知府伍文定破鐵木里巢破土池巢破葫蘆洞巢知縣王天與破員分巢破背水坑巢縣丞舒富破太王嶺巢擒斬首從賊人賊級并俘􅀗賊屬男婦奪回􅀍虜人口牛馬􅂍仗數多賊大􅀔雖敗結陣分遁者尚多是日聞湖廣􅁟兵將至臣使知府邢珣屯葫蘆洞知府唐淳屯十八磊知府伍文定屯大水守備指揮郟文屯下新地知縣張戩屯磜頭縣丞舒富屯荼坑指揮姚璽知縣王天與屯板嶺而使副使楊璋巡行磜頭荼坑諸營􅁥督進止以継其糧餉又使知府季斆分屯聶都以防賊之南奔都指揮許清留屯横水指揮余恩留屯左溪以備腹心遺漏之賊而使􅂙議黄宏留劄南安給糧餉以為聶都之􅁇臣亦躬率帳下屯茶寮使各營分兵與湖兵相㑹夾勦遁賊􅀄五日知府邢珣又破上新地巢破中新地巢破下新地巢初七日知府唐淳又破杉木㘭巢破原陂巢破木里巢十一日知縣張戩破板嶺巢破天台菴巢十三日又破東挑坑巢破龍背巢連日各擒斬俘􅀗數多其間巖谷溪壑之内饑餓病疹顚仆死者不可以數於是桶岡之賊畧盡臣以其暇親行相視形􅀔㩀險立隘使卒數百斬木棧崖鑿山開道又使典史梁儀領卒數百相視横水創築土城周圍千餘丈亦設隘以奪其險議以其地請建縣治控制三省諸猺㫁其徃来之路事方經營十六日㩀防遏推官徐文英呈稱廣東魚黄等巢􅀍湖兵攻破賊黨男婦千餘突徃鷄湖新地穩下朱雀坑等䖏臣復遣知府季斆分兵趨朱雀坑等䖏知府伍文定趨穩下鷄湖等䖏守備指揮郟文知府邢珣趨上新等䖏各相機急勦二十日知府伍文定兵擊賊於穩下寨西􅄘寨苦竹坑寨長河􅄵巢黎坑巢二十三日守備指揮郟文知府邢珣擊賊於上新地巢知府伍文定又追擊于鷄湖巢十二月􅀄三日知府季斆擊賊於朱雀坑寨狐狸坑巢擒斬首從賊徒俘􅀗賊屬奪􅀗贓仗數多於是奔遁之賊始盡然以湖廣二省之兵方合雖近境之賊悉以掃蕩而四逺奔突之虞難保必無乃留兵二千餘分屯茶寮横水等隘而以是月􅀄九日回軍近縣以休息疲勞候二省夾攻盡絶然後班師兩月之閒通計搗過巢穴八十餘䖏擒斬大賊首謝志􅃢藍天鳳等八十六名顆從賊首級三千一百六十八名顆俘􅀗賊屬二千三百三十六名口奪回􅀍虜男婦八十三名口牛馬騾六百八隻匹􅂍仗二千一百三十一件金銀一百一十三兩八錢一分總計首從賊徒賊屬牛馬􅂍仗共八千五百二十五名顆口􅃗件俱經行令轉觧紀功官䖏審驗紀錄去後今呈前因􅂙照大賊首藍天鳳謝志􅃢等盤㩀千里荼毒數郡僣擬王號圖謀不􅁤基禍種惡且􅀅數十餘年而虐熖之熾盛毒流之􅆭極亦已數年于兹前此亦嘗夾勦曾不􅀎損其一毛屡加招撫適足以長其桀驁乃今驅卒不過萬餘用費不滿三萬兩月之間俘􅀗六千有竒破巢八十有四渠魁授首噍􅁼無遺此豈臣等􅀎賢於昔人是皆仰仗朝廷威徳之被廟堂䖏置得宜既假臣以賞罰之權復專臣以提督之任故臣等得以伸縮自由舉動如志奉成算以行事循方畧而指揮将士有用命之羙進止無掣肘之虞則是追􅀗獸􅇠之捷實由􅀤縦指示之功臣等偶叨任使亦安敢冐非其績夫謀定於帷幄之中而勝决於千里之外命出於廟堂之上而威行於百蠻之表臣等敢為朝廷􅀦議有人賀且自幸其所遭得以苟免覆餗之戮也及照􅁥軍副使楊璋􅂙議黄宏領兵都指揮僉事許清都指揮使行事指揮使郟文知府邢珣季斆伍文定唐淳知縣王天與張戩指揮余恩馮翔縣丞舒富隨征􅂙謀等官指揮謝昶馮廷瑞姚璽明徳同知朱憲推官危壽徐文英知縣陳允諧黄文鸑宋瑢陸璥千户陳􅊆髙睿等以上各官或􅁥軍督餉或領兵隨征悉皆深歷危險備嘗艱難各効勤苦之力共成克捷之功俱合甄録以勵將来伏願皇上普彰廟堂之大賞兼收行伍之㣲勞激勸既行功庸益集自然賊盗􅃦息百姓安生則地方幸甚臣等幸甚立崇義縣治䟽十二年閏十二月􅀄五日據江西巡守嶺北道兵備副使楊璋左􅂙議黄宏㑹呈㩀南安府知府季斆呈備所屬致仕省􅀕義官監生楊仲貴等呈稱上猶等縣横水左溪長流桶岡關田鷄湖等䖏賊巢共計八十餘䖏界乎三縣之中東西南北相去三百餘里號令不及人跡罕到其􅀄輋賊原係廣東流来先年奉巡撫都御史金澤行令安挿於此不過砍山耕活年深日乆生長日蕃羽翼漸多居民受其殺戮田地􅀍其占㩀又且潜引萬安龍泉等縣避役逃民并百工技藝遊食之人雜䖏於内分群聚黨動以萬計始漸虜掠鄉村後乃攻刼郡縣近年肆無忌憚遂立總兵僣擬王號罪惡貫盈神人共怒今幸奏聞征勦䝉本院親率諸軍搗其巢穴擒其首惡妖氛爲之掃蕩地方爲之底寍三縣之民歡欣鼓舞如􅀗更生訪得各縣流来之賊自聞夾攻消息陸續逃出頗衆但恐大兵撤後未免復聚爲患合無三縣適中去䖏建立縣治實為乆安長治之策等因到道隨取各縣鄉導干軍營研深查得前項賊巢係上猶大􅁃南康三縣所屬上猶縣崇義上保鴈湖三里先年多􅀍賊殺戮田地􅀍其占㩀大􅁃縣義安三里人户間􅀍殺傷田地賊占一半南康縣至坪一里人户皆居縣城田地􅀍賊阻荒總計賊占田地六里有半隨䝉本院委領兵知府邢珣知縣王天與黄文鸑親歷賊巢􅂿勘三縣之中適均去䖏無如横水原係上猶縣崇義里垉方山水合地土地平坦堪以設縣隨㑹同分守左􅂙議黄宏議得合無於此建立縣治盡􅀅三縣賊人占㩀阻荒田地通行割出縁里分人户數少查得南康縣上龍一里崇徳一里亦與至坪相接縁至坪三都雖非全里然而地方廣闊錢糧數多堪以拆作一里合割併屬新縣其間人户數少者田粮尚存招人伯買可以復全縣治既設東去南康尚有一百二十里要害去䖏則有長龍西去湖廣桂陽縣界二百餘里要害去䖏則有土保南去大􅁃縣一百二十餘里要害去䖏則有鉛厰俱該設立巡檢司查得上猶縣過歩巡檢司路僻無用宜改移上保備由呈詳奉批㸔得横水開建縣治實亦事不容已但未經奏請湏候命下方可决議兼之工程浩大一時恐未易就今賊􅀔雖平漏殄尚有且宜遵照本院欽奉􅃙諭随宜䖏置事理先於横水建立隘所以備目前不測之虞除委典史梁儀等一靣立木柵􅁱築􅁟城􅁱建營房外查得横水附近隘所如至坪鴈湖賴塘等䖏盗賊既平巳為虚設其附近村寨如白靣長潭杰潭不玉過歩果木鳥溪水眼等䖏居民訪得多係通賊窩主及各縣城郭村寨亦多有通賊之人合將各隘隘夫悉行撥守横水其通賊人户盡數查出編充隘夫水逺守把其不係通賊者量丁多寡抽選編僉輪班更替務足一千餘名之數責委屬官一員統領常川守把遇有殘黨嘯聚出沒即便相機剿捕候縣治既立人煙輳集地方果巳寕靖再行議䖏裁損其開建縣治本院親行􅂿勘再四籌度固知事不可巳但舉大事湏順民情兵革之後􅀹宜存恤仲該道㑹同分守等官再行拘集地方父老子弟多方詢訪必湏各縣人民踴躍鼓舞爭先趨事然後興工庻㡬事舉而人有子来之羙工成而民享偕樂之休仍呈撫按等衙門公同計譏施行等因依奉㑹同􅂙議黄宏遵照批呈事理先於横水設立隘所防範不虞及行該府再行拘集詢訪外隨㩀府縣各申拘集父老到官各交口歡欣鼓舞趨事别無民情不便等因備呈到道覆審無異轉呈到臣㑹同巡撫江西等䖏地方都察院右副都御史孫燧巡按江西􅁥察御史屠僑譏照前項地方大賊既已平蕩後患所當預防今譏立縣治并廵司等衙門懲前慮後杜漸防微實皆地方至計及查得横水議建縣治䖏所原係上猶縣崇義里因地名縣亦為相應如􅀩皇上憫念地方屢遭荼毒乞􅃙該部俯順民情從長議䖏早賜施行并儒學巡司等衙門一體銓選官員鑄給印信如此則三省殘孽有控制之所而不敢聚三省奸民無潜匿之所而不敢逃變盗賊強梁之區為禮義冠裳之地乆安長治無出於此王文成公全書卷之五文錄二書始正徳辛巳至嘉靖乙酉與鄒謙之辛巳别後徳聞日至雖不相面嘉慰殊深近来此意見得益親切國裳亦已篤信得謙之更一来愈當沛然矣適呉守􅁒以府志奉瀆同事者于中國裳汝信惟濬遂令􅄏舘扵白鹿􅋨翁之意蓋有在不專以此煩勞也區區歸遯有日聖天子新政英明如謙之亦宜束装北上此㑹宜急圖之不當徐徐而来也蔡希淵近已主白鹿諸同志須僕已到山􅁍来相講尤妙此時􅁍匆匆不能盡意也幸以語之二乙酉鄉人自廣徳来時常得聞動􅂂兼悉政敎之善殊慰傾想逺使弔賻尤感憂念之深􅀁喻猝臨盤錯盖非獨以别利器正以精吾格致之功耳又能以怠荒自懼其進可知矣近時四方来逰之士頗衆其間雖甚魯鈍但以良知之􅀃畧加􅀧掇無不􅀰有開悟以是益信得此二字真吾聖門正法眼蔵謙之近来􅀁見不審又如何矣南元善益信此學日覺有進其見諸施設亦大非其舊便間更相奨掖之固朋友切磋之心也方治葬事使還草草䟽謝不盡與夏敦夫辛巳不相見者幾時毎念吾兄忠信篤厚之資學得其要㫁能一日千里惜無因亟㑹親睹其􅀁謂歷塊過都者以為快耳昔夫子謂子貢曰賜也汝以予為多學而識之者與對曰然非與子曰非也予一以貫之然則聖人之學乃不有要乎彼釋氏之外人倫遺物理而堕扵空寂者固不得謂之明其心矣若世儒之外務講求考索而不知本諸其心者其亦可以謂窮理乎此區區之心深􅁒就正扵有道者因便輒及之幸有以敎我也區區兩年来血氣亦漸衰無復用世之志近始奉􅃙北上将遂便道歸省老親為終養之圖矣冗次不盡􅀁懐與朱守忠辛巳乍别忽旬餘沿途人事擾擾毎得稍暇或遇景感觸輒復興懐齎詔官来承手札知警省不懈幸甚幸甚此意不忘即是時時相見雖别非别矣道之不明皆由吾軰明之於口而不明之於身是以徒騰頰舌未能不言而信要在立誠而已向日謙虚之􅀃其病端亦起於不誠使能如好好色如惡惡臭亦安有不謙不虚時邪虞佐相愛之情甚厚别後益見其真切􅀁恨愛莫為助但願渠實落做箇聖賢以此為報而已相見時以此意規之謙之當已不可留國裳亦時時相見否學問之益莫大於朋友切磋聚㑹不厭頻數也明日當發玉山到家漸可計日但與守忠相去益逺臨􅁓悵然與席元山辛巳向承敎札及鳴􅁈錄讀之見别後學力􅀁到卓然斯道之任庶㡬乎天下非之而不顧非獨與世之附和雷同從人悲􅀏者相去萬萬而已喜幸何極中間乃有須面論者但恨無因一㑹近聞内臺之擢决知必從鉛山取道而僕亦有歸省之便庶得停舟途次為信􅀫之談使人候於分水乃未有前驅之報駐信城者五日悵怏而去天之不假緣也可如何㢤大抵此學之不明皆由吾人入耳出口未嘗誠諸其身譬之談飲􅀃食何由得見􅋨飽之實乎僕自近年来始實見得此學真有百世以俟聖人而不惑者朋友之中亦漸有三數軰篤信不囬其疑信相半顧瞻不定者多以舊􅀃沈痼且有得失毀譽之虞未能專心致志以聼亦坐相䖏不乆或交臂而别無從與之細􅀃耳象山之學簡易􅀡截孟子之後一人其學問思辯致知格物之􅀃雖亦未免沿襲之累然其大本大原㫁非餘子􅀁及也執事素能深信其學此亦不可不察正如求精金者必務煆煉足色勿使有纎毫之雜然後可無􅉛損變動蓋是非之懸絶􅀁争毫釐耳用熈近聞巳赴京知公故舊之情極厚倘猶未出亦勸之學問而已存心養性之外無别學也相見時亦望遂以此言致之答甘泉辛巳世傑来承示學庸測喜幸喜幸中間極有發明䖏但於鄙見尚大同小異耳随䖏體認天理是真實不誑語鄙􅀃初亦如是及根究老兄命意發端䖏郤似有毫釐未恊然亦終當殊途同歸也􅁱齊治平緫是格物但欲如此節節分䟽亦覺􅀃話太多且語意務為簡古比之本文反更深晦讀者愈難尋求此中不無亦有心病莫若明白淺易其詞畧指路徑使人自思得之更覺意味深長也髙明以為何如致知之􅀃鄙見恐不可易亦望老兄更一致意便間示知之此是聖學傳心之要於此既明其餘皆洞然矣意到懇切䖏不得不直幸不罪其僣􅄭也叔賢大學洪範之􅀃其用力巳深一時恐難轉移此須面論始有可辯正耳㑹間先一及之去冬有方叟者過此傳示髙文其人習扵神仙之􅀃謂之志扵聖賢之學恐非其本心人便草草不盡答倫彦式辛巳徃􅀊仙舟過贛承不自滿足執禮謙而下問懇古所謂敏而好學扵吾彦式見之别後連冗不及以時奉問極切馳想近令弟過省復承惠敎志道之篤趨向之正勤惓有加淺薄何以當此悚息悚息諭及學無静根感物易動䖏事多悔即是三言尤見近時用工之實㒒罔􅀁知識何足以辱賢者之問大抵三言者病亦相因惟學而别求静根故感物而懼其易動感物而懼其易動是故䖏事而多悔也心無動静者也其静也者以言其體也其動也者以言其用也故君子之學無間於動静其静也常覺而未嘗無也故常應其動也常定而未嘗有也故常寂常應常寂動静皆有事焉是之謂集義集義故能無祗悔所謂動亦定静亦定者也心一而巳静其體也而復求静根焉是撓其體也動其用也而懼其易動焉是廢其用也故求静之心即動也惡動之心非静也是之謂動亦動静亦動將迎起伏相尋扵無窮矣故循理之謂静􅀙􅁒之謂動􅁒也者非必聲色貨利外誘也有心之私皆􅁒也故循理焉雖酬酢萬變皆静也濂溪所謂主静無􅁒之謂也是謂集義者也􅀙􅁒焉雖心齋坐忘亦動也告子之強制正助之謂也是外義者也雖然僕盖􅀙事扵此而未之能焉聊為賢者陳其􅀁見云爾以為何如便間示知之與唐虞佐侍御辛巳相與兩年情日益厚意日益真此皆彼此􅀁心喻不以言謝者别後又承雄文追送稱許過情末又重以傅􅀃之事􅀁擬益非其倫感怍何既雖然故人之賜也敢不拜受果如是非獨進以有為將退而􅀮扵巖穴之下要亦不失其為賢也巳敢不拜賜昔人有言投我以木桃報之以瓊瑶今投我以瓊瑶矣我又何以報之報之以其􅀁賜可乎􅀃之言曰學扵古訓乃有􅀗夫謂學扵古訓者非謂其通於文辭講􅀃於口耳之間義襲而取諸其外也􅀗也者得之扵心之謂非外鑠也必如古訓而學其􅀁學焉誠諸其身所謂黙而成之不言而信乃為有得也夫謂遜志務時敏者非謂其飾情卑禮於其外汲汲扵事功聲譽之間也其遜志也如地之下而無􅀁不承也如海之虚而無􅀁不納也其時敏也一於天徳戒懼扵不睹不聞如太和之運而不息也夫然百世以俟聖人而不惑溥博淵泉而時出之言而民莫不信行而民莫不恱施及蠻貊而道徳流於無窮斯固􅀃之􅀁以爲􅀃也以是爲報虞佐其能以郤我乎孟氏云責難之謂恭吾其敢以後世文章之士期虞佐乎顔氏云舜何人也予何人也虞佐其能不以􅀃自期乎人還燈下草草為謝相去益逺臨楮怏悒答方叔賢辛巳承示大學原知用心於此深宻矣道一而已論其大本大原則六經四書無不可推之而同者又不特洪範之於大學而已此意亦㒒平日於朋友中􅀁常言者譬之草木其同者生意也其花實之䟽宻枝葉之髙下亦􅁒盡比而同之吾恐化工不如是之雕刻也今吾兄方自喜以為獨見新得銳意主張是􅀃雖素䝉信愛如鄙人者一時論􅀃當亦未能遽入且願吾兄以􅀁見者實體諸身必將有疑果無疑必將有得果無得又必有見然後鄙􅀃可得而進也學之不明㡬百年矣近幸同志如甘泉如吾兄者相與切磋講求頗有端緒而吾兄忽復牽滯文義若此吾又將誰望乎君子論學固惟是之從非以必同為貴至於入門下手䖏則有不容於不辯者􅀁謂毫􅁵之差千里之謬矣致知格物甘泉之􅀃與僕尚微有異然不害其為大同若吾兄之􅀃似又與甘泉異矣相去逺恐辭不足以逹意故言語􅀡冐不復有􅀁遜譲近與甘泉書亦道此當不以爲罪也二癸未此學蓁蕪今幸吾儕復知講求於此固宜急急遑遑并心同志務求其實以身明道學雖所入之途稍異要其所志而同斯可矣不肖之謬劣已無足論若叔賢之於甘泉亦乃牽制於文義紛爭扵辯􅀃益重世人之惑以啓呶呶者之口斯誠不能無憾焉憂病中不能數奉問偶有所聞因謙之去輒附此言無倫次渭先相見望併出此與楊仕鳴辛巳差人来知令兄已於去冬安厝墓有􅀫草矣無由一哭傷㢤􅀁委誌銘既病且冗須朋友中相知深者一爲之始能有發耳喻及日用講求功夫只是各依自家良知􅀁及自去其障擴充以盡其本體不可遷就氣習以趨時好幸甚幸甚果如是方是致知格物方是明善誠身果如是徳安得而不日新業安得而不富有謂毎日自檢未有終日渾成片段者亦只是致知工夫間㫁夫仁亦在乎熟之而已又云以此磨勘先軰文字同異工夫不合常生疑慮又何為其然㢤區區所論致知二字乃是孔門正法眼蔵於此見得真的􅀡是建諸天地而不悖質諸􅀑神而無疑考諸三王而不謬百世以俟聖人而不惑知此者方謂之知道得此者方謂之有徳異此而學即謂之異端離此而􅀃即謂之邪􅀃迷此而行即謂之􅄀行雖千魔萬恠眩瞀變幻於前自當觸之而碎迎之而解如太陽一出而􅀑魅魍魎自無所逃其形矣尚何疑慮之有而何異同之足惑乎􅀁謂此學如立在空中四面皆無倚靠萬事不容染着色色信他本来不容一毫増减若渉些安排着些意思便不是合一功夫雖言句時有未瑩亦是仕鳴見得䖏足可喜矣但須切實用力始不落空若只如此􅀃未免亦是議擬倣象已後只做得一箇弄精魄的漢雖與近世格物者症􅀱稍有不同其爲病痛一而已矣詩文之習儒者雖亦不廢孔子􅀁謂有徳者必有言也若着意安排組織未有不起於勝心者先軰號爲有志斯道而亦復如是亦只是習心未除耳仕鳴旣知致知之􅀃此等䖏自當一勘而破瞞他些子不得也二癸未别後極想念向得尚謙書知仕鳴功夫日有所進殊慰􅀁期大抵吾黨既知學問頭腦已不慮無下手䖏只恐客氣為患不肯實致其良知耳後進中如柯生軰亦頗有力量可進只是客氣為害亦不小行時嘗與痛􅀃一畨不知近来果能克去否書至来相見出此共勉之前軰之於後進無不欲其入於善則其規切砥勵之間亦容有􅀡情過當者􅁍恐後學未易承當得起既不我徳反以我為􅄷者有矣往往無益而有損故莫若且就其力量之􅀁可及者誘掖奨􅂆之往時亦嘗與仕鳴論及此想能不忘也三癸未前者是備錄區區之語或未盡區區之心此册乃􅀡述仕鳴􅀁得反不失區區之見可見學貴乎自得也古人謂得意􅁯言學苟自得何以言為乎若􅁒有􅀁記札以為日後印證之資則􅀡以已意之􅀁得者書之而已不必一一拘其言辭反有􅀁不逹也中間詞語時有未瑩病中不暇細為􅀧檢與陸元静辛巳齎奏人囬得佳稿及手札殊慰聞以多病之故將從事於養生區區往年蓋嘗弊力於此矣後乃知其不必如是始復一意扵聖賢之學大抵養徳養身只是一事元静􅀁云真我者果能戒謹不暏恐懼不聞而專志於是則神住氣住精住而仙家􅀁謂長生乆視之􅀃亦在其中矣神仙之學與聖人異然其造端托始亦惟􅁒引人於道悟真篇後序中􅀁謂黄老悲其貪着乃以神仙之術漸次導之者元静試取而觀之其微㫖亦自可識自堯舜禹湯文武至於周公孔子其仁民愛物之心蓋無所不至苟有可以長生不死者亦何惜以示人如老子彭籛之徒乃其禀賦有若此者非可以學而至後世如白玉蟾丘長春之屬皆是彼學中􅀁稱述以為祖師者其得夀皆不過五六十則所謂長生之􅀃當必有所指矣元静氣弱多病但遺棄聲名清心寡慾一意聖賢如前􅀁謂真我之􅀃不宜輕信異道徒自惑亂聰明弊精勞神廢靡􅀊月乆而不返將遂為病狂䘮心之人不難矣昔人謂三折肱為良醫區區非良醫盖嘗三折肱者元静其慎聼毋忽區區省親本聞部中已准覆但得㫖即當長遯山澤不乆朝廷且大賚則元静推封亦有日果能訪我於陽明之麓當能為元静决此大疑也二壬午某不孝不忠延禍先人酷罰未敷致玆多口亦其宜然乃勞賢者觸冒忌諱為之辯雪雅承道誼之愛深切懇至甚非不肖孤之􅀁敢望也無辯止謗嘗聞昔人之敎矣况今何止於是四方英傑以講學異同之故議論方興吾儕可勝辯乎惟當反求諸已苟其言而是歟吾斯尚有􅀁未信歟則當務求其是不得輒是已而非人也使其言而非歟吾斯既已自信歟則當益致其踐􅂂之實以務求於自謙所謂黙而成之不言而信者也然則今日之多口孰非吾儕動心􅃘性砥礪切磋之地乎且彼議論之興非必有所私怨於我彼其爲􅀃亦將自以爲衞夫道也况其􅀃本自出於先儒之緒論固各有所慿據而吾儕之言驟異於昔反若鑿空杜撰者乃不知聖人之學本来如是而流傳失真先儒之論所以日益支離則亦由後學沿習乖謬積漸所致彼既先横不信之念莫肯虚心講究加以吾儕議論之間或為勝心浮氣所乗未免過為矯激則固宜其非􅀏而駭惑矣此吾儕之責未可專以罪彼為也嗟乎吾儕今日之講學將求異其􅀃於人邪亦求同其學於人邪將求以善而勝人邪亦求以善而養人邪知行合一之學吾儕但口􅀃耳何嘗知行合一邪推尋所自則如不肖者為罪尤重盖在平時徒以口舌講解而嘗嘗體諸其身名浮於實行不掩言已未嘗實致其知而謂昔人致知之􅀃未有盡如貧子之􅀃金乃未免從人乞食諸君病於相信相愛之過好而不知其惡遂乃共成今日紛紛之議皆不肖之罪也雖然昔之君子盖有舉世非之而不顧千百世非之而不顧者亦求其是而已矣豈以一時毀譽而動其心邪惟其在我者有未盡則亦安可遂以人言為盡非伊川晦菴之在當時尚不免於詆毀斥逐况在吾軰行有􅀁未至則夫人之詆毀斥逐正其宜耳凢今争辯學術之士亦必有志於學者也未可以其異巳而遂有所踈外是非之心人皆有之彼其但蔽於積習故於吾􅀃卒未易解就如諸君初聞鄙􅀃時其間寧無非􅀏詆毀之者乆而釋然以悟甚至反有激爲過當之論者矣又安知今日相詆之力不爲異時相信之深者乎衰絰哀苦中非論學時而道之興廢乃有不容於冺黙者不覺叨叨至此言無倫次幸亮其心也致知之􅀃向與惟濬及崇一諸友極論於江西近日楊仕鳴来過亦嘗一及頗爲詳悉今原忠宗賢二君復徃諸君更相與細心體究一畨當無餘藴矣孟子云是非之心知也是非之心人皆有之即所謂良知也孰無是良知乎但不能致之耳易謂知至至之知至者知也至之者致知也此知行之􅀁以一也近世格物致知之􅀃只一知字尚未有下落若致字工夫全不曽道著矣此知行之􅀁以二也答舒國用癸未来書足見為學篤切之志學患不知要知要矣患無篤切之志國用既知其要又能立志篤切如此其進也孰禦中間所疑一二節皆工夫未熟而􅁒速助長之爲病耳以國用之􅀁志向而去其􅁒速助長之心循循日進自當有至前􅀁疑一二節自將渙然氷釋矣何俟於予言譬之飲食其味之羙惡食者當自知之非人之能以其羙惡告之也雖然國用􅀁疑一二節者近時同志中往往皆有之然吾未嘗以告也今且姑爲國用一言之夫謂敬畏之増不能不爲灑落之累又謂敬畏爲有心如何可以無心而出於自然不疑其所行凢此皆吾􅀁謂􅁒速助長之爲病也夫君子之所謂敬畏者非有所恐懼憂患之謂也乃戒慎不睹恐懼不聞之謂耳君子之所謂灑落者非曠蕩放逸縦情肆意之謂也乃其心體不累於􅁒無入而不自得之謂耳夫心之本體即天理也天理之昭明靈覺所謂良知也君子之戒慎恐懼惟恐其昭明靈覺者或有所昬昧放逸流於非僻邪􅄭而失其本體之正耳戒慎恐懼之功無時或間則天理常存而其昭明靈覺之本體無所􅉛蔽無所牽擾無所恐懼憂患無所好樂忿􅓰無所意必固我無所歉餒愧怍和融瑩徹充塞流行動容周旋而中禮從心所􅁒而不踰斯乃所謂真灑落矣是灑落生於天理之常存天理常存生於戒慎恐懼之無間孰謂敬畏之増乃反為灑落之累耶惟夫不知灑落為吾心之體敬畏為灑落之功岐為二物而分用其心是以互相牴牾動多拂戾而流於􅁒速助長是國用之所謂敬畏者乃大學之恐懼憂患非中庸戒慎恐懼之謂矣程子常言人言無心只可言無私心不可言無心戒慎不睹恐懼不聞是心不可無也有所恐懼有所憂患是私心不可有也堯舜之兢兢業業文王之小心翼翼皆敬畏之謂也皆出乎其心體之自然也出乎心體非有所為而為之者自然之謂也敬畏之功無間於動静是所謂敬以􅀡内義以方外也敬義立而天道逹則不疑其所行矣所􅀉詐􅀃大意亦好以此自勵可矣不必以責人也君子不蘄人之信也自信而已不蘄人之知也自知而已因先塋未畢功人事紛㳫来使立候凍筆潦草無次與劉元道癸未来喻􅁒入坐窮山絶世故屏思慮養吾靈明必自驗至於通晝夜而不息然後以無情應世故且云扵静求之似爲徑􅀡但勿流於空寂而已觀此足見任道之剛毅立志之不凢且前後所論皆不爲無見者矣可喜可喜夫良醫之治病隨其疾之虚實強弱寒􅀬内外而斟酌加减調理􅀘泄之要在去病而已初無一定之方不問證候之如何而必使人人服之也君子養心之學亦何以異於是元道自量其受病之深淺氣血之強弱自可如其所云者而斟酌爲之亦自無傷且專􅁒絶世故屏思慮偏於虚静則恐既已養成空寂之性雖􅁒勿流於空寂不可得矣大抵治病雖無一定之方而以去病爲主則是一定之法若但知随病用藥而不知因藥發病其失一而已矣閒中且將明道定性書熟味意况當又不同憂病不能一一信筆草草無次答路賔陽癸未憂病中逺使惠問哀感何已守忠之訃方爾痛心而復不起惨割如何可言死者巳矣生者益孑立寡助不及今奮􅀤砥礪坐待澌盡燈㓕固將抱恨無窮自来山間朋友逺近至者百餘人因此頗有警發見得此學益的􅃀簡易真是考諸三王而不謬百世以俟聖人而不惑者惜無因復與賔陽一面語耳郡務雖繁然民人社稷莫非實學以賔陽才質之羙行之以忠信堅其必為聖人之志勿為時議所摇近名所動吾見其徳日進而業日廣矣荒憒不能多及心亮與黄勉之甲申屢承書惠兼示述作足知才識之邁向道懇切之難得也何幸何幸然未由一面鄙心之所􅁒效者尚爾鬱而未申有􅀒盛情多矣君子學以為已成已成物雖本一事而先後之序有不容紊孟子云學問之道無他求其放心而已矣誦習經史本亦學問之事不可廢者而忘本逐末明道尚有玩物䘮志之戒若立言垂訓尤非學者所宜汲汲矣所示格物􅀃􅁱道註誠荷不鄙之盛切深慚悚然非淺劣之所敢望於足下者也且其為􅀃亦於鄙見㣲有未盡何時合并當悉其義􅂅且勿以示人孔子云五十以學易可以無大過矣充足下之才志當一日千里何所不可到而不勝駿逸之氣急於馳驟奔放抵突若此將恐自蹶其足非任重致逺之道也古本之釋不得已也然不敢多為辭􅀃正恐􅁑藤􅅶繞則枝􅆬反為􅀩翳耳短序亦嘗三易稿石刻其最後者今各徃一本亦足以知初年之見未可據以爲定也二甲申勉之别去後家人病益狼狽賤軀亦咳逆泄瀉相仍曾無間日人事紛㳫未論也用是大學古本曽無下筆䖏有􅇳勤勤之意然此亦自可徐徐圖之但古本白文之在吾心者未能時時發明􅁍有可憂耳来問數條實亦無暇作答締觀簡末懇懇之誠又自不容己於言也来書云以良知之敎涵泳之覺其徹動徹静徹晝徹夜徹古徹今徹生徹死無非此物不假纎毫思索不得纎毫助長亭亭當當靈靈明明觸而應感而通無所不照無所不覺無所不逹千聖同途萬賢合轍無他如神此即為神無他希天此即為天無他順帝此即為帝本無不中本無不公終日酬酢不見其有動終日閑居不見其有静真乾坤之靈體吾人之妙用也􅀼又以為中庸誠者之明即此良知為明誠之者之戒慎恐懼即此良知爲戒慎恐懼當與惻􅀮羞惡一般俱是良知條件知戒慎恐懼知惻􅀮知羞惡通是良知亦即是明云云此節論得已甚分曉知此則知致知之外無餘功矣知此則知所謂建諸天地而不悖質諸􅀑神而無疑百世以俟聖人而不惑者非虚語矣誠明戒懼効驗功夫本非兩義既知徹動徹静徹死徹生無非此物則誠明戒懼與惻􅀮羞惡人安得别有一物爲之歟来書云隂陽之氣訢合和暢而生萬物物之有生皆得此和暢之氣故人之生理本自和暢本無不樂觀之鳶飛魚躍鳥鳴獸舞草木欣欣向榮皆同此樂但為客氣物􅁒攪此和暢之氣始有間㫁不樂孔子曰學而時習之便立箇無間㫁功夫恱則樂之萌矣朋来則學成而吾性本體之樂復矣故曰不亦樂乎在人雖不我知吾無一毫愠怒以間㫁吾性之樂聖人恐學者樂之有息也故又言此所謂不怨不尤與夫樂在其中不改其樂皆是樂無間㫁否云云樂是心之本體仁人之心以天地萬物為一體訢合和暢原無間隔来書謂人之生理本自和暢本無不樂但為客氣物􅁒攪此和暢之氣始有間㫁不樂是也時習者求復此心之本體也恱則本體漸復矣朋来則本體之訢合和暢充周無間本體之訢合和暢本来如是初未嘗有所増也就使無朋来而天下莫我知焉亦未嘗有所减也来書云無間㫁意思亦是聖人亦只是至誠無息而已其工夫只是時習時習之要只是謹獨謹獨即是致良知良知即是樂之本體此節論得大意亦皆是但不宜便有所執着来書云韓昌􅀺愽愛之謂仁一句㸔来大段不錯不知宋儒何故非之以爲愛自是情仁自是性豈可以愛為仁愚意則曰性即未發之情情即已發之性仁即未發之愛愛即已發之仁如何喚愛作仁不得言愛則仁在其中矣孟子曰惻􅀮之心仁也周子曰愛曰仁昌􅀺此言與孟周之㫖無甚差别不可以其文人而忽之也云云愽愛之􅀃本與周子之㫖無大相逺樊遅問仁子曰愛人愛字何嘗不可謂之仁歟昔儒㸔古人言語亦多有因人重輕之病正是此等處耳然愛之本體固可謂之仁但亦有愛得是與不是者須愛得是方是愛之本體方可謂之仁若只知愽愛而不論是與不是亦便有差處吾嘗謂愽字不若公字為盡大抵訓釋字義亦只是得其大槩若其精㣲奥藴在人思而自得非言語所能喻後人多有泥文著相專在字眼上穿求􅁍是心從法華轉也来書云大學云如好好色如惡惡臭所謂惡之云者凢見惡臭無䖏不惡固無妨礙至於好色無䖏不好則將凢羙色之經於目也亦盡好之乎大學之訓當是借流俗好惡之常情以喻聖賢好善惡惡之誠耳抑將好色亦為聖賢之所同好經於目雖知其姣而思則無邪未嘗少累其心體否乎詩云有女如雲未嘗不知其姣也其姣也匪我思存言匪我見存則思無邪而不累其心體矣如見軒冕金玉亦知其為軒冕金玉也但無歆羡希覬之心則可矣如此㸔不知通否云云人於尋常好惡或亦有不真切䖏惟是好好色惡惡臭則皆是發於真心自求快足曾無纎假者大學是就人人好惡真切易見䖏指示人以好善惡惡之誠當如是耳亦只是形容一誠字今若又於好色字上生如許意見􅁍未免有執指為月之病昔人多有為一字一句所牽蔽遂致錯解聖經者正是此症候耳不可不察也中間云無䖏不惡固無妨礙亦便有受病䖏更詳之来書云有人因薛文清過思亦是􅁀氣之􅀃乃欲截然不思者􅀼以孔子曰吾嘗終日不食終夜不􅆍以思亦將謂孔子過而􅁀其氣乎以愚推之惟思而外於良知乃謂之過若念念在良知上體認即如孔子終日終夜以思亦不爲過不外良知􅀰是何思何慮尚何過㢤云云過思亦是􅁀氣此語􅀃得亦是若遂􅁒截然不思􅁍是因噎而廢食者也来書謂思而外於良知乃謂之過若念念在良知上體認即終日終夜以思亦不為過不外良知即是何思何慮此語甚得鄙意孔子所謂吾嘗終日不食終夜不􅆍以思無益不如學也者聖人未必然乃是指出徒思而不學之病以誨人耳若徒思而不學安得不謂之過思與答劉内重乙酉書来警發良多知感知感腹疾不􅁒作答但内重為學工夫尚有可商量者不可以虚来意之辱輒復書此耳程子云所見所期不可不逺且大然而為之亦須量力有漸志大心勞力小任重恐終敗事夫學者既立有必為聖人之志只消就自已良知明覺處朴實頭致了去自然循循日有所至原無許多門面摺數也外面是非毀譽亦好資之以為警切砥礪之地􅁍不得以此稍動其心便將流於心勞日拙而不自知矣内重強剛篤實自是任道之器然於此等處向須與謙之從容一商量又當有見也眼前路逕須放開闊才好容人来徃若太拘窄恐自已亦無展足之地矣聖人之行初不逺於人情魯人獵較孔子亦獵較鄕人儺朝服而立於阼階難言之互鄕亦與進其童子在當時固不能無惑之者矣子見南子子路且有不恱夫子到此如何更與子路􅀃得是非只好矢之而已何也若要􅀃見南子是得多少氣力来􅀃且若依着子路認箇不是則子路終身不識聖人之心此學終將不明矣此等苦心䖏惟顔子便能識得故曰於吾言無所不恱此正是大頭腦䖏區區舉似内重亦􅁒内重謙虚其心宏大其量去人我之見􅅸意必之私則此大頭腦䖏自將卓爾有見當有雖􅁒從之末由也已之嘆矣大扺竒特斬􅅸之行多後世希髙慕大者之所喜聖賢不以是為貴也故索􅀮行怪則後世有述焉依乎中庸固有遯世不見知者矣學􅅸道䘮之餘苟有以講學来者所謂空谷之足音得似人者可矣必如内重所云則今之可講學者止可如内重軰二三人而止矣然如内重者亦不能時時来講也則法堂前草深一丈矣内重有進道之資而㣲失之於隘吾固不敢避飾非自是之嫌而叨叨至此内重宜悉此意弗徒求之言語之間可也與王公弼乙酉前王汝止家人去因在妻䘮中草草未能作書人来逺承問惠得聞動􅂂殊慰殊慰書中所云斯道廣大無䖏欠缺動静窮逹無徃非學自到任以来錢榖獄訟事上接下皆不敢放過但反􅀚於獨猶未是夭壽不二根基毀譽得䘮之間未能脫然足知用功之宻只此自知之明便是良知致此良知以求自慊便是致知矣殊慰殊慰師伊師顔兄弟乆居於此黃正之来此亦已兩月餘何廷仁到亦數日朋友聚此頗覺有益惟齊不得力而歸此友性氣殊别變化甚難殊為可憂爾閒及之答董澐蘿石乙酉問某賦性平􅀡守分毎遇能言之士則以已之遅鈍爲慚恐是根噐弱甚此皆未免有外重内輕之患若平日能集義則浩然之氣至大至公充塞天地自然富貴不能淫貧賤不能移威武不能屈自然能知人之言而凢詖淫邪遁之詞皆無所施於前矣况肯自以爲慚乎集義只是致良知心得其宜為義致良知則心得其宜矣問某因親弟糧役與之謀敗致累多人因思皆不老實之過也如何謂之老實須是實致其良知始得不然􅁍恐所謂老實者正是老實不好也昔人亦有爲手足之情受汙辱者然不致知此等事於良知亦自有不安問某因海寧縣丞盧珂居官㢘甚而極貧饑寒餓死遂走拜之贈以詩襪歸而胸次帖帖然自以爲得也只此自以爲得也恐亦不宜知得自以爲得之非宜只此便是良知矣民之秉彞也故好是懿徳又多着一分意思不得多着一分意思便是私矣問某見人有善行毎好録之時以展閱常見二醫一姓韓一姓郭者以利相讓亦必錄之錄善人以自勉此亦多聞多見而識乃是致良知之功此等人只是欠學問恐不能到頭如此吾軰中亦未易得也與黃宗賢癸未南行想亦從心所欲職守閒静益得專志於學聞之殊慰賤軀入夏来山中感暑痢歸卧兩月餘變成痰咳今雖稍平然咳尚未已也四方朋友来去無定中間不無切磋砥礪之益但真有力量能擔荷得亦自少見大抵近世學者只是無有必為聖人之志近與尚謙子莘誠甫講孟子鄊原狂狷一章頗覺有所省􅀤相見時試更一論如何聞接引同志孜孜不怠甚善甚善但論議之際必須謙虚簡明為佳若自䖏過任而詞意重復􅁍恐無益有損在髙明㫁無此因見舊時友朋徃徃不免斯病謾一言之􅀉薛尚謙癸未承喻自咎罪疾只緣輕傲二字累倒足知用力懇切但知得輕傲䖏便是良知致此良知除郤輕傲便是格物致知二宇是千古聖學之秘向在䖍時終日論此同志中尚多有未徹近於古本序中改數語頗發此意然見者徃徃亦不能察今􅀉一􅁓幸熟味此是孔門正法眼藏從前儒者多不曽悟到故其􅀃卒入於支離仕鳴過䖍常與細􅀃不審閒中曽論及否諭及甘泉論仕徳䖏殆一時意有所向而云益亦未見其止之嘆耳仕徳之學未敢便以為至􅀰其信道之篤臨死不貳眼前曽有㡬人所云心心相持如髠如鉗正恐同軰中亦未見有能如此者也書来謂仕鳴海崖大進此學近得數友皆有根力䖏乆當能發揮幸甚聞之喜而不􅄰也海崖爲誰氏便中􅀉知之王文成公全書卷之五終
