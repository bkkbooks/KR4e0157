  text: 王文成公全書卷之十
  hash: sha256:53068fe65cb1e7b0429ca27272048939a9d06fa3b27d1be93feb9b42fda9542e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_005-1a}
body:
  text: 别録二奏䟽議夾剿兵糧䟽正徳十二年七月􅀄五日准兵部咨該本部題職方清吏司案呈奉本部送兵科抄出巡撫湖廣地方兼賛理軍務都察院右副都御史秦金題稱㑹同巡按御史王度督同都布按三司掌印署都指揮僉事文㳟左布政使周季鳳副使惲巍等議照湖廣郴桂等䖏所屬地方與廣東樂昌江西上猶等䖏縣猺賊宻爾聮絡彼䖏有名賊首龔福全髙仲仁李斌龎文亮藍友貴等素恃巢穴險固聚衆行刼先年用兵征剿各賊漏殄未除遂致禍延今日臣等仰體皇上好生之心設法撫䖏冀圖靖安以成止戈之武柰犬羊之性變詐不同豺狼之心貪噬無厭陽雖聼招隂實肆毒今乃攻打縣堡虜官殺人窮􅇯極惡神人共憤雖經各官兵擒斬數輩稍懼歸巢緣其種􅁼繁多出沒尚未可料若非三省合兵大彰天討惡孽終不殄除􅆠宇何由寍謐所㩀各官會呈乞要大舉臣等再三籌議非敢輕啓兵端但審時度􅀔誠有不容巳者況彼巢峒既多賊黨亦衆東追西􅇡此出彼藏必湏調發本省土漢官軍民兵殺手人等共三萬貟名分立哨道刻期進剿其兩廣南贛仍湏各調官軍狼兵把截夾攻恊濟大事臣等計算兵糧重大區䖏艱難抑且本省兵荒相􅁇財力匱乏前項合用錢糧預湏計䖏今将應調土漢官軍數目供給糧餉事宜及戰攻方界開坐具奏該本部覆稱閫外兵權貴在專委征伐事宜切忌遥制今郴桂猺賊為害日熾既該湖廣鎮廵三司官會議兵不可已要行尅期進剿朝廷若復猶預不决徃返會議必致誤事但七月進兵天氣尚炎况今五月将中三省約會期限太迫再請􅃙兩廣􅄣督等官左都御史陳金等及請􅃙廵撫南贛左僉都御史王守仁各照議定事理欽遵㑹合行事不許違期失誤及改擬九月中取齊進兵庶三省路逺不誤約會本年五月十一日少保兼太子太保本部尚書王瓊等具題奉欽依備咨到臣除欽遵外卷查先㩀江西嶺北道副使楊璋及湖廣郴桂兵備副使陳璧并廣東韶州府各呈申前事臣􅂙㸔得前賊惡貫已盈神怒人怨天討在所必加但近年以来江西有桃源之役瘡痍甫起福建有汀漳之㓂軍旅未旋府江之師方集於兩廣偏橋之討未息於湖湘若復􅁇以大兵惟恐民不堪命合無申明賞罰容臣等徐為之圖惟復約㑹三省並舉夾攻已經開陳兩端具本上請去後今准前因則巡撫湖廣右副都御史秦金所題夾攻事理既奉有成命矣臣謹将南贛二府議䖏兵糧事宜開坐縁係地方􅂃急賊情事理為此具本請㫖計開一南安府所屬大􅁃南康上猶三縣各有賊巢聮絡盤㩀有衆數千西接湖廣桂陽等縣南接廣東韶州府樂昌等縣三省夾攻必湏湖廣自桂陽桂東等䖏進廣東自樂昌縣進在南安者必湏三縣地方並進贛州府所屬惟龍南縣賊巢與廣東惠州府龍川縣浰頭接境浰頭係大賊池大􅁂等巢穴有衆數千比之他賊􅀔尤猖獗前此二次夾攻俱􅀍漏網龍南雖有賊徒數夥除之稍易但其􅀝籍浰頭兵力以為聲援攻之則奔入浰頭兵退則復出為害必湏廣東兵自龍川進贛州兵自龍南進庶可使無奔潰一上猶去龍南㡬四百里兩䖏進兵必湏一時並舉庶無驚潰之患大約計之亦湏用兵一萬二千名今擬調南康上猶二縣機兵打手一千二百名大􅁃縣機兵打手一千二百名贛州府所屬除石城縣外寍都信豊二縣機兵打手各一千名其餘七縣機兵打手三千名龍泉縣機兵打手一千名安逺縣招安義民葉芳老人梅南春等龍南縣招安新民王受謝􅃏等兵共二千名汀州府上杭縣打手一千名潮州府程鄉縣打手一千名共輳一萬二千之數但廣湖兩省之兵皆狼土精悍賊所素畏􅀔必偏奔江西江西之兵最為怯懦望賊而潰乃其素習今所擬調皆新習未練若使嚴以軍法䖏治庶㡬人心齊一事功可成一兵一萬二千餘名毎名日給米三升一日該米三百七十餘石間日折支銀一分五􅁵一日該銀一百八十餘兩以六箇月爲率約用米三萬三十餘石用銀二萬餘兩領哨統兵旗牌等官并使客合用廪給及賞功犒勞牛酒銀牌花紅魚鹽火藥等費約用銀二萬餘兩通前二項約共用銀五萬兩二府啇稅銀兩集兵以来日有所費見存銀止有四千餘兩二府并贛縣大庾南康上猶四縣積穀約計有七八萬石但貯積年乆恐舂米不及其數見在前銀不足支用就欲别項區䖏但恐緩不及事查得江西布政司并各府縣别無蓄積止有該觧南京折糧銀兩貯庫未觧并一應􅁓米􅂍罰銀兩合無行廵撫江西都御史孫燧轉行布政司并行各府照數借給應用候事寍之日或将以後抽掣啇稅或開中鹽引另爲計䖏奏請􅀘還庶克有濟一合用本省巡按御史隨軍紀功管理錢糧及統兵領哨官貟除本省三司分守分巡兵備守備并南贛二府官貟臨時定委外訪得九江府知府汪賴吉安府知府伍文定汀州府知府唐淳惠州府知府陳祥俱各才識練逹程鄉縣知縣張戬撫州府東鄉縣知縣黄堂建昌府新城縣知縣黄文鸑􅀽州府萍鄉縣知縣髙桂吉安府龍泉縣知縣陳允諧俱有才名俱各堪以領兵􅀱命下之日聼臣等取用臣等竊照師期已迫自今七月上旬至九月中旬僅餘兩月中間合用前項錢糧噐仗及擬調兵快應委官員之􅀋悉皆百未有措又事干各省道途相去近者半月逺者月餘萬一各官之中違抗推託不肯遵依約束臨期誤事罪將安歸乞照湖廣廵撫都御史秦金所奏該部題准事理各官之中敢有抗違失誤者許臣等即以軍法從事庶㡬警懼事可易集南贛擒斬功次䟽十二年七月􅀄五日據江西按察司整飭兵備帶管分巡嶺北道副使楊璋呈據統兵等官南安府知府季斆呈觧生擒大賊首一名陳曰􅀎從賊林杲等二十七名斬􅀗首級十六顆俘􅀗賊屬男女十三口及馬牛等物并開稱搗過禾沙坑船坑石圳上龍狐狸朱雀黄石等賊巢七䖏燒死賊徒不計其數并房屋禾倉三百餘間南康縣縣丞舒富呈觧生擒大賊首一名鍾明貴從賊曾􅀎志等二十一名斬􅀗首級四十五顆殺死未取首賊一百一十七名俘􅀗賊屬男女一十六名口及牛馬驢等物并開稱搗過石路坑白水峒杞州坑旱坑茶潭竹􅄵皮􅂁樟木坑等賊巢八䖏焼死賊徒三百四十六名并焼毀房屋禾倉四百七十餘間贛縣義官蕭􅁃呈觧生擒大賊首一名唐洪從賊蒲仁祥等六名斬􅀗首級并射死賊從一百三十八名燒毀賊巢房屋禾倉一百二十間及俘􅀗牛羊器械等物并開􅁛搗過長龍鷄湖楊梅新溪等䖏賊巢四䖏各縁由到道隨據統兵官員并鄉導人等各呈稱自本年正月蒙本院撫臨以来募兵練卒各賊探知消息將家屬婦女什物俱各􅀉屯山寨林木茂宻之䖏其各精壯賊徒晝則下山耕作夜則各遯山寨依奉本院方畧於六月二十日子時各哨尅期進剿每巢止有二三十人或四五十人㸔守巢穴見兵舉火􅁬撃俱各驚潰間有射傷藥弩即時身死墜於深巖及據縣丞舒富義官蕭􅁃各回呈止有上猶縣白水峒石路坑二巢南康縣鷄湖一巢險峻巢内賊屬頗多􅀍兵四靣放火進攻賊無出路燒死數多天明㸔視止存骸骨頭靣燒毀莫辨以此難取首級等因案照先為􅂃急賊情事據上猶縣申稱四月間􅀍輋巢賊徒不時虜掠耕牛人口請兵追剿鄉民稍得蒔挿今早榖將登又聞各巢修整戰具出刼乞為防遏庶得收割聊生等因并㩀縣丞舒富及南安府呈大􅁃縣申同前事該本道查得上猶縣隣近巢穴則有旱坑茶潭杞州坑樟木坑石路坑白水峒竹潭川㘭隂木潭等巢南安縣則有長龍鷄湖楊梅新溪等巢大􅁃縣則有狐狸坑船坑禾沙坑石圳上龍朱雀黄石坑等巢多則三五百名少則七八十名合無將本院選集之兵委官統領分投剿遏等因已經呈奉本院批㸔得各賊名號日漸僣擬惡毒日加縦肆若果遂其奸謀得以乗虚入廣其為患害􅀜繋匪輕除宻行南韶等府分兵防截外仰該道即便部勒諸軍定哨分委仍宻召各巢附近􅀍害知因之人堪為郷導者前来分引各兵出城之時不得張􅀭今正當換班之月就令俱以下班為名晝伏夜行尅期各至分地掩賊不備同時舉事分領各官務要嚴宻􅁬勇竭忠以副委託如或推奸誤事及軍士之中敢有後期退縮者悉以軍法從事决不􅁿貸該道亦要親帥重兵隨後􅁇進宻屯賊巢要害䖏所相機接應以防不測一應機宜務湏慎宻周悉仍要嚴緝各兵所􅀗真正賊徒不許濫加良善等因遵奉統領各兵刻期進剿及加謹防遏今㩀復呈前因通查得各哨共計生擒大賊首三名首從賊徒五十四名斬􅀗首級六十八顆殺死射死賊徒二百四十餘名燒死賊徒二百餘名搗過巢穴一十九䖏燒毀房屋禾倉八百九十餘間俘􅀗賊屬男女二十九名口水黄牛馬騾羊一百四十四頭匹隻所據各該領兵等官所報擒斬之賊數固不多而巢穴已空無可捿身積聚已焚無可仰給就使屯集横水桶岡大巢將来人多食少大舉夾攻為力已易等因轉呈到臣卷查先㩀副使楊璋呈稱㩀南安府并上猶等縣及縣丞舒富各呈申訪得大賊首謝志􅃢號征南王紏率大賊首鍾明貴蕭規模陳曰䏻唐洪劉允昌等約㑹樂昌髙快馬等大修戰具并造吕公車􅁒先将南康縣打破聞知廣東官兵盡調征勦府江就行乗虚入廣等因已經批仰該道部勒諸軍酌量賊巢強弱派定哨分選委謀勇屬官統兵宻召知因向導引領晝伏夜行刻定於六月二十日子時入各賊巢同時舉火併力􅁬擊務使噍􅁼無遺去後今㩀前因覆勘得前項賊巢委果蕩平殆盡蓄積委果焚燬無遺􅀗功觧報雖少殺傷燒死實多猖熾之􅀔少摧不􅁤之謀暫阻居民得以秋􅀗地方亦為一寍此皆遵依兵部申明律例事理仰仗天威官兵用命之所致非臣之知謀所􅀎及也臣惟南贛之兵素不練養見賊而奔則其常態今各官乃􅀎夜入賊巢􅁬勇追擊在他所未為可異之功於南贛則實創見之事及照副使楊璋區畫賛理比於各官勞勩尤多今夾攻在邇伏乞皇上特加勸賞以作興勇敢之風庶㡬日後大舉臣等得以激勵人心除将􅀗功人員量加犒賞生擒賊徒􅁥􅀱審决首級梟示俘􅀗賊屬領養牛馬賞兵有功人員查審的􅃀造冊奏繳外縁係斬􅀗功次事理為此具本題知議夾剿方畧䟽十二年九月十五日㩀江西嶺北道副使楊璋呈奉臣案驗准兵部咨該廵撫湖廣都御史秦金題為􅂃急賊情事備行計䖏兵糧約㑹三省將上猶縣等䖏賊巢尅期九月中進剿等因遵依隨將本道兵糧事宜計呈本院轉逹奏聞定奪外隨據南安府上猶大􅁃等縣申稱各縣鄉民早穀將登各巢輋賊修整戰具要行出刼并據南康縣縣丞舒富呈訪得大賊首謝志􅃢號征南王紏率桶岡等巢賊首鍾明貴等約㑹廣東大賊首髙快馬等大修戰具并吕公車􅁒要先將南康縣打破聞知廣東官兵盡調府江就行乗虚入廣流刼乞要早為撲剿等因已經呈䝉本院宻受方畧行委知府季斆縣丞舒富等領兵分剿共生擒大賊首陳曰􅀎等三名首從賊徒五十四名斬􅀗賊首級六十八顆殺死射死賊徒二百四十餘名燒死賊徒二百餘名搗過巢穴一十九䖏燒燬房屋禾倉八百九十餘間俘􅀗賊屬二十九名口水黄牛馬羊騾一百四十四頭匹通經呈報又􅀩本院慮賊必將乗間復出行委知府季斆指揮来春等統兵屯南安指揮姚璽縣丞舒富統兵屯上猶指揮謝昶千户林節統兵屯南康各於要害去䖏徃来防剿至七月二十五日賊首謝志􅃢果復統衆一千五百餘徒攻打南安府城各官督兵迎敵生擒賊犯楊鑾等七名斬􅀗首級四十五顆賊衆大敗而去八月二十五日賊首謝志􅃢又統領二千餘徒復来攻打南安府城各官督兵迎敵生擒賊犯龍正等四十二名斬􅀗首級一百五十七顆賊又大敗而去即今賊􅀔少挫若乗此機㑹直搗其巢旬月之間可期掃蕩但聞湖廣之兵既已齊集而廣東因府江班師未乆復調狼兵未有定期謹按地圖江西之南安有上猶大􅁃桶岡等䖏賊巢與湖廣桂東桂陽接境夾攻之舉止該江西與湖廣㑹合而廣東止于仁化縣要害把截夾攻不與焉贛州之龍南有浰頭賊巢與廣東龍川接境夾攻之舉止該江西與廣東會合而湖廣不與焉廣東樂昌乳源賊巢與湖廣宜章縣接境惠州賊巢與湖廣臨武縣接境仁化縣賊巢與湖廣桂陽縣接境夾攻之舉止該湖廣廣東二省㑹合而江西止於大􅁃縣要害把截夾攻不與焉名雖三省大舉其實自有先後舉動次第不相妨礙若不此之察必欲通待三省之兵齊集然後進剿則老師廢財為害匪細合將前項事宜約㑹二省以次漸舉庶兵力不竭糧餉可省等因㩀呈到臣㸔得三省夾攻必湏彼此尅期定日同時並舉斯乃事體之常然兵無定􅀔謀貴從時苟􅀔或因地而異便則事宜量力以乗機三省賊巢連絡千里雖聲􅀔相因而其間亦自有種􅀋之分界限之隔利則爭趨患不相顧乃其性習誠使三省之兵皆巳齊備㑹約並進夫豈不善但今廣東狼兵方自府江班師而歸􅁒復調集恐非旬月所䏻兩省之兵既集乆䪺而不進賊必驚疑愈生其奸悍者奔突黠者潜迯老師費財意外之虞乗間而起雖有智者難善其後誠使先合湖廣江西之兵併力而舉上猶諸賊建事之畢廣東之兵亦且集矣則又合湖廣廣東之兵併力而舉樂昌諸䖏逮事之畢江西之兵又得以少息矣則又合廣東江西之兵併力而舉龍川方其併力於上猶則姑遣人佯撫樂昌諸賊以安其心彼見廣東既未有備而湖廣之兵又不及已苟幸旦夕之生必不敢越界以援上猶及夫上猶既舉而湖廣移兵以合廣東則樂昌諸賊其􅀔已􅀌二省兵力益專其舉之益易當是之時龍川賊巢相去遼絶自以為風馬牛不相及彼見江西之兵又撤意必不疑班師之日出其不意回軍合擊蔑有不濟者矣臣竊以為因地之宜先後合擊之便除臣遵照兵部咨来題奉欽依會兵征勦亦聼隨宜㑹議施行事理已將前項事宜移咨廣東湖廣􅄣督巡撫等官知㑹一靣相機行事外縁係地方􅂃急賊情事理為此具本題知換􅃙謝恩䟽十二年九月十五日近准兵部咨為申明賞罰以勵人心事該臣奏該本部覆題節奉聖㫖是王守仁着提督南贛汀漳等䖏軍務換􅃙與他欽此備咨到臣本年九月十一日節該欽奉勅諭江西南安贛州地方與福建汀漳二府廣東南韶潮惠四府及湖廣郴州桂陽縣壤地相接山嶺相連其間盗賊不時生發東追則西􅇡南捕則北奔盖因地分各省事無統屬彼此推調難為䖏置先年嘗設有都御史一員巡撫前項地方就令督剿盗賊但責任不專􅁼多因循苟且不䏻申明賞罰以勵人心致令盗賊滋多地方受禍今因所奏及該部覆奏事理特改命爾提督軍務撫安軍民修理城池禁革奸􅁦一應軍馬錢糧事宜俱聼便宜區畫以足軍餉但有盗賊生􅀤即便設法調兵剿殺不許踵襲舊􅁦招撫蒙蔽重為民患其管領兵快人等官員不問文職武職若在軍前違期并逗遛退縮者俱聼軍法從事生擒盗賊鞫問明白亦聼就行斬首示衆斬􅀗賊級行令各該兵備守巡官即時紀驗明白備行江西按察司造冊奏繳查照陞賞激勧欽此俱欽遵外竊念臣以凡庸繆膺重􅀉思逃罪責深求禍源始知盗賊之日熾由於招撫之太濫招撫之太濫由於兵力之不足兵力之不足由於賞罰之不明輙敢忘其僣妄為陛下一陳其梗㮣其實言不量力請非其分方虞戮辱之及陛下特採該部之議不惟不加咎謫而又悉與施行不惟悉與施行而又隆以新命是蓋曲從試可之請不􅃘以人廢言也􅃙諭宣布之日百姓塡衢塞道悚然改􅀚易慮以為聖天子明見萬里動察幽㣲占群䇿之畢舉知國議之有人莫不警懼振􅀤強息其􅁀偽息其奸怯者思􅁬而勇後者思効而前三軍之氣自倍群盗之謀自阻所謂舞干格苗運於廟堂之上而震乎蠻貊之中者也夫過其言而不酬有志者之所耻也冐寵榮而不顧自好者不為也臣固譾劣亦寍草木無知不思鞭䇿以報知遇雖其才力有所難強而螻蟻之誠决􅀎自盡雖於利鈍不可逆睹而狐兎之穴㫁期掃平臣不勝感恩激切之至交􅀵旗牌䟽十二年九月二十五日准工部咨該本部題稱㸔得兵部咨開都御史王守仁奉􅃙提督軍務應合照例給與旗牌以振軍威一節既查有例又奉欽依合無於本部􅀵有内給與旗牌八靣副就令原来百户尹麟前去交與本官督軍應用務加愛惜不得􅁿意損壊􅀱到先将􅀵領過日期號數徑自奏報查考等因具題奉聖㫖是欽此欽遵備咨到臣隨於本年九月十六日㩀百户尹麟領齎令旗令牌八副靣前来除照數􅀵領調度軍馬應用務加愛惜不敢輕意損壊外縁係交收旗牌事理為此今将􅀵領過日期縁由并號數開坐具本題知議南贛啇稅䟽十二年九月二十五日㩀江西按察司分巡嶺北道兵備副使楊璋呈奉巡撫江西地方右副都御史孫燧案驗備行各道兵備等官有地方重大軍務益於政體便於軍民果係應議事件即便條列呈報以慿施行等因隨㩀南安府呈繳本年春季分折梅亭抽分啇税循環文簿㸔得該府造報冊内某日共抽稅銀若干不見開有某啇人某貨若干抽銀若干中間不無任意抽報情弊及㸔得一季􅄣數倍少于前原其所自盖因抽分官員止是典史倉官義民等項不惜名節惟嗜貪汚兼以官職卑㣲人心玩視以致過徃客啇或假稱權要而挾放或買求官吏而􅅁過及􅀍店牙通同客商買求書􅄸以多作少以有作無奸弊百端卷查前項抽分創於巡撫都御史金澤一則甦大􅁃過山之夫一則濟南贛軍餉之用題奉欽依遵行年乆及查贛州􅀛角尾設立抽分厰建白于􅄣制都御史陳金自正徳六年十一月二十七日起至九年七月終止共抽過啇稅銀四萬二千六百八十六兩六錢三分七毫五忽本省大㡌山姚源華林盗賊四起大舉夾攻一應軍餉俱仰給於此並未奏動内帑之積亦未科派小民之財以此而觀則啇稅之有益地方多矣縁贛州之稅正徳十一年該給事中黄重奏稱廣貨自南雄經南安折梅亭已兩稅矣贛州之稅不無重復已經勘明停止贛河之稅近復大舉夾攻軍餉仰給全在折梅亭之稅今所入如此非惟軍餉無益實惟奸宄是資随㑹同分守左􅂙議黄宏議照合将南安之稅移於􅀛角尾抽分既有分巡道之􅁥臨又有巡撫之統馭訪察數多奸􅁦自少其大􅁃縣顧夫銀兩合令該縣毎季具印信領狀赴道批行贛州府支領支盡查算准令復支如此非惟大􅁃過嶺之夫不缺而軍餉之用大増合就㑹案呈詳等因㩀呈到臣㸔得南贛二府啇稅皆因給軍餉􅁉民力而設折梅亭之稅名雖為夫役而實以給軍餉􅀛角尾之稅事雖重軍餉而亦以􅁉民力兩稅雖若二事其實殊途同歸但折梅亭雖已抽分而􅀛角尾不復致詰未免有脫漏之弊若折梅亭既已抽分而􅀛角尾又復致詰未免有留滯之􅅰況監司既逺胥猾得以恣其侵漁頭緒既多彼此得以容其奸隙若革去折梅亭之抽分而􅄣稅於􅀛角尾則事體歸一奸弊自消非但有資軍餉抑且便利客啇盖分合雖異而於啇稅事體無改纎毫轉移之間而於民啇利害相去倍蓰除臣欽遵節奉􅃙諭一應軍馬錢糧事宜俱聼便宜區畫事理将副使楊璋等所議行令該府一靣查照施行外縁係地方事理為此具本題知陞賞謝恩䟽正德十二年十月􅀄日節該欽奉􅃙得爾奏該福建兵備僉事等官胡璉等統領軍兵各分哨路於今年正月十八等日先後攻破長富村象湖山可塘洞等䖏巢穴擒斬首從賊級一千四百二十九名顆及該廣東兵備僉事等官顧應祥等統領軍兵分哨並進於今年正月二十四等日克破古村箭灌水竹等寨斬賊級一千二百七十二名顆各俘􅀗賊屬奪回人口頭畜器械等數多賊害既除良民安堵盖由爾申嚴號令䖏置有方以致各該官員奉行成算有此成功捷奏来聞朕心嘉悦除有功官軍民快人等待查勘至日陞賞外陞爾俸一級賞銀二十兩紵絲二表裏仍降􅃙奨勵爾其益竭心力大展才猷􅁱明武備多方計畫務使四省交界之區數年嘯聚之黨撫勦盡絶地方永􅀗安靖斯稱朕委任之意毋或狃于此捷􅃍生息玩致有他虞欽此欽遵臣惟賞及㣲勞則有功者益勸罰行親暱則有罪者益警近者閩廣之師幸而成功其方畧議於該部成算出於朝廷用命存於諸将戮力因於士卒臣不過申嚴號令敷布督促之而巳曾有何功而乃冐䝉褒賞增其禄秩錫以金幣臣實不勝慚汗惶恐之至然臣嘗有申明賞罰之奏矣嘗有願陛下俯從惟重之典以作敢勇之風之請矣巨之㣲勞懼不免於罪而陛下曲從該部之議特賜􅄖渥之恩者所謂賞及㣲勞将以激勸有功也昔人有云死馬且買之千里馬将至矣臣敢畏避冐賞之戮苟為遜譲以仰􅇳陛下激勵作興之盛心乎受命之餘感懼交集誓竭犬馬之力以効㳙埃之報臣不勝受恩感激之至横水桶岡捷音䟽十二年閠十二月􅀄二日㩀江西布按二司巡守嶺北道兵備副使楊璋左叅議黄宏㑹呈㩀一哨統兵贛州府知府邢珣呈督同興國縣典史區澄等官兵於十月十二等日攻破磨刀坑等巢十一月􅀄一等日攻破桶岡洞等巢二十三日會兵擊賊于上新地寨共十四䖏共擒斬大賊首雷鳴聰藍文亨梁伯安等六名顆賊從王禮生等二百四十一名顆俘􅀗賊屬并奪回􅀍虜男婦二百五十七名口燒毀賊巢房屋一百七十七間及奪馬牛贓仗等項二哨統兵福建汀州府知府唐淳呈督同上杭縣縣丞陳秉等官兵於十月十二等日攻破左溪等巢十一月􅀄一等日攻破十八磊等巢共十二䖏共擒斬大賊首藍天鳳藍八蘓景祥等四名顆賊從廖歐保等二百六十四名顆俘􅀗賊屬并奪回􅀍虜男婦五百四十四名口燒毀賊巢房屋七百一十二間及奪􅀗馬牛器械􅂍銀等項三哨統兵南安府知府季斆呈督同同知朱憲推官徐文英等官兵於十月十二等日攻破穩下等巢十二月􅀄三日擊賊於朱雀坑等巢共八䖏生擒大賊首髙文輝何文秀等五名擒斬賊從楊禮等三百六十一名顆俘􅀗賊屬并奪回􅀍虜男婦一百七十一名口燒毀賊巢房屋五百七十八間奪􅀗牛馬􅂍仗等物及先於七月二十五等日二次􅀍賊擁衆攻打本府城池統領本營官兵㑹同指揮来春馮翔與賊對敵本職下官兵舎人共擒斬賊從龍正等一百三名顆来春下官兵擒斬賊從王伯崇等二十五名顆馮翔下官兵擒斬賊從劉保等一百三十五名顆四哨統兵江西都司都指揮僉事許清開稱督領千戸林節等官兵於十月十二等日攻破鷄湖等巢共九䖏共擒斬大賊首唐洪劉允昌葉志亮譚祐李斌等共一十名顆賊從王志成等一百四十六名顆俘􅀗賊屬并奪回􅀍虜男婦一百三名口燒毁賊巢房屋二百間及奪􅀗牛馬􅂍仗等物五哨統兵守備南贛二府地方以都指揮體統行事指揮使郟文呈督領安逺縣義官唐廷華官兵於十月十二等日攻破獅子寨等巢二十三日㑹兵擊賊於上新地寨斬􅀗首賊藍文昭等三名顆擒斬賊從許受仔等一百六十六名顆俘􅀗賊屬并奪回􅀍虜男婦九十八名口燒毀賊巢房屋四百一十二間及奪􅀗牛馬器械等項六哨統兵贛州衞指揮余恩呈統領龍南縣新民王受等兵於十月十二等日攻破長流坑等巢共五䖏擒斬大賊首陳貴誠薛文髙劉必深三名顆賊從郭彦秀等一百七十七名顆俘􅀗賊屬并奪回􅀍虜男婦九十九名口燒毀賊巢房屋五百一十七間及奪􅀗馬驢器械􅂍銀等物七哨統兵寍都縣知縣王天與呈督同典史梁儀等官兵於十月十二等日攻破樟木坑等巢共䖏擒斬大賊首鄧崇㤗王孔