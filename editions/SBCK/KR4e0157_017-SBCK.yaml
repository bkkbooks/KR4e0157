body:
  text: 外集四序羅履素詩集序壬戌􅂂素先生詩一帙為篇二百有竒浙大叅羅公某以授陽明子某而告之曰是吾祖之作也今詩文之傳皆其崇髙顯赫者也吾祖􅀮扵草野其􅀁存要無愧扵古人然世未有知之者而􅀁為詩文又皆淪落止是某􅀅梓而傳焉懼人之以我為僣也吾子以為奚若某曰無傷也孝子仁孫之扵其父祖雖其服玩􅄝好之微猶􅀅謹守而弗􅃘廢况乎詩文其精神心術之􅀁寓有足以􅀤聞扵後者㢤夫先祖有美而弗傳是弗仁也夫孰得而議之蓋昔者夫子之取扵詩也非必其皆有聞扵天下彰彰然明著者而後取之滄浪之歌採之孺子萍實之謡得諸兒童夫固若是其寛慱也然至扵今其傳者不過數語而止則亦豈必其多之貴㢤今詩文之傳則誠富矣使有刪述者而去取之其合扵道也􅀎㡬􅂂素之作吾誠不足以知之顧亦豈無一言之合扵道乎夫有一言之合扵道是其扵世也亦有一言之訓矣又况其不止扵是也而又奚為其不可以傳㢤吾觀大叅公之治吾浙寛而不縦仁而有勇温文藴藉居然稠衆之中固疑其先必有以開之者乃今觀􅂂素之作而後知其􅀁􅀙来者之逺也世之君子茍未知大叅公之􅀁自吾請觀扵􅂂素之作茍未知􅂂素之賢吾請觀扵大叅公之賢無疑矣然則是集也固羅氏之文獻係焉其又可以無傳乎㢤大叅公起拜曰某固􅀅以為羅氏之書也請遂以吾子之言序之大叅公名鑒字某由進士累今官有厚徳長才向用未艾大叅之父某亦起家進士而以文學政事顯羅氏之文獻扵此益為有證云兩浙觀風詩序壬戌兩浙觀風詩者浙之士夫為僉憲陳公而作也古者天子廵狩而至諸侯之􅀦則命太師陳詩以觀民風其後廵狩廢而陳詩亡春秋之時列􅀦之君大夫相與盟㑹問遣猶各賦詩以言巳志而相祝頌今觀風之作蓋亦祝頌意也王者之廵狩不獨陳詩觀風而巳其始至方岳之下則望秩扵山川朝見茲土之諸侯同律暦禮樂制度衣服納價以觀民之好惡就見百年者而問得失賞有功罰有罪蓋􅀁以布王政而興治功其事亦大矣哉漢之直指循行唐宋之觀察㢘訪採訪之屬及今之按察雖皆謂之觀風而其實代天子以行廵狩之事故觀風王者事也陳公起家名進士自秋官郎擢僉浙臬執操縦予奪生死榮辱之柄而代天子觀風扵一方其亦榮且重㢤吁亦難矣公之始至吾浙􅆘􅀊之旱民不聊生飢者仰而待哺懸者呼而望解病者呻鬰者怨不得其平者鳴弱者强者蹶者囓者梗而孽者狡而􅀼者乗間投􅂩沓至而環起當是之時而公無以䖏之吾見其危且殆也賴公之才明知神武不震不激撫柔摩剔以克有濟期月之間而飢者飽懸者解呻者歌怨者樂不平者申蹶者起囓者馴孽者順􅀼者靖滌蕩剖刷而率以無事扵是乎修廢舉墜問民之疾苦而休息之勞農勸學以興教化然後上㑹稽登天姥入鴈蕩陟金娥覽􅀚江山之形勝嘅然太息吊子胥之忠誼禮嚴光之髙節希遐躅扵隆龎挹流風扵彷彿固亦大丈夫得志行道之一樂哉然公之始其憂民之憂也亦旣無􅀁不至矣公唯憂民之憂是以民亦樂公之樂而相與懽欣皷舞以頌公徳然則今日觀風之作豈獨見吾人之厚公抑以見公之厚扵吾人也雖然公之憂民之憂其惠澤則既無日而可忘矣民之樂公之樂其愛慕亦既與日而俱深矣以公之才噐天子其䏻乆容扵外乎則公固有時而去也然則其可樂者􅀎㡬而可憂者終誰任之則夫今日觀風之作又不徒以頌公之厚扵吾人􅀅遂因公而致望扵繼公者亦如公焉則公雖去而􅀁以憂其民者尚亦永有􅀁托而因以不墜也山東鄉試録序甲子山東古齊魯宋衛之地而吾夫子之鄉也嘗讀夫子家語其門人髙弟大抵皆出扵齊魯宋衛之葉固􅂅一至其地以觀其山川之靈秀竒特􅀅必有如古人者生其間而吾無􅀙得之也今年為弘治甲子天下當復大比山東廵按監察御史陸偁軰以禮與幣来請守仁為考試官故事司考校者惟務得人􅀄不限以職任其後三四十年来始皆一用學職遂致􅀿名取具事歸外簾而糊名易書之意微自頃言者頗以為不便大臣上其議天子曰然其如故事扵是聘禮考校盡如􅀦􅀄之舊而守仁得以部属来典試事扵茲土雖非其人寧不自慶其􅇜際又况夫子之鄉固其平日􅀁願一至焉者而乃得以盡觀其􅀁謂賢士者之文而考校之豈非平生之大幸歟雖然亦􅀼有大懼焉夫委重扵考校􅀅以求才也求才而心有不盡是不忠也心之盡矣而真才之弗得是弗明也不忠之責吾知盡吾心爾矣不明之罪吾終且柰何哉蓋昔者夫子之時及門之士嘗三千矣身通六藝者七十餘人其􅀹卓然而顯者徳行言語則有顔閔予賜之徒政事文學則有由求㳺夏之属今􅀁取士其始㧞自提學副使陳某者蓋三千有竒而得千有四百既而試之得七十有五人焉嗚呼是三千有竒者其皆夫子鄉人之後進而􅀗㳺扵門墻者乎是七十有五人者其皆身通六藝者乎夫今之山東猶古之山東也雖今之不逮扵古顧亦寧無一二人如昔賢者而今之􅀁取苟不與焉豈非司考校者不明之罪歟雖然某扵諸士亦願有言者夫有其人而弗取是誠司考校者不明之罪矣司考校者以是求之以是取之而諸士之中茍無其人焉以􅀿其求以不􅀒其􅀁取是亦諸士者之耻也雖然予豈敢謂果無其人哉夫子嘗曰魯無君子者斯焉取斯顔淵曰舜何人也予何人也有爲者亦若是夫爲夫子之鄉人苟未䏻如昔人焉而不耻不若又不知􅀁以自勉是自􅁀自棄也其名曰不肖夫不肖之與不明其相去何逺乎然則司考校者之與諸士亦均有責焉耳矣嗟夫司考校者之責自今不䏻以無懼而不可以有爲矣若夫諸士之責其不􅀎者猶可以自勉而又懼其􅂉以自畫也諸士無亦曰吾其朂㢤無使司考校者終不免扵不明也斯無媿扵是舉無媿扵夫子之鄉人也矣是舉也某某同事扵考校而御史偁實司監臨某某司提調某某司監試某某某又相與翊賛防範扵外皆與有勞焉不可以不書自餘百執事則已具列于錄矣氣候圖序戊辰天地一元之運為十二萬九千六百年分而為十二㑹㑹分而為三十運運分而為十二世世分而為三十年年分而為十二月月分而為二氣氣分而為三候􅀱分為五日日分為十二時積四千三百二十時三百六十日而為七十二􅀱㑹者元之候也世者運之候也月者􅀊之候也候者月之候也天地之運日月之明寒暑之代謝􅂔化人物之生息終始盡扵此矣月證扵月者也氣證扵氣者也候證扵物者也若孟春之月其氣為立春為雨水其候為東風解凍為蟄䖝始振為魚􅀒氷􅆩祭魚之􅀋月令諸書可考也氣候之運行雖出扵天時而實有􅀜扵人事是以古之君臣必謹修其政令以奉若夫天道致察乎氣運以警惕夫人爲故至治之世天無疾風肓雨之愆而地無昆䖝草木之孽孔子之作春秋也大雨震電大雨雪則書大水則書無水則書無麥苗則書多麋則書􅈮蜚雨螽蝝生則書六鷁退飛則書隕霜不殺草李梅實則書春無水則書鸜鵒采巢則書凡以見氣候之愆變失常而世道之興衰治亂人事之汙隆得失皆扵是乎有證焉􅀁以示世之君臣者恐惧修省之道也大總兵懐柔伯施公命繪工為七十二候圗遣使以幣走龍􅂣属守仁叙一言扵其間守仁謂使者曰此公臨政之本也善端之􅀤也戒心之萌也使者曰何以知之守仁曰人之情必有􅀁不敢忽也而後著扵其念必有􅀁不敢忘也而後存扵其心著扵其念存扵其心而後見之扵顔色言論志之扵􅃓矢几杖盤盂劍席繪之扵圗􅀞而日省之扵其心是故思馳騁者愛觀夫射獵逰田之物甘逸樂者喜親夫慱局燕飲之具公之見扵圗繪者不扵彼而扵此吾是以知其爲善端之􅀤也吾是以知其爲戒心之萌也其殆警惕夫人爲而謹修其政令也歟其殆致察乎氣運而奉若夫天道也歟夫警惕者萬善之本而衆美之基也公克念扵是其可以爲賢乎由是因人事以逹扵天道因一月之􅀱以觀夫世運㑹元以探萬物之幽􅄨而窮天地之始終皆扵是乎始吾是以喜聞而樂道之爲之叙而不辭也送毛憲副致仕歸桐江書院序戊辰正徳已巳夏四月貴州按察司副使毛公承上之命得致其仕而歸先是公嘗卜桐江書院扵子陵釣臺之側者㡬年矣至是􅀅歸老焉謂其志之始􅀗遂也甚喜而同僚之良惜公之去乃相與咨嗟不􅃘集而餞之南門之外酒既行有起而言扵公者曰君子之道出與䖏而巳其出也有􅀁為其䖏也有􅀁樂公始以名進士􅀙政南部理繁治劇頎然已有公輔之望及為方面扵雲貴之間者十餘年内厘其軍民外撫諸戎蠻夷政務舉而徳威著雖􅂉以是召嫉取謗而名稱亦用是益顯建立􅁀扵天下斯不謂之有􅀁為乎今茲之歸脫屣聲利垂竿讀書樂泉石之清幽就烟霞而屏迹寵辱無􅀁與而世累無􅀁加斯不謂之有􅀁樂乎公扵出䖏之際其亦無憾焉耳巳公起拜謝復有言者曰雖然公之出而仕也太夫人老矣先大夫忠襄公又遺未盡之志欲仕則違其母􅁒養則違其父不得已權二者之輕重出而自􅁬扵功業人徒見公之憂勞為􅀦而忘其家不知凡以成忠襄之志而未嘗一日不在扵太夫人之養也今而歸告成扵忠襄之廟拜太夫人扵􅂰下旦夕承懽伸色養之孝公之願遂矣而其勞􅀦勤民拳拳不舎之念又何䏻釋然而忘之則公雖􅁒一日遂歸休之樂蓋亦有􅀁未􅀎也公復起拜謝又有言者曰雖然君子之道用之則行舎之則藏用之而不行者徃而不返者也舎之而不藏者溺而不止者也公之用也既有以行之其舎之也有弗􅀎藏者乎吾未見夫有其用而無其體者也公又起拜遂行陽明山人聞其言而論之曰始之言道其事也而未及扵其心次之言者得公之心矣而未盡扵道終之言者盡扵道矣不可以有加矣斯公之􅀁􅁢蹈者乎諸大夫皆曰然子盍書之以贈􅀙者恩夀􅀟慶詩後序戊辰正徳丙寅丹徒沙􅀮王公夀七十配孺人嚴六十有九其年天子以厥子侍御君貴封公監察御史配爲孺人在朝之彦咸爲歌詩侈上之徳以祝公夀美侍御君之賢又明年侍御君奉命廵按貴陽以王事之靡盬􅀅厥父母之弗遑也載是冊以俱毎陟屺岵望飛雲徘􅆦瞻戀喟然而興嘆黯然而長思輒取是冊而披之而微諷之而長歌詠嘆之以舒其懐見其志雖身在萬里固若稱觴􅂰下聞詩禮而趨扵庭也大夫士之有事扵貴陽者自都憲王公而下復相與歌而和之聮爲巨帙属守仁叙扵其後夫孝子之扵親固有不必捧觴戯彩以爲夀不必柔滑㫖甘以爲養不必候起居奔走扶携以爲勞者非子之心謂不必如是也子之心􅂅如是而親以為不必如是必如彼而後吾之心始樂也子必為是不為彼以拂其情而曰吾以為孝其得為養志乎孝莫大乎養志親之願扵其子者曰弘乃徳逺乃猶嘻嘻旦夕孰與名垂簡冊以顯我扵無盡飲食口體孰與澤􅀍生民以張我之􅀎施服勞奔走孰與比迹䕫皐以明我之􅀎教非必親之願扵其子者咸若是也親以是􅂅其子而子弗䏻焉弗可得而􅂅也子􅀎之而親弗以􅂅其子焉弗可得而䏻也以是􅂅其子者賢父母也以是承扵其父母者賢子也二者􅁪百不一遇焉其庸可冀乎侍御君之在朝則忠愛逹扵上其廵按扵茲也則徳威敷扵下凡其宣布恩惠摩赤子起其疾而乳哺之者孰非公與孺人之慈凡其懾大奸使不得肆祛大弊使不復作􅐡梳調服撫諸夷而納之夏以免天子一方之顧慮者孰非侍御君之孝而凡若此者亦孰非侍御君之􅀁以夀扵公與孺人之夀哉公孺人之賢靳太史之序詳矣其􅀁以修其身教其家誠可謂有是父有是子是詩之作不為虚與䛕故為序之云爾重刋文章􅁤範序戊辰宋謝枋得氏取古文之有資扵􅂣屋者自漢迄宋凡六十有九篇標掲其篇章句字之法名之曰文章􅁤範蓋古文之奥不止扵是是獨為舉業者設耳世之學者傳習已乆而貴陽之士獨未之多見侍御王君汝楫扵按歴之暇手録其􅀁記憶求善本而校是之謀諸方伯郭公軰相與􅂢俸􅅒之資鋟之梓􅀅以嘉惠貴陽之士曰枋得為宋忠臣固以舉業進者是吾微有訓焉属守仁叙一言扵簡首夫自百家之言興而後有六經自舉業之習起而後有􅀁謂古文古文之去六經逺矣由古文而舉業又加逺焉士君子有志聖賢之學而專求之扵舉業何啻千里然中世以是取士士雖有聖賢之學尭舜其君之志不以是進終不大行扵天下蓋士之始相見也必以贄故舉業者士君子求見扵君之羔雉耳羔雉之弗飾是謂無禮無禮無􅀁庸扵交際矣故夫求工扵舉業而不事扵古作弗可工也弗工扵舉業而求扵倖進是偽飾羔雉以罔其君也雖然羔雉飾矣而無恭敬之實焉其如羔雉何㢤是故飾羔雉者非以求媚扵主致吾誠焉耳工舉業者非以要利扵君致吾誠焉耳世徒見夫由科第而進者􅀋多狥􅀻媒利無事君之實而遂歸咎扵舉業不知方其業舉之時惟􅁒釣聲利弋身家之􅃾以苟一旦之得而􅀄未嘗有其誠也鄒孟氏曰恭敬者幣之未􅀅者也伊川曰自洒掃􅀿對可以至聖人夫知恭敬之實在扵飾羔雉之前則知尭舜其君之心不在扵習舉業之後矣知洒掃應對之可以進扵聖人則知舉業之可以逹扵伊􅀓周召矣吾懼貴陽之士謂二公之為是舉徒以資其希寵禄之筌蹄也則二公之志荒矣扵是乎言五經臆􅀃序戊辰得魚而忘筌醪盡而糟粕棄之魚醪之未得而曰是筌與糟粕也魚與醪終不可得矣五經聖人之學具焉然自其已聞者而言之其扵道也亦筌與糟粕耳􅀼嘗怪夫世之儒者求魚扵筌而謂糟粕之為醪也夫謂糟粕之為醪猶近也糟粕之中而醪存求魚扵筌則筌與魚逺矣龍􅂣居南夷萬山中書卷不可携日坐石穴黙記舊􅀁讀書而録之意有􅀁得輒為之訓釋期有七月而五經之㫖畧遍名之曰臆􅀃蓋不必盡合扵先賢聊寫其胸臆之見而因以娛情養性焉耳則吾之為是固又忘魚而釣􅀉興扵麯蘖而非誠㫖扵味者矣嗚呼觀吾之􅀃而不得其心以為是亦筌與糟粕也􅀙而求魚與醪焉則失之矣夫􅀃凡四十六卷經各十而禮之􅀃尚多缺僅六卷云潘氏四封録序辛未歙潘氏之仕扵朝者户部主事君選大理寺副君珎戸部員外君旦南大理評事君鑑凡四人正徳五年冬珎旦以上三載㝡選鑑以兩宫徽號旬月之間皆得推恩封其親如其官焉扵是叙八制為録修上之賜以光其族裔而来謂某曰徳下寵浮若之何其可請一言以永我潘氏某曰一族而四顯来者相望也其盛哉夫一月之間而均􅀍榮渥則又何難也蓋吾聞之大山之木千仞而四􅆬垂而四峰之巔飛鳥之鳴聲不相及也春氣至而四􅆬之杪花葉若一則其􅀁出之根同有不期致焉潘氏之在婺聞望自宋元而来其培本則厚四子者固亦潘氏之四􅆬矣是惟否塞閉晦苟際明期而諧景㑹其軒竦條逹孰禦則夫寵命之沾暨不約而同也其又足異㢤雖然木之生風霆之皷舞炎暑之酷烈隂寒氷雪之嚴沍剥落俾堅其質而完其􅂔非獨雨露之沾濡生成之也夫恩寵爵禄雨露也號令宣播風霆也法度政事之苛宻煩困炎暑也時之險阨患難顛沛隂寒氷雪之嚴沍剥落也何莫而非生成四子蓋亦畧嘗歷之其材中楹柱而任梁棟矣吾願潘氏之益培其根也四子拜而起曰吾其益培之以忠孝乎溉之以誠敬乎植之以義而防之以禮乎某曰然則潘氏之軒竦條逹其益無窮爾已矣某不為應酬詩文餘四年矣寺副君之為暨陽也予嘗許之文未及爲而有南北之别今兹復見扵京師而以是責償焉故不得而辭也送章逹徳歸東雁序辛未章達徳􅀅歸東雁石龍山人為之請扵是甘泉子托以考槃陽明子為之賦衡門客有在坐者啞然曰異哉二夫子之言吾不􅀎知之夫閟爾形無瑩爾精也其可矣今兹􅀅惟職業之弗遑而顧雁蕩之懐乎彼章子者雁蕩之産矣則又可以居而弗居依依扵京師者數年而未返是二者交相慕乎其外也夫苟㳺心恬淡而栖神扵流俗塵囂之外環諸之間其無屏霞天柱乎雁蕩又奚必造而後至不然托踪泉石而利禄羾其中雖廬常雲之頂其得而居諸扵是陽明子仰而喟俯而黙卒無以􅀿之也志其言以遺章子曰客見吾杜權焉行矣子毋忘客之言亦無以客之言而忘甘泉于之托夀湯雲谷序甲戌弘治壬戌春某西尋句曲與丹陽湯雲谷偕當是時雲谷方為行人留意神仙之學為予談呼吸屈伸之術凝神化氣之道蓋無􅀁不至及與之登三茅之巔下探葉陽休玉宸感陶隠君之遺迹慨嘆􅁾濁飄然有脱屣人間之志予時皆未之許也雲谷意不然之曰子豈有見扵吾乎予曰然子之眉間􅃤然猶有怛世之色是道也遅之十年庶㡬矣雲谷曰子見吾之貌而吾信吾之心旣别雲谷尋入爲給事中又遷爲右給事殫心職務驅逐瘁勞竟以直道抵權奸斥外而予亦以言事得罪奔走謫鄉不相見者十餘年至是正徳癸酉某月予自吏部徙官南太僕再過丹陽而雲谷已家居三年矣訪之迎謂予曰尚憶眉間之􅀃乎吾信吾之心而不若子之見吾貌何也今果十年而始出扵泥􅂗是則信矣然謂古之庶㡬也則貌益衰年益逝去道益逺獨是若未之盡然耳予曰乃今則㡬矣今吾又聞子之言見子之貌矣又見子之廬矣又見子之鄉人矣雲谷曰異哉言貌既逺矣廬與鄉人亦可以見我乎曰古之有道之士外槁而中澤䖏隘而心廣累釋而無􅀁撓其精機忘而無所忤扵俗是故其色愉愉其居于于其􅀁􅇜若清風之披物而莫知其􅀁􅀙徃也今子之歩徐髪改而貌若益憊然而其精藏矣言下意懇而氣若益衰然而其神守矣室廬無􅀁増益扵舊而志意擴然其累釋矣鄉之人相忘扵賢愚貴賤且以為慈母且以為嬰兒其機忘矣夫精藏則太和流神守則天光􅀤累釋則怡愉而靜機忘則心純而一四者道之證也夫道無在而神無方安常䖏順其至矣而又何人間之脱屣乎雲谷曰有是㢤吾信吾之心乃不若子之見吾廬與吾鄉人也扵是雲谷年七十矣是月值其懸弧鄉人方謀所以祝夀者聞予至皆来請言子曰嘻子之鄉先生旣㡬扵道而尚以夀為賀乎夫夀不足以為子之鄉先生賀子之鄉而有有道之士若子之鄉先生者使爾鄉人之子弟皆有􅀁矜式視傚出而事君則師其道以用世入而家居則師其道以善身若射之有的各中乃􅀁向則是先生之夀乃扵爾鄉之人復有足賀也巳明年三月予再官鴻臚而鄉之人復以書来請遂追書之文山别集序甲戌文山别集者宋丞相文山先生自述其勤王之􅀁經歴後人因而採集之以成者也其間􅀁值險阻艱難顛沛萬状非先生之述固無􅀙而盡知者先生忠節蓋宇宙皆扵是而有據後之人因詞考迹感先生之大義油然興起其忠君愛􅀦之心固有泫然泣下裂眥扼腕思䘮元首之無地者是集之有益扵臣道豈小小㢤古之君子之忠扵其君求盡吾心焉以自慊而已亦豈屑屑言之以蘄知扵世然而仁人之心忠扵其君亦􅁒夫人之忠扵其君也忠扵其君則盡心焉已欲夫人忠扵其君而思以吾之忠扵其君者啓其良心固有人弗及知之者非自言之何由以及人乎斯先生之􅀁為自述􅀅以教世之忠也當其時仗節死義之士無不備載亦因是以有傳是又與人為善者也是集也在先生之自盡若嫌扵蘄世之知以先生之教人則吾惟恐其知之不盡也在先生之自盡若可以無傳以先生之與人為善則吾惟恐其傳之不逺也先生之裔孫今太僕少卿公宗巖復刻是集而属某為之序某之為廬陵也公之族弟某嘗以序謀茲故不可得而辭嗚呼當顛沛之心而不忘乎與人為善者節之􅁉也致自盡之心而欲人同歸扵善者忠之推也不以蘄知為嫌而行其教人之誠者仁之篤也象賢崇徳以章其先世之美之謂孝明訓述事以廣其及人之敎之謂義吾扵是集之序無愧辭耳矣金壇縣志序乙亥麻城劉君天和之尹金壇也三月而政成考邑之故而創志焉曰扵乎艱㢤吾􅁒觀風􅂔之􅀁宜民俗之􅀁向而無􅀁證也以諏扵鄉老有遺聽焉吾欲觀徃昔之得失民俗之急緩弛張先後之無􅀁稽也以詢扵閭野有遁情焉吾欲觀山川之條理疆􅏾之􅀁際道路井邑之徃来聚散制其經適其變而無所裁也則以之闢荒􅁾入林麓有遺厯焉亦惟文獻之未足也而爾已矣嗚呼古君子之忠也舊政以告扵新尹吾何以盡吾心㢤夫政有時而􅂉息焉告有時而􅂉窮焉書之冊而世守之斯其為告也不亦逺乎志成使来請序吾觀之秩然其有倫也錯然其有章也天也物之祖也地也物之妣也故先之以天文而次之以地理地必有􅀁産故次之以食貨物産而事興故次之以官政政行而齊之以禮則敎立故次之以學校學以興賢故次之以選舉賢興而後才可論也故次之以人物人物必有􅀁居故次之以宫室居必有􅀁事事窮則變變則通故次之以雜志終焉嗚呼此豈獨以志其邑之故君子可以觀政矣夫經之天文􅀁以立其本也紀之地理􅀁以順其利也叅之食貨􅀁以遂其養也綜之官政􅀁以均其施也節之典禮􅀁以成其俗也逹之學校􅀁以新其徳也作之選舉所以用其才也考之人物􅀁以辨其等也修之宫室􅀁以安其居也通之雜志􅀁以盡其變也故本立而天道可睹矣利順而地道可因矣養遂而民生可厚矣施均而民政可平矣俗成而民志可立矣徳新而民性可復矣才用等辨而民治可乆矣居安盡變而民義不匱矣修此十者以治逹之􅀖國天下可也而况扵邑乎故曰君子可以觀政矣送南元善入覲序乙酉渭南南侯之守越也越之敝數十年矣巨奸元憝窟據根盤良牧相尋未之䏻去政積事隳俗因隳靡至是乃斬然翦剔而一新之􅇯惡貪殘禁不得行而狡偽􅁋侈㳺惰茍安之徒亦皆拂戾失常有􅀁不便相與斐斐緝緝搆讒騰誹城狐社䑕之奸又從而黨比翕張之謗遂大行士夫之為元善危者沮之曰謗甚矣盍已諸元善如不聞也而持之彌堅行之彌决且曰民亦非無是非之心而蔽昧若是固學之不講而敎之不明也吾寧無責而獨以咎歸扵民則日至學宫進諸生而作之以聖賢之志啓之以身心之學士亦蔽扵習染閧然疑恠以駭曰是迂闊之談􅀅廢吾事則又相與斐斐緝緝訾毀而詆議之士夫之為元善危者沮之曰民之謗若火之始炎士又􅀙而膏之孰􅀎以無燼乎蓋遂巳諸元善如不聞也而持之彌堅行之彌决則又緝稽山書院萃其秀潁而日與之諄諄焉亹亹焉越月踰時誠感而意孚三學泊各邑之士亦漸以動日有􅀁覺而月有􅀁悟矣扵是爭相􅁬曰吾乃今知聖賢之必可爲矣非侯之至吾其已夫侯真吾師也扵是民之謗者亦漸消沮其始猶曰侯之扵我利害半我之扵侯恩愛半至是惠洽澤流而政益便相與悔曰吾始不知侯之愛我也而反以為殃我也吾始不知侯之拯我也而反以為勞我也我其無人之心乎侯真吾之嚴父也慈母也扵是侯且入覲百姓皇皇請留不得相與謀之多士曰吾去􅄌母吾􅀅安哺乎嚴父吾去吾􅀅安恃乎士曰吁嗟維父與母則生爾身維侯我師實生我心吾寧可以一日而無吾師之臨乎則相與假重扵陽明子而乞留焉陽明子曰三年之覲大典也侯焉可留乎雖然此在爾士爾民之心夫承志而無違子之善養也離師友而不背弟子之善學也不然雖居􅂰下而侍几杖猶為不善養而操戈入室者也奚必以留侯為㢤衆皆黙然良乆曰公之言是也相顧逡廵而退明日復師生相率而来請曰無以輸吾之情願以公言致之扵侯庶侯之遄其来旋而有以速諸生之化慰吾民之延頸也送聞人􅀖允序聞人言􅀖允者陽明子之表弟也􅀅之官閩之嵢峽而請言陽明子謂之曰重矣勿以進非科第而自輕榮矣勿以官卑而自慢夫進非科第則人之待之也易以輕􅀙而自輕者有矣官卑則人之待之也易以慢􅀙而自慢者有矣夫科第以致身而恃以爲􅁀是厲階也髙位以行道而遽以媒利是盗資也扵吾何有㢤吾􅀁謂重吾有良貴焉耳非矜與敖之謂也吾􅀁謂榮吾職易舉焉耳非顯與耀之謂也夫以良貴爲重舉職爲榮則夫人之輕與慢之也亦扵吾何有哉行矣吾何言送别省吾林都憲序戊子嘉靖丁亥冬守仁奉命視師思田省吾林君以廣西右轄實與有司既思田来格謀􅀁以緝綏之道咸以爲非得寛厚仁恕徳威素爲諸夷所信服者父臨而母鞠之殆未可以強力詭計劫制扵一時而􅀎乆扵無變者也則莫有踰扵省吾者遂以省吾之名上請乞加憲職委之重權以留撫扵兹土蓋一年二年而化洽心革朝廷永可以無一方顧也乎則又以爲聖天子方側席勵精求卓越之才湏更化善治則如省吾之成徳夙望大臣且交章論薦􅂉者請未及上而先已有隆委峻擢恐未肯爲區區兩府之遺黎淹􅀊月而借之以重也䟽去未踰月而廵撫鄖陽之命果下矣當是時八寨之徭積禍千里且數十年方議進兵討罪省吾􅀅率思田報效之民以先之報聞衆咸為省吾賀且謂得免兵革驅馳之勞也省吾曰不然當事而中輟之仁者􅃘之乎遇難而茍避之義者為之乎吾既身任其責幸有改命而亟去之以為吾心吾􅀎如是哉遂弗停驅而徃冐暑雨犯瘴毒乗危破險竟成八寨之伐而出嗟乎今世士夫計逐功名甚扵市井刀錐之較稍有患害可相連及輒設機阱立黨援以巧脫幸免一不遂其􅀻瞋目攘臂以相抵捍鈎摘公然為之曾不以為耻而人亦莫有非之者蓋士風之衰薄至扵此而亦極矣而省吾所存獨與時俗相反若是古􅀁謂托􅀌􅀉命臨大節而不可奪者省吾有焉正徳􅀄某以武選郎抵逆瑾逮錦衣獄而省吾亦以大理評觸時諱在繫相與講易扵桎梏之間者彌月蓋晝夜不怠忘其身之為拘囚也至是别已餘二十年而始復㑹扵此省吾貌益充氣益粹議論益平實而其孜孜講學之心則固如昔加懇切焉公事之餘相與訂舊聞而考新得予自近年偶有見扵良知之學遂具以告扵省吾而省吾聞之沛然若决江河可謂平生之一快無􅀒扵二十年之别也矣今夫天下之不治由扵士風之衰薄而士風之衰薄由扵學術之不明學術之不明由扵無豪傑之士者為之倡焉耳省吾忠信仁厚之質得之于天者既與人殊而其好學之心又􅀎老而不倦若此其徳之日以新而業之日以廣也何疑乎自此而明學術變士風以成天下治􅀅不自省吾為之倡也乎扵省吾之别庸書此以致切劘之意若夫期望扵聲位之間而繫情扵去留之際是奚足為省吾道之㢤王文成公全書卷二十二終
