  text: 王文成公全書卷之三十七
  hash: sha256:405ffa159d87a2112b5519c7b1651c14497b3482be7db033fc1f14f9decb72f5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_001-1a}
body:
  text: 附錄六世徳紀傳王性常先生傳張壹民撰王綱字性常一字徳常弟秉常敬常並以文學知名性常尤善識鑒有文武長才少與永嘉高則誠族人元章相友善往來山水間時人莫測也元末嘗奉母避兵五􅂥山中有道士夜投宿性常異其氣貌禮敬之曰君必有道者願聞姓字道士曰吾終南隱士趙縁督也與語逹旦因授以筮法且爲性常筮之曰公後當有名世者矣然公不克終牗下今能從吾出遊乎性常以母老有難色道士笑曰公俗縁未斷吾固知之遂去誠意伯劉伯温㣲時常造焉性常謂之曰子真王佐才然貌㣲不稱其心宜厚施而薄受之老夫性在丘壑異時得志幸勿以世縁見累則善矣後伯溫竟薦性常於朝洪武四年以文學徴至京師時性常年巳七十而齒髮精神如少壮上問而異之親䇿治道嘉恱其對拜兵部郎中未幾潮民弗靖遂擢廣東叅議往督兵糧謂􅀁親曰吾命盡兹行乎致書與家人訣擕其子彦逹以行至則單舸往諭潮民感恱咸扣首服罪威信大張回至増城遇海㓂曹真竊􅀤皷譟突至截舟羅拜願得性常為帥性常諭以逆順禍福不從則厲聲叱駡之遂共扶舁之而去賊爲壇坐性常日羅拜請不已性常亦罵不絶聲遂遇害時彦逹亦隨入賊中從傍哭罵求死賊欲并殺之其酋曰父忠而子孝殺之不祥與之食不顧賊憫其誠孝容令綴羊革褁尸􅀒之而出得歸􅁙禾山洪武二十四年御史郭純始備上其事得立廟死􅀁錄用彦逹彦逹痛父以忠死躬耕養母麄衣惡食終身不仕性常之殁彦逹時年十六云遯石先生傳祭酒胡儼撰翁姓王氏諱與凖字公度浙之餘姚人晉右軍將軍羲之之裔也父彦逹有隱操祖廣東叅議性常以忠死難朝廷旌錄彦逹而彦逹痛父之死終身不仕悉取其先世􅀁遺書付翁曰但母廢先業而巳不以仕進望爾也翁閉門力學盡讀􅀁遺書鄕里後進或来從學者輙辭曰吾無師承不足相授因去從四明趙先生學易趙先生竒其志節妻以族妹而勸之仕翁曰昨聞先生遯世無悶之誨與準請終身事斯語矣趙先生媿謝之先世嘗得筮書於異人翁暇試取而䆒其術爲人筮無不竒中逺近輻輳縣令亦時遣人來邀筮後益數數日或二三至翁厭苦之取其書對使者焚之曰王與凖不􅀎爲術士終日奔走公門談禍福令大㗸之翁因逃入四明山石室中不歸者年餘時朝廷督有司訪求遺逸甚嚴部使者至縣欲起翁令因言曰王與準以其先世嘗死忠朝廷待之薄遂父子誓不出仕有怨望之心使者怒拘翁三子使人督押入山求之翁聞益􅀷遯墜厓傷足求者得之以出部使見翁創甚且視其言貌坦直無他翁亦備言其焚書逃遯之故使者悟始釋翁見翁次子世傑之賢因謂翁曰足下不仕終恐及罪寧􅀎以子代行乎不得已遂􅀘世傑邑庠弟子員而翁竟以足疾得免翁謂人曰吾非惡富貴而樂貧賤顧吾命甚薄且先人之志不􅃘渝也又曰吾非傷於石􅀅不􅀎遂栖遯之計石有徳於吾不敢忘也因自號遯石翁云翁偉貌修髯精䆒禮易著易㣲數千言嘗筮居秘圗湖隂遇大有之震謂其子曰吾先世盛極而衰今衰極當復矣然必吾後再世而始興乎興必盛且乆至是翁沒且十年而世傑以名儒宿學膺貢來遊南雍大司成陳公一見待以友禮使母就弟子列命六堂之士咸師資之儼忝與同舎受世傑教益爲㝡多而相知爲㝡􅀷因得備聞翁之隱徳乃􅀻爲志之若此昔人有言公侯子孫必復其始王氏自漢吉祥至祥覽皆以令徳孝友垂􅁉江左聮綿數百祀門第之盛天下莫敢望中㣲百餘年天道未爲無意也元末時其先世嘗遇異人謂其後必有名世者出而翁亦嘗再世而興之筮今世傑於翁亦再世矣充世傑之道真足以弘濟天下而䏻澹然爵禄不入其心古􅀁謂富貴不䏻􅁋貧賤不䏻移威武不䏻屈者吾誠於世傑見之異時求當天下之大任者非世傑而誰乎則異人之言與翁之筮於是始可驗矣槐里先生傳編修戚瀾撰先生姓王名傑字世傑居秘圗湖之後其先世嘗植三槐於門自號槐里子學者因稱曰槐里先生始祖爲􅀳右􅀅軍羲之曾祖綱性常與其弟秉常敬常俱以文學顯名國初而性常以廣東叅議死於苗之難祖秘湖漁隱彦逹父遯石翁與凖皆以德學爲世隱儒先生自爲童子即有志聖賢之學年十四盡通四書五經及宋諸大儒之說時朝廷方督有司求遺逸部使者聞遯石翁之名及門迫起之不可得見先生竒焉謂遯石翁曰足下不屑就罪且及身寧䏻以子代行乎不得已乃遣先生備邑庠弟子員時教諭程晶􅀒才倨傲奴視諸生見先生輙敬服語人曰此今之黄叔度也歳當大比邑有司首以先生應薦比入試衆皆散髪􅃝衣先生歎曰吾寜曵履衡門矣遂歸不復應試宣徳間詔中外舉異才堪風憲者破常調任使之時先生次當貢邑令黄維雅重先生爲之具行李戒僕從強之應詔先生固以親老辭乃譲其友汪生叔昻既而遯石翁殁又當貢復以母老辭讓其友李生文昭而躬耕受徒以養其母饔飱不繼休如也母且殁謂先生曰爾貧日益甚吾死爾必仕母忘吾言已終䘮先生乃膺貢入南雍祭酒陳公敬宗聞先生至待以友禮使母就弟子列明年薦先生於朝未報而先生殁先生儀觀玉立秀目修髯望之以為神人無賢愚戚踈皆知敬而愛之言行一以古聖賢為法嘗謂其門人曰學者䏻見得曽􅀧意思􅀅灑然無入而不自得爵禄之無動於中不足言也先生與先君泠川先生友先君毎稱先生􅀁著易春秋說周禮考正以為近世儒者皆􅀁不及與人論人物必以先生為稱首瀾時爲童子竊志之然從先君宦遊於外無因及門也今玆之歸先生殁巳乆矣就其家求􅀁著述僅存槐里雜稿數卷而􅀁謂易春秋說周禮考正者則先生之殁於南雍其二子皆不在侍爲其同舍生􅀁取巳盡亡之矣嗚呼惜哉先君㓜時嘗聞鄉父老相傳謂王氏自東晉来盛江左中㣲且百數年元時有隱士善筮者與其先世遊嘗言其後當有大儒名世者出意其在先生而先生亦竟不及用豈尚在其子孫耶竹軒先生傳布政魏瀚撰先生名倫字天叙以字行性愛竹􅀁居軒外環植之日嘯咏其間視紛華􅀔利泊如也客有造竹􅀁者輙指告之曰此吾直諒多聞之友何可一日相舎耶學者因稱曰竹軒先生早承厥考槐里先生廷訓徳業夙成甫冠浙東西大家爭延聘爲子弟師凡及門經指授者徳業率多可觀槐里先生蚤世環堵蕭然􅀁遺惟書史數篋先生每啓篋輙揮涕曰此吾先世之􅀁殖也我後人不殖則􅀅落矣乃窮年口誦心惟於書無􅀁不讀而尤好觀儀禮左氏傳司馬遷史雅善鼓琴每風月淸朗則焚香操弄數曲弄罷復歌古詩詞而使子弟和之識者謂其胸次灑落方之陶靖節林和靖無不及焉居貧躬授徒以養母母性素嚴重而扵外家諸􅀌弟妹憐愛甚切至先生每先意承志觧衣推食惟恐弗及而於妻孥之寒餒弗遑恤焉弟粲㓜􅀌爲母􅀁鍾愛先生少則教之扵家塾長則挈之遊江湖有無欣戚罔不與居逮子華官翰林請於朝分禄以為先生養先生復推其半以贍弟鄉人有箕豆相煎者聞先生風多愧悔更為敦睦之行先生容貌環偉細目美髯與人交際和樂之氣藹然可掬而對門人弟子則矩範嚴肅凛乎不可犯為文章好簡古而厭浮靡賦詩援筆立就若不介意而亦未嘗逸於法律之外􅀁著有竹軒稿及江湖雜稿若干卷藏于家先生與先君菊荘翁訂盟吟社有莫逆好瀚自致政歸毎月旦亦􅀗陪先生杖屨遊且辱知於先生仲子龍山學士學士之子守仁又與吾兒朝端同舉扵鄉累世通家知先生之􅀷者固莫如瀚因節其行之大者於此以備大史氏之採擇焉海日先生墓誌銘大學士楊一淸撰正徳巳卯寧濠稱亂江西鳩集群盗􅀤數千艘而東遠近震動廵撫南贛都御史王守仁伯安傳檄鄰境舉兵討賊時其父南京吏部尚書王公致仕居會稽有傳伯安遇害者人謂公曰盍避諸公曰吾兒方舉大義吾避安之或曰伯安既􅄷賊賊必隂使人行不利於公避之是也公笑曰吾兒䏻棄家討賊吾何可先去以為民望祖宗功澤在天下賊行且自斃吾為國大臣恨老不䏻荷戈首敵即有不幸猶􅀅與鄉里子弟共死此城耳因使人趣郡縣宜急調兵糧為備禁訛言勿令動揺人心鄕人竊視公晏然如常時衆志亦稍稍定盖不旬月而伯安之捷報至矣初賊濠東下􅀅趨南都伯安引兵入南昌奪其巢賊聞大恐急旋舟伯安帥吉安知府今都憲伍君文定等大戰於鄱陽湖賊兵風靡遂擒濠并其黨與數千人獻俘於闕嗚呼自古奸雄搆亂雖有忠臣義士必假以歲月乃䏻削平禍難伯安􅁬戈一呼以身臨不測之淵呼吸之間地方大定公聞變從容群􅅝衆惑屹然不為動伯安得直前狥國不嬰懐回顧以成懋績公之雅量伯安之忠義求之載籍可多見哉及是武廟南廵權奸妬功搆飛語䧟伯安跡甚危衆慮禍且及家公寂若無聞辛已今皇帝入嗣大統始下詔表􅀭伯安之功召還京師因得便道歸省㝷論功封奉天翊運推誠宣力守正文臣特進光祿大夫柱國新建伯又以廷推兼南京兵部尚書叅賛機務錫之誥劵封公勲階爵邑如子俾子孫世其爵適公誕辰伯安捧觴為壽公蹙然曰吾父子乃得復相見邪賊濠之亂皆以汝為死矣而不死以為事難猝平而平之然此仗宗社神靈朝廷威徳豈汝一書生􅀁􅀎辦比讒構横行禍機四􅀤頼武廟英明保全今國是既定吾父子之榮極矣然福者禍之基䏻無懼乎古云知足不辱知止不殆吾老矣得父子相保牗下孰與犯􅄹滿之戒覆成功而毀令名者邪伯安跪曰謹受教公自是日與姻黨置酒宴樂􅀊暮舊疾作嘉靖壬午春二月十二日終于正􅆍得年七十有七未屬纊時使者以部咨􅀅新命至公尚䏻言趣諸子曰不可以吾疾廢禮宜急出迎既成禮偃然而逝訃聞上賜諭祭命有司治􅁙事伯安偕諸弟卜以卒之明年秋八月某日􅁙公郡東天柱峯之南之原具書戒使者詣鎮江請予銘公墓予曩官外制官太常接公班行不鄙謂予以知言見待予遷南京太常辱贈以文公校文南畿道舊故甚洽正徳丁卯取嫉權奸歸致仕予亦避讒構謝病歸杜門不接賔客公直造内室慰語乆之伯安又予掌銓時首引置曹屬號知已公銘當予屬顧以江西之變􅀜繋公父子大節特先書之乃按公門人國子司業陸君􅀷􅀁著状摘而叙之曰公姓王氏諱華字徳輝號實菴晚號海日翁嘗讀書龍泉山中學者稱為龍山先生上世自琅琊徙居會稽之山隂又自山隂徙餘姚四世祖諱性常有文武才國初爲誠意伯􅀁薦仕至廣東叅議峒苗為亂死之髙祖諱彦逹號秘湖漁隱年十六褁父屍自苗壤歸􅁙痛父死忠布􅂼終其身人稱孝子曾祖諱與準號遯石翁學精於易嘗筮得震之大有謂其子曰吾後再世其興興其乆乎祖諱世傑號槐里子以明經貢為太學生卒父諱天叙號竹軒􅀄以公貴封修撰後與槐里公俱贈嘉議大夫禮部右侍郎今以伯安功俱追封新建伯祖妣孟氏封淑人妣岑氏累封太淑人進封太夫人公生正統丙寅九月孟淑人夣其姑抱緋衣玉帶一童子授之曰婦事吾孝孫婦亦事汝孝吾與若祖丐於上帝以此孫􅂌汝世世榮華無替故公生以今名名長兄以榮名符夣也公生而警敏始􅀎言槐里公口授以詩歌經耳輙成誦稍長讀書過目不忘六􅀊與群兒􅃧水濵見一客来濯足巳大醉去遺其􅀁提嚢取視之數十金也公度其醒必復来恐人持去以投水中坐守之少頃其人果號而至公迎謂曰求爾金邪爲指其處其人喜以一錠爲謝􅁍不受年十一從里師授業日異而月不同􅀊終里師無􅀁施其教年十四嘗與諸子弟讀書龍泉山寺寺故有妖物爲祟解傷人寺僧復張皇其事諸生皆䘮氣走歸公獨留居妖亦寖滅僧以為異假妖勢恐且試之百方不色動僧謝曰君天人也異時福徳何可量弱冠提學張公時敏試其文與少傅木齋謝先生相甲乙並以状元及第竒之名遂起故家世族爭禮聘爲子弟師浙江方伯祁陽寗君良擇師於張公張公曰必􅁒學行兼優無如王某者寗親造其館賔禮之請為子師延至祁陽湖湘之士聞而来從者踵相接居寗之梅荘别墅墅中積書數千卷日夕諷誦其間學益進祁俗好妓飲公峻絶之三年如一日祁士有化服者歸連舉不利成化庚子􅀤觧浙江第二人明年辛丑廷試第一甲第一人授翰林院修撰甲辰充廷試彌封官丁未同考㑹試弘治改元戊申與修憲廟實録充經筵官己酉滿九載以竹軒公憂去癸丑服闋遷右春坊右諭徳丙辰命為日講官賜金帶四品服公講筵音􅄍明暢詞多切直每以勤聖學戒逸豫親仁賢遠邪佞為勸孝廟嘉納焉内侍李廣方貴幸嘗講太學衍義至唐李輔國結張后表裏用事衆以事頗渉嫌欲諱之公朗然誦說無少避忌左右皆縮頸􅄍舌上樂聞之不厭罷講遣中官賜尚食皇太子出閣詔選正人輔導用端國本公卿多薦公自是日侍東宫講讀眷賜加隆戊午命主順天鄉試辛酉再主鄉試應天得士爲多壬戌遷翰林院學士食從四品禄命授庶吉士業修大明㑹典爲纂修官書成遷詹事府少詹事兼學士掌院事與編纂通鑑纂要是􅀊遷禮部右侍郎仍兼日講武廟嗣位遣祭江淮諸神乞便道歸省以岑太夫人年髙乞歸便養不允明年改元丙寅瑾賊竊柄士夫側足立爭奔走其門求免禍公獨不往瑾銜之時伯安爲兵部主事䟽瑾罪惡瑾矯詔執之㡬斃廷杖竄南荒以去瑾復移怒於公㝷知為㣲時􅀁聞名士意稍解冀公一見且􅀅柄用焉公竟不往瑾益怒丁卯遷南京吏部尚書猶以舊故慰言冀必往謝公復不行遂推㝷禮部舊事與公本不相渉者勒令致仕既歸有以其同年友事誣毁之者人謂公當速白不然且及罪公曰是焉􅀎凂我我何忍訐吾友後伯安復官京師聞士夫論及此􅀅䟽辨於朝公馳書止之曰汝􅀅重吾過邪公性至孝􅀄竹軒公病報至當道以不受當遷官宜出受新命公卧家不出日憂懼不知􅀁為踰月訃始至慟絶㡬䘮生襄塟穴湖山遂廬墓下墓故虎穴虎時群至不為害乆且益馴人謂孝感比致仕岑太夫人年近百􅀊公壽逾七十猶朝夕為童子嬉􅃧以悅親左右扶掖不忍斯湏去測太夫人卒塊苫擗踊過毁致疾及塟徒跣數十里疾益甚竟以是不起處諸昆弟篤友愛祿食贏餘恒與共之視其子若巳出氣質醇厚坦坦自信不立邉幅議論風生由􅂨而􅀤廣廷之論入對妻孥無異語人有片善亟稱之有急惻然赴之至人有過惡則盡言䂓斥不少囬曲坐是多遭嫉忌然人諒其無他則亦無􅀷怨之者識宏而守固百務紛沓應之如流至臨危疑震蕩衆披靡惶惑獨卓立毅然不為變若是盖有人不及知者矣公之學一出于正書非正不讀客有以仙家長生之術来􅀃者則峻拒之曰修身以俟命吾儒家法長生奚為儉素自持貨利得䘮不屑為意樓居厄于火貲積一空親朋来救焚者欵語如常為詩文取逹意不以雕刻為工而自合程度􅀁著有龍山稿垣南草堂稿禮經大義諸書雜録進講餘抄等稿共四十六卷藏于家􅀄配贈夫人鄭氏淵靜孝慈與公起㣲寒同貧苦躬紡績以奉舅姑既貴恭儉不衰壽四十一先公三十六年卒繼室趙氏封夫人側室楊氏子男四長即伯安守仁名别號陽明子其學邃於理性中外士爭師之稱陽明先生次守儉太學生次守文郡庠生次守章女一適南京工部都水郎中同邑徐愛􅀄鄭夫人祔塟穴湖已而改殯郡南石泉山石泉近有水患乃卜今地塟公云惟古賢人君子未遇之時毎以天下國家為巳任岀而登仕其􅀁遭際不同而其志有遂有不遂非人之􅀁􅀎為也公少􅀒竒氣壮強志存用世顧其職業恒在文字間而未􅀎逹之於政際遇孝宗講筵啓沃聖心簡在柄用有期不幸龍馭上賔弗䆒厥用晚登八座旋見沮於權奸􅅯蹇而歸豈非天哉然有子如伯安􅀁建立宏偉卓犖凡公之􅀁欲為噤而不得施用者皆於其子之身而顯施大􅀤之公又親及見之較之峻登大受既乆且專而泯然無聞於世者其髙下榮辱宜何如也王氏之先有植槐於庭䕃後三公者遯石翁大有之占其􅀋是乎銘曰孰不有母孰如公母壽七十之叟傞傞拜舞百􅀊而終歸得其􅀁孰不有子公子天下士亶其忠勤以事其事不有其身惟狥之義是子是父允文允武勲在冊府帝錫之爵土其生不􅀒而殁不朽銘以要諸乆海日先生行状國子司業門人陸􅀷譔先生姓王氏諱華字徳輝别號實菴晚復號海日翁嘗讀書龍泉山中學者又稱為龍山先生其先出自晉光祿大夫覽之曽孫右軍􅀅軍羲之由琅琊徙居會稽之山隂後二十三代孫廸功夀又自山隂徙餘姚至先生之四世祖廣東叅議性常又五世矣叅議博學善識鑑有文武長才與永嘉髙則誠族人元章相友善往来山水間時人莫測也誠意伯劉伯温㣲時嘗造焉叅議謂曰子真王佐才然異時勿累老夫則善矣伯温既貴遂薦以爲兵部郎中擢廣東叅議卒死於苗難高祖諱彦逹號秘湖漁隱漁隱年十六自苗中褁父尸歸塟朝夕哭墓下痛父以忠死麄衣惡食終身不仕鄉里以孝稱之曾祖諱與準號遯石翁偉貌修髯精䆒禮易著易㣲數千言居秘湖隂嘗筮得大有之震謂其子曰吾先世盛極而衰今衰極當復矣然必吾後再世而始興乎興必盛且乆爾雖不及顯身沒亦與有焉祖諱世傑號槐里子以明經貢爲太學生卒贈嘉議大夫禮部右侍郎祖妣孟氏贈淑人父諱天叙别號竹軒封翰林院修撰贈禮部右侍郎妣岑氏封太淑人正統丙寅九月甲午先生生先夕孟淑人梦其姑趙抱一童子緋衣玉帶授之曰新婦平日事吾孝今孫婦事汝亦孝吾與若祖丐於上帝以此孫􅂌汝子孫世世榮華無替故先生生而以今名名先生之長兄半岩先生以榮名夣故也先生生而警敏絶人始䏻言槐里先生抱弄之因口授以古詩歌經耳輙成誦稍長使讀書過目不忘六􅀊時與群兒􅃧水濵見一客来濯足已大醉遺其􅀁提嚢而去取視之數十金也先生度其人酒醒必復來恐人持去投水中坐守之有頃其人果號泣而至先生迎謂曰求爾金邪為指其處其人喜躍以一金謝先生笑却之曰不取爾數十金乃取爾一金乎客且慚且謝隨至先生家無少長咸遍拜而去岑太夫人嘗績窓下先生從旁坐讀書時邑中迎春里兒皆競呼出觀先生獨安讀書不輟太夫人謂曰若亦蹔往觀乎先生曰大人誤矣觀春何若觀書太夫人喜曰兒是也吾言誤矣年十一從里師錢希寵學初習對句月餘習詩又兩月餘請習文數月之後學中諸生盡出其下錢公嘆異之曰􅀊終吾無以教爾矣縣令呵從到塾同學皆廢業擁觀先生據案朗誦若無睹錢竒之􅃧謂曰爾獨不顧令即謂爾倨傲呵責及爾且柰何先生曰令亦人耳視之奚為若誦書不輟彼亦便柰呵責也錢因語竹軒公曰公子徳噐如是㫁非凢兒十四􅀊時嘗與親朋數人讀書龍泉山寺寺舊有妖為崇數人者皆富家子素豪俠自􅀒莫之信又多侵侮寺僧僧甚苦之信宿妖作數人果有傷者寺僧因復張皇其事衆皆失氣狼狽走歸先生獨􅅏居如常妖亦遂止僧咸以為異每夜分輙衆登屋號笑或瓦石撼卧榻或乗風雨雷電之夕􅁬撃門障僧從壁􅂩中窺先生方正􅁭危坐神氣自若輙又􅀻相嘆異然益多方試之技殫因從容問曰向妖為祟諸人皆􅀍傷君能獨無恐乎先生曰吾何恐僧曰諸人去後君更有􅀁見乎先生曰吾何見僧曰此妖但觸犯之無得遂巳者君安得獨無􅀁見乎先生笑曰吾見數沙彌爲祟耳諸僧相顧色動疑先生已􅁴其事因徉謂曰此豈吾寺中亡過諸師兄爲祟邪先生笑曰非亡過諸師兄乃見在諸師弟耳僧曰君豈親見吾儕爲之但臆􅀃耳先生曰吾雖非親見若非爾軰親為何以知吾之必有見邪寺僧因具言其情且嘆且謝曰吾儕實􅁒以此試君耳君天人也異時福德何可量至今寺僧猶傳其事天順壬午先生年十七以三禮投試邑中邑令竒其文後數日復特試之題下一揮而就令疑其偶遇宿構連三命題其應益捷因大竒賞謂曰吾子異日必大魁天下逺邇爭禮聘為子弟師提學松江張公時敏考校姚士以先生與木齋謝公爲首並稱之曰二子皆當状元及第福徳不可量也方伯祁陽寗公良擇師於張公張曰但求舉業髙等則如某某者皆可必欲學行兼優惟王某耳時先生甫踰弱冠寗親至館舍講賔主禮請爲其子師延至家湖湘之士翕然來從者以數十在祁居梅荘别墅墅中積書數千卷先生晝夜諷誦其間不入城市者三年永士有陳姓者聞先生篤學特至梅荘請益間取􅀁積書叩之先生皆黙誦如流陳嘆曰昔聞五經笥今乃見之祁俗好妓飲先生峻絶之比告歸祁士以先生客居三年矣乃祕兩妓於水次因餞先生於亭上宿焉客散妓從祕中出先生呼舟不得撤門爲桴而渡衆始嘆服其難始先生在梅荘嘗一夕夣迎春歸其家前後鼓吹旛節中導白土牛其後一人輿以從則方伯杜公謙也既􅁴先生以竹軒公岑太夫人皆生於辛丑謂白為凶色心惡之遂語諸生欲歸諸生堅留之寗生曰以紘占是夣先生且大魁天下矣夫牛丑屬也謂之一元大武辛金屬其色白春者一􅀊之首也世以状元為春元先生之登其在辛丑乎故事送状元歸第者京兆尹也其時杜公殆為京兆乎先生以親故遂力辭而歸舟過洞庭阻風君山祠下因入祠謁祝者迎問曰公豈王状元邪先生曰何從知之祝者曰疇昔之夕夣山神曰後日薄暮有王状元来吾以是知之先生異其言與梅荘之夣適相恊因備紀其事自是先生連舉不利至成化庚子始以第二人􅀤解明年辛丑果状元及第杜公為京兆悉如其占云是􅀊授官翰林院修撰甲辰廷試進士爲彌封官丁未􅂶會試同考官弘治改元與脩憲廟實録􅂶經筵官巳酉秩滿九載當遷聞竹軒疾即移病不出當道使人来趨親友亦交勸之且出遷官若凶聞果至不出未晚也先生曰親有疾已不􅀎匍匐歸侍湯藥又逐逐奔走為遷官之圗湏家信至幸而無恙出豈晚乎竟不出庚戌正月下旬竹軒之訃始至號慟屢絶即日南奔塟竹軒於穴湖山遂廬墓下墓故虎穴虎時時群至先生晝夜哭其傍若無睹者乆之益馴或傍廬卧人畜一不犯人以為異癸丑服滿陞右春坊右諭徳充經筵講官嘗進勸學䟽其畧謂貴緝熈于光明今毎􅀊經筵不過三四御而日講之設或間旬月而始一二行則緝熈之功無亦有間歟雖聖德天徤自䏻乾乾不息而宋儒程頥􅀁謂涵養本原薫陶德性者必接賢士大夫之時多而後可免於一􅁀十寒之患也上然其言御講日數丙辰三月特命爲日講官賜金帶四品服四月以選正人端國本公卿會推為東宫輔導戊午三月又命兼東宫講讀春賜日隆是􅀊奉命主順天府鄕試辛酉又奉命主應天鄉試壬戌陞翰林院學士從四品俸尋命教庶吉士魯鐸等繼又命與纂修大明㑹典踰年書成陞􅉟事府少􅉟事兼翰林院學士五月復命與編通鑑纂要六月陞禮部右侍郎仍兼日講上以先生講釋明贍故特乆任是􅀊冬命祭江淮諸神乞便道歸省還朝以岑太夫人年邁屢䟽乞休以便色養不允㝷陞禮部左侍郎明年武宗皇帝改元賊瑾用事呼吸成禍福士大夫奔走其門者如市先生獨不之顧時先生元子今封新建伯方為兵部主事上䟽論瑾罪惡瑾大怒既逐新建復移怒於先生然瑾㣲時嘗從先生鄕人方正習書史備聞先生平日處家孝友忠信之詳心敬慕之先生盖不知也瑾後知為先生怒稍觧嘗語隂使人謂於先生有舊若一見可立躋相位先生不可瑾意漸拂丁卯陞南京吏部尚書瑾猶以舊故使人慰之曰不乆􅀅大召冀必往謝先生又不行瑾復大怒然先生乃無可加之罪遂推㝷禮部時舊事與先生無干者傳㫖令致仕先生聞命忻然束裝而歸曰吾自此可免於禍矣既而有以同年友事誣毀先生於朝者人咸勸先生一白先生曰某吾同年友若白之是我訐其友矣是焉䏻凂我哉竟不辨後新建復官京師聞士夫之論具本奏辨先生聞之即馳書止之曰是以爲吾平生之大耻乎吾本無可耻今廼無故而攻􅀤其友之隂􅀻是反為吾求一大恥矣人謂汝智於吾吾不信也廼不復辨歷事三朝惟孝廟最知末年尤加眷注屢因進講勸上勤聖學戒逸豫親仁賢逺邪佞上皆虗心嘉納故事講官數人當直者必先期演習至上前猶或盩張失措先生未嘗豫習及進講又甚條暢一日上巳幸講筵直講者忽風眩仆地衆皆惶􅃍共推先生代先生從容就案展卷敷析尤極整暇衆咸服其噐度内侍李廣者方貴幸嘗於文華殿講大學衍義至唐李輔國與張后表裏用事諸學士欲諱不敢言先生特誦􅀃朗然開諷明切左右聞者皆縮頸􅄍舌而上樂聞不厭明日罷講命中官賜食中官密語先生云連日先生講書明白聖心甚喜甚加眷念先生自慶知遇益用剴切上亦精勤彌勵詎意孝廟升遐先生志未及行亦􅅯蹇而歸矣天道如斯嗚呼悲夫先生氣質醇厚平生無矯言飾行仁恕坦直不立邉幅與人無衆寡大小待之如一談笑言議由􅂨而􅀤廣庭之論入對妻孥曾無兩語人有片善稱之不容口有急難来控者惻然若身䧟於溝穽忘已拯救之雖以此招謗取嫌亦不恤然於人有過惡亦直言䂓切不肯少回曲以是往往反遭嫉忌然人亦知其實心無他則亦無有􅀷怨之者先生才識宏逹無􅀁不可而操持堅的屹不可動百務紛沓應之沛然未嘗見其有難䖏之事至臨危疑震蕩衆多披靡惶惑而先生毅然卓立然未嘗以此自表見故人之知者罕矣爲詩文皆信筆立就不事雕刻但取詞逹而止􅀁著有龍山稿垣南草堂稿禮經大義諸書雜録進講餘抄等稿共四十六卷先生孝友出于天性祿食􅄹餘皆與諸昆弟共之視諸昆弟之子不啻已出竹軒公及岑太夫人色愛之養無􅀁不至太夫人已百􅀊先生亦壽踰七十矣朝夕為童子色嬉􅃧左右撫摩扶掖未嘗少離或時為親朋山水之邀乗舟蹔出忽念太夫人即蹙然反棹及太夫人之殁􅃦苫􅂼食哀毁踰節因以得疾逮塟跣足隨號行數十里於是疾􅀔愈増病卧踰年始漸瘳然自是氣益衰先生素聞寧濠之惡疑其亂嘗􅀻謂􅀁親曰異時天下之禍必自兹人始矣令家人卜地於上虞之龍溪使其族人之居溪傍者買田築室潜爲棲遯之計至是正徳巳卯寧濠果􅀤兵爲變遠近傳聞駭愕且謂新建公亦以遇害盡室驚惶請徙龍溪先生曰吾往􅀊為龍溪之卜以有老母在耳今老母巳入土使吾兒果不幸遇害吾何􅀁逃於天地乎飭家人勿輕語動已而新建起兵之檄至親朋皆来賀益勸先生宜速迯龍溪咸謂新建既與濠為敵其􅀔必隂使奸人来不利扵公先生笑曰吾兒能棄家殺賊吾乃獨先去以爲民望乎祖宗德澤在天下必不使殘賊覆亂宗國行見其敗也吾爲國大臣恨巳老不􅀎荷戈首敵倘不幸勝􅀒之筭不可期猶􅀅與鄉里子弟共死此城耳因使趨郡縣宜急調兵糧且禁訛言勿令摇動鄉人来竊視先生方晏然如平居亦皆稍稍復定不旬月新建捷至果如先生􅀁料親朋皆擕酒交慶先生曰此祖宗深仁厚澤漸漬人心紀綱法度維持周宻朝廷威靈震懾四海蒼生不當罹此荼毒故旬月之間罪人斯得皆天意也豈吾一書生􅀁􅀎辨此哉然吾以垂盡之年幸免委填溝壑家門無夷僇之慘鄕里子弟又皆得免於征輸調􅀤吾兒幸全首領父子相見有日凡此皆足以稍慰目前者也諸親友咸喜極飲盡歡而罷巳而武廟南巡奸黨害新建之功飛語構䧟危疑洶洶旦夕不可測群小傎伺旁午於道或來先生家􅀻籍其産宇丁畜若􅀅抄没之爲姻族皆震撼莫知􅀁出先生寂若無聞日休田野間惟戒家人謹出入慎言語而巳辛巳今上龍飛始下詔宣白新建之功召還京師新建因得便道歸省尋進南京兵部尚書封新建伯遣行人賫白金文綺慰勞新建遂下温㫖存問先生於家兼有羊酒之賜適先生誕辰親朋咸集新建捧觴為夀先生蹙然曰吾父子不相見者㡬年矣始汝平㓂南贛日夜勞瘁吾雖憂汝之疾然臣職宜爾不敢為汝憂也寜濠之變皆以汝為死矣而不死皆以事為難平矣而卒平吾雖幸汝之成然此實天意非人力可及吾不敢為汝幸也讒構朋興禍機四􅀤前後二年岌乎知不免矣人皆為汝危吾䏻無危乎然扵此時惟有致命遂志動心忍性不為無益雖為汝危又復為汝喜也天開日月顯忠遂良穹官髙爵濫冐封賞父子復相見於一堂人皆以爲榮吾謂非榮乎然盛者衰之始福者禍之基雖以為榮復以為懼也夫知足不辱知止不殆吾老矣得父子相保於牗下孰與犯􅄹滿之戒覆成功而毁令名者邪新建洗而跽曰大人之教兒􅀁日夜切心者也聞者皆嘆息感動於是㑹其鄉黨親友置酒燕樂者月餘􅀊且暮疾復作新建率其諸弟日夜侍湯藥壬午正月􅀔轉劇二月十二日己丑終於正寢享年七十有七臨絶神識精明畧無昬憒時朝廷推論新建之功進封先生及竹軒槐里皆爲新建伯是日部咨適至属疾且革先生聞使者已在門促新建及諸弟曰雖倉遽烏可以廢禮爾軰必皆出迎間已成禮然後􅅯然瞑目而逝先生始致政歸客有以神仙之術來說者先生謝之曰人􅀁以樂生於天地之間以内有父母昆弟妻子宗族之親外有君臣朋友姻戚之懿從逰聚樂無相離也今皆去此而稿然獨往於􅀷山絶谷此與死者何異夫清心寡欲以怡神定志此聖賢之學􅀁自有吾但安樂委順聼盡於天而已奚以長生爲乎客謝曰神仙之學正謂世人恱生惡死故其􅀁欲而漸次導之今公巳無惡死恱生之心固以黙契神仙之妙吾術無􅀁用矣先生於異道外術一切竒詭之說廓然皆無􅀁入惟岑太夫人稍崇佛教則又時時曲意順從之亦復不以爲累也先生既歸即息意丘園或時與田夫野老同逰共談笑蕭然形迹之外人有勸之宜且閉門養威重者先生笑曰汝豈欲我更求作好官邪性喜節儉然於貨利得䘮曾不以介意嘗構樓居十數楹甫成而火貲積爲之一蕩親友來救焚者先生皆一一從容欵接談笑衎衎如平時畧不見有倉􅃍之色人以是咸嘆服其徳量云先生元配贈夫人鄭氏淵靖孝慈與先生共甘貧苦起㣲寒躬操井臼勤紡績以奉舅姑既貴而恭儉益至夀四十九先先生三十六年卒繼室趙氏封夫人側室楊氏子四人長守仁鄭出南京兵部尚書封新建伯次守儉楊出太學生次守文趙出郡庠生次守章楊出一女趙出適南京工部都水郎中同邑徐愛始鄭夫人殯郡南之石泉山已而有水患乃卜地於天柱峯之陽而塟先生焉􅀷先生南畿􅀁錄士也暨於登朝􅀗從班行之末受教最􅀷又辱與新建公游處出入門墻最乆毎當侍側講道之際觀法者多矣正徳壬申秋以使事之餘迂道拜先生於龍山里第扁舟載酒相與逰南鎮諸山乃休扵陽明洞天之下執手命之曰此吾兒之志也大業日逺子必勉之臨望而别嗚呼􅀷鄙陋無状不足以窺見髙􅀷然不敢謂之不知先生也謹按王君琥􅀁錄行實泣而叙之􅀅以上于史官告於當世之司文柄者伏惟採擇焉陽明先生墓誌銘甘泉湛若水撰甘泉子挈家閉􅀜於西樵烟霞之洞故友新建伯陽明王先生之子正億以其岳舅禮部尚書乆菴黄公之状及書來請墓銘曰公知陽明公者也非公莫能銘甘泉子曰吾又何辭焉公知陽明公者也非公莫䏻状公状之吾銘之公状其詳吾銘其大吾又何義之辭焉乃􅀤状而謹按之讀世系状云云曰公出於龍山状元大宗伯公華大宗伯公出扵贈禮部侍郎竹軒公天叙竹軒公出於太學生贈禮部侍郎槐里公傑槐里公出扵遯石公與凖厥有禮易之傳遯石公出扵秘湖漁隱公彦達秘湖出於性常公綱有文武長才與括蒼劉伯温友善仕爲廣東叅議死難也推其華胄遥遥逺􅂀於􅀳髙士羲之光祿大夫覽焉曰公其有􅀁本之矣夫水􅁟之積也厚其生物必蕃有以也夫讀誕生状云云曰祖妣岑太淑人有赤子乗雲下􅂌天樂導之之夣公乃誕焉是名曰雲盖徴之矣神僧言之遂改今名曰然則陽明公殆神授歟其異人矣六年乃言十一年有金山之詩十七年聞一齋聖人可學之語曰其有􅀁啓之矣讀學術状云云曰初溺於任俠之習再溺於􅀐射之習三溺於辭章之習四溺於神仙之習五溺於佛氏之習正徳丙寅始歸正于聖賢之學㑹甘泉子於京師語人曰守仁從宦三十年未見此人甘泉子語人亦曰若水泛觀於四方未見此人遂相與定交講學一宗程氏仁者渾然與天地萬物同體之指故陽明公初主格物之說後主良知之說甘泉子一主隨處體認天理之說然皆聖賢宗指也而人或舎其精義各滯執於彼此言語盖失之矣故甘泉子嘗爲之語曰良知必用天理天理莫非良知以言其交用則同也讀仕進状云云曰初舉巳未禮闈第一徐穆爭之落第二然益有聲登進士試工部差督造王威寧墳辭􅁍金幣獨受軍中佩劍之贈適符少時夣盖兆之矣䟽邉務朝政之失有聲授刑部主事審囚淮甸有聲告病歸養超􅀘兵部主事上䟽乞宥南京􅀁執諌官戴銑等母使逺道致死朝廷有殺諌官之名劉瑾怒矯詔廷杖之不死謫貴州龍塲驛萬里矣而公不少怵甘泉子贈之九章其七章云皇天常無􅀻日月常􅄹􅉻聖人常無為萬物常徃来何名為無為自然無安排勿忘與勿􅂇此中有天機其九章云天地我一體宇宙本同家與君心巳通别離何怨嗟浮雲去不停游子路轉賖願言崇明德浩浩同無涯及居夷端居黙坐而夷人化惡為善有聲人或吿曰陽明公至浙沉于江矣至福建始起矣登鼓山之詩曰海上曾爲滄水使山中又拜武夷君有徴矣甘泉子聞之笑曰此佯狂避世也故爲之作詩有云佯狂欲浮海說夣痴人前及後數年會于滁乃吐實彼誇虚執有以為神竒者烏足以知公者哉復起尹廬陵卧治六月而百務具理有聲取入南京刑部主事留爲吏部驗封主事有聲陽明公謂甘泉子曰乃今可卜鄰矣遂就甘泉子長安􅁅厰右鄰居之時講于大興隆寺而乆庵黃公宗賢會焉三人相懽語合意乆庵曰他日天台鴈蕩當爲二公作兩草亭矣後合兩爲一焉明道一也明年甘泉子使安南後二年陽明公遷貳南太僕聚徒講學有聲甘泉子還期會于滁陽之間夜論儒釋之道又明年甘泉子丁憂扶母柩南歸陽明公時爲南大鴻臚逆吊于龍江關尋遷南贛都憲矣讀平贛之状云云曰夫倡三廣夾攻之策􅀵横水左溪桶岡浰頭之功用兵如神矣甘泉子曰雖有大司馬王晉谿之知請授之便宜旗牌以備他用亦以陽明公素養銳士於營以待不時之出也迅雷呼吸之間也又以身先士卒以作軍氣也讀平江西之状云云曰甘泉子先是在憂致書於公幸因閩行之使以去也盖公前有宰相之􅂩後有江西未萌之禍不去必爲楚人􅀁鈐兩不報未㡬有寧府之變公㡬䧟於虎口然而贛兵素振既足為之牽制而倡義檄諸府縣興兵㑹豐城誓師分攻七門七門大開遂除留守之黨封府庫之財􅀵刼取之印安恊從之民釋􅀍報之囚表死難之忠據省城絶其歸路直趍樵舎因成擒賊之功是水也以淺見測淵謀也然始而翕然稱為掀天掲地之功矣既而大吏妬焉内幸爭功者附焉輾轉殫力竭精矣僅乃得免或未嘗不思前慮也􅀁以危而不死者内臣張永䕶之也於大吏門列不亦愧乎由是遂流為先與後擒之言上下騰沸是不足辯也夫陽明逆知宸濠有異志劉養正来說必得公乃􅀤公應之曰時非桀紂世無湯武臣有伏節死義耳其猶使兾生元亨徃與之語者實欲誘其善不動干戈濳消莫大之禍也使陽明公而實許養正則宸濠殺孫都憲許副使必待陽明至乃􅀤陽明未至而􅀤者知絶意于陽明之與已矣使陽明實許之必乗風直抵南昌必不與豐城聞顧泌告變即謀南奔以倡大義奪漁艇使如漁人然以奔吉安矣其宸濠兵挍追公者非迎公也􅀅恊公也且宸濠之上不䏻直趍中原以北中不􅀎攻䧟金陵以據者以陽明爲之制其尾兵威足以累之使不前也又取據省城絶其資重與歸路也功莫大焉者也若夫百年之後忌妬者盡死天理在人心者復明則公論定矣巳而該部果題賜􅃙錫勞封新建伯奉天翊衛推誠宣力守正文臣特進光祿大夫柱國兼南京兵部尚書叅賛機務歳支米一千石于時天其􅀅定矣而置之南者有人焉以叅乎其間矣公丁父憂而四方從學者日衆有迎忌者意致有僞學之劾者人其勝天乎或以浮語沮公六年不召㝷以論薦命爲兩廣總制軍務平岑猛之亂或曰其且進且沮使公不得入輔乎讀思田之状云云曰公奏行剿之患十行撫之善十乃撤防兵解戰甲諭威信受來降杖土目復岑後設流守而思田平夫陽明公不革岑猛之後之􅁟官以夷治夷也盧蘇等杖之百而釋之置流守以制焉仁義之術也人知殺伐之爲功而不知神武不殺者功之上也仁義兩全之道也讀八寨之状云云曰檄叅􅀅會守廵命指揮馬文瑞永順宣慰彭明輔保靖宣慰彭九霄分兵布哨擒斬賊酋黨與遂破諸巢移衛􅀁制諸蠻貫八寨之中扼道路之衝設縣治增城堡皆保治安民之要或曰八峒掩襲村落以爲功無破巢之功也無功以爲有功也何則辯之曰夫陽明之貪功當取岑猛盧蘇之大功而不取焉不宜捨其大者取其小者其亦不智不武也謂陽明公爲之乎夫宣慰諸哨之兵可襲則襲岀其不意兵法之竒不可預授者也而以病陽明焉􅀅使為宋襄陳儒之愚巳􅁘非馭戎不測之威矣事竣而請歸告病危矣不待報而遽行且行且候命其卒扵南安途次而不及命下亦命也江西輔臣進帖以譛公上革之恤典人衆之勝天也亦命也百年之後天定􅀅不勝人矣乎甘泉子始召入禮部靣叩輔臣曰外人皆云陽明之事乃公爲之乎輔臣黙然然亦不以作怒加禍猶爲有君子度量焉可尚也公卒之日兩廣江西之民相與吊于途曰哲人其痿矣士夫之知者相與語於朝曰忠良其逝矣四方同志者且與吊於家曰斯文其䘮矣乆庵公爲之状六年而後就慎重也甘泉子曰吾志其大義銘諸墓􅀅使觀厥詳於状也銘曰南鎮嶙嶙在浙之濵竒氣鬰積是生異人生而氣靈乗雲降精十一金山詩成􅀑驚志學踰二廣信館次婁公一言聖學可至長而任俠未脫舊習馳馬試劍古文出入變化屢遷逃仙逃禪一變至道丙寅之年邂逅語契相期共詣天地為體物莫非已抗䟽廷杖龍塲烟瘴居夷何陋諸蠻歸向起尹廬陵卧治不庭六月之間百廢具興入司驗封衆志皆通孚于同朝執經相從轉南太僕鴻臚太畜遂廵南贛乃展􅂹足浰頭桶岡三廣夾攻身先士卒屢收竒功蓄勇飬銳隱然有待云胡養正隂謀來說詐言尊師公明灼知兾子徃化消變無為閩道豐城及變未萌聞變遄返心事以明旌旗蔽空聲義下江尾兵累之北趨不從乃擒巨賊乃親獻馘爭功欲殺永也䕶翊彼同􅂁者反戈不怩隱之于心以莫不戚憂居六年起治思田撫而不戮夷情晏然武文兼資仁義並行神武不殺是稱天兵凡厥操縱聖學妙用一以貫之同靜異動陽明先生行状門人黄綰撰陽明先生王公諱守仁字伯安其先琅琊人晉光祿大夫覽之後覽曾孫羲之少隨父曠渡江家建康不樂徙會稽其後復徙剡之華塘自華塘徙石堰又徙逹溪有曰夀者仕至廸功郎乃徙居餘姚六世祖諱綱字性常博學善識鑑有文武長才與永嘉高則誠宗人髙元章括蒼劉伯温友善仕國朝為廣東叅議死苗難五世祖諱彦逹號秘湖漁隱有孝行髙祖諱與凖號遯石翁精䆒禮易著易㣲數千言曾祖諱傑號槐里子以明經貢為太學生贈禮部右侍郎曽祖妣孟氏贈淑人祖諱天叙號竹軒封翰林院編修贈禮部右侍郎祖妣岑氏封太淑人父諱華成化辛丑状元及第仕至南京吏部尚書封新建伯妣鄭氏封孺人贈夫人繼母趙氏封夫人鄭氏孕十四月而生公誕夕岑太淑人夣天神抱一赤子乗雲而來導以鼓樂與岑岑窹而公生名曰雲六􅀊不言一日有僧過之摩其頂曰有此寧馨兒􅁍呌壞了龍山公悟改今名遂言頴異頓􅀤年十一竹軒翁擕之上京過金山作詩曰金山一􅀧大如拳打破維􅀭水底天醉􅀝妙髙臺上月玉簫吹徹洞龍眠有相者謂塾師曰此子他日官至極品當立異等功名年十三侍龍山公為考官入場評卷髙下皆當性豪邁不覉喜任俠畿内石英王勇湖廣石和尚之亂為書􅀅獻于朝請徃征之龍山公力止之年十七至江西成婚于外舅養和諸公官舍明年還廣信謁一斋婁先生異其質語以􅀁當學而又期以聖人為可學而至遂􅀷契之領弘治壬子年鄕薦己未登進士觀政工部與太原喬宇廣信汪俊河南李夣陽何景明姑蘇顧璘徐禎卿山東邉貢諸公以才名爭馳騁學古詩文欽差督造威寜伯王公墳于河間馭役夫以十五之法暇即演八陣圗識者巳知其有逺志少日嘗夣威寧伯授以寶劍既竣事威寧家以金幣爲謝辭不受乃出威寧軍中佩劍贈之適符其夣受焉時有慧星及靼虜猖獗上䟽論邉務因言朝政之失辭極剴切明年授刑部主事差徃淮甸審囚多􅀁平反復命日事案牘夜歸必燃燈讀五經及先秦兩漢書爲文字益工龍山公恐過勞成疾禁家人不許置燈書室俟龍山公􅆍復燃必至夜分因得嘔血疾養病歸越闢陽明書院䆒極仙經秘㫖静坐為長生乆視之道乆䏻預知其友王思􅁉等四人欲訪公方出五雲門即命㒒要于路歷語其故四人驚以為神甲子聘為山東鄕試考官至今海内所稱重者皆􅀁取士也改兵部武庫司主事明年白沙陳先生高第甘泉湛公若水一㑹而定交共明聖學明年丙寅正徳改元宦官劉瑾竊國柄作威福差官校至南京拏給事中戴銑等下獄公上䟽乞宥之瑾怒矯詔廷杖五十斃而復甦謫貴州龍場驛丞瑾怒未釋公行至錢塘度或不免乃托為投江潜入武夷山中決意逺遯夜至一山庵投宿不納行半里許見一古廟遂據香案卧􅀺明道士特徃視之方熟睡乃推醒曰此虎狼穴也何得無恙因詰公出䖏公乃􅄍實道士曰如公􅀁志􅀅来必有赤族之禍公問何以至此道士曰公既有名朝野若果由此匿跡􅀅来之徒假名以鼓舞人心朝廷尋䆒汝家豈不致赤族之禍公􅀷然其言嘗有詩云海上曾為滄水使山中又拜武夷君遂由武夷至廣信沂彭蠡歷沅湘至龍場始至無屋可居茇于叢􅁄間遷于東􅈐就石穴而居夷俗于中土人至必蠱殺之及卜公于蠱神不恊于是日來親附以􅀁居隂濕乃相與伐木為何陋軒君子亭賔陽堂玩易窩以居之三僕歷險冐瘴皆病公日夕躬為湯糜調䕶之瑾欲害公之意未巳公於一切得失榮辱皆能超脫惟生死一念尚不䏻遣于心乃為石廓自誓曰吾今惟俟死而已他復何計日夜端居黙坐澄心精慮以求諸靜一之中一夕忽大悟踴躍若狂者以􅀁記憶五經之言證之一一相契獨與晦庵註䟽若相抵牾恒徃來於心因著五經臆說時元山席公官貴陽聞其言論謂為聖學復睹公因取朱子大全閱之見其晚年論議自知其􅀁學之非至有誑巳誑人之􅀃曰晦翁亦巳自悔矣日與學者講䆒體察愈益精明而從游者衆時思州守遣人至龍場稍侮慢公諸役夫咸憤惋輙相與毆辱之守大怒曰憲副毛公科令公請謝且喻以禍福公致書于守遂釋然愈敬重公安宣慰聞公名使人餽米肉給使令辭不受既又重以金帛鞍馬復固辭不受及議減驛事則力折之且申說朝廷威信令甲其議遂􅃦已而僮酋有阿賈阿札者標掠為地方患公復以書詆諷之安悚然操切􅀁部民頼以寧庚午陞廬陵知縣比至稽國初舊制慎選里正三老委以詞訟公坐視其成囹圄清虚是􅀊冬以朝覲入京調南京刑部主事舘于大興隆寺予時爲後軍都事少嘗有志聖學求之紫陽濓洛象山之書日事靜坐雖與公有通家之舊實未嘗􅀷知其學執友柴􅇕儲公巏與予書曰近日士夫如王君伯安趨向正造詣􅀷不專文字之學足下肯出與之游麗澤之益未必不多予因而慕公即夕趨見適湛公共坐室中公出與語喜曰此學乆絶子何􅀁聞而遽至此也予曰雖粗有志實未用功公曰人惟患無志不患無功即問曾識湛原明否來日請㑹以訂我三人終身共學之盟明日公令人邀予至公舘中㑹湛公共拜而盟又數日湛公與予語欲謀白巖喬公轉告冡宰邃庵楊公􅅏公北曹楊公乃擢公為吏部驗封主事予三人者自職事之外稍暇必會講飮食啓居日必共之各相砥勵未㡬陞文選員外郎陞考功郎中而學益不懈士大夫之有志者皆相率從㳺如此二年而湛公使安南予與公又居一年壬申冬予以疾告歸公為文及詩送予且托予結廬天台鴈蕩之間而共老焉湛公又􅁒買地蕭山湘湖之間結廬與予三人共之明年癸酉陞南京太㒒寺少卿從游者日益衆甲戌陞南京鴻臚寺卿始專以良知之㫖訓學者乙亥朝廷舉考察之典為䟽自劾力乞休致以踐前言不􅁢八月又上䟽力以疾甚乞養病又不􅁢明年丙子十月陞都察院左僉都御史撫鎮南贛汀漳等處先是南贛撫鎮屢用非人山谷兇民初爲攘竊漸至刼掠州縣肆無忌憚逺近視效凡在䖍楚閩廣接壤山谷無非賊巢小大有司束手無策皆謂終不可除兵部尚書王公瓊獨知公特薦而用之又懇䟽以辭亦不􅁢督㫖益嚴公遂受命既至南贛先嚴戰禦之法時龍南賊二千餘突至信豐又紏合廣東龍川浰頭諸賊酋分隊以進勢甚猖獗公於未戰之先令兵備官調兵斷賊歸路又委官統領前後夾擊又曰此賊既離巢穴利在速戰又令乗險設伏厚集以待及各鄉村徃來路徑多張疑兵使進無􅀁􅀗退無􅀁據不過旬日可以坐擒一違節制以軍法從事先時在官吏書門皂及在門軍民隂陽占卜皆與賊通日在官府左右詗覘不惟言出于口賊必先知凡意向顔色之間賊亦知之公知其然在此則示以彼在彼則示以此毎令隂陽擇日日者占卜或巳吉而不用或欲用而中止每勵兵蓐食令俟期而􅀤兵竟不出賊各依險自固四路設伏公潜令三省兵備官各率兵從徑道與賊交鋒前後大戰數合擒斬首俘􅀗無算餘黨奔聚象湖山拒守諭令佯言犒軍退師俟秋再舉宻􅊥虗實乗賊懈弛以䕶送廣東布政使邵蕡爲名選精兵一千五百當先重兵四千二百繼後夜半自率數十􅀐至宻招前軍來令分三路各㗸枚直趨象湖山搗其巢穴我兵奪據隘口賊猶不知賊雖失險其間驍悍猶能凌絶谷超距如飛復據上層峻險四面飛打滚木礧石以死拒敵我兵􅁬勇鏖戰自辰至午三省所􅀤竒兵復從間道鼓噪突豋始驚潰大敗我兵乗勝追殺擒斬俘􅀗無算墜崕壑而死者不可勝計餘黨復入流恩山岡等巢與諸賊合􅀔明日復戰賊又不利遯入廣東界上黄蠟樟溪大山賊酋詹師富等恃居可塘洞山寨聚糧守險勢甚強固公命分兵五路攻擊與賊連戰令知府鍾湘破長冨村等巢三十餘䖏擒斬俘􅀗益多其脇從餘黨悉願擕家以聴撫安公委官招撫復業者四千餘人又令僉事顧應祥等委官統領軍兵㑹同福建尅期進剿􅀭言班師出其不意從牛皮石嶺脚等䖏分爲三哨鼓噪並進賊瞻顧不睱望風瓦觧攻破古村柘林白土村赤石巖等巢直搗箭灌及攻破水竹大重玩苦宅溪苦宅溪清泉溪曰羅南山等巢直搗洋竹洞三角湖等䖏前後大戰十餘俘􅀗四千人有竒牛馬貨物無算嘗上䟽申明賞罰以勵人心因請勑便宜行事及請令旗令牌不報及是大􅁃南康上猶三縣輋賊虜掠居民廣東浰頭等䖏強池大􅁂等三千餘徒突圍南康縣殺損官兵與湖廣桂陽廣東樂昌等巢相聯盤據流刼三省時兵備等官請調三省狼逹等兵與官兵夾剿又上䟽論狼兵􅀁過不減於盗轉輸之苦重困於民仍請便宜行事期于成功不限以時則兵衆既練號令既明人知激勸事無掣肘可以伸縮自由相機而動日剪月削可使澌盡復請添設淸平縣治通塩法以足兵食㑹湖廣廵撫都御史秦公金奏請夾剿䟽下復上䟽議䖏兵糧事宜六月召知府季斆縣丞舒富等宻授方畧領兵分剿生擒賊酋陳曰䏻等搗其巢俘􅀗賊黨無算又上䟽論三省交剿方畧先是屢請勑便宜行事衆皆笑公爲迂惟尚書王公慨然曰朝廷此等權柄不與此等人用又與誰用我必與之故因公䟽覆議奉㫖改公提督南贛汀漳等䖏軍務賜勑書及前􅀁請旗牌便宜行事廷議以公前攻破長富村象湖山可塘洞諸處擒斬首從賊級數多降勑奬勵陞俸一級賞銀二十兩紵絲二表裏時汀漳左溪賊酋藍天鳯與贛南上新穩下等硐賊酋雷鳴聦髙文輝等相結盤據千里荼毒三省公與諸從事議曰諸巢為患雖同事􅀔各異以湖廣言之則桶岡諸巢為賊之咽喉而横水左溪諸巢為之腹心以江西言之則横水左溪諸巢為賊之腹心而桶岡諸巢為之羽翼今不先去横水左溪腹心之患而欲與湖廣夾攻桶岡進兵兩㓂之間腹背受敵􅀔必不利今我岀其不意進兵速撃可以得志巳破横水左溪移兵而臨桶岡勢如破竹矣議既決命指揮郟文帥兵千餘自大􅁃縣義安入知府唐淳帥兵千餘自大􅁃縣聶都入知府季斆帥兵千餘自大􅁃縣穩下入縣丞舒冨帥兵千餘自上猶縣金坑入親帥兵千餘自南康進屯至坪期直搗横水與諸軍會命副使楊璋叅議黄宏監督各營官兵徃來給餉以促其後是月初七日各哨齊􅀤初十日進兵至坪會間諜詗知各險隘皆設衮木礧石公度此時賊已據險􅀔未可近乃自率兵乗夜遂進未至賊巢三十里止舍使人伐木立柵開塹設堠示以乆屯之形復遣官分帥鄉兵及樵竪善登山者四百人各與一旗齎銳砲鈎鎌使由間道攀崕壁而上分列逺近極髙山頂以覘賊張立旗幟􅉯茅為數千竈度我兵至險則舉砲燃火相應十二日􅀺明公進兵至十八面隘賊方據險迎敵驟聞逺近山頂砲聲如雷烟熖四起我兵復呼哨分逼銃箭齊􅀤賊皆驚潰失措以為官兵盡破其巢遂棄險退走公預遣千户陳偉髙睿分帥壮士數十縁崕上奪賊險盡􅀤其衮木礧石我兵乗勝驟進指揮謝㫤馬廷瑞兵由間道先入悉焚賊巢賊退無􅀁據乃大敗奔潰横水既破遂乗勝進攻左溪擒斬首級無算俘􅀗男婦牛馬什物不可勝算會霧雨連日公令休兵犒勞是月二十七日官兵乗勝進攻桶岡公復議桶岡天險四山壁立萬􅌇中盤百餘里連峯叅天􅀷林絶谷不覩日月因詢訪鄕導賊􅀁由入惟鎻匙龍葫蘿洞茶坑十八磊新地五處皆假棧梯壑夤懸絶壁而上惟上章一路稍平然􅀷入湖廣迁回取道半月始至令移屯近地休兵養銳振揚威聲使人諭以禍福彼必懼而請服其或不從乗其猶豫襲而擊之乃可以逞縱􅀁􅀗桶岡賊鍾景縋入賊營期以翼日早使人於鎻匙龍受降賊方恐集衆會議又遣縣丞舒富帥數百人屯鎻匙龍促使出降遣知府邢珣入茶坑伍文定入西山界唐淳入十八磊知縣張戬入葫蘿洞皆于是月晦日乗夜各至分地遇大雨不得進明早冐雨疾登賊酋藍天鳳方就鎻匙龍聚議聞各兵已入險皆驚愕散亂猶驅其男婦千餘人據内隘絶險隔水爲陣以拒我兵渡水前撃復分部左右夾攻賊不䏻支且戰且􅁍及午雨霽各兵鼓􅁬而前賊乃敗走桶岡諸巢悉平親行相視形􅀔據險之隘議以其地請建縣治控制三省諸徭斷其徃來之路又進兵攻穩下朱坑等巢悉平又以湖廣二省之兵方合雖近境之賊悉以掃蕩而四逺奔突之虞難保必無乃􅅏兵二千餘分屯茶寮諸隘餘兵令回近縣休息候二省夾攻盡絶然後班師驅卒不過萬餘用費不滿三萬兩月之間俘斬六千有竒破巢八十有四渠魁授首噍􅀋無遺又䟽請三縣適中之䖏立崇義縣移置小溪驛于大􅁃縣城内使督兵防遏浰頭賊酋池大􅁂等聞横水諸巢皆破始懼加兵乃遣其弟池仲安等率老弱二百餘徒赴軍門投降隨衆立效意在緩兵因窺虗實乗間内應公逆知其謀乃陽許之及進攻桶岡使領其衆截路扵上新地以逺其歸途十一月池大􅁂等聞復破桶岡益懼爲戰守備公使人賜各酋長牛酒以察其變賊度不可隱詐稱龍川新民盧珂等􅀅掩襲之是以宻為之防非虞官兵也亦陽信其言因復陽怒盧珂等擅兵􅄷殺移檄龍川使㢘其實且趣伐木開道􅀅回兵浰頭取道徃征之賊聞之且喜且懼盧珂鄭志髙陳英者皆龍川舊招新民有衆三千餘為池大􅁂􅀁脇而三人者獨􅀷忌之乃來告變云池大􅁂僣號設官及以僞授盧珂等金龍覇王官爵印信來首公先已諜知其事乃復陽怒不信遂械繋盧珂而使人宻諭其意珂遂遣人歸集其衆待時而􅀤又使人徃諭池大􅁂且宻購其􅀁親信頭目二十人隂說之同部下百八十人使自來投訴還贛乃張樂大享􅀅士下令城中散兵使各歸農示不復用賊衆皆喜遂弛其備池大􅁂等乃謂其衆曰若要伸先用屈贛州伎倆亦湏親徃勘破率其麾下四十人自詣贛公使人􅊥知池大􅁂已就道宻遣人先行属縣勒兵分哨候報而􅀤又使人督集盧珂等兵俱至令􅀁属官寮以次設羊酒日犒池大􅁂等以緩其歸會正旦之明日復設犒于庭先伏甲士引池大鬢入并其黨悉擒之出盧珂等􅀁告状訊鞫皆伏寘于獄斬之夜使人趨􅀤属縣兵期以初七日入巢諸哨兵皆從各徑道以入自率帳下官兵從龍南縣令水直搗下浰大巢與各哨兵會于三浰先是賊徒得池大􅁂報謂贛州兵已罷歸皆已弛備散䖏各巢至是驟聞官兵四路並進皆驚懼分投出禦悉其精銳千餘據險設伏併􅀔迎敵于龍子嶺我兵聚為三衝掎角而前大戰良乆賊敗復􅁬撃數十合遂克上中下三浰各哨官兵遥聞三浰大巢巳破皆􅁬勇齊進各賊潰敗遂進攻九連山于是選精銳七百餘人皆衣所得賊衣佯若奔潰者乗暮直衝賊􅀁據崕下澗道而過賊以為各巢敗散之黨皆從崕下招呼我兵亦佯應之賊疑不敢撃巳度險遂斷其後路次日賊始知為我兵併􅀔衝敵我兵已據險從上下撃賊不䏻支公度其必潰預令各哨官兵四路設伏以待賊果潜遯邀擊而悉俘之前後擒斬首級無算俘􅀗男婦牛馬噐仗什物不可勝計餘黨張仲全等二百餘人及逺近村寨一時爲賊􅀁驅從惡未乆者􅀔窮計迫聚于九連谷口呼號痛哭誠心投降遣邢珣驗實量加責治籍其名數悉安挿於白沙相視險易經理立縣設隘可以乆安長治之䇿留兵防守而歸贛人皆戴香遮道而迎爲立生祠又家肖其像而􅀊時祭禱上䟽乞休致不􅁢又以龍川諸處係山林險阻之􅀁盗賊屯聚之鄕當四縣交界之􅂩乃三省閠餘之地政教不及人迹罕到其間接連閩廣反覆賊巢動以百數據而守之真足控諸賊之徃来杜奸宄之潜匿遂䟽請于和平地方建設和平縣治以扼其要害乂以大賊酋龔福全髙仲仁李斌吳等邀路刼殺軍民攻掠郡縣命三省􅀅官剿平上三省夾剿捷音䟽朝廷論功行賞陞右副都御史􅄻子一人錦衣衛世襲百户寫勑奨勵懇䟽辭免乞原職致仕温㫖慰􅅏因奏平定廣東韶州府樂昌縣等賊捷音查例加陞子本衛世襲副千户在贛雖軍旅擾擾四方從游日衆而講學不廢褒崇象山陸子之後以扶正學贛人初與賊通俗多鄙野為立保甲十家牌法於是作業出入皆有紀又行鄉約教勸禮讓又親書教誡四章使之家諭户曉而贛俗丕變贛人多為良善而問學君子亦多矣十四年正月再䟽乞放歸田里當路忌公欲從其請王公瓊逆知宸濠必􅀅為變一日召其属主事應典曰我寘王某于江西與之便宜行事者不但爲溪洞諸賊而已或有他變若無便宜行事勑書旗牌􅀅何施用時福建有軍人進貴等之變王公曰此小事不足煩王某但假此以牽便宜勑書在彼手中以待他變爾可爲我做一題稿來看稿成具題降勑與公曰福州三衛軍人進貴等恊衆謀反特命爾暫去彼處地方會同查議處置叅奏定奪時濠隂謀不􅁤亦已有年一日令安福舉人劉養正徃說公云寧王尊師重道有湯武之資欲從公講明正學公咲曰殿下能舎去王爵否既而令門人冀元亨先徃與濠講學以􅊥其誠否元亨與語矛盾濠怒遣還宻使人殺于途不果公以六月初九日自贛徃福建勘事十五日至豐城縣界典史鄞人報濠反狀繼而知縣顧佖具言之公度單旅倉倅兵力未集難即勤王亟欲遡流趨吉安南風方盛舟人聞宸濠􅀤千餘人來刼公畏不敢􅀤乃以逆流無風爲辭公宻禱于舟中誓死報國無何北風大作舟人猶不肯行㧞劍馘其耳遂􅀤舟薄暮度􅀔不可前潜覔漁舟以㣲服行􅅏麾下一人服巳冠服在舟中濠兵果犯舟而公不在欲殺其代者一人曰何益遂捨之故追不及是夜至臨江知府戴徳孺喜甚留公入城調度曰臨江居大江之濵與省城相近且當道路之衝莫若吉安為宜又以三䇿籌之曰濠若出上䇿直趨京師出其不意則宗社危矣若出中䇿則趨南都大江南北亦􅀍其害若出下䇿但據江西省城則勤王之事尚易為也行至中途恐其速出乃為間諜假奉朝廷宻㫖先知寧府􅀅反行令兩廣湖襄都御史楊旦秦金及兩京兵部各命􅀅出師暗伏要害地方以俟寜府兵至襲殺復取優人數軰各與數百金以全其家令至伏兵處􅀁飛報竊􅀤日期􅀅公文各縫置袷衣絮中􅀅􅀤間又捕捉僞大師李士實家属至舟尾令其覘知公即佯怒牽之上岸處斬巳而故縱之令其奔報宸濠邏􅀗優人果於袷衣絮中搜得公文遂疑不􅀤十八日至吉安知府伍文定甚喜軍民皆遮道呼號公入城撫慰兩上䟽告變請命􅀅征討以觧東南倒懸奏至王公瓊􅀭言於朝曰王某在南贛必􅀎擒之不乆當有捷報至但朝廷不命􅀅出師則無以壮其軍威時濠畜養死士二萬招誘四方盗賊渠魁亦萬數舉事之日復驅其䕶衛黨與并脇從之人又六七萬虐熖張熾公以百數從卒退保吉安遥為牽制之啚逺近軍民刼于濠積威道路以目莫敢出聲公率知府伍文定戴徳孺邢珣徐璉等調集軍民兵快召募四方報効義勇會計應解􅅏錢糧支給粮賞造作軍噐戰船奏􅅏公差回任御史謝源伍希儒分職任事約會鄕官致仕右副都御史王懋忠養病編脩鄒守益郎中曽直評事羅僑丁憂御史張鰲山赴部調用僉事劉藍依親進士郭持平致仕副使劉遜叅政黄繡閒住知府劉昭等相與激勸忠義曉諭禍福調度巳定移檄逺近宣布朝廷仁徳􅁀濠罪惡濠始覺為公􅀁欺亟欲引兵而出公謂急衝其鋒攻其有備皆非計之得也始示以自守不出之形必俟其出然後尾而啚之先復省城以搗其巢穴彼聞必回兵來援我則出兵邀而撃之此全勝之䇿也濠果使人􅊥公未出先􅀤兵出次南康九江自居省城以禦公七月初二日濠又使人􅊥公兵果不出乃􅅏兵萬餘属其腹心宗室及儀賔内官并僞都督都指揮等官使守省城自引兵向安慶公知其出遂急促各府兵期以本月十五日會于臨江樟樹鎮身督伍文定等兵徑下於是知府戴德孺引兵自臨江來知府徐璉引兵自􅀽州來知府邢珣引兵自贛州來通判胡堯元童􅄾引兵自瑞州來通判談儲推官王暐徐文英新淦知縣李美太和知縣李楫寜都知縣王天與萬安知縣王冕亦各以兵來赴十八日遂至豐城分布哨道使伍文定攻廣潤門邢珣攻順化門徐璉攻惠民門戴徳孺攻永和門胡堯元童􅄾攻章江門李美攻徳勝門都指揮余恩攻進賢門談儲王暐李楫王天與王冕等各以其兵乗七門之釁從旁夾撃以佐其􅀔又􅊥得濠伏兵千餘于新舊墳厰以備省城之援乃遣奉新知縣劉守緒典史徐誠領兵四百從間道夜襲破之以揺城中十九日登市􅆜誓師且申布朝廷之威再􅁀濠惡約諸􅀅一鼓而附城再鼓而登城三鼓不克誅其伍四鼓不克斬其􅀅誓已莫不切齒痛心踴躍激􅁬薄暮徐􅀤二十日􅀺明各至信地城中為備甚嚴滚木􅁅瓶火砲石弩機毒之械無不畢具及我兵已破新舊墳厰敗潰之卒皆奔告城中城中聞我師四靣驟集莫不震駭我師呼譟並進梯絙而登城中倒戈而奔遂破擒其居守宜春王拱樤及僞太監萬銳等千餘人宫眷縱火自焚延燒居民房屋公令各官分道捄火撫定居民釋其脇從封其府庫搜出原􅀵大小衙門印信九十六顆其脇從布政使胡㢘叅政劉斐叅議許效㢘副使唐錦僉事頼鳳都指揮王玘皆自上江西捷音䟽仍分兵四路追躡是時濠攻安慶未下親自督兵運土填塹期在必克及聞我兵至豐城大恐即欲回舟李士實阻勸以爲必湏徑徃南京既登大寳則江西自服濠不應次日遂解安慶之圍移兵泊阮子江會議歸援先是兵至豐城衆議安慶􅀍圍宜引兵直趨安慶公以九江南康皆以爲賊􅀁據而南昌城中數萬之衆精悍亦且萬餘食貨充積我兵若抵安慶賊必回軍死闘安慶之兵僅僅自守必不能援我于湖中南昌之兵絶我糧道而九江南康之賊合􅀔撓躡而四方之援又不可望事難圗矣今我師驟集先聲􅀁加城中必已震懾因而併力急攻其􅀔必下已破南昌賊先破膽奪氣失其本根􅀔必歸救則安慶之圍可解濠亦可以坐擒果如公料及議􅀁以禦之之䇿衆謂宜歛兵入城堅壁自守以待四方援兵公獨謂宜先出銳卒乘其惰歸要迎掩撃一挫其鋒衆􅀅不戰自潰􅀁謂先人有奪人之氣攻瑕則堅者瑕矣是日撫州知府陳槐引兵亦至公遣伍文定邢珣徐璉戴徳孺共領精兵五百分道並進撃其不意濠亦先使精悍千餘人從間道欲出公不意攻􅀵省城偶遇于某處遂交戰我兵失利報至公怒甚欲以軍法斬取伍文定邢珣戴德孺徐璉等首乃自帥兵親戰或以敵鋒方交若即斬其首兵無統領而亂俟各􅁬勵以啚後效明日各帥兵􅁬死以戰大敗之又遣余恩以兵四百徃来湖上誘致賊兵陳槐胡堯元童􅄾談儲王暐徐文英李美李楫王冕王軾劉守緒劉源清等各領百餘四面張疑設伏􅀱伍文定等兵交然後四起合擊分布既定大賑城中軍民慮宗室郡王􅀅軍或爲内應生變親慰諭之以安其心出給告示凡恊從皆不問雖嘗受賊官爵䏻逃歸者皆免死􅀎斬賊徒歸降者皆給賞使内外居民及鄉導人等四路傳布以解散其黨二十三日濠先鋒已至樵舍風㠶蔽江前後數十里公乃分督各兵乗夜趨進使伍文定以正兵當其前余恩繼其後邢珣引兵繞出賊背徐璉戴徳孺張兩翼以分其勢二十四日早賊兵鼓譟乗風而前逼黄家渡其氣驕甚伍文定余恩之兵佯北以致之賊爭進趨利前後不相及邢珣之兵從後橫撃直貫其中賊敗走伍文定余恩督兵乗之徐璉戴徳孺合勢夾攻呼譟並起賊不知􅀁為遂大潰奔走十餘里擒斬二千餘級落水死者以萬數賊勢大沮引兵退保八字腦衆稍遁散濠震懼身自激勵􅀅士賞其當先者以千金􅀍傷者銀百兩盡􅀤九江南康守城之兵以益師是日建昌知府曾璵引兵至公以九江不破則湖兵終不敢越九江以援我南康不復則我兵亦不䏻踰南康以躡賊乃遣知府陳槐領兵四百合饒州知府林珹之兵乗間以攻九江知府曽璵領兵四百合廣信知府周朝佐之兵乗間以取南康二十五日賊復并力盛氣挑戰時風􅀔不便我兵少􅁍死者數十人公急令人斬取先􅁍者知府伍文定等立於銃砲之間火燎其􅂡不敢退􅁬督各兵殊死並進砲及寧王舟寧王退走遂大敗擒斬二千餘級溺水死者不計其數賊復退兵保樵舎連舟爲方陣盡出其金銀以賞士公乃夜督伍文定等爲火攻之具邢珣撃其左徐璉戴德孺出其右余恩等各官分兵四伏期火􅀤而合二十六日寧王方朝群臣拘集􅀁執三司各官責其間以不致死力坐觀成敗者􅀅引出斬之爭論未决而我兵已􅁬撃四面而集火及寜王副舟衆遂奔散寧王與妃嬪泣别妃嬪宫人皆赴水死我兵遂執寧王并其世子郡王􅀅軍儀賔及僞太師國師李士實劉養正元帥叅賛尚書都督指揮千百户等官數百餘人􅀍執脅從官太監王宏御史王金主事金山按察使楊璋僉事王疇潘鵬叅政程果布政使梁辰都指揮郟文馬􅂹白昻等擒斬賊黨三千餘級落水死者約三萬餘棄其衣甲噐仗財物與浮尸積聚横亘若洲餘賊數百艘四散逃潰公復遣官分路追剿毋令逸入他境爲患二十七日及之于樵舍大破之於吳城又破之擒斬復千餘級落水死者殆盡濠既擒衆執見公呼曰王先生我欲盡削䕶衛􅀁有請降爲庶民可乎對曰有國法在遂令送至囚􅀁公既擒濠欲令人獻俘慮有餘黨沿途竊􅀤欲親解赴闕因在吉安上䟽乞命􅀅出師朝廷差安邉伯許泰爲總督軍務充總兵官平虜伯江彬爲提督等官左都督劉翬爲總兵官太監張忠爲提督軍務張永爲提督賛畫機宻軍務并體勘濠反逆事情及查理庫藏宫眷等事太監魏彬為提督等官兵部侍郎王憲為督理糧餉徃江西征討至中途聞捷報計欲奪功乃宻請上親征上遂自稱爲總督軍務威武大􅀅軍總兵官後軍都督府太師鎮國公徃江西親征廷臣力諌不聽有􅀍杖而死者江彬許㤗劉翬張忠張永魏彬等先領兵由大江至入居城中人馬填溢衢巷至不可行乃倡言誣公始同濠謀反因見天兵猝臨征討始擒濠以脫罪欲并擒公爲巳功公于官軍慰勞有加病者為之醫藥死者為之棺歛間自行撫衆心皆恱初見彬軰皆設席于傍令公坐公乃佯為不知遂坐上席轉傍席于下以坐彬軰彬軰啣之出語誚公公以常行交際事體諭之左右皆為公觧遂無言公非爭一坐也恐一受節制則事機皆將聽彼而不可為矣又欲置濠湖中待駕至列陣擒之然後奏凱論功公竟發南昌數遣人追至廣信不聼戴星趨玉山度草萍上䟽力止以爲濠睥睨神噐隂謀乆蓄招納叛亡􅊥輦轂之動靜日無停迹廣置奸細臣下之奏白百不一通􅀤謀之始逆料大駕必􅀅親征先於沿途伏有奸黨為愽浪荆軻之謀今逆不旋踵遂已成擒法宜解赴闕下式昭天討欲付部下各官押解恐舊􅀁潜布乗􅂩竊􅀤或致意外之虞臣死有餘憾况平賊獻俘固國家常典亦臣子職分臣謹于九月十一日親自量帶官軍􅀅濠并宫眷逆賊情重人犯督解赴闕行至廣信聞報䟽上不聼既抵杭謂張永曰西民乆遭濠毒經大亂繼旱災困苦既極必逃聚山谷爲亂奸黨群應土崩之􅀔成矣然後興兵平之不已難乎永􅀷然之徐曰吾此出爲君側羣小欲調䕶而黙輔之非掩功也但􅀅順天意猶可挽回萬一苟逆之徒激羣小之怒何救于大事公始􅀷信以濠付之復上捷音以爲宸濠不􅁤之謀已踰一紀今旬月之間遂克堅城俘擒元惡是皆欽差總督威徳指示方畧􅀁致以此歸功總督軍門以止上江西之行稱病淨慈寺張永在上前備言公盡心爲國之忠之功及彬等欲加害之意既而彬等果誣公無君欲叛上不信又言此既不信試召之必不來則可知其無君矣上乃召公公即奔南京龍江􅀜􅀅進見忠等皆失意又從中阻之使不見公乃以綸巾野服入九華山永聞知又力言于上曰王守仁實忠臣今聞衆欲爭功欲并棄其官入山修道由是上益信公之忠公復還江西視事西人皆家肖公像􅀊時報祀猶夫贛焉十五年閏八月四乞省塟節奉㫖王守仁奉命廵視福建行至豐城一聞宸濠反叛忠憤激烈即便倡率􅀁在官司起集義兵合謀剿殺氣節可嘉已有㫖着督兵討賊兼廵撫江西地方􅀁奏省親事情待賊平之日來說故復領廵撫事江西兵殘之餘宗室人民凋敝之甚官府衙門居民房屋燒毁殆盡公為之賑恤綏勞撫定奏免租稅又􅀅城中没官房屋及濠違制宫室與革毀一應衙門皆修改爲公􅅟濠占奪民間田地山塘房屋遵奉詔書給還原主管業其餘照依時估變賣價銀入官先儘撥􅀘南新二縣兊軍淮安京軍折銀糧米及王府祿米餘羡􅀵貯布政司用備緩急是年月上晏駕今上皇帝登極特降璽書曰爾昔􅀎剿平亂賊安靖地方朝廷新政之初特兹召用勑至爾可馳驛來京毋或稽遲於二十日公馳驛起程爲輔臣所忌潜諷科道建言以為朝廷新政武宗國䘮資費浩繁不宜行宴賞之事行至中途而返道經錢塘上䟽懇乞便道歸省制曰可陞南京兵部尚書叅賛機務又具䟽辭免慰㫖益勤本年十二月内該部題爲捷音事議封公伯爵給與誥劵子孫世世承襲賜勑遣官奨勞慰諭錫以銀幣犒以羊酒乃封公新建伯奉天翊衛推誠宣力守正文臣特進光祿大夫柱國兼南京兵部尚書叅賛機務歳支祿米一千石三代并妻一體追封累䟽辭免欲朝廷普恩賞于報効諸臣又極言舉人冀元亨因說宸濠反為奸黨搆䧟獄中以忠受禍為賊報􅄷抱􅁈齎恨願盡削已官移報元亨以贖此痛先是元亨在獄又為移咨六部申理其􅁈及元亨死又為移文湖廣兩司優恤其家属元年丁父海日翁憂四方來游其門益衆科道官迎當路意以偽學舉劾服闋輔臣忌公才髙望重六載不召御史石金等交章論荐禮部尚書席公書爲䟽特荐公及石淙楊公曰生在臣前見一人曰楊一清生在臣後見一人曰王守仁皆不報丁亥田州土知府岑猛之亂提督都御史姚鏌不克成功張公孚敬拉桂公蕚同荐桂公不得巳勉從荐公得俞㫖兵部奉欽依差官持檄授公總制軍務督同都御史姚鏌勘䖏彼中事情上䟽辭免舉尚書胡世寜李承勛自代不􅁢上與楊公一清曰若姚鏌不去王守仁决不肯來遂令鏌致仕又降㫖督趨赴任㫖云卿識敏才髙忠誠體􅀦今兩廣多事方藉卿威望撫定地方用舒朕南顧之懐姚鏌巳致仕了卿宜星夜前去節制諸司調度軍馬撫剿賊寇安戢兵民勿再遲疑推諉以􅀒朕望還差官舗馬裏賫文前去敦取赴任行事該部知道予時為光祿寺少卿具䟽論江西軍功及薦公才德勘任輔弼上喜親書御劄并䟽付内閣議楊公一清忌公入閣與之同列乃與張公孚敬具掲帖對曰王守仁才固可用但好服古衣􅃣喜談新學人頗以此異之不宜入閣但可用為兵部尚書桂公知遂大怒詈予潜進掲帖毀公上意遂止公遂扶病蒞任沿途涉歷訪諸士夫詢諸行旅皆云岑猛父子固有可誅之罪然所以為亂者皆當事諸人不能推誠撫安以致之上䟽謝恩極言致亂之由平復之䇿十二月楊公一淸與桂公蕚謀恐事完回京復命見上予與張公又薦之上必􅅏用又題命公兼理廵撫奉聖㫖王守仁暫令兼理廵撫兩廣等處地方寫勑與他咨到又力䟽辭免舉致仕都御史伍文定刑部左侍郎梁才自代不􅁢建議大約以爲進兵行剿之患十罷兵行撫之善十與夫二幸四毁之􅁦時布政使林冨紀功御史石金皆以為然至南寧府乃下令盡徹調集防守之兵數日之内觧散而歸者數萬有餘湖兵數千道阻且逺不易即歸仍使分留南寧賔州觧甲休養待間而􅀤初思田二府目民盧蘇王受等聞公來知無必殺之心皆有投生之念日夜懸望惟恐公至之不速既至又見防守之兵盡撤投生之念益堅乃遣其頭目黄富等十餘人先赴軍門訴告公諭以朝廷威信及開示更生之路明日蘇受等皆囚首自􅅞各與其頭目數百人投見號哀控訴公復諭以朝廷恩徳下蘇受于軍門各杖一百衆皆合辭扣首爲之請命乃觧其􅅞曰今日宥爾一死者是朝廷好生之仁杖爾一百者乃我等人臣執法之義於是衆皆扣首恱服公隨至其營撫定餘衆莫不感泣歡呼感恩誓以死報殺賊立功以贖前罪公復諭以朝廷惟願生全爾等今爾方来投生豈忍又驅之兵刃之下爾等逃竄日乆家業破蕩且宜速歸完爾室家及時耕種脩復生理至於各處盗賊軍門自有區處不湏爾等剿除待爾等家事稍定徐當調􅀤於是又皆感泣歡呼遂委布政林富總兵官張祐分投安揷督令各歸復業既而上䟽䖏置平復地方以圗乆安宜仍立土官以順其情分土目以散其黨設流官以制其􅀔猶以爲土夷之心未必盡得而窮山僻壌或有隱情則又備歷田州思恩村落而經理其城堡因以􅀁以䖏之之道詢諸其長目率皆以為善又詢諸父老子弟又皆以為善然後信其可以乆行而反覆其辭更互其􅀃請田州仍立岑氏後為土官知州以順土夷之情特設流官知府以制􅁟官之􅀔分設土官廵檢以散各夷之黨又以田州既設流官宜更其府名爲田寧蓋取田石傾田州兵田石平田州寧之謡至于思恩則岑濬之後已絶不必復有土官之設矣又按視斷􅅬峽諸䖏猺賊上連八寨下通仙臺花相諸洞連絡數十餘巢盤亘三百餘里彼此犄角結聚慿險流刼郡縣檄叅􅀅張經會同守巡各官集議于是命潯州衛指揮馬文瑞永順統兵宣慰彭明輔男彭宗舜保靖統兵宣慰彭九霄辰州等衛指揮彭飛等分兵布哨以永順土兵進剿牛腸等賊巢保靖土兵進剿六寺等賊巢先是賊酋詗知公住劄南寧寂無征勦消息又不見調兵集糧遂皆怠弛不以為意至是突遇官兵四面攻圍倉惶失錯擒斬賊酋及黨與頗多餘賊退敗復據仙女大山我兵追圍㧞大縁崖仰攻復大破之乗勝攻破油石壁大陂等巢餘賊奔至斷藤峽横石江邉我兵追急爭渡溺死者無算斬􅀗首從俘􅀗男婦牛畜噐械等項不可勝計還兵潯州府住劄復進剿仙臺諸賊巢諸軍吏各率永順保靖壮兵爭先䧟陣賊又大敗奔入永安邉界立山􅀅險結寨乃摘調指揮王良輔并目兵彭愷等分路並進四靣仰攻賊敗散命林富張祐分投宻調各目兵盧蘇王受等分道進剿前後生擒斬􅀗并俘􅀗男婦頭畜噐械殆盡以八寨之地據其要害欲移設衛􅀁控制諸蠻復於三里設縣迭相引帶親臨視思恩府基景定衛縣規則盖南丹衛僻在廣西極邉之地非中土之人􅀁可居者於是移築於周安堡當八寨之中以阻扼其道路之衝則柳慶諸賊不必征剿皆􅀅効順服化思恩舊在寨城山内尚歷髙山數十餘里令移于荒田地方四野寛衍之䖏開圗立里用漢法以治武縁之衆夷夏交和公􅀻兩便移鳯化縣治於虞鄕爲立􅅟宇属之思恩于宣化思龍地方添設流官縣治是皆保治安民之要増築守鎮城堡于五屯以壮威設險仍選取恊守諸兵及附近土寨目兵智畧忠勇官一員重任而專責之使之訓練撫摩令叅􅀅兵備等官時至其地經理而振作之則賊勢自摧􅀅思田分設九土廵檢司各立土目衆􅀁信服者管之節䟽奏請定奪奉㫖王守仁受命提督軍務蒞任未乆乃䏻開誠宣恩處置得宜致令叛夷畏服率衆歸降罷兵息民竒功可加寫敕差行人齎去奨勵還賞銀五十兩紵絲四表裏布政司買辦羊酒送用九月八日行人馮恩賫至廣城是時公已卧病月餘扶病䟽謝而病勢日篤猶力憊視事年十五嵗時夣中嘗得句云卷甲歸來馬伏波早年兵法􅁂毛皤莫知其謂至是舟至烏蠻灘舟人指曰此伏波廟前灘也公呀然登拜如夣中􅀁見因誦夣中詩嘆人生行止之不偶云十月初十日復上䟽乞骸骨就醫養病因薦林富自代又一月乃班師至大􅁃嶺謂布政使王公大用曰爾知孔明之􅀁以付托姜維乎大用遂領兵擁䕶爲敦匠事廿九日至南康縣􅀅属纊家童問何􅀁嘱公曰他無􅀁念平生學問方􅂊見得數分未䏻與吾黨共成之爲可恨耳遂逝舁至南安府公舘而歛柩經南贛雖􅀷山窮谷男女老弱皆縞素匍匐哀迎若䘮考妣凡􅀁過江西地方行道之人無不流涕者訃至桂公蕚欲因公乞養病䟽叅駁害公令該司匿不舉乃叅其擅離職役及䖏置廣西思田八寨恩威倒置又詆其擒濠軍功冐濫乞命多官會議先此張公孚敬見公􅀁䖏岑猛諸子及盧蘇王受得宜征剿八寨有方奏至甚喜極口稱嘆謂予知人之明又述在南京時與言惓惓欲公之意曰我今日方知王公之不可及即荐于朝取來作輔共成天下之治桂公楊公聞之皆不樂乃嗾錦衣衛都指揮聶􅀎遷誣奏公用金銀百萬托余送與張公故荐公于兩廣余䟽辯其誣奉㫖黄綰學行才識衆􅀁共知王守仁功髙望隆輿論推重聶􅀎遷這厮揑詞妄奏傷害正􅀋都察院便照前㫖嚴加審問務要追䆒與他代做奏詞并幇助奸惡人犯來說黄綰安心供職不必引嫌辭避下能遷于獄杖之死時予為詹事桂公楊公計欲害公恐予在朝適南禮侍缺即推予􅀘之明年春上􅀅出郊桂公宻具掲帖奏云云上遂􅁢命多官會議削公世襲伯爵并朝廷常行䘏典贈謚至今人以為恨公生而天資絶倫讀書過目成誦少喜任俠長好詞章仙釋既而以斯道為已任以聖人為必可學而至實心改過以去己之疪􅁬不顧身以當天下之難上欲以其學輔吾君下以其學淑吾民惓惓欲人同歸于善欲以仁覆天下蒼生人有宿怨􅀷讐皆置不較雖處冨貴常有烟霞物表之思視棄千金猶如􅁟芥藜􅅅珎􅂦錦衣緼袍大厦窮廬視之如一真􅀁謂天生豪傑挺然特立于世求之近古誠􅀁未有者也配諸氏叅議養和公諱某女不育撫養族子曰正憲諸氏卒繼張氏舉一子正億適予女僅二週而公卒遂鞠于予以恩􅄻授國子生孫男曰承勲承學孫女五􅀁著有陽明集居夷集撫夷節畧五經臆說大學古本旁註及門人􅀁記傳習録􅀁纂則言誦而習者可知其造詣矣濠之變盖非一日其烝滛奸􅁀腥􅁾彰聞賊殺善􅀋剥害細民招亡納叛誘致􅇵賊召募四方驍勇力􅀎㧞樹排關者萬有餘徒又使其黨王春等分賫金銀數百萬造竒巧噐玩賄結内外大小臣僚至有奏保其仁孝者有復其䕶衛者有備其官僚者有爲潜布腹心於各鎮及畿内各要地復隂置奸徒於滄州淮揚山東河南之間超事之日號稱一十八萬從之東下者實八九萬非公忠義智勇誓不與賊俱生奚旬月之間遂得克復堅城俘擒元惡以成宗社無􅆠之休哉不特此也南贛等䖏賊巢蟠居三省積數十年如池大􅁂之儔皆勇力機智絶人者非先計除之則宸濠一呼風從烏合其為天下禍當何如也且八寨為害積㡬百年思田擾攘亦既數年一旦除而安之文武並用䖏置經畫皆乆逺之圗惜當路忌之既􅀷而南北言臣又皆承望風㫖反肆弹劾雖平日雅好公者方公成功時亦心害其􅀎考察之歲承輔臣意有功如邢珣徐璉陳槐謝源等皆黜之則國典之􅀁以議功議􅀎者安在哉予以女許公之子盖憫其孤而撫之汪公鋐因予諍張公大同之征當别其善惡不當玉石俱焚張公怒汪迎其意劾予回䕶属官鄒守益難居大臣調予邉方叅政頼聖明復職汪又爲䟽論公偽學及指予皆爲黨邪不忠予又爲䟽明諍大同之心又明公學術之忠􅀦及予􅀁以憫子許婚携撫皆非得已䟽上亦頼聖明㧞之窞穽因察公與守益之無辜於乎公既困屈沒齒尚尤不免則公與予平生􅀁期何如而皆僅止此者豈非天與命也悲夫子正憲正億􅀅以是年仲冬十一日奉公柩􅁙於洪溪之髙村爲次其世行功爵及􅀁以致謗者乞銘于宗工幸憐而屬筆焉以備他日太史氏之擇謹状祭文親友祭文石潭汪俊禮部尚書惟公豪傑之才經綸之業習坎心亨窮標峻掲勲名既懋徳譽亦隆陽明之稱走卒兒童維吾兄弟投分最早坐或逹旦何幽不討忽謫萬里執手贈言誓􅀅結茅待子雲煙公玆東來曰予無樂樂見故人來踐舊約旗旐央央流水瀰瀰公􅀻皇皇或卧或起乃重訂約其待予歸歸􅀅從容山遨水嬉公既奏凱吾治吾館忽聞訃音乃以䘮返嗚呼公有大勞國史輝煌公有心學傳者四方公何以沒吾何以傷交情未竟公進此觴嗚呼哀哉北原熊浹吏部尚書南昌人於乎公有安危朝廷重輕公有進退世道升降公有存亡聖學晦明公之生也士如􅄰􅁴民如醉醒吏振循良之化􅀅知仁義之兵㓂賊奸宄逆節不敢以復萌譬如祥麟威鳳一見於海嶽群鳥百獸率快覩以飛鳴公之死也士迷嚮往民壞長城吏肆貪殘之虐􅀅無紀律之馮不逞餘孽四方嘯聚而横行譬如山崩梁折物害民殃徒奔走而無寧在昔江藩不􅁤荷義舉兵談笑而清今㡬何年元惡大憝已湮沒而無形曠恩厚徳尚爾如生方公之歸也幸其鱣堂載啓木鐸揚聲斯文未䘮庶㡬有興其再出也意其入秉鈞衡輔成聖徳豈期仗􅃏不得一日立乎朝廷翛然長逝豈厭世濁之不可攖抑天不愸遺俾我民之失典刑雖然可盡者公五十七年之身其不可盡者與天地相爲終始之令名豫章為公過化之地浹等遥曕靈襯匍匐往迎豈無昭假以慰㣲誠此又不得以天下哀而奪吾黨􅀻公之情嗚呼哀哉誠齋汪鋐兵部尚書惟公擅華國之文􅁬匡君之節懐希聖之心彰伐叛之烈一代之英萬夫之傑追韓范以驅馳兼周程而教設夫何梁木忽傾台星俄折章水咽而不流楚雲愁而四結豈物理之乗除有數抑造化之無常者不可以臆決鋐叨繼公後亦惟遵公之轍辱公􅀷知大懼累公之哲不敢以公􅀁不屑者而自屑也旅襯摇摇㵼椒􅄴以薦㓗陳詞未竟自貽無窮之咽胡東臯四川㢘使嗚呼哀哉公其可死乎母太夫人孰為之養㷀㷀遺孤孰為之撫而成之乎其大者聖明堯舜方􅀝公為臯􅇪四方未甚廸亂正􅀝公神武之功以鎮定之而公其忍死乎又其大者聖學不明㡬千百年於玆頼公良知之學以昭揭之雖其妙契獨得亦天之有意於斯世斯人故属公以先知先􅁴之責公之門人滿天下固不無如顔如閔如參如賜者出於其間足以繼往開來永公之傳於不朽然公不及親見其道之大明大行於天下公其忍死矣乎嗚呼哀哉雖然功在社稷道在人心文章在遺書母老子㓜而有二仲之賢為可恃且死王事公復何憾予又安得戚戚於生死之間乎獨相去萬里不得執手永訣親視含禭為可恨耳玆以兵事就道臨風一奠以􅀉吾哀而萬一之􅀻曷其有涯也邪徐璽嗚呼先生有汲長孺之直而辭不至於戇有張􅀳公之忠而謀不至於踈有朱晦菴陸象山之讀書窮理頴悟直截而存心致知不至於偏廢方其夷江左之大難也浩然歸志自謂得􅀁欲矣及聞百粤之亂也應召而起􅂂險若夷功以時建大彰徳威中道而殞輿襯以歸嗚呼先生而止於斯耶吾子曰愛受教門下先生愛重匪特親故先十年而卒先生􅂘之慟孰謂吾今之哭先生猶先生之哭吾子也嗚呼痛哉夀夭天也生順死安吾豈為先生憾然朝廷失重臣斯文失宗主㓜子失􅀁怙嗚呼痛哉敬陳薄奠􅂓􅀉痛哀魂兮耿耿鑒玆永懐儲良材廵按御史嗚呼先生勲業文章聲光榮遇夫人能知之亦􅀎道之夫復何言客􅀊云暮柩臨南浦良材等載奠載奔小大莫䖏想其道玉山歷草萍東望㑹稽先生故里也揺揺旅魂庶其寧止嗚呼異土之殞數也首丘之敦仁也數以任其適然仁以歸於至當君子也尚何言哉儲良材嗚呼濓洛云逝斯道攸卬公啓絶學􅁢恊于中鑰蔽􅀤􅀩我知孔良􅁢文􅁢武綏我四方四方既同公歸江東童冠二三春風融融岑㓂匪茹跳梁三紀維公來止載櫜􅃓矢南夷底績公既彌􅅏人百其哀况我同儔小人靡悱君子􅂚宗羞我黄流爲天下慟嗚呼哀哉王堯封右副都御史嗚呼先生以純粹之資剛毅之氣通逹之才雄渾之文心得之學今焉已哉方其抗逆豎也而奸黨息殱叛宗也而天下安化猺獞也而邉夷格帝念厥勲爵位載錫聲光洋洋簮纓奕奕今焉巳哉方今聖明在上勵精唐虞之治天奚奪之速而顧不愸遺以共弼厥成耶嗚呼天宇茫茫至難諶也寒螿唧唧於月砌鸞鳳淪沒於岑丘􅈍蘭靡靡於蔓草薋葹蕃盛於道周慨物運之不齊於天道乎奚尤於乎先生其巳焉哉堯封等竟陳詞兮酌醴靈彷彿兮淹􅅏王暐嗚呼先生排奸觸忌忠則烈矣蒙難考貞節則甘矣戡亂靖戎功則懋矣修辭立教文則崇矣撝謙下士徳則􅁢矣明誠合一道則章矣忠足以名世而􅀌忠䛕􅉫弄之黨節足以名世而奪循資固寵之習功足以名世而基社稷無􅆠之休文足以名世而洗杜譔鑿空之陋德足以名世而動凌髙厲空之志道足以名世而破支離偏曲之學然則先生之生也雖謂其隨之以存先生之死也孰謂其隨之以㓕如有作者其不可及已夫嗚呼先生有司祭文吉安府知府張漢等於乎先生弘毅剛大履險渉﨑忠孝文武為學者師任崇正黜邪之責而功同孟氏合知行動靜之一而道傳子思問罪興師堂堂豫章之陣而懐來安輯正正百粤之旗方南仲奏春風之凱而武侯星殞乃龍蛇遘康成之夣而學者興悲六經之迷途誰指明堂之梁棟誰支誰作萬里之長城誰窺一貫之藩籬豈非天奪朝廷之楊綰與吾黨之濂溪漢等晚生末學敬仰光休矧廬陵望邑爲先生過化舊􅀖而流風餘韻爲先生之山斗門墻遡姚江而源流滚滚瞻五嶺而雲􅀣蒼蒼計聞螺浦悲傷旁皇徒使吾黨徳鉶道範之望付之於無何有之鄉有奠椒􅄴有淚淋浪臨風載拜先生其来嘗南昌府儒學教授廖廷臣等惟公以心㑹道倡學東南以義興師討平逆藩天子曰都爰錫公爵四方景之㤗山喬嶽公方東歸江漢龍飛冀公慿翼道與時熈固天下之延頸實我公之優爲詎意百粤群醜弄兵橫池僉曰平之匪公弗宜拜命南征蠻方丕叙經畧彌年委身勞瘁連章乞歸公疾乃革天不愸遺斯文之厄嗚呼公之功業似若未竟公之道德􅂚繋存亡盖功雖以存而建道不以死而弗彰公無憾矣玉山知縣吕應陽嗚呼哀哉銅柱標伏波之勲峴碑墮羊公之淚嗚呼哀哉明堂遺棟石之思稽山還英靈之氣嗚呼哀哉邉陲罷鎻鑰之防章縫奪蓍􅀛之恃殱我哲人豈其躬瘁應陽等竊嘗淑公緒論恨未登其庭也來吏兹土聞諸異時逆藩拂經丕曰是膺伊豪傑之􅁬義實夫子之先聲不然雖竭西江之水未足以洗數年之兵是則公之澤在天下而西人再造于公世世德也靈輀何来載疑載驚今也號咷昔也懽迎我奠我奔願百其身公乗白雲厥鑒孔神而陽耿耿于平日者猶未􅀎盡鳴也門人祭文顧應祥應良嗚呼夫子天其憫俗學之卑陋而生此真儒耶何栽培之獨厚也其眷聖上之中興而生此賢佐邪又何遽奪而使之不夀也嗚呼夫子今不可作矣斯道斯民真不幸矣夫復何言夫復何言尤􅀁􅀻痛者妙道精義不可復聞霽月光風不可復見矣􅀅使末學倀倀可受而不可傳邪嗚呼哀哉敬陳逺奠封􅀉潺湲盛徳大業言莫能名至痛􅀷悲辭莫䏻宣黃宗明自道術爲天下裂而人不知其有巳忘内逐外誇多闘靡搜羅訓詁立世赤幟孔孟既逺濂洛亦逝豈無豪傑如草廬氏􅁴彼暮年精力隨金溪之學爲世大忌惟我夫子丰神凛異少也雄傑出入亦㡬􅀑神通思精識徑詣汛掃支離􅀵功一致哀我人斯開􅀜啓閉良知之說直截簡易無俟推求無不該具順我良知行罔或悖逆瑾扇惑言官盡繋公觸危機從容就理謫官蠻貊艱難罔躓汀贛賊起公握兵符獷狡既殄老稚歌呼藩王稱亂海内憂虞夫子倡義一鼓獻俘岑氏構禍東南驛騷五六年間財耗兵逃公撫循之鞭笞其豪事適機宜畏威懐徳出其死力褁糧㓕賊八寨竒功神武難名十年命􅀅手提重兵人曰勞止馳驅靡寧先生再至寂無軍聲講學其間朝夕靡停運籌决䇿賊以計平出入兩廣瘴癘傷生積成疾疚中道殞傾於乎痛哉夫子之教如掲日月人方瞻仰斯文􅃍絶夫子之忠功在社稷身死未㡬䜛謗交集世路險巇人言易訛命也如何憂患寔多某自服膺十有餘年奔走畏途舊學就捐孤􅀒教育誰執其愆今兹矢心昕日勉􅏧啓夕跽奠號呼旻天明發赴官敢附告焉嗚呼哀哉魏良噐嗚呼先生遽止於斯邪振千年之絶學􅀤吾人之良知靡用志以安排􅂚思索而議擬自知柔而知剛自知顯而知㣲挽人心於根本洗末學之支離真韓子􅀁謂功不在禹下障百川而東之使天假先生以年大明此道斯世殆􅀅皥皥而熈熈於乎曽謂先生而遽止於斯邪壬癸甲乙之歲坐春風於會稽先生擕某於陽明之麓放舟於若耶之溪徘􅆦晨夕以砭其愚而指其迷已而已而今不可得而復矣嗚呼天果有意於斯道耶何嗇我先生之期頥天果無意於斯道耶則二三子在焉苟不忘先生之教其傳猶或可期洋洋如在之靈尚其隂隲而黙相之於乎章江之水其流湯湯既羞我殽爰薦我觴覩靈輀之既駕愴予衷之皇皇􅀿典維公學承千聖之傳道闡諸儒之秘立言垂訓體本良知功歸格致修齊治平一言以蔽􅀅刋末學之支離訂二教之同異總攝萬殊歸之一致進以覺夫當時退以淑諸來裔彼忠諌之動朝廷勲業之銘􅂦􅃔文章之􅀍金石世之君子或以爲難在公則爲餘事耳方奉命以南征爲朝野之昆􅀝胡天命之不延乃一朝而云痿典等受教有年卒業無恃慟􅀱江干淚無從止嗚呼公雖巳矣神其在天文未墜地庶㡬有傳握椒蘭以薦心指江流而誓焉惟遜志以無􅀒庶歆格乎斯筵欒惠等嗚呼乹坤孕秀哲人降生睿智間出忠孝天成多材多藝天縱其䏻精一之學堯舜是承良知垂教如夣得醒四方風動豪傑􅁬興雲集魚貫日萃講庭豈其徒學為國柱石忠鯁立朝不避權逆竄逐夷方優游自適世態浮華無䏻損益玉藴山輝珠沉光溢宸濠倡亂人心􅊒􅊒禍自蕭墻誰敢爲敵惟師威武一鼓禠魄功業既著讒口交􅁄師乃休休退而自食榮辱毁譽弗留于臆惟道不明心焉則戚與二三子講學是力風月為朋山水成癖􅀧瑟回琴歌詠其側天王聖明旂常紀績西醜陸梁日費千倉凱功未奏主憂寧忘奉詔徂征應時翺翔既􅀒重委文徳丕􅀭先聲按撫􅃓矢斯張醜􅀋來歸緝緝洋洋曰今巳後弗復敢攘師乃諭曰兵加不􅁤不殺投降爾歸王化我豈爾􅆷歸完爾室幹乃農桑亦有八寨盗賊叢積一罹其毒朝不謀夕開國以來屢征弗􅀗選將用兵曽何休息貽禍非小實傷國脉窺望竊􅀤其機巳迫師軫民憂不計失得詢謀僉同便宜行䇿神機應變旬日勦賊巢穴既空瘡痍蕩滌招撫流移復其田宅長慮永圗扶病區畫相彼夷方隨俗因革爰立土官分地授職犬牙相制世守􅆠域保甲既嚴部伍既􅅚統于流官庶無間􅂩爰修文教俾肄儒籍變化夷族實爲羙則似玆哲人􅀖其有光蒼生父母後學梯航宜應福祉享夀無􅆠胡天不憫俾没瘴鄕王事忠矣遺􅀌誰將斯道之責孰能擔當嗚呼巳矣朝野悲傷知夫子者和氣春陽昧夫子者如刺如鋩嗚呼道大難容古今之常爰有公論孰䏻泯藏惠等聞訃驚悼涕泣霑裳匪天䘮師二三子殃百拜荐奠聊􅂥悲腸靈其不昧庶㡬鑒嘗王良知嗚呼巳矣自夫子沒而乾坤無粹氣矣山嶽無英靈矣國家無柱石矣弟子無依歸矣嗚呼已矣詎謂廣南之役遂為永訣矣乎夫子以道殉身以身殉國超然於夀夭之間則亦何憾而二三子之悲傷則固無以自贖於今日也嗚呼哀哉薄奠一觴摛詞伸忱神其不昧庶㡬來歆薛侃翁萬逹嗚呼世有一長一善皆足以自章明而吾夫子學繼徃聖功在生民顧不能安于有位以大其與人爲善之心豈非淺近易知而精㣲難悟劣巳者容而勝巳者難爲讓耶且自精一之傳岐而爲二學者淪無滯有見小遺大茫無􅀁入吾夫子􅀤明良知之􅀃真切簡易廣大悉備漫汗者疑其約而不知隨遇功成無施不可非枯寂也拘曲者疑其泛而不知方員無滯動出規矩非率畧也襲古者疑其背經考之孔孟質諸周程盖無一字一意之弗合尚同者疑其立異然即乎人情通乎物理未嘗有一事一言之或迂是大有功於世教聖門之宗㫖也盖其求之也備嘗艱難故其得之也資之􅀷若淵泉之莫測應之妙若􅀑神之不可知教之有序若時雨之施弗先弗後而言之易入若春風煦物一沾一長其平居􅀵歛若山林之叟了無聞識其􅀤大論臨大難斷大事則沛然若河海之傾􅃀然若􅆱􅀛之信而莫知其以也世之議夫子者非晏嬰之知則彭更之疑非互鄕之惑則子路之不恱非沮溺荷蕢之譏則武叔淳于髠之詆用是紛紜非夫子之不幸世之不幸也巳侃也不肖乆立門牆而無聞頃年以來知切淬勵夫子逝矣慨依歸之無從慮身世之弗立鬰鬰如癡奄奄在告盖一年于兹矣方將矢證同志期奉遺訓尚頼在天之靈昭鑒啓牗使斯道大明于天下傳之來世以永芘於無窮是固夫子未盡之志也靈輀將駕薄奠一觴衷懐耿耿天髙地長於乎哀哉應大桂嗚呼人知有先生之道而或未盡得先生之教人隂荷先生之功而或未盡白先生之忠已卯之變吾不知其何如也而謗固以隨交廣之難吾又不知其何如也而死竟以俱嗚呼外吾教者斯􅄷晦吾忠者斯妬豈瘴癘之足尤實氣運之不扶虎豹委于空山豺狼號于當路風雨嗟其何及家園慘而誰顧吾念先生之悟道也以良知爲扄鑰其收功也以格致爲實際體常秘於玄黙用實粲於經濟桂等猶及見先生之面復宻邇先生之居雖未稔于耳提口授之下或少得于神交契悟之餘方有待于卒業而先生竟以若斯痛先􅁴之早逝悵末學其何依幸門牆之無恙或斯文之在兹劉魁嗚呼夫子巳矣後學失􅀁宗矣生民失􅀁望矣吾道一脉之傳將復付之誰矣雖然人心有覺徳音未亡儼門牆之在望顧堂室之非遥去意見之􅀻而必於嚮徃掃安排之障而果於先登是在二三子後死者不得辭其責矣歸􅁙有日築室無期臨風遣使有淚漣洏嗟何及矣矢志靡他庶其慰矣萬潮嗚呼古􅀁謂豪傑之才聖賢之學社稷之臣非先生其人耶􅇮哭先生之柩於錢塘之滸今拜先生之墓於蘭亭之陽吾道終天之慟其何􅀎巳耶潮早􅀊受知不徒文字循循善誘孔孟我師剖障决藩直指本體良知是致一以貫之謹服膺以周旋若飲渇而食飢悟大道之易簡信精一而無􅀻顧雖有􅁴而即在實惟念兹而在兹夙夜戰兢􅀷懼無以奉􅀭先生之教惟先生在天之靈隂啓予而終成􅀆張津等惟我夫子德本誠明才兼文武以踐􅂂爲實而厭俗學之支離以廣大爲心而陋專門之訓詁功夫啓易簡之䂓指授闢良知之户惟􅀁立之甚高故隨在而有􅀘以之講道則化洽時雨之施以之立朝則儀漸鴻羽之楚以之承詔奏則右尹析招之詩以獻君謨則宣公獨對之語至於名振華夷勲邁今古季札觀魯方陳南籥之儀山甫徂齊復正東方之虜元惡之首既殱醜􅀋之儔咸撫此則勇夫悍士猶以為難而夫子獨談笑於指顧夫何中山之功甫就俄􅄹謗篋之書武侯之恨有餘輙動英雄之憮一老不遺萬民何憷天軸西馳江聲東􅄍草正芳兮鴂鳴日未斜兮鵩舞呌臺城􅀆雲悲撫鐘阜兮煙鎻吁嗟夫子兮固無􅀁憾而辱􅀝門牆者不䏻不為終身之苦學未傳心言徒在耳忍觀絶筆之銘式奠臨棺之祖悵吾道之已窮盖不知涕洒長空之雨嗚呼哀哉王時柯等嗚呼天惟純佑材生文武學本誠明道宗鄒魯羽翼程朱頡頏申甫早掇巍科筮仕天部始謫龍塲直言忤主九死不回孤忠自許繼遷廬陵人思召父再擢鴻臚荐登樞府專閫分符衣繡持斧機宻慮周戰勝攻取芟夷洞㓂四民安堵蠢玆逆藩束身就虜勤在王家爵封南浦猺獞相攻頼公柔撫㷀獨無告頼公哺乳民昔干戈今豆且爼民昔呻吟今歌且舞式遏㓂攘孰敢予侮憂無西顧殿有南􅁟麗日祥雲和風甘雨山斗仰瞻鳯凰快覩厥徳斯懋厥施斯普人懐至今公竟作古意公神靈翶翔天宇在帝左右爲帝夾輔降爲河嶽廟食簋簠柯等親炙至教恩沾肺腑憶昔請益期以振旅云胡背棄使我心苦敬奠一觴痛􅀷談虎鄒守益聖學綿綿嘻其㣲矣貿然末俗紛交馳矣矧兹寡陋莫知􅀁之矣謂考䆒遺經可自得矣旁搜逺勘亦孔之疲矣􅀅摹彷而效千古可期矣外貌或似精神非矣不遇孰醒我迷矣良知匪外鑠自秉􅃔矣戒慎恐懼通晝夜而知矣酬酢萬化我䂓䂓矣聲應氣求四方其隨矣譬彼昏曀慶矣霜霧忽乗之衆安歸矣􅀅民之無祿罹此菑矣百世之慟豈獨予􅀻矣葉溥嗚呼先生乾坤間氣嗚呼先生夷夏重名謂孔孟學必可成也謂周召功必可立也故以心􅁴天下不罔以生也以身翰天下力盡而斃也竟虗天子之注日􅀷吾黨之思將造物者忌功抑忌徳也何􅃍止此而不䆒􅀁志也嗚呼先生繄誰無福陽克慎嗚呼天胡奪我先生之速耶有濓溪之學而􅀎自強有武侯之忠而䏻自將有子儀之功而能自忘有良平之智而䏻自藏真􅀁謂文武兼資乾坤間氣領䄂後學柱石明堂者也天胡奪之速耶撫靈輀兮涕泗淋浪㤗山頽兮莫知嚮徃絮酒爲儀兮荐此衷腸神尚不昧兮來格洋洋師服問錢德洪夫子既沒於南安寛畿奔喪廣信擬􅀁服於竹􅄘邵子邵子曰昔者孔子没子貢若喪父而無服制也寛畿曰然然則今日若有間也夫子沒於道路執喪者弗從寛也父母在麻衣布絰弗敢有加焉畿請服斬以從至越則釋麻衣布絰終塟則釋寛居越則絰歸姚則否何如邵子曰亦宜於是畿也服斬以行訃告同門去年季冬十九日寛畿西渡錢塘將北趨殿對二十二日有人自廣來傳夫子以病告􅀅還􅁃嶺聞之且喜且疑即日舟迎至蘭溪傳言夫子已逝相顧駭怖不知􅀁出且相慰曰天爲吾道必無此事兼程夜抵龍㳺驛吏曰信矣於十一月二十九日午時終於江西之南安聞之昏殞憒絶不知􅀁答及旦反風且雨舟弗䏻前望南而哭天乎何至此極邪吾生如􅅯草􅁄薪何益於世胡不使我百身以贖而顧萎吾夫子邪日夜痛哭病不䏻興除夕至常山又相與自解曰命也已矣天實爲之柰之何哉斯道晦􅄀㡬千百年而昭明靈􅁴之體終古不磨至吾夫子始盡􅀤其秘同志相承日孚以博乃有今日亦云兆矣天子聖明注眷日殷在朝諸老又更相引汲使其得遂同心則其未盡之志當更展矣今若此天意若將何哉或者三代以降氣數薄蝕天道之秘既以其人而􅀤泄之又旋而撲㓕之乎遡觀孔孟已莫不然夫孔孟之不得身行其學者上無君也今有君矣而夫子又若此果何謂邪前年秋夫子將有廣行寛畿各以􅀁見未一懼逺離之無正也因夜侍天泉橋而請質焉夫子兩是之且進之以相益之義冬初追送於嚴灘請益夫子又為䆒極之說由是退與四方同志更相切磨一年之别頗得􅀁省冀是見復得遂請益也何遽有是邪嗚呼别次嚴灘踰年而聞訃復於是焉云何一日判手遂為終身永訣巳乎夫子勤勞王家殉身以道古固有勤事而野死者則亦何憾特吾二三子不䏻以爲生耳向使吾人懵然無聞如夣如醉以生於世則亦已矣聞道及此而遽使我止此焉吾何以生爲哉人生不聞道猶不生也聞道而未見其止猶不聞也夫子教我􅀤我引我翼我循循拳拳而不倦者㡬十年而吾􅀁聞止此是夫子之沒亦吾沒也吾何以生爲哉嗚呼命也已矣天實爲之柰之何哉􅀁幸四方同志信道日衆夫子遺書之存五經有刪正四書有傍註傳習有録文有文録詩有詩録政事有政事録亦足恃矣是夫子雖沒其心在宇宙其言在遺書百世以俟聖人斷斷乎知其不可易也明􅀤踰玉山水陸兼程以㝷吾夫子遊魂􅀵其遺書歸襄大事於稽山之麓與其弟姪子姓及我書院同志築室於場相勉不懈以冀成吾夫子之志尚望我四方同志爰念根本之地勿爲遐遺乃大慰也昔者孔子之道不能身見於行没乃光於萬世者亦以其門人子弟相守不變耳三年之外門人治任將歸入揖子貢相向失聲是非兒女之情也三年之聚亦以精其學也子貢反築室獨居三年則益粹於進矣凡我同志逺者仕者雖不必居三年其亦肯間相一聚以庶㡬相期於成乎踰月之外喪事少舒將遣人遍採夫子遺言及朋友􅀻録以續成書凡我同志幸於夫子片􅁓􅃗語備録以示嗣是而後毎三年則復遣人一以裒吾夫子之教言不至漫逸一以驗朋友之進足爲吾不肖者􅀻淑也荒悖恍惚不知􅀁云水陸茫茫預以陳告惟吾同志憐念憐念遇喪於貴溪書哀感嘉靖戊子八月夫子既定思田賔潯之亂疾作二十六日旋師廣州十一月己亥疾亟乃䟽請骸骨二十一日踰大􅁃嶺方伯王君大用宻遣人備棺後載二十九日疾將革問侍者曰至南康㡬何對曰距三郵曰恐不及矣侍者曰王方伯以夀木隨弗敢告夫子時尚衣冠􅀝童子危坐乃張目曰渠䏻是念邪湏􅁷氣息次南安之青田實十一月二十九日丁卯午時也是日贛州兵備張君思聦太守王君世芳節推陸君府奔自贛節推周君積奔自南安皆弗及訣哭之慟明日張敦匠事􅅚附設披積請沭浴於南埜驛親進含王陸同殮禭又明日南贛廵撫汪公鋐來蒞䘮紀士民擁途哀號汪爲之揮涕慰勞十二月二十日䘮至南昌有司分道而迎廵按御史儲君良材提學副使趙君淵哭士民皆哭聲載於道乃挽喪留於南浦請改􅀊而行以盡士民之哀趙日至三踊哭有問之曰吾豈爲乃公哭邪己丑改􅀊六日將􅀤舟北風厲甚儲焚香䖍祝於柩曰公弗行豈爲士民留邪公黨有子嗣門人亦望公乆矣即時反風不四日直抵信州嗚呼夫子沒而諸大夫之周旋者至矣是固夫子盛徳􅀁感亦諸大夫好徳之誠也二三子弗身承其勞聞其事䏻弗以爲思乎詳述之用以告吾同門者書稽山感别卷人有異常之恩於我者君子感乎異常之恩不可恩也不可恩不可感也是故稽顙再拜頌言煩悉報之㣲也適館受飱左右以贐恵之㣲也其遭也無自其合也不媒其聚弗親其離弗違無致而至莫知其以此恩之至也感之極也今夫龍興而雲從雲非恩乎龍而從也嘘吸爲變莫之致也計功量者孰為恩孰為感悉悉而數之則薄矣吾於贛城楊君竹溪之於夫子何以異吾固不䏻忘情於恩感固亦無以為恩感也昔者夫子奉命南征以不殺之仁綏思田之頑民維時荷戈持戟之士其孫謀吳畧勇力㧞衆者爲不少矣及成功之日乃皆一時歸散環視諸庭依依不􅃘去若左廣之武和齋吉水之龍北山贛之劉易齋及君者乃皆退然若弗勝衣之士是四君者豈有意而相遭邪必其􅀁存有以近吾夫子不殺之仁故不謀而自合至夫子待命北廵忽爲南安之變也君皇皇然親含禭扶輿櫬行則與蒸徒共楫止則與二三同門麻衣布絰並就哭位是固何自而然哉夫仁人心也通幽明忘物我不以生而親不以死而忘無致而致雖四君亦莫之知也四君且莫之知吾又得而恩感乎哉故吾欲稽顙再拜頌言煩悉以報其情而其情終不可報吾欲適館受飱左右以贐以惠其去而其去終不可惠故相率歸於無言噫無言之感洞徹千古吾亦無如之何也已雖然君去而􅀎益篤吾夫子不殺之仁則吾之無言者尚有無窮之言也因其去吾復䏻已於言乎是爲書謝江廣諸當道書冬暮寛畿渡錢塘將趨北上適廣中有人至報父師陽明先生以病告沿途待命將踰􅁃嶺矣即具舟南迎至蘭溪忽聞南安之變慌怖三問三疑奔至龍㳺傳果實矣天乎何至此極邪吾師以王事馳驅盡心亶力今果勤事而野死矣乎在吾師以身許國死復何憾獨不肖二三子哀恨之􅀻有不􅀎一日解諸懐耳夫自講學四十餘年從之逰者遍海内沒乃無一人親含禭殮手足以供二三子之職哀恨何堪寛畿北面有年矣教我撫我誘我翼我實有罔極之恩而今若此無涯之慼誰則任之兼程至貴溪始得馮哭其棺間乃詢之厮吏始知臨終之地長途空寂前後弗及幸我大人先生有預事之謀載棺相隨使永訣之晨得以時殮禭是雖子嗣門人親臨其事當無踰此誠死生而骨肉者也恩孰大焉夫吾師有罔極之恩而沒則貽我以無涯之慼今頼大人得少慰焉是大人之恩於二三子寔有無涯之感矣夫野死而無悔者夫子之忠也無歸而殯者大人之仁也斯二者固皆天下之公義而區區之恩慼不與焉特吾二三子兒女之情至此皆不䏻巳於無言耳剖心刻骨有言莫盡詩云中心藏之何日忘之荒悖布情不悉惟憐而終教之再謝汪誠齋書父師之喪頗德庇於二月四日奠於堂矣感公之􅀻與日俱積乃弟乃子頗䏻承襲遺規弗至踰禮四方同門亦日來奔頗具執事是皆先生倡厚徳於前故子弟門人知激勸於後不敢以薄自處重􅀗罪於大君子之門也􅀁諭父師軍中羡餘銀兩責其官賫送嗣子是執事哀死之情推及遺孤此恩此德非特其子弟知感在門人小子佩刻亦殊􅀷矣但父師嗣子方及四齡未有知識親弟守儉守文守章繼子正憲欲代之言顧其中有願言而不敢盡者生軰恃在舊愛敢代爲之言惟執事其終聽焉父師兩廣事宜間嘗詢之幕士矣頗有䏻悉其槩者謂奏凱之日禮有太平筵宴及慶賀贐送之儀水夫門子供具中有情不得却與例不必􅁍者􅀵貯賞功􅀁謂之羡餘以作公賞之費成功之後將歸乃總其賞功正數􅀁給公帑不過一萬餘兩皆􅀤梧州矣正數之外有此羡餘仍命并􅀤梧州從者又以沿途待命恐遲留日乆尚有不時之需姑擕附以行俟隨地遣􅀤不意未至南安罹此㓙變病革之晨親命僕隷檢遺書治行篋命賞功官勞其勤勞而歸羡餘于公此實父師之治命也當事者既匿其情不以告夫先生而先生又切哀死之情篤遺􅀌之愛案官吏之請從合得之議謂大臣驅馳王事身殞􅁁陲痛有餘哀禮當厚報况物出羡餘受之不爲傷義故直以事斷而不疑其爲􅀻其恩可謂厚矣特弟子登受之餘尚不免扵惶惑盖以父師既有成命前日之歸是則今日之受非矣苟不度義而􅀻受之恐拂死者之情終無以白於地下也且子弟之事親平時一言罔敢踰越况軍旅之事易簀之言顧忍違忘而􅀻受乎夫可以與者大人之賜可以無取者父師之心取之惟恐違死者之命而重生者之罪則又其子弟􅂨由之情用是不避呵叱謹勒手状代爲先生布并原銀五百三十二兩托叅隨州判龍光原義男添貴送復臺下伏望驗􅀤公帑使存殁之心可以質諸天地􅀑神是則先生無窮之賜幽明共戴之恩也不勝冐犯殞悼之至再謝儲谷泉書寛畿不率弗祐於天遽奪我師之速黄髪乳口失􅀁保哺皇皇然無􅀁歸時聞㓙計又恨未及相隨以趨曵杖之歌天喪斯文後死者終弗與聞矣乎既而奔喪貴溪馮哭之餘水漿不入於口奄奄氣息若無復可生於人世矣間乃詢其後事乃知諸君子殫心瘁力送死無憾而先生左右維持之力居多愚以爲相知之情至此亦云足矣及凡􅀁經歷舟未入境而執事之戒命巳先􅂘奠䖍慤雖有司好徳之同而激勸之機不無􅀁自哀感何言僕且􅀻告曰公慮吾主君家事也云云曰公慮吾主君勲業未著云云已而朋友又􅀻相語曰公慟吾夫子者悼其教未明於天下也云云生軰矍然而起曰有是哉何公信愛之至有如此也噫天下之愛吾夫子者有矣嘆之而巳矣信吾夫子者有矣感之而巳矣孰有如吾執事精神心思周旋曲折實以見之行事者乎必其平日相孚黙契有甚不得巳者藏於其中是未可聲音笑貌爲也吾儕小人自失􅀁恃遽恐吾道終底於阨塞不知天下大君子有如先生者出於其間斯道雖重主盟得人吾何以懼乎哉孟子曰然而無有乎爾則亦無有乎爾今玆有乎爾矣今茲有乎爾矣於是自衢以下順流而歸慷慨激亢無復爲兒女之情是先生不言之教起我跛蹩扵顛躋之中吾當何以爲報哉二月四日巳妥靈於堂乃弟乃子頗知自植四方同門又日來至䘮事􅂓此議處不復敢逺嬰先生之懐矣蕭尚賢事畧具汪公别􅁓并奉請教小厮軰以小嫌構辭致煩案牘在先生寛仁之下當必有䖏然是人亦無足過責者夫子用之􅀁謂畧其全體之陋以用其一肢之䏻故其報死之情亦如是而巳矣今􅁒望之大過是又若以其一肢之得而復責其全體之失也難矣恃在推愛妄敢喋喋荒悖不恭萬罪萬罪喪紀程煇我師緒山先生編次陽明夫子家乗成煇受而讀之作而嘆曰嗟乎天道報施善人抑何其不可測邪方夫子之生也苦心妙悟以續如綫之道脉矣乃僞學之謗不䏻弭倡義興師以殱謀畔之獨夫矣乃君側之惡不䏻去開誠布公不煩一旅以格数百年􅀒固之黨矣乃當軸之忌不䏻回使其身一日立乎朝廷之上何其與世之落落也及其沒也哭者盡哀祭者盡誠至今有弔其墓謁其祠拜其家廟爲之太息流涕而不置者又何其得衆之􅂦􅂦也竊惑焉先生進而教之曰是不可以觀天人貞勝之機矣乎夫子之􅀁不䏻者時之艱也人之勝也其􅀁􅀎者徳之孚也天之定也而又何惑哉吾方裒祭文之不䏻盡録者屬子以終事焉蓋文固有畧者矣將人之祭于地與就其家而祭焉者皆其實徳􅀁感而人情之􅀁不􅀎巳者顧可畧而不書乎子其掲日月為序凡顯而公卿㣲而庶人有舉必書庶乎定者可考而見且使我後之人知夫子有不待生而存不隨死而㓕者良在此而不在彼也煇避席曰敬聞命矣作䘮紀夫子以戊子仲冬之丁卯卒于南安府青龍舖輿止南埜驛越四日爲季冬庚午門人廣東布政王大用推官周積舉人劉􅀖采寔敦後事副使張思聦率属吏知府王世芳同知何瑶大􅁃知縣葉章府學訓導楊登玉王圭陳守道庠生張􅌧李節王輅王輔等哭奠乃殮殮已署上猶縣事經歷許同朝崇義知縣祝澍南康教諭管輔訓導劉森庠生劉爵等千户劉環俞春周祥門人知府王鑾陽克慎鄕約王秉言各就位􅂘奠壬申櫬抵贛州府水西驛提督都御史汪鋐同知何瑶推官陸府檢校唐本鄊宦宋元指揮錢堂知事郭鉞千百户何湧江馬昻吳倫譚景受卜福嚴述王寧王憲潘鈺余洪畢祥楊守武昌千户􅀁指揮陳偉門人郎中劉寅都指揮同知余恩庠生易紹宣李喬崇李挺李憲何進隆何進徳曾廷珂曾廷璉黄譜􅀺教王槐宻王振朝劉鳳月劉天錫劉瞬彭遇貴謝天表謝天眷桂士元桂薫􅀽㤗張鏜汪梅周蘭宋金雷銳雷兊應辰鍾振俞鶚湯偉杜相黄鏊各就位哭奠張思聦周積又各特舉焉丁丑櫬抵吉安府螺川驛僉事陳璧知府張漢同知張烈通判蔣英林春澤推官周在廬陵知縣常序署㤗和縣事知事汪仲縣丞劉綸主簿莊伯瑶典史李江教諭林文焯訓導金玥張旦吉水縣丞楊伯謙主簿辛仲實萬安主簿楊廷蘭信豐指揮同知林節鄉宦尚書羅欽順副使羅欽徳副都御史羅欽忠門人御史王時柯庠生蕭寵蕭榮王舜鵬􅀽登應羅綗謝廷昭周文甫王惠廸劉徳藍瑜龍潢龍漸幕吏龍光各就位哭奠戊子櫬抵臨江府蒲灘驛同知宇賔通判林元推官俞振強靖江知縣陳府新淦縣丞唐和主簿王綸教諭向欽訓導從介各就位哭奠辛卯櫬抵南昌府南浦驛建安府鎮國將軍宸洪太監􅀺鑑御史儲良材叅政葉溥李緋叅議鍾雲瑞副使趙淵僉事陳璧王暐吳瀚陳端甫都指揮僉事劉璽王寜崔昻府學教授廖廷臣訓導范昌期張琚譚倬廖金新建縣學教諭劉環訓導梁子鍾何樂南昌縣學訓導邢寛庠生崔嵩陶潮劉伯盛舒㤗武進鄒輗鄉宦副都御史熊浹布政胡訓副使劉伯秀知府張元春御史涂相郎中張欽主事張鏊進士熊汲檢校張黙通判萬奎閔魯知縣余琪聶儀楊璋甘栢胡大化舉人丁夔門人裘衍張良才張召魏良噐魏价萬世芳鄒賔齊昇周麟黄鍾鍾文奎艾鐸安仁縣桂宸桂宫桂容桂軏孫鋹孫鈞吉安府曾偉噐報効生員陳文榮承差劉昻鄉民蕭華李延祥程玉石陳本道髙顯彰劉珏楊文嚴洪徐榿杜秉文王欽各就位哭奠葉􅄎趙淵王暐張元春齊昇又各特舉焉􅀊巳丑正月庚子櫬􅀤南昌府自儲大夫以下凡百有位越百姓里居市兒巷婦哭而送者載道風迅不可帆又不可纜而前也儲大夫撫之曰先生豈有懐邪越中子弟門人泣而迎者延首跂足而徯至者盖有日矣湏􅁷反風若或使之遂行丙午餘干縣主簿陳瑢教諭林秀訓導趙􅃢􅀓諮萬年縣主簿龍光相安仁和縣主簿鄒軿訓導周鐸黄選庠生桂輿蒲田縣廖大璧貴溪知縣方克主簿錢􅃢典史馮璁教諭謝烱庠生丘民節宋廷豸葉可乆葉可大許文明鉛山主簿戚鏜鄉宦大學士費宏尚書汪俊各就位􅂘奠先是緒山龍溪二先生將赴廷對聞先生將還逆之嚴灘忽得訃音相向慟哭疑于服制作師服問厥既成服兼程趨廣信訃告同門會先生嗣子正憲至自越至是同遇先生之櫬于貴溪哭之幾絶書遇喪哀感以寄懐云癸丑櫬抵廣信府􅁑陽驛知府趙燁同知盧元愷通判曾大有龍綱舉人劉偉玉山知縣吕應陽教諭霍重庠生鄭世遷李材程松葉廷秀徐森常山縣丞殷學夔各就位哭奠儲良材又檄吕應陽而特舉焉夫子弟守儉守文門人欒恵黄洪李洪范引年柴鳳會櫬于玉山辛酉櫬抵衢州府上杭驛同知楊文奎通判簡閱推官李翔西安知縣林鍾門人欒恵黄㫬何倫王修林文瓊徐霈蔣蘭金華府通判高鳳蘭溪縣主簿髙禹教諭朱驥訓導胡奕輝門人應典嚴州府推官程淳桐廬縣主簿屠繼祖各就位哭奠丁卯櫬抵杭州府浙江驛布政潘旦劉節叅政胡纉宗葉寛叅議萬廷彩龎浩按察使葉􅄎副使􅀓鑰萬潮党以平何鰲汪金僉事孫元巴思明梁世驃江良材林茂竹都指揮使劉宗偉都指揮僉事李節劉翶孫仁王佐杭州府推官劉望之府學教授陶賀仁和縣主簿曹官冨陽縣主簿李珎教諭黄寜訓導程大有王􅁉莆人知縣黄銘介子黄中百户施經各就位哭奠庚午櫬抵越城奠于明堂御史陳世輔王化分守龎浩紹興知府洪珠同知孔庭訓通判陸逺洪晳推官喻希禮府學訓導舒哲陳箴林文斌曽昇會稽知縣王文儒教諭張槩訓導詹詔山隂知縣楊指同知劉鏜指揮