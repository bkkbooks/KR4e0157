body:
  text: 外集六說雜著白說字貞夫說乙亥白生說常太保康敏公之孫都憲敬齋公之長子也敬齋賔予而冠之阼旣醮而請曰是兒也嘗辱子之門又辱臨其冠敢請字而教諸曰字而教諸說也吾何以字而教諸吾聞之天下之道說而已天下之說貞而巳乾道變化扵穆流行無非說也天何心焉坤徳闔闢順成化生無非說也坤何心焉仁理惻怛感應和平無非說也人亦何心焉故說也者貞也貞也者理也全乎理而無所容其心焉之謂貞本扵心而無所拂扵理焉之謂說故天得貞而說道以亨地得貞而說道以成人得貞而說道以生貞乎貞乎三極之體是謂無巳說乎說乎三極之用是謂無動無動故順而化無巳故誠而神誠神剛之極也順化柔之則也故曰剛中而柔外說以利貞是以順乎天而應乎人說之時義大矣㢤非天下之至貞其孰能與扵斯乎請字說曰貞夫敬齋曰廣矣子之言固非吾兒所及也請問其次曰道一而巳孰精粗焉而以次爲君子之徳不出乎性情而其至塞乎天地故說也者情也貞也者性也說以正情之性也貞以說性之命也性情之謂和性命之謂中致其性情之徳而三極之道備矣而又何二乎吾姑語其畧而詳可推也本其事而功可施也目而色也耳而聲也口而味也四肢而安逸也說也有貞焉君子不敢以或過也貞而已矣仁而父子也義而君臣也禮而夫婦也信而朋友也說也有貞焉君子不敢以不致也貞而巳矣故貞者說之幹也說者貞之枝也故貞以養心則心說貞以齊家則家說貞以治國平天下則國天下說說必貞未有貞而不說者也貞必說未有說而不貞者也說而不貞小人之道君子不謂之說也不偽則欲不佞則邪奚其貞也㢤夫夫君子之稱也貞君子之道也宇說曰貞夫勉以君子而已矣敬齋起拜曰子以君子之道訓吾兒敢不拜嘉顧謂說曰再拜稽首書諸紳以蚤夜祗承夫子之命劉氏三子字說乙亥劉毅齋之子三人當毅齋之始入學也其孟生名之曰甫學始舉扵鄊也其仲生名之曰甫登始從政也其季生名之曰甫政毅齋将冠其三子而問其字扵予予曰君子之學也以成其性學而不至扵成性不可以爲學字甫學曰子成要其終也學成而登庸登者必以漸故登髙必自卑字甫登曰子漸戒其驟也登庸則漸以從政矣政者正也未有已不正而䏻正人者字甫政曰子正反其本也毅齋起拜曰乾也旣承教豈獨以訓吾子南岡說丙戌浙大叅朱君應周居莆之壺公山下應周之名曰鳴陽盖取詩所謂鳳皇鳴矣于彼朝陽之義也莆人之言曰應周則誠吾莆之鳯矣其居青瑣進讜言而天下仰望其風采則誠若鳯之鳴扵朝陽者矣夫鳯之棲必有髙岡則壺公者固其所從而棲鳴也扵是號壺公曰南岡盖亦取詩所謂鳯皇鳴矣于彼髙岡之義也應周聞之曰嘻因予名而擬之以鳯焉其名也人固非鳯也因壺公而號之以南岡焉其實也固亦岡也吾方愧其名之虚而思以求其號之實也因以南岡而自號大夫鄊士爲之詩歌序記以咏嘆揄揚其羙者旣巳連篇累牘而應周猶若未足勤勤焉以蘄扵予必欲更爲之一言是其心殆不以􅐌譽稱頌之爲喜而以樂聞規切砥礪之爲益也吾何以答應周之意乎姑請就南岡而與之論學夫天地之道誠焉而已耳聖人之學誠焉而已耳誠故不息故久故徴故悠逺故博厚是故天惟誠也故常清地惟誠也故常寧日月惟誠也故常眀今夫南岡亦拳石之積耳而其廣大悠久至與天地而無疆焉非誠而能若是乎故觀夫南岡之厓石則誠厓石爾矣觀夫南岡之溪谷則誠溪谷爾矣觀夫南岡之峰巒巖壑則誠峰巒巖壑爾矣是皆實理之誠然而非有所虚假文飾以偽為扵其間是故草木生焉禽獸居焉寳藏興焉四時之推􅴠寒暑晦眀煙嵐霜雪之變態而南岡若無所與焉鳯皇鳴矣而南岡不自以爲瑞也乕豹藏焉而南岡不自以爲威也養生送死者資焉而南岡不自以爲徳雲霧興焉而見光怪而南岡不自以爲靈是何也誠之無所為也誠之不容巳也誠之不可揜也君子之學亦何以異扵是是故以事其親則誠孝爾矣以事其兄則誠弟爾矣以事其君則誠忠爾矣以交其友則誠信爾矣是故藴之為徳行矣措之為事業矣發之為文章矣是故言而民莫不信矣行而民莫不悦矣動而民莫不化矣是何也一誠之所發而非可以聲音笑貌幸而致之也故曰誠者天之道也思誠者人之道也應周之有取扵南岡而将以求其實者殆亦無出扵斯道也矣果若是則知應周豈非思誠之功歟夫思誠之功精矣微矣應周盖嘗從事扵斯乎異時来過稽山之麓尚能為我一言其詳悔齋說癸酉悔者善之端也誠之復也君子悔以遷扵善小人悔以不敢肆其惡惟聖人而後能無悔無不善也無不誠也然君子之過悔而弗改焉又從而文焉過将日入扵惡小人之惡悔而益深巧焉益憤譎焉則惡極而不可解矣故悔者善惡之分也誠偽之關也吉凶之機也君子不可以頻悔小人則幸其悔而或不甚焉耳吾友崔伯欒氏以悔名其齋非曰吾将悔而巳矣将以求無悔者也故吾爲之說如是題湯大行殿試䇿問下壬戌士之登名禮部而進于天子之廷者天子臨軒而問之則錫之以制皆得受而歸藏之扵廟以輝榮其遭際之盛盖今世士人皆爾也丹陽湯君某登弘治進士方爲行人以其嘗所受之制屬某䟦數語扵其下嗟夫眀試以言自虞廷而然乃言底可績則三代之下吾見亦罕矣君之始進也天子之所以咨之者何如耶而君之所以對之者何如耶夫矯言以求進君之所不爲也巳進而遂忘其言焉又君之所不忍也君扵是乎朝夕焉顧諟聖天子之眀命其将曰是天子之所以咨詢我者也始吾旣如是其對揚之矣而今之所以持其身以事吾君者其亦果如是耶抑其亦未踐耶夫伊尹之所以告成湯者數言而終身踐之太公之所以告武王者數言而終身踐之推其心也君其志扵伊吕之事乎夫輝榮其一時之遭際以誇世君所不屑矣不然則是制也者君之所以鑑也昔人有惡形而惡鑑者遇之則揜袂却走君将揜袂却走之不暇而又烏揭之焉日以示人其志扵伊吕之事奚疑㢤君其勉矣上帝臨汝母貳爾心某亦常繆承眀問雖其所以對揚與其所以爲志者不可以望君然亦何敢忘自朂示徐曰仁應試丁卯君子窮逹一聽扵天但旣業舉于便須入塲亦人事宜爾若期在必得以自窘辱則大惑矣入塲之日切勿以得失横在胸中令人氣餒志分非徒無益而又害之塲中作文先湏大開心目見得題意大槩了了即放膽下筆縦昧出處詞氣亦條暢今人入塲有志氣局促不舒展者是得失之念爲之病也夫心無二用一念在得一念在失一念在文字是三用矣所事寧有成耶只此便是執事不敬便是人事有未盡處雖或幸成君子有所不貴也将進塲十日前便須練習調養盖尋常不曾起早得慣忽然當之其日必精神恍惚作文豈有佳思須每日鷄初鳴即起盥櫛整衣端坐抖藪精神勿使昏惰日日習之臨期不自覺辛苦矣今之調養者多是厚食濃味劇酣謔浪或竟日偃臥如此是撓氣昏神長傲而召疾也豈攝養精神之謂㢤務須絶飲食薄滋味則氣自清寡思慮屏嗜欲則精自明㝎心氣少眠睡則神自澄君子未有不如此而能致力扵學問者兹特以科塲一事而言之耳每日或倦甚思休少偃即起勿使昏睡旣晚即睡勿使久坐進塲前兩日即不得翻閱書史雜亂心目每日止可㸔文字一篇以自娛若心勞氣耗莫如勿㸔務在怡神適趣忽充然滚滚若有所得勿便氣輕意滿益加含蓄醖釀若江河之浸泓衍泛濫驟然決之一瀉千里矣每日閑坐時衆方囂然我獨淵黙中心融融自有眞樂盖出乎塵垢之外而與造物者㳺非吾子槩嘗聞之宜未足以與此也龍塲生問荅戊辰龍塲生問扵陽眀子曰夫子之言扵朝侣也愛不忘乎君也今者譴扵是而汲汲扵求去殆有所渝乎陽眀子曰吾今則有間矣今吾又病是以欲去也龍塲生曰夫子之以病也則吾旣聞命矣敢問其所以有間何謂也昔為其貴而今為其賤昔處扵内而今處扵外歟夫乗田委吏孔子嘗為之矣陽眀子曰非是之謂也君子之仕也以行道不以道而仕者竊也今吾不得爲行道矣雖古之有祿仕未嘗奸其職也曰牛羊茁壮會計當也今吾不無愧焉夫祿仕爲貧也而吾有先世之田力耕足以供朝夕子且以吾爲道乎以吾爲貧乎龍塲生曰夫子之来也譴也非仕也子扵父母惟命之從臣之扵君同也不曰事之如一而可以拂之無乃爲不恭乎陽眀子曰吾之来也譴也非仕也吾之譴也乃仕也非役也役者以力仕者以道力可屈也道不可屈也吾萬里而至以承譴也然猶有職守焉不得其職而去非以譴也君猶父母事之如一固也不曰就養有方乎惟命之從而不以道是妾婦之順非所以爲恭也龍塲生曰聖人不敢忘天下賢者而皆去君誰與爲國矣曰賢者則忘天下乎夫出溺扵波濤者沒人之䏻也陸者冐焉而胥溺矣吾懼扵胥溺也龍塲生曰吾聞賢者之有益扵人也惟所用無擇扵小大焉若是亦有所不利歟曰賢者之用扵世也行其義而已義無不宜無不利也不得其宜雖有廣業君子不謂之利也且吾聞之人各有能有不能惟聖人而後無不能也吾猶未得為賢也而子責我以聖人之事固非其擬矣曰夫子不屑扵用也夫子而苟屑扵用蘭蕙榮扵堂階而芬馨被扵几席萑葦之刈可以覆垣草木之微則亦有然者而况賢者乎陽眀子曰蘭蕙榮扵堂階也而後芬馨被扵几席萑葦也而後可刈以覆垣今子将刈蘭蕙而責之以覆垣之用子為愛之耶抑為害之耶論元年春王正月戊辰聖人之言眀白簡實而學者每求之扵艱深隱奥是以為論愈詳而其意益晦春秋書元年春王正月盖仲尼作經始筆也以予觀之亦何有扵可疑而世儒之為說者或以為周雖建子而不改月或以為周改月而不改時其最為有㨿而為世所宗者則以夫子嘗欲行夏之時此以夏時冠周月盖見諸行事之實也紛紛之論至不可勝舉遂使聖人眀易簡實之訓反為千古不決之疑嗟夫聖人亦人耳豈獨其言之有逺扵人情乎㢤而儒者以為是聖人之言而必求之扵不可窺測之地則巳過矣夫聖人之示人無隱若日月之垂象扵天非有變怪恍惚有目者之所覩而及其至也巧曆有所不能計精扵理者有弗能盡知也如是而巳矣若世儒之論是後世任情用智拂理亂常者之爲而謂聖人為之耶夫子嘗曰吾從周又曰非天子不議禮不制度生乎今之世反古之道災及其身者也仲尼有聖徳無其位而改周之正朔是議禮制度自巳出矣其得為從周乎聖人一言世為天下法而身自違之其何以訓天下夫子患天下之夷狄横諸侯強背不復知有天王也扵是乎作春秋以誅僣亂尊周室正一王之大法而已乃首改周之正朔其何以服亂臣賊子之心春秋之法變舊章者必誅若宣公之稅畆紊王制者必誅若鄭荘之歸祊無王命者必誅若莒人之入向是三者之有罪固猶未至扵變易天王正朔之甚也使魯宣鄭荘之徒舉是以詰夫子則将何辭以對是攘鄰之雞而惡其為盗責人之不弟而自毆其兄也豈春秋忠恕先自治而後治人之意乎今必泥扵行夏之時之一言而曲為之說以為是固見諸行事之驗又引孟子春秋天子之事罪我者其惟春秋之言而證之夫謂春秋為天子之事者謂其時天王之法不行扵天下而夫子作是以眀之耳其賞人之功罰人之罪誅人之惡與人之善盖亦據事直書而褒貶自見若士師之㫁獄辭具而獄成然夫子猶自嫌扵侵史之職眀天子之權而謂天下後世且将以是而罪我固未嘗取無罪之人而論㫁之曰吾以眀法扵天下取時王之制而更易之曰吾以垂訓扵後人法未及眀訓未及乘而巳自䧟扵殺人比扵亂逆之黨矣此在中世之士稍知忌憚者所不為而謂聖人而為此亦見其隂黨扵亂逆誣聖言而助之攻也巳或曰子言之則然耳為是說者以伊訓之書元祀十有二月而證周之不改月以史記之稱元年冬十月而證周之不改時是亦未爲無㩀也子之謂周之改月與時也獨何㩀乎曰吾㩀春秋之文也夫商而改月則伊訓必不書曰元紀十有二月秦而改時則史記必不書曰元年冬十月周不改月與時也則春秋亦必不書曰春王正月春秋而書曰春王正月則其改月與時巳何疑焉况禮記稱正月七月日至而前漢律曆至武王伐紂之嵗周正月辛卯朔合辰在斗前一度戊午師度孟津眀日巳未冬至考之太誓十有三年春武成一月壬辰之說皆足以相為發眀證周之改月與時而予意直㩀夫子春秋之筆有不必更援是以為之證者今舍夫子眀白無疑之直筆而必欲傍引曲㩀證之扵穿鑿可疑之地而後巳是惑之甚也曰如子之言則冬可以為春乎曰何為而不可陽生扵子而極扵巳午隂生扵午而極扵亥子陽生而春始盡扵寅而猶夏之春也隂生而秋始盡扵申而猶夏之秋也自一陽之復以極扵六陽之乾而為春夏自一隂之姤以極扵六隂之坤而爲秋冬此文王之所演而周公之所係武王周公其論之審矣若夫仲尼夏時之論則以其關扵人事者比之建子為尤切而非謂其為不可也啓之征有扈曰怠棄三正則三正之用在夏而巳然非始扵周而後有矣曰夏時冠周月此安㝎之論而程子亦嘗云爾曾謂程子之賢而不及是也何㢤曰非謂其知之不及也程子盖泥扵論語行夏之時之言求其說而不得從而為之辭盖推求聖言之過耳夫論語者夫子議道之書而春秋者魯國紀事之史議道自夫子則不可以不盡紀事在魯國則不可以不實道並行而不相悖者也且周雖建子而不改時與月則固夏時矣而夫子又何以行夏之時云乎程子之云盖亦推求聖言之過耳庸何傷夫子嘗曰君子不以人廢言使程子而猶在也其殆不廢予言矣書東齋風雨卷後癸酉悲喜憂快之形扵前初亦何嘗之有㢤向之以為愁苦凄鬱之鄊而今以為樂事者有矣向之歌舞歡愉之地今過之而歎息咨嗟泫然而泣下者有矣二者之相尋扵無窮亦何以異扵不䏻崇朝之風雨而顧執而留之扵胸中無乃非逹者之心歟吾觀東齋風雨之作固亦寫其一時之所感遇風止雨息而感遇之懐亦不知其所如矣而猶諷咏嗟嘆扵十年之後得非類扵夢為僕役覺而涕泣者歟夫其隱几扵蓬窓之下聽芹波之春響而咏夜簷之寒聲自今言之但覺其有幽閒自得之趣殊不見其有所苦也借使東齋主人得時居顯要一旦失勢退䖏寂寞其感念疇昔之懐當與今日何如㢤然則錄而追味之無亦將有洒然而樂廓然而忘言者矣而和者以為眞有所苦而類為垂楚不任之辭是又不可與言夢者而扵東齋主人之意失之逺矣竹江劉氏族譜䟦甲戌劉氏之盛散扵天下其在安成者出長沙定王發今昔所傳有自来矣竹江之譜斷自竹溪翁而下不及扵㝎王見素子曰大夫不敢祖諸侯禮也夫大夫之不祖諸侯也盖言祭也若其支系之所自則魯三桓之屬是實不可得而翦孔子曰吾猶及史之闕文也盖孔子之時史之闕疑者旣鮮矣竹江之不及定王闕疑也可以為譜法也巳王道不明人偽滋而風俗壞上下相罔以詐人無實行家無信譜天下無信史三代以降吾觀其史若江河之波濤焉聊以知其起伏之槩而巳爾士夫不務誠身立徳而徒誇詡其先世以為重冐昧攀緣適以絶其類亂其宗不知桀紂幽厲之出扵禹湯文武而顔閔曾孟之先未始有顯者也若竹江之譜其可以為世法也㢤孔子曰斯民也三代之所以直道而行充是心雖以復三代之淳可也且竹溪翁之後其聞扵世者厯厯爾至其十一祖敬齋公而遂以淸節大顯扵當代錄名臣者以首廉吏敬齋之孫南峯公又以清節文學顯徳業聲光方為天下所屬望竹江之後祖敬齋而宗南峰焉亦不一足矣况其世賢之多也而又奚必長沙之為重也大書察院行臺壁丁丑正徳丁丑三月奉命征漳㓂駐車上杭旱甚禱扵行臺雨日夜民以為未足四月戊午㓂平旋師是日大雨明日又雨又明日復雨登城南之樓以觀農事遂謁晦翁祠扵水南覽七星之勝槩夕歸志其事扵察院行臺諭俗四條丁丑為善之人非獨其宗族親戚愛之朋友鄉黨敬之雖鬼神亦隂相之為惡之人非獨其宗族親戚惡之朋友鄉黨怨之雖鬼神亦隂殛之故積善之家必有餘慶積不善之家必有餘殃見人之為善我必愛之我能為善人豈有不愛我者乎見人之為不善我必惡之我苟為不善人豈有不惡我者乎故凶人之為不善至扵隕身亡家而不悟者由其不䏻自反也今人不忍一言之忿或争銖兩之利遂相搆訟夫我欲求勝扵彼則彼亦欲求勝扵我讐讐相報遂至破家蕩産禍貽子孫豈若含忍退讓使鄉里稱為善人長者子孫亦䝉其庇乎今人為子孫計或至謀人之業奪人之産日夜營營無所不至昔人謂為子孫作馬牛然身沒未寒而業巳屬之他人讐家羣起而報復子孫反受其殃是殆為子孫作蛇蝎也吁可戒㢤題遥祝圖戊寅薛母太孺人曾方就其長子俊養于玉山仲子侃旣舉進士告歸来省孺人曰吾安而兄養子出而仕侃曰吾斯之未能信曰然則盍往學扵是擕其弟僑姪宗鎧来就予于䖍其室在掲陽别且數年未遑歸視踰年五月望日為孺人初誕之晨以命不敢往遥拜而祝其友正之廷仁崇一軰相與語曰薛母之敎其子可謂賢矣薛子之養其親可謂孝矣吾儕與薛子同學因各勵其所以事親之孝可謂益矣而不獲登其堂申其敬乃命工繪遥祝之圖寓諸玉山以致稱觴之意請扵予予為題其事書諸陽伯卷戊寅諸陽伯偁從予而問學將别請言予曰相與數月而未嘗有所論别而後言也不旣晚乎曰數月而未敢有所問知夫子之無隱扵我而冀或有所得也别而後請言已自知其無所得而慮夫子之或隱扵我也予曰吾何所隱㢤道若日星然子惟不用目力焉耳無弗覩者也子又何求乎道在邇而求諸逺事在易而求諸難天下之通患也子歸而立子之志竭子之目力若是而有所弗覩則吾為隱扵子矣書陳世傑卷庚辰堯允恭克讓舜温恭允塞禹不自滿假文王微柔懿恭小心翼翼望道而未之見孔子温良恭儉讓盖自古聖賢未有不篤扵謙恭者向見世傑以足恭為可恥故遂入扵簡抗自是簡抗自是則傲矣傲凶徳也不可長足恭也者有所為而為之者也無所為而為之者謂之謙謙徳之柄温温恭人惟徳之基堂堂乎張也難與並為仁矣仲尼贊易之謙曰謙尊而光卑而不可踰君子之終也故地不謙不足以載萬物天不謙不足以覆萬物人不謙不足以受天下之益昔者顔子以䏻問扵不能有而若無盖得夫謙道也愼獨致知之說旣嘗反覆扵世傑則百凡私意之萌自當退聽矣復嚽嚽扵是盖就世傑氣質之所急者言之躬自厚而薄責扵人則逺怨見賢思齊見不賢而内自省則徳修母謂巳爲已知而輒以誨人母謂人爲不知而輒以忽人終日但見巳過黙而識之學而不厭則扵道也其庻矣乎諭泰和楊茂其人聾瘂自候門求見先生以字問茂以字荅你口不䏻言是非你耳不能聽是非你心還能知是非否答曰知是非如此你口雖不如人你耳雖不如人你心還與人一般茂時首肯拱謝大凡人只是此心此心若䏻存天理是箇聖賢的心口雖不䏻言耳雖不䏻聽也是箇不䏻言不能聽的聖賢心若不存天理是箇禽獸的心口雖能言耳雖䏻聽也只是箇䏻言能聽的禽獸茂時扣胸指天你如今扵父母但盡你心的孝扵兄長但盡你心的敬扵鄉黨鄰里宗族親戚但盡你心的謙和恭順見人怠慢不要嗔怪見人財利不要貪圖但在裏面行你那是的心莫行你那非的心縦使外面人說你是也不湏聽說你不是也不湏聽茂時首肯拜謝你口不䏻言是非省了多少閑是非你耳不能聽是非省了多少閑是非凡說是非便生是非生煩惱聽是非便添是非添煩惱你口不能說你耳不能聽省了多少閑是非省了多少閑煩惱你比别人到快活自在了許多茂時扣胷指天躃地我如今敎你但終日行你的心不消口裏說但終日聽你的心不消耳裏聽茂時頓首再拜而巳書欒惠卷庚辰欒子仁訪子扵䖍舟遇扵新淦嗟乎子仁久别之懷兹亦不足為慰乎顧兹簿領紛沓之地雖固道無不在然非所以從容下上其議時也子仁歸矣乞骸之䟽已數上行且得報子仁其候我扵桐江之滸將與子盤桓扵雲門若耶間有日也聞子仁之居鄉嘗以鄉約善其族黨固亦仁者及物之心然非子仁所汲汲孔子云言忠信行篤敬雖蠻貊之邦行矣然惟立則見其參扵前在輿則見其倚扵衡也而後行子仁其務立參前倚衡之誠乎至誠而不動者未之有也不誠未有能動者也聊以是爲子仁别去之贈書佛郎機遺事庚戌見素林公聞寧濠之變即夜使人範錫爲佛郎機銃并抄火藥方手書勉予竭忠討賊時六月毒暑人多道暍死公遣兩僕裹糧從間道冐暑晝夜行三千餘里以遺予至則濠巳就擒七日予發書爲之感激涕下盖濠之擒以七月二十六距其始事六月十四僅月有十九日耳世之君子當其任能不畏難巧避者鮮矣况已致其事而能急國患踰其家如公者乎盖公之忠誠根扵天性故老而彌篤身退而憂愈深節愈勵嗚呼是豈可以聲音笑貌爲㢤嘗欲列其事于朝顧非公之心也爲作佛郎機私詠君子之同聲者將不能已扵言耳矣佛郎機誰所爲截取比干腸褁以鴟夷皮萇弘之血釁不足睢陽之怒恨有遺老臣忠憤寄所洩震驚百里賊膽披徒請尚方劍空聞魯陽揮段公笏板不在兹佛郎機誰所爲正徳戊寅之冬福建按察僉事周期雍以公事抵贛時逆濠奸謀日稔逺近洶洶予思預爲之備而濠黨伺覘左右揺手動足朝聞暮逹以期雍官異省當非濠所計及因屏左右語之故遂與定議期雍歸即隂募驍勇具械束裝部勒以俟予檄晨到而期雍夕發故當濠之變外援之兵惟期雍先至適當見素公書至之日距濠始事亦僅月有十九日耳初予嘗使門人冀元亨者因講學說濠以君臣大義或格其奸豪不懌巳而滋怒遣人隂購害之冀辭予曰濠必反先生宜早計遂遁歸至是聞變知予必起兵即日濳行赴難亦適以是日至見素公在莆陽周官上杭冀在常徳去南昌各三千餘里乃皆同日而至事若有不偶然者輒附錄扵此聊以識予之耿耿云題夀外母蟠桃圖庚辰某之妻之母諸太夫人張今年夀八十十二月二十有二日其設帨辰也某縻扵官守不能歸捧一觴扵堂下幕下之士有郭詡者因爲作王母蟠桃之圖以獻夫王母蟠桃之說雖出扵僊經異典未必其事之有無然今世之人多以之祝願其所親愛固亦古人岡陵松栢之意也吾從衆可乎遂用之以寄遥祝之私而詩以歌之云維彼蟠桃千嵗一華夫人之夀兹維始葩維彼蟠桃千歲一實夫人之壽益堅孔碩維華維實厥根彌植維夫人孫子亦昌衍靡極書徐汝佩卷癸未壬午之冬汝佩别予北上赴南宫試已而門下士有自京来者告予以汝佩因南宫䇿問若隂詆夫子之學者不對而出遂浩然東歸行且至矣予聞之黯然不樂者久之士曰汝佩斯舉有志之士莫不欽仰歆服以爲自尹彦明之後至今而始再見者也夫人離去其骨肉之愛齎糧束装走數千里以赴三日之試將竭精弊力惟有司之好是投以蘄一日之得希終身之榮斯人人之同情也而汝佩扵此獨能不爲其所不爲不欲其所不欲斯非其有見得思義見危授命之勇其孰能聲音笑貌而為此乎是心也固富貴不能滛貧賤不能移威武不能屈者矣將夫子聞之躍然而喜顯然而嘉與之也而顧黯然而不樂也何居乎予曰非是之謂也士曰然則汝佩之爲是舉也尚亦有未至歟豈以汝佩骨肉之養且旦暮所不給無亦隨時順應以少蘇其貧困也乎若是則汝佩之志荒矣予曰非是之謂也士曰然則何居乎予黙然不應士不得問而退他日汝佩旣歸士往問扵汝佩曰向吾以子之事問扵夫子矣夫子黯然而不樂予云云而夫子云云也子以爲奚居汝佩曰始吾見發䇿者之隂詆吾夫子之學也盖怫然而怒憤然而不平以爲吾夫子之學則若是其簡易廣大也吾夫子之言則若是其眞切著明也吾夫子之心則若是其仁恕公普也夫子憫人心之䧟溺若已之墮扵淵壑也冐天下之非笑詆詈而日諄諄焉亦豈何求扵世乎而世之人曾不覺其爲心而相嫉􅎱詆毀之若是若是而吾尚可與之並立乎巳矣吾將從夫子而長往扵深山窮谷耳不與之相聞而目不與之相見斯已矣故遂浩然而歸歸途無所事事始復專心致志沉潛扵吾夫子致知之訓心平氣和而良知自發然後黯然而不樂曰嘻吁乎吾過矣士曰然則子之爲是也果尚有所不可歟汝佩曰非是之謂也吾之爲是也亦未不可而所以爲是者則有所不可也吾語子始吾未見夫子也則聞夫子之學而亦嘗非笑之矣詆毁之矣及見夫子親聞良知之誨恍然而大窹醒油然而生意融始自痛悔切責吾不及夫子之門則㡬死矣今雖知之甚深而未能實諸巳也信之甚篤而未能孚諸人也則猶未免扵身謗者也而遽爾責人若是之峻且彼盖未嘗親承吾夫子之訓也使得親承焉又焉知今之非笑詆毁者異日不如我之痛悔切責乎不如我之深知而篤信乎何忘巳之困而責人之速也夫子冐天下之非笑詆毁而日諄諄然惟恐人之不入扵善而我則反之其間不䏻以寸矣夫子之黯然而不樂也盖所以愛珊之至而憂珊之深也雖然夫子之心則又廣矣大矣微矣㡬矣不覩不聞之中吾豈䏻盡以語子也汝佩見備以其所以告扵士者爲問予頷之而弗答默然者乆之汝佩悚然若有省也明日以此卷入請曰昨承夫子不言之敎珊傾耳而聽若震驚百里粗心浮氣一時俱䘮矣請遂書之題夢槎奇遊詩卷乙酉君子之學求盡吾心焉爾故其事親也求盡吾心之孝而非以爲孝也事君也求盡吾心之忠而非以爲忠也是故夙興夜寐非以爲勤也剸繁理劇非以爲䏻也嫉邪袪蠧非以爲剛也規切諌諍非以爲直也臨難死義非以爲節也吾心有不盡焉是謂自欺其心心盡而後吾之心始自以爲快也惟夫求以自快吾心故凡富貴貧賤憂戚患難之来莫非吾所以致知求快之地苟富貴貧賤憂戚患難而莫非吾致知求快之地則亦寧有所謂富貴貧賤憂戚患難者足以動其中㢤世之人徒知君子之扵富貴貧賤憂戚患難無入而不自得也而皆以爲獨䏻人之所不可及不知君子之求以自快其心而巳矣林君汝桓之名吾聞之盖久然皆以爲聰明特逹者也文章氣節者也今年夏聞君以直言被謪果信其爲文章氣節者矣又踰月君取道錢塘則以書来道其相愛念之厚病不能一往爲恨且惓惓以聞道爲急問學爲事嗚呼君盖知學者也志扵道徳者也寧可專以文章氣節稱之巳而郡守南君元善示予以夢槎竒遊卷盖京師士友贈之南行者予讀之終篇嘆曰君知學者也志扵道徳者也則將以求自快其心者也則其奔走扵郡縣之末也猶其従容扵部署之間也則將地官郎之議國事未嘗以爲抗而徐聞丞之親民務未嘗以爲瑣也則夢槎未嘗以爲異而南遊未嘗以爲奇也君子樂道人之善則張大而從䛕之是固贈行者之心乎予亦以病不及與君一面感君好學之篤因論君子之所以爲學者以爲君贈爲善最樂文丁亥君子樂得其道小人樂得其欲然小人之得其欲也吾亦但見其苦而巳耳五色令人目盲五聲令人耳聾五味令人口爽馳騁田獵令人心發狂營營戚戚憂患終身心勞而日拙欲縦惡積以亡其生烏在其爲樂也乎若夫君子之爲善則仰不愧俯不怍明無人非幽無鬼責優優蕩蕩心逸日休宗族稱其孝鄉黨稱其弟言而人莫不信行而人莫不恱所謂無入而不自得也亦何樂如之妻弟諸用明積徳勵善有可用之才而不求仕人曰子獨不樂仕乎用明曰爲善最樂也因以四字扁其退居之軒率二子階陽日與鄕之俊彦讀書講學扵其中巳而二子學日有成登賢薦秀鄕人嘖嘖皆曰此亦爲善最樂之效矣用明笑曰爲善之樂大行不加窮居不損豈顧扵得失榮辱之間而論之聞者心服僕夫治圃得一鏡以獻扵用明刮土而視之背亦適有爲善最樂四字坐客嘆異皆曰此用明爲善之符誠若亦不偶然者也相與詠其事而来請扵予以書之用以訓其子孫遂以朂夫鄊之後進客坐私祝丁亥但願温恭直諒之友来此講學論道示以孝友謙和之行徳業相勸過失相規以教訓我子弟使毋䧟扵非僻不願狂懆惰慢之徒来此博奕飲酒長傲飾非導以驕奢淫蕩之事誘以貪財黷貨之謀㝠頑無恥扇惑鼓動以益我子弟之不肖嗚呼由前之說是謂良士由後之說是謂凶人我子弟苟逺良士而近凶人是謂逆子戒之戒之嘉靖丁亥八月將有兩廣之行書此以戒我子弟并以告夫士友之辱臨扵斯者請一覽教之王文成公全書卷之二十四終
