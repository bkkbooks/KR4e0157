  text: 王文成公全書卷之三十三
  hash: sha256:7edf8b7d7f48d50b253f588dcfa85a0fce626d56bbb337b68496d51aaedc3dba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_022-1a}
body:
  text: 附録二年譜二十有四年巳卯先生四十八歲在江西正月疏謝升廕以三浰九連功廕子錦衣衛世襲副千戶上疏辭免謂廕子實非常典私心終有未安疾病已纒圖報無日疏入不允疏乞致仕不允以祖母疾亟故也上書王晉溪瓊曰郴衡諸處群孽漏殄尚多蓋緣進勦之時彼省土兵不甚用命廣兵防夾稍遲是以致此閩中之變亦由積漸所致始于延平繼于邵武又發于建寧于汀漳于沿海諸衛所將來之禍不可勝言固非迂劣如某所能辦此也又况近日祖母病危日夜痛苦方寸已亂望改授使全首領以歸六月奉敕勘處福建叛軍十五日丙子至豐城聞宸濠反遂返吉安起義兵時福州三衛軍人進貴等脅衆謀叛奉敕往勘以六月𥘉九日啓行十五日午至豐城知縣顧佖迎告濠反先生遂返舟先是寧藩世蓄異志至濠姦惡尤甚正德𥘉與瑾納結嘗風南昌諸生呈舉孝行撫按諸司表奏以張聲譽安成舉人劉養正素有詩文名屈致鼓衆株連富民朘剝財産縱大賊閔念四凌十一等四出劫掠以佐妄費按察使陸完因濠器重遂相傾附及為本兵首復護衛樹羽翼而濠欲隂入第二子為武宗後其內官閻順等潛至京師發奏朝廷置不問且謫順等孝陵淨軍濠益無忌完改吏部王瓊代為本兵度濠必反乃申軍律督責撫臣修武備以待不虞而諸路戒嚴捕盜甚急凌十一繫獄劫逃瓊責期必獲濠始恐復風諸生頌巳賢孝挾當道奏之武宗見奏驚曰保官好升保寧王賢孝欲何為耶是時江彬方寵幸太監張忠欲附彬以傾錢寧聞是言乃密應曰錢寧臧賢交通寧王其意未可測也太監張鋭𥘉通濠復用南昌人張儀言附忠彬自固而御史熊蘭居南昌素讐濠少師楊廷和亦欲革護衛免患交為內主上乃令太監韋霦傳旨故事王府奏事人辭見有常今稽違非制於是試御史蕭淮上疏曰近奉勑旨王人無事不得延留京師臣有以仰窺陛下微意矣臣不忍隱默竊見寧王不遵祖訓包藏禍心多殺無辜橫奪民産虐害忠良招納亡命私造兵器潛謀不軌交通官校有年如致仕侍郎李仕實前鎮守太監畢真及諸前後附勢者皆今日亂臣賊子關係宗社安危非細故也或逮繫至京或坐名罷削布政使鄭嶽副使胡世寧皆守正蒙害宜亟起用庶幾人知順逆禍變可彌矣疏入忠彬等贊之欲內閣降敕責鎮巡而給事中徐之鸞御史沈約等又具奏其不法廷和恐禍及欲濠上護衛自贖同官外廷不知也一日駙馬都尉崔元遣問瓊曰適聞宣召明早赴闕何事瓊問廷和廷和佯驚曰何事瓊微笑曰公勿欺我廷和忸怩徐曰宣德中有疑于趙嘗命駙馬袁泰往諭竟得釋或此意也明旦瓊至左順門見元領敕謂曰此大事何不廷宣乃留當廷領之勑有曰蕭淮所言關係宗社大計朕念親親不忍加兵特遣太監賴義駙馬都尉崔元都御史顔頥夀往諭革其護衛元領敕既行廷和復令兵部發兵觀變瓊曰此不可泄近給事中孫懋易讃建議選兵操江為江西流賊設備疏入留中日久第請如擬行之備兵之方無出此矣廷和默然會濠偵卒林華者聞朝議二三不得實晝夜奔告值濠生辰宴諸司聞言大驚以為詔使此來必用昔日蔡震擒荆藩故事且舊制凡抄解宫眷始遣駙馬親臣固不記趙王事也宴罷密召士實劉吉等謀之飬正曰事急矣明旦諸司入謝即可行事是夜集兵以俟比旦諸司入謝濠出立露臺宣言于衆曰汝等知大義否都御史孫燧對曰不知濠曰太后有密旨令我起兵監國汝保駕否燧曰天無二日民無二王此是大義不知其他濠怒令縳之按察司副使許逵從下大呼曰朝廷所遣大臣反賊敢擅殺耶罵不絶口校尉火信曵出惠民門外同遇害是時日午天忽隂曀遂劫鎮巡諸司下獄奪其印于是太監王宏御史王金公差主事馬思聰金山布政使胡濂參政陳杲劉斐參議許效亷黃宏僉事顧鳳都指揮許清白昻皆在繫思聰宏不食死濠乃偽置官屬以吉暨余欽萬鋭等為太監迎士實為太師先期迎養正南浦驛為國師閔念四等各為都指揮參政王倫為兵部尚書季斆暨僉事潘鵬師夔輩俱聽役脅布政使梁宸按察使楊璋副使唐錦都指揮馬驥移咨府部傳檄逺近革年號斥乘輿分遣所親婁伯王春等四出收兵始濠聞武宗嬖伶官臧賢乃遣秦榮就學音樂餽萬金及金絲寶壺一日武宗幸賢賢以壺注酒訝其精澤巧麗曰何從得此賢吐實武宗曰寧叔何不獻我是時小劉新得幸濠失賄深銜之比罷歸小劉笑曰爺爺尚思寧王物寧王不思爺爺物足矣不記薦疏乎武宗乃益疑忠彬因贊蕭疏遂及賢賢不知也濠遣人留賢家多復璧外鑰木橱開則長巷後通屋甚隱人無覺者有旨大索賢家林華遽走會同館得馬故速歸𥘉寧獻王臞仙傳惠靖康三王康王久無子宫人南昌馮氏以成化丁酉生濠康王夢蛇入宫啖人殆盡心惡之𣣔弗舉以內人爭免遂匿優人家與秦濚同寢處稍長淫宫中康王憂憤且死不令入訣弘治丙辰襲位通書史歌詞至是謀逆期以八月十五日因入試官吏生校舉事比林華至始促反十九日疏上變濠既戕害守臣因劫諸司據會城乃悉拘護衛集亡命括丁壯號兵十萬奪運船順下戊寅襲南康知府陳霖等遁已卯襲九江兵備曹雷知府汪頴指揮劉勳等遁屬縣聞風皆潰濠𥘉謀𣣔徑襲南京遂犯北京故乘勝剋期東下先生聞變返舟值南風急舟弗能前乃焚香拜泣告天曰天若哀憫生靈許我匡扶社稷願即反風若無意斯民守仁無生望矣須臾風漸止北帆盡起濠遣內官喻才領兵追急是夜乃與幕士蕭禹雷濟等潛入魚舟得脫然念兩京倉卒無備欲沮撓之使遲留旬月于是故為兩廣機密大牌備兵部咨及都御史顔咨云率領狼逹官兵四十八萬江西公幹令雷濟等飛報搖之濠見檄果疑懼遲延未發先生四晝夜至吉安明日庚辰上疏告變乃與知府伍文定等計傳檄四方暴發逆濠罪狀檄列郡起兵以勤王疏留復命巡按御史謝源伍希儒紀功張疑兵于豐城又故張接濟官軍公移備云兵部咨題準令許泰郤永分領邉軍四萬從鳳陽陸路進劉暉桂勇分領京邉官軍四萬從徐淮水陸並進王守仁領兵二萬楊旦等領兵八萬陳金等領兵陸萬分道並進尅期夾攻南昌且以原奉機密敕旨為據故令各兵徐行待其出城遮擊前後以誤之又為李士實劉養正內應偽書賊將凌十一閔念四投降密狀令濟光等親人計入于濠濠乃留兵會城以觀變至七月三日諜知非實乃屬宗支栱樤與萬鋭等留兵萬餘守南昌遣潘鵬持檄説安慶季斆説吉安而自與宗支栱栟士實養正等東下賊衆六萬人號十萬以劉吉為監軍王綸參贊軍務指揮葛江為偽都督總一百四十餘隊分五哨出鄱陽過九江令師夔守之直趨安慶時欽凌等攻圍雖已浹旬知府張文錦守備都指揮楊鋭指揮使崔文同守不下按是時巡撫南畿都御史李克嗣飛章告變瓊請會議左順門衆觀望猶不敢斥言濠反瓊獨曰竪子素行不義今倉卒舉亂殆不足慮都御史王守仁據上遊躡之成擒必矣乃從直房頃刻覆十三疏首請下詔削濠屬籍正賊名次請命將出師趨南都命伯方夀祥防江都御史俞諌率淮兵翊南都尚書王鴻儒主給餉次請命守仁率南贛兵由臨吉都御史秦金率湖兵由荆瑞會南昌充嗣鎮鎮江許廷光鎮浙江叢蘭鎮儀真遏賊衝傳檄江西諸路但有忠臣義士能倡義旅以擒反者封侯又請南京守備操江武職并五府掌印僉書官各自陳取上裁務在得人以固根本詔悉從之先生在吉安守益趨見曰聞濠誘葉芳兵夾攻吉安先生曰芳必不叛諸賊舊以茅為屋叛則焚之我過其巢許其伐巨木創屋萬餘今其黨各千餘不肯焚矣益曰彼從濠望封拜可以尋常計乎先生默然良久曰天下盡反我輩固當如此做益惕然一時胸中利害如洗次早復見曰昨夜思之濠若遣逮老父奈何已遣報之急避他所壬午再告變叛黨方盛恐中途有阻故再上疏乞便道省葬不久先生起兵未奉成命上便道省葬疏意示遭變暫留姑為牽制攻討俟命師之至即從𥘉心時奉旨著督兵討賊所奏省親事待賊平之日來説疏上偽檄六月二十二日參政季斆同南昌府學教授趙承芳旗校十二人齎偽檄榜諭吉安府至墨潭領哨官縳送軍門先生即固封以進其疏略曰陛下在位一十四年屢經變難民心騷動尚爾巡逰不已致使宗室謀動干戈冀竊大寶且今天下之覬覦豈特一寧王天下之姦雄豈特在宗室言念及此凛骨寒心昔漢武帝有輪臺之悔而天下向治唐德宗下奉天之詔而士民感泣伏望皇上痛自克責易轍改絃罷出姦諛以回天下豪傑之心絶迹巡逰以杜天下姦雄之望則太平尚有可圖群臣不勝幸甚甲辰義兵發吉安丙午大會于樟樹已酉誓師庚戍次市汊辛亥拔南昌先生聞濠兵既出乃促列郡兵尅期會于樟樹自督知府伍文定等及通判談儲推官王暐以十三日甲辰發吉安于是臨江知府戴德孺袁州知府徐璉贛州知府邢珣瑞州通判胡堯元童琦南安推官徐文英贛州都指揮余恩新淦知縣李美泰和知縣李楫寧都知縣王天與萬安知縣黃冕各以其兵來赴已酉誓師于樟樹次豐城諜知賊設伏于新舊厰以為省城之應乃遣奉新知縣劉守緒領兵從間道夜襲破之庚戍發市汊分布既定薄暮齊發辛亥黎明各至信地先是城中為備甚嚴及厰賊潰奔入城一城皆驚又見我師驟集益奪其氣衆乘之呼譟梯絙而登遂入城擒栱樤萬鋭等千有餘人所遺宫眷縱火自焚先生乃撫定居民分釋脅從封府庫收印信人心始寧于是胡濓劉裴許效亷唐錦賴鳳王玘等皆自投首𥘉會兵樟樹衆以安慶𬒳圍急宜引兵赴之先生曰今南康九江皆為賊據我兵若越二城直趨安慶賊必回軍死鬪是我腹背受敵也莫若先破南昌賊失內據勢必歸援如此則安慶之圍自解而賊成擒矣卒如計云遂促兵追濠甲寅始接戰乙卯戰于黃家渡丙辰戰于八字腦丁已獲濠樵舍江西平𥘉濠聞南昌告急即𣣔歸援遂解安慶圍移沅子港先分兵二萬趨南昌身旋繼之二十二日先生偵知其故問衆計安出多以賊勢強盛宜堅壁觀釁徐圖進止先生曰賊勢雖強未逄大敵惟以爵賞誘人今進不得逞退無所歸衆巳消沮若出竒擊惰不戰自潰所謂先人有奪人之氣也會撫州知府陳槐進賢知縣劉源清提兵亦至乃遣伍文定邢珣徐璉戴德孺各領兵五百分道並進擊其不意又遣余恩以兵四百往來湖上誘致之陳槐胡堯元童琦談儲王暐徐文英李美李揖王冕王軾劉守緒劉源清等各引兵百餘四面張疑設伏候文定等合擊之分布既定甲寅乘夜急進文定以正兵當賊鋒恩繼之珣繞出賊後璉德孺張兩翼以分其勢乙卯賊兵鼓譟乘風逼黃家渡氣驕甚文定恩佯北以致之賊爭趨利前後不相及珣從後橫擊直貰其中文定恩乘之夾以兩翼四面伏起賊大潰退保八字腦濠懼厚賞勇者且令盡發九江南康守城兵益之是日建昌知府曽璵兵亦至先生以為九江不破則湖無外援南康不復則我難後躡乃遣槐領兵四百合饒州知府林瑊兵攻九江以廣信知府周朝佐取南康丙辰賊復併力挑戰我兵少却文定立鋭炮間火燎其鬚殊死戰炮入濠副舟賊大敗擒斬二千餘溺死者無算乃聚樵舍連舟為方陳盡出金銀賞士先生乃密為火攻具使珣擊其左璉德孺出其右恩等設伏期火發以合丁巳濠方晨朝群臣責不用命者將引出斬之爭論未決我兵掩至火及濠副舟衆遂奔散妃嬪與濠泣别多赴水死濠為知縣王冕所執與其世子眷屬及偽黨士實養正劉吉余欽王綸熊瓊盧衍盧橫丁匱王春吳十三秦榮葛江劉勳何塘王行吳七火信等數百復執脅從官王宏王金楊璋金山王疇程杲潘鵬梁宸郟文馬驥白昻等擒斬三千落水二萬餘衣甲器械財物與浮尸橫十餘里餘賊數百艘逃潰乃分兵追剿戊午及于昌邑大破之至吳城復斬擒千餘死水中殆盡已未得槐等報各擒斬復千餘蓋自起兵至破賊曾不旬日紀功凡一萬一千有竒𥘉先生屢疏力疾赴閩值寧藩變臣子義不容舍又闔省方面並無一人事勢幾會間不容髮故復圖為牽制攻守以俟命師之至疏入未報即以捷聞洪嘗見龍光述張疑行間事甚悉嘗問曰事濟否先生曰未論濟與不濟且言疑與不疑光曰疑固不免曰但得渠一疑事濟矣後遇河圖為武林驛丞又言公𣣔稽留宸濠何時非間何事非間嘗問光曰曾會劉養正否光對曰熟識即使光行間移養正家屬城內善飲食之縳齎檄人欲斬濟躡足遂不問一日發牌票二百餘左右莫知所往臨省城先以順逆禍福之理諭官民聞鋭與瑞昌王助逆遣其心腹胡景隆招回各兵以離其黨人徒見成功之易而不知其伐謀之神也黃弘綱聞安吉居人疑曰王公之戈未知何向亟入告先生笑而不答出兵誓師斬失律者殉營中軍士股栗不敢仰視不知即前齎檄人也後賊平張許謗議百出天下是非益亂非先生自信于心烏能遽白哉先是先生思豫備會汀漳兵備僉事周期雍以公事抵贛知可與謀且官異省屏左右語之雍歸即隂募驍勇部勒以俟故晨奉檄而夕就道福建左布政使席書嶺東兵備僉事王大用亦以兵來道聞賊平乃還致仕都御史林俊聞變夜範錫為佛狼機銃并火藥法遣僕從間道來遺勉以討賊先生入城日坐都察院開中門令可見前後對士友論學不輒報至即登堂遣之有言伍焚髮狀暫如側席遣牌斬之還坐衆咸色怖驚問先生曰適聞對敵小却此兵家常事不足介意後聞濠已擒問故行賞訖還坐咸色喜驚問先生曰適聞寧王已擒想不偽但傷死者衆耳理前語如常傍觀者服其學濠就擒乘馬入望見逺近街衢行伍整肅笑曰此我家事何勞費心如此一見先生輒託曰婁妃賢妃也自始事至今苦諌未納適投水死望遣葬之比使往果得尸蓋周身皆𥿄繩內結極易辨婁為諒女有家學故處變能自全八月疏諌親征是時兵部會議命將討賊武宗詔曰不必命將朕當親率六師奉天征討于是假威武大將軍鎮國公行事命太監張永張忠安邉伯許泰都督劉暉率京邉官軍萬餘給事祝續御史張綸隨軍紀功雖捷音久上不發皆云元惡雖擒逆黨未盡不捕必遺後患先生具疏諌止略曰臣于告變之後選將集兵振威揚武先攻省城虛其巢穴繼戰鄱湖擊其惰歸今宸濠已擒謀黨已獲從賊已掃閩廣赴調軍士已散地方驚攪之民已帖竊惟宸濠擅作辟威睥睨神器隂謀久蓄招納叛亡輦轂之動靜探無遺迹廣置姦細臣下之奏白百不一通發謀之始逆料大駕必將親征先于沿途伏有姦黨期為博浪荆軻之謀今逆不旋踵遂已成摛法宜解赴闕門式昭天討然欲付之部下各官誠恐潛布之徒乘隙竊發或虞意外臣死有餘憾矣蓋時事方艱賊雖擒亂未已也是月疏免江西稅益王淮王餉軍留朝覲官恤重刑以實軍伍處置署印府縣從逆人參九江南康矢事便道省葬前後凡九上再乞便道省葬不允與王晉溪書曰始懇疏乞歸以祖母鞠育之恩思一面為訣後竟牽滯兵戈不及一見卒抱終天之痛今老父衰疾又復日亟而地方已幸無事何惜一舉手投足之勞而不以曲全之乎九月壬寅獻俘錢塘以病留九月十一日先生獻俘發南昌忠泰等𣣔追還之議將縱之鄱湖俟武宗親與遇戰而後奏凱論功連遣人追至廣信先生不聼乘夜過玉山草萍驛張永候于杭先生見永謂曰江西之民久遭濠毒今經大亂繼以旱災又供京邉軍餉困苦既極必逃聚山谷為亂昔助濠尚為脅從今為窮迫所激姦黨群起天下遂成土崩之勢至是興兵定亂不亦難乎永深然之乃徐曰吾之此出為群小在君側𣣔調護左右以默輔聖躬非為掩功來也但皇上順其意而行猶可挽回萬一若逆其意徒激群小之怒無救于天下大計矣于是先生信其無他以濠付之稱病西湖淨慈寺武宗嘗以威武大將軍牌遣錦衣千戶追取宸濠先生不肯出迎三司苦勸先生曰人子于父母亂命若可告語當涕泣以從忍從諛乎不得已令參隨負敕同迎以入有司問勞錦衣禮先生曰止可五金錦衣怒不納次日來辭先生執其手曰我在正德間下錦衣獄甚久未見輕財重義有如公者昨薄物出區區意只求備禮聞公不納令我惶愧我無他長止善作文字他日當為表章令錦衣知有公也于是復再拜以謝其人竟不能出他語而别奉敕兼巡撫江西十一月返江西先生稱病欲堅卧不出聞武宗南巡已至淮揚群姦在側人情洶洶不得已從京口將徑趨行在大學士楊一清固止之會奉旨兼巡撫江西遂從湖口還忠等方挾宸濠搜羅百出軍馬屯聚糜費不堪續綸等望風附會肆為飛語時論不平先生既還南昌北軍肆坐慢罵或故衝導起釁先生一不為動務待以禮豫令巡捕官諭市人移家于鄉而以老羸應門始欲犒賞北軍泰等預禁之令勿受乃傳示內外諭北軍離家苦楚居民當敦主客禮每出遇北軍喪必停車問故厚與之櫬嗟嘆乃去久之北軍咸服會冬至節近預令城市舉奠時新經濠亂哭亡酹酒者聲聞不絶北軍無不思家泣下求歸先生與忠等語不稍徇漸巳知畏忠泰自居所長與先生較射于教場中意先生必大屈先生勉應之三發三中每一中北軍在傍哄然舉手嘖嘖忠泰大懼曰我軍皆附王都耶遂班師十有五年庚辰先生四十九歲在江西正月赴召次蕪湖尋得旨返江西忠泰在南都讒先生必反惟張永持正保全之武宗問忠等曰以何驗反對曰召必不至有詔面見先生即行忠等恐語相違復拒之蕪湖半月不得已入九華山每日宴坐草菴中適武宗遣人覘之曰王守仁學道人也召之即至安得反乎乃有返江西之命始忠等屢矯偽命先生不赴至是永有幕士順天檢校錢秉直急遣報故得實先生赴召至上新河為諸幸讒阻不得見中夜默坐見水波拍岸泊泊有聲思曰以一身蒙謗死即死耳如老親何謂門人曰此時若有一孔可以竊父而逃吾亦終身長往不悔矣江彬欲不利于先生先生私計彬有他即計執彬武宗前數其圖危宗社罪以死相抵亦稍償天下之忿徐得永解其後刑部判彬有曰虎旅夜驚巳幸寢謀于牛首宫車宴駕那堪遺恨于豹房若代先生言之者以晦日重過開先寺留石刻讀書臺後詞曰正德已卯六月乙亥寧藩濠以南昌叛稱兵向闕破南康九江攻安慶逺近震動七月辛亥臣守仁以列郡之兵復南昌宸濠擒餘黨悉定當此時天子聞變赫怒親統六師臨討遂俘宸濠以歸于赫皇威神武不殺如霆之震靡擊而折神器有歸孰敢窺竊天鑒于宸濠式昭皇靈嘉靖我邦國正德庚辰正月晦提督軍務都御史王守仁書從征官屬列于左方明日逰白鹿洞徘徊久之多所題識二月如九江先生以車駕未還京心懷憂惶是月出觀兵九江因逰東林天池講經臺諸處是月還南昌三月請寬租江西自巳卯三月不雨至七月禾苗枯死繼遭濠亂小民乘隙為亂先生盡心安戢許乞優恤至是部使數至督促日迫先生上疏略曰日者流移之民聞官軍將去稍稍脅息延望歸尋故業足未入境而頸巳繫于追求者之手矣夫荒旱極矣而因之以變亂變亂極矣而又加之以師旅師旅極矣而又加之以供饋益之以誅求亟之以徴斂當是之時有目者不忍觀有耳者不忍聞又從而其膏血有人心者尚忍乎寬恤之虛文不若蠲租之實惠賑濟之難及不若免稅之易行今不免租稅不息誅求而徒曰寬恤賑濟是奪其口中之食而曰吾將療汝之飢刳其腹腎之肉而曰吾將救汝之死凡有血氣者皆將不信之矣按是年與巡按御史唐龍朱節上疏計處寧藩變産官銀代民上納民困稍蘇三疏省葬不允五月江西大水疏自劾是年四月江西大水漂溺公私廬舍田野崩陷先生上疏自劾四罪且曰自春入夏雨水連綿江湖漲溢經月不退自贛吉臨瑞廣撫南昌九江南康沿江諸路無不𬒳害黍苗淪沒室廬漂蕩魚鱉之民聚棲于木杪商旅之舟經行于閭巷潰城決堤千里為壑煙火斷絶惟聞哭聲詢之父老皆謂數十年所未有也伏惟皇上軫災恤變别選賢能代臣巡撫即不以臣為顯戮削其祿秩黜還田里以為人臣不職之戒庶亦有位知警民困可息天變可弭人怒可泄而臣亦死無憾矣按是時武宗猶羈南畿進諌無由姑敘地方災異以自劾冀君心開悟而加意黎元也六月如贛十四日從章口入玉笥大秀宫十五日宿雲儲十八日至吉安逰青原山和黃山谷詩遂書碑行至泰和少宰羅欽順以書問學先生答曰來教訓某大學古本之復以人之學但當求之于內而程朱格物之説不免求之于外遂去朱子之分章而削其所輔之傳非敢然也學豈有內外乎大學古本乃孔門相傳舊本耳朱子疑其有脫誤而改正輔緝之在某則謂其本無脫誤悉從其舊而已矣失在過信孔子則有之非故去朱子之分章而削其傳也夫學貴得之心求之于心而非也雖其言之出于孔子不敢以為是也而况其未及孔子者乎求之于心而是也雖其言之出于庸常不敢以為非也而况其出于孔子者乎且舊本之傳數千載矣今讀其文辭既明白而可通論其功夫又易簡而可入亦何所按據而斷其此假之必在于彼彼假之必在于此與此之如何而缺彼之如何而誤而遂改正輔緝之無乃重于背朱而輕于叛孔已乎來教謂如必以學不資于外求但當反觀內省以為務則正心誠意四字亦何不盡之有何必入門之際使困以格物一假工夫也誠然誠然若語其要則修身二字亦足矣何必又言正心正心二字亦足矣何必又言誠意誠意二字亦足矣何必又言致知又言格物惟其工夫之詳密而要之只是一事所以為精一之學此正不可不思者也夫理無內外性無內外故學無內外講習討論未嘗非內也反觀內省未嘗遺外也夫謂學必資于外求是以已性為有外也是義外也用智者也謂反觀內省為求之于內是以已性為有內也是有我也自私者也是皆不知性之無內外也故曰精義入神以致用也利用安身以崇德也性之德也合內外之道也此可以知格物之學矣格物者大學之實下手處徹首徹尾自始學至聖人只此工夫而已非但入門之際有此一假也夫正心誠意致知格物皆所以修身而格物者其所以用力日可見之地故格物者格其心之物也格其意之物也格其知之物也正心者正其物之心也誠意者誠其物之意也致知者致其物之知也此豈有內外彼此之分哉理一而已以其理之凝聚而言則謂之性以其主宰而言則謂之心以其主宰之發動而言則謂之意以其發動之明覺而言則謂之知以其明覺之感應而言則謂之物故就物而言謂之格就知而言謂之致就意而言謂之誠就心而言謂之正正者正此也誠者誠此也致者致此也格者格此也皆所謂窮理以盡性也天下無性外之理無性外之物學之不明皆由世之儒者認理為外認物為外而不知義外之説孟子蓋嘗闢之乃至襲陷其內而不覺豈非亦有似是而難明者歟不可以不察也凡執事所以致疑于格物之説者必謂其是內而非外也必謂其專事于反觀內省之為而遺棄其講習討論之功也必謂其一意于綱領本原之約而脫略于支條節目之詳也必謂其沉溺于枯稿虛寂之偏而不盡于物理人事之變也審如是豈但獲罪于聖門獲罪于朱子是邪説誣民叛道亂正人得而誅之也而况于執事之正直哉審如是世之稍明訓詁聞先哲之緒綸者皆知其非也而况執事之髙明乎哉凡某之所謂格物其于朱子九條之説皆包羅統括于其中但為之有要作用不同正所謂毫釐之差耳然毫釐之差而千里之謬實起于此不可不辨是月至贛先生至贛大閲士卒教戰法江彬遣人來覘動靜相知者俱請回省無蹈危疑先生不從作啾啾吟解之有曰東家老翁防虎患虎夜入室㗸其頭西家小兒不識虎持竿驅虎如驅牛且曰吾在此與童子歌詩習禮有何可疑門人陳九川等亦以為言先生曰公等何不講學吾昔在省城處權竪禍在目前吾亦帖然縱有大變亦避不得吾所以不輕動者亦有深慮焉耳洪昔葺師疏便道歸省與再報濠反疏同日而上心疑之豈當國家危急存亡之日而暇及此也當是時倡義興師濠且旦夕擒矣猶疏請命將出師若身不與其事者至諌止親征疏乃嘆古人處成功之際難矣哉七月重上江西捷音武宗留南都既久群黨𣣔自獻俘襲功張永曰不可昔未出京宸濠已擒獻俘北上過玉山渡錢塘經人耳目不可襲也于是以大將軍鈞帖令重上捷音先生乃節略前奏入諸人名于疏內再上之始議北旋尚書霍韜曰是役也罪人已執猶動衆出師地方已寧乃殺民奏捷誤先朝于過舉搖國是于將危蓋忠泰之攘功賊義厥罪滔天而續綸之詭隨敗類其黨惡不才亦甚矣御史黎龍曰平藩事不難于成功而難于倡義蓋以逆濠之反實有內應人懷觀望而一時勤王諸臣皆捐軀亡家以赴國難其後忌者搆為飛語欲甘心之人心何由服乎後有事變誰復肯任之者費文獻公宏送張永還朝序曰兹行也定禍亂而不必功出于已開主知而不使過歸乎上節財用不欲久困乎民扶善類而不𣣔罪移非辜且先是發瑾罪狀首以規護衛為言實以逆謀之成萌于護衛之復其早辨預防非有體國愛民之心不能及此洪謂平藩事不難于倡義而難于處忠泰之變蓋忠泰挾天子以偕亂莫敢誰何豹房之謀無日不在畏即據上遊不敢騁卒能保乘輿還宫以起世宗之正始開先勒石所謂神器有歸孰敢窺竊又曰嘉靖我邦國則改元之兆先徴于兹矣噫豈偶然哉先生在贛時有言萬安上下多武士者先生令參隨往紀之命之曰但多膂力不問武藝已而得三百餘人龍光問曰宸濠既平紀此何為曰吾聞交址有內難出其不意而搗之一機會也後二十年有登庸之役人皆相傳先生有預事謀而不知當時計有所在也八月咨部院雪冀元亨冤狀先是宸濠攬結名士助已凡仕江右者多隆禮際武陵冀元亨為公子正憲師忠信可託故遣往謝徉與濠論學濠大笑曰人癡乃至此耶立與絶比返贛述故先生曰禍在兹矣乃衛之間道歸及是張許等索釁不得遂建元亨備受考掠無片語阿順于是科道交疏論辨先生備咨部院白其冤世宗登極詔將釋前已得疾後五日卒于獄同門陸澄應典輩備棺殮訃聞先生為位慟哭之元亨字惟乾舉鄉試其學以務實不欺為主而謹于一念在獄視諸囚不異一體諸囚日涕泣至是稍稍聽學自慰湖廣逮其家妻李與二女俱不怖曰吾夫平生尊師講學肯有他乎手治麻枲不輟暇則誦書歌詩事白守者𣣔出之李曰不見吾夫何歸按察諸僚婦欲相會辭不敢赴已乃潔一室就視則囚服不釋麻枲有問者答曰吾夫之學不出閨門袵席間聞者悚愧元亨既卒先生移文恤其家羅洪先贈女兄夫周汝方序略曰憶龍岡嘗自贛病歸附廬陵劉子吉舟劉與陽明先生素厚善曽母死往請墓志實濠事暗相邀結不合而返至舟顧龍岡呻吟昏瞀意其熟寢也呼門人王儲嘆曰𥘉意專倚陽明兩日數調以言若不喻意更不得一肯綮不上此船明矣此事將遂巳乎且吾安得以一身當重擔也儲拱手曰先生氣弱今天下屬先生先生安所退託陽明何足為有無哉劉曰是固在我多得數人更好陽明曾經用兵爾儲曰先生以陽明為才乎吾見其怯也劉曰誠然贛州洞賊髦頭耳乃終日練兵若對大敵何其張皇哉相與大笑而罷龍岡反舍語豫若此已卯二月也其年六月濠反子吉與儲附之七月陽明先生以兵討賊八月俘濠是時議者紛然豫與龍岡竊嘆莫能辨比見詆先生者問之曰吾惡其言是而行非蓋其偽也龍岡舌尚在至京師見四方人士猶有為前言者否乎盍以語豫者語之其後養正既死先生過吉安令有司葬其母復為文以奠辭曰嗟嗟劉生子吉母死不葬爰及干戈一念之差遂至于此嗚呼哀哉今吾葬子之母聊以慰子之魂蓋君臣之義雖不得私于子之身而朋友之情猶得以盡于子之母也嗚呼哀哉其事在是年六月閏八月四疏省葬不允𥘉先生在贛聞祖母岑太夫人訃及海日翁病欲上疏乞歸會有福州之命比中途遭變疏請命將討賊因乞省葬朝廷許以賊平之日來説至是凡四請嘗聞海日翁病危𣣔棄職逃歸後報平復乃止一日問諸友曰我𣣔逃回何無一人贊行門人周仲曰先生思歸一念亦似著相先生良久曰此相安能不著九月還南昌先生再至南昌武宗駕尚未還宫百姓嗷嗷乃興新府工役檄各院道取濠廢地逆産改造貿易以濟飢代稅境內稍蘇嘗遺守益書曰自到省城政務紛錯不復有相講習如􅐚中者雖自已舵柄不敢放手而灘流悍急須仗有力如吾謙之者持篙而來庶能相助更上一難耳泰州王銀服古冠服執木簡以二詩為贄請見先生異其人降階迎之既上坐問何冠曰有虞氏冠問何服曰老萊子服曰學老萊子乎曰然曰將止學服其服未學上堂詐趺掩面啼哭也銀色動坐漸側及論致知格物悟曰吾人之學飾情抗節矯諸外先生之學精深極微得之心者也遂反服執弟子禮先生易其名為艮字以汝止進賢舒芬以翰林謫官市舶自恃慱學見先生問律吕先生不答且問元聲對曰元聲制度頗詳特未置密室經試耳先生曰元聲豈得之管灰黍石間哉心得養則氣自和元氣所由出也書云詩言志志即是樂之本歌永言歌即是制律之本永言和聲俱本于歌歌本于心故心也者中和之極也芬遂躍然拜弟子是時陳九川夏良勝萬潮歐陽德魏良弼李遂舒芬及裘衍日侍講席而巡按御史唐龍督學僉事邵鋭皆守舊學相疑唐復以徹講擇交相勸先生答曰吾真見得良知人人所同特學者未得啓悟故甘隨俗習非今苟以是心至吾又為一身疑謗拒不與言于心忍乎求真才者譬之淘沙而得金非不知沙之汰者十去八九然未能舍沙以求金為也當唐邵之疑人多畏避見同門方巾中衣而來者俱指為異物獨王臣魏良政良器鍾文奎吳子金等挺然不變相依而起者日衆十有六年辛巳先生五十歲在江西正月居南昌是年先生始揭致良知之教先生聞前月十日武宗駕入宫始舒憂念自經宸濠忠泰之變益信良知真足以忘患難出生死所謂考三王建天地質鬼神俟後聖無弗同者乃遺書守益曰近來信得致良知三字真聖門正法眼藏往年尚疑未盡今自多事以來只此良知無不具足譬之操舟得舵平瀾淺瀨無不如意雖遇顛風逆浪舵柄在手可免沒溺之患矣一日先生喟然發嘆九川問曰先生何嘆也曰此理簡易明白若此乃一經沉埋數百年九川曰亦為宋儒從知解上入認識神為性體故聞見日益障道日深耳今先生拈出良知二字此古今人人真靣目更復奚疑先生曰然譬之人有冒别姓墳墓為祖墓者何以為辨只得開壙將子孫滴血真偽無可逃矣我此良知二字實千古聖聖相傳一點滴骨血也又曰某于此良知之説從百死千難中得來不得巳與人一口説盡只恐學者得之容易把作一種光景玩弄不實落用功負此知耳先生自南都以來凡示學者皆令存天理去人欲以為本有問所謂則令自求之未嘗指天理為何如也間語友人曰近欲發揮此只覺有一言發不出津津然如含諸口莫能相度久乃曰近覺得此學更無有他只是這些子了比更無餘矣旁有健羡不已者則又曰連這些子亦無放處今經變後始有良知之説録陸象山子孫先生以象山得孔孟正傳其學術久抑而未彰文廟尚缺配享之典子孫未沾褒崇之澤牌行撫州府金溪縣官吏將陸氏嫡派子孫倣各處聖賢子孫事例免其差役有俊秀子弟具名提學道送學肄業按象山與晦翁同時講學自天下崇朱説而陸學遂泯先生刻象山文集為序以表彰之席元山嘗聞先生論學于龍場深病陸學不顯作鳴冤録以寄先生稱其身任斯道庶幾天下非之而不顧五月集門人于白鹿洞是月先生有歸志欲同門久聚共明此學適南昌府知府吳嘉聰欲成府志時蔡宗兖為南康府教授主白鹿洞事遂使開局于洞中集夏良勝舒芬萬潮陳九川同事焉先生遺書促鄒守益曰醉翁之意蓋有在不專以此煩勞也區區歸遁有日聖天子新政英明如謙之亦宜束裝北上此會宜急圖之不當徐徐而來也庚辰春甘泉湛先生避地髮履塜下與霍兀崖韜方叔賢同時家居為會先生聞之曰英賢之生何幸同時共地又可虛度光隂失此機會耶是秋兀崖過洪都論大學輒持舊見先生曰若傳習書史考正古今以廣吾見聞則可若𣣔以是求得入聖門路譬之採摘枝葉以綴本根而𣣔通其血脈蓋亦難矣至是甘泉寄示學庸測叔賢寄大學洪範先生遺書甘泉曰隨意體認天理是真實不誑語究兄命意發端却有毫釐未協修齊治平總是格物但𣣔如此節節分疏亦覺説話太多且語意務為簡古比之本文反更深晦莫若淺易其詞略指路徑使人自思得之更覺意味深長也遺書叔賢曰道一而已論其大本一原則六經四書無不可推之而同者又不特洪範之于大學而已譬之草木其同者生意也其花實之疏密枝葉之髙下亦𣣔盡比而同之吾恐化工不如是之雕刻也君子論學固惟是之從非以必同為貴至于入門下手處則有不容于不辨者先是倫彥式以訓嘗過虔中問學是月遣弟以諒遺書問曰學無靜根感物易動處事多悔如何先生曰三言者病亦相因惟學而别求靜根故感物而懼其易動感物而懼其易動足故處事而多悔也心無動靜者也故君子之學其靜也常覺而未嘗無也故常應常寂動靜皆有事焉是之謂集義集義故能無祇悔所謂動亦定靜亦定者也心一而已靜其體也而復求靜根焉是撓其體也動其用也而懼其易動焉是廢其用也故求靜之心即動也惡動之心非靜也是之謂動亦動靜亦動將迎起伏相迎于無窮矣故循理之謂靜從𣣔之謂動六月赴內召尋止之升南京兵部尚書參贊機務遂疏乞便道省葬六月十六日奉世宗敕旨以爾昔能勦平亂賊安靜地方朝廷新政之𥘉特兹召用敕至爾可馳驛來京毋或稽遲先生即于是月二十日起程道由錢塘輔臣阻之潛諷科道建言以為朝廷新政武宗國喪資費浩繁不宜行宴賞之事先生至錢塘上疏懇乞便道歸省朝廷準令歸省升南京兵部尚書參贊機務按乞歸省疏略曰臣自兩年以來四上歸省奏皆以親老多病懇乞暫歸省視復權姦讒嫉恐罹曖昧之禍故其時雖以暫歸為請而實有終身丘壑之念矣既而天啓神聖入承大統親賢任舊向之為讒嫉者皆以誅斥陽德興而公道顯臣于斯時若出陷穽而登之春臺也豈不欲朝發夕至一快其拜舞踴躍之私乎顧臣父老且病頃遭讒搆朝夕常有父子不相見之痛今幸脫洗殃咎復覩天日父子之情固思一見顔面以敘其悲慘離隔之懷况臣取道錢塘迂程鄉土止有一日此在親交之厚將不能巳于情而况父子乎然不以之明請于朝而私竊行之是欺君也懼稽延之戮而忍割情于所生是忘父也欺君者不忠忘父者不孝故臣敢冒罪以請與陸澄論養生京中人回聞以多病之故將從事于養生區區往年蓋嘗斃力于此矣後乃知養德養身只是一事元靜所云真我者果能戒謹恐懼而專心于是則神住氣住精住而仙家所謂長生久視之説亦在其中矣老子彭籛之徒乃其稟賦有若此者非可以學而至後世如白玉蟾丘長春之屬皆是彼所稱述以為祖師者其得夀皆不過五六十則所謂長生之説當必有所指也元靜氣弱多病但宜清心寡欲一意聖賢如前所謂真我之説不宜輕信異道徒自惑亂聰明斃精竭神無益也八月至越九月歸餘姚省祖塋先生歸省祖塋訪瑞雲樓指藏胎衣地抆淚久之蓋痛母生不及養祖母死不及殮也日與宗族親友宴逰隨地指示良知德洪昔聞先生講學江右久思及門鄉中故老猶執先生往迹為疑洪獨潛伺動支深信之乃排衆議請親命率二姪大經應揚及鄭寅俞大本因王正心通贄請見明日夏淳范引年吳仁柴鳳孫應奎諸陽徐珊管州谷鍾秀黃文煥周于德楊珂等凡七十四人十有二月封新建伯制曰江西反賊勦平地方安定各該官員功績顯著你部裏既會官集議分别等第明白王守仁封新建伯奉天翊衛推誠宣力守正文臣特進光祿大夫柱國還兼兩京兵部尚書照舊參贊機務嵗支祿米一千石三代并妻一體追封給與誥劵子孫世世承襲正德十六年十二月十九日準兵部吏部題差行人齎白金文綺慰勞兼下溫旨存問父華于家賜以羊酒至日適海日翁誕辰親朋咸集先生捧觴為夀翁蹙然曰寧濠之變皆以汝為死矣而不死皆以事難平矣而卒平讒搆朋興禍機四發前後二年岌乎知不免矣天開日月顯忠遂良穹官高爵濫冒封賞父子復相見于一堂茲非其幸歟然盛者衰之始福者禍之基雖以為幸又以為懼也先生洗爵而跪曰大人之教兒所日夜切心者也聞者皆歎會遇之隆感盈成之戒
