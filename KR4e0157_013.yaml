front:
  text: 王文成公全書卷之十八
  hash: sha256:af9123bf7ed35b7a3d8c74556655d4a188807ccbcb305f81bef11afa9705db63
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_013-1a}
body:
  text: 别録十公移總督兩廣平定思田征勦八寨欽奉敕諭通行嘉靖六年十月𥘉三日嘉靖六年七日𥘉七日節該欽奉敕諭先該廣西田州地方逆賊岑猛為亂已令提督兩廣等官都御史姚鏌等督兵進勦隨該各官奏稱岑猛父子悉已擒斬巢穴蕩平捷音上聞已經降敕奬勵論功行賞及將該設流官添設參將等事條陳又經該部議擬覆奏施行去後續該各官復奏惡目盧蘇倡亂復叛王受攻陷思恩又經切責各官計處不審行令將失事官貟戴罪督兵勦捕及調江西輋兵湖廣永保二司土兵并力勦殺務收全功并敕巡按御史石金紀功外但節據石金所奏前項地方盧蘇王受結為死黨互相依倚禍孽日深將來不可收拾又參稱先後撫臣舉措失當姚鏌等攘夷無䇿輕信寡謀圖田州已不可得并思恩胥復失之要得通行查究追奪朕以事難遙度姚鏌等前功難泯後有踈虞得旨切責之後能自奮勵平冦有功亦未可知難遽别議乃下兵部議奏以各官先後所論事宜意見不同且兵連兩廣調遣事干鄰境地方必得重臣前去總制督同議處方得停當今特命爾提督兩廣及江西湖廣等處地方軍務屋馳前去彼處即查前項夷情田州因何復叛思恩因何失守督同姚鏌等斟酌事勢將各夷叛亂未形者可撫則撫反形已露者當勦則勦一應主客官軍從宜調遣主副將官及三司等官悉聼節制治以軍法明示威信務要計處合宜仍令御史石金隨軍紀驗功次從實開報以慿升賞賊平之後公同計處應設土官流官何者經久利便并先今撫鎮等官有功有過分别大小輕重明白奏聞區處凡用兵進止機宜及一應合行之事敕內該載未盡者悉聼便宜從長處置事體十分重大者具奏定奪朕以爾勳績久著才望素隆特茲簡任爾務以體國為心聞命就道竭忠盡力大展謀猷俾夷患殄除地方安靖以紓朕西南之憂仍須深慮却顧事出萬全一勞永逸以為廣人久逺之休毋得循例辭避以孤衆望爾欽哉故諭欽此欽遵照得當爵猥以菲才濫膺重寄多病之餘精力既已減耗久廢之後事體又復闊踈大懼弗堪有負委托及照兩廣之與江西湖廣雖云相去遼逺而攘地相連士夫軍民往來絡繹傳聞既多議論有素况在無嫌之地是非反得其真且處傍觀之時區畫宜有其當合行咨詢以輔不逮除委用職官及調遣軍馬臨時相機另行外擬合通行為此仰抄捧回司照依案驗備奉敕諭內事理即行本司掌印佐二及各道分巡兵備守備等官并所屬大小衙門各該官吏凡有所見勿憚開陳其間或撫或勦孰為得宜設土設流孰為便利與凡積弊宿蠧之宜改於目前逺慮深謀之可行於久逺者備寫揭帖各另呈來以慿採擇各該官吏俱要守法奉公長亷逺耻祛患衛民竭忠報國毋以各省而分彼此務在協力以濟艱難果有忠勇清勤績行顯著者旌勸自有常典當爵不敢蔽賢其或姦貪畏縮志行卑汚者黜罰亦有明條當爵亦不敢同惡深帷昧劣庶賴匡襄凡我有司各宜知悉仍行鎮守撫按等衙門知會一體欽遵施行湖兵進止事宜十月據廣西桂林道右參政龍誥僉事申惠會稟原調永保二司宣慰官舍土兵共六千餘貟名八月自辰州府起行九月盡可到省城各職即目起程前去全州興安等處接應督押為照大兵進止自有機宜今未奉節鉞撫臨莫知適從查得舊規兵至即發哨徑趨賔州聼遣如至賔州而未用恐接境思田二府不無致生疑變合無將各兵前赴梧州府屯劄聼候軍門撫臨調度等因照得本年八月二十四日先準兵部咨該本爵看得先任總督巡撫都御史姚巳蒙欽準致仕而本爵又以扶病就醫聼候辭本命下未即起程况湖兵未至秋暑尚深遙計賊情正在懈弛機有可乘事宜從便已經行仰各該失事帶罪立功守巡參將及各領兵督哨等官務要相度機宜若各叛目誠心投撫中間尚有可憫之情朝廷豈以必殺為事且宜從權撫插聼候本爵督臨查處若是陽投隂叛譎詐反覆度其事勢終難曲全則宜密切相機乘間行事務在獲厥渠魁不得濫加無罪各官務要協和行事既無參錯抵牾有乖共濟之義亦無貪功輕率仰戾好生之仁又經行仰各遵照施行去後今據前因看得湖兵既至勢難中止非徒無事漫行有失逺人之信亦且師老財費重為地方之憂但聞諸道路傳諸啇旅皆謂各目投撫之誠今已甚切致亂之情尚有可原且朝廷以好生為德下民無必死之讐是以本爵尚爾遲疑𣣔候督臨乃決進止顧傳聞未真兵難遙度各官身親其事必皆的知况原任總督雖已致政尚在統領老成慎重當無隨䇿若果事在不疑即宜乘機速舉一勞永逸以靖地方如其尚有可生之道亦且毋為必殺之謀匪曰姑息將圖久安及照各處流賊素為民患非止一巢若用聲東擊西之術則湖兵之來未為徒行各官俱密切慎圖務出萬全本爵亦已扶病晝夜速進軍中事宜從便施行一靣呈稟撫鎮巡按等衙門一體通行知會俱毋違錯牌諭安逺縣舊從征義官葉芳等十一月往年本爵提督南贛汀漳等處軍務因地方盜賊未平身親軍旅四出勦除爾葉芳等乃能率領兵夫來隨帳下奮勇殺賊效勞為多後遭寧藩之變爾葉芳又能堅辭賊賄一聞本爵起調牌到當即統領曾德禮等及部下兵衆晝夜前來逺赴國難一念忠義誠有可嘉備歷辛苦立有戰功賞未酬勞豫心慊慊嘗𣣔表奏爾一官以勵忠勤隨因本爵守制還家未及舉行今兹奉命總制四省軍務復臨是境看得舊時從征軍士多𬒳忌功之徒百般屈抑心殊為之不平念爾葉芳舊勞未酬合就先行奬勵故特差典史張縉將帶花紅羊酒親至爾家用旌爾功爾其益謹禮法以緝下人益殫忠勤以報上德省諭部下之人務要各安生理各守家業人惟不為善未有為善而不獲善報者人惟不為惡未有為惡而不受惡殃者聞爾所居之地傍近各寨新民雖云向化其間尚多與爾為讐爾宜髙爾墻垣嚴爾警備以戒不虞爾等嘗與杜柏孫洪舜等不和各宜消釋講信修睦安集地方吾所以惓惓誨諭爾等者實念爾等辛勤從我日久吾視爾等不啻如父子雖𣣔已於言情有所不容已也吾今以軍機重務即赴兩廣不得久留贛城爾等但體吾教戒之意各安室家不必逺來候見徒勞無益其曾德禮等俱各諭以此意批南康縣生員張雲霖復學詞看得張雲霖原係本院檄召起兵從征人數立有功次已經核實造報皆本院所親知後因忌功之徒搜求羅織遂令此生屈抑至此言之誠為痛憤仰分巡嶺北道即與查審教官費廷芳招案有無干涉功賞銀兩曽否收給仍行提學道收送復學則有功之士不致於抱冤憤而本生仗義勤王之節庶亦不負其𥘉心矣批贛縣生貟雷瑞詞同放回各處官軍牌十二月二十五日照得先因田州等處變亂前任軍門抽撥兩省官軍及差官取調左右兩江土官目兵前赴南寧等處駐劄聽候征勦今照各夷皆來告要誠心向順巳漸有平復之機且各處城池邊隘缺人防守往往來告盜賊乘間竊發亦不可不為之慮况今春氣萌動東作方興各兵屯頓日久霜眠草宿勞苦萬端應合放回為此牌仰本官即將軍門原調各處官軍機兵打手及各土官目兵盡數撤散放回休息及時農種防守城池惟湖廣永保二司土兵姑留聼候俟沿途夫馬糧草完備然後發回各具由回報毋得違錯犒諭都康等州官男彭一等十二月二十八日看得廣西某州縣官孫族某官男頭目某等統領土兵前來南寧賓州地方屯哨日久勞苦良多即今歲暮天寒各兵逺離鄉土豈無室家之念故今特加犒勞通放歸復業安生本族官目務要嚴整行伍經過地方毋得侵優人家一草一木有犯令者即時照依軍法斬首到家之後仰本州縣官仍要愛惜下人輯和鄰境毋得恃強凌弱倚衆暴寡越理踰分自取罪系遵守朝廷法制保爾土地人民牌仰本州縣官執照遵守到家之日俱依準回報劄付永順宣慰司官舍彭宗舜冠帶聼調據湖廣永順等處軍民宣慰使司領征官帶舍把彭明倫田大有等呈稱統兵土舍彭宗舜係致仕宣慰彭明輔嫡生次男伊兄彭宗漢身故本舍應該襲替嘉靖五年宗漢奉征田州蒙軍門劄付冠帶殺賊惟本舍見統目兵聼用又自備家丁三千報效切恐未授官職軍威無所瞻肅呈乞比照故兄彭宗漢事體授職便益等因到爵為照軍旅之政非威嚴則不肅等級之辨非冠帶無以章今官舍彭宗舜於常調之外自備家丁隨父報效不避艱險勤勞王事固朝廷之所嘉與况又勘係應襲次男今以土舍領兵於體統未肅合就遵照敕諭便宜事理給與冠帶以便行事除事寧另行具奏外為此劄仰官舍彭宗舜先行冠帶望闕謝恩仍須秉節持身正巳律下申嚴約束而使兵行所在無犯秋毫作興勇敢而使兵威所加有如破竹務竭忠貞以圖報稱功成之日具奏旌賞國典具存先具冠帶日期依準繳報仍行本省鎮巡衙門知會毋得違錯批廣西布按二司請建講堂呈據參政汪必東僉事吳天挺呈請建講堂號舍以便生員肄業事看得感發奮勵見諸生之有志作興誘掖實有司之盛心不有藏修之地難成講習之功况境接諸蠻之界最宜用夏變夷而時當梗化之餘尤當敷文來逺雖亦爼豆之事實關軍旅之機準如所議動支軍餉銀兩即為起蓋務為經久之計毋飾目前之觀完日開數繳報批立社學師耆老名呈嘉靖七年正月據思明府申稱要令土人談績穌彪加以社學師名號鄉老黃永堅加以耆老名號看得教民成俗莫先於學然須誠愛惻怛實有視民如子之心乃能涵育薰陶委曲開導使之感發興起不然則是未信而勞其民反以為厲已矣據本縣所申是亦良法但須行以實心節用愛民施為有漸不致徒飾一時之名務垂百年之澤始可該道守巡官仍加勞耒匡直開其不逮備行該府查照施行議處江古諸處猺賊節據各道哨守官兵呈報照得廣西府江古田洛容諸處猺賊日來勢益猖熾皆由近年以來大征之舉既為虛文而雕勦又復絶響是以為彼所窺肆無忌憚今思田事體漸就平息湖兵西歸有日正可相機行事為此牌行左布政嚴紘密切會同參政龍誥按察使錢宏副使李如圭翁素將各稔惡賊巢務訪的確密拘知因鄉道備詢我兵所由道路險夷逺近及各賊巢所在議謀既定即可迎約湖兵決機行事要在聲東擊西後發先至但誅其罪大惡極者一處兩處其餘且可悉行寬撫容令呚惡從善務在去暴除殘懲一戒百不必廣捕多殺致令玉石無分驚疑逺邇後難行事若其事勢連絡廣逺關係重大亦且不宜輕動本院尚駐南寧彼中事機勢難遙度諒各官平日素有深謀沉勇秉義奮功一切機宜自能周悉近報剗平之獲巳見用心之勤尚須後效一并奏請凡有申稟密切封來批嶺西道立營防守呈二月據僉事李香呈稱顧募打手立營防守緣由看得所議既得其要略但屯兵固不可分而合兵又不宜頓必須該道及統兵官時將屯聚之兵督率於賊盜出沒要害往來巡視操演因而或修復營堡或開通道路或戒飾反側猺寨或撫安凋弊民村巡行慣熟逺近不疑擇其長惡不悛者間行雕勦懲一戒百如農夫之植禾必逐漸而耕耨如園丁之去草必以次而芟除庶屯聚之兵無坐食之患而有日新之功矣仰備行各官查照施行犒送湖兵照得先該軍門奏調湖廣永順保靖二宣慰司土官目兵前來征勦田州等處今照各夷自縳歸􅑙地方平靖為照宣慰彭明輔彭九霄雖未及衝冒矢石摧堅破敵然跋涉道途間關山海不但勞苦之備嘗且其勤事之忠赴義之勇不戰而勝全師以歸隱然之功亦不可掩所據宴勞之禮相應照舊舉行其沿途該用廩給口糧等項亦合計算總支庶免阻滯及省偏州下邑之擾為此牌仰本官行會左參政龍誥僉事吳天挺參議汪必東督行南寧府於賞功綵假金銀花枝銀兩內照依開數支出齎送各宣慰并給賞各舍目收領以慰其勞仍將永保二司官舍頭目人等合用廩給口糧等項查取見在確數各有若干亦行南寧府查自本府起至梧州府止計算幾縣每驛扣算該銀若千就於軍餉銀內支給又自梧州起至桂林府止查算縣驆若千亦就行該府支銀應付又自桂林府起照前計算至全州止銀兩亦行該府查給其各州縣止是應付人夫再不許别項科派於民仍通行南寧潯州梧州平樂桂林全州各查照單內預行整辦犒勞下程聼候各官舍目到彼分送犒勞給賞施行批嶺西道撫處盜賊呈看得各處盜賊全在撫處得宜綏柔有道使之畏威懷德歲改月化自然不敢為惡乃為善䇿雖雕勦之舉亦不得已而後一行至於待其猖獗肆惡然後懸金以購首級之獲掩襲以求斬捕之多抑亦末矣今後該道官務思撫處綏柔之長䇿如駕舟之舵御馬之轡操持有要而運動由已若舍舵與轡而廣求駕御之術雖極工巧習熟終亦不免傾跌之虞一應賞罰量功大小以為多寡軍門原有舊規軍職纍功升級亦有見行事例臨陳退縮仰遵敕諭事理當時以軍法從事俱仰查照施行繳禁革輕委職官據廣東布政司呈參廣州左等四衛掌印指揮王冕海信杜隆馮凝千户陸宗等百户劉愷等不修職業委棄城池逺出經句肆無忌憚應合參問參看擅離職役律有明條今各處軍衛有司官往往輒因私事棄職逺出或因上司經由過為趨諂越境送迎往回動經旬月上下相安恬不為異仰布政司通行禁革究治今後不係緊急軍機重務其餘問候申請等項雖亦公事勢有輕緩者止役吏胥差使不許輕委職官非但廪給夫馬騷擾道途勞費不少抑且城池庫獄一有虧失貽纍匪輕各該衙門首領官今後俱要置立文簿凡遇掌印佐二及帶俸等官公事出入俱要開記月日因某事到某處送迎或承何衙門到某處差委某年月日回任歲終繳報本院以慿查究大抵天下之不治皆由有司之失職而有司之失職獨非小官下吏偷惰苟安僥幸度日亦由上司之人不遵國憲不恤民事不以地方為念不以職業經心既無身率之教又無警戒之行是以蕩弛日甚亦宜分受其責可矣仰布政司備行各該守巡各兵備守備及府州縣衛所等大小衙門仰各查照施行該衛掌印等官姑記未究其陸宗劉愷遵照本院欽奉敕諭事先行提究以警其將來此繳分派思田土目辦納兵糧四月照得思恩田州二府各設流官知府治以土俗其二府原舊甲分城頭除割田州八甲分立土官知府以存岑氏之後其餘悉照舊規不必開圖立里但與酌量分析各立土目之素為衆所信服者以為土官巡檢屬之流官知府聼其各以土俗自治照舊辦納兵糧效有勤勞遞加升授其襲授調發必皆經由於知府其官職土地皆得各傳其子孫除具題外為照各甲城頭既已分析若不先令各目暫行分管誠恐事無統紀别生弊端為此牌仰田州府土目龍寄等遵照後開甲分每歲應該納辦官糧查照開數依期完納出辦一應供役征調等項事情悉聼知府調度約束本目仍要守法奉公正已律下愛飬小民保安境土毋得放縱恣肆踰分干紀自取罪纍後悔無及候奏請命下仰各欽遵施行計開凌時甲每年納夏稅秋糧米八十八石八斗七升七合每調出兵三百八十四名每年表箋用銀三錢二分須知一本赴廣西用銀一錢一分須知二本赴京用銀八錢八分每年納官豬等例銀一十三兩每年納官禾四十擔重一百斤每年供皂􅊢禾七擔完冠寨陶甲案行廣西提學道興舉思田學校照得田州新服用夏變夷宜有學校但瘡痍逃竄之餘尚無受㕓之民即𣣔建學亦為徒勞然風化之原終不可緩云云除具題外擬合就行為此仰抄案回道著落當該官吏備行所屬儒學遵照但有生員無拘廩增願改田州府學及各豦儒生碩附籍入學者各赴告本道徑自查發選委教官一貟暫領學事相與講肄遊息或興起孝弟或倡行鄉約隨事開引漸為之兆俟休飬生息一二年後該府建有學校然後將各生徒通發該學肄業照例充輔增廩以次起貢俱無違錯揭陽縣主簿季本鄉約呈四月據揭陽縣主簿季本呈為鄊約事足見愛人之誠心親民之實學不卑小官克勤細務使為有司者皆能以是實心修舉下民焉有不𬒳其澤風俗焉有不歸於厚者乎但本官見留軍門聼用該縣若無委官相繼督理未免一暴十寒况本院近行十家牌諭雖經各府縣編報然訪詢其實類是虛文搪塞且編寫人丁惟在查考善惡乃聞加以義勇之名未免生事優衆已失本院息盜安民之意訪得潮州府通判張繼芳持身端確行事詳審仰該府掌印官將發去牌式再行曉諭所屬就委張繼芳遍歷屬縣督令各該縣官勤加操演務要不失本院立法𥘉意仍先將牌諭所開事理再四紬繹必須明白透徹真如出自已心庶幾運用皆有脈絡而施為得其調理該縣鄊約仰委縣丞曹森管理毋令廢墮賑給思田二府四月照得近因思田二府攘亂該前總鎮等官奏調三省漢土官軍兵快人等前來南寧府屯住防守軍民大小男不得耕女不得織而湖兵安歇之家騷擾尤甚今雖地方平靖湖兵已回然瘡痍未起困苦未蘇况自三月已來天道亢旱種未入土民多缺食誠可憫念巳經行仰同知史立誠遍查停歇湖兵之家開報相應量行賑給為此牌仰南寧府著落當該官吏專委同知史立誠即將十名以上七十一家各給米二石鹽魚二十斤五名以上三百五十六家各給米一石三斗鹹魚十三斤五名以下四百五十四家各給米一石鹹魚十斤就於該府軍餉米魚內支給開報其餘大小軍民之家諭以本院心雖無窮而錢糧有限各宜安心生理勤儉立家毋縱驕奢毋習遊惰比之豐亨豫大之日雖不足而方之兵戈優攘之時則有餘矣牌行靈山縣延師設教六月看得理學不明人心陷溺是以士習日偷風教不振近該本院久駐南寧該府及附近各學師生前來朝夕聼講已覺漸有奮發之志但窮鄊僻邑本院既未暇身至其地則諸生亦何由耳聞其説合行委官遍行訓告看得原任監察御史今􅑙合浦縣丞陳逅理學素明志存及物見在軍門相應差委除行本官外為此牌仰靈山縣當該官吏即便具禮敦請本官於該縣學安歇率領師生朝夕考德問業務去舊染卑汚之習以求聖賢身心之功該縣諸生應該赴試者臨期起送不該赴試者如常朝夕聼講或時出與經書䇿論題目量作課程不得玩易怠忽虛應故事須加時敏之功庶有日新之益該縣仍要日逐供給薪米之類候該縣掌印官應朝之日本官不妨訓迪諸生就行兼署該縣印信牌行委官陳逅設教靈山看得理學不明云云除行亷州府及所屬縣外牌仰本官即便前去該府及所屬縣行各掌印官召集各該縣師生遍行開導訓告務行立志敦本求為身心之學一洗舊習之陋度量道里折中處所於靈山縣儒學住歇令各縣師生可以就近聼講其諸生該赴試者臨期起送不該赴試者如常朝夕聚會考德問業毋令一暴十寒虛應文具亦或時出經書䇿論題目量作課程就與講析文義以無妨其舉業之功大抵學絶道喪之餘人皆駭於創聞必須包蒙俯就􅉼育薰陶庶可望其改化諒本官平日素能孜孜汲引則此行必能循循善誘該縣掌印官應朝之日本官不妨訓迪諸生就行兼署該縣印信待後縣官應朝回日方許交還牌行南寧府延師設教看得理學不明人心陷溺是以士習益偷風教不振近該本院久住南寧與該府縣學師生朝夕開道訓告頗覺漸有興起向上之志本院又以八寨進兵前往貴州等處調度則興起諸生未免又有一暴十寒之患看得原任監察御史今􅑙揭陽縣主簿季本久抱溫故知新之學素有成已成物之心即今見在軍門相應委以師資之任除行本官外仰南寧府掌印官即便具禮率領府縣學師生敦請本官前去新創敷文書院閳明正學講析義理各該師生務要專心致志考德問業毋得玩易怠忽徒應虛文其應該赴省考試者扣算程期臨時起送不該赴試者仍要如常朝夕質疑問難或時出與經書題目量作課程務加時敏之功以求日新之益該府縣仍要日逐量送柴米供給牌行委官季本設教南寧看得理學不明人心云云除行該府掌印官率屬敦請外仰本官就於新創敷文書院內安歇每日拘集該府縣學諸生為之勤勤開誨務在興起聖賢之學一洗習染之陋其諸生該赴考試者臨期起送不該赴試者如常朝夕聚會考德問業之外或時出與經書論䇿題目量作課程就與講析文義以無妨其舉業之功大抵學絶道喪之餘未易解脫舊聞舊見必須包蒙俯就涵育薰陶庶可望其漸次改化諒本官平素最能孜孜汲引則今日必能循循善誘諸生之中有不率教者時行檟楚以警其惰本院回軍之日將該府縣官貟師生查訪勤惰以示勸懲批嶺東道額編民壯呈六月據嶺東道巡守官呈議將各額編民壯存留照舊守城并追工食雇募打乎調用看得本院自行十家牌式若使有司果能著實舉行則處處皆兵家家皆兵人人皆兵防守之備既密則追捕之兵自可以漸減省以節民財以寬民力但今有司類皆視為虛文未曾實心修舉一旦遂將額設民壯三分減一則意外不測之虞果亦有如各官所呈者合且姑從所議將各民壯照舊存留備行該道所屬查照施行仍仰各官務要用心舉行十家牌式不得苟且因循惟事支吾目前徒倚繁難自弊之術以為上䇿反視易簡久安之法以為迂緩噫果有愛民之誠心處官事如家事者其忍言者之諄諄而聼之乃爾其藐藐耶凡我各官戒之敬之此繳裁革文移據布政司呈今後但有牌案行屬者則於備仰語後止令奉行官吏具遵行過緣由回報看得近來官府文移日煩如造册依準等項果係徒勞徒費虛文無輔本院𣣔革此弊久矣因軍務紛劇未及舉行據呈前因可謂先得我心之同然者自今事關本院除例該奏報及倉庫錢糧金帛贓罰𥿄價預備稻榖等項仍於每歲終開項共造手册一本送院查考外其餘一應不大緊要文册及依準等項通行裁革務從簡實以省勞費凡我有官皆要誠心實意一洗從前靡文粉飾之弊各竭為德為民之心共圖正大光明之治通備行各該衙門查照施行􅌳批右江道調和寨目呈據副使翁素呈湖潤寨目兵徑赴鎮安取調準議備出印信下帖給與該府該司各永永執照以杜後爭湖潤既已自知原屬鎮安自此必益供事大之職鎮安既𣣔自求仍統湖潤自此必益施字小之仁須要誠心協和庶可永絶禍患若徒迫脅矯誣於一時終必反覆變亂於日後此乃自取滅亡後悔何及仰各知悉遵照毋違此􅌳批南寧府表揚先哲申據南寧府申稱北門外髙嶺原有廟宇以祠宋樞密使狄武襄公青經略使余公靖樞密直學士孫公沔雍州太守忠壯蘇公緘推官忠愍談公必緣年久傾頽山存基址今思田既平所宜修復以繫屬人心以聳示諸夷看得表揚先哲以激勵有位此正風教之首况舊基猶存相應修復準支在庫無礙官銀重建祠宇其牌位祭物等項照舊修舉完日具由回報此􅌳批增城縣改立忠孝祠申據增城縣申稱參得廣東參議王綱字性常洪武年間因靖潮冦父子貞忠大孝合應崇祀於城南門外天妃廟改立忠孝祠看得表揚忠孝樹之風聲以興起民俗此最為政之先務而該縣知縣朱道瀾乃能因該學師生之請振舉廢墜若此則其平日職業之修志向之正從可知矣仰行該縣悉如所議施行其神像牌位及祭物等項俱聼從宜酌處完日具由回報此􅌳批參政張懷奏留朝覲官呈據左參政張懷所呈憫念兵荒𣣔留府縣正官足見留心地方但今歲應朝事體頗重朝廷勵精圖治必有維新之政各該正官正宜一行以快觀感似難通行奏留仰各照例依期起程况該道守巡既得賢能官員各肯憂勞盡心若此各府州縣雖無正官其各佐二亦必警戒修省自堪驅䇿其間果有闒冗不才不任委寄者該道即行别委相應官貟署管仰即通行查照施行毋再疑滯􅌳經理書院事宜八月據僉事吳天挺呈稱將南寧城東西二壕花利通收府庫支與書院師生應用剩銀修理仍置教官私宅號房以為定規看得所呈事宜足見該道官留心學校興起士習之美意俱準照議施行但事無成規難垂久逺而管理非人終歸廢墜該道仍須置立文簿將區處過事宜逐件開載給付該府縣學及管理書院官各收一本存照相繼查考舉行以防日後埋沒侵漁之弊仍於各教官內推舉學行端方堪為師範者呈來定委專管書院諸務訓勵諸生庶幾法立事行人存政舉而今日書院之設為不虛矣仍行提督學校官知會一體查督舉行及備行該府縣學官吏師生查照施行俱毋違錯此􅌳牌行南寧府延師講禮八月照得安上治民莫善於禮冠婚喪祭諸儀固宜家諭而戶曉者今皆廢而不講𣣔求風俗之美其可得乎况茲邊方逺郡土夷錯雜頑梗成風有司徒事刑驅勢迫是謂以火濟火何益於治若教之以禮庶幾所謂小人學道則易使矣近據福建莆田儒學生員陳大章前來南寧逰學進見之時每言及禮因而扣以冠婚鄉射諸儀果亦頗能通曉看得近來各學諸生類多束書髙閣飽食嬉遊散漫度日豈若使與此生朝夕講習於儀文節度之間亦足以收其放心固其肌膚之會筋骸之束不猶愈於博奕之為賢乎為此牌仰南寧府官吏即便館榖陳生於學舍於各學諸生之中選取有志習禮及年少質美者相與講解演習自此諸生得於觀感興起砥礪切磋修之於其家而𬒳於里巷逹於鄉村則邊徼之地自此遂化為鄒魯之鄊亦不難矣諸生講習已有成效該府仍要從厚措置禮幣以申酬謝仍備由差人送至廣西提督學校官以次送發各府州縣一體演習其於風教要亦不為無輔劄付同知林寬經理田寧照得思田二府平復議將田寧府改設流官見今無官管理看得化州知州林寬才識通敏幹辦勤勵本爵巡撫江西知其可用近因改建府治修復城垣已經委令經理即若升以該府同知而使久於其職必有可觀已經具題奉有明旨續該本院看得南寧自宣化縣至於田寧逆流十日之程其間錯以土夷村寨姦弊百出本爵近因躬撫南寧思龍諸圖鄊民擁道控告碩立縣治因為經理相度得村名那久者寬平深厚江水縈回居民千餘家竹樹森翳且向武各州道路皆經由其傍亦為四通之地堪以設立縣治屬之田寧亦足以鎮據要害消沮盜賊又經具題外為照新升知府張鉞尚未到任合就劄仰本官即便管理府事撫綏目民其修築城垣𪠘字及那久新立縣冶等項事宜公同各該委官用心督理務在修築堅固工程早完以圖經久候知府張鉞到任仰本官專督思龍縣治務要清查所割圖里錢糧明白毋令姦民飛詭影射致貽紛爭本官素有才識志在建功立業况奉新命擢佐專城逺近土目人等側耳注目思有維新之政本官務要竭心殫力展布才猷以仰答朝廷之恩俯慰下民之望中無負於軍門之委託如其因循玩愒隳事廢功不但聲名毁辱抑且罪責難逃劄付同知桂鏊經理思恩照得思田二府平復已經具題將柳州府同知桂鏊經理思恩府事休勞息困當有所濟續該本爵看得岑濬新移府治皆斬山絶壁如處戈矛劔戟之中况瘴霧昏塞薄午始開本爵近因督勦八寨親往相度看得地名荒田寬衍膏腴可以建府治而上林縣地名三里者乃在八寨之間其地多良田茂林村落相望堪以移設鳯化縣治量築城垣𪠘宇招撫逃亡可以成一方之保障仍將上林一縣通割以屬思恩似於事勢為便等因又經具題外為照署掌府印遷築府城新創縣治及蓋𪠘宇等項皆不可缺人督理合就劄仰本官即便星馳前去思恩府署掌印信撫綏目民其遷築府城於荒田移設縣治於三里及創建𪠘宇等項一應事宜公同各該委官用心督理云云如其因循玩愒隳事廢功豈徒身名毀辱兼亦罪責難逃牌行南昌府保昌縣禮送故官照得保昌縣縣丞杜洞久在軍門管理軍賞清介自持賢勞茂著郡屬之中實為翹然今不幸病故使人檢其行槖蕭然無以為歸殯之資殊可傷悼今尋常故官小吏無洞一日之勞者猶且有水手殯殮之例况洞從征惡冦跋涉險阻衝冒瘴毒又且乎日才而且賢所謂以死勤事者矣焉可以不從厚待之是賢不肖略無所辦也為此牌仰本府官吏即於庫貯無礙官錢內給與水夫二名棺殮銀十兩就行照例起關應付船隻腳力查照家屬名數給與口糧務要從厚資送還鄉開報及仰保昌縣官吏即便僉撥長行水手二名棺殮銀二十兩及將本官應得俸糧馬夫銀兩照數支給交付伊男及差的當人役護送還鄊毋致稽誤調發土兵十月照得各州土兵征調頻數本非良法非但耗費竭財抑且頓兵銼鋭必須各州輪年調發一以省供饋之費一以節各兵之勞庶幾土人稍有休息之期而官府亦獲精鋭之用已經行仰該司遵照備行南丹州官族莫振亨即就揀選勇敢精鋭目兵三千名躬親統領照依尅定日期前赴廣西省城聼調殺賊果能輸忠報效立有竒功即與具奏準襲該州官職自今八月𥘉一日為始至下年八月𥘉一日止却調東蘭州土兵依期更替自今各州目兵軍門斷不輕易調發致令奔疲勞苦亦決不姑息隱忍縱令驕惰玩弛但有稽抗遲誤違犯節制輕則量行罰治重則拏究革去冠帶又重則貶級削地又重則舉兵誅討斷不虛言通行各土官兵目知悉俱仰改心易慮毋蹈前非自貽後悔去後今據所呈為照本院軍令既出難再輕改失信下人但本官呈稱雕勦缺兵固亦一時權宜况稱原係本州先年自願報效不在秋調之數亦合姑從所請暫準取調為此牌仰本官即便會同鎮守太監傅倫行仰該州土官韋虎林照數精選目兵前赴省城聼各官調遣勦賊待三兩月間事畢隨即撤放回州遵照軍門批行事理依期更班聼調不許久留失信其所呈雕勦事宜悉聼會同三司掌印守巡兵備等官依擬施行事完之日通將獲過功次用過錢糧數目開報查考俱毋違錯仍行總鎮總兵鎮巡等衙門知會犒奬儒士岑伯髙照得思田之亂上厪九重命將出師動調四省軍馬錢糧􅍅􅍅兩年功未告成而變日不測本院前來勘處是固仰賴皇上好生之仁格於天地至誠動物不疾而速是以宣布威德而旬月之間諸夷即爾革心向化翕然來歸然而奔走服役固有效勞於下者其間乃有深謀祕計之士潛開默導以會合事機其功隱而難見此惟主將知之功成行賞是所謂首功者也照得儒士岑伯髙素行端介立心忠直積學待時安貧飬毋一毫無所苟取而人皆服其亷一言不肯輕發而人皆服其信遊學橫州南寧之間逺近士夫及各處土官土夷莫不聞風向慕仰其髙節本院撫臨之𥘉即用此生使之深入諸夷仰布朝廷之德下宣本院之誠是以諸夷孚信之速至於如此本生實與有力焉當時平復奏內即𣣔具列本生之功而事變方息深謀祕計未𣣔張布於諸夷但本生志在科第發身不肯異途苟進堅辭力請本院不𣣔重違雅志遂爾未及奏列今思田既已大定凡有微勞於兹役者莫不開列而本生之功泯然未表其於報功勵忠之典誠有未當仰抄案回司即於軍餉銀內動支一百兩及置買彩幣羊酒禮送本生以見本院慰賞犒勞之意仍仰遵本院欽奉敕諭便宜事理給與軍功冠帶以榮其身該司仍備給劄付執照并行原籍官司以禮優待免其雜泛差徭明朝廷賞功之典彰軍門激勵之道既以遂其飬毋之願且以遂其髙尚之心是後本生志求科第其冠帶自不相妨仍行兩廣總鎮總兵鎮巡等衙門知會征勦八寨斷藤峽牌七年三月以下俱征八寨據留撫田州思恩等處地方右布政使林富原任副總兵都指揮同知張祐連名呈稱田州思恩平復居民悉已各安生理土夷亦皆各事農耕地方實已萬幸惟八寨猺賊云云合就仰遵敕諭事理量撥官兵協同盧蘇王受等土兵分路進勦除差官舍賫捧令旗令牌分投督押土兵本院親至賔州思恩等處相機調度靣授方略外為此牌仰右布政使林富副總兵張佑即便督領官軍督發土目盧蘇王受等兵夫從公堯思恩取路進勦後開寨分務要聲言各賊纍年殺害良民攻劫州縣鄊村之罪殱厥渠魁及其黨與罪惡顯著者明正天討以絶禍根除臨陳擒斬外其餘脅從老弱一切皆可宥免今兹之舉惟以定亂安民為事不以黷武多獲為功各官務要仰體朝廷憂憫困窮之心俯念地方久遭盜賊屠戮之苦督各官兵目兵人等務殱真正惡目一洗民冤永除民患以靖地方仍禁兵馬所過鄊村毋得侵優民間一草一木有犯令者仰即遵本院欽奉敕諭事理當即處以軍法俱毋有違節制方略自取罪戾牌行領兵官牌行左參將署都指揮僉事張經會同該道守巡守備官及湖廣督兵僉事汪溱都指揮謝珮督永順宣慰彭明輔統兵進勦牛腸諸賊云云及監都保靖宣慰彭九霄統兵進勦六寺磨刀等寨諸賊云云未至信地三日之前停軍中途候約參將張經與同守巡各官集議先將進兵道路之險易逺近各巢賊徒之多寡強弱及所過良民村分之經由往復靣同各鄊道人等逐一備細講究明白務要彼此習熟通曉若出一人然後尅定日時偃旗息鼓寂若無人密至信地乘夜速發務使迅雷不及掩耳將各稔惡賊魁盡數擒勦以除民害以靖地方除臨陳斬獲外其餘脅從老弱一切皆可宥免今兹之舉惟以定亂安民為事不以多獲首級為功各官務要仰體朝廷憂憫困窮之心俯念地方久罹荼毒之苦仍要禁約軍民人等所過良民村分毋得侵擾一草一木有犯令者當以軍法斬首示衆本官既有地方責任兼復素懷忠義當茲委用務竭心力大展才猷以祛患安民一應機宜牌內該載不盡者聼公同各官計議從便施行一靣呈報事完之日通將獲過功次開報紀功御史衙門紀驗以慿奏報仍密行總鎮鎮巡等衙門知會俱毋違錯戒諭土目五月案照先經行委副總兵張祐督率官土目兵人等進勦思恩八寨猺賊今據頭目盧蘇王受等稟報皆巳攻破各寨斬獲賊級雖未日久苦亦無多且又未見獲有真正首惡中間恐有容隱脫放情弊合行戒諭督促為此牌仰本官上緊親行督諭各頭目及土兵人等俱要協力齊心竭忠報效務圖勦滅以絶禍根庶可以表明各目盡忠圖報之真心若是少有縱容復留遺孽亦是徒勞一埸不足為功適足為罪非惟不能仰報朝廷再生之恩其於本院所以勤勤懇懇不顧利害是非務要委曲成就爾等之意亦辜負矣牌至即以此意勉諭各目各兵此舉非獨為除地方之害亦為爾等建子孫久長之業盡此一畨辛苦便可一勞永逸矣發去良民其榜可給則給可止則止一應事機俱仰相機而行其號色等項已付思田報效人役徑自帶回分俵亦宜知悉追捕逋賊據同知桂鏊稟報領兵土目盧蘇王受等各已屯兵八寨斬獲賊首賊從數多巢穴悉已破蕩即今方在分兵四路搜勦及稱附近上林縣一十八村俱搬移上山躲住又訪得鐵坑那埋二堡賊村界連遷江洛春髙徑大潘思盧北三向北夷獞村分今皆逃往潛住又訪得八寨賊徒我兵未進之前陸續出劫鄊村今皆不敢回巢散入賔州淥里并貴縣涼傘疊𥿄等夷獞村分藏躲合行分兵搜捕等因看得八寨猺賊稔惡多年攻劫鄊村殺害人民虜掠財畜百姓怨恨痛入骨髓今惡貫滿盈民怨神怒巢穴破蕩分崩離析如失林之梟投罝之兔迷魄喪魂正可搜獵而盡是乃上天𣣔亡此賊之秋若不乘此機會奉行天討以雪百姓之冤以舒神人之怒以除地方之禍存其遺孽復為他日根芽此豈為民父毋之心乎及訪得平日哨守八寨官兵人等往往與賊交通者據法俱應明正典刑今且姑未拏究容其殺賊報效立功自贖除各差官督勦外為此牌仰指揮程萬全督率遷江所土官指揮黃祿千戶黃瑞百戶凌顯等各起集管下土兵人等前去北三思盧等處搜捕各賊仍行曉諭各良善向化村寨務將逃躲各賊盡數擒斬以泄軍民之憤獲功解報一體給賞若是與賊通謀容留隱蔽訪究得出國憲難逃如是各賊果有誠心悔罪願來投撫立功報效者亦準免其一死帶來軍門撫諭安插各官務要盡忠竭力上報國恩下除民患副軍門之委託立自已之功名仍督平日與賊交通之人令其向道追捕痛加懲改及此機會立功自贖果能奮不顧身多獲真正惡賊非但免其既往之罪抑且同受維新之賞若猶疑二觀望意圖苟免定行斬首示衆斷不虛言本院數日之後亦且親臨地方躬行賞罰仰各上緊立功毋自取悔牌行委官林應驄督諭土目五月看得田州思恩領兵頭目盧蘇王受等所領目兵皆係驍勇慣戰之人今又各為身家子孫之計自願出力報效立功贖罪既已攻破賊巢分屯其地則其搜捕潰散之賊當如探囊取物數日可盡今已半月有餘尚未見有成功氣勢日見委靡此必軍中收有賊巢婦女等項貪戀女色財物不肯割舍脫離奮勇殺賊苟且偷安遂致兵氣日衰軍威不振若諸賊聞此消息乘此懈怠掩襲不備我軍必致撓敗如此則是各目此舉本𣣔立功而反敗事本𣣔贖罪而反增罪非惟不能仰報朝廷之德抑且有損軍門之威矣正名定罪後悔何及為此牌仰原任戶部郎中今降徐聞縣縣丞林應驄齎執令旗令牌會同總兵監軍等官公同署田州府事知州林寬身督領兵頭目盧蘇等閲視各營但有收得賊巢婦女財物者通行搜出俱各開紀名數别立老營一所選委老成頭目另撥謹實小心兵夫晝夜管守將名貪戀女色財物不肯奮勇殺賊頭目兵夫姑且免其罰治責令即出搜山果能多有擒斬旬日之內功成班師仍將前項婦女財物照名給還亦不追究前罪若有貪戀女贓違犯軍令仍前不肯效力者仰即遵照軍門號令當時斬首示衆斷毋姑息容忍致敗三軍大事蓋前日之招撫專以慈愛惻怛為念者乃是本院憐憫兩府之民無罪而就死地乃是父母愛子之心惟恐一民不遂其生也至於今日用兵邞須號令嚴明有功必賞有罪必戮者乃是本院𣣔安兩府之民使之立功贖罪以定其身家而因以除去地方之患是乃帥師行軍之道不如此不足以取勝而成功也差去旗牌官員務要星火催督毋事姑息若旬日之後再無成功本院親臨分地定先將監軍督軍等官明正軍法其推姦避事不肯奮勇殺賊頭目通行斬首決不虛言牌委指揮趙璇留勦餘賊六月牌仰指揮趙璇前去督哨副總兵張祐處查審各寨稔惡猺賊曾否勦絶各兵見住何處聞已出屯三里仰就各營土兵目夫凡有疾病老弱者俱令在營將息調理其精壯驍勇目兵仍仰本官務要三四日或五六日督令入山巡勦一畨出意外之竒以示不測之武須候各山果無潛遁之姦各巢已無復歸之賊俟軍門牌至方許回兵仍諭土目盧蘇王受等以加此炎毒天氣如此暑雨連綿各兵久在山中辛勤勞苦本院非不惓惓憂念但一則𣣔為爾等立功一則𣣔為地方除害心雖不忍久勞爾等而勢有所不能已也爾等其務體本院之意再耐旬日之苦以成百年之功毋得𣣔速一時致貽後悔事完之日通至賔州本院親行犒賞就領牌劄仰各知悉牌行副總兵張祐搜勦餘巢七月訪得上林相近地方如淥茅等村皆係陽招隂叛與八寨諸賊裏應外合積年流毒地方即其罪惡尤有甚於八寨諸賊若不勦滅終遺禍根為此今差指揮趙璇齎牌前去督哨副總兵張祐處計議仰即密召領兵頭目盧蘇王受等令各挑選精兵一千或一千五百以搜巡八寨為名當日乘夜速發分道夾勦後開各賊村分務要殱除黨與蕩平巢穴若是各賊奔竄大名深山各兵就可留屯其地食其禾米六畜分兵探賊向往追捕本院先曾發有武緣鄊兵分搜大名諸山遙計此時各賊正回山下各村躲住及今往勦正合事機仰諭各目務要潛機速發不得遲留隔宿必致透漏消息徒勞無功發兵進勦之後一靣差人飛報計開緑茅通親緑小批頭羅暖其餘各巢不能盡開須要量其罪惡大小可勦則勦可撫則撫相機而應犒勞從征土目八月照得思田二府頭目盧蘇王受等率領部下兵夫自備衣糧征勦八寨猺賊渠魁殄滅群黨削平即今地方寧靖旋師奏凱實由各目兵夫不避炎蒸奮勇效勞但進兵以來妨廢一年耕種况今青黃不接之時部下兵夫家屬未免缺乏相應量為賑給以慰人心為此牌仰同知桂鏊即便會同南寧府掌印官將該府軍餉糧米魚鹽內照依開數支給各頭目收領但念思恩南寧道里相去隔逺糧米搬運不便合就於武緣縣見貯軍餉米內支給與各領用以見本院體恤之心仍開給散過數目􅌳報查考毋得違錯綏柔流賊五月據左江道參議等官汪必東等呈稱古陶白竹石馬等賊近雖誅勦然尚有流出府江諸處者誠恐日後為患乞調歸順土官岑􅬐兵一千名萬承龍英共五百名或韋貴兵一千名住劄平南桂平衝要地方及該府知府程雲鵬等亦申量留湖兵及調武靖州狼兵防守等因始觀論議似亦區畫經久之圖徐考成功終亦支吾目前之計蓋用兵之法伐謀為先處夷之道攻心為上今各徭征勦之後有司即宜誠心撫恤以安其心若不服其心而徒𣣔久留湖兵多調狼卒慿籍兵力以威劫把持謂為可久之計則亦末矣殊不知逺來客兵怨憤不肯為用一也供饋之需稍不滿意求索訾詈將無抵極二也就居民間騷優濁亂易生讐隙三也困頓日久資財耗竭適以自弊四也𣣔借此以衛民而反為民增一苦𣣔借此防賊而反為吾招一冦各官之意豈不虞各賊乘間突出故𣣔振揚兵威以苟幸目前之無事抑亦不睹其害矣前歲湖兵之調既已大柫其情乃今復欲留之其可行乎夫刑賞之用當而後善有所勸惡有所懲勸懲之道明而後政得其安今稔惡各徭舉兵征勦刑既加於有罪矣然破敗奔竄之餘即𣣔招撫彼亦未必能信必須先從其傍良善各巢加厚撫恤使為善者益知所勸而不肯與之相連相比則黨惡自孤而其勢自定使良善各巢傳道引諭使各賊咸有回心向化之機然後吾之招撫可得而行而凡綏懷御制之道可以次而舉矣夫柔逺人而撫戎狄謂之柔與撫者豈專恃兵甲之盛威力之強而已乎古之人能以天地萬物為一體故能通天下之志凡舉大事必順其情而使之因其勢而導之乘其機而動之及其時而興之是以為之但見其易而成之不見其難此天下之民所以隂受其庇而莫知其功之所自也今皆反之豈所見若是其相逺乎亦由無忠誠惻怛之心以愛其民不肯身任地方利害為久逺之圖凡所施為不本於精神心術而惟事輔輳掇拾支吾粉飾於其外以苟幸吾身之無事此蓋今時之通弊也合就通行計處仰抄案回道即行知府程雲鵬公同指揮周㣧宗及各縣知縣等官親至已破賊巢各鄰近良善村寨以次加厚撫恤給以告示犒以魚鹽待以誠信敷以德恩喻以朝廷所以誅勦各賊者為其稔惡不悛若爾等良善守分村寨我官府何嘗輕動爾等一草一木爾等各宜益堅向善之心毋為彼所扇惑搖動從而為之推選衆所信服立為酋長以連屬之優其禮待厚其犒賞以漸綏來調習使之日益親附又喻以稔惡各賊彼若不改一征不已至於再再征不已至於三至於四五至於六七必使滅絶而復已此後官府若行勦除爾等但要安心樂業無有驚疑若各賊果能改惡遷善實心向化今日來投今日即待以良善即開其自新之路決不追既往之惡爾等即可以此意傳告開喻之我官府亦未嘗有必𣣔殺彼之心若彼賊果有相引來投者亦就實心撫安招來之量給鹽米為之經紀生業亦就為之選立酋長使有統率毋令渙散一面清查侵占田土開立里甲以息日後之爭禁約良民毋使乘機報復以激其變如農夫之植嘉禾而去稂莠深耕易耨藝災灌溉專心一事勤誠無惰必有秋穫夫善者益知所勸則助惡者日衰惡者益知所懲則向善者益衆此撫柔之道而非專有恃於兵甲者也至於本院近行十家牌諭誠亦弭盜安民之良法而今之有司槩以虛文抵塞莫肯實心推求舉行雖已造册繳報而尚不知其間所屬何意所處地方該道仍要用心督責整理誠使此法一行則不待調發而處處皆兵不待屯聚而家家皆兵不待蓄飬而人人皆兵無餽運之勞而糧餉足無關隘之設而守禦固習之愈久而法愈精行之彌廣而功彌大其前項區處摘調之兵有虛名而無實用可張皇於暫時而不可施行於永久者勞逸煩簡相去逺矣惟有該府議𣣔散撤雇倩機快等項調取武靖州土兵使之就近防守一節區畫頗當然以三千之衆而常在一處屯頓坐食亦未得宜必須分作六班每五百名為一班每兩箇月日而更一次若有雕勦等項然後通行起調然必須於城市别立營房毋使與民雜處然後可免於騷擾嫌隙蓋以十家牌門之兵而為守土安民之本以武靖起調之兵而備追捕勦截之用此亦經權交濟相須之意合就準行仰該道仍將行糧等項再議停當備行該州土目人等遵照奉行自今以後免其秋調各處哨守等役專在潯州地方聼慿守備參將調用凡遇緊急調取即要星馳赴信地不得遲違時刻守巡各官仍要時加戒諭撫輯毋令日久玩弛又成虛應故事本院踈才多病精力不足不能躬親細務獨其憂患地方𣣔為建立久安長治一念真切自不能已是以不覺其言之叨叨各官務體此意毋厭其多言而必務為紬繹毋謂其迂逺而必再與精思務竭其忠誠務行其切實同心協德共濟時艱通行總鎮總兵鎮巡等衙門知會仍行三司各道守巡守備等官事有相類者悉以此意推而行之發去魚鹽或有不足再行計處定奪告諭村寨近年牛腸等寨積年稔惡是以舉兵征勦爾等良善村寨我官府自加撫恤決無侵優各宜益堅為善之心共享太平之樂其間平日縱有罪犯從今但能中心改過官府決不追論舊惡毋自疑沮或為彼所扇惑自取滅亡後悔無及就使已勦餘黨果能悔罪自新官府亦待以良善一體撫恤若是長惡不悛一勦十勦至於百勦必加殄滅斷不虛言爾等各寨為善為惡日後自見各宜知悉議立縣衛看得八寨猺賊稔惡為患巢穴連絡千里實為廣西衆賊之淵藪近該本院進勦掃蕩巢穴若不及今設置軍屯衛縣據其心腹要害以厄塞各賊呼吸之咽喉斷絶各賊牽引之脈絡不過數年又將屯聚生息禍根終未剪除本院身親督調各兵看得周安堡正當八寨之中而三里堡亦當八寨之隘俱各山勢回抱堪以築立城郭移衛設縣但未經廣詢博訪詳審水土之善惡民情之逆順中間有無利害得失擬合再行查訪為此牌仰分巡右江道兵備副使翁素會同該道分守官即便督同同知桂鏊指揮孫綱等帶領髙年知識親至其地經營相度若果風氣包完水土便利即行料理規制景定方向各另畫圖貼説仍要咨訪父老子弟通曉賊情習知民俗者即今移立衛縣其於四逺賊巢果否足能控制民情有無便益妨損務在人心樂順足為經長永久之計然後備由呈來以慿會奏就將築立城垣合用木石甎灰人夫匠作料價工食等項議估停當具揭呈來以慿先行一靣委官分督辦理及時興工毋得忽意苟且玩愒遲延致誤事機撫恤來降八月據參將張經呈稱武靖州耕守黃璋等一十四名𬒳十冬總甲黃鄧護等妄揑窩賊乞行釋放仍給榜諭看得本院屢經牌仰該道該府等官將各向化良善村寨加意撫恤懷柔以收其散亡之勢而堅其向善之心庶使逺近知勸而惡黨自孤各官略不體承本院勤勤懇懇之意肆志妄行輕信十冬姦民之言輒便推求往事為之報復舊讐沮抑歸向之望驚疑反側之心聼其所為必成激變後雖寸斬姦民之骨固亦何救地方之患所據違法各官即合治以軍法姑且記罪再行飾諭仰將見監黃璋李舉等一十四名即行釋放仍加慰諭令其復業寧家其十冬黃鄧護等監候本院撫臨解赴軍門發落今後仍要備細開諭該府該縣十冬里老人等各要守法安分務以寧靖地方為重不得乘機挾勢侵剝新舊投撫之人協取財物泄憤報怨及至釀成變亂却又貽纍地方勞煩官府今後有違犯者體訪得出或𬒳人告發決行拿送軍門治以軍法斷不輕恕仍將發去告示即行刋刻給赴十冬里老人等遵照奉行具遵行過緣由􅌳報批廣東市舶司提舉故官水手呈看得廣東市舶司提舉已故錢邦用平日果係清白自守足稱亷能乃今客死逺鄉情殊可憫仰廣州府即與量撥水手起關資送還鄊其原領文慿發該衙門轉繳此繳王文成公全書卷之十八終王文成公全書卷之三十續編五三征公移逸稿德洪昔裒次師文嘗先刻奏疏公移凡二十卷名曰别録為師征濠之功未明于天下也既後刻文録志在刪繁取公移三之二而去其一沈子啓原沖年即有志師學搜獵遺文若干篇録公移所遺者類為四卷名曰三征公移逸稿將增刻文録續編用以輔其所未備也出以示余余讀而嘆曰吾師學敦大源故發諸政事瀾湧川決千態萬狀時出而無窮是稿皆據案批答平常説去殊不經意而仁愛自足以淪人心髓思慮自足以徹人機智文章又足以鼓舞天下之人心若金沙玉屑散落人世人自不能棄之又奚病于繁耶乃為條揭其綱以遺之使讀者即吾師應感之陳迹可以推見性道之淵微云隆慶庚午八月朔日德洪百拜識南贛公移凡三十三條批漳南道教練民兵呈正德十一年十一月二十五日據兵備僉事胡璉呈將各縣民快操練教習頗成看得事苟庇民豈吝小費功有實效何恤浮言參據呈詞區畫允當仰該道依擬施行再照兵不在多惟貴精練事𣣔可久尤須簡嚴所募打手等項更宜逐一校閲必皆技藝絶倫驍勇出衆因能别隊量材分等使將有餘勇兵有餘資庶平居不致于冗食臨難可免于敗師批呈繳批漳南道進勦呈十一月二十六日據兵備僉事胡璉呈盧溪等洞賊首詹師富等勢甚猖獗備將畫圗貼説待期攻勦看得兵難遙度事貴乘時今打手民快等兵既巳募集仰該道上緊密切相機勦撲惟在殱耴渠魁毋致橫加平善其大舉夾攻行詳議呈繳教習騎射牌十二年五月十六日看得五兵之用弓矢為先南方之技騎射所短最宜習演以修長技今南贛緒處軍兵所操弓矢類皆脆弱十步之外不穿魯縞以是禦敵真同兒戲訪得福建省城弓矢頗勝他處合行選取為此牌仰福建漳南道轉行福建都司選取精巧慣習弓兵四名該道量給口糧腳夫送赴軍門成造弓矢事完仍發原伍著役批南安府請兵䇿應呈六月𥘉十日據知府季斆呈各巢賊黨衆多本府兵力寡弱乞添兵協勦該嶺北道議將南康二班賴養介兵撥輔縣丞舒富興國謝莊兵雩都張英才兵撥輔馮廷瑞統領其本府仍用添兵營䇿應及行該府起立軍營二處聽候官兵到彼安插其南康上猶二縣俱該一體起立回報看得賴養介謝莊張英才所統準令與峯山雙秀等兵更輔預建營房議尤適當即行該府議行務要地勢雄壯溝塹深高雖係一時之謀亦為可久之計看得南安上猶所聚兵衆每處不下二千防遏勦襲略已足用各官猶以兵少為辭不能運謀出竒亦巳可見今可行令各官分部原領各兵一意防遏另調坎字營一千二百人令指揮來春統領往屯南安又調艮字營一千二百人令指揮姚璽統領往屯上猶二營人馬專以相機勦襲為事聲東擊西務使蹤迹靡定倐聚復散每念變態無常該道即將該去各兵查給口糧二十四日已時起營前去仍行該府縣官務要協力同心相為掎角之勢共成夾勦之功呈􅌳批嶺北道攻守機宜呈六月二十六日批兵備副使楊璋呈稱訪得前項賊徒俱𬒳逃往橫水桶岡大巢屯聚所平巢穴未免復來營給合行知府季斆統領巽字營兵一千二百名防遏大庾縣賊巢縣丞舒富仍統震字營兵一千二百名防遏上猶南康二縣賊巢看得各巢賊黨雖已潰散計其勢窮食絶必將復出剽虜所議防遏事理照議施行仍行縣丞舒富務要在于賊巢總會處所屯劄多遣乖覺鄉導分路爪緝探知賊徒將出即便設伏擒勦務竭忠誠以副委任毋得虛文粉飾此後但有推姦坐視定行治以軍法再照前項賊徒今皆聚于橫水桶岡若遣重兵直搗其地示以必攻之勢彼將團結自守不暇勢必不敢分衆出掠不過旬餘兩巢之賊可以坐取仍仰該道密議直搗方略呈來定奪呈􅌳批漳南道給由呈十二年六月二十八日據僉事胡璉呈給由事看得本官才器充逹執履堅方始因軍機重務以致考滿過期今盜賊既靖合準給由但久安之圖尚切資于經理招撫之衆方有待于緝綏仰本官給由事畢即便作急回任勿為桑梓之遲有孤閭閻之望呈􅌳批兵備道獎勵官兵呈七月𥘉一日據副使楊璋呈據知府季斆等依奉本院方略攻破禾沙石路坑等巢一十九處擒斬首從賊人陳曰能鍾明貴唐洪衆及殺燒死賊從俘獲賊屬奪獲馬牛騾羊器械等項為照各賊肆毒無厭名號軌若使遂其姦謀得以乘虛入廣其為患害何可勝言副使楊璋乃能先事運謀潛行勦襲一夕之間攻破巢穴撲燎原之火于方燃障潰岸之波于已決知府季斆指揮馮翔等親領兵衆屢挫賊鋒相應奬勵以旌功能其各營將士俱能用命效力奮勇擒斬亦合一體賞勞為此仰贛州府官吏即便支給商稅銀兩買辨後開禮物及將發去銀牌羊酒就委府衛掌卬官備用綵亭鼓樂迎送各官用旌勦襲之功以明奬勵之典仍將發去賞功銀兩照名給賞其陳亡射傷兵夫亦各查給優恤各官務要益竭忠貞協謀並勇大作三軍之氣共收萬全之功調用三省夾攻官兵七月十五日準兵部咨該湖廣巡撫都御史秦題云云巳經開陳兩端具本上請去後今準前因除南贛二府兵糧事宜另行外所據領兵等官俱在得人必須先委訪得九江府知府汪隸吉安府知府伍文定汀州府知府唐淳久習軍旅惠州府知府陳祥器度深沉俱各才識練逹程鄉縣知縣張戬近征大傘等處獨統率新民奮勇當先功勞尤著撫州府東鄉縣知縣黃堂建昌府新城縣知縣黃文鸑袁州府萍鄉縣知縣高桂吉安府龍泉縣知縣陳允諧素有才名堪以領兵但事干各府各官之中或有違抗推託臨期必玫誤事除具本題請但有不遵約束許以軍法從事合就通行知會為此仰抄案回府即行本官密切整備衣裝及將上杭縣義官李福英名下打手再行㨂選務要驍勇精悍者一千名給與資裝器械聽候命下另有公文至日即便不分星夜兼程前進軍門以憑調用施行夾攻防守咨十月準湖廣巡撫都御史秦咨云云看得龍泉一縣與上猶縣諸巢接境將來三省夾攻使龍泉所守不固則吉安屬縣俱𬒳騷擾必須大兵一哨就從此路進勦方可止賊奔衝已行吉安府知府伍文定備行所屬龍泉萬安太和等縣永新安福等所精選民間打手或在官機兵共二千名編成隊伍督同知縣陳允諧等分統俱赴龍泉縣屯劄該縣鄉夫即日起集守把隘口聽候刻期夾剿外今準前因合就咨報為此備由移咨前去煩為查照施行行嶺北道催督進勦牌十月𥘉十日案照先經行仰該道守巡官分投先往上猶大庾等處住劄聽候各哨官兵至日即便催督進勦去後今照領兵等官已該本院坐委合行分投催督為此仰抄案回道即便催督各哨官兵遵照方略依期星夜直抵巢穴務將前賊掃蕩撲滅以靖地方毋遺芽蘖致貽後患本官仍行各官詳察地里險易相度機宜慎重行事毋得輕率寡謀及逗遛退縮致誤事機定行軍法從事軍中未盡事宜亦聽隨機應變施行仍呈夲院知會俱毋違錯刻期會勦咨十月二十一日準巡撫湖廣都御史秦咨議照會勦事情巳該兵部議奉欽依刻期于九月中進兵職等督理兵糧粗有次第近因楊總兵病故又為兩廣路逺約會頗難只得改期十月𥘉旬衡州取齊聽候分哨會兵具題及差官約會進勦即今所調漢土官兵不旬日間俱集若令住劄候至閏十二月方行會勦非惟糧餉不敷亦恐地方騷擾况賊情狡詐必致乘虛奔逸除移文兩廣總鎮軍門查照作急會議一面嚴督布守官兵謹把賊路防其奔逸一面督發兵糧委官分哨相機䇿應勦殺外備咨貴職查照事理至期督發各哨夾勦仍希由咨報等因案照先為緊急軍務事本職看得進攻次第江西惟桶岡一處該與湖廣之兵會合其長流左溪橫水等處皆深入南安府所屬三縣腹心之內見今不次擁衆奔衝勢難止遏欲將前項賊巢以次相機勦撲候貴治之兵齊集夾攻桶岡又經移咨貴職外續據縣丞舒富等呈稱各奪賊首聞知湖廣上兵將到欲奔桶岡集衆拒戰戰而不勝奔入范陽大山乞急為區處等因到院隨將領兵知府邢珣等指受方略刻期于十月十二日子時發兵進兵夲院即日進屯親臨南康督戰遂破橫水左溪等巢但賊首未獲方行各哨追襲今準前因照得江西兵糧粗已齊集及照十一月𥘉一日之期亦已不逺除行兵備等官監督各哨一面分投追襲未獲賊徒一面行令務在十一月𥘉一日移兵徑趨桶岡等處分布夾攻不許後期誤事及行兵備副使楊璋移文參將史春知會外為此合咨前去煩請貴院查照早為督發切勿後時橫水建立營場牌十月二十七日照得本院親督諸軍進破橫水等巢賊徒已就誅戮但山高林密誠恐漏殄之徒大軍撤後仍復嘯聚必須建立營場委官防守為此牌仰典史梁儀協同千户林節統領寧都機兵四百名信豐機兵六百名就在橫水大村砍伐木植相視地勢雄阜去處建立營場一所周圍先竪木柵逐旋修築土城聽候本院回軍住劄以憑委官留兵防守各官務要同力協謀精勤幹理工完之日照依軍功論賞所領兵衆如有不聼約束許以軍令責治其合用夫匠等項聽于南安所屬上猶南康等縣取用該縣俱要即時應付毋得遲違誤事搜扒殘寇咨十一月十一日據知府邢珣唐淳會呈各職近奉夲院調發于本年十一月𥘉一日依湖廣刻期夾攻桶岡洞諸巢遵依攻破茶寮等處擒斬賊黨已盡見今各兵四散搜扒無賊可捕訪得官兵未進之先各賊帶領家屬逃往桂東縣連界大山藏躲及將捕獲賊人黃順等備細研審相同但今彼處官兵未見前來若不移文催督誠恐先遁各賊乘虛在彼奔竄各營官兵難于過境搜扒呈乞照詳等因到院查卷先為前事已經通行湖廣江西廣東三省該道兵備守巡等官調集官軍把截夾攻及嚴督府衛所州縣等官起集兵快鄉夫各于賊行要路晝夜把截若賊奔遁就便相機擒捕去後今據前因照得桶岡賊徒陸續潛逃所據守隘等官未暇參究但今各賊久在彼處藏躲若不速行搜扒將來大兵既撤諸賊必將復歸桶岡重貽後患為此合咨貴院煩將原調官兵量摘三四千前來桂東連界大山逐一搜扒必使果無噍類然後班師庶幾一勞永逸而彼此兩無遣憾及請戒令各兵止于連界大山搜扒不得過境深入尤為地方之幸批準惠州府給由呈正德十三年二月二十四日據知府陳祥申給由事看得知府陳祥政著循良才堪統馭近因興師之舉且遲考績之行今夲官親從本院征勦叛賊效勞備至斬獲居多巢穴悉皆掃平地方已就寧靖既喜奏功于露布允宜上最于天曹際賞功之典另行外仰該府即便照例起送給由申繳批攻取河源賊巢呈三月二十三日據僉事王大用呈河源朱洞吳天王曹總兵鄧都督等一十三圍并上下二山共有先峰三千餘兵五府六部俱全聲言起城立殿勢誠猖獗看得所呈各賊聚衆三千設官僣號即其事勢亦豈一朝一夕之故而各該府縣等官前此曾無一言申報據法即合拏究但稱所呈亦據傳聞未委虛的又慮萬一果如所呈各該官吏正在緊關勦截之際姑且俱未參提仰該道再行查勘的實果如前情即便一面嚴督各該官司加謹防遏一面議處機宜或移夾勦之回師或促候調之狼卒度量緩急相機而行如其事未猖揚情猶可撫亦要周防安插區處得宜俱仰火速具由呈來以憑議奏仍呈總督巡按等衙門公同計議施行呈繳批贛州府賑濟呈四月二十八日據贛州府呈本府贛縣等七縣將在倉稻谷糶銀賑濟看得兵革之餘民困未蘇加以雨水為災農務多廢雖將來之患固宜撙節預防而目前之急亦須酌量賑濟據該府所申計處得宜合行各縣照議施行仍仰各掌印官務須嚴禁富豪之規利痛革姦吏之夤緣庶官府不為虛文之應而貧民果沾實惠之及各具由回報申繳批嶺北道修築城垣呈五月十五日據副使楊璋呈所屬府衛縣城垣倒塌數多而石城一縣尤甚應該估計修理合委知府季斆邢珣不妨府事督修本府城垣龍南縣署印推官危夀興國縣知縣黃泗瑞金縣知縣鮑珉各委督修本縣城垣惟石城縣知縣林順柔懦無為合行同知夏克義估計督修看得城垣倒塌地方急務幸茲盜賊蕩平正可及時修築若患至而備則事已無及該道即行各該承委官員查照估算工程措置物料一應事宜各自從長議處呈奪各官務要視官事如家事惜民財如己財因地任力計日驗功役不踰時而成堅久之績費不擾民而有節省之美庶稱保障之職以副才能之舉呈繳查訪各屬賢否牌六月十九日節該欽奉勑諭軍衛有司官員中政務修舉者量加奬勸其有貪殘畏縮誤事者文職五品以下武職三品以下徑自拿問發落欽此欽遵切照當職撫臨贛州等處向因親勦群賊多在軍前所據大小衙門官員中間志行之賢否政務之修廢類皆未暇采訪擬合通行查報為此除布按二司本院自行詢訪外牌仰本道官吏即便從公查訪所屬軍衛有司官員要見某官廉勤公謹某官貪婪畏縮某官罷軟無為某官峻刑酷暴備細開造小册就于前件下填注印封密切馬上差人齎報以憑覆奏黜陟拿問施行毋得循情查報不公致有物議自取參究仍行本道各將掌印佐二等官年甲籍貫到任年月日期亦開前件揭帖一本印信各令差人齎報不得稽遲一仰廣東守巡嶺東嶺南道福建守巡漳南道湖廣守巡上湖南道同行漳南道禁支稅牌六月二十八日照得上杭河稅原係夲院欽奉敕諭軍馬錢糧徑自便宜區畫事理專為軍餉而設自來非奉夲院明文分毫不許擅自動支與該省各衙門原無干預牌仰該道官吏今後凡有相應動支止許具由呈稟夲院聽候批允不得一槩申請有乖事體漸開多門之弊反生侵漁之姦具依準􅌳牌禁約驛遞牌七月𥘉一日照得水西驛遞舊例每遇公差驗有真正關文隨即送赴軍門挂號此乃防姦革弊定規本院撫臨贛州未幾即因盜賊猖獗屢出勦平尚未淸查訪得近來多有姦詐之徒起一關文輒就洗改或改一名為二三名者或改紅船為站船者或改口糧為廩給者或改下等馬為中等上等馬者或該有司支應而夤緣驛遞應付者又有或看望親朋或經過買賣因與驛遞官吏相識求買關文詐偽百端若不挂號淸查非惟姦人得計仰且有乖事體為此牌仰本驛所官吏即便印鈐厚白申𥿄裝釘方尺文簿一樣二夲送赴軍門每遇公差關文驗無前項姦弊就與謄換隨送軍門挂號給付如或夲院出巡就赴該道兵備挂號中間若有交通私與關文或不經本院挂號潛行應付者定行拿問贓罪決不輕貸仍仰今後差撥船隻迎送止許各至交界驛遞倒換立限回還敢有貪圖過關米糧或權要逼勒過界者就便指實申來以憑拿問仍行嶺北道一體查照施行申明便宜敕諭七月二十一日節該欽奉敕廣東淸逺從化後山等處與爾所轄南韶等府壤地相接事體互相有關近該彼處鎮巡官奏稱盜賊生發師行有日如遇彼處行文徵兵協勦亦要隨即發兵前去防勦應援以收全功毋得自分彼此致失事機欽此欽遵照得南雄府界連南贛大庾信豐龍南等縣而惠州河源興寧亦各逼近賊巢俱係緊關奔遁潛匿之處進攻防截之路訪得前賊為患日久雖奉成命徴兵協勦誠恐賊計狡猾詐變東追則西竄南捕則北奔若不早為查處未免有悮軍機為此仰抄案回司會同三司掌印及各該守巡兵備等官上緊調集兵糧聼候剋期防勦并將應勦賊巢通行查出行拘熟知地利險易鄉導責令畫圗貼説要見某處賊巢連近某處鄉落某巢界抵某處係是良善村寨某處係是善惡相兼某處平坦可以直搗某處險阻可以把截某處係賊必遁之路可以設伏邀擊某處賊所不備可以間道掩撲何處官軍可以起調何官可以委用可以監統糧餉何處措辦住劄何處聼候各要查處停當備由馬上差人飛報夲院以憑遵照欽奉敕諭與各該鎮巡官計議而行其有軍中一應進止機宜亦要明白呈報毋分彼此致有踈虞國典具存罪難容恕仍呈總督鎮守巡按衙門知會犒賞新民牌七月二十八日據招撫新民張仲全陳順珠等呈解擒斬賊首池滿仔屠天佑等八名顆到院為照張仲全等始能脫離惡黨誠心向善已為可取又能擒斬叛賊立功報效即其忠勇尤足嘉尚所據張仲全合升授以百長陳順珠合升為總甲各給銀牌以酬其功其兵衆三百餘人皆能齊心協力擒捕叛賊俱合犒賞為此牌差百户周芳前去龍南縣著落當該官吏即將齎去銀牌給與張仲全陳順珠牛酒及賞功銀兩照數給與部下有功兵衆仍仰督同張仲全等整束部下兵衆會同王受鄭志高等并力夾勦殘賊務要盡數搜擒照例從重給賞其屠天祐手下走散兵夫原由牽引哄誘皆可免死仍仰張仲全遣人告諭但能悔惡來歸仍與安插或能擒斬同夥歸投者準其贖罪仍與給賞各役俱聽推官危夀等節制調度務要竭忠盡力愈加奮勇期收全功以圗報稱行嶺北等道議處兵餉八月十四日節該欽奉敕諭一應軍馬錢糧事宜俱聽便宜區畫以足軍餉欽此欽遵照得近因夾勦上猶桶岡等賊糧餉無措當時仰賴朝廷威德兩月之間偶速克捷不然必致缺乏今各巢雖已掃定而遺黨竄伏難保必無况廣東後山等處方議征勦萬一奔決過境調兵遏勦糧餉為先查得見行措置軍餉以防民患事例今後江西南贛等府有兵備去處各該軍衛有司所問囚犯審有家道頗可者不拘笞杖徒流并雜犯死罪各照做工年月每日折收工價銀一分送府收貯以備巡撫衙門軍情緩急之用雖有别項公務不得擅支仍要按季申報合干上司以憑稽考等因照得近來官吏因循不行查照槩將問追工價等銀俱稱類解買穀遂致軍餉無備甚屬故違具訪前項銀兩埋沒侵漁甚衆今姑未查究再行申明仰抄案回道著落當該官吏并行南贛二府衛所縣今後奉到問理等項笞杖徒流雜犯斬絞罪除有力納米照舊外其家道頗可者俱要查照先行事例折納工價俱收貯該府以備本院軍情緩急敢有故違者定行參以贓罪決不輕貸仍仰各置文簿二扇按季循環開報查考毋致隱匿仍呈撫按衙門知會再批攻勦河源賊巢呈八月二十一日據廣東嶺東道僉事朱昻等會呈河源縣賊巢一十三處勢相聮絡互為應援賊首吳何俊等并帽子峰賊首談廣護等招亡納叛不止二千餘衆纍歲荼毒生靈况又僣稱天王總兵都督等號罪惡滔天人神共怒必須請調大兵勦絶根由庶足以雪軍民之冤但此黠賊性尤凶強必藉狼兵可以搗巢攻寨大約以軍兵二萬有餘方克濟事合行布政司查議糧餉并賞功銀兩等項又據惠州府云云看得賊衆兵寡委難集事但動調狼兵亦利害相伴况開報賊巢前後不同合用糧賞俱合預行查處為此仰抄案回道會同各守巡兵備等官將各巢穴再行備細查訪若果賊巢衆多官兵分哨不敷必須添調狼兵仰即徑自呈請該省總督等衙門上緊起調若見在官兵略以足用可以不調狼兵亦免騷擾地方就仰選委謀勇官督同府衛縣所等官將各漢逹官軍兵快鄉夫預先起集選練于該府及近賊縣分密切屯劄勿令張揚候尅期已定然後晝伏夜行出其不意併擊合勦合用糧餉賞功等銀備行廣東布政司查照上年大征事體及時措備毋致臨期悮事如是兵糧措置俱巳齊備仰即馬上差人飛報軍門以憑親臨督戰或差官齎執令旗令牌分督進勦其各賊奔遁關隘相應江西防截者亦要上緊查報以憑調發各毋稽違致有失誤國典具存決難輕貸先選熟知賊情三四人赴軍門聽用軍中一應進止或未盡機宜應呈報者亦就上緊呈報仍呈總鎮鎮守巡按等衙門查照知會優禮謫官牌十一月二十七日照得本院奉命提督軍務征勦四省盜賊深慮才微責重懼無以仰稱任使合求賢能以資謀略訪得潮州府三河驛驛丞王思志行高古學問淵源直道不能趨時長才足以濟用惠州府通衢馬驛驛丞李中堅忍之操篤實之學身困而道益亨志屈而才未展合就延引以匡不及為此牌仰該府照牌事理措辦羊酒禮幣差委該縣教官齎送本官處用見本院優禮之意仍照例起關應付以禮起送前赴軍門以憑咨訪該驛印記别行委官署掌先具依準及禮過緣由繳牌批漳南道設立軍堡呈十二月𥘉三日據兵備僉事周期雍呈深田半砂等處負山濵海地僻人稀以致賊徒誘結勢漸猖獗今雖議立軍堡一時未得完工合行署都指揮僉事侯汴暫且住劄南韶設法擒捕候軍堡已完行令遵照欽奉敕諭前往武平縣駐劄看得所呈深田等處盜賊日漸猖熾各該巡捕等官因循坐視致令滋蔓俱合拏赴軍門但當用人之際姑且記罪仰該道嚴加督捕在目下靖絶以功贖罪及照該道原議設立軍堡十處每堡軍兵不過二三十人勢分力弱恐亦不足以振軍威而扼賊勢仰該道會同守備官再加酌量如果軍堡工費浩大且可停止將各堡該戍軍兵分作兩營選委勇官二員分統于各該盜賊出沒地方絡繹搜捕每月限定往來次數就仰經過縣分按月開報兵備官處不時考較督責其該設軍堡止于每日程途所到去處建立一所以備宿歇非獨省費易舉亦且勢并力合地方可恃以無恐盜賊聞風而自息矣但事難遙度該道仍須計審詳議一面呈報務求至當亦無苟從再照前項地方盜賊日盛備禦未立準議暫委守備侯汴前往南韶住劄嚴勦捕以靖地方稍候武備既設施行有次仍舊還歸武平住劄該道照議批呈事理即便備行本官查照施行俱毋違錯再申明三省敕諭十一月十二日節該欽奉敕該兵科給事中周文熙奏湖廣郴衡地方徭賊不乘時處置抑恐遺孽復滋重貽後患乞要推舉撫治憲臣一員前去會同湖廣廣東江西鎮巡三司等官相度事宜或設添衛所縣治或置立屯戍屯堡或仍敕爾每年春夏在南贛等處秋冬在郴衡等處住劄整理庶幾委任專一有備無患等因該部議謂宜如所奏施行今特敕爾親詣郴衡等處地方照依周文熙所奏并查照御史王度唐濂及僉事顧英等建言事理從長議處定立長治久安之法應施行者徑自會同各該鎮巡等官從長施行事體重大者奏請定奪爾為風憲大臣受兹委托尤宜廣詢慱訪擇善而行務使盜息民安地方有賴欽此欽遵卷查先準兵部咨為圗議邉方後患事該兵科給事中周文熙奏該本部覆題已經案仰湖廣都布按三司即行該道守巡兵備等官一體欽遵各詣郴桂衡州等處督同各該掌印等官相度山川險易之勢咨訪賊情起伏之由查照各官建言事理從長議處方略要見某處可以開建縣治某處相應添設衛所某處營堡宜修某處道路宜開備詢高年有識務宜土俗民情如或開建添設等項有勞于民無輔于事亦要明白聲説毋拘成議附和雷同别有防姦禦患長䇿俱要備細呈奪毋憚改作仰惟朝廷采納羣䇿非徒茍為文具諒在各官協心承委決無了塞公移務竭保民安土之謀共圗久安長治之䇿應施行者就便具由呈來以憑會議施行若有事體重大該具奏者亦即呈來奏請定奪去後今奉前因擬合通行為此仰抄案回司即行掌印并各該道守巡兵備守備等官一體查照欽遵作急議報施行毋得稽違仍行鎮守巡撫總督總鎮巡按衙門知會批贛州府給由呈十二月二十五日據知府邢珣申給由事照得知府邢珣久勞郡政屢立戰功合有賞功之典出于報最之外今三年之考既因事久稽而六載之期亦計日非逺况地方盜賊雖平瘡痍未起仰行本官照舊支俸益弘永圗苟有善可及民何厭久于其道微疾已痊即起視事給由一節六年并考申繳行嶺北道裁革軍職巡捕牌十四年五月𥘉五日訪得南贛巡捕軍職官員有名無實每遇火盜生發坐視觀望曾不以時策應中間更有不守法律在于私宅接受詞訟嚇取財賄𥿄米或捕獲一賊則招攀無干之人乘機詐騙僉充總小甲則需索拜見更換鋪夫則索要年例稍或不從百般羅織又如前往所屬巡邏則索要折乾刻取酒食甚至容隱賊徒竊分贓賄欲便拏究緣無指實查行間為此仰抄案回道即將巡捕軍職官員就便裁革一應地方事宜俱令府縣捕盜等官管理中間倘有未盡事宜該道再行議處呈奪仍候考選之日備呈鎮巡等衙門查照知會遵奉欽依行福建三司淸查錢糧五月二十七日準兵部咨云云查得先準夲部咨題奉欽依備行前來已經案仰福建都布按三司并行所屬一體欽遵仍查各該府縣衛所每年額徴各項秋屯糧米各計若干中間起運每石折銀若干魚課折銀若干存留數內應否輸納本色折收銀兩見今小民拖欠者已徴若干未徵若干有無已徴揑作未徴其各衛所軍士該支月糧某衛所若干石見今某衛所已缺支若干月共該輔給米若干石起運秋屯糧米要查是何年月奉何事例分派某府衛所解京今經幾年是否巳為定例設若存留必須先查各屬官吏師生旗軍人等歲用錢糧大約共計若干有無足勾及查該司并各府州縣見貯庫內銀兩某項共計若干中間可以借支俟後追輔如是扣算不敷應否將前起運存留并查汀漳二府用兵之時所用糧餉係何項錢糧曾否將官軍月糧借輳務要備查明白具由差人馬上齎報一面會同三司掌印守巡各官將一應利弊相應興革者逐一查議停當俟本院撫臨之日呈奪去後今準前因合再通行查處為此仰抄案回司即行掌印并各道守巡等官公同本院委官速將前項事情再加用心查議務要事體穩當以便經久明白具由開呈以憑會處中間若有未盡事宜亦就查議呈奪毋得虛應故事茍且目前復遺後患罪有所歸議處添設縣所城堡巡司咨五月三十日準兵部咨云云續據湖廣按察司呈奉巡撫湖廣都御史秦案驗為計處地方以弭盜賊事準兵部咨該本院題備由呈報及移咨到院案候間今準前因為照添設縣所查處更夫并設屯堡置巡司等項事宜俱奉有成命况皆經巡撫衙門悉心區畫各已慮無遺䇿豈能别有議處惟稱分割乳源樂昌二縣里分節行廣東該道會勘未報尚恐兩省各官未免互分彼此不肯協和成事必須貴院不憚一行親臨其地約會總督兩廣軍務都御史楊面會一處庶幾兩省之事可以一言而決及照建立三屯摘發湖廣各衛所官軍協同巡檢弓兵守把一節以今事勢而論亦為久長之防但訪得各衛所官軍皆有安土重遷之懷無故摘撥必致奏告推搪非惟無輔于防禦兼且徒益于紛擾似須更為一處必使人情樂從庶幾事功易集本職見奉朝命前往福建巡視地方處置軍人作亂事情不日啓行必須遵照敕旨候事完回日方可親詣郴衡地方面會貴院議處但恐曠日彌久行事益遲為此合咨貴院煩請先為查處施行督責哨官牌六月𥘉七日照得本院見往福建公幹所有調來贛州教場操備寧都等縣兵快雖分四哨管領已有定規惟恐本院逺出因而懈怠廢弛頭目人等亦或受財放逃必須委官管領操備為此仰千百户孫𥙿等各照軍門原分哨分用心管領不時操練務使行伍整肅武藝精通中間若有拒頑不聼約束者輕則量情責治重則論以軍法斷處其各兵快義官百長人等口糧各照近日減去五分則例每月人各二錢義官百長各三錢五分總小甲各二錢五分俱仰前去贛州府支給亦不許冒名頂替關支查訪得出定行追給還官仍問重罪發落承委各官務稱委托不得假此生姦擾害未便委分巡嶺北道暫管地方事六月𥘉六日據副使楊璋呈奉兵部劄付題稱福建軍人作亂事情請敕提督南贛等處軍務都御史王前去處置其南贛等處地方事情合行兵備副使楊璋暫且代替管理一應緊急賊情悉聼楊璋徑自從宜施行不許失悮候處置福建事寧之日照舊等因題奉欽依備由劄仰欽遵外今照本職升任本司按察使啓行在邇缺官管理合就通行呈詳等因看得本官既已升任本院不日又往福建公幹南贛賊情及該道印信必須得人經理已經案仰江西按察司速委風力老成堂上官一員毋分星夜前赴該道暫且管理去後今照前因為照本院已奉敕書的于本月𥘉九日啓行但分巡該道官員未至所有各處遞報一應公文多係地方事務若待議置停當前去未免顧此失彼愈加積滯合行處置為此仰抄案回府凡遇各該官司齎到一應公文除地方賊情重事俱仰差人送赴分巡該道議處徑自施行仍呈本院知會其餘地方盜息民安繳報批申呈詞招由不急之務就便收候類齎本院仍仰作急備行該道查照施行俱毋違錯思田公移凡四十九條行廣西統領軍兵各官剿撫事宜牌嘉靖六年十一月𥘉五日先據領兵參政等官龍誥等稟稱湖兵巳至巳經行令相機行事去後近訪得各兵已入深地利在速戰若曠日持久未免師老氣衰且臨敵易將進退之間呼吸成敗是以本院沿途且行且訪而傳聞不一未有的報為此牌仰統兵各官公同計議若已在進兵之際則宜遵照舊任提督軍門約束齊心并力務在了事方許旋回軍門參謁若猶在遲疑觀望之地而王受盧蘇等尚有可生之道朝廷亦豈以必殺為心則宜旋軍左次開其自新之路聼候本院督臨審處俱毋違錯仍行提督總鎮總兵及巡按等衙門知會務在進退合宜不得輕忽誤事行南韶二府招集民兵牌十一月十二日牌仰韶州南雄府當該官吏即于該府地方及所屬各縣不拘機兵打手各色人內訪求武藝驍勇膽力之士超群出衆以一當百者每府三名或四名每縣二名或三名無者于别縣通融取輔務要年齒少壯三十歲以下者每月給與工食八錢就于機快工食內頂貼仍與辦衣裝器械各名備開年貌親族鄰里限一月之內送赴軍門應用毋得遲違奬留僉事顧溱批呈十一月二十三日看得士大夫志行無慚不因毀譽而有榮辱君子出處有義豈以人言而為去留况公論自明物情巳覩夲官素有學術涵養正宜動心忍性以增益其所不能豈可托疾辭歸以求申其憤激此繳批嶺西道議處兵屯事宜呈十一月二十三日據僉事李香呈看得財匱于兵冗力分于備多此是近日大弊相應議處所呈打手且不必添募仰將該道屯哨分布打手通行查出大約共有若干再加精選去其劣弱大約共得驍勇若干及查某處屯堡可裁某處關隘可革大約共用打手若干某哨堪備操演分聚開闔若何而力不分若何而財不費若何而免于屯兵坐食若何而可以運謀出竒該道會同分守道通融斟酌務求簡易可久之道呈來施行批廣州衛議處哨守官兵呈十一月二十五日據指揮趙璇呈看得軍門哨守官軍兩班共該一千餘名類皆脆弱不堪征調兼亦逺離鄉土往往多稱疾故逃亡非徒無益于公家之用而抑未便于軍士之情仰蒼梧守巡道公同會議酌量利害之多寡審察人情之順逆務求公私兩便經久可行之䇿呈來定奪施行此都指揮李翶操演哨守官兵呈十一月二十七日看得都指揮李翶所呈足見留心職任不肯偷惰茍安有足嘉尚仰分巡蒼梧道公同坐營官張輗將見在哨守軍兵打手人等分立班次發與李翶在于教場輪班操演使兵識將意將識士情庶職任不虛緩急可用仰行各官查照施行行兩廣都布按三司選用武職官員十二月𥘉七日準兵部咨云云為照兩廣地方廣闊武職官員數多當爵鎮􅎔之𥘉賢否一時未能備知擬合通行詢訪為此仰抄案回司備云該部題奉欽依內事理合行掌印守巡等官欽遵嚴加詢訪不拘已用未用曾否減革武職官員但有謀勇素著雄才大略堪任將領者從公舉保以憑具奏推用不許循情濫舉贓犯人員自貽玷纍毋得違錯都司仍轉行總兵等官一體欽遵查照施行行兩廣按察司稽查冒濫關文十二月十二日準兵部咨云云擬合通行為此仰抄捧回司照依案驗備奉欽依內事理即行都布二司一體欽遵仍轉行鎮守主副參將等官今後除地方機密重情應該會奏者各具本共差一人于批文列會奏職銜其餘常行事務各自行奏報者必須積至二三起以上方許差人亦于批文開坐硃語以便稽考毋得泛填公務字樣若是專為已私假借公幹擅便分給符驗關文挂號并承委人等越例索要應付定行從公參究治罪俱母違錯給思明州官孫黃永寧冠帶劄付牌據左江兵備僉事吳天挺呈據思明府族目王瑙等狀告先蒙軍門行取思明州官孫黃永寧頗兵聽調乞給冠帶管轄夷民等情勘得官孫黃永寧𬒳占年久今奉斷明若非寵異無以示信合請照依黃澤冠帶事理使地方知為定主實心歸向呈詳到院相應給與為此牌仰官孫黃永寧遵照本院欽奉敕諭內便宜事理就彼暫行冠帶望闕謝恩該襲之時具告撫按衙門另行具奏施行本官孫黃務要持身律下謙以睦鄰修復州治保安境土凡遇征調竭忠效命以報國恩毋得因此輒興越分之思自取侵凌之禍苟違法制罰罪難逃戒之敬之省發土官羅廷鳳等牌十二月十七日看得那地等州土官羅廷鳳泗城州土舍岑施東蘭州知州韋虎林南丹州土舍莫振亨等帶領兵夫屯守日久勞苦良多即今歲暮天寒豈無室家之念牌至仰本官徑自前來軍門面聼發放給遷隆寨巡檢黃添貴冠帶牌嘉靖七年正月𥘉八日據廣西左江道僉事吳天挺呈稱查得方輿勝境內開思明路下有遷隆州緣無志書案卷可考沿革但查遞年黃册及審各目老皆稱遷隆洞黃添貴果係官户宗枝凡有征調黃添貴亦果領兵立功其地界廣有百里雖止征糧四十石而煙㸑多踰二千雖額屬思明而征兵則各自行管束委因失其衙門印信以致地方懷疑生姦合無準行暫立為思明府遷隆寨巡檢司就授黃添貴職事聽其以後立功積效漸次升改庶人心知勸地方可定等因到院查得先該前巡撫都御史張纍經案仰廣西都布按三司及該道兵備守巡等官查勘相同設立巡司似亦相應除另行具題外緣黃添貴正在統兵行事合無遵照欽奉敕諭便宜事理先與冠帶以便行事為此牌仰黃添貴就彼冠帶望闕謝恩暫署土巡檢司事候命下之日方許實授本官務要奉法嚴束下人輯和鄰境保守疆土每遇調遣即便出兵報效立有功勞賞升不吝如或貪殘恣肆國典具存罪亦難逃批左州分俸養親申正月十八日據左州申知州周墨分俸回太倉州養親看得本官發身科甲久困下僚雖艱苦備嘗而貧淡如故雖折挫屢及而儒朴猶存凡所施為多不合于時尚而原其處心終不失為善人即其分俸一事亦豈今之仕宦于外者所汲汲而夲官申乞不已雖屢遭厭抑之言而愈申懇切之請固流俗共指以為迂而君子反有取焉者也案照先任軍門蓋已屢經批發而公文至今未到想亦道途修阻不易通逹之故本官近該給由道經原籍合就批仰親自齎遞仰蘇州府太倉州當該官吏查照軍門先今批行事理即將本官分回俸給照數查考以慰其一念孝親之誠具由􅌳報仍行太平府及該州知會此繳批右江道斷復向武州地土呈正月二十六日據參議鄒輗僉事張邦信呈勘處都康向武二州爭占安寶洞地土合斷還向武州管業緣由看據所呈官男馮一執稱安寶洞深入地方都康界內逺隔向武六十餘里以近就近應該都康管業其言于人情似亦為便王仲金又執稱國𥘉設立郡州原要犬牙相制今安寶地方深入都康正是祖宗法制其言于國典又為有據况慱訪民間物論亦多是向武而疑都康今該道又審得王仲金舊藏吏部勘合奉有聖旨安寶洞村莊還著向武州管是實先年都康州又曾有印信吐退文書今以此地斷還向武其于天理人心公論國法悉已允當事在不疑不必再行後湖查册往復勞擾該道又審得王仲金先年混將都康州村洞人畜殺虜要依土俗責令陪償亦于事理相應悉照所議取具王仲金馮一情願陪償吐退歸一親筆供詞備寫劄付用印鈐連送赴軍門重加批判給付各州永為執照以杜後爭此繳批左江道推立土官呈二月𥘉一日據參議汪必東呈稱武靖州缺官管事乞推相應上官子孫一員仍授該州職事理辦兵糧仰布政林富會同各守巡兵備副參等官再行從公酌量計議採諸物論度諸人情務要推選素有為該州人民信服愛戴者坐名呈來以憑上請不得苟避一時之嫌疑不顧百年之禍患輕忽妄舉異時事有乖繆追咎始謀責亦難辭此􅌳批遣還夷人歸國申二月十四日據兵備副使范嵩呈稱畨人奈邦等不係畨賊又無别項為非重情合行瓊州府查支官銀買辦船隻量給米飯送回該國若有便船搭附隨宜其原搜獲葫蘆五箇給還收領鎗􅝑等物入官以防在海劫奪之患看得各夷既審進貢是實又無别項詐偽相應聽其回還本國却淹留日久致令死亡數多而郡縣徒增供饋之擾處置失宜貽纍不少仰該道即如所議行令瓊州府查支官銀買辦船隻及措與糧米等項趂此北風未盡上緊送發回國若再會議往復則愈加遲悮備行合干衙門知會施行􅌳批蒼梧道修理梧州府城呈三月十一日據僉事李傑呈梧州府城垣修復串樓等項合用木石甎瓦于府庫抽收竹木銀兩動支看得城上串樓雖有風雨崩塌之備亦有兵火焚毀之防得失相半誠有如該道所慮者今議修復雖亦舊貫之仍若損多益少則亦終為浪費該道再行計處或將見在串樓間節折卸每隔二三十丈則存留三四間或四五間以居防守之兵夫而拓其空地以絶延燒之患一以便人馬往來之奔突旗鼓刀槍之運用以其折卸之材料修輔焚燒之空缺當亦綽然有餘而更樓火鋪之類亦可藉此以修理矣但地利土宜隨處各異未可以夲院一時之見懸斷遙度仰該道廣詢博訪如果有益無損即查本院所議斟酌施行若是得失相半準如該道所呈一面動支銀兩修理一面會同各官再加量度計議具由呈報繳批永安州知州乞休呈三月十四日據僉事申惠呈永安州知州陳克恩立心持已舉無可議委因感嵐瘴心氣不時舉發仍稱母老在家久缺奉侍情甚懇切看得知州陳克恩雖患前病是實然其年力尚強才器可用非可準令休致之時但以母老多病固求歸養情詞懇迫志已難奪其恬退之節孝母之心誠有可尚合照所議準令致仕還鄉仰􅔜道仍備行本官原籍官司務要以禮相待以崇奬恬退孝行之風行參將沈希儀守八寨牌二月二十三日為照八寨巢穴及斷藤峽等賊素與柳慶所割地方猺獞村寨連絡交通誠恐乘機奔突亦合督兵防捕為此牌仰參將沈希儀照牌事理即便督率官兵人等于賊衝要路嚴加把截如遇奔突相機擒捕毋容逃遁仍要嚴禁下人惟在殄除真正賊徒不得妄殺無辜及侵擾良善一草一木敢有違犯者即照軍法斬首示衆所獲功次解送該道分巡官紀驗聼候紀功御史覆驗造報軍中事宜牌內該載不盡者亦聽本官徑自酌量而行一面稟報俱毋違錯行左江道勦撫仙臺白竹諸􅍹牌三月二十四日照得白竹古陶羅鳳仙臺花相石馬等巢諸賊皆稔惡多年在所必誅巳經牌仰各官督兵進剿近據參將張經續稟仙臺花相石馬等猺一月之前皆各出投撫願給告示從此不敢為惡看得各猺投撫誠偽雖未可料但既許其改惡若復進兵襲勦未免虧失信義無以心服蠻夷亦合暫且寬宥容其舍舊圗新其白竹古陶羅鳳等賊負險桀驁略無忌憚若不加勦何以分别善惡明示勸懲為此牌仰左江道守巡守備等官參議汪必東僉事吳天挺參將張經會同湖廣督兵僉事汪溱都指揮謝珮督同各宣慰等官俟牛腸等處事完之日即便移兵進勦白竹古陶羅鳳諸賊其領哨官員及引路向導人等俱聼參將張經督同指揮周㣧宗等分俵停當照例逐一講明然後分投速進縱使諸賊先巳聞風逃避亦要嚴兵深入搗其巢穴以宣明本院聲罪致討之義一勦不獲至于再再勦不獲至于三至四至五至絶終禍根不得以今次斬獲之少或遂濫及巳招賊巢虧失信義所損反多經過良善村分尤要嚴禁官土軍兵不得侵犯一草一木有犯令者即以軍法斬首示衆委土目蔡德政統率各土目牌四月𥘉一日為照前項城頭兵糧等項雖經行令各目暫行管理但在流官知府處必須通曉事體土目一人專一在府聼候傳布政令通逹土情不然未免上下之情亦有扞格查得土目蔡德政平日頗能通曉事情相應選委為此牌仰本目統率各土目供應人役專一在府聽候答應凡遇差遣及催督公事等項就便遵照傳布督催各管城頭上目人等或有未便情由亦與申逹本府務通上下之情以成一府之治就將七處一城頭撥與本目永逺食用流傳子孫本目務要奉公守法盡心答應其或違犯節制輕則該府官量行究治重則具由三府軍門治以軍法批左江道查給狼田呈四月十一日據僉事吳天挺呈稱遵奉軍門方略勦平牛腸六寺磨刀等賊所有賊田合行清查免致紛爭宜選委府衛賢能官親查酌量應給還狼民者明立界至給還原主耕種係賊開墾者丈量頃𤱔均給各里十名招狼佃種俱候成業一年方行起科納糧免差本院之意正欲如此區處據呈足見該道各官用心之勤悉準照依所議就仰行委該府衛賢能官各一員親臨踏勘淸查明白酌量給派招佃具由呈報行潯州府撫恤新民牌照得潯州等處稔惡猺賊既已明正討伐其奔竄殘黨亦合撫處但其驚懼之餘未能遽信必須先將附近良善厚加撫恤使為善者益知勸勉然後各賊漸知歸向方可以漸招撫除行守巡該道施行外牌仰知府程雲鵬等即行會同指揮等官周㣧宗等及各縣知縣等官分投親至良善各寨照依案驗內開諭事情諄復曉諭就將發去告示魚鹽量行分給務使向善之心愈加堅定毋為殘賊所扇誘則良民日多而惡黨日消又因而使之勸諭各賊令各改過自新果有誠心來投者即與招撫就便清查侵占田土以絶後爭推選衆所信服之人立為頭目使各統領毋令散亂以漸化導務使日益親附庶幾地方可安而後患可息各官務要誠愛惻怛視下民如已子處民事如家事使德澤垂于一方名實施于四逺身榮功顯何所不可如其茍且目前虛文抵塞欺上罔下假公營私非但明有人非幽有鬼責抑且物議不容批興安縣請發糧餉申四月十三日據興安縣申稱本縣庫內並無軍餉銀兩亦無堪以動支官錢誠恐湖兵猝至不無誤事合無請給發軍餉銀兩下縣先顧船馬參看湖兵歸途合用廩給口糧下程犒勞等項已經各有成議自南寧府至梧州止又自梧州至桂林府止又自桂林至全州止各經過幾縣幾驛每縣驛扣算該銀若干各于該府軍餉銀內照數一并支給各州縣止是應付人夫數十名再不許别項科派勞擾已行該道守巡等官通行各該府縣查照施行去後今已兩月有餘而各州縣尚罔聞知不知該道各官所理何事似此緊急軍務尚爾遲慢其餘抑又可知姑記未究外仰按察司將該吏先行提問仍備行各道守巡官今後該行職務各要自任其責可行即行可止即止悉心計處事體重大自難裁決者即為定議呈稟必使政無多門之弊人有畫一之守毋得虛文委下推避傍觀州縣小官無所遵承紛然申擾奔走道路延誤日月矌職廢事積弊滋姦推厥所由罪歸該道各具不違依準回報查考繳行廉州府清查十家牌法四月十六日案照本院先行十家牌諭專為息盜安民訪得各該官員因循怠惰不行經心幹理雖有委官遍歷城市鄉村查編亦止取具地方開報代為造繳其實未曾編行且承委人員反有假此科取𥿄張供給或乘機清查流民分外騷擾是本院之意務要安民而各官反以擾民也本𣣔拏究緣出傳聞姑侯另行所有前項牌諭必須專委賢能官員督查清理為此牌仰廉州府推官胡松先將該府及所屬州縣原編牌諭不論軍民在城在鄉逐一挨查務著實舉行仍須責令勤加操演若各官仍前虛文搪塞者指實參究果有科罰騷擾等項仰即拏問究治仍行各官務將牌諭講究明白必使胸中洞徹沛然若出巳意然後施行庶幾事有條理而功可責成各府州縣以次清理非獨因事以别勤惰且將旌罰以示勸懲各具講究過依準􅌳報查考又訪得各處軍民雜居之地多有桀驁軍職及頑梗軍旗不服有司清查約束妨礙行事者仰行重加懲治應參職官指名申來以憑拏究斷不輕恕行右江道招回新民牌五月𥘉六日仰右江道副使翁素即便選委的當官員帶同上林縣知因曉事之人將一十八村搬移上山者通行招回復業給與良民旗榜使各安守村寨仍諭以其間有與賊交通結親往來者但能搜捕賊徒立功自贖即不追論既往一體給賞仍要催督分差各官上緊搜捕毋令各賊奔逃漸逺曉諭各該地方良善向化村寨務將逃躲各賊盡數擒斬以泄軍民之憤獲功解報一體給賞若是與賊通謀容留隱蔽訪究得出國憲難逃如是各賊果有誠心悔罪願來投撫立功報效者亦準免其一死帶來軍門撫諭安插各官務要盡心竭力上報國恩下除民患副軍門之委託立自己之功名仍督平日與賊交通之人令其向導追捕痛加懲改及此機會立功自贖果能奮不顧身多獲真正惡賊非但免其既往之罪抑且同受維新之賞若猶疑二觀望意圗苟免定行斬首示衆斷不虛言各官舍目兵人等若有解到功次即與紀驗明白以憑照例給賞事完之日通送紀功御史衙門覆驗奏報一應機宜牌諭所不能盡者就與副總兵張祐計議施行一靣呈報夲院不久亦且親臨各該地方躬行賞罰仰各上緊立功毋自貽悔委官贊畫牌五月𥘉七日今差知州林寬齎文前往賔州思恩等處公幹就仰本官在右江道守巡官處隨軍贊畫一應機宜不時差人前赴軍門稟報其領兵頭目盧蘇等亦要遣人催促上緊剿捕立功報效毋得怠惰放縱玩廢日月徒勞無功本官務要盡心竭慮以副委託行參將沈希儀計剿八寨牌五月𥘉九日近因八寨猺賊稔惡已經調發思田目兵攻破賊巢方在分投搜捕訪得八寨後路潛通柳州又有一路與韋召假賊巢相通皆未委虛的合行密切查處為此牌仰參將沈希儀即行密訪若果有潛通賊路就仰夲官從宜相機行事或從彼地掩襲韋召假賊巢就從彼巢徑趨八寨後路或以迎候夲院為名徑來賔州督調别項軍兵就從八寨取道然須將勇兵精又得知因向導可以必勝夲院亦無意必之心俱聽本官相機行事量力可行即行可止即止牌至務在愼密毋令一人輕泄調發土官岑瓛牌五月𥘉十日牌仰歸順州官男岑瓛挑選部下驍勇慣戰精兵二千名各備鋒利器械親自統領前赴軍門面授約束有事差委所帶兵夫但在精勇不許徒多軍門不差旗牌官員正恐張揚事勢騷擾地方故今止差參隨百户扈濂前去密切督調前月官男赴軍門參見已曽當面分付牌至限三日內即便起程星夜前來毋得循常遲慢違誤刻期定行究治決無虛言分調土官韋虎林進勦事宜牌五月十五日除行守備參將沈希儀相機行事及差南寧鎮撫朱鈺齎捧令旗令牌前去督調外牌仰東蘭州知州韋虎林挑選驍勇慣戰精兵三四千名親自統領就於該州附近三旺德合等處取道密切進兵撲勦下岜中寨尋令東鄉馬攔南嶺新村莫村落村等寨賊首韋召蠻召曠召假召僚召號召旺天臘公線仲言轉周韋馬覃廣覃文祥等務要盡數擒斬以靖地方所獲功次通行解赴軍門以慿紀驗給賞如遇參將沈希儀已到地方仍聽節制行事若是尚未來到仰即火速進勦不必等候以致張揚泄漏失誤事機罪有所歸行通判陳志敬查禁田州府私徴啇稅牌五月十五日據委官通判陳志敬呈稱查得田州府舊例鹽每百斤稅銀一分夲府河埠稅銀四分半經紀稅銀三分檳榔每百斤稅銀一錢夲府稅課并經紀各稅銀二錢其雜貨亦各稅不一除買辦應用年終俱歸夲府此岑猛之餘烈也今尚因之而未除要行照依南寧府事例止容一稅等因到院參看得思田二府近該夲院會議設立流官知府控制土官各以土俗自治其官吏合用柴薪馬匹及春秋祭祀等項仍許啇課設於河下薄取其稅以資給用而本院明文尚未有行乃敢輒先私立抽分巧取民利甚屬違法合當拿問緣無指實合行查究為此牌仰本官即查前項抽分奉何衙門明文惟復積年姦猾私立巧取侵騙稅銀肥巳務要從實查明具由星馳呈報一面密切差人訪拿解赴軍門究治以軍法論毋得容情回護自取罪戾批南寧衛給發土官銀兩申五月十八日據南寧衛申原收王仲金陪償都康州銀二百兩令官男馮一差頭目黃淰等四人來領看得王仲金倍償銀兩既該馮一差有的當頭目黃淰齎有該州印信領狀前來關領仰衛審驗是實即將銀兩照數給與黃淰等帶領回州付與馮一收受取收過日期回報仍行該道守巡官備行馮一王仲金務要洗滌舊嫌講信修睦各保土地人民安分守巳同為奉法循禮之官共享太平無事之樂如其不能自為主張聽信小民扇惑規圖近利懷挾前仇徒使利分下人惡歸一巳貫滿罪極滅身亡家前車可鑒後悔何及各遵照奉行此繳批左江道紀驗首級呈五月二十八日據僉事吳天挺呈獲過牛腸六寺古陶羅鳯等處山巢賊級中間無小功者應否紀驗看得各處用兵多因貪獲首級不肯奮庸破敵往往多致失事是以前月發兵之日本院分付督兵各官務以破巢誅惡為事不以多獲首級為功今若以無小功之故不與紀驗即與前日號令自相矛盾矣其湖兵破巢首級雖無小功仰該道仍與紀驗至於官軍人等勦捕所獲仍照常規施行繳行左江道犒賞湖兵牌六月𥘉十日照得湖廣永保二州官舍頭目土兵先該本院撤放回還道經潯州等處已經行仰該道守巡等官督押前進乘便勦除稔惡􅍹賊隨巳破蕩巢穴擒斬數多回報前來就經牌仰各官仍押各兵直抵桂林地方交替及行參議汪必東就於梧州府庫量支軍餉銀一二千兩帶去省城聽候本院親行犒賞今照本院因地方有事兼患腫毒未能親往行委該道僉事吳天挺前去省城代行賞勞為此牌仰本官即查前項銀兩若未動支就於該府軍餉銀內照數動支二千兩委官管領隨帶廣西省城聽候支給犒賞湖兵等項應用完日開數查考奬勞督兵官牌六月𥘉十日照得先因廣西思田等處土酋倡亂徴調湖廣永保二司宣慰舍目人等坐委僉事汪溱都指揮謝珮統領前來聽調勦殺後因各酋自縳投順班師回還又該軍門行委各官統領乘便征勦潯州牛腸六寺及平南仙臺花相等山積年稔惡賊寇遂能攻破堅巢多有斬獲雖各宣慰素抱報國之心舍目人等并心協力奮勇效命亦由監督各官設䇿運謀用能致有成功今師旋有日所據宴勞之禮相應舉行但本院見征八寨徭賊未能親至省城大享軍士合就先行奬勞為此仰夲官即便親諳省城公同布按二司掌印等官將軍門發去綵假銀花等物照數備用鼓樂導送僉事汪溱等收領用見本院嘉獎宴勞之意仍行鎮巡衙門知會計開僉事汪溱盤盞一副十兩段二匹十兩銀花二枝二兩席面一卓銀十兩都指揮謝珮盤盞一副十兩段二匹十兩銀花二枝二兩席面一卓銀十兩部押指揮二員每員銀牌五兩銀花一枝五錢席面銀二兩分押千户八員每員銀牌三兩銀花一枝五錢席面銀一兩土舍彭藎臣軍前冠帶劄付六月𥘉十日據湖廣上湖南僉事汪溱呈據辰州衛部押指揮張恩呈據舍目彭九臯等告稱嘉靖五年奉調征勦田州有廕襲官男彭虎臣同弟彭良臣自備衣糧報效蒙投彭虎臣冠帶殺賊後因陳亡蒙軍門奏奉欽依勘合內開彭虎臣殁於王事情可矜憐贈指揮僉事移恩弟彭良臣就彼冠帶襲替宣慰使職事免其赴京伊父彭九霄仍升湖廣布政司右參政準令致仕除遵依外近奉軍門復調征勦行令致仕宣慰彭九霄親統啓行不意宣慰使彭良臣在任病故有彭藎臣係宣慰的親次男見年一十四歲與故兄彭良臣同毋冉氏所生應該承襲别無違礙乞比照永順土舍彭宗舜事例賜給冠帶撫管地方等情為照土官襲替必經原籍該管衙門委官重覆查勘今彭藎臣不在隨征之列未經結勘但伊父彭九霄見在統兵本舍又稱選帶家丁三千名前往報效似應俯從呈詳到院為照彭藎臣本以章一早著英風自選家丁隨父報效即其一念報國之誠已有可嘉况有查係應襲次男近日報效家丁於潯州平南諸處又能奮勇破賊斬獲數多則藎臣身雖不出戶庭而功已著於異省除别行具題外合就遵照欽奉勑諭內便宜事理給與冠帶為此劄仰官舍彭藎臣先行冠帶就彼望闕謝恩撫管地方仍須立志持身正已律物顧章服之在躬思成人之有道念傳世之既逺期紹述於無窮益竭忠貞以圖報稱先具冠帶日期依準繳報仍徑行夲省鎮巡衙門知會毋得違錯獎勞永保二司官舍土目牌六月𥘉十日照得先因思田等處土酋倡亂復調永保二司宣慰彭明輔彭九霄各統領舍目聽調勦賊後因各酋自縛投順班師回還又該軍門行委各官統領乘便征勦潯州牛腸六寺及平南仙臺花相等山稔惡賊寇遂能攻破堅巢多有斬獲是皆各宣慰及伊官男平日素抱忠誠報國之心故能身督各舍目人等并心協力奮勇效命致有成功今師旋有日所據宴勞之禮相應舉行但本院見征八寨猺賊未能親至省城大享軍士合就先行奬勞為此牌仰本官即便親詣省城公同布按二司掌印等官將軍門發去禮物照依後開數目各用鼓樂送發宣慰彭明輔彭九霄等收領用見夲院嘉獎宴勞之意各宣慰官舍目兵人等查照單開等則逐一支出賞犒就彼督發各兵回還休息支過數目開單查考俱仍行鎮巡衙門知會計開保靖宣慰司宣慰彭九霄盤盞一副十兩段二匹一兩重金花一枝一兩重銀花一枝席面銀五十兩官男彭藎臣銀花二枝各一兩假二匹席面銀二十兩永順宣慰司宣慰彭明輔盤盞一副十兩假二匹一兩重金花一枝一兩重銀花一枝席面銀五十兩官男彭宗舜銀花二枝各一兩假二匹席面銀二十兩冠帶把總頭目每名三兩重銀牌一面領征管隊冠帶頭目每名二兩重銀牌一面旗甲小頭目洞老每名一兩重銀牌一面隨征土兵每名銀二錢家丁銀一錢病故頭目每名銀四兩病故土兵每名銀二兩首級每顆銀一兩賊首銀三兩生擒每名銀二兩調發武緣鄉兵搜勦八寨殘賊牌六月十八日先該本院進勦八寨賊巢已破但餘黨逃遁尚須追捕訪得各處鄉民素𬒳前賊劫害多有自願出力殺賊報讎及訪得武緣縣地方嬰墟等處鄉兵素稱驍勇慣戰皆肯為民除害已經牌差經歷羅珍等前去起調誠恐各官因循姑未究治看得通判陳志敬蒞官日久前項嬰墟等處鄉兵曽經訓緝頗得其心合委催督為此牌仰本官速往嬰墟等處即將前項鄉兵量行選調多或一千五百名少或八九百名各備鋒利器械仍督經歷羅珍等分統前赴賔州照名關支行糧等項就彼相機搜勦前賊仍聽參將沈希儀調度節制獲有功次一體重加旌賞仍諭以當此農忙暑月本院亦不忍動勞爾民但欲為爾民除去地方之害不得已而為此爾等各宜仰體此情務要盡心效力以報爾讎是亦一勞永逸之事先將調過名數并起程日期隨牌回報查考行右江道犒賞盧蘇王受牌七月𥘉三日看得思田頭目盧蘇王受等率領部下兵夫征勦八寨搜屯日久勞苦實多合行量加犒勞為此牌仰右江道分巡官即行賔州起撥夫役人等將見貯軍餉糧米照依後開數日運赴三里地方各目劄營去處分給各兵以見本院犒賞之意開數繳報查考計開盧蘇二百石王受一百五十石給土目行糧牌七月𥘉八日照得本院見在進兵征勦八寨􅍹賊而鎮安頭目岑瑜等率領目兵四百五十名前赴軍門自願隨軍殺賊報效意有可嘉除量行犒賞外仰分巡右江道官將各目兵即行照名給與行糧一月就發都指揮高嵩哨內聽憑督調殺賊獲有功次一體解驗以憑給賞施行批右江道移置鳯化縣南丹衛事宜呈八月𥘉十日據副使翁素呈議得南丹衛城垣并鳯化縣城垣合用銀兩看得該道議於八寨地方移立南丹衛三里地方移設鳯化縣俱各查訪相應人心樂從其築立城垣起造公𪠘等項料價工食一應合用銀兩既經該道守巡官公同計議停當南丹衛該銀三千六百四十五兩鳯化縣該銀三千一百七十六兩其食米南丹衛一萬石鳯化縣八千石每石價銀三錢共該銀五千四百兩見今各處倉廒貯有糧米尚彀支給候缺米之日照數給價先各量支一半收貯聽用南丹衛一千五百兩鳯化縣一千二百兩準議於南寧府庫貯軍餉銀內支給該道各官仍要推選力量亷能官各一員委同該衛指揮孫綱及該縣掌印哨守官親至南寧府照數支出三面稱對匣收領付賔州庫寄貯置立支銷文簿該道用印鈐記各付一夲收執每用銀兩即同該州官開封動支照數登記務在實用不得花費分毫工完之日開數繳報通將各支銷簿會合查考該道守巡官仍要不時親詣調度督促工程務在精緻堅牢永久無壞當兹盜賊蕩滅之餘况又秋冬天氣正可及時工作各官務在上緊催督晝夜鳩工不日而成一則可以速屯防守之官兵二則可以不妨來歲之農作城完之日本院自行旌保擢用決不虛言各官視官事須如家事刻刻盡心仰稱朝廷之官職中副上司之委任內以建自已之功勞外以垂一方之事業豈不事立身榮功成名顯垂譽無窮者哉若其因循玩愒隳績廢事非獨自取敗壞抑且罪責難逃仰該道備行各官查照施行期務體勤勤囑付之意毋負毋負此繳行左江道賑濟牌八月𥘉十日案照先因南寧府軍民困苦騷擾二年有餘况天道亢旱青黃不接已經行仰同知史立誠將停歇湖兵之家量行賑給然各色軍民人等同𬒳騷擾均合行賑為此牌仰本道官吏會同分巡道即行南寧府備查府城內外大小人户照依後開等第就於軍餉米內照數通行賑給務使各沾實惠毋容姦吏斗級人等作弊尅減有名無實事完開報查考計開鄉官舉人監生之家每家三石生員每家二石大小人戶每家一石貧難小官通行查出量分差等呈來給賑批右江道議築思恩府城垣呈八月十五日據副使翁素呈估計起造思恩府城池等項通用銀八千五百七十七兩零看得思恩府城垣仰行知府桂鏊自行督工起築合用料價工食等項銀兩準照議於南寧府軍餉銀內動支就仰桂鏊公同該府掌印官當堂稱明匣鎖領回寄貯賔州庫內查明前批南丹衛事理置立文簿支銷該道守巡官仍要不時親至地方料理催督務要修築堅固工程早完事畢開報查考繳奬勞勦賊各官牌八月十九日照得八寨積為民患今克勦滅罷兵息民此實地方各官與逺近百姓之所同幸昨者敷文之宴已與百姓同致其喜而犒賞尚未及行為此牌仰南寧府官吏即便動支庫貯軍餉銀兩照依後開則例買辦綵幣羊酒分送各官用見本院嘉勞之意開報查考計開副總兵張𥙿副使翁素各花二枝二兩假四匹十兩羊四隻三兩酒四埕一兩參政沈良佐僉事吳天挺副總兵李璋參將張經馮勳各花二枝二兩假二匹六兩羊二隻酒二埕共二兩知府桂鏊同知陳志敬林寬推官馮衡同上行福建漳州府取回岑邦佐牌照得田州府土官岑猛稔惡不悛搆禍鄰境該前軍門奏奉調兵征勦并將伊妾子女岑邦相等及各目家屬解京給付功臣之家為奴及將出繼武靖州次男岑邦佐遷徙已將岑邦佐及毋妻人口家當差委指揮周㣧宗等解發福建漳州府安置為民及將岑邦相等押發南雄府監候聽解去後續照本爵欽奉勑諭特命爾提督兩廣及江西湖廣等處地方軍務星馳前去彼處即查前項夷情可撫則撫當勦即勦公同計議應設土官流官何者經久利便奏聞區處欽此欽遵隨據頭目盧蘇等率衆自縳來降軍門仰體朝廷好生之德俯順其情安插復業及因其告乞憐憫岑猛原無反叛情罪存其一脈等因巳該本爵議將該府四十八甲內割八甲降立田州立其子一人以承其後云云合將岑邦佐仍為武靖州知州保障地方而立邦相於田州以安守其宗祀庶為兩得其宜己經具題外今照前項地方撫處寧靖所據各男應合取回議處為此牌仰福建漳州府官吏即將發去安置為民岑邦佐并毋妻人口家當通取到官照例起關沿途給與腳力口糧差委的當人員押送軍門以慿面審施行仍行本省鎮巡衙門及布政司知會俱毋違錯批參將沈良佐經理軍伍呈八月二十四日看得五屯係逺年賊巢要害之處而備禦廢弛若此正宜及此平蕩之餘經理修復今該道各官公同議處要將城垣展拓建置守備等衙門及將該所分調各處哨守旗軍盡數取回調用廣東協守官軍發回原衛缺伍獞軍清查足數每年貼貱藤縣甲首銀一百兩通行除免查編甲軍務足千名之數議處悉當除本院已經依議具奏外仰該道各官照議施行仍行總鎮總兵及鎮巡等衙門知會該府縣衛所等官俱仰查照施行繳告諭新民八月告諭各該地方十冬里老人等今後各要守法安分務以寧靖地方為心不得乘機挾勢侵迫新舊投撫獞􅍹等人因而脅取財物報復舊讎以致驚疑逺近阻抑向善之心有違犯者官府體訪得出或被人告發定行拏赴軍門處以軍法決不輕恕批僉事吳天挺乞休呈八月二十五日據僉事吳天挺呈乞要致仕看得本官識見練逹才行老成且於左江一道夷情土俗熟諳久習今地方又在緊急用人之際本院方切倚任况精力未衰偶有疾患不妨就醫調理豈得遽爾懇辭求歸近因征勦潯州諸處賊巢冒暑督兵備歷艱阻功勞茂著不日朝廷必有旌擢之典仰本官且行安心管理該道印信勉進藥餌暫輟歸圖以慰上下之望毋再固辭有孤重委此繳批蒼梧道創建敷文書院呈九月𥘉六日據僉事李傑呈據梧州府并蒼梧縣學生員黎黻嚴肅等連名呈欲於縣之側照依南寧書院規制鼎建書院一所看得崇正學以淑人心者是固該道與有司各官作興人才之盛心亦足以見該學師生之有志舉而行之夫豈不可但謂本院能講明是學而後人心興起則吾豈敢當哉該學師生既稱號房缺少不足以為講論遊息之地合準於舊書院之傍開拓地基增建學舍該道仍為相度經理合用銀兩亦準於該府庫內照數動支務速成功以底實效毋徒浪費以飾虛文完日繳報改委南丹衛監督指揮牌先該本院分道進勦八寨及於八寨周安堡移設南丹衛以控制要害查將遷江等所通賊指揮王祿等明正典刑斬首示衆及將各該目兵通發煙瘴地方哨守後因王祿等哀求免死容令各領目兵殺賊贖罪該道守巡兵備等官亦為懇請遂遵照欽奉勑諭便宜事理容令報效贖罪就委南丹衛指揮孫綱監督王祿等各頭土目兵夫人等與同該衛所官軍前去八寨周安堡相兼屯劄搜勦及將移設衛所估算合用木石甎瓦匠作人夫工食等項一面擇日興工先築土城設立營房以居民衆又委南寧府同知陳志敬支領官餉銀兩前去協同督理俱具奏行事外今訪得王祿等與孫綱舊連姻婭而該衛各官又皆親舊狎恩恃愛不聽約束所據違梗各官俱合從重究治姑且記罪合行改委看得指揮李楠年力富強才識通敏頗有操持能行紀律為此牌仰夲官即便前去守備賔州及新改南丹衛地方遵照本院欽奉勑諭便宜事理暫以都指揮體統行事仍聽副總兵及該道守巡兵備官節制該衛各官及土官王祿等敢有違犯約束者當即治以軍令本官務要殫忠竭力展布才猷與同南寧府同知陳志敬上緊起築城垣相機撫勦餘賊務建竒功以靖地方以副委任事完之日奏功推用決不相負若玩愒日月苟且因仍事無成效罪亦難逭一應機宜牌內該載不盡者俱聽從宜區處就近於該道守巡等官處計議施行事體重大者一面申稟軍門本官合用廩給等項聽於賔州軍餉銀內支給指揮孫綱仍照舊掌管衛印通行總鎮總兵及鎮巡衙門知會王文成公全書卷之三十終
