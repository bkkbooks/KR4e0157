巨壑中藏萬玉林大劍長鎗攢武庫有如智者深韜藏復如淑女避讒妬暗然避世不求知卑巳尊人羞逞露何人不道九華竒竒中之竒人未知我𣣔窮搜盡拈出祕藏恐是天所私旋解詩囊旋收拾脫頴露出錐參差從來題詩李白好渠於此山亦潦草曾見王維畫輞川安得渠來拂纎縞雙峯遺柯生喬爾家雙峯下不見雙峯景如錐處囊中深藏未脫頴盛德心愈卑幽人迹多屏悠然望雙峯可以發深省歸途有僧自望華亭來迎且請詩方自華峰下何勞更望華山僧援故事要我到渠家自謂逰巳至那知望轉佳正如酣醉後醒酒却須茶無相寺金沙泉次韻黃金不布地傾沙瀉流泉潭淨長開鏡池分或鑄蓮興雲為大雨濟世作豐年縱有貪夫過清風自灑然夜宿天池月下聞雷次早知山下大雨三首昨夜月明峰頂宿隱隱雷聲在山麓曉來却問山下人風雨三更捲茆屋野人權作靑山主風景朝昏頗裁取巖傍日腳半溪雲山下雷聲一村雨天池之水近無主木魅山妖競偷取公然又盜山頭雲去向人間作風雨文殊臺夜觀佛燈老夫高卧文殊臺拄杖夜撞青天開散落星辰滿平野山僧盡道佛燈來書汪進之太極巖二首一竅誰將混沌開千年樣子道州來須知太極元無極始信心非明鏡臺始信心非明鏡臺須知明鏡亦塵埃人人有箇圎圈在莫向蒲團坐死灰勸酒平生忠赤有天知便𣣔欺人肯自欺毛髮暗從愁裏改世情明向笑中危春風脈脈回枯草殘雪依依戀舊枝謾對芳樽辭酩酊機關識破巳多時重逰化城寺二首愛山日日望山晴忽到山中眼自明鳥道漸非前度險龍潭更比舊時淸會心人逺空遺洞識面僧來不記名莫謂中丞喜忘世前途風浪苦難行山寺從來十九秋舊僧零落老比丘簷松盡長青冥幹瀑水猶懸翠壁流人住層崖嫌洞淺鳥鳴春澗覺山幽年來别有間尋意不似當時孟浪逰逰九華九華原亦是移文錯怪山頭日日雲乘興未甘回俗駕𥘉心終不負靈均𬗋芝香暖春堪茹青竹泉高晚更分幽夢巳分塵土纍清猿正好月中聞弘治壬戌嘗逰九華值時隂霧竟無所覩至是正德庚辰復往逰之風日清朗盡得其勝喜而作歌昔年十日九華住雲霧終旬竟不開有如昏夜入寶藏兩目無覩成空回每逄好事談竒勝即思䇿蹇還一來頻年驅逐事兵革出入賊壘衝風埃恐恐晝夜不遑息豈復山水能徘徊鄱湖一戰偶天幸逺隨歸凱停江隈是時軍務頗多暇况復我馬方虺隕舊逰諸生亦群集遂將童冠登崔嵬先晨霏靄尚暝晦却疑山意猶嫌猜肩輿一入青陽境忽然白日開西嶺長風擁篲掃浮隂九十九峰如夢醒群巒踊躍爭獻竒兒孫俯伏摩其頂今來始識九華面恨無詩筆為傳影層樓疊閣寫未工千朵芙蓉抽玉井怪哉造化亦安排天下竒山此兼并攬衣登高望八荒雙闕下見日月光長江如帶繞山麓五湖七澤皆陂塘蓬瀛海上浮拳石舉足可到虹可梁仙人為我啓閶闔鸞軿鶴駕紛翺翔從兹脫屣謝塵世飄然拂袖淩蒼蒼巖頭間坐漫成盡日巖頭坐落花不知何處是吾家靜聽谷鳥遷喬木間看林蜂散午衙翠壁泉聲穿亂石碧潭雲影透晴沙癡兒公事真難了須信吾生自有涯將逰九華移舟宿寺山二首逄山未愜意落日更移船峽寺緣溪徑雲林帶石泉鐘聲先度嶺月色巳浮川今夜巖房宿寒燈不待懸其二維舟谷口傍煙霏共説前岡石徑微竹杖穿雲尋寺去藤筐採藥帶花歸諸生晚佩聮芳杜野老春霞綴衲衣風詠不須沂水上碧山明月更清輝登雲峰二三子詠歌以從欣然成謡二首淳氣日凋薄鄒魯亡真承世儒倡臆説愚瞽相因仍晚途益淪溺手援吾不能棄之入煙霞高歷雲峯層開茅傍虎穴結屋依巖僧豈曰事高尚庶免無豫憎好鳥求其侶嚶嚶林間鳴而我在空谷焉得無良朋飄飄二三子春服來從行詠歌見真性逍遙無俗情各勉希聖志毋為塵所縈深林之鳥何間關我本無心雲自間大舜亦與木石處醉翁惟在山水間晴窗展卷有會意絶壁題詩無厚顔顧謂從行二三子隨逰麋鹿俱忘還有僧坐巖中巳三年詩以勵吾黨莫怪巖僧木石居吾儕真切幾人如經營日夜身心外剽竊粳粃齒頰餘俗學未堪欺老衲昔賢取善及陶漁年來奔走成何事此日斯人亦起豫春日逰齊山寺用杜牧之韻二首即看花發又花飛空向花前嘆式微自笑半生行腳過何人未老乞身歸江頭鼓角翻春浪雲外旌旗閃落暉羡殺山中麋鹿伴千金難買芰荷衣倦鳥投枝巳亂飛林間暝色漸霏微春山日暮成孤坐逰子天涯正憶歸古洞濕雲含宿雨碧溪明月弄淸暉桃花不管人間事只笑山人未拂衣重逰開元寺戲題壁中丞不解了公事到處看山復尋寺尚為妻孥守俸錢至今未得休官去三月開花兩度來寺僧倦客門未開山靈似嫌俗士駕溪風攔路吹人回君不見富貴中人如中酒折腰解酲須五斗未妨適意山水間浮名于我亦何有賈胡行賈胡得明珠藏珠剖其軀珠藏未能有此身巳先無輕巳重外物賈胡一何愚請君勿笑賈胡愚君今奔走聲利途鑽求富貴未能得役精勞形骨髓枯竟日惶惶憂毁譽終宵惕惕防艱虞一日僅得五升米半級仍甘九族誅胥靡接踵略無悔請君勿笑賈胡愚送邵文實方伯致仕君不見塒下雞引類呼群啄且啼稻梁已足脂漸肥毛羽脫落充庖厨又不見籠中鶴斂翼垂頭困牢落籠開一旦入層雲萬里翶翔從廖廓人生山水須認真胡為利祿纒其身高車駟馬盡桎梏雲臺麟閣皆埃塵鴟夷抱恨浮江水何似乘舟逃海濵舜水龍山豫舊宅讓公且作煙霞伯拂衣便擬逐公回為豫先掃峰頭石紀夢并序正德庚辰八月草八夕卧小閣忽夢晉忠臣郭景純氏以詩示豫且極言王導之姦謂世之人徒知王敦之逆而不知王導實隂主之其言甚長不能盡録覺而書其所示詩于壁復為詩以紀其略嗟乎今距景純若干年矣非有實惡深冤鬱結而未暴寧有數千載之下尚懷憤不平若是者耶秋夜卧小閣夢逰滄海濵海上神仙不可到金銀宫闕高嶙峋中有仙人芙蓉巾顧我宛若平生親欣然就語下煙霧自言姓名郭景純携手歷歷訴衷曲義憤感激難具陳切齒尢深怨王導深姦老猾長欺人當年王敦覬神器導實隂主相緣夤不然三問三不答胡忍使敦殺伯仁寄書𣣔拔太真舌不相為謀敢爾云敦病巳篤事巳去臨哭嫁禍復賣敦事成同享帝王貴事敗仍為顧命臣幾微隱約亦可見世史掩覆多失真袖出長篇再三讀覺來字字能書紳開窗試抽晉史閲中間事迹頗有因因思景純有道者世移事往千餘春若非精誠果有激豈得到今猶憤嗔不成之語以筮戒敦實氣沮竟殞身人生生死亦不易誰能視死如輕塵燭微先幾炳易道多能餘事非所論取義成仁忠晉室龍逄龔勝心可倫是非顚倒古多有吁嗟景純終見伸御風騎氣逰八垠彼敦之徒草木糞土臭腐同沉淪我昔明易道故知未來事時人不我識遂傳耽一技一思王導徒神器良久覬諸謝豈不力伯仁見其底所以敦者傭罔顧天經與地義不然百口未負托何忍置之死我于斯時知有分日中斬柴市我死何足悲我生良有以九天一人撫􅈾哭晉室諸公亦可耻舉目山河徒嘆非携手登亭空灑淚王導真姦雄千載人未議偶感君子談中及重與寫真記固知倉卒不成文自今當與頻謔戲倘其為我一表揚萬世萬世萬萬世右晉忠臣郭景純自述詩蓋豫夢中所得者因表而出之無題巖頭有石人為我下嶙峋腳踏破履五十兩身披舊衲四十斤任重致逺香象力餐霜坐雪金剛身夜寒雙虎與溫足雨後秃龍來伴宿手握頑磚鏡未光舌底流泉梅未熟夜來拾得遇寒山翠竹黃花好共看同來問我安心法還解將心與汝安逰落星寺女媧煉石輔天漏璇璣晝夜無停走自從墮却玉衡星至今七政迷前後渾儀晝夜徒揣摩敬授人時亦何有玉衡墮却此湖中眼前誰是輔天手逰通天巖示鄒陳二子鄒陳二豫皆好逰一往通天十日留候之來歸久不至我亦乘興聊尋幽巖扉日出雲氣浮二子晞髮登巖頭谷轉始聞人語響蒼壁杳杳長林秋嗒然坐我亦忘去人生得休且復休採芝共約陽明麓白首無慚黃綺儔青原山次黃山谷韻咨觀歷州郡驅馳倦風埃名山特乘暇林壑盤縈回雲石緣欹徑夏木深層隈仰窮嵐霏際始覩臺殿開衣傳西竺舊構遺唐宋材風松溪溜急湍響空山哀妙香隱玄洞僧屋懸穹崖扳依儼龍象陟降臨緯階飛泉瀉靈竇曲檻連雲榱我來慨遺迹勝事多湮埋邈矣西方教流傳遍中垓如何皇極化反使吾人猜剝陽幸未絶生意存枯荄傷心眼底事莫負生前杯煙霞有本性山水乞歸骸﨑嶇羊腸坂車輪幾傾催蕭散麋鹿伴澗谷終追陪恬愈返真淡閴寂辭喧豗至樂發天籟絲竹謝淫哇千古自同調豈必時代偕珍重二三子兹逰非偶來且從山叟宿勿受役夫催東峰上煙月夜景方徘徊睡起偶成四十餘年腄夢中而今醒眼始朦朧不知日已過停午起向髙樓撞曉鐘起向髙樓撞曉鐘尚多昏睡正懵懵縱令日暮醒猶得不信人間耳盡聾立春荒村亂後耕牛絶城郭春來見土牛家業苟存鄉井戀風塵先幸甲兵休未能布德慚時令聊復題詩寫我憂為報胡雛須逺塞暫時邉將駐南州逰廬山開元寺清晨入谷到斜曛遍歷青霞躡紫雲閶闔逺從雙劍闢銀河真自九天分驅馳此日原非暇夢想當年亦自勤斷擬罷官來駐此不教林鶴更移文登小孤次陸良弼韻看盡東南百二峰小孤江上是真龍攀龍我𣣔乘風去高躡層霄絶世蹤月下吟三首露冷天清月更輝可看逰子倍沾衣催人歲月心空在滿眼兵戈事漸非方朔本無金馬意班超惟願玉門歸白頭應倚庭前樹怪我還期秋又違江天月色自清秋不管人間底許愁謾擬翠華旋北極正憐白髮倚南樓狼烽絶塞寒𥘉入鶴怨空山夜未休莫重三公輕一日虛名真覺是浮漚依依窗月夜還來渺渺鄉愁坐未回素位也知非自得白頭無奈是親衰當年竹下曾裘仲何日花前更老萊懇疏乞骸今幾上中宵翹首望三台月夜二首高臺月色倍新晴極浦浮沙逺樹平客久欲迷鄉國望亂餘愁聽鼓鼙聲湖南水潦頻移粟磧北風煙且罷征濡手未辭援溺苦白頭方切倚閭情舉世困酣睡而誰偶獨醒疾呼未能起瞪目相怪驚反謂醒者狂群起環鬪爭洙泗輟金鐸濂洛傳微聲誰鳴塗毒鼓聞者皆昏冥嗟爾欲奚為奔走皆營營何當聞此鼓開爾天聰明雪望四首風雪樓臺夜更寒曉來霽色滿山川當歌莫放陽春調幾處人家未起煙𥘉日湖山雪未融野人村落閉重重安居信是豐年兆為語田夫莫惰農霽景朝來更好看河山千里思漫漫茅簷日色猶堪曝應是邊關地更寒法象冥濛失巨纎連朝風雪費粧嚴誰將塵世化珠玉好與貧家聚米鹽火秀宫次一峯韻三首兹山堪遁迹上應少微星洞裏乾坤别壼中日月明道心空自警塵夢苦難醒方嶠由來此虛無隔九𬈑其二清溪曲曲轉層林始信桃源路未深晚樹煙霏山閣靜古松雷雨石壇隂丹爐遺火飛殘藥仙樂浮空寄絶音莫道山人才一到千年陳迹此重尋其三落日下清江悵望閣道晚人言玉笥更竒絶漳口停舟路非逺肩輿取徑沿村落心目先馳嫌足緩山昏欲就雲儲眠踈林月色與風泉夢魂忽忽到真境侵曉循迹來洞天洞天非人世豫亦非世人當年曾此寄一迹屈指忽復三千春巖頭坐石剝落盡手種松柏枯龍麟三十六峰僅如舊澗谷漸改溪流新空中仙樂風吹斷化為鼓角驚風塵風塵慘淡半天地何當一掃還吾真從行諸生駭吾説問我恐是兹山神君不見廣成子髙卧崆洞長不死到今一萬八千年陽明真人亦如此歸懷行年忽五十頓覺毛髮改四十九年非童心獨猶在世故漸改涉遇坎稍無餒每當快意事退然思辱殆傾否作聖功物覩豈不快奈何桑梓懷衰白倚門待啾啾吟知者不惑仁不憂君胡戚戚眉雙愁信步行來皆坦道憑天判下非人謀用之則行舍即休此身浩蕩浮虛舟丈夫落落掀天地豈顧束縳如窮囚千金之珠彈鳥雀掘土何煩用鐲鏤君不見東家老翁防虎患虎夜入室銜其頭西家兒童不識虎執竿驅虎如驅牛癡人懲噎遂廢食愚者畏溺先自投人生逹命自灑落憂讒避毀徒啾啾居越詩三十四首正德辛巳年歸􅚼後作歸興二首百戰歸來白髮新青山從此作間人峯攢尚憶衝蠻陳雲起猶疑見虜塵島嶼微茫滄海暮桃花爛熳武陵春而今始信還丹訣却笑當年識未真其二歸去休來歸去休千貂不換一羊裘青山待我長為主白髮從他自滿頭種果移花新事業茂林修竹舊風流多情最愛滄州伴日日相呼理釣舟次謙之韻珍重江船冒暑行一宵心話更分明須從根本求生死莫向支流辨濁清久奈世儒橫臆説競搜物理外人情良知底用安排得此物由來自渾成再逰浮峰次韻草載風塵始一回登高心在力全衰偶懷勝事乘春到况有良朋自逺來還指松蘿尋舊隱撥開雲石翦蒿萊後期此别知何地莫厭花前勸酒杯夜宿浮峯次謙之韻日日春山不厭尋野情原自懶朝簮幾家茅屋山村靜夾岸桃花溪水深石路草香隨鹿去洞門蘿月聼猿吟禪堂坐久發清磬却笑山僧亦有心再逰延夀寺次舊韻歷歷溪山記舊蹤寺僧遙住翠微重扁舟曾泛桃花入𡵨路心多草樹封谷口鳥聲兼伐木石門煙火出深松年來百好俱衰薄獨有幽探興尚濃碧霞池夜坐一雨秋涼入夜新池邉孤月倍精神潛魚水底傳心訣棲鳥枝頭説道真莫謂天機非嗜欲須知萬物是吾身無端禮樂紛紛議誰與青天掃宿塵秋聲秋來萬木發天聲點瑟回琴日夜清絶調逈隨流水逺餘音細入晚雲輕洗心真巳空千古傾耳誰能辨九成徒使清風傳律吕人間瓦缶正雷鳴林汝桓以二詩寄次韻為别斷雲徴日半晴隂何處高梧有鳯鳴星漢浮槎先入夢海天波浪不須驚魯郊巳自非常典膰肉寧為脫冕行試向滄浪歌一曲未云不是九韶聲堯舜人人學可齊昔賢斯語豈無稽君今一日真千里我亦當年苦舊迷萬理由來吾具足六經原只是階梯山中儘有間風月何日扁舟更越溪月夜二首與諸生歌于天泉橋萬里中秋月正晴四山雲靄忽然生須臾濁霧隨風散依舊青天此月明肯信良知原不昧從他外物豈能攖老夫今夜狂歌發化作鈞天滿太清處處中秋此月明不知何處亦群英須憐絶學經千載莫負男兒過一生影響尚疑朱仲晦支離羞作鄭康成鏗然舍瑟春風裏點也雖狂得我情秋夜春園花木始菲菲又是高秋落葉稀天逈樓臺含氣象月明星斗避光輝間來心地如空水靜後天機見隱微深院寂寥群動息獨憐烏鵲繞枝飛夜坐獨坐秋庭月色新乾坤何處更間人高歌度與清風去幽意自隨流水春千聖本無心外訣六經須拂鏡中塵却憐擾擾周公夢未及惺惺陋巷貧心漁為錢翁希明别號題錢翁德洪父三歲雙瞽好古博學能詩文有漁者歌曰漁不以目惟以心心不在魚漁更深北𬈑之鯨殊小小一舉六鰲未足歆敢問何如其為漁耶曰吾將以斯道為網良知為綱太和為餌天地為舫潔之無意散之無方是謂得無所得而忘無可忘者矣登香爐峰次蘿石韻曾從爐鼎躡天風下數天南百二峰勝事縱為多病阻幽懷還與故人同旌旗影動星辰北鼓角聲回滄海東世故茫茫渾未定且乘溪月放歸􅏃觀從吾登爐峰絶頂戲贈道人不奈登山癖日暮猶思絶棧雲巖底獨行穿虎穴峰頭清嘯亂猿群清溪月出時尋寺歸棹城隅夜欵門可笑中郎無好興獨留松院坐黃昏書扇贈從吾君家只在海西隈日日寒潮去復回莫遣扁舟成久别爐峰秋月望君來嘉靖甲申冬二十一日再登秦望自弘治戊午登後二十七年矣將下適董蘿石與二三子來復坐久之暮歸同宿雲門僧舍𥘉冬風日佳杖䇿登崔嵬自豫羈宦迹久與山谷違屈指草七載今兹復一來沿溪尋往路歷歷皆所懷躋險還屢息興在知吾衰薄午際峰頂曠望未能回良朋亦偶至歸路相徘徊夕陽飛鳥靜群壑風泉哀悠悠觀化意點也可與偕山中謾興清晨急雨度林扉餘滴煙稍尚濕衣雨水霞明桃亂吐沿溪風暖藥𥘉肥物情到底能容懶世事從前頓覺非自擬春光還自領好誰歌詠月中歸挽潘南山聖學宫墻亦久荒如公精力可升堂若為千古經綸手只作終年著述忙末俗澆漓風益下平生辛苦意難忘西風一夜山陽笛吹盡南岡落木霜和董蘿石菜花韻油菜花開滿地金鵓鳩聲裡又春深閭閻正苦飢民色畎畝常懷老圃心自有牡丹堪富貴也從蜂蝶謾追尋年年開落渾間事來賞何人共此襟天泉樓夜坐和蘿石韻莫厭西樓坐夜深幾人今夕此登臨白頭未是形容老赤子依然混沌心隔水鳴榔聞過棹映窗殘月見踈林看君巳得忘言意不是當年只苦吟詠良知四首示諸生箇箇人心有仲尼自將聞見苦遮迷而今指與真頭面只是良知更莫疑問君何事日憧憧煩惱埸中錯用功莫道聖門無口訣良知兩字是參同人人自有定盤針萬化根緣總在心却笑從前顚倒見枝枝葉葉外頭尋無聲無臭獨知時此是乾坤萬有基拋却自家無盡藏沿門持鉢效貧兒示諸生三首爾身各各自天真不問求人更問人但致良知成德業謾從故𥿄費精神乾坤是易原非畫心性何形得有塵莫道先生學禪語此言端的為君陳人人有路透長安坦坦平平一直看盡道聖賢須有祕翻嫌易簡却求難只從孝弟為堯舜莫把辭章學柳韓不信自家原具足請君隨事反身觀長安有路極分明何事幽人矌不行遂使蓁茅成間塞儘教麋鹿自縱橫徒聞絶境勞懸想指與迷途却浪驚冒險甘投蛇虺窟顛崖墮壑竟亡生答人問良知二首良知却是獨知時此知之外更無知誰人不有良知在知得良知却是誰知得良知却是誰自家痛癢自家知若將痛癢從人問痛癢何須更問為答人問道飢來喫飯倦來眠只此修行玄更玄説與世人渾不信却從身外覔神仙寄題玉芝庵丙戌塵途駿馬勞千里月樹鷦鷯足一枝身既了時心亦了不須多羡碧霞池别諸生綿綿聖學巳千年兩字良知是口傳欲識渾淪無斧鑿須從規矩出方圓不離日用常行內直造先天未畫前握手臨𡵨更何語殷勤莫愧别離筵後中秋望月歌一年兩度中秋節兩度中秋一樣月兩度當筵望月人幾人猶在幾人别此後望月幾中秋此會中人知在否當筵莫惜殷勤望我巳衰年半白頭書扇示正憲汝自冬春來頗解學文義吾心豈不喜顧此枝葉事如樹不植根暫榮終必瘁植根可如何願汝且立志送蕭子雍憲副之任衰疾悟止足間居便靜修採芝深谷底考槃南澗頭之子亦早見枉帆經舊丘幽尋意始結公期巳先遒星途觸來暑拯焚能自由黃鵠一高舉剛風翼難收懷兹戀丘隴回顧未忘憂往志局千里豈伊枋榆投哲士營四海細人聊自謀聖作正思治吾衰亮何酬所望登才俊濟濟揚鴻休隱者嘉肥遁仕者當誰儔寧無瘳寂念宜急瘡痍廖舍藏應有時行矣毋淹留中秋去年中秋隂復晴今年中秋隂復隂百年好景不多遇况乃白髮相侵尋吾心自有光明月千古團圓永無缺山河大地擁清輝賞心何必中秋節嘉靖丙戌十二月庚申始得子年已五十有五矣六月靜齋二丈昔與先公同舉于鄉聞之而喜各以詩來賀藹然世交之誼也次韻為謝海鶴精神老益強晚途詩價重圭璋洗兒惠比金錢貴爛目光呈奎井祥何物敢云繩祖武他年只好共爺長偶逄燈事開湯餅庭樹春風轉歲陽其二自分秋禾後吐芒敢云琢玉晚圭璋漫憑先德餘家慶豈是生申降嶽祥携抱且堪娛老况長成或可望書香不辭歲歲臨湯餅還見吾家第幾郎兩廣詩二十一首嘉靖丁亥起平思田之亂秋日飲月巖新搆别王侍御湖山久繫念塊處限形迹遙望一水間十年靡由即軍旅起衰廢驅馳豈遑息前旌道回岡取捷上畸側新搆鬱層椒石門轉深寂是時霜始降風凄群卉拆壑靜響江聲窗虛涵海色夕隂下西岑涼月穿東壁觀風此餘情撫景見髙臆匪從群公餞何因得良覿南徼方如燬救焚敢辭亟來歸幸有期終遂幽尋僻復過釣臺憶昔過釣臺驅馳正軍旅十年今始來復以兵戈起空山煙霧深往迹如夢裏微雨林徑滑肺病雙足胝仰瞻臺上雲俯濯臺下水人生何碌碌高尚當如此瘡痍念同胞至人匪為巳過門不遑入憂勞豈得巳滔滔良自傷果哉末難矣右正德巳卯獻俘行在過釣臺而弗及登今兹復來又以兵革之役兼肺病足瘡徒顧瞻悵望而巳書此付桐廬尹沈元材刻置亭壁聊以紀經行歲月云耳嘉靖丁亥九月草二日書時從行進士錢德洪王汝中建德尹楊思臣及元材凡四人方思道送西峰西峰隱真境微境臨通衢行役空屢屢過眼𬒳塵迷青林外延望中閟何由窺方子巖廊器兼巳雲霞姿每逄泉石處必刻棠陵詩兹山秀常玉之子囊中錐群峯灝秋氣喬木含涼吹此行非佳餞誰為發幽竒奈何眷清賞局促牽至期悠悠傷絶學之子亦如斯為君指周道直往勿復疑西安雨中諸生出候因寄德洪汝中并示書院諸生幾度西安道江聲暮雨時機關鷗鳥破蹤迹水雲疑仗鉞非吾事傳經愧爾師天真泉石秀新有鹿門期德洪汝中方卜書院盛稱天真之竒并寄及之不踏天真路依稀二十年石門深竹徑蒼峽瀉雲泉泮壁環胥海龜疇見宋田文明原有象卜築豈無緣寄石潭二絶僕兹行無所樂樂與二公一會耳得見間齋固已如見石潭矣留不盡之興于後期豈謂樂不可極耶聞尊恙已平復必于不出見客無乃太以界限自拘乎奉次二絶用發一笑且以致不及請教之憾見説新居止隔山肩輿曉出暮堪還知公久已藩籬撤何事深林尚閉關乘興相尋涉萬山扁舟亦復及門還莫將身病為心病可是無關却有關長生長生徒有慕苦乏大藥資名山遍探歷悠悠鬢生絲微軀一繫念去道日逺而中歲忽有覺九還乃在兹非爐亦非鼎何坎復何離本無終始究寧有死生期彼哉逰方士詭辭反增疑紛然諸老翁自傳困多𡵨乾坤由我在安用他求為千聖皆過影良知乃吾師南浦道中南浦重來夢裏行當年鋒鏑尚心驚旌旗不動山河影鼓角猶傳草木聲巳喜閭閻多復業獨憐飢饉未寬征迂踈何有甘棠惠慚愧香燈父老迎重登黃土腦一上高原感慨重千山落木正無窮前途且與停西日此地曾經拜北風劍氣晚橫秋色淨兵聲寒帶暮江雄水南多少流亡屋尚訴征求杼軸空過新溪驛猶記當年築此城廣徭湖寇正縱橫人今樂業皆安堵我亦經過一駐兵香火沿門慚老稚壼漿逺道及從行峰山拏手疲勞甚且放歸農莫送迎夢中絶句此豫十五歲時夢中所作今拜伏波祠下宛如夢中兹行殆有不偶然者因識其事于此卷甲歸來馬伏波早年兵法鬢毛皤雲埋銅柱雷轟折六字題詩尚不磨謁伏波廟二首四十年前夢裡詩此行天定豈人為徂征敢倚風雲陳所過須同時雨師尚喜逺人知向望却慚無術救瘡痍從來勝算歸廊廟耻説兵戈定四夷樓船金鼓宿烏蠻魚麗群舟夜上灘月繞旌旗千嶂靜風傳鈴柝九溪寒荒夷未必先聲服神武由來不殺難想見虞廷新氣象兩階干羽五雲端破斷藤峽才看干羽格苗夷忽見風雷起戰旗六月徂征非得巳一方流毒巳多時遷賔玉石分須早柳慶雲霓怨莫遲嗟爾有司懲既往好將恩信撫遺黎平八寨見説韓公破此蠻豼貅十萬騎連山而今止用三千卒遂爾收功一月間豈是人謀能妙算偶逄天助及師還窮搜極討非長計須有恩威化梗頑南寧二首一駐南寧五月餘始因送逺過僧廬浮屠絶壁經殘燹井灶沿村見廢墟撫恤尚慚凋弊後逰觀正及省耕𥘉近聞襁負歸猺獞莫陋夷方不可居勞矣田人莫逺迎瘡痍未定犬猶驚燹餘破屋須先緝雨後荒畬莫廢耕歸喜逃亡來負襁貧憐繻褲綴旗旌聖朝恩澤寬如海甑鮒盆魚縱爾生往歲破桶岡宗舜祖世麟老宣慰實來督兵今兹思田之役乃隨父致仕宣慰明輔來從事目擊其父子孫三世皆以忠孝相承相尚也詩以嘉之宣慰彭明輔忠勤晚益敦歸師當五月冒暑淨蠻氛九霄雖巳老報國意尤勤五月衝炎署回軍立戰勳愛爾彭宗舜少年多戰功從親心巳孝報國意尤忠題甘泉居我聞甘泉居近連菊坡麓十年勞夢思今來快心目徘徊𣣔移家山南尚堪屋渴飲甘泉泉飢餐菊坡菊行看羅浮雲此心聊復足書泉翁壁我祖死國事肇禋在增城荒祠幸新復適來奉𥘉蒸亦有兄弟好念言思一尋蒼蒼兼葭色宛隔環瀛深入門散圖史想見抱膝吟賢郎敬父執童僕意相親病軀不遑宿留詩慰殷勤落落千百載人生幾知音道通著形迹期無負𥘉心王文成公全書卷二十終王文成公全書卷之三十一下山東鄉試録弘治甲子前序已刻前卷四書所謂大臣者以道事君不可則止負大臣之名盡大臣之道者也夫大臣之所以為大臣正以能盡其道焉耳不然何以稱其名哉昔吾夫子因季子然之問以由求可為大臣而告之以為大臣之道未易舉也大臣之名可輕許乎彼其居於廟堂之上而為天子之股肱處于輔弼之任而為群僚之表帥者大臣也夫所謂大臣也者豈徒以其崇高貴重而有異于群臣巳乎豈亦可以奔走承順而無異于群臣巳乎必其于事君也經德不回而凡所以啓其君之善心者一皆仁義之言守正不撓而凡所以格其君之非心者莫非堯舜之道不阿意順旨以承君之欲也必繩愆糾繆以引君于道也夫以道事君如此使其為之君者于吾仁義之言説而弗繹焉則是志有不行矣其可詘身以信道乎于吾堯舜之道從而弗改焉則是諌有不聽矣其可枉道以徇人乎殆必奉身而退以立其節雖萬鍾有弗屑也固將見幾而作以全其守雖終日有弗能也是則以道事君則能不枉其道不可則止則能不辱其身所謂大臣者蓋如此而豈由求之所能及哉嘗觀夫子許由求二子以為國則亦大臣之才也巳而於此獨不以大臣許之者豈獨以隂折季氏之心誠以古之大臣進以禮退以義而二子之於季氏既不能正又不能去焉則亦徒有大臣之才而無其節是以不免為才之所使耳雖然比之羈縻于爵祿而不知止者不既有間矣乎齊明盛服非禮不動所以修身也盡持敬之功端九經之本夫修身為九經之本也使非內外動靜之一于敬焉則身亦何事而修哉昔吾夫子告哀公之問政而及于此若曰九經莫重于修身修身惟在于主敬誠使內志靜專而罔有錯雜之私中心明潔而不以人欲自蔽則內極其精一矣冠冕佩玉而穆然容止之端嚴垂紳正笏而儼然威儀之整肅則外極其檢束矣又必克已私以復禮而所行皆中夫節不但存之于靜也遏人欲于方萌而所山不睽于禮尤必察之于動也是則所謂盡持敬之功者如此而亦何莫而非所以修身哉誠以不一其內則無以制其外不齊其外則無以飬其中修身之道未備也靜而不存固無以立其本動而不察又無以勝其私修身之道未盡也今焉制其精一于內而極其檢束于外則是內外交飬而身無不修矣行必以禮而不戾其所存動必以正而不失其所飬則是動靜不違而身無不修矣是則所謂端九經之本者如此而亦何莫而不本于持敬哉大抵九經之序以身為本而聖學之要以敬為先能修身以敬則篤恭而天下平矣是蓋堯舜之道夫子舉之以告哀公正欲以興唐虞之治于春秋而子思以繼大舜文武周公之後者亦以明其所傳之一致耳後世有能舉而行之則二帝三王之治豈外是哉斯固子思之意也禹思天下有溺者由巳溺之也稷思天下有飢者由已飢之也聖人各有憂民之念而同其任責之心夫聖人之憂民其心一而已矣所以憂之者雖各以其職而其任之於已也曷嘗有不同哉昔孟子論禹稷之急于救民而原其心以為大禹之平水土也雖其所施無非決川距海之功而民可免于昏墊矣然其汲汲之心以為天下若是其廣也吾之足迹既有所未到之地則夫水之未治者亦必有之矣水之泛濫既有所不免之地則夫民之遭溺者亦容有之矣夫民之陷溺由水之未治也吾任治水之責使水有不治以溺吾民是水之溺民即吾之溺民也民之溺于水實吾之溺之也吾其救之可不急乎后稷之教稼穡也雖其所為無非播時百榖之事而民可免于阻飢矣然其遑遑之心以為萬民若是其衆也吾之稼穡固未能人人而靣誨矣能保其無不知者乎民之樹藝既未能人人而必知矣能保其無不飢者乎夫民之有飢由穀之未播也吾任播榖之責使榖有未播以飢吾民是飢之厄民即吾之厄民也民之飢于食實吾之飢之也吾其拯之可以緩乎夫禹稷之心其急于救民蓋如此此其所以雖當治平之世三過其門而不入也歟雖然急于救民者固聖賢憂世之夲心而安于自守者又君子持巳之常道是以顔子之不改其樂而盂子以為同道于禹稷者誠以禹稷顔子莫非素其位而行耳後世各徇一偏之見而仕者以趨時為通逹隱者以忘世為高尚此其所以進不能憂禹稷之憂而退不能樂顔子之樂也歟易先天而天弗違後天而奉天時大人于天默契其未然者奉行其巳然者夫大人與天一而巳矣然則默契而奉行之者豈有先後之間哉昔文言申乾九五爻義而及此竟謂大人之于天形雖不同道則無異自其先于天者言之時之未至而道隱于無天未有為也大人則先天而為之蓋必經綸以造其端而心之所欲暗與道符裁成以創其始而意之所為默與道契如五典未有也自我立之而與天之所敘者有吻合焉五禮未制也以義起之而與天之所秩者無差殊焉天何嘗與之違乎以其後於天者言之時之既至而理顯於有天已有為也大人則後天而奉之蓋必窮神以繼其志而理之固有者祗承之而不悖知化以述其事而理之當行者欽若之而不違如天敘有典也立為政教以道之五典自我而敦矣天秩有禮也制為品節以齊之五禮自我而庸矣我何嘗違於天乎是則先天不違大人即天也後天奉天天即大人也大人與天其可以二視之哉此九五所以為天下之利見也歟大抵道無天人之别在天則為天道在人則為人道其分雖殊其理則一也衆人牿於形體知有其分而不知有其理始與天地不相似耳惟聖人純於義理而無人欲之私其體即天地之體其心即天地之心而其所以為之者莫非天地之所為也故曰循理則與天為一河出圖洛出書聖人則之天地顯自然之數聖人法之以作經焉甚矣經不徒作也天地不顯自然之數則聖人何由而法之以作經哉大傳言卜筮而推原聖人作易之由其意蓋謂易之用也不外乎卜筮而易之作也則法乎圗書是故通於天者河也伏羲之時天降其祥龍馬負圗而出其數則以五生數統五成數而同居其方是為數之體焉中於地者洛也大禹之時地呈其瑞神龜載書而出其數則以五竒數統四偶數而各居其所是為數之用焉圗書出矣聖人若何而則之彼伏羲則圖以畫卦虗五與十者太極也積二十之竒而合二十之偶以一二三四而為六七八九則儀象之體立矣析四方之合以為乾坤坎離補四隅之空以為兊震巽艮則八卦之位定矣是其變化無窮之妙何莫而不本於圗乎大禹則書以敘疇實其中五者皇極也一五行而二五事三八政而四五紀第於前者有序而不亂也六三德而七稽疑八庶徵而九福極列於後者有條而不紊也是其先後不易之序何莫而不本於書乎吁聖人之作易其原出于天者如此而卜筮之用所以行也歟大抵河圖洛書相為經緯八卦九章相為表裏但伏羲先得乎圗以畫卦無所待於書大禹獨得乎書以敘疇不必考於圗耳若究而言之則書固可以為易而圗亦可以作範又安知圗之不為書書之不為圗哉噫理之分殊非深于造化者其孰能知之書王懋昭大德建中于民以義制事以禮制心垂𥙿後昆豫聞曰能自得師者王大臣告君既勉其修君道以貽諸後必證以隆師道而成其功夫君道之修未有不隆師道而能致者也大臣之論如此其亦善於告君者哉吾想其意若謂新德固所以屬人心而建中斯可以盡君道吾王其必勤顧諟之功以明其德求此中之全體而自我建之以為斯民之極也操日躋之敬以明夫善盡此中之妙用而自我立之以為天下之凖也然中果何自而建邪彼中見於事必制以吾心之裁制使動無不宜而後其用行矣中存於心必制以此理之節文使靜無不正而後其體立矣若是則豈特可以建中于民而巳邪本支百世皆得以承懿範於無窮而建中之用綽乎其有餘裕矣子孫千億咸得以仰遺矩於不墜而建中之推恢乎其有餘地焉然是道也非學無以致之蓋古人之言以為傳道者師之責人君苟能以虗受人無所拂逆則道得于巳可以為建極之本而王者之業益以昌大矣考德者師之任人君果能願安承教無所違拒則德成于身足以為立凖之地而王者之基日以開拓矣是則君道修而後其及逺師道立而後其功成吾王其可以不勉於是哉抑嘗反覆仲虺此章之旨懋德建中允執厥中之餘緒也制心制事制外養中之遺法也至於能自得師之一語是又心學之格言帝王之大法則仲虺之學其得于堯舜之所授受者深矣孟子敘道統之傳而謂伊尹萊朱為見而知者而説者以萊朱為仲虺其信然哉繼自今立政其勿以憸人其惟吉士大臣勉賢王之為治惟在嚴以逺小人而專于任君子也蓋君子小人之用舍天下之治忽繫焉人君立政可不嚴于彼專于此哉周公以是而告成王意豈不曰立政固在於用人而非人適所以亂政彼吉士之不可舍而憸人之不可用蓋自昔而然矣繼今以立政而使凡所以治其民者不致苟且而因循則其施為之詳固非一人所能任也而將何所取乎繼此以立政而使凡所謂事與法者不致懈怠而廢弛則其料理之煩亦非獨力所能舉也而將何所用乎必其於憸人也去之而勿任於吉士也任之而勿疑然後政無不立矣蓋所謂憸人者行偽而堅而有以飾其詐言非而辨而有以亂其真者也不有以逺之將以妨吾之政矣必也嚴防以塞其幸入之路慎選以杜其躁進之門勿使得以戕吾民壞吾事而撓吾法焉所謂吉士者守恆常之德而利害不能怵抱貞吉之操而事變不能搖者也不有以任之無以成吾之治矣必也推誠信而彼此之不疑隆委托而始終之無間務使得以安吾民濟吾事而平吾法焉吁嚴以去之則小人無以投其釁專以任之則君子有以成其功國家之治也其以是歟抑考之於書禹益伊傅周召之告君至君子小人之際每致意焉蓋君德之隆替世道之升降其原皆出于此非細故也秦漢以下論列之臣鮮知此義惟諸葛孔明之言曰親君子逺小人先漢所以興隆也其竟獨與此合故論者以為三代之遺才云詩不遑啓居玁狁之故戍者自言勞之未息由患之未息也夫玁狁之患不可以不備則戍役之勞自有所不免矣王者於遣戍之時而代為之言若此所謂敘其情而風之以義者歟此詩之意蓋謂人固有不能忘之情然亦有不容巳之義彼休息之樂吾豈獨無其情乎啓居之安吾寧獨無其念乎誠以王命出戍則此身既巳屬之軍旅而勢不容于自便耳是以局促行伍之間奔走風塵之下師出以律而號令之嚴其敢違軍法有常而更代之期何敢後則吾雖有休息之情而固所不暇矣雖懷啓居之念而亦所不遑矣然此豈上人之故欲困我乎豈吾君之必欲勞我乎誠以玁狁猾夏則是舉本以衛夫生靈而義不容於自巳耳彼其侵擾疆埸之患雖亦靡常而慿陵中國之心實不可長使或得肆猖獗則腥羶之憂豈獨在於廊廟如其乘間竊發則塗炭之苦遂將及於吾民是我之不遑休息者無非保乂室家而玁狁之是備也我之不暇啓居者無非靖安中國而外寇之是防也吁敘其勤苦悲傷之情而風以敵愾勤王之義周王以是而遣戍役此其所以勞而不怨也歟大抵人君之為國好戰則亡忘戰則危故用兵雖非先王之得已而即戎之訓亦有所不敢後也觀此詩之遣戍不獨以見周王重於役民憫惻哀憐不容巳之至情而亦可以見周之防禦玁狁於平日者蓋亦無所不至故玁狁之在三代終不得以大肆其荼毒後世無事則懈弛有事則張皇戎之不靖也有由然哉孔曼且碩萬民是若新廟制以順人心詩人之頌魯侯也夫人君之舉動當以民心為心也魯侯修廟而有以順乎民焉詩人得不頌而美之乎魯人美僖公之修廟而作是詩及此謂夫我公之修廟也材木盡來甫之良經畫殫奚斯之慮意以卑宫之儉可以自奉而非致孝乎鬼神則新廟之作雖甚曼焉亦所宜矣茅茨之陋可以自處而非敬事其先祖則新廟之修雖甚碩焉亦非過矣是以向之卑者今焉增之使高而體制極其巍峩蓋斯革斯飛孔曼而長也向之隘者今焉拓之使廣而規模極其弘逺蓋間如奕如且碩而大也然廟制之極美者豈獨以竭我公之考思實所以從萬民之仰望蓋以周公皇祖德洽下民而廟之弗稱固其所願改作也今之孔曼亦惟民之所欲是從耳澤流後世而廟之弗緝固其所願修治也今之孔碩亦惟吾民之所願是順耳是以向之有憾於弗稱者今皆翕然而快睹莫不以為廟之曼者宜也非過也向之致怨于弗緝者今皆欣然而滿望莫不以為廟之碩者非過也宜也吁廟制修於上而民心順於下則其舉事之善於此可見而魯公之賢亦可想矣抑考魯之先君自伯禽以下所以懷養其民人者無非仁愛忠厚之道而周公之功德尤有以衣被而漸漬之是以其民久而不忘雖一廟之修亦必本其先世之澤而頌禱焉降及秦漢干戈之際尚能不廢弦誦守禮義為主死節而漢髙不敢加兵聖人之澤其逺矣哉春秋楚子入陳宣公十一年楚子圍鄭晉荀林父帥師及楚子戰于邲晉師敗績楚子滅蕭晉人宋人衛人曹人同盟于清丘俱宣公十二年外兵順而伯國自褻其威既可貶外兵黷而伯國徒禦以信尤可譏此楚以爭伯為心而晉失待之之道春秋所以兩示其法也自夫晉景無制中夏之略而後楚莊有窺北方之圗始焉縣陳以討罪也而徵舒就戮繼焉入鄭以二巳也而潘尫遂盟一則討晉之所未討一則平鄭之所欲平是雖未免以力假仁然其義則公其辭則順矣晉欲強之必修德以俟觀釁而動斯可也顧乃興無名之師而師之以林父楚子退師矣而猶欲與之戰先縠違命矣而不能行其辟遂致邲戰既北而晉遂不支則是主晉之師者林父也棄晉之師者林父也責安所逃乎春秋於陳書入於鄭書圍者所以減楚之罪而于邲之戰則獨書林父以主之用以示失律喪師之戒也自夫晉人之威既褻而後楚人之勢益張伐蕭不巳而圍其城圍蕭不巳而潰其衆以吞噬小國之威為恐動中華之計是其不能以禮制心而其志已盈其兵巳黷矣晉欲禦之必信任仁賢修明政事斯可也顧乃為清丘之盟而主之以先縠不能強於為善而徒刑牲歃血之是崇不能屈於羣䇿而徒要質鬼神之是務故其盟亦隨敗而晉卒不競則是主斯盟者喪師之縠也同斯盟者列國之卿也責安所歸乎春秋不稱蕭潰特以滅書者所以斷楚之罪而清丘之盟則類貶列卿而人之用以示謀國失職之戒也吁楚莊之假仁晉景之失䇿不待言説而居然於書法見之此春秋之所以為化工歟抑又論之仗義執言桓文之所以制中夏者也晉主夏盟雖世守是道猶不免為三王之罪人而又並其先人之家法而棄之顧汲汲於會狄伐鄭而以討陳遺楚使楚得風示諸侯於辰陵則是時也雖邲之戰不敗清丘之盟不渝而大勢固巳屬之楚矣嗚呼孔子沐浴之請不用於哀公而魯替董公縞素之説見用於高帝而漢興愚於是而重有感也楚子蔡侯陳侯許男頓子沈子徐人越人伐吳昭公五年春秋紀外兵而特進夫逺人以事有可善而類無可絶也蓋君子與人為善而世類之論亦所不廢也然則徐越從楚伐吳而春秋進之者非以此哉慨夫慶封就戮楚已見銜於吳東鄙告入吳復致怨於楚至是楚子內摟諸侯外連徐越而有伐吳之役然何以見其事有可善邪蓋慶封之惡齊之罪人也吳子納而處之是為崇惡楚子執而戮之是為討罪彼曲此直公論巳昭於當時矣夫何吳子違義舉兵困三邑之民報朱方之憾豈非狄道哉楚子率諸侯以伐之聲崇惡之過問違義之由是乃以有名而討無名以無罪而討有罪也揆之彼善於此之義固有可善者矣又何以見其類無可絶邪蓋徐越之夷夏之變於夷者也徐本伯益之後越本大禹之後元德顯功先世嘗通於周室矣惟其後人瀆禮稱王甘心於僣偽得罪於典常故為狄道耳君子正王法以黜之上雖不使與中國等下亦不使與夷狄均蓋以後人之僣偽固法所不貸而先世之功德亦義所不泯也揆之賞延于世之典殆非可絶者歟夫事既有可善類又無可絶故越始見經而與徐皆得稱人聖人以為楚之是伐比吳為善其從之者又皆聖賢之後則進而稱人可也春秋之慎於絶人也如是夫抑論吳楚在春秋亦徐越而巳矣吳以泰伯之後而稱王楚以祝融之後而稱王故春秋亦以待徐越者待之猾夏則舉號慕義則稱人及其浸與盟會亦止於稱子曾不得以本爵通焉蓋待之雖恕而其法固未始不嚴也然則僣偽者其能逃於春秋之斧鉞邪禮記君子慎其所以與人者君子之所謹者交接之道也夫君子之與人交接必有其道矣於此而不謹烏能以無失哉記禮器者其旨若曰觀禮樂而知夫治亂之由故君子必慎夫交接之具君子之與人交接也不有禮乎而禮豈必玉帛之交錯凡事得其序者皆是也禮之得失人之得失所由見是禮在所當慎矣不有樂乎而樂豈必鐘鼓之鏗鏘凡物得其和者皆是也樂之邪正人之邪正所從著是樂在所當慎矣君子於和序之德固嘗慎之於幽獨之地而於接人之際又和序之德所從見也其能以無慎乎君子於禮樂之道固嘗謹之於制作之大而於與人之時亦禮樂之道所由寓也其可以不謹乎故其與人交接也一舉動之微若可忽矣而必兢兢焉常致其檢束務有以比於禮而比於樂其與人酬酢也一語默之細若可易矣而必業業焉恆存夫戒謹務有以得其序而得其和所與者鄉邦之賤士而其笑語率獲肅然大賔是接也况其所與之尊貴乎所對者閭閻之匹夫而其威儀卒度嚴乎大祭是承也况其所對之嚴憚乎君子之慎其所以與人者如此此其所以動容周旋必中夫禮樂而無失色於人也歟抑論禮樂者與人交接之具慎獨者與人交接之本也君子戒慎於不睹不聞省察於莫見莫顯使其存於中者無非中正和樂之道故其接於物者自無過與不及之差昔之君子乃有朝會聘享之時至於失禮而不自覺者由其無慎獨之功是以陽欲掩之而卒不可掩焉耳故君子而欲慎其所以與人必先慎獨而後可心好之身必安之君好之民必欲之內感而外必應上感而下必應夫君之於民猶心之於身也雖其內外上下之不同而感應之理何嘗有異乎昔聖人之意謂夫民以君為心也君以民為體也體而必從夫心則民亦必從夫君矣彼其心具於內而體具於外內外之異勢若不相蒙矣然心惟無好則已一有所好而身之從之也自有不期然而然如心好夫采色則目必安夫采色心好夫聲音則耳必安夫聲音心而好夫逸樂則四肢亦惟逸樂之是安矣發於心而慊於巳有不勉而能之道也動於中而應於外有不言而喻之妙也是何也心者身之主心好於內而體從於外斯亦理之必然歟若夫君之於民亦何以異於是彼其君居於上而民居於下上下之異分若不相關矣然君惟無好則巳一有所好而民之欲之也亦有不期然而然如君好夫仁則民莫不欲夫仁君好夫義則民莫不欲夫義君而好夫暴亂則民亦惟暴亂之是欲矣倡於此而和於彼有不令而行之機也出乎身而加乎民有不疾而速之化也是何也君者民之主君好於上而民從於下固亦理之必然歟是則內外上下夲同一體而此感彼應自同一機人君之於民也而可不慎其所以感之邪抑論之身固必從乎心矣民固必從乎君矣抑孰知心之存亡有繫於身而君之存亡有繫於民乎為人君者但知下之必從夫上而不知上之存亡有繫於下則將恣己徇欲惟意所為而亦何所忌憚乎故夫子於下文必繼之曰君以民存亦以民亡噫可懼乎論人君之心惟在所飬人君之心顧其所以養之者何如耳養之以善則進於髙明而心日以智養之以惡則流於汙下而心日以愚故夫人君之所以養其心者不可以不慎也天下之物未有不得其養而能生者雖草木之微亦必有雨露之滋寒暖之劑而後得以遂其暢茂條逹而况於人君之心天地民物之主也禮樂刑政教化之所自出也非至公無以絶天下之私非至正無以息天下之邪非至善無以化天下之惡而非其心之智焉則又無以察其公私之異識其邪正之歸辨其善惡之分而君心之智否則固繫於其所以養之者也而可以不慎乎哉君心之智在於君子之養之以善也君心之愚在於小人之養之以惡也然而君子小人之分亦難乎其為辨矣人心惟危道心惟微堯舜之相授受而所以丁寧反覆者亦惟以是則夫人君之心亦難乎其為養矣而人君一身所以投間抵隙而攻之者環於四靣則夫君心之養固又難乎其無間矣是故必有匡直輔翼之道而後能以飬其心必有洞察機微之明而後能以飬其心必有篤確精專之誠而後能以飬其心斯固公私之所由異邪正之所從分善惡之所自判而君心智愚之關也世之人君孰不欲其心之公乎然而每失之於邪也孰不欲其心之善乎然而每失之於惡也是何也無君子之飬也飬之以君子而不能不間之以小人也則亦無惑乎其心之不智矣昔者太甲顛覆典刑而卒能處仁遷義為有商之令主則以有伊尹之聖以飬之成王孺子褓襁而卒能祗勤于德為成周之盛王則以有周公之聖以飬之桀紂之心夫豈不知仁義之為美而卒不免於荒淫敗度則其所以飬之者惡來飛廉之徒也嗚呼是亦可以知所飬矣人雖至愚也亦寧無善心之萌雖其賢智也亦寧無惡心之萌於其善心之萌也而有賢人君子擴充培植於其間則善將無所不至而心日以智矣於其惡心之萌也而有小夫憸人引誘逢迎於其側則惡亦無所不至而心日以愚矣故夫人君而不欲其心之智焉斯已矣苟欲其心之智則賢人君子之飬固不可一日而缺也何則人君之心不公則私不正則邪不善則惡不賢人君子之是與則小夫憸人之是狎固未有漠然中立而兩無所在者一失其所飬則流於私而心之智蕩矣入於邪而心之智惑矣溺於惡而心之智亡矣而何能免於庸患之歸乎夫惟有賢人君子以為之飬則義理之學足以克其私心也剛大之氣足以消其邪心也正直之論足以去其惡心也擴其公而使之日益大扶其正而使之日益強作其善而使之日益新夫是之謂匡直輔翼之道而所以飬其心者有所賴然而柔媚者近於純良而凶憸者類於剛直故士有正而見斥人有憸而獲進而卒無以得其匡直輔翼之資於是乎慎釋而明辨必使居於前後左右者無非賢人君子而不得有所混淆於其間夫是之謂洞察幾微之明而所以養其心者無所惑然而梗直者難從而諂諛者易入也拂忤者難合而阿順者易親也則是君子之飬未幾而小人之飬已隨養之以善者方退而養之以惡者已入故夫人君之於賢士君子必信之篤而小人不得以間任之專而邪佞不得以阻并心悉慮惟匡直輔翼之是資焉夫是之謂篤確專一之誠而所以飬其心者不至於有鴻鵠之分不至於有一暴十寒之間夫然後起居動息無非賢士君子之與處而所謂飬之以善矣夫然後私者克而心無不公矣邪者消而心無不正矣惡者去而心無不善矣公則無不明正則無不逹善則無不通而心無不智矣夫然後可以絶天下之私可以息天下之邪可以化天下之惡可以興禮樂修教化而為天地民物之主矣而此何莫而不在於其所養邪何莫而不在於養之以善邪人君之心惟在所養范氏之説蓋謂養君心者言也而愚之論則以為非人君有洞察之明專一之誠則雖有賢士君子之善養亦無從而效之而猶未及於人君之所以自養也然必人君自養其心而後能有洞察之明專一之誠以資夫人而其所以自養者固非他人之所能與矣使其勉強於大庭昭晣之時而放縱於幽獨得肆之地則雖有賢人君子終亦無如之何者是以人君尤貴於自養也若夫自養之功則惟在於存養省察而其要又不外乎持敬而已愚也請以是為今日獻表擬唐張九齡上千秋金鑑録表開元二十四年開元二十四年八月五日具官臣張九齡上言恭遇千秋聖節謹以所撰千秋余鑑録進呈者臣九齡誠惶誠恐頓首頓首伏以古訓有獲成憲無愆自昔致治之明君莫不師資於往典故武王有洪範之訪而高宗起舊學之思兹蓋伏遇乃武乃文好問好察赤龍感唐堯之瑞白魚兆周武之興是以誕應五百載之昌期而能起紹億萬年之大統時維八月節屆千秋凡茲鼎軸之臣皆有寶鏡之獻祝頌所寓恭敬是將臣九齡學本靣墻忠存自牗竊謂群臣所獻雖近正冠之喻揆諸事君以禮尚虧懋德之規顧瓌竒之珍則尚方所自有而珠玉是寶雖諸侯以為殃仰窺文皇以人為鑑之謨竊取伏羲制器尚象之義覃思古昔效法丹書粗述廢興謬名金鑑蓋搜尋舊史無非金石之言而採掇前聞頗費陶鎔之力躬鉛槧以實録敢粉飾乎虛文鼓鑄堯舜之模爐治商周之範考是非之迹莫遁妍媸觀興替所由真如形影彼六經之道夫豈不明而諸子之談亦寧無見顧恐萬機之弗暇願攄一得而少禆雖未能如賈山之至言或亦可方陸生之新語善可循而惡可戒情狀具在目前亂有始而治有源儀刑視諸掌上公私具燭光涵陽德之精幽隱畢陳寒照隂邪之膽蓋華封之祝未罄於三而魏徴所亡聊獻其一若陛下能自得師或亦可近取諸此視逺亦維明矣反觀無不瞭然誠使不蔽於私自當明見萬里終能益磨以義固將洞察纎毫維茲昧爽所需用為緝熙之助伏願時賜披閲無使遂掩塵埃宜監于殷勵周宣之明發顧諟天命效成湯之日新永惟丕顯之昭昭庶識微衷之耿耿月臨日照帝德運於光天嶽峙川流聖夀同於厚地臣無任瞻天仰聖激切屏營之至謹以所述千秋金鑑録隨表上進以聞䇿五道問王者功成作樂治定制禮故功大者樂備治遍者禮具而五帝不沿樂三王不襲禮也自漢而下禮樂日衰既不能祖𫐠憲章以復三代之舊制則亦不過苟且因循以承近世之陋習而巳蓋有位無德固宜其然也惟我太祖太宗以聖人在天子之位故其制作之隆卓然千古誠有不相沿襲者獨其廣大淵微有非世儒所能測識耳夫合九廟而同堂其有倣於古乎一郊社而並祭其有見於經乎聲容之為備而郊祭之舞去干戚以為容雅頌之為美而燕享之樂屬教坊以司頌是皆三代所未聞而創為之者然而治化之隆超然於三代之上則其間固宜自有考諸三王而不謬者而非聖人其孰能知之夫魯吾夫子之鄉而先王之禮樂在焉夫子之言曰吾學周禮今用之吾從周斯固魯人之所世守也諸士子必能明言之聖人之制禮樂非直為觀美而巳也固將因人情以為之節文而因以移風易俗也夫禮樂之説亦多端矣而其大意不過因人情以為之節文是以禮樂之制雖有古今之異而禮樂之情則無古今之殊傳曰知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明故夫鐘鼓管磬羽籥干戚者樂之器也屈伸俯仰綴兆舒疾者樂之文也簠簋爼豆制度文章者禮之器也升降上下周旋裼襲者禮之文也夫所謂禮樂之情者豈徒在於鐘鼓干戚簠簋制度之間而巳邪豈徒在於屈伸綴兆升降周旋之間而已邪後世之言禮樂者不本其情而致詳於形器之末是以論明堂則惑於吕氏考工之説議郊廟而局於鄭氏王肅之學鐘吕紛爭於秬黍而尺度牽泥於周天紛紛藉藉卒無一定之見而禮樂亦因愈以廢墜是豈知禮樂之大端不過因人情而為之節文者乎傳曰禮也者義之實也協諸義而協則禮雖先王未之有可以義起也孟子曰今之樂猶古之樂也今夫行禮於此而有以即夫人心之安焉作樂於此而使聞之者欣欣然有喜色焉則雖義起之禮世俗之樂其亦何異於古乎使夫行禮於此而有以大拂乎人之情作樂於此而聞之者疾首蹙額而相告也則雖折旋周禮而戞擊咸韶其亦何補於治乎即是説而充之則執事之所以下詢者雖九廟異制可也合而同堂亦可也郊社異地可也一而並祭亦可也聲容之備固善矣而苟有未備焉似亦無傷也雅頌之純固美矣而苟有未純焉或亦無患也嗚呼此我太祖太宗之所以為作者之聖而有以深識夫禮樂之情者歟竊嘗伏觀祖宗之治化功德蕩蕩巍巍蟠極天地之外真有以超越三代而嫓美於唐虞者使非禮樂之盡善盡美其亦何以能致若是乎草莽之臣心亦能知其大而口莫能言之故嘗以為天下之人苟未能知我祖宗治化功德之隆則於禮樂之盛固宜其有所未識矣雖然先王之制則亦不可以不講也祭法天子七廟三昭三穆與太祖之廟而七益以文武世室而為九廟門皆南向主皆東向各擅一廟之尊而昭穆不紊焉則周制也郊社之禮天尊而地卑郊以大報天而社以神地道故燔柴於泰壇祭天也瘞埋於泰折祭地也其不並祭久矣祭天之用樂則吕氏月令以仲夏命樂師修鞀鞞鼓均琴瑟管簫執干戚戈羽調竽笙竾簧飭鐘磬柷敔而用盛樂以大雩帝則祭天之樂有干戚戈羽矣子夏告魏文侯以古樂以為進旅退旅和正以廣弦匏笙簧會守拊鼓始奏以文復亂以武治亂以相訊疾以雅而所謂及優侏儒者謂之新樂夫國家郊廟之禮雖以義起固亦不害其為協諸義而協矣雖然豈若協於義而合於古之為尤善乎國家祀享之樂雖不效古固亦不害其為因人情而為之飾矣雖然豈若因人情而又合於古之尤善乎昔者成周之禮樂至周公而始備其於文武之制過者損之不及者益焉而後合於大中至正此周公所以為善繼善述而以逹孝稱也儒生稽古之談固未免於拘滯所敢肆其狂言則恃有善繼善述之聖天子在上也問佛老為天下害已非一日天下之訟言攻之者亦非一人矣而卒不能去豈其道之不可去邪抑去之而不得其道邪將遂不去其亦不足以為天下之患邪夫今之所謂佛老者鄙穢淺劣其妄𥘉非難見而程子乃以為比之楊墨尤為近理豈其始固自有説而今之所習者又其糟粕之餘歟佛氏之傳經傳無所考至於考子則孔子之所從問禮者也孔千與之同時未嘗一言攻其非而後世乃排之不置此又何歟夫楊氏之為我墨氏之兼愛則誠非道矣比之後世貪冒無耻放於利而行者不有間乎而孟子以為無父無君至比於禽獸然則韓愈以為佛老之害甚於楊墨者其將何所比乎抑不知今之時而有兼愛為我者焉其亦在所闢乎其將在所取乎今之時不見有所謂楊墨者則其患止於佛老矣不知佛老之外尚有可患者乎其無可患者乎夫言其是而不知其所以是議其非而不識其所以非同然一辭而以和於人者吾甚耻之故願諸君之深辨之也天下之道一而巳矣而以為有二焉者道之不明也孔子曰道之不明也我知之矣知者過之愚者不及也道之不行也我知之矣賢者過之不肖者不及也嗚呼道一也而人有知愚賢不肖之異焉此所以有過與不及之弊而異端之所從起歟然則天下之攻異端者亦先明夫子之道而巳耳夫子之道明彼將不攻而自破不然我以彼為異端而彼亦將以我為異端譬之穴中之鬪鼠是非孰從而辨之今夫吾夫子之道始之於存養慎獨之微而終之以化育參贊之大行之於日用常行之間而逹之於國家天下之逺人不得焉不可以為人而物不得焉不可以為物猶之水火菽帛而不可一日缺焉者也然而異端者乃至與之抗立而為三則亦道之不明者之罪矣道苟不明茍不過焉即不及焉過與不及皆不得夫中道者也則亦異端而巳矣而何以攻彼為哉今夫二氏之説其始亦非欲以亂天下也而卒以亂天下則是為之徒者之罪也夫子之道其始固欲以治天下也而未免於二氏之惑則亦為之徒者之罪也何以言之佛氏吾不得而知矣至於老子則以知禮聞而吾夫子所嘗問禮則其為人要亦非庸下者其修身養性以求合於道𥘉亦豈甚乖於夫子乎獨其專於為巳而無意於天下國家然後與吾夫子之格致誠正而逹之於修齊治平者之不同耳是其為心也以為吾仁矣則天下之不仁吾不知可也吾義矣則天下之不義吾不知可也居其實而去其名斂其器而不示之用置其心於都無較計之地而亦不以天下之較計動於其心此其為念固亦非有害於天下者而亦豈知其弊之一至於此乎今夫夫子之道過者可以俯而就不肖者可以企而及是誠行之萬世而無弊矣然而子夏之後有田子方子方之後為莊周子弓之後有荀况荀况之後為李斯蓋亦不能以無弊則亦豈吾夫子之道使然哉故夫善學之則雖老氏之説無益於天下而亦可以無害於天下不善學之則雖吾夫子之道而亦不能以無弊也今天下之患則莫大於貪鄙以為同冒進而無耻貪鄙為同者曰吾夫子固無可無不可也冒進無耻者曰吾夫子固汲汲於行道也嗟乎吾以吾夫子之道以為姦則彼亦以其師之説而為姦顧亦奚為其不可哉今之二氏之徒苦空其行而虗幻其説者既已不得其原矣然彼以其苦空而吾以其貪鄙彼以其虗幻而吾以其冒進如是而攻焉彼既有辭矣而何以服其心乎孟子曰經正則庶民興庶民興斯無邪慝矣今不皇皇焉自攻其弊以求明吾夫子之道而徒以攻二氏為心亦見其不知本也夫生復言之執事以攻二氏為問而生切切於自攻者夫豈不喻執事之旨哉春秋之道責巳嚴而待人恕吾夫子之訓先自治而後治人也若夫二氏與楊墨之非則孟子闢之於前韓歐諸子闢之於後而豈復俟於言乎哉執事以為夫子未嘗攻老氏則夫子蓋嘗攻之矣曰鄉願德之賊也蓋鄉願之同乎流俗而合乎汗世即老氏之所謂和其光而同其塵者也和光同塵之説蓋老氏之徒為之者而老氏亦有以啓之故吾夫子之攻鄉願非攻老氏也攻鄉願之學老氏而又失之也後世談老氏者皆出於鄉願故曰夫子蓋嘗攻之也問古人之言曰志伊尹之所志學顔子之所學諸君皆志伊學顔者請遂以二君之事質之夫伊尹之耕於有莘之野而樂堯舜之道也固將終身爾矣湯之聘幣三往而始幡然以起是豈苟焉者而後世至以為割烹要湯斯固孟子巳有明辨至於桀則固未嘗以幣聘尹也而自往就之至再至五昔人謂其急於生人而往速其功也果爾其不類於以割烹要之歟顔淵之學於孔子也其詳且要無有過於四勿之訓兹四言者今之初學之士皆自以為能知而孔門之徒以千數其最下者宜其猶愈於今之人也何獨唯顔子而後可以語此乎至於簞瓢陋巷而不改其樂此尤孔子之所深嘉屢嘆而稱以為賢者而昔之人乃以為哲人之細事將無類於今之𥘉學自謂能知四勿之訓者乎夫尹也以湯之聖則三聘而始往以桀之虐則五就而不辭顔之四勿孔門之徒所未聞而今之𥘉學自以為能識簞瓢之樂孔子以為難而昔人以為易也兹豈無其説乎不然則伊尹之志荒而顔子之學淺矣求古人之志者必先自求其志而後能辨其出處之是非論古人之學者必先自論其學而後能識其造詣之深淺此伊尹之志顔子之學所以未易於窺測也嘗觀伊尹耕於有莘之野而樂堯舜之道固將終其身於畎畝雖祿之以天下有弗顧者其後感成湯三聘之勤而始幡然以起是誠甚不易矣而戰國之士猶以為割烹要湯向非孟氏之辨則千載之下孰從而知其説之妄乎至於五就桀之説則尚有可疑者孟子曰往役義也往見不義也夫尹以庶人而往役於桀可也以行道而往就於桀不可也尹於成湯之聖猶必待其三聘者以為身不可辱而道不可往也使尹不俟桀之聘而自往則其辱身枉道也甚矣而何以為伊尹乎使尹之心以為湯雖聖臣也桀雖虐君也而就之則既以為君矣又可從而伐之乎桀之暴虐天下無不知者彼置成湯之聖而弗用尚何有於伊尹使尹不知而就之是不知也知而就之是不明也就之而復伐之是不忠也三者無一可而謂伊尹為之乎柳宗元以為伊尹之五就桀是大人之欲速其功且曰吾觀聖人之急生人莫若伊尹伊尹之大莫大於五就桀蘇子瞻譏之以為宗元欲以此自解其從叔文之非可謂得其心矣然五就之説孟子亦嘗言之而説者以為尹之就桀湯進之也則尹惟知以湯之心為心而巳是在聖人固必自有以處此而愚以為雖誠有之亦孟子所謂有伊尹之志則可耳不然吾未見其不為反覆悖亂之歸也至於顔子四勿之訓此蓋聖賢心學之大有未易以言者彼其自謂能知則譬之越南冀北孰不知越之為南而冀之為北至其道理之曲折險易自非所嘗經歷莫從而識之也今以四勿而詢人則誠未見其有不知者及究其所謂非禮則又莫不喑然而無以為答也今夫天下之事固有似禮而非禮者矣亦有似非禮而實為禮者矣其纎悉毫釐至於不可勝計使非盡格天下之物而盡窮天下之理則其疑似幾微之間孰能決然而無所惑哉夫於所謂非禮者既有未辨而斷然欲以之勿視聼言動是亦告子之所謂不得於言而勿求於心耳其何以能克已復禮而為仁哉夫惟顔子博約之功巳盡於平日而其明睿所照既巳略無纎芥之疑故於事至物來天理人欲不待議擬而巳判然然後行之勇決而無疑滯此正所謂有至明以察其幾有至健以致其決者也孔門之徒自子貢之頴悟不能無疑於一貫則四勿之訓宜乎唯顔子之得聞也若夫簞瓢之樂則顔子之賢盡在於此蓋其所得之深者周子嘗令二程尋之則既知其難矣惟韓退之以為顔子得聖人為之依歸則其不憂而樂也豈不易顧以為哲人之細事初若無所難者是蓋言其外而未究其中也蓋簞瓢之樂其要在於窮理其功始於慎獨能窮理故能擇乎中庸而復理以為仁能慎獨故能克已不二過而至於三月不違蓋其人欲淨盡天理流行是以內省不疚仰不愧俯不怍而心廣體胖有不知其手舞足蹈者也退之之學言誠正而弗及格致則窮理慎獨之功正其所大缺則於顔子之樂宜其得之淺矣嗟乎志伊尹之志也然後能知伊尹之志學顔子之學也然後能知顔子之學生亦何能與於此哉顧其平日亦有所不敢自暴自棄而心融神會之餘似亦微有所見而執事今日之問又適有相感發者是以輒妄言之幸執事不以為僣而教之也問風俗之美惡天下之治忽關焉自漢以來風俗之變而日下也猶江河之日趨於海也不知其猶可挽而復之古乎將遂往而不返也孔子謂齊一變至於魯魯一變至於道而説者以為二國之俗有美惡故其變而之道也有難易夫風俗之在三代也不知其凡幾變矣而始為漢其在漢也又不知其凡幾變矣而始為唐為宋就使屢變而上焉不過為漢而上耳為唐而止耳而何以能遂復於三代乎今之風俗則賈誼之所太息者有之矣皇上之德過於漢文諸士苟有賈生之談焉固所喜聞而樂道也天下之患莫大於風俗之頽靡而不覺夫風俗之頽靡而不覺也譬之潦水之赴壑浸淫泛濫其始若無所患而既其末也奔馳潰決忽焉不終朝而就竭是以甲兵雖強土地雖廣財賦雖盛邉境雖寧而天下之治終不可為則風俗之頽靡實有以致之古之善治天下者未嘗不以風俗為首務武王勝殷未及下車而封黃帝堯舜之後下車而封王子比干之墓釋箕子之囚式啇容之閭當是時也拯溺救焚之政未暇悉布而先汲汲於為是者誠以天下風俗之所關而將以作興其篤厚忠貞之氣也故周之冨強不如秦廣大不如漢而延世至於八百年者豈非風俗之美致然歟今天下之風俗則誠有可慮者而莫能明言之何者西漢之末其風俗失之懦東漢之末其風俗失之激晉失之虛唐失之靡是皆有可言者也若夫今之風俗謂之懦則復類於悍也謂之激則復類於同也謂之虗則復類於瑣而謂之靡則復類於鄙也是皆有可慮之實而無可狀之名者也生固亦有見焉而又有所未敢言也雖然聖天子在上賢公卿在位於此而不直是無所用其直矣請遂言之孔子曰鄉願德之賊也孟子曰非之無舉也刺之無刺也居之似忠信行之似廉潔同乎流俗合乎汙世自以為是而不可與入堯舜之道閹然媚於世者是鄉願也蓋今風俗之患在於務流通而薄忠信貴進取而賤廉潔重儇狡而輕朴直議文法而略道義論形迹而遺心術尚和同而鄙狷介若是者其浸淫習染既非一日則天下之人固已相忘於其間而不覺驟而語之若不足以為患而天下之患終必自此而起泛而觀之若無與於鄉願而徐而察之則其不相類者幾希矣愚以為欲變是也則莫若就其所藐者而振作之何也今之所薄者忠信也必從而重之所賤者廉潔也必從而貴之所輕者朴直也必從而重之所遺者心術也必從而論之所鄙者狷介也必從而尚之然而今之議者必以為是數者未嘗不振作之也則亦不思之過矣大抵聞人之言不能平心易氣而先橫不然之念未有能見其實然者也夫謂是數者之未嘗不振作之也則夫今之所務者果忠信歟果流通歟所貴者果進取歟果廉潔歟其餘者亦皆以是而思之然後見其所謂振作之者蓋亦其名而實有不然矣今之議者必且以為何以能得其忠信廉潔之實而振作之則愚以為郭隗之事斷亦可見也為人上者獨患無其誠耳苟誠心於振作吾見天下未有不翕然而向風者也孟子曰伯夷聖之清者也柳下惠聖之和者也故聞伯夷之風者頑夫廉懦夫有立志聞柳下惠之風者鄙夫敦薄夫寬夫夷惠之風所以能使人聞於千載之下而興起者誠焉而巳耳今曰吾將以忠信廉潔振作天下而中心有弗然焉則夫情願之所謂居之似忠信而行之似廉潔者固亦未嘗無也問明於當世之務者惟豪傑為然今取士於科舉雖未免於記誦文辭之間然有司之意固惟豪傑是求也非不能鈎深索隱以探諸士之博覽然所以待之淺矣故願相與備論當世之務夫官冗矣而事益不治其將何以釐之賦繁矣而財愈不給其將何以平之建屏滿於天丅而賦祿日增勢將不掉其將何以處之清戎遍於海內而行伍日耗其將何以籌之蝗旱相仍流離載道其將何以拯之獄訟煩滋盜賊昌熾其將何以息之勢家侵利人情怨咨何以裁之戎胡窺竊邉鄙未寧何以攘之凡此數者皆當今之急務而非迂儒曲士之所能及也願聞其説執事詢當世之務而以豪傑望於諸生誠汗顔悚息懼無以當執事之待然執事之問則不可虗也生請無辭以對蓋天下之患莫大於紀綱之不振而執事之所問者未及也夫自古紀綱之不振由於為君者垂拱宴安於上而為臣者玩習懈弛於下今朝廷出片𥿄以號召天下而百司庶府莫不震憟悚懼不可謂紀綱之不振然而下之所以應其上者不過簿書文墨之間而無有於貞固忠誠之實譬之一人之身言貌動止皆如其常而神氣恍然若有不相攝者則於險阻煩難必有不任其勞矣而何以成天下之亹亹哉故愚以為當今之務莫大於振肅紀綱而後天下之治可從而理也是以先進紀綱之説而後及執事之問夫官冗而事不治者其弊有三朝廷之所以鼓舞天下而奔走豪傑者名器而巳孔子曰惟名與器不可以假人今者不能慎惜而至或加之於異道憸邪之輩又使列於賢士大夫之上有志之士吾知其不能與之齒矣此豪傑之所以解體而事之所以不治者名器之太濫也至於升授之際不論其才之堪否而槩以年月名次之先後為序使天下之人皆有必得之心而無不可為之慮又一事特設一官或二人而共理一職十羊九牧徒益紛擾至於邉逺疲弊之地宜簡賢能特加撫緝功成績著則優其遷擢以示崇奬有志之士宜亦無不樂為者而乃反委之於庸劣遂使日益凋瘵則是選用太忽之過也天下之治莫急守令而令之於民尤為切近昔漢文之時為吏者長子孫居官以職為氏今者徒據𥿄上之功績函於行取而責效於二三年之間彼為守令者因是亦莫不汲汲於求去而莫有誠確久逺之圗此則求效太速之使然耳賦繁而財不給者此無益之費多而冗食之徒衆也去是二者而又均一天下之賦使每郡各計其所入之數而均之於田不得有官民三則之異則詭射之弊息而賦亦稍平矣至於建屏之議尤為當今之切務而天下之人莫敢言者欲求善後之䇿則在於朝廷之上心於繼志而不以更改為罪建議之臣心於為國而不以獲罪自阻然後可以議此不然雖論無益矣蓋昔者漢之諸侯皆封以土地故其患在強大而不分分則易弱矣今之藩國皆給以食祿故其患在衆多而不合合則易辦矣然鼂錯一言而首領不保天下雖悲錯之以忠受戮其誰復敢言乎清戎之要在於因地利而順人情蓋南人之習於南而北人之習於北是謂地利南之不安於北而北之不安於南是謂人情今以其清而巳得者就籍之於其本土而以其清而不得者之糧餽輸之於邉募驍勇以實塞下或亦兩得之矣蝗旱相仍而流離載道者官冗而事益不治之所致也獄訟繁滋而盜賊昌熾者賦繁而財愈不給之所起也勢家侵利而人情怨咨則在於制之以禮而一轉移於向背之間而已昔田蚡請考工地以益宅武帝怒曰何不遂取武庫蚡懼而退夫以田蚡之橫而武帝一言不敢復縱况未及蚡者誠有以禁戒懲飭之其亦何敢肆無忌憚也哉胡戎窺竊而邉鄙未寧則在於備之不預而畏之太深之過也夫戎虜之患既深且久足可為鑒矣而當今之士苟遇邉報稍寧則皆以為不復有事解嚴弛備恬然相安以苟歲月而所謂選將練兵蓄財養士者一且置之度外縱一行焉亦不過取具簿書而實無有於汲汲皇皇之意及其一旦有事則倉黃失措若不能以終日蓋古之善御戎狄者平居無怠忽苟且之心故臨事無紛張繆戾之患兢惕以備之談笑以處之此所以為得也若夫制御之䇿則古今之論詳矣在當事者擇而處之生不能别為之説也夫執事之所以求士者不專於記誦文辭之間故諸生之文亦往往出於科舉之外惟其説之或有足取則執事幸採擇之山東鄉試録後序弘治甲子秋八月甲申山東鄉試録成考試官刑部主事王守仁既序諸首簡所以紀試事者慎且詳矣鼎承乏執事後有不容無一言以申告登名諸君子者夫山東天下之巨藩也南峙泰岱為五嶽之宗東滙滄海會百川之流吾夫子以道德之師鍾靈育秀挺生於數千載之上是皆窮天地亘古今超然而獨盛焉者也然陟泰岱則知其髙觀滄海則知其大生長夫子之邦宜於其道之髙且大者有聞焉斯不愧為邦之人矣諸君子登名是録者其亦有聞乎哉夫自始學焉讀其書聚而為論辨發而為文詞至於今資藉以階尺寸之進而方來未已者皆夫子之緒餘也獨於道未之聞是固學者之通患不特是邦為然也然海與岱天下知其高且大也見之真而聞之熟必自東人始其於道則亦宜若是焉可也且道豈越乎所讀之書與所論辨而文詞之者哉理氣有精粗言行有難易窮逹有從違此道之所以鮮聞也夫海岱云者形勝也夫子之道德也者根本也雖若相參並立於天地間其所以為盛則又有在此而不在彼者矣鼎實陋於聞道幸以文墨從事此邦冀所録之士有是人也故列東藩之盛樂為天下道之
