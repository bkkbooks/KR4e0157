front:
  text: 王文成公全書卷之二十
  hash: sha256:e2a668656a89e98543343a35e3ac66755af975b16b045c42b13557ccd95e95e3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_015-1a}
body:
  text: 外集二詩廬陵詩六首逰瑞華二首簿領終年未出郊此行聊解俗人嘲憂時有志懷先逹作縣無能愧舊交松古尚存經雪幹竹髙還長拂雲稍溪山處處堪行樂正是浮名未易拋其二萬死投荒不擬回生還且復荷栽培逄時已負三年學治劇兼非百里才身可益民寧論屈志存經國未全灰正愁不是中流砥千尺狂瀾豈易摧古道古道當長坂肩輿入暮天蒼茫聞驛鼓泠落見炊煙凍燭寒無熖泥爐濕未燃正思江檻外間郤釣魚船立春日道中短述臘意中宵盡春容傍曉生野塘冰轉緑江寺雪消晴農事沾泥犢羈懷聽谷鶯故山梅正發誰守𣣔歸情公館午飯偶書行臺依獨寺僧屋自成鄰殿古凝殘雪墻低入早春巷泥晴淖馬􅉉日暖堪人雪散小岩碧松梢挂月新午憩香社寺修程動百里往往餉僧居佛鼓迎官急禪床為客虛桃花成井落雲水接郊墟不覺泥塗澀看山興有餘京師詩二十四首正德庚午年十月升南京刑部主事辛未年入覲調北京吏部主事作夜宿功德寺次宗賢韻二絶山行𥘉試夾衣輕腳軟黃塵石路生一夜洞雲眠未足湖風吹月渡溪清水邉楊柳覆茅楹飲馬春流更一登坐久遂忘歸路夕溪雲正瀉暮山青别方叔賢四首西樵山色逺依依東指江門石路微料得楚雲臺上客久懸秋月待君歸自是孤雲天際浮篋中枯蠧豈相謀請君靜後看羲畫曾有陳篇一字否休論寂寂與惺惺不妄由來即性情笑却殷勤諸老子翻從知見覔虛靈道本無為只在人自行自住豈須鄰生中便是天台路不用漁郎更問津白灣六章宗巖文先生居白浦之灣四方學者稱曰白浦先生而不敢以姓字某素高先生又辱為之僚因為書白灣二字并詩以詠之浦之灣其白漫漫彼美君子在水之盤灣之浦其白瀰瀰彼美君子在水之涘雲之溶溶于灣之湄君子于處民以為期雲之油油于灣之委君子于興施及四海白灣之渚于逰以處彼美君子兮可以容與白灣之洋于濯以湘彼美君子兮可以徜徉寄隱巖每逄山水地便有卜居心終歲風塵裏何年滄海潯洞寒泉滴細花瞑石房深青壁須留姓他時好共尋香山次韻尋山到山寺得意却忘山巖樹坐來靜壁蘿春自間樓臺星斗上鐘磬翠微間頓息塵寰念清溪踏月還夜宿香山林宗師房次韻幽壑來尋物外情石門遙指白雲生林間伐木時聞響谷口逄僧不記名天壁倒涵湖月曉煙梯髙接緯階平松堂靜夜渾無寐到枕風泉處處聲久落泥途惹世情𬗋崖丹壑是乎生養真無力常懷靜竊祿未歸羞問名樹隱洞泉穿石細雲回溪路入花平道人只住層蘿上明月峯頭有磬聲别湛甘泉二首行子朝欲發驅車不得留驅車下長坂顧見城東樓逺别情已慘况此艱難秋分手訣河梁涕下不可收車行望漸杳飛埃越層丘遲回岐路側孰知我心憂其二我心憂以傷君去阻且長一别豈得巳母老思所將奉命危難際流俗反猜量黃鵠萬里逝豈伊為稻梁棟火及毛羽燕雀猶棲堂跳梁多不測君行戒前途逹命諒何滯將母能忘虞安居尤穽擭關路非𡵨嶇令德崇易簡可以知險阻結茆湖水隂幽期終不忘伊爾得相就我心亦何傷世艱變倐忽人命非可常斯文天未墜别短會日長南寺春月夜風泉間竹房逄僧或停楫先掃白雲床贈别黃宗賢古人戒從惡今人戒從善從惡乃同汚從善翻滋怨紛紛嫉􅎱興指謫相非訕自非篤信士依違多背面寧知竟漂流淪胥亦汚賤卓哉汪陂子奮身勇厥踐拂衣還舊山霧隱期豹變嗟嗟吾黨賢白黑匪難辨歸越詩五首正德壬申年升南京太僕寺少卿便道歸越作四明觀白水二首邑南富巖壑白水尤奇觀興來每思往十年就兹觀停騶指絶壁涉澗緣危蟠百源旱方歇雲際猶飛湍霏霏灑林薄漠漠凝風寒前聞若未愜仰視終莫攀石隂暑氣薄流觸遡回瀾兹逰詎盤樂養靜意所關逝者諒如斯哀此歲月殘擇幽雖得所避時時猶難劉樊古方外感慨有餘嘆千丈飛流舞白鸞碧潭倒影鏡中看藤蘿半壁雲煙濕殿角長年風雨寒野性從來山水癖直躬更覺世途難卜居斷擬如周叔高卧無勞比謝安杖錫道中用張憲使韻山鳥歡呼𣣔問名山花含笑似相迎風回碧樹秋聲早雨過丹巖夕照明雪嶺插天開玉帳雲溪環碧抱金城懸燈夜宿茅堂靜洞鶴林僧相對清又用曰仁韻每逄佳處問山名風景依稀過眼生歸霧忽連千嶂暝夕陽偏放一溪晴晚投巖寺依雲宿靜愛楓林送雨聲夜久披衣還起坐不禁風月照人清書杖錫寺杖錫青冥端澗壁環天險垂巖下陡壑涉水攀絶巘溪深聽喧瀑路絶駭危棧捫蘿登峻極披翳見平衍僧逋寄孤衲守廢遺荒殿傷兹窮僻墟曾未誅求免探幽冀纍息憤時翻意慘拯援才巳踈栖遲心益眷哀猿嘯春嶂懸燈宿西崦誅茆竟何時白雲愧舒卷滁州詩三十六首正德癸酉年到太僕寺作梧桐江用韻鳯鳥久不至梧桐生高岡我來竟日坐清隂灑衣裳援琴俯流水調短意苦長遺音滿空谷隨風遞悠揚人生貴自得外慕非所臧顔子豈忘世仲尼固遑遑已矣復何事吾道歸滄浪林間睡起林間盡日掃花眠秪是官間愧俸錢門徑不妨春草合齋居長對晚山妍每疑方朔非真隱始信楊雄誤太玄混世亦能隨地得野情終是愛丘園贈熊彰歸門徑荒涼蔓草生相求深愧逺來情千年絶學蒙塵土何處澄江無月明坐看逺山凝暮色忽驚廢葉起秋聲歸途望嶽多幽興為問山田待耦耕别易仲辰州劉易仲從豫滁陽一日問道可言乎豫曰啞子喫苦瓜與你説不得爾要知我苦還須你自喫易仲省然有悟久之辭歸别以詩迢遞滁山春子行亦何逺纍然良苦心惝恍不遑飯至道不外得一悟失群暗秋風洞庭波逰子歸巳晚結蘭意方勤寸草心先斷末學久仳離頽波竟誰挽歸哉念流光一逝不復返送守中至龍盤山中未盡師生六日情天教風雪阻西行茅堂豈有春風坐江郭虛留一月程客邸琴書燈火靜故園風竹夢魂清何年穩閉陽明洞榾柮山爐煮石羹龍蟠山中用韻無奈青山處處情村沽日日辦山行真慚廩食虛官守只把山逰作課程谷口亂雲隨騎逺林間飛雪點衣輕長思淡泊還真性世味年來久絮羔琅琊山中三首草堂寄放琅琊間溪鹿巖僧且共間氷雪能回草木死春風不化山石頑六經散地莫收拾叢棘𬒳道誰刋刪已矣驅馳二三子鳯圗不出吾將還狂歌莫笑酒杯增異境人間得未曾絶壁倒翻銀海浪逺山真作玉龍騰浮雲野思春前動虛室清香靜後凝懶拙惟餘林壑計伐檀長自愧無能風景山中雪後增看山雪後亦誰曾隔溪巖犬迎人吠飲澗飛猱踔樹騰歸騎林間燈火動鳴鐘谷口暮光凝塵蹤正自縚籠在一宿雲房尚未能答朱汝德用韻東去蓬瀛合有津若為風雨動經旬同來海岸登舟在俱是塵寰欲渡人弱水洪濤非世險長年三老定誰真青鸞眇眇無消息悵望煙花又暮春送惟乾二首獨見長年思避地相從千里欲移家慚豫豈有萬間庇借爾剛餘一席沙古洞幽期攀桂樹春溪歸路問桃花故人勞念還相慰回鴈新秋寄綵霞簦笈連年愧逺求本來無物若為酬春城驛路聊相送夜雪空山且復留江浦雲開廬嶽曙洞庭湖闊九疑浮懸知再鼓瀟湘柁應是芙蓉湘水秋别希顔二首中歲幽期亦幾人是誰長負故山春道情暗與物情化世味爭如酒味醇耶水雲門空舊隱青鞋布襪定何晨童心如故容顔改慚愧年年草木新後會難期别未輕莫辭行李滯江城且留南國春山興共聽西堂夜雨聲歸路終知雲外去晴湖想見鏡中行為尋洞裏幽棲處還有峰頭雙鶴鳴山中示諸生五首路絶春山久廢尋野人扶病強登臨同逰仙侣須乘興共探花源莫厭深鳴鳥逰絲俱自得間雲流水亦何心從前却恨牽文句展轉支離嘆陸沉其二滁流亦沂水童冠得幾人莫負詠歸興溪山正暮春其三桃源在何許西峰最深處不用問漁人沿溪踏花去其四池上偶然到紅花間白花小亭間可坐不必問誰家其五溪邉坐流水水流心共間不知山月上松影落衣班龍潭夜坐何處花香入夜清石林茅屋隔溪聲幽人月出每孤往棲鳥山空時一鳴草露不辭芒屨濕松風偏與葛衣輕臨流欲寫倚蘭意江北江南無恨情送德觀歸省二首雪裏閉門十日坐開門一笑忽青天茅簷正好負暄日客子胡為思故園椿樹慣經霜雪老梅花偏向歲寒妍琅琊春色如相憶好放山隂月下船琅琊雪是故園雪故園春亦琅琊春天機動處即生意世事到頭還俗塵立雪浴沂傳故事吟風弄月是何人到家好謝二三子莫向長沮錯問津送蔡希顔三首正德癸酉冬希淵赴南宫試訪豫滁陽遂留閲歲既而東歸問其故辭以疾希淵與豫論學琅琊之間於斯道既釋然矣别之以詩風雪蔽曠野百鳥凍不翻孤鴻亦何事噭噭遡寒雲豈伊稻梁計獨往求其群之子眇萬鍾就我滁水濵野寺同逰請春山共攀援鳥鳴幽谷曙伐木西澗曛清夜湛玄思晴窗玩竒文寂景賞新悟微言欣有聞寥寥絶代下此意冀可論群鳥喧北林黃鵠獨南逝北林豈無枝羅弋苦難避之子丹霞姿辭我雲門去山空響流泉路僻迷深樹長谷何盤紓𬗋芝春可茹求志暫棲巖避喧寧遁世繄豫辱風塵送子愧雲霧匡時已無術希聖徒有慕倘入陽明峰為尋舊棲處何事憧憧南北行望雲依闕兩閛情風塵暫息滁陽駕鷗鷺還尋鑑水盟悟後六經無一字靜餘孤月湛虛明從知歸路多相憶伐木山山春鳥鳴贈守中北行二首江北梅花雪易殘山窗一樹自家看臨行掇贈聊數顆珍重清香是歲寒來何匆促去何遲來去何心莫漫疑不為髙堂雙雪鬢歲寒寧受北風欺鄭伯興謝病還鹿門雪夜過别賦贈三首之子將去逺雪夜來相尋秉燭耿無寐憐此歲寒心歲寒豈徒爾何以贈逺行聖路塞巳久千載無復尋豈無群儒迹蹊徑榛茆深濬流須尋源積土成高岑攬衣望逺道請君從此征濬流須有源植木須有根根源未濬植枝派寧先蕃謂勝通夕話義利分毫間至理匪外得譬猶鏡本明外塵蕩瑕垢鏡體自寂然孔訓示克巳孟子垂反身明明賢聖則請君勿與諼鹿門在何許君今鹿門去千載龐德公猶存棲隱處潔身匪亂倫其次乃避地世人失其心顧瞻多外慕安宅舍弗居狂馳驚奔騖高言詆獨善文非遂巧智瑣瑣功利儒寧復知此意門人王嘉秀實夫蕭琦子玉告歸書此見别意兼寄聲辰陽諸賢王生兼養生蕭生頗慕禪迢迢數千里拜我滁山前吾道既匪佛吾學亦匪仙坦然由簡易日用匪深玄始聞半疑信既乃心豁然譬彼土中鏡暗暗光內全外但去昏翳精明燭媸妍世學如翦綵粧綴事蔓延宛宛具枝葉生理終無緣所以君子學布種培根原萌芽漸舒發暢茂皆由天秋風動歸思共鼓湘江船湘中富英彥往往多及門臨𡵨綴斯語因之寄拳拳滁陽别諸友滁陽諸友從逰送子至烏衣不能别及暮王性甫汝德諸友送至江浦必留居俟豫渡江因書此促之歸并寄諸賢庶幾共進此學以慰離索耳滁之水入江流江潮日復來滁州相思若潮水來往何時休空相思亦何益欲慰相思情不如崇令德掘地見泉水隨處無弗得何必驅馳為千里逺相即君不見堯羔與舜墻又不見孔與跖對面不相識逆旅主人多殷勤出門轉盻成路人寄浮峰詩社晚涼庭院坐新秋微月𥘉生亦滿樓千里故人誰命駕百年多病有孤舟風霜草木驚時態砧杵關河動逺愁飲水曲肱吾自樂茆堂今在越溪頭棲雲樓坐雪二首才看庭樹玉森森忽漫階除巳許深但得諸生通夕坐不妨老子半酣吟瓊花入座能欺酒氷溜垂簷欲墯針却憶征南諸將士未禁寒夜鐵衣沉此日棲雲樓上雪不知天意為誰深忽然夜半一言覺又動人間萬古吟玉樹有花難結果天機無線可通針曉來不覺城頭鼓老懶羲皇睡正沉與商貢士二首見説浮山麓深林繞石溪何時拂衣去三十六巖棲其二見説浮山勝心與浮山期三十六巖內為選一巖竒南都詩四十七首正德甲戌年四月升南京鴻臚寺卿作題歲寒亭贈汪尚和一覺紅塵夢𣣔殘江城六月滯風湍人間炎暑無逃遁歸向山中卧歲寒與徽州程畢二子句句粳粃字字陳却於何處覔知新𬗋陽山下多豪俊應有吟風弄月人山中懶睡四首竹裏藤床識懶人脫巾山麓任吾真病夫巳久逃方外不受人間禮數嗔掃石焚香任意眠醒來時有客談玄松風不用蒲葵扇坐對青崖百丈泉古洞幽深絶世人石床風細不生塵日長一覺羲皇睡又見峰頭上月輪人間白日醒猶睡老子山中睡却醒醒睡兩非還兩是溪雲漠漠水泠泠題灌山小隱二絶茆屋山中早晚成任他風雨任他晴男婚女嫁多年畢不待而今學向平一自移家入𬗋煙深林住久遂忘年山中莫道無供給明月清風不用錢六月五章六月乙亥南都熊峰少宰石公以少宗伯召南都之士聞之有惻然而戚者有欣然而喜者其戚者曰公端介敏直方為留都所倚重今兹往善類失所恃群小罔以嚴辨惑考學者曷從而討究剖政斷疑者曷從而咨決南都非根本地乎而獨不可以公遺之其喜者曰公之端介敏直寧獨留都所倚重其在京師獨無善類乎獨無群小乎獨無辨惑考學剖政斷疑者乎且天子之召之也亦寧以少宗伯將必大用大用則以庇天下斯彚征之慶也公聞之曰戚者非吾之所敢喜者乃吾之所憂也吾思所以逃吾之憂者而不得其道若之何陽明子素知于公既以戚衆之戚喜衆之喜而復憂公之憂乃敘其事為賦六月庸以贈公之行六月凄風七月暑雨倐雨倐寒道修以阻允允君子迪爾寢興毋沾爾行國步斯頻哀此下民靡屆靡極不有老成其何能國吁嗟老成獨遺典刑若屋之傾尚支其楹心之憂矣言靡有所如彼喑人食荼與苦依依長谷言采其芝人各有能我歸孔時昔彼叔季沉湎以逞耄集以咨我人自靖允允君子淑慎爾則靡曰休止民何于極日月其逝如彼滄浪南北其望如彼參商允允君子毋沾爾行如日之升以曷不光守文弟歸省携其手歌以别之爾來我心喜爾去我心悲不為倚門念吾寧舍爾歸長途正炎暑爾行慎興居涼茗勿頻啜節食但無飢勿出船旁立忽登岸上嬉收心每澄坐適意時觀書申洪皆冥頑不足長嗔笞見人勿多説慎默真如愚接人莫輕率忠信持謙卑從來為已學慎獨乃其基紛紛多嗜欲爾病還爾知到家良足樂怡顔報重闈昨秋童蒙去今夏成人歸長者愛爾敬少者恱爾慈親朋稱嘖嘖羡爾能若兹信哉學問功所貴在得師吾匪崇外飾𣣔爾沽名為望爾日慥慥聖賢以為期九兄及印弟誦此共勉之書扇面寄館賔湖上群山落照晴湖邉萬木起秋聲何年歸去陽明洞獨棹扁舟鑑裡行用實夫韻詩從雪後吟偏好酒向山中味轉佳巖瀑隨風雜鐘磬水花如雨落袈裟遊牛首山春尋指天闕煙霞眇何許雙峰久相違千巖來舊主浮雲刺中天飛閣凌風雨探秀澗阿入蘿隂息筐筥滅迹避塵纓清朝入深沮風磴仰門歷淙壑屢窺俯梯雲躋石閣下榻得吾所釋子上方候鳴鐘出延佇頽景耀回盻層飈翼輕舉曖曖林芳暮泠泠石泉語清宵耿無寐峰月升煙宇會晤得良朋可以寄心腑送徽州洪侹承瑞平生舉業最踈慵挾册虛煩五月從竹院檢方時論藥茆堂放鶴或開籠憂時漫有孤忠在好古全無一藝工念我還能來夜雪逄人休説坐春風病中大司馬喬公有詩見懷次韻奉答二首十日無緣拜後塵病夫心地欲生榛詩篇極見憐才意伎倆慚非可用人黃閣望公長秉軸滄江容我老垂綸保釐珍重回天手會看春風萬木新一自多𡵨分路塵堂堂正道遂生榛聊將膚淺窺前聖敢謂心傳啓後人淮海帝圗須節制雲雷大造看經綸枉勞詩句裁風雅欲借盤銘獻日新送諸伯生歸省天涯送爾獨傷神嵗月龍山夢裏春為謝江南諸故舊起居東嶽太夫人間中書卷堪時展靜裡工夫要日新能向塵途薄軒冕不妨簑笠老江濵寄馮雪湖二首竿竹誰隱扶桑東白眉之叟今龐公隔湖聞雞謝墅接渡海有鶴蓬山通鹵田經歲苦秋雨浪痕半壁驚湖風歌聲屋低似金石點也此意當能同海岸西頭湖水東他年簑笠擬從公釣沙碧海群鷗借樵徑青雲一鳥通席有春陽堪坐雪門垂五柳好吟風于今猶是天涯夢悵望青霄月色同諸用文歸用子美韻為别一别煙雲歲外深天涯相見二毛侵孤帆江上親朋意樽酒燈前故國心冷雪晴林還作雨鳥聲幽谷自成吟飲餘莫上峰頭望煙樹迷茫思不禁題王實夫盡隨處山泉著草廬底須松竹掩柴扉天涯逰子何曾出畫裏孤帆未是歸小酉諸峰開夕照虎溪春寺入煙霏他年還向辰陽望却憶題詩在翠微贈潘給事五月滄浪濯足歸正堪荷葉製初衣甲非乙是君休問酉水辰山志未違沙鳥不須疑雀舫江雲先為掃魚磯武陵溪壑猶深僻莫更移家入翠微與沅陵郭掌教記得春眠寺閣雲松林水鶴日為群諸生問業衝星入稚子拈香靜夜焚世事暗隨江草換道情曾許碧山聞别來點瑟還誰鼓悵望煙花此送君别族太叔克彰情深宗族誼同方消息那堪别後荒江上相逄疑未定天涯獨去意重傷身間最覺湖山靜家近殊聞草木香雲路莫嗟遲發軔世塗﨑曲盡羊腸登憑虛閣和石少宰韻山閣新春負一登酒邉孤興晚堪乘松間鳴瑟驚棲鶴竹裡茶煙起定僧望逺每來成久坐傷時有涕恨無能峰頭見説連閶闔幾欲排雲尚未曾登閲江樓絶頂樓荒舊有名髙皇曾此駐龍旌險存道德虛天塹守在蠻夷豈石城山色古今餘王氣江流天地變秋聲登臨授簡誰能賦千古新亭一愴情獅子山殘暑須還一雨清高峰極目快新晴海門潮落江聲急吳苑秋深樹腳明烽火正防胡騎入羽書愁見朔雲橫百年未有涓埃報白髮今朝又幾莖逰清涼寺三首春尋載酒本無期乘興還嫌馬足遲古寺共憐春草沒逺山偏與夕陽宜雨晴澗竹消蒼粉風暖巖花落𬗋㽔昏黑更須凌絶項高懷想見少陵詩其二積雨山行已後期更堪多病益遲遲風塵漸覺𥘉心負丘壑真於野性宜緑樹隂層新作蓋紫蘭香細尚餘㽔輞川圖盡能如許絶是無聲亦有詩其三不顧尚書此日期欲為花外板輿遲繁絲急管人人醉竹徑松堂處處宜雙樹暗芳春寂寞五峰晴秀晚羲㽔暮鐘杳杳催歸騎惆悵煙光不盡詩寄張東所次前韻逺趨君命忽中違此意年來識者稀黃綺曾為炎祚出子陵終向富春歸江船一話千年闊塵夢今驚四十非何日孤帆過天目海門春浪掃漁磯别余縉子紳不須買棹往來頻我亦携家向海濵但得青山隨鹿豕未論黃閣畫麒麟喪心疾已千年痼起死方存六籍真歸向蘭溪溪上問桃花春水正迷津送劉伯光五月茅茨靜竹扉論心方洽忽辭歸滄江獨棹衝新暑白髮高堂戀夕暉謾道六經皆注腳還誰一語悟真機相知若問年來意巳傍西湖買釣磯冬夜偶書百事支離力不禁一官棲息病相侵星辰魏闕江湖逈松柏茅茨歲月深欲倚黃精消白髮由來空谷有餘音曲肱已醒浮雲夢荷蕢休疑擊磬心寄潘南山秋風吹散錦溪雲一笑南山雨後新詩妙盡從言外得易微誰見畫前真登山腳健何妨老留客情深不計貧朱吕月林傳故事他年還許上西鄰送胡廷尉鍾陵雪後市燈殘簫鼓江船發曉寒山水總憐南國好才猷須濟朔方艱綵衣得侍仙舟逺春色行應故里看别去中宵瞻北極五雲飛處是長安與郭子全相别翻憐相見時碧桃開盡桂花枝光隂如許成虛擲世故催人總不知雲路不須朱􅌧去歸帆且得綵衣隨嵐山風景濂溪近此去還應自得師次欒子仁韻送别四首子仁歸以四詩請用其韻答之言亦有過者蓋因子仁之病而藥之病已則去其藥從來尼父欲無言須信無言巳躍然悟到鳶魚飛躍處工夫原不在陳編操持存養本非禪矯枉寧知已過偏此去好從根腳起竿頭百尺未須前野夫非不愛吟詩才欲吟詩即亂思未會性情涵泳地二南還合是淫辭道聼塗傳影響前可憐絶學遂多年正須閉口林間坐莫道青山不解言書悟真篇答張太常二首悟真篇是誤真篇三注由來一手箋恨殺妖魔圖利益遂令迷妄競流傳造端難免張平叔首禍誰誣薛𬗋賢直説與君惟箇字從頭去看野狐禪誤真非是悟真篇平叔當時已有言只為世人多戀著且從情欲起因緣癡人前豈堪談夢真性中難更説玄為問道人還具眼試看何物是青天贛州詩三十二首正德丙子年九月升南贛僉都御史以後作丁丑二月征漳寇進兵長汀道中有感將略平生非所長也提戎馬入汀漳數峰斜日旌旗逺一道春風鼓角揚莫倚二師能出塞極知充國善平羌瘡痍到處曾無輔翻憶鍾山舊草堂回軍上杭山城經月駐旌戈亦復幽尋到薜蘿南國已欣回甲馬東田𥘉喜出農簑溪雲曉度千峰雨江漲新生兩岸波暮倚七星瞻比極絶憐蒼翠晚來多喜雨三首即看一雨洗兵戈便覺光風轉石籮順水飛檣來賈舶絶江喧浪舞漁簔片雲東望懷梁國五月南征想伏波長擬歸耕猶未得雲門𥘉伴漸無多轅門春盡猶多事竹院空間未得過特放小舟乘急浪始聞幽碧出層蘿山田旱久兼逄雨野老歡騰且縱歌莫謂可塘終據險地形原不勝人和吹角峰頭曉散軍橫空萬騎下氤氲前旌已帶洗兵雨飛鳥猶驚捲陳雲南𤱔漸欣農事動東山休共凱歌聞正思鋒鏑堪揮淚一戰功成未足云聞曰仁買田霅上携同志待豫歸二首見説相携霅上耕連簑應巳出烏程荒畬𥘉墾功須倍秋熟雖微稅亦輕雨後湖舠兼學釣餉餘堤樹合間行山人久有歸農興猶向千峰夜度兵月色高林坐夜沉此時何限故園心山中古洞隂蘿合江上孤舟春水深百戰自知非舊學三驅猶愧失前禽歸期久負雲門伴獨向幽溪雪後尋祈雨二首旬𥘉一雨遍汀漳將謂汀虔是摟疆天意豈知分彼此人情端合有炎涼月行今巳虛纒畢斗杓何曾解挹漿夜起中庭成久立正思民瘼欲沾裳見説虔南惟苦雨深山毒霧長隂隂我來偏遇一春旱誰解挽回三日霖寇盜郴陽方出掠干戈塞北還相尋憂民無計淚空墮謝病幾時歸海潯還贛積雨雩都道山途喜乍晴溪流遲渡馬岡樹隱前旌野屋多移竈窮苗尚阻兵迎趨勤父老無輔愧巡行借山亭借山亭子近如何乘興時從夢裡過尚想清池環醉影猶疑花徑駐鳴珂踈簾細雨燈前局碧樹涼風月下歌傳語諸公合頻賞休令歲月亦蹉跎桶岡和邢太守韻二首處處山田盡入畬可憐黎庶丰無家興師正為民痍甚陟險寧辭鳥道斜勝世真如瓴水建先聲不礙嶺雲遮窮巢容有遭驅脅尚恐兵鋒或濫加戢亂興師既有名揮戈真己見風行豈云簿劣能驅䇿實仗皇威自震驚爛額尚慚為上客徙薪尤覺費經營主恩未報身多病旋凱須還隴上耕通天巖青山隨地佳豈必故園好但得此身間塵寰亦蓬島西林日𥘉暮明月來何早醉卧石牀涼洞雲秋未掃逰通天巖次鄒謙之韻天風吹我上丹梯始信青霄亦可躋俯視氛寰成獨慨却憐人世尚多迷東南真境埋名久閩楚諸峯入望低莫道仙家全脫俗三更日出亦聞雞又次陳惟濬韻四山落木正秋聲獨上髙峰望眼明樹色遙連閩蟜碧江流不盡楚天清雲中想見雙龍轉風外時傳一笛橫莫遣新愁添白髮且呼明月醉沉觥忘言巖次謙之韻意到已忘言興劇復忘飯坐我此巖中是誰鑿混沌尼父欲無言逹者窺其本此道何古今斯人去則逺空巖不見人真成面墻立巖深雨不到雲歸花亦濕圓明洞次謙之韻群山走波浪出沒龍蛇脊岩棲寄盤渦沉淪遂成癖我來汲東𬈑爛煮南山石千年熟一炊欲餉岩中客潮頭岩次謙之韻潮頭起平地化作千丈雪棹舟者何人試問巖頭月天成素有志於學兹得告東歸林居靜養其所就可知矣臨别以此𥿄索贈漫為賦此遂寄聲山澤諸賢豫有山林期荏冉風塵際髙秋送將歸神往迹還滯回車當盛年養痾非遁世垂竿鑑湖雲結廬浮峰樹愛日遂庭趨芳景添逰請掎生悟玄魄妙靜息緣慮眇眇素心人望望滄洲去東行訪天沃雲中倘相遇坐忘言巖問二三子幾日巖棲事若何莫將佳景復虛過未妨雲壑淹留久終是塵寰錯誤多澗道霜風踈草木洞門煙月挂藤蘿不知相繼來逰者還有吾儕此意麼留陳惟濬聞説東歸𣣔問舟清逰方此復離憂却看隂雨相淹滯莫道山靈獨苦留薜荔巖高兼得月桂花香滿正宜秋煙霞到手休輕擲塵土驅人易白頭棲禪寺雨中與惟乾同登絶頂深泥冒雨扳天於佳景亦多慳自憐久客頻移棹頗羡高僧獨閉關江草逺連雲夢澤楚雲長斷九嶷山年來出處渾無定慚愧沙鷗盡日間茶寮紀事萬壑風泉秋正哀四山雲霧晚初開不因王事兼程入安得間行向北來登陟未妨安石興縱擒徒羡孔明才乞身已擬全師日歸掃溪邉舊釣臺回軍九連山道中短述百里妖氛一戰清萬峯雷雨洗回兵未能干羽苗頑格深愧壺漿父老迎莫倚謀攻為上策還須內治是先聲功微不願封侯賞但乞蠲輸絶橫征回軍龍南小憩王石巖雙洞絶竒徘佪不忍去因寓以陽明别洞之號兼留此作二首甲馬新從鳥道回覽竒還更陟崔嵬寇平漸喜流移復春暖兼欣農務開兩竇髙明行日月九關深黑閉風雷投簮最好支茅地戀土猶懷舊釣臺洞府人寰此最佳當年空自費青鞋麾幢旖旎懸仙仗臺殿高低接緯階天巧固應非斧鑿化工無乃太安排欲將點瑟携童冠就攬春雲結小齋陽明山人舊有居此地陽明景不如但在乾坤俱逆旅曾留信宿即吾廬行窩已許人先號别洞何妨我借書他日巾車還舊隱應懷兹土復鄉閭再至陽明别洞和邢太守韻二首春山隨處欵歸程古洞幽虛道意生澗壑風泉時逺近石門蘿月自分明林僧住久炊遺火野老忘機罷席爭習靜未緣成久坐却慚塵土逐虛名山水平生是課程一淹塵土遂心生耦耕亦𣣔隨沮溺七縱何緣得孔明吾道羊腸須蠖屈浮名蝸角任龍爭好山當靣馳車過莫漫尋山説避名夜坐偶懷故山獨夜殘燈夢未成蕭蕭總是故園聲草深石徑鼪鼯笑雪靜空山猿鶴驚漫有緘書懷舊侶常牽纓晃負𥘉情雲溪漠漠春風轉𬗋􅌲黃花又自生懷歸二首深慚經濟學封侯都付浮雲自去留往事每因心有得身間方喜世無求狼煙幸息昆陽患蠡測空懷𣏌國憂一笑海天空闊處從知吾道在滄洲身經多難早知非此事年來識者稀老大有情成舊德細謀無計解重圍意常不足真夷道情到方濃是險機悵望衡茅無事日漫吹松火織秋衣送德聲叔父歸姚并序守仁與德聲叔父共學於家君龍山先生叔父屢因場屋一旦以親老辭廪歸養交逰強之出輒笑曰古人一日養不以三公易吾豈以一老母博一弊儒冠乎嗚呼若叔父真知內外輕重之分矣今年夏來贛視某留三月飄然歸興不可挽因謂某曰秋風尊鱸如子之興無日不切然時事若此恐即未能脫吾不能俟子之歸舟吾先歸為子開荒陽明之麓如何嗚呼若叔父可謂真知內外輕重之分矣某方有詩戒叔父曰吾行子可無言輒為賦此猶記垂髫共學年于今鬢髮兩蒼然窮通只好浮雲看歲月真同逝水懸歸鳥長空隨所適秋江落木正無邉何時却返陽明洞蘿月松風掃石眠示憲兒幼兒曹聼教誨勤讀書要孝弟學謙恭循禮義節飲食戒逰戲毋説謊毋貪利毋任情毋鬪氣毋責人但自治能下人是有志能容人是大器凡做人在心地心地好是良士心地惡是凶類譬樹果心是蒂蒂若壞果必墜吾教汝全在是汝諦聼勿輕棄贈陳東川白沙詩裡莆陽子盡是相逄逆旅間開口向人談古禮拂衣從此入雲山江西詩一百二十首正德巳卯年奉敕往福建處叛軍至豐城遭宸濠之變趨還吉安集兵平之八月升副都御史巡按江西作鄱陽戰捷甲馬秋驚鼓角風旌旗曉拂陳雲紅勤王敢在汾淮後戀闕真隨江漢東群醜漫勞同吠犬九重端合是飛龍涓埃未遂酬滄海病懶先須伴赤松書草萍驛九月獻俘北上駐草萍時已暮忽傳王師巳及徐淮遂乘夜速發次壁間韻紀之二首一戰功成未足竒親征消息尚堪危邉𤇺西北方傳警民力東南已盡疲萬里秋風嘶甲馬千山斜日度旌旗小臣何爾驅馳急欲請回鑾罷六師千里風塵一劒當萬山秋色送歸航堂垂雙白虛頻疏門已三過有底忙羽檄西來秋黯黯關河北望夜蒼蒼自嗟力盡螳蜋臂此日回天在廟堂西湖靈鷲高林暑氣淸竺天石壁雨痕晴客來湖上逄雲起僧住峰頭話月明世路久知難直道此身那得尚虛名移家早定孤山計種果支茅却易成寄江西諸士夫甲馬驅馳巳四年秋風歸路更茫然慚無國手醫民病空有官銜縻俸錢湖海風塵雖暫息江湘水旱尚相沿題詩忽憶并州句回首江西亦故園太息一日復一日中夜坐嘆息庭中有嘉樹落葉何淅瀝蒙翳亂藤纒寧知絶根脈丈夫貴剛腸光隂勿虛擲頭白眼昏昏吁嗟亦何及宿淨寺四首十月至杭王師遣人追寧濠復還江西是日遂謝病退居西湖老屋深松覆古藤羈棲猶記昔年曾棋聲竹裡消間晝藥褁窗前對病僧煙艇避人長曉出高峰望逺亦時登而今更是多牽繫欲似當時又不能常苦人間不盡愁每拚須是入山休若為此夜山中宿猶自中宵煎百憂百戰西江方底定六飛南甸尚淹留何人真有回天力諸老能無取日謀百戰歸來一病身可看時事更愁人道人莫問行藏計已買桃花洞裏春山僧對我笑長見説歸山如何十年别依舊不曾間歸興一絲無輔聖明朝兩鬢徒看長二毛自識淮隂非國士由來康節是人豪時方多難容安枕事巳無能𣣔善刀越水東頭尋舊隱白雲茅屋數峰高即事漫述四首從來野性只山林翠壁丹梯處處尋一自浮名縈世網遂令真訣負𥘉心夜馳險寇天峰雪秋虜強王漢水隂辛苦半生成底事始憐莊舄亦哀吟百戰深秋始罷兵六師冬盡尚南征誠微未足回天意性