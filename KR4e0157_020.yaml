body:
  text: 外集七墓志銘碑贊墓表針墓碑祭文傳易直先生墓志壬戌易直先生卒鄊之人相與哀思不已從而纂述其行以誄之曰嗚呼先生之道諒易平直內篤于孝友外孚于忠實不戚戚于窮不欣欣于得翦徹崖幅于物無抵于于施施率意任真而亦不干于禮藝學積行將施于邦六舉于鄉竟弗一獲以死嗚呼傷哉自先生之沒鄊之子弟無所式為善者無所倚談經究道者莫與考論含章祕迹林棲而澤遁者莫與遨遊以處天胡奪吾先生之速耶先生姓王名衮字德章古者賢士死則有以易其號今先生沒且三年而猶襲其常稱其謂鄊人何盍相與私諡之曰易直于是先生之姪守仁聞而泣曰叔父有善吾子姪弗能紀述而以辱吾之鄉老亦奚為于子姪請得志諸墓嗚呼吾宗江左以來世不乏賢自吾祖竹軒府君以上凡積德纍仁者數世而始發于吾父龍山先生叔父生而勤修砥礪能協成吾父之志人謂相繼而興以昌王氏者必在叔父而又竟止于此天意果安在哉叔母葉孺人先叔父十有三年卒生二子守禮守信繼孺人方氏生一子守恭叔父之生以正統已已十月戊午得壽四十有九而以弘治戊午之八月草三卒卒之歲太夫人岑氏方就養于京泣曰須吾歸視其柩于是壬戌正月太夫人自京歸始克以十月甲子葬叔父于邑東穴湖山之陽南去竹軒府君之墓十武而近去葉孺人之墓十武而遙未合葬蓋有所俟也陳處士墓志銘癸亥處士諱泰字思易父剛祖仲彰曾祖勝一世居山隂之錢清剛戍遼左娶馬氏生處士正統甲子處士生十二年矣始從其父自遼來歸當是時陳雖巨族然已三世外戍基業凋廢殆盡處士歸與其弟耕于淸江之上數年遂復其故處士狷介純篤處其鄉族親黨無內外少長戚踈朴直無委曲又好面折人過不以毛髮假借不為斬險刻削故其生也人爭信憚其死也莫不哀思之處士于書史僅涉獵不專于文敦典崇禮務在躬行郡中名流以百數皆雕繪藻飾熻熠以賈聲譽然稱隱逸之良必于處士皆以為有先太丘之風焉弘治癸亥正月庚寅以疾卒年七十二九月已丑其子琢卜葬于郡西之廽龍山初處士與同郡羅周管士弘朱張弟涎友以善交稱成化間涎以歲貢至京某時為童子聞涎道處士心竊慕之至是歸求其廬則既死矣涎姪孫節與豫遊以世交之誼為處士請銘且曰先生于處士心與之久矣即為之銘亦延陵挂劍之意耶豫曰諾明日與琢以狀來請惟陳氏世有顯聞剛之代父戍遼也甫年十四主帥壯其為人召與語大説遂留參幕下纍立戰功出竒計當封賞輒為當事者沮抑竟死牖下處士亦狀貌魁岸幼習邊機論議根核的然可施于用性孝友屬其家多難收養其弟姪之孤掇拾扶持不忍舍去遂終其身琢亦能詩有行次子玠三孫徠衝彶皆向于學夫屢抑其進其後將必有昌者銘曰嗟惟處士敦朴厚堅猶玉在璞其輝熠然秉義揭仁鄉之司直邈矣太丘其孫孔式胡溘而逝其人則亡德音孔邇鄉人相告母或而弛無寧處士愧其孫子廽龍之岡其鬱有蒼毋爾芻伐處士所藏平樂同知尹公墓志銘癸亥尹自春秋為著姓降及漢唐代不乏賢至宋而太常博士源中書舍人洙及其孫焞皆以道學為世名儒其後有為點檢者自洛徙越之山隂逮公七世矣公父逹祖性中曾祖齊賢皆有聞于鄉公生十八年選為郡庠弟子以詩學知名逺近從之逰者數十往往取髙第躋顯級而公乃七試有司不偶天順年詔求遺才可經濟大用者于是有司以公應詔而公亦適當貢遂卒業大學成化某甲子授廣西南寧通判時郡中久苦猺患方議發兵人情洶洶公至請守得緩旬日稍圖之乃單騎入猺洞呼酋長與語諸酋倉卒不暇集謀相與就公問所由來公曰斯行為爾曹乞生無他疑也因為具陳禍福言辨爽慨諸酋感動顧謂其黨曰何如皆曰願從使君言遂相率羅拜定約而出尋督諸軍討木頭等洞皆捷大臣交章薦公可大用庚子擢同知平樂府事平樂地皆嶄山互壑猺慿險出沒深翳非時剽掠居民如處穽中動慮機觸不敢輕往來農末俱廢聞公至喜曰南寧尹使君來吾無恐耳巳居月餘公從土著間行巖谷盡得其形勢縱火悉焚林薄猺失籍潰散公因盡築城堡要害據守猺來無所匿從髙巔逺覘嘆息踟蹰而去蓋自是平樂遂為安土居三年屢以老請輒為民所留弘治改元以慶賀赴京師力求致仕以歸家居十四年乃卒得夀若干公性孝友淳篤自其貧賤時即委産三弟拾取其遺少壯衰老雖盛暑急遽未嘗見其不以祗服與物熙然無抵至其蒞官當事奮毅敢直析法繩理勢悍無所撓避庶幾古長者而今亡矣先後娶陳氏朱氏殷氏子騏孫公貴公榮卒之又明年癸亥將葬騏以幣狀來姚請銘某幼去其鄉聞公之為人恨未嘗從之逰銘固不辭也公諱浦字文淵葬在郡東保山合殷氏之兆銘曰赫赫尹氏望于宗周源洙比潁焞暢厥休自洛徂越公啓其暗君子之澤十世未斬篤敬忠信蠻貊以行一言之烈雄于九軍豈惟威儀式其黨里豈惟友睦篤其昆弟彼保之陽維石巖巖尹公之墓今人所瞻徐昌國墓志辛未正德辛未三月丙寅太學博士徐昌國卒年三十三士夫聞而哭之者皆曰嗚呼是何促也或曰孔門七十子顔子最好學而其年獨不永亦三十二而亡説者謂顔子好學精力瘁焉夫顔雖既竭吾才然終日如愚不改其樂也此與世之謀聲利苦心焦勞患得患失逐逐終其身耗勞其神氣奚啻百倍而皆老死黃馘此何以辨哉天于美質何生之甚寡而壞之特速也夫鼪鼯以夜出涼風至而玄鳥逝豈非凡物之盛衰以時乎夫嘉苗難植而易稿芝榮不踰旬蔓草剃而益繁鴟梟虺蝮遍天下而麟鳯之出間世一覩焉商周以降清淑日澆而濁穢薰積天地之氣則有然矣于昌國何疑焉始昌國與李夢陽何景明數子友相與砥礪于辭章既殫力精思傑然有立矣一旦諷道書若有所得歎曰弊精于無益而忘其軀之斃也可謂知乎巧辭以希俗而捐其親之遺也可謂仁乎于是習飬生有道士自西南來昌國與語恱之遂究心玄虛益與世泊自謂長生可必至正德庚午冬陽眀王守仁至京師守仁故善數子而亦嘗沒溺于仙釋昌國喜馳往省與論攝形化氣之術當是時增城湛元明在坐與昌國言不協意沮去異日復來論如初守仁笑而不應因留宿曰吾授異人五金八石之祕服之沖舉可得也子且謂何守仁復笑而不應乃曰吾隳黜吾昔而遊心高玄塞兊斂華而靈株是固斯亦去之競競于世逺矣而子猶余拒然何也守仁復笑而不應于是默然者久之曰子以豫為非耶抑又有所祕耶夫居有者不足以超無踐器者非所以融道吾將去知故而宅于埃壒之表子其語我乎守仁曰謂吾為有祕道固無形也謂吾謂子非子未吾是也雖然試言之夫去有以超無無將奚超矣外器以融道道器為偶矣而固未嘗超乎而固未嘗融乎夫盈虛消息皆命也纎巨內外皆性也隱微寂感皆心也存心盡性順夫命而已矣而奚所趨舍于其間乎昌國首肯良久曰沖舉有諸守仁曰盡鳶之性者可以沖于天矣盡魚之性者可以泳于川矣曰然則有之曰盡人之性者可以知化育矣昌國俯而思蹶然而起曰命之矣吾且為萌甲吾且為流澌子其煦然屬我以陽春哉數日復來謝曰道果在是而奚以外求吾不遇子幾亡人矣然吾疾且作懼不足以致逺則何如守仁曰悸乎曰生寄也死歸也何悸津津然既有志于斯已而不見者踰月忽有人來訃昌國逝矣王湛二子馳往哭盡哀因商其家事其長子伯虬言昌國垂殁整袵端坐託徐子容以後事子容泣昌國笑曰常事耳謂伯虬曰墓銘其請諸陽明氣益微以指畫伯虬掌作冥冥漠漠四字餘遂不可辨而神氣不亂嗚呼吾未竟吾説以時昌國之及而昌國乃止于是吾則有憾焉臨殁之託又可負之昌國名禎卿世姑蘇人始舉進士為大理評事不能其職于是以親老求改便地為養當事者目為好異抑之已而降為五經博士故雖為京官數年卒不獲封其親以為憾所著有談藝録古今詩文若干首然皆非其至者昌國之學凡三變而卒乃有志于道墓在虎丘西麓銘曰惜也昌國吾見其進未見其至早攻聲詞中乃謝棄脫淖垢濁修形鍊氣守靜致虛恍若有際道幾朝聞遐夕先逝不足者命有餘者志璞之未琢豈方頑礪隱埋山澤有虹其氣後千百年曷考斯志凌孺人楊氏墓志銘乙亥古之葬者不封不樹葬之有銘非古矣然必其賢者也然世之皆有銘也亦非古矣而婦人不特銘婦人之特銘也則又非古矣然必其賢者也賢而銘雖婦人其可哉是故非其人而銘之君子不與也銘之而非其實君子不為也吾于銘人之墓也未嘗敢以易至于婦人而加審焉必有其證矣凌孺人楊氏之銘也曷證哉證于其夫之狀證于其子之言證于其鄉人之所傳其賢者也孺人之夫為封監察御史凌公石巖諱雲者也石巖之狀謂孺人為通懷逺將軍之曾孫女茂年十八而未歸姑舅愛之族黨稱之鄉閭則之不悉數其行則賢可知矣子僉憲相與同年賢也地官員外郎楷又賢也孺人之慈訓存焉相嘗為豫言孺人之賢十餘年矣與今石巖之狀同也吾鄉之士逰業于通者以十數稱通之巨族以凌氏為最凌氏之賢以石巖為最則因及于孺人之內助其所稱舉與今之狀又同也夫夫或溺譽焉子或溢羡焉吾鄉人之言不要而實契斯又何疑矣孺人之生以正統丁卯十二月九日卒于正德癸酉十一月九日夀蓋六十七男四長即相次棋早卒次即楷次栻女二孫男八女三曾孫男一女一相將以乙亥正月內丙寅附葬孺人于祖塋之左而格于其次乃以石巖之狀來請銘且問葬合葬非古也周公以來未之有改也先孺人附于祖塋之左昭也家君百嵗後將合焉葬左則疑于陽虛右則疑于隂若之何則可豫曰附也則祖為之尊左陽右隂也陽兼隂而主變者也隂從陽而主常者也陽在左則居左而在右則居右隂在左則從左而在右則從右其虛右而從左乎于是孺人之葬虛右而從左銘曰孺人之賢豫豈究知知子若夫鄉議是符如彼作室則觀其隅彼昏懵懵謂豫盡誣狼山之西祖塋是依左藏右虛孺人之居文橘菴墓志乙亥髙吾之丘兮胡然其巋巋兮鄉人所培兮髙吾之木兮胡然其賾賾兮鄉人所植兮髙吾之行兮胡然其砥砥兮鄉人所履兮陽明子曰嗚呼兹橘菴文子之墓耶冀元亨曰昔陽明子自貴移廬陵道出辰常間遇文子于武陵溪上與之語三夕而不輟旬有五日而未能去門人問曰夫子何意之深耶陽明子曰人也朴而理直而虛篤學審問比耄而不衰吾聞其蒞官矣執而恕惠而節其張叔之儔歟吾聞其居鄉矣勵行飭已不言而俗化其太丘之儔歟嗚呼于今時為難得也矣别以其墓銘屬陽明子心許之而不諾門人曰文子之是請也殆猶未逹歟陽明子曰逹也曰逹何以不諾也曰古之葬者不封不樹銘非古也後世則有銘既葬而後具豫不可也曰然則惡在其為逹矣曰死生之變大而若人盡夜視之不以諱非逹歟蓋晉之末有陶潛者嘗自志其墓文子既殁其子棐棠東集栻葬之髙吾之原陽明子乃掇其所狀而為之銘文子名澍字汝霖號橘菴舉進士歷官刑部郎中出為重慶守巳而忤時貴改思州遂謝病去文子之先為南昌人曾祖均玉始避地桃源門人有閔廷圭者為之行狀甚悉登仕郎馬文重墓志銘丙子沛漢臺里有馬翁者長身而多知涉書史少喜談兵交四方之賢指畫山川道里弛張闔闢自謂功業可掉臂取嘗登芒碭山左右眺望嘻吁慷慨時人莫測也中年從縣司辟為掾巳得選忽不愜復􅋟棄去授登仕郎歸與家人力耕致饒富輒以散其族黨鄉鄰葬死恤孤賑水旱修橋梁惟恐有間既老乃益循飾邑人望而尊之以為大賔焉年八十六正德丙子四月三日無疾而卒長子思仁時為鴻臚司儀署丞勤而有禮豫既素愛之至是聞父喪慟毁幾絶以狀來請豫銘又哀而力遂不能辭按狀翁名珍字文重父某祖某曾某皆有隱德子男若干人女若干人以是年某月某日葬祖塋之側為之銘曰豐沛之間自昔多魁若漢之蕭曹使不遇髙祖乘風雲之會固將老終其身于刀筆之間世之懷奇不偶無以自見於時名湮沒而不著者何可勝數若翁者亦其人非耶然考其為迹亦異矣嗚呼千里之足困于伏櫪連城之珍或混瓦礫不琢其章于璧何傷不駕以驤奚損于良嗚呼馬翁兹焉允臧明封刑部主事浩齋陸君墓碑志丙子封君之葬也子澄毁甚失明病不能事事以問于陽明子曰吾湖俗之葬也咸竭資以盛賔主至于毁家不則以為儉其親也不肖孤則何費之敢靳大懼疾之不任遂底于顚殞以重其不孝敢請巳之如何陽明子曰不亦善乎棺椁衣衾之得為也者君子不以儉其親徇湖俗之所尚是以其親遂非而導侈也又况以殆其遺體乎吾子巳之既葬而以禮告人豈有非之者將湖俗之變必自吾子始矣一舉而三善吾子其已之既而復以志墓之文請陽明子辭之不得則謂之曰志墓非古也古之葬者不封不樹孔子之葬其親也自以為東西南北之人不可以無識也而封之崇四尺其于季札之葬則為之識曰有吳延陵季子之墓後之志者若是焉可矣而內以誣其親外以誣于人是故君子恥之吾子志于賢聖之學茍卒為賢聖之歸是使其親為賢聖者之父也志孰大焉吾子曷巳之封君之存也嘗以其田二頃給吾黨之貧者以資學是于斯文為有襄也而又重以吾子之好無已則如夫子之于札也乎因為之題其識墓之石曰皇明封刑部主事浩齋陸君之墓而書其事于石之隂君諱璩字文華湖之歸安人墓在樊澤子澄舉進士方為刑部員外郎澄之兄曰津諡襄惠兩峰洪公墓志銘特進光祿大夫柱國太子太保刑部尚書兼都察院左都御史致仕洪公以嘉靖二年四月十九日薨時年八十有一矣訃聞天子遣官九諭祭錫諡襄惠賜葬錢塘東穆塢之原其嗣子澄將以明年乙酉月日舉葬事以幣以狀來請銘維洪氏世顯于鄱陽自宋太師忠宣公皓始賜第于錢塘西湖之葛嶺三子景伯景嚴景盧皆以名德相承遂為錢塘望族八世祖諱其二仕宋為浙東安撫使元興避地上虞曾祖諱榮甫祖諱有恆逮皇朝建國乃復還家錢塘有恆初名洪武昌忌者上書言其名犯年號髙皇帝親録之曰此朕興之兆耳御書有恆易之父諱薪徽州街口批驗所大使自曾祖以下皆以公貴贈太子太保刑部尚書妣皆贈一品夫人公諱鐘字宣之自幼岐嶷不凡成化戊子年二十六以易經領鄉薦乙未舉進士授官刑部主事諳習憲典時相繼為大司寇者皆耆德宿望咸器重禮信之委總諸司章奏疑議大獄取裁于公聲聞驟起庚子升員外郎仍領諸司事癸卯丁內囏丙午起復升郎中尋慮囚山西乙已江西福建流賊甫定公承命往審處之歸言福建之武平上抗清流永定江西之安逺龍南廣東之程鄉皆流移混雜習于鬪爭以武力相尚是以易閧而亂譬若羣豺虎而激怒之欲其無相攫噬難矣宜及其平時令有司多立社學以訓誨其子弟銷其兵器易之以詩書禮讓庶幾濳化其姦宄時以為知本之論弘治已酉升江西按察副使癸丑升四川按察使所在發姦擲伏無所撓避而聽決如流庭無宿訟由是橫豪屏息自土官宣慰使皆凛凛奉約束安氏世有馬湖恃力驕僭為地方患公從容畫䇿去之請吏于朝遂以帖定丙辰入覲升江西右布政使丁已轉福建左布政使著績兩省戊午升都察院右副都御史巡撫順天等府兼整飭薊州諸邊備時朵顔虜勢日猖獗公以邊備積弛乃建議增築邊墻自山海關界嶺口西北至密雲古北口黃花鎮直抵居庸延亘千餘里繕復城堡三百七十悉城沿邊諸縣官無浪費而民不知勞自是緩急有賴又奏減防秋官兵六千人嵗省挽輸犒賞之費以數萬創建浮橋于通州以利病涉毁永平陶窰以息軍民橫役之苦奪民産及牧圉草場之入于權貴者而悉還之逺近大悅名稱籍甚然權貴人之扼勢失利者數短公于上遂改雲南巡撫再改貴州頃之召還督理漕運兼巡撫鳯陽諸處正德丁卯升右都御史仍董漕政戊辰命掌南京都察院事尋升南京刑部尚書已巳改北京工部復改刑部兼都察院左都御史加太子少保賜玉帶庚午特命出總川陜湖河四省軍務時沔陽洞庭水寇丘仁楊清等攻掠城邑其鋒甚鋭官軍屢失利公至以計擒滅之藍五起蜀與鄢老人等聚衆往來寇暴川陜間逺近騷動公涉􅍓險阻深入賊巢運謀設奇躬冒矢石前後斬獲招降以十數萬擒其渠酋二十八人露布以聞土官楊友楊愛相仇激為變衆至三萬餘流劫重慶保寧諸州縣公隨調兵剿平之復其故業朝廷七降敕獎勵賜白金麒麟服進太子太保公辭不獲則引年懇疏乞歸章七上始允之聖諭優奬賜馳驛還仍進光祿大夫録其孫一人入胄監公既歸築兩峰書院于西湖之上自號兩峰居士日與朋舊徜徉詩酒以為樂如是者十有一年嘉靖改元之壬午朝廷念公夀耉詔進公階特進光祿大夫柱國賜玄纁羊酒遣有司勞問士夫之議者咸以公先朝之老抱負經濟年雖若邁而精力未衰優之廊廟足倚以為重思復起公于家而公巳不可作矣公元娶鄭氏纍贈一品夫人繼周氏徐氏又繼魏氏南京吏部尚書文靖公之女女卒贈一品夫人二子魏出長澄鄉進士才識英敏方向于用次濤廕授南京都察院都事先卒女二側出長適漕運參將張奎次適國子生李綦孫男四楩楠橋檀女七墓合魏夫人之兆銘曰桓桓襄惠嶷然人傑自其始仕聲聞已揭于臬于藩益弘以騫略于西陲實屏實垣既荒南服圻漕是督亟命于南亟召于北司空司寇邦憲是肅帝曰司寇爾總子師寇賊姦宄維爾子治既獀既遏豕斃狐逸暨其成功卒以老乞天子曰俞可長爾劬西湖之湄徉徉于于聖化維新聿懷舊臣公巳不作維時之屯天子曰咨諡錫有隮哀榮終始其疇則如穆塢之原有鬱其阡詩此貞石垂千萬年贈翰林院編修湛公墓表壬申嗚呼聖學晦而中行之士鮮矣世方弇阿為工方特為厲紛縱倒置孰定是非之歸哉蓋公冶長在縲絏之中仲尼明非其罪匡章通國稱不孝孟子辨之夫然後在所禮貌焉剛狷振礪之士獨行違俗為世所􅎱嫉卒以傾廢踣墮又凂以非其罪者可勝道哉豫讀恰菴志而悲之怡菴湛公英者廣之增城人介直方嚴刻行砥俗鄉之善良咸服信取則倚以扶弱禦侮然不辭色少貸人面斥人過惡至無所容狡獪之徒動見矯拂嫉視如讐聚謀必覆公于惡毋使抗吾為公直行其心不顧竟為所搆誣憤發病以死公既死其徒惡益行鄉之人遂皆謂湛公行義顧報戾其施而惡者自若吾儕何以善為後十餘年為姦者貫盈翦滅浸盡而公子若水求濂洛之學為世名儒舉進士官國史編修推原尋繹公德益用表著朝廷贈官如子日顯赫竦耀鄉人相與追嗟慕嘆為善之報何如向特未定耳嗚呼古有狷介特行之士直志犯衆惡之死靡悔湛公殆其人非邪向使得志立朝當大節其肯俯首為姦人僕役詬濡喘息以蘄緩須臾死其不能矣夫脂韋佞恱亦何能緩急有毫毛之賴為國者當何取哉豫悲斯人之不遇而因重有所感也昔者君子顯微闡幽以明世警瞶信暴者無庸揚矣彼忞然就抑蒙溷垢而弗雪其可以無表而出之節菴方公墓表乙酉蘇之崑山有節菴方翁麟者始為士業舉子巳而棄去從其妻家朱氏居朱故業商其友曰子乃去士而從商乎翁笑曰子烏知士之不為商而商之不為士乎其妻家勸之從事遂為郡從事其友曰子又去士而從從事乎翁笑曰子又烏知士之不為從事而從事之不為士乎居久之嘆曰吾憤世之碌碌者刀錐利祿而屑為此以矯俗振頽乃今果不能為益也又復棄去會歲歉盡出其所有以賑飢乏朝廷義其所為榮之冠服後復遙授建寧州吏目翁視之蕭然若無與與其配朱竭力農耕植其家以士業授二子鵬鳯皆舉進士􅍓官方面翁既老日與其鄉士為詩酒會鄉人多能道其平生皆磊落可異顧太史九和云吾嘗見翁與其二子書亹亹皆忠孝節義之言出于流俗類古之知道者陽明子曰古者四民異業而同道其盡心焉一也士以修治農以具養工以利器商以通貨各就其資之所近力之所及者而業焉以求盡其心其歸要在于有益于生人之道則一而已士農以其盡心于修治具養者而利器通貨猶其士與農也工商以其盡心于利器通貨者而修治具養猶其工與商也故曰四民異業而同道蓋昔舜敘九官首稷而次契垂工益虞先于夔龍商周之代伊尹耕于莘野傅説板築于巖膠鬲舉于魚鹽吕望釣于磻渭百里奚處于市孔子為乘田委吏其諸儀封晨門荷蕢斫輪之徒皆古之仁聖英賢髙潔不羣之士書傳所稱可考而信也自王道熄而學術乖人失其心交騖于利以相驅軼于是始有歆士而卑農榮宦遊而恥工賈夷考其實射時罔利有甚焉特異其名耳極其所趨駕浮辭詭辨以誣世惑衆比之具養器貨之益罪浮而實反不逮吾觀方翁士商從事之喻隱然有當于古四民之義若有激而云者嗚呼斯義之亡也久矣翁殆有所聞歟抑其天質之美而默有契也吾于是而重有所感焉吾嘗獲交于翁二子皆潁然敦古道敏志于學其居官臨民務在濟世及物求盡其心吾以是得其源流故為之論著之云耳翁既殁葬于於邑西馬鞍山之麓配朱孺人有賢行合葬焉鄉人為表其墓曰明贈禮部主事節菴方公之墓嗚呼若公者其亦可表也矣湛賢母陳太孺人墓碑甲戌湛子之母卒于京師葬于增城陽明子迎而弔諸龍江之滸已湛子泣曰若水之辱于吾子蓋人莫不聞吾母殁而子無一言人將以病子陽明子曰名者為之銘矣表者為之表矣某何言雖然良亦無以紓吾情吾聞太孺人之生七十有九其在孀居者餘四十年端靖嚴潔如一日既老雖其至親卑幼之請謁見之未嘗踰閾也不亦貞乎績庥舂粱教其子以顯嘗使從白沙之門曰寧學聖人而未至也不亦知乎恤其庶姑與其庶叔化厲為順撫孤與女愛不違訓不亦慈乎巳膺封錫祿養備至而縞衣疏食不改其𥘉不亦儉乎貞知慈儉老而彌堅不亦賢乎請著其石曰湛賢母之墓湛子拜泣而受之既行人曰湛母之賢信矣若湛子之賢則吾猶有疑焉湛子始以其母之老不試者十有三年是也復出而取上第為美官則何居母亦老矣又去其鄉而迎養既歸復往卒于旅則何居陽明子曰是烏足以疑湛子矣夫湛子純孝人也事親以老于畎畝其志也其出而仕母命之也其迎之也母欲之也既歸而復往母泣而強之也是能無從乎無大拂于義將東西南北之惟命彼湛子者亦豈以人之譽毁于外者以易其愛親之誠乎曰湛子而是則湛母非歟曰烏足以非湛母矣夫湛父之早世也屬其子曰必以顯吾世故命之出者行其夫之志也就之養者安其子之心也強之往者勉其子之忠以卒其夫之願也昔者孟母斷機以勵其子蓋不歸者幾年君子不以孟子為失養孟母為非訓今湛母之心亦若此而湛子又未嘗違乎養也故湛母賢母也湛子孝子也然猶不免于世惑吾雖欲無言也可得乎程守夫墓碑甲申吾友程守夫以弘治丁巳之春卒于京去今嘉靖甲申二十有八年矣嗚呼朋友之墓有宿草則勿哭而吾于君尚不能無澘然也君之父味道公與家君為同年進士相知甚厚故吾與君有通家之誼弘治壬子又同舉于鄉巳而又同卒業于北雍密邇居者四年有餘凡風雪之晨花月之夕山水郊園之遊無不與共蓋為時甚久而為迹甚密也而未嘗見君有憤詞忤色情日益篤禮日以恭其在家庭雍雍于于內外無間交海內之士無貴賤少長咸敬而愛之雖粗鄙暴悍遇君未有不薰然而心醉者當是時豫方馳騖于舉業詞章以相矜髙為事雖知愛重君而尚未知其天資之難得也其後君既殁豫亦入仕往往以粗浮之氣得罪于人稍知創艾始思君為不可及尋謪貴陽獨居幽寂窮苦之鄉困心衡慮乃從事于性情之學方自苦其勝心之難克而客氣之易動又見夫世之學者率多􅎱嫉險隘不能去其有我之私以共明天下之學成天下之務皆起于勝心客氣之為患也于是愈益思君之美質蓋天然近道者惜乎當時莫有以聖賢之學啓之有啓之者其油然順道將如決水之赴壑矣嗚呼惜哉乃今稍見端緒有足以啓君者而君已不可作也已君之子國子生烓致君臨沒之言欲豫與林君利瞻為之表志林君既為之表而君之葬巳久志已無所及則為書其墓之碑聊以識吾之哀思夫君者不徒嬉遊征逐之好而巳君諱文楷世居嚴之淳安其詳已具于墓表太傅王文恪公傳丁亥公諱鏊字濟之王氏其先自汴扈宋南渡諱百八者始居吳之洞庭山曾祖伯英祖惟道考光化知縣朝用皆贈光祿大夫柱國少傅兼太子太傅戶部尚書武英殿大學士妣三代皆一品夫人公自幼潁悟不凡十六隨父讀書太學太學諸生爭傳誦其文一時先逹名流咸屈年行求為友侍郎葉文莊提學御史陳士賢咸有重望于時見而奇之曰天下士于是名聲動逺邇成化甲午應天鄉試第一主司異其文曰蘇子瞻之流也録其論䇿不易一字乙未會試復第一入奉廷對衆望翕然執政忌其文乃置一甲第三時論以為屈授翰林編修閉門力學避逺權勢若將浼焉九載升侍講憲廟實録成升右諭德尋薦為侍講學士兼日講官每進講至天理人欲之辨君子小人之用舍必反覆規諭務盡啓沃方春上遊後苑左右諌不聽公講文王不敢盤于遊田上為罷遊講罷常召所幸廣戒之曰今日講官所指殆為若等好為之時東宫將出閣大臣請選正人以端國本首薦用公以本官兼諭德尋升少詹事兼侍講學士既而吏部闕侍郎又遂以為吏部時北虜入寇公上籌邊八事雖忤權幸而卒多施行公輔之望日隆于是尖異內閣謝公引咎求退遂舉公以自代武宗在亮暗內侍八人荒遊亂政臺諌交章中外洶洶公協韓司徒率文武大臣伏閣以請上大驚怒有旨召公等至左順門中官傳諭甚厲衆相視莫敢發言公曰八人不去亂本不除天下何由而治議論侃侃韓亦危言繼之中官語塞一時國論倚以為重然自是八人者竟分布要路瑾入柄司禮而韓公遂逐內閣劉謝二公亦去矣詔輔內閣缺瑾意欲引冢宰焦衆議推公瑾雖中忌而外難公論遂與焦俱入閣瑾方威鉗士類按索徴瑕輒枷械之幾死者纍纍公亟言于瑾曰士大夫可殺不可辱今既辱之又殺之吾尚何顔于此由是類從寬釋瑾銜韓不已必欲置之死無敢言者又欲以他事中內閣劉謝二公前後力救之乃皆得免大司馬華容劉公以瑾舊怨逮至京將坐以激變土官岑氏罪死公曰岑氏未叛何名為激變乎劉得減死或惡石淙楊公于瑾謂其築邊太費屢以為言公曰楊有髙才重望為國修邊乃可以功為罪乎瑾議焚廢后吳氏之喪以滅迹曰不可以成服公曰服可以不成葬不可以苟景泰汪妃薨疑其禮公曰妃廢不以罪宜復其故號葬以妃祭以后皆從之當是時瑾權傾中外雖意不在公然見公開誠與言𥘉亦間聽及焦專事媕阿議彌不協而瑾驕悖日甚毒流縉紳公遏之不能得居常戚然瑾曰王先生居髙位何自苦乃爾耶公日求去瑾意愈咈衆虞禍且不測公曰吾義當去不去乃禍耳瑾使伺公無所得且聞交贄亦絶乃笑曰過矣于是懇疏三上許之賜璽書乘傳嵗夫月米以歸時方危公之求去咸以為異數云公既歸吳屏謝紛囂翛然山水之間究心理性尚友千古至其與人淸而不絶于俗和而不淆于時無貴賤少長咸敬慕恱服有所興起平生嗜欲淡然吳中士夫所好尚珍賞觀遊之具一無所入惟喜文辭翰墨之事至是亦皆脫落雕繪出之自然中年嘗作明理克已二針以進德砥行及充養既久晚益純明凡有著述必有所發其論性善云欲知性之善乎盍反而內觀乎寂然不動之中而有至虛至靈者存焉湛兮其非有也窅兮其非無也不墮于中邊不離于聲臭當是時也善且未形而惡有所謂惡者哉惡有所謂善惡混者哉惡有所謂三品者哉性其猶鑑乎鑑者善應而不留物來則應物去則空鑑何有焉性惟虛也惟靈也惡安從生其生于蔽乎氣質者性之所寓也亦性之所由蔽也氣質異而性隨之譬之珠焉墜于澄淵則明墜于濁水則昏墜于汚穢則穢澄淵上智也濁水凡庶也汚穢下愚也天地間腷塞充滿皆氣也氣之靈皆性也人得氣以生而靈隨之譬之月在天物各隨其分而受之江湖淮海此月也池沼此月也溝渠此月也坑塹亦此月也豈必物物而授之心者月之魄也性者月之光也情者光之發于物者也其所論造後儒多未之及居間十餘年海內士夫交章論薦不輟及今上即位始遣官優禮歲時存問將復起公而公巳沒時嘉靖三年三月十一日夀七十五矣贈太傅諡文恪祭葬有加禮四子延哲中書舍人延素南京中軍都督府都事延陵郡學生延昭尚幼皆彬彬世其家史臣曰世所謂完人若震澤先生王公者非邪內𥙿倫常無俯仰之憾外際明良極祿位聲光之顯自為童子至于耆耋自廟朝下逮閭巷至于偏隅或師其文學或慕其節行或仰其德業隨所見異其稱莫或有瑕疵之者所謂夀福康寧攸好德而考終命公殆無愧爾矣無錫邵尚書國賢與公壻徐學士子容皆文名冠一時其稱公之文規模昌黎以及泰漢純而不流于弱奇而不涉于怪雄偉俊潔體裁截然振起一代之衰得法于孟子論辨多古人未發詩蕭散淸逸有王岑風格書法清徑自成得晉唐筆意天下皆以為知言陽明子曰王公所深造世或未之能盡也然而言之亦難矣著其性善之説以微見其槩使後世之求公者以是觀之平茶寮碑丁丑正德丁丑猺寇大起江廣湖郴之家騷然且三四年矣于是三省奉命會征乃十月辛亥豫督江西之兵自南康入甲寅破橫水左溪諸巢賊敗奔庚申復連戰奔桶岡十一月癸酉攻桶岡大戰西山界甲戌又戰賊大潰丁亥盡殪之凡破巢八十有四擒斬三千餘俘三千六百有奇釋其脅從千有餘衆歸流亡使復業度地居民鑿山開道以夷險阻辛丑師旋于乎兵惟凶器不得已而後用刻茶寮之石匪以美成重舉事也提督軍務都御史王某書平浰頭碑丁丑四省之寇惟浰尤黠擬官僣號潛圖孔蒸正德丁丑冬輋猺既殄益機險阱毒以虞王師我乃休士歸農戊寅正月癸卯計擒其魁遂進兵擊其懈丁未破三浰乘勝歸北大小三十餘戰滅巢三十有八俘斬三千餘三月丁未回軍壺漿迎道耕夫遍野父老咸歡農器不陳于今五年復我常業還我室廬伊誰之力赫赫皇威匪威曷慿爰伐山石用紀厥成提督軍務都御史王某書田州立碑丙戌嘉靖丙戌夏官兵伐田隨與思恩之人相比復煽集軍四省洶洶連年于時皇帝憂憫元元容有無辜而死者乎乃命新建伯王守仁曷往視師其以德綏勿以兵虔班師撤旅信義大宣諸夷感慕旬日之間自縳來歸者七萬一千悉放之還農兩省以安昔有苗徂征七旬來格今未期月而蠻夷率服綏之斯來速于郵傳舞干之化何以加焉爰告思田毋忘帝德爰勒山石昭此赫赫文武聖神率土之濵凡有血氣莫不尊親田州石刻田石平田州寧民謡如此田水縈田山迎府治新向千萬世鞏皇明嘉靖嵗戊子春新建伯王守仁勒此石告後人陳直夫南宫像贊夫子稱史魚曰直哉邦有道如矢邦無道如矢謂祝鮀宋朝曰非斯人難免乎今之世矣豫嘗三復而悲之直道之難行而諂諛之易合也豈一日哉魚之直信乎後世其在當時不若朝與鮀之易容也悲夫吾越直夫陳先生嚴毅端潔其正言直氣放蕩佞諛之士嫉視若讐彼寧無知之卒于已非便也故先生舉進士不久輒致仕而歸屢薦復起又不久輒退以是也哉然天下之言直者必先生與焉始豫拜先生于錢淸江上歡然甚得先生奚取于豫殆空谷之足音也世日趨于下先生而在雖執鞭之事吾亦為之今既沒矣其子子欽以先生南宫圖像請識一言先生常塵視軒冕豈一第之為榮聞之子欽蓋初第時有以相遺者受而存之先生沒子欽始裝潢將藏諸廟則又為子者宜爾也詩曰有服襜襜有冠翼翼在彼周行其容孔式秉笏端辨中溫且栗既醉以酒既飽以德彼何人斯邦之司直邦之司直宜公宜孤既來既徂為冠為模孰久其道衆聽且孚如江如河其趨彌汙邦之司直今也則亡三針嗚呼小子曾不知警堯詎未聖猶日兢兢既墜于淵猶恬履薄既拆爾股猶邁奔蹶人之冥頑則疇與汝不見壅腫砭乃斯愈不見瘻痺劑乃斯起人之毁詬皆汝砭劑汝曾不知反以為怒匪怒伊色亦反其語汝之冥頑則疇之比嗚呼小子告爾不一既四十有五而曾是不憶嗚呼小子愼爾出話懆言維多吉言維寡多言何益徒以取禍德默而成仁者言訒孰默而譏孰訒而病譽人之善過情猶恥言人之非罪曷有巳嗚呼多言亦惟汝心汝心而存將日欽欽豈遑多言上帝汝臨嗚呼小子辭章之習爾工何為不以釣譽不以蠱愚佻彼優伶爾視孔醜覆蹈其術爾顔不厚日月踰邁爾胡不恤棄爾天命昵爾讐賊昔皇多士亦胥兹溺爾獨不鑒自抵伊亟南鎮禱雨文癸亥惟神秉靈育秀作鎮于南實與五嶽分服而治維是揚州之域咸賴神休以生以養凡其疾疫災青之不時雨暘寒暑之弗若無有逺近莫不引頸企足惟神是望怨有歸功有底神固不得而辭也而况紹興一郡又神之宫牆輦轂之下乎謂宜風雨節而寒暑當民無疾而五榖昌特先諸郡以霑神惠而乃入夏以來亢陽為虐連月弗雨泉源告竭黍苗荐稿歲且不登民將無食農夫相與咨于野商賈相與憾于市行旅相與怨于途守土之官帥其吏民奔走呼號維是祈禱告請亦無不至矣而猶雨澤未應旱烈益張是豈吏之不職而貪墨者衆歟賦斂繁刻而獄訟冤滯歟祀典有弗修歟民怨有弗平歟夫是數者皆吏之謫而民何咎之有夫怒吏之不臧而移其謫于民又知神之所不忍也不然豈民之冥頑妄作者衆將奢淫暴殄以怒神威神將罰而懲之歟夫薄罰以示戒神之威靈亦既彰矣百姓震懼憂惶請罪無所遂棄而絶之使無噍類神之慈仁固應不為若是之甚也夫民之所賴者神神之食于兹土亦非一日矣今民不得巳有求于神而神無以應之然則民將何恃而神亦何以信于民乎某生長兹土猶鄉之人也鄉之人以某嘗讀書學道繆以為是鄉人之傑者其有得于山川之秀為多藉之以為吾愚民之不能自逹者通誠于山川之神其宜有感夫某非其人也而冒有其名人而冒以其名加我我既不得而辭矣又何敢獨辭其責耶是以冒昧輒為之請固知明神亦有所不得而辭也謹告瘞旅文戊辰維正德四年秋月三日有吏目云自京來者不知其名氏携一子一僕將之任過龍場投宿土苗家豫從籬落間望見之隂雨昏黑欲就問訊北來事不果明早遣人覘之巳行矣薄午有人自蜈蚣坡來云一老人死坡下傍兩人哭之哀豫曰此必吏目死矣傷哉薄暮復有人來云坡下死者二人傍一人坐嘆詢其狀則其子又死矣明日復有人來云見坡下積尸三焉則其僕又死矣嗚呼傷哉念其暴骨無主將二童子持畚鍤往瘞之二童子有難色然豫曰嘻吾與爾猶彼也二童憫然涕下請往就其傍山麓為三坎埋之又以隻雞飯三盂嗟吁涕洟而告之曰嗚呼傷哉繄何人繄何人吾龍場驛丞餘姚王守仁也吾與爾皆中土之産吾不知爾郡邑爾烏為乎來為兹山之鬼乎古者重去其鄉遊宦不踰千里吾以竄逐而來此宜也爾亦何辜乎聞爾官吏目耳俸不能五斗爾率妻子躬耕可有也烏為乎以五斗而易爾七尺之軀又不足而益以爾子與僕乎嗚呼傷哉爾誠戀兹五斗而來則宜欣然就道烏為乎吾昨望見爾容蹙然蓋不任其憂者夫衝冒霧露扳援崖壁行萬峰之頂飢渴勞頓筋骨疲憊而又瘴厲侵其外憂鬱攻其中其能以無死乎吾固知爾之必死然不謂若是其速又不謂爾子爾僕亦遽爾奄忽也皆爾自取謂之何哉吾念爾三骨之無依而來瘞爾乃使吾有無窮之愴也嗚呼痛哉縱不爾瘞幽崖之狐成羣隂壑之虺如車輪亦必能葬爾于腹不致久暴露爾爾既巳無知然吾何能為心乎自吾去父母鄉國而來此二年矣􅍓瘴毒而苟能自全以吾未嘗一日之戚戚也今悲傷若此是吾為爾者重而自為者輕也吾不宜復為爾悲矣吾為爾歌爾聽之歌曰連峰際天兮飛鳥不通遊子懷鄉兮莫知西東莫知西東兮維天則同異域殊方兮環海之中逹觀隨寓兮奚必豫宫魂兮魂兮無悲以恫又歌以慰之曰與爾皆鄉土之離兮蠻之人言語不相知兮性命不可期吾茍死于兹兮率爾子僕來從豫兮吾與爾遨以嬉兮驂𬗋彪而乘文螭兮登望故鄉而噓唏兮吾苟獲生歸兮爾子爾僕尚爾隨兮無以無侣悲兮道傍之塜纍纍兮多中土之流離兮相與呼嘯而徘徊兮飱風飲露無爾飢兮朝友麋鹿暮猿與栖兮爾安爾居兮無為厲于兹墟兮祭鄭朝朔文甲戌維正德九年歲次甲戌七月壬戌朔越十有六日丁丑南京鴻臚寺卿王守仁馳奠于監察御史亡友鄭朝朔之墓嗚呼道之將行其命也與道之將廢其命也與嗚呼朝朔命實為之將何如哉將何如哉辛未之冬朝于京師君為御史余留銓司君因世傑謬豫是資豫辭不獲抗顔以尸君嘗問豫聖學可至余曰然哉克念則是隱辭奧義相與剖析探本窮原夜以繼日君喜謂豫昔迷今悟昔陷多岐今由大路嗚呼絶學幾年于兹孰沿就繹君獨奮而古稱豪傑無文猶興有如君者無愧斯稱當是之時君疾已搆忍痛扶孱精微日究人或勸君盍亦休只君曰何哉夕死可矣君遂疾告我亦南行君與世傑訪豫陽明君疾亦篤遂留杭城天不與道善類云傾嗚呼痛哉嗚呼痛哉時豫祖母亦嬰危疾湯藥自須風江阻涉君喪遂行靡由一訣扶櫬而南事在世傑負恨負愧豫復何説嗟豫顓弱實賴友朋砥礪切磋庶幾有成死者生者索居離羣靜言永懷中心若焚墓草再靑甫兹馳奠遙望嶺雲有淚如霰嗚呼哀哉豫復何言尚饗祭浰頭山神文戊寅維正德十三年戊寅二月十五日甲申提督軍務都御史王某謹以剛鬛柔毛昭告于浰頭山川之神惟廣谷大川阜財興物以域民畜衆故古者諸侯祭封內山川亦惟其有功于民然地靈則人傑人之無良亦足以為山川之羞兹土為盜賊所盤據且數十年逺近之稱浰頭者皆曰賊巢恥莫大焉是豈山川之罪哉雖然清洌之井糞穢而不除久則同于厠溷矣丹鳯之穴鴟狐聚而不去久則化為妖窟矣糞穢之所過者掩鼻妖孽之窟人將持創燔燎環而攻之何者其積聚招致使然也誠使除其糞穢刮剜滌蕩將不終朝而復其淸洌鴟狐逐而鸞鳯歸妖孽之窟還為孕祥育瑞之所矣今兹土之山川亦何以異于是守仁奉天子明命來鎮四陲憤浰賊之凶悖民苦荼毒無所控籲故邇者計擒渠魁提兵搗其巢穴所向克捷動獲如志斯固人怨神怒天人順應之理將或兹土山川之神厭惡凶殘思欲洗其積辱隂有以相協假手于豫今駐兵于此彌月餘旬雖巢穴悉巳掃蕩擒斬十且八九然漏殄之徒尚有潛逃小民不能無怨于山川之神為之逋逃主萃淵藪也今子提兵深入豈獨除民之害亦為山川之神雪其恥夫安舊染棄新圖非中人之情而况于鬼神乎今此殘徒勢窮力屈亦方遣人投招將順而撫之則慮其無革心之誠復遺患于日後逆而弗受又恐其或出于誠心殺之有不忍也神其隂有以相協使此殘寇而果誠心邪即隂佑其衷俾盡携其黨類自縳來投若水之赴壑豫將隄沿停畜之如其設詐懷姦即隂奪其魄張我軍威風驅電掃一鼓而殱之兹惟下民之福亦惟神明之休壇而祀之神亦永永無怍惟神實鑒圖之尚饗祭徐曰仁文戊寅嗚呼痛哉曰仁吾復何言爾言在吾耳爾貌在吾目爾志在吾心吾終可奈何哉記爾在湘中還嘗語豫以夀不能長久豫詰其故云嘗遊衡山夢一老瞿曇撫曰仁背謂曰子與顔子同德俄而曰亦與顔子同夀覺而疑之豫曰夢耳子疑之過也曰仁曰此亦可奈何但今得告疾早歸林下冀從事于先生之教朝有所聞夕死可矣嗚呼吾以為是固夢耳孰謂乃今而竟如所夢邪向之所云其果夢邪今之所傳其果真邪今之所傳亦果夢邪向之所夢亦果妄邪嗚呼痛哉曰仁嘗語豫道之不明幾百年矣今幸有所見而又卒無所成不亦尤可痛乎願先生早歸陽明之麓與二三子講明斯道以誠身淑後豫曰吾志也自轉官南贛即欲過家堅卧不出曰仁曰未可紛紛之議方馳先生且一行爰與二三子姑為饘粥計先生了事而歸嗚呼孰謂曰仁而乃先止于是乎吾今縱歸陽明之麓孰與豫共此志矣二三子又且離羣而索居吾言之而孰聽之吾倡之而孰和之吾知之而孰問之吾疑之而孰思之嗚呼吾無與樂餘生矣吾巳無所進曰仁之進未量也天而喪豫也則喪豫矣而又喪吾曰仁何哉天胡酷且烈也嗚呼痛哉朋友之中能復有知豫之深信豫之篤如曰仁者乎夫道之不明也由于不知不信使吾道而非邪則已矣吾道而是邪吾能無蘄于人之不豫知豫信乎自得曰仁訃蓋哽咽而不能食者兩日人皆勸豫食嗚呼吾有無窮之志恐一旦遂死不克就將以托之曰仁而曰仁今則已矣曰仁之志吾知之幸未即死又忍使其無成乎于是復強食嗚呼痛哉吾今無復有意于人世矣姑俟冬夏之交兵革之役稍定即拂袖而歸陽明二三子苟有豫從者尚與之切磋砥礪務求如平日與曰仁之所云縱舉世不以豫為然者亦且樂而忘其死惟百世以俟聖人而不惑耳曰仁有知其尚能啓豫之昏而警豫之惰邪鳴呼痛哉豫復何言祭孫中丞文已卯嗚呼弇阿苟容生也何庸慷慨激烈死也何恫勤勞施于國而惠澤𬒳於民孰謂公之死而非生乎守臣節以無虧秉大義而不屈孰謂公之歸而非全乎方逆熖之已炎公蓋力撲其燎原之勢而不能屢疏乞免又不獲請則旁行曲成冀緩其怒而徐為之圖蓋公處事之權而人或未之盡知也比其當危臨難伏節申忠之死靡回然後見公守道之常心迹如靑天白日而天下之人始洞然無疑矣嗚呼逆藩之謀積之十有餘年而敗之旬日豈守仁之智謀才力能及此乎是固祖宗之德澤朝廷之神武而公之精忠憤烈隂助默相于冥冥之中是亦未可知也公之子挾刃赴仇奔走千里至則逆賊已擒遂得改殯正殮扶公櫬而還父子之間忠孝兩無所愧矣亦何憾哉守仁于公既親且友同舉于鄉同官于部今又同遭是難豈偶然哉靈輈將發薄奠寫哀言有盡而意無窮嗚呼祭外舅介菴先生文􅉝巳嗚呼自公之葬兹土逮今二十有六年乃始復一拜墓下中間盛衰之感死生之戚險夷之變聚散之情可悲可愕可扼腕而流涕者何可勝道嗚呼傷哉死者日以逺生者日以謝而少者日以老矣自今以往其可悲可愕可扼腕而流涕者其又可勝道耶二十六年而始獲一拜自今以往獲拜公之墓下者知復能幾嗚呼傷哉惟是公之子姓羣然集于墓下皆鸞停鶴峙振羽翮而翺乎雲霄未巳也所以報純德而慰公于地下者庶亦在兹巳乎某奉召北行便道歸省甫申展謁輒巳告辭言有盡而意無窮顧瞻丘壠豈勝凄斷尚饗祭文相文嗚呼文相邁往直前之氣足以振頽靡而起退懦通敏果決之才足以應煩劇而解紛拏激昻奮迅之談足以破支辭而折多口此文相之所以超然特出乎等夷而世之人亦方以是而稱文相者也然吾之所望于文相則又寧止于是而巳乎與文相别數年矣去嵗始復一會于江滸握手半日之談豁然遂破百年之惑一何快也吾方日望文相反其邁往直前之氣以內充其寬𥙿溫厚之仁斂其通敏果決之才以自昭其文理密察之智收其奮迅激昻之辨以自全其發強剛毅之德固將日趨于和平而大會于中正斯乃聖賢之德之歸矣豈徒文章氣節之士而已乎惜乎吾見其進而未見其止也一疾奄逝豈不痛哉聞訃實欲渡江一慟以舒永訣之哀暑病且冗欲往不能臨風長號有淚如雨嗚呼文相豫復何言又祭徐曰仁文甲申嗚呼曰仁别我而逝兮十年于今葬兹丘兮宿草幾靑我思君兮一來尋林木拱兮山日深君不見兮窅嵯峨之雲岑四方之英賢兮日來臻君獨胡為兮與鶴飛而猿吟憶麗澤兮欷歆奠椒醑兮松之隂良知之説兮聞不聞道無間于隱顯兮豈幽明而異心我歌白雲兮誰同此音祭國子助教薛尚哲文甲申嗚呼良知之學不眀于天下幾百年矣世之學者蔽于見聞習染莫知天理之在吾心而無假于外也皆舍近求逺舍易求難紛紜交騖以私智相髙客氣相競日陷于禽獸夷狄而不知間有獨覺其非而略知反求其本源者則又羣相詬笑斥為異學嗚呼可哀也巳蓋自十餘年來而海內同志之士稍知講求于此則亦如晨星之落落乍明乍滅未見其能光大也潮陽在南海之濵聞其間亦有特然知向之士而未及與見間有來相見者則又去來無常自君之弟尚謙始從豫于留都朝夕相與者三年歸以所聞于豫者語君君欣然樂聽不厭至忘寢食脫然棄其舊業如敝屣君素篤學髙行為鄉邦子弟所宗依尚謙自幼受業焉至是聞尚謙之言遂不知已之為兄尚謙之為弟巳之嘗為尚謙師而尚謙之嘗師于已也盡使其羣子弟姪來學于豫而君亦躬枉辱焉非天下之大勇能自勝其有我之私而果于徙義者孰能與于此哉自是其邑之士若楊氏兄弟與諸後進之來者源源以十數海內同志之盛莫有先于潮陽者則實君之昆弟之為倡也其有功于斯道豈小小哉方將因藉毗賴以共明此學而君忽逝矣其為同志之痛何可言哉雖然君于斯道亦既有聞則夕死無憾矣其又奚悲乎吾之所為長號涕洟而不能自巳者為吾道之失助焉耳天也可如何哉相望千里靡由走哭因風寄哀言有盡而意無窮嗚呼哀哉祭朱守忠文甲申嗚呼聖學之不明也久矣豫不自量犯天下之詆笑而冒非其任恃以無恐者謂海內之同志若守忠者為之胥附先後終將必有所濟也而自十餘年來若吾姚之徐曰仁潮陽之鄭朝朔楊仕德武陵之冀惟乾者乃皆相繼物故其餘諸同志之尚存足可倚賴者又皆離羣索居不能朝夕相與以資切磋砥礪之益今守忠又復棄我而逝天其或者既無意于斯文巳乎何其善類之難合而易暌善人之難成而易喪也嗚呼痛哉守忠之于斯道既巳識其大者又能樂善不倦旁招博采引接同志而趨之同歸于善若飢渴之于飲食視天下之務不啻其家事每欲以身殉之今兹之沒也實以驅賊山東晝夜勞瘁至隕其身而不顧嗚呼痛哉始守忠之赴山東也過豫而告别云節于先生之學誠有終身几席之願顧事功之心猶有未能脫然者先生將何以裁之豫曰君子之事進德修業而巳雖位天地育萬物皆已進德之事故德業之外無他事功矣乃若不由天德而求騁于功名事業之場則亦希髙慕外後世髙明之士雖知向學而未能不為才力所使者猶不免焉守忠既巳心覺其非固當不為所纍矣嗚呼豈知竟以是而忘其身乎守忠之死蓋禦災捍患而死勤事能為忠臣志士之所難能矣而吾猶以是為憾者痛吾道之失助為海內同志之不幸焉耳嗚呼痛哉靈輀云邁一奠永訣豈無良朋孰知我心之悲嗚呼痛哉祭洪襄惠公文嗚呼公以雄特之才豪邁之氣際明良之會致位公孤勳業振于當時聲光被于逺邇功成身退全節令終若公真可謂有濟時之具而為一世之傑矣悲夫才之難成也干雲合抱豈歲月所能致任之棟梁已不為不見用矣又輟而置之間散者十餘年不亦大可惜也乎天豈以公有克肖之子將斂其所未盡者而大發諸其後人也乎公優遊林下以樂太平之盛其沒也天子錫之祭葬褒以美諡生榮死哀亦復何憾矣而豫獨不能無悲且感者方公之生人皆知公之才美而忌者抑之使不得盡用時之人顧亦槩然視之曾不知以為意嗚呼豈知其沒也遂一仆而不可復起矣老成典刑為世道計者能無悲傷乎哉先君子素與于公守仁雖晚亦辱公之知愛公子嘗以公之墓銘見屬曾不能發揚盛美兹公之葬又不能奔走執紼馳奠一觴聊以寓其不盡之衷焉爾嗚呼哀哉尚饗祭楊士鳴文丙戌嗚呼士鳴吾見其進也而遽見其止邪往年士德之殁吾已謂天道之無知矣今而士鳴又相繼以逝吾安所歸咎乎嗚呼痛哉忠信明睿之資一郡一邑之中不能一二見而顧萃于一家之兄弟又皆與聞斯道以承千載之絶學此豈出于偶然者固宜使之得志大行發聖學之光輝翼斯文于悠逺而乃栽培長養則若彼其艱而傾覆摧折又如此其易其果出于偶然倐聚倐散而天亦略無主宰于其間邪嗚呼痛哉潮郡在南海之涯一郡耳一郡之中有薛氏之兄弟子姪既足盛矣而又有士鳴之昆季其餘聰明特逹毅然任道之器後先頡頑而起者以數十其山川靈秀之氣殆不能若是其淑且厚則亦宜有盈虛消息于其間矣乎士鳴兄弟雖皆中道而逝然今海內善類孰不知南海之濵有楊士德士鳴者為成德之士如祥麟瑞鳳爭一睹之為快因而向風興起者比比則士鳴昆季之生其潛啓默相以有績于斯道豈其微哉彼黃馘稿斃與草木同腐者又何可勝數求如士鳴昆季一日之生以死又安可得乎嗚呼道無生死無去來士鳴則既聞道矣其生也奚以喜其死也奚以悲獨吾黨之失助而未及見斯道之大行也則吾亦安能以無一慟乎嗚呼痛哉祭元山席尚書文丁亥嗚呼元山真可謂豪傑之士社稷之臣矣世方沒溺于功利辭章不復知有身心之學而公獨超然逺覽知求絶學于千載之上世方黨同伐異徇俗苟容以鈎聲避毁而公獨卓然定見惟是之從蓋有舉世非之而不顧世方植私好利依違反覆以壟斷相與而公獨世道是憂義之所存冒孤危而必吐心之所宜經百折而不回蓋其所論雖或亦有動于氣激于忿而其心事磊磊則如靑天白日洞然可以信其無他世方􅎱􅶄讒險排勝巳以嫉髙明而公獨誠心樂善求以伸人之才而不自知其身之為屈求以進賢于國而不自知怨謗之集于其身蓋所謂斷斷休休人之有技若已有之者此大臣之盛德自古以為難非獨近世之所未見也嗚呼世固有有君而無臣亦有有臣而無君者矣以公之賢而又遭逢主上之神聖知公之深而信公之篤不啻金石之固膠􅃮之投非所謂明良相逢千載一時者歟是何天意之不可測其行之也方若巨艦之遇順風而其傾之也忽中流而折檣舵其植之也方爾枝葉之敷榮而摧之也遂根株而蹶拔其果無意于斯世斯人也乎嗚呼痛哉嗚呼痛哉某之不肖屢屢辱公過情之薦自度終不能有濟于時而徒以為公知人之纍每切私懷慚愧又憶往年與公論學于貴州受公之知實深近年以來覺稍有所進思得與公一面少敘其愚以求質正斯亦千古之一快而公今復巳矣嗚呼痛哉聞公之訃不能奔哭千里設位一慟割心自今以往進吾不能有益于君國退將益修吾學期終不負知已之報而已矣嗚呼痛哉言有盡而意無窮嗚呼痛哉祭吳東湖文丁亥嗚呼吳公吾不可得而見之矣公之才如干將莫邪隨其所試皆迎刃而解公之志如長川逝河信其所趣雖百折不回公之節如堅松古柏必嵗寒而後見公之學如深林邃谷必窮探而始知自其筮仕迄于退休揚􅍓中外幾于四十年而天下皆以為未能盡公之才登陟崇顯至于大司空而天下皆以為未能行公之志雖未嘗捐軀喪元而天下信其有成仁死義之勇雖未嘗講學論道而天下知其有闢邪衛正之心嗚呼若公者真可謂一世之豪傑無所待而興者矣某于公未獲傾蓋而向慕滋切未獲識公之面而久已知公之心公于某其教愛勤惓不特篇章之稠疊而過情推引亦復薦剡之頻煩長愧菲薄何以承公之教而懼其終不免為知人之纍也今兹承乏是土而來正可登堂請謝論心求益而公則避我長逝巳一年矣嗚呼傷哉幸與公並生斯世而復終身不及一面茫茫天壤竟成千古之神交豈不痛哉薄奠一觴以哭我私公神有知尚來格斯祭永順寶靖土兵文戊子維湖廣永順寶靖二司之土兵多有物故于南寧諸處者嘉靖七年六月十五日乙卯欽差總制四省軍務尚書左都御史新建伯王委南寧府知府蔣山卿等告于南寧府城隍之神使號召諸物故者之魂魄以牛二羊四豕四祭而告之曰嗚呼諸湖兵壯士傷哉爾等皆勤國事而來死于兹土山溪阻絶不能一旦歸見其父母妻子旅魂飄颻于異域無所依倚嗚呼痛哉三年之間兩次調發使爾絡繹奔走于道途不獲顧其家室竟死客鄉此我等上官之罪也復何言哉復何言哉古者不得巳而後用兵先王不忍一夫不獲其所况忍羣驅無辜之赤子而填之于溝壑且兵之為患非獨鋒鏑死傷之酷而已也所過之地皆為荆棘所住之處遂成塗炭民之毒苦傷心慘目可盡言乎邇者思田之役豫所以必欲招撫之者非但以思田之人無可勦之罪于義在所當撫亦正不欲無故而驅爾等于兵刃之下也而爾等竟又以疾病物故于此則豈非命耶嗚呼傷哉人孰無死豈必窮鄉絶域能死人乎今人不出户庭或飲食傷多或逸欲過節醫治不痊亦死矣今爾等之死乃因驅馳國事捍患禦侮而死蓋得其死所矣古之人固有願以馬革褁尸不願死于婦人女子之手者若爾等之死真無愧于馬革褁尸之言矣嗚呼壯士爾死何憾乎今爾等徒侣皆巳班師去矣爾等遊魂漂泊正可隨之西歸爾等尚知之乎爾等其收爾遊魂斂爾精魄駕風逐霧隨爾徒侣去歸其鄉依爾祖宗之墳墓以棲爾魂享爾妻子之蒸嘗以庇爾後爾等徒侣或有征調之役則爾等尚鼓爾生前義勇之氣以隂助爾徒侣立功報國為民除患豈不生為壯烈之夫而沒為忠義之士也乎豫因疾作不能親臨祭所一哭爾等以舒豫傷感之懷臨文悽愴涕下沾臆今委知府布告豫衷爾等有靈尚知之乎嗚呼傷哉祭軍牙六纛之神文戊子惟神秉揚神武三軍司命今制度聿新威靈丕振伏惟仰鎮國家緝定禍亂平服蠻夷以永無窮之休尚饗祭南海文戊子天下之水萃于南海利濟四方涵濡萬類自有天地厥功為大今皇聖明露降河淸我實受命南荒以平隂陽表裏維海效靈乃陳牲帛厥用告成尚饗祭六世祖廣東參議性常府君文戊子於維我祖效節於髙皇之世肇禋兹土嵗久淪蕪無寧有司之不遑實我子孫門祚衰微弗克靈承顯揚蓋冥迷昏隔者八九十年言念愴惻子孫之心亦徒有之恭惟我祖晦迹長遁迫而出仕務盡其忠豈曰有身沒之祀父死于忠子殫其孝各安其心白刃不見又知有一祀之榮乎顧表揚忠孝樹之風聲實良有司修舉國典以宣流王化之盛美我祖之烈因以復彰見人心之不泯我子孫亦藉是獲申其愴鬱永有無窮之休焉及兹廟成而末孫某適獲來蒸事若有不偶然者我祖之道其殆自兹而昌乎某承上命來撫是方上無補于君國下無益于生民循例省績實懷多慚至于心之不敢以不自盡則亦求無忝于我祖而已矣承事之餘敢告不忘以五世祖祕湖漁隱先生彥逹府君配尚饗王文成公全書卷之二十五終
