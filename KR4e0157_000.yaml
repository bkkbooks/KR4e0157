body:
  text: 王文成公全書序王文成公全書三十八卷其首三卷為語録公存時徐子曰仁輯次二十八卷為文録為别録為外集為續編皆公薨後錢子洪甫輯最後七卷為年譜為世德紀則近時洪甫與汝中王子輯而附焉者也隆慶壬申侍御新建謝君奉命按浙首修公祠置田以供歲祀已而閲公文見所謂録若集各自為書懼夫四方之學者或弗克盡讀也遂彚而夀諸􅎚名曰全書屬階序階聞之道無隱顯無小大隱也者其精微之藴于心者也體也顯也者其光華之著于外者也用也小也者其用之散而為川流者也大也者其體之㰸而為敦化者也譬之天然不已之妙默運于於穆之中而日月星辰之麗四時之行百物之生燦然呈露而不可掩是道之全也古昔聖人具是道于心而以時出之或為文章或為勳業至其所謂攴者或施之朝廷或用之邦國或形諸家庭或見諸師弟子之問答與其日用應酬之常雖製以事殊語因人異然莫非道之用也故在言道者必該體用之全斯謂之善言在學道者亦必得體用之全斯謂之善學嘗觀論語述孔子心法之傳曰一貫既已一言盡之而其紀孔子之文則自告時君告列國之卿大夫告諸弟子告避世之徒以及對陽貨詢廄人答問饋之使無一弗録將使學者由顯與小以得其隱與大焉是善言道者之凖也而其為學因亦可以見矣唯文成公奮起聖逺之後慨世之言致知者求知于見聞而不可與酬酢不可與佑神于是取孟子所謂良知合諸大學以為致良知之説其大要以謂人心虗靈莫不有知唯不以私欲蔽塞其虗靈者則不假外索而於天下之事自無所感而不通無所措而不當蓋誠意正心修身齊家治國平天下必先致知之本旨而千變萬化一以貫之之道也故嘗語門人云良知之外更無知致知之外更無學于時曰仁最稱髙第弟子其録傳習公微言精義率已具其中乃若公他所為文則是所謂製殊語異莫非道之用者彚而􅎚之豈唯公之書于是乎全固讀焉者所由以覩道之全也謝君之為此其嘉惠後學不已至歟雖然謝君所望于後學非徒讀其書已也凡讀書者以身踐之則書與我為一以言視之則判然二耳論語之為書世未嘗有不讀然而一貫之唯自曾子以後無聞焉豈以言視之之過乎自公致良知之説興士之獲聞者衆矣其果能自致其良知卓然踐之以身否也夫能踐之以身則于公所垂訓誦其一言而已足參詩傳習録而已繁否則雖盡讀公之書無益也階不敏碩相與戒之􅒜君名廷傑字宗聖其為政崇莭義育人才立保甲厚風俗動以公為師蓋非徒讀公書者也賜進士及第特進光録大夫柱國少師兼太子太師吏部尚書建極殿大學士知制誥知經筵事國史總裁致仕後學華亭徐階序奉天承運皇帝制曰竭忠盡瘁固人臣職分之常崇德報功實國家激勸之典矧通侯班爵崇亞上公而節惠易名榮逾華衮事必待乎論定恩豈容以久虗爾故原任新建伯南京兵部尚書兼都察院左都御史王守仁維嶽降靈自天佑命爰從弱冠屹為宇宙人豪甫拜省郎獨奮乾坤正論身瀕危而志愈壯道處困而造彌深紹堯孔之心傳微言式闡倡周程之道術來學攸宗藴蓄既宏猷為丕著遺艱投大隨試皆宜戡亂解紛無施弗效閩粵之箐巢盡掃而擒縱如神東南之黎庶舉安而文武足憲爰及逆藩稱亂尤資仗鉞淵謀旋凱奏功速于吳楚之三月出奇決勝邁彼淮蔡之中霄是嘉社稷之偉勳申盟帶礪之異數既復撫夷兩廣旋致格苗七旬謗起功髙賞移罰重爰遵遺詔兼采公評續相國之生封時而旌伐追曲江之殁恤庶以酬勞兹特贈為新建侯諡文成錫之誥命於戲鍾鼎勒銘嗣美東征之烈劵綸昭錫世登南國之功永為一代之宗臣實耀千年之史册冥靈不昧寵命其承隆慶二年十月十七日孰肖夫子之形孰傳夫子之神形有涯而有盡神無方而無垠孰亡孰存孰踈孰親萬物皆備於我而自足千聖不離于心而可馴反身而觀見夫炯然者不容以毁是謂本來面目庶幾不失夫子之真門人王畿百拜贊舜江濬祥禹穴炳靈良知一振群寐咸醒接溫聽厲尚及典刑仁為已任勿謂丹青門人鄒守益百拜贊昔侍師顔相承以心師既逝矣相證以言惟日究乎精微見師造之淵泉未酬師志何以假年懼惟日之不足庶相屬乎後賢門人錢德洪百拜贊思自孩童即聞至教言詞動履並皆心妙學問由成中和體效功業所就仁義肯要千聖一心良知孔竅俯仰古今至誠合道姪子正思百拜贊翁貌不凡翁性不羈掀天揭他電掣風馳謀猷所立固非人之所可及而淵源所自直擬上遡于孔尼真當朝柱石後世表儀山河同誓日月增輝不肖垂髫撫恤提携耿耿不昧猶憶英威姪子正愚百拜贊舊序傳習録序門人徐愛撰門人有私録陽明先生之言者先生聞之謂之曰聖賢教人如醫用藥皆因病立方酌其虗實溫涼隂陽內外而時時加減之要在去病初無㝎説若拘執一方鮮不殺人矣今某與諸君不過各就偏蔽針切砥礪但能改化即吾言已為贅疣若遂守為成訓他日誤已誤人某之罪過可復追贖乎愛既備録先生之教同門之友有以是相規者愛因謂之曰如子之言即又拘執一方復失先生之意矣孔子謂子貢嘗曰豫欲無言他日則曰吾與回言終日又何言之不一邪蓋子貢專求聖人于言語之間故孔子以無言警之使之實體諸心以求自得顔子於孔子之言默識心通無不在巳故與之言終日若決江河而之海也故孔子於子貢之無言不為少於顔子之終日言不為多各當其可而巳今備録先生之語固非先生之所欲使吾儕常在先生之門亦何事於此惟或有時而去側同門之友又皆離羣索居當是之時儀刑既遠而規切無聞如愛之駑劣非得先生之言時時對越警發之其不摧墮靡廢者幾希矣吾儕於先生之言苟徒入耳出口不體諸身則愛之録此實先生之罪人矣使能得之言意之表而誠諸踐履之實則斯録也固先生終日言之之心也可少乎哉録成因復識此於首篇以告同志門人徐愛序陽明先生文録序門人鄒守益錢子德洪刻先師文録于姑蘇自述其裒次之意以純于講學明道者為正録曰明其志也以詩賦及酬應者為外集曰盡其全也以奏疏及文移為别録曰究其施也於是先師之言燦然聚矣以守益與聞緒言之教也寓簡使序之守益拜手而言曰知言誠末易哉昔者孔夫子之在春秋也從遊者三千速肖者七十矣而猶有莫我知之嘆嘆夫以言語求之而眩其真也夫子既沒門弟子欲以所事夫子者事有子夷考其取于有子亦曰甚矣其言之似夫子也則下學上逹之功其著且察者鮮矣推尊之詞要亦足以及之賢於堯舜堯舜未易賢也走獸之於麟飛鳥之於鳯雖勉而企之其道無繇不幾于絶德乎禮樂之等最為近之然猶自聞見而求終不若秋陽江漢直悟本體為簡易而切實也蓋在聖門惟不遷怒不二過之顔語之而不惰其次則忠恕之曾足以任重而道遠故再傳而以祖述憲章譬諸天地四時三傳而以仕止久速之時比諸大成比諸巧力宛然江漢秋陽家法也秦漢以來專以訓詁雜以佛老侈以詞章而皓皓肫肫之學淆雜偏陂而莫或救之逮于濂洛始粹然克續其傳論聖之可學則以一者無欲為要答㝎性之功則以大公順應學天地聖人之常嗟乎是豈嘗試而懸斷之者乎其後剖析愈精考擬愈繁著述愈富而支離愈甚間有覺其非而欲挽焉則又未能盡追窠臼而洗濯之至我陽明先師慨然深探其統歷艱履險磨瑕去垢獨揭良知力拯羣迷犯天下之謗而不自恤也有志之士稍稍如夢而覺泝濂洛以達洙泗非先師之功乎以益之不類再見于虔再别于南昌三至于會稽竊窺先師之道愈簡易愈廣大愈切實愈髙明望望然而莫知其所止也當時有稱先師者曰古之名世或以文章或以政事或以氣節或以勳烈而公克兼之獨除却講學一節即全人矣先師笑曰某願從事講學一節盡除却四者亦無愧全人又有訾訕之者先師曰古之狂者嘐嘐聖人而行不掩世所謂敗闕也而聖門以列中行之次忠信廉潔刺之無可刺世所謂完全也而聖門以為德之賊某願為狂以進取不願為願以媚世嗚呼今之不知公者果疑其為狂乎其知公者果能盡除四者而信其為全人乎良知之明蒸民所同本自皓皓本自肫肫常寂常感常神常化常虛常直常太公常順應患在自私用智之欲所障始有所尚始有所倚不倚不尚本體呈露宣之為文章措之為政事犯顔敢諌為氣節誅亂討賊為勳烈是四者皆一之流行也學出于一則以言求心矣學出于二則以言求言矣守益力病於二之而未瘳也故反覆以質于吾黨吾黨欲求知言之要其惟自致其良知乎嘉靖丙申春三月陽明先生文録序門人錢德洪撰古之立教有三有意教有政教有言教太上之世民涵真性嗜欲未涉聖人者特相示以意已矣若伏義陳奇偶以指象是也而民遂各以意會不逆於心羣物以遊熙如也是之謂意教中古之民風氣漸開示之以意若病不足矣聖人者出則為之經制立法使之自厚其生自利其用自正其德而民亦相忘於政化之中各足其碩日入於善而不知誰之所使是以政教之也自後聖王不作皇度不張民失所趨俗非其習而聖人之意日湮以晦懷世道者憂之而處非其任則嘵嘵以空言覺天下是故始有以言教也噫立教而至於以言則難矣昔者孔子之在春秋也其所與世諄諄者皆性所同也然於習俗所趨無徴焉乃閧起而異之曰是將奮吾之所習而蹶吾之所趨也或有非笑而詆訾之者三千之徒其庶幾能自拔於流俗不與衆非笑詆訾之者乎然而天下之大也其能自拔於俗不與衆非笑詆訾者僅三千人焉豈非空言動衆終不若躬見於政事之為易也夫三千之中稱好學者顔氏之外又無多聞焉豈速肖之士知自拔於俗矣尚未能盡脫乎俗習耶一洗俗習之陋直超自性之真而盡得聖人千古不盡之意者豈顔氏之所獨耶然而三千之徒其於夫子之言也猶面授也秦火而後掇拾於漢儒者多似是而失真矣後之儒者復以已見臆説盡取其言而支離決裂之噫誠面授也尚未免於俗習焉拜取其言而亂之則後之懷世道者復將何恃以自植於世耶吾師陽明先生蚤有志於聖人之道求之俗習而無取也求之世儒之學而無得也乃一洗俗習之陋世儒之説而自證以吾之心焉殫思力踐竭精瘁志卒乃豁然有見於良知而千古聖人不盡之意復得以大明於世噫亦難矣世之聞吾先生之言者其皆肯自拔於流俗不與衆非笑詆訾之乎其皆肯一洗俗習之陋世儒之説而獨證以吾之心乎夫非笑詆訾在孔子猶不免焉於當世乎奚病特病其未之或聞焉耳如其有聞也則知先生之所言者非先生之言也吾之心也吾心之知不以太上而古不以當世而今不待示而得不依政而行俗習所不能湮異説所不能淆特在乎有超世特立之志自證而自得之耳有超世特立之志者而一觸其知真如去目之塵沙以還光也拔耳之木楔以還聰也解支體之束縳以自舒也去汚穢而就高明撤蔽障而合大同以復中古之政超太上之意亦已矣又奚以俗習之陋世儒之説為哉先生之言世之信從者日衆矣特其文字之行於世者或雜夫少年未㝎之論愚懼後之亂先生之學者即是先生之言始也乃取其少年未㝎之論盡刪而去之詳披締閲參酌衆見得至一之言五卷焉其餘或發之題詠或見之政事者則釐為外集别録復以日月前後順而次之庶幾知道者讀之其知有所取乎雖然是録先生之言也特入珍藏之扃鑰也珍藏不守乃屑屑焉扃鑰之是競豈非舍其所重而自任其所輕耶兹不能無愧于是録之成云爾重刻陽明先生文録後語門人王畿撰道必待言而傳夫子嘗以無言為警矣言者所由以入於道之詮凡待言而傳者皆下學也學者之於言也猶之暗者之於燭跛者之于杖也有觸發之義焉有培栽之義焉而其機則存乎心悟不得于心而泥於言非善於學者也我陽明先師倡明聖學以良知之説覺天下天下靡然從之是雖入道之玄詮亦下學事載諸録者詳矣吾黨之從事於師説也其未得之果能有所觸發否乎其得之也果能有所栽培否乎其得而玩之也果能有所印正否乎得也者非得之於言得之於心也契之於心忘乎言者也猶之燭之資乎明杖之輔乎行其機則存乎目與足非外物所得而與也若夫玩而忘之從容默識無所待而自中乎道斯則無言之旨上逹之機固吾梅林公重刻是録相與嘉惠而申警之意也不然則聖學亡而先師之意荒矣吾黨朂諸陽明先生文録續編序後學徐階撰餘姚錢子洪甫既刻陽明先生文録以傳又求諸四方得先生所著大學或問五經臆説序記書疏等若干卷題曰文録續編而屬嘉興守六安徐侯以正刻之刻成侯謀於洪甫及王子汝中遣郡博張編海寧諸生董啓豫問序於階階曰先生之文非淺薄所敢序也雖然階嘗從洪甫汝中竊聞先生之學矣夫學非獨倡始難也其傳而不失其宗蓋亦不易焉自孔子沒大學格致之旨晦其在俗儒率外心以求知終其身汨溺於見聞記誦而髙明之士又率慕徑約貴自然淪入於二氏而不自覺先生崛起千載之後毅然以謂致知者致吾心之良知也吾心之良知不待慮而知不待學而能是乃天命之性吾心靈昭明覺之本體也惟不自欺其良知斯知致而意可誠矣格者正也正其不正以歸於正也物者事也事各歸於正而吾良知之所知始無虧缺障蔽得以極其致矣舉知而歸諸良舉致知而歸諸正物蓋先生之學不汨於俗亦不入於空如此于時聞者幸知口耳之可耻然其辟之或激於大過幸有見夫心體之當求然其擬之或涉於太輕於是超頓之説興至舉踐履之實積纍之功盡詆以為不足務脫於俗顧轉而趨於空則先生之學有不待夫傳之既久乃始失其宗者茲豈非學先生者之所憂乎洪甫輯為是編其志固將以救之其自序曰言近而旨遠此吾師中行之證也又曰吾師之教平易切實而聖智神化之機固巳躍然不必更為别説洪甫之於師傳其闡明翼衛視先生之於孔氏有功等矣夫三代以前學與政合而出於一虞廷之命官與其所陳之謨皆精一執中之運用也故曰三代之治本於道三代之道本於心而後世論學既指夫俗與空者當之其論政又指夫期會簿書當之謬迷日甚而未巳也徐侯方從事於政獨能聚諸生以講先生之學汲汲焉刻是編以詔之其異於世之為者歟使凡領郡者皆徐侯其人先生之學明而洪甫之憂可釋也階生晚不及登先生之門然昔孟子自謂於孔子為私淑至其自任間先生之道以承孔子則雖見目為好辨而不辭故輒以侯請僭為之序嗚呼觀者其尚亮階之志也夫刻文録敘説德洪曰嘉靖丁亥四月時鄒謙之謪廣德以所録先生文稿請刻先生止之曰不可吾黨學問幸得頭腦須鞭辟近裏務求實得一切繁文靡好傳之恐眩人耳目不録可也謙之復請不巳先生乃取近稿三之一標揭年月命德洪編次復遺書曰所録以年月為次不復分别體類者蓋專以講學明道為事不在文辭體製間也明日德洪掇拾所遺復請刻先曰此愛惜文辭之心也昔者孔子刪述六經若以文辭為心如唐虞三代自典謨而下豈止數篇正惟一以明道為志故所述可以垂教萬世吾黨志在明道復以愛惜文字為心便不可入堯舜之道矣德洪復請不巳乃許數篇次為附録以遺謙之今之廣德板是也先生讀文録謂學者曰此編以年月為次使後世學者知吾所學前後進詣不同又曰某此意思賴諸賢信而不疑須口口相傳廣布同志庶幾不墜若筆之於書乃是異日事必不得巳然後為此耳又曰講學須得與人人面授然後得其所疑時其淺深而語之才涉𥿄筆便十不能盡一二戊子年冬先生時在兩廣謝病歸將下庾嶺德洪與王汝中聞之乃自錢塘趨迎至龍遊聞訃遂趨廣信訃告同門約每越三年遣人裒録遺言明日又進貴溪扶喪還玉山至草萍驛戒記書篋故諸稿幸免散逸自後同門各以所録見遺既七年壬辰德洪居吳始較㝎篇類復為購遺文一疏遣安成王生自閩粵由洪都入嶺表抵蒼梧取道荆湘還自金陵又獲所未備然後謀諸提學侍御聞人邦正入梓以行文録之有外集别録遵附録例也先生之學凡三變其為教也亦三變少之時馳騁於辭章已而出入二氏繼乃居夷處困豁然有得於聖賢之旨是三變而至道也居貴陽時首與學者為知行合一之説自滁陽後多教學者靜坐江右以來始單提致良知三字直指本體令學者言下有悟是教亦三變也讀文録者當自知之先生嘗曰吾始居龍場鄉民言語不通所可與言者乃中土亡命之流耳與之言知行之説莫不欣欣有入久之並夷人亦翕然相向及出與士夫言則紛紛同異反多扞格不入何也意見先入也德洪自􅉝巳冬始見先生於姚再見於越於先生教若恍恍可即然未得入頭處同門先輩有指以靜坐者遂覔光相僧房閉門凝神淨慮倐見此心真體如出蔀屋而覩天日始知平時一切作用皆非天則自然習心浮思炯炯自照毫髮不容住著喜馳以告先生曰吾昔居滁時見學者徒為口耳同異之辨無益於得且教之靜坐一時學者亦若有悟但久之漸有喜靜厭動流入枯稿之病故邇來只指破致良知工夫學者真見得良知本體昭明洞徹是是非非莫非天則不論有事無事精察克治俱歸一路方是格致實功不落却一邊故較來無出致良知話頭無病何也良知原無間動靜也德洪既自喜學得所入又承點破病痛退自省究漸覺得力良知之説發於正德辛巳年蓋先生再罹寧藩之變張許之難而學又一畨證透故正録書凡三卷第二卷斷自辛巳者志始也格致之辨莫詳於答顧華玉一書而拔本塞源之論寫出千古同體萬物之旨與末世俗習相沿之弊百世以俟讀之當為一快先生嘗曰吾良知二字自龍場巳後便已不出此意只是點此二字不出於學者言費却多少辭説今幸見出此意一語之下洞見全體直是痛快不覺手舞足蹈學者聞之亦省却多少尋討功夫學問頭腦至此巳是説得十分下落但恐學者不肯直下承當耳又曰某於良知之説從百死千難中得來非是容易見得到此此本是學者究竟話頭可惜此理淪埋巳久學者苦於聞見障蔽無入頭處不得巳與人一口説盡但恐學者得之容易只把作一種光景玩弄孤負此知耳甲申年先生居越中秋月白如洗乃燕集羣弟子於天泉橋上時在侍者百十人酒半行先生命歌詩諸弟子比音而作翕然如協金石少間能琴者理絲善簫者吹竹或投壺聚算或鼓棹而歌遠近相答先生顧而樂之遂即席賦詩有曰鏗然舍瑟春風裏點也雖狂得我情之句既而曰昔孔門求中行之士不可得苟求其次其惟狂者乎狂者志存古人一切聲利紛華之染無所纍其衷真有鳯皇翔于千仞氣象得是人而裁之使之克念日就平易切實則去道不遠矣豫自鴻臚以前學者用功尚多拘局自吾揭示良知頭腦漸覺見得此意者多可與裁矣先生自辛巳年初歸越明年居考喪德洪輩侍者蹤迹尚寥落既後四方來者日衆癸未巳後環先生之室而居如天妃光相能仁諸僧舍每一室常合食者數十人夜無卧所更畨就席歌聲徹昏旦南鎮禹穴陽明洞諸山遠近古剎徙足所到無非同志遊寓之地先生每臨席諸生前後左右環坐而聽常不下數百人送往迎來月無虛日至有在侍更嵗不能遍記其姓字者諸生每聽講出門未嘗不踴躍稱快以昧入者以明出以疑入者以悟出以憂憤愊憶入者以融釋脫落出嗚呼休哉不圖講學之至於斯也嘗聞之同門南都以前從遊者雖衆未有如在越之盛者雖講學日久孚信漸博要亦先生之學益進感召之機亦自不同也今觀文録前後論議大略亦可想見先生嘗語學者曰作文字亦無妨工夫如詩言志只看爾意向如何意得處自不能不發之於言但不必在詞語上馳騁言不可以偽為且如不見道之人一片粗鄙心安能説出和平話總然都做得後一兩句露出病痛便覺破此文原非充飬得來若飬得此心中和則其言自别門人有欲汲汲立言者先生聞之嘆曰此弊溺人其來非一日矣不求自信而急於人知正所謂以已昏昏使人昭昭也耻其名之無聞於世而不知知道者視之反自貽笑耳宋之儒者其制行磊犖本足以取信於人故其言雖未盡人亦崇信之非專以空言動人也但一言之誤至於誤人無窮不可勝救亦豈非汲汲於立言者之過耶或問先生所答示門人書稿刪取歸並作數篇訓語以示將來如何先生曰有此意但今學問自覺所進未止且終日應酬無暇他日結廬山中得如諸賢有筆力者聚會一處商議將聖人至緊要之語發揮作一書然後取零碎文字都燒了免致纍人德洪事先生在越七年自歸省外無日不侍左右有所省豁每得於語默作止之間或聞時訕議有動于衷則益自奮勵以自植有疑義即進見請質故樂於面炙一切文辭俱不收録每見文稿出示比之侍坐時精神鼓舞歉然常見不足以是知古人書不盡言言不盡意非欺我也不幸先生既沒謦咳無聞儀刑日遠每思印證茫無可即然後取遺稿次第讀之凡所欲言而不能者先生皆為我先發之矣雖其言之不能盡意引而不發躍如也由是自滁以後文字雖片𥿄隻字不敢遺棄四海之逺百世之下有同此懷者乎苟取正録順其日月以讀之不以言求而惟以神會必有沛然江河之決莫之能禦者矣别録成同門有病其太繁者德洪曰若以文字之心觀之其所取不過數篇若以先生之學見諸行事之實則雖瑣屑細務皆精神心術所寓經時贊化以成天下之事業千百年來儒者有用之學於此亦可見其梗槩又何病其太繁乎昔門人有讀安邊八䇿者先生曰是疏所陳亦有可用但當時學問未透中心激忿抗厲之氣若此氣未除欲與天下共事恐於事未必有濟陳惟濬曰昔武宗南巡先生在虔姦賊在君側間有以疑謗危先生者聲息日至諸司文帖絡繹不絶請先生即下洪勿處用兵之地以堅姦人之疑先生聞之太然不動門人乘間言之先生姑應之曰吾將往矣一日惟濬亦以問先生曰吾在省時權竪如許勢熖疑謗禍在目前吾亦帖然處之此何足憂吾已解兵謝事乞去只與朋友講學論道教童生習禮歌詩烏足為疑縱有禍患亦畏避不得雷要打便隨他打來何故憂懼吾所以不輕動亦有深慮焉爾又一人使一友亦告急先生曰此人惜哉不知學公輩曷不與之講學乎是友亦釋然謂人曰明翁真有赤舄几几氣象愚謂别録所載不過先生政事之迹耳其遭時危謗禍患莫測先生處之太然不動聲色而又能出危去險坐收成功其致知格物之學至是豈意見擬議所能及是皆别録所未及詳者洪感惟濬之言故表出之以為讀别録者相發復聞人邦正書裒刋文録諸同門聚議不同久矣有曰先生之道無精粗隨所發言莫非至教故集文不必擇其可否槩以年月體類為次使觀者隨其所取而獲焉此久菴諸公之言也又以先生言雖無間於精粗而終身命意惟以提揭人心為要故凡不切講學明道者不録可也此東廓諸公之言也二説相持罔知裁定去年廣回舟中反覆思惟不肖鄙意竊若有附於東廓子者夫傳言者不貴乎盡其博而貴乎得其意得其意雖一言之約足以入道不得其意而徒示其博則泛濫失真匪徒無益是眩之也且文别體類非古也其後世侈詞章之心乎當今天下士方馳騖於辭章先生少年亦嘗沒溺于是矣卒乃自悔惕然有志于身心之學學未歸一出入於二氏者又幾年矣卒乃自悔省然獨得于聖賢之旨反覆世故更歷險阻百錬千磨斑瑕盡去而輝光煥發超然有悟于良知之説自􅉝已年巳後而先生教益歸於約矣故凡在門墻者不煩辭説而指見本體真如日月之麗天大地山河萬象森列隂崖鬼魅皆化而為精光斷溪曲徑皆坦而為大道雖至愚不肖一觸此體真知皆可為堯舜考三王建天地質鬼神俟百世斷斷乎知其不可易也有所不行者特患不加致之之功耳今傳言者不揭其獨得之旨而尚吝情于悔前之遺未透之説而混焉以誇博是愛其毛而不屬其裏也不既多乎既又思之凡物之珍賞于時者久而不廢况文章乎先生之文既以傳誦於時欲不盡録不可得也自今尚能次其月日善讀者尤可以驗其悔悟之漸後恐迷其歲月而槩以文字取之混入焉則並今日之意失之矣久菴之慮殆或以是與不得巳乃兩是而俱存之故以文之純于講學明道者裒為正録餘則别為外集而總題曰文録疏奏批駁之文則又釐為一書名曰别録夫始之以正録明其志也繼之以外集盡其博也終之以别録究其施也而文稽其類以從時也識道者讀之庶幾知所取乎此又不肖者之意也問難辨詰莫詳於書故正録首書次記次序次説而以雜著終焉諷詠規切莫善于詩賦故外集首賦次詩次記次序次説次雜著而傳志終焉别録則卷以事類篇以題别先奏疏而後公移刻既成懼讀者之病于未察也敢敬述以求正乙未年正月序説終王文成公全書目録卷之一語録一傳習録上卷之二語録二傳習録中卷之三語録三傳習録下附朱子晚年定論卷之四文録一書始正德己巳至庚辰與辰中諸生己巳答徐成之辛未答黃宗賢應原忠辛未答汪石潭內翰辛未寄諸用明辛未答王虎谷辛未與王宗賢辛未二壬申三癸酉四癸酉五癸酉六丙子七戊寅與王純甫壬申二癸酉三甲戌四甲戌寄希淵壬申二壬申三癸酉四己卯與戴子良癸酉與胡伯忠癸酉與黃誠甫癸酉二丁丑答王天宇甲戌二甲戌寄李道夫乙亥與陸元靜丙子二戊寅與希顔台仲明德尚謙元靜丁丑與楊仕德薛尚謙丁丑寄聞人邦英邦正戊寅二戊寅三庚辰寄薛尚謙戊寅二三寄諸弟戊寅與安之己卯答井泉己卯二庚辰答方叔賢己卯與陳國英庚辰復唐虞佐庚辰卷之五文録二書始正德辛巳至嘉靖乙酉與鄒謙之辛巳二乙酉與夏敦夫辛巳與朱守忠辛巳與席元山辛巳答井泉辛巳答倫彥式辛巳與唐虞佐侍御辛巳答方叔賢辛巳二癸未與楊仕鳴辛巳二癸未三癸未與陸元靜辛巳二壬午答舒國用癸未與劉元道癸未答路賔陽癸未與黃勉之甲申二甲申答劉內重乙酉與王公弼乙酉答董澐蘿石乙酉與黃宗賢癸未寄薛尚謙癸未卷之六文録三書始嘉靖丙戌至戊子寄鄒謙之丙戌二丙戌三丙戌四丙戌五丙戌答友人丙戌答友人問丙戌答南元善丙戌二丙戌答季德明丙戌與王公弼丙戌二丁亥與歐陽崇一丙戌寄陸原靜丙戌答井泉丙戌答魏師説丁亥與馬子莘丁亥與毛古庵憲副丁亥與黃宗賢丁亥答以乘憲副丁亥與戚秀夫丁亥與陳惟濬丁亥寄安福諸同志丁亥與錢德洪黃汝中丁亥二戊子三戊子答何廷仁戊子卷之七文録四序記説别三子序丁卯贈林以吉歸省序辛未送宗伯喬白巖序辛未贈王堯卿序辛未别張常甫序辛未别湛井泉序壬申别方叔賢序辛未别王純甫序辛未别王宗賢歸天台序壬申贈周瑩歸省序乙亥贈林典卿歸省序乙亥贈陸清伯歸省序乙亥贈周以善歸省序乙亥贈郭善甫歸省序乙亥贈鄭德夫歸省序乙亥紫陽書院集序乙亥朱子晚年定論序戊寅别梁日孚序戊寅大學古本序戊寅禮記纂言序庚辰象山文集序庚辰觀德亭記戊寅重修文山祠記戊寅從吾道人記乙酉親民堂記乙酉萬松書院記乙酉稽山書院尊經閣記乙酉重修山隂縣儒學記乙酉梁仲用默齋説辛未示弟立志説乙亥約齋説甲戌見齋説乙亥矯亭説乙亥謹齋説乙亥夜氣説乙亥修道説戊寅自得齋説甲申博約説乙酉惜隂説丙戌卷之八文録五雜著書汪汝成格物卷癸酉書石川卷甲戌與傅生鳯甲戌書王天宇卷甲戌書王嘉秀請益卷甲戌書孟源卷乙亥書楊思元乙亥書玄默卷乙亥書顧惟賢卷辛巳壁帖壬午書王一為卷癸未書朱守諧卷甲申書諸陽卷甲申書張思欽卷乙酉書中天閣勉諸生乙酉書朱守乾卷乙酉書正憲扇乙酉書魏思孟卷乙酉書朱子禮卷甲申書林司訓卷丙戌書黃夢星卷丁亥卷之九别録一奏疏陳言邊務疏乞飬病疏乞宥言官去權姦以章聖德疏自效乞休疏乞飬病疏諌迎佛疏辭新任乞以舊職致仕疏謝恩疏給由疏參失事官員疏閩廣捷音疏申明賞罰以勵人心疏攻治盜賊二䇿疏類奏擒斬功次疏添設清平縣治疏疏通鹽法疏卷之十别録二奏疏議夾勦兵糧疏南贛擒斬功次疏議夾勦方略疏換勑謝恩疏交收旗牌疏議南贛啇稅疏升賞謝恩疏橫水桶岡捷音疏立崇義縣治疏卷之十一别録三奏疏乞休致疏移置驛傳疏浰頭捷音疏添設和平縣治疏三省夾勦捷音疏辭免升廕乞以原職致仕疏再議崇義縣治疏再議平和縣治疏再議疏通鹽法疏升廕謝恩疏乞放歸田里疏卷之十二别録四奏疏飛報寧王謀反疏再報謀反疏乞便道省􅌾疏奏聞宸濠偽造檄榜疏留用官員疏江西捷音疏擒獲宸濠捷音疏奏疏益王助軍餉疏旱災疏請止親征疏奏留朝覲官疏奏聞淮王助軍餉疏恤重刑以實軍伍疏處置官員署印疏二乞便道省􅌾疏處置從逆官員疏處置府縣從縣從逆官員疏收復九江南康參失事官員疏卷之十三别録五奏疏乞寬免稅糧急救民困以弭災變疏計處地方疏水災自劾疏重上江西捷音疏四乞省􅌾疏開豁軍前用過錢糧徴收