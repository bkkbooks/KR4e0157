  text: 王文成公全書卷之二十一
  hash: sha256:8f074e4843a718215096678b155bf165d7589afa01e9faa7d12d672b11699805
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_016-1a}
body:
  text: 外集三書答佟太守求雨癸亥昨楊李二丞來備傳尊教且詢致雨之術不勝慚悚今早諶節推辱臨復申前請尤為懇至令人益增惶懼天道幽逺豈凡庸所能測識然執事憂勤為民之意真切如是僕亦何可以無一言之復孔子云丘之禱久矣蓋君子之禱不在于對越祈祝之際而在于日用操存之先執事之治吾越幾年于此矣凡所以為民祛患除弊興利而致福者何莫而非先事之禱而何俟于今日然而暑旱尚存而雨澤未應者豈别有所以致此者歟古者歲旱則為之主者減膳徹樂省獄薄賦修祀典問疾苦引咎賑乏為民遍請于山川社禝故有叩天求雨之祭有省咎自責之文有歸誠請改之禱蓋史記所載湯以六事自責禮謂大雩帝用盛樂春秋書秋九月大雩皆此類也㒒之所聞于古如是未聞有所謂書符呪水而可以得雨者也唯後世方術之士或時有之然彼皆有髙潔不汚之操特立堅忍之心雖其所為不必合於中道而亦有以異于尋常是以或能致此然皆出小説而不見于經傳君子猶以為附會之談又况如今之方士之流曾不少殊於市井囂頑而欲望之以揮斥雷電呼吸風雨之事豈不難哉僕謂執事且宜出齋於廳事罷不急之務開省過之門洗簡冤滯禁抑奢繁淬誠滌慮痛自悔責以為八邑之民請於山川社稷而彼方士之祈請者聼民間從便得自為之但弗之禁而不專倚以為重輕夫以執事平日之所操存苟誠無愧於神眀而又臨事省惕躬帥僚屬致懇乞誠雖天道亢旱亦自有數使人事良修旬日之內自宜有應㒒雖不肖無以自别于凡民以誠使可有致雨之術亦安忍坐視民患而恬不知顧乃勞執事之㒒㒒豈無人之心者耶一二日內㒒亦將禱于南鎮以助執事之誠執事其但為民悉心以請毋惑于邪説毋急于近名天道雖逺至誠而不動者未之有也答毛憲副戊辰昨承遣人喻以禍福利害且今勉赴太府請謝此非道誼深情決不至此感激之至言無所容但差人至龍埸陵侮此自差人挾勢擅威非太府使之也龍埸諸夷與之爭鬪此自諸夷憤愠不平亦非某使之也然則太府固未嘗辱某某亦未嘗傲太府何所得罪而遽請謝乎跪拜之禮亦小官常分不足以為辱然亦不當無故而行之不當行而行與當行而不行其為取辱一也廢逐小臣所守以待死者忠信禮義而已又棄此而不守禍莫大焉凡禍福利害之説某亦嘗講之君子以忠信為利禮義為福苟忠信禮義之不存雖祿之萬鍾爵以侯王之貴君子猶謂之禍與害如其忠信禮義之所在雖剖心碎首君子利而行之自以為福也况于流離竄逐之微乎某之居此蓋瘴癘蠱毒之與處魑魅魍魎之與逰日有三死焉然而居之泰然未嘗以動其中者誠知生死之有命不以一朝之患而忘其終身之憂也太府苟𣣔加害而在我誠有以取之則不可謂無憾使吾無有以取之而橫罹焉則亦瘴癘而已爾蠱毒而巳爾魑魅魍魎而已爾吾豈以是而動吾心哉執事之諭雖有所不敢承然因是而益知所以自勵不敢茍有所隳墮則某也受教多矣敢不頓首以謝與安宣慰戊辰某得罪朝廷而來惟竄伏隂崖幽谷之中以禦魍魎則其所宜故雖夙聞使君之髙誼經旬月而不敢見若甚簡伉者然省愆內訟痛自削責不敢比數于冠裳則亦逐臣之禮也使君不以為過使廩人餽粟庖人餽肉園人代薪水之勞亦寧不貴使君之義而諒其為情乎自惟罪人何可以辱守土之大夫懼不敢當輒以禮辭使君復不以為罪昨者又重之以金帛副之以鞍馬禮益隆情益至某益用震悚是重使君之辱而甚逐臣之罪也愈有所不敢當矣使者堅不可郤求其説而不得無已其周之乎周之亦可受也敬受米二石𬗋炭雞鵝悉受如來數其諸金帛鞍馬使君所以交于卿士大夫者施之逐臣殊駭觀聽敢固以辭伏惟使君處人以禮恕物以情不至再辱則可矣二戊辰減驛事非罪人所敢與聞承使君厚愛因使者至間問及之不謂其遂逹諸左右也悚息悚息然已承見詢則又不可默凡朝廷制度定自祖宗後世守之不可以擅改在朝廷且謂之變亂况諸侯乎縱朝廷不見罪有司者將執法以繩之使君必且無益縱幸免于一時或五六年或八九年雖逺至二三十年矣當事者猶得持典章而議其後若是則使君何利焉使君之先自漢唐以來千幾百年土地人民未之或改所以長久若此者以能世守天子禮法竭忠盡力不敢分寸有所違是故天子亦不得喻禮法無故而加諸忠良之臣不然使君之土地人民富且盛矣朝廷悉取而郡縣之其誰以為不可夫驛可減也亦可增也驛可改也宣慰司亦可革也由此言之殆甚有害使君其未之思耶所云奏功升職事意亦如此夫剗除冦盜以撫綏平良亦守土之常職今縷舉以要賞則朝廷平日之恩寵祿位顧將欲以何為使君為參政亦已非設官之舊今又干進不巳是無抵極也衆必不堪夫宣慰守土之官故得以世有其土地人民若參政則流官矣東西南北惟天子所使朝廷下方尺之檄委使君以一職或閩或蜀其敢弗行乎則方命之誅不旋踵而至捧檄從事千百年之土地人民非復使君有矣由此言之雖今日之參政使君將恐辭去之不速其又可再乎凡此以利害言揆之于義反之于心使君必自有不安者夫拂心違義而行衆所不與鬼神所不嘉也承問及不敢不以正對幸亮察三戊辰阿賈阿札等畔宋氏為地方患傳者謂使君使之此雖或出于妬婦之口然阿賈等自言使君嘗錫之以氈刀遺之以弓弩雖無其心不幸乃有其迹矣始三堂兩司得是説即欲聞之于朝既而以使君平日忠實之故未必有是且信且疑姑令使君討賊茍遂出軍勦撲則傳聞皆妄何可以濫及忠良其或坐觀逗遛徐議可否亦未為晚故且隱忍其議所以待使君者甚厚既而文移三至使君始出衆論紛紛疑者將信喧騰之際適會左右來獻阿麻之首偏師出解洪邊之圍群公又復徐徐今又三月餘矣使君稱疾歸卧諸軍以次潛回其間分屯寨堡者不聞擒斬以宣國威惟增剽掠以重民怨衆情愈益不平而使君之民罔所知識方揚言于人謂宋氏之難當使宋氏自平安氏何與而反為之役我安氏連地千里擁衆四十八萬深坑絶坉飛鳥不能越猿猱不能攀縱遂髙坐不為宋氏出一卒人亦卒如我何斯言已稍稍傳播不知三堂兩司已嘗聞之否使君誠久卧不出安氏之禍必自斯言始矣使君與宋氏同守土而使君為之長地方變亂皆守土者之罪使君能獨委之宋氏乎夫連地千里孰與中土之一大郡擁衆四十八萬孰與中土之一都司深坑絶坉安氏有之然如安氏者環四面而居以百數也今播州有揚愛愷黎有楊友酉陽保靖有彭世麒等諸人斯言茍聞于朝朝廷下片𥿄于楊愛諸人使各自為戰共分安氏之所有蓋朝令而夕無安氏矣深坑絶坉何所用其險使君可無寒心乎且安氏之職四十八支更迭而為今使君獨傳者三世而群攴莫敢爭以朝廷之命也苟有可乘之釁孰不𣣔起而代之乎然則揚此言于外以速安氏之禍者殆漁人之計蕭墻之憂未可測也使君宜速出軍平定反側破衆讒之口息多端之議弭方興之變絶難測之禍輔既往之愆要將來之福某非為人作説客者使君幸熟思之答人問神仙戊辰詢及神仙有無兼請其事三至而不答非不𣣔答也無可答耳昨令弟來必𣣔得之僕誠生八歲而即好其説今已餘三十年矣齒漸搖動髮巳有一二莖變化成白目光僅盈尺聲聞函丈之外又常經月卧病不出藥量驟進此殆其效也而相知者猶妄謂之能得其道足下又妄聽之而以見詢不得已姑為足下妄言之古有至人淳德凝道和于隂陽調于四時去世離俗積精全神逰行天地之間視聽八逺之外若廣成子之千五百歲而不衰李伯陽歷商周之代西度函谷亦嘗有之若是而謂之曰無疑于欺子矣然則呼吸動靜與道為體精骨完久稟于受氣之始此殆天之所成非人力可強也若後世拔宅飛升點化投奪之類譎怪竒駭是乃祕術曲技尹文子所謂幻釋氏謂之外道者也若是而謂之曰有亦疑于欺子矣夫有無之間非言語可况存久而明養深而自得之未至而強喻信亦未必能及也蓋吾儒亦自有神仙之道顔子三十二而卒至今未亡也足下能信之乎後世上陽子之流蓋方外技術之士未可以為道若逹磨慧能之徒則庶幾近之矣然而未易言也足下𣣔聞其説須退處山林三十年全耳目一心志胸中灑灑不挂一塵而後可以言此今去仙道尚逺也妄言不罪答徐成之壬午承以朱陸同異見詢學術不明于世久矣此正吾儕今日之所宜明辨者細觀來教則輿庵之主象山既失而吾兄之主晦庵亦未為得也是朱非陸天下之論定久矣久則難變也雖微吾兄之爭輿庵亦豈能遽行其説乎故僕以為二兄今日之論正不必求勝務求象山之所以非晦庵之所以是窮本極源真有以見其幾微得失于毫忽之間若明者之聽訟其事之曲者既有以辨其情之不得已而辭之直者復有以察其處之或未當使受罪者得以伸其情而獲伸者亦有所不得辭其責則有以盡夫事理之公即夫人心之安而可以俟聖人于百世矣今二兄之論乃若出于求勝者求勝則是動于氣也動于氣則于義理之正何啻千里而又何是非之論乎凡論古人得失決不可以意度而懸斷之今輿庵之論象山曰雖其專以尊德性為主未免墮于禪學之虛空而其持守端實終不失為聖人之徒若晦庵之一于道問學則支離決裂非復聖門誠意正心之學矣吾兄之論晦庵曰雖其專以道問學為主未免失于俗學之支離而其循序漸進終不背于大學之訓若象山之一于尊德性則虛無寂滅非復大學格物致知之學矣夫既曰尊德性則不可謂墮于禪學之虛空墮于禪學之虛空則不可謂之尊德性矣既曰道問學則不可謂失于俗學之支離失于俗學之支離則不可謂道問學矣二者之辨間不容髮然則二兄之論皆未免于意度也昔者子思之論學蓋不下千百言而括之以尊德性而道問學之一語即如二兄之辨一以尊德性為主一以道問學為事則是二者固皆未免于一偏而是非之論尚未有所定也烏得各持一是而遽以相非為乎故僕碩二兄置心于公平正大之地無務求勝夫論學而務以求勝豈所謂尊德性乎豈所謂道問學乎以其所見非獨吾兄之非象山輿庵之非晦庵皆失之非而吾兄之是晦庵輿庵之是象山亦皆未得其所以是也稍暇當面悉姑務養心息辨毋遽二壬午昨所奉答適有逺客酬對紛紜不暇細論姑碩二兄息未定之爭各反究其所是者必已所是已無絲髮之憾而後可以及人之非早來承教乃為僕漫為含胡兩解之説而細繹辭旨若有以隂助輿庵而為之地者讀之不覺失笑曾謂吾兄而亦有是言耶僕嘗以為君子論事當先去其有我之私一動于有我則此心已陷于邪僻雖所論盡合于理既已亡其本矣嘗以是言于朋友之間今吾兄乃云爾敢不自反其殆陷于邪僻而弗覺也求之反復而昨者所論實未嘗有是則斯言也無乃吾兄之過歟雖然無是心而言之未盡于理未得為無過也僕敢自謂其言之已盡于理乎請舉二兄之所是者以求正輿庵是象山而謂其專以尊德性為主今觀象山文集所載未嘗不教其徒讀書窮理而自謂理會文字頗與人異者則其意實欲體之于身其亟所稱述以誨人者曰居處恭執事敬與人忠曰克已復禮曰萬物皆備于我反身而誠樂莫大焉曰學問之道無他求其放心而已曰先立乎其大者而小者不能奪是數言者孔子孟軻之言也烏在其為空虛者乎獨其易簡覺悟之説頗為當時所疑然易簡之説出于繫辭覺悟之説雖有同于釋氏然釋氏之説亦自有同于吾儒而不害其為異者惟在于幾微毫忽之間而已亦何必諱于其同而遂不敢以言狃于其異而遂不以察之乎是輿庵之是象山固猶未盡其所以是也吾兄是晦庵而謂其專以道問學為事然晦庵之言曰居敬窮理曰非存心無以致知曰君子之心常存敬畏雖不見聞亦不敢忽所以存天理之本然而不使離于須臾之頃也是其為言雖未盡瑩亦何嘗不以尊德性為事而又烏在其為支離者乎獨其平日汲汲于訓解雖韓文楚辭隂符參同之屬亦必與之注釋考辨而論者遂疑其玩物又其心慮恐學者之躐等而或失之于妄作使必先之以格致而無不明然後有以實之于誠正而無所謬世之學者挂一漏萬求之愈繁而失之愈逺至有敝力終身苦其難而卒無所入而遂議其支離不知此乃後世學者之弊而當時晦庵之自為則亦豈至是乎是吾兄之是晦庵固猶未盡其所以是也夫二兄之所信而是者既未盡其所以是則其所疑而非者亦豈必盡其所以非乎然而二兄往復之辨不能一反焉此僕之所以疑其或出于求勝也一有求勝之心則已亡其學問之本而又何以論學為哉此僕之所以惟碩二兄之自反也安有所謂含胡兩解而隂為輿庵之地者哉夫君子之論學要在得之于心衆皆以為是苟求之心而未會焉未敢以為是也衆皆以為非苟求之心而有契焉未敢以為非也心也者吾所得于天之理也無間于天人無分于古今苟盡吾心以求焉則不中不逺矣學也者求以盡吾心也是故尊德性而道問學尊者尊此者也道者道此者也不得于心而惟外信于人以為學烏在其為學也已僕嘗以為晦庵之與象山雖其所為學者若有不同而要皆不失為聖人之徒今晦庵之學天下之人童而習之既已入人之深有不容于論辨者而獨惟象山之學則以其嘗與晦庵之有言而遂藩籬之使若由賜之殊科焉則可矣而遂擯放廢斥若碔砆之與美玉則豈不過甚矣乎夫晦庵折衷群儒之説以發明六經語孟之旨于天下其嘉惠後學之心真有不可得而議者而象山辨義利之分立大本求放心以示後學篤實為巳之道其功亦寧可得而盡誣之而世之儒者附和雷同不究其實而概目之以禪學則誠可冤也已故僕嘗欲冒天下之譏以為象山一暴其説雖以此得罪無恨僕于晦庵亦有罔極之恩豈𣣔操戈而入室者顧晦庵之學既已若日星之章明于天下而象山獨蒙無實之誣于今且四百年莫有為之一洗者使晦庵有知將亦不能一日而安享于廟廡之間矣此僕之至情終亦必為吾兄一吐者亦何肯漫為兩解之説以隂助于輿庵輿庵之説僕猶恨其有未盡也夫學術者今古聖賢之學術天下之所公共非吾三人者所私有也天下之學術當為天下公言之而豈獨為輿庵地哉兄又舉太極之辨以為象山于文義且有所未能通曉而其強辨自信曾何有于所養夫謂其文義之有未詳不害其為有未詳也謂其所養之未至不害其為未至也學未至于聖人寧免太過不及之差乎而論者遂欲以是而蓋之則吾恐晦庵禪學之譏亦未免有激于不平也夫一則不審于文義一則有激于不平是皆所養之未至昔孔子大聖也而猶曰假我數年以學易可以無大過仲虺之贊成湯亦惟曰改過不吝而已所養之未至亦何傷于二先生之為賢乎此正晦庵象山之氣象所以未及于顔子明道者在此吾儕正當仰其所以不可及而默識其所未至者以為涵養規切之方不當置偏私于其間而有所附會增損之也夫君子之過也如日月之食人皆見之更也人皆仰之而小人之過也必文世之學者以晦庵大儒不宜復有所謂過者而必曲為隱飾增加務詆象山于禪學以求伸其説且自以為有助于晦庵而更相倡引謂之扶持正論不知晦庵乃君子之過而吾反以小人之見而文之晦庵有聞過則喜之美而吾乃非徒順之又從而為之辭也晦庵之心以聖賢君子之學期後代而世之儒者事之以事小人之禮是何誣象山之厚而待晦庵之薄邪僕今者之論非獨為象山惜實為晦庵惜也兄視僕平日于晦庵何如哉而乃有是論是亦可以諒其為心矣惟吾兄去世俗之見宏虛受之咸勿求其必同而察其所以異勿以無過為聖賢之髙而以改過為聖賢之學勿以其有所未至者為聖賢之諱而以其常懷不滿者為聖賢之心則兄與輿庵之論將有不待辨説而釋然以自解者孟子云君子亦仁而已何必同惟吾兄審擇而正之答儲柴墟壬申盛價來適人事紛紜不及細詢比來事既還却殊怏怏承示劉生墓志此實友義所關文亦縝密獨敘乃父側室事頗傷忠厚未刻石刪去之為佳子于父過諌而過激不可以為幾稱子之美而發其父之隂私不可以為訓宜更詳之喻及交際之難此殆謬于私意君子與人惟義所在厚薄輕重已無所私焉此所以為簡易之道世人之心雜于計較毀譽得喪交于中而眩其當然之則是以處之愈周計之愈悉而行之愈難夫大賢吾師次賢吾友此天理自然之則豈以是為炎涼之嫌哉吾兄以僕于今之公卿若某之賢者則稱謂以友生若某與某之賢不及于某者則稱謂以侍生豈以矯時俗炎涼之弊非也夫彼可以為吾友而吾可以友之彼又吾友也吾安得而弗友之彼不可以為吾友而吾不可以友之彼又不吾友也吾安得而友之夫友也者以道也以德也天下莫大于道莫貴于德道德之所在齒與位不得而干焉僕于某之謂矣彼其無道與德而徒有其貴與齒也則亦貴齒之而已然若此者與之見亦寡矣非以事相臨不往見也若此者與凡交遊之隨俗以侍生而來者亦隨俗而侍生之所謂事之無害于義者從俗可也千乘之君求與之友而不可得非在我有所不屑乎嗟乎友未易言也今之所謂友或以藝同或以事合徇名逐勢非吾所謂輔仁之友矣仁者心之德人而不仁不可以為人輔仁求以全心德也如是而後友今特以技藝文辭之工地勢聲翼之重而鷔然𣣔以友乎賢者賢者弗與也吾兄技藝炎涼之説貴賤少長之論殆皆有未盡歟孟子曰友也者不可以有挾孟獻子之友五人無獻子之家者也曽以貴賤乎仲由少顔路三歲回由之贈處蓋友也回與曾點同時參曰昔者吾友曾以少長乎將矯時俗之炎涼而自畔于禮其間不能以寸矣吾兄又以僕于後進之來其質美而才者多以先後輩相處其庸下者反待以客禮疑僕别有一道是道也奚有于别凡後進之來其才者皆有意于斯道者也吾安得不以斯道處之其庸下者不過世俗泛然一接吾亦世俗泛然待之如鄉人而巳昔伊川𥘉與吕希哲為同舍友待之友也既而希哲師事伊川待之弟子也謂敬于同舍而慢于弟子可乎孔子待陽貨以大夫待回賜以弟子謂待回賜不若陽貨可乎師友道廢久後進之中有聰明特逹者頗知求道往往又為先輩待之不誠不諒其心而務假以虛禮以取恱于後進干待士之譽此正所謂病于夏畦者也以是師友之道日益淪沒無由復明僕常以為世有周程諸君子則吾固得而執弟子之役乃大幸矣其次有周程之髙弟焉吾猶得而私淑也不幸世又無是人有志之士倀倀其將焉求乎然則何能無憂也憂之而不以責之已責之已而不以求輔于人求輔于人而待之不以誠終亦必無所成而已耳凡僕于今之後進非敢以師道自處也將求其聰明特逹者與之講明因以自輔也彼自以後進求正于我雖不師事我固有先後輩之道焉伊川瞑目而坐遊楊侍立不敢去重道也今世習于曠肆憚于檢飾不復知有此事幸而有一二後進略知求道為事是有復明之機又不誠心直道與之發明而徒閹然媚世苟且阿俗僕誠痛之惜之傳曰師嚴然後道尊道尊然後民知敬學夫人必有所嚴憚然後言之而聼之也審施之而承之也肅凡若此者皆求以明道皆循理而行非有容私于其間也伊尹曰天之生斯民也使先知覺後知使先覺覺後覺豫天民之先覺也非豫覺之而誰也是故大知覺于小知小知覺于無知大覺覺于小覺小覺覺于無覺夫已大知大覺矣而後以覺于天下不亦善乎然而未能也遂自以小知小覺而不敢以覺于人則終亦莫之覺矣仁者固如是乎夫仁者已𣣔立而立人已𣣔逹而逹人僕之意以為已有分寸之知即𣣔同此分寸之知于人已有分寸之覺即𣣔同此分寸之覺于人人之小知小覺者益衆則其相與為知覺也益易以明如是而後大知大覺可期也僕于今之後進尚不敢以小知小覺自處譬之凍餒之人知耕桑之可以足衣食而又偶聞藝禾樹桑之法將試為之而遂以告其凡凍餒者使之共為之也亦何嫌于已之未嘗樹藝而遂不以告之乎雖然君子有諸已而後求諸人僕蓋未嘗有諸已也而可以求諸人乎夫亦謂其有意于僕而來者耳承相問輒縷縷至此有未當者不惜往復二壬申昨者草率奉報意在求正不覺蕪冗承長箋批答推許過盛殊增悚汗也來喻責㒒不以師道自處恐亦未為誠心直道顧僕何人而敢以師道自處哉前書所謂以前後輩處之者亦謂僕有一日之長而彼又有求道之心者耳若其年齒相若而無意于求道者自當如常待以客禮安得例以前後輩處之是亦妄人矣又况不揆其來意之如何而抗顔以師道自居世寧有是理邪夫師法者非可以自處得也彼以是求我而我以是應之耳嗟乎今之時孰有所謂師云乎哉今之習技藝者則有師習舉業求聲利者則有師彼誠知技藝之可以得衣食舉業之可以得聲利而希美官爵也自非誠知已之性分有急于衣食官爵者孰肯從而求師哉夫技藝之不習不過乏衣食舉業之不習不過無官爵巳之性分有所蔽悖是不得為人矣人顧明彼而暗此也可不大哀乎往時僕與王寅之劉景素同逰太學每季考寅之恆居景素前列然寅之自以為講貫不及景素一旦執弟子禮師之僕每嘆服以為如寅之者真可為豪傑之士使寅之易此心以求道亦何聖賢之不可及然而寅之能于彼不能于此也曾子病革而易簀子路臨絶而結纓橫渠撤虎皮而使其子弟從講于二程惟天下之大勇無我者能之今天下波頽風靡為日已久何異于病革臨絶之時然又人是巳見莫肯相下求正故居今之世非有豪傑獨立之士的見性分之不容已毅然以聖賢之道自任者莫之從而求師也吾兄又疑後進之來其資稟意向雖不足以承教若其齒之相逺者恐亦不當概以客禮相待僕前書所及蓋與有意于斯道者相屬而言亦謂其可以客可以無客者耳若其齒數邈絶則名分具存有不待言矣孔子使闕黨童子將命曰吾見其居于位也見其與先生並行也非求益者也𣣔速成者也亦未嘗無誨焉雖然此皆以不若己者言也若其德器之夙成識見之超詣者雖生于吾後數十年其大者吾師次者吾友也得以齒序論之哉人歸遽劇極潦草便間批復可否不一一答何子元壬申來書云禮曽子問諸侯見天子入門不得終禮廢者幾孔子曰四又問諸侯相見揖入門不得終禮廢者幾孔子曰六而日食存焉曽子曰當祭而日食太廟火其祭也如之何孔子曰接祭而巳矣如牲至未殺則廢孟春于此有疑焉天子崩太廟火后夫人之喪雨霑服失容此事之不可期或適相值若日食則可預推也諸侯行禮獨不容以少避乎祭又何必專于是日而匆匆于接祭哉牲未殺則祭廢當殺牲之時而不知日食之候者何也執事幸以見教千萬千萬承喻曽子問日食接祭之説前此蓋未嘗有疑及此者足見為學精察深用嘆服如某淺昧何足以辨此古者天子有日官諸侯有日御日官居卿以底日日御不失日以授百官之朝豈有當祭之日而尚未知有日食者夫子答曾子之問竊意春秋之時日官多失其職固有日食而弗之知者矣堯命羲和敬授人時何重也仲康之時去堯未逺羲和已失其職迷于天象至日食罔聞知故有㣧之征降及商周其職益輕平王東遷政教號令不及于天下自是而後官之失職又可知矣春秋所書日食三十有六今以左傳考之其以鼓用牲幣于社及其他變常失禮書者三之一其以官失其職書者四之二凡日食而不書朔日者杜預皆以為官失之故其必有考也經恆公十七年冬十月朔日有食之傳曰不書日官失之也僖公十五年夏五月日有食之傳曰不書朔與日官失之也則傳固已言之矣襄公之二十七年冬十二月乙卯朔日有食之而傳曰辰在申司曆過也再失閏矣夫推候之繆至于再失閏則日食之不知殆其細者矣古之祭者七日戒三日齋致其誠敬以交于神明謂之當祭而日食則固已行禮矣如是而中輟之不可也接者疾速之義其儀節固已簡略接祭則可兩全而無害矣况此以天子嘗禘郊社而言是乃國之大祀若其他小祭則或自有可廢者在權其輕重而處之若祭于太廟而太廟火則亦似有不得不廢者然此皆無明文竊意其然不識髙明且以為何如也上晉溪司馬戊寅郴衡諸處群孽漏殄尚多蓋緣進勦之時彼省土兵不甚用命而廣兵防夾又復稍遲是以致此其在目今若無凶荒之災兵革之釁料亦未敢動作但恐一二年後則有所不能保耳今大征甫息勢既未可輕舉而地方新邅土兵之擾復不堪重困將紓目前之患不過添立屯堡若𣣔稍為經久之圗亦不過建立縣治然此二端彼省鎮巡已嘗會奏舉行生雖復往豈能别有區畫但度其事勢屯堡之設雖可以張布聲威然使守瞭日久未免怠弛散歸無事則虛具名數冒費糧餉有急則張皇賊勢復須調兵此其勢之所必至者惟建縣一事頗為得䇿又聞所設縣分乃瓜分兩省三縣之地彼此各吝土地人民豈肯安然割巳所有以資異省别郡必有紛爭異同之論未能歸一則立縣之舉勢亦未易克就既承責委亦巳遣人再往詢訪苟有利弊稍可禆益者當復舉請但因閩事孔棘遙聞廟堂之議亦𣣔繆以見責故且未敢輒往郴桂然敕書又未見到則閩中亦不敢遽往旦夕咨訪其事頗悉顛末大槩閩中之變亦由積漸所致其始作于延平繼發于邵武又繼發于建寧發于汀漳發于沿海諸衛所其間驚閧雖小大不一然亦皆因倡于前者略無懲創遂敢效尤而興今省城渠魁雖已授首人心尚爾驚惶未定邵武諸處尤不可測急之必致變縱而不問將來之禍尤有不可勝言者蓋福建之軍縱恣驕驁已非一日既無漕運之勞又無征戍之役飽食安坐徭賦不及居則朘民之膏血以供其糧有事返藉民之子弟而為之鬪有司豢養若驕子百姓疾畏如虎狼稍不如意呼呶群聚而起焚掠居民綁笞官吏氣𦦨所加帖然惟其所𣣔而後已今其勢既盈如將潰之隄岌乎洶洶匪朝伊夕雖有智者難善其後固非迂劣如守仁者所能辦此也又况積弱之軀百病侵剝近日復聞祖母病危日夜痛苦方寸巳亂豈復堪任臨期敗事罪戮益重輒敢先以情訴伏望曲加矜憫改授能者使生得全首領歸延殘息于田野非生一人之幸實一省數百萬生靈之幸也情蹙辭隘忘其突冒死罪死罪二巳卯齎奏人回每辱頒教接引開慰勤惓懇惻不一而足仁人君子愛物之誠與人之厚雖在木石亦當感動激發而况于人乎無能報謝銘諸心腑而已生始懇疏乞歸誠以祖母掬育之恩思一面為訣後竟牽滯兵戈不及一見卒抱終天之痛今老父衰疾又復日亟而地方已幸無事且蒙朝廷曾有賊平來説之旨若再拘縛使不獲一申其情後雖萬死無以贖其痛恨矣老先生亦何惜一舉手投足之勞而不以曲全之乎今生已移疾舟次若復候命不至斷亦逃歸死無所憾老先生亦何惜一舉手投足之勞而必𣣔置之有罪之地乎情隘辭迫瀆冒威嚴臨𥿄涕泣不知所云死罪死罪上彭幸庵壬午不孝延禍先子自惟罪逆深重久擯絶于大賢君子之門矣然猶強息忍死未即殞滅又復有所控籲者痛惟先子平生孝友剛直言行一出其心之誠然而無所飾于其外與人不為邊幅而至于當大義臨大節則毅然奮卓而不可回奪忝從大夫之後逮事先朝亦既荐𬒳知遇中遭逆瑾之變退伏田野忠貞之志抑而不申近幸中興之會聖君賢相方與振廢起舊以彂舒幽枉而先子則長已矣德藴壅閼而未宣終將泯溷于俗豈不痛哉伏惟執事才德勳烈動一世忠貞之節剛大之氣屹然獨峙百撼不搖真足以廉頑而立懦天子求舊圗新復起以相海內仰望其風采凡天下之韜伏堙滯窒而求通絀而求直者莫不延頸跂足望下風而奔訴况先子素辱知與不肖孤亦嘗受教于門下近者又蒙為之刷垢雪穢繆承推引之恩蓋不一而足者反自踈外不一以其情為請是委先子于溝壑而重棄于大賢君子也不孝之罪不滋為甚歟先子之沒有司以贈諡乞非執事之憫之也而為之一表白焉其敢覬覦于萬一乎荒迷懇迫不自知其僣罔瀆冒死罪死罪寄楊邃庵閣老壬午孤聞之昔古之君子之葬其親也必求名世大賢君子之言以圗其不朽然而大賢君子之生不數數于世固有世有其人而不獲同其時者矣又有同其時而限于勢分無由自通于門墻之下者矣則夫圖不朽于斯人者不亦難乎痛惟先君宅心制行庶亦無愧于古人雖已忝在公卿之後而邅時未久志未大行道未大明取嫉權姦斂德而歸今則復長已矣不孝孤將以是歲之冬舉葬事圖所以為不朽者惟墓石之志為重伏惟明公道德文章師表一世言論政烈儀刑百辟求之昔人蓋歐陽文忠范文正韓魏公其人也所謂名世之大賢君子非明公其誰歟不幸而生不同時也則亦已矣幸而猶及在後進之末雖明公固所不屑揮之門墻之外猶將冒昧強顔而入焉况先君素辱知與不肖孤又嘗在屬吏之末受教受恩懷知已之感有道誼骨肉之愛邇者又嘗辱使臨吊寵之以文詞惻然憫念其遺孤而不忍遽棄遺之者是以忘其不孝之罪犯僣踰之戮而輒敢以志為請伏惟明公休休容物篤厚舊故甄陶一世之士而各𣣔成其名收録小大之才而惟恐沒其善則如先君之素受知愛者其忍靳一言之惠而使之泯然無聞于世耶不腆先人之幣敢以陸司業之狀先于將命者惟明公特垂哀矜生死受賜世世子孫捐軀殞命未足以為報也不勝惶悚顛越之至荒迷無次二癸未前日嘗奉啓計已上逹自明公進秉機密天下士夫欣欣然動顔相慶皆為太平可立致矣門下鄙生獨切生憂以為猶甚難也亨屯傾否當今之時舍明公無可以望者則明公雖𣣔逃避乎此將亦有所不能然而萬斛之舵操之非一手則緩急折旋豈能盡如己意臨事不得專操舟之權而僨事乃與同覆舟之罪此鄙生之所謂難也夫不專其權而漫同其罪則莫若預逃其任然在明公亦既不能逃矣逃之不能專又不得則莫若求避其罪然在明公亦終不得避矣天下之事果遂卒無所為歟夫惟身任天下之禍然後能操天下之權操天下之權然後能濟天下之患當其權之未得也其致之甚難而其歸之也則操之甚易萬斛之舵平時從而爭操之者以利存焉一旦風濤顛沛變起不測衆方皇惑震喪救死不遑而誰復與爭操乎于是起而專之衆將恃以無恐而事因以濟苟亦從而委靡焉固淪胥以溺矣故曰其歸之也則操之甚易者此也古之君子洞物情之向背而握其機察隂陽之消長以乘其運是以動必有成而吉無不利伊旦之于商周是矣其在漢唐蓋亦庶幾乎此者雖其學術有所不逮然亦足以定國本而安社稷則亦斷非後世偷生茍免者之所能也夫權者天下之大利大害也小人竊之以成其惡君子用之以濟其善固君子之不可一日去小人之不可一日有者也𣣔濟天下之難而不操之以權是猶倒持太阿而授人以柄希不割矣故君子之致權也有道本之至誠以立其德植之善類以多其輔示之以無不容之量以安其情擴之以無所競之心以平其氣昭之以不可奪之節以端其向神之以不可測之機以攝其姦形之以必可賴之智以收其望坦然為之下以上之退然為之後以先之是以功蓋天下而莫之嫉善利萬物而莫與爭此皆明公之能事素所蓄而有者惟在倉卒之際身任天下之禍決起而操之耳夫身任天下之禍豈君子之得已哉既當其任知天下之禍將終不能免也則身任之而巳身任之而後可以免于天下之禍小人不知禍之不可以幸免而百詭以求脫遂致釀成大禍而巳亦卒不能免故任禍者惟忠誠憂國之君子能之而小人不能也某受知門下不能效一得之愚以為報獻其芹曝伏惟鑒其忱悃而憫其所不逮幸甚三丁亥某素辱愛下然久不敢奉狀者非敢自外于門墻實以地位懸絶不𣣔以寒暄無益之談塵瀆左右蓋避嫌之事賢者不為然自嘆其非賢也非才多病待罪間散猶懼不堪乃今復蒙顯擢此固明公不遺下體之盛某亦寧不知感激但量能度分自計巳審貪冒茍得異時僨事將為明公知人之纍此所以聞命驚惶而不敢當耳謹具奏辭免祈以原職致仕伏惟明公因材而篤于所不能特賜曲成俾得歸延病喘于林下則未死餘年皆明公之賜其為感激寧有窮巳乎懇切至情不覺瀆冒伏冀宥恕不具四丁亥竊惟大臣報國之忠莫大于進賢去讒故前者兩奉起居皆嘗僣及此意亦其自信山林之志巳堅而又素受知巳之愛不當復避嫌疑故率意言之若此乃者忽蒙兩廣之命則是前日之言適以為已地也悚懼何以自容乎某以迂踈之才口耳講説之學耳簿書案牘巳非其能而况軍旅之重乎往歲江西之役實亦僥幸偶成近年以來憂病積集尫羸日甚惟養疴丘園為鄉里子弟考訂句讀使知向方庶于保身及物亦稍得效其心力不致為天地間一蠧此其自處亦既審矣聖天子方勵精求治而又有老先生主張國是于上茍有襪線之長者不于此時出而自效則亦無其所矣老先生往歲方秉銓軸時有以邊警薦用彭司馬者老先生不可曰彭始成功今或少挫非所以完之矣老先生之愛惜人才而欲成就之也如此至今相傳以為美談今獨不能以此意而推之某乎懇辭疏上望賜曲成使得苟延喘息俟病痊之後老先生不忍終廢必𣣔強使一出則如留都之散部或南北太常國子之任量其力之可能者使之自效則圗報當有日也不勝恃愛懇瀆幸賜矜察寄席元山癸未某不孝延禍先子罪逆之深自分無復比數于人仁人君子尚未之知憫念其舊逺使存録重以多儀號慟拜辱豈勝哀感豈勝哀感伏惟執事長才偉志上追古人進德勇義罕與儔匹向見鳴冤録及承所寄道山書院記蓋信道之篤任道之徑海內同志莫敢有望下風者矣何幸何幸不肖方在苦毒中意所欲請者千萬荒迷割裂莫得其端緒使還遽臨疏昏塞不盡所云答王亹庵中丞甲申往歲旌節臨越猥蒙枉顧其時憂病懵懵不及少申欵曲自後林居懶僻成性平生故舊不敢通音問企慕之懷雖日以積竟未能一奉起居其為傾渴如何可言使來逺辱問惠登拜感怍舍親宋孔瞻亦以書來備道執事勤勤下問之盛不肖奚以得此近世士夫之相與類多虛文彌誑而實意衰薄外和中妬徇私敗公是以風俗日惡而世道愈降執事忠信髙明克勤小物長才偉識翹然海內之望而自視欿然逺念不遺若古之君子有而若無以能問于不能者也僕誠喜聞而樂道自顧何德以承之僕巳無所可用于世顧其心痛聖學之不明是以人心陷溺至此思守先聖之遺訓與海內之同志者講求切劘之庶亦少資于後學不徒生于聖明之朝然蔽惑既久人是其非其能虛心以相聽者鮮矣若執事之德盛禮恭而與人為善此誠僕所碩效其愚者然又邑里隔絶無因握手一敘其為傾渴又如何可言耶雖然目擊而道存僕見執事之書既已知執事之心雖在千萬里外當有不言而信者謹以新刻小書二册奉求教正蓋鄙心之所𣣔效者亦略具于其中矣便間幸示與陸清伯甲申惟乾之事將申而遂沒痛哉冤乎不如是無以明區區罪惡之重至于貽纍朋友不如是無以彰諸君之篤于友道痛哉冤乎不有諸君在則其身沒之後將莫知所在矣况有為之衣衾棺殮者乎是則猶可以見惟乾平日為善之報于大不幸之中而尚有可幸者存也嗚呼痛哉即𣣔為之一洗自度事勢未能遽脫或必須進京候到京日再與諸君商議而行之苟遂歸休終須一舉庶可少泄此痛耳其歸喪一事托王邦相為之經理倘有不便須僕到京圗之未晚也行李倥偬中未暇悉所𣣔言千萬心照與黃誠甫甲申近得宗賢寄示禮疏明甚誠甫之議當無不同矣古之君子恭敬樽莭退讓以明禮僕之所望于二兄者則在此而不在彼也果若是以為斯道之計進于議禮矣先妻不幸于前月奄逝方在悲悼中適陳子文往草草布間闊二甲申别久極渴一語子莘來備道諸公進修亦殊慰大抵吾人習染已久須得朋友相夾持離群索居即未免隳惰諸公既同在留都當時時講習為佳也三乙酉盛價來領手札知有貴恙且喜漸平復矣賤軀自六月暑病然兩目蒙蒙兩耳蓬蓬幾成廢人僅存微息旬日前元忠宗賢過此留數日北去山廬卧病期少謝人事而應接亦多今復歸卧小閣省愆自訟而已聞有鼓枻之興果爾良慰渴望切磋砥礪之益彼此誠不無也與黃勉之乙酉承𣣔刻王信伯遺言中間極有獨得之見非餘儒所及惜其零落既久後學莫有傳之者因勉之寄此又知程門有此人也幸甚幸甚中間如論明道伊川處似未免尚有執著然就其所到已甚髙明特逺不在遊楊諸公之下矣中間可省略者刪去之為佳凡刻古人文字要在發明此學惟簡明切實之為貴若支辭蔓説徒亂人耳目者不傳可也髙明以為何如復童克剛乙酉春𥘉枉顧時承以八䇿見示鄙意甚不為然既而思之皆學術不明之故姑且與克剛講學未暇細論䇿之是非旬日之後學術漸明克剛知見豁然如白日之開雲霧遂翻然悔其𥘉志即欲焚棄八䇿以為自此以後誓不復萌此等好髙務外之念矣當時同志諸友無不嘆服克剛以為不憚改過而勇于從善若此人人皆自以為莫及也盛價逺來忽辱長箋巨册諄諄懇懇意求刪改前䇿將圗復上與臨别丁寧意大相矛盾豈間闊之久切磋無力遂爾迷誤至此耶易曰君子思不出其位若克剛斯舉乃所謂思出其位矣又曰不易乎世不成乎名遁世無悶憂則違之若克剛斯舉是易乎世而成乎名非遁世無悶憂則違之之謂矣克剛向處山林未嘗知有朝廷事體今日羣司之中縉紳士夫之列其間高明剴切之論經略康濟之謨何所不有如八䇿中所陳蓋已不知幾十百人幾十百上矣寧復有俟于克剛耶克剛此舉雖亦仁人志士之心然夜光之璧無因而投人亦且按劍而怒况此八䇿者特克剛之敝帚耳亦何保嗇之深而必以投人為哉若此䇿遂上亦非獨不見施行且將有指摘非訾之者其為克剛之纍不小小也克剛亦何苦而汲汲于為是哉八䇿之中類皆老生常談惟第五䇿于地方利害頗有相關然亦不過訴狀之詞一有司聽之足矣而克剛乃以為致治垂統之一䇿得無以身家之故遂為利害所蔽而未暇深思之耶明者一覽如見肺肝但克剛不自知耳昔者顔子在陋巷簞瓢孔子賢之夫陋巷簞瓢豈遂至于人不堪憂其間蓋亦必有患害屈抑常情所不能當如克剛今日之所邅際者矣若其時遂以控之于時君世主􅦓􅦓屑屑求白于人豈得復謂之賢乎禹稷昌言于朝過門不入以有大臣之責也今克剛居顔子陋巷之地而乃冒任禹稷之憂是宗祝而代庖人之割希不傷手矣册末授受之説似未端的此則姑留于此俟後日再講至于八䇿斷斷不宜復留遂會同志諸友共付丙丁為克剛焚此魔障克剛自此但宜收斂精神日以忠信進德為務默而成之不言而信不見是而無悶可也與鄭啓範侍御丁亥某愚不自量痛此學之不講而竊有志于發明之自以劣弱思得天下之豪傑相與扶持砥礪庶幾其能有成故每聞海內之高明特逹忠信而剛毅者即欣慕愛樂不啻骨肉之親以是于吾啓範雖未及一面之識而心孚神契已如白首之交者亦數年矣每得封事讀之其間乃有齒及不肖者則又為之赧顔汗背促蹐不安古之君子耻有其名而無其實吾于啓範惟切磋之是望乃不考其實而過情以譽于朝異時茍有不稱將使啓範為失言矣如之何而可不肖志雖切于求學而質本迂狂踈謬招尤速謗自其所宜近者復聞二三君子以不肖之故相與憤爭力辨于鑠金銷骨之地至于衝鋒冒刃而弗顧僕何以當此哉二三君子之心豈不如青天白日誰得而瑕滓之者顧僕自反亦何敢自謂無愧則不肖之軀將不免為輕雲薄霧于二三君子者矣如之何而可病軀懶放日久巳成廢人尚可勉強者惟宜山林之下讀書講學而已兩廣之任斷非所堪已具疏懇辭必不得請恐異日終為知已之憂也言不能謝惟自鞭䇿以期無負相知庶以為報耳答方叔賢丁亥久不奉狀非敢自外實以憂疾頻仍平生故舊類不敢通問在吾兄誠不當以此例視然廣士之來逰者相踵山中啓處時時聞之簡札虛文似有不必然者吾兄當能亮之也聖主聰明不世出諸公既蒙知遇若此安可不一出圗報今日所急惟在培養君德端其志向于此有立政不足間人不足謫是謂一正君而國定然此非有忠君報國之誠其心斷斷休休者亦只好議論粉飾于其外而已矣僕積衰之餘病廢日甚豈復更堪兵甲驅馳之勞况讒搆未息又可復出而冒為之乎懇辭疏下望與扶持得具養疴林下稍俟痊復出而圗報非晚也二丁亥昨見邸報知西樵兀崖皆有舉賢之疏此誠士君子立朝之盛節若干年無此事矣深用嘆服但與名其間却有一二未曉者此恐鄙人淺陋未能知人之故然此乃天下治亂盛衰所繫君子小人進退存亡之機不可以不慎也此事譬之養𧖟但雜一爛𧖟于其中則一筐好𧖟盡為所壞矣凡薦賢于朝與自已用人又自不同自已用人權度在我故雖小人而有才者亦可以器使若以賢才薦之于朝則評品一定便如白黑其間舍短録長之意若非明言誰復知之小人之才豈無可用如砒硫芒硝皆有攻毒破壅之功但混于參苓耆术之間而進之養生之人萬一用之不精鮮有不誤者矣僕非不樂二公有此盛舉正恐異日或為此舉之纍故輒叨叨當不以為罪也思田事貴鄉往來人當能道其詳俗諺所謂生事事生此類是矣今其事體既已壞盡𣣔以無事處之要已不能只求減省一分則地方亦可減省一分勞攘耳鄙見略具奏內深知大拂喜事者之心然欲殺數千無罪之人以其求一已之功仁者之所不忍也齎奏人去凡百望指示之舟次草草未盡鄙懷千萬鑒恕與黃宗賢丁亥僕多病積衰潮熱痰嗽日甚一日皆吾兄所自知豈復能堪戎馬之役者况讒搆未息而往年江西從義將士至今查勘未已往往廢業傾家身死牢獄言之實為痛心又何面目見之今若不量可否冒昧輕出非獨精力決不能支極其事勢正如無舵之舟乘飄風而泛海終將何所止泊乎在諸公亦不得不為多病之人一慮此也懇辭疏下望相扶持終得養疴林下是幸席元山喪已還蜀否前者奠辭想巳轉逹天不愸遺此痛何極數日間唐生自黃巖歸知宅上安好世恭書來備道佳子弟悉知向方可喜間附知之二丁亥得書知别後動定且知世事之難為人情之難測有若此者徒增慨嘆而巳朽才病廢百念俱息忽承重寄豈復能堪若懇辭不獲自此將為知巳之憂矣奈何奈何江西功次固不足道但已八年餘矣尚爾查勘未息致使效忠赴義之士廢産失業身死道途縱使江西之功盡出冒濫獨不可比于留都湖浙之賞乎此事終須一白但今日言之又若有挾而要者奈何奈何木翁旬日間亦且啓行矣此老慎默簡重當出流輩但精力則向衰若如兀崖之論欲使之破長格以用財不顧天下之毀譽榮辱以力主國議則恐勢有所未能盡行耳因論偶及幸自知之東南小蠢特瘡疥之疾群僚百司各懷讒嫉黨比之心此則腹心之禍大為可憂者近見二三士夫之論始知前此諸公之心尚未平貼姑待釁耳一二當事之老亦未見有同寅協恭之誠間聞有口從面諛者退省其私多若讐仇病廢之人愛莫為助竊為諸公危之不知若何而可以善其後此亦不可不早慮也兵部差官還病筆草草附此西樵兀崖皆不及别簡望同致意近聞諸公似有德色傲容者果爾將重失天下善類之心矣相見間可隱言及之三丁亥近得邸報及親友書聞知石龍之于區區乃無所不用其極若此而西樵兀崖諸公愛厚勤拳亦復有加無已深用悚懼嗟乎今求朝廷之上信其有事君之忠憂世之切當事之勇用心之公若諸公者復何人哉若之何而不足悲也諸公既為此一大事出世則其事亦不得不然但于不肖則似猶有溺愛過情者異日恐終不免為諸公知人之纍耳悚懼悚懼思田之事本亦無大緊要只為從前張皇太過後來遂不可輕易收拾所謂天下本無事在人自擾之耳其略巳具奏詞今往一通必得朝廷如奏中所請則地方庶可以圗久安不然反覆未可知也賤軀患咳原自南贛蒸暑中得來今地益南氣類感觸咳發益甚恐竟成痼疾不復可藥地方之事苟幸塞責山林田野則惟其宜矣他尚何説哉西樵兀崖家事極為時輩所擠排殊可駭嘆此亦皆由學術不明近來士夫專以客氣相尚凡所毁譽不惟其是惟其多且勝者是附是和是以至此近日來接見者略巳一講巳覺豁然有省發處自後此等意思亦當漸消除京師近來事體如何君子道長則小人道消疾病既除則元氣亦當自復但欲除疾病而攻治太厲則亦足以耗其元氣藥石之施亦不可不以漸也木翁邃老相與如何能不孤海內之望否亦在諸公相與調和此如行舟若把舵不定而東撑西曵亦何以致逺涉險今日之事正須同舟共濟耳齎本人去凡百望指示四戌子兩廣大勢罷敝巳極非得誠于為國為民強力有為者為之數年未可以責效也思田之患則幸巳平靖其間三五大巢久為廣西諸賊之根株淵藪者亦已用計剿平就今日久困積冤之民言之亦可謂之太平無事矣病軀咳患日增平生極畏炎暑今又深入炎毒之鄉遍身皆發腫毒旦夕動履且有不能若巡撫官再候旬月不至亦只得且為歸休之圗待罪于南贛之間耳聖天子在上賢公卿在朝真所謂明良相遇千載一時鄙人世受國恩從大臣之末固非果于忘世者平生亦不喜為尚節求名之事何忍遽言歸乎自度病勢非還故土就舊醫決將日甚一日難復療治不得不然耳靜庵東羅見山西樵兀崖諸公聞京中方嚴書禁故不敢奉啓諸公既當事且須持之以鎮定久逺今一旦名位俱極固非諸公之得已是乃聖天子崇德任賢更化善治非常之舉諸公當之亦誠無愧但貴不期驕滿不期溢賢者充養有素何俟人言更須警惕朝夕謙虛自居其所以感恩報德者不必務速效求近功要在誠心實意為久逺之圗庶不負聖天子今日之舉而亦不負諸公今日之出矣僕于諸公誠有道義骨肉之愛故不覺及此會間幸轉致之五戊子前齎奏去曾具白區區心事不審已能遂所碩否自入廣來精神頓衰雖因病患侵凌水土不服要亦中年以後之人其勢亦自然至此以是懷歸之念日切誠恐坐廢日月上無益于國家下無以發明此學竟成虛度此生耳奈何奈何春𥘉思田之議悉蒙朝廷裁允遂活數萬生靈近者八寨斷藤之役實以一方塗炭既極不得巳而為救焚之舉乃不意遂獲平靖此非有諸公相與協贊力主于內何由而致是乎書去各致此感謝之私相見時更望一申其懇懇巡撫官久未見推僕非厭外而希內者實𣣔早還鄉里耳恐病勢日深歸之不及一生未了心事石龍其能為我恝然乎身在而後道可弘皮之不存毛將焉附諸公不敢輒以此意奉告至于西樵當亦能諒于是矣曷亦相與曲成之地方處置數事附進自度已不能了此倘遂允行亦所謂盡心焉耳已舟次伏枕草草不盡所懷答見山冡宰丁亥向齎本人去曾奉短札計已逹左右矣朽才病廢寧堪重托懇辭之疏必須朝廷憐準與其他日蒙顚覆之戮孰若今日以是獲罪乎東南小夷何足以動煩朝廷若此致有今日皆由憤激所成以主上聖明德威所𬒳指日自將平定但廟堂之上至今未有同寅協恭之風此則殊為可憂者耳不知諸公竟何以感化而斡旋之大抵讒邪不逺則賢士君子斷不能安其位以有為于時自昔當事諸公亦豈盡不知進賢而去不肖之為美顧其平日本無忠君愛國之誠不免阿時附俗以苟目前之譽卒之恱諛信讒終于蔽賢病國而巳矣來官守催力遣數四始肯還病筆草草未盡傾企與霍兀崖宫端丁亥往歲曾辱大禮議見示時方在哀疚心善其説而不敢奉復既而元山亦有示使者必求復書草草作答意以所論良是而典禮已成當事者未必能改言之徒益紛爭不若姑相與講明于下俟信從者衆然後圗之其後議論既興身居有言不信之地不敢公言于朝然士夫之問及者亦時時為之辨析期在委曲調停漸求挽復卒亦不能有益也後來賴諸公明目張膽已申其義然如倒倉滌胃積􅌎宿痰雖亦快然一去而病勢亦甚危矣今日急務惟在扶養元氣諸公必有回陽奪化之妙矣僕衰病陋劣何足以與于斯耶數年來頻罹疾搆痰嗽潮熱日益尫羸僅存喘息無復人間意矣乃者忽承兩廣之推豈獨任非其才是蓋責以其力之所必不能支將以用之而實以斃之也懇辭疏下望相與扶持曲成使得就醫林下幸而痊復量力圗報尚有時也答潘直卿丁亥逺承遣問情意藹切兼復奬與過分僕何以得此哉僕何以當此哉愧悚愧悚病廢日久習成懶放雖問水尋山漸亦倦興况茲軍旅之役豈其精力所復能堪已具疏懇辭必須得請始可免于後悔不然將不免為知已之憂矣奈何奈何寧潘之役湖浙及留都之有功者皆已升賞獨江西功次今已六七年矣尚爾查勘未息今復𣣔使之荷戈從役僕將何辭以出號令亦何面目見之賞罰國之大典今乃用之以快恩仇若此僕一人不足惜其如國事何連年久分廢棄此等事不復挂之齒牙今疼痛切身不覺呻吟之發不知畢竟何如而可耳知子文道長尚未至且不作書見時望致意寄翟石門閣老戊子思田之議悉蒙裁允遂活一方數萬之生靈近者八寨斷藤之役實以生民塗炭既極不得已而為之救焚之舉乃不意遂獲平靖此非有魏公力主于朝則金城之議無因而定非有裴公贊決于內則淮蔡之績何由而成今日之事敢忘其所由來乎齎奏人去輒申感謝之誠并附起居之敬但惟六月徂征衝冒瘴疫將士危險頗異他時稍得沾濡亦少慰其勤苦耳處置地方數事附進得蒙贊允尤為萬幸舟中伏枕莫既下懷伏祈鑒亮寄何燕泉戊子某久卧山中習成懶僻平生故舊音問皆踈遙聞執事養髙歸郴越東楚西何因一話煙水之涯徒切瞻望而已去歲復以兵革之役扶病強出殊乖始願正如野麋入市投足搖首皆成駭觸忽枉箋教兼辱佳章捧誦灑然蓋安石東山之髙靖節柴桑之興執事兼而有之矣仰嘆可知地方事茍幸平靖伏枕巳踰月旬日後亦且具疏乞還果遂所圗雖不獲握手林泉然郴嶺之下稽山之麓聊復同此悠悠之懷也使來值湖兵正還兼有計處地方之奏冗冗乃爾久稽又未能細請臨𥿄惘然伏冀照亮不具王文成公全書卷之二十一終
