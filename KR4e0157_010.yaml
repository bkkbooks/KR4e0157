front:
  text: 王文成公全書卷之十五
  hash: sha256:e86ec9407873fe51c98d71d6c6df60778b9388af674eb7186705e59ed899ff5b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_010-1a}
body:
  text: 别録七奏䟽奏䟽七征剿稔惡猺賊䟽七年四月十五日據留撫田州思恩等處地方廣西布政司右布政林富原任副總兵都指揮同知張祐等㑹呈前事開稱田州思恩平復居民悉巳各安生理土夷亦皆各事農耕地方實巳萬幸但惟八寨猺賊積年千百成徒流刼州縣鄉村殺害良民虜掠子女生口財物歳無虗月月無虗旬民遭荼毒冤苦屢經奏告乞要分兵剿㓕者巳不知幾百十畨為因地方多事若要進兵未免重為民困是以官府隠忍撫諭冀其悔罪改過而彼乃悍然不顧愈加兇横岀刼益頻盖縁此賊有衆數萬盤㩀山谷憑恃險阻南通交趾等夷西接雲貴諸蛮東北與㫁藤牛腸仙臺花相風門佛子及桞慶府江古田諸處猺賊囬旋連絡延袤周遭二千餘里東掠西竄南摽北突近因思田擾攘各賊乗機出攻州縣鄉村逺近相煽幾為地方大變仰頼朝廷威令傳播苟幸未動縁此猺賊之與居民勢不两立若猺賊不除則居民决無安生之理乞要乗此軍威速加征剿庶不貽患地方縁由呈乞照詳施行等因㩀此行間随㨿左江道守巡守備等官左叅議汪必東僉事呉天挺叅将張經等㑹呈為請兵征剿積年窮兇極惡猺賊以除民患事開稱㫁藤峽牛腸六寺磨刀等處猺賊上連八寨諸蛮下通白竹古陶羅鳯仙臺花相風門佛子等峒各賊累年攻刼郡縣鄉村殺人放火虜掠子女財畜民遭荼毒迯竄死亡抛棄田業居民日少村落日空延袤千百里内皆巳變爲盗賊之區各處𬒳害軍民累奏請兵誅剿爲因地方多事兵力不敷官府隠忍招撫期暫少息而各賊愈肆猖獗近因思田用兵遂與八寨及白竹古陶羅鳯等賊乗勢朋比連結殺虜搶刼月無虗旬扇惑摇動将成大變仰頼神武傳播幸未舉發近幸思田之諸夷感慕聖化悉巳自縛歸降逺近向服各山猺獞亦皆出來投撫請給告示願求自新從此不敢為惡雖其誠偽未可逆料然皆尚有畏懼之心獨此㫁藤各巢逆賊自知罪在不赦恃險如故截路刼村畧無忌惮若不乗此軍威進兵剿㓕将來禍患焉有紀極縁由㑹案呈詳到臣照得臣近因思田之役奉命前來駐軍南寜府地方與八塞猺賊相去六日之程朝廷徳威宣布雖外國逺夷皆知震懾向慕輸情納欵而此猺賊獨敢擁衆千百四出刼掠武縁等處鄉材殺人放火畧無忌惮此臣所親知即此焻熾桀驁平時抑又可知及照牛腸六寺磨刀古竹古陶羅鳯仙臺花相風門佛子等巢稔惡各賊自弘治正徳以來至於今日二三十年之間節該桂平等縣𬒳害人戸李子太等前後控奏乞行剿除民害不下數十餘次皆有部咨行令勘議計剿若不及今討伐其為地方之患終無底極誠有如各官所呈者况臣駐箚南寜小民紛然訴告請兵急救荼毒皆為朝不謀夕各賊之惡委巳數窮貫滿神怒人怨難復逋誅即𣣔㑹案奏請俟命下之日行事切恐聲迹昭彰反致衝突奔竄則雖調十數萬之衆以一二年為期亦未易平蕩了事照得臣節該欽奉勑諭但遇賊㓂生發即便相機可撫則撫可捕則捕欽此欽遵為照思田變亂之時該前都御史等官姚鏌等奏調湖廣永保二司土兵前來南寕等處聴用近幸地方悉巳平靖各兵正在班師放囬之際歸途所經正與各賊巢穴相去不逺况思田二府新附土目盧蘓王受等感激朝廷生全之㤙屢乞殺賊報效俱各遵奉勑諭事理除一面量調官軍恊同前項各兵行委左江道守巡叅将等官監統永保二司宣慰官男領各頭目土兵人等分道進剿牛腸六寺仙臺花相等賊并行留撫思田布政及右江分巡兵備守備等官監統思田土目兵夫分道進剿八寨等賊所獲功次俱仰該道分巡兵備官收觧紀功御史紀騐造冊奏報及行緫鎮太監張賜宻切公同行事并宻行鎮巡等官知㑹外縁係征剿積年稔惡猺賊以除民患以安地方事理為此具本題知舉能撫治䟽七年正月二十五日案照先該禮部右侍郎方獻夫奏前事節奉聖㫖田州應否設都御史在彼住箚還着王守仁議處具奏定奪欽此兵部備咨前來知㑹随欽遵外随於今年正月二十七日該思㤙田州二府土目盧蘓王受等各率衆數萬自縛歸降該臣遵照勑諭事理悉已撫定當遣廣東右布政林冨舊任副緫兵張祐分投督領各夷各歸原土復業安生巳經具本奏報外為照思㤙田州連年兵火殺戮之餘官府民居悉巳燒毁破蕩雖蔀屋㝷丈之廬亦遭翻穵發掘曽無完土荒村僻塢不遺片瓦尺椽傷心惨目誠不忍見各夷近已誠心投服毁棄兵戈賣刀買牛見已各事田作自後反側之患以臣料之或已可免但其風景凄戚生意蕭條憂惶困苦之餘無以自存非得老成寛厚之人撫恤綏柔之臣等見其悲慘無聊之状誠亦未忍一旦棄去而不顧况思田去梧州軍門水路一月之程一時照料有所不及近又與各官議𣣔於田州建立流官府治以制御土官脩復城池𪠘宇等項必湏勞民動衆自非素得夷情者為之經理區畫各夷彫弊之餘豈復堪此騷屑况議設知府等官皆未曾到一應事務英有任其責者該臣㸔得右布政林富慈祥愷悌識逹行堅素立信義見在思田地方安揷各夷皆能得其歡心合無准如方獻夫所奏将林富量陞憲職仍聴臣等節制暫於思田地方徃來住箚撫循緝理其於事理亦甚相應俟一二年後各夷生理漸復府治城郭𪠘宇漸巳完備則将林富量移别處任用而思田止存知府理治或設兵備官一員於賔州住劄或就以南寕兵備兼理不時徃來撫循如此則目前既可以得撫定綏柔之益而日後又可以免困頓勞煩之擾已經具本於本年二月十五日差舎人湯祥賫奏請㫖續為處置平復地方以圗乆安長治事節該臣㸔得思㤙田州二府地方府治雖立而規制未成流官雖設而職守未定且瘡痍未服人心憂惶乞將右布政林富量陞憲職及存留舊任副緫兵張祐使之更迭徃來於二府地方綏緝經理仍乞賜以便宜勑書将南寕賔州等府衞州縣及東蘭南丹泗城那地都康向武等土官衙門俱聴林富等節制臣等所議地方經乆事宜候奏請命下之日悉以委之林富等使之欽遵以次施行庶幾事無墮惰而功可責成又經條陳具本於本年四月𥘉六日差承差楊宗賫奏請㫖俱未奉明示本年五月二十二日本官巳蒙欽陞都察院右副都御史撫治湖廣鄖陽等處地方去訖所有思田二府撫循緝理官員尚未奉有成命如蒙皇上軫念邉方俯従臣等所請乞於两廣及鄰省附近地方各官内選用庶可令其作速到任不致乆曠職業臣本昧於知人不敢泛然僣舉切照廣東右布政使王大用湖廣按察使周期雍皆才識過人可以任重致逺臣徃年巡撫南贛二臣皆在屬司為兵備僉事與之周旋兵革之間知其皆肯實心幹事江西未叛一年之前臣嘗與周期雍宻論宸濠之惡不可不為之備期雍歸去汀漳即爲養兵蓄銳以待及臣遇變豐城傳檄各省獨期雍與布政席書聞變即發當是時四方援兵皆莫敢動迄宸濠就擒竟無一人至者獨席書行至中途復受臣檄歸調海滄打手又行至中途聞事平而止其先後引領至江西省城者惟周期雍王大用两人而巳當時以捷奏既上随復讒言朋興各臣之忠勤遂不及一白臣為之毎懐歉然即是而觀其能竭忠赴義不肯上負國家亦可知矣乞勑吏部酌臣所議於二臣之内選用其一非惟地方付託得人永有所頼而臣等亦可以免於身後之戮地方幸甚邉方缺官薦才賛理䟽七年七月𥘉六日邇者思恩田州之變諸夷感慕聖化悔罪求生已蒙浩蕩之仁宥納而撫全之地方亦既寕定矣但凋弊之餘必湏得人以時綏緝况两府設立流官衙門及脩築城池營堡等項百務並舉若無專官夙夜經理催督則事無統紀功難責成已經臣等具題乞将右布政林富等陞職留撫随蒙将林富陞任去訖又經臣等仍乞推選相應官員替任俱未奉明㫖臣㸔得今歲例當朝覲各該掌印官員不乆皆将赴京而廣西布按二司等官適多遷轉去任者右布政林富陞鄖陽副都御史叅政黄芳陸江西布政副使李如圭陞陜西按察使叅政龍誥叅議汪必東僉事呉天挺等督押湖兵出境徃復之間即湏半年叅議鄒輗僉事申惠皆賫捧表箋進京其餘雖有一二新任官員皆未到任止存左布政嚴紘按察使錢宏各掌司印僉事張邦信分巡桂林李傑分巡蒼梧而臣在南寕思田等處輿􅍚徃來調度再無一官随從賛理者近日止有兵備副使翁素來管右江道事縁其才性乃慈祥愷悌之人用之中土分理司事足為循良而置之邉方瘴􅸟多事之鄉則其禀質稍弱不耐﨑險易生􅍚病似於風土亦非所宜臣㸔得為民副使陳槐平生奮志忠節才既有為而又能不避艱險致仕知府朱衮年力壮徤才識通敏去任副使施儒學明氣充忠信果㫁閑住副使楊必進曉練軍務識逹事機此四人者皆堪右江兵備之任施儒舊為兵備於朝惠楊必進舊為兵備於府江皆嘗著有成績两地夷民至今思念不忘若於四人之中選用其一其餘地方之事必有所濟及照田州新附之地知府陳能尚未到任該臣㸔得化州知州林寛舊在江西知其才能足充任使巳經具奏行委見在該府管事但其禀質乃亦不禁炎瘴於風土非宜蒞事以來終月卧病呻吟床席軀命且不能保又何能經理地方之亊乎臣又訪得潮州府推官李喬木者才力足以有爲而又熟知土俗夷情服於水土但係梧州籍貫稍有鄉里之嫌臣㸔得廣西軍衛有司衙門所屬官員及各學教職亦皆多用本省士人今田州雖設流官知府而其所屬乃皆土夷自無鄉里之嫌可避亦與各教職無異者乞勑吏部改用林寛於别地俯採臣議将李喬木改陞田州同知庶可使之乆於其任以責成功則地方之幸臣之幸也臣惟任賢圖治得人實難其在邉夷絶域反覆多事之地則其難尤甚何者反覆邉夷之地非得忠實勇果通逹坦易之才固未易以定其亂有其才矣使不諳其土俗而悉其情性或過剛使氣率意徑行則亦未易以得其心得其心矣使不耐其水土而多生疾病亦不能以乆居於其地以收積累之効而成可底之績故用人於邉方必兼是三者而後可即如右江一兵備此臣之所最切心者臣竊為吏部私計其人終夜不寝而思之竟未見有快心如意者盖兼是三者而求之也如前所舉四人者固皆可用之才今乃皆為時例所拘棄置不用而更勞心逺索則亦過矣臣近於南寕思田諸處因無可用之才調取其發身科第以遷謫而至者三四人其志向才識果自不羣足可任用但到未旬日而輒以患病告歸皆相繼狼狽扶携而去矣不得已就其見在者而使之則皆庸劣陋下素不可齒於士類者然無可柰何則畧其全體之惡而用其一肢之能既其終事所就不能以尺寸而破壞則㝷丈矣用是觀之亦何怪乎斯土之民愈困亂愈積而禍日以深也哉是固相沿積習之弊不及今一洗而改革之邉患未見其能有瘳也夫今之以朝覲考察而去者固多貪暴不才之人矣其間乃有雖無過人之才而亦無顯著之惡尚在可用不可用之間者皆未暇論至其平生磊落自負卓然思有所建立而其學識才能果足以有爲者乃爲一時愛僧毁譽之所亂亦遂忞然就抑而去斯固天下之所共爲不平公論弭彰者孰得而終掩之陛下何不使在位大臣一時各舉十餘人之可用者陛下合而考之若一人舉之而九人不舉未可也三人舉之而七人不舉巳在所察矣五人舉之而五人不舉其察又宜詳矣或七人八人舉之而一二人不舉則其人之可用亦㫁在不疑者矣若此者亦在朝覲二次三次之後或七年或十年而後一舉夫身退十年之後則是非已明公論已定雖有黨比自不能容今邉方絶域無可用之人至取其庸劣陋下者而使之以滋益地方之苦弊其豪傑可用之才乃為時例所拘棄置而不用夫所謂時例者固朝廷爲之也可拘而拘不可拘而不拘無不可者陛下何忍一方之禍患日深月積乃惜破例而用一人以救之乎夫考察而去者果皆貪惡庸陋之徒則固營營苟苟無時而不僥倖以求進若磊落自負有過人之見者則雖屈抑而退自放於山水田野之間亦足以自樂今若用之於邉夷困弊之地殆亦未必其所欲但爲朝廷愛惜人才則當此宵旰側席遑遑求賢之日而使有用之才廢棄終身乃不得巳至取其庸劣陋下者而用之以益民困豈不大可惜乎臣因地方缺人心切其事不覺其言之煩瀆伏望陛下恕其愚妄下臣議於吏部採擇而去取之臣不勝瀆冐恐懼之至八寨㫁藤峽捷音䟽七年十月𥘉十日據湖廣按察司分廵上湖南道監軍僉事汪溱廣西按察司分巡左江道監軍僉事呉天挺分巡右江道監軍副使翁素等㑹呈節據廣西領哨潯州衛指揮馬文瑞王勲唐宏卞琚張縉千戸劉宗本永順統兵宣慰彭明輔官男彭宗舜保靖統兵宣慰彭九霄及辰州等衛部押指揮彭飛張恩等各呈前事職等遵奉統領各該軍兵依期於本年四月𥘉二日宻到龍村埠登岸當蒙統督叅将張經都指揮謝珮督同宣慰彭明輔分布官男彭宗舜頭目彭明弼彭杰領土兵一千六百名随同領哨指揮馬文瑞頭目向永夀嚴謹領土兵一千二百名随同領哨指揮王勲又督同宣慰彭九霄等分布官男彭藎臣下報効頭目彭志明領土兵六百名随同領哨指揮唐宏頭目彭九臯領土兵六百名随同領哨指揮卞琚頭目彭輔領土兵六百名随同領哨指揮張縉頭目賈英領土兵六百名随同領哨千户劉宗本并各哨官員領潯州等衞所及武靖州漢土官兵鄉導人等共一千餘名永順進剿牛腸保靖進剿六寺等賊巢刻定𥘉三日寅時一齊抵巢各賊先防湖兵經過各将家屬生畜驅入巢後大山潜伏賊首胡縁二等各率徒黨團結防拒然訪知本院住札南寕寂無征剿消息又不見調兵集糧而湖兵之歸又皆偃旗息鼔畧無警備遂皆怠弛不以爲意至是突遇官兵四面攻圍各賊倉惶失措然猶恃其驍悍蜂擁來敵當有彭明輔彭九霄彭宗舜并頭目田大有彭輔等督率目兵奮不顧身衝突矢石敵殺數合賊鋒摧敗當陣生擒斬獲首賊并次従賊徒賊級六十九名顆俘獲男婦及奪囬被虜人口牛隻器械等項數多餘賊退敗復據仙女大山憑險結寨各兵追圍攀木縁崖設䇿仰攻至𥘉四日復破賊寨當陣生擒斬獲首賊并次従賊徒賊級六十二名顆𥘉五日復攻破油石壁大陂等巢生擒斬獲首賊及次従賊徒賊級七十九名顆俘獲男婦牛隻器械等項數多餘賊奔至㫁藤峽横石江邉因追兵緊急争渡覆溺死者約有六百餘徒官兵復従後奮勇追殺當陣生擒獲斬首賊及次従賊徒賊級六十五名顆俘獲男婦牛畜器械等項數多各賊間有一二漏網亦皆奔竄他境官兵追殺至於本月𥘉十日遍搜山峒無遺禀蒙收兵囬至潯州府住箚間随蒙本院宻切牌諭復令職等移兵進勦仙臺等賊就於本月十一日夤夜仍前分布各哨官兵遵照牌内方畧永順於盤石大黄江登岸進剿仙臺花相等處保靖於烏江口丹竹埠登岸進剿白竹古陶羅鳯等處刻定於十三日寅時一齊抵巢各賊聞知牛腸等巢破㓕方懐疑懼謀欲據險自固賊首黄公豹廖公田等各率徒黨沿途設伏埋簽合勢出拒官兵驟進翕如風雨各賊雖巳奪氣然猶舎死衝敵比之牛腸等賊兇惡尤甚各該官兵奮勇夾擊争先䧟陣生擒斬獲首賊及次従賊徒賊級四百九十名顆俘獲賊屬男婦牛畜噐械等項數多各賊奔入永安邉界地名立山恃險結寨當蒙摘調指揮王良輔并目兵彭愷等於本月二十四日亦各分路並進奮勇争先四面仰攻賊乃敗散當陣生擒斬獲首賊及次従賊徒賊級一百七十二名顆俘獲男婦牛畜噐械数多餘賊逺竄追殺無遺又據把截邀擊叅将沈希儀觧報擒斬首從賊徒賊級八十六名顆把截頭目鄧宗七撫猺老人陳嘉猷旗軍洪狗驢等及貴縣典史蘓桂芳把隘指揮孫龍官舎覃鋙潯州府捕盗通判徐俊平南知縣劉喬等亦各呈觧擒斬首従賊徒賊級八十一名顆俘獲男婦噐械等項数多又該督兵右布政林富舊任副緫兵張祐等遵奉本院方畧分督田州府報効頭目盧蘓等目兵及官軍人等三千名思㤙府報効頭目王受等目兵及官軍人等二千名韋貴等目兵及官軍鄉𣢾人等一千一百名照依分定哨道進剿八寨稔惡猺賊刻期於本年四月二十三日卯時一齊抵巢先於二十二日晚於新墟地方集各土目人等申布本院宻授方畧乗夜啣枚速進所過村寨寂然不知有兵黎明各抵賊寨遂突破石門天險我兵盡入賊方驚覺皆以爲兵従天降震駭潰竄莫知所爲我兵乗勝追斬各賊且奔且戦薄午四逺各寨驍賊聚衆二千餘徒各執長標毒弩并勢呼擁來拒極其猛悍我兵鼓噪奮擊而前聲震巖谷無不一當十賊既失險奪氣而我兵愈戦益奮賊不能支遂大奔潰當陣生擒斬獲首賊及次従賊徒賊級二百九十一名顆俘獲男婦畜産噐械數多賊皆分陣聚黨奔入極髙大山據險立寨我兵亦分道追躡圍勦然巖壁峻絶我兵自下仰攻戦勢不便賊従巔崖發石滚木多為所傷於是多方設策夜發精銳掩其不備二十四日我兵復攻破古蓬等寨生擒斬獲首賊及次従賊徒賊級共一百三名顆俘獲數多二十八日復攻破周安等寨生擒斬獲首賊及次従賊徒賊級共一百四十六名顆俘獲數多五月𥘉一日復攻破古鉢等寨生擒斬獲首従賊徒賊級一百二十七名顆俘獲數多𥘉十日復攻破都者峒等寨斬獲首従賊徒賊級一百四名顆俘獲數多本月十二等日復據叅将沈希儀觧到督領指揮孫繼武等官軍及遷江土目兵夫人等於髙徑洛春大潘等處追勦邀擊各寨奔賊斬獲首従賊徒賊級九十八名顆都指揮髙崧觧到督領指揮程萬全等官軍及土目兵夫人等於思盧北山等處搜勦截捕各寨奔賊斬獲首従賊徒賊級九十一名顆又據同知桂鑿監督思㤙土目韋貴徐五等目兵分勦銅盆等寨斬獲首従賊徒賊級一百九十二名顆俘獲数多又據通判陳志敬督領武縁應虗等處鄉兵搜勦大鳴等山奔賊斬獲首従賊徒賊級八十六名顆又於本月十七等日盧蘓王受等復攻破黄田等寨斬首従賊徒賊級三百六十二名顆俘獲數多六月𥘉七等日復攻破鐵坑等寨斬獲首従賊徒賊級二百五十三名顆俘獲數多又據指揮康壽松千黌王俊等督領官兵於緑茅等處把隘搜截斬獲首従賊徒賊級四十八名顆各賊始雖敗潰然猶或散或合至是見其渠魁驍悍悉就擒斬遂各深迯逺竄其稍有強力者尚一千餘徒将奔徃桞慶諸處賊巢我兵四路夾追及之於横水江各賊皆巳入舟離岸兵不能及然賊衆船小皆層疊而載舟不可運復因争渡自相格鬪適遇颶風大作各船盡覆浮迫登岸得不死者僅二十餘徒而巳我兵既無舟渡又風雨益甚遂各歸營既晴我兵仍分路入山搜勦各賊茫無踪跡又復深入見崖谷之間顛堕而死者不可勝計臭惡薰蒸不可復前逺近巖峒之中林木之下堆疊死者男婦老少大約且四千有餘盖各賊皆倉卒奔迯不曽賫有禾米大雨之中飢餓經旬而既晴之後烈日焚炙瘴毒蒸熾又且半月有餘故皆糜爛而死八寨之賊畧已蕩盡雖有脫網亦不能滿数十餘徒矣本院議於八寨之中據其要害移設衞所以控制諸蠻復於三里設縣以迭相引帶親臨相視思㤙府基景定衞縣規則其時暑毒日甚山溪水漲皆惡流臭穢飲者皆成疫痢本院因見各賊既巳掃蕩而我兵又多疾疫死亡乃遂班師而出照得各職於本年三月二十三等日先奉本院鈞牌據左江道守巡守備等官呈稱㫁藤峽等處猺賊上連八寨下通仙臺花相等峒累年攻刼郡縣鄉村被害軍民累奏請兵誅剿乞要乗此兵威勦㓕等因行仰各職監統各該官兵進勦各賊諭令未至信地三日之前停軍中途候約叅将張經與同守巡各官集議先将進兵道路之險夷逺近各巢賊徒之多寡強弱及所過良民村分之經由徃復面同各鄉導人等逐一備細講究明白務要彼此習熟若出一人然後刻定日時偃旗息鼓寂若無人宻至信地乗夜速發務使迅雷不及掩耳将各稔惡賊魁盡數擒勦以除民害以靖地方除臨陣斬獲外其餘脅従老弱一切皆可宥免今兹之舉惟以定亂安民為事不以多獲首級為功各官務要仰體朝廷憂憫困窮之心俯念地方乆罹荼毒之苦仍要禁約軍兵人等所過良民村分毋得侵擾一草一木有犯令者當依軍法斬首示衆各官既有地方責任兼復素懷忠義當兹委任務竭心力以祛患安民事完之日通将獲過功次開報紀功御史紀騐以慿奏報奉此各職㑹同叅議汪必東僉事汪溱呉天挺叅将張經都指揮謝珮遵照軍門成筭分布各哨官兵申明紀律嚴督依期進勦前項各賊巢穴獲功觧報間随凖叅将張經手本宻奉本院鈞牌仰候牛腸事畢即便移兵進勦古陶諸賊就使各賊先已聞風迯遯亦湏整兵深入掃其巢穴以宣聲罪致討之威若其遂能悔罪効順亦冝姑與招安如其仍前憑險縱恣两征不巳至於三三征不巳至於四務在殄㓕以絶禍根各官就彼分定哨道永順進勦仙臺諸處保靖進勦白竹諸處各分鄉導人等引路進兵務在計慮周悉相機而行各毋偏執巳見致有悞事彼中事勢叅将張經乆於其地必能知悉仍要本官勇當力任㫁决而行不得含糊两可終難辭責又經遵照方畧依期進勦獲功觧報間又於四月𥘉五等日各職先奉本院宻切鈞牌據右布政林富副緫兵張祐等呈稱八塞猺賊毒害萬民千百里内塗炭已極乞要乗此軍威急除一方大患等因本院㸔得八寨之賊既極驍猛而石門天險自來兵不能入此可以計取未易以兵力圗者邇者思田既附湖兵尚留彼賊心懐疑懼必已設有備禦今各州狼兵悉巳罷散而思田新附之民方各歸事農耕湖兵又巳撤囬彼必以我為無復有意於彼是以近日稍稍復出剽掠是殆以此探望官府舉動今我若罔聞知且聴其出沒彼亦放縱懈弛謂我不復能為此正天亡之時機不可失前者思田各目感激朝廷再生之㤙求𣣔立功報効當時許其休息三月然後調用今巳及期仰右布政林富副緫兵張祐照牌事理即便分投宻切起調各目兵夫迂路前到南寕面聴約束行事各職遵奉起調行至新墟地方又宻奉進兵才畧刻定日期當即遵奉連夜分哨速進遂克攻破巢穴連戦皆捷斬獲功次觧報間職等各蒙巡按廣西監察御史石金案騐為紀獲功次事案行該道各不妨監督如遇叅将張經舊任副緫兵張祐等官各觧到擒斬賊人賊級并俘獲賊屬男婦牛馬俱要就彼審騐真的事完通查獲功員役分别首従功次多寡縁由造冊賫報以慿覆審奏報等因除遵奉外今劇進剿㫁藤峽谷各哨土目官兵觧到生擒斬獲首従賊徒賊級一千一百四名顆俘獲賊屬五百六十八名口進剿八寨各哨土目官兵觧到生擒斬獲首從賊徒賊級一千九百一名顆俘獲賊屬五百八十七名口両處共計擒斬獲三千五名顆俘獲賊屬一千一百五十五名口除遵照案騐事理再行騐實造冊另報外其各哨觧到生擒斬獲俘獲等項功次數目合先開報職等㑹同叅照㫁藤峽諸賊連絡数十餘巢盤亘三百餘里彼此掎角結聚憑險稔悪流刼郡縣鄉村自國𥘉以來屢征不服至天順年間該都御史韓雍統兵二十餘萬來平両廣然後破其巢穴兵退未乆各賊復攻䧟潯州㨿城大亂後復合兵攻勦兼行招撫然後退還巢穴自是而後官府曲加撫處或時暫有数月之安而稍不如意輒復猖獗殺掠愈毒盖其祖父以來狠戾相承兇惡成性不可改化近年以來官府勦撫之計益窮各賊殘毒之害日甚盖巳至於不可支持矣至於八寨諸賊尤為兇悍猛惡利鏢毒弩莫當其鋒且其寨壁天險進兵無路自國初韓都督嘗以數萬之衆圍困其地亦不能破竟従招撫其後屢次合勦一無所獲反多撓䘮惟成化年間上官岑瑛素能懾服諸猺嘗合各州狼兵一入其巢穴斬獲二百餘功巳而賊勢大湧力不能支當遂退兵亦以招安而罷自是而後莫可誰何流刼逺近歳無虗月民遭荼毒冤苦無所控籲自思田多事两地之賊相連煽動将有不可明言之變千里之間方爾洶洶朝夕今幸朝廷威徳宣揚軍門方畧宻授因湖廣之回兵而利導其順便之勢作思田之新附而善用其報効之機翕若雷霆􅍚如風雨事舉而逺近不知有兵興之役敵破而士卒莫測其舉動之端两地進兵各不滿八千之衆而三月報績共巳踰三千之功盖其勞費未及大征十之一而其斬獲加於大征三之二逺近室家相慶道路懽騰皆以為數十年來未見其斯舉也職等承乏任使雖衝冐炎毒攀援險阻不敢不竭力効命但僅遵奉方畧安能仲賛一籌照得宣慰彭明輔彭九霄官男彭宗舜等扶病冐暑督兵勦賊顛頓崖谷仆而益奮遂能掃蕩巢穴殄㓕渠黨即其忠義激發誠亦人所難能其思田報効頭目盧蘓王受等感激再生之㤙共竭効死之報自備資糧争先首敵遂破賊險搗自昔不到之巢斬自來難敵之㓂盖有仰攻險寨堕崖而碎首者猶曰我死不憾亦有仰受賊弩掛樹而裂肢者猶曰我死甘心民間傳誦以為盧蘓王受昔未招撫惟恐其為地方之患今既招撫乃復為地方除患嘖嘖稱嘆謂其竭忠報徳之誠雖子弟之於父兄亦不能是過矣再照督兵督哨防截給餉等項凡有事於軍前各官雖其職有崇卑功有大小然皆衝冐矢石炎瘴備歷險阻艱難比之徃來大征合圍守困坐待成功其爲利害勞逸相去倍蓰均乞録奏以勸将來等因到臣照得先該各官呈稱前項各巢各賊積年窮兇稔惡千百里内𬒳其慘毒萬姓冤苦朝不保夕乞要乗此軍威急救一方塗炭等因其時臣方駐劄南寕目覩其害誠不忍坐視斯民之苦一至此極及查兵部屢次咨來題奉欽依事理要将前項各賊即行發兵計勦以除民患正亦臣等職所當盡之責但慮賊衆勢大連絡千里可以計破難以力攻𣣔俟再行奏請命下然後舉行必致形迹昭聞雖用十萬之師圖以歲年亦未可克故遂仰遵欽奉勑諭但有賊盗生發當撫則撫可勦則勦及便宜行事事理一面宻切相機行事及宻行緫鎮太監張賜知㑹随該鎮守两廣豐城侯李旻亦相繼到任又經轉行知㑹外今據各呈前因該臣㑹同緫鎮太監張賜緫兵李旻及鎮巡三司等官㸔得八寨㫁藤牛腸六寺磨刀古陶白竹羅鳳龍尾仙臺花相等賊巢穴連絡盤據千百餘里兇悍驍猛酷虐萬姓流毒一方自來征勦所不能克果巳貫盈罪極神怒人怨委有如各官所呈者是誠两廣盗賊之淵藪根抵此而不去两廣盗賊終未有衰息之漸也乃今於三月之内止因湖廣便道之歸師及用思田報効之新附两地進兵不滿八千而斬獲三千有奇巢穴掃蕩一洗萬民之冤以除百年之患此豈臣等知謀才畧之所能及皆是皇上除患救民之誠心黙賛於天地鬼神而神武不殺之威任人不疑之㫁震懾逺邇感動上下且廟廊諸臣咸能推誠舉任公同恊賛惟國是謀與人爲善故臣等得以展布四體無復顧慮信其力之所能爲竭其心之所可盡動無不宜舉無弗振諸将用命軍士効力以克致此雖未足爲可稱之功而朝廷之上所以能使臣等獲成是功者實可以爲後世行事之法矣不然則兵耗財竭凋弊困苦之餘僅僅自守尚恐未克而况敢望此意外之事哉照得宣慰彭明輔彭九霄官男彭宗舜等皆衝犯暑毒身親䧟陣事竣之後狼狽扶病而歸生死皆未可必其官男彭藎臣者亦遣家丁逺來報効两年之間顛頓道途疾疫死亡誠有人情所不能堪者而彭明輔等忠義奮發畧無悔怠即其一念報國之誠殊亦所不可泯者至於思田報効頭目盧蘇王受等感激朝廷再生之恩自備資糧力辭軍餉實能舎死破敵争先䧟陣惟恐功効不立無以自白其本心謂子弟之於父兄亦不過是誠非虗言此皆臣所親見者也及照留撫思田右布政林富巳聞都御史之擢而忠義激發猶且不計體面必欲督兵入巢破賊而後出是尤人所難能舊任副總兵張祐叄将張經沈希儀湖廣督兵僉事汪溱廣西督兵僉事呉天挺叄議注必東副使汪素湖廣督兵都指揮謝珮廣西都指揮髙崧及各督哨督押指揮等官馬文瑞王勲唐宏卞琚張縉彭飛張恩周徹宗趙璇林節劉鏜武鑾千戸劉宗本等督勦縣丞林應聰主簿季本并防截搜捕調度給餉等項官員知府程雲鵬蒋山卿同知桂鏊史立誠舒栢通判陳志敬徐俊知州林寛李東諭召知縣劉喬縣丞杜桐蕭尚賢經歷周奎等雖其才猷功績各有大小等級之殊而利害勤苦亦有緩急乆暫之異然當兹炎毒暑雨之中瘴疫薰蒸經冐鋒鏑之場出入﨑險之地固皆同効捍患勤事之績均有百死一生之危者也伏望皇上明昭軍旅之政既行廟堂恊賛舉任之上賞亦録諸臣分職供事之㣲勞及将宣慰彭明輔等特加陞奨官男彭宗舜彭藎臣免其赴京就彼襲替以旌其報國之義土目盧蘇王受等亦曲賜恩典或不待三年而遂錫之冠帶以勵其報効之忠如此庶幾功無不賞而益興忠義之心賞當其功而自息僥倖之望矣臣以懦劣迂踈繆蒙不世之知遇授以軍旅重任言無不録計無不行且又慰以温㫖使之不必顧忌臣伏讀感泣自誓此生鞠躬盡死以報深㤙今兹之役本無足言然亦自幸苟無覆敗以免戮辱但恨身嬰危疾自後任勞頗難巳具本告回養病乞賜俯允俾得全復餘生尚有圖報之日臣不勝願望處置八寨㫁藤峽以圖永安䟽嘉靖七年七月十二日照得臣於去歳奉命勘處思田两府皆蒙皇上天地好生之仁悉從寛宥两府人民今皆復業安居化為無事寕靖之地自此可以永無反覆之患而免於防守屯息之勞矣惟是八寨及㫁藤峽諸賊積年痛毒生民千百里内塗炭巳極臣既目覩其害不忍坐視而不救遂遵奉勑諭事理乗機舉兵征勦仰頼神武威徳幸巳剪㓕蕩平一方倒懸之苦畧巳為之一觧但将來之患不可以不預防而事機之會亦不可以輕失臣因督兵親歷諸巢見其形勢要害各有宜改立衛所開設縣治以㫁其脉絡而扼其咽喉者若失今不為則數年之間賊以漸復歸聚生息不過十年又有地方之患矣臣以多病之故自度精神力量㫁巳不能了此但巳心知其事勢不得不然不敢仰負陛下之託俯貽地方之憂輒巳遵奉勑諭便宜事理一面相度舉行不避煩瀆之誅開陳上請乞賜採擇施行實地方之幸臣等之幸計開一移築南丹衛城於八寨臣等㸔得八寨之賊實為桞慶諸賊之根抵盖其東連桞州隴蛤三都嶺三北四等處賊峒以數十北連慶逺忻城東歐莫徃八仙等處賊峒亦以數十西連東蘭等州及夷江土者等處賊峒以十數南接思㤙及賔州上林縣諸處賊村亦以十數各處賊巢雖多其小者僅百數人大者不過數百人及千人而止各賊巢穴皆有山谿之限險扼之守不相通和至期有急或欲有所攻刼紏合㑹聚然後有一二千之衆多至數千者惟八寨之賊每寨有衆千餘四山環合同據一險無事則分路出刼有警急奔入其巢數千之衆皆不紏而聚不約而同不謀而合故名雖為八實則一寨此八寨之賊所以勢衆力大而自來攻之有不能克者也各巢之賊皆倚恃八寨為逋逃主毎有緩急一投八寨即無所致其窮詰八寨為之一呼則羣賊皆應聲而聚故羣賊之於八寨猶車輪之有軸樹木之有本若八寨不除則羣賊决無衰息之期也今幸八寨悉巳破蕩正宜乗此平靖之時據其要害建置衛所以控馭羣賊臣等㸔得周安堡正當八寨之中四方賊巢道路之所㑹議於其地創築一城度可以居數千之衆者而移設南丹一衛於其間盖南丹衛舊在南丹州地方為廣西極邉窮苦之地非中土之人所可居者故自先年屢求内徙今巳三遷而至賔州遂爲中土富樂之鄉賔州既有守禦千戸一所官軍而又益以南丹一衛自逺來徙無片田尺土之籍但惟安居坐食取給於賔州州城之内皆職官旗舎之居州民反避處於四逺村寨毎遇糧差徭役然後入城故州官號令不行於城中而政事牽沮地方益弊今計一衛之官軍雖不滿五百之數盖盡移其家衆則亦不下二千以二千之衆而屯聚於一城其氣勢亦巳漸盛足充守禦遂清理屯田之在八寨者使之屯種又分撥各賊占據之田使各官軍得以為業以稍省俸給月粮之費彼亦無所樂從且賔州之城既空又可以還聚居民修復有司之治亦事之两便者也臣等又㸔得遷江八所皆土官指揮千百戸等職舊有狼兵數千以分制八寨猺賊之勢後因賊勢日盛各官皆不敢復入反遂與之交通結契及為之居停指引分其刼掠之所得共為地方之害巳非一日官府察知其奸欲加懲究則又倚賊為重不可根極近臣督兵其地悉将各官遵照勑諭事理綁赴軍門議欲斬首示衆以警逺近而各官哀求免死願得殺賊立功自贖然其時賊勢巳平遂許其各率土兵入屯八寨就與該衞官軍分工効力助築城垣待城完之日就與城外别築營堡與南丹衛官軍掎角而守亦各分撥賊田使之耕種以資衣糧今八所土兵雖巳比舊衰耗然亦尚有四千餘衆若留其㣲弱者四所於外以分屯其所遺之田而調其強盛者四所於内合南丹一衛之衆以守亦且四千有餘隠然足爲桞慶之間一巨鎮矣此鎮一立則各賊之脉絡㫁咽喉絶自将沮䘮震懾其勢莫敢輕動稍有反側者據險出兵而撲之夕發而旦至各賊之交自不能合如取机上之肉下筯無弗得者此真破車輪之軸而諸輻自觧伐樹木之本而衆幹自枯不過十年桞慶諸賊不必征勦皆将効順而服化矣伏乞聖明裁允一改築思㤙府城於荒田臣等㸔得思㤙舊治原在寨城山内尚歷髙山數十餘里其後土官岑濬始移出地名喬利就巖險壘石為城而居四面皆斬山絶壁府治亦在􅻄确之上芒利􅚱砑之石衝射牴觸如處戈矛劒㦸之中自岑濬被誅繼是二十餘年反者数起曾不能有一歳之安人皆以為風氣所使雖未可盡信然頑石之上不生嘉禾而隂崖之下必有狐䑕要亦事理之有然者况其地瘴霧昬塞薄午始開中土之人來居輒生疾疫自春𥘉思田歸附之後臣時即巳經營料理其事竟未能有相應之地近因督勦八寨復親徃相度乃於未至橋利六十里外地名荒田者其地四野寛衍皆膏腴之田而後山起伏蜿蜒敷為平原環抱􅉼畜两水夾繞後山而出合流於前屈曲數十里入武縁江水逹於南寜四面山勢重疊盤㢠皆軒豁秀麗真可以建立府治臣因信宿其地為之景定方向創設規則諸夷來集莫不踊躍歡喜争先趍事赴工遂令署府事同知桂鏊督令各役擇日興工盖思㤙舊治皆在萬山之中水道不通故各夷所湏魚塩諸貨類皆逺出展轉鬻買徃反旬月十不致一常多匱絶舊府既地險氣惡又無所資食故各夷終嵗不一至府治情益踈離易生嫌隙今府治既通江水啇貨自集諸夷所湏皆仰給於府朝夕絡繹自然日加親附歸向而武縁都里舊嘗割屬思㤙者其始多因路險地隔不供糧差今荒田就係武縁止戈鄉一圖二圗之地四望平野坦然大道朝徃夕反無復阻隔則該府之官自可因城頭廵檢之制循土俗以順各夷之情又可開圖立里用漢法以治武縁之衆夷夏交和公私兩便則改築思㤙府城於荒田者是亦保治安民勢不容已之事伏乞聖明裁允一改鳯化縣治於三里臣等勘得思㤙舊有鳯化一縣然無城郭縣治廨宇選來知縣等官多借居民村或寄其家眷於賔州諸處而遷徙無常如流寓者然上司憐其無所依泊則委之管理别印或以公務差遣徃來於外以苟歲月故鳯化之在思恩徒寄虗名而實無縣治臣近督勦八寨㸔得上林縣地名三里者乃在八寨之間其地平廣愽衍東西數里外石山周圍如城自後極髙石山之間獨抽土山一脉起頓昻伏分為兩股環抱而前遂有兩水夾流上山之外當心交合岀水之口石山十餘重錯互囬盤轉折二三十里極外石山合為城門水從此出是為外隘其間多良田茂林村落相望前此居民十餘家皆極饒富後為寨賊所驅殺占㨿遂各四散迯亡不敢歸視其土者巳二十餘年今各賊既㓕遂空其地不及今創設縣治以據其險或有漏殄之賊潜囬其間日漸生息結聚後阻石門之險前守外隘之塞不過數年又将漸為地方之梗矣故臣以為宜割上林上下無虞鄉三里之地屬之思恩而移設鳯化縣治於其内量為築立城垣廨宇選委才能之官興督其役遠近聞之不過三四月而迯亡之民将盡來歸各修復其田業供其糧差蔚然遂可以成一方之保障且其南通南丹新衛五六十里南丹在石門之内鳯化當石門之外内外聲勢連合而石門之險亡西至思恩一百餘里取道於那學沿途村寨荒塞日乆因此兩地之人徃來絡繹而道途益通又上林舊在大鳴山與八寨各賊之間勢極孤懸今得鳯化為之唇齒氣勢日盛雖割三里之地以與鳳化而緑茅緑篠等村寨舊所亡失土田皆将以次歸復則亦失之於東而收於西矣及照思㤙雖已設立流官知府然其所屬皆土目巡檢而舊屬鳯化一縣亦皆徒寄空名實未嘗有今割武縁止戈一圖二圖之地改築思㤙府城而又割上林上下無虞三里之地改設鳯化縣治固於思㤙亦巳稍有資輔但自鳯化三里至於思恩一百五六十里中間尚隔上林一縣臣以為并割上林一縣而通以屬之思㤙似於事勢為便而於體統尤宜何者桞州一府所屬二州十縣賔州盖桞州所屬者且有上林遷江兩縣今思恩既設流官知府固亦一府之尊而反不若桞州所屬之一州也其於體統亦有所未稱矣况賔州自有十五里而又有遷江一縣雖割上林以與思恩其地猶倍於思恩未為遽損也上林之屬賔州與屬思㤙均之為一屬邑亦未有所加損也然以之屬於思恩則思恩始可以成一府之規模而其間有無相湏緩急相援氣勢相倚流官之體統益尊則土俗之歸向益謹郡縣之政化日新則夷民之感發日易固有不可盡言之益也夫立新懸以扼據地險改屬縣以輔成府治是皆所以乂安地方者也伏乞聖明裁允一添設流官縣治於思龍照得南寕自宣化縣至於田寕逆流十日之程宣化所屬如思龍十圖等處相去尚有五日六日其間錯以土夷村寨地既隔越而窮鄉小民畏見官府故其糧差多在縣之宿奸老蠧與之包團因而以一科十小民不勝迫脇徃徃逃入夷寨土夷又從而侵暴之地日凋殘盗賊日起近年以來思龍之圖鄉民屢次奏乞添設縣治以便糧差盖亦内迫於縣民之奸外苦於土夷之暴不得已而然臣因入撫田寕親歷其所民之擁道控告者以千數因停舟其地為之經理相度得村名那乆者其地亦寛平深厚江水縈廻環匝傍有一江來㑹亦正於此合流沿江居民千餘家竹樹森翳煙火相接且向武各州道路皆經由其傍亦為四通之地若於此分割宣化縣思龍一五六七八九十十二及西鄉之六八圖共十里之地而設立一縣治則非獨以便窮鄉小民之糧差賦役亦足以鎮據要害消沮盗賊其間小民村居如那茄馬拗三顔那排之類未可悉數皆乆巳淪入於夷今若縣治一立則此等村寨諸夷自不得而隠占皆将漸次歸復流官而其地遂接比於田寕固可以所設之縣而遂以屬之田寕矣夫南寕一府所屬一州三縣而宣化一縣自有五十二里今雖分割十里之地以與田寕而宣化尚有四十二里一縣之地猶四倍於一府也况田寕又係新創流官府治所統皆土目巡檢今得此一屬縣為之傍輔又自不同臣於前割上林以屬思㤙之議已畧言之矣且左江一帶自蒼梧以逹南寕皆在流官腹裏之地自南寕以逹於田寕自田寕以通於雲貴交趾則皆夷村土寨稍有疑傳易成閼隔今田寕思㤙二府既皆改設流官與南寕鼎峙而立而又得此新創一縣以䟽附交連於其間平居無事商貨流通厚生利用一旦或有境外之役道路所經皆流官衙門従門庭中度兵更無阻隔之患此亦安民利國之事勢所當為者也伏乞聖明裁允仍定賜縣名選官給印地方幸甚一增築守鎮城堡於五屯照得㫁藤峽諸賊既平守巡各官議調土漢官兵數千於潯州以防不測該臣㸔得各職既㓕縱有一二漏網其勢非三四年亦未能復聚為今之計正宜勦撫並行盖破㓕窮兇各賊者所以懲惡而撫恤向化諸猺者所以勸善今懲惡之餘即宜急為勸善之政使軍衞有司各官分投遍歷向化村寨慰勞而存恤之給以告示賜以魚塩因而為之選立酋長諭以朝廷所以征勦各巢者為其稔惡也今爾等向化村寨自宜安心樂業益堅為善之志但有反側悖亂者即宜擒送官府自當重賞以酬爾勞其漏殄諸賊果能誠心悔惡亦皆許其歸附待以良民夫使向化者益勸於為善而日加親附則惡黨自孤賊勢自散不復能合縱遺一二終将屈而順服矣乃今則不然賊既破勦而猶屯兵不散使漏殄之徒得以藉口摇惑逺近其向化村分又畧不加恤奸惡之民復乗機而驅脇虐害之彼見賊已破㓕而復聚兵巳心懐驚疑矣而又外惑於賊黨之扇摇内激於奸民之驅脅遂勾結相連而起也近年以來所以亂始平而變復作皆迷誤於相沿之弊而不察也今各賊新破勢决未敢輕出雖屯數十之衆不過困頓坐食徒穢擾民居耗竭糧餉而實無益於事吾民乆𬒳賊苦今始一觧其倒懸又復自聚無用之兵以重困之此豈計之得者哉惟於各寨之中相其要害之地創立一鎮以控制之此則事理之所當行亦正宜乗此掃蕩之餘而速圖之者其在㫁藤牛腸諸處則既切近潯州府衛不必更有所設至於四方各寨遍歷其要害險阻則惟五屯正當風門佛子諸巢穴而西通府江北接荔浦各處猺賊最爲緊要之區宜設一鎮以控御逺邇而舊已有千戸所統率官兵亦幾及一千之数困於差徭日漸躱避於附近土目村寨官司失於清理止有五百其後上司不聞地方之艱難又於五百之中分調哨守於他所而所餘遂不滿二百既而賊亂四起守禦缺乏則又取調潮州之兵數百以來恊守五屯事既紛亂人無所遵兼以統馭非人故地方遂致大壞且其屯堡墻垣亦甚卑隘不足以壯威設險今宜開拓其地增築髙城度可以居二千之衆而設守備衙門於其内取囬五百之中分調哨守於他所之兵其自潮州調來恊守者則盡數發還原衞以免兩地各兵背離鄉土之苦徃復道途之費仍於附近土寨目兵之中清查揀𥙷其原避差役者務足原數一千選委智畧忠勇之官一員重任而專責之使之訓練撫摩敷之以威信而懐之以仁恩務在地險既設而士心益和自然動無不克而行無不利叅将兵備各官又不時親至其地經理而振作之或案行其村寨或勸督其農耕或召其頑梗而曲示訓懲或進其善良而優加奬賜或救恤其灾患或聴㫁其是非如農夫之去稂莠而飬嘉禾漸次耕耨而耘鋤之無事之時随意取調附近土官兵𣢾或百人或七八十人以恊同哨守為名使之兩月一更班而絡繹徃來於道路以慣習逺近各巢之耳目自後我兵出入自将無所驚疑果有兇梗當事舉動然後宻調精悍可用土目一二千名如㝷常哨守然以次潜集城中畜力飬銳相機而發夫無事而屯數千之兵則一月糧餉費踰千金若毎一年無屯軍之費用之以築城設險犒賞兵士招來逺人亦何事不行何工不就此增築城堡以據要害所謂謀成而敵自敗城完而㓂自觧險設而賊自摧威震而奸自伏正宜及今為之而亦事勢之不可巳焉者也伏乞聖明裁允查眀岑邦相䟽七年七月十九日准兵部咨該本部題節奉欽依岑邦佐仍武靖知州岑邦相著王守仁再查明白具奏欽此欽遵照得先該臣等具題前事内一件仍立土官知州以順土夷之情臣等議得岑氏世有田州乆結於人心岑猛雖沒諸夷莫不願得復立其後議於開設流官知府之外就於該府四十八甲之内割其八甲降設田州立岑猛之子一人始授以署州事吏目三年之後地方寕靖効有勤勞則授以為判官六年之後地方寕靖効有勤勞則授以為同知九年之後地方寕靖効有勤勞則授以為知州使承岑氏之祀而隷之流官知府當時臣等通拘該府大小土目及鄉老人等審問岑猛之子應該承立者何人乃衆口一詞以為岑猛四子長子岑邦佐係正妻張氏所出次子岑邦彦係庶妾林氏所出三子岑邦輔係外婢所生四子岑邦相係次妾韋氏所岀猛嬖溺林氏而張氏失愛故邦佐自㓜出繼武靖而以邦彦承襲官職今邦彦既死應該承立者莫宜於邦佐臣等當㸔得武靖地方正當猺賊之衝而邦佐自㓜出繼該州之民信服歸戴已乆况其才力足能制禦各猺近日該州土目人等又相繼懇懇來告願得復還邦佐今欲改立一人亦未有可以代邦佐者臣恐一失武靖各目之心則於地方又多生一事莫若仍還邦佐於武靖一以禦地方之患一以順各夷之情至於田州新立不過苟以無絶岑氏之祀此其才否優劣固有不必深論者因諭以邦佐出繼武靖既乆朝廷事體已定不可復還宜立其次者岑邦輔則可於是各目人等又衆口一詞以為邦輔名雖岑猛外婢所生其實來歷不明闔府之民皆不欲立惟邦相則次妾所生實係岑猛的親骨血况其質貌厚重謹實衆心歸服立繼岑氏庶不絶其真正一脉臣等議得仍立土官者專為不絶岑氏之後以順諸夷之情也今衆心若此亦合俯順故當時直斷邦輔謂非岑猛之子而止謂岑猛之子存者二人亦所以正名慎始杜日後之紛争也但具奏之時因本内事體多端文以繁瑣若再加詳説誠恐有瀆聖聽故遂簡畧其詞今蒙朝廷明見萬里洞徹細㣲復命臣等查奏聞命惶懼無所措躬因思岑邦輔尚存當時奏内不曾詳開所以不立邦輔之故而直言岑猛之子存者二人果係情節脫落事體欠明臣等踈漏之罪萬死有不容赦者矣臣等近復通拘該府土目鄉老人等再加審問而衆口一詞執說如前陳請益篤臣等反覆思惟其事誠亦必湏如此而後穏帖無弊故仍照原議上請盖此等關係地方之事臣等言雖或有所不敢盡而心已無所不用其極必求事出萬全永乆無患然後乃敢具奏伏乞聖明宥其踈漏萬死之誅仍勑該部俯從原議立岑邦相於田州以曲順各夷之情其岑邦輔者聴其以官族名目随住如此則名正事成而人心允服實地方之幸臣等之幸奨勵賞賫謝㤙䟽七年九月二十日准兵部咨爲奏報平復地方事該臣題該本部覆題節奉聖㫖王守仁受命提督軍務蒞任未乆乃能開誠布㤙處置得宜致令叛夷畏服率衆歸降罷兵息民其功可嘉寫勑差行人賫去奬勵還賞銀五十兩紵絲四表裏布政司買辦羊酒送用欽此随於本年九月𥘉八日該行人馮㤙賫捧敕書并前項綵幣銀兩等項到於廣州府地方奉迎人城當除望闕謝㤙欽遵收領外臣時卧病床褥巳餘一月扶疾興伏感激惶懼顛頓昬昡莫知攸措巳而漸復甦息伏自念思㤙田州數萬赤子皆畏死迯生本無可誅之罪而前此當事者議欲勦㓕故皆洶洶思亂既已䧟之必死之地而無復生全之心矣仰頼皇上好生之仁軫念逺夷惟恐一物不得其所特遣臣來勘處臣亦何能少効一籌不過宣揚深仁敷昭神武而旬月之間遂皆囬心向化舎死投生面縛來歸是皆皇上聖徳格天至誠所感不疾而速是以綏之斯來動之斯和有莫知其所以然而然者此豈臣等知謀才力能致毫髪於其間哉今乃誤蒙洪㤙重頒大賞且又特遣行人賫勅逺臨事尤出於常格之外臣亦何功而敢當此臣亦何人而敢望此祗受之餘戰悚惶惑徒有感泣惟誓此生鞠躬盡瘁竭犬馬之勞以圖報稱而巳臣病日亟自度此生恐不復能奔走闕廷一覩天顔以少罄其螻蟻葵藿之誠臣不勝刻心鏤骨感激戀慕之至乞㤙暫容回籍就醫飬病䟽七年十月𥘉十日臣以憂病跧伏田野六年有餘蒙陛下賜之再生之㤙錫之分外之福毎思稽首闕廷一覩天顔以申其螻蟻感激之誠遂其葵藿傾戴之願既困疾病復畏譏讒六年之間瞻望太息竟未敢一出門庭夫蒙人一顧之㤙尚必思其所以為酬受人一言之知亦必圖其所以為報何况君臣大義天髙地厚之㤙上之所以施於其下者如雨露之霑濡無時或息而下之所以承手其上者乃如頑石杇株畧無生動此雖禽獸異類稍有知覺者亦不能忍於其心是以毎一念及則哽咽涕下徒日夜痛心惕骨行吁坐嘆而巳邇者繆蒙陛下過採大臣之議授以軍旅重寄自知才不勝任病不任勞輒乃觸冐上陳辭謝又蒙温㫖眷覆慰諭有加伏讀感泣不復能顧其他即日矢死就道既而沿途備訪其所以致此變亂之由熟思其所以經理幹旋之計乃甚有牴牾矛盾者而其事勢既巳顛覆破漏如将傾之屋半溺之舟莫知所措其惟恐付託不効以孤陛下生成之德以累大臣薦舉之明於是始益日夜危懼而病亦愈甚乃不意到任以來旬月之間不折一矢不戮一卒而兩頑民帖然來服千里之内去荆棘而成坦途其間雖有數處强大賊巢素為廣西衆賊之淵藪根株屢嘗征討而不克者亦就湖廣撤囬之兵而乗其取道之便用兩廣新附之民而鼔其報効之勇財力不致於大費小民不及於疲勞遂皆殱厥渠魁蕩平巢穴而逺近畧已寕靖是皆陛下好生之至徳昭格於上下不殺之神武幽賛於神明是以不言而信不怒而威隂祐黙相以克有此固非愚臣意望之所敢及豈其知謀才力爲能辦此哉竊自喜幸以爲庶得藉此以免於覆敗之戮不爲諸臣薦揚之累足矣而臣之病勢乃日益增劇百療無施臣又思之是殆功過其事名浮其實福踰其分所謂小人而有非望之獲必有意外之灾者也臣自徃年承乏南贛為炎毒所中遂患咳痢之􅍚嵗益滋甚其後退伏林野雖得稍就清凉親近醫藥而病亦終不能止但遇暑熱輒復大作去嵗奉命入廣與舊醫偕行未及中途而醫者先以水土不復辭疾歸去是後既不敢輕用醫藥而風氣益南炎毒益甚今又加以遍身腫毒喘嗽晝夜不息心惡飲食毎日强吞稀粥數匙稍多輒又嘔吐當思㤙田州之役其時既已力疾從事近者八寨既平議於其中移衛設所以控制諸蠻必湏身親相度方敢具奏則又冐暑輿疾上下巖谷出入茅葦之中竣事而出遂爾不復能興今已輿至南寕移卧舟次将遂自梧道廣待命於韶雄之間新任太監總兵亦皆相繼蒞任各能守法奉公無地方騷擾之患兩省廵按等官又皆安靖行事創滌往時煩苛搜刻之弊方務安民今日之兩廣比之異時庶可謂無事矣臣雖病發而歸亦可以無去後之憂者夫竭忠以報國臣之素志也受陛下之深㤙思得粉身虀骨以自效又臣近歲之所日夜切心者也病日就危尚求苟全以圖後報而為飬病之舉此臣之所大不得巳也惟陛下鍳臣一念報主之誠固非苟為避難以自偷安而憫其瀕危垂絶不得巳之至情容臣得暫囬原籍就醫調治幸存餘息鞠躬盡瘁以報陛下尚有日也臣不勝懇切哀求之至王文成公全書卷之十五終王文成公全書卷之二十七續編二書與郭善甫朱生至得手書備悉善甫相念之懇切茍心同志恊工夫不懈雖隔千里不異几席又何必朝夕相與一堂之上而爲後快耶来書所問數節楊仁夫去適禫事方畢親友紛至未暇細荅然致知格物之說善甫巳得其端緒但扵此涵泳深厚諸如數說将沛然融釋有不俟扵他人之言者矣荒歲道路多阻且不必逺渉湏稍收稔然後乘興一来不縷縷寄楊仕徳臨别數語極奮勵區區聞之亦悚然有警歸途又徃而樵一過所進當益不同矣此時巳抵家大抵忘巳逐物虚内事外是近来學者時行症候仕徳旣巳㸔破此病早晚自不廢藥石康節云與其病後能服藥不若病前能自防此切喻愛身者自當無所不用其極也病䟽至今未得報此間相聚日衆最可喜但如仕徳謙之旣逺去而惟乾復多病又以接濟乏人爲苦爾尚謙度未䏻遽出仕徳眀春之約果䏻不爽不獨區區之望尤諸同逰之切望也與顧惟賢聞有枉顧之意傾望甚切繼聞有夾勦之事盖我獨賢勞自昔而然矣此間上猶南康諸賊幸巳掃蕩渠魁悉已授首囬軍且半月以湖廣之故留兵守隘而巳奏捷湏湖廣畧有㳄第然後舉朱守忠聞在對哨有面會之圖此亦一竒遇近得甘泉書巳與叔賢同徃西樵令人想企不䏻一日處此矣承示旣飽不必問其所食之物此語誠有病巳不䏻記當時所指恐亦爲世之專務辨論講說而不求深造自得者說故其語意之間不無抑揚太過雖然苟誠知求飽将必五榖是資鄙意所重盖以責夫不䏻誠心求飽者故遂不覺其言之過激亦猶養之未至也凡言意所不䏻逹多假扵譬喻以意逆志是爲得之若必拘文泥象則雖聖人之言且亦不䏻無病况扵吾儕學未有至詞意之間本巳不䏻無弊者何足異乎今時學者大患不䏻立懇切之志故鄙意專以責志立誠爲重同志者亦觀其大意之所在斯可矣惟賢謂有所疑而未解正如饑者之求食若一日不食則一日不飽誠㢤是言果䏻如饑者之求飽安䏻一日而不食又安䏻屏棄五榖而食畫餅者乎此亦可以不言而喻矣承示爲益巳多友朋切磋之職不敢言謝何時遇甘泉更出此一正之閩廣之役偶幸了事皆諸君之功區區盖坐享其成者但閩㓂雖平而䖍南之㓂乃數倍扵閩善後之圖尚未知所出野人歸興空切不知知巳者亦嘗爲念及此否也曰仁近方告病與二三友去畊霅上霅上之謀實始扵陸澄氏陸與潮人薛侃皆来南都從學二子並佳士今皆舉進士未免又失却地主矣向在南都相與者曰仁之外尚有太常博士馬眀衡兵部主事黃宗眀見素之子林逹有御史陳傑舉人蔡宗兖饒文璧之屬蔡今亦舉進士其時凡二三十人日覺有相長之益今来索居不覺漸成放倒可畏可畏閒中有見不妨冩寄庻亦有所警發也甘泉此時巳報滿叔賢聞且束装曾相見否霍渭先亦美質可與言見時皆爲致意承喻討有罪者執渠魁而散脅從此古之政也不亦善乎顧浰賊皆長惡怙終其間脅從者無㡬朝撒兵而暮聚黨若是者亦屢屢矣誅之則不可勝誅又恐以其患遺諸後人惟賢謂政教之不行風俗之不美以至扵此豈不信然然此膏肓之疾吾其旬日之間可柰何㢤故今三省連累之賊非殺之爲難而處之爲難非處之爲難而處之者䏻久扵其道之爲難也賤軀以多病之故日夜冀了此塞責而去不欲復以其罪累後来之人故猶不免扵意必之私未忍一日舍置嗟乎我躬不閱遑恤我後盡其力之所䏻爲今其大勢亦幸底㝎如其禮樂以俟君子而巳數日前已還軍贛州風毒大作壅腫坐卧恐自此遂成廢人行且告休人還草草復承喻用兵之難非獨曲盡利害足以開近議之惑其所以致私愛扵僕者尤非淺也愧感愧感但龍川羣盗爲南贛患嵗無虚月勦捕之命屢下所以未敢輕動正亦恐如惟賢所云耳雖今郴桂夾攻之舉亦甚非鄙意所欲况龍川乎夏間嘗具一疏頗上其事以湖廣奉有成命遂付空言今錄去一目鄙心可知矣湖廣夾攻爲備巳久郴桂之賊爲湖廣兵勢所迫四出攻掠南贛日夜爲備今始稍稍支持然廣東以府江之役尚未調集必待三省齊發復恐老師費財欲視其緩急以次漸舉盖桂東上猶之賊湖廣與江西夾攻廣東無與也昌樂乳源之賊廣東與湖廣夾持江西無與也龍川之賊江西與廣東夾攻湖廣無與也事雖一體而其間賊情地勢自不相及若先舉桂東上猶候廣東兵集然後舉乳源諸處末乃及扵龍川似亦可以節力省費而易爲功不知諸公之見又何如耳所云龍川亦止浰頭一巢盖環巢數邑被害巳極人之痛憤勢所不容巳也来諭謂得書之後前疑渙然冰釋幸甚幸甚學不如此只是一塲說話非所謂盈科而後進成章而後逹也又自謂終夜思之如汚泥在面而不䏻即去果如汚泥在面有不䏻即去者乎幸甚幸甚自来南贛平生益友離羣索居切磋之間不聞近日始有薛進士軰一二人自北来稍稍各有砥礪又以討賊事急今屯兵浰頭且半月矣浰頭賊首池大鬢等二十餘人悉巳授首漏網者甲從一二軰其餘固可畧也狼兵利害相半若調猶未至且可已之此間所用皆機快之屬雖不能如狼兵之犀利且易驅筞就約束聞乳源諸賊已平蕩可喜湖兵四哨不下數萬所獲不滿二千始得子月朔日㑹勦依期而徃彼反以先期見責所謂文移時出侵語誠有之此舉本渠所倡今所俘獲反不能多意有未愜而憤激至此不足爲怪浰頭巢穴雖巳破蕩然湏建一縣治以控制之庶可永絶嘯聚之患已檄贛惠二知府㑹議可否髙見且以爲何如南贛大患惟桶岡横水浰頭三大賊幸皆以次削平年来歸思極切所恨風波漂蕩茫無涯涘乃今幸有灣泊之機知已當亦爲吾喜也乳源各處克捷有兩廣之報區區不敢冐捷然亦且湏題知事畢之日湏備始末知之近得甘泉叔賢書知二君議論既合自此吾黨之學廓然同途無復疑異矣喜幸不可言承喻日来進修警省不懈尤足以慰傾望此間朋友亦集亦頗有奮起者但惟鄙人冗疾相仍精氣日耗兼之淹滯風塵中未遂脱屣林下相與專心講習正如俳優塲中奏雅縦復音調盡協終不免扵劇戲耳乞休疏已四上鑾輿近聞且南幸以瘡疾蹔止每一奏事輒徃復三四月此畨倘得遂請亦湏冬盡春初矣後山應援之說審度事勢亦不必然但奉有詔㫖不得不一行此亦公文體面如此聞彼中議論頗不齊惟賢何以備見示區區庶可善處也近得省城及南都諸公書報云即日初十日聖駕北還且云頭船巳發不勝喜躍賤恙亦遂頓減此宗社之福天下之幸人臣之至願何喜何慰如之但區區之心猶懐隱憂或恐湏及霜䧏以後冬至以前方有的實消息其時賤恙當亦平復即可放舟東下與諸君一議地方事遂圖歸計耳聞永豐新淦白沙一帶皆被流刼該道守廵官皆宜急出督捕非但安靖地方亦可乘此機㑹整頓兵馬以預備他變今恐事勢昭彰驚動逺近且不行文書至即可與各守廵備道區區之意即時一出勿更遲遲輕忽坐視思抑歸興近却如何若必不可巳俟囬鑾信的徐圖之未晚也近得江西策問深用警惕然自反而縮固有舉世非之而不顧者矣其敢因是遂靡然自弛耶易曰知至至之知至者知也至之者致知也此知行之所以合一也若後世致知之說止說得一知字不曾說得致字此知行所以二也病彂荼苦之人巳絶口人間事念相知之篤輒復一及北行不及一面甚闕久别之懷承寄慈湖文集客冗未䏻遍觀来喻欲􅎥其尤粹者再圖翻刻甚喜但古人言論自各有見語脉牽連互有發越今欲就其中以巳意刪節之似亦甚有不易莫若盡存以俟具眼者自加分别所云超捷良如髙見今亦但當論其言之是與不是不當逆觀者之致疑反使吾心昭眀洞逹之見有所揜覆而不盡也尊意以爲何如與當道書江省之變大畧具奏内此人逆謀巳非一日久而未發盖其心懷兩圖是以遲疑未决抑亦慮生之躡其後也近聞生将赴閩必經其地巳視生爲几上肉矣頼朝廷之威靈諸老先生之徳庇竟獲脫身乕口所恨兵力寡弱不䏻有爲爾南贛舊嘗屯兵四千朝有警而夕可發近爲戸部必欲奏革商稅糧餉無所取給故遂放散未三月而有此變復欲召集非數月不能亦且空然無資矣世事之相撓阻每每如此亦何望乎今亦一面號召忠義取調各縣機快且先遣疲弱之卒張布聲勢扵豐城諸處牽躡其後天奪其魄彼果遲疑而未進若再留半月南都必已有備彼一離窠穴生将奮搗其虚使之進不得前退無所㨿勤王之師又四面漸集必成擒矣此生憶料若此切望諸老先生急賜議處速遣䏻将将重兵聲罪而南以絶其北窺之望飛召各省急興勤王之師此人兇殘忌刻世所未有使其得志天下無遺類矣諒在廟堂必有成筭區區愚誠亦不敢不竭盡生病疲尫僅存餘息近者入閩已具本乞休必不得巳且容歸省不意忽遭此變本非生之責任但闔省無一官見在人情渙散洶洶震摇使無一人牽制其間彼得安意順流而下萬一南都無備将必失守彼又分兵四掠十三郡之民素刼扵積威必向風而靡如此則湖湘閩浙皆不能保及事聞朝廷大兵南下彼之奸計漸成破之難矣以是遂忍死蹔留扵此徒以空言收拾散亡感激忠義日望命帥之来生得以輿疾還越死且瞑目伏惟諸老先生鑒其血誠必賜保全勿遂竭其力所不䏻窮其智所不及以為出身任事者之戒幸甚幸甚與汪節夫書足下數及吾門求一言之益足知好學勤勤之意人有言古之學者爲已今之學者爲人今之學者湏先有篤實爲已之心然後可以論學不然則紛紜口耳講說徒足以爲爲人之資而巳僕之不欲多言者非有所靳實無可言耳以足下之勤勤下問使誠益勵其篤實爲已之志歸而求之有餘師矣有䏻一日用其力扵仁矣乎我未見力不足者足下勉之道南之說眀道實因龜山南歸盖亦一時之言道豈有南北乎凡論古人得失莫非爲已之學誦其詩讀其書不知其人可乎是以論其世也是尚友也果䏻有所得扵尚友之實又何以斯錄爲㢤節夫姑務爲已之實無復徃年務外近名之病所得必已多矣此事尚在所緩也凡作文惟務道其心中之實逹意而止不必過求雕刻所謂脩辭立誠者也寄張世文執謙枉問之意甚盛相與數月無能爲一字之益乃今又将逺别矣愧負愧負今時友朋羙質不無而有志者絶少謂聖賢不復可冀所視以爲凖的者不過建功名炫耀一時以駭愚夫俗子之觀聽嗚呼此身可以爲尭舜叅天地而自期若此不亦可哀也乎故區區扵友朋中每以立志爲說亦知徃徃有厭其煩者然卒不䏻舍是而别有所先誠以學不立志如植木無根生意将無從發端矣自古及今有志而無成者則有之未有無志而䏻有成者也逺别無以爲贈復申其立志之說賢者不以爲迂庶勤勤執謙枉問之盛心爲不虚矣與王晉溪司馬伏惟眀公徳學政事髙一世守仁晚進雖未獲親炙而私淑之心已非一日乃者承乏鴻臚自以迂腐多疾無復可用扵世思得退歸田野苟存餘息乃䝉大賢君子不遺葑菲㧞置重地適承前官謝病之後地方亦復多事遂不敢固以疾辭巳扵正月十六日抵贛扶疾蒞任雖感恩圖報之心無不欲盡而精力智慮有所不及恐不免終爲薦舉之累耳伏惟仁人君子器使曲成責人以其所可勉而不強人以其所不能則守仁覊鳥故林之想必将有日可遂矣因遣官詣闕陳謝敬附申謝私扵門下伏冀尊照不備守仁近因輋賊大修戰具逺近勾結将遂乘虚而入乃先其未發分兵揜撲雖斬獲未盡然克全師而歸賊巢積聚亦爲一空此皆老先生申眀律例将士稍知用命以克有此不然以南贛素無紀律之兵見賊不奔亦已難矣况敢暮夜撲剿奮呼追撃功雖不多其在南贛則實創見之事矣伏望老先生特加勸賞使自此益加激勵幸甚今各巢奔潰之賊皆聚横水桶岡之間與郴桂諸賊接境生恐其勢窮或并力復出且天氣炎毒兵難深入逺攻乃分留重卒扵金坑營前扼其要害示以必攻之勢使之旦夕防守不遑他圖又潜遣人扵巳破各巢山谷間多張疑兵使旣潰之賊不敢復還舊巢聊且與之牽持候秋氣漸凉各處調兵稍集更圖後舉惟望老先生授之以成妙之筭假之以專一之權明之以賞罰之典生雖庸劣無能爲役敢不鞭筞駑鈍以期無負推舉之盛心秋冬之間地方茍幸無事得以歸全病喘扵林下老先生骨肉生死之恩生當何如爲報耶正暑伏惟爲國爲道自重不宣前月奏捷人去曾瀆短啓計已逹門下守仁才劣任重大懼覆餗爲薦揚之累近者南贛盗賊雖外若稍㝎其實譬之疽癰但未潰決至其惡毒則固日深月積将漸不可瘳治生等固庸醫又無藥石之備不過從旁撫摩調護以紓目前自非老先生發鍼下砭指示方藥安敢輕措其手冀百一之成前者申眀賞罰之請固来求鍼砭扵門下不知老先生肯賜俯從卒授起死囬生之方否也近得輋中消息云将大舉乘虚入廣盖兩廣之兵近日皆聚府江生等恐其聲東撃西亦已宻切布置将爲先事之圖但其事隱而未露未敢顯言扵朝然又不敢不以聞扵門下且聞府江不久班師則其謀亦将自阻大抵南贛兵力極爲空踈近日稍加募選訓練始得三千之數然而粮賞之資則又百未有措若夾攻之舉果行則其勢尤爲窘迫欲稱貸扵他省則他省各有軍旅之費欲加賦扵貧民則貧民又有從盗之虞惟贛州雖有鹽稅一事邇来旣奉户部明文停止但官府雖有禁止之名而奸豪實竊私通之利又鹽利下通扵三府皆民情所深願而官府稍取其什一亦商人所悅從用是輙因官僚之議仍舊抽放盖事機窘迫勢不得巳然亦不加賦而財足不擾民而事辦比之他圖固猶計之得者也今特具以聞奏伏望老先生曲賜扶持使兵事得頼此以濟實亦地方生靈之幸生等得免扵失機誤事之誅其爲感幸尤深且大矣自非老先生體國憂民之至何敢每事控聒若此伏冀垂照不具生扵前月二十日地方偶獲微功巳扵是月初二日具本聞奏差人旣發始領部咨知夾攻巳有成命前者嘗具兩可之奏不敢專主夾攻者誠以前此三省嘗爲是舉乃徃復勘議動經歲月形跡顯暴事未及舉而賊巳奔竄大半今老先生畧去繁文之擾行以實心㫁以大義一決而㝎機速事果則夾攻之舉固亦未嘗不善也凡敗軍僨事皆緣政出多門每行一事旣禀廵撫復禀鎭守復禀廵按徃返需遲之間謀慮旣泄事機巳去昨睹老先生所議謂閫外兵權貴在專委征伐事宜切忌遥制且復除去總制之名使各省事有專責不令掣肘致相推托眞可謂一洗近年瑣屑牽擾之弊非有大公無我之心發強剛毅者孰䏻與扵斯矣廟堂之上得如老先生者爲之張主人亦孰不樂爲之用乎幸甚幸甚今各賊巢穴之近江西者盖巳焚毁大半但擒斬不多徒黨尚盛其在廣東湖廣者猶有三分之一若平日相機揜撲則賊勢分而兵力可省今欲大舉賊且并力合勢非有一倍之衆未可輕議攻圍况南贛之兵素稱疲弱見賊而奔乃其長技廣湖所用皆土官狼兵賊所素畏夾攻之日勢必偏潰江西今欲請調狼兵以當其鋒非惟慮其所過殘掠兼恐緩不及事生近以漳南之役親見上杭程鄊兩處機快頗亦可用且在撫屬之内故今特調二縣各一千名并凑南贛新集起倩共爲一萬二千之數若以軍法五攻之例必湏三省合兵十萬而後可但南贛糧餉無措不得已而從減省若此伏望老先生特賜允可若更少損其數㫁然力不足以支㓂矣腐儒小生素不習兵勉強當事惟恐覆公之餗伏惟老先生憫其不逮敎以方畧使得有所持循幸甚幸甚守仁始至贛即因閩㓂猖獗遂徃督兵故前者瀆奉謝啓極爲草畧迄今以爲罪閩㓂之始亦不甚多大軍旣集乃連絡四面而起㡬不可支今者偶獲成功皆頼廟堂徳威成筭不然且不免扵罪累矣幸甚守仁腐儒小生實非可用之才盖未承南贛之乏已嘗告病求退後以托疾避難之嫌遂不敢固請黽勉至此實恐得罪扵道徳負薦舉之盛心耳伏惟終賜指教而曲成之幸甚幸甚今閩㓂雖平而南贛之㓂又數倍扵閩且地連四省事權不一兼之勅㫖又有不與民事之說故雖虚擁廵撫之名而其實號令之所及止扵贛州一城然且尚多牴牾是亦非皆有司者敢扵違抗之罪事勢使然也今爲南贛止可因仍坐視稍欲舉動便有掣肘守仁竊以南贛之廵撫可無特設止存兵備而統扵兩廣之總制庻㡬事體可以歸一不然則江西之廵撫雖三省之務尚有牽碍而南贛之事猶可自專一應軍馬錢糧皆得通融裁處而預爲之所猶勝扵今之廵撫無事則開雙眼以坐視有事則空兩手以待人也夫弭盗所以安民而安民者弭盗之本今責之以弭盗而使無與于民猶專以藥石攻病而不復問其飲食調適之宜病有日增而巳矣今廵撫之改革事體關係或非一人私議之間便可更㝎惟有申眀賞罰猶可以稍重任使之權而因以畧舉其職故今輒有是奏伏惟特賜採擇施行則非獨生一人得以稍逭罪戮地方之困亦可以少蘇矣非恃道誼深愛何敢冐瀆及此萬冀鑒恕不宣即日伏惟經綸邦政之暇台候萬福守仁學徒慕古識乏周時謬膺簡用懼弗負荷祗命以来推尋釀㓂之由率因姑息之弊所敢陳請實恃知已乃蒙天聽並賜允從蕃錫寵右恩與至重是非執事器使曲成奨飾接引何以得此守仁無似敢不勉奮庸劣遵禀成畧冀收微効以上答聖眷且報所自乎兹當發師匆遽陳謝伏惟台照不備生惟君子之扵天下非知善言之爲難而能用善言之爲難舜在深山之中與木石居鹿豕逰其所以異扵深山之野人者㡬希舜亦何以異扵人㢤至其聞一善言見一善行沛然若決江河莫之能禦然後見其與世之人相去甚逺耳今天下知謀才辯之士其所思慮謀猷亦無以大相逺者然多蔽而不知或雖知而不能用或雖用而不相決雷同附和求其的然眞見其孰爲可行孰爲不可行孰爲似迂而實切孰爲似是而實非㫁然施之扵用如神醫之用藥寒暑虚實惟意所投而莫不有以曲中其機此非有眀睿之資正大之學剛直之氣其孰䏻與扵此若此者豈惟後世之所難能雖古之名世大臣盖亦未之多聞也守仁每誦眀公之所論奏見其洞察之眀剛果之㫁妙應無方之知燦然剖析之有條而正大光眀之學凛然理義之莫犯未嘗不拱手起誦歆仰嘆服自其識事以来見世之名公巨卿負盛望扵當代者其所論列在尋常亦有可觀至扵當大疑臨大利害得䘮毁譽眩瞀扵前力不䏻正即依違兩可揜覆文飾以幸無事求其卓然之見浩然之氣沛然之詞如眀公之片言者無有矣在其平時眀公雖已自有以異扵人人固猶若無以大異者必至扵是而後見其相去之甚逺也守仁恥爲佞詞以䛕人若眀公者古之所謂社稷大臣負王佐之才臨大節而不可奪者非眀公其誰歟守仁後進迂劣何幸辱在驅筞之末奉令承教以効其尺寸所謂駑駘遇伯樂而獲進扵百里其爲感幸何如㢤邇者龍川之役亦幸了事窮本推原厥功所自巳畧具扵奏末不敢復縷縷所恨福薄之人難與成功雖仰頼方畧僥倖塞責而病患日深已成廢棄昨日乞休疏入輒嘗恃愛控其懇切之情日夜瞻望允報伏惟眀公終始曲成使得稍慰老父衰病之懷而百歲祖毋亦獲一見爲訣死生骨肉之恩生當何如爲報耶情隘詞迫乞冀矜亮死罪死罪近領部咨見老先生之扵守仁可謂心無不盡而凡其平日見扵論奏之間者亦巳無一言之不酬雖上公之爵萬户侯之封不䏻加扵此矣自度鄙劣何以克堪感激之私中心藏之不能以言謝然守仁之所以隱忍扶疾身被鋒鏑出百死一生以赴地方之急者亦豈苟圖旌賞希階級之榮而巳㢤誠感老先生之知愛期無負扵薦揚之言不愧稱知巳扵天下而巳矣今雖不䏻大建竒偉之績以仰答知遇亦幸苟無撓敗戮辱遺繆舉之羞扵門下則守仁之罪責亦巳少塞而志願亦可以無大憾矣復何求㢤復何求㢤伏惟老先生愛人以徳器使曲成不責人以其所不備不強人以其所不䏻則凡才薄福尫羸疾廢如某者庶可以遂其骸骨之請矣乞休䟽待報已三月尚杳未有聞歸魂飛越夕不能旦伏望憫其迫切之情早賜允可是所謂生死而骨肉者也感徳當何如耶輒有私梗仰恃知愛敢以控陳近日三省用兵之費廣湖兩省皆不下十餘萬生處所乞止扵三萬實皆分毫扣筭不敢稍存贏餘已蒙老先生洞察其隱極力扶持盡賜准允後戸部復見沮抑以故昨者進兵之際凡百皆臨期那借屑凑殊爲窘急頼老先生指授幸而兩月之内偶克成功不然決致敗事矣此雖已遂之事然生必欲一鳴其情者竊恐因此遂誤他日事耳又南贛盗賊巢穴雖幸破蕩而漏殄殘黨難保必無兼之地連四省深山盤谷迯流之民不時嘯聚輒採民情議扵横水大寨請建縣治爲久安之圖乘間經營已畧有㳄第守仁迂踈病懶扵凡勞役之事實有不堪但籌度事勢有不得不然者是以不敢以病軀欲歸之故閉遏其事而不可聞苟幸目前之塞責而巳也伏惟老先生并賜裁度施行幸甚守仁不肖過䝉薦奨終始曲成言無不行請無不得旣假以賞罰之權復委以提督之任授之方畧指其迷謬是以南贛數十年桀鷔難攻之賊兩月之内掃蕩無遺是豈駑劣若守仁者之所䏻㢤昔人有言追獲獸兎功狗也發縦指示功人也守仁頼眀公之發縦指示不但得免扵撓敗之戮而又且與扵追獲獸兎之功感恩懷徳未知此生何以爲報也因奏捷人去先布下懇俟兵事稍間尚當具啓修謝伏惟爲國爲道自重不宣邇者南贛盗賊遂獲底㝎實皆老先生㝎議授筭以克有此生軰不過遵守奉行之而巳何功之有而敢冐受重賞乎伏惟老先生槖籥元和含洪無迹乃欲歸功扵生物物惟不自知其生之所自焉爾苟知其生之所自其敢自以爲功乎是自絶其生也已拜命之餘不勝慚懼輒具本辭免非敢茍爲遜避實其中心有不自安者陞官則已過甚又加之廕子若之何其䏻當之負且乘致㓂至生非無貪得之心切懼㓂之将至也伏惟老先生鑒其不敢自安之誠特賜允可使得仍以原職致事而去是乃所以曲成而保全之也感刻當何如㢤瀆冐尊威死罪死罪憂危之際不敢數奉起居然此心未嘗一日不在門墻也事窮勢極臣子至此惟有痛哭流涕而巳可如何㢤生前者屢乞省葬盖猶有隱忍苟全之望今旣未可得以微罪去歸田里即大幸矣素䝉知愛之深敢有虚妄神眀誅殛惟鑒其哀懇特賜曲成生死骨肉之感也地方事決知無䏻爲巳閉門息念袖手待盡矣惟是苦痛切膚未免復爲一控亦聊以盡吾心焉爾臨啓悲愴不知所云自去冬畏途多沮遂不敢數數奉啓感刻之情無由一逹繆劣多忤尚獲曲全非老先生何以得此中心藏之何日忘之誦此而巳何䏻圖報㢤江西之民困苦巳極其間情状計巳傳聞無俟復喋今騷求旣未有艾錢糧又不得免其變可立待去歲首爲控奏旣未蒙㫖繼爲申請又不得逹今兹事窮勢極只得冐罪復請伏望憫地方之塗炭爲朝廷深憂逺慮得與速免以救燃眉幸甚幸甚生之乞歸省葬去秋巳䝉賊平来說之㫖冬底復請至今未奉允報生之汲汲爲此非獨情事苦切亦欲因此稍避怨嫉素蒙老先生道誼骨肉之愛無所不至扵此獨忍不一舉手投足爲生全之地乎今地方事殘破憊極其間宜修舉者百端去歲嘗繆申一二奏皆中途被沮而歸繼是而後遂以形迹之嫌不敢復有所建白兼賤恙日尫瘠又以父老憂危致疾之故神志恍恍終日如在夢寐中今雖復還省城不過閉門昏卧服藥喘息而巳此外人事都不復省况能爲地方救灾拯難有所裨益扵時乎所以復有蠲租之請者正如夢中人被錐刺未能不知疼痛縦其手足撲療不及亦復一呻吟耳老先生幸憐其志哀其情速免征科以解地方之倒懸一允省塟之乞使生得歸全首領扵牖下則闔省䝉更生之徳生父子一家受骨肉之恩舉含刻扵無涯矣昏懵中控訴無敘臨啓不勝愴慄屢奉啓皆中途被沮無由上逹幸其間乃無一私語可以質諸鬼神自是遂不敢復具然此顚頓窘局苦切屈抑之情非筆舌可盡者必蒙憫照當不俟控籲而悉也日来嘔血飲食頓減潮熱夜作自計決非久扵人世者望全始終之愛使得早還故鄊萬一茍延餘息生死骨肉之恩當何如圖報耶餘情張御史當亦䏻悉伏祈垂亮不備比兵部差官来賫示批札開諭勤惓佐亦隨至備傳垂念之厚昔人有云公之知我勝扵我之自知若公今日之愛生實乃勝扵生之自愛也感報當何如㢤眀公一身係宗社安危持衡甫旬月畧示舉動巳足以大慰天下之望矣百凡起居尤望倍常愼宻珍攝非獨守仁之私幸也佐且復北當有别啓差官囬便輒先附謝伏惟台鑒不具與陸清伯書屢得書見淸伯所以省愆罪巳之意可謂眞切懇到矣即此便是清伯本然之良知凡人之爲不善者雖至扵逆理亂常之極其本心之良知亦未有不自知者但不能致其本然之良知是以物有不格意有不誠而卒入扵小人之歸故凡致知者致其本然之良知而巳大學謂之致知格物在書謂之精一在中庸謂之愼獨在孟子謂之集義其工夫一也向在南都嘗謂清伯喫緊扵此清伯亦自以爲旣知之矣近覩来書徃徃似尚未悟輒復贅此清伯更精思之大學古本一冊寄去時一覽近因同志之士多扵此處不甚理會故序中特改數語有得便中冩知之季惟乾事善類所共冤望爲委曲周旋之與許台仲書榮擢諌垣聞之喜而不寐非爲台仲喜得此官爲朝廷諌垣喜得台仲也孟子云人不足與適也政不足與間也惟大人爲能格君心之非一正君而國㝎矣碌碌之士未論其言之若何苟言焉亦足尚矣若夫君子之志扵學者必時然後言而後可又不專以敢言爲貴也去惡先其甚者顚倒是非固巳得罪扵名教若搜羅瑣屑亦君子之所恥矣尊意以爲何如向時格致之說近来用工有得力處否若扵此見得眞切即所謂一以貫之如前所云亦爲瑣瑣矣又吾子累然憂服之中顧勞垂念至勤賢郎以書幣逺及其何以當其何以當道不可湏臾而離故學不湏臾而間居䘮亦學也而䘮者以荒迷自居言不能無荒迷爾學則不至扵荒迷故曰䘮事不敢不勉寧戚之說爲流俗忘本者言也喜怒哀樂發皆中節之謂和哀亦有和焉發扵至誠而無所乖戾之謂也夫過情非和也動氣非和也有意必扵其間非和也孺子終日啼而不嗌和之至也知此則知居䘮之學固無所異扵平居之學矣聞吾子近日有過毁之憂輒敢以是奉告幸圖其所謂大孝者可也與林見素執事孝友之行淵博之學俊偉之才正大之氣忠貞之節某自弱冠從家君扵京師幸接比鄰又獲與令弟相徃復其時固巳熟聞習見心恱而誠服矣第以薄劣之資未敢數數有請其後執事徳益盛望益隆功業益顯地益逺某企仰益切雖欲忘其薄劣一至君子之庭以濡咳唾之餘又益不可得矣執事中遭讒嫉退處丘園天下之士凡有知識莫不爲之扼腕不平思一致其勤惓而况某素切向慕者當如何爲心顧終嵗奔走扵山夷海獠之區力不任重日不暇給無由一申起居徒時時扵交㳺士夫間竊執事之動履消息皆以爲人不堪其憂憤而執事處之恬然從容禮樂之間與平居無異易所謂時困而徳辨身退而道亨扵執事見之矣聖天子維新政化復起執事寄之股肱誠以慰天下之望此盖宗社生民之慶不獨知㳺之幸善類之光而已也正欲作一書畧序其前後傾企紆鬱未伸之懐并致其歡欣慶忭之意值時歸省老親冗病交集尚爾未能而區區一時僥倖之功連年屈辱之志乃䝉爲之申理誘掖過情而褒賞踰分又特遣人馳報慰諭此固執事平日與人爲善之素心大公無我之盛節顧淺陋卑劣其将何以承之乎感激惶悚莫知攸措使還冗劇草草畧布下悃至扵恩命之不敢當厚徳之未能謝者尚容專人特啓不具與楊䆳菴某之繆辱知愛盖非一朝一夕矣自先君之始托交扵門下至扵今且四十餘年父子之間受惠扵不知蒙施扵無迹者何可得而勝舉就其顯然可述不一而足者則如先君之爲祖母乞塟祭也則因而施及其祖考某之承乏扵南贛而行事之難也則因而改授以提督其在廣會征偶獲微功而見詘扵當事也則竟違衆議而申之其在西江幸夷大憝而見搆扵權奸也則委曲調護旣允全其身家又因維新之詔而特爲之表揚暴白扵天下力主非常之典加之以顯爵其因便道而告乞歸省也則旣嘉允其奏而復優之以存問其頒封爵之典也出非望之恩而遂推及其三代此不待人之請不由有司之議傍無一人可致纎毫之力而獨出扵執事之心者恩徳之深且厚也如是受之者宜何如爲報乎夫人有徳扵巳而不知以報者草木鳥獸也櫟之樹隨之蛇尚有靈焉人也而顧草木鳥獸之弗若耶顧無所可效其報者惟中心藏之而巳中心藏之而輒復言之懼執事之謂其藐然若罔聞知而遂以草木視之也邇者先君不幸大故有司以不肖孤方煢然在疚謂其且無更生之望遂以塟祭贈謚爲之代請頗爲該部所抑而朝廷竟與之以塟祭是執事之心何所不容其厚㢤乃今而復有無厭之乞雖亦其情之所不得巳實恃知愛之篤遂徑其情而不復有所諱忌嫌沮是誠有類扵藐然若罔聞知者矣事之顚末别具附啓惟執事始終其徳而不以之為戮也然後敢舉而行之與蕭子雍繆妄迂踈多招物議乃其宜然每勞知已爲之憂念不平徒增悚赧耳荼毒未死之人此身巳非巳有况其外之毁譽得䘮又敢與之乎哀痛稍蘇時與希淵一二友喘息扵荒榛叢草間惴惴焉惟免扵戮辱是幸他更無復願矣近惟教化大行巳不負平時祝望知者不慮其不眀而慮其過察果者不慮其無㫁而慮其過嚴若夫尊徳樂義激濁揚清以丕變陋習吾與昔人可無間然矣盛价還草草無次與徳洪大學或問數條非不願共學之士盡聞斯義顧恐藉㓂兵而賫盗糧是以未欲輕出且願諸公與海内同志口相授受矣其有風機之動然後刻之非晚也此意嘗與謙之面論當能相悉也江廣兩途湏至杭城始決若從西道又得與謙之一話扵金焦之間冗甚不及冩書幸轉致其畧王文成公全書卷之二十七終
