之節如何而為奉飬之宜須求箇是當方是至善所以有學問思辨之功先生曰若只是溫淸之節奉飬之宜可一日二日講之而盡用得甚學問思辨惟於溫凊時也只要此心純乎天理之極奉飬時也只要此心純乎天理之極此則非有學問思辨之功將不免於毫釐千里之繆所以雖在聖人猶加精一之訓若只是那些儀節求得是當便謂至善即如今扮戲子扮得許多溫凊奉飬的儀節是當亦可謂之至善矣愛於是日又有省愛因未會先生知行合一之訓與宗賢惟賢往復辨論未能決以問於先生先生曰試舉看愛曰如今人儘有知得父當孝兄當弟者却不能孝不能弟便是知與行分明是兩件先生曰此巳被私欲隔斷不是知行的本體了未有知而不行者知而不行只是未知聖賢教人知行正是要復那本體不是著你只恁的便罷故大學指箇真知行與人看説如好好色如惡惡臭見好色屬知好好色屬行只見那好色時巳自好子不是見了後又立箇心去好聞惡臭屬知惡惡臭屬行只聞那惡臭時已自惡了不是聞了後别立箇心去惡如鼻塞人雖見惡臭在前鼻中不曾聞得便亦不甚惡亦只是不曾知臭就如稱某人知孝某人知弟必是其人已曾行孝行弟方可稱他知孝知弟不成只是曉得説些孝弟的話便可稱為知孝弟又如知痛必已自痛了方知痛知寒必巳自寒了知飢必巳自飢了知行如何分得開此便是知行的本體不曾有私意隔斷的聖人教人必要是如此方可謂之知不然只是不曾知此却是何等緊切著實的工夫如今苦苦定要説知行做兩箇是甚麼意某要説做一箇是甚麼意若不知立言宗旨只管説一箇兩箇亦有甚用愛曰古人説知行做兩箇亦是要人見箇分曉一行做知的功夫一行做行的功夫即功夫始有下落先生曰此却失了古人宗旨也某嘗説知是行的主意行是知的功夫知是行之始行是知之成若會得時只説一箇知已自有行在只説一箇行已自有知在古人所以既説一箇知又説一箇行者只為世間有一種人懵懵懂懂的任意去做全不解思惟省察也只是箇冥行妄作所以必説箇知方才行得是又有一種人茫茫蕩蕩懸空去田索全不肯著實躬行也只是箇揣摸影響所以必説一箇行方才知得真此是古人不得已輔偏救弊的説話若見得這箇意時即一言而足今人却就將知行分作兩件去做以為必先知了然後能行我如今且去講習討論做知的工夫待知得真了方去做行的工夫故遂終身不行亦遂終身不知此不是小病痛其來已非一日矣某今説箇知行合一正是對病的藥又不是某鑿空杜撰知行本體原是如此今若知得宗旨時即説兩箇亦不妨亦只是一箇若不會宗旨便説一箇亦濟得甚事只是間説話愛問昨聞先生止至善之教已覺功夫有用力處但與朱子格物之訓思之終不能合先生曰格物是止至善之功既知至善即知格物矣愛曰昨以先生之教推之格物之説似亦見得大略但朱子之訓其於書之精一論語之博約孟子之盡心知性皆有所證據以是未能釋然先生曰子夏篤信聖人曾子反求諸已篤信固亦是然不如反求之切今既不得於心安可狃於舊聞不求是當就如朱子亦尊信程子至其不得於心處亦何嘗苟從精一博約盡心本自與吾説吻合但未之思耳朱子格物之訓未免牽合附會非其本旨精是一之功博是約之功曰仁既明知行合一之説此可一言而喻盡心知性知天是生知安行事存心飬性事天是學知利行事夭夀不二修身以俟是困知勉行事朱子錯訓格物只為倒看了此意以盡心知性為物格知至要初學便去做生知安行事如何做得愛問盡心知性何以為生知安行先生曰性是心之體天是性之原盡心即是盡性惟天下至誠為能盡其性知天地之化育存心者心有未盡也知天如知州知縣之知是自巳分上事巳與天為一事天如子之事父臣之事君須是恭敬奉承然後能無失尚與天為二此便是聖賢之别至於夭夀不二其心乃是教學者一心為善不可以窮通夭夀之故便把為善的心變動了只去修身以俟命見得窮通夀夭有箇命在我亦不必以此動心事天雖與天為二已自見得箇天在面前俟命便是未曾見面在此等候相似此便是初學立心之始有箇困勉的意在今却倒做了所以使學者無下手處愛曰昨聞先生之教亦影影見得功夫須是如此今聞此説益無可疑愛昨曉思格物的物字即是事字皆從心上説先生曰然身之主宰便是心心之所發便是意意之本體便是知意之所在便是物如意在於事親即事親便是一物意在於事君即事君便是一物意在於仁民愛物即仁民愛物便是一物意在於視聽言動即視聽言動便是一物所以某説無心外之理無心外之物中庸言不誠無物大學明明德之功只是箇誠意誠意之功只是箇格物先生又曰格物如孟子大人格君心之格是去其心之不正以全其本體之正但意念所在即要去其不正以全其正即無時無處不是存天理即是窮理天理即是明德窮理即是明明德又曰知是心之本體心自然會知見父自然知孝見兄自然知弟見孺子入井自然知惻隱此便是良知不假外求若良知之發更無私意障礙即所謂充其惻隱之心而仁不可勝用矣然在常人不能無私意障礙所以須用致知格物之功勝私復理即心之良知更無障礙得以充塞流行便是致其知知致則意誠愛問先生以博文為約禮功夫深思之未能得略請開示先生曰禮字即是理字理之發見可見者謂之文文之隱微不可見者謂之理只是一物約禮只是要此心純是一箇天理要此心純是天理須就理之發見處用功如發見於事親時就在事親上學存此天理發見於事君時就在事君上學存此天理發見於處富貴貧賤時就在處富貴貧賤上學存此天理發見於處患難夷狄時就在處患難夷狄上學存此天理至於作止語默無處不然隨他發見處即就那上面學箇存天理這便是博學之於文便是約禮的功夫博文即是惟精約禮即是惟一愛問道心常為一身之主而人心每聽命以先生精一之訓推之此語似有弊先生曰然心一也未雜於人謂之道心雜以人偽謂之人心人心之得其正者即道心道心之失其正者即人心初非有二心也程子謂人心即人欲道心即天理語若分析而意實得之今曰道心為主而人心聽命是二心也天理人欲不並立安有天理為主人欲又從而聽命者愛問文中子韓退之先生曰退之文人之雄耳文中子賢儒也後人徒以文詞之故推尊退之其實退之去文中子逺甚愛問何以有擬經之失先生曰擬經恐未可盡非且説後世儒者著述之意與擬經如何愛曰世儒著述近名之意不無然期以明道擬經純若為名先生曰著述以明道亦何所效法曰孔子刪述六經以明道也先生曰然則擬經獨非效法孔子乎愛曰著述即於道有所發明擬經似徒擬其迹恐於道無輔先生曰子以明道者使其反朴還淳而見諸行事之實乎抑將美其言辭而徒以譊譊於世也天下之大亂由虛文勝而實行衰也使道明於天下則六經不必述刪述六經孔子不得巳也自伏羲畫卦至於文王周公其間言易如連山歸藏之屬紛紛籍籍不知其幾易道大亂孔子以天下好文之風日盛知其説之將無紀極於是取文王周公之説而贊之以為惟此為得其宗於是紛紛之説盡廢而天下之言易者始一書詩禮樂春秋皆然書自典謨以後詩自二南以降如九丘八索一切淫哇逸蕩之詞蓋不知其幾千百篇禮樂之名物度數至是亦不可勝窮孔子皆刪削而述正之然後其説始廢如書詩禮樂中孔子何嘗加一語今之禮記諸説皆後儒附會而成巳非孔子之舊至於春秋雖稱孔子作之其實皆魯史舊文所謂筆者筆其舊所謂削者削其繁是有減無增孔子述六經懼繁文之亂天下惟簡之而不得使天下務去其文以求其實非以文教之也春狄以後繁文益盛天下益亂始皇焚書得罪是出於私意又不合焚六經若當時志在明道其諸反經叛理之説悉取而焚之亦正暗合刪述之意自秦漢以降文又日盛若欲盡去之斷不能去只宜取法孔子録其近是者而表章之則其諸怪悖之説亦宜漸漸自廢不知文中子當時擬經之意如何某切深有取於其事以為聖人復起不能易也天下所以不治只因文盛實衰人出巳見新奇相高以眩俗取譽徒以亂天下之聰明塗天下之耳目使天下靡然爭務修飾文詞以求知於世而不復知有敦本尚實反朴還淳之行是皆著述者有以啓之愛曰著述亦有不可缺者如春秋一經若無左傳恐亦難曉先生曰春秋必待傳而後明是歇後謎語矣聖人何苦為此艱深隱晦之詞左傳多是魯史舊文若春秋須此而後明孔子何必削之愛曰伊川亦云傳是案經是斷如書弒某君伐某國若不明其事恐亦難斷先生曰伊川此言恐亦是相沿世儒之説未得聖人作經之意如書弒君即弒君便是罪何必更問其弒君之詳征伐當自天子出書伐國即伐國便是罪何必更問其伐國之詳聖人述六經只是要正人心只是要存天理去人欲於存天理去人欲之事則嘗言之或因人請問各隨分量而説亦不肯多道恐人專求之言語故曰豫欲無言若是一切縱人欲滅天理的事又安肯詳以示人是長亂導姦也故孟子云仲尼之門無道桓文之事者是以後世無傳焉此便是孔門家法世儒只講得一箇伯者的學問所以要知得許多隂謀詭計純是一片功利的心與聖人作經的意思正相反如何思量得通因嘆曰此非逹天德者未易與言此也又曰孔子云吾猶及史之闕文也孟子云盡信書不如無書吾於武成取二三策而已孔子刪書於唐虞夏四五百年間不過數篇豈更無一事而所述止此聖人之意可知矣聖人只是要刪去繁文後儒却只要添上愛曰聖人作經只是要去人欲存天理如五伯以下事聖人不欲詳以示人則誠然矣至如堯舜以前事如何略不少見先生曰羲黃之世其事濶踈傳之者鮮矣此亦可以想見其時全是淳龎朴素略無文采的氣象此便是太古之治非後世可及愛曰如三墳之類亦有傳者孔子何以刪之先生曰縱有傳者亦於世變漸非所宜風氣益開文采日勝至於周末雖欲變以夏商之俗巳不可挽况唐虞乎又况羲黃之世乎然其治不同其道則一孔子於堯舜則祖述之於文武則憲章之文武之法即是堯舜之道但因時致治其設施政令巳自不同即夏商事業施之於周巳有不合故周公思兼三王其有不合仰而思之夜以繼日况太古之治豈復能行斯固聖人之所可略也又曰專事無為不能如三王之因時致治而必欲行以太古之俗即是佛老的學術因時致治不能如三王之一本於道而以功利之心行之即是伯者以下事業後世儒者許多講來講去只是講得箇伯術又曰唐虞以上之治後世不可復也略之可也三代以下之治後世不可法也削之可也惟三代之治可行然而世之論三代者不明其本而徒事其末則亦不可復矣愛曰先儒論六經以春秋為史史專記事恐與五經事體終或稍異先生曰以事言謂之史以道言謂之經事即道道即事春秋亦經五經亦史易是包犧氏之史書是堯舜以下史禮樂是三代史其事同其道同安有所謂異又曰五經亦只是史史以明善惡示訓戒善可為訓者特存其迹以示法惡可為戒者存其戒而削其事以杜姦愛曰存其迹以示法亦是存天理之本然削其事以杜姦亦是遏人欲於將萌否先生曰聖人作經固無非是此意然又不必泥著文句愛又問惡可為戒者存其戒而削其事以杜姦何獨於詩而不刪鄭衛先儒謂惡者可以懲創人之逸志然否先生曰詩非孔門之舊本矣孔子云放鄭聲鄭聲淫又曰惡鄭聲之亂雅樂也鄭衛之音亡國之音也此是孔門家法孔子所定三百篇皆所謂雅樂皆可奏之郊廟奏之鄉黨皆所以宣暢和平涵泳德性移風易俗安得有此是長淫導姦矣此必秦火之後世儒附會以足三百篇之數蓋淫泆之詞世俗多所喜傳如今閭巷皆然惡者可以懲創人之逸志是求其説而不得從而為之辭愛因舊説汨沒始聞先生之教實是駭愕不定無入頭處其後聞之既久漸知反身實踐然後始信先生之學為孔門嫡傳舍是皆傍蹊小徑斷港絶河失如説格物是誠意的工夫明善是誠身的工夫窮理是盡性的工夫道問學是尊德性的工夫博文是約禮的工夫惟精是惟一的工夫諸如此類始皆落落難合其後思之既久不覺手舞足蹈右曰仁所録陸澄問主一之功如讀書則一心在讀書上接客則一心在接客上可以為主一乎先生曰好色則一心在好色上好貨則一心在好貨上可以為主一乎是所謂逐物非主一也主一是專主一箇天理問立志先生曰只念念要存天理即是立志能不忘乎此久則自然心中凝聚猶道家所謂結聖胎也此天理之念常存馴至於美大聖神亦只從此一念存飬擴充去耳日間工夫覺紛擾則靜坐覺懶看書則且看書是亦因病而藥處朋友務相下則得益相上則損孟源有自是好名之病先生屢責之一日警責方巳一友自陳日來工夫請正源從傍曰此方是尋著源舊時家當先生曰爾病又發源色變議擬欲有所辨先生曰爾病又發因喻之曰此是汝一生大病根譬如方丈地內種此一大樹雨露之滋土脈之力只滋飬得這箇大根四傍縱要種些嘉榖上面𬒳此樹葉遮覆下面𬒳此樹根盤結如何生長得成須用伐去此樹纎根勿留方可種植嘉種不然任汝耕耘培壅只是滋飬得此根問後世著述之多恐亦有亂正學先生曰人心天理渾然聖賢筆之書如寫真傳神不過示人以形狀大略使之因此而討求其真耳其精神意氣言笑動止固有所不能傳也後世著述是又將聖人所畫摹倣謄寫而妄自分析加增以逞其技其失真愈逺矣問聖人應變不窮莫亦是預先講求否先生曰如何講求得許多聖人之心如明鏡只是一箇明則隨感而應無物不照未有已往之形尚在未照之形先具者若後世所講却是如此是以與聖人之學大背周公制禮作樂以文天下皆聖人所能為堯舜何不盡為之而待於周公孔子刪述六經以詔萬世亦聖人所能為周公何不先為之而有待於孔子是知聖人遇此時方有此事只怕鏡不明不怕物來不能照講求事變亦是照時事然學者却須先有箇明的工夫學者惟患此心之未能明不患事變之不能盡曰然則所謂沖漠無朕而萬象森然已具者其言何如曰是説本自好只不善看亦便有病痛義理無定在無窮盡吾與子言不可以少有所得而遂謂止此也再言之十年二十年五十年未有止也他日又曰聖如堯舜然堯舜之上善無盡惡如桀紂然桀紂之下惡無盡使桀紂未死惡寧止此乎使善有盡􆁏文王何以望道而未之見問靜時亦覺意思好才遇事便不同如何先生曰是徒知靜飬而不用克巳工夫也如此臨事便要傾倒人須在事上磨方立得住方能靜亦定動亦定問上逹工夫先生曰後儒教人才涉精微便謂上逹未當學且説下學是分下學上逹為二也夫目可得見耳可得聞口可得言心可得思者皆下學也目不可得見耳不可得聞口不可得言心不可得思者上逹也如木之栽培灌溉是下學也至於日夜之所息條逹暢茂乃是上逹人安能預其力哉故凡可用功可告語者皆下學上逹只在下學裏凡聖人所説雖極精微俱是下學學者只從下學裏用功自然上逹去不必别尋箇上逹的工夫持志如心痛一心在痛上豈有工夫説間話管間事問惟精惟一是如何用功先生曰惟一是惟精主意惟精是惟一功夫非惟精之外復有惟一也精字從米姑以米譬之要得此米純然潔白便是惟一意然非加舂簸篩揀惟精之工則不能純然潔白也舂簸篩揀是惟精之功然亦不過要此米到純然潔白而已博學審問慎思明辨篤行者皆所以為惟精而求惟一也他如博文者即約禮之功格物致知者即誠意之功道問學即尊德性之功明善即誠身之功無二説也知者行之始行者知之成聖學只一箇功夫知行不可分作兩事􅃮雕開曰吾斯之未能信夫子説之子路使子羔為費宰子曰賊夫人之子曾點言志夫子許之聖人之意可見矣問寧靜存心時可為未發之中否先生曰今人存心只定得氣當其寧靜時亦只是氣寧靜不可以為未發之中曰未便是中莫亦是求中功夫曰只要去人欲存天理方是功夫靜時念念去人欲存天理動時念念去人欲存天理不管寧靜不寧靜若靠那寧靜不惟漸有喜靜厭動之弊中間許多病痛只是潛伏在終不能絶去遇事依舊滋長以循理為主何嘗不寧靜以寧靜為主未必能循理問孔門言志由求任政事公西赤任禮樂多少實用及曾晳説來却似要的事聖人却許他是意何如曰三子是有意必有意必便偏著一邊能此未必能彼曾點這意思却無意必便是素其位而行不願乎其外素夷狄行乎夷狄素患難行乎患難無入而不自得矣三子所謂汝器也曾點便有不器意然三子之才各卓然成章非若世之空言無實者故夫子亦皆許之問知識不長進如何先生曰為學須有本原須從本原上用力漸漸盈科而進仙家説嬰兒亦善譬嬰兒在母腹時只是純氣有何知識出胎後方始能啼既而後能笑又既而後能識認其父母兄弟又既而後能立能行能持能負卒乃天下之事無不可能皆是精氣日足則筋力日強聰明日開不是出胎日便講求推尋得來故須有箇本原聖人到位天地育萬物也只從喜怒哀樂未發之中上飬來後儒不明格物之説見聖人無不知無不能便欲於初下手時講求得盡豈有此理又曰立志用功如種樹然方其根芽猶未有幹及其有幹尚未有枝枝而後葉葉而後花實初種根時只管栽培灌溉勿作枝想勿作葉想勿作花想勿作實想懸想何益但不忘栽培之功怕沒有枝葉花實問看書不能明如何先生曰此只是在文義上穿求故不明如此又不如為舊時學問他到看得多解得去只是他為學雖極解得明曉亦終身無得須於心體上用功凡明不得行不去須反在自心上體當即可通蓋四書五經不過説這心體這心體即所謂道心體明即是道明更無二此是為學頭腦處虛靈不昧衆理具而萬事出心外無理心外無事或問晦庵先生曰人之所以為學者心與理而巳此語如何曰心即性性即理下一與字恐未免為二此在學者善觀之或曰人皆有是心心即理何以有為善有為不善先生曰惡人之心失其本體問析之有以極其精而不亂然後合之有以盡其大而無餘此言如何先生曰恐亦未盡此理豈容分析又何須湊合得聖人説精一自是盡省察是有事時存飬存飬是無事時省察澄嘗問象山在人情事變上做工夫之説先生曰除了人情事變則無事矣喜怒哀樂非人情乎自視聽言動以至富貴貧賤患難死生皆事變也事變亦只在人情裏其要只在致中和致中和只在謹獨澄問仁義禮智之名因巳發而有曰然他日澄曰惻隱羞惡辭讓是非是性之表德邪曰仁義禮智也是表德性一而巳自其形體也謂之天主宰也謂之帝流行也謂之命賦於人也謂之性主於身也謂之心心之發也遇父便謂之孝遇君便謂之忠自此以往名至於無窮只一性而巳猶人一而巳對父謂之子對子謂之父自此以往至於無窮只一人而巳人只要在性上用功看得一性字分明即萬理燦然一日論為學工夫先生曰教人為學不可執一偏初學時心猿意馬拴縛不定其所思慮多是人欲一邊故且教之靜坐息思慮久之俟其心意稍定只懸空靜守如稿木死灰亦無用須教他省察克治省察克治之功則無時而可間如去盜賊須有箇掃除廓淸之意無事時將好色好貨好名等私逐一追究搜尋出來定要拔去病根永不復起方始為快常如貓之捕鼠一眼看著一耳聽著才有一念萌動即與克去斬釘截鐡不可姑容與他方便不可窩藏不可放他出路方是真實用功方能掃除廓淸到得無私可克自有端拱時在雖曰何思何慮非初學時事初學必須思省察克治即是思誠只思一箇天理到得天理純全便是何思何慮矣澄問有人夜怕鬼者奈何先生曰只是平日不能集義而心有所慊故怕若素行合於神明何怕之有子莘曰正直之鬼不須怕恐邪鬼不管人善惡故未免怕先生曰豈有邪鬼能迷正人乎只此一怕即是心邪故有迷之者非鬼迷也心自迷耳如人好色即是色鬼迷好貨即是貨鬼迷怒所不當怒是怒鬼迷懼所不當懼是懼鬼迷也定者心之本體天理也動靜所遇之時也澄問學庸同異先生曰子思括大學一書之義為中庸首章問孔子正名先儒説上告天子下告方伯廢輒立郢此意如何先生曰恐難如此豈有一人致敬盡禮待我而為政我就先去廢他豈人情天理孔子既肯與輒為政必已是他能傾心委國而聽聖人盛德至誠必已感化衛輒使知無父之不可以為人必將痛哭奔走往迎其父父子之愛本於天性輒能悔痛真切如此蒯瞶豈不感動底豫蒯瞶既還輒乃致國請戮聵巳見化於子又有夫子至誠調和其間當亦決不肯受仍以命輒羣臣百姓又必欲得輒為君輒乃自暴其罪惡請於天子告於方伯諸侯而必欲致國於父瞶與羣臣百姓亦皆表輒悔悟仁孝之美請於天子告於方伯諸侯必欲得輒而為之君於是集命於輒使之復君衛國輒不得巳乃如後世上皇故事率羣臣百姓尊瞶為太公備物致飬而始退復其位焉則君君臣臣父父子子名正言順一舉而可為政於天下矣孔子正名或是如此澄在鴻臚寺倉居忽家信至言兒病危澄心甚憂悶不能堪先生曰此時正宜用功若此時放過間時講學何用人正要在此等時磨錬父之愛子自是至情然天理亦自有箇中和處過即是私意人於此處多認做天理當憂則一向憂苦不知巳是有所憂患不得其正大抵七情所感多只是過少不及者才過便非心之本體必須調停適中始得就如父母之喪人子豈不欲一哭便死方快於心然却曰毁不滅性非聖人強制之也天理本體自有分限不可過也人但要識得心體自然增減分毫不得不可謂未發之中常人俱有蓋體用一源有是體即有是用有未發之中即有發而皆中節之和今人未能有發而皆中節之和須知是他未發之中亦未能全得易之辭是初九濳龍勿用六字易之象是初畫易之變是值其畫易之占是用其辭夜氣是就常人説學者能用功則日間有事無事皆是此氣翕聚發生處聖人則不消説夜氣澄問操存舍亡章曰出入無時莫知其鄉此雖就常人心説學者亦須是知得心之本體亦元是如此則操存功夫始沒病痛不可便謂出為亡入為存若論本體元是無出無入的若論出入則其思慮運用是出然主宰常昭昭在此何出之有既無所出何入之有程子所謂腔子亦只是天理而巳雖終日應酬而不出天理即是在腔子裏若出天理斯謂之放斯謂之亡又曰出入亦只是動靜動靜無端豈有鄉邪王嘉秀問佛以出離生死誘人入道仙以長生久視誘人入道其心亦不是要人做不好究其極至亦是見得聖人上一截然非入道正路如今仕者有由科有由貢有由傳奉一般做到大官畢竟非入仕正路君子不由也仙佛到極處與儒者略同但有了上一截遺了下一截終不似聖人之全然其上一截同者不可誣也後世儒者又只得聖人下一截分裂失真流而為記誦詞章功利訓詁亦卒不免為異端是四家者終身勞苦於身心無分毫益視彼仙佛之徒淸心寡欲超然於世纍之外者反若有所不及矣今學者不必先排仙佛且當篤志為聖人之學聖人之學明則仙佛自泯不然則此之所學恐彼或有不屑而反欲其俯就不亦難乎鄙見如此先生以為何如先生曰所論大略亦是但謂上一截下一截亦是人見偏了如此若論聖人大中至正之道徹上徹下只是一貫更有甚上一截下一截一隂一陽之謂道但仁者見之便謂之仁知者見之便謂之智百姓又日用而不知故君子之道鮮矣仁智豈可不謂之道但見得偏了便有弊病蓍固是易龜亦是易問孔子謂武王未盡善恐亦有不滿意先生曰在武王自合如此曰使文王未沒畢竟如何曰文王在時天下三分已有其二若到武王伐商之時文王若在或者不致興兵必然這一分亦來歸了文王只善處紂使不得縱惡而已問孟子言執中無權猶執一先生曰中只是天理只是易隨時變易如何執得須是因時制宜難預先定一箇規矩在如後世儒者要將道理一一説得無罅漏立定箇格式此正是執一唐詡問立志是常存箇善念要為善去惡否曰善念存時即是天理此念即善更思何善此念非惡更去何惡此念如樹之根芽立志者長立此善念而巳從心所欲不踰矩只是志到熟處精神道德言動大率收斂為主發散是不得已天地人物皆然問文中子是如何人先生曰文中子庶幾具體而微惜其蚤死問如何却有續經之非曰續經亦未可盡非請問良久曰更覺良工心獨苦許魯齋謂儒者以治生為先之説亦誤人問仙家元氣元神元精先生曰只是一件流行為氣凝聚為精妙用為神喜怒哀樂本體自是中和的才自家著些意思便過不及便是私問哭則不歌先生曰聖人心體自然如此克巳須要掃除廓淸一毫不存方是有一毫在則衆惡相引而來問律呂新書先生曰學者當務為急算得此數熟亦恐未有用必須心中先具禮樂之本方可且如其書説多用管以候氣然至冬至那一刻時管灰之飛或有先後須臾之間焉知那管正值冬至之刻須自心中先曉得冬至之刻始得此便有不通處學者須先從禮樂本原上用功曰仁云心猶鏡也聖人心如明鏡常人心如昏鏡近世格物之説如以鏡照物照上用功不知鏡尚昏在何能照先生之格物如磨鏡而使之明磨上用功明了後亦未嘗廢照問道之精粗先生曰道無精粗人之所見有精粗如這一間房人初進來只見一箇大規模如此處久便柱壁之類一一看得明白再久如柱上有些文藻細細都看出來然只是一間房先生曰諸公近見時少疑問何也人不用功莫不自以為巳知為學只循而行之是矣殊不知私欲日生如地上塵一日不掃便又有一層著實用功便見道無終窮愈探愈深必使精白無一毫不徹方可問知至然後可以言誠意今天理人欲知之未盡如何用得克巳工夫先生曰人若真實切巳用功不已則於此心天理之精微日見一日私欲之細微亦日見一日若不用克巳工夫終日只是説話而巳天理終不自見私欲亦終不自見如人走路一般走得一假方認得一假走到岐路處有疑便問問了又走方漸能到得欲到之處今人於已知之天理不肯存已知之人欲不肯去且只管愁不能盡知只管間講何益之有且待克得自巳無私可克方愁不能盡知亦未遲在問道一而巳古人論道往往不同求之亦有要乎先生曰道無方體不可執著却拘滯於文義上求道逺矣如今人只説天其實何嘗見天謂日月風雷即天不可謂人物草木不是天亦不可道即是天若識得時何莫而非道人但各以其一隅之見認定以為道止如此所以不同若解向裏尋求見得自已心體即無時無處不是此道亘古亘今無終無始更有甚同異心即道道即天知心則知道知天又曰諸君要實見此道須從自已心上體認不假外求始得問名物度數亦須先講求否先生曰人只要成就自家心體則用在其中如飬得心體果有未發之中自然有發而中節之和自然無施不可苟無是心雖預先講得世上許多名物度數與已原不相干只是裝綴臨時自行不去亦不是將名物度數全然不理只要知所先後則近道又曰人要隨才成就才是其所能為如夔之樂稷之種是他資性合下便如此成就之者亦只是要他心體純乎天理其運用處皆從天理上發來然後謂之才到得純乎天理處亦能不器使夔稷易藝而為當亦能之又曰如素冨貴行乎富貴素患難行乎患難皆是不器此惟養得心體正者能之與其為數頃無源之塘水不若為數尺有源之井水生意不窮時先生在塘邊坐傍有井故以之喻學云問世道日降太古時氣象如何復見得先生曰一日便是一元人平旦時起坐未與物接此心清明景象便如在伏羲時遊一般問心要逐物如何則可先生曰人君端拱淸穆六卿分職天下乃治心統五官亦要如此今眼要視時心便逐在色上耳要聽時心便逐在聲上如人君要選官時便自去坐在吏部要調軍時便自去坐在兵部如此豈惟失却君體六卿亦皆不得其職善念發而知之而充之惡念發而知之而遏之知與充與遏者志也天聰明也聖人只有此學者當存此澄曰好色好利好名等心固是私欲如間思雜慮如何亦謂之私欲先生曰畢竟從好色好利好名等根上起自尋其根便見如汝心中決知是無有做劫盜的思慮何也以汝元無是心也汝若於貨色名利等心一切皆如不做劫盜之心一般都消滅了光光只是心之本體看有甚間思慮此便是寂然不動便是未發之中便是廓然太公自然感而遂通自然發而中節自然物來順應問志至氣次先生曰志之所至氣亦至焉之謂非極至次二之謂持其志則飬氣在其中無暴其氣則亦持其志矣孟子救告子之偏故如此夾持説問先儒曰聖人之道必降而自卑賢人之言則引而自高如何先生曰不然如此却乃偽也聖人如天無往而非天三光之上天也九地之下亦天也天何嘗有降而自卑此所謂大而化之也賢人如山嶽守其高而已然百仞者不能引而為千仞千仞者不能引而為萬仞是賢人未嘗引而自高也引而自高則偽矣問伊川謂不當於喜怒哀樂未發之前求中延平却教學者看未發之前氣象何如先生曰皆是也伊川恐人於未發前討箇中把中做一物看如吾向所謂認氣定時做中故令只於涵飬省察上用功延平恐人未便有下手處故令人時時刻刻求未發前氣象使人正目而視惟此傾耳而聽惟此即是戒愼不睹恐懼不聞的工夫皆古人不得已誘人之言也澄問喜怒哀樂之中和其全體常人固不能有如一件小事當喜怒者平時無有喜怒之心至其臨時亦能中節亦可謂之中和乎先生曰在一時一事固亦可謂之中和然未可謂之大本逹道人性皆善中和是人人原有的豈可謂無但常人之心既有所昏蔽則其本體雖亦時時發見終是暫明暫滅非其全體大用矣無所不中然後謂之大本無所不和然後謂之逹道惟天下之至誠然後能立天下之大本曰澄於中字之義尚未明曰此須自心體認出來非言語所能喻中只是天理曰何者為天理曰去得人欲便識天理曰天理何以謂之中曰無所偏倚曰無所偏倚是何等氣象曰如明鏡然全體瑩徹略無纎塵染著曰偏倚是有所染著如著在好色好利好名等項上方見得偏倚若未發時美色名利皆未相著何以便知其有所偏倚曰雖未相著然平日好色好利好名之心原未嘗無既未嘗無即謂之有既謂之有則亦不可謂無偏倚譬之病瘧之人雖有時不發而病根原不曾除則亦不得謂之無病之人矣須是平日好色好利好名等項一應私心掃除蕩滌無復纎毫留滯而此心全體廓然純是天理方可謂之喜怒哀樂未發之中方是天下之大本問顔子沒而聖學亡此語不能無疑先生曰見聖道之全者惟顔子觀喟然一嘆可見其謂夫子循循然善誘人博我以文約我以禮是見破後如此説博文約禮如何是善誘人學者須思之道之全體聖人亦難以語人須是學者自修自悟顔子雖欲從之末由也已即文王望道未見意望道未見乃是真見顔子沒而聖學之正派遂不盡傳矣問身之主為心心之靈明是知知之發動是意意之所著為物是如此否先生曰亦是只存得此心常見在便是學過去未來事思之何益徒放心耳言語無序亦足以見心之不存尚謙問孟子之不動心與告子異先生曰告子是硬把捉著此心要他不動孟子却是集義到自然不動又曰心之本體原自不動心之本體即是性性即是理性元不動理元不動集義是復其心之本體萬象森然時亦沖漠無朕沖漠無朕即萬象森然沖漠無朕者一之父萬象森然者精之母一中有精精中有一心外無物如吾心發一念孝親即孝親便是物先生曰今為吾所謂格物之學者尚多流於口耳况為口耳之學者能反於此乎天理人欲其精微必時時用力省察克治方日漸有見如今一説話之間雖只講天理不知心中倐忽之間巳有多少私欲蓋有竊發而不知者雖用力察之尚不易見况徒口講而可得盡知乎今只管講天理來頓放著不循講人欲來頓放著不去豈格物致知之學後世之學其極至只做得箇義襲而取的工夫問格物先生曰格者正也正其不正以歸於正也問知止者知至善只在吾心元不在外也而后志定曰然問格物於動處用功否先生曰格物無間動靜靜亦物也孟子謂必有事焉是動靜皆有事工天難處全在格物致知上此即誠意之事意既誠大假心亦自正身亦自修但正心修身工夫亦各有用力處修身是巳發邉正心是未發邊心正則中身修則和自格物致知至平天下只是一箇明明德雖親民亦明德事也明德是此心之德即是仁仁者以天地萬物為一體使有一物失所便是吾仁有未盡處只説明明德而不説親民便似老佛至善者性也性元無一毫之惡故曰至善止之是復其本然而巳問知至善即吾性吾性具吾心吾心乃至善所止之地則不為向時之紛然外求而志定矣定則不擾擾而靜靜而不妄動則安安則一心一意只在此處千思萬想務求必得此至善是能慮而得矣如此説是否先生曰大略亦是問程子云仁者以天地萬物為一體何墨氏兼愛反不得謂之仁先生曰此亦甚難言須是諸君自體認出來始得仁是造化生生不息之理雖瀰漫周遍無處不是然其流行發生亦只有箇漸所以生生不息如冬至一陽生必自一陽生而後漸漸至於六陽若無一陽之生豈有六陽隂亦然惟其漸所以便有箇發端處惟其有箇發端處所以生惟其生所以不息譬之木其始抽芽便是木之生意發端處抽芽然後發幹發幹然後生枝生葉然後是生生不息若無芽何以有幹有枝葉能抽芽必是下面有箇根在有根方生無根便死無根何從抽芽父子兄弟之愛便是人心生意發端處如木之抽芽自此而仁民而愛物便是發幹生枝生葉墨氏兼愛無差等將自家父子兄弟與途人一般看便自沒了發端處不抽芽便知得他無根便不是生生不息安得謂之仁孝弟為仁之本却是仁理從裏面發生出來問延平云當理而無私心當理與無私心如何分别先生曰心即理也無私心即是當理未當理便是私心若析心與理言之恐亦未善又問釋氏於世間一切情欲之私都不染著似無私心但外棄人倫却似未當理曰亦只是一統事都只是成就他一箇私已的心侃問持志如心痛一心在痛上安有工夫説間語管間事先生曰初學工夫如此用亦好但要使知出入無時莫如其鄉心之神明原是如此工夫方有著落若只死死守著恐於工夫上又發病侃問專涵飬而不務講求將認欲作理則如之何先生曰人須是知學講求亦只是涵飬不講求只是涵飬之志不切曰何謂知學曰且道為何而學學箇甚曰嘗聞先生教學是學存天理心之本體即是天理體認天理只要自心地無私意曰如此則只須克去私意便是又愁甚理欲不明曰正恐這些私意認不真曰總是志未切志切目視耳聽皆在此安有認不真的道理是非之心人皆有之不假外求講求亦只是體當自心所見不成去心外别有箇見先生問在坐之友比來工夫何似一友舉虛明意思先生曰此是説光景一友敘今昔異同先生曰此是説效驗二友惘然請是先生曰吾輩今日用功只是要為善之心真切此心真切見善即遷有過即改方是真切工夫如此則人欲日消天理日明若只管求光景説效驗却是助長外馳病痛不是工夫朋友觀書多有摘議晦庵者先生曰是有心求異即不是吾説與晦菴時有不同者為入門下手處有毫釐千里之分不得不辨然吾之心與晦菴之心未嘗異也若其餘文義解得明當處如何動得一字希淵問聖人可學而至然伯夷伊尹於孔子才力終不同其同謂之聖者安在先生曰聖人之所以為聖只是其心純乎天理而無人欲之雜猶精金之所以為精但以其成色足而無銅鉛之雜也人到純乎天理方是聖金到足色方是精然聖人之才力亦有大小不同猶金之分兩有輕重堯舜猶萬鎰文王孔子有九千鎰禹湯武王猶七八千鎰伯夷伊尹猶四五千鎰才力不同而純乎天理則同皆可謂之聖人猶分兩雖不同而足色則同皆可謂之精金以五千鎰者而入於萬鎰之中其足色同也以夷尹而厠之堯孔之間其純乎天理同也蓋所以為精金者在足色而不在分兩所以為聖者在純乎天理而不在才力也故雖凡人而肯為學使此心純乎天理則亦可為聖人猶一兩之金比之萬鎰分兩雖懸絶而其到足色處可以無愧故曰人皆可以為堯舜者以此學者學聖人不過是去人欲而存大理耳猶錬金而求其足色金之成色所爭不多則煆錬之工省而功易成成色愈下則煆鍊愈難人之氣質淸濁粹駁有中人以上中人以下其於道有生知安行學知利行其下者必須人一已百人十已千及其成功則一後世不知作聖之本是純乎天理却專去如識才能上求聖人以為聖人無所不知無所不能我須是將聖人許多知識才能逐一理會始得故不務去天理上著工夫徒弊精竭力從册子上鑽研名物上考索形迹上比擬知識愈廣而人欲愈滋才力愈多而天理愈蔽正如見人有萬鎰精金不務煅鍊成色求無愧於彼之精純而乃妄希分兩務同彼之萬鎰錫鉛銅鐵雜然而投分兩愈增而成色愈下既其梢末無復有金矣時曰仁在傍曰先生此喻足以破世儒支離之惑大有功於後學先生又曰吾輩用功只求日減不求日增減得一分人欲便是復得一分天理何等輕快脫灑何等簡易士德問曰格物之説如先生所教明白簡易人人見得文公聰明絶世於此反有未審何也先生曰文公精神氣魄大是他早年合下便要繼往開來故一向只就考索著𫐠上用功若先切巳自修自然不暇及此到得德盛後果憂道之不明如孔子退修六籍刪繁就簡開示來學亦大假不費甚考索文公早歲便著許多書晚年方悔是倒做了士德曰晚年之悔如謂向來定本之悟又謂雖讀得書何益於吾事又謂此與守書籍泥言語全無交涉是他到此方悔從前用功之錯方去切已自修矣曰然此是文公不可及處他力量大一悔便轉可惜不久即去世平日許多錯處皆不及改正侃去花間草因曰天地間何善難培惡難去先生曰未培未去耳少間曰此等看善惡皆從軀殼起念便會錯侃未逹曰天地生意花草一般何曾有善惡之分子欲觀花則以花為善以草為惡如欲用草時復以草為善矣此等善惡皆由汝心好惡所生故知是錯曰然則無善無惡乎曰無善無惡者理之靜有善有惡者氣之動不動於氣即無善無惡是謂至善曰佛氏亦無善無惡何以異曰佛氏著在無善無惡上便一切都不管不可以治天下聖人無善無惡只是無有作好無有作惡不動於氣然遵王之道會其有極便自一循天理便有箇裁成輔相曰草既非惡即草不宜去矣曰如此却是佛老意見草若有礙何妨汝去曰如此又是作好作惡曰不作好惡非是全無好惡却是無知覺的人謂之不作者只是好惡一循於理不去又著一分意思如此即是不曾好惡一般曰去草如何是一循於理不著意思曰草有妨礙理亦宜去去之而已偶未即去亦不纍心若著了一分意思即心體便有貽纍便有許多動氣處曰然則善惡全不在物曰只在汝心循理便是善動氣便是惡曰畢竟物無善惡曰在心如此在物亦然世儒惟不知此舍心逐物將格物之學錯看了終日馳求於外只做得箇義襲而取終身行不著習不察曰如好好色好惡惡臭則如何曰此正是一循於理是天理合如此本無私意作好作惡曰如好好色如惡惡臭安得非意曰却是誠意不是私意誠意只是循天理雖是循天理亦著不得一分意故有所忿懥好樂則不得其正須是廓然太公方是心之本體知此即知未發之中伯生曰先生云草有妨礙理亦宜去緣何又是軀殼起念曰此須汝心自體當汝要去草是甚麼心周茂叔窗前草不除是甚麼心先生謂學者曰為學須得箇頭腦工夫方有著落縱未能無間如舟之有舵一提便醒不然雖從事於學只做箇義襲而取只是行不著習不察非大本逹道也又曰見得時撗説竪説皆是若於此處通彼處不通只是未見得或問為學以親故不免業舉之纍先生曰以親之故而業舉為纍於學則治田以飬其親者亦有纍於學乎先正云惟患奪志但恐為學之志不真切耳崇一問尋常意思多忙有事固忙無事亦忙何也先生曰天地氣機元無一息之停然有箇主宰故不先不後不急不緩雖千變萬化而主宰常定人得此而生若主宰定時與天運一般不息雖酬酢萬變常是從容自在所謂天君泰然百體從令若無主宰便只是這氣奔放如何不忙先生曰為學大病在好名侃曰從前歲自謂此病已輕比來精察乃知全未豈必務外為人只聞譽而喜聞毁而悶即是此病發來曰最是名與實對務實之心重一分則務名之心輕一分全是務實之心即全無務名之心若務實之心如飢之求食渴之求飲安得更有工夫好名又曰疾沒世而名不稱稱字去聲讀亦聲聞過情君子耻之之意實不稱名生猶可輔沒則無及矣四十五十而無聞是不聞道非無聲聞也孔子云是聞也非逹也安肯以此望人侃多悔先生曰悔悟是去病之藥然以改之為貴若留滯於中則又因藥發病德章曰聞先生以精金喻聖以分兩喻聖人之分量以煆鍊喻學者之工夫最為深切惟謂堯舜為萬鎰孔子為九千鎰疑未安先生曰此又是軀殼上起念故替聖人爭分兩若不從軀殼上起念即堯舜萬鎰不為多孔子九千鎰不為少堯舜萬鎰只是孔子的孔子九千鎰只是堯舜的原無彼我所以謂之聖只論精一不論多寡只要此心純乎天理處同便同謂之聖若是力量氣魄如何盡同得後儒只在分兩上較量所以流入功利若除去了比較分兩的心各人儘著自巳力量精神只在此心純天理上用功即人人自有箇箇圓成便能大以成大小以成小不假外慕無不具足此便是實實落落明善誠身的事後儒不明聖學不知就自巳心地良如良能上體認擴充却去求如其所不知求能其所不能一味只是希高慕大不知自巳是桀紂心地動輒要做堯舜事業如何做得終年碌碌至於老死竟不知成就了箇甚麼可哀也巳侃問先儒以心之靜為體心之動為用如何先生曰心不可以動靜為體用動靜時也即體而言用在體即用而言體在用是謂體用一源若説靜可以見其體動可以見其用却不妨問上智下愚如何不可移先生曰不是不可移只是不肯移問子夏門人問交章先生曰子夏是言小子之交子張是言成人之交若善用之亦俱是子仁問學而時習之不亦説乎先儒以學為效先覺之所為如何先生曰學是學去人欲存天理從事於去人欲存天理則自正諸先覺考諸古訓自下許多問辨思索存省克治工夫然不過欲去此心之人欲存吾心之天理耳若曰效先覺之所為則只説得學中一件事亦似專求諸外了時習者坐如尸非專習坐也坐時習此心也立如齋非專習立也立時習此心也説是理義之説我心之説人心本自説理義如目本説色耳本説聲惟為人欲所蔽所纍始有不説今人欲日去則理義日洽浹安得不説國英問曾子三省雖切恐是未聞一貫時工夫先生曰一貫是夫子見曾子未得用功之要故告之學者果能忠恕上用功豈不是一貫一如樹之根本貫如樹之枝葉未種根何枝葉之可得體用一源體未立用安從生謂曾子於其用處蓋巳隨事精察而力行之但未知其體之一此恐未盡黃誠甫問汝與回也孰愈章先生曰子貢多學而識在聞見上用功顔子在心地上用功故聖人問以啓之而子貢所對又只在知見上故聖人嘆惜之非許之也顔子不遷怒不二過亦是有未發之中始能種樹者必培其根種德者必飬其心欲樹之長必於始生時刪其繁枝欲德之盛必於始學時去夫外好如外好詩文則精神日漸漏泄在詩文上去凡百外好皆然又曰我此論學是無中生有的工夫諸公須要信得及只是立志學者一念為善之志如樹之種但勿助勿忘只管培植將去自然日夜滋長生氣日完枝葉日茂樹初生時便抽繁枝亦須刋落然後根幹能大初學時亦然故立志貴專一因論先生之門某人在涵飬上用功某人在識見上用功先生曰專涵養者日見其不足專識見者日見其有餘日不足者日有餘矣日有餘者日不足矣梁日孚問居敬窮理是兩事先生以為一事何如先生曰天地間只有此一事安有兩事若論萬殊禮儀三百威儀三千又何止兩公且道居敬是如何窮理是如何曰居敬是存飬工夫窮理是窮事物之理曰存飬箇甚曰是存飬此心之天理曰如此亦只是窮理矣曰且道如何窮事物之理曰如事親便要窮孝之理事君便要窮忠之理曰忠與孝之理在君親身上在自己心上若在自己心上亦只是窮此心之理矣且道如何是敬曰只是主一如何是主一曰如讀書便一心在讀書上接事便一心在接事上曰如此則飲酒便一心在飲酒上好色便一心在好色上却是逐物成甚居敬功夫日孚請問曰一者天理主一是一心在天理上若只知主一不知一即是理有事時便是逐物無事時便是著空惟其有事無事一心皆在天理上用功所以居敬亦即是窮理就窮理專一處説便謂之居敬就居敬精密處説便謂之窮理却不是居敬了别有箇心窮理窮理時别有箇心居敬名雖不同功夫只是一事就如易言敬以直內義以方外敬即是無事時義義即是有事時敬兩句合説一件如孔子言修已以敬即不須言義孟子言集義即不須言敬會得時橫説竪説工夫總是一般若泥文逐句不識本領即支離決裂工夫都無下落問窮理何以即是盡性曰心之體性也性即理也窮仁之理真要仁極仁窮義之理真要義極義仁義只是吾性故窮理即是盡性如孟子説充其惻隱之心至仁不可勝用這便是窮理工夫日孚曰先儒謂一草一木亦皆有理不可不察如何先生曰夫我則不暇公且先去理會自巳性情須能盡人之性然後能盡物之性日孚悚然有悟惟乾問知如何是心之本體先生曰知是理之靈處就其主宰處説便謂之心就其稟賦處説便謂之性孩提之童無不知愛其親無不知敬其兄只是這箇靈能不為私欲遮隔充拓得盡便完完是他本體便與天地合德自聖人以下不能無蔽故須格物以致其知守衡問大學工夫只是誠意誠意工夫只是格物修齊治平只誠意盡矣又有正心之功有所忿懥好樂則不得其正何也先生曰此要自思得之知此則知未發之中矣守衡再三請曰為學工夫有淺深初時若不著實用意去好善惡惡如何能為善去惡這著實用意便是誠意然不知心之本體原無一物一向著意去好善惡惡便又多了這分意思便不是廓然太公書所謂無有作好作惡方是本體所以説有所忿懥好樂則不得其正正心只是誠意工夫裏面體當自家心體常要鑑空衡平這便是未發之中正之問戒懼是巳所不知時工夫慎獨是巳所獨知時工夫此説如何先生曰只是一箇工夫無事時固是獨知有事時亦是獨知人若不知於此獨知之地用力只在人所共知處用功便是作偽便是見君子而後厭然此獨知處便是誠的萌芽此處不論善念惡念更無虗假一是百是一錯百錯正是王霸義利誠偽善惡界頭于此一立立定便是端本澄源便是立誠古人許多誠身的工夫精神命脈全體只在此處真是莫見莫顯無時無處無終無始只是此箇工夫今若又分戒懼為巳所不知即工夫便支離亦有間斷既戒懼即是知巳若不知是誰戒懼如此見解便要流入斷滅禪定曰不論善念惡念更無虗假則獨知之地更無無念時邪曰戒懼亦是念戒懼之念無時可息若戒懼之心稍有不存不是昏聵便已流入惡念自朝至暮自少至老若要無念即是巳不知此除是昏睡除是稿木死灰志道問荀子云養心莫善于誠先儒非之何也先生曰此亦未可便以為非誠字有以工夫説者誠是心之本體求復其本體便是思誠的工夫明道説以誠敬存之亦是此意大學欲正其心先誠其意荀子之言固多病然不可一例吹毛求疵大凡看人言語若先有箇意見便有過當處為富不仁之言孟子有取於陽虎此便見聖賢大公之心蕭惠問巳私難克奈何先生曰將汝巳私來替汝克先生曰人須有為巳之心方能克巳能克己方能成已蕭惠曰惠亦頗有為巳之心不知緣何不能克已先生曰且説汝有為巳之心是如何惠良久曰惠亦一心要做好人便自謂頗有為己之心今思之看來亦只是為得箇軀殼的己不曾為箇真巳先生曰真己何曾離著軀殼恐汝連那軀殼的己也不曾為且道汝所謂軀殼的巳豈不是耳目口鼻四肢惠曰正是為此目便要色耳便要聲口便要味四肢便要逸樂所以不能克先生曰美色令人目肓美聲令人耳聾美味令人口爽馳騁田獵令人發狂這都是害汝耳目口鼻四肢的豈得是為汝耳目口鼻四肢若為著耳目口鼻四肢時便須思量耳如何聽目如何視口如何言四肢如何動必須非禮勿視聽言動方才成得箇耳目口鼻四肢這箇才是為著耳目口鼻四肢汝今終日向外馳求為名為利這都是為著軀殼外面的物事汝若為著耳目口鼻四肢要非禮勿視聽言動時豈是汝之耳目口鼻四肢自能勿視聽言動須由汝心這視聽言動皆是汝心汝心之視發竅於目汝心之聽發竅於耳汝心之言發竅於口汝心之動發竅於四肢若無汝心便無耳目口鼻所謂汝心亦不專是那一團血肉若是那一團血肉如今巳死的人那一團血肉還在緣何不能視聽言動所謂汝心却是那能視聽言動的這箇便是性便是天理有這箇性才能生這性之生理便謂之仁這性之生理發在目便會視發在耳便會聽發在口便會言發在四肢便會動都只是那天理發生以其主宰一身故謂之心這心之本體原只是箇天理原無非禮這箇便是汝之真巳這箇真巳是軀殼的主宰若無真巳便無軀殼真是有之即生無之即死汝若真為那箇軀殼的巳必須用著這箇真巳便須常常保守著這箇真巳的本體戒慎不覩恐懼不聞惟恐虧損了他一些才有一毫非禮萌動便如刀割如針刺忍耐不過必須去了刀拔了針這才是有為巳之心方能克巳汝今正是認賊作子緣何却説有為巳之心不能克巳有一學者病目戚戚甚憂先生曰爾乃貴目賤心蕭惠好仙釋先生警之曰吾亦自幼篤志二氏自謂既有所得謂儒者為不足學其後居夷三載見得聖人之學若是其簡易廣大始自嘆悔錯用了三十年氣力大抵二氏之學其妙與聖人只有毫釐之間汝今所學乃其土苴輒自信自好若此真鴟梟竊腐鼠耳惠請問二氏之妙先生曰向汝説聖人之學簡易廣大汝却不問我悟的只問我悔的惠慚謝請問聖人之學先生曰汝今只是了人事問待汝辦箇真要求為聖人的心來與汝説惠再三請先生曰巳與汝一句道盡汝尚自不會劉觀時問未發之中是如何先生曰汝但戒愼不覩恐懼不聞養得此心純是天理便自然見觀時請略示氣象先生曰啞子喫苦瓜與你説不得你要知此苦還須你自喫時曰仁在傍曰如此才是真知即是行矣一時在座諸友皆有省蕭惠問死生之道先生曰知晝夜即知死生問晝夜之道曰知晝則知夜曰晝亦有所不知乎先生曰汝能知晝懵懵而興蠢蠢而食行不著習不察終日昏昏只是夢晝惟息有養瞬有存此心惺惺明明天理無一息間斷才是能知晝這便是天德便是通乎晝夜之道而知更有甚麼死生馬子莘問修道之教舊説謂聖人品節吾性之固有以為法於天下若禮樂刑政之屬此意如何先生曰道即性即命本是完完全全增減不得不假修飾的何須要聖人品節却是不完全的物件禮樂刑政是治天下之法固亦可謂之教但不是子思本旨若如先儒之説下靣由教入道的緣何舍了聖人禮樂刑政之教别説出一段戒愼恐懼工夫却是聖人之教為虗設矣子莘請問先生曰子思性道教皆從本原上説天命於人則命便謂之性率性而行則性便謂之道修道而學則道便謂之教率性是誠者事所謂自誠明道之性也修道是誠之者事所謂自明誠謂之教也聖人率性而行即是道聖人以下未能率性於道未免有過不及故須修道修道則賢知者不得而過愚不肖者不得而不及都要循著這箇道則道便是箇教此教字與天道至教風雨霜露無非教也之教同修道字與修道以仁同人能修道然後能不違於道以復其性之本體則亦是聖人率性之道矣下靣戒愼恐懼便是修道的工夫中和便是復其性之本體如易所謂窮理盡性以至於命中和位育便是盡性至命黃誠甫問先儒以孔子告顔淵為邦之問是立萬世常行之道如何先生曰顔子具體聖人其於為邦的大本大原都巳完備夫子平日知之巳深到此都不必言只就制度文為上説此等處亦不可忽略須要是如此方盡善又不可因自巳本領是當了便於防範上踈濶須是要放鄭聲逺佞人蓋顔子是箇克已向裏德上用心的人孔子恐其外靣末節或有踈略故就他不足處幫輔説若在他人須告以為政在人取人以身修身以道修道以仁逹道九經及誠身許多工夫方始做得這箇方是萬世常行之道不然只去行了夏時乘了殷輅服了周冕作了韶舞天下便治得後人但見顔子是孔門第一人又問箇為邦便把做天大事看了蔡希淵問文公大學新本先格致而後誠意工夫似與首章次第相合若如先生從舊本之説即誠意反在格致之前於此尚未釋然先生曰大學工夫即是明明德明明德只是箇誠意誠意的工夫只是格物致知若以誠意為主去用格物致知的工夫即工夫始有下落即為善去惡無非是誠意的事如新本先去窮格事物之理即茫茫蕩蕩都無著落處須用添箇敬字方才牽扯得向身心上來然終是沒根源若須用添箇敬字緣何孔門倒將一箇最緊要的字落了直待千餘年後要人來輔出正謂以誠意為主即不須添敬字所以提出箇誠意來説正是學問的大頭腦處於此不察真所謂毫釐之差千里之繆大抵中庸工夫只是誠身誠身之極便是至誠大學工夫只是誠意誠意之極便是至善工夫總是一般今説這裏輔箇敬字那裏輔箇誠字未免畫蛇添足以病之耶學者之趨不一師門之教不宣也乃復取逸稿采其語之不背者得一卷其餘影響不真與文録既載者皆削之并易中卷為問答語以付黃梅尹張君增刻之庶幾讀者不以知解承而惟以實體得則無疑于是録矣嘉靖丙辰夏四月門人錢德洪拜書于蘄之崇正書院附録朱子晚年定論定論首刻于南贛朱子病目靜久忽悟聖學之淵微乃大悔中年注述誤已誤人遍告同志師閲之喜已學與晦翁同手録一卷門人刻行之自是為朱子論異同者寡矣師曰無意中得此一助隆慶壬申虬峰謝君廷傑刻師全書命刻定論附語録後見師之學與朱子無相繆戾則千古正學同一源矣并師首敘與袁慶麟跋凡若干條洪僣引其説朱子晚年定論陽明子序曰洙泗之傳至孟氏而息千五百餘年濂溪明道始復追尋其緒自後辨析日詳然亦日就支離決裂旋復湮晦吾嘗深求其故大抵皆世儒之多言有以亂之守仁早嵗業舉溺志詞章之習既乃稍知從事正學而苦于衆説之紛撓疲􅠰茫無可入因求諸老釋欣然有會于心以為聖人之學在此矣然于孔子之教間相出入而措之日用往往缺漏無歸依違往返且信且疑其後謪官龍場居夷處困動心忍性之餘恍若有悟體念探求再更寒暑證諸五經四子沛然若決江河而放諸海也然後嘆聖人之道坦如大路而世之儒者妄開竇􅏙蹈荆棘墮坑塹究其為説反出二氏之下宜乎世之髙明之士厭此而趨彼也此豈二氏之罪哉間嘗以語同志而間者競相非議目以為立異好奇雖每痛反深抑務自搜剔斑瑕而愈益精明的確洞然無復可疑獨于朱子之説有相抵牾恆疚于心切疑朱子之賢而豈其于此尚有未察及官留都復取朱子之書而檢求之然後知其晚嵗固已大悟舊説之非痛悔極艾至以為自誑誑人之罪不可勝贖世之所傳集注或問之類乃其中年未定之説自咎以為舊本之誤思改正而未及而其諸語類之屬又其門人挾勝心以附已見固于朱子平日之説猶有大相繆戾者而世之學者局于見聞不過持循講習于此其于悟後之論概乎其未有聞則亦何怪乎豫言之不信而朱子之心無以自暴于後世也乎豫既自幸其説之不繆于朱子又喜朱子之先得我心之同然且慨夫世之學者徒守朱子中年未定之説而不復知求其晚嵗既悟之論競相呶呶以亂正學不自知其已入于異端輒採録而裒集之私以示夫同志庶幾無疑于吾説而聖學之明可冀矣正德乙亥冬十一月朔後學餘姚王守仁序答黃直卿書為學直是先要立本文義却可且與説出正意令其寬心玩味未可便令考校同異研究纎密恐其意思促迫難得長進將來見得大意略舉一二節目漸次理會蓋未晚也此是向來定本之誤今幸見得却煩勇革不可茍避譏笑却誤人也答吕子約日用工夫比復何如文字雖不可廢然涵養本原而察于天理人欲之判此是日用動靜之間不可頃刻間斷底事若于此處見得分明自然不到得流入世俗功利權謀裏去矣熹亦近日方實見得向日支離之病雖與彼中證候不同然忘已逐物貪外虛內之失則一而已程子説不得以天下萬物撓已已立後自能了得天下萬物今自家一箇身心不知安頓去處而談王説伯將經世事業别作一箇伎倆商量講究不亦誤乎相去逺不得面論書問終説不盡臨風嘆息而已答何叔京前此僣易拜稟博觀之敝誠不自揆乃蒙見是何幸如此然觀來諭似有未能遽舍之意何邪此理甚明何疑之有若使道可以多聞博觀而得則世之知道者為不少矣熹近日因事大有少省發處如鳶飛魚躍明道以為與必有事焉勿正之意同者乃今曉然無疑日用之間觀此流行之體初無間斷處有下工夫處乃知日前自誑誑人之罪蓋不可勝贖也此與守書册泥言語全無交涉幸于日用間察之知此則知仁矣答潘叔昌示喻天上無不識字底神仙此論甚中一偏之弊然亦恐只學得識字却不曾學得上天即不如且學上天耳上得天了却旋學上天人亦不妨也中年以後氣血精神能有幾何不是記故事時節熹以目昏不敢著力讀書間中靜坐收斂身心頗覺得力間起看書聊復遮眼遇有會心處時一喟然耳答潘叔度熹衰病今嵗幸不至劇但精力益衰目力全短看文字不得冥目靜坐却得收拾放心覺得日前外面走作不少頗恨盲廢之不早也看書鮮識之喻誠然然嚴霜大凍之中豈無些小風和日暖意思要是多者勝耳與吕子約孟子言學問之道惟在求其放心而程子亦言心要在腔子裏今一向耽著文字令此心全體都奔在册子上更不知有已便是箇無知覺不識痛癢之人雖讀得書亦何益于吾事邪與周叔謹應之甚恨未得相見其為學規模次第如何近來吕陸門人互相排斥此由各徇所見之偏而不能公天下之心以觀天下之理甚覺不滿人意應之蓋嘗學于兩家未知其于此看得果如何因話扣之因書諭及為幸也熹近日亦覺向來説話有大支離處反身以求正坐自巳用功亦未切耳因此減去文字功夫覺得間中氣象甚適每勸學者亦且看孟子道性善求放心兩章著實體察收拾為要其餘文字且大槩諷誦涵養未須大假著力考索也答陸象山熹衰病日侵去年災患亦不少比來病軀方似略可支吾然精神耗減日甚一日恐終非能久于世者所幸邇來日用功夫頗覺有力無復向來支離之病甚恨未得從容面論未知異時相見尚復有異同否耳答符復仲聞向道之意甚勤向所喻義利之間誠有難擇者但意所疑以為近利者即便舍去可也向後見得親切却看舊事又有見未盡舍未盡者不解有過當也見陸丈回書其言明當且就此持守自見功效不須多疑多問却轉迷惑也答吕子約日用功夫不敢以老病而自懈覺得此心操存舍亡只在反掌之間向來誠是太涉支離蓋無本以自立則事事皆病耳又聞講授亦頗勤勞此恐或有未便今日正要淸源正本以察事變之幾微豈可一向汩溺于故𥿄堆中使精神昏弊失後忘前而可以謂之學乎與吳茂實近來自覺向時工夫止是講論文義以為積集義理久當自有得力處却于日用工夫全少檢點諸朋友往往亦只如此做工夫所以多不得力今方深省而痛懲之亦欲與諸同志勉焉幸老兄遍以告之也答張敬夫熹窮居如昨無足言者自逺去師友之益兀兀度日讀書反已固不無警省處終是旁無疆輔因循汩沒尋復失之近日一種向外走作心恱之而不能自已者皆凖止酒例戒而絶之似覺省事此前輩所謂下士晚聞道聊以拙自修者若擴充不已補復前非庶其有日舊讀中庸愼獨大學誠意毋自欺處常苦求之太過措詞煩猥近日乃覺其非此正是最切近處最分明處乃舍之而談空于冥漠之間其亦誤矣方竊以此意痛自檢勒凛然度日惟恐有怠而失之也至于文宇之間亦覺向來病痛不少蓋平日解經最為守章句者然亦多是推衍文義自做一片文字非惟屋下架屋説得意味淡薄且是使人看者將注與經作兩項工夫做了下稍看得支離至于本旨全不相照以此方知漢儒可謂善説經者不過只説訓詁使人以此訓詁玩索經文訓詁經文不相離異只做一道看了直是意味深長也答吕伯恭道間與季通講論因悟向來涵養功夫全少而講説又多強探必取尋流逐末之弊推類以求衆病非一而其源皆在此恍然自失似有頓進之功若保此不懈庶有望于將來然非如近日諸賢所謂頓悟之機也向來所聞誨諭諸説之未契者今日細思吻合無疑大抵前日之病皆是氣質躁妄之偏不曾涵養克治任意直前之弊耳答周純仁間中無事固宜謹出然想亦不能一併讀得許多似此專人來往勞費亦是未能省事隨寓而安之病又如多服燥熱藥亦使人血氣偏勝不得和平不但非所以衛生亦非所以養心竊恐更須深自思省收拾身心漸令向裏令寧靜間退之意勝而飛揚燥擾之氣消則治心養氣處世接物自然安穩一時長進無復前日內外之患矣答竇文卿為學之要只在著實操存密切體認自已身心上理會切忌輕自表襮引惹外人辨論枉費酬應分却向裏工夫答吕子約聞欲與二友俱來而復不果深以為恨年來覺得日前為學不得要領自做身主不起反為文字奪却精神不是小病每一念之惕然自懼且為朋友憂之而每得子約書輒復恍然尤不知所以為賢者謀也且如臨事遲回瞻前顧後只此亦可見得心術影子當時若得相聚一畨彼此極論庶幾或有剖決之助今又失此幾會極令人悵恨也訓導後生若説得是當極有可自警省處不會減人氣力若只如此支離漫無統紀則雖不教後生亦只見得展轉迷惑無出頭處也答林擇之熹哀苦之餘無他外誘日用之間痛自斂飭乃知敬字之功親切要妙乃如此而前日不知于此用力徒以口耳浪費光隂人欲橫流天理幾滅今而思之怛然震悚蓋不知所以措其躬也又此中見有朋友數人講學其間亦難得朴實頭負荷得者因思日前講論只是口説不曾實體于身故在已在人都不得力今方欲與朋友説日用之間常切點檢氣習偏處意欲萌處與平日所講相似與不相似就此痛著工夫庶幾有益陸子夀兄弟近日議論却肯向講學上理會其門人有相訪者氣象皆好但其間亦有舊病此間學者却是與渠相反初謂只如此講學漸涵自能入德不謂末流之弊只成説話至于人倫日用最切近處亦都不得毫毛氣力此不可不深懲而痛警也答梁文叔近看孟子見人即道性善稱堯舜此是第一義若于此看得透信得及直下便是聖賢便無一毫人欲之私做得病痛若信不及孟子又説箇第二節工夫又只引成覸顔淵公明儀三段説話教人如此發憤勇猛向前日用之間不得存留一毫人欲之私在這裏此外更無别法若于此有箇奮迅興起處方有田地可下功夫不然即是畫脂鏤氷無真實得力處也近日見得如此自覺頗得力與前日不同故此奉報答潘叔恭學問根本在日用間持敬集義工夫直是要得念念省察讀書求義乃其間之一事耳舊來雖知此意然于緩急之間終是不覺有倒置處誤人不少今方自悔耳答林充之充之近讀何書恐更當于日用之間為仁之本者深加省察而去其有害于此者為佳不然誦説雖精而不踐其實君子蓋深恥之此固充之平日所講聞也答何叔景李先生教人大抵令于靜中體認大本未發時氣象分明即處事應物自然中節此乃龜山門下相傳指訣然當時親炙之時貪聽講論又方竊好章句訓詁之習不得盡心于此至今若存若亡無一的實見處辜負教育之意每一念此未嘗不愧汗沾衣也又熹近來尤覺昏憒無進步處蓋緣日前偷墮茍簡無深探力行之志凡所論説皆出入口耳之餘以故全不得力今方覺悟欲勇革舊習而血氣已衰心志亦不復強不知終能有所濟否又向來妄論持敬之説亦不自記其云何但因其良心發見之微猛省提撕使心不昧則是做工夫底本領本領既立自然下學而上逹矣若不察良心發見處即渺渺茫茫恐無下手處也中間一書論必有事焉之説却儘有病殊不蒙辨詰何邪所喻多識前言往行固君子之所急熹向來所見亦是如此近因反求未得箇安穩處却始知此未免支離如所謂因諸公以求程氏因程氏以求聖人是隔幾重公案曷若默會諸心以立其本而其言之得失自不能逃吾之鑒邪欽夫之學所以超脫自在見得分明不為言句所桎梏只為合下入處親切今日説話雖未能絶無滲漏終是本領是當非吾輩所及但詳觀所論自可見矣答林擇之所論顔孟不同處極善極善正要見此曲折始無窒礙耳比來想亦只如此用功熹近只就此處見得向來未見底意思乃知存久自明何待窮索之語是真實不誑語今未能久巳有此驗况真能久邪但當益加勉勵不敢少弛其勞耳答楊子直學者墮在語言心實無得固為大病然于語言中罕見有究竟得徹頭徹尾者蓋資質巳是不及古人而功夫又草草所以終身于此若存若亡未有卓然可恃之實近因病後不敢極力讀書間中却覺有進步處大抵孟子所論求其放心是要訣爾與田侍郎子真吾輩今日事事做不得只有向裏存心窮理外人無交涉然亦不免違條礙貫看來無著力處只有更攢近裏面安身立命爾不審比日何所用心因書及之深所欲聞也答陳才卿詳來示知日用工夫精進如此尤以為喜若知此心此理端的在我則參前倚衡自有不容捨者亦不待求而得不待操而存矣格物致知亦是因其所巳知者指之以及其所未知只是一本原無兩樣工夫也與劉子澄居官無修業之益若以俗學言之誠是如此若論聖門所謂德業者却初不在日用之外只押文字便是進德修業地頭不必編綴異聞乃為修業也近覺向來為學實有向外浮泛之弊不惟自誤而誤人亦不少方别尋得一頭緒似差簡約端的始知文字言語之外真别有用心處恨未得面論也浙中後來事體大段支離乖僻恐不止似正似邪而巳極令人難説只得惶恐痛自警省恐未可專執舊説以為取舍也與林擇之熹近覺向來乖繆處不可縷數方惕然思所以自新者而日用之間悔吝潛積又已甚多朝夕惴懼不知所以為計若擇之能一來輔此不逮幸甚然講學之功比舊却覺稍有寸進以此知初學得些靜中功夫亦為助不小答吕子約示喻日用工夫如此甚善然亦且要見一大頭腦分明便于澡舍之間有用力處如實有一物把住放行在自家手裏不是謾説求其放心實却茫茫無把捉處也子約復書云某蓋嘗深體之此箇大頭腦本非外面物事是我元初本有底其曰人生而靜其曰喜怒哀樂之未發其曰寂然不動人汩汩地過了日月不曾存息不曾實見此體段如何會有用力處程子謂這箇義理仁者又看做仁了智者又看做智了百姓日用而不知此所以君子之道鮮此箇亦不少亦不剩只是人看他不見不大段信得此話及其言于勿忘勿助長間認取者認乎此也認得此則一動一靜皆不昧矣惻隱羞惡辭讓是非四端之著也操存久則發見多忿􅓰憂患好樂恐懼不得其正也放舍甚則日滋長記得南軒先生謂驗厥操舍乃知出入乃是見得主腦于操舍間有用力處之實話蓋苟知主腦不放下雖是未能常常操存然語默應酬間􅍓􅍓能自省驗雖其實有一物在我手裏然可欲者是我底物不可放失不可欲者非是我物不可留藏雖謂之實有一物在我手裏亦可也若是謾説既無歸宿亦無依據縱使強把捉得住亦止是襲取夫豈是我元有底邪愚見如此敢望指教朱子答書云此段大槩甚正當親切答吳德夫承喻仁字之説足見用力之深熹意不欲如此坐談但直以孔子程子所示求仁之方擇其一二切于吾身者篤志而力行之于動靜語默間勿令間斷則久久自當知味矣去人欲存天理且據所見去之存之功夫既深則所謂似天理而實人欲者次第可見今大體未正而便察及細微恐有放飯流啜而問無齒決之譏也如何如何答或人中和二字皆道之體用舊聞李先生論此最詳後來所見不同遂不復致思今乃知其為人深切然恨已不能盡記其曲折矣如云人固有無所喜怒哀樂之時然謂之未發則不可言無主也又如先言愼獨然後及中和此亦嘗言之但當時既不領略後來又不深思遂成蹉過孤負此翁耳答劉子澄日前為學緩于反已追思凡百多可悔者所論注文字亦坐此病多無著實處回首茫然計非嵗月功夫所能救治以此愈不自快前時猶得敬夫伯恭時惠規益得以自警省二友云亡耳中絶不聞此等語今乃深有望于吾子澄自此惠書痛加鐫誨乃君子愛人之意也朱子之後如真西山許魯齋吳草廬亦皆有見于此而草廬見之尤真悔之尤切今不能備録取草廬一説附于後臨川吳氏曰天之所以生人人之所以為人以此德性也然自聖傳不嗣士學靡宗漢唐千餘年間董韓二子依稀數語近之而原本竟昧昧也逮夫周程張邵興始能上通孟氏而為一程氏四傳而至朱文義之精密又孟氏以來所未有者其學徒往往滯于此而溺其心夫既以世儒記誦詞章為俗學矣而其為學亦未離乎言語文字之末此則嘉定以後朱門末學之敝而未有能救之者也夫所貴乎聖人之學以能全天之所以與我者爾天之與我德性是也是為仁義禮智之根株是為形質血氣之主宰舍此而他求所學何學哉假而行如司馬文正公才如諸葛忠武侯亦不免為習不著行不察亦不過為資器之超于人而謂有得于聖學則未也况止于訓詁之精講説之密如北溪之陳雙峰之饒則與彼記誦詞章之俗學相去何能以寸哉聖學大明于宋代而踵其後者如此可嘆巳澄也鑽研于文義毫分縷析每以陳為未精饒為未密也墮此科臼中垂四十年而始覺其非自今以往一日之內子而亥一月之內朔而晦一嵗之內春而冬常見吾德性之昭昭如天之運轉如日月之往來不使有須臾之間斷則于尊之之道殆庶幾乎于此有未能則問于人學于已而必欲其至若其用力之方非言之可喻亦味于中庸首章訂頑終篇而自悟可也朱子晚年定論我陽明先生在留都時所採集者也揭陽薛君尚謙舊録一本同志見之至有不及抄寫袖之而去者衆皆憚于翻録乃謀而壽諸􅎚謂子以齒當志一言惟朱子一生勤苦以惠來學凡一言一字皆所當守而獨表章是尊崇乎此者蓋以為朱子之定見也今學者不求諸此而猶踵其所悔是蹈舛也豈善學朱子者哉麟無似從事于朱子之訓餘三十年非不專且篤而竟亦未有居安資深之地則猶以為知之未詳而覽之未博也戊寅夏持所著論若干卷來見先生聞其言如日中天睹之即見如五榖之藝地種之即生不假外求而真切簡易恍然有悟退求其故而不合則又不免遲疑于其間及讀是編始釋然盡投其所業假館而受學蓋三月而若將有聞焉然後知嚮之所學乃朱子中年未定之論是故三十年而無獲今賴天之靈始克從事于其所謂定見者故能三月而若將有聞也非吾先生幾乎已矣敢以告夫同志使無若麟之晚而後悔也若夫直求本原于言語之外真有以驗其必然而無疑者則存乎其人之自力是編特為之指迷耳正德戊寅六月望門人雩都袁慶麟謹識王文成公全書卷之三十八附録七世德紀附録一辨忠讒以定國是疏門人陸澄刑部主事時上臣切見巡按江西監察御史程啓充戶科給事中毛玉各論劾丁憂新建伯王守仁似若心迹未明功罪未當者此論一倡一二嫉賢妬功之徒固有和者而在朝在市冤憤不平臣係守仁門生知之最詳冤憤特甚敢昧死一言謹按守仁學本誠明才兼文武抗言時事致忤逆瑾杖之幾死謫居龍場居夷處困動心忍性獨悟道真荷先帝收用屢遷至于巡撫其在南贛四征而福建湖廣廣東江西數十年之巨寇為之蕩平因奉敕勘事福建道由江西至于豐城適遇賊變拜天轉風舟返吉安倡義督兵不旬月而賊滅人但見其處變之從容而不知其忠誠之激切人但見其成功之迅速而不知其謀略之淵微人但見其遭非常之搆陷而禍莫能中而不知其守身無毫髮之可疵當時張鋭錢寧輩以不遂賣國之計而恨之張忠江彬輩以不遂冒功之私而恨之宸濠劉吉輩以不遂篡逆之謀而恨之凡可以殺其身而赤其族者誅求搜剔何所不至使守仁而初有交好之情中有猶豫之意後有貪冒之為諸人其肯隱忍而不發乎逮皇上龍飛而褒慰殊恩形于詔旨天下方快朝廷之清明不意功罪既白賞罰既定乃復有此怪僻顛倒之論欲以曖昧不明之事而掩其顯著不世之功天理人心安在哉論者之意大略有六一謂宸濠私書有王守仁亦好一語二謂守仁曽遣冀元亨往見宸濠三謂守仁亦因賀宸濠生辰而來四謂守仁起兵由于致仕都御史王懋中知府伍文定攀激五謂守仁破城之時縱兵焚掠而殺人太多六謂宸濠本無能為一知縣之力可擒守仁之功不足多而其捷本所陳粧點過實然究其本心不過忌其功名而巳宸濠私書王守仁亦好之説乃啓充得于湖口知縣章玄梅者切惟刑部節奉欽依原搜簿籍既未送官封記收掌又事發日久别生事端委的真偽難辨無慿查究著原搜獲之人盡行燒毀欽此今玄梅之書從何而來使有之何足慿據且出于宸濠之口尤其不足取信者夫豪傑用意類非尋常可測守仁雖有防宸濠而圗之之意使幾事不密則亦不過如孫燧許逵之一死以報國而已其何以成後功以貽皇上今日之安哉設使守仁略有交通宸濠之迹而卒以滅之其心事亦可以自白况可以不足慿信之迹遂疑其心而舍其討賊之大功哉其遣冀元亨往見者是守仁知宸濠素蓄逆謀而元亨素懷忠孝欲使啓其良心而因以探其密計爾元亨一見不合而歸使言合志投當留信宿何反逆之日反在千里之外乎今元亨之冤魂既伸而守仁之心事不白天理人心何在乎毛玉疑守仁因賀宸濠生辰而偶爾遇變殊不知守仁奉敕將往福建而瑞金會昌等縣瘴氣生發不敢經行故道出豐城且宸濠生日在十三而守仁十五方抵豐城若賀生辰何獨後期而至乎其謂守仁由王懋中等攀激起兵尤為乖謬守仁近豐城五里而聞變即刻偽寫兩廣都御史楊旦大兵將臨火牌于知縣顧佖接見之時令人詐為驛夫入遞守仁佯喜以為大兵既至賊必易圗當令顧佖傳牌入城以疑宸濠又令顧佖守城許與撥兵助守時有報稱宸濠遣賊六百追虜王都者守仁回船而南風大逆乃慟哭告天而頃刻反風守仁又恐賊兵追至急乘漁舟脫身此時王懋中安在次日奔至蛇河遇臨江知府戴德孺即議起兵因不足恃又奔入新淦城欲與知縣李美集兵度不可居復奔至吉安見倉庫充實遂乃駐劄傳檄各處起調軍民一面榜募忠義之士方令伍文定以書請各鄉官王懋中等盟誓勤王而懋中又遲疑二日乃始同盟夫各府及萬之兵若非提督軍門以便宜起調其肯聽致仕鄉官而集乎今乃顛倒其説至謂守仁掩懋中之功天理人心安在乎至于破城之時焚者宫中自焚故內室毀而外宇存官兵但救而無焚也掠者伍文定之兵乘勝奪賊衣資衆兵不然也殺人者知縣劉守緒所領奉新之兵以守仁號令閉門者生迎敵者死故殺迎敵者百餘人及守仁至斬官兵殺掠者四十六人遂無犯者矣且省城之人各受宸濠銀二兩米一石與之拒守是賊也殺之何罪又宫為賊巢財皆賊贓焚之掠之亦何罪哉今舍其大功而摘其小過幾何而不為逆賊報仇乎且宸濠勢熖薰天觸者萬死人皆望風奔靡而已及守仁調兵四集搗其巢穴散其黨與數敗之餘羽翼俱盡妻妾赴水乃窮寇爾夫然後知縣王冕得以近之今乃以為一知縣可擒甚無據也果若所言則孫燧許逵何為𬒳殺而三司衆官何為𬒳縛耶楊鋭張文錦何為守之一月不敢出戰必待省城破而賊自解圍耶伍文定何以一敗而𬒳殺者八百人其餘諸將又何以戰之三日而後擒滅耶至若捷本所陳若作偽牌以疑賊心行反間以解賊黨之類所不載者尤多而謂以無為有可乎夫宸濠積謀有年一旦大發震撼兩京而守仁以一書生談笑平之于數日之內功亦竒矣使不即滅而貽先帝親征之勞臣不知賣國之徒計安出也使不即滅先帝崩臣又不知聖駕之來能髙枕無憂否也今建不世之功而遭不明之謗天理人心安在哉臣知守仁之心決非榮辱死生所能動者但恐公論不昭而忠臣義士解體爾此萬世忠義之冤而國是之大不定者宜乎天變之疊見也臣與守仁分係師生義均生死前之所辨天下公言伏願聖明詳察乞降綸音慰安守仁仍戒飾言官勿為異論庶幾國是以定而亦消天變之一端也臣干冒天威不勝戰栗待罪之至明軍功以勵忠勤疏門人黃綰光祿寺少卿時上臣聞賞罰者人主御天下之操柄也得其操柄死命可致天下可運之掌不得其操柄百事具廢𣣔治得乎故明主慎之至親不可移至讐不可奪有功必賞有罪必誅然必稱天以命之示非私也臣下視之不飾虗譽不結援黨不思賄托惟勉忠勤死不敢易𣣔不治得乎今或不然凡飾譽援黨賄托譏讒不及必獲顯擢無不如意凡盡忠勤職即譏讒蝟集黜辱隨至無不失意以此操柄失御人皆以姦結巧避為賢孰肯身任國家事哉臣不能枚舉姑以圥朝末年陛下初政一事論之如宸濠搆逆虐熖吞天藩郡震動宗親懾憂陛下嘗身見之矣腹心應援布滿中外鼎卿近幸賄賂交馳賣國姦臣待時發動兩京乏備四路無人方鎮逺近莫之如何握兵觀望滔滔皆是惟鎮守南贛都御史王守仁領敕福建勘事道經南昌中途聞變指心籲天誓不與賊俱生赤身孤走設奇運謀乃遣優人賫諜假與天兵約征方鎮會戰俾其邀獲以示有備牽疑賊謀以俟四路設備中執叛臣家屬繆托腹心又示無為以安其心然後激衆以義紏集烏合待兵成慮審發書罵賊使覺悔既出攝兵收復南昌按甲待之賊至安慶攻城方鋭警聞使還算其歸途水陸邀擊大潰賊衆遂擒宸濠于樵舍兵法有先勝而後求戰者非此謂也成功之後江右瘡痍未復武宗皇帝南巡姦權攘功嫉譛百端危疑莫測守仁恭勤曲致方靖地方僅獲身免守仁為忠可謂艱貞竭盡者矣使時無守仁倡義統衆謀獲機宜戰取有方安慶卒破金陵不保長驅北上應援蜂起腹心隂助京師存亡未可知也雖畢竟天命有在終必殱夷曠日持久士夫戮辱蒼生荼毒可勝言也守仁南贛鎮守地方之責𥘉無所與今受責地方者遇事不敢擔當不過告變待命而已守仁家于浙之山隂浙乃江右通衢兵力素弱長驅或下父兄宗族有噍類乎此時守仁夫豈不思但忘私奉公以為社稷不幸或敗夷滅何悔守仁之志可謂精貫白日者矣幸而成功宇內太平所謂徙薪曲突人不為功亦不致思其忠又守仁于武宗𥘉年劉瑾為姦人莫敢言守仁斥之觸恨選杖毒決碎尻折髀死而復蘇流竄瘴裔久方赦還始獲録用乃者南贛之鎮溪谷凶民聚黨為盜視效虐劫肆無忌憚凡在虔楚閩廣接壤山澤無非賊巢大小有司束手無䇿皆謂終不可理守仁鎮守未及三年兵威武略竒變如神以故茶寮桶岡諸寨大冒浰頭諸寨次第擒滅增縣置邏立明約遂為治境視古名將何以過此江右之民為立生祠歲時祝祭民心不忘亦可見矣曩者陛下登極命取來京宴賞封之新建伯而升南京兵部尚書言者又謂不當來京宴賞以致奢費夫陛下大官之厨日用無紀較諸一餐之宴所費幾何猶煩論之北京豈無一職必𣣔置之南京此乃邪比蔽賢嫉功之所為也守仁後丁父憂服滿遂不起用反時造言排論然雖蒙拜爵升官鐡劵未給祿米未頒朝事無與迹比樵漁縱使有過何庸論之况有功無過哉其意尤可知矣不獨守仁凡共勤王大小臣工亦廢黜殆盡臣不能枚舉姑以一二論之彼時領兵知府惟伍文定得陸副都御史得廕一子千户邢珣徐璉但升布政即令間住彼亦何過縱使有過八議惡在戴德孺雖升布政即死于水皆無廕子副使陳槐因勸宰臣進賢致怒讐人希意誣之獨黜為民御史伍希儒謝源輒以考察去官且陳槐邢珣等皆抱用世之才秉捐軀之義因功廢黜深可太息然在今日陛下操柄之失莫此為甚他日無事則可萬一有事將誰效用哉况守仁學原性命德由忠恕才優經濟使之事君處物必能曲盡其誠尤足以當薰陶備顧問以陛下不世出明聖之資與之浹洽講明天下之治生民之福豈易言哉前者言官屢薦故尚書席書吳廷舉今侍郎張璁桂蕚皆薦之曽蒙簡命用為兩廣總制臣謂總制寄止一方何若用之廟堂可以贊襄謀議轉移人心所濟天下矣伏惟陛下念明良遭遇之難蚤召守仁令與大學士楊一清等共圖至治另推才能為兩廣總制仍勑該部給與守仁應得鐡劵祿米將陳槐邢珣徐璉等起用伍希儒謝源等查酌軍功事例議録戴德孺量與廕襲此實陛下奉天所操之大柄不可毫髮移奪者宜早收之以為使人宣忠效力之權臣不勝懇悃之至地方疏霍韜竊見新建伯南京兵部尚書兼都察院左都御史王守仁奉命巡撫兩廣巳將田州思恩撫處停當隨復剿平八寨及斷藤峽等賊臣等皆廣東人與賊鄰壤備知各賊為患實迹嘗竊切齒蹙額而歎曰兩廣良民何其不幸生鄰惡境妻子何日寧也又嘗竊計曰兩廣何日得一好官員剿平各賊俾良民各安其生而頑民染患未深者亦得格心向化也乃今恭遇聖明特起王守仁撫剿田州思恩地方臣等竊謀曰兩廣自是有底寧之期也聖天子知人之澤也是役也臣等為王守仁計曰前巡撫動調三省兵若干萬梧州三府積年儲畜軍餉費用不知若干萬復從廣東布政司支去庫銀若干萬米不知支去若干萬殺死疫死狼兵鄉兵民壯打手不知若干萬僅得田州安靖五十日耳自是而思恩叛矣吊巖賊出圍肇慶府矣殺數千家矣此賊併時同出蓋與田州思恩東西相應和者也若王守仁者乘此大敗極敝之後仰承聖明特擢之恩雖合四省兵力再支庫銀百餘萬支米數百萬剿平田州報功級數萬人亦且曰天下大功也然而守仁不役一卒不費斗糧只宣揚陛下聖德遂致思恩田州兩府頑民稽首來服其奉揚聖化以來逺人雖舜格有苗何以過此臣等是以歎服王守仁不惟能肅將天威實能誕敷天德也若八寨之賊斷藤峽之賊又非田州思恩可比也天下十二省俱多平壤惟廣西獨在萬山之叢其土險其水迅其山之髙有猿猴不度飛鳥不越者故諺語曰廣西民三而賊七由山高土惡氣習凶悍雖良民至者亦化為賊也八寨賊洪武年間所不能平斷藤峽成化八年都御史韓雍僅得討平及今五十餘年遺孽復熾故廣西賊巢柳州慶逺鬱林府江諸賊雖時出劫掠官兵亦屢請征之若八寨賊則自國𥘉至今未有輕議征剿者蓋謂山水凶惡進兵無路消息少動賊巳先知一夫控險萬兵莫敵故百六十年未有敢征八寨賊者也賊亦恃險肆惡時出攻圍城堡殺掠良民何啻萬計四方頑民犯罪脫逃投入八寨則有司不敢追攝矣鄰近流賊避兵追剿投入八寨則官兵不敢誰何矣是八寨者實四方寇賊淵藪也斷藤峽又八寨之羽翼也廣西有八寨諸賊猶人有心腹疾也八寨不平則兩廣無安枕期也今王守仁沉機不露掩賊不備一舉而平之百數十年豺虎窟穴掃而清之如拂塵然非仰藉聖人神武不殺之威何以致此臣等是以歎服王守仁能體陛下之仁以懷綏田州思恩向化之民又能體陛下之義以討服八寨斷藤峽梗化之賊也仁義之用兩得之也謹按王守仁之成功有八善焉乘湖兵歸路之便則兵不調而自集一也因田州思恩效命之助則勞而不怨二也機出意外賊不及遁所誅者真積年渠惡非往年濫殺報功者比三也因歸師討逆賊無糧運之費四也不役民兵不募民馬一舉成功民不知擾五也平八寨平斷藤峽則極惡者先誅其細小巢穴可漸施德化使去賊從良得撫剿之宜六也八寨不平則西而柳慶東而羅旁緑水新寧恩平之賊合數千里共為窟穴雖調兵數十萬費糧數百萬未易平伏今八寨平定則諸賊可以漸次撫剿兩廣良民可漸安生業紓聖明南顧之憂七也韓雍雖平斷藤峽賊矣旋復有賊者實當爾時未及區畫其地為經久圗俾餘賊復據為巢穴故也今五十年生聚則賊復熾盛也亦宜若八寨乃百六十年所不能誅之劇賊山川天險尤難為功今守仁既平其巢窟即徙建城邑以鎮定之則惡賊失險後日固不能為變逋賊來歸不日且化為良民矣誅惡綏良得民父母之體八也或者議王守仁則曰所奉命撫剿田州思恩也乃不剿田州則亦已矣遂剿八寨可乎臣則曰昔吳楚反攻梁景帝詔周亞夫救梁亞夫不奉詔而絶吳楚糧道遂破吳楚而平七國安漢社稷夫不奉詔大罪也景帝不以罪亞夫何也傳曰闑以內寡人制之闑以外將軍制之又曰大夫出疆有可以安國家利社稷專之可也古之道也是故周亞夫知制吳楚在絶其食道而不在于救梁也是故雖有詔命猶不受也惟明君則以為功若腐儒則以為罪今王守仁知田州思恩可以德懷也遂約其降而安定之知八寨諸賊百六十年未易服也遂因時仗義而討平之仁義之用逹天德者也雖無詔命先發後聞可也况有便宜從事之旨乎或者又曰建置城邑大事也區處錢糧戶部職也不先奏聞而輒興功可乎臣則曰古者帝王千里之內自治千里之外附之侯伯而巳是豈堯舜湯武聖智反後世不如哉蓋慮輿圗既廣則智力不及與其役一已耳目之力而無益于事孰若以天下賢才理天下事為逸而有功也是故帝王之職在于知人而已既知其人之賢而委任之矣則事之舉錯一以付之而責其成功若功效不孚乃制其罪可也今既任之又從而牽制之則豪傑何所指手足乎是故王守仁之平八寨也所殺者賊之渠魁耳若逋逃者固未及殺也乘此時機建置城邑遂招逋逃之賊復業焉則積年之賊皆可化為良民也失此機會撤兵而歸俟奏得旨乃興版築則賊漸來歸又漸生聚據險結寨以抗我師雖欲築城亦不能矣昔者范仲淹之守西邉也𣣔築大順城慮敵人爭之乃先具版築然後巡邉急速興工一月成城西夏覺而爭之巳不及矣爾時范仲淹若俟奏報豈不敗乃事哉王守仁于建置城邑之役蓋計之熟矣錢糧夫役固不仰足戶部而後有處也其以一肩而分聖明南顧之憂可謂賢矣不以為功反以為過可乎先是正德十四年宸濠謀反江西兩司俯首從賊惟王守仁同御央伍希儒謝源誓心效忠不幸姦臣張忠許泰等𣣔掩王守仁之功以為巳有乃揚諸人曰王守仁𥘉同賊謀及公論難掩乃又曰宸濠金帛俱王守仁伍希儒謝源滿載以去當時大學士楊廷和尚書喬宇亦忌王守仁之功遂不與辨白而黜伍希儒謝源俾落仕籍王守仁不辨之謗至今未雪可謂黯啞之冤矣夫國家論功有二道焉有開國效功之臣焉有定亂拯危之臣焉開國之臣成則侯也敗則虜也雖勿焉可也惟禍變倐起社稷安危凛乎一髮效忠定亂之臣則不忘也何也所以衛社稷也昔者王守仁之執宸濠也可謂定亂拯危之功矣姦人猶或忌之而謗其短夫如是則後有事變誰肯效忠乎甚矣小人忌功足以誤國也臣等是以歎曰王守仁等江西之功不白無以勸勵忠之臣若廣西之功不白又無以勸䇿勳之臣是皆天下地方大慮也王守仁大臣也豈以功賞有無為重輕哉第恐當時有功之人及土官立功之人視此解體則在外撫臣遂無所激勸以為建功之地耳臣等廣人也目擊八寨之賊為地方大患百數十年一旦仰賴聖明任用守仁以底平定不勝慶忭今兵部功賞未見施行戶部覆題又復再勘臣恐機會一失大功遂沮城堡不得修築逋賊復據巢穴地方不勝可慮也是故冒昧建言惟聖明察焉乞早裁斷俾官僚早得激勸城寨早得修築逋賊早得招安良民早得復業嶺海之外歌詠太平祝頌聖德實臣等所以報陛下知遇一節也亦臣等自為地方大慮也不得已也為此具奏征宸濠反間遺事錢德洪龍光云是年六月十五日公于豐城聞宸濠之變時參謀雷濟蕭禹在侍相與拜天誓死起兵討賊𣣔趨還吉安南風正急舟不能動又痛哭告天頃之得北風宸濠追兵將及潛入小漁船與濟等同載得脫免舟中計議恐宸濠徑襲南京遂犯北京兩京倉卒無備圗𣣔沮撓使遲留半月逺近聞知自然有備無患乃假寫兩廣都御史火牌云提督兩廣軍務都御史楊為機密軍務事準兵部咨及都察院右副都御史顔咨俱為前事本院帶領狼逹官兵四十八萬齊往江西公幹的于五月𥘉三日在廣州府起馬前進仰沿途軍衛有司等衙門即便照數預備糧草伺候官兵到日支應若臨期缺乏誤事定行照依軍法斬首等因意示朝廷先差顔等勘事巳密于兩廣各處起調兵馬潛來襲取宸濠使之恐懼遲疑觀望不敢輕進使濟等密遣乖覺人役持火牌設法打入省城宸濠見火牌果生疑懼十八日回至吉安又令濟等假寫南雄南安贛州等府報帖日遂飛報府城打入省下一以動搖省城人心一以鼓勵吉安效義之士又與濟等謀假寫迎接京軍文書云提督軍務都御史王為機密軍務事準兵部咨該本部題奉聖旨許泰郤永分領邉軍四萬從鳳陽等處陸路徑擈南昌劉暉桂勇分領京邉官軍四萬從徐州淮安等處水陸並進分襲南昌王守仁領兵二萬楊旦等領兵八萬秦金等領兵六萬各從信地分道並進刻期夾攻南昌務要遵照方略并心協謀依期速進母得彼先此後致誤事機欽此等因咨到職除欽遵外照得本職先因奉敕前往福建公幹行至豐城地方卒遇寧王之變見已退住吉安府起兵今準前因遵奉敕旨候兩廣兵齊依期前進外看得兵部咨到緣由係奉朝廷機密敕旨皆是掩其不備先發制人之謀其時必以寧王之兵尚未舉動今寧王之兵巳出約亦有二三十萬若北來官兵不知的實消息未免有誤事機以本職計之若寧王堅守南昌擁兵不出京邉官軍逺來天時地利兩皆不便一時恐亦難圗須是按兵徐行或分兵先守南都候寧王已離江西然後或遮其前或擊其後使之首尾不救破之必矣今寧王主謀李士實劉養正等各有書密寄本職其賊將凌十一閔草四亦各密差心腹前來本職遞狀皆要反戈立功報效可見寧王已是衆叛親離之人其敗必不久矣今聞兩廣共起兵四十八萬其先鋒八萬係遵敕旨之數今巳到贛州地方湖廣起兵二十萬其先鋒六萬係遵敕旨之數今聞巳到黃州府地方本職起兵十萬遵照敕旨先領二萬屯吉安府地方各府知府等官各起兵快約亦不下一萬之數共計亦有十一二萬人馬儘巳彀用但得寧王早離江西其中必有內變因而乘機夾攻為力甚易為此今用手本備開緣由前去煩請查照裁處并將一應進止機宜許議停當選差乖覺曉事人員與同差去人役星夜回報施行須至手本者既已寫成手本令濟等選差慣能走遞家人重與盤費以前事機陽作實情備細密切説與令渠潛蹤隱迹星夜前來南京及淮揚等處迎接官兵又令濟等尋訪素與宸濠交通之人厚加結納令渠密去報知寧府宸濠聞知大加賞賜差人四路跟捉既見手本愈加疑懼將差人備細拷問詳悉當時殺死因此宸濠又疑李士實劉養正不信其謀又與龍光計議假寫回報李士實書內云承手教密示足見老先生精忠報國之本心始知近日之事迫于勢不得已而然身雖陷于羅網乃心罔不在王室也所喻密謀非老先生斷不能及此今又得子吉同心協力當萬萬無一失矣然幾事不密則害成務須乘時待機而發乃可不然恐無益于國而徒為老先生與子吉之纍又區區心所不忍也况今兵勢四路巳合只待此公一出便可下手但恐未肯輕出耳昨凌閔諸將遣人密傳消息亦皆出于老先生與子吉開導激發而然但恐此三四人者皆是粗漢易有漏泄須戒令慎密又曲為之防可也目畢即付丙子知名不具與劉養正亦同兩書既就遣雷濟設法差遞李士實龍光設法差遞劉養正各差遞人皆𬒳宸濠殺死宸濠由是愈疑劉李劉李亦各自相疑懼不肯出身任事以故上下人心互生疑懼兵勢日衰又遣素與劉養正交厚指揮髙􅐶致書劉養正及遣雷濟蕭禹引誘內官萬鋭等私寫書信與內官陳賢劉吉喻木等俱皆反間之謀又多寫告示及招降旗號開諭逆順禍福及寫木牌等項動以千計分遣雷濟蕭禹龍光王佐等分役經行賊壘潛地將告示粘貼及旗號木牌四路摽插又先張疑兵于豐城示以𣣔攻之勢又遣雷濟龍光將劉養正家屬在吉安者厚加看養隂遣其家人密至劉養正處傳遞消息亦皆反間之謀𥘉時宸濠謀定六月十七日出兵自已于二十二日在江西起馬徑趨南京謁陵即位遂直犯北京因聞前項反間疑沮之謀遂不敢輕出故十七等日先遣兵出攻南康九江而自留省城賊兵等候宸濠不出亦各疑懼退沮久駐江湖之上師老氣衰又見四路所貼告示及插旗號木牌人人解體日漸離散以故無心攻鬪其後宸濠探知四路無兵前項事機巳失兵勢已阻人馬已散多有潛來投降者我師一候宸濠出城即統伍知府等官兵疾趨攻破省城度宸濠顧念根本之地勢必歸救遂預發兵迎擊于鄱陽湖大戰三日罪人斯得右反間始末嘗聞諸吉水致仕縣丞龍光光謂德洪曰昔夫子寫楊公火牌將發時雷濟問曰寧王見此恐未必信曰不信可疑否對曰疑則不免夫子笑曰得渠一疑彼之大事去矣既而歎曰宸濠素行無道殘害百姓今雖一時從逆者衆必非本心徒以威劫利誘苟一時之合耳縱使奮兵前去我以問罪之師徐躡其後順逆之勢既判勝負預可知也但賊兵早越一方遂破殘一方民命虎兕出柙收之遂難為今之計只是遲留宸濠一日不出則天下實受一日之福光又言夫子捷疏慮繁文太多一切反間之計俱不言及亦以設謀用詭非君子得已之事不𣣔明言示人當時若使不行間計遲留寧王寧王必即時擁兵前進正所謂迅雷不及掩耳兩京各路何恃為備所以破敗寧王使之坐失事機全是遲留寧王一著所以遲留寧王全是謀行反間一事今人讀奏册所報皆是可書之功而不知書不能盡者十倍于奏册又言寧藩事平之後京邉官軍南來失其姦計由是痛恨夫子百計搜尋羅織無所泄毒擠怒門人冀元亨與濟禹光等俱𣣔置之死地冀元亨𬒳執光等四竄逃匿家破人亡妻子離散直伺官軍離却省城方敢出身回家當時光等粘貼告示摽插旗號木牌皆是半夜昏黑衝風冒雨涉險破浪出入賊壘萬死中得一生所差行間人役𬒳宸濠要殺者俱是親信家人今當事平之後議者不究始原并將在册功次亦盡削去此光等走役微勞雖皆臣子本分不足深惜但賞罰若此繼後天下倘或再有事變人皆以光等為鑒戒矣誰肯復效死力哉又言夫子應變之神真不可測時官兵方破省城忽傳令造免死木牌數十萬莫知所用及發兵迎擊宸濠于湖上取木牌順流放下時賊兵既聞省城巳破脅從之衆俱欲逃竄無路見水浮木牌一時爭取散去不計其數二十五日賊勢尚鋭值風不便我兵少挫夫子急令斬取先却者頭知府伍文定等立于鋭刨之間方奮督各兵殊死抵戰賊兵忽見一大牌書寧王已擒我軍毋得縱殺一時驚擾遂大潰次日賊兵既窮促宸濠思𣣔潛遁見一漁船隱在蘆葦之中宸濠大聲呌渡漁人移棹請渡竟送中軍諸將尚未知也其神運每如此又言嘗聞雷濟云夫子昔在豐城聞變南風正急拜受哭告曰天若憫惻百萬民命幸假我一帆風須臾風稍定頃之舟人歡譟回風濟禹取香煙試之舟上果然久之北風大作宸濠追兵將及時夫人公子在舟夫子呼一小漁船自縳勑令濟禹持米二斗臠魚五寸與夫人為别將發問濟曰行備否濟禹對曰巳備夫子笑曰還少一物濟禹思之不得夫子船頭羅蓋曰到地方無此何以示信于是又取羅蓋以行明日至吉安城下城門方戒嚴舟不得泊岸濟禹揭羅蓋以示城中遂歡慶曰王爺爺還矣乃開門羅拜迎入于是濟禹心歎危迫之時暇𥙿乃如此德洪昔在師門或問用兵有術否夫子曰用兵何術但學問純篤養得此心不動乃術爾凡人智能相去不甚逺勝負之決不待卜諸臨陳只在此心動與不動之間昔與寧王逆戰于湖上時南風轉急面命某某為火攻之具是時前軍正挫却某某對立矍視三四申告耳如弗聞此輩皆有大名于時者平時智術豈有不足臨事忙失若此智術將安所施又嘗聞鄒謙之曰昔先生與寧王交戰時與二三同志坐中軍講學諜者走報前軍失利坐中皆有怖色先生出見諜者退而就坐復接緒言神色自若頃之諜者走報賊兵大潰坐中皆有喜色先生出見諜者退而就坐復接緒言神色亦自若又嘗聞陳惟濬曰惟濬嘗聞之尚謙矣尚謙言昔見有待于先生者自稱可與行師先生問之對曰某能不動心曰不動心可易言耶對曰某得制動之方先生笑曰此心當對敵時且要制動又誰與發謀出慮耶又問今人有不知學問者儘能履險不懼是亦可與行師否先生曰人之性氣剛者亦能履險不懼但其心必待強持而後能即強持便是本體之蔽便不能宰割庶事孟施舍之所謂守氣者也若人真肯在良知上用功時時精明不蔽于𣣔自能臨事不動不動真體自能應變無言此曾子之所謂守約自反而縮雖千萬人吾往者也又嘗聞劉邦采曰昔有問人能飬得此心不動即可與行師否先生曰也須學過此是對刀殺人事豈意想可得必須身習其事斯節制漸明智慧漸周方可信行天下未有不履其事而能造其理者此後世格物之學所以為謬也孔子自謂軍旅之事未之舉此亦不是謙言但聖人得位行志自有消變未形之道不須用此後世論治根源上全不講及每事只在半中截做起故犯手腳若在根源上講求豈有必事殺人而後安得人之理某自征贛以來朝廷使我日以殺人為事心豈割忍但事勢至此譬之既病之人且須治其外邪方可扶回元氣病後施藥猶勝立視其死故耳可惜平生精神俱用此等沒緊要事上去了昔者德洪事先生八年在侍同門每有問兵事者皆默而不答以故南贛寧藩始末俱不與聞先生沒後搜録遺書七年而奏疏文移始集及查對月日而後五征始末具見獨于用間一事昔嘗概聞奏疏文移俱無所見去年德洪主試廣東道經江西訪問龍光始獲間書間牌諸稿并所聞于諸同門者歸以附録云時嘉靖乙未八月書于姑蘇之郡學陽明先生平浰頭記大學士湖東費宏惠之龍川北抵贛其山谷賊巢亡慮數百而浰頭最大浰之賊肆惡以毒吾民者亡慮數千而池仲容最著仲容之放兵四劫亡慮數十年而龍川翁源始興龍南信豐安逺會昌以邇巢受毒數正德丁丑之春信豐復告急于巡撫都御史王公伯安召諸縣苦賊者數十人問何以攻之皆謂非多集狼兵弗濟又謂狼兵亦嘗再用矣竟以招而後定公曰盜以招蔓此頃年大弊也吾方懲之且兵無常勢奚必狼而後濟耶若等能為吾用獨非兵乎乃與巡按御史屠君安卿毛君鳴岡合疏以剿請又請重兵權肅軍法以一士心詔加公提督軍務賜之旗牌聽以便宜區畫惟功之有成不限以時時橫水桶岡盜亦起而視浰為急公議先攻二洞乃會兵以圗浰凡軍中籌畫多咨之兵備副使楊君廷宜請募諸縣機兵而以其傭募新民之任戰者取贖金儲穀鹽課以餉之而兵與食足焉二洞之攻慮仲容乘虗以擾我也謀伐其交使辨士周祥等諭其黨黃金巢等得降者五百人籍以為兵仲容獨憤不從冬𥘉聞橫水破始懼使弟仲安率老弱三百人來圗緩兵且我覘之公陽許之使據上新地以遏桶岡之賊而實遲其歸圗閲月仲容聞桶岡破益懼為備益嚴公使以牛酒詗之賊度不可隱則曰盧珂鄭志髙陳英吾讎也恐其見襲而備之耳珂等皆龍川歸順之民有衆三千仲容脅之不可故深讎之公方欲以計生致仲容乃陽檄龍川盧珂等構兵之實若甚恐焉趣利刋木且假道以誅珂黨十二月望珂等各來告仲容必反公復怒其誣構叱收之隂諭意向使遣人先歸集衆時兵還自桶岡公合樂大饗散之歸農示不復用使仲安亦領衆歸又遣指揮余恩諭仲容毋撤備以防珂黨仲容益喜前所辨士因説之親詣公謝且曰往則我公信爾無他而誅珂等必矣仲容然率四十人來見公聞其就道也密飾諸縣勒兵分哨又使千戶孟俊偽持一檄經浰巢宣言將拘珂黨實督集其兵也賊導俊出境不復疑閠十二月下弦仲容既至贛是夕釋珂等馳歸縻仲容令官屬以次饗犒明年正月癸卯朏公度諸兵已集引仲容入并其黨擒之出珂等所告訊鞫具狀亟使人約諸兵入巢越四日丁未同時並進其軍于龍川者惠州知府陳祥率通判徐璣從和平都入指揮姚璽率新民梅南春等從烏龍鎮入孟俊率珂等從平地水入軍于龍南者贑州知府邢珣率同知夏克義知縣王天與等從太平保入推官危夀率義民葉方等從南平入守備指揮郟文率義民孫洪舜等從冷水徑入余恩率百長王受等從髙砂保入軍于信豐者南安知府季斆率訓導藍鐸等從黃田岡入縣丞舒富率義民趙志標等從烏􅏙入公自率中堅督文搗下浰大巢副使君督餘哨會于三浰賊黨自仲容至贑備巳弛矣至是聞官兵驟入皆驚失措乃分投出禦而悉其精鋭千餘迎敵于龍子嶺我兵列為三衝掎角而前恩以受兵首與賊戰却之奮追里許賊伏四起擊受後夀乃以方兵鼓噪往援俊復以珂等兵從旁衝擊呼聲震山谷賊大敗而潰遂併上中二浰克之各哨兵乘勝奮擊是日遂破巢十一曰熱水曰五花障曰淡方曰石門曰上下陵曰艻竹湖曰白沙曰曲潭曰赤塘曰古坑曰三坑明日探賊所奔分道急擊巳酉破巢凡六曰鐡石障曰羊角山曰黃田坳曰嶺岡曰塘含岡曰溪尾庚戌破巢凡二曰大門山曰鎮里寨辛亥破巢凡九曰中村曰半􅏙曰都坑曰尺八嶺曰新田􅏙曰古地曰空背曰旗嶺曰頓岡癸丑破巢凡四曰狗腳坳曰水晶洞曰五洞曰藍州丙辰破巢凡二曰風盤曰茶山其奔者尚八百餘徒聚于九連山山峻而袤廣與龍門山後諸巢接公慮以兵進逼其勢必合合難制矣乃選鋭士七百餘人衣所得賊衣若潰而奔取賊所據崖下澗道乘暮而入賊以為其黨也從崖下招呼我兵亦洋與和應已度險扼其後路明日賊始覺併力求敵我兵從髙臨下擊敗之公度其必潰也預戒各哨設伏以待乙丑覆之于五花障于白沙于銀坑水丁卯覆之于烏龍鎮于中村于北山于風門奧分逃餘孽尚三百餘徒各哨乃會兵追之二月辛未復與戰于和平甲戌戰于上坪下坪丁丑戰于黃田坳辛巳戰于鐡障山癸未戰于乾村于梨樹乙酉戰于艻竹壬辰戰于百順于和洞乙未戰于水源于長吉于天堂寨諜報各巢之稔惡者蓋幾盡矣惟脅從二百餘徒聚九連谷山呼號乞降公遣珣往撫之籍其處之白沙公率副使君乃即祥應和平相其險易經理立縣設隘庶幾永寧遂班師而歸蓋戍寅三月丁未也凡所搗賊巢三十八所擒斬賊酋二十九人中酋三十八人從賊三千六十八人俘賊屬男婦八百九十人鹵獲馬牛器仗稱是是役也以力則兵僅數千以時則旬僅六夾遂能滅此凶狡稽誅之虜以除三徼數十年之大患其功偉矣捷聞有詔褒賞官公之子世錦衣百戶副使君加俸一秩于是邢侯夏侯危侯偕通判文侯運吳侯昌謂公兹舉足以威不軌而昭文德不可以無傳也使人自贑來請豫書其事嗟乎惟兵者不祥之器王公用儒者謀謨之業而乃躬擐甲胄率先將士下上山谷與死寇角勝爭利出於萬死而公平日豈習殺伐之事而貪取摧陷之功以為快哉顧盜之于民不容並育譬則莠驕害稼而養之弗薅從虎狼之狂噬而聼孽牧之衰耗此不仁者所不忍為而公亦必不以不仁自處也公之心豫知之公之功則播之天下傳之後世何俟于豫之書之也然而人知渠魁之坐縳凶孽之蕩平以為成功如此其易而不知公之籌慮如此其密建請如此其忠上之所以委任如此其專副使君之所贊佐如此其勤文武將吏之所以奔走禦侮如此其勞而功之成所以如此其不易是則不可以不書也豫故為備書之以昭示贑人庶其無忘且有考焉移置陽明先生石刻記昔陽明王先生督兵于贑也與學士大夫切劘于聖賢之學自縉紳至于閭閻以及四方之過賔皆得受業問道蓋濂洛之傳至是復明而先生治兵料敵卒有以平姦宄者皆原于切劘之力于是深信人心本善無不可復其不然者由倡之不力輔之不周而為學之志未立故也既以責志為教肄其子弟復取大學中庸古本序其大端與濂溪太極圗説聮書不于鬱孤山之上使登覽而逰息于此者出埃墻之表動髙明曠逺之志庶幾見所書而興起其志不使至于懈惰蓋所以為倡而輔之之慮切也先生去贑二十餘年石為風雨之所摧剝者日就缺壞而是山復為公𪠘所拘觀者出入不便嘉靖壬寅憲副江隂薛君應登備兵之暇訪先生故迹覩斯石悲慨焉既移置于先生祠中復求榻本之善者輔刻其缺壞而托記于豫豫嘗觀先生所書恨其學之不俱傳也自孔孟以後明其學者濂溪耳故圗説原天所以生人者本于無極而求復其原則以無𣣔為主舍無𣣔而言中正仁義皆不可以合德而反終故大學言致知中庸言慎獨獨知之地𣣔所由辨求其寡而無焉此至易而難者也先生數百年之下處困而後自得恍然悔既往之非真若脫溷淖而御冷風故既自以切劘而尤不敢有隱于天下于是擇其辭書之石兾來者之自得猶夫已也今先生之言遍天下天下之人多易其言而不知其處困之功與責志之教故深于解悟者每不屑于持守而意見所至即皆自是而不疑嘵嘵然方且以議論相持競譬則石已缺壞而猶不蔽風雨顧以為崇獲之嚴貿焉莫知其所出入豈不失哉夫𣣔之易熾速于風雨而志之難立有甚于石其積習之久非一日可移置也然使精神凝聚即獨知之地以從事焉則又不易地不由人而足以自反譬則石之摧剝于風雨者復庇之以厦屋雖失于昔不猶可以保其終乎今石存則升先生之堂者宜有待矣薛君有志于學其完此石蓋亦輔世之意而余之困而不學則有愧于切劘之助也書之石隂亦以為久要云陽明王先生報功祠記經世保民之道濟其變而後顯其功厚其施而後食其報傳曰太上有立德其次有立功時而至于立功則去太上逺矣士君子遭時遇主處常盡變不得已而立功固不望其報之久近人之思報自不能已故昌黎祀潮子厚祀柳張詠繪像而祀于蜀羊祜建碑而祀于襄陽其致一也贑之牙境萬山盤互群盜縱橫土酋跳梁于東南逆藩窺伺于西北正德丙子春陽明王公以大中丞秉鉞來鎮綱紀號令朝發夕新凡四省五道九府州六十九縣二十五衛所之奔命者皇皇汲汲恐于後至之誅又卓見大本廣集衆思張施操縱不出庭戶而遙制黠虜于江山數千里之外英聲義烈肅于雷霆今年平南靖明年平桶岡又明年平浰頭又明年平逆藩如虔如楚如閩如粵四郊力穡清夜絃歌而邉圉之患除如豫州如江州如桐城如淮甸千里肅清萬夫解甲而社稷之憂釋夫公以文儒之資生承平之世蹈踈逖之蹤當盤錯之會天樞全斗極之光地維掃豺狼之穴璽書頻奬茅土加封一時遭際可以風勵群工矣公之去贛久矣而人猶思之復建祠以祀之富者輸財貧者效力巧思者摸像善計者紏工虗堂香火無替歲時報施之道不于其存而于其亡身後之事未定于天下而私于一方吾是以知贛人之重義也孔子曰斯民也三代之所以直道而行也兹非三代之遺民歟公繼其父龍山公之學且與孫忠烈同年同官忠烈死逆藩之難而公成靖難之功浩然之氣充塞兩間增光皇國幸與不幸易地則皆然者然則公之立功雖有先後大小要皆以忠輸君以孝成親以信許友者歟公諱守仁字伯安别號陽明龍山公諱華以大魁冡宰孫忠烈諱燧以中丞贈宗伯皆吾鄉先逹也嗚呼望雷陽而思新竹按營壘而歎竒才髙山仰止景行行止謹紀其實以備野史之拾遺云田石平記田江之濵有怪石焉狀若一龜卧于衍石之上長倍尋厚廣可尋之半境土寧靜則偃卧維平有青則傾欹潛浮以離故處故俗傳有平寧傾兵之讖歲乙酉岑氏猛食采日殷恣橫搆兵守臣方上疏議討一夕石忽浮去數百武猛懼乃使力士復之嚮夕殷祀之以潛弭其變明年大兵至猛竟失利以滅人益異焉猛黨盧王二酋脅衆連兵據思田以重煩我師朝議特起今新建伯陽明王公來平比至集衆告曰蠢兹二酋豈憚一擒維瘡痍未瘳而重罹鋒創為可哀也即日下令解十萬之甲掣四省之兵推赤二酋俾自善計二酋憚公威德且知大信不殺遂率衆自縳泣降公如初令諭而遣之單車詣田經畫建置以訓奠有衆田父老望風觀德如堵如墻羅拜泣下曰大兵不加明公再生之賜也田醜何以為報維田始禍石實釁之具以怪狀聞且曰自王師未旋石靡有寧田人惴惴守之如嬰今則亡是恐矣願公毀此以寧我公田曰其然與若等往觀之既觀曰汝能怪乎吾不汝毀而與決取筆大書其上曰田石平田州寧千萬世鞏皇明明年春公使匠氏鐫之遂以為田鎮田人無逺近老稚咸謳歌于道以相慶焉嗟夫維石在阿賦性不那孰使之行豈民之訛維妖維祥肇是興亡天實變幻而莫知其方維邪則泄維正則滅亦存乎其人而巳矣公忠誠純正其靜一之學浩然之氣見于勤王靖難者可以格神明而貫金石天下已信之有弗靈于是石乎田人寶兹石文蓋不啻交人之纍銅枉也已公車將旋田人趨必東曰兹不可無述以告于世世作田石平記陽明先生畫像記少師徐階陽明先生像一幅水墨寫嘉靖已亥豫督學江西就士人家摹得先生燕居像二朝衣冠像一明年庚子夏以燕居之一贈吕生舒此幅是也先生在正德間以都御史巡撫南贛督兵敗宸濠平定大亂拜南京兵部尚書封新建伯其後以論學為世所忌竟奪爵豫往來吉贛間問其父老云濠之未叛也先生奉命按事福州乞歸省其親乘單舸下南昌至豐城聞變將走還幕府為討賊計而吉安太守松月伍公議適合郡又有積榖可養士因留吉安徴諸郡兵與濠戰湖中敗擒之其事皆有日月可按覆而忌者謂先生始赴濠之約後持兩端遁歸為伍所強會濠攻安慶不克乘其沮喪幸成功夫人情苟有約其敗徴未見必不遁凡攻討之事勝則侯不勝則族苟持兩端雖強之必不留武皇帝之在御也政由嬖幸濠悉與結納至或許為內應方其崛起天下皆不敢意其遽亡先生引兵而西留其家吉安之公署聚薪環之戒守者曰兵敗即縱火母為賊辱嗚呼此其功豈可謂幸成而其心事豈不皎然如日月哉忌者不與其功足矣又舉其心事誣之甚矣小人之不樂成人善也自古君子為小人所誣者多矣要其終必自暴白乃豫所深慨者今世士大夫髙者談玄理其次為柔願下者直以貪黷奔競謀自利其身有一人焉出死力為國家平定大亂而以忌厚誣之其勢不盡驅士類入于三者之途不止凡為治不患無事功患無賞罰議論者賞罰所從出也今天下漸以多事庶幾得人焉馳驅其間而平時所謂議論者如此雖在上智不以賞罰為勸懲彼其激勵中才之具不巳踈乎此豫所深慨也濠之亂孫許二公死于前先生平定之于後其迹不同同有功于名教江西會城孫許皆廟食而先生無祠豫督學之二年始祀先生于射圃未幾𬒳召因摹像以歸將示同志者而首以贈吕生豫嘗見人言此像于先生極似以今觀之貌殊不武然獨以武功顯于此見儒者之作用矣吕生誠有慕乎尚于其學求之重修陽明王先生祠記大學士李春芳陽明先生祠少師存翁徐公督學江右時所創建也公二十及第宏辭博學燁然稱首詞林一時詞林宿學皆自以為不及而公則曰學豈文詞巳也日與文莊歐陽公窮究心學聞陽明先生良知之説而深契焉江右為陽明先生過化地公既闡明其學以訓諸生而又謂崇祀無所不足以繫衆志乃于省城營建祠宇肖先生像祀之遴選諸生之俊茂者樂群其中名曰龍沙會公課藝暇每以心得開示諸生而一時諸生多所興起云既公召還荐躋綸閣為上所親信蓋去江右幾三十年矣有告以祠宇傾圯者公則愀然動心捐賜金九十屬新建錢令修葺之侍御甘齋成君聞之曰此豫責也遂身任其事鳩工庀材飾其所已敝增其所未備堂宇齋舍煥然改觀不惟妥祀允稱而諸生之興起者益勃勃不可禦矣噫公當樞管之任受心膂之寄無論幾務叢委即宸翰咨答日三四至而猶惓惓于崇先哲興後學如此誠以學之不可以已也夫致知之學發自孔門而孟子良知之説則又發所未發陽明先生合而言之曰致良知則好善惡惡之意誠推其極家國天下可坐而理矣公篤信先生之學而日以體之身心施之政事秉鈞之𥘉即發私餽屏貪墨示以好惡四海嚮風不數年而人心吏治翕然丕變此豈有異術哉好善惡惡之意誠于中也故學非不明之患患不誠耳知善知惡良知具存譬之大明當天無微不照當好當惡當賞當罰當進當退錙銖不爽各當天則循其則而應之則平平蕩蕩無有作好無有作惡而天下平矣故誠而自慊則好人所好惡人所惡而為仁不誠而自欺則好人所惡惡人所好而為不仁苟為不仁生于其心害于其事蠧治戕民有不可勝言者矣公為此懼又舉明道定性識仁二書發明其義以示海內學者而致知之學益明以切諸生能心惟其義而體諸身則于陽明先生之學幾矣業斯舍者其尚體公之意而殫力于誠以為他日致用之地哉成君守節曹州人癸丑進士按治江右飾紀布惠卓有賢聲蓋有志于學者平寧藩事略敬齋蔡文見任廉使陽明先生道德功業冠絶古今無容議矣獨寧藩一事不理于讒口者有二曰始與寧府交通後知事不可成因人之力從而剪之以成厥功又曰寧府財寶山積兵入其宫悉取以歸此二者當時讒口嗷嗷至形諸章奏播諸逺近縉紳有識皆知其為必無而莫悉其無之故皆知其絶無可疑而無以破人之疑余甚恨之足迹半天下訪之莫有知者逮移官入贛贛故先生開府之地當時故老尚有存者咨訪纍月乃得其詳于是躍然以喜疾讒口之無根且知先生計慮之深規模之逺有非常情之所能測識也自古建非常之功必待非常之人逆藩之積慮非一日矣當時所憚獨先生在耳殺之不得必𣣔致之事乃可成故致惓惓于先生而先生亦示不絶于彼者力有所為機有所待洞酋葉芳等有衆萬人感不殺之恩樂為我用先生推誠撫之間示以意芳叩首踴躍待報而發逆藩招集無賴亦屬意于葉芳嘗以厚資啖之芳受不郤有以聞于先生者先生撫然有失久之搏案起曰吾今日視義當為事之成敗身之禍福不計也會逆兵起遂部所屬民卒督知府邢珣伍文定等以行葉芳密使人告曰吾以欵彼也今日之事生死惟命先生大喜郎擕以往鄱湖之戰逆藩覬望芳來芳乘之遂就擒大難之平芳與有力不然逆兵衆且強獨以民卒之脆弱渙散安能當其鋒哉兵入南昌先生召芳語之曰吾請於朝以官償若勞如何芳叩首曰芳土人不樂拘束願得金帛作富家翁耳遂入宫藉所有以獻餘以豫芳滿其欲焉由前觀之先生所以陽示不絶于彼者隂欲有為于此使當時積榖練兵寧不啓彼之疑而厚其毒法曰藏于九地之下奮于九天之上是也其後以資委葉芳者則以夷治夷之法故先生心事如青天白日用兵若風雨雷霆本無可疑何疑者之紛紛也故表而出之蔭子咨呈正德十六年七月十八日奉到兵部鳳字二千八百八十號勘合內開一件捷音事準武選司付奉本部連送該本部題送準浙江布政司咨呈據紹興府申據餘姚縣申蒙本府𥿄牌仰縣速將都御史王承蔭子姪應該之人取具無礙親供并官吏里鄰人等不扶結狀繳報等因依蒙行據該隅里老吕時進等勘得右副都御史王任江西南贛等處剿賊成功欽承蔭子一人世襲錦衣衛百户行縣取具里老并本族親供今據前因合將繳到王冕等供狀一𥿄係本縣東北隅五里民籍有姪王守仁任江西南贛等處右副都御史為剿賊成功欽承蔭子王正憲世襲錦衣衛百户行縣取具里老并本族親供呈繳到部查得先該提督南贛都御史王奉稱征剿江西南贛等處賊寇驅卒不過萬餘用費不滿三萬兩月之間俘斬六千有竒破巢八十有四渠魁授首噍類無遺該本部查議得都御史王躬親督戰獲有軍功所當先録伏望聖明俯照節年平寇升蔭有功官員事例將王照例升職蔭子以酬其功等因具題正德十三年四月十八日節該奉聖旨是各官既剿賊成功地方有賴升右副都御史蔭子姪一人做錦衣衛世襲百戶欽此查無本官應襲子姪姓名已經備行原籍官司查取去後又該提督南贛軍務右副都御史王奏報廣東韶州府樂昌等縣平賊捷音內開擒斬首從賊人首級共二千八百九名顆俘獲賊屬并奪回𬒳虜男婦五百名口等因該本部查議得本官分兵設䇿一旦剿平厥功非細本部議將王量加升級于先蔭子百户上再加升蔭以酬其功伏蒙欽依王守仁已因功升職還賞銀四十兩紵絲二表裏臣等以為王守仁纍建竒功各不相掩今止給賞似不足酬其功合無王守仁量升俸給于先蔭子百户上量加升蔭等因本年十二月𥘉三日具題本月二十六日奉聖旨王守仁纍有成功他男先蔭職事上還加升一級欽此又經備行欽遵訖今據前因久查升級事例實授百户上加一級該副千户通查案呈到部𣣔將都御史王應蔭子王正憲查照先奉欽依加蔭子姪一人做錦衣衛世襲百戶再加續奉欽依加升一級與做副千户填注錦衣衛左所支俸緣係查録恩蔭節奉欽依王守仁蔭子姪一人做錦衣衛世襲百户及他男先蔭職上還加升一級事理等因正德十五年三月𥘉四日少師兼太子太師本部尚書王等具題次年四月二十五日奉聖旨是欽此欽遵擬合通行為此合行浙江布政司轉行紹興府餘姚縣著落當該官吏照依本部題奉欽依內事理即便查取王正憲作速起程前來赴任仍將本官起程日期繳報施行處分家務題册門人黃宗明書先師陽明先生夫人諸氏諸無出先生立從姪正憲為繼嘉靖丙戌繼室張氏生子名正聰未及一歲輒有兩廣之命當將大小家務處分詳明托人經理殁幾一載家衆童僕不能遵守在他日能保無悔乎宗明等因送先生葬回太夫人及親踈宗族子弟四方門人俱在將先生一應所遺家務逐一稟請太夫人與衆人從長計處分柝區畫以為間家正始防微杜漸之原寫立一樣五本請于按察司僉事王紹興府知府洪用印鈐記一本留府一本留太夫人正憲正聰各留一本同志一本永為照守先生功在社稷澤𬒳生民道在宇宙人所瞻仰其遺孤婺室識與不識無不哀痛况骨肉親戚門生故舊何忍棄之負之哉凡我同事自今處分之後如有異議人得舉正毋或輕貸同門輪年撫孤題單門人薛侃書先師陽明先生同祖兄弟五人伯父之子曰守義守智叔父之子曰守禮守信守恭同父兄弟四人長為先師次守儉守文守章先師年逾四十未有嗣子擇守信第五男正憲為嗣撫育婚娶嘉靖丙戍生子正聰明年奉命之廣身入瘴鄉削平反亂遂嬰竒疾卒于江西之南安凡百家務維預處分而家衆欺正聰年幼不知遵守吾儕自千里會葬痛思先師平生憂君體國拳拳與人為善之心今日之事宜以保孤安寡為先區區田業非其所重若後人不體見小失大甚非所以承先志也乃稟太夫人及宗族同門戚里僉事汪克章太守朱衮酌之情禮參以律令恤遺孤以弘本嚴內外以别嫌分㸑食以防微一應所有會衆分析具有成議日後倘復恩典承襲亦有成法正聰年幼家事立親人𬋩理每年輪取同志二人兼同扶助諸叔姪不得參撓為兄者務以總家愛弟為心以副恩育付托之重為弟者務以嗣宗愛兄為心以盡繼志述事之美為旁親者亦願公心扶植孤寡以為家門之光則先師在天之靈庶乎其少慰矣倘有踈虞執此聞官輪年之友亦具報四方同門咸為轉逹明有憲典幽有師靈尚冀不爽所有條宜開具于後請恤典贈諡疏禮科等科都給事中等官辛自修等題為開讀事伏覩詔書內一欵近年病故大臣有應得恤典而未得亦有不應得而得者科道官舉奏定奪欽此臣等公同面議舉得大學士楊廷和蔣冕石瑶尚書王守仁王廷相毛澄汪俊喬宇梁材湛若水喻茂堅劉訒聶豹侍郎吕柟周廣江曉程文德少詹事王偉祭酒王雲鳳魏校鄒守益二十一人竒勳大節茂著于生前令望髙風愈隆于身後俱應得恤典而未得者中間如吕柟有祭葬而無諡石瑶有諡而不足以盡其平生俱應改擬輔賜又訪得文臣中如曽銑楊守謙商大節程鵬朱方張漢王杲孫繼魯八人或志在立功身遭重辟或事存體國罪纍流亡至今無問知與不知皆痛惜之臣等仰惟恩詔既恤得罪之臣復舉原終之典而諸臣獨以一時負罪遂不得沽𬒳洪慈人心咸為憫惻似應查復原官量加優恤以示褒答等因奉聖旨禮部看議來説欽此浙江等道監察御史王等題為開讀事伏覩詔書內一欵近年病故大臣有應得恤典而未得亦有不應得而得者科道官舉奏定奪欽此欽遵臣等備行禮部祠祭司查取節年給過大臣恤典并有請未給緣由隨行浙江等道各公舉所知以奉明詔續行祠祭司及各道手本開具各臣前來臣等逐一會同詳議舉得原任大學士楊廷和蔣冕石瑶尚書王守仁王廷相湛若水毛澄汪俊喬宇梁材喻茂堅劉訒聶豹侍郎吕柟周廣江曉程文德少詹事黃佐祭酒魏校王雲鳳鄒守益等即其立朝則大節不虧遡其居身則制行無議公是在人不容泯沒俱應得恤典而未得者也中間如呂柟雖有恤典而未得贈諡石瑶巳有贈諡而未盡其人似應得輔賜改擬者也又查得節年給過恤典如尚書邵元節陶仲文顧可學徐可成甘為霖侍郎郭文英張電未隆僖等或穢迹昭彰人所共指或雜流冒濫法所不容俱不應得而得者也伏望敕下該部再加詳議將楊廷和王守仁等應復官廕者復其官廕仍給祭葬贈諡呂柟準賜贈諡以成恩禮石瑶如法改擬以符名實其濫叨恩典如邵元節陶仲文先經刑部議處外其顧可學等均為冒濫名器可惜合當追奪以昭明法者也再照録忠恤罪聖朝厚下之典也觀過而知仁明主鑒物之公也臣等又訪得如文臣之中如曽銑楊守謙商大節翟鵬朱方張漢王杲孫繼魯等究其罹禍之迹原其為國之忠生則未雪死而益明武臣之中如周尚文者出謀宣力功在邉疆恤典未給人心稱屈兹當聖仁湛濡之時正煩冤洗濯之會諸臣之恤典似當應給以廣殊恩者也再乞敕下該部一并酌議請自上裁仍通行各該撫按遵照詔書廣求博訪凡大臣恤典果有應得而未得及不應得者各宜悉心甄别以宣上德亦不得曲意徇物濫及庸劣庶幾恩之所敷潛晦不遺義之所抑回慝莫逃勸懲之典行而風世之道備矣等因奉聖旨禮部看議來説欽此辨明功罰疏南京戶科給事中岑用賔一本開讀事臣惟國家之禮大臣其生也固重其爵祿以寵異之其殁也亦必優其恤典以旌褒之所以示君臣一體之義終始存殁無間也然是恩寵之澤子奪出自朝廷之上忠良之臣固在所必加其匪人惡德亦不使得以幸及焉蓋加于忠良則為公及于匪人則為僣公而不僣則君子以勸小人以懲此固人君奉天而不私而實默寓勸懲之機于其間也臣伏讀皇上登極之詔內一欵有曰一近年病故大臣有應得恤典而未得亦有不應得而得者科道官舉奏定奪欽此臣有以仰見皇上之新政固將𣣔使朝廷恩寵之大典昭大公于天下萬世也臣備員南垣敢不祗承德意哉臣謹咨之縉紳參之聞見查得已故原任刑部尚書林俊福建興化府莆田縣人舉成化戊戌科進士歷官四十餘年屢陳讜言忠誠剴切抗犯顔敢諌之節尚簡素清約之風迭仆迭起朝野推重在四川則撫勦藍鄢之劇寇在江西則裁制寧藩之逆萌功尤不泯暮年遭際保終完名居家構疾具疏預辭身後恤典竟為不合者所忌乘機排阻至今公論惜之巳故原任南京兵部尚書新建伯王守仁浙江紹興府餘姚縣人舉弘治已未科進士筮仕三十餘年敡歷中外所至有聲而討江西宸濠之叛平廣西思恩田州及斷藤八寨之賊功烈尤著且博極經史究心理學倡明良知之訓洞暢本源至今為人士所宗不幸其殁也遽為忌者疏論遂削去伯爵并恤典贈諡迄今人以為恨巳故原任南京兵部尚書湛若水廣東廣州府增城縣人舉弘治乙丑科進士歷官三十餘年立朝正大重厚有休休有容之風治事經緯詳明有濟世匡時之略尤倡明正學以接引後進為己任自始至終孜孜忘倦凡所造就多為時名流致仕家居逾二十載夀考而終其子孫曽陳乞恤典贈諡未蒙先帝俞允至今衆論咸以為歉巳故原任南京工部尚書吳廷舉廣西橫州府千戶所人舉成化丁未科進士歷官四十餘年機略優長節操素勵犯逆瑾之怒而剛正不回諭桃源之寇而誠信久布且始終一介不取殁後殯殮無資廉潔髙風古今鮮儷訪其贈諡尚亦未與云已故原任户部侍郎唐胄廣東瓊州府瓊山縣人舉弘治壬戌科進士歷官四十餘年始終正直不少變易迭任藩臬巡撫勞代最多在部建議陳言忠讜更切後以忤旨𬒳杖削籍衆皆韙之昨吏部題請雖以復職贈官而祭葬并諡未議猶為缺典以上五臣其任職先後雖稍不同而負忠良重望則無二致明詔所謂應得恤典而未得者此其最也又查得已故原任禮部尚書顧可學其先後居官臣無暇論已獨其晚年挾持邪淫誕術干求進用因而濫叨恩賞穢濁清曹迄今輿論咸羞稱之其始而錬合秋石繼而錬製紅鉛妄行進御至使方士人等踵迹效尤皇上所謂王金陶倣等妄進藥物致損聖躬臣愚以為若誅求首惡則顧可學尤不容逭矣其存日既幸逃刑憲不與方士人等同就誅夷則其死也寧可復使之冒濫朝廷恩賚于泉下也哉明詔所謂有不應得而得者此誠其最也夫表揚善類則天下皆知為善之利排斥姦諛則天下皆知肆惡之非乃治世所不容緩者伏乞敕下該部查議如果臣言不謬即將林俊王守仁湛若水吳廷舉唐胄五臣查照舊例一體追輔贈諡祭葬廕子等項顧可學前後所冒官職贈廕等項盡行削奪其王守仁伯爵應否承襲并行集議題請取自上裁如此庶乎豫奪明而恩威不忒賞罰當而勸懲以昭矣再照臣子冤抑久當獲伸殊恩濫竊終宜釐正如巳故原任吏部尚書李默生平博雅能文清修鯁介居官守職茂著風猷止緣入柄銓曹不阿權勢遂致姦人乘望風旨竟爾擠排含冤囹圄齎志而死今際遇昌時彼泉壤之下寧無昭雪之望乎巳故原任江西副使汪一中在昔統兵征勦始而無料敵之明繼而無禦敵之䇿坐使狂寇沖突命殞兵殱較之守備不設誠為一律倘若憫其死事姑不追論存其官職猶或可也乃隆忠贈廕崇之貌祀其為冒濫不已甚乎當時與一中同事者僉事王應時也應時被虜贖回尋冒升秩旋𬒳參論落職觀應時不當冒升則一中不應贈廕明矣再乞敕下該部查議將李默一臣比照遺詔恤録之典復其官職加之贈祭少雪冤魂將一中一臣遵照明詔不當得之旨奪其贈廕祠祀俾母終辱明典則豫奪益彰而淑慝益著未必不為聖朝平明之治少禆也奉聖旨該部知道請從祀疏欽差提督學校巡按直隸監察御史臣耿定向謹題為應明詔乞褒殊􅈴以光聖治事恭惟皇上御極之𥘉詔下中外按剔幽滯恤録往忠鼓動寰宇凡有血氣者靡不競勸矣伏思原封新建伯南京兵部尚書王守仁者雖經科臣列舉題請顧其功在社稷道啓群蒙是猶未可以概凡論也臣敢特為陛下言之臣伏聞武宗初年舊邸宦官有馬永成劉瑾等時號八虎置造淫巧蠱惑上心日進走馬飛鷹導為娛樂不令親近儒臣講學修德耽廢萬幾時科道官諌不聼戶部尚書韓文泣血苦諌不聼左右輔臣時時密諌不聼以致海內洶洶思亂盜賊蜂起天下騷動江藩宸濠由此乘機竊發謀危宗社時非守仁在贛倡義擒滅今日之域中殆有不忍言者矣此其功在國論章章較著人所共明也及宸濠既擒太監張忠及許泰等復又誘惑武宗以親征為名巡幸南都其實隂懷異志𣣔逞不軌時宗社之危益如纍卵矣全賴守仁握兵上遊隨機運變各惡潛自震懾武宗因得還京厚終于以啓先皇帝逮我皇上今日萬世無疆之業此其功甚巨而為力尤難其迹則甚隱矣至其倡明道術默贊化理未易言述即舉所著拔本塞源一論開示人心猶為明切如使中外大小臣工實是體究則所以翊我皇上太平無疆之治者尤非淺小此其功則百千世可頌者也在昔先皇帝入繼大統首議錫爵進秩遣官存問即欲召入密勿以咨啓沃維時輔臣桂蕚者妬其軋已隂肆擠排故薦令督師兩廣竟使賫志以殁尋復構煽致削封爵智士忠臣至今扼腕悼嘆而不置矣伏惟皇上俯垂軫念敕下廷臣虗心集議特賜復爵贈諡從祀孔廟萬代瞻仰甚盛舉也臣竊又伏思為此請在國家詔功彛典當如此耳乃若篤忠效知之臣其心惟願國家永靈長之慶而不願有建功之賞惟願朝端協一德之交而不樂有倡道之名伏惟皇上省覽及此深惟往事之鑒益弘保太之圗而左右臣工共明一體之學頓消有我之私則守仁之道即已表章于今日而守仁之志即已獲伸于九原矣即今奕世厄窮永言銷滅亦其所安此守仁之心亦微臣之心也臣無任祝望激切隕越之至為此專差舍人丁憲賫捧謹題請旨奉聖旨禮部知道題贈諡疏吏部一本為開讀等事節該本部驗封清吏司案呈奉本部送準禮部咨該科道等官會舉已故原任新建伯南京兵部尚書兼都察院左都御史王守仁等官各應得恤典等因除祭葬照例給與外據贈官備咨前來本部俱經照例題奉欽依外準吏部咨該翰林院接出揭帖某人等因開咨送司案呈到部查得贈諡官員例應給與誥命本部欲行翰林院撰文中書舍人關軸書寫臣等未敢擅便開坐謹題請旨計撰述官員誥命軸原任新建伯南京兵部尚書兼都察院左都御史王守仁今贈新建矦諡文成原任少師兼太子太師吏部尚書華蓋殿大學士楊廷和今贈太保諡文忠原任少傅兼太子太傅戶部尚書謹身殿大學士蔣冕今贈少師諡文定原任太子太保吏部尚書兼武英殿大學士石珤今贈少保原任少保兼太子太保吏部尚書喬宇今贈少傅諡莊簡原任太子太保兵部尚書兼都察院左都御史王廷相今贈少保諡肅敏原任太子太保兵部尚書聶豹今贈少保諡貞襄原任太子太保兵部尚書彭澤今贈少保諡襄毅原任太子少保戶部尚書王杲今贈少保原任太子少保戶部尚書梁材今贈太子太保諡端肅原任禮部尚書汪俊今贈太子少保諡文莊原任刑部尚書喻茂堅今贈太子少保原任刑部尚書劉訒今贈太子少保原任刑部尚書林俊今贈太子少保諡貞肅原任南京工部尚書吳廷舉今贈太子少保諡清惠原任南京兵部尚書湛若水今贈太子少保原任兵部左侍郎張漢今贈兵部尚書原任南京工部左侍郎程文德今贈禮部尚書原任南京工部左侍郎何孟春今贈禮部尚書諡文簡原任南京禮部右侍郎吕柟今贈禮部尚書諡文簡原任兵部右侍郎兼都察院左副都御史曽銑今贈兵部尚書諡襄愍原任兵部右侍郎兼都察院右副都御史楊守謙今贈兵部尚書諡恪愍原任兵部右侍郎兼都察院右僉都御史商大節今贈兵部尚書諡端愍原任南京刑部右侍郎江曉今贈工部尚書原任都察院右副都御史孫繼魯今贈兵部左侍郎諡清愍原任詹事府少詹事兼翰林院侍讀學士黃佐今贈禮部右侍郎原任都察院右僉都御史朱方今贈都察院右副都御史原任南京國子監祭酒鄒守益今贈禮部右侍郎諡文莊原任刑部左侍郎劉玉今贈刑部尚書諡端毅原任太子太保吏部尚書㷱浹今贈少保諡恭肅原任太僕寺卿楊朂今贈右副都御史諡忠節原任左春坊左贊善羅洪先今贈光祿寺少卿諡文恭原任兵部員外郎楊繼盛今贈太常寺少卿諡忠愍題遣官造葬照會工部為開讀事書填堂字一千八百二十號勘合照會浙江布政司仰比號相同照依後開事件作速完報施行須至照會者計開一件開讀事屯田清吏司奉本部連送該本部題本司案呈奉本部送準禮部咨該禮科等科都給事中等官辛自修等題前事該本部看得大學士蔣冕性行朴忠學識雅正當武朝南巡之日而協謀靖亂共成康定之功遇先皇繼統之初而秉正立朝克效贊襄之職乞身逺引似得進退之宜潔已令終無損平生之譽新建伯兵部尚書王守仁具文武之全才闡聖賢之絶學筮官郎署而抗疏以犯中璫甘受炎荒之謫建臺江右而提兵以平巨逆親收社稷之功偉節竒勳久已見推於輿論封盟恤典豈宜遽奪于身終尚書汪俊秉剛介之性持廉慎之操筮仕詞林而再蹶復起生平之制行可知繼司邦禮而百折不回立朝之節槩具見潔巳無慚于古道歸田見重于鄉評尚書喬宇才猷博逹德量宏深預計伐叛濠之謀而留都賴之以不聳持法落逆彬之膽而好萌藉此以潛消入掌銓衡公明𢡟著晚歸田里譽望彌隆左都督周尚文志本忠勤才尤清耿深謀祕略克成保障於雲中鋭幹強才久震威名于閫外近年良將在所首稱身後恤典委難報罷以上諸臣論其職任才猷不無差等之别要其官常人品均為賢碩之儔所當厚加恤典以優異者也尚書喻茂堅歷官中外積有年勞守巳始終並無訾論尚書王杲持身清慎任事剛方謫死本無非罪大節委有可加以上二臣所當照例給與祭葬者也相應題請合無將大學士蔣冕尚書喬宇左都督周尚文各照例與祭九壇新建伯王守仁與祭七壇尚書汪俊與祭二壇尚書喻茂堅與祭二壇尚書王杲與祭四壇移咨工部照依品級造墳安葬及行各該布政使備辦祭物香燭𥿄就遣本司堂上官致祭等因題奉聖旨蔣冕喬宇周尚文王守仁汪俊各照例與祭葬還同吕柟俱與他諡石瑶準改諡其餘都依擬行欽此欽遵咨部送司查得先該本部為審時省禮以寬民力事議得病故大臣照依今定後開價值轉行有司措辦給付喪家自行造葬不必差官中間果有功德昭彰聞望素著公私無過或曽歷邉務建立竒功及經帷纂修效勞年久此等官貟合照舊例差官造葬俱聼本部臨時斟酌奏請定奪等因題奉武宗皇帝聖旨是造墳開壙工料價銀則例準擬欽此巳經通行欽遵去後今該前因通查案呈到部看得大學士蔣冕尚書喬宇王守仁汪俊喻茂堅王杲都督周尚文俱功德昭彰聞望素著及效勞經帷纂修并建立邉功俱應差官造葬查得本部司屬官員各有差占及查見今行人司并中書等衙門俱缺官不敷委用合候命下之日容職等查順便省分行移事簡衙門查有應差官員或一人兼差二三省本部照例各給批文定限仍行兵部應付各官前去各該布政司比號相同著落當該官吏照依後開擬定價值派辦各該布政司仍委堂上官一員會同本部委官前去造墳處所依式造葬各畢日備將夫匠價銀數目各該布政司類造黃册奏繳青册送部查考等因隆慶元年六月𥘉八日少傅本部尚書雷等具題本月𥘉十日奉聖旨是欽此欽遵擬合通行為此合連送司仰類行各該布政司著落當該官吏照依本部題奉欽依內事例欽遵造葬施行等因連送到司各付前去類填施行計開浙江布政司派辦已故原任新建伯兼南京兵部尚書王守仁係京二品文官造墳工料價銀二百五十兩夫匠一百五十名每名出銀一兩通共該銀四百兩正右照會浙江等處承宣布政使司準此隆慶元年六月十七日對同都吏王宜開讀事右照會浙江布政司當堂開拆祭葬劄付浙江等處承宣布政使司為開讀事禮房準戶部勘合科付承準禮部以字四千二百五十二號勘合照會前事準祠祭清吏司付奉本部連送該本部題本司案呈奉本部送禮科都給事中等官辛自修等題欽奉詔書內一欵近年病故大臣有應得恤典而未得亦有不應得而得者科道官舉奏定奪欽此臣等會同科道官復加詢訪公同面議舉得尚書王守仁竒勳大節茂著於生前令望髙風愈隆於身後應得恤典而未得者伏乞敕下該部再加查議如果恤典未給將王守仁應復官廕者先復其官廕仍給以祭葬贈諡等因奉聖旨禮部看議來説欽此欽遵抄出送司行準吏部文選淸吏司回稱王守仁原任新建伯兼南京兵部尚書及準考功清吏司手本回稱王守仁病故各回報到司查得大明會典并見行事例文官見任并致仕者二品病故祭二壇又查得凡伯爵𬋩事有軍功者祭七壇工部造墳安葬又查得先為比例乞恩贈諡事節奉孝宗皇帝聖旨今後有乞恩贈的恁部裏還要斟酌可否來説務合公論不許一槩徇情比例濫請該科記著欽此今該前因案呈到部看得恤典一節朝是所以崇奬賢哲褒答忠勞表章于既往激勸于將來其典至重其法至嚴者也若使有當得而不得有不應得而濫得者又何以示教戒于天下而公是非于後世耶茲者躬遇我皇上嗣承大統典禮鼎新正人心爭自濯磨之始而明詔所及特開釐正恤典一欵言官奉詔咨詢陳列上請無非祗承明命以公勸懲之意相應議擬為照新建伯兵部尚書王守仁具文武之全才闡聖賢之絶學筮官郎署而抗疏以犯中璫甘受炎荒之謫建臺江右而提兵以平巨逆親收社稷之功偉節竒勳久巳見推于輿論封盟恤典豈宜遽奪于身終所當厚加恤典以示優異者也臣等參稽公論查照事例明白相應題請合無將新建伯王守仁與祭七壇照依品級造葬仍乞賜諡易名以表潛懿其爵廕移咨吏部查議外合候命下行翰林院撰祭文並擬諡號工部差官造墳安葬及行該布政司買辦祭物香燭𥿄就遣本布政司堂上官致祭恩典出自朝廷臣等不敢定擬伏乞聖裁等因隆慶元年四月二十七日本部尚書兼翰林院學士髙等具題二十九日節奉聖旨王守仁照例與祭葬還與他諡欽此欽遵擬合就行為此合就連送仰付該司類行浙江布政司轉屬支給官錢買辦祭物香燭𥿄就遣本布政司堂上官致祭仍將用過官錢開報戶部知數毋得因而科擾不便連送到司合付前去煩為類填施行等因到司案呈到部擬合就行浙江布政司照依勘合內事理一體遵奉施行等因備承移付準此擬合就行為此除外劄付本官照劄備承照會內事理即便轉行該縣支給官錢買辦祭物香燭𥿄完備擇日申請本司分守該道親詣致祭施行畢日將用過官錢行過日期明開動支何項銀數備造青黃文册三本申報以慿轉繳施行毋得違錯不便須至劄付者計開一祭文諭祭文維隆慶年月日皇帝遣本布政司堂上某官某諭祭原任新建伯兼兵部尚書贈新建侯王守仁文曰惟卿學達天人才兼文武拜官郎署抗疏以斥權姦擁節江西仗義而討凶逆芟夷大難茂著竒勳又能倡絶學于將湮振斯文于不墜豈獨先朝之名佐實為當代之真儒顧公評未定于生前致恤典尚缺于身後朕茲嗣統特用頒恩爵陟矦封申錫酬功之命諡加美號庸彰節惠之公冥漠有知英靈斯烈首七等文曰惟卿學探洙泗之奧才為管葛之儔直節著于立朝竒功收于定難德既茂矣勳莫尚焉方膺顯命以貤榮遽罹讒言而裭爵公評殊快恩寵特加首七莫追載頌諭祭服茲明渥用慰幽靈終七百日文同但改首七為終七又改終七為百日下葬等文曰惟卿學問閎淵謀猷敏練接千載聖賢之正脈建萬年社稷之竒功久𬒳浮言莫伸國是雖爵隨身廢而名與道存兹當窀穸之期用賁幽泉之寵歆兹彛典奬爾忠魂期年除服文同但改窀穸為周期又改為禫除一祭品豬一口羊一羫饅頭五分粉湯五分果子五色每色五斤按酒五盤鳯雞一隻煠骨一塊煠魚一尾酥餅酥各四箇湯雞一分湯魚一分降真香一炷燭一對重一斤焚祝𥿄一百張酒二瓶右劄付紹興府準此入遞不差人隆慶二年二月十三日對同通吏朱椿開讀事十四日申時發行紹興府劄付押十六日到府江西奏復封爵咨任士慿欽差巡撫江西等處地方兼理軍務兵部右侍郎兼都察院右僉都御史任為開讀事據江西布政司呈奉職按驗準吏部咨前事內開會同巡按御史即查新建伯王守仁當宸濠倡亂之時仗義勤王奮身率衆中間分兵遣將料敵設謀斬獲功次擒縛渠魁等頃是否的有實迹可據地方蕩平之後羣情果否誦功爵廕削除以來羣情果否稱枉即今應否準其子孫世襲逐一備查明白作速會奏施行等因備咨前來案行本司會同司道查議詳報并蒙巡按江西監察御史蘇案驗奉都察院勘劄同前事依奉行據南昌府呈據南昌縣申稱故牒府縣儒學師生及喚通縣耆民坊里陳一鳴等并質之鄉宦原任侍郎等官曾鈞丁以忠劉伯躍胡植等逐一查結得宸濠隂謀不軌已將十年蓄養死士招集盜賊一旦舉事勢熖燻灼于時本爵方任南贛都御史往閩勘事正德十四年六月十五日行至豐城聞變即旋吉安督率知府伍文定等調集軍民兵快約會該府鄉官王懋中等相與激發忠義移檄遠近暴揚逆濠罪惡于是豪傑響應人始思奮士民知有所恃而壯膽逆黨知有所畏而落魄夫本爵官非守土而討逆之命又未下一旦舉大事定大謀此非忠憤激切克惇大義者不能也至七月𥘉二日逆濠留兵萬餘守江西省城而自引兵向闕本爵晝夜促兵十五日會臨江之樟樹十八日分布督遣知府伍文定等攻廣閠七門二十二日破賊盡擒逆惡二十四日逼黃家渡二十六日逆濠就擒不延時日江省底定此非謀略素定料敵若神者不能也夫逆濠一大變也以六月十四日起事以七月二十六日蕩平兵不血創民不易市即本爵之勳烈誠與開國同稱逮先帝登極大定公典論江西首功封本爵為新建伯給劵世襲此固報功之盛典而江右咸稱快焉繼因平蠻病故朝議南寧之事霍韜黃綰諸臣奏疏甚明竟扼于衆忌而天下咸稱枉焉邇者為開讀事科道等官疏𣣔復其世襲此公道之在人心不容泯也昔開國文臣劉基以武功封誠意伯停襲百餘年嘉靖𥘉特取其的裔世襲夫本爵學貫天人才兼文武忠揭日月功維社稷恩庇生民擬之劉誠意不相伯仲儻蒙覆奏準其世襲扶植崇德報功之公道興起忠臣義士之世教等因并據本縣儒學生員王緝等結報相同備申本府轉申到司據此隨該本司左布政使曹三暘右布政使程珤會同按察使張柱都司署都指揮僉事耿文光分守南昌道左參政方弘靜分巡南昌道僉事嚴大紀會看得原封新建伯王守仁正德十四年督撫南贛之時於六月𥘉九日自贛起行往福建勘事時宸濠謀為不軌欲圖社稷本月十四日擅殺都御史孫燧副使許逵並執縛都布按三司官及府縣等衙門大小官員俱囚之盡收在城各衙門印信及搬搶各庫藏一空釋放在城各司府縣見監重囚舟楫蔽江而下聲言直取南京次日本爵在于豐城舟中聞變疾趨吉安集兵勤王行至中途尤恐兵力未集若宸濠速出難以遽支乃間諜揚言朝廷先知寧府將叛行令兩廣湖襄都御史楊旦秦金準兵部咨調遣各處兵馬暗伏要害地方以伺寧府兵出襲殺復取優人數輩將公文各縫衣絮中各與數百金以全其家令其至伏兵處所飛報竊發日期將發間又捕捉偽太師李士實家屬至舟尾令其覘知本爵佯怒令牽之上岸處斬巳而故縱之令其奔報宸濠邏獲優人果于衣絮中搜得公文宸濠遂疑懼不敢即發十八日至吉安督率本府知府伍文定臨江知府戴德孺贛州知府邢珣袁州知府徐璉等調集軍民召募義勇會計一應解留錢糧支給糧餉造作戰船奏留公差回任御史謝源伍希儒分職任事約會致仕養病丁憂間住及赴部調用等項一應鄉官相與激勸忠義曉諭禍福又恐宸濠知其調度覺其間諜發兵速出乃密使偽國師劉養正家屬及平日與宸濠往來鄉官隂致歸附之意以緩其出直伺調度巳定乃移檄逺近宣布朝廷威惠暴露宸濠罪惡又度兵家決勝之機不宜急沖其鋒須先復省城搗其巢穴賊聞必回兵來援則出兵邀而擊之此全勝之䇿于是佯示以自守不出之計七月𥘉二日宸濠留兵萬餘使守江西省城乃自引兵向安慶本爵探知其出遂星馳促各府兵期以本月十五日會于臨江之樟樹鎮身督知府伍文定等兵徑下戴德孺等兵各依期奔集十八日遂至豐城分布哨道約會齊攻省城廣閠等七門是日又探得宸濠伏兵于新舊墳厰以備省城之援乃密遣兵從間道襲破之以搖城中十九日發市汊二十日各兵俱至信地我師鼓噪並進綈絙而登一時七門齊入城遂破擒其居守宜春王拱樤及偽太監萬鋭等千餘人宸濠宫中眷屬縱火自焚遂封府庫搜出原收大小衙門印信九十六顆先上江西捷音疏仍分兵四路追躡宸濠攻圍安慶未下至是果解圍歸援省城卒如本爵所料于是議禦寇之䇿本爵斷以宜先出鋭卒乘其惰歸邀擊以挫其鋒衆將不戰而自潰遂遣知府伍文定等分道並進擊其不意奮死殊戰賊大潰因傍諭城中軍民雖嘗受賊官爵能逃歸者皆免死能斬賊徒歸降者皆給賞使內外居民及響導人四路傳布以解散其黨二十三日宸濠先鋒至樵舍風帆蔽江本爵親督伍文定等四面分布以張其勢二十四日賊逼黃家渡乃合兵交擊噪呼並進賊大潰而奔擒斬二千餘級落水死者以萬數賊氣大沮退保八字腦二十五日伍文定等奮督各兵並進炮及宸濠舟賊又大潰擒斬二千餘級溺水死者莫計其數乃夜督伍文定等為火攻之具邢珣等分兵四伏期火發而合二十六日宸濠方召羣臣責其間不致死力者將引出斬之爭論未決我兵已四面而集火及宸濠副舟衆遂奔散宸濠與妃泣别宫人皆赴水死宸濠并其母子郡王將軍儀賔及偽太師國師元帥參贊尚書都督都指揮千百戶等官數百人皆就擒矣擒斬賊黨凡三千餘級落水死者約三萬餘所棄衣甲器仗財物與浮尸積聚橫亘若洲餘賊數百艘四散逃潰二十七日復遣官分兵追勦殆盡計先後擒斬首從賊人賊級并獲宫人賊屬奪回𬒳脅被虜招撫畏服官民男婦等項共一萬一千五百九十六名顆口功成而事定矣先是本爵起兵吉安時兩上疏乞命將出師蒙朝廷差安逺伯朱泰即許泰平虜伯朱彬即江彬左都督朱翬即劉翬太監張忠張永等為總督軍務贊畫機密等官體勘宸濠叛逆事情前往江西至中途聞宸濠受擒報捷至京計欲奪功乃密請駕親征江彬許泰等乃倡言本爵始同宸濠謀叛因見天兵親討始擒宸濠以功脫罪欲併擒本爵以為巳功又諭本爵欲將宸濠放至城中待駕至列陳重擒本爵不可遂各引兵至南京候駕本爵乃力疏請止親征九月十一日親自諒帶官軍將宸濠並宫眷逆情重犯督解赴闕扶病前進行止浙江杭州府又遇奏差太監張永齎駕帖開稱宸濠等待親臨地方覆審明白具奏定奪本爵遂按行浙江按察司轉呈太監張永會同監軍御史公同該省都布按三司等官將見解逆首宸濠並宫春等項逐一交付明白轉解於是江彬等日夕謀欲奪功𣣔反坐本爵並擒為功賴張永極力辨護得免時本爵功髙望重頗為當路所忌正德十六年十二月內該部題為捷音事議封公伯爵給與誥劵子孫世世承襲賜敕遣官奬勞錫以銀幣犒以羊酒封新建伯奉天翊衛推誠宣力守正文臣特進光祿大夫柱國兼南京兵部尚書參贊機務歲支祿米一千石三代拜妻一體追封本爵纍疏辭免明年嘉靖改元本爵丁父憂四方來遊其門講學益衆科道官迎當路意劾公偽學服闋例該起復六年不召江西輔臣有私憾本爵者密為進讒以阻其進嘉靖六年廣西岑猛倡亂兵部論薦本爵總督四省軍務前去蕩平又成大功時本部力參其擅離職役及參其處置廣西思田八寨事恩威倒置又詆其擒宸濠時軍功冒濫乞命多官會議明年江西輔臣復進密揭命多官會議遂削世襲伯爵並當行恤典皆不沽𬒳矣等因到職據此卷查先準吏部咨前事已經案行該司會同查議去後今據前因該職會同巡按江西監察御史蘇朝宗參看得原任新建伯王守仁當宸濠叛逆之日正督撫南贛之時宸濠之未發也若非勦平浰頭等巢則勇智絶倫之徒皆為賊所用必大肆蔓延之禍及宸濠之既發也若非行間以緩其出則四方大兵之衆非朝夕可集必難為撲滅之功督伍文定督戴德孺督邢珣等飽歌協力足見分兵遣將之能係省城係黃家渡係樵舍決勝若神信有料敵設謀之智斬獲功次具載於紀功之册而擒縛渠魁甚明於交割之文且奮身率衆之勞皆歷歷可據仗義勤王之舉尚昭昭在人先與後擒乃豪黨利已之誣本不足辨而其中原以北終不能攻陷金陵以據者要皆本爵至微之謀論之今日江西死節皆蒙贈恤生存皆獲撫安孰非本爵勤勞之舉地方蕩平之後誦功者載在口碑爵廕削除以來稱枉者孚於士論蓋較之開國元勳若非同事而擬其奠安社稷則與同功但世襲之典事體重大出自朝廷非臣下所敢輕議為此除具題外今備前由理合移咨貴部煩請查照施行須至咨者右咨吏部隆慶元年十月十一日行説堂十一月十三日到浙江撫巡奏復封爵疏王得春巡按浙江監察御史王題為懇乞鑒忠義復襲爵以光聖政事臣惟人臣報國之忠致身之義雖得之天性然其所以鼓舞而激勵之者實賴君父在上有以握其機也臣會同提督軍門趙竊見原任新建伯王守仁為浙江餘姚人方正德巳卯寧庶人宸濠謀反時守仁以南贛巡撫提督軍務奉旨前往福建勘處叛軍道經豐城聞變乃潛回吉安遂與知府伍文定等誓死討賊當是時也宸濠以數十年逆謀發之一旦遠邇駭震內而武宗皇帝左右近習多昏酣宸濠賂遺甚有與之交通者外而孫燧許逵同時𬒳害三司而下多就拘囚又遣其黨分收諸郡邑印信逆熖所薰視湖湘閩浙不復在目中帆檣東下日蔽江塞遂破南康九江如摧枯拉朽急攻安慶直瞰留都東南事勢亦孔棘矣守仁以書生民非素屬地非統轄兵非素練餉非素具徒以區區忠義號召豪傑倉卒調度誓死討賊其報宸濠謀反疏曰臣以區區之命誠為討賊之舉務使牽其舉動而使進不得前搗其巢穴而使退無所據夫觀守仁血誠之言其忠義根諸天性者固將昭日月而貫金石矣而其牽舉動搗巢穴之見智勇殊絶視宸濠真為囊中物耳宸濠固凶狡竟莫能逃繼之南昌破而巢穴平矣宸濠返而渠魁執矣不兩月間地方底寧朝廷無徴兵遣將之煩地方臻反亂為治之效此功在社稷甚為竒偉乃天祐國家生此偉人而其誠與才合蓋有追蹤乎百代之上者矣使是時而非遇守仁使守仁以南昌非故屬不以討賊為巳任即使討賊張虗聲待奏報而不速為撲滅之計臣等知東南安危未可必也即使朝廷之上聞變急圗遣將得人供餉得人調度得人未免延緩日時及其戡定又不知所傷人命幾何所費糧餉幾何所費爵賞幾何所損國家元氣幾何此守仁之功所以為大也奈何功雖成矣而姦黨忌嫉不惟爵賞不反抑且媒孽多方又賴天祜我國家不使忠義抱屈終身幸遇世宗皇帝入繼大統即位未幾首録守仁之功封新建伯世襲部下伍文定等升賞有差當是之時海內之人又莫不以世宗皇帝能賞忠義之􅈴亦莫不以守仁之功為足以當封爵而不愧也是時守仁雖膺封爵徒淹家居未嘗一日柄用嘉靖六年間始起奉敕討兩廣叛目盧蘇王受等既平以衝冒炎瘴病篤具疏辭官不待報而歸至江西南康地方病故夫以守仁江西之功論之誠已竭夫報國之忠以兩廣之還迹之又未失夫致身之義俱無可以議焉者祗以當時大臣有忌其兩廣功成疏中未敘已者乃從中主議謂其不俟命而行非大臣體遂有旨削襲爵臣等嘗為守仁冤之何則假使守仁詐病而歸與地方未平而急身謀誠為可罪然地方已平矣即不病亦當聼其辭歸以彰朝廷均勞大臣之義矧地方已平而又病病又篤卒死于道路而人猶執其迹以罪之冤亦甚矣茲幸我皇上御極即位一詔將使天下無一物不得其所故凡平日內外大小臣工或一言有益于國家一行有益于生民者無不恤録若守仁者其伯爵之襲臣等固謂其為皇上新政第一事也况經言官疏請往復行勘海內臣工萬口一詞咸以守仁伯爵當襲臣等謬膺撫按浙江為守仁桑梓地其得之公論稽之羣情揆之國典察諸守仁討賊之心之功其伯爵誠宜使襲而不可泯者且方今南北多事北虜尤甚皇上宵旰九重內外大小臣工非不競競圗謀思以陳見伐虜悃誠而犂廷掃穴之績尚未有能奏者臣等誠謂皇上宜籍守仁報國之忠致身之義皇上俯採公議復其襲爵將見內外大小臣工莫以守仁忠義不白于正德之季我世宗皇能白之又稍抑于嘉靖六七年間我皇上今日又獨能察而伸之莫不相率激勵於守仁之忠義以報皇上矣其為聖政之光豈小哉伏乞勑下吏部再加查議節次言官奏疏亟為上請守仁幸甚天下幸甚緣係懇乞鑒忠義復襲爵以光聖政事理為此具題奉聖旨吏部知道題請會議復爵疏吏部題為開讀事驗封清吏司案呈奉本部送吏科抄出巡撫江西等處地方兼理軍務兵部右侍郎兼都察院右僉都御史任題云云等因又該巡按江西監察御史蘇等題同前事俱奉聖旨該部知道欽此欽遵按查先奉本部送準禮部咨內開原任新建伯兼南京兵部尚書王守仁具文武之全才闡聖賢之絶學筮官郎署而抗疏以犯中璫甘受炎荒之謫建臺江右而提兵以平巨逆親收社稷之功偉節竒勳久已見推於輿論封盟恤典豈宜遽奪於身終爵廕仍咨吏部查議施行等因到部除新建伯王守仁照例追贈新建侯巳該本部具題奉有諭旨外所據世襲一節當武廟之未造江西宸濠突然稱變事關社稷本爵親調官兵一鼓擒之不動聲色措天下於太山之安較之靖遠威寧之功良亦偉矣但因南寧之事停襲歲久一旦議復事體重大相應就彼再行查勘以昭公論巳經備行移咨去後今該前因續該奉本部送吏科抄出提督軍務巡撫浙江等處地方都察院地方都察院右僉都御史趙題云云等因又該巡按浙江監察御史王題同前事俱奉聖旨吏部知道欽此欽遵抄送到司通查按呈到部查得王守仁以正德十四年討平逆藩宸濠之亂該本部題奉世宗皇帝聖旨王守仁封新建伯奉天翊衛推誠宣力守正文臣特進光祿大夫柱國還兼南京兵部尚書照舊參贊機務歲支祿米一千石三代並妻一體追封欽此嘉靖八年正月內為推舉才望大臣以安地方事該本部會題節奉欽依王守仁伯爵姑終其本身除通行欽遵外今該前因案呈到部看得爵人于朝賞延於世昔聖王所不能廢即如王守仁削平宸濠之變功在社稷豈有僅封伯爵止終其身之理所據南北兩京科道官江浙兩省撫按官交章論薦於四十年之後實惟天下人心之公是但事體重大必須廣延衆論本部難以獨擬合候命下容臣等會同五府九卿科道等官從公詳議如果新建伯應該世襲具實奏請恭候宸斷緣係開讀事理謹題請旨奉聖旨是會議復爵疏吏部尚書楊博少傅兼太子太傅吏部尚書楊博題為開讀事驗封清吏司案呈奉本部送吏科抄出巡撫江西等處都察院右僉都御史任題為開讀事據江西布政司呈奉職案驗準吏部咨前事內開會同巡按御史即查新建伯王守仁云云臣等會同太師兼太子太師後軍都督府掌府事成國公臣朱等戶部等衙門尚書等官馬等議得戡亂討逆者固人臣效忠之常崇功𢡟賞者實國家激勸之典已故新建伯王守仁本以豪傑命世之才雅負文武濟時之略方逆濠稱兵南下也正值武宗巡幸之時虐熖薰灼所至瓦解天下之事蓋已岌岌矣本爵聞變豐城不以非其職守急還吉安倡義勤王用敵間張疑兵得跋胡疐尾之算攻南昌擊樵舍中批亢搗虗之機未踰旬朔而元凶授首立消東南尾大之憂不動聲色而姦宄蕩平坐紹宗社石磐之固較之開國佐命時雖不同擬之靖遠威寧其功尤偉仰蒙先帝知眷圭符剖錫之賞已榮于生前不幸後𬒳中傷山河礪帶之盟尚靳于身後此誠四十年未備之缺典海內人心興滅繼絶所望于皇上者誠不淺也先該南北科道官交章騰荐公論益明近該江浙撫按官勘報相符功次甚確所據新建伯爵臣等稽之令典質之輿情委應輔給誥劵容其子孫承襲以彰與國咸休永世無窮之報但封爵重大係干特恩臣等擅難定擬伏乞聖裁奉聖旨你每既説王守仁有擒逆之功著遵先帝原封伯爵與世襲欽此欽遵已經查取應襲兒男去後今據浙江布政使司咨呈據紹興府申據餘姚縣申內開勘據該圗里鄰吕本隆等結稱王正億見年四十三歲原係南京兵部尚書都察院左都御史新建伯王守仁繼妻張氏於嘉靖五年十二月十二日所生嫡長親男向因伊父先年節次剿平南贛樂昌等處山賊恩廕一子世襲錦衣衛副千戶本官見任前職並非旁枝過繼亦無别項違礙相應承襲伯爵等因給文起送到司擬合起送為此除給批付本官親賫赴部告投外今將前項緣由同原來結狀理合備送咨呈施行等因到部送司案呈到部看得浙江布政使司查勘過見在錦衣衛副千戶王正億委係新建伯王守仁嫡長親男並無違礙相應承襲一節既經奉有前項明旨合無將王正億準其承襲新建伯伯爵以後子孫世襲但恩典出自朝廷未敢擅便等因隆慶二年十月二十五日少傅兼太子太傅吏部尚書楊博等具題本月二十七日奉聖旨是王正億準襲伯爵欽此再議世襲大典吏部等衙門少傅兼太子太傅尚書等官楊博等題為懇乞聖明再議世襲大典以服人心以重名器等因奉聖旨該部知道欽此欽遵抄出到部送司案查先為開讀事該科道等官都給事中辛自修等及南京戶科給事中岑用賔等各奏荐原任新建伯王守仁應復爵廕等因該本部題奉欽依備行江西撫按衙門查勘去後續該江西撫按官任士慿等查勘得原任新建伯王守仁應復伯爵等因又該浙江撫按官趙孔昭等會荐前來隨該本部題奉欽依會同太師兼太子太師後軍都督府掌府事成國公朱希忠等戶部等衙門尚書等官馬森等議得本爵一聞逆濠之變不以非其職守急還吉安倡義勤王未踰旬朔而元凶授首立消東南尾大之憂不動聲色而姦宄蕩平坐貽宗社盤石之固較之開國佐命時雖不同擬之靖遠咸寧其功尤偉委應輔給誥劵容其子孫承襲以彰與國咸休永世無窮之報等因奉聖旨你每既説王守仁有擒逆之功遵著先帝原封伯爵與世襲欽此欽遵案呈到部看得新建伯王守仁一事始而江西撫按勘議繼而府部科道會議揆之公論似亦允協乃今南京十三道官復有此奏係干賞延重典臣等難以獨擬合候命下容本部仍照例會同在京應議各官覆議明白具奏定奪未敢擅便伏乞聖裁等因五月十五日奏奉聖旨是欽此欽遵查得誠意伯劉基食糧七百石乃太祖欽定靖遠伯王驥一千石新建伯王守仁一千石係纍朝欽定多寡不同今該前因臣等會同太師兼太子太師後軍都督府掌府事成國公朱希忠等戶部尚書劉體乾等議得國封爵之典論功有六曰開國曰靖難曰禦胡曰平畨曰征蠻曰擒反而守臣死綏兵樞宣猷督府剿寇咸不與焉蓋六功者關社稷之重輕係四方之安危自非茅土之封不足報之至於死綏宣猷剿寇則皆一身一時之事錫以錦衣之蔭則可槩欲剖符則未可也竊照新建伯王守仁乃正德十四年親捕反賊宸濠之功南昌南贛等府雖同邦域分土分民各有專責提募兵而平鄰賊不可不謂之倡義南康九江等處首罹荼毒且進且攻人心搖動以藩府而叛朝廷不可不謂之徑敵出其不意故俘獻于旬月之間若稍懷遲疑則賊謀益審將不知其所終攻其必救故績收乎萬全之略若少有踈虞則賊黨益繁自難保其必濟膚功本自無前竒計可以範后靖遠咸寧姑置不論即如寧夏安化之變比之江西難易逈絶逰擊仇鉞于時得封咸寧伯人無間言同一藩服捕反何獨於新建伯而疑之乎所據南京各道御史欲要改蔭錦衣衛于報功之典未盡激勸攸關難以輕擬合無將王守仁男襲新建伯王正億不必改議以後子孫仍照臣等先次會題明旨許其世襲但豫奪出自朝廷臣等未敢定擬伏乞聖裁奉聖旨王守仁封爵你每既再議明白準照舊世襲
