body:
  text: 外集五記興國守胡孟登生像記壬戌弘治十年胡公孟登以地官副郎謫二興國越三年攫知州事公既久于其治乃姦鋤利植而民以大和又眀年壬戌擢浙江按察司僉事以去民既留公不可則相率祀公之像以報公德而學宮之左有疉山祠以祀宋臣謝枋得者舊矣其士曰合祀公像于是嗚呼吾州違胡元之亂以入于皇朝雖文風稍振而陋習未除士之登名科甲以顯于四方者相望如晨天之星數不能以一二蓋至于今遂茫然絶響者凡幾科矣自公之來斬山斥地以恢學宫洗垢摩鈍以新士習然後人知敦禮興樂而文采蔚然于湖湘之間薦于鄊者一嵗而三人蓋夫子之道大明于興國實自公始公之德惠固無庸言而化民成俗于是為大祀公于此其宜哉民曰不可其為公别立一廟公之未來也吾民外苦于盜賊內殘于苛政濱湖之民死于魚課者數千餘家自公之至而盜不敢履興國之界民違猛虎魚鱉之患而始釋戈而安寢歌呼相慰以嬉于里巷公之惠澤吾獨不能出諸口耳嗚呼公有大造于吾民乃不能别立一廟而使並食于謝公于吾心有未足也士曰不然公與謝公皆以遷謪而至吾州謝公以文章節義為宋忠臣而公之氣概風聲實相輝映祀公于此所以見公之庇吾民者不獨以其政事而吾民之所以懷公于不忘者又有在于長養恩恤之外也其于尊嚴崇重不滋為大乎于是其民相顧喜曰果如是我亦無所憾矣然其誰紀諸石以傳之士曰公之經厯四方也久矣四方之人其聞公之賢亦既有年矣然而屢遭讒嫉而未暢厥猷意亦知公之深者難也公嘗令于餘姚以吾人之知公則其人宜于公為悉乃走幣數千里而來請于某且告之故某曰是姚人之願不獨興國也公之去吾姚巳二十餘年民之思公如其始去每有自公而來者必相與環聚問公之起居飲食及其履􅍓之險夷丰采狀貌鬚髮之蒼白與否退則相傳告以為欣戚以吾姚之思公知興國之為是舉亦其情之有不得巳也然公之始去吾姚既嘗有去思之碑以紀公德今不可以重復其説而興國之績吾雖聞之甚詳然于其民為逺雖極意揄揚之恐亦未足以當其心也姑述其請記之辭而詩以系之公諱瀛河南之羅山人有文武長才而方嚮于用詩曰于維胡公允毅孔直惟直不撓以來興國惟此興國實荒有年自公之來闢為良田寇乘于垣死課于澤公曰吁嗟兹惟豫譴勤爾桑禾謹爾室家歲豐時和民謡以歌乃築泮宮教以禮讓弦誦詩書溢于里巷庶民諄諄庶士彬彬公亦欣欣曰惟家人維公我父惟公我母自公之去奪我恃怙維公之政不專于寬雨暘維若時其燠寒維公文武亦周于藝射御工力展也不器我拜公像從我父兄率我子弟集于泮宫父兄相謂毋爾敢望天子用公訓于四方新建預備倉記癸亥倉廪以儲國用而民之不給亦于是乎取故三代之時上之人不必其盡輸之官府下之人不必其盡藏于私室後世若常平義倉蓋猶有所以為民者而先王之意亦既衰矣及其大弊而倉廪之蓄遂邈然與民無復相關其遇凶荒水旱民餓莩相枕藉茍上無賑貸之令雖良有司亦坐守鍵閉不敢彂升合以拯其下民之視其官廪如仇人之壘無以事其刃為也嗚呼倉廪之設豈固如是也哉紹興之倉目如坻大有之屬凡三四區中所積亦不下數十萬然而民之飢餒稍不稔即無免焉嵗癸亥春融風日作星火宵隕太守佟公曰是旱徵也不可以無備既命民間積穀謹藏則復鳩工度地得舊太積庫地于郡治之東而建以為預備倉于是四月不雨至于八月農工大壞比室磬懸民陸走數百里轉嘉湖之粟以自療市火間作貿遷無所居公帥僚吏遍禱于山川社稷乃八月已酉大雨洽旬禾稿復穎民始有十一之望漸用蘇息公曰嗚呼豫所建今兹之旱雖誠無補于後患其將有裨乃益遂厥營九月丁卯工畢凡為廪三面草有六楹約受榖十萬幾千斛前為廳事以司出納而以其無事時則凡賓客部使之往來而無所寓者又皆可以館之于是極南阻民居限以髙垣東折為門出之大衢並門為屋草有八楹自南亘北以居商旅之貿遷者而月取其值以實廪粟又于其間區畫而綜理之蓋積三嵗而可以有一年之備矣二守錢君謂其僚曰公之是舉其惠于民豈有窮乎夫後之民食公之德而弗知其所自是吾儕無以􅐌公于今日而又以泯其績于後也于是相率來屬某以記某曰唯唯夫憫災而恤患庇民之仁也未患而預防先事之知也已患而不怠臨事之勇也創今以圖後敷德之誠也行一事而四善備焉是而可以無紀也乎某雖不文也願與執事而從事平山書院記癸亥平山在酆陵之北三里今杭郡守楊君溫甫蚤嵗嘗讀書其下鄷人之舉進士者自溫甫之父僉憲公始而溫甫承之溫甫既貴建以為書院曰使吾鄊之秀與吾楊氏之子弟誦讀其間翹翹焉相繼而興以無亡吾先君之澤于是其鄊多文士而溫甫之子晉復學成有器識將紹溫甫而起蓋書院為有力焉溫甫始為秋官郎豫時實為僚佐相懷甚得也溫甫時時為豫言平山之勝聳秀奇特比于峩嵋望之巖厲壁削若無所容而其上乃寬衍平博有老氏宮焉殿閣魁傑偉麗聞于天下俯覽大江煙雲杳靄暇輒從朋儕往遊其間鳴湍絶壑拂雲千仞之木隂翳虧蔽書院當其麓其髙可以眺其邃可以隱其芳可以采其清可以濯其幽可以棲吾因而望之以含逺之樓蟄之以寒香之摀揭之以秋芳之亭澄之以洗月之池息之以棲雲之窩四時交變風雪晦暝之朝花月澄芬之夕光景超忽千態萬狀而吾誦讀于其間蓋冥然與世相忘若將終身焉而不知其他也今吾汩沒于簿書案牘思平山之勝而庶幾夢寐焉何可得耶既而某以病告歸陽眀溫甫尋亦出守杭郡錢塘波濤之洶怪西湖山水之秀麗天下之言名勝者無過焉噫溫甫之居是地當無憾于平山耳矣今年與溫甫相見于杭而亹亹于平山者猶昔也吁亦異矣豈其沉溺于兹山果有不能忘情也哉溫甫好學不倦其為文章追古人而並之方其讀書于平山也優遊自得固將發為事業以顯于世及其施諸政事沛然有餘矣則又益思致力于問學而其間又自有不暇者則其眷戀于兹山也有以哉溫甫既巳成已則不能忘于成物而建為書院以倡其鄊人處行義之時則不能忘其隱居之地而拳拳于求其志者無窮巳也古人有言成已仁也成物知也溫甫其仁且知者歟又曰隱居以求其志行義以逹其道吾聞其語矣未見其人也溫甫殆其人也非歟溫甫屬豫記豫未嘗一至平山而平山巖巖之氣象斬然壁立而不可犯者固可想而知其不異于溫甫之為人也以溫甫之語豫者記之何陋軒記戊辰昔孔子欲居九夷人以為陋孔子曰君子居之何陋之有守仁以罪謪龍場龍場古夷蔡之外于今為要綏而習類尚因其故人皆以豫自上國往將陋其地弗能居也而豫處之旬月安而樂之求其所謂甚陋者而莫得獨其結題鳥言山棲羝服無軒裳宮室之觀文儀揖讓之縟然此猶淳龎質素之遺焉蓋古之􆁏法制未備則有然矣不得以為陋也夫愛憎面背亂白􅉳丹浚姦窮黠外良而中螫諸夏蓋不免焉若是而彬郁其容宋甫魯掖折旋矩矱將無為陋乎夷之人乃不能此其好言惡詈直情率遂則有矣世徒以其言辭物采之眇而陋之吾不謂然也始豫至無室以止居于叢棘之間則鬱也遷于東峯就石穴而居之又隂以濕龍場之民老稚日來視豫喜不豫陋益豫比豫嘗圃于叢棘之右民謂豫之樂之也相與伐木閣之材就其地為軒以居豫豫因而翳之以檜竹蒔之以卉藥列堂階辨室奧琴編圖史講誦逰適之道略具學士之來逰者亦稍稍而集于是人之及吾軒者若觀于通都焉而豫亦忘豫之居夷也因名之曰何陋以信孔子之言嗟夫諸夏之盛其典章禮樂􅍓聖修而傳之夷不能有也則謂之陋固宜于後蔑道德而專法令搜抉鈎縶之術窮而狡匿譎詐無所不至渾朴盡矣夷之民方若未琢之璞未繩之木雖粗礪頑梗而椎斧尚有施也安可以陋之斯孔子所為欲居也歟雖然典章文物則亦胡可以無講今夷之俗崇巫而事鬼瀆禮而任情不中不節卒未免于陋之名則亦不講于是耳然此無損于其質也誠有君子而居焉其化之也蓋易而豫非其人也記之以俟來者君子亭記戊辰陽眀子既為何陋軒復因軒之前營駕楹為亭環植以竹而名之曰君子曰竹有君子之道四焉中虛而靜通而有間有君子之德外節而直貫四時而柯葉無所改有君子之操應蟄而出遇伏而隱雨雪晦眀無所不宜有君子之時清風時至玉聲珊然中采齊而協肆夏揖遜俯仰若洙泗羣賢之交集風止籟靜挺然特立不撓不屈若虞廷羣后端冕正笏而列于堂陛之側有君子之容竹有是四者而以君子名不愧于其名吾亭有竹焉而因以竹名名不愧于吾亭門人曰夫子蓋自道也吾見夫子之居是亭也持敬以直內靜虛而若愚非君子之德乎遇屯而不懾處困而能亨非君子之操乎昔也行于朝今也行于夷順應物而能當雖守方而弗拘非君子之時乎其交翼翼其處雍雍意適而匪懈氣和而能恭非君子之容乎夫子蓋謙于自名也而假之竹雖然亦有所不容隱也夫子之名其軒曰何陋則固以自居矣陽眀子曰嘻小子之言過矣而又弗及夫是四者何有于我哉抑學而未能則可云爾耳昔者夫子不云乎汝為君子儒無為小人儒吾之名亭也則以竹也人而嫌以君子自名也將為小人之歸矣而可乎小子識之逺俗亭記戊辰憲副毛公應奎名其退食之所曰逺俗陽眀子為之記曰俗習與古道為消長塵囂溷濁之既逺則必髙眀清曠之是宅矣此逺俗之所由名也然公以提學為職又兼理夫獄訟軍賦則彼舉業辭章俗儒之學也簿書期會俗吏之務也二者公皆不免焉舍所事而曰吾以逺俗俗未逺而曠官之責近矣君子之行也不逺于微近纎曲而盛德存焉廣業著焉是故誦其詩讀其書求古聖賢之心以蓄其德而逺諸用則不逺于舉業辭章而可以得古人之學是逺俗也巳公以處之眀以決之寬以居之恕以行之則不逺于簿書期會而可以得古人之政是逺俗也巳苟其心之凡鄙猥瑣而徒間散踈放之是托以為逺俗其如逺俗何哉昔人有言事之無害于義者從俗可也君子豈輕于絶俗哉然必曰無害于義則其從之也為不茍矣是故苟同于俗以為通者固非君子之行必逺于俗以求異者尤非君子之心象祠記戊辰靈博之山有象祠焉其下諸苗夷之居者咸神而事之宣慰安君因諸苗夷之請新其祠屋而請記于豫豫曰毁之乎其新之也曰新之新之也何居乎曰斯祠之肇也蓋莫知其原然吾諸蠻夷之居是者自吾父吾祖遡曾髙而上皆尊奉而禋祀焉舉之而不敢廢也豫曰胡然乎有庳之祠唐之人蓋嘗毁之象之道以為子則不孝以為弟則傲斥于唐而猶存于今毁于有庳而猶盛于兹土也胡然乎我知之矣君子之愛若人也推及于其屋之烏而况于聖人之弟乎哉然則祀者為舜非為象也意象之死其在干羽既格之後乎不然古之鷔桀者豈少哉而象之祠獨延于世吾于是益有以見舜德之至入人之深而流澤之逺且久也象之不仁蓋其始焉爾又烏知其終之不見化于舜也書不云乎克諧以孝蒸蒸乂不格姦瞽瞍亦允若則已化而為慈父象猶不弟不可以為諧進治于善則不至于惡不抵于姦則必入于善信乎象蓋巳化于舜矣孟子曰天子使吏治其國象不得以有為也斯蓋舜愛象之深而慮之詳所以扶持輔導之者之周也不然周公之聖而管蔡不免焉斯可以見象之既化于舜故能任賢使能而安于其位澤加于其民既死而人懷之也諸侯之卿命于天子蓋周官之制其殆倣于舜之封象歟吾于是益有以信人性之善天下無不可化之人也然則唐人之毁之也據象之始也今之諸夷之奉之也承象之終也斯義也吾將以表于世使知人之不善雖若象焉猶可以改而君子之修德及其至也雖若象之不仁而猶可以化之也卧馬冢記戊辰卧馬冢在宣府城西北十餘里有山隆然來自蒼茫若涌若滀若奔若伏布為層裀擁為覆釜漫衍陂迤環抱涵逈中凝外完內缺門若合流泓洄髙岸屏塞限以重河敷為廣野桑乾燕尾逺泛近挹今都憲懷來王公實葬厥考大卿于是方公之卜兆也禱于大卿然後出從事屢如未迪末乃來兹顧瞻徘徊心契神得將歸而加諸卜爰視公馬眷然跽卧嚔嗅盤旋繾綣嘶秣若故以啓公之意者公曰嗚呼其弗歸卜先公則既命于此矣就其地窆焉厥土五色厥石四周融潤喣淑面勢環拱既葬弗震弗崩安靖妥謐植樹蓊蔚庶草芬茂禽鳥哺集風氣凝育産祥萃休祉福駢降鄊人謂公孝感所致相與名其封曰卧馬以志厥祥從而歌之七大夫之聞者又從而和之正德戊辰守仁謪貴陽見公于巡撫臺下出聞是于公之鄊人客有在坐者曰公其休服于無疆哉昔在士行牛眠協兆峻陟三公公兹實類于是守仁曰此非公意也公其慎厥終惟安親是圖以庶幾無憾焉耳巳豈以徼福于躬利其嗣人也哉雖然仁人孝子則天無弗比無弗祐匪自外得也親安而誠信竭心斯安矣心安則氣和和氣致祥其多受祉福以流衍于無盡固理也哉他日見于公以鄊人之言問焉公曰信以守仁之言正焉公曰嗚呼是吾之心也子知之其遂志之以訓于我子孫母替我先公之德賔陽堂記戊辰傳之堂東向曰賔陽取堯興寅賔出日之義志向也賔日羲之職而傳冒焉傳職賔賔羲以賔賔之寅而賔日傳以賔日之寅而賔賔也不曰日乃陽之屬為日為元為善為吉為亨治其于人也為君子其義廣矣備矣內君子而外小人為泰曰賔自外而內之傳將以賔君子而內之也傳以賔君子而容有小人焉則如之何曰吾知以君子而賔之耳吾以君子而賔之也賔其甘為小人乎哉為賔日之歌日出而歌之賔至而歌之歌曰日出東方再拜稽首人曰豫狂匪日之寅吾其怠荒東方日出稽首再拜人曰豫憊匪日之愛吾其荒怠其翳其暳其日惟霽其昫其霧其日惟雨勿忭其昫倐焉以霧勿謂終翳或時其暳暳其光矣其光熙熙與爾偕作與爾偕宜倐其霧矣或時以熙或時以熙孰知我悲重修月潭寺建公館記戊辰隆興之南有巖曰月潭壁立千仞簷垂數百尺其上澒洞玲瓏浮者若雲霞亘者若虹霓豁若樓殿門闕懸若鼓鐘編磬幨幢纓絡若摶風之鵬翻集翔鵠螭虺之紏蟠猱猊之駭攫譎竒變幻不可具狀而其下澄潭邃谷不測之洞環祕回伏喬林秀木垂蔭蔽虧鳴瀑清溪停洄引映天下之山萃于雲貴連亘萬里際天無極行旅之往來日攀緣下上于窮崖絶壑之間雖雅有泉石之癖者一入雲貴之途莫不困踣煩厭非復夙好而惟至于兹巖之下則又皆灑然開豁心洗目醒雖庸儔俗侣素不知有山水之逰者亦皆徘徊顧盻相與延戀而不忍去則兹巖之勝蓋不言可知矣巖界興隆偏橋之間各數十里行者至是皆憊頓飢悴宜有休息之所而巖麓故有寺附巖之戍卒官吏與凡苗夷犵狇之種連屬而居者歲時令節皆于是焉釐祝寺漸蕪廢行禮無所憲副滇南朱君文瑞按部至是樂兹巖之勝憫行旅之艱而從士民之請也乃捐資化材新其寺于巖之右以為釐祝之所曰吾聞為民者順其心而趨之善今苗夷之人知有尊君親上之禮而憾于弗伸也吾從而利道之不亦可乎則又因寺之故材與址架樓三楹以為部使者休食之館曰吾聞為政者因勢之所便而成之故事適而民逸今旅無所舍而使者之出師行百里飢不得食勞不得息吾圖其可久而兩利之不亦可乎使逰僧正觀任其勞指揮逖逺度其工千户某某相其役逺近之施捨勤助者欣然而集不兩月而工告畢自是飢者有所炊勞者有所休逰觀者有所舍釐祝者有所瞻依以為竭虔效誠之地而兹巖之竒若增而益勝也正觀將記其事于石適豫過而請焉豫惟君子之政不必專于法要在宜于人君子之教不必泥于古要在入于善是舉也蓋得之矣况當法綱嚴密之時衆方喘息憂危動虞牽觸而乃能從容于山水泉石之好行其心之所不愧者而無求免于俗焉斯其非見外之輕而中有㝎者能若是乎是誠不可以不志也矣寺始于戍卒周齋公成于道僧德彬增治于指揮劉瑄常智李勝及其屬王威韓儉之徒至是凡三緝而公館之建則自今日始玩易窩記戊辰陽眀子之居夷也穴山麓之窩而讀易其間始其未得也仰而思焉俯而疑焉函六合入無微茫乎其無所指孑乎其若株其或得之也沛兮其若決瞭兮其若徹菹􅌎出焉精華入焉若有相者而莫知其所以然其得而玩之也優然其休焉充然其喜焉油然其春生焉精粗一外內翕視險若夷而不知其夷之為厄也于是陽眀子撫几而嘆曰嗟乎此古之君子所以甘囚奴忘拘幽而不知其老之將至也夫吾知所以終吾身矣名其窩曰玩易而為之説曰夫易三才之道備焉古之君子居則觀其象而玩其辭動則觀其變而玩其占觀象玩辭三才之體立矣觀變玩占三才之用行矣體立故存而神用行故動而化神故知周萬物而無方化故範圍天地而無迹無方則象辭基焉無迹則變占生焉是故君子洗心而退藏于密齋戒以神眀其德也蓋昔者夫子嘗韋編三絶焉嗚呼假我數十年以學易其亦可以無大過巳夫東林書院記癸酉東林書院者宋龜山楊先生講學之所也龜山沒其地化為僧區而其學亦遂淪入于佛老訓詁詞章者且四百年成化間今少司徒泉齋邵先生始以舉子復聚徒講誦于其間先生既仕而址復荒屬于邑之華氏華氏先生之門人也以先生之故仍讓其地為書院以昭先生之迹而復龜山之舊先生既巳紀其廢興則以記屬之某當是時遼陽髙君文豸方來令兹邑聞其事謂表眀賢人君子之迹以風勵士習此吾有司之責而顧以勤諸生則何事爰畢其所未備而亦遣人來請嗚呼物之廢興亦決有成數矣而亦存乎其人夫龜山沒使有若先生者相繼講眀其間龜山之學邑之人將必有傳豈遂淪入于老佛詞章而莫之知求當時從龜山逰不無人矣使有如華氏者相繼修葺之縱其學未即眀其間必有因迹以求道者則亦何至淪沒于四百年之久又使其時有司有若高君者以風勵士習為巳任書院將無因而圮又何至化為浮屠之居而蕩為草莽之野是三者皆宜書之以訓後若夫龜山之學得之程氏以上接孔孟下啓羅李晦菴其統緒相承斷無可疑而世猶議其晚流于佛此其趨向毫釐之不容于無辨先生必嘗講之精矣先生樂易謙虛德器溶然不見其喜怒人之悅而從之若百川之趨海論者以為有龜山之風非有得于其學宜弗能之然而世之宗先生者或以其文翰之上或以其學術之邃或以其政事之良先生之心其殆未以是足也從先生遊者其以豫言而深求先生之心以先生之心而上求龜山之學庶乎書院之復不為虛矣書院在錫百瀆之上東望梅村二十里而遙周太伯之所從逃也方華氏之讓地為院鄊之人與其同門之士爭相趨事若恥于後太伯之遺風尚有存焉特世無若先生者以倡之耳是亦不可以無書應天府重修儒學記甲戌應天京兆也其學為東南教本國初以為太學洪武辛酉始改創焉再修于正德之巳酉自是而後浸以敝圯正德壬申府尹張公宗厚始議新之未成而遷中丞以去白公輔之相繼為尹乃克易朽興頽大完其所未備而又自以俸餘增置石欄若干楹于櫺星門之外于是府丞趙公時憲亦協心贊畫故數十年之廢一旦修舉煥然改觀師模士氣亦皆鼓動興起廟學一新教授張雲龍等與合學之士二百有若干人撰序二公之績徴豫文為記豫既不獲辭則謂之曰多師多士若知二公修學之為功矣亦知自修其學以成二公之功者乎夫立之師儒區其齋廟昭其儀物具其廪庖是有國者之立學也而非士之立學也緝其弊壞新其圬墁給其匱之警其怠弛是有司者之修學也而非士之修學也士之學也以學為聖賢聖賢之學心學也道德以為之地忠信以為之基仁以為宅義以為路禮以為門廉恥以為垣牆六經以為戶牖四了以為階梯求之于心而無假于雕飾也其功不亦簡乎措之于行而無所不該也其用不亦大乎三代之學皆此矣我國家雖以科目取士而立學之意亦豈能與三代異學之弗立有國者之缺也弗修焉有司者之責也立矣修矣而居其地者弗立弗修是師之咎士之恥也二公之修學既盡有司之責矣多師多士無亦相與自修其學以逺于咎恥者乎無亦擴乃地厚乃基安乃宅闢乃門戶固乃垣牆學成而用大之則以庇天下次之則以庇一省一郡小之則以庇其鄊閭家族庶亦無負于國家立學之意有司修學之心哉若乃曠安宅舍正路圯基壞垣倚聖賢之門户以為姦是學校之為萃淵藪也則是朝廷立之而為士者傾之有司修之而為士者毁之亦獨何心哉應天為首善之地豪傑俊偉先後相望其文采之炳蔚科甲之盛多乃其所素餘有不屑于言者故吾因新學之舉嘉多師多士欣然有維新之志而將進之以聖賢之學也于是乎言重修六合縣儒學記乙亥六合之學敝久矣師生因仍以苟嵗月有司者若無覩也故廢日甚正德甲戌縣尹安福萬廷珵氏既和輯其民始議拓而新之維時教諭長興徐丙氏來就圯舍日夜砥新厥士尹因謂曰子為我造士而講肄無所斯吾責何敢不力顧兵荒之餘民不可重困吾姑日積月纍而徐圖焉其可乎民聞相謂曰學諭方急訓吾子弟無寧居尹不忍困吾民而躬苦節省吾儕獨坐視非人也于是耆民李景榮首出百金以倡從而應者相繼不終日聚金五百以告尹尹喜曰吾民尚義若此吾事不難辦矣然吾職務繁劇孰可使以鳩吾事者乎學諭曰尹為吾師生甚勞苦父老奮義捐金既費其財又盡其力而與一二僚請無妨教事以敦民聞相謂曰尹不忍困吾民學諭方急訓吾子弟又不忍吾勞而身董之吾儕獨坐視非人也于是耆民王彰陳模首請任其役從而應者十夫以告尹尹喜曰吾民尚義如此吾事不難辦矣提學御史張君適至聞其事而嘉之衆益趨以勸十月辛卯尹乃興事學諭經度規制以襄訓導某典史某察其勤惰稽其出納修大成殿修兩廡神厨庫前為戟門又前為櫺星門又前為泮宫坊皆以石殿後為眀倫堂為東西齋又後為尊經閣明倫堂之左為三廨以宅三師前區三圃圃前為名宦祠又前為鄊賢祠又前為崇文倉明倫堂之右為致齋所又右為饌房又右為射圃而亭其圃之北曰觀德致齋之外為宰牲所又前為六號凡為屋百九十有七楹十二月丁巳工告畢役未逾時也閭閈之民尚或未知其興作聞而來聚觀者皆相顧唶愕以為是何神速爾是何井井爾煥煥爾庠生某撰考其事來請豫記豫曰甚哉誠之易以感民也甚哉民之易以誠感也有司者賦民奉國鞭笞纍縶不能得則反仇視今縣尹學諭一言而民應之若響使天下之為有司學職者咸若是天下其有不治乎此可以為天下之為有司學職者倡矣民之愛其財與力至爭刀雖靳舉手投足寧殆其身而不悔今六合之民感其上之一言捐數十百金效力爭先恐後使天下之為民者咸若是天下其有不治乎此可以為天下之民倡矣民之蔽于欲而厚于利苟有以感之然且不憚費已之財勞已之力以赴上之所欲為士秀于民而志于道修其眀德親民之學以應邦家之求固不費財勞力而可能也茍有以感之有不翕然而興者乎吾聞徐諭之教六合不數月而士習巳為之一變使由此日遷于髙眀廣大以洗俗學之陋則夫興起聖賢之學以為天下士之倡者將又不在于六合之士邪將又不在于六合之士邪時雨堂記丁丑正德丁丑奉命平漳寇駐軍上杭旱甚禱于行臺雨日夜民以為未足乃四月戊午班師雨眀日又雨又眀日大雨乃出田登城南之樓以觀民大恱有司請名行臺之堂為時雨且曰民苦于盜久又重以旱將謂靡遺今始去兵革之役而大雨適降所謂王師若時雨今皆有焉請以志其實嗚呼民惟稼穡德惟雨惟天隂隲惟皇克憲惟將士用命去其螣蜮惟乃有司實耨獲之庶克有秋乃豫何德之有而敢叨其功然而樂民之樂亦不容于無紀也巡撫都御史王守仁書是日參政陳䇿僉事胡璉至自班師重修浙江貢院記乙酉古之選士者其才德行誼皆論㝎于平日而以時升之故其時有司之待士一惟忠信禮義而無有乎防嫌逆詐之心也士之應有司一惟廉恥退讓而無有乎奔競僥幸之圖也逮世下衰科舉之法興而忠信廉恥之風薄上之人不能無疑于其下而防範日密下之人不能無疑于其上而鄙詐日生于是乎至有搜檢巡綽之事而待之不能以禮矣有糊名易書之制而信之不能以誠矣有志之士未嘗不嘆惜于古道而千數百年卒無以改殆亦風氣習染之所成學術教化之所積勢有不可得而誤焉者也雖然古人之法不可得而復矣所以斟酌古人之意而默行之者不猶有可盡乎後世之法不可得而改矣所以匡持後世之弊而善用之者不猶有可為乎有司之奉行其識下者昧古之道而益浚之以刻薄猥瑣之意其見髙者鄙時之弊而遂行之以忽慢苟且之心是以陋者益心求士之誠乎慢令始禁罔使陷于非僻而後摧辱之其為狎悔士類亦甚矣無亦張其紀度眀其視聽使人不戒而肅以全其廉恥庶亦待士以禮之意乎于是新選秀堂而軒于其前為三楹新至公堂而軒于其前為五楹庖湢器用無不備具又拓眀逺樓以為三楹而上崇三簷下疏三道創石臺于四隅而各亭其上以為眺望之所其諸防間之道靡不恪修夫然後入而觀焉則森嚴洞逹供事者莫敢有輕忽慢易之心而就試者自消其回邪非僻之念蓋不費財力而事修于旬月之間不大聲色而政令行肅觀向一新若諸君者誠可謂能求古人之意而默行之者矣能匡後世之弊而善用之者矣諸君之盡心其可見者如此至其妙運于心術之微而務竭于得為之地不可以盡見者固將無所不用其極可知也是舉也其必有才德行誼之士如三代之英者出以應諸君之求已乎工訖使來請記辭不克而遂為書之嗚呼天下之事所以弊于今而不可復于古者寧獨科舉為然乎誠使求古人之意而默行善用之皆如諸君今日之舉焉其于成天下之治也何有哉濬河記乙酉越人以舟楫為輿馬濱河而㕓者皆巨室也日規月築水道􅌎隘畜泄既亡旱潦頻仍商旅日爭于途至有鬪而死者矣南子乃決沮障復舊防去豪商之壅削勢家之侵失利之徒胥怨交謗從而謡之曰南守瞿瞿實破我廬瞿瞿南守使我奔走人曰吾守其厲民歟何其謗者之多也陽眀子曰遲之吾未聞以佚道使民而或有怨之者也既而舟楫通利行旅歡呼絡繹是秋大旱江河龜拆越之人收穫輸載如常眀年大水民居免于墊溺逺近稱忭又從而歌之曰相彼舟人矣昔揭以曵矣今歌以楫矣旱之熇也微南侯兮吾其燋矣霪其彌月矣微南侯兮吾其魚鱉矣我輸我穫矣我逰我息矣長渠之活矣維南侯之流澤矣人曰信哉陽眀子之言未聞以佚道使民而或有怨之者也紀其事于石以詔來者王文成公全書卷之二十三終
