front:
  text: 王文成公全書卷之十
  hash: sha256:53068fe65cb1e7b0429ca27272048939a9d06fa3b27d1be93feb9b42fda9542e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_005-1a}
body:
  text: 别録二奏疏議夾剿兵糧疏正德十二年七月𥘉五日準兵部咨該本部題職方清吏司案呈奉本部送兵科抄出巡撫湖廣地方兼贊理軍務都察院右副都御史秦金題稱會同巡按御史王度督同都布按三司掌印署都指揮僉事文恭左布政使周季鳳副使惲巍等議照湖廣郴桂等處所屬地方與廣東樂昌江西上猶等處縣猺賊密爾聮絡彼處有名賊首龔福全髙仲仁李斌龎文亮藍友貴等素恃巢穴險固聚衆行劫先年用兵征剿各賊漏殄未除遂致禍延今日臣等仰體皇上好生之心設法撫處冀圖靖安以成止戈之武奈犬羊之性變詐不同豺狼之心貪噬無厭陽雖聼招隂實肆毒今乃攻打縣堡虜官殺人窮凶極惡神人共憤雖經各官兵擒斬數輩稍懼歸巢緣其種類繁多出沒尚未可料若非三省合兵大彰天討惡孽終不殄除疆宇何由寧謐所據各官會呈乞要大舉臣等再三籌議非敢輕啓兵端但審時度勢誠有不容巳者況彼巢洞既多賊黨亦衆東追西竄此出彼藏必須調發本省土漢官軍民兵殺手人等共三萬貟名分立哨道刻期進剿其兩廣南贛仍須各調官軍狼兵把截夾攻協濟大事臣等計算兵糧重大區處艱難抑且本省兵荒相繼財力匱乏前項合用錢糧預須計處今將應調土漢官軍數目供給糧餉事宜及戰攻方界開坐具奏該本部覆稱閫外兵權貴在專委征伐事宜切忌遙制今郴桂猺賊為害日熾既該湖廣鎮巡三司官會議兵不可已要行尅期進剿朝廷若復猶預不決往返會議必致誤事但七月進兵天氣尚炎况今五月將中三省約會期限太迫再請敕兩廣總督等官左都御史陳金等及請敕巡撫南贛左僉都御史王守仁各照議定事理欽遵會合行事不許違期失誤及改擬九月中取齊進兵庶三省路逺不誤約會本年五月十一日少保兼太子太保本部尚書王瓊等具題奉欽依備咨到臣除欽遵外卷查先據江西嶺北道副使楊璋及湖廣郴桂兵備副使陳璧并廣東韶州府各呈申前事臣參看得前賊惡貫已盈神怒人怨天討在所必加但近年以來江西有桃源之役瘡痍甫起福建有汀漳之寇軍旅未旋府江之師方集於兩廣偏橋之討未息於湖湘若復繼以大兵惟恐民不堪命合無申明賞罰容臣等徐為之圖惟復約會三省並舉夾攻已經開陳兩端具本上請去後今準前因則巡撫湖廣右副都御史秦金所題夾攻事理既奉有成命矣臣謹將南贛二府議處兵糧事宜開坐緣係地方緊急賊情事理為此具本請旨計開一南安府所屬大庾南康上猶三縣各有賊巢聮絡盤據有衆數千西接湖廣桂陽等縣南接廣東韶州府樂昌等縣三省夾攻必須湖廣自桂陽桂東等處進廣東自樂昌縣進在南安者必須三縣地方並進贛州府所屬惟龍南縣賊巢與廣東惠州府龍川縣浰頭接境浰頭係大賊池大鬢等巢穴有衆數千比之他賊勢尤猖獗前此二次夾攻俱𬒳漏網龍南雖有賊徒數夥除之稍易但其倚籍浰頭兵力以為聲援攻之則奔入浰頭兵退則復出為害必須廣東兵自龍川進贛州兵自龍南進庶可使無奔潰一上猶去龍南幾四百里兩處進兵必須一時並舉庶無驚潰之患大約計之亦須用兵一萬二千名今擬調南康上猶二縣機兵打手一千二百名大庾縣機兵打手一千二百名贛州府所屬除石城縣外寧都信豐二縣機兵打手各一千名其餘七縣機兵打手三千名龍泉縣機兵打手一千名安逺縣招安義民葉芳老人梅南春等龍南縣招安新民王受謝鉞等兵共二千名汀州府上杭縣打手一千名潮州府程鄉縣打手一千名共輳一萬二千之數但廣湖兩省之兵皆狼土精悍賊所素畏勢必偏奔江西江西之兵最為怯懦望賊而潰乃其素習今所擬調皆新習未練若使嚴以軍法處治庶幾人心齊一事功可成一兵一萬二千餘名每名日給米三升一日該米三百七十餘石間日折支銀一分五釐一日該銀一百八十餘兩以六箇月為率約用米三萬三十餘石用銀二萬餘兩領哨統兵旗牌等官并使客合用廪給及賞功犒勞牛酒銀牌花紅魚鹽火藥等費約用銀二萬餘兩通前二項約共用銀五萬兩二府啇稅銀兩集兵以來日有所費見存銀止有四千餘兩二府并贛縣大庾南康上猶四縣積穀約計有七八萬石但貯積年久恐舂米不及其數見在前銀不足支用就欲别項區處但恐緩不及事查得江西布政司并各府縣别無蓄積止有該解南京折糧銀兩貯庫未解并一應𥿄米贓罰銀兩合無行巡撫江西都御史孫燧轉行布政司并行各府照數借給應用候事寧之日或將以後抽掣啇稅或開中鹽引另為計處奏請輔還庶克有濟一合用本省巡按御史隨軍紀功管理錢糧及統兵領哨官貟除本省三司分守分巡兵備守備并南贛二府官貟臨時定委外訪得九江府知府汪賴吉安府知府伍文定汀州府知府唐淳惠州府知府陳祥俱各才識練逹程鄉縣知縣張戬撫州府東鄉縣知縣黃堂建昌府新城縣知縣黃文鸑袁州府萍鄉縣知縣髙桂吉安府龍泉縣知縣陳允諧俱有才名俱各堪以領兵候命下之日聼臣等取用臣等竊照師期已迫自今七月上旬至九月中旬僅餘兩月中間合用前項錢糧器仗及擬調兵快應委官員之類悉皆百未有措又事干各省道途相去近者半月逺者月餘萬一各官之中違抗推託不肯遵依約束臨期誤事罪將安歸乞照湖廣巡撫都御史秦金所奏該部題準事理各官之中敢有抗違失誤者許臣等即以軍法從事庶幾警懼事可易集南贛擒斬功次疏十二年七月𥘉五日據江西按察司整飭兵備帶管分巡嶺北道副使楊璋呈據統兵等官南安府知府季斆呈解生擒大賊首一名陳曰能從賊林杲等二十七名斬獲首級十六顆俘獲賊屬男女十三口及馬牛等物并開稱搗過禾沙坑船坑石圳上龍狐狸朱雀黃石等賊巢七處燒死賊徒不計其數并房屋禾倉三百餘間南康縣縣丞舒富呈解生擒大賊首一名鍾明貴從賊曾能志等二十一名斬獲首級四十五顆殺死未取首賊一百一十七名俘獲賊屬男女一十六名口及牛馬驢等物并開稱搗過石路坑白水洞杞州坑旱坑茶潭竹􅄵皮𫀆樟木坑等賊巢八處燒死賊徒三百四十六名并燒毀房屋禾倉四百七十餘間贛縣義官蕭庾呈解生擒大賊首一名唐洪從賊蒲仁祥等六名斬獲首級并射死賊從一百三十八名燒毀賊巢房屋禾倉一百二十間及俘獲牛羊器械等物并開稱搗過長龍雞湖楊梅新溪等處賊巢四處各緣由到道隨據統兵官員并鄉導人等各呈稱自本年正月蒙本院撫臨以來募兵練卒各賊探知消息將家屬婦女什物俱各寄屯山寨林木茂密之處其各精壯賊徒晝則下山耕作夜則各遁山寨依奉本院方略於六月二十日子時各哨尅期進剿每巢止有二三十人或四五十人看守巢穴見兵舉火奮擊俱各驚潰間有射傷藥弩即時身死墜於深巖及據縣丞舒富義官蕭庾各回呈止有上猶縣白水洞石路坑二巢南康縣雞湖一巢險峻巢內賊屬頗多𬒳兵四靣放火進攻賊無出路燒死數多天明看視止存骸骨頭靣燒毀莫辨以此難取首級等因案照先為緊急賊情事據上猶縣申稱四月間𬒳輋巢賊徒不時虜掠耕牛人口請兵追剿鄉民稍得蒔插今早榖將登又聞各巢修整戰具出劫乞為防遏庶得收割聊生等因并據縣丞舒富及南安府呈大庾縣申同前事該本道查得上猶縣鄰近巢穴則有旱坑茶潭杞州坑樟木坑石路坑白水洞竹潭川坳隂木潭等巢南安縣則有長龍雞湖楊梅新溪等巢大庾縣則有狐狸坑船坑禾沙坑石圳上龍朱雀黃石坑等巢多則三五百名少則七八十名合無將本院選集之兵委官統領分投剿遏等因已經呈奉本院批看得各賊名號日漸僣擬惡毒日加縱肆若果遂其姦謀得以乘虛入廣其為患害關繫匪輕除密行南韶等府分兵防截外仰該道即便部勒諸軍定哨分委仍密召各巢附近𬒳害知因之人堪為鄉導者前來分引各兵出城之時不得張揚今正當換班之月就令俱以下班為名晝伏夜行尅期各至分地掩賊不備同時舉事分領各官務要嚴密奮勇竭忠以副委託如或推姦誤事及軍士之中敢有後期退縮者悉以軍法從事決不輕貸該道亦要親帥重兵隨後繼進密屯賊巢要害處所相機接應以防不測一應機宜務須慎密周悉仍要嚴緝各兵所獲真正賊徒不許濫加良善等因遵奉統領各兵刻期進剿及加謹防遏今據復呈前因通查得各哨共計生擒大賊首三名首從賊徒五十四名斬獲首級六十八顆殺死射死賊徒二百四十餘名燒死賊徒二百餘名搗過巢穴一十九處燒毀房屋禾倉八百九十餘間俘獲賊屬男女二十九名口水黃牛馬騾羊一百四十四頭匹隻所據各該領兵等官所報擒斬之賊數固不多而巢穴已空無可捿身積聚已焚無可仰給就使屯集橫水桶岡大巢將來人多食少大舉夾攻為力已易等因轉呈到臣卷查先據副使楊璋呈稱據南安府并上猶等縣及縣丞舒富各呈申訪得大賊首謝志珊號征南王紏率大賊首鍾明貴蕭規模陳曰能唐洪劉允昌等約會樂昌髙快馬等大修戰具并造吕公車𣣔先將南康縣打破聞知廣東官兵盡調征勦府江就行乘虛入廣等因已經批仰該道部勒諸軍酌量賊巢強弱派定哨分選委謀勇屬官統兵密召知因向導引領晝伏夜行刻定於六月二十日子時入各賊巢同時舉火併力奮擊務使噍類無遺去後今據前因覆勘得前項賊巢委果蕩平殆盡蓄積委果焚燬無遺獲功解報雖少殺傷燒死實多猖熾之勢少摧不軌之謀暫阻居民得以秋獲地方亦為一寧此皆遵依兵部申明律例事理仰仗天威官兵用命之所致非臣之知謀所能及也臣惟南贛之兵素不練養見賊而奔則其常態今各官乃能夜入賊巢奮勇追擊在他所未為可異之功於南贛則實創見之事及照副使楊璋區畫贊理比於各官勞勩尤多今夾攻在邇伏乞皇上特加勸賞以作興勇敢之風庶幾日後大舉臣等得以激勵人心除將獲功人員量加犒賞生擒賊徒監候審決首級梟示俘獲賊屬領養牛馬賞兵有功人員查審的確造册奏繳外緣係斬獲功次事理為此具本題知議夾剿方略疏十二年九月十五日據江西嶺北道副使楊璋呈奉臣案驗準兵部咨該巡撫湖廣都御史秦金題為緊急賊情事備行計處兵糧約會三省將上猶縣等處賊巢尅期九月中進剿等因遵依隨將本道兵糧事宜計呈本院轉逹奏聞定奪外隨據南安府上猶大庾等縣申稱各縣鄉民早穀將登各巢輋賊修整戰具要行出劫并據南康縣縣丞舒富呈訪得大賊首謝志珊號征南王紏率桶岡等巢賊首鍾明貴等約會廣東大賊首髙快馬等大修戰具并吕公車𣣔要先將南康縣打破聞知廣東官兵盡調府江就行乘虛入廣流劫乞要早為撲剿等因已經呈蒙本院密受方略行委知府季斆縣丞舒富等領兵分剿共生擒大賊首陳曰能等三名首從賊徒五十四名斬獲賊首級六十八顆殺死射死賊徒二百四十餘名燒死賊徒二百餘名搗過巢穴一十九處燒燬房屋禾倉八百九十餘間俘獲賊屬二十九名口水黃牛馬羊騾一百四十四頭匹通經呈報又蒙本院慮賊必將乘間復出行委知府季斆指揮來春等統兵屯南安指揮姚璽縣丞舒富統兵屯上猶指揮謝昶千户林節統兵屯南康各於要害去處往來防剿至七月二十五日賊首謝志珊果復統衆一千五百餘徒攻打南安府城各官督兵迎敵生擒賊犯楊鑾等七名斬獲首級四十五顆賊衆大敗而去八月二十五日賊首謝志珊又統領二千餘徒復來攻打南安府城各官督兵迎敵生擒賊犯龍正等四十二名斬獲首級一百五十七顆賊又大敗而去即今賊勢少挫若乘此機會直搗其巢旬月之間可期掃蕩但聞湖廣之兵既已齊集而廣東因府江班師未久復調狼兵未有定期謹按地圖江西之南安有上猶大庾桶岡等處賊巢與湖廣桂東桂陽接境夾攻之舉止該江西與湖廣會合而廣東止于仁化縣要害把截夾攻不與焉贛州之龍南有浰頭賊巢與廣東龍川接境夾攻之舉止該江西與廣東會合而湖廣不與焉廣東樂昌乳源賊巢與湖廣宜章縣接境惠州賊巢與湖廣臨武縣接境仁化縣賊巢與湖廣桂陽縣接境夾攻之舉止該湖廣廣東二省會合而江西止於大庾縣要害把截夾攻不與焉名雖三省大舉其實自有先後舉動次第不相妨礙若不此之察必欲通待三省之兵齊集然後進剿則老師廢財為害匪細合將前項事宜約會二省以次漸舉庶兵力不竭糧餉可省等因據呈到臣看得三省夾攻必須彼此尅期定日同時並舉斯乃事體之常然兵無定勢謀貴從時苟勢或因地而異便則事宜量力以乘機三省賊巢連絡千里雖聲勢相因而其間亦自有種類之分界限之隔利則爭趨患不相顧乃其性習誠使三省之兵皆巳齊備會約並進夫豈不善但今廣東狼兵方自府江班師而歸𣣔復調集恐非旬月所能兩省之兵既集久䪺而不進賊必驚疑愈生其姦悍者奔突黠者潛逃老師費財意外之虞乘間而起雖有智者難善其後誠使先合湖廣江西之兵併力而舉上猶諸賊建事之畢廣東之兵亦且集矣則又合湖廣廣東之兵併力而舉樂昌諸處逮事之畢江西之兵又得以少息矣則又合廣東江西之兵併力而舉龍川方其併力於上猶則姑遣人佯撫樂昌諸賊以安其心彼見廣東既未有備而湖廣之兵又不及已苟幸旦夕之生必不敢越界以援上猶及夫上猶既舉而湖廣移兵以合廣東則樂昌諸賊其勢已孤二省兵力益專其舉之益易當是之時龍川賊巢相去遼絶自以為風馬牛不相及彼見江西之兵又撤意必不疑班師之日出其不意回軍合擊蔑有不濟者矣臣竊以為因地之宜先後合擊之便除臣遵照兵部咨來題奉欽依會兵征勦亦聼隨宜會議施行事理已將前項事宜移咨廣東湖廣總督巡撫等官知會一靣相機行事外緣係地方緊急賊情事理為此具本題知換敕謝恩疏十二年九月十五日近準兵部咨為申明賞罰以勵人心事該臣奏該本部覆題節奉聖旨是王守仁著提督南贛汀漳等處軍務換敕與他欽此備咨到臣本年九月十一日節該欽奉敕諭江西南安贛州地方與福建汀漳二府廣東南韶潮惠四府及湖廣郴州桂陽縣壤地相接山嶺相連其間盜賊不時生發東追則西竄南捕則北奔蓋因地分各省事無統屬彼此推調難為處置先年嘗設有都御史一員巡撫前項地方就令督剿盜賊但責任不專類多因循苟且不能申明賞罰以勵人心致令盜賊滋多地方受禍今因所奏及該部覆奏事理特改命爾提督軍務撫安軍民修理城池禁革姦弊一應軍馬錢糧事宜俱聼便宜區畫以足軍餉但有盜賊生發即便設法調兵剿殺不許踵襲舊弊招撫蒙蔽重為民患其管領兵快人等官員不問文職武職若在軍前違期并逗遛退縮者俱聼軍法從事生擒盜賊鞫問明白亦聼就行斬首示衆斬獲賊級行令各該兵備守巡官即時紀驗明白備行江西按察司造册奏繳查照升賞激勸欽此俱欽遵外竊念臣以凡庸繆膺重寄思逃罪責深求禍源始知盜賊之日熾由於招撫之太濫招撫之太濫由於兵力之不足兵力之不足由於賞罰之不明輒敢忘其僣妄為陛下一陳其梗概其實言不量力請非其分方虞戮辱之及陛下特採該部之議不惟不加咎謫而又悉與施行不惟悉與施行而又隆以新命是蓋曲從試可之請不忍以人廢言也敕諭宣布之日百姓填衢塞道悚然改觀易慮以為聖天子明見萬里動察幽微占群䇿之畢舉知國議之有人莫不警懼振發強息其暴偽息其姦怯者思奮而勇後者思效而前三軍之氣自倍群盜之謀自阻所謂舞干格苗運於廟堂之上而震乎蠻貊之中者也夫過其言而不酬有志者之所耻也冒寵榮而不顧自好者不為也臣固譾劣亦寧草木無知不思鞭䇿以報知遇雖其才力有所難強而螻蟻之誠決能自盡雖於利鈍不可逆睹而狐兔之穴斷期掃平臣不勝感恩激切之至交收旗牌疏十二年九月二十五日準工部咨該本部題稱看得兵部咨開都御史王守仁奉敕提督軍務應合照例給與旗牌以振軍威一節既查有例又奉欽依合無於本部收有內給與旗牌八靣副就令原來百户尹麟前去交與本官督軍應用務加愛惜不得輕意損壞候到先將收領過日期號數徑自奏報查考等因具題奉聖旨是欽此欽遵備咨到臣隨於本年九月十六日據百户尹麟領齎令旗令牌八副靣前來除照數收領調度軍馬應用務加愛惜不敢輕意損壞外緣係交收旗牌事理為此今將收領過日期緣由并號數開坐具本題知議南贛啇稅疏十二年九月二十五日據江西按察司分巡嶺北道兵備副使楊璋呈奉巡撫江西地方右副都御史孫燧案驗備行各道兵備等官有地方重大軍務益於政體便於軍民果係應議事件即便條列呈報以慿施行等因隨據南安府呈繳本年春季分折梅亭抽分啇稅循環文簿看得該府造報册內某日共抽稅銀若干不見開有某啇人某貨若干抽銀若干中間不無任意抽報情弊及看得一季總數倍少于前原其所自蓋因抽分官員止是典史倉官義民等項不惜名節惟嗜貪汚兼以官職卑微人心玩視以致過往客啇或假稱權要而挾放或買求官吏而帶過及𬒳店牙通同客商買求書算以多作少以有作無姦弊百端卷查前項抽分創於巡撫都御史金澤一則蘇大庾過山之夫一則濟南贛軍餉之用題奉欽依遵行年久及查贛州龜角尾設立抽分厰建白于總制都御史陳金自正德六年十一月二十七日起至九年七月終止共抽過啇稅銀四萬二千六百八十六兩六錢三分七毫五忽本省大帽山姚源華林盜賊四起大舉夾攻一應軍餉俱仰給於此並未奏動內帑之積亦未科派小民之財以此而觀則啇稅之有益地方多矣緣贛州之稅正德十一年該給事中黃重奏稱廣貨自南雄經南安折梅亭已兩稅矣贛州之稅不無重復已經勘明停止贛河之稅近復大舉夾攻軍餉仰給全在折梅亭之稅今所入如此非惟軍餉無益實惟姦宄是資隨會同分守左參議黃宏議照合將南安之稅移於龜角尾抽分既有分巡道之監臨又有巡撫之統馭訪察數多姦弊自少其大庾縣顧夫銀兩合令該縣每季具印信領狀赴道批行贛州府支領支盡查算準令復支如此非惟大庾過嶺之夫不缺而軍餉之用大增合就會案呈詳等因據呈到臣看得南贛二府啇稅皆因給軍餉𥙿民力而設折梅亭之稅名雖為夫役而實以給軍餉龜角尾之稅事雖重軍餉而亦以𥙿民力兩稅雖若二事其實殊途同歸但折梅亭雖已抽分而龜角尾不復致詰未免有脫漏之弊若折梅亭既已抽分而龜角尾又復致詰未免有留滯之優況監司既逺胥猾得以恣其侵漁頭緒既多彼此得以容其姦隙若革去折梅亭之抽分而總稅於龜角尾則事體歸一姦弊自消非但有資軍餉抑且便利客啇蓋分合雖異而於啇稅事體無改纎毫轉移之間而於民啇利害相去倍蓰除臣欽遵節奉敕諭一應軍馬錢糧事宜俱聼便宜區畫事理將副使楊璋等所議行令該府一靣查照施行外緣係地方事理為此具本題知升賞謝恩疏正德十二年十月𥘉日節該欽奉敕得爾奏該福建兵備僉事等官胡璉等統領軍兵各分哨路於今年正月十八等日先後攻破長富村象湖山可塘洞等處巢穴擒斬首從賊級一千四百二十九名顆及該廣東兵備僉事等官顧應祥等統領軍兵分哨並進於今年正月二十四等日克破古村箭灌水竹等寨斬賊級一千二百七十二名顆各俘獲賊屬奪回人口頭畜器械等數多賊害既除良民安堵蓋由爾申嚴號令處置有方以致各該官員奉行成算有此成功捷奏來聞朕心嘉悅除有功官軍民快人等待查勘至日升賞外升爾俸一級賞銀二十兩紵絲二表裏仍降敕奬勵爾其益竭心力大展才猷修明武備多方計畫務使四省交界之區數年嘯聚之黨撫勦盡絶地方永獲安靖斯稱朕委任之意毋或狃于此捷遽生息玩致有他虞欽此欽遵臣惟賞及微勞則有功者益勸罰行親昵則有罪者益警近者閩廣之師幸而成功其方略議於該部成算出於朝廷用命存於諸將戮力因於士卒臣不過申嚴號令敷布督促之而巳曾有何功而乃冒蒙褒賞增其祿秩錫以金幣臣實不勝慚汗惶恐之至然臣嘗有申明賞罰之奏矣嘗有願陛下俯從惟重之典以作敢勇之風之請矣巨之微勞懼不免於罪而陛下曲從該部之議特賜優渥之恩者所謂賞及微勞將以激勸有功也昔人有云死馬且買之千里馬將至矣臣敢畏避冒賞之戮苟為遜讓以仰辜陛下激勵作興之盛心乎受命之餘感懼交集誓竭犬馬之力以效涓埃之報臣不勝受恩感激之至橫水桶岡捷音疏十二年閠十二月𥘉二日據江西布按二司巡守嶺北道兵備副使楊璋左參議黃宏會呈據一哨統兵贛州府知府邢珣呈督同興國縣典史區澄等官兵於十月十二等日攻破磨刀坑等巢十一月𥘉一等日攻破桶岡洞等巢二十三日會兵擊賊于上新地寨共十四處共擒斬大賊首雷鳴聰藍文亨梁伯安等六名顆賊從王禮生等二百四十一名顆俘獲賊屬并奪回𬒳虜男婦二百五十七名口燒毀賊巢房屋一百七十七間及奪馬牛贓仗等項二哨統兵福建汀州府知府唐淳呈督同上杭縣縣丞陳秉等官兵於十月十二等日攻破左溪等巢十一月𥘉一等日攻破十八磊等巢共十二處共擒斬大賊首藍天鳳藍八蘇景祥等四名顆賊從廖歐保等二百六十四名顆俘獲賊屬并奪回𬒳虜男婦五百四十四名口燒毀賊巢房屋七百一十二間及奪獲馬牛器械贓銀等項三哨統兵南安府知府季斆呈督同同知朱憲推官徐文英等官兵於十月十二等日攻破穩下等巢十二月𥘉三日擊賊於朱雀坑等巢共八處生擒大賊首髙文輝何文秀等五名擒斬賊從楊禮等三百六十一名顆俘獲賊屬并奪回𬒳虜男婦一百七十一名口燒毀賊巢房屋五百七十八間奪獲牛馬贓仗等物及先於七月二十五等日二次𬒳賊擁衆攻打本府城池統領本營官兵會同指揮來春馮翔與賊對敵本職下官兵舍人共擒斬賊從龍正等一百三名顆來春下官兵擒斬賊從王伯崇等二十五名顆馮翔下官兵擒斬賊從劉保等一百三十五名顆四哨統兵江西都司都指揮僉事許清開稱督領千戶林節等官兵於十月十二等日攻破雞湖等巢共九處共擒斬大賊首唐洪劉允昌葉志亮談祐李斌等共一十名顆賊從王志成等一百四十六名顆俘獲賊屬并奪回𬒳虜男婦一百三名口燒毁賊巢房屋二百間及奪獲牛馬贓仗等物五哨統兵守備南贛二府地方以都指揮體統行事指揮使郟文呈督領安逺縣義官唐廷華官兵於十月十二等日攻破獅子寨等巢二十三日會兵擊賊於上新地寨斬獲首賊藍文昭等三名顆擒斬賊從許受仔等一百六十六名顆俘獲賊屬并奪回𬒳虜男婦九十八名口燒毀賊巢房屋四百一十二間及奪獲牛馬器械等項六哨統兵贛州衛指揮余恩呈統領龍南縣新民王受等兵於十月十二等日攻破長流坑等巢共五處擒斬大賊首陳貴誠薛文髙劉必深三名顆賊從郭彥秀等一百七十七名顆俘獲賊屬并奪回𬒳虜男婦九十九名口燒毀賊巢房屋五百一十七間及奪獲馬驢器械贓銀等物七哨統兵寧都縣知縣王天與呈督同典史梁儀等官兵於十月十二等日攻破樟木坑等巢共處擒斬大賊首鄧崇泰王孔