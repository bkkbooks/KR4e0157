front:
  text: 王文成公全書卷之三十四
  hash: sha256:44345d7aecaa89df03ac3c99d1cb8df6ba3be2563026bb425d28aa0d99b010de
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_023-1a}
body:
  text: 附録三年譜三嘉靖元年壬午先生五十一嵗在越正月疏辭封爵先是先生平賊擒濠俱瓊先事為謀假以便宜行事每疏捷必先歸功本兵宰輔憾焉至是欲阻先生之進乃抑同事諸人將紀功册改造務為刪削先生曰册中所載可見之功耳若夫帳下之士或詐為兵檄以撓其進止或偽書反間以離其腹心或犯難走役而填于溝壑或以忠抱冤而搆死獄中有將士所不與知部領所未嘗厯幽魂所未及泄者非册中所能盡載今于其可見之功而又裁削之何以勵效忠赴義之士耶乃上疏乞辭封爵且謂殃莫大于叨天之功罪莫大于掩人之善惡莫深于襲下之能辱莫重于忘已之恥四者備而禍全此臣之不敢受爵者非以辭榮也避禍焉爾已疏上不報二月龍山公卒二月十二日已丑海日翁年七十疾且革時朝廷推論征藩之功進封翁及竹軒槐里公俱為新建伯是日部咨適至翁聞使者巳在門促先生及諸弟出迎曰雖倉遽烏可以廢禮問已成禮然後瞑目而逝先生戒家人勿哭加新冕服拖紳飭內外含禭諸具始舉哀一哭頓絶病不能勝門人子弟紀喪因才任使以仙居金克厚謹恪使監厨克厚出納品物惟謹有不愼者追還之內外井井室中齋食百日後令弟姪輩稍進乾肉曰諸子豢養習久強其不能是恣其作偽也稍寬之使之各求自盡可也越俗宴弔客必列餅糖設文綺烹鮮割肥以競豐侈先生盡革之惟遇髙年遠客素食中間肉二器曰齋素行于幕內若使弔客同孝子食非所以安高年而酬賔旅也後甘泉先生來弔見肉食不喜遺書致責先生引罪不辨是年克厚與洪同貢于鄉連舉進士謂洪曰吾學得司厨而大益且私之以取科第先生常謂學必操事而後實誠至教也先生卧病遠方同志日至乃揭帖于壁曰某鄙劣無所知識且在憂病奄奄中故凡四方同志之辱臨者皆不敢相見或不得巳而相見亦不敢有所論説各請歸而求諸孔孟之訓可矣夫孔孟之訓昭如日月凡支離決裂似是而非者皆異説也有志于聖人之學者外孔孟之訓而他求是舍日月之明而希光于螢爝之微也不亦繆乎七月再疏辭封爵七月十九日準吏部咨欽奉聖旨卿倡義督兵勦除大患盡忠報國勞績可嘉特加封爵以昭公義宜勉承恩命所辭不允先是先生上疏辭爵乞普恩典蓋以當國者不明軍旅之賞而隂行考察或賞或否或不行賞而并削其績或賞未及播而罰巳先行或虛受升職之名而因使退間或胃蒙不忠之號而隨以廢斥乃嘆曰同事諸臣延頸而待且三年矣此而不言誰復有為之論列者均秉忠義之氣以赴國難而功成行賞惟吾一人當之人將不食其餘矣乃再上疏曰日者宸濠之變其橫氣積威雖在千里之外無不震駭失措而况江西諸郡縣近切剝床者乎臣以逆旅孤身舉事其間然而未受巡撫之命則各官非統屬也未奉討賊之旨其事乃義倡也若使其時郡縣各官果畏死偷生但以未有成命各保土地為辭則臣亦可如何哉然而聞臣之調即感激奮勵挺身而來是非真有捐軀赴難之義戮力報主之忠孰肯甘粉虀之禍從赤族之誅以希萬一難冀之功乎然則凡在與臣共事者皆有忠義之誠者也夫考課之典軍旅之政固並行而不相悖然亦不可混而施之今也將明軍旅之賞而隂以考課之意行干其間人但見其賞未施而罰已及功不録而罪有加不能創姦警惡而徒以阻忠義之氣快讒嫉之心譬之投杯醪于河水而求飲者之醉可得乎疏上不報時御史程啓充給事毛玉倡議論劾以遏正學承宰輔意也陸澄時為刑部主事上疏為六辨以折之先生聞而止之曰無辨止謗嘗聞昔人之教矣况今何止于是四方英傑以講學異同議論紛紛吾儕可勝辨乎惟當反求諸已茍其言而是歟吾斯尚有未信與則當務求其非不得輒是已而非人也使其言而非與吾斯既以自信與則當益求于自慊所謂默而成之不言而信者也然則今日之多口孰非吾儕動心忍性砥礪切磋之地乎且彼議論之興非必有所私怨于我亦將以為衛夫道也况其説本自出于先儒之緒論而吾儕之言驟異于昔反若鑿空杜撰者固宜其非笑而駭惑矣未可專以罪彼為也是月德洪赴省試辭先生請益先生曰胸中須常有舜禹有天下不與氣象德洪請問先生曰舜禹有天下而身不與又何得喪介于其中九月葬龍山公于石泉山二年癸未先生五十二嵗在越二月南宫䇿士以心學為問隂以闢先生門人徐珊讀䇿問嘆曰吾惡能昧吾知以幸時好耶不答而出聞者難之曰尹彥明後一人也同門歐陽德王臣魏良弼等直發師旨不諱亦在取列識者以為進退有命德洪下第歸深恨時事之乖見先生先生喜而相接曰聖學從兹大明矣德洪曰時事如此何見大明先生曰吾學惡得遍語天下士今會試録雖窮鄉深谷無不到矣吾學既非天下必有起而求真是者鄒守益薛侃黃宗明馬明衡王艮等侍因言謗議日熾先生曰諸君且言其故有言先生勢位隆盛是以忌嫉謗有言先生學日明為宋儒爭異同則以學術謗有言天下從逰者衆與其進不保其往又以身謗先生曰三言者誠皆有之特吾自知諸君論未及耳請問曰吾自南京已前尚有鄉願意思在今只信良如真是真非處更無掩藏回護才做得狂者使天下盡説我行不掩言吾亦只依良知行請問鄉願狂者之辨曰鄉願以忠信廉潔見取于君子以同流合汙無忤于小人故非之無舉刺之無刺然究其心乃知忠信廉潔所以媚君子也同流合汙所以媚小人也其心巳破壞矣故不可與入堯舜之道狂者志存古人一切紛囂俗染舉不足以纍其心真有鳳凰翔于千仞之意一克念即聖人矣惟不克念故濶略事情而行常不掩惟其不掩故心尚未壞而庶可與裁曰鄉願何以斷其媚世曰自其譏狂狷而知之狂狷不與俗諧而謂生斯世也為斯世也善斯可矣此鄉願志也故其所為皆色取不疑所以謂之似三代以下士之取盛名于時者不過得鄉願之似而已然究其忠信廉潔或未免致疑于妻子也雖欲純乎鄉願亦未易得而况聖人之道乎曰狂狷為孔子所思然至于傳道終不及琴張輩而傳曾子豈曾子亦狷者之流乎先生曰不然琴張輩狂者之稟也雖有所得終止于狂曾子中行之稟也故能悟入聖人之道先生與黃宗賢書曰近與尚謙子華宗明講孟子鄉願狂狷一章頗覺有所警發相見時須更一論四方朋友來去無定中間不無切磋砥礪之益但真有力量能擔荷得者亦自少見大抵近世學者無有必為聖人之志胸中有物未得淸脫耳聞引接同志孜孜不怠甚善但論議須謙虛簡明為徍若自處過任而詞意重復却恐無益而有損與尚謙書曰謂自咎罪疾只緣輕傲二字足知用力懇切但知輕傲處便是良知致此良知除却輕傲便是格物得致知二字千古人品髙下真偽一齊覷破毫髮不容掩藏前所論鄉願可熟味也二字在虔時終日論此同志中尚多未徹近于古本序中改數語頗發此意然見者往往亦不能察今寄一紙幸更熟味此乃千古聖學之祕從前儒者多不曾悟到故其説入于支離外道而不覺也九月改葬龍山公于天住峰鄭太夫人于徐山鄭太夫人嘗附葬餘姚穴湖既改殯郡南石泉山及合葬公開壙有水患先生夢寐不寧遂改葬十有一月至蕭山見素林公自都御史致政歸道錢塘渡江來訪先生趨迎于蕭山宿浮峰寺公相對感慨時事慰從行諸友及時勉學無負初志張元沖在舟中問二氏與聖人之學所差毫釐謂其皆有得于性命也但二氏于性命中著些私利便謬千里矣今觀二氏作用亦有功于吾身者不知亦須兼取否先生曰説兼取便不是聖人盡性至命何物不具何待兼取二氏之用皆我之用即吾盡性至命中完養此身謂之仙即吾盡性至命中不染世纍謂之佛但後世儒者不見聖學之全故與二氏成二見耳譬之廳堂三間共為一廳儒者不知皆吾所用見佛氏則割左邉一間與之見老氏則割右邉一間與之而已則自處中間皆舉一而廢百也聖人與天地民物同體儒佛老莊皆吾之用是之謂大道二氏自私其身是之謂小道三年甲申先生五十三歲在越正月門人日進郡守南大吉以座主稱門生然性豪曠不拘小節先生與論學有悟乃告先生曰夫吉臨政多過先生何無一言先生曰何過大吉厯數其事先生曰吾言之矣大吉曰何曰吾不言何以知之曰良知先生曰良知非我常言而何大吉笑謝而去居數日復自數過加密且曰與其過後悔改曷若預言不犯為佳也先生曰人言不如自悔之真大吉笑謝而去居數日復自數過益密且曰身過可勉心過奈何先生曰昔鏡未開可得藏垢今鏡明矣一塵之落自難住腳此正入聖之機也勉之于是闢稽山書院聚八邑彥士身率講習以督之于是蕭璆楊汝榮楊紹芳等來自湖廣楊仕鳴薛宗鎧黃夢星等來自廣東王艮孟源周衝等來自直隸何秦黃弘綱等來自南贛劉邦采劉文敏等來自安福魏良政魏良器等來自新建曾忭來自泰和宫剎卑隘至不能容蓋環坐而聽者三百餘人先生臨之只發大學萬物同體之旨使人各求本性致極良知以止于至善功夫有得則因方設教故人人恱其易從海寧董澐號蘿石以能詩聞于江湖年六十八來遊會稽聞先生講學以杖肩其瓢笠詩卷來訪入門長揖上坐先生異其氣貌禮敬之與之語連日夜澐有悟因何秦強納拜先生與之徜徉山水間澐日有聞欣然樂而忘歸也其鄉子弟社友皆招之反且曰翁老矣何乃自苦若是澐曰吾方幸逃于苦海憫若之自苦也顧以吾為苦耶吾方揚鬐于渤澥而振羽于雲霄之上安能復投網罟而入樊籠乎去矣吾將從吾之所好遂自號曰從吾道人先生為之記八月宴門人于天泉橋中秋月白如晝先生命侍者設席于碧霞池上門人在侍者百餘人酒半酣歌聲漸動久之或投壺聚算或擊鼓或泛舟先生見諸生興劇退而作詩有鏗然舍瑟春風裏點也雖狂得我情之句明日諸生入謝先生曰昔者孔子在陳思魯之狂士世之學者沒溺于富貴聲利之場如拘如囚而莫之省脫及聞孔子之教始知一切俗緣皆非性體乃豁然脫落但見得此意不加實踐以入于精微則漸有輕滅世故濶略倫物之病雖比世之庸庸瑣瑣者不同其為未得于道一也故孔子在陳思歸以裁之使入于道耳諸君講學但患未得此意今幸見此正好精詣力造以求至于道無以一見自足而終止于狂也是月舒柏有敬畏纍灑落之問劉侯有入山養靜之問先生曰君子之所謂敬畏者非恐懼憂患之謂也戒愼不睹恐懼不聞之謂耳君子之所謂灑落者非曠蕩放逸之謂也乃其心體不纍于欲無入而不自得之謂耳夫心之本體即天理也天理之昭明靈覺所謂良知也君子戒懼之功無時或間則天理常存而其昭明靈覺之本體自無所昏蔽自無所牽擾自無所歉餒愧怍動容周旋而中禮從心所欲而不踰斯乃所謂真灑落矣是灑落生于天理之常存天理常存生于戒愼恐懼之無間孰謂敬畏之心反為灑落纍耶謂劉侯曰君子養心之學如良醫治病隨其虛實寒熱而斟酌補泄之要在去病而已初無一定之方必使人人服之也若專欲入坐窮山絶世故屏思慮則恐既已養成空寂之性雖欲勿流于空寂不可得矣論聖學無妨于舉業德洪擕二弟德周仲實讀書城南洪父心漁翁往視之魏良政魏良器輩與遊禹穴諸勝十日忘返問曰承諸君相擕日久得無妨課業乎答曰吾舉子業無時不習家君曰固知心學可以觸類而通然朱説亦須理會否二子曰以吾良知求晦翁之説譬之打蛇得七寸矣又何憂不得耶家君疑未釋進問先生先生曰豈特無妨乃大益耳學聖賢者譬之治家其産業第宅服食器物皆所自置欲請客出其所有以享之客去其物具在還以自享終身用之無窮也今之為舉業者譬之治家不務居積專以假貸為功欲請客自廳事以至供具百物莫不遍借客幸而來則諸貸之物一時豐𥙿可觀客去則盡以還人一物非所有也若請客不至則時過氣衰借貸亦不備終身奔勞作一窶人而已是求無益于得求在外也明年乙酉大比稽山書院錢楩與魏良政並發解江浙家君聞之笑曰打蛇得七寸矣是時大禮議起先生夜坐碧霞池有詩曰一雨秋涼入夜新池邉孤月倍精神潛魚水底傳心訣棲鳥枝頭説道真莫謂天機非嗜欲須知萬物是吾身無端禮樂紛紛議誰與青天掃舊塵又曰獨坐秋庭月色新乾坤何處更間人高歌度與淸風去幽意自隨流水春千聖本無心外訣六經須拂鏡中塵却憐擾擾周公夢未及惺惺陋巷貧蓋有感時事二詩已示其微矣四月服闋朝中屢疏引薦霍兀崖席元山黃宗賢黃宗明先後皆以大禮問竟不答十月門人南大吉續刻傳習録傳習録薛侃首刻于虔凡三卷至是年大吉取先生論學書復增五卷續刻于越四年乙酉先生五十四嵗在越正月夫人諸氏卒四月祔葬于徐山是月作稽山書院尊經閣記略曰聖人之扶人極憂後世而述六經也猶之富家者之父祖慮其産業庫藏之積其子孫者或至于遺亡失散卒困窮而無以自全也而記籍其家之所有以貽之使之世守其産業庫藏之積而享用焉以免于困窮之患故六經者吾心之記籍也而六經之實則具于吾心猶之産業庫藏之實種種色色具存于其家其記籍者特名狀數目而已而世之學者不知求六經之實于吾心而徒考索于影響之間牽制于文義之末硜硜然以為是六經矣是猶富家之子孫不務守成規享用其産業庫藏之實積日遺忘散失至于窶人丐夫而猶囂囂然指其記籍曰斯吾産業庫藏之積也何以異于是按是年南大吉匾􅊩政之堂曰親民堂山隂知縣吳嬴重修縣學提學僉事萬潮與監察御史潘倣拓新萬松書院于省城南取試士之未盡録者廩餼之咸以記請先生皆為作記六月禮部尚書席書薦先生服闋例應起復御史石金等交章論薦皆不報尚書席書為疏特薦曰生在臣前者見一人曰楊一清生在臣後者見一人曰王守仁且使親領誥劵趨闕謝恩于是楊一淸入閣辦事明年有領劵謝恩之召尋不果九月歸姚省墓先生歸定會于龍泉寺之中天閣每月以朔望初八草三為期書壁以勉諸生曰雖有天下易生之物一日暴之十日寒之未有能生者也承諸君之不鄙每豫來歸咸集于此以問學為事甚盛意也然不能旬日之留而旬日之間又不過三四會一别之後輒復離羣索居不相見者動經年嵗然則豈惟十日之寒而已乎若是而求萌蘖之暢茂條逹不可得矣故豫切望諸君勿以豫之去留為聚散或五六日八九日雖有俗事相妨亦須破冗一會于此務在誘掖獎勸砥礪切磋使道德仁義之習日親日近則勢利紛華之染亦日逺日踈所謂相觀而善百工居肆以成其事者也相會之時尤須虛心遜志相親相敬大抵朋友之交以相下為益或議論未合要在從容涵育相感以成不得動氣求勝長傲遂非務在默而成之不言而信其或矜已之長攻人之短粗心浮氣矯以沽名訐以為直挾勝心而行憤嫉以圮族敗羣為志則雖日講時習于此亦無益矣答顧東橋璘書有曰朱子所謂格物云者是以吾心而求理于事事物物之中如求孝子之理于其親之謂也求孝之理果在于吾之心耶抑果在于親之身耶假而果在于親之身而親沒之後吾心遂無孝之理與見孺子之入井必有惻隱之理是惻隱之理果在孺子之身與抑在于吾身之良知與以是例之萬事萬物之理莫不皆然是可以見析心與理為二之非矣若鄙人所謂致知格物者致吾心之良知于事事物物也吾心之良知即所謂天理也致吾心之天理于事事物物則事事物物皆得其理矣故曰致吾心之良知者致知也事事物物皆得其理者格物也是合心與理而為一者也合心與理而為一則凡區區前之所云與朱子晚年之論皆可不言而喻矣又曰心者身之主也而心之虛靈明覺即所謂本然良知也其虛靈明覺之良知應感而動者謂之意有知而後有意無知則無意矣知非意之體乎意之所用必有其物物即事也如意用于事親即事親為一物意用于治民則治民為一物意用于讀書即讀書為一物意用于聽訟即聽訟為一物凡意之所在無有無物者有是意即有是物無是意即無是物物非意之用乎格字之義有以至字訓者如格于文祖必純孝誠敬幽明之間無一不得其理而後謂之格有苗之頑實文德誕敷而後格則亦兼有正字之義在其間未可專以至字盡之也如格其非心大臣格君心之非之類是則一皆正其不正以歸于正之義而不可以至字為訓矣且大學格物之訓又安知不以正字為義乎如以至字為義者必曰窮至事物之理而後其説始通是其用功之要全在一窮字用力之地全在一理字也若上去一窮字下去一理字而直曰致知在至物其可通乎夫窮理盡性聖人之成訓見于繫辭者也苟格物之説而果即窮理之義則聖人何不直曰致知在窮理而必為此轉折不完之語以啓後世之弊耶蓋大學格物之説自與繫辭窮理大旨雖同而微有分辨窮理者兼格致誠正而為功也故言窮理則格致誠正之功皆在其中言格物則必兼舉致知誠意正心而後其功始備而密今偏舉格物而遂謂之窮理此非惟不得格物之旨并窮理之義而失之矣其末繼以拔本塞源之論其略曰聖人之心視天下之人無內外遠近凡有血氣皆其昆弟赤子之親莫不安全而教養之以遂其萬物一體之念天下之人心其始亦非有異于聖人也特其間于有我之私隔于物欲之蔽大者以小通者以塞甚有視其父子兄弟如仇讐者聖人有憂之是以推其天地萬物一體之仁以教天下使之皆有以克其私去其蔽以復其心體之同然其教之大端則堯舜禹之相授受所謂道心惟微惟精惟一久執厥中而其節目則舜之命契所謂父子有親君臣有義夫婦有别長幼有序朋友有信五者而巳當是之時人無異見家無異習安此者謂之聖勉此者謂之賢而背此者雖啓明如朱亦謂之不肖下至閭井田野農工商賈之賤莫不皆有是學而惟以成其德行為務何者無有聞見之雜記誦之煩辭章之靡濫功利之馳逐而但使之孝其親弟其長信其朋友以復其心體之同然則人亦孰不能之乎學校之中惟以成德為事有長于禮樂長于政教長于水土播植者則就其成德而因使益精其能逮夫舉德而任則用之者惟知同心一德以共安天下之民視才之稱否而不以崇卑為輕重效用者亦惟知同心一德以共安天下之民茍當其能則終身安于卑瑣而不以為賤當是時才質之下者則安其農工商賈之分各勤其業以相生相養而無有乎希髙慕外之心才能之異若臯夔稷契者則出而各效其能或營衣食或通有無或備器用集謀并力以求遂其仰事俯育之願譬之一身目不恥其無聰而耳之所涉目必營焉足不恥其無執而手之所探足必前焉蓋其元氣充周血脈條暢是以癢痾呼吸感觸神應有不言而喻之妙此聖人之學所以惟在復心體之同然而知識技能非所以與論也三代以降教者不復以此為教而學者不復以此為學霸者之徒竊取先生之近似者假之于外以內濟其私天下靡然宗之聖人之道遂以蕪塞世之儒者慨然悲傷搜獵先聖王之典章法制而掇拾修補于煨燼之餘聖學之門牆遂不可復觀于是乎有訓詁之學而傳之以為名有記誦之學而言之以為博有詞章之學而侈之以為麗相矜以知相軋以勢相爭以利相髙以技能相取以聲譽其出而仕也理錢榖者則欲并夫兵刑典禮樂者又欲與于銓軸處郡縣則思藩臬之髙居臺諌則望宰執之要故不能其事則不得以兼其官不通其説則不可以要其譽記誦之廣適以長其敖也知識之多適以行其惡也聞見之博適以肆其辨也辭章之富適以飾其偽也嗚呼以若是之積染以若是之心志而又講之以若是之學術宜其聞吾聖人之教而視之以為贅疣柄鑿矣非豪傑之士無所待而興者吾誰與望乎十月立陽明書院于越城門人為之也書院在越城而郭門內光相橋之東後十二年丁酉巡按御史門人周汝貟建祠于樓前匾曰陽明先生祠五年丙戌先生五十五歲在越三月與鄒守益書守益謪判廣德州築復古書院以集生徒刻諭俗禮要以風民俗書至先生復書贊之曰古之禮存于世者老師宿儒當年不能窮其説世之人苦其煩且難遂皆廢置而不行故今之為人上而欲導民于禮者非詳且備之為難惟簡切明白而使人易行之為貴耳中間如四代位次及祔祭之類向時欲稍改以從俗者今皆斟酌為之于人情甚協蓋天下古今之人其情一而巳矣先王制禮皆因人情而為之節文是以行之萬世而皆凖其或反之吾心而有所未安者非其傳記之訛闕則必古今風氣習俗之異宜者矣此雖先王未之有亦可以義起三王之所以不相襲禮也後世心學不講人失其情難乎與之言禮然良知之在人心則萬古如一日苟順吾心之良知以致之則所謂不知足而為屨我知其不為蕢矣非天子不議禮制度今之為此非以義禮為也徒以末世廢禮之極聊為之兆以興起之故特為此簡易之説欲使之易知易從焉耳冠婚喪祭之外附以鄉約其于民俗亦甚有補至于射禮似宜别為一書以教學者而非所以求諭于俗今以附于其間却恐民間以非所常行視為不切又見其説之難曉遂并其冠婚喪祭之易曉者而棄之也文公家禮所以不及于射或亦此意也與按祠堂位祔之制或問文公家禮髙曾祖禰之位皆西上以次而東于心切有未安先生曰古者廟門皆南向主皆東向合祭之時昭之遷主列于北牖穆之遷主列于南牖皆統于太祖東向之尊是故西上以次而東今祠堂之制既異于古而又無太祖東向之統則西上之説誠有所未安曰然則今當何如曰禮以時為大若事死如事生則宜以髙祖南向而曽祖禰東西分列席皆稍降而弗正對似于人心為安曾見浦江之祭四代考妣皆異席髙考妣南向曾祖禰考皆西向妣皆東向各依世次稍退半席其于男女之别尊卑之等兩得其宜但恐民間廳事多淺隘而器物亦有所不備則不能以通行耳又問無後者之祔于已之子姪固可下列矣若在髙曾之行宜何如祔先生曰古者大夫三廟不及其髙矣適士二廟不及其曾矣今民間得祀髙曾蓋亦體順人情之至例以古制則既為僣况在行之無後者乎古者士大夫無子則為之置後無後者鮮矣後世人情偷薄始有棄貧賤而不嗣者古所謂無後皆殤子之類耳祭法王下祭殤五適子適孫適曾孫適玄孫適來孫諸侯下祭三大夫二適士及庶人祭子而止則無後之祔皆子孫屬也今民間既得假四代之祀以義起之雖及弟姪可矣往年湖湘一士人家有曾伯祖與堂叔祖皆賢而無後者欲為立嗣則族衆不可欲弗祀則思其賢有所不忍以聞于某某曰不祀二三十年矣而追為之祀勢有所不行矣若在士大夫家自可依古族厲之義于春秋二社之次特設一祭凡族之無後而親者各以昭穆之次配祔之于義亦可也四月復南大吉書大吉入覲見黜于時致書先生千數百言勤勤懇懇惟以得聞道為喜急問學為事恐卒不得為聖人為憂略無一字及于得喪榮辱之間先生讀之嘆曰此非真有朝聞夕死之志者未易以涉斯境也于是復書曰世之髙抗通脫之士捐富貴利害棄爵祿決然長往而不顧者亦皆有之彼其或從好于外道詭異之説投情于詩酒山水技藝之樂又或奮發于意氣牽溺于嗜好有待于物以相勝是以去彼取此而後能及其所之既倦意衡心鬱情隨事移則憂愁悲苦隨之而作果能捐富貴輕利害棄爵祿快然終身無入而不自得巳乎夫惟有道之士真有以見其良知之昭明靈覺廓然與太虛而同體太虛之中何物不有而無一物能為太虛之障礙故凡慕富貴憂貧賤欣戚得喪愛憎取舍之類皆足以蔽吾聰明􅌖知之體窒吾淵泉時出之用如明目之中而翳之以塵沙聰耳之中而塞之以木揳也其疾痛鬱逆將必速去之為快而何能忍于時刻乎關中自古多豪傑橫渠之後此學不講或亦與四方無異矣自此有所振發興起變氣節為聖賢之學將必自吾元善昆季始也今日之歸謂天為無意乎答歐陽德書德初見先生于虔最年少時已領鄉薦先生恆以小秀才呼之故遣服役德欣欣恭命雖勞不怠先生深器之嘉靖癸未第進士出守六安州數月奉書以為初政倥偬後稍次第始得與諸生講學先生曰吾所講學正在政務倥偬中豈必聚徒而後為講學耶又嘗與書曰良知不因見聞而有而見聞莫非良知之用故良知不滯于見聞而亦不離于見聞孔子云吾有知乎哉無知也良知之外則無知矣故致良知是聖門教人第一義今云專求之見聞之末則落在第二義矣若曰致其良知而求之見聞則語意之間未免為二此與專求之見聞之末者雖稍不同其為未得精一之旨則一也德洪與王畿並舉南宫俱不廷對偕黃弘綱張元沖同舟歸越先生喜凡初及門者必令引導俟志定有入方請見每臨坐默對焚香無語八月答聶豹書是年夏豹以御史巡按福建渡錢塘來見先生别後致書謂思孟周程無意相遭于千載之下與其盡信于天下不若真信于一人道固自在學亦自在先生答書略曰讀來諭誠見君子不見是而無悶之心乃區區則有大不得巳者存乎其間非以計人之信與不信也夫人者天地之心天地萬物本吾一體者也生民之困苦荼毒孰非疾痛之切于吾身者乎不知吾身之疾痛無是非之心者也是非之心不慮而知不學而能所謂良知也良知之在人心無間于聖愚天下古今之所同也世之君子惟務致其良知則自能公是非同好惡視人猶已視國猶家而以天地萬物為一體求天下無治不可得矣古之人所以能見善不啻若已出見惡不啻若已入視民之飢溺猶已之飢溺而一夫不獲若已推而納諸溝中者非故為是而蘄天下之信已也務致其良知求其自慊而已矣後世良知之學不明天下之人外假仁義之名而內以行私利之實詭詞以阿俗矯行以干譽掩人之善而襲以為已長訐人之私而竊以為已直忿以相勝而猶謂之徇義險以相傾而猶謂之疾惡妬賢嫉能而猶自以為公是非恣情縱欲而猶自以為同好惡相凌相賊自其一家骨肉之親已不能無彼此藩籬之隔而况于天下之大民物之衆又何能一體而視之乎僕誠賴天之靈偶有見于良知之學以為必由此而後天下可得而治是以每念斯民之陷溺則為之戚然痛心忘其身之不肖而思以此救之亦不自知其量者天下之人見其若是遂相與非笑而詆斥以為是病狂喪心之人耳嗚呼吾方疾痛之切體而暇計人之非笑乎昔者孔子之在當時有議其為諂者有譏其為佞者有毁其未賢詆其為不知禮而侮之以為東家丘者有嫉而阻之者有惡而欲殺之者晨門荷蕢之徒皆當時之賢士且曰是知其不可而為之者與鄙哉硜硜乎莫已知也斯已而已矣雖子路在升堂之列尚不能無疑于其所見不恱于其所欲往而且以之為迂則當時之不信夫子者豈特十之一二而已乎然而夫子汲汲遑遑若求亡子于道路而不暇于暖席者寧以蘄人之信我知我而已哉僕之不肖何敢以夫子之道為已任顧其心亦巳稍知疾痛之在身是以倣徨四顧相求其有助于我者相與講去其病耳今誠得豪傑同志之士共明良知之學于天下使天下之人皆知自致其良知一洗讒妬勝忿之習以躋于大同則僕之狂病固將脫然以愈而終免于喪心之患矣豈不快哉會稽素號山水之區深林長谷信步皆是寒暑晦明無時不宜良朋四集道義日新天地之間寧復有樂于是者孔子云不怨天不尤人下學而上逹僕與二三同志方將請事斯語奚暇外慕獨其切膚之痛乃有未能恝然者輒復云爾按豹初見稱晚生後六年出守蘇州先生巳違世四年矣見德洪王畿曰吾學誠得諸先生尚冀再見稱贄今不及矣兹以二君為證具香案拜先生遂稱門人十一月庚申子正億生繼室張氏出先生初得子鄉先逹有靜齋六有者皆踰九十聞而喜以二詩為賀先生次韻謝答之有曰何物敢云繩祖武他年只好共爺長之句蓋是月十有七日也先生初命名正聰後七年壬辰外舅黃綰因時相避諱更今名十二月作惜隂説劉邦采合安福同志為會名曰惜隂請先生書會籍先生為之説曰同志之在安成者間月為會五日謂之惜隂其志篤矣然五日之外孰非惜隂時乎離羣而索居志不能無少懈故五日之會所以相稽切焉耳嗚呼天道之運無一息之或停吾心良知之運亦無一息之或停良知即天道謂之亦則猶二之矣知良知之運無一息之或停者則知惜隂矣知惜隂者則知致其良知矣子在川上曰逝者如斯夫不舍晝夜此其所以學如不及至于發憤忘食也堯舜兢兢業業成湯日新又新文王純亦不已周公坐以待旦惜隂之功寧獨大禹為然子思曰戒愼乎其所不覩恐懼乎其所不聞知微之顯可以入德矣或曰雞鳴而起孳孳為利凶人為不善亦惟日不足然則小人亦可謂之惜隂乎按先生明年丁亥過吉安寄安福諸同志書曰諸友始為惜隂之會當時惟恐只成虛語邇來乃聞逺近豪傑聞風而至者以百數此可以見良知之同然而斯道大明之幾于此亦可以卜之矣明道有云寧學聖人而不至不以一善而成名此為有志聖人而未能真得聖人之學者則可如此説若今日所講良知之説乃真是聖學之的傳但從此學聖人却無不至者惟恐吾儕尚有一善成名之意未肯專心致志于此耳六年丁亥先生五十六嵗在越正月先生與宗賢書曰人在仕途比之退處山林時工夫難十倍非得良友時時警發砥礪平日志向鮮有不潛移默奪弛然日就頽靡者近與誠甫言京師相與者少二君必須彼此約定但見微有動氣處即須提起致良知話頭互相規切凡人言語正到快意時便截然能忍默得意氣正到發揚時便翕然能收斂得憤怒嗜欲正到騰沸時便廓然能消化得此非天下之大勇不能也然見得良知親切時其功夫又自不難緣此數病良知之所本無只因良知昏昧蔽塞而後有若良知一提醒時即如白日一出魍魎自消矣中庸謂知恥近乎勇只是恥其不能致得自已良知耳今人多以言語不能屈服得人意氣不能陵軋得人憤怒嗜欲不能直意任情為恥殊不知此數病者皆是蔽塞自已良知之事正君子之所宜深恥者古之大臣更不稱他知謀才略只是一箇斷斷無他技休休如有容而已諸君知謀才略自是超然出于衆人之上所未能自信者只是未能致得自已良知未全得斷斷休休體假耳須是克去已私真能以天地萬物為一體實康濟得天下挽回三代之治方是不負如此聖明之君方能不枉此出世一遭也四月鄒守益刻文録于廣德州守益録先生文字請刻先生自標年月命德洪類次且遺書曰所録以年月為次不復分别體類蓋專以講學明道為事不在文辭體製間也明日德洪掇拾所遺請刻先生曰此便非孔子刪述六經手段三代之教不明蓋因後世學者繁文盛而實意衰故所學忘其本耳比如孔子刪詩若以其辭豈止三百篇惟其一以明道為志故所取止此例六經皆然若以愛惜文辭便非孔子垂範後世之心矣德洪曰先生文字雖一時應酬不同亦莫不本于性情况學者傳誦日久恐後為好事者攙拾反失今日裁定之意矣先生許刻附録一卷以遺守益凡四册五月命兼都察院左都御史征思田六月疏辭不允先是廣西田州岑猛為亂提督都御史姚鏌征之奏稱猛父子悉摛已降敕論功行賞訖遺目盧蘇王受搆衆煽亂攻陷思恩鏌復合四省兵征之久弗克為巡按御史石金所論朝議用侍郎張璁桂蕚薦特起先生總督兩廣及江西湖廣軍務度量事勢隨宜撫勦設土官流官孰便并核當事諸臣功過以聞且責以體國為心毋或循例辭避先生聞命上疏言臣伏念君命之召當不俟駕而行矧兹軍旅何敢言辭顧臣患痰疾增劇若冒疾輕出至于僨事死無及矣臣又復思思田之役起于土官讐殺比之寇賊之攻劫郡縣荼毒生靈者勢尚差緩若處置得宜事亦可集鏌素老成一時利鈍亦兵家之常御史石金據事論奏所以激勵鏌等使之善後收之桑榆也臣以為今日之事宜專責鏌等隆其委任重其威權略其小過假以歲月而要其成功至于終無底績然後别選才能兼諳民情土俗如尚書胡世寧李承勛者往代其任事必有濟疏入詔鏌致仕遣使敦促上道八月先生將入廣嘗為客坐私囑曰但願溫恭直諒之友來此講學論道示以孝友謙和之行德業相勸過失相規以教訓我子弟使無陷于非僻不願狂懆惰慢之徒來此博奕飮酒長傲飾非導以驕奢淫蕩之事誘以貪財黷貨之謀置頑無恥扇惑鼓動以益我子弟之不肖嗚呼由前之説是謂良士由後之説是為凶人我子弟苟逺良士而近凶人是謂逆子戒之戒之嘉靖丁亥八月將有兩廣之行書此以戒我子弟并以告夫士友之辱臨于斯者請一覽教之九月壬午發越中是月初八日德洪與畿訪張元沖舟中因論為學宗旨畿曰先生説知善知惡是良知為善去惡是格物此恐未是究意話頭德洪曰向如畿曰心體既是無善無惡意亦是無善無惡知亦是無善無惡物亦是無善無惡若説意有善有惡畢竟心亦未是無善無惡德洪曰心體原來無善無惡今習染既久覺心體上見有善惡在為善去惡正是復那本體功夫若見得本體如此只説無功夫可用恐只是見耳畿曰明日先生啓行晚可同進請問是日夜分客始散先生將入內聞洪與畿候立庭下先生復出使移席天泉橋上德洪舉與畿論辨請問先生喜曰正要二君有此一問我今將行朋友中更無有論證及此者二君之見正好相取不可相病汝中須用德洪功夫德洪須透汝中本體二君相取為益吾學更無遺念矣德洪請問先生曰有只是你自有良知本體原來無有本體只是太虛太虛之中日月星辰風雨露雷隂霾饐氣何物不有而又何一物得為太虛之障人心本體亦復如是太虛無形一過而化亦何費纎毫氣力德洪功夫須要如此便是合得本體功夫畿請問先生曰汝中見得此意只好默默自修不可執以接人上根之人世亦難遇一悟本體即見功夫物我內外一齊盡透此顔子明道不敢承當豈可輕易望人二君巳後與學者言務要依我四句宗旨無善無惡是心之體有善有惡是意之動知善知惡是良知為善去惡是格物以此自修直躋聖位以此接人更無差失畿曰本體透後于此四句宗旨何如先生曰此是徹上徹下語自初學以至聖人只此功夫初學用此循循有入雖至聖人窮究無盡堯舜精一功夫亦只如此先生又重囑付曰二君以後再不可更此四句宗旨此四句中人上下無不接著我年來立教亦更幾畨今始立此四句人心自有知識以來已為習俗所染今不教他在良知上實用為善去惡功夫只去懸空想箇本體一切事為俱不著實此病痛不是小小不可不早説破是日洪畿俱有省甲申渡錢塘先生遊吳山月巖嚴灘俱有詩過釣臺曰憶昔過釣臺驅馳正軍旅十年今始來復以兵戈起空山煙霧深往迹如夢裏微雨林徑滑肺病雙足胝仰瞻臺上雲俯濯臺下水人生何碌碌髙尚乃如此瘡痍念同胞至人匪為已過門不遑入憂勞豈得已滔滔良自傷果哉末難巳跋曰右正德已卯獻俘行在過釣臺而弗及登今兹復來又以兵革之役兼肺病足瘡徒顧瞻悵望而已書此付桐廬尹沈元材刻置亭壁聊以紀經行嵗月云耳時從行進士錢德洪王汝中建德尹楊思臣及元材凡四人丙申至衢西安雨中諸生出候因寄德洪汝中并示書院諸生幾度西安道江聲暮雨時機關鷗鳥破蹤迹水雲疑仗鉞非吾事傳經愧爾師天真泉石秀新有鹿門期德洪汝中方卜築書院盛稱天真之竒并寄及之不踏天真路依稀二十年石門深竹徑蒼峽㵼雲泉泮璧環胥海龜疇見宋田文明原有象卜築豈無緣今祠有仰止祠環海樓太極雲泉㵼雲諸亭戊戌過常山詩曰長生徒有慕苦乏大藥資名山遍深厯悠悠鬢生絲微軀一繫念去道日逺而中歲忽有覺九還乃在兹非爐亦非鼎何坎復何離本無終始究寧有死生期彼哉遊方士詭辭反增疑紛然諸老翁自傳困多岐乾坤由我在安用他求為千聖皆過影良知乃吾師十月至南昌先生發舟廣信沿途諸生徐樾張士賢桂軏等請見先生俱謝以兵事未暇許回途相見徐樾自貴溪追至餘干先生令登舟樾方自白鹿洞打坐有禪定意先生目而得之令舉似曰不是已而稍變前語又曰不是已而更端先生曰近之矣此體豈有方所譬之此燭光無不在不可以燭上為光因指舟中曰此亦是光此亦是光直指出舟外水面曰此亦是光樾領謝而别明日至南浦父老軍民俱頂香林立填途塞巷至不能行父老頂輿傳遞入都司先生命父老軍民就謁東入西出有不舍者出且復入自辰至未而散始舉有司常儀明日謁文廟講太學于明倫堂諸生屏擁多不得聞唐堯臣獻茶得上堂旁聽初堯臣不信學聞先生至自鄉出迎心已內動比見擁謁驚曰三代後安得有此氣象耶及聞講沛然無疑同門有黃文明魏良器輩笑曰逋逃主亦來投降乎堯臣曰須得如此大捕人方能降我爾輩安能至吉安大會士友螺川諸生彭簮王釗劉陽歐陽瑜等偕舊遊三百餘迎入螺川驛中先生立談不倦曰堯舜生知安行的聖人猶兢兢業業用困勉的工夫吾儕以困勉的資質而悠悠蕩蕩坐享生知安行的成功豈不誤已誤人又曰良知之妙真是周流六虛變通不居若假以文過飾非為害大矣臨别囑曰工夫只是簡易真切愈真切愈簡易愈簡易愈真切十一月至肇慶是月十八日抵肇慶先生寄書德洪畿曰家事賴廷豹紏正而德洪汝中又相與薰陶切劘於其間吾可以無內顧矣紹興書院中同志不審近來意向如何德洪汝中既任其責當能振作接引有所興起會講之約但得不廢其間縱有一二懈弛亦可因此夾持不致遂有傾倒餘姚又得應元諸友作興鼓舞想益日異而月不同老夫雖出山林亦每以自慰諸賢皆一日千里之足豈俟區區有所警䇿聊亦以此視鞭影耳即日已抵肇慶去梧不三四日可到方入穴場紹興書院及餘姚各會同志諸賢不能一一列名字乙未至梧州上謝恩疏二十日梧州開府十二月朔上疏曰田州之事尚未及會議審處然臣沿途咨訪頗有所聞不敢不為陛下言其略臣惟岑猛父子固有可誅之罪然所以致彼若是者則前此當事諸人亦宜分受其責蓋兩廣軍門專為諸猺獞及諸流賊而設事權實專且重若使振其兵威自足以制服諸蠻夫何軍政日壞上無可任之將下無可用之兵有警必須倚調土官狼兵若猛之屬者而後行事故此輩得以慿恃兵力日增桀驁及事之平則又功歸于上而彼無所與固不能以無怨憤始而徵發愆期既而調遣不至上嫉下憤日深月積劫之以勢而威益褻籠之以詐而術愈窮由是諭之而益梗撫之而益疑遂至于有今日今山猺海賊乘釁搖動窮迫必死之寇既從而煽誘之貧苦流亡之民又從而逃歸之其可憂危奚帝十百于二酋者之為患其事已兆而變已形顧猶不此之慮而汲汲于二酋則當事者之過計矣臣又聞諸兩廣士民之言皆謂流官久設亦徒有虛名而受實禍詰其所以皆云未設流官之前土人歲出土兵三千以聽官府之調遣既設流官之後官府嵗發民兵數千以防土人之反覆即此一事利害可知且思恩自設流官十八九年之間反者數起征勦日無休息浚良民之膏血而塗諸無用之地此流官之無益亦斷可識矣論者以為既設流官而復去之則有更改之嫌恐招物議是以寧使一方之民久罹塗炭而不敢明為朝廷一言寧負朝廷而不敢犯衆議甚哉人臣之不忠也苟利于國而庇于民死且為之而何物議之足計乎臣始至雖未能周知備厯然形勢亦可槩見矣田州切近交趾其間深山絶谷猺獞盤據動以千百必須存土官藉其兵力以為中土屛蔽若盡殺其人改土為流則邉鄙之患我自當之自撤藩籬後必有悔奏下尚書王時中持之得旨守仁才略素優所議必自有見事難遙度俟其會議熟處要須情法得中經久無患事有宜亟行者聽其便宜勿懷顧忌以貽後患初總督命下具疏辭免及豫言處分思田機宜凡當路相知者皆寓書致意與楊少師曰惟大臣報國之忠莫大于進賢去讒自信山林之志已堅而又素受知已之愛不復嫌避故轍言之乃今適為已地也昔有以邊警薦用彭司馬者公獨不可曰彭始成功今或少挫非所以完之矣公之愛惜人才而欲成全之也如此獨不能以此意推之某乎果不忍終棄病痊或使得備散局如南北大常國子之任則圖報當有日也與黃綰書曰往年江西赴義將士功久未上人無所勸再出何面目見之且東南小醜特瘡疥之疾百辟讒嫉朋比此則腹心之禍大為可憂者諸公任事之勇不思何以善後大都君子道長小人道消疾病既除元氣自復但去病太亟亦耗元氣藥石固當以漸也又曰思田之事本無緊要只為從前張皇太過後難收拾所謂生事事生是巳今必得如奏中所請庶圖久安否則反覆未可知也與方獻夫書曰聖主聰明不世出今日所急惟在培養君德端其志向于此有立是謂一正君而國定然非真有體國之誠其心斷斷休休者亦徒事其名而已又曰諸公皆有薦賢之疏此誠君子立朝盛節但與名其間却有所未喻者此天下治亂盛衰所繫君子小人進退存亡之機不可以不愼也譬諸養𧖟但雜一爛𧖟其中則一筐好𧖟盡為所壞矣凡薦賢于朝與自巳用人不同自己用人權度在我若薦賢于朝則評品宜定小人之才豈無可用如砒疏芒硝皆有攻毒破癰之功但混于參苓蓍术之間而進之鮮不誤矣又曰思田之事已壞欲以無事處之要已不能只求減省一分則地方亦可減省一分之勞擾耳此議深知大拂喜事者之心然欲殺數千無罪之人以求成一將之功仁者之所不忍也十有二月命暫兼理巡撫兩廣疏辭不允七年戊子先生五十七嵗在梧二月思田平先生疏略曰臣奉有成命與巡按紀功御史石金布政使林富等副使祝品林文輅等參將李璋沈希儀等會議思田之役兵連禍結兩省荼毒已踰二年兵力盡于哨守民脂竭于轉輸官吏罷于奔走今日之事已如破壞之舟漂泊于顛風巨浪覆溺之患洶洶在目不待知者而知之矣因詳其十患十善二幸四毁反覆言之且曰臣至南寧乃下令盡撤調集防守之兵數日之內解散而歸者數萬惟湖兵數千道沮且遠不易即歸仍使分留賔寧解甲休養待間而發初蘇受等聞臣奉命處勘始知朝廷無必殺之意皆有投生之念日夜懸望惟恐臣至之不速已而聞太監總兵相繼召還至是又見守兵盡撤其投生之念益堅乃遣其頭目黃富等先赴軍門訴告願得掃境投生惟乞宥免一死臣等諭以朝廷之意正恐爾等有所虧枉故特遣大臣處勘開爾等更生之路爾等果能誠心投順決當貸爾之死因復露布朝廷威德使各持歸省諭克期聽降蘇受等得牌皆羅拜踴躍歡聲雷動率衆掃境歸命南寧城下分屯四營蘇受等囚首自縳與其頭目數百人赴軍門請命臣等諭以朝廷既赦爾等之罪豈復虧失信義但爾等擁衆負固雖由畏死然騷動一方上煩九重之慮下疲三省之民若不示罰何以泄軍民之憤于是下蘇受于軍門各杖之一百乃解其縳諭于今日宥爾一死者朝廷天地好生之仁必杖爾示罰者我等人臣執法之義于是衆皆叩首恱服臣亦隨至其營撫定其衆凡一萬七千濈濈道路踴躍歡聞皆謂朝廷如此再生之恩我等誓以死報且乞即碩殺賊立功贖罪臣因諭以朝廷之意惟欲生全爾等今爾等方來投生豈忍又驅之兵創之下爾等逃竄日久且宜速歸完爾家室修復生理至于請路羣盜軍門自有區處徐當調發爾等于是又皆感泣歡呼皆謂朝廷如此再生之恩我等誓以死報臣于是遂委布政使林富前副總張祐督令復業方隅平定是皆皇上神武不殺之威風行于廟堂之上而草偃于百蠻之表是以班師不待七旬而頑夷即爾來格不折一矢不戮一卒而全活數萬生靈是所謂綏之斯來動之斯和者也疏入勑遣行人奬勵賞銀五十兩紵絲四襲所司備辦羊酒其餘各給賞有差先生為文勒石曰嘉靖丙戌夏官兵伐田隨與思恩之人相比相煽集軍四省洶洶連年于時皇帝憂憫元元容有無辜而死者乎乃今新建伯王守仁曷往視師其以德綏勿以兵虔班師撤旅信義大宣諸夷感慕旬日之間自縳來歸者一萬七千悉放之還農兩省以安昔有苗徂征七旬來格今未期月而蠻夷率服綏之斯來速于郵傳舞干之化何以加焉爰告思田毋忘帝德爰勒山石昭此赫赫文武聖神率土之濱凡有血氣莫不尊親四月議遷都臺于田州不果先是有制王守仁暫令兼理巡撫兩廣既受命先生乃疏言臣以迂踈多病之軀謬承總制四省軍務之命方懷不勝其任之憂今又加以巡撫之責豈其所能堪乎且兩廣之事實重且難巡撫之任非得才力精強者重其事權進其官階而久其職任殆未可求效于嵗月之間也致仕副都御史伍文定往嵗寧藩之變常從臣起兵具見經略侍郎梁材南贛副都御史汪鋐亦皆才能素著足堪此任願選擇而使之會侍郎方獻夫建白宜于田州特設都御史一人撫綏諸夷下議先生復疏言布政使林富可用或量改憲職仍聽臣等節制暫于思田住劄撫綏其衆然而要之蠻夷之區不可治以漢法雖流官之設尚且弗便而又可益之以都臺乎今且暫設凡一切廩餼輿馬悉取辦于南寧府衛取給于軍餉不以干思田之人俟年餘經略有次思田止責知府理治或設兵備憲臣一人于賔州或以南寧兵備兼理如此則目前既得輯寧之效而日後又可免煩勞之擾矣又以柳慶缺參將特薦用沈希儀且請起用前副總兵張佑俾與富協心共事未幾升富副都御史撫治鄖陽以去先生再薦布政使王大用按察使周期雍又以邉方缺官且言副使陳槐施儒楊必進知府朱衮皆堪右江兵備之任知州林寬可為田州知府推官李喬木可為同知且言任賢圖治得人實難其在邉方反覆多事之地其難尤甚蓋非得忠實勇果通逹坦易之才未易以定其亂有其才矣使不諳其土俗則亦未易以得其本心得其心矣使不耐其水土亦不能以久居其地以成其功故用人于邊方必兼是三者而後可如前四人者固皆可用之才今乃皆為時例所拘棄置不用而更勞心逺索則亦過矣疏上俱未果行興思田學校先生以田州新服用夏變夷宜有學校但瘡痍逃竄尚無受廛之民即欲建學亦為徒勞然風化之原又不可緩也乃案行提學道著屬儒學但有生員無拘廩增願改田州府學及各處儒生碩附籍入學者本道選委教官暫領學事相與講肄遊息興起孝弟或倡行鄉約隨事開引漸為之兆俟建有學校然後將各生徒通發該學肄業照例充補廩增起貢五月撫新民先生因左江道參議等官汪必東等稱古陶白竹石馬等賊近雖誅勦然尚有流出府江諸處者誠恐日後為患乞調歸順土官岑瓛兵一千名萬承龍英共五百名或韋貴兵一千名住劄平南桂平衝要地方及該府知府程雲鵬等亦申量留湖兵及調武靖州狼兵防守乃諭之曰始觀論議似亦區畫經久之計徐考成功終亦支吾目前之計蓋用兵之法伐謀為先處夷之道攻心為上今各猺征勦之後有司即宜誠心撫恤以安其心若不服其心而徒欲久留湖兵多調狼卒慿藉兵力以威劫把持謂為可久之計則亦末矣殊不知遠來客兵怨憤不肯為用一也供饋之需稍不滿意求索訾詈將無抵極二也就居民間騷擾濁亂易生讐隙三也困頓日久資財耗竭適以自􅼆四也欲借此以衛民而反為民增一苦欲借此以防賊而反為吾招一寇其可行乎合行知府程雲鵬公同指揮周㣧宗及各縣知縣等官親至已破賊巢各鄰近良善村寨以次加厚撫恤給以告示犒以魚鹽待以誠信敷以德恩諭以朝廷所以誅勦各賊者為其稔惡不悛若爾等良善守分村寨我官府何嘗輕動爾等一草一木爾等各宜益堅向善之心毋為彼所扇惑搖動從而為之推選衆所信服立為酋長以連屬之若各賊果能改惡遷善實心向化今日來投今日即待以良善決不追既往之惡爾等即可以此意傳告開諭之我官府亦就實心撫安招來量給鹽米為之經紀生業亦就為之選立酋長使有統率毋令煥散一面淸查侵占田土開立里甲以息日後之爭禁約良民毋使乘機報復以激其變如農夫之植嘉禾以去稂莠深耕易耨藝災灌慨專心一事勤誠無惰必有秋穫夫善者益知所勸則助惡者日衰惡者益知所懲則向善者益衆此撫柔之道而非專有恃于甲兵者也又曰該府議欲散撤顧倩機快等項調取武靖州土兵使之就近防守一節區畫頗當然以三千之衆而常在一處屯頓坐食亦未得宜必須分作六班每五百名為一班每兩箇月日而更一次若有雕勦等項然後通行起調然必須于城市别立營房毋使與民雜處然後可免于騷擾嫌隙蓋以十家牌門之兵而為守土安民之本以武靖起調之兵而備追捕勦截之用此亦經權交濟相須之意也自今以後免其秋調各處哨守等役專在潯州地方聽慿守備參將調用凡遇緊急調取即要星馳赴信地不得遲違時刻守巡各官仍要時加戒諭撫輯毋令日久玩弛又成虛應故事六月興南寧學校先生謂理學不明人心陷溺是以士習日偷風教不振日與各學師生朝夕開講巳覺漸有奮發之志又恐窮鄉僻邑不能身至其地委原任監察御史降合浦縣丞陳逅主教靈山諸縣原任監察御史降揭陽縣主簿季本主教敷文書院仍行牌諭曰仰本官每日拘集該府縣學諸生為之勤勤開誨務在興起聖賢之學一洗習染之陋其諸生該赴考試者臨期起送不該赴試者如常朝夕聚會考德問業之外或時出與經書論策題目量作課程就與講析文義以無妨其舉業之功大抵學絶道喪之餘未易解脫舊聞舊見必須包蒙俯就涵育薰陶庶可望其漸次改化諒本官平素最能孜孜汲引則今日必能循循善誘諸生之中有不率教者時行檟楚以警其惰本院回軍之日將該府縣官員師生查訪勤惰以示勸懲又牌諭曰照得安上治民莫善于禮冠婚喪祭固宜家喻而户曉者今皆廢而不講欲求風俗之美其可得乎况兹邉方逺郡土夷錯雜頑梗成風有司徒具刑驅勢迫是謂以火濟火何益于治若教之以禮庶幾所謂小人學道則易使矣福建莆田生員陳大章前來南寧遊學扣以冠婚鄉射諸儀頗能通曉近來各學諸生類多束書髙閣飽食嬉遊散漫度日豈若使與此生朝夕講習于儀文節度之間亦足以收其放心固其肌膚之會筋骸之束不猶愈于博奕之為賢乎仰南寧府官吏即便館穀陳生于學舍于各學諸生之中選取有志習禮及年少質美者相與講解演晳自此諸生得于觀感興起砥礪切磋修之于其家而𬒳于里巷逹于鄉村則邉徼之地遂化為鄒魯之鄉亦不難矣七月襲八寨齗藤峽破之八寨斷藤峽諸蠻賊有衆數萬負固稔惡南通交趾諸夷西接雲貴諸蠻東北與牛場仙臺花相風門佛子及柳慶府江古田諸猺回旋連絡延袤二千餘里流劫出沒為害嵗久比因有事思田勢不暇及至是先生以思田既平蘇受新附乃因湖廣保靖歸師之便令布政使林富副總兵張祐等出其不意分道征之富祐率右江及思田兵進勦八寨諸賊參議汪必東副使翁素僉事汪溱率左江及永保土兵進勦斷藤峽諸賊令該道分巡兵備收解紀功御史册報及行太監張賜并各鎮巡知會一月之內大破其衆斬獲三千有奇先生見諸賊巢穴既已掃蕩而我兵疾疫遂班師奏捷按疏言斷藤峽諸賊犄角屯聚自國初以來屢征不服至天順間都御史韓雍統兵二十萬然後破其巢穴撤兵無何賊復攻陷潯州據城大亂後復合兵量從勦撫自後竊發無時凶惡成性不可改化至于八寨諸賊尤為凶猛利鏢毒弩莫當其鋒且其寨壁天險進兵無路自國初都督韓觀嘗以數萬之衆圍困其地亦不能破竟從招撫而罷報後興師合勦一無所獲反多撓喪惟成化間土官岑瑛嘗合狼兵深入斬獲二百已而賊勢大湧力不能支亦從撫罷今因湖廣之回兵而利導其順便之勢作思田之新附而善用其報效之機兩地進兵各不滿八千之衆而三月報捷共已踰三千之功兩廣父老皆以為數十年來未有此舉也疏請經略思田及八寨斷藤峽初先生既平思田乃上疏曰臣以迂庸繆當兵事于兹土承制假以撫勦便宜是陛下之心惟在于除患安民未嘗有所意必也又諭令賊平之後議設土流孰便是陛下之心惟在于安民息亂未嘗有所意必也始者思田梗化既舉兵而加誅矣因其悔罪投降遂復宥而釋之固亦莫非仰承陛下不嗜殺人之心惓惓憂憫赤子之無辜也凡為經略事宜有三特設流官知府以制土官之勢仍立土官知府以順土夷之情分設土官巡檢以散各夷之黨擬府名為田寧以應讖謡而定人心設州治于府之西北立猛第三子邦相為吏目待其有功漸陛為知州分設思恩土巡檢司九田州土巡檢司十有八以蘇受并土目之為衆所服者世守之既而復破八寨斷藤峽又上疏曰臣因督兵親厯諸巢見其形勢要害各有宜改立衛所開設縣治以斷其脈絡而扼其咽喉者若失今不為則數年之間賊復漸來必歸聚生息不過十年又有地方之患矣臣以遵制便宜相度舉行凡為經略事宜有六移南丹衛城于八寨改築思恩府治于荒田改鳯化縣治于三里增設隆安縣治置流官于思龍以屬田寧增築守鎮城堡于五屯事下本兵持之户部復請覆勘學士霍韜等上疏曰臣等廣人也是役也臣等嘗為守仁計曰前當事者凡若三省兵若干萬梧州軍門費用軍儲合千萬復從廣東布政司支用銀米若干萬殺死疫死官兵土兵若干萬僅得田州小寧五十日而思恩叛矣今守仁不殺一卒不費斗米直宣揚威德遂使思田頑叛稽首來服雖舜格有苗何以過此乃若八寨賊斷藤峽賊又非思田之比八寨為諸賊淵藪而斷藤峽為八寨羽翼也廣西有八寨諸賊猶人有心腹病也八寨不平則兩廣無安枕期也今守仁沉機不露一舉平之百數十年豺乕窟穴掃而淸之如拂塵然臣等是以歎服守仁能體陛下之仁以懷綏思田向化之民又能體陛下之義以討服八寨齗藤梗化之賊仁義兩得之也夫守仁之成功有八善焉乘湖兵歸路之便兵不調而自集一也因思田效命之助勞而不怨二也機出意外賊不能遁所誅者渠惡非濫殺報功者比三也因歸師無糧運費四也一舉成功民不知擾五也平八寨平斷藤峽則極惡者先誅其細小巢穴可漸德化得撫勦之宜六也八寨不平則西而柳慶東而罹旁渌水新寧思平之賊合數千里共為窟穴雖調兵數十萬未易平伏今八寨平定則諸賊可以漸次撫勦兩廣良民可以漸次安業紓聖明南顧之憂七也韓雍雖平斷藤峽賊矣旋復有倡亂者八寨乃百六十年所不能誅之劇賊今守仁既平其巢窟即徙建城邑以鎮定之則惡賊失險後日不能為變逋賊來歸且化為良民矣誅惡綏良得民父母之體八也或議守仁奉命有事思田遂勦八寨可乎臣則曰昔吳楚反攻梁景帝詔周亞夫救梁亞夫不奉詔而絶吳楚糧道遂破吳楚而平七國安漢社稷傳曰閫以外將軍制之又曰大夫出疆有可以安國家利社稷專之可也古之道也是故亞夫知制吳楚在絶其食道而不在于救梁是故雖有詔命有所不受今守仁知思田可以德懷也遂納其降而安定之知八寨諸賊未易服也遂因時伏義而討平之雖無詔命先發後聞可也况有便宜從事之旨乎或曰建置城邑大事也區處錢糧户部職也不先奉聞而輒興工可乎臣則曰昔者范仲淹之守西邊也欲築大順城慮敵人爭之乃先具版築然後巡邉急速興工一月成城西夏覺而爭之已不及矣守仁于建置城邑之役不仰足户部而後有處其以一肩而分聖明南顧之憂不以為功反以為過可乎臣等目擊八寨之賊為地方大患百數十年一旦仰賴聖明任用守仁以底平定不勝慶忭今兵部功賞未行户部覆題再勘臣恐機會一失大功遂阻城堡不築逋賊復聚地方可慮是故冒昧建言唯聖明察焉九月疏謝奬勵賞賚賞思田功也九月初八日行人馮恩賫捧欽賜至鎮故有謝疏與德洪畿書地方事幸遂平息相見漸可期矣近年不審同志聚會如何得無法堂前今已草深一丈否想卧龍之會雖不能大有所益亦不宜遂爾荒落且存餼羊後或興起亦未可知餘姚得應元諸友相與倡率為益不小近有人自家鄉來聞龍山之講至今不廢亦殊可喜書到望遍寄聲益相與勉之九十弟與正憲輩不審早晚能來親近否誘掖接引之功與人為善之心當不俟多喋也魏廷豹決能不負所托兒輩或不能率教亦望相與夾持之十月疏請告先生以疾劇上疏請告具言臣自往年承乏南贛為炎毒所中遂患咳痢之疾歲益滋甚其後退休林野稍就醫藥而疾亦終不能止自去嵗入廣炎毒益甚力疾從事竣事而出遂爾不復能興今巳輿至南寧移卧舟次將遂自梧道廣待命于韶雄之間夫竭忠以報國臣之素志也受陛下之深恩思得粉身虀骨以自效又臣之所日夜切心者也病日就危而尚求苟全以圖後報而為養病之舉此臣之所以大不得巳也疏入未報謁伏波廟先生十五歲時嘗夢謁伏波廟至是拜祠下宛然如夢中謂兹行殆非偶然因識二詩其一曰四十年前夢裏詩此行天定豈人為徂征敢倚風雲陳所過如同時雨師尚喜逺人知向望却慚無術救瘡痍從來勝算歸廊廟耻説兵戈定四夷其二詩曰樓船金鼓宿烏蠻魚麗羣舟夜上灘月繞旌旗千嶂靜風傳鈴木九溪寒荒夷未必先聲服神武由來不殺難想見虞廷新氣象兩階干羽五雲端是月與豹書近嵗山中講學者往往多説勿忘勿助工夫甚難問之則云才著意便是助才不著意便是忘所以甚難區區因問之云忘是忘箇甚麼助是助箇甚麼其人默然無對始請問區區因與説我此間講學却只説箇必有事焉不説勿忘勿助必有事焉者只是時時去集義若時時去用必有事的工夫而或有時間斷此便是忘了即須勿忘時時去用必有事的工夫而或有時欲速求效此便是助了即須勿助其工夫全在必有事焉上用勿忘勿助只就其間提撕警覺而巳若是工夫原不間斷即不須更説勿忘原不欲速求效即不須更説勿助此其工夫何等明白簡易何等灑脫自在今却不去必有事上用工而乃懸空守著一箇勿忘勿助渀渀蕩蕩只做得箇沉空守寂學成一箇癡騃漢事來即便牽滯紛擾不復能經綸宰制此皆由學術誤人之故甚可憫矣又與鄒守益書曰隨處體認天理勿忘勿助之説大約未嘗不是只要根究下落即未免捕風捉影縱令鞭辟向裏亦與聖門致良知之功尚隔一塵若復失之毫釐便有千里之繆矣世間無志之人既已見驅于聲利辭章之習間有知得自已性分當求者又被一種似是而非之學兜絆羈縻終身不得出頭緣人未有真為聖人之志未免挾有見小欲速之私則此種學問極足支吾眼前得過是以雖在豪傑之士而任重道逺志稍不力即且安頓其中者多矣祀增城先廟先生五世祖諱綱者死苗難廟祀增城是月有司復新祠宇先生謁祠奉祀過甘泉先生廬題詩于壁曰我祖死國事肇禋在增城荒祠幸新復適來奉初蒸亦有兄弟好念言思一尋蒼蒼見葭色宛隔環瀛深入門散圖史想見抱膝吟賢郎敬父執童僕意相親病軀不遑宿留詩慰殷勤落落千百載人生幾知音道同著形迹期無負初心又題甘泉居曰我聞甘泉居近連菊坡麓十年勞夢思今來快心目徘徊欲移家山南尚堪屋渴飲甘泉泉飢食菊坡菊行看罹浮雲此心聊復足與德洪畿書書來見近日工夫之有進足為喜慰而餘姚紹興諸同志又能相聚會講切奮發興起日勤不懈吾道之昌真有火燃泉逹之機矣喜幸當何如哉此間地方悉巳平靖只因二三大賊巢為兩省盜賊之根株淵藪積為民患者心亦不忍不為一除剪又復遲留二三月今亦了事矣旬月間便當就歸途也守儉守文二弟近承夾持啓迪想亦漸有所進正憲尤極懶惰若不痛加針砭其病未易能去父子兄弟之間情既迫切責善反難其任乃在師友之間想平日骨肉道義之愛當不俟于多囑也與何性之書區區病勢日狼狽自至廣城又增水㵼日夜數行不得止至今遂兩足不能坐立須稍定即踰嶺而東矣諸友皆不必相候果有山隂之興即須早鼓錢塘之舵得與德洪汝中輩一會聚彼此當必有益區區養病本去已三月旬日後必得旨亦遂發舟而東縱未能遂歸田之願亦必得一還陽明洞與諸友一面而别且後會又有可期也千萬勿復遲疑徒耽誤日月總及隨舟而行沿途官吏送迎請謁斷亦不能有須臾之暇宜悉此意書至即撥冗德洪汝中輩亦可促之早為北上之圖伏枕潦草十一月乙卯先生卒于南安是月草五日踰梅嶺至南安登舟時南安推官門人周積來見先生起坐咳喘不已徐言曰近來進學如何積以政對遂問道體無恙先生曰病勢危亟所未死者元氣耳積退而迎醫診藥草八日晚泊問何地侍者曰靑龍鋪明日先生召積入久之開目視曰吾去矣積泣下問何遺言先生微哂曰此心光明亦復何言頃之瞑目而逝二十九日辰時也贛州兵備門人張思聰追至南安迎入南野驛就中堂沐浴衾斂如禮先是先生出廣布政門人王大用備美材隨舟思聰親敦匠事鋪梱設褥表裏裼襲門人劉邦采來奔喪事十二月三日思聰與官屬師生設祭入棺明日輿櫬登舟士民逺近遮道哭聲振地如喪考妣至贛提督都御史汪鋐迎祭于道士民沿途擁哭如南安至南昌巡按御史儲良材提學副使門人趙淵等請改嵗行士民昕夕哭奠八年己丑正月喪發南昌是月連日逆風舟不能行趙淵祝于柩曰公豈為南昌士民留耶越中子弟門人來候久矣忽變西風六日直至弋陽先是德洪與畿西渡錢塘將入京殿試聞先生歸遂迎至嚴灘聞訃正月三日成喪于廣信訃告同門是日正憲至初六日會于弋陽初十日過玉山弟守儉守文門人欒惠黃洪李珙范引年柴鳯至二月庚午喪至越四日子弟門人奠柩中堂遂飾喪紀婦人哭門內孝子正憲擕弟正億與親族子弟哭門外門人哭幕外朝夕設奠如儀每日門人來弔者百餘人有自初喪至卒葬不歸者書院及諸寺院聚會如師存是時朝中有異議爵廕贈諡諸典不行且下詔禁偽學詹事黃綰上疏曰忠臣事君義不苟同君子立身道無阿比臣昔為都事今少保桂蕚時為舉人取其大節與之交友及臣為南京都察院經厯見大禮不明相與論列相知二十餘年始終無間昨臣薦新建伯王守仁堪以柄用蕚與守仁舊不相合因不謂然小人乘間搆隙然臣終不以此廢蕚平生也但臣于事君之義立身之道則有不得不明者臣所以深知守仁者蓋以其功與學耳然功髙而見忌學古而人不識此守仁之所以不容于世也蓋其功之大者有四其一宸濠不軌謀非一日內而內臣如魏彬等嬖幸如錢寧江彬等文臣如陸完等為之內應外而鎮守如畢真劉朗等為之外應故當時中外諸臣多懷觀望若非守仁忠義自許身任討賊之事不顧赤族之禍倡義以勤王運籌以伐謀則天下安危未可知今乃皆以為伍文定之功是輕發縱而重走狗豈有兵無勝算而濠可徒搏而擒者乎其二大帽茶寮浰頭桶岡諸賊寨勢連四省兵連纍嵗若非蚤平南方自此多事守仁臨鎮次第底定其三田州思恩搆釁有年事不得息民不得巳故起守仁以往定以兵機感以誠信乃使盧王之徒崩角來降感泣受杖遂平一方之難其四自來八寨為兩廣腹心之疾其間守戍官軍與賊為黨莫可奈何守仁假永順狼兵盧王降卒并而襲之遂去兩廣無窮之巨害實得兵法便宜之算夫兵凶戰危守仁所立戰功皆除大患卒之以死勤事夫兵政國之大事宜為後世法可以終泯其功乎其學之大要有三一曰致良知實本先民之言蓋致知出于孔氏而良知出于孟軻性善之論二曰親民亦本先民之言蓋大學舊本所謂親民者即百姓不親之親凡親賢樂利與民同其好惡而為潔矩之道者是巳此所據以從舊本之意非創為之説也三曰知行合一亦本先民之言蓋知至至之知終終之只一事也守仁發此欲人言行相顧勿事空言以為學也是守仁之學弗詭于聖弗畔于道乃孔門之正傳也可以終廢其學乎然以蕚之非守仁遂致陛下失此良弼使守仁不獲致君堯舜誰之過與臣不敢以此為蕚是也况賞罰者御世之權以守仁之功德勞于王事乃常典不及削罰有加廢褒忠之典倡黨錮之禁非所以輔明主也守仁客死妻子孱弱家童載骨藁埋空山鬼神有知當為惻然臣實不忍見聖明之世有此事也假使守仁生于異世猶當追崇况在今日哉且永順之衆盧王之徒素慕守仁威德如此舉措恐失其望關係夷情亦非細故臣昔與守仁為友幾二十年一日憤寡過之不能守仁從而覺之若有深省遂復師事之是臣于守仁實非茍然相信如世俗師友者也臣于君父之前處師友之間既有所懷不敢不盡昔蕚為小人所讒臣謂之憤既而得白臣謂之喜固非臣之私也今守仁之抱冤亦猶蕚之負屈伏願擴一視之仁特勑所司優以恤典贈諡仍與世襲并開學禁以昭聖政若此事不明則蕚之與臣終不能以自忘故臣敢言及于此所以盡事陛下之忠且以補蕚之過亦以盡臣之義也疏入不報于是給事中周延抗疏論列謫判官十一月葬先生于洪溪是月十一日發引門人會葬者千餘人麻衣衰屨扶柩而哭四方來觀者莫不交涕洪溪去越城三十里入蘭亭五里先生所親擇也先是前溪入懷與左溪會衝嚙右麓術者心嫌欲棄之有山翁夢神人緋袍玉帶立于溪上曰吾欲還溪故道明日雷雨大作溪泛忽從南岸明堂周濶數百尺遂定穴門人李珙等築治更畨晝夜不息者月餘而墓成
