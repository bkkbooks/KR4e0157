違一體治以軍法承委各官務要愼重行事不得輕率寡謀中賊奸計所獲功次俱仰解赴該道從實紀錄造報以慿查考功罪輕重罰賞如違節制國典具存罪不輕貸其軍中未盡撥宜該道徑自處置施行仍一面先督所屬府縣查照夲院先頒十家牌式上緊編舉以爲弭盗安民之夲俱毋違錯追剿入湖賊黨牌十五年據南康府通判林寛呈稱後港逆犯楊本榮等百十餘人擄船逃入鄱陽湖等處乞行南昌饒州等府縣及沿湖廵司居民人等截捕看得賊旣入湖良善巳分正可乘機合兵捕剿爲此牌仰守廵南昌道即行點選驍勇軍快六七百名各執備鋒利器械給與口糧一月就行督捕都指揮僉事馮勲統領星夜躡賊向往用心緝捕獲功人役一體重賞如有違令退縮者遵照欽奉勅諭事理聽以軍法從事夲官務要申嚴紀律相機而行毋得退避輕忽有失機宜致賊遠竄貽患地方軍法具存罪亦難逭行嶺北道淸查贑州錢糧牌十月二十三日照得本院及嶺北守廵該道幷贛州府衛所縣問完批申呈詞囚犯𥿄米工價贓罰等項及官厰日逐收到商税銀兩俱經該官府追收貯庫以備軍餉年久未經淸查該府官吏更換不常中間恐有那移侵漁隱漏等情爲此仰抄案囬道即便親詣贛州府庫督同該府官先將正徳十二年二月起至正徳十五年九月終止各項𥿄米工價贓罰商稅等項銀兩卷簿逐一淸查盤理要見軍前用過若干即今見在若干有無侵漁隱漏若干及有衣物等項年久朽壞相應變貿若干備查開冊繳報本院查考如有奸弊就便拏究追問具招呈詳毋得故縦未便申行十家牌法凡立十家牌專爲止息盗賊若使毎甲各自紏察甲内之人不得容留賊盗右甲如此左甲復如此城郭郷村無不如此以至此縣如此彼縣復如此逺近州縣無不如此則盗賊亦何自而生夫以一甲之人而各自紏察十家之内爲力甚易使一甲而容一賊十甲即容十賊百甲即容百賊千甲即容千賊矣聚賊至扵千百雖起一縣之兵而剿除之爲力固巳甚難今有司往往不嚴十家之法及至盗賊充斥却乃興師動衆欲扵某處屯兵某處截捕不治其本而治其末不爲其易而爲其難皆由平日怠忽因循未嘗思念及此也自今務令各甲各自紏舉甲内但有平日習爲盗賊者即行捕送官司明正典刑其或過惡未稔尚可敎戒者照依牌諭報名在官令其改化自新官府時加點名省諭又逐日督令各家輪流沿門曉諭覺察如此則奸僞無所容而盗賊自可息矣大抵法立弊生必湏人存政舉若十家牌式徒爾編置張掛督勸考較之法雖或暫行終歸廢弛仰各該縣官務於坊里郷都之内推選年髙有徳衆所信服之人或三四十人或一二十人厚其禮貌特示優崇使之分投廵訪勸諭深山窮谷必至敎其不䏻督其不率面命耳提多方化導或素習頑梗之區亦可間行鄉約進見之時咨詢民瘼以通下情其於邑政必有禆補若廵訪勸諭著有成効者縣官備禮親造其廬重加獎勵如此庻㡬敎化興行風俗可美後之守令不知敎化爲先徒恃刑驅勢迫由其無愛民之實心若使果然視民如已子亦安忍不施敎誨勸勉而輒加箠楚鞭撻孟子云善政不如善敎之得民也况非善政乎守令之有志扵愛民者其盍思之行江西布政司清查沒官房産十一月二十日照得逆黨沒官房屋田產等項近經司府出佃與人暫管候命下之日定奪近訪得官民之家不論告佃年月先後地里逺近應否一槩混爭若不預爲查處立定規則將來必致大興告擾漸起釁端爲此仰抄案囬司即查前項沒官房屋田產實計若干處所某月日期經由某衙門與某人務以年月先後爲次先儘本縣人户然後及扵異縣先儘本府人戸然後及扵異府中間多有勢豪之徒不遵則例妄起爭訟或不由官府私擅占管占住者該司通行查出呈來以慿拏問叅䆒施行毋得容隱及查報不淸未便批再申十家牌法呈十一月二十九日據江西按察司呈㸔得盗賊之縱橫由扵有司之玩弛沿流推夲實如所呈失事各官俱合提究以警將來但地方多事未完缺人管理除該府縣掌印官姑且記罪責令懲創奮勵修敗𥙷隙務収桑榆之功以贖東隅之失其廵捕等官即行提問以戒怠弛仍備行各府縣掌印廵捕等官自兹申戒之後悉要遵照本院近行十家牌諭及扵各街巷郷村建置鑼皷等項事理上緊着實舉行嚴督查考務鑒前車之覆預爲曲突之徙毋得仍前玩忽怠弛但有踈虞定行從重拏究斷不輕貸此繳批各道廵歷地方呈十二月二十六日據江西按察司呈㸔得南昌湖西湖東九江各道地方兵荒之餘民窮財盡盗賊蠭起刼庫掠鄉無月無警府縣各官事無綱紀申請旁午文移日繁政務日廢仰各分廵官不時往來該道臨督所屬設法調度用其所長而不責其備敎其不及而勿撓其權興廉激懦祛弊懲奸務以息訟弭盗康寧小民毋憚一身之勞終歲逸居省城坐視民患藐不經心俱仰備行各官查照施行繳禁約釋罪自新軍民告示正德十六年正月𥘉五日告示一應平日隨從逆府舍餘軍校人等論罪俱在必誅雖經自首奉有詔宥據法亦當遷徙邊遠煙瘴之地但念其各巳誠心悔罪故今務在委曲安全仰各洗心滌慮改惡從善本分生理保守身家毋得仍蹈前非或又投入各王府及鎭守撫按三司等衙門充作軍牢伴當皂隷防夫等項名目挾持復讐定行擒拏追坐從逆重刑知情容留官司叅究論以窩藏逆黨同甲鄰佑不舉首者連坐以罪除已奏請外仰各遵照毋違某縣某坊第㡬甲釋罪自新一户某人左鄰某人右鄰某人仰各鄰毋念舊惡務要與之和睦相處早晚仍須勸化鈐束毋令投入各府及鎭守撫按三司等衙門充當軍牢伴當皁隷防夫等項名目挾勢害人定行坐以知情容隱逆黨重罪決不輕貸批湖廣兵備道設縣呈十六年據整飭郴桂衡永等處兵備湖廣按察司副使汪玉呈稱本道接管㸔得議奏計處地方以弭盗賊事件内一件審處賊遺田地俱經查勘明白屬宜章者撥與該圖領種屬臨武者各歸原主屬桂陽者原議候設立大堰三堡撥給各堡軍兵頂種續奉廵撫衙門批委同知魯玘再行踏勘計處一件添設屯堡以嚴防禦見奉提督衙門案驗區處其第一件設縣所以便撫禦最爲緊要重大縣所旣設則更夫有所歸着哨營可以掣散至扵添屯堡處廵司倂縣堡審田地四事可以次第興行但先因廣東守廵兵備等官所見或異致䝉該部請命提督大臣親詣勘處又緣别有機務未即臨勘至扵今日本職竊意廣東各官決無不肯協和成事之心蓋因比時多事未暇細閱文書及查原經委官止有同知魯玘見在原奉提督衙門行令徑自約㑹廣東各官速將設縣事情及添設屯所事宜查議除行同知魯玘前去約會廣東該道委官議處本職仍親詣適中地方約㑹外理合呈詳施行等因到院卷查先爲圗議邉方後患事淮兵部咨云云續據湖廣按察司呈奉廵撫湖廣都御史秦案驗云云候本院撫臨至日㑹行議處具奏定奪施行各無苟且搪塞去後今呈前因叅照前項立縣等事關係地方安危逺近人心懸望恨不一日而成本院雖奉勅㫖别有機務不暇親詣而該道前任守廵各官皆有地方重責自當遵照晝夜經營却乃因循二年之上尚未完報縱使國法可以倖免不知此心亦何以自安今照接管副使汪玉久負體用之學素有愛民之心據所呈報旣巳深眀事機洞知緩急遂使舉而行之固當易扵反掌合再督催以速成蹟爲此仰抄案囬道即往彼地約會各該道守廵等官速將設縣等項事情議處定當具由呈奪應施行者一面施行務爲羣䇿畢舉之圖以収一勞永逸之績毋再因循仍蹈前轍未便仍行都布按三司一體查照㑹議施行督剿安義逆賊牌二月十一日牌仰典史徐誠即行調選羅坊等處驍勇慣戰兵夫四百名各備鋒利器械就仰該縣官扵堪動銀兩内先行給與口糧二月統領星夜前赴安義縣聽慿通判林寛調度追勦獲功人員一體從重給賞但有不遵號令及逗遛退縮擾害平人者仰即遵照本院欽奉勅諭事理聽以軍法從事本官務要申嚴紀律整束行伍必使所過之地秋毫無犯所捕之賊噍類不遺庶稱委任如或縦弛怠忽致有踈虞軍令具存罪亦難貸截勦安義逃賊牌二月十三日看得安義逆賊巳經本院嚴督官兵四路邀截誠恐無所迯竄或歸衝縣治除行知縣熊价專一防守縣治以守爲戰通判林寛專一追勦逃賊以戰爲守及行都指揮馮勲選領南昌府衛軍快督兵截剿外牌仰饒州南康九江府掌印官知府張愈嚴王念等各行起集兵快身自督領扵沿湖要害邀截迎擊仍督令餘干樂平都昌建昌湖口彭澤等縣掌印官領兵把截沿湖緊關隘路江口毋令此賊得以出境逺遁一面多差知因鄉導探賊向往互相傳報合勢粘踪追勦一應機宜俱聼從宜區處各官務要竭力殫智殺賊立功以靖地方毋得畏縮因循輕忽踈略致賊滋漫軍法具存罪難輕貸批議賞獲功陣亡等次呈三月𥘉十日據江西按察司呈㸔得獲功陣亡等員役俱查照贛州事例獲賊首者賞銀十兩次賊首七兩從賊三兩老弱二兩奮勇對敵陣亡者十兩殺傷死者七兩五錢𬒳傷者三兩其有軍民人等各扵賊勢未敗之先自行帥衆擒獲送官者仍照出給告示賊首賞二十兩次賊首十兩從賊首五兩務查約實一例給賞毋吝小費致失大信俱仰行南昌府扵夲縣支剰軍餉銀内公同賞功官照數支給開數繳報查考覆應天廵撫派取船隻咨三月二十四日據江西布政司呈據應天府呈開江西九江等府原派船五十隻装運營建官空物料乞查處督發奉批查處呈奪議照江西南康南昌等府並無馬快船隻雖有額造紅船爲因宸濠謀反被賊燒燬往來使客及糧運尚且無船装送疲困已極委果無從區處呈詳到院爲照江西各府師旅饑饉疲困已極况兼夲職氣昏多病坐視民痍莫措一籌前項船隻果難措置南京素稱富庶今雖亦有供餽之煩然得貴院撫緝有方兼以長才區畫何事不濟且江西之疲弊亦貴院所備知嘗䝉軫念為之奏蠲租税江西之民無不感激獨此數十艘廼不䝉一為分處乎爲此合咨貴院煩請查照憫念疲殘之區終始徳惠别爲處撥裝運施行批東鄉叛民投順狀詞四月𥘉九日據東鄉縣民陳和等連名訴㸔得朝廷添設縣治本圖以便地方而順民情但割小益大安仁之民旣稱偏損亦宜爲之處分在官府自有通融裁制各民惟宜聽順果有未當又可從容告理而乃輒稱背抗稔惡屢年愈撫愈甚不得巳而有擒捕之舉亦惟彰國法禁頑梗小懲大戒期在安緝撫定非必殺爲快也今各民旣來投順官府豈欲過求但未審誠偽恐因擒捕勢廹暫來投順以求延緩亦未可知仰按察司㑹同都布二司將各情詞備加詳審及查立縣始末縁由其各都啚應否歸附某縣各縣糧差應否作何區處各民違抗迯叛之罪應否作何理斷通行議處呈奪批江西布政司淸查造冊呈四月十六日據江西布政司呈㸔得造冊淸查之法旣巳詳悉備具但人存政舉使奉行不至則革弊之法反爲流弊之源仰布政司照議上緊施行仍備行總理及各守廵官同以此事爲固本安民之首各至分地臨督各該府州縣正官且將别項職事牒委佐貳官分理俱要專心致志身親綜核照式依期淸量查造務使積弊頓除後患水絶以蘇民困中間但有不行盡心查理止慿吏胥茍且了事者即行拏治問發提調等官一體叅究其各官分定地方該司具名開報繳行豐城縣督造淺船牌十六年仰抄案囬縣即行知縣顧佖速差䏻幹官前來樟樹接駕淺船到縣照依該道估價扵官庫支給各船旗軍收領就便擇日催督縣丞沈廷用遵照夲院面授水簾桅等法興工修築務將前船銜結勾連多用串關扇束縛堅牢足障水勢以便施工毋爲摧盪虚費財力行江西按察司審問通賊罪犯牌六月十五日照得本院扵正徳十四年六月内因寧王謀反起兵征剿具本奏聞當差贛州衛舎人王鼐齎奏却乃設計詐病推托不前顯有通賊情弊及至擒獲逆賊差齎緊關題本赴京奏報却又迂道私赴太監張忠處揑報軍中事情㡬至釀成大變及將原領題本通同邀截囬還所據本犯罪難輕貸爲此牌仰夲司即將發去犯人王鼐從公審問明白依律議擬具招呈詳毋得輕縱未便行江西按察司清查軍前解囬糧賞等物六月十九日卷查先該本院督解宸濠中途奉㫖仍解回省隨將前項賞功銀牌花紅綵叚及糧餉等項牌差縣丞等官龍光等解發江西按察司查收貯庫仍候本院明文施行去後今照前項糧賞等銀巳支未支清查應該起解者未審曾否盡數解京擬合查報爲此牌仰本司即查原發糧賞等銀各計若干要見扵何年月日奉本院批呈或𥿄牌支取某項若干給與某起官軍人等行糧或犒勞兵快應用其應解金冊一十二付上髙新昌玉印二顆銀盆六面及衣服等件曾否盡數解京中間有無遺漏等情備查明白具數囬報以慿查對稽考毋得遲延未便批廣東按察司立縣呈七月二十八日據副使汪玉呈稱云云卷查先爲圖議邊方後患事准兵部咨云云續據湖廣按察司呈奉湖廣廵撫都御史秦案驗候本院撫臨至日會行議處具奏定奪施行隨據副使汪玉呈云云看得立縣之舉今且三年而兩省會議猶是道傍之談似此往復不已畢竟何時定計自昔舉事須順人情凡今立縣專爲弭亂若使兩地人心未協遂爾執已見而行則是今日定亂之圖反爲異時起争之本今江西安仁東鄉各縣紛紜奏告連年不息即今徵矣除行該道兵備官上緊約㑹廣東各官親詣地方拘集里老年髙有識者備詢輿論務在衆議調停兩情和恊就行相度地勢㑹計財力監追起工然後各自囬任若使議終不合必欲各自立縣亦須酌裁適均要見廣東扵髙宿立縣都圖若干湖廣扵笆籬立縣都圖若干城池髙廣若干官員裁减若干異時賦役兩地逃躱若何區處盗賊彼時出沒若何緝捕一應事宜逐條開議須扵不同之中務求通融之術不得徒事空言彼此推託茍延目前不顧後患異時追論致禍之因罪亦終有不免除批行湖廣該道兵備官查照外仰抄案回司㑹同布政司各行該道守廵兵備等官約會湖廣各官面議停當一面會計工料委官及時興工一面備由開詳以慿覆奏毋再推延執抣致有他虞斷行叅究不恕仍行兩廣提督幷廵按衙門查照催督施行行江西三司停止興作牌八月𥘉九日先該本院看得江西兵荒之餘重以洪水爲災民窮財盡正當體養撫息各該衙門一應修理公廨工役俱宜停止已經案仰各司即將工役悉行停止其勢不容已者亦待秋成之後民困稍蘇方許以次呈奪去後近因本院出廵訪得各該官員不思地方兵變水患小民困苦巳極方求蠲賦稅出内帑欲賑而未能輒復紛然修理事屬故違本當叅究但傳聞未的姑再查禁爲此仰各抄案回司即查前項工程前此果否悉行停止近來是否重復興工具由呈報以慿施行毋得隱諱違錯不便行嶺北道申明教塲軍令九月十七日照得本院調到寧都等縣官兵機快人等見在贛州敎塲住劄操閱中間恐有不守軍令罪及無辜應合禁約隨據副使王度呈開合行事宜叅酌相同爲此仰抄案回道即行出給告示張掛敎塲暁諭官兵機快各加遵守如有違犯事情重大者拏送軍門依軍令斬首其事情稍輕者該道徑自究治發落仍呈本院查考計開一各兵但有擅動地方一草一木者照依軍令斬首示衆一各兵但有管哨官總指稱神福饋送打點等項名色科派銀物自一分以上俱許赴該道面告究治一管哨官凡遇歇操之日並在營房居住鈐束機兵教演武藝敢有在家逰蕩及挾妓飮酒朋夥喧譁者訪出綑打一百一各兵但有疾病事故許管哨官禀明醫驗不許顧人頂替如有用財買求地方光棍替身上操仰該管總小甲拏獲首送該道枷號如隱情不首事發連總小甲一體枷號一各兵在市買辦柴米酒肉等項俱要兩平交易如有恃強多占分兩被人告發枷號示衆一管哨官凡遇各兵鬪毆喧閙等項小事量行懲治大事禀該道拏問不許縱容爭竸囂亂轅門一各歇操之日各將隨有器械務在整刷鋒利鮮明毋得臨時有悮如平日懶惰不行修理上操之際弦矢斷折銃砲不響旗幟不明查出綑打一百一各兵遇上班之日不許因便赴該道府訴告家郷戸婚田土等項事情查出痛責四十一各兵上街行走俱要懸帶小木牌一面上寫某哨官總下某人年甲籍貫辨别如有隱下兵打名色另著别様衣冠暗入府縣挾騙官吏及來軍門幷道門首打聽消息訪出枷號不恕一各兵領到工食銀兩俱要撙節用度謹愼收放如有奢侈用盡及被人偷盗縱來訴告缺失俱不准理仍重加責治一各該上班兵夫如有限期未滿先行逃囬者差人原籍拏來用一百斤大枷枷號教塲門首三箇月滿日綑打一百仍依律問發邊逺充軍一各哨官幷兵夫有軍門一應便宜及利所當興害所當革者許赴軍門及該道直白條陳不許諸人阻當行雩都縣建立社學牌十二月二十七日照得本院近扵贛州府城設立社學鄉館教育民間子弟風俗頗漸移易牌仰雩都縣掌印官即扵􅔜縣起立社學選取民間俊秀子弟備用禮幣敦請學行之士延爲師長查照本院原定學規盡心敎導務使人知禮讓戸習詩書丕變偷薄之風以成淳厚之俗毋得違延忽視及虚文搪塞取咎王文成公全書卷之三十一終
