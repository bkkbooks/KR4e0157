body:
  text: 外集一賦詩賦騷七首太白樓賦丙辰歳丙辰之孟冬兮泛扁舟予南征凌濟川之驚濤兮覽層搆乎任城曰太白之故居兮儼髙風之猶在蔡侯導余以從陟兮將放觀乎四海木蕭蕭而亂下兮江浩浩而無窮鯨敖敖而湧海兮鵬翼翼而承風月生輝於采石兮日留景於嶽峰蔽長煙乎天姥兮渺匡廬之雲松嘅昔人之安在兮吾將上下求索而不可蹇予雖非白之儔兮遇季真之知我羌後人之視今兮又烏知其不果吁嗟太白公奚爲其居此兮余奚爲其復来倚穹霄以流盻兮固千載之一哀昔夏桀之顛覆兮尹退乎莘之野成湯之立賢兮廼登庸而伐夏謂鼎爼其要說兮維黨人之擠詬曾聖哲之匡時兮夫焉前枉而直後當天寳之末代兮淫好色以信䜛惡来妹喜其猖獗兮衆皆狐媚以貪婪判獨毅而不顧兮爰命夫以㒒妾之役寍直死以顑頜兮夫焉患得而局促開元之紹基兮亦遑遑其求理生逢時以就列兮固雲䑓麟閣而容與夫何漂泊于天之涯兮登斯樓乎延佇信流俗之嫉妬兮自前世而固然懐夫子之故都兮沛余涕之湲湲廟堂之偃蹇兮或非情之所好惟不合於斯世兮恣沉酣而逺眺進吾不遇於武丁兮退吾將顔氏之簞瓢奚麯蘖其昏迷兮亦夫子之所逃管仲之輔紏兮孔聖與其改行佐璘而失節兮始以見道之未明覩夜郎之有作兮横逸氣以徘徊亦𥘉心之無他兮故雖悔而弗摧吁嗟其誰無過兮抗直氣之為難輕萬乗於褐夫兮固孟軻之所嘆曠絶代而相感兮望天宇之漫漫去夫子其千祀兮世益隘以周容媒婦妾以馳騖兮又從而為之吮癰賢者化而改度兮兢規曲以為同卒曰嶧山青兮河流瀉風颼颼兮澹平野凭髙樓兮不見舟楫紛兮樓之下舟之人兮儼服亦有庶㡬夫子之蹤者九華山賦壬戌循長江而南下指青陽以幽討啓鴻𪷟之神秀發九華之天巧非效靈於坤軸孰搆竒於玄造渉五溪而徑入宿無相之窈窕訪王生於邃谷掏金沙之清潦凌風雨乎半霄登望江而逺眺歩千仞之蒼壁俯龍池於深窅吊謫仙之遺跡躋化城之縹緲欽鉢盂之朝露見蓮花之孤標扣雲門而望天柱列仙舞於晴昊儼雙椒之闢門真人駕陽雲而獨蹻翠蓋平臨乎石照綺霞掩映乎天姥二神升於翠微九子鄰於積稻炎燺起於玉甑爛石碑之文藻囬澄秋於枕月建少㣲之星旐覆甌承滴翠之餘瀝展旗立雲外之旌纛下安禪而歩逍遥覽雙泉於松杪踰西洪而憇黄石懸百丈之灝灝瀬流觴而縈紆遺石船於澗道呼白鶴於雲峰釣嘉魚於龍沼倚透碧之峗屼謝塵寰之紛擾攀齊雲之巉鑑琉璃之浩溔沿東陽而西歷飱九節之蒲草樵人導余以冥探排碧雲之瑶島群巒翳其繆藹失隂陽之昬暁垂七布之沉沉靈龜隱而復佻履髙僧而􅓏招賢開白日之杲杲試明茗於春陽汲垂雲之淵湫凌繡壁而據石屋何文殊螺髻之蟠紏梯拱辰而北盻墮遺光於拾寶緇裳迓於黄匏休圎寂之幽俏鳥呼春於叢篁和雲韶之鷕鷕喚起促余之晨興落星河於􅉉橑䕶山嘠其驚飛恠遊人之太早攬卉木之如濯𬒳晨暉而争姣静鑱聲之剥啄幽人劚参蕨於㝠杳碧鷄噦於青林鷴翻雲而失皓隱搗藥於樛蘿挾提壺餅焦而翔繞鳳鳯承盂冠以相遺飲沆􅒭之仙醥羞竹實以嬉翺集梧枝之嫋嫋嵐欲雨而霏霏鳴濕濕於蘴葆躐三遊而轉青峭拂天香於茫渺席泓潭以濯纓浮桃瀉而揚縞淙澌澌而落䕃飲猿猱之捷狡睨斧柯而昇大還望㑹仙於雲表憫子京之故宅欵知微之碧桃倐金光之閃映睫累景於穹㘭弄玄珠於赤水舞千尺之潜蛟並花塘而峻極散香林之廽飈撫浮屠之突兀泛五釵之翠濤襲珎芳於絶巘裊金歩之揺揺莎羅躑躅芬敷而燦燿幢玉女之妖嬌搴龍鬚於靈寳墯鉢囊之飄颻開仙掌於嶔嵌散青馨之迢迢披白雲而踸崇夀見叅錯之僧寮日既夕而山㝠掛星辰於窿㟼宿南臺之明月虎夜嘯而羆嘷鹿麋群遊於左右若將侶幽人之岑寥逈髙寒其無寐聞氷壑之洞簫溪女厲晴瀧而曝术雜精苓之春苗邀予觴以玉液飯玉粒之瓊瑶溘辭予而逺去颯霞𥚑之飄飄復中峰而悵望或仙蹤之可招廼下見陽陵之蜿蝘忽有感於子明之宿要逝予將遺世而獨立採石芝於層霄雖長䖏於窮僻廼永離乎豗囂彼蒼黎之緝緝固吾生之同胞苟顛連之能濟吾豈靳於一毛矧狂胡之越獗王師局而奔勞吾寍不𣣔請長纓於闕下快平生之鬱陶顧力㣲而任重懼覆敗於或邅又出位以圖逺將無誚於鷦鷯嗟有生之迫隘等㓕沒於風泡亦富貴其奚為猶榮蕣之一朝曠百世而興感蔽雄傑於蓬蒿吾誠不能同草木而腐朽又何避乎群喙之呶呶巳矣乎吾其鞭風霆而騎日月𬒳九霞之翠𫀆搏鵬翼於北𬈑釣三山之巨鰲道崑崙而息駕聴王母之雲璈呼浮丘於子晉招勾曲之三茅長遨遊於碧落共太虚而逍遥亂曰蓬壺之藐藐兮列仙之所逃兮九華之矯矯兮吾將於此巢兮匪塵心之足攪兮念鞠育之劬勞兮苟𥘉心之可紹兮氷矢弗撓兮吊屈平賦丙寅正徳丙寅某以罪謫貴陽取道沅湘感屈原之事爲文而吊之其詞曰山黯惨兮江夜波風颼颼兮木落森柯汎中流兮焉泊湛椒醑兮吊湘纍雲㝠㝠兮月星蔽晦氷崚􅜤兮霰又下纍之宫兮安在悵無見兮愁予髙㟁兮􅋂崎紛紏錯兮樛枝下深淵兮不惻穴澒洞兮蛟蠄山岑兮無極空谷谽谺兮逈寥寂猿啾啾兮吟雨熊羆嘷兮虎交蹟念纍之窮兮焉托䖏四山無人兮駭狐䑕魈魅遊兮群跳嘯瞰出入兮為纍姦宄嫉纍正直兮反詆為殃昵比上官兮子蘭為臧幽叢薄兮疇侶懐故都兮增傷望九疑兮参差就重華兮陳辭沮積雪兮磵道絶洞庭渺邈兮天路迷要彭咸兮江潭召申屠兮使驂娥鼓瑟兮馮夷舞聊遨遊兮湘之浦乗囬波兮泊蘭渚睠故都兮獨延佇君不還兮郢為墟心壹鬱兮𣣔誰語郢為墟兮函崤亦焚䜛鬼逋戮兮快不酬冤歷千載兮耿忠愊君可復兮排帝閽望遁跡兮渭陽箕罹囚兮其徉以狂艱貞兮晦明懐若人兮將予退蔵宗國淪兮摧腑肝忠憤激兮中道難勉低囬兮不忍溘自沉兮心所安雄之謏兮䜛喙衆狂稺兮謂纍揚巳為魈為魅兮為䜛媵妾纍視若䑕兮佞䫙有泚纍忽舉兮雲中龍旂晻靄兮飃風横四海兮倐忽駟玉虬兮上衝降望兮大壑山川蕭條兮渀寥廓逝逺去兮無窮懐故都兮蜷局亂曰日西夕兮沅湘流楚山嵯峨兮無冬秋纍不見兮涕泗世愈隘兮孰知我憂思歸軒賦庚辰陽明子之官于䖍也𪠘之後喬木蔚然退食而望若處深麓而遊於其鄉之園也構軒其下而名之曰思歸焉門人相謂曰歸乎夫子之役役於兵革而沒沒於徽纏也而靡寒暑焉而靡昏朝焉而髮蕭蕭焉而色焦焦焉雖其心之固囂囂也而不免於呶呶焉嘵嘵焉亦奚為乎稿中竭外而徒以勞勞焉為乎㢤且長谷之迢迢也窮林之寥寥也而耕焉而樵焉亦焉徃而弗宜矣夫退身以全節大知也歛徳以亨道大時也怡神養性以遊於造物大熈也又夫子之夙期也而今日之歸又奚以思為乎㢤則又相謂曰夫子之思歸也其亦在陳之懐歟吾黨之小子其狂且簡倀倀然若瞽之無與偕也非吾夫子之歸孰從而裁之乎則又相謂曰嗟乎夫子而得其歸也斯土之人為失其歸矣乎天下之大也而皆若是焉其誰與為理乎雖然夫子而得其歸也而後得於道惟夫天下之不得於道也故若是其貿貿夫道得而志全志全而化理化理而人安則夫斯人之徒亦未始為不得其歸也而今日之歸又奚疑乎而奚以思為乎陽明子聞之憮然而嘆曰吾思乎吾思乎吾親老矣而暇以他為乎雖然之言也其始也吾私焉其次也吾資焉又其次也吾㡬焉乃援琴而歌之歌曰歸兮歸兮又奚疑兮吾行日非兮吾親日衰兮胡不然兮日思予旋兮後悔可遷兮歸兮歸兮二三子之言兮咎言丙寅正徳丙寅冬十一月守仁以罪下錦衣獄省愆内訟時有所述既出而錄之何玄夜之漫漫兮悄予懐之獨結嚴霜下而増寒兮皦明月之在隙風呶呶以憎木兮鳥驚呼而未息魂營營以惝恍兮目窅窅其焉極懔寒飈之中人兮杳不知其所自夜展轉而九起兮沾予襟之如泗胡定省之弗遑兮豈荼甘之如薺懐前哲之耿光兮耻周容以爲比何天髙之㝠㝠兮孰察予之衷予匪戚於累囚兮牿匪予之爲恫沛洪波之浩浩兮造雲阪之𪷟𪷟稅予駕其安止兮終予去此其焉從孰癭瘰之在頸兮謂累足之何傷熏目而弗顧兮惟盲者以爲常孔訓之服膺兮惡訐以爲直辭婉孌期巷遇兮豈予言之未力皇天之無私兮鑒予情之靡他寍保身之弗知兮膺斧鑕之謂何蒙出位之爲愆兮信愚忠而蹈亟茍聖明之有禆兮雖九死其焉恤亂曰予年將中歳月遒兮深谷崆峒逝息遊兮飄然凌風八極周兮孰樂之同不均憂兮匪脩名崇仁之求兮出處時從天命何憂兮守儉弟歸曰仁歌楚聲為别予亦和之庭有竹兮青青上喬木兮鳥嚶嚶妹之来兮弟與偕行竹青青兮雨風鳥嚶嚶兮西東弟之歸兮兄誰與同江雲闇兮暑雨江波渺渺兮愁予弟别兄兮須臾兄思弟兮何䖏景翳翳兮桑榆念重闈兮離居路脩逺兮﨑嶮沮風波兮江湖山有洞兮洞有雲深林窅窅兮澗道曛松落落兮葛纍纍猿啾啾兮鶴怨群山之人兮不歸山鬼晝嘯兮下上煙霏風嫋嫋兮桂花落草萋萋兮春日遅葺予屋兮雲間荒予圃兮溪之陽驅虎豹兮無踐我藿優麋鹿兮無駭我塲觧予綬兮鍾阜委予佩兮江湄徃者不可追兮嘆鳯徳之日衰将沮溺其耦耕兮孰接輿之避予囬予駕兮扶桑鼓予枻兮滄浪終携汝兮空谷採三秀兮徜徉祈雨辭正徳丙子南贛作嗚呼十日不雨兮田且無禾一月不雨兮川且無波一月不雨兮民已爲疴再月不雨兮民將奈何小民無罪兮天無咎民撫廵失職兮罪在予臣嗚呼盗賊兮爲民大屯天或罪此兮赫威䧏嗔臣則何罪兮玉石俱焚嗚呼民則何罪兮天何遽怒油然興雲兮雨兹下土彼罪曷逋兮哀此窮苦歸越詩三十五首弘治壬戌年以刑部主事告病歸越并楚逰作遊牛峰寺四首牛峰今改名浮峰洞門春靄蔽深松飛磴纏空轉石峰猛虎踞厓如出柙㫁螭蟠頂訝懸鐘金城綘闕應無䖏翠壁丹書尚有踪天下名區皆一到此山殊不厭来重縈紆鳥道入雲松下數湖南百二峰巖犬吠人時出樹山僧迎客自鳴鐘凌飈陟險真扶病異日探竒是舊踪欲扣靈關問丹訣春風蘿薜隔重重偶尋春寺入層峰曽到渾疑是夢中飛鳥去邊懸棧道馮夷宿䖏有幽宫溪雲晚度千巗雨海月凉飄萬里風夜擁蒼厓卧丹洞山中亦自有王公一卧禪房隔歳心五峰煙月聼猿吟飛湍映樹懸蒼玉香粉吹香落細金翠壁年多霜蘚合石牀春盡雨花深勝遊過眼俱陳迹珎重新題滿竹林又四絶句翠壁㸔無厭山池坐益清深林落䡖葉不道是秋聲恠石有千窟老松多半枝清風灑巖洞是我再来時人間酷暑避不得清風都在深山中池邊一坐即三日忽見巗頭碧樹紅兩到浮峰興轉劇醉眠三日不知還眼前風景色色異惟有人聲似世間姑蘇呉氏海天樓次鄺尹韻晴雪吹寒春事濃江樓三月尚殘冬青山暗逐囬廊轉碧海真成捷徑通風暖􅉉牙雙燕劇雲深簾幙萬花重倚䦨天北疑囬首想像丹梯下六龍山中立秋日偶書風吹蟬聲亂林卧驚新秋山池静澄碧暑氣亦已收青峰出白雲突兀成瓊樓袒裼坐溪石對之心悠悠倐忽無定態變化不可求浩然發長嘯忽起雙白鷗夜雨山翁家偶書山空秋夜静月明松檜凉沿溪歩月色溪影揺空蒼山翁隔水語酒熟呼我嘗褰衣渉溪去笑引開竹房謙言值暮夜盤飡百無將露華明橘柚摘獻氷盤香洗盞對酬酢浩歌人蒼茫醉拂巗石卧言歸遂相忘尋春十里湖光放小舟謾尋春事及西疇江鷗意到忽飛去野老情深只自留日暮草香含雨氣九峰晴色散溪流吾儕是䖏皆行樂何必蘭亭說舊逰西湖醉中謾書二首十年塵海勞魂夢此日重来眼倍清好景恨無蘇老筆乞歸徒有賀公情白鳬飛處青林晚翠壁明邊返照晴爛醉湖雲宿湖寺不知山月堕江城掩映紅粧莫謾猜隔林知是藕花開共君醉卧不須到自有香風拂面来九華山下柯秀才家蒼峰抱層嶂翠瀑繞雙溪下有幽人宅蘿深客到迷夜宿無相寺春宵卧無相月照五溪花掬水洗雙眼披雲㸔九華巗頭金佛國樹杪謫仙家彷彿聞笙鶴青天落綘霞題四老圍棋圗世外煙霞亦許時至今風致後人思却懐劉項當年事不及山中一着棋無相寺三首老僧巗下屋繞屋皆松竹朝聞春鳥啼夜伴巗虎宿坐望九華碧浮雲生暁寒山靈應秘惜不許俗人㸔静夜聞林雨山靈似𣣔留只愁梯石滑不得到峰頭化城寺六首化城髙住萬山深樓閣慿空上界侵天外清秋度明月人間㣲雨結浮隂鉢龍降䖏雲生座巗虎歸時風滿林最愛山僧能好事夜堂燈火伴孤吟雲裏軒窓半上鈎望中千里見江流髙林日出三更暁幽谷風多六月秋仙骨自憐何日化塵縁翻覺此生浮夜深忽起蓬莱興飛上青天十二樓雲端鼓角落星斗松頂袈裟散雨花一百六峯開碧漢八十四梯踏𬗋霞山空仙骨塟金槨春暖石芝抽玉芽獨揮談塵柫煙霧一笑天地真無涯化城天上寺石磴入星躔雲外開丹井峰頭耕石田月明猿聼偈風静鶴參禪今日揩雙眼幽懐二十年僧屋煙霏外山深絶世譁茶分龍井水飯帶石田砂香細雲嵐雜窓髙峰影遮林棲無一事終日弄丹霞突兀𨳩穹閣氤氲散暁鐘飯遺黄稻粒花發五釵松金骨蔵靈塔神光照逺峰㣲茫竟何是老衲話遺踪李白祠二首千古人豪去空山尚有祠竹深荒舊徑蘚合失殘碑雲雨羅文藻溪泉繫夢思老僧殊未觧猶自索題詩謫仙棲隱地千載尚髙風雲散九峰雨巗飛百丈虹寺僧傳舊事詞客吊遺踪回首蒼茫外青山感慨中雙峯凌崖望雙峰蒼茫竟何在載拜西北風爲我掃浮靄蓮花峰夜静凉颷發輕雲散碧空玉鈎掛新月露出青芙蓉列仙峰靈峭九萬丈參差生暁寒僊人招我去揮手青雲端雲門峯雲門出孤月秋色坐蒼濤夜乆群籟絶獨照宫錦袍芙蓉閣二首青山意不盡還向月中㸔明日歸城市風塵又馬鞍巖下雲萬重洞口桃千樹終歳無人来惟許山僧住書梅竹小畫寒倚春霄蒼玉杖九華峰頂獨歸来柯家草亭深雲裏却有梅花傍竹開山東詩六首弘治甲子年起復主試山東時作登㤗山五首暁登㤗山道行行入烟霏陽光散巗壑秋容淡相輝雲梯掛青壁仰見蛛絲微長風吹海色飄颻送天衣峰頂動笙樂青童兩相依振衣將徃從凌雲忽髙飛揮乎若相待丹霞閃餘暉凢軀無健羽悵望未能歸二天門何崔嵬下見青雲浮泱􅐯絶人世逈豁髙天秋暝色從地起夜宿天上樓天鷄鳴半夜日出東海頭隱約蓬壺樹縹緲扶桑洲浩歌落青㝠遺響入滄流唐虞變楚漢滅沒如風漚藐矣鶴山僊秦皇豈堪求金砂費日月頽顔竟難留吾意在龎古冷然馭凉颼相期廣成子太虚顯遨逰枯槁向巗谷黃綺不足儔三窮厓不可極飛歩凌烟虹危泉瀉石道空影垂雲松千峰互攅簇掩映青芙蓉髙臺倚巉削傾側臨崆峒失足墯烟霧碎骨顚厓中下愚竟難暁摧折紛相從吾方坐日觀披雲笑天風赤水問軒后蒼梧呌重瞳隱隱落天語閶闔開玲瓏去去勿復道濁世将焉窮四塵網苦覊縻富貴真露草不如騎白鹿東遊入蓬島朝登太山望洪濤隔縹緲陽輝出海雲来作天門暁遙見碧霞君翩翩起貟嶠玉女𬗋鸞笙雙吹入晴昊舉首望不及下拜風浩浩擲我玉虚篇讀之殊未了傍有長眉翁一一能指道從此煉金砂人間跡如掃五我才不救時匡扶志空大置我有無間緩急非所賴孤坐萬峰巓嗒然遺下塊巳矣復何求至精諒斯在澹泊非虚杳灑脱無苶蔕世人聞予言不笑即吁恠吾亦不強語惟復笑相待魯叟不可作此意聊自快㤗山髙次王内翰司獻韻歐生誠楚人但識廬山髙廬山之髙猶可計尋丈若夫㤗山仰視恍惚吾不知其尚在青天之下乎其已直出青天上我𣣔倣擬試作㤗山髙但恐培塿之見未能測識髙大筆底難具狀扶輿磅薄元氣鍾突兀半遮天地東南衡北恒西㤗華俯視傴僂誰争雄人寰茫昧乍隱見雷雨𥘉觧開鴻𪷟繡壁丹梯烟霏靄䨴海日𥘉湧照燿蒼翠平麓逺抱滄海灣日觀正與扶桑對聼濤聲之下瀉知百川之東㑹天門石扇豁然中𨳩幽崖邃谷襞積隱埋中有遯世之流龜潜雌伏飱霞吸秀於其間徃徃恠譎多僊才上有百丈之飛湍懸空絡石穿雲而直下其源疑自青天来巗頭膚寸出烟霧須臾滂沱遍九垓古来登封七十二主後来相效紛紛如雨玉檢金函無不為只今埋沒知何許但見白雲猶復起封中㫁碑無字天外日月磨剛風飛塵過眼倐超忽飄蕩豈復有遺踪天空翠華逺落日辭千峰魯郊獲麟岐陽㑹鳯明堂既毀閟宮興頌宣尼曵杖逍遙一去不復来幽泉鳴咽而含悲群巒拱揖如相送俯仰宇宙千載相望堕山喬嶽尚𬒳其光峻極配天無敢頡頏嗟予瞻眺門墻外何能彷彿窺室堂也来攀附攝遺跡三千之下不知亦許再拜占末行吁嗟乎㤗山之髙其髙不可極半壁囬首此身不覺巳在東斗傍京師詩八首弘治乙丑年改除兵部主事時作憶龍泉山我愛龍泉寺寺僧頗踈野盡日坐井欄有時卧松下一夕别山雲三年走車馬媿殺巗下泉朝夕自清瀉憶諸弟乆别龍山雲時夢龍山雨覺来枕簟凉諸弟在何許終年走風塵何似山中住百歳如轉蓬拂衣從此去寄舅老舅近何如心性老不改世故惱情懐光隂不相待借問同軰中鄉鄰㡬人在從今且爲樂舊事無勞悔送人東歸五洩佳山水平生思一遊送子東歸省蓴鱸况復秋幽探須及壯世事苦悠悠来歳春風裏長安憶故丘寄西湖友予有西湖夢西湖亦夢予三年成濶别近事竟何如况有諸賢在他時終卜廬但恐吾歸日君還軒冕拘贈陽伯陽伯即伯陽伯陽竟安在大道即人心萬古未嘗改長生在求仁金丹非外待繆矣三十年于今吾始悔故山鑑水終年碧雲山盡日閑故山不可到幽夢毎相關霧豹言長隱雲龍𣣔共攀縁知丹壑意未勝𬗋宸班憶鑑湖友長見人来說扁舟毎獨逰春風梅市晚月色鑑湖秋空有煙霞好猶為塵世留自今當勇徃先與報江鷗獄中詩十四首正徳丙寅年十二月以上䟽忤逆瑾下錦衣獄作不寐天寒歳云暮氷雪關河逈幽室魍魉生不寐知夜永驚風起林木驟若波浪􅍅我心良匪石鉅為戚欣動滔滔眼前事逝者去相踵厓窮猶可陟水深猶可泳焉知非日月胡為亂予衷深谷自逶迤煙霞日悠永匡時在賢逹歸㢤盍耕壠有室七章有室如􅒶周之崇墉窒如穴處無秋無冬耿彼屋漏天光入之瞻彼日月何嗟及之倐晦倐明凄其以風倐雨倐雪當晝而蒙夜何其矣靡星靡粲豈無白日窹寐永嘆心之憂矣匪家匪室或其啓矣殞予匪恤氤氤其埃日之光矣淵淵其鼓明既昌矣朝既式矣日既夕矣悠悠我思曷其極矣讀易囚居亦何事省愆懼安飽瞑坐玩羲易洗心見微奥乃知先天翁畫畫有至敎包䝉戒為寇童牿事宜早蹇蹇匪為節􅊒􅊒未違道遯四獲我心蠱上庸自保俛仰天地間觸目俱浩浩簞瓢有餘樂此意良匪矯幽㢤陽明麓可以忘吾老歳暮兀坐經旬成木石忽驚歳暮還思鄉髙􅉉白日不到地深夜黠䑕時登床峰頭霽雪開草閣瀑下古松閒石房溪鶴洞猿爾無恙春江歸棹吾相將見月屋罅見明月還見地上霜客子夜中起旁皇涕沾裳匪為嚴霜苦悲此明月光月光如流水徘徊照髙堂胡為此幽室奄忽踰飛揚逝者不可及来者猶可望盈虚有天運嘆息何能忘天涯天涯歳暮氷霜結永巷人稀罔象遊長夜星辰瞻閣道暁天鐘鼓隔雲樓思家有淚仍多病報主無能合逺投留得昇平雙眼在且應簑笠卧滄洲屋罅月幽室不知年夜長晝苦短但見屋罅月清光自虧滿佳人宴清夜繁絲激哀管朱閣出浮雲髙歌正凄婉寍知幽室婦中夜獨愁嘆良人事遊俠經歳去不返来歸在何時年華忽将晚蕭條念宗祀淚下長如霰别友獄中居常念朋舊簿領成濶絶嗟我二三友胡然此簮盍累累囹圄間講誦未能輟桎梏敢忘罪至道良足恱所恨精誠眇尚口徒自蹶天王本明聖旋巳但中熱行蔵未可期明當與君別願言無詭隨努力從前哲赴謫詩五十五首正徳丁卯年赴謫貴陽龍埸驛作答汪抑之三首去國心已恫别子意彌惻伊邇怨昕夕况玆萬里隔戀戀岐路間執手何能黙子有昆弟居而我逺親側囬思菽水懽羡子何由得知子念我深夙夜敢忘惕良心忠信資蠻貊非我戚北風春尚號浮雲正南馳風雲一相失各在天一涯客子懐徃路起視明星稀驅車赴長阪迢迢入嵐霏旅宿蒼山底霧雨昏朝彌間關不足道嗟此白日㣲切磋懐良友碩言毋心違聞子賦茆屋来歸在何年索居間楚越連峰鬱参天緬懐巗中隱磴道窮扳緣江雲動蒼壁山月流澄川朝採石上芝暮漱松間泉鵝湖有前約鹿洞多遺編寄子春鴻書待我秋江船陽明子之南也其友湛元明歌九章以贈崔子鍾和之以五詩於是陽明子作八詠以答之君莫歌九章歌以傷我心微言破寥寂重以離别吟别離悲尚淺言㣲感逾深瓦缶易諧俗誰辯黄鐘音其二君莫歌五詩歌之増離憂豈無良朋侶洵樂相遨遊譬彼桃與李不為倉囷謀君莫忘五詩忘之我焉求其三洙泗流浸㣲伊洛僅如綫後来三四公瑕瑜未相掩嗟予不量力跛蹩期致逺屢興還屢仆惴息㡬不免道逢同心人秉節倡予敢力爭毫釐間萬里或可勉風波忽相失言之淚徒泫其四此心還此理寍論已與人千古一嘘吸誰為嘆離群浩浩天地内何物非同春相思輒奮勵無為俗所分但使心無間萬里如相親不見宴遊交徴逐胥以淪其五器道不可離二之即非性孔聖欲無言下學從泛應君子勤小物藴蓄乃成行我誦窮索篇於子既聞命如何圜中士空谷以爲静其六静虚非虚寂中有未發中中有亦何有無之即成空無欲見真體忘助皆非功至㢤玄化機非子孰與窮其七憶與羙人别贈我青琅函受之不敢發焚香始開椷諷誦意彌逺期我濂洛間道逺恐莫致庶㡬終不慚其八憶與羙人别惠我雲錦裳錦裳不足貴遺我氷雪腸寸腸亦何遺誓言終不渝珎重羙人意深秋以為期南遊三首元明與予有衡嶽羅浮之期賦南遊申約也南遊何迢迢蒼山亦南馳如何衡陽鴈不見燕臺書莫歌澧浦曲莫吊湘君祠蒼梧煙雨絶從誰問九疑其二九疑不可問羅浮如可攀遙拜羅浮雲奠以雙瓊環渺渺洞庭波東逝何時還人生不努力草木同衰殘其三洞庭何渺茫衡嶽何崔嵬風飃廽鴈雪羙人歸未歸我有𬗋瑜珮留掛芙蓉臺下有蛟龍峽徃徃興雲雷憶昔答喬白巖因寄儲柴墟三首憶昔與君約玩易探玄㣲君行赴西嶽經年始来歸方將事窮索忽復當逺辭相去萬里餘後㑹安可期問我長生訣惑也吾誰欺盈虧消息間至㢤天地機聖狂天淵隔失得分毫釐其二毫釐何所辯惟在公與私公私何所辯天動與人爲遺體豈不貴踐形乃無虧碩君崇徳性問學刋支離無爲氣所役毋爲物所疑恬淡自無𣣔精專絶交馳博奕亦何事好之甘若飴吟咏有性情䘮志非所宜非君愛忠告斯語容見嗤試問柴墟子吾言亦何如其三柴墟吾所愛春陽溢鬢眉白巗吾所愛慎黙長如愚二君廊廟器予亦山泉姿度量較齒徳長者皆吾師置我五人末庶亦忘崇卑迢迢萬里别心事兩不疑北風送南鴈慰我長相思一日懐抑之也抑之之贈既嘗答以三詩意若有歉焉是以賦也一日復一日去子日以逺惠我金石言沉鬱未能展人生各有際道誼尤所眷甞嗤児女悲憂来仍不免𬗟懐滄洲期聊以慰遅晚其二遅晩不足嘆人命各有常相去忽萬里河山鬱蒼蒼中夜不能寐起視江月光中情良自抑羙人難自忘其三羙人隔江水彿彷若可覩風吹蒹葭雪飄蕩知何䖏羙人有瑶瑟清奏含太古髙樓明月夜惆悵為誰鼓夢與抑之昆季語湛崔皆在焉覺而有感因紀以詩三首夢與故人語語我以相思纔為旬日别宛若三秋期令弟坐我側屈指如有為須臾湛君至崔子行相隨肴醑旋羅列語笑如平時縦言及㣲奥㑹意忘其辭覺来復何有起坐空嗟咨其二起坐憶所夢黙遡猶歴歷𥘉談自有形繼論入無極無極生徃来徃来萬化出萬化無停機徃来何時息来者胡為信徃者胡為屈㣲㢤屈信間子午當其屈非子盡精㣲此理誰與測何當衡廬間相携玩羲易其三衡廬曽有約相携尚無時去事多翻覆来踪豈前知斜月滿虚牖樹影何参差林風正蕭瑟驚鵲無寍枝邈彼二三子惄焉勞我思因雨和杜韻晚堂踈雨暗柴門忽入殘荷瀉石盆萬里滄江生白髮㡬人燈火坐黄昏客途最覺秋先到荒徑惟憐菊尚存却憶故園耕釣䖏短簑長笛下江村赴謫次北新關喜見諸弟扁舟風雨泊江關兄弟相㸔夢寐間巳分天涯成死别寍知意外得生還投荒自識君恩逺多病心便吏事閒携汝耕樵應有日好移茅屋傍雲山南屏溪風漠漠南屏路春服𥘉成病眼開花竹日新僧巳老湖山如舊我重来層樓雨急青林逈古殿雪晴碧嶂廽獨有幽禽觧相信雙飛時下讀書臺卧病静慈寫懐卧病空山春復夏山中幽事最能知雨晴諧下泉聲急夜静松間月色遅把卷有時眠白石觧纓随意濯清漪呉山越嶠俱堪老正奈燕雲繫逺思移居勝果寺二首江上但知山色好峰廽始見寺門開半空虚閣有雲住六月深松無暑来病肺正思移枕簟洗心兼得逺塵埃富春咫尺烟濤外時倚層霞望釣臺病餘巗閣坐朝曛異景相新得未聞日脚倒明千頃霧雨聲髙度萬峰雲越山陣水當呉嶠江月随潮上海門便𣣔携書從此老不敎猿鶴更移文憶别憶别江干風雪隂艱難歳月兩侵尋重㸔骨肉情何限况復斯文約舊深賢聖可期先立志塵凢未脫謾言心移家便住烟霞壑緑水青山長對吟泛海險夷原不滯胸中何異浮雲過太空夜静海濤三萬里月明飛錫下天風武夷次壁間韻有輿飛度萬峰雲囬首滄波月下聞海上真為滄水使山中又遇武夷君溪流九曲𥘉諳路精舍千年始及門歸去髙堂慰垂白細探更擬在春分草萍驛次林見素韻奉寄山行風雪瘦能當㑹喜江花照野航本與宦途成懶散頗因詩景受閑忙鄉心草色春同逺客鬂松梢晚更蒼料得烟霞終有分未須連夜夢溪堂王山東嶽廟遇舊識嚴星士憶昨東歸亭下路數峰簫管隔秋雲肩輿欲到妨多事鼓枻重来㑹有云春夜絶憐燈節近溪聲最好月中聞行蔵無用君平卜請㸔沙邊鷗鷺群廣信元夕蒋太守舟中夜話樓臺燈火水西東簫鼓星橋渡碧空何䖏忽談塵世外百年惟此月明中客途孤寂渾常事逺地相求見古風别後新詩如不惜衡南今亦有飛鴻夜泊石亭寺用韻呈陳婁諸公因寄儲柴墟都憲及喬白巖太常諸友廿年不到石亭寺惟有西山只舊青白拂掛墻僧已去紅䦨照水客重經沙村逺樹凝春望江雨孤篷入夜聼何䖏故人還笑語東風啼鳥夢𥘉醒悵望沙頭成乆坐江洲春樹何青青烟霞故國虚夢想風雨客途真慣經白璧屢投終自信朱絃一絶好誰聼扁舟心事滄浪舊從與漁人笑獨醒過分宜望鈐岡廟共傳峰頂樹古廟有靈神楚俗多尊鬼巫言觧惑人望禋存舊典捍禦及斯民世事渾如此題詩感慨新雜詩三首危棧㫁我前猛虎尾我後倒崖落我左絶壑臨我右我足復荆榛雨雪更紛驟邈然思古人無悶聊自有無悶雖足珍警惕忘爾守君觀真宰意匪薄亦良厚其二青山清我目流水静我耳琴瑟在我御經書滿我几措足践坦道恱心有妙理頑㝠非所懲賢逹何靡靡乾乾懐徃訓敢忘惜分晷悠㢤天地内不知老将至其三羊腸亦坦道太虚何隂晴燈窓玩古易欣然獲我情起舞還再拜聖訓垂明明拜舞詎踰節頓忘樂所形歛袵復端坐玄思窺沉𬈑寒根固生意息灰抱陽精沖漠際無極列宿羅青㝠夜深向晦息始聞風雨聲袁州府宜春臺四絶宜春臺上還春望山水南来眼未嘗却笑韓公亦多事更從南浦羡滕王臺名何事只宜春山色無時不可人不用煙花費粧點儘敎刋落儘嶙峋持脩江藻拜祠前正是春風𣣔暮天童冠儘多歸詠興城南兼說有温泉古廟香燈㡬許年増脩還費大官錢至今楚地多風雨猶道山神駕鐡船夜宿宣風舘山石崎嶇古轍㾗沙溪馬渡水猶渾夕陽歸鳥投深麓烟火行人望逺村天際浮雲生白髮林間孤月坐黄昏越南冀北俱千里正恐春愁入夜魂萍鄉道中謁濂溪祠木偶相沿恐未真清輝亦復凛衣巾簿書曽屑乗田吏爼豆猶存畏壘民碧水蒼山俱過化光風霽月自傳神千年私淑心䘮後下拜春祠薦渚蘋宿萍鄉武雲觀暁行山徑樹髙低雨後春泥沒馬蹄翠色絶雲𨳩逺嶂寒聲隔竹隱晴溪已聞南去艱舟楫漫憶東歸沮杖藜夜宿仙家見明月清光還似鑑湖西醴陵道中風雨夜宿泗洲寺次韻風雨偏從險道甞深泥沒馬䧟車箱虚傳鳥路通巴蜀豈必羊腸在太行逺渡漸㸔連暝色晚霞㑹喜見朝陽水南昏黒投僧寺還理羲編坐夜長長沙答周生旅倦憇江觀病齒廢談誦之子特相求禮殫意彌重自言絶學餘有志莫與共手持一編書披歷見肝衷近希小范踪逺為賈生慟兵符及射藝方技靡不綜我方懲創後見之色亦動子誠仁者心所言亦屢中碩子且求志藴蓄事涵泳孔聖固遑匕與點樂歸詠囬也王佐才閉戸避鄰閧知子信羙才大搆中梁棟未當匠石求滋植務培壅愧子勤綣意何以相規諷養心在寡欲操存舍即縦嶽麓何森森遺址自南宋江山足游息賢迹尚堪踵何當謝病来士氣多沉勇渉湘于邁嶽麓是遵仰止先哲因懐友生麗澤興感伐木寄言二首客行長沙道山川鬱稠繆西探指嶽麓凌晨渡湘流踰岡復陟巘吊古還尋幽林壑有餘采普賢此藏脩我来實仰止匪伊事盤遊衡雲閒暁望洞野浮春洲懐我二三友伐木増離憂何當此来聚道誼日相求其二林間憇白石好風亦時来春陽熈百物欣然得予懐緬思両夫子此地得徘徊當年靡童冠曠代登堂階髙情詎今昔物色遺吾儕顧謂二三子取瑟為我諧我彈爾為歌爾舞我與偕吾道有至樂富貴真浮埃若時乗大化勿愧點與囬陟岡採松栢將以遺所思勿採松栢枝兩賢昔所依縁峰踐臺石將以望所期勿踐臺上石両賢昔所躋両賢去邈矣我友何相違吾斯未能信役役空爾疲胡不此簮盍麗澤相遨嬉渇飲松下泉飢飱石上芝偃仰絶餘念遷客難乆稽洞庭春浪濶浮雲隔九疑江洲滿芳草目極令人悲已矣從此去奚必玆山為戀繫乃從𣣔安土惟随時晚聞冀有得此外吾何知逰嶽麓書事醴陵西来渉湘水信宿江城沮風雨不獨病齒畏風濕泥潦侵途絶行旅人言嶽麓最形勝隔水𬈑𪷟隱雲霧趙侯需晴邀我遊故人徐陳各傳語周生好事屢来速森森雨脚何由住暁来隂翳稍披拂便携周生渉江去戒令休遣府中知徒爾勞人更妨務橘洲僧寺浮江流鳴鐘出延立沙際停橈一至答其情三洲連綿亦佳䖏行雲散漫浮日色是時峰巒益開霽亂流蕩槳濟倐忽繫檝江邊老檀樹㟁行里許入麓口周生道予勤指顧柳蹊梅堤存彷彿道林林壑獨如故赤沙想像虚田中西嶼傾頽今塜墓道鄉荒趾留突兀赫曦逺望石如皷殿堂釋菜禮從宜下拜朱張息㳺地鑿石開山面勢改雙峰闢闕見江渚聞是呉君所規畫此舉良是反邅忌九仞誰虧一簣功嘆息遺基獨延佇浮屠觀閣摩青霄盤據名區遍寰宇其徒素為儒所擯以此方之反多愧愛禮思存告朔羊况此實作匪文具人云趙侯意頗深隱忍調停旋脩舉昨来風雨破棟脊方遣圬人𥙷殘敝予聞此語心稍慰野人𬞞蕨亦羅置欣然一酌纔舉盃津夫走報郡侯至此行隱跡何由聞遣騎候訪自吾寓潜来鄙意正為此倉率行庖益勞費整冠出迓見兩蓋乃知王君亦同御肴羞層疊絲竹繁避席興辭懇莫拒多儀劣薄非所承樂闋觴周日將暮黄堂吏散君請先病夫沾醉須少憇入舟暝色漸㣲茫却喜順流還易渡嚴城燈火人已稀小巷曲折忘歸路僊宫酣倦成熟寐暁聞􅉉聲復如注昨遊偶遂寔天假信知行樂皆有數渉躐差償夙好心尚有名山敢多慕齒角盈虧分則然行李雖淹吾不惡次韻答趙太守王推官詰朝事䖍謁玄居宿齋沐積霖喜新霽風日散清燠蘭撓渡芳渚半渉見水陸溪山儼新宇雷雨荒大麓皇皇絃誦區斯文昔炳郁興廢尚屯疑使我懐悱懊近聞牧守賢經營亟乗屋方舟為予来飛蓋遙肅肅花絮媚晚筵韶景正柔淑浴沂諒同情及玆授春服令徳倡髙祠混珠愧魚目努力崇脩名迂踈自巗谷天心湖阻泊既濟書事掛席下長沙瞬息百餘里舟人共揚眉予獨憂其駚日暮入沅江抵石舟果圯𥙷敝詰朝發衝風遂齟齬瞑泊後江湖蕭條旁􅊻壘月黒波濤驚蛟鼉互睥睨翼午風益厲狼狽收斷汜天心數里間三日但遙指甚雨迅雷電作勢殊未巳𬈑𬈑雲霧中四望渺涯涘篙漿不得施丁夫盡嗟譩淋漓念同胞吾寍忍暴使饘粥且傾槖苦甘吾與爾衆意在必濟糧絶亦均死慿陵向髙浪吾亦詎容止虎怒安可攖志同稍足倚且令並㟁行試渉湖濵沚收舵幸無事風雨亦浸弛逡廵縁沚湄迤邐就風勢新漲翼囬湍倐忽逝如矢夜入武陽江漁村穏堪􅋈糴市謀晚炊且為衆人喜江醪信漓濁聊復盪胸滓濟險在需時徼倖豈常理爾軰勿輕生偶然非可恃去婦嘆五首楚人有間於新娶而去其婦者其婦無所歸去之山間獨居懐綣不忘終無他適予聞其事而悲之為作去婦嘆委身奉箕箒中道成棄捐蒼蠅間白璧君心亦何愆獨嗟貧家女素質難為妍命薄良自喟敢忘君子賢春華不再艶頽魄無重圎新歡莫終恃令儀慎周還依違出門去𣣔行復遅遅鄰嫗盡出别強語含辛悲陋質容有繆放逐理則宜姑老籍相慰缺乏多所資妾行長已矣㑹面當無時妾命如草芥君身比琅玕奈何以妾故廢食懐憤冤無爲傷姑意燕爾且爲歡中厨存宿㫖爲姑備朝飱畜育意千緒倉卒徒悲酸伊邇望門屏盍從新人言夫意巳如此妾還當誰顔去矣勿復道巳去還躊蹰鷄鳴尚聞響大戀猶相随感此摧肝肺淚下不可揮岡囬行漸逺日落群鳥飛群鳥各有托孤妾去何之空谷多凄風樹木何瀟森浣衣澗氷合採苓山雪深離居寄巗穴憂思托鳴琴朝彈别鶴操暮彈孤鴻吟彈苦思彌切㠝岏隔雲岑君聰甚明哲何因聞此音羅舊驛客行日日萬峰頭山水南来亦勝逰市谷鳥啼村雨暗刺桐花暝石溪幽蠻烟喜過青楊瘴郷思愁經芳杜洲身在夜郎家萬里五雲天北是神州沅水驛辰陽南望接沅州碧樹林中古驛樓逺客日憐風土異空山惟見瘴雲浮耶溪有信從誰問楚水無情只自流却幸此身如野鶴人間随地可淹留鐘皷洞見說水南多異迹巗頭時有皷鐘聲空遺石壁千年在未信金砂九轉成逺地星辰瞻北極春山明月坐更深来年夷險還忘却始信羊腸路亦平平溪舘次王文濟韻山城寥落閉黄昏燈火人家隔水村清世獨便吾職易窮途還賴此心存蠻煙瘴霧承相徃翠壁丹厓好共論畎畆投閑終有日小臣何以答君恩清平衛即事積雨山途喜乍晴煖雲浮動水花明故園日與青春逺敝緼凉思白苧輕烟際卉衣窺絶棧時士苗方仇殺峰頭戍角隱孤城華夷節制嚴冠履漫說殊方列省卿興隆衛書壁山城髙下見樓臺野戍参差暮角催貴竹路從峰頂入夜郎人自日邊来鶯花夾道驚春老雉堞連雲向晚開尺素屢題還屢擲衡南那有鴈飛囬七盤鳥道縈紆下七盤古藤蒼木峽聲寒境多竒絶非吾土時可淹留是謫官猶記邊峰傳羽檄近聞苗俗化衣冠投簮實有居夷志垂白難承菽水懽𥘉至龍埸無所止結草菴居之草菴不及肩旅倦體方適開棘自成籬土階漫無級迎風亦瀟踈漏雨易𥙷緝靈瀬嚮朝湍深林凝暮色群獠環聚訊