玄景逝不䖏朱炎化㣲凉相彼谷中葛重隂殞衰黄感此遊客子經年未還鄉伊人不在目絲竹徒滿堂天深鴈書杳夢短關塞長情好矢無斁碩言覬終償惠我金石編徽音激宫商馳輝不可即式爾増予傷馨香襲肝膂聊用中心蔵秋夜樹暝栖翼喧螢飛夜堂静遙穹出晴月低􅉉入峰影窅然坐幽獨怵爾抱深警年徂道無聞心違跡未屏蕭瑟中林秋雲凝松桂冷山泉豈無適離人懐故境安得駕雲鴻髙飛越南景採薪二首朝採山上荆暮採谷巾栗深谷多凄風霜露霑衣濕採薪勿辭辛昨来㫁薪拾晚歸隂壑底抱甕還自汲薪水良獨勞不愧食吾力倚擔青厓際歷斧厓下石持斧起環顧長松百餘尺徘徊不忍揮俯畧澗邊棘同行笑吾餒爾斧安用歷快意豈不能物材各有適可以相天子衆稺詎足識龍岡謾興五首投荒萬里入炎州却喜官卑得自由心在夷居何有陋身雖吏隱未忘憂春山卉服時相問雪寨藍輿毎獨遊擬把犂鋤從許子謾將絃誦止言㳺旅况蕭條寄草堂虚􅉉落日自生凉芳春已共烟花盡孟夏俄驚草木長絶壁千尋凌杳靄深厓六月宿氷霜人間不有宣尼叟誰信申棖未是剛路僻官卑病益閑空林惟聼鳥間關地無醫藥慿書卷身䖏蠻夷亦故山用世謾懐伊尹耻思家獨切老莱斑夢魂兼喜無餘事只在耶溪舜水湾卧龍一去忘消息千古龍岡漫有名草屋何人方管樂桑閒無耳聼咸英江沙漠漠遺雲鳥草木蕭簫動甲兵好共鹿門龎䖏士相期採藥入青冥歸與吾道在滄浪顔氏何曽擊柝忙枉尺已非賢者事斵輪徒有古人方白雲晚憶歸岩洞蒼蘚春應遍石床寄語峰頭雙白鶴野夫終不乆龍埸答毛拙菴見招書院野夫病卧成踈懶書卷長抛舊學荒豈有威儀堪法象實慚文檄過稱揚移居正擬投醫肆虚席仍煩避講堂範我定應無所獲空令多士笑王良老檜老檜斜生古驛傍客来繫馬觧衣裳托根非所還憐汝直幹不撓終異常風雪凛然存節㮣刮摩聊爾見文章何當移植山林下偃蹇從渠拂漢蒼却巫卧病空山無藥石相傳土俗事神巫吾行乆矣将焉禱衆議紛然反見迂積習片言容未觧輿情三月或應孚也知伯有能為厲自笑孫僑非丈夫過天生橋水光如練落長松雲際天橋隱白虹遼鶴不来華表爛僊人一去石橋空徒聞鵲駕横秋夕謾說秦鞭到海東移放長江還濟險可憐虚却萬山中南霽雲祠死矣中丞莫謾疑孤城援絶乆知危賀蘭未㓕空遺恨南八如生定有為風雨長廊嘶鐡馬松杉隂霧捲靈旗英魂千載知何䖏歳歲邊人賽旅祠春晴林下春晴風漸和髙巗殘雪巳無多逰絲冉冉花枝静青璧迢迢白鳥過忽向山中懐舊侣㡬從洞口夢煙蘿客衣塵土終須換好與湖邊長芰荷陸廣暁發𥘉日曈瞳似暁霞雨㾗新霽渡頭沙溪深㡬曲雲蔵峽樹老千年雪作花白鳥去邊囬驛路青崖鈌䖏見人家遍行奇勝才經此江上無勞羡九華雪夜天涯乆客歳侵尋茆屋新𨳩楓樹林漸慣省言因病齒屢經多難觧安心猶憐未繫蒼生望且得閒為白石吟乗興最堪風雪夜小舟何日返山隂元夕二首故園今夕是元宵獨向蠻村坐寂寥賴有遺經堪作伴喜無車馬過相邀春還草閣梅先動月滿虚庭雪未消堂上花燈諸弟集重闈應念一身遙去年今日卧燕臺銅皷中宵隱地雷月傍苑樓燈彩淡風傳閣道馬蹄廻炎荒萬里頻囬首羌笛三更謾自哀尚憶先朝多樂事孝皇曽為兩宫開家僮作𥿄燈寥落荒村燈事賒蠻奴試巧剪春紗花枝綽約含輕霧月色玲瓏映綺霞取辦不徒酬令節賞心兼是惜年華何如京國王侯第一盞中人産十家白雲堂白雲僧舍市橋東别院廻廊小徑通歳古􅉉松存獨幹春還庭竹發新叢晴牕暗映群峰雪清梵長飄髙閣風遷客從来甘寂寞青鞋時過月明中来僊洞古洞春寒客到稀緑苔荒徑草霏霏書懸絶壁留僧偈花發層蘿繡佛衣壺榼逺從童冠集杖藜随䖏宦情㣲石門遙鎻陽明鶴應笑山人乆不歸木閣道中雪痩馬支離縁絶壁連峰窅窕入層雲山村樹暝驚鴉陣澗道雪深逢鹿群凍合衡茅炊火㫁望迷孤戍暮笳聞正思講席諸賢在綘蠟清醅坐夜分元夕雪用蘇韻二首林間暮雪定歸鴉山外鈴聲報使車玉盞春光傳栢葉夜堂銀燭亂􅉉花蕭條音信愁邊鴈迢遞關河夢裏家何日扁舟還舊隱一簑江上把魚义寒威入夜益㢘纎酒甕爐床亦戒嚴乆客漸憐衣有結蠻居長嘆食無鹽飢豺正爾群當路凍雀從渠自宿簷隂極陽囬如不逺蘭芽行見發春尖暁霽用前韻書懐二首雙闕鐘聲起萬鴉禁城月色滿朝車竟誰詩詠東曹檜正憶梅開西寺花此日天涯傷逐客何年江上却還家曾無一字堪驅使謾有虚名擬八义澗草巗花𣣔闘纎溪風林雪故争嚴連岐盡說還宜麥煑海何曽見作鹽路斷蹔憐無過客病餘兼喜曝晴􅉉謫居亦自多清絶門外群峰玉笋尖次韻陸僉憲元日喜晴城裏夕陽城外雪相將十里異隂晴也知造物曽何意底是人心苦未平栢府樓臺啣倒影茆茨松竹瀉寒聲布衾莫謾愁僵卧積素還多逹曙明元夕木閣山火荒村燈夕偶逢晴野焼峰頭䖏䖏明内苑但知鰲作嶺九門空說火為城天應為我開奇觀地有玆山不世情却恐炎威𬒳松栢休敎玉石遂同頳夜宿汪氏園小閣蔵身一斗方夜深虚白自生光梁間来下徐生榻座上慚無荀令香驛樹雨聲翻屋瓦龍池月色浸書床他年貴竹傳遺事應說陽明舊草堂春行冬盡西歸滿山雪春𥘉復来花滿山白鷗亂浴清溪上黄鳥雙飛綠樹間物色變遷随轉眼人生豈得長朱顔好將吾道從吾黨歸把漁竿東海灣村南花事紛紛春𣣔酣杖藜随歩過村南田翁開野敎新犢溪女分流浴種𧖟稺犬吠人依宻槿閑鳬照影立晴潭偶逢江客傳鄉信歸卧楓堂夢石龕山途二首上山見日下山隂隂欲開時日欲沉晚景無多傷逺道朝陽莫更沮雲岑人歸暝市分漁火客舍空林依暮禽世事驗来還自頷古人先已得吾心南北驅馳任板輿謫鄉何地是安居家家細雨殘燈後䖏䖏荒原野焼餘江樹𣣔迷逰子望朔雲長斷故人書茂陵多病終蕭散何事相如賦子虚白雲白雲冉冉出晴峰客路無心䖏䖏逢已逐肩輿度青壁還随孤鶴下蒼松此身愧爾長多繫他日從龍謾托踪㫁鶩殘鴉飛欲盡故山囬首意重重答劉羙之見寄次韻休疑遷客迹全貧猶有沙鷗日見親勲業巳辭滄海夢煙花多負故園春百年長恐終無𥙷萬里寍期尚得身念我不勞傷鬂雪知君亦𣣔拂衣塵寄徐掌敎徐稺今安在空梁榻乆懸北門傾蓋日東魯校文年歳月成超忽風雲易變遷新詩勞寄我不愧鳥鳴篇書庭蕉􅉉前蕉葉緑成林長夏全無暑氣侵但得雨聲連夜静不妨月色半床隂新詩舊葉題將滿老芰踈梧根共深莫笑鄭人談訟鹿至今醒夢兩難尋送張憲長左遷滇南大參次韻世味知公最飽諳百年清徳亦何慚栢臺藩省官非左江漢滇池道益南絶域煙花憐我逺今宵風月好誰談交逰若問居夷事為說山泉頗自堪南菴次韻二首隔水樵漁亦㡬家縁岡石路入溪斜松林晚映千峰雨楓葉秋連萬樹霞漸覺形骸逃物外未妨逰樂在天涯頻来不用勞僧榻巳僣汀鷗一席沙斜日江波動客衣水南深竹見巗扉漁人收網舟𥘉集野老忘機坐未歸漸覺雲間栖翼亂愁㸔天北暮雲飛年年歳晚長為客閒殺西湖舊釣磯觀傀儡次韻䖏䖏相逢是戲埸何須傀儡夜登堂繁華過眼三更促名利牽人一線長穉子自應争詫說矮人亦復浪悲傷本来面目還誰識且向樽前學楚狂徐都憲同遊南菴次韻巗寺蔵春長不夏江花映日艶於桃山隂入户川光暮林影浮空暑氣髙樹老豈能知歳月溪清真可鑑秋毫但逢佳景須行樂莫遣風霜着鬢毛即席次王文濟少參韻二首揺落休敎感客途南来秋興未全孤肝腸已自成金石齒髪從渠變栁蒲傾倒酒懐金谷罰逼真詞格輞川圗謫鄉莫道貧消骨猶有新詩了舊逋此身未擬泣窮途随䖏翻飛野鶴孤霜冷㡬枝存晚菊溪春兩度見新蒲荆西冦盗紆籌䇿湘北流移入畫圗莫怪當筵倍凄切誅求滿地促官逋贈劉侍御二首蹇以反身困以遂志今日患難正閣下受用䖏也知之則䖏此當自别病筆不能多及然其餘亦無足言者聊次韻某頓首劉侍御大人契長相送溪橋未隔年相逢又過小春天憂時敢負君臣義念别羞為兒女憐道自升沉寍有定心存氣節不無偏知君巳得虚舟意随䖏風波只晏然夜寒􅉉際重隂覆夜寒石爐松火坐更殘窮荒正訝鄉書絶險路仍愁歸夢難僊侶春風懐越嶠釣船明月負嚴灘未因謫宦傷憔悴客鬂逺羞鏡裏㸔冬至客牀無寐聼潜雷珎重𥘉陽夜半囬天地未嘗生意息氷霜不耐鬢毛催春添衮線誰能𥙷歳晚心丹自動灰料得重闈強健在早㸔消息報牎梅春日花間偶集示門生閒来聊與二三子單夾𥘉成行暮春改課講題非我事研㡬悟道是何人階前細草雨還碧􅉉下小桃晴更新坐起咏歌俱實學毫釐須遣認敎真次韻送陸文順僉憲貴陽東望楚山平無奈天涯又送行杯酒豫期傾蓋日封書煩慰倚門情心馳魏闕星辰逈路遶郷山草木榮京國交游零落盡空將秋月寄猿聲次韻陸僉憲病起見寄一賦歸来不碩餘文園多病滯相如籬邊竹笋青應滿洞口桃花紅自舒荷蕢有心還擊磬周公無夢欲刪書雲間憲伯能相慰尺素長題問謫居次韻胡少參見過旋營小酌典春裘佳客真慚竟日留長怪嶺雲迷楚望忽聞呉語破鄉愁鏡湖自昔堪歸老杞國何人獨抱憂莫訝臨花倍惆悵賞心原不在枝頭雪中桃次韻雪裏桃花強自春蕭踈終覺損精神却慚幽竹節逾勁始信寒梅骨自真遭際本非甘冷淡飄零須信委風塵從来此事還希濶莫恠臨軒賞更新舟中除夕二首扁舟除夕尚窮途荆楚還憐俗未殊䖏䖏送神懸楮馬家家迎歳換桃符江醪信薄聊相慰世路多岐謾自吁白髮頻年傷逺别綵衣何日是庭趨逺客天涯又歲除孤航随䖏亦吾廬也知世上風波滿還戀山中木石居事業無心從齒髮親交多難絶音書江湖未就新春計夜半樵歌忽起予淑浦山夜泊淑浦山邊泊雲間見驛樓灘聲廻逺樹崖影落中流柳放新年綠人歸隔歲舟客途時極目天北暮隂愁遇江門崖三年謫宦沮蠻氛天放扁舟下楚雲歸信應先春鴈到閒心期與白鷗群晴溪𣣔轉新年色蒼壁多遺古篆文此地從来山水勝它時囬首憶江門辰州虎溪龍興寺聞楊名父將到留韻壁間杖藜一過虎溪頭何䖏僧房是惠休雲起峰頭沉閣影林踈地底見江流煙花日煖猶含雨鷗鷺春閒欲滿洲好景同来不同賞詩篇還為故人留武陵潮音閣懐元明髙閣慿虚臺十尋捲簾踈雨動㣲吟江天雲鳥自来去楚澤風煙無古今山色漸疑衡嶽近花源欲問武陵深新春尚沮東歸楫落日誰堪話此心閣中坐雨臺下春雲及寺門懶夫睡起正開軒烟蕪漲野平堤緑江雨随風入夜喧道意蕭踈慚歳月歸心迢逓憶鄉園年来身迹如漂梗自笑迂痴𣣔手援霽夜雨霽僧堂鐘磬清春溪月色特分明沙邊宿鷺寒無影洞口流雲夜有聲静後始知群動妄閑来還覺道心驚問津乆已慚沮溺歸向東臯學耦耕僧齋盡日僧齋不厭閒獨餘春睡得相關􅉉前水漲遂無地江外雲晴忽有山逺客趂墟招渡急舟人曬網得魚還也知世事終無𥙷亦復心存出䖏間徳山寺次壁間韻乗興㸔山薄暮来山僧迎客寺門開雨昏碧草春申暮雲捲青峰善卷臺性愛煙霞終是僻詩留名姓不須猜岩根老衲成灰色枯坐何年觧結胎沅江晚泊二首去時煙雨沅江暮此日沅江暮雨歸水漫逺沙村市改泊依舊店主人非草深𪠘宇無官住花落僧房自鳥啼䖏䖏春光蕭索甚正思荆棘掩巗扉春来客思獨蕭騷䖏䖏東田沒野蒿雷雨滿江喧日夜扁舟經月住風濤流民失業乗時横原獸争群薄暮號却憶鹿門栖隱地杖藜壺榼餉東臯夜泊江思湖憶元明扁舟泊近漁家晚茅屋深環栁港清雷雨驟開江霧散星河不動暮川平夢囬客枕人千里月上春堤夜四更𣣔寄愁心無過鴈披衣坐聼野鷄鳴睡起寫懐江日熈熈春睡醒江雲飛盡楚山青閑觀物態皆生意静悟天機入窅冥道在險夷随地樂心忘魚鳥自流形未須更覔羲唐事一曲滄浪擊壌聼三山晚眺南望長沙杳靄中鵞羊只在暮雲東天髙雙櫓哀明月江濶千㠶舞逆風花暗漸驚春事晚水流應與客愁窮北飛亦有衡陽鴈上苑封書未易通鵞羊山福地相傳楚水阿三年春色兩經過羊亡但有𥘉平石書罷誰籠道士鵞禮斗壇空松影静歩虚臺逈月明多巗房一宿猶縁薄遥憶開雲住薜蘿泗洲寺渌水西頭泗洲寺經遇轉眼又三年老僧熟認直呼姓笑我清癯只似前毎有客来㸔宿䖏詩留佛壁作燈傳開軒掃榻還相慰慚愧維摩世外緣再經武雲觀書林玉璣道士壁碧山道士曽相約歸路還来宿武雲月滿僊臺依鶴侶書留蒼壁㸔鵞群春巗多雨林芳淡暗水穿花石溜分奔走連年家尚逺空餘魂夢到柴門再過濂溪祠用前韻曽向圗書識面真半生長自愧儒巾斯文乆已無先覺聖世今應有逸民一自支離乖學術競將雕刻費精神瞻依多少髙山意水漫蓮池長綠蘋王文成公全書卷之十九終王文成公全書卷之三十一續編六征藩公移上凡二十九條行吉安府収囤兊糧牌正徳十四年六月二十日據贛縣興國永新等縣縣丞等官李富雷鳴嶽等呈稱各䝉差押糧里裝運正徳十三年兊淮米到於吉安水次聽候交兊經今數月未見糧船囬還况今省城變亂被将各處兊米盡行搬用恐被奸人乘機越來搬搶等因到院爲照所呈係干兊淮錢糧合行處置爲此抄案仰囬府即便處置空閒倉厫或寛敞寺觀去處令各糧里暫將運來兊淮糧米収囤候官軍囬日聽其交兊毋得遲悮致有他虞仍行管糧官知會行吉安府禁止鎭守貢獻牌六月二十日據吉安府守禦千戸所旗甲馬思禀稱䝉所批差領解鎭守江西太監王發買葛布銀三封及本所出備葛布折銀幷貢禮銀共三千兩前赴本鎭今因途阻不敢前去等情叅照該所掌印官旣該鎭守衙門發銀買布若勢不容巳只合照價兩平収買爲當乃敢不動原封分外備辦禮銀饋送若非設計巧取必是科尅旗軍事屬違法本當叅拏䆒問但今江而變亂姑行從輕查理爲此牌仰吉安府即查前項布價幷貢獻禮銀務見的確如稱各軍名下糧銀就仰會同該所唱名給散取領備照若是各官自行出備合仰収入官庫聽候軍餉支用毋得縱容侵収入已及查報不實未便行福建布政司調兵勤王及照福建浙江係江西鄰省今寧府逆謀旣著彼若北趨不遂必將還取閩浙若不先行發兵乘間擣虚將來之噬臍何及除行湖廣廣東及行漳南道即將見在上杭敎塲操練兵快幷取漳州銃手李棟等責委謀勇官員統領直抵本院住劄吉安府隨兵進勦外仰抄案囬司會行都按二司轉行各道幷行鎭廵等衙門各一體查照知會選調兵馬選委忠勇膽略堂上官督領各項交界地方加謹防截相機夾勦仍知會浙江都布按三司一體遵照施行俱毋違錯預行南京各衙門勤王咨爲照前事係天下非常之變宗社安危之機雖今備行江西吉安等府及湖廣福建廣東等處調集軍兵合勢征勦外但彼聲言欲遂順流東下竊據南都看得長江天險南北之限留都根本咽喉所關雖以朝廷威徳人心効順逆謀斷無有成但其譎奸隂圖已非一日兼聞潜伏奸細扵京城期爲内應萬一預備無素爲彼所掩震驚逺邇噬臍何及爲此合咨貴部煩爲通行在京及大小衙門㑹謀集議作急繕完城守簡練舟師設伏沿江以防不虞之襲傳檄傍郡以張必討之威先發操江之兵聲義而西約㑹湖湘互爲掎角本職亦砥鈍䇿駑牽躡其後以義取暴以直加曲不過兩月之間斷然一鼓可縳惟髙明速圖之撫安百姓告示六月二十二日示仰逺近城郭鄉村軍民人等近日倡亂之徒上逆天道下失人心本院駐軍扵此已有定計勤王之師四面巳集仰各安居樂業毋得驚疑敢有擅自搬移因而扇惑擾攘者地方里甲人等綁赴軍門治以軍法其有忠義豪傑能獻計効力碩從義師擊反叛者俱赴軍門投見差官調發梅花等峒義兵牌六月二十七日近因省城遭變戕害守臣正人心思奮忠義効用之時訪得永新縣梅花峒及龍田上鄉樟梘關北諸處人民精悍見義䏻勇擬合起調爲此今差千戸髙􅐶齎牌前去該縣着落知縣柯相即便起集梅花峒等鄉精勇民兵大約一千名各備便用堅利器械選差該鄉義官良民部領就委該縣謀勇膽畧官一員總領其合用行糧或募役之費就扵本縣在官錢糧查支不分雨夜兼程前進軍門聽候調遣此係緊急事理毋比尋常賊情敢有故違定以軍法從事行吉安府踏勘災傷七月初五日照得本院駐兵吉安節㩀廬陵等縣人民告稱自五月以来天時亢旱田禾枯死衣食無所仰給稅糧難以措辦近䝉僉點民兵保守把截農業旣妨天時不利人心皇皇莫知所依等因到院叅照邇者省城反叛煽動軍民各屬調發官軍僉點民壯保障城池把絶要隘團結保甲隨同征進人皆爲兵不暇耕種况兼三月不雨四郊赤地民之危急莫甚扵此本院除具題外爲此仰抄案回府着落掌印正官即便親臨踏看災傷輕重分數覆查相同取具鄉都里老及官吏不致扶同重甘結狀申報本院火速徑自差人具奏本年各項錢糧暫且停徴候命下之日另行區處毋得遷延坐視重貽民患取䆒不便行吉安府知㑹紀功御史牌七月初八日照得江西寧府㩀城謀叛云云仰抄案囬府即便備行廵按兩廣監察謝御史伍御史查照知會凡軍中一應事宜悉要本官賛理區畫以匡本院之不逮各哨官兵俱聽監督獲有功次俱慿本院送發本官驗實紀錄官兵人等但有騷擾所過地方及軍前逗遛觀望畏避退縮者就行照依本院欽奉勑諭事理治以軍法抄案官吏具行過日期同依准申繳行知縣劉守緒等襲勦墳厰牌七月十三日爲照本院親督諸軍刻期扵夲月二十日進攻南昌府省城以破逆黨巢穴探得逆黨先曾伏兵三千扵老墳厰新墳厰諸處以爲省城應援若不先行密爲撲勦誠恐攻城之日或從間道掩襲我師未免亦爲牽制爲此牌仰奉新縣知縣劉守緒靖安縣知縣萬士賢各統精兵三千密扵而山地界約會刻期分哨設伏運竒並力夾勦各官務要詳察險易相度機宜不得爾先我後力散勢分致有踈失仍一面差人瓜探聲息飛報軍門擒斬功次審驗解院轉發紀録照例具奏陞賞兵快人等敢有臨陣退縮者許照本院欽奉勑諭事理就以軍法從事各官務竭忠貞以勤國難茍或觀望逗遛違誤事機軍令具存罪亦難逭督責知府伍文定等同心勦賊牌七月二十五日切照天下之事成扵同而敗扵異本院選調吉安贛州臨江袁州等府衛所軍民兵快委各該文武等官知府伍文定邢珣等統領分立哨分授以方畧令其併力進勦互相䇿應今訪得各官各持己見自爲異同累有事機可乘坐視輒致違錯本當拏究治以軍法但以用人之際姑且容恕及照逆賊歸援聲息巳逼慮恐各官仍蹈覆轍臨期或致僨事擬合申飭通行爲此牌仰本官即便督率原領軍兵在扵見駐劄處所務要遵依方畧與各哨領兵官同心而行誓竭并力進死之志毋爲觀望苟生之謀敢有仍前人懐一心互有異同以致悮事定行罪坐所由斷依軍法斬首的不食言先具不致異同重甘結狀并不違依准隨牌繳來行南昌府清查占奪民產八月十六日照得寧王自正徳二年以來圖爲不軌誅求財貨強占田土池塘屋基立表所至敢怒而不敢言稅糧在戸而租利盡入王府家眷在室而房屋巳屬他人流移困苦無所赴愬見今天厭其虐自速㓕亡一應侵占等項合行改正以甦民困爲此案仰南昌府即便淸查寧王并内官校尉倚勢強占不問省城内外查係黃冊軍民該載稅糧明白即與清復管業収租住坐不許鄰佑佃民仍前倚勢争奪其曾經奏請如陽春書院等處雖有侵占難以擅動俟另行處治外仍行官吏務要盡心淸查以副委用毋得偏私執抝致生弊端通毋違錯批江西按察司優恤孫許死事八月十五日㨿按察司呈副使許逵家眷日食乆缺幷孫都御史未曾殯殮等情叅看得各官𬒳賊殺害委可矜憐合扵本司庫内各支銀三十兩以禮殯殮候装回日盤費水手另行呈奪許副使家眷缺食亦聽支銀五十兩給付應用取具各該領状拜殯殮過由同批呈繳行南昌府禮送孫公歸櫬牌八月二十九日照得江西廵撫都御史孫燧𬒳寧賊殺害續該本院統兵攻復省城當給銀兩買棺裝殮間隨據伊男孫慶帶領家人前來扶柩還鄉所據護送人員擬合行委爲此牌仰府官吏即扵見在府衛官内定委一員送至原籍浙江紹興府餘姚縣河下交割幷行沿途經過軍衛有司驛逓廵司等衙門各撥人夫程程護送仍仰照例從厚僉撥長行水手起關應付人夫脚力驗口給與行糧毋得稽遲未便討叛勑旨通行各屬九月𥘉二日節該欽奉聖㫖勑近該南京内外守備叅賛等官太監黃偉等先後奏報江西寧王殺害廵撫等官燒燬府縣肆行反逆等項事情已下兵部會官議處停當朕當親率六師奉天征討先差安邉伯朱泰爲前哨統領各邉官軍前去南京相機勦殺太監張忠左都督朱暉統領各邊官軍前去江西擣其巢穴又命南和伯方夀祥及南直隷江西湖廣各該鎭廵等官各照擬定要路住劄把截今特命爾照依該部會奏事理㑹同鎭守太監王宏選調堪用官軍民快親自督領在扵所屬緊要地方分布防禦仍委浙江布政司左布政閔楷選募處州民快定擬住劄地方聽候調用軍中事務俱要互相傳報彼此通知一遇有警勿誤䇿應或就㑹合各路人馬設法勦捕仍出給榜文告示遍發江西及各該地方張掛曉諭但有能聚集義兵擒殺反逆賊犯者量其功績大小封拜侯伯及陞授都指揮指揮千百戸等官世襲賊夥内有能自相擒斬首官者與免本罪仍量加恩典不許乘機挾讐妄殺平人一應軍中事宜勑内該載未盡者俱聽爾隨宜區處爾爲風憲大臣受兹重託宜罄竭忠誠掃除叛賊尤要詳審愼重計出萬全務俾地方寧靖軍民安堵以紓朕南顧之憂庻稱委任欽此欽遵擬合就行爲此仰都布按三司照依案驗備奉勑内事理通行所屬一體欽遵施行咨南京兵部議處獻俘船隻九月𥘉二日照得屬者寧王宸濠殺害守臣舉兵謀逆云云擬扵九月十一日親自督解赴闕但應解人犯幷護解官兵數多本地驛逓殘破紅站座船俱被虜毁無存議顧民船自浙取道而北須煩兵部扵南京濟州江淮二衛馬快船内各撥十隻中途接載庻克有濟爲此移咨特差千戸林節主簿于旺前去煩請選撥馬快船二十隻點齊撑駕人役差委的常官員與差去官預先押至鎭江河下候本職到彼替換装載而行實爲兩便諒寧藩之叛逆固天下臣民之所共憤則今日之獻俘扵京以彰天討必亦忠臣義士之所共欲當不吝扵煩勞也仍希先示之行江西三司清查被刼府庫起運錢糧九月初四日照得本年六月十四日寧王謀反盡將江西都布按三司及附郭南昌等府縣庫盤檢去訖中間多係各府州縣解到起運等項錢糧未經轉解若不嚴加查考恐滋侵欺爲此仰抄案囬司即便弔取原行卷簿到官責令該庫官攅幷經手人役從公清查要見某項原収某府州縣解到某色起運錢糧若干某項原係貯庫𥿄米贓罰金銀器物等件各若干寧王盤檢若干中間有無官吏庫役人等乗機侵騙情弊即今見在若干務要通行查明備造印信手本火速繳報以慿查考施行仍行南昌等府州縣一體遵照將起解赴庫錢糧查報俱毋違錯行江西布按二司㸔守寧府庫藏九月十一日照得寧府庫藏已經本院督同戴罪三司官員幷各府知府公同封識完固合就委官監督看守爲此仰抄案回司即行該司掌印官督同南昌府同知何繼周及南新二縣掌印官定委老成曉事官二員分領僉定大户人等毎夜上宿看守東西二庫仍令兵快把守寧府南東西三門晝夜廵邏不許移動一草一甎二司掌印幷該道分廵官不時廵視閘點毋得視常虚應故事倘致踈失責有所歸委按察使伍文定紀驗殘孽九月二十日照得節該欽奉勅諭但有生擒盗賊鞫審明白亦聽就行斬首示衆賊級行令各該兵備守廵官即時紀驗明白備行江西按察司造冊奏繳查照事例陞賞激勸欽此欽遵爲照寧王謀反隨夲院調兵巳將寧王俘執謀黨李士實劉養正王春等幷賊首凌十一閔念四等亦就擒獲即今見該本院不日親自督解赴闕式昭聖武及紀功御史謝源伍希儒亦各赴京復命所有各哨官兵尚在搜勦殘孽惟恐解報前來不無缺官紀錄爲此仰抄案囬司即行新任按察使伍文定如遇各哨官兵解到叛賊拜贓仗等項務要從實審驗應處决者照依本院勑諭事理就行斬首賊級梟掛明白紀錄備造印鈐文冊差人徑自奏繳仍造淸冊一本繳報本院查考毋得違錯不便委知府伍文定邢珣防守省城牌九月十二日照得江西大亂勦平地方幸巳稍靖但廵撫官員被殺廵按及三司府州縣衛所等官俱各戴罪聽叅本院即今又督官兵押解寧王幷其黨與赴京省城居民久遭荼苦瘡痍未起驚疑未息雖經撫諭誠恐本院去後或有意外之虞擬合委官留兵防守爲此牌仰領兵知府伍文定邢珣等即便照依後開班次輪流各行量帶官兵晝夜固守城池保障地方撫安居民禁革騷擾候撫按官員及三司等官到任事定之日方許囬還照舊管事毋得違錯計開一班知府伍文定邢珣二班徐璉戴徳孺三班曾璵四班周朝佐林城行江西布按二司釐革撫綏條件九月十二日照得江西未亂之前民僞頗滋吏政多弊撫治之責巳號煩難况大亂之後錢糧有侵尅之費軍伍有缺乏之虞奸惡僞興災旱荐作法度申明之未至官吏怠玩之或生本院討賊平亂功雖告成釐革撫綏力尚未徧若不條析處分深爲未便爲此仰抄案囬司照依案驗内事理逐一遵照施行務使事各舉行民沾實惠毋得虚應故事取罪不便計開一省城大亂固已勦平地方守備難便廢弛除南新二縣機兵令分廵該道分撥守門外仰布按二司掌印官會同於所屬鄰近府州酌量原編機兵多寡量取輳二千名各委相應人員帶領來省操練以備不虞仍行南昌道分廵官較視點閘其各兵口糧就令各該縣分動支預備倉米榖計日分給候事完之日停止一十四年起運兊淮間有被賊虜掠其未兊及未到水次幷偏僻去處未經賊掠者尚多誠恐官吏糧里人等乘機隱匿揑故侵欺合先行查仰布按二司掌卬官即行各該府州縣將巳兊糧數通查要見見在若干果被賊虜若干取具重甘結状造冊􅌳報以慿議處其見在糧米就扵所在地方暫且囤貯看守如有未兊揑作巳兊不曾𬒳賊揑作賊刼者照例問發充軍官吏坐擬贓罪不恕一南昌九江南康三府被賊殘害尤宜矜恤仰布按二司掌卬官作急查勘呈來以憑議處一南昌左衛旗軍多因從逆擒斬以致缺伍仰布按二司官即便出給告示許令在逃旗軍幷餘丁投首照依榜例免其罪名着令頂補軍役暫委官員管領以備操守一建昌安義二縣賊首雖巳擒獲遺漏餘黨尚多今旣奉有牓例合與更新仰布按二司轉行該縣出給告示許各自新痛改前惡即爲良民有司照常撫恤團保糧里不得挾私䧟害如有不悛仍舊爲非者擒捕施行一寧王庄田基屋湖地幷寧府官員人役及投入用事從逆等項人犯田產例應籍沒合先查理除將内官黃瑞基屋改作東湖書院以便學者講習外其餘仰布按二司掌印官會同南昌道分廵官行委的當官員逐一淸查如田庄要見坐落地名何處田畞若干山塲樹木若干湖地廣濶若干房屋㡬間今年見在花利即便収貯所在地方責人看守通造手冊繳報其有原係占奪民間物業相應給還及估價發賣仍佃者俱候查明之日從容呈議審處敢有隱匿及指以原業揑稱借貸輒行據占者先行拏問不恕一省城各衙門幷公廨有殘圯應合脩理者仰布按二司掌印官會同該道官叅酌緩急行令府縣移拆無用房屋量加修理毋得虚費財物一省城湖地仰布按二司行南昌府縣其城濠行都司各委人看守魚利公同變収入官以備公用不許私取及致人偷盗一今年鄊試因亂廢格除應否𥙷試另行議奏外其未亂之前巳經舉行未畢事件合先查䆒仰布政司將原發修理貢院席舍幷發買物料等項銀兩若干委何人管即今巳修完幷巳買到物料若干見存銀兩若干查明造報毋得因循致令吏胥乘機隱匿作弊其巳買物料有不堪貯者姑令變價還官以俟再買以後未舉事件有應合預處者㑹同按察司幷該道官一面議處施行按察司仍行提學官轉行所屬知悉行江西按察司知會逆黨宫眷姓名仰抄案囬司着落當該官吏即便查照施行仍呈欽差提督軍務御馬監太監張欽差提督軍務充總兵官安邉伯朱知會俱毋違錯計開寧王郡王將軍也子共十六名見在十四名宸濠拱栟覲鋌拱樤宸洧宸瀛覲􆇬宸汲宸湯宸渢宸滻宸瀾大世子一哥已故二名拱槭二世子二哥謀黨重犯六十七名見在五十九名劉吉凃欽樂平黃瑞傅明陳賢尹秀梁偉沈鏊熊綬周瑞呉松張暠李蕃于全秦榮蕭竒徐輅賀俊李琳丁璝王儲甘桂王琪楊昇張隆劉勲葛江楊允徐銳丁綱夏振唐玉何受朱煜馮旻周勇周鼎於琦張鳯袁貴聞鳯顧正顧雄徐紀倪六王鳯唐全閔念八李世英徐淦鳯張宣閔念四凌十一萬賢一朱會价萬賢二熊十四熊十七巳故八名萬銳陸程劉養正余祥甘楷王信盧鋪劉子逹宫眷四十三口趙氏萬氏鍾氏徐氏宣氏張氏張氏陸氏蔣氏陸氏趙氏王氏王氏李氏朱氏鄭氏陳氏徐氏劉氏何氏張氏祥瑞王氏錦英王氏徐氏周氏周氏桂祥陳氏春受劉氏顧氏陳氏婆氏王氏艾兒碧雲劉氏串香異蘭愛蓮彭氏小火者二口樂秋樂萱馬八匹金冊十二副計二十四葉行江西按察司編審九姓漁戸牌九月二十四日爲照賊首呉十三凌十一閔念四念八等俱巳擒獲黨類亦多誅勦雖有脅從之徒皆非得巳節該本院備奉欽降黃榜通行給發暁諭許其自首改過自新安揷訖數内楊子橋等九姓漁戸又該知縣王軾引赴軍門投首審各執稱𬒳脅情有可矜當該本院量行責治仍發本官帶囬安撫外今訪得前項漁户尚有隱匿未報及巳報在官而乘勢爲非者况查沿江湖港等處亦有漁戸以打魚爲由因而刼殺人財雖嘗緝捕禁約而官吏因循禁防廢弛合就通行查處爲此仰抄案囬司即便選委能幹官員㑹同安義等縣掌印捕盗等官拘集楊子橋等九姓漁戸到官從公查審要見戸計若干丁計若干已報在官若干未報在官若干各駕大小漁船若干原在某處地方打魚生理著定年貌籍貫編成牌甲毋十名爲一牌内僉衆所畏服一名爲小甲地方多寡毎五牌或六牌爲一甲内僉衆所信服一名爲總甲責令不時管束戒諭仍扵原駕船梢粉飾方尺官爲開寫姓名年甲籍貫住址及註定打魚所在用鐡打字號火烙卬記開造印信手冊在官毎月朔望各具不致爲非結状親自赴縣投逓用慿稽考點閘中間如有隱匿不報者俱許投首免罪亦就照前行若有已報在官仍前乘機爲非抗頑不行到官就仰從長計議應撫應捕遵照本院欽奉勑諭隨宜處置事理徑自施行今後但有上戸官民客商人等被害就扵夲處追䆒務在得獲明正典刑仍即通行南昌等一十三府及各州縣一體查處編立牌甲嚴加禁約施行造冊繳報查考如或故違定將首領官吏拏問決不輕貸獻俘揭帖九月二十六日准欽差提督􅐌畫機宻軍務御用監太監張揭帖開稱今照聖駕親率六師奉天征討巳臨山東南直隷境界所據前項人犯宜合比常加謹防守調攝待候駕臨江西省下之日查勘起謀根由明白應否起解斬首梟掛等項就彼處分定奪若不再行移文知會誠恐地方官員不知事理不行奏請明㫖那移他處或擅自起解致使臨難對證有悮事機難以悔罪等因准此卷查先爲飛報地方謀反重情事云云本職巳將寧王幷逆黨親自量帶官兵徑從水路照依原擬日期啓行解赴京師巳至廣信地方外今又准前因及該差官留本職幷寧王及各黨類囬省爲照前項人犯先監按察司責委官員人等晝夜嚴加關防有病隨即撥醫調治數内謀黨李士實王春劉養正等已多醫治不痊俱各身故隨差官吏仵作人等前去相驗責付淺殯撥人㸔守其寧王及謀黨劉吉等俱係惡熖久張之人設若淹禁不行解報縦有官兵加謹防守恐或扇誘别生他奸今若留回省城中途踈虞尤爲可慮兼且人犯多生瘧痢沿途亦即撥醫調治又有數内鎭國將軍拱槭幷世子二哥各行身故又經差官相明買棺装殮責仰貴溪縣撥人㸔守其餘尚未痊可若更往返跋渉未免各犯性命愈加狼狽相繼死亡終無解京人犯抑恐驚摇逺近變起不測本職親解寧王先巳奏聞朝廷定有起程日期豈敢久滯因循不即解獻違慢踈虞罪將焉逭及照庫藏冊籍等項未准揭帖之先巳㑹多官封貯在府待命定奪况新任按察使伍文定及戴罪三司官領兵知府等官俱各見在封識明白别無可疑除將寧王宸濠等各另差官分押宫眷婦女行各將軍府取有内使管伴俱照舊親自解京外所有庫藏等項奉有明㫖自應查盤起解就請公同三司幷各府等官眼同徑自區處爲此合用揭帖前去煩請查照施行行袁州等府查處軍中備用錢糧牌十月初六日據吉安府申奉本院鈞牌查得本府在庫止有贓罰𥿄米銀一萬五千四百三十一兩零其各縣寄庫銀四萬六千一百五十九兩零俱係轉解之數似難支動見今動調各處軍快人等數多誠恐支用不敷及查廬陵等九縣貯庫錢糧亦多稱乏合行鄰近府分幇助支用縁由到院爲照江西寧府變亂雖經本院起調廣東福建二省漢土狼逹官軍江西南贛等處兵快計有二十餘萬合用糧餉大約且計三四月之費今該府所申堪支𥿄米等銀止有一萬五千四百有零其餘俱係解京之數就便從權支用亦有未敷必湏扵各府縣見貯錢糧數内查支接濟庻不誤事擬合通行爲此牌仰本府即將收貯在庫不拘何項錢糧作急通行查出三分爲率内將二分稱封明白就委相應官員不分雨夜領解軍門以慿接支應用此係征討叛逆軍機重務毋得稽遲時刻定以軍法論處決不輕貸行江西布按二司淸查軍前取用錢糧案照先因寧王變亂該本部備行南贛等府起調各項軍兵追勦合用糧餉等項就仰聽將在官錢糧支給間隨據吉安府申稱動調兵快數萬本府錢糧數少乞爲急處等情已經通行各府速將見貯不拘何項錢糧以三分爲率内將二分解赴軍前接濟外續看前項事情係國家大難存亡所關誠恐兵力不敷又牌行各該官司即選父子鄉兵在官操練聴將官錢支作口糧候本院另有明文一至啓行去後今照前項首惡幷其謀黨俱巳擒斬原調各處軍兵久巳散歸所據用過糧餉等項合行查造爲此仰抄案囬司即查各府州縣自用兵日起至掣兵日止要見某項錢糧差何人役解赴軍前應用若干有無獲奉批廽在卷又將某項錢糧差何人役解赴某官處支給官兵口糧等項若干自某月日期起至某月日止各支若干或係那借惟復措置之數務要淸查明白類造文冊星馳差人送院查考中間如有官吏人等通同作弊重支冐領或以少作多侵欺揑報者就便拏問照例發遣毋得違錯防制省城奸惡牌十二月十一日照得江西省城近遭寧王之變廵邏無官非但軍門凋弊禁防疎濶兼又軍馬充斥街巷難辨眞偽有等無藉小民因而售奸爲惡恐致日久釀成大患必湏預防早戒庶使地方有頼查得江西都司都指揮馬驥素有幹材軍民畏服合就行委爲此牌仰抄案囬司即行本官不妨原任嚴督府衛所縣軍民兵快幷地方總小甲人等扵省城内外晝夜廵邏固守城池保障地方潔静街道禁緝喧争但有盗賊即便設法擒捕務在得獲解官問招呈詳不許妄拏平人攀誣無干良善及縦令積年刁徒嚇詐財物擾害無辜仍要嚴加省諭逺近鄉村居民各安生理毋得非爲及容隱面生可疑之人在家通誘賊情坐地分贓敢有故違仰即拏赴軍門治以軍法承委官員務在地方爲事用心管要以稱委用不得因循怠忽取䆒未便行江西按察司查禁因公科索民財十二月十一日照得聖駕南征所有供應軍馬糧草幷合用器皿等項巳該江西布按二司分派各府州縣支給在庫官錢均派經過府縣應用近訪得各該官吏多有不遵法度或將官庫錢糧通同侵欺入已乘機科派民間出辦或取金銀器皿銀兩或要牛馬猪羊等物輒差多人下郷狐假乕威擾害殆徧中間積年刁徒又行百般需索稍有不遂輒稱毆打抗拒聳信官府添人捉拏加以刑辱重行追索若不查禁處置深爲民患爲此仰抄案囬司即便㑹同布政司掌印官速行計處先將各應支銀兩查解應用若有不足就將在庫不拘何項銀兩給支接濟俱要造冊開報以慿查考事畢之日再行議處作正支銷或設法追𥙷其各府州縣科取民間財物即行查䆒禁革未到官者毋再追倂巳在官者照數給還中間敢有隱瞞纖毫不發體訪得出或𬒳人首告定行拏問贓罪決不輕貸仍先出給告示發仰所屬張掛暁諭務使知悉俱毋違錯禁省詞訟告諭十二月十七日近據南昌等府州縣人等訴告各項情詞到院看得中間多係戸婚田土等事雖有一二地方重情又多繁瑣牽撦不干巳事在狀除情可矜疑者亦量輕重准理其餘不行外爲照江西地方近因寧王變亂比來官軍見省城空虚况聞聖駕將臨有司官員俱各公占委用分理不暇逺近居民又有差役荅應奔走無休本院志在撫安地方休息軍民當此多事之時豈暇受理詞訟必待地方寧靖兵衆旣還官府稍暇方從容聽斷爲此合行出給告示暁諭各府州縣軍民人等暫且各囬生理保爾家室毋輕忿爭一應小事各宜含忍不得輒興詞訟不思一朝之忿錙銖之利遂致喪身亡家始謀不臧後悔何及中間果有贓官酷吏豪奸巨賊虐衆殃民患害激切者務要簡切直言字多不過一二行陳告亦須自下而上毋致驀越其餘一切事情俱候地方寧謐官軍班還之日各赴該管官司告理若剖斷不公或有虧枉方許申訴敢有故違仍前告擾者定行痛責仍照例枷號問發決不輕貸再禁詞訟告諭十二月照得本院屢出告示暁諭軍民人等令其含忍寧耐止息爭訟而軍民人等全不體息紛紛告擾不巳及㸔所告情詞多係小事忿爭全是繁文牽撦細字疊書殊可厭惡當此多事日不暇給詞狀動以千百徒費精神何由遍覽除巳前情詞俱巳不行外爲此再行暁諭敢有仍前不遵告諭故違告擾者定行照例枷號從重問發的不虚示計開一本院係風憲大臣職當秉持大體正肅百僚非瑣屑聽理詞訟之官今後軍民人等一應戸婚田土鬪爭債負錢糧差役等事俱要自下而上府州縣問斷不公方許告守廵按察衙門守廵按察問斷不公方許赴本院陳告敢有越訴瀆冐憲體者痛責征藩公移下凡二十七條開報征藩功次贓仗咨正徳十五年三月初四日准欽差整理兵馬糧草等項兵部左侍郎兼都察院左僉都御史王咨内開煩爲查照将征剿防守有功官軍人等俱照功次分别眀白造冊咨送以慿查議等因卷查先爲飛報地方謀叛重情事本職奉命前往福建公幹中途遭遇寧府反叛謀危宗祀係國家大難義不容舍之而往當即保吉安隨具本奏聞及星夜行文各府起調兵快召募四方報効義勇適遇廵按兩廣御史謝源伍希儒囬京復命又行具本奏留軍前恊謀行事各哨官兵俱聽監督獲有功次俱慿本職送發各官審驗紀錄去後續督官兵前後攻復省城俘執宸濠幷其黨與劇賊起解間隨准南京兵部咨開稱前事云云照得江西逆賊旣巳擒獲逆黨巳經剪平所獲功次合行紀驗除原差科道官前來外煩將征剿逆賊官軍民兵召募義勇及鄉官人等所獲功次分别竒功頭功次功造冊覆驗等因案經備行江西按察司查照施行去後今准前因㸔得征剿宸濠之時止是分布哨道設伏運謀以攻城破敵爲重擒斬賊徒爲輕且攻城破敵雖係本職督領各哨官兵恊謀倂力緣任非一人事非一日各官俱係同功一體難以分别等弟其擒斬賊徒雖有等級自有下手兵夫難以加扵各官之上止將各哨擒斬賊犯送發御史謝源伍希儒審驗明白從實直紀縁各官不曾奉有紀功之命但照本職欽奉勅諭便宜事理從權審驗紀錄難以分别奇功頭功次功等項名目止扵造冊内開寫某人擒斬某賊首某賊從重輕多寡據實造冊中間等苐亦自可見除行各官再行查照造冊徑繳外所據擒獲功次總數及官軍兵快報効人等員名數目合行開造咨報施行計開一提督領兵官一員欽差提督南贛汀漳等處軍務都察院右副都御史王一協謀討賊審驗功次官二員欽差廵按兩廣監察御史謝源伍希儒一領哨官十員衝鋒破敵吉安府知府伍文定贛州府知府邢珣袁州府知府徐璉臨江府知府戴徳孺邀伏截殺贛州衛署都指揮僉事余恩撫州府知府陳槐建昌府知府曾璵饒州府知府林珹廣信府知府周朝佐瑞州府通判胡尭元一分哨官十一員邀伏截殺吉安府泰和縣知縣李楫臨江府新淦縣知縣李美吉安府萬安縣知縣王冕南康府安義縣知縣