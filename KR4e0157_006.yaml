front:
  text: 王文成公全書卷之十一
  hash: sha256:46703476a41f78d1d1283650417c313a97930b5bbff52f330737a6ba016cbf36
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_006-1a}
body:
  text: 别録三奏疏奏疏三乞休致疏正德十三年三月𥘉四日臣以菲才遭逢明盛荷蒙陛下滌垢掩瑕曲成器使既寬尸素之誅復冒清顯之職增其祿秩假以賞罰念其行事之難授以提督之任言行計聽感激深恩每思捐軀以效犬馬奈何才蹇福薄志欲前而力不逮功未就而病巳先臣自待罪鴻臚即嘗以病求退後懼託􅍚避難之誅輒復黽勉來此驅馳兵革侵染瘴癘晝夜憂勞疾患愈困自去歲二月往征閩寇五月旋師六月至於九月俱有地方之警十月攻橫水十一月破桶岡十二月旋師未幾今年正月又復出剿浰賊前後一歲有餘往來二三千里之內上下溪澗出入險阻皆扶病從事然而不敢輒以疾辭者誠以朝廷𥘉申賞罰之請再下提督之命惟恐付託不效以辜陛下聽納之明負大臣薦揚之舉且其時盜賊方熾坐視民之荼毒而以罪纍後人非仁也巳逃其難而遺人以艱非義也徒有其言而事之不酬非忠也故寧委身以持罪忍死以效職今賴陛下威德廟堂成算上猶南康之賊既已掃蕩而浰寇殘黨亦復不多旬日之間度可底定決不至於重遺後患則臣之罪責亦既可以少逭於萬一但惟臣病月深日亟百療罔效潮熱咳嗽瘡疽癰腫手足麻痺巳成廢人昔人所謂綿弱之才不堪任重福薄之人難與成功二者臣皆有焉伏惟陛下覆載生成不忍一物失所憫臣輿病討賊所備嘗之苦哀臣忍死待罪不得已之情念福薄之有限憐􅍚瘠之無期準令旋師之日放歸田里豈曰保全餘息尚圖他日之效苟遂丘首臣亦感恩地下能忘㗸結之報乎臣不勝哀懇祈望之至移置驛傳疏正德十三年二月二十五日據江西按察司分巡嶺北道兵備副使楊璋呈奉臣批據南安府大庾縣峰山里民朱仕玞等連名告稱本里先因敵禦輋賊正德十一年𬒳賊復仇殺害本里婦男一百餘命各民驚惶自願築砌城垣一座搬移城內告申上司蒙給官銀修理三門今幸完成居民無虞正德十二年六月十九日奉調本里百長謝玉山等五百名前去本府剿賊已獲功次解報未蒙發回今風聞輋賊又要前來復讐但本城缺兵防守乞賜裁革宰屋龍華二隘人夫前來守城其赤口巡檢司缺官就乞委官署掌印信督兵防遏及願出地遷移小溪驛進城城池驛舍俱保無虞等情奉批嶺北道議處依奉會同左參議黃宏議將宰屋龍華二隘人夫撥付該城防守該府照磨鄧華空間合委署掌印信提督該司弓兵并該城兵衆併力防遏其小溪驛遷移峯山城內一節合行該府查勘應否遷移過往使客有無便益南北水路有無適均移驛之費計算幾何緣由呈詳本院奉批去隘委官俱準議行移驛事仰行該府作急勘報等因已經行據南安府呈蒙二隘人夫撥付峯山守城行委照磨鄧華署掌赤石巡檢司印信及查議得小溪舊驛止有人煙數家孤處河邊且與雞湖等賊巢相近曾𬒳強賊來驛執虜官吏燒毁公廳見今賊勢猖獗使客輒受驚惶不敢停歇往年亦曾建議遷驛奈小溪人民俱各包當該驛夫役積年射利得慣官吏𬒳其鈐制往往告稱移驛不便况移驛處所雖在城中離河不逺工程所費亦不過四五十兩如此一舉委果水陸俱便不惟該驛可保無虞而往來使客宿歇亦無驚恐等因回報到道覆議相同據呈到臣簿查先為前事已經批仰該道議處回報去後今據前因看得小溪舊驛屢𬒳賊患移置峯山城內委果相應如蒙乞勑該部查議相同俯從所請則一勞永逸實為地方之幸浰頭捷音疏十三年四月二十日據江西按察司分巡嶺北道兵備副使楊璋呈據一哨統兵守備南贛二府地方以都指揮體統行事指揮使郟文呈稱統領逺安縣義民孫洪舜等兵於本年正月𥘉七日攻破曲潭等巢十一日攻破半徑等巢共五處二月二十六日與賊戰於水源等處擒斬大賊首吳積祥陳秀謙張秀鼎等七名顆賊從陳希九等一百二十六名顆俘獲賊屬男婦五十六名口燒毀賊巢房屋禾倉二百五十三間及奪獲器械等物二哨統兵贛州府知府邢珣呈稱督同同知夏克義知縣黃天與典史梁儀老人葉秀芳等官兵於正月𥘉七等日攻破方竹湖等巢𥘉九日攻破黃田拗等巢共四處二十五等日覆賊於白沙二月十六日與賊戰於芳竹湖等處擒斬大賊首黃佐張廷和王蠻師劉欽等一十名顆賊從黃密等二百六十名顆俘獲賊屬男婦八十三名口燒毀賊巢房屋禾倉二百二拾二間及奪獲贓仗牛馬等項三哨領兵廣東惠州府知府陳祥呈稱督同通判徐璣新民盧琢等官兵於正月𥘉七等日攻破熱水等巢𥘉九等日攻破鐡石障等巢共五處二十五等日覆賊於五花障等處二月𥘉二等日與賊戰於和平等處擒斬大賊首陳活鷂黃弘閏張玉林等十一名顆賊從李廷祥四百三十一名顆俘獲賊屬男婦二百二十名口燒毁賊巢房屋禾倉五百七十二間及奪獲器械贓銀牛馬等項四哨統兵南安府知府季斆呈稱統領訓導藍鐸百長許洪等官兵於正月𥘉三等日攻破右坑等巢十一日攻破新田徑等巢共四處二十七等日覆賊於北山又與戰於風門奧等處擒斬大賊首劉成珍等四名顆賊從胡貴琢等一百三十名顆俘獲賊屬男婦一百六十五名口燒毁賊巢房屋禾倉七十三間及奪獲贓銀等物五哨統兵贛州衛指揮僉事余恩呈稱統領新民百長王受黃金巢等兵於正月𥘉七日會同推官危壽千戶孟俊攻破上中下三浰大巢十一日攻破空背等巢共四處二十五日覆賊於銀坑水等處擒斬大賊首賴振祿王貴洪李全鄒一惟等九名顆賊從賴賤仔等三百五十名顆俘獲賊屬男婦六十二名口燒毀賊巢房屋禾倉三百二十一間及奪獲器械牛馬等項六哨統兵贛州衛指揮僉事姚璽呈稱統領新民梅南春等兵於正月𥘉七日攻破淡方等巢𥘉九日攻破岑岡等巢共四處二十七日覆賊於烏虎鎮擒斬大賊首謝鑾曽用竒等五名顆賊從盧任龍一百九十九名顆俘獲賊屬男婦一百一十二名口燒毀賊巢房屋禾倉三百七十間及奪獲器械牛馬等項七哨統兵贛州府推官危壽呈稱統領義官葉方等兵於正月𥘉七日會同指揮余恩千戶孟俊攻破上中下三浰大巢𥘉十等日攻破鎮里寨等巢共四處二十七日覆賊於中村等處擒斬大賊首池仲寧髙允賢池仲安朱萬林根等十二名顆賊從黃穩等二百一十一名顆俘獲賊屬男婦三十三名口燒毀賊巢房屋禾倉三百二十三間及奪獲贓仗牛馬等項八哨統兵贛州衛千户孟俊呈稱統領義官陳英鄭志髙新民盧珂等兵於正月𥘉七等日會同指揮余恩推官危壽攻破上中下三浰大巢𥘉十等日攻破大門山等巢兵六處擒斬大賊首謝鳯經吳宇張廷與石榮等九名顆賊從張角子等一百九十二名顆俘獲賊屬男婦一百四十三名口燒毀賊巢房屋禾倉一百七十三間及奪獲器械牛馬贓銀等項九哨統兵南康縣縣丞舒冨呈稱統領義民趙志標等兵於正月十一等日攻破旗領等巢共二處二月十四日與賊戰於乾村等處擒斬賊從劉三等一百七名顆俘獲賊屬男婦二十一名口燒毀賊巢房屋禾倉五十三間及奪獲器械等物等因各呈報到道查得先為地方緊急賊情事據信豐縣所呈稱正德十二年二月𥘉七日龍南縣賊首黃秀魁紏合廣東賊首池仲容等突來本縣殺人放火見今攻城不退乞要發兵救援等因該本道議委經歷王祚縣丞舒富領兵剿捕斬獲賊級四顆𬒳賊殺死報效義士楊習舉等十名執去經歷王祚隨該本道親詣該縣暫將各賊招安撥回原巢經歷王祚送出參將失事知縣王天爵盧鳯千戶鄭鐸朱誠洪恩主簿周鎮鎮撫劉鏜等俱各有罪及將前賊應剿緣由呈詳轉逹具奏外正德十三年正月𥘉三日奉提督軍門𥿄牌議照上猶等縣賊巢既平廣東龍川縣浰頭等處賊巢奉有成命應該會剿其大賊首池仲容等本院巳行計誘擒獲見今軍勢頗振若不乘此機會出其不意搗其不備坐視以待廣兵之來未免有失事機之會本院除遵奉勑諭內自行量調官軍設法剿捕事理部勒兵衆分布哨道行仰守備指揮并知府等官郟文陳祥等統領各授進止方略外備行本職前去軍前紀驗功次及催各哨官兵上緊依期進剿仍行巡按衙門前來核實施行等因隨呈巡按江西監察御史屠僑批行本道先行紀驗明白通候核實施行依奉督率各省官兵依期進剿去後今據前因除將前項功次俱類巡按衙門會審紀驗明白生擒賊犯解赴提督軍門斬首梟示賊屬男婦變賣銀兩器械贓仗贓銀俱貯庫外參照浰頭大賊首池仲容池仲寧池仲安髙允賢李全等盤據一方歷有歲年僣稱王號偽設官職廣東翁源龍川始興江西龍南信豐安逺會昌等縣屢𬒳攻圍城池殺害官軍焚燒村寨虜殺男婦歲無虗日曾經狼兵夾攻數次俱𬒳漏網是乃衆賊姦雄之巨擘三省群盜之根源也今幸天奪其魄仲容束手就擒仲寧仲安等一時授首各巢賊從擒斬殆盡此皆仰仗朝廷德威逺播廟堂成算無遺提督軍門賞罰以信而號令嚴明師出以律而機宜慎密身先士卒而艱險之不辭洞見敵情而撫剿之有道以是數十年之巨寇一旦削平連四省之編氓永期安輯呈乞照詳轉逹等因據呈到臣卷查先為地方緊急賊情事準兵部咨該巡按江西監察御史屠僑奏該本部覆題節奉聖旨是這地方賊情著都御史王守仁自行量調官軍設法剿捕欽此及為申明賞罰以勵人心事準兵部覆題請勑南贛等處都御史假以提督軍務名目給與旗牌應用以振軍威一應軍馬錢糧事宜徑自便宜區畫如遇盜賊入境即便調兵剿殺不許踵襲舊弊招撫重為民患所部官軍若在軍前違期逗遛退縮俱聽以軍法從事生擒盜賊亦聽斬首示衆賊級聽本處兵備會同該道守巡官即時紀驗明白備行江西按察司造册奏繳查照剿殺南方蠻賊見行舊例議擬升賞等因具題奉聖旨是王守仁著提督南贛汀漳等處軍務換勑與他其餘事宜各依擬行欽此又為地方緊急賊情事準兵部覆題看得所奏攻治盜賊二説就令差來人賫文交與都御史王守仁悉依前項申明賞罰事理便宜行事期於功成不限以時相機攻剿等因具題節該奉聖旨是欽此陸續備咨到臣俱經通行撫屬四省各道守巡兵備守備等官一體欽遵并咨總督兩廣左都御史陳金查照外續該臣看得南贛盜賊其在南安之橫水桶岡諸巢則接境於湖郴在贛州之浰頭桶岡諸巢則連界于閩廣接境于湖郴者賊衆而勢散恃山溪之險以為固連界于閩廣者賊狡而勢聚結黨與之助以相援臣等遵奉勑諭及查照兵部咨示方略𥘉議先攻橫水次攻桶岡而末乃與廣東會兵徐圖浰頭如攻堅木先其易者後其節目自正德十二年九月臣等議將進兵橫水恐浰賊乘虗出優思有以沮離其黨臣乃自為告諭具述禍福利害使報效生員黃表義民周祥等往諭各賊因皆賜以銀布一時賊黨亦多感動各寨酋長黃金巢劉遜劉粗眉溫仲秀等遂皆願從表等出投惟大賊首池仲容即池大鬢獨憤然謂其衆曰我等做賊已非一年官府來招亦非一次此亦何足為慿待金巢等到官後果無他説我等遣人出投亦未為晚其時臣等兵力既未能分意且羈縻令勿出為患故亦不復與較金巢等至臣乃釋其罪推誠厚撫各願出力殺賊立效于是藉其衆五百餘悉以為兵使從征橫水十月十二日臣等已破橫水仲容等聞之始懼計臣等必且以次加兵于是集其酋豪池仲寧髙飛甲等謀使其弟池仲安率老弱二百餘徒亦赴臣所投招求隨衆立效意在援兵因而窺覘虗實乘間內應臣逆知其謀陽許之及臣進攻桶岡使領其衆截路于上新地以逺其歸途內嚴警禦之備以防其釁外示寬假之形以安其心隂使人分召鄰賊諸縣𬒳賊害者皆詣軍門計事旬日之間至者數十問所以攻勦之策皆以此賊狡詐凶悍非比他賊其出劫行剽皆有深謀人不能測自知惡極罪大國法難容故其所以扞拒之備亦極險譎前此兩經夾勦皆狼兵二三萬竟亦不能大捷後雖敗遁所殺傷亦略相當近年以來姦謀愈熟惡熖益熾官府無可奈何每以調狼兵恐之彼輒謾曰狼兵易與耳縱調他來也須半年我縱避他只消一月其意謂狼兵之來不能速其留不能久也是以益無忌憚今已僣號設官姦計逆謀尤非昔比必欲除之非大調狼兵事恐難濟臣以為兵無常勢在因敵變化而制勝今各賊狃于故常且謂必待狼兵而後敢攻此所以不必狼兵而可以攻之也乃為密畫方略使數十人者各歸部集候我兵有期則據隘遏賊十一月賊聞臣等復破桶岡益懼為戰守備臣使人至賊所賜各酋長牛酒以察其變賊度不可隱則詐稱龍川龍民盧珂鄭志髙等將掩襲之是以密為之防非敢虞官兵也臣亦陽信其言因復陽怒盧珂鄭志髙等擅兵讐殺移檄龍川使廉其實且趣各賊伐木開道將回兵自浰頭取道往討之賊聞以為臣等實有為之之意又恐假道伐之且喜且懼因遣來謝且請無勞官兵當悉力自防禦之盧珂鄭志髙陳英者皆龍川舊招新民有衆三千餘逺近皆為仲容所脅而三人者獨與之抗故賊深讐忌之十二月望臣兵回至南康盧珂鄭志髙等各來告變謂池仲容等僣號設官今巳點集兵衆號召逺近各巢賊首授以總兵都督等偽官使候三省夾攻之兵一至即同時並舉行其不軌之謀及以偽授盧珂等官爵金龍霸王印信文書一𥿄粘狀來首臣先巳諜知其事及珂等來即陽怒以為爾等擅兵仇殺投招之人罪已當死今又造此不根之言乘機誣陷且池仲容等方遣其弟領兵報效誠心向化安得有此遂收縛珂等將斬之時池仲安之屬方在營見珂等入首大驚懼至是皆喜羅拜歡呼競欣珂等罪惡臣因亦陽令具狀謂將并拘其黨屬盡斬之于是遂械繫盧珂而使人密喻以陽怒之意欲以誘致仲容諸賊且使盧珂等先遣人歸集其衆候珂等既還乃發臣又使生員黃表聽選官雷濟往喻仲容使勿以此自疑密購其所親信隂説之使自來投訴二十日臣兵已還贛乃張樂大享將士下令城中今南安賊巢皆已掃蕩而浰頭新民又皆誠心歸化地方自此可以無虞民久勞苦亦宜暫休為樂遂散兵使各歸農示不復用而使池仲安亦領衆歸助其兄防守且云盧珂等雖巳繫于此恐其黨致怨或掩爾不虞仲安歸具言其放賊衆皆喜遂弛備臣又使指揮余恩賫曆往賜仲容等令毋撒備以防盧珂諸黨賊衆亦喜黃表雷濟因復説仲容今官府所以安輯勞來爾等甚厚何可不親往一謝况盧珂等日夜哀訴反狀乞官府試拘爾等若拘而不至者即可以證反狀之實今若不待拘而往因面訴珂等罪惡官府必益信爾無他而謂珂等為詐殺之必矣所購親信者復從力贊仲容然之乃謂其衆曰若要伸先用屈贛州伎倆亦須親往勘破遂定議率其麾下四十餘人自詣贛臣使人探知仲容已就道乃密遣人先行屬縣勒兵分哨道候報而發又使千戶孟俊先至龍川督集盧珂鄭志髙陳英等兵然以道經浰巢恐搖諸賊則别賫一牌以拘捕盧珂等黨屬為名各賊聞俊往果遮迎問故俊出牌視之乃皆羅拜相爭導送出境俊已至龍川始發牌部勒盧珂等兵衆賊聞之皆以為拘捕其屬不復為意閏十二月二十三日仲容等至贛見各營官兵皆巳散歸而街市多張燈設戲為樂信以為不復用兵密賂獄卒私往覘盧珂等又果械繫深固仲容乃大喜遣人歸報其屬曰乃今吾事始得萬全矣臣乃夜釋盧珂鄭志髙等使馳歸發兵而令所屬官僚次設羊酒日犒仲容等以緩其歸正月三日度盧珂等巳至家所遣屬縣勒兵當已大集臣乃設攪于庭先伏甲士引仲容入并其黨悉擒之出盧珂等所告狀訊鞠皆伏遂置于獄而夜使人趨發屬縣兵期以𥘉七日同時入巢于是知府陳祥兵從龍川縣和平都入指揮姚璽兵從龍川縣烏虎鎮入千户孟俊兵從龍川縣平地水入指揮余恩兵從龍南縣髙沙保入推官危壽兵從龍南縣南平入知府邢珣兵從龍南縣太平保入守備指揮郟文兵從龍南縣冷水徑入知府季斆兵從信豐縣黃田岡入縣丞舒富兵從信豐縣烏􅏙入臣自率帳下官兵從龍南縣冷水􅏙直搗下利大巢而使各哨分路同時並進會于三浰先是賊徒得池仲容報謂贛州兵已罷歸他已弛備散處各巢至是驟聞官兵四路並進皆驚懼失措乃分投出禦而悉其精鋭千餘據險設伏併勢迎敵于龍子嶺我兵聚為三衝掎角而前指揮余恩所領百長王受兵首與賊遇大戰良久賊敗却王受等奮追里許賊伏兵四起奮擊王受推官危壽所領義官葉芳兵鼓噪而前復奮擊賊伏兵後千戶孟俊兵從傍繞出岡背橫衝賊伏與王受合兵于是賊乃大敗奔潰呼聲震山谷我兵乘勝逐北遂克上中下三浰各哨官兵遙聞三浰大巢已破皆奮勇齊進各賊皆潰敗知府陳祥兵遂破熱水巢五花障巢指揮姚璽兵遂破淡方巢石門山巢上下陵巢知府邢珣兵遂破芳竹湖白沙巢守備指揮郟文兵遂破曲潭巢赤唐巢知府季斆兵遂破布坑巢三坑巢是日擒斬首從賊人賊級俘獲賊屬男婦牛馬器仗數多其餘墮崖填谷死者不可勝計是夜賊復奔聚未破巢穴次日早乃令各哨官兵探賊所往分投急擊𥘉九日知府陳祥兵破鐡石障巢羊角山巢獲賊首金龍霸王印信旗𫀆知府邢珣兵破黃田拗巢指揮姚璽兵破岑岡巢指揮余恩兵破塘含洞巢溪尾巢𥘉十日千户孟俊兵破大門山巢推官危壽兵破鎮里寨巢十一日知府邢珣兵破中村巢守備郟文兵破半徑巢都坑巢尺八嶺巢知府季斆兵破新田徑巢古地巢指揮余恩兵破空背巢縣丞舒富兵破旗嶺巢頓岡巢十三日千户孟俊兵破狗腳坳巢水晶洞巢五湖巢藍州巢十六日推官危壽兵破風盤巢茶山巢連日各擒斬首從賊人賊級并俘獲賊屬男婦牛馬器仗𢾗多然各巢奔散之賊其精悍者尚八百餘徒復哨聚九連大山扼險自固當臣看得九連山勢極髙橫亘數百餘里四面斬絶我兵既不淂進而其內東接龍門山後諸處賊巢若百數以我兵進逼賊必奔往其間誘激諸巢相連而起勢亦難制然彼中既無把截之兵欲從傍縣潛軍斷其後路必須半月始逹緩不及事止有賊所屯據崖壁之下一道可通然賊已據險自上發石滚木我兵百無一全於是乃選精鋭七百餘人皆衣所得賊衣佯若奔潰者乘暮直衝賊所據崖下澗道而過賊以為各巢敗散之黨皆從崖下招呼我兵亦佯與呼應賊疑不敢擊已度險遂扼斷其後路次日賊始知為我兵并勢衝敵我兵已據險從上下擊賊不能支乃退敗臣度其必潰預令各哨官兵四路設伏以待賊果分隊潛遁二十五日知府陳祥兵覆賊於五花障知府邢珣兵覆賊於白沙指揮余恩兵覆賊於銀坑水二十七日指揮姚璽兵覆賊於烏虎鎮推官危壽兵覆賊於中村知府季斆兵覆賊於北山又戰於風門奧其餘奔散殘黨尚三百餘徒分逃上下坪黃田坳諸處各哨官兵復黏蹤會追二月𥘉二日知府陳祥兵覆與賊戰於平和𥘉五日復戰於上坪下坪𥘉八日推官危壽指揮余恩兵復與賊戰於黃坳十二日知府陳祥兵復與賊戰於鐡障山十四日縣丞舒富兵復與賊戰於乾村又戰於梨樹十四日知府邢珣季斆兵復與賊戰於芳竹湖二十三日縣丞舒富兵復與賊戰於北順又戰於和洞二十六日守備郟文兵復與賊戰於水源戰於長吉戰於天堂寨連日擒斬首從賊人賊級數多三月𥘉三日據鄉導人等四路瓜探皆以為各巢積惡凶狡之賊皆巳擒斬略盡惟餘黨張仲全等二百餘徒其間多係老弱及逺近村寨一時為賊所軀脅從惡未久之人今皆勢窮計迫聚於九連谷口呼號痛哭誠心投招臣遣報效生員黃表往驗虗實果如所探因引其甲首張仲全等數人前來投見訴其𬒳脅不得已之情臣量加責治隨遣知府邢珣往撫其衆籍其名數遂安插於白沙𥘉七日據知府邢珣等呈稱我兵自去歲二月從征閩寇迄今一年有餘未獲少休今幸各巢賊已掃蕩餘黨不多又蒙俯順招安况今隂雨連綿人多疾疫兼之農功已動人懷耕作合無俯順下情還師息衆及義官葉芳等并各村鄉居民亦告前情臣因親行相視險易督同副使楊璋知府陳祥等經理立縣設隘可以久安長治之䇿留兵防守而歸蓋自本年正月𥘉七日起至三月𥘉八日止前後兩月之間通共搗過巢穴三十八處擒斬大賊首二十九名顆次賊首三十八名顆從賊二千零六名顆俘獲賊屬男婦八百九十名口奪獲牛馬一百二十二隻匹器械贓仗二千八百七十件把贓銀七十兩六錢六分總計擒斬俘獲奪獲共五千九百五十五名顆口隻匹件把俱經行令兵備等官審驗紀録仍行紀功御史核實施行具由呈報去後今據前因臣等會同江西巡按御史屠僑廣東巡按御史毛鳯參照大賊首池仲容等荼毒萬民騷優三省隂圖不軌積有年歲設官僣號罪惡滔天比之上猶諸賊尤為桀驁難制蓋上猶諸賊雖有僣竊不軌之名而徒惟劫掠焚燒是嗜至于浰頭緒賊雖亦剽劫虜掠是資而實懷僣擬割據之志故其招致四方無藉隱匿逺近妖邪日夜規圖漸成姦計兼之賊首池仲容池仲安等又皆力搏猛虎捷競飛猱凶惡之名久已著聞四方賊黨素所向服是以負固恃頑屢征益熾前此知其無可奈何亦惟苟且招安以幸無事其實無救荼毒之慘益飬姦宄之謀今乃臣等驅不練之兵資缺乏之費不踰兩月而破姦雄不制之虜以除三省數十年之患此非朝廷威德廟堂成算何以及此臣等切惟天下之事成于責任之專一而敗于職守之分撓就今事而言前此嘗夾攻二次計勦數畨以兵則前者強而今者弱前者數萬而今者數千以時則前者期年而今者兩月以費則前者再倍而今者什一以任事之人則前者多知謀老練之士而今者乃若臣之迂踈淺劣然而計功較績顧反有加于昔何哉實由朝廷之上明見萬里洞察往弊處置得宜既假臣以賞罰之權復改臣以提督之任既以兵忌遙制而重各省專征之責又慮事或牽狃而抑守臣干預之請授之方略而不拘以制責其功成而不限以時以故詔旨一頒而賊先破膽奪氣咨文一布而人皆踴躍爭先效謀者知無沮撓之患而務竟其功希賞者知無侵削之弊而畢致其死是乃所謂得先勝之算于廟堂收折衝之功于樽爼實用兵之要道制事之良法也事每如此天下之治有不足成者矣臣等偶叨任使何幸濫竽成功敢是獻捷之餘拜手稽首以賀伏願皇上推成功之所自原發縱之有因庶無僣賞以旌始謀及照兵備副使楊璋監軍給餉紀功督戰備歷辛勤宜加顯擢守備指揮郟文知府陳祥邢珣季斆推官危壽指揮余恩姚璽及千户孟俊縣丞舒富等皆身親行陳屢立戰功俱合奬擢庶示激揚以為後勸臣本凡庸繆當重任偶逢事機之會幸免覆餗之誅然功非其才福已踰分遂沾痿痺之􅍚既成廢棄之人除已别行請罪乞休外緣係捷音及該兵部議擬期于成功不限以時題奉欽依事理為此具本題知添設和平縣治疏十三年五月𥘉一日據江西按察司分巡嶺北道兵備副使楊璋廣東按察司分巡領東道兵備僉事朱昻會呈據贛州府知府邢珣惠州府知府陳祥呈奉臣案驗據廣東惠州龍川河源等縣省祭監生生員耆老陳震余世美黃宸等連名呈稱浰頭岑岡等處叛賊池大鬢等魁首動以百十徒黨不下數千始則占耕民田後遂攻打郡縣謝玉璘鄒訓等倡亂于弘治之末而此賊已為之先鋒徐允富張文昌繼亂于正德之𥘉而此賊復張其羽翼荼毒三省二十餘年以來乃為三省逋逃之主遂稱羣賊桀驁之魁捉河源縣之主簿虜南安府之經歷綁龍南縣之縣官戮信豐所之千戶肆然無忌規圖漸廣凶惡日增僣稱王號偽建元帥總兵都督將軍等名目雖屢蒙上司動調官兵多方征剿俱𬒳漏網為患今蒙提督軍門親搗賊巢掃蕩殘黨除數郡之荼毒雪萬姓之冤憤若不趂此機會建立縣治以控制三省賊衝之路切恐流賊復聚禍根又萌切見龍川平和地方山水環抱土地坦平人煙輳集千有餘家東去興寧長樂安逺西抵河源南界龍川北際龍南各有數日之程其間山林阻隔地里遼逺人迹既稀姦宄多萃查得父老相傳原係循州一川龍川雷鄉二縣後因地方優亂人民稀少除去循州雷鄉兩處止存龍川一縣洪武𥘉問龍川尚有五十五里其後州縣既除聲教不及洪武十九等年賊首謝士真等相繼作亂將前項居民盡行殺戮數百里內人煙斷絶自此賊巢日多民居日耗始將龍川縣都圗併作七里迄于近年民遭荼毒遂至此極如蒙憐念于和平地方設建縣治以控制猺洞興起學校以移易風俗及將和平巡檢司改立浰頭屯兵隄備庶幾變盜賊之區為冠裳之地實為保安至計等因據呈到院看得東南地方但係盜賊盤據即皆深山窮谷阻險遼絶之區是以征剿之後其民類皆願立縣治以控制要害敷施政教而漸次化導之故東南弭盜安民則建立縣治亦其一䇿近該本院親剿浰賊見今住軍九連大山往來浰頭和平等處備閲山溪形勢講求賊情民俗深思善後之圖實有如各役所呈者但開建縣治置立屯所必須分割都圖創起關隘城池宫室之費力役輸調之資未經查勘議處難便奏聞案仰本道即行副使楊璋會同僉事朱昻督同府縣掌印官拘集各該地方鄉老里甲人等備勘和平浰頭兩處某處可以建築城池某地宜以添設巡邏某縣都圖相近可以分割某里村寨接連堪以撥輔某所巡司可以移鎮某鄉丁戶可以編僉其移民以就田調兵以守隘一應工役所需作何區處再行考求啚籍諏咨耆老必求至當歸一具由呈來以慿議處定奪仍呈總督總鎮巡按衙門公同計議施行等因各職遵依督同龍川縣署縣事主簿陳甫河源縣署縣事縣丞朱㸅就近拘集龍川縣通縣并河源縣惠化都里老沙海鍾秀山等與原呈陳震等到職會勘和平洞地方原有二千餘家因賊首池大鬢等作耗內有八百餘家投城居住尚存一千餘家本洞羊子一處地方寬平山環水抱水陸俱通可以築城立縣于此招回投城之人復業居住分割龍川縣和平都仁義都并廣三圖共三里及割附近河源縣惠化都與接近江西龍南縣鄰界亦折一里前來共輳一縣及將先年各處流來已成家業寓民盡數查出責令立籍撥輔絶户圖眼一體當差其和平巡檢司宜立浰頭以控制險阻仍于本縣并龍南縣量編隘夫幾百名委官管領兼同該司弓兵巡邏使盜賊不得盤據其蓋造衙門大小竹木和平浰頭各山産有俱派本處人户採辦不用官錢其餘磚石灰瓦匠作工食之費須查支官庫銀兩及差委公正府佐二官一員清查浰頭岑岡等處田上除良民産業𬒳賊占耕者照數給主外中間有典與新民得受價銀者量追價銀一半入官其田給還管業其餘同途上盜田土盡數歸官賣價以助築修城池官廨之用其龍川縣分割三圖止存五圖在彼路通衝要答應繁難查得鄰界長樂縣所屬清化都正與龍川連近乞于該都分割一圖輔輳管轄庶為適均等因又據龍南縣太平等保里老賴本立等呈稱本縣東南與廣東龍川河源二縣西南與廣東始興縣連界多深山窮谷向因各處流賊過境劫掠太平保設有橫岡角􅌘二隘上蒙髙沙二保設有牛岡陽陂二隘就于各保僉點隘夫鄉兵守把後因池大鬢等不時出劫各隘燒毁一空今征剿既平宜將前項隘所修築把守可保四境無虞及照本縣止有四里半邑小民寡遞年逋負追併况與龍川縣又係隔省窵逺乞免分割以蘇民困等因各職併行會議得賊平之後經久良圖誠無踰于添設縣治者今龍川縣里老人等願于和洞羊子鋪添設縣治及分割都圖清賣賊田移置巡司量僉隘夫等情俱相應俯順惟稱又要分折江西贛州府龍南縣附近都圖緣係兩省地方相隔愈逺未免影射差役兩無歸著難以準行止該于龍南縣該管圖保修築舊隘其新興地方係通始興縣要路宜添設一隘各于鄰近地方多僉鄉夫守把及看得修築城池學校倉埸鋪舍等項中間有礙百姓田廬稅糧亦該委官丈量照數除豁相距龍川縣二百里之程該量設鋪舍十處一應工程除大小竹木派令人户採辦其餘磚石灰瓦等項物料各色匠作工食猝難料計應合委官估計通該銀若干扣除前項田價銀兩若干餘于惠州府庫相應官銀支給尚有不敷另行申請合用人工該起龍川縣與河源縣惠化都民夫答應其移置浰頭巡檢司應隸新縣管轄該司弓兵四十名額數寡少合于龍川縣和平仁義廣三圖量編四百名龍南縣量編二百名俱令該縣掌印官編僉造册分為二班半年一換俱各委官管領兼同該司官巡邏遇有盜賊生發即隨撲獲隘夫限滿亦須該班者交代方還各府州縣巡捕官俱要不時往來巡點其清賣賊田修築城池等項俱各委官分投幹辦方得集事再照新縣里糧數少官員應該減裁且係偏僻之地驛遞不必添設遇有使客往來總于龍川縣雷鄉驛應付前項居民𬒳賊殘害瘡痍未蘇加以創縣勞費困苦可矜成縣之日凡遇一應雜泛差役坐派錢糧物料等項俱各酌量減省期待三年之後方與各縣一體差科庶幾輿情允愜事體允當等因到道會同僉事朱昻覆議相同合就會案呈詳等因據呈到臣會同欽差巡按廣東監察御史毛鳯議照前項地方實係山林深險之所盜賊屯聚之鄉當四縣交界之隙乃三省閏餘之地是以政教不及人迹罕到其間接連閩廣反覆賊巢動以百數據而守之真足以控諸賊之往來杜姦宄之潛匿棄而不守斷為狐鼠之窟穴終萃逋逃之淵藪况前此本亦州縣舊區始以縣存而民猶恃為保障後因縣廢而賊遂據以陸梁是又往事之明驗矣當賊猖獗之日地方父老屢有取復縣治之議然其時賊方盤據勢有不能今賴朝廷威德巢穴蕩平若不乘此機會復建縣治以扼其要害將來之事斷未可知臣等班師之日脅從投招者尚不滿百今未兩月逺近牽引而至且二百矣若縣治不立制馭闊踈不過一年泛然投招之人必皆復化為盜其時又復興師征剿剿而復聚長此不已亂將安窮夫盜賊之患譬如病人興師征剿者針藥攻治之方建縣撫輯者飲食調飬之道徒恃針藥之攻治而無飲食以調飬之豈徒病不旋踵將元氣遏絶症患愈深後雖扁鵲倉公無所施其術矣臣等竊以設縣移司實為久安長治之䇿伏願皇上鑒往事之明驗為將來之永圖念事機之不可失哀民困之不可再俯采臣等所議特勑該部早賜施行及照建縣之所地名和平以地名縣以為得宜乞從所奏并將該設職官印信即與銓選鑄給簡員以省費均地以平徭移巡司以據險要寬賦役以蘇窮民如此則夷險為易化盜為良可計日而效不惟臣等得以幸逃日後之譴責朝廷亦免再役之動百姓永享太平之樂矣三省夾剿捷音疏十三年六月十五日具廣東按察司等衙門整飭兵備監統僉事等官王大用等呈正德十二年九月內具樂昌縣知縣李增稟稱賊首龔福全髙快馬等不時出沒為患近蒙軍門案驗內開三省會兵進剿緣照官兵未到誠恐各賊探知自分必死羣合四出攻劫不惟居民受害抑恐患及城池議要從宜設法以緩其勢待軍兵到日另行遵奉號令等因本職看得各賊俱係先前大征漏網招亡納叛蹤迹詭祕為今之計必先誘其腹心以為我用然後以次剪其羽翼庶以賊攻賊彼勢可孤而我患可保巳經呈奉軍門議處設法誘致去後續據知縣李增報稱岐田山賊犯龍貴等十二名天塘賊犯陳滿等十名各挈家赴縣首願擒獲同伴解官于本年十一月二十八日督同龍貴等計誘賊犯蕭緣等六十名十二月𥘉二日陳滿等計誘賊犯李廷茂等二十三名等因及據通判鄒級仁化縣知縣李蕚呈稱大賊首髙快馬帶從賊一十五名賊婦二口潛住地名癩痢寨深坑結巢藏住隨統民壯兵夫談志澤等于閠十二月𥘉一日戍時進兵圍寨至𥘉二日早擒捕本賊突出山頭迎敵追至始興縣界各兵奮勇同前生擒大賊首髙快馬即髙仲仁從賊三名賊婦賊女各一口及行凶器械并𬒳傷兵夫劉廷珍等開報到道節據知府姚鵬等呈稱督率軍兵夫快抵巢與賊交鋒陸續擒斬首從賊犯李萬山賴永逹等一千三百二十名顆俘獲賊屬男婦七十六名口奪回𬒳虜男婦一十三名口及贓仗牛馬等物又據知縣李增呈緝得賊首李斌亡命在湖廣烏春山躲住飛報到職當就發遣捕盜老人李攻瓉等星夜潛至地名薑陽洞藏蹤緝探始擒本賊餘黨俱各奔遁緣由各開到道參稱賊首李斌節與髙快馬龔福全等紏衆流毒三省屢勞征討各遵奉軍門號令窮追深入一旦就擒各照懸示重賞而知縣李增督兵設䇿屢有竒功亦合奬勞以勵將來等因備呈轉報到臣亦據整飭兵備兼分巡嶺東道監統僉事等官顧應祥等呈據領哨通判莫相等呈稱統領漢逹官軍民壯打手人等照依刻期進剿上下橫溪闕洞深洞等巢賊黨堅立排柵統衆迎敵殺傷兵夫彼時軍兵協謀奮勇鬪戰當將各巢攻破陸續擒斬賊犯吳瑄鄧仲玉等共六百九十名顆俘獲賊屬男婦三百九十五名口奪回𬒳虜男婦七口及牛馬器械等物解送前來會審又發兵搜斬賊級一十二顆生擒賊人三名并俘獲賊屬等項隨據本官稟稱橫溪大賊首吳招集亡命遁住地名東田村深山結巢即稟蒙監督僉事顧應祥出給重賞指示方略密切發兵抵吳巢穴四面圍攻𬒳等亂用藥弩射出拒敵我兵冒傷奮勇進剿先用銃箭將吳打倒賊勢少却我兵呼噪大進將吳等首從并賊屬盡數擒斬共十三名顆俘獲賊屬六口奪回𬒳虜婦女二口陳亡兵夫六口緣由呈解到道看得賊首吳係是稔惡巨寇流劫兩省拒敵官軍而通判莫相設法防捕致縛前凶應合奬勞等因備呈開報到臣查得先準兵部咨為地方緊急賊情事該巡撫湖廣都御史秦金奏該本部覆題看得郴桂等處與廣東江西諸洞聮絡若非三省會兵夾攻賊必遁散他處合無請勑兩廣并南贛總督巡撫等官會同尅期進兵等因具題節奉聖旨是都依擬行欽此續為申明賞罰以勵人心事臣節該欽奉勑諭但有盜賊生發即便嚴督各該兵備守備守巡并軍衛有司設法勦殺其領兵官員不問文職武職若在軍前違期并逗遛退縮者俱聽以軍法從事仍要選委廉能屬官密切體訪或僉所在大戶量加糧賞或購令賊徒自相斬捕皆聽爾隨宜處置欽此又準兵部咨為地方緊急賊情事內開節據樂昌縣知縣李增稟稱賊首髙快馬等八百餘徒在地名匱頭村行劫又據乳源縣稟稱賊徒千餘人在洲頭街流劫及據湖廣郴州申賊首龔福全髙仲仁等雖蒙征剿黨惡猶存正德七年兵備衙門招撫龔福全給與冠帶設為猺官髙仲仁等給與衣巾設為老人未及兩月巳出要路劫殺軍民號稱髙快馬逰山虎金錢豹過天星密地蜂總兵等官名目正德十一年七月內流劫樂昌及江西南康等縣後蒙撫諭將髙仲仁李斌給與冠帶重設猺官未寧半月一起八百餘徒出劫樂昌虜捉知縣韓宗堯一起七百餘徒出劫生員談明浩等家一起六百餘徒從老虎洞等處出劫一起五百餘徒從興寧縣出劫呈乞轉逹請軍夾勦等因各報到臣看得前項盜賊惡貫巳盈神怒人怨譬之疽癰之在身若不速加攻治必至潰肺決腸而攻治之方亦有二説等因該本部覆題看得所奏攻治盜賊二説大意謂事權隆重若無意于近功而實足為攻取之幾征調四集雖可以分咎而不免為地方之纍窮究根本辨析詳明言雖兩端意實有在合無本部行文就令差來人賫回交與都御史王守仁悉依前項申明賞罰事理便宜行事期于成功不限以時相機攻勦等因具題節該奉聖旨是欽此欽遵節經通行各省及各該道守巡兵備等官一體欽遵勘處調集兵糧尅期攻勦以靖地方續據廣東布政司等衙門左布政使等官吳廷舉等會呈奉臣并總督兩廣軍務兼理巡撫太子太保都察院左都御史陳金案驗各準兵部咨備行欽遵查勘計處呈報等因遵依會同都布按三司等官歐儒等并嶺東道兵備僉事等官王大用等議將應剿賊巢起調漢逹官軍上兵員名分定哨道監統把截進攻道路及合用糧餉等項備開呈詳隨據監督兵備僉事王大用等各將進兵機宜呈詳到臣參看得兩廣總督總兵等官雖巳奉命行取回京然軍馬錢糧調度方略悉經區畫會有成案本院見督官兵征剿浰頭等賊未能親往督戰除分兵設䇿督令副使楊璋等四面防截外仰各官查照原議上緊依期進剿毋得遲疑參錯致誤事機一應臨敵制度俱在各官相機順應若賊勢難為兵力不逮或先離散其黨與或隂誘致其腹心聲東擊西陽背隂襲勿拒一議惟求萬全軍門遙逺不必一一呈稟反成牽滯又經牌仰上緊相機督剿去後今據前因除將各道呈報前項擒斬首從賊人賊級共二千八百九名顆俘獲賊屬并奪回𬒳虜男婦五百四名口奪獲器械贓物一百三十二件把牛馬八十三隻匹總計二千八百八名顆口隻匹件把行仰各道徑送巡按紀功御史審驗紀録造册奏繳外參照大賊首髙仲仁李斌吳等荼毒三省稔惡多年敵殺官兵攻劫郡縣即其姦計雖亦不過妖狐黠鼠之謀就其虐熖乃已漸成封豕長蛇之勢今其罪貫既盈神怒人怨數月之間克遂殱殄雪百姓之冤憤解地方之倒懸此皆仰仗天威廟堂有先勝之算帷幄授折衝之謀賊徒破膽將士用命之所致也臣等獲暏成功豈勝慶幸及照巡按紀功御史毛鳯振揚風紀作勵將士既盡紀驗之職復多調度之方比于常格勞績尤異僉事王大用顧應祥等監統督調備效勤勞懋著經營之略共收克捷之功其都指揮王英歐儒知府姚鵬通判鄒級莫相知縣李增李萼或領兵督哨或追剿防截類皆身親行陳且歷艱難均合甄收普加旌擢伏望皇上既行大賞于朝復沛覃恩于下庶示激奬以勸後功臣以凡庸兼復多病繆膺地方之責屬征調四出不能身親督戰然賴總督諸臣先巳布授方略領哨諸將得以遵照奉行戮力效死竟收完績真所謂碌碌因人成事雖無共濟之功實切同舟之幸除先巳具本請罪告病乞休外緣係捷音事理為此具本題知辭免升廕乞以原職致仕疏十三年六月十八日臣于六月𥘉六日準兵部咨為捷音事該臣題該本部覆題節該奉聖旨王守仁升右副都御史廕子一人做錦衣衛世襲百户寫勑奬勵欽此欽遵臣聞命驚惶莫知攸措感極而懼若墜氷淵切念臣以章句腐儒過蒙朝廷滌瑕掩垢收録于擯棄之餘既又求長于短拔之間散之中授以巡撫之寄其時臣以抱病在告兩疏乞休偶值前官有託􅍚避難之嫌該部論奏之義甚嚴朝廷督責之旨又切遂不遑他計狼狽就途蒞事之後兵耗財匱盜熾民窮縮手四顧莫措一籌朝廷憫念地方之顛危慮臣才微力弱必致傾僨謂其責任之不專無以連屬人心賞罰之不重無以作興士氣號令之不肅無以督調逺近于是該部議假臣以賞罰朝廷從而假之以賞罰議給臣以旗牌朝廷從而給之以旗牌議改臣以提督之任朝廷從而改之以提督之任授之方略而不拘以制責其成功而不限以時由是臣以賞罰之柄而激勵三軍之氣以旗牌之重而號召逺近之兵以提督之權而紀綱八府一州之官吏伸縮如志舉動自由于是兵威漸振賊氣先奪成軍而出一鼓而破橫水再鼓而滅桶岡全師克捷振旅復舉又一鼓而破三浰再鼓而下九連皆役不再藉兵無挫刃分巡官屬賫執旗牌以麾督兩廣夾剿之師亦莫不畏威用命咸奏成功由是言之其始捉臣之來蒞事者該部之議朝廷之斷也旗牌之能號召者該部之議朝廷之斷也提督之能紀綱者該部之議朝廷之斷也方略之所分布舉動之得展舒者該部之議朝廷之斷也臣亦何功之有而敢冒承其賞乎譬之駑駘之馬而得良御齊輯乎㘘銜之際而緩急乎唇吻之和內得于人心外合于馬志故雖駑下亦能盡日之力而至百里人見其駑而百里因謂之能不知其能致此皆御馬者驅䇿之力不然將數里而踣或十數里而止矣馬之疲勞或誠有之而遂以歸功于馬其可乎况臣驅逐之餘疾病交作手足麻痺漸成廢人前在賊巢巳嘗具本請罪告病乞休日夜伏候允報庶幾生還畎畝乃今求退而獲進請咎而蒙賞雖臣貪冒垂涎忍耻苟得其如朝廷賞功之典何伏望皇上推原功之所始無使賞有濫及收回成命臣苟有微勞不加罪戮容令仍以原職致仕延餘喘于田野如此則上無􆀪恩下無姦賞宣力受任者得免于覆餗之誅量能度分者獲遂其知止之願臣無任感恩懼罪懇切祈望之至再議崇義縣治十三年十月十一日據江西按察司分巡領北道兵備副使楊璋呈奉臣案驗準户部咨覆題建立縣治以期久安事卷查先該本道議橫水地方應行事宜開列條欵備呈提督軍門議委南康縣縣丞舒富將大庾南康上猶三縣機快各點集三百名分作三班專委本官統領來往巡視如有餘黨復集即便擒拏有功一體轉逹升賞及于三縣起人夫各一百名分作三班就委本官不妨往來巡邏兼督採辦木植燒造磚瓦等役俱經備行本官將開去事宜查照施行外隨奉提督軍門批據縣丞舒富呈稱依奉前去橫水建立縣治處所將縣治公𪠘儒學殿廡堂齊布按分司及府館旌善申明等亭倉厫牢獄養濟倉場等房并城中街道帶同地理隂陽曽成倫等定立向止分處停當巳經畫圖貼説呈報外合用木植督令義官李玉璽前去地名左溪關田等處採運隨拘各項木作於正德十三年四月𥘉六日起于興工即今先將縣治并儒學起造將完各分司等衙門料物皆備亦皆陸續起造但甎瓦灰泥等匠工食應該估計不若包工論價庶使工程易完巳經督同備估共該銀一千零七十一兩七錢九分四釐請給錢糧支用等因批行本道再與詳審看得所呈修理次第已是停當所議包工論價亦為有見合行贛州府將大征支剩銀兩照數支給應用及照衙門既已建立必須城池保障合無仍行通行計處城墻周圍髙闊丈尺工食或先築土城待後包砌或應一時兼舉就行本官會同各縣掌印官查照里分糧數多寡均派修築與夫城門城樓之費一併估修已經備由通行呈奉撫按衙門依擬施行俱行贛州府照數查發及行縣丞舒富遵照支散估修外續據縣丞舒富呈稱量計新縣城墻周圍五百丈即今新築土城髙一丈七尺面闊七尺五寸腳闊一丈若令三縣里甲自行修築不無延捱必須顧倩泰和縣上工數百先築土城自七月十一日起工扣至八月終土城可以通完然後用甎包砌庶得堅久其三縣徴收工價解給庶得實用并將城門城樓城墻築砌甎石工食共計估該銀八千四十五兩六錢七分二釐備由開呈等因奉批仰分巡道再加議看施行查得大庾等縣共計僅五十二里而估計銀兩頗多疲弊之民誠所不堪及照大征變賣賊屬牛馬贓銀二千六百七十一兩四錢九分及本道問過贓罰𥿄米價銀一千餘兩見在合查啇稅銀輳輔三百七十四兩八分二釐共四千四十五兩六錢之數先行給發止餘四千兩查將三縣丁糧通融分派責委公正官員徴收監督禁革侵漁騷優等因備由呈奉提督軍門批役三縣而建橫水似亦動衆勞民建橫水而屏三縣實乃一勞永逸但當疲困之餘務以節省為貴議該并縣最合事宜非獨民減科優抑且財獲實用仰悉照議施行仍行各縣痛禁里胥不得侵漁騷優曉諭居民各宜樂事勸工毋忘既往之患共為久安之圖呈繳依奉遵照查支分派修理去後今照前項縣治學校分司各該衙門蓋造將完而土城扣至八月終亦可完官民住坐可保無虞燒甎包砌計亦不難其街道市㕓俱有次第啇賈往來漸將貿易緣縣名未立官員未除所轄里分之民心罔知趨向所安新民之版籍尚未歸著及照縣治既建凡百草創為縣官者若非熟知地方與凡捕盜安民之術民情土俗之宜皆能洞曉舉而用之鮮不敗事隨會同江西布政司分守嶺北道左叄政吳大有議得縣丞舒富先因前賊攻圍該縣戮力拒賊得以保全後因大征領哨獲功居多賊首謝志山獨為所獲續委巡視三縣招安新民六百餘名帖然安堵復委督修前項縣治衙門城池半年俱各就緒今委署掌上猶縣事百廢俱興及訪本官存心剛直行事公平歷官已及四年未有公私過犯雖未出身學校經義亦能通曉合無念新縣草創之功百務鼎新之始轉逹具奏升以新縣知縣職事然而升授正官或于事例有礙合無量授府州佐二之職令其署掌新縣縣事候數年後地方安妥另行改選庶官得其人事得其理而地方可保無虞等因據呈到臣卷查先據副使楊璋叄議黃宏會呈上猶等縣羣賊猖獗為害幸蒙提督軍門躬督諸軍蕩平巢穴三縣之民歡欣鼓舞如獲更生但恐大兵撤後餘黨未免嘯聚要于橫水等處建立縣治併巡司等衙門以絶後患實為久安長治之䇿等因巳經批仰該道重覆查勘無異會同江西巡撫都御史孫燧巡按江西監察御史屠僑處議明白各具本奏請定奪去後隨準户部咨該本部覆題看得添設縣治既該府按官員會議相應依擬合咨提督南贛汀漳軍務左僉都御史王守仁同撫按官會委該道守巡官選委府縣佐二能幹官員先將添設縣治合用一應材木甎瓦等物料先為措置收買并顧覔人夫工匠價銀逐一估計輳處就便興修務使工日就而民力不勞物咸備而財用不乏候城池公宇縣治學校倉厫街道民居吏舍等項粗有規制另為會奏以慿上請定擬縣名及咨吏禮二部選官鑄印施行等因具題奉聖旨是欽此及準兵部覆題議得勘亂于已發固為有功弭亂于未然尤為有見今都御史王守仁與巡撫巡按及守巡官深謀逺慮議建縣治巡司以控制無統之民事體民情俱各順當及先編僉隘夫委官守把事在必行不可猶豫合無本部將開設縣治一節移咨户部奏請定立縣名速行遵守仍依所奏添設長龍鉛厫二巡檢司及將過步巡檢司行移吏禮二部選調官員鑄換印信條記并行江西布政司查撥吏役編僉弓兵中間一應事宜悉聽都御史王守仁會同巡撫都御史孫燧查照原擬從宜處置務在事體穩當賊害絶除期副委任等因具題奉聖旨是欽此欽遵備行守巡該道一體欽遵施行仍呈撫按衙門知會外今呈前因臣會同巡撫江西等處地方都察院右副都御史孫燧巡按江西監察御史屠僑議照該道所呈前項縣治學校分司等衙門蓋造不日通完而城池砌築亦巳將備惟稱新縣草創之𥘉百務鼎新必須熟知民情土俗之宜者以為縣官及會訪縣丞舒富才力堪任乞要量升府州佐二之職令其署掌新縣一節實亦酌量時宜保土安民之意伏望皇上憫念逺土凋敝之餘小邑草創之始乞勑該部俯採會議原由再加審察將縣丞舒富量為升職管理新縣或别行咨訪諳曉夷情熟知土俗剛果有為者前來開創整理庶幾瘡痍之民可以漸起而反覆之地得以永寧矣再議平和縣治疏十三年十月十五日據福建布政司呈稱漳州府知府鍾湘關稱正德十二年四月撤兵之時蒙福建參政陳策副使唐澤批據南靖縣儒學生員張浩然等及據本縣清寧河頭社義民鄉老曾敦五林大俊等各呈要于河頭地方添設縣治以控制賊巢建立學校以易風俗改移小溪巡檢司以防禦緩急行仰本職踏勘隨即呈蒙漳南道兵備僉事胡璉督同本職并南靖縣知縣施祥等踏勘河頭大洋陂一處堪設縣治枋頭板一處堪設巡檢司委果人心樂從一勞永逸議將南靖縣清河寧里二啚新安里三啚漳浦縣二都二圖三都十圖計一十二圖十班人戶查揭册籍割屬新設縣治管攝其南靖縣止有一十八圖應當里役邑小事繁辦納不前又查龍溪縣原有一百五十二圖內有二十一都并二十五圖地方與南靖密邇相應撥輔管轄截長輔短里甲便于應當錢糧易于催辦事頗相應轉呈鎮巡撫按等衙門各具本題奉欽依準于前項地方添設縣治及改移巡司衙門其縣名并該設官吏印信行令布政司徑自奏請給賜銓撥鑄降合用木石灰瓦等料先儘本府并所屬縣分在庫贓罰銀兩支給買辦若有不敷從宜處置不許動支軍餉錢糧及科取小民等因隨即呈委南靖縣知縣施祥漳平縣知縣徐鳯岐董工興作于正德十二年十二月𥘉九日本職督同各官親到河頭告祀社土伐木興工至次年五月內據知縣徐鳳岐呈報外築城垜俱已完備惟表城因風雨阻滯期在九月工完及據知縣施祥呈報縣堂衙宇幕􅈦儀門六房及明倫堂俱各堅完惟殿廡分司府館倉庫城隍社稷壇亦因風雨阻滯次第修舉期在仲冬工完又據南靖縣縣丞余道呈稱帶同木石匠陳恩欽等前到漳汀枋頭板地方丈量土城周圍一百一十丈顧募鄉夫舂築完固給發官銀砍辦木植督造巡司公館前􅈦各一座儀門一座鼓樓一座後堂各一座各蓋完備惟土城公館巡司廂房欠瓦暫將茅覆候秋成農隙修舉等因隨于正德十三年三月𥘉六日行令小溪巡檢郭森前去到任前去地方今據各委官員呈報功已垂成勢不容緩照得縣名須因土俗本職奉委親歷諸巢詢知南靖縣河頭等鄉俱屬平河社以此議名平和縣及割南靖縣清寧里七圖新安里五圖共計糧三千九百九石六斗七升四合七勺五抄計一十二里合為裁減縣分一知一典治之原議漳浦縣二都二圖三都十圖地方隔逺民不樂從今議不必分割再照新縣所屬多係新民須得廉能官員庶幾開新創始事不煩而民不優其學校教官合無止選一員署印先行提學道將清寧新安二里見在府縣儒學生員就便撥輔廪增之數其有不足于府縣學年深增附內量撥充輔又或不足于新民之家選取俊秀子弟入學使其改心易慮用圖自新及照南靖縣邑小事繁分割一十二里添設新縣辦納愈見不堪合無亦作裁減縣分以一知一典治之又查得龍溪縣一百五十二圖內將二十一都七圖二十五圖共計一十二圖計糧一千六百八十一石七斗七升三勺八勺三抄撥輳南靖縣抵納糧科又照南靖小溪巡檢司既已改立漳汀合改漳汀巡檢司印信奏請改鑄并新縣儒學醫隂陽等衙門俱例該鑄印信緣由備申到司轉呈到臣卷查先據福建漳南道兵備僉事胡璉呈前事已經查勘無異具由奏請定奪去後續據該道呈備知府鍾湘呈將分割南靖等縣都圖隨近新設縣治管攝以辦糧差并估計過城垣城樓窩鋪等項工料銀兩數目及查府庫各項官銀實有一萬餘兩堪以支用要行委官擇日興工築砌緣由備呈到臣看得開設縣治既以事體相應已行具奏及令該府一面俯順民情動支銀兩興工外其間分割都圖議估工價一應事務軍門路逺難以遙斷皆須該道及該府親民各官自行查勘的確果已宜于民情便于事體無他私弊即便就行定議以次舉行候奏準命下之日應奏聞者若更繁文往復徒爾遲誤日月無益于事又經批仰著實幹理仍行鎮守巡按衙門知會間隨準户部覆題內開前項情節既該本官勘處停當具奏前來相應依擬合無本部仍行左僉都御史王守仁再查無異準于前項地方添設縣治及改移巡檢司衙門等因具題奉聖旨是這添設縣治事宜各依擬行欽此欽遵備咨前來節經行仰福建布政司及分巡漳南道轉行該府一體欽依施行去後今據前因參看得所呈新設縣治既已議名平和小溪巡檢司改名漳汀巡檢司及學校例該一正二副今稱草創之𥘉止乞選官一員掌管并撥輔廪增生員等項俱于事體相應除行該司徑自具奏外為照南靖縣原係全設衙門今既分割都圖添輔新縣委係邑小費繁似應裁減止用一知一典已足敷治又龍溪縣一百五十二圖將二十一都七圖二十五都五圖共計一十二圖撥輳南靖抵納糧差揆于事體頗亦均平伏望皇上俯順下情乞敕該部議處裁撥庶幾量地制邑得繁簡之宜而興事任功從逺近之便緣係裁減官員及撥都圖事理為此具本請旨再請疏通鹽法疏十三年十月二十二日據江西按察司分巡嶺比道兵備副使楊璋呈備贛州府呈蒙備仰本府即將正德十二年正月起至九月終止抽過稅銀及上猶龍川兩次用兵支過軍餉并今餘剩銀兩查報等因依蒙查得正德十一年十二月終止舊管銀三千五百七十四兩三錢一釐二絲一忽九微并新收正德十二年正月起至正德十三年九月終止共抽過啇稅銀一萬六千七百八十八兩五錢八分七釐七毫五絲兩次用兵共用過銀四萬七千二百八十七兩二錢二分八釐四毫三絲八忽六微米九千九百四十九石五斗六升九合四勺四抄榖五百三十九石四斗內除提督南贛汀漳等處軍務都察院左僉都御史王守仁查發𥿄米價銀八十九兩六錢巡撫江西等處地方都察院右副都御史孫燧查發𥿄米價銀二千兩本道查發𥿄米價銀七千八百二十兩二錢七分八釐六毫南贛二府查出在庫賊罰缺官柴薪等項銀一萬九千五十九兩四分六釐六毫八忽三微外實支用過啇稅銀一萬八千三百一十八兩三錢三釐三毫三絲三微見今餘剩銀二千四十四兩五錢八分五釐七毫五絲一忽六微等因開報到道案查先為比例請官專管抽分以杜姦弊事準户部咨該巡撫右副都御史周南題備仰本道照奉欽依事理即將所收啇稅再行參酌從輕定議則例仍嚴加稽考務使稅課所入隨多寡以為數而不以多取為能其廣東鹽課許于南贛二府發賣不許再行抽稅袁臨吉三府不係舊例行鹽地方不許到彼發賣所抽分啇稅除軍餉聽巡撫都御史動支外其餘不詐擅動年終差人解部輳支光祿寺賖欠鋪行厨料果品支用以省加派小民仍將再議過緣由呈報施行等因行據贛州府呈稱依奉將貢水該抽諸貨從輕定擬則例及開稱廣東鹽引不許放過袁臨吉三府發賣等因備呈本院詳允出給禁約及將餘剩銀二千九百六十七兩一錢八分二釐二毫三絲一忽九微行令起解間隨據該府呈奉巡撫江西等處地方都察院右副都御史陳金批看得該府連年用兵之費所積不多近又定擬除減所入亦少况地方盜賊不時竊發别無堪動錢糧將餘剩稅銀暫且存留在庫以備軍餉等因已該前兵備副使陳良珊將自正德六年十一月二十七日立厰抽分起至正德十二年終止造册差舍人王鼎續該本職將正德十一年正月起至本年十二月終止造册差舍人屠賢各奏繳訖本年九月二十六日抄奉提督軍門案驗準户部咨傋行本道照奉欽依事理將廣東官鹽暫許袁臨吉三府發賣自今為始至正德十三年終止仍將先次未解并今次抽稅過銀兩支用過數目緣由造册徑自奏繳及造清册賚送該部并本院查考除遵奉外查得正德十三年將終及上猶龍川兩處征剿事畢所據商稅收支應該造册解繳備行該府查報去後今據前因查得南贛地方兩次用兵中間啇稅實為軍餉少助然而啇稅之中鹽稅實有三分之二為照南贛二府與廣東翁源等縣壤地接連近該兩廣具奏征剿前賊乘虗越境難保必無見今府庫空虗民窮財盡將來糧餉絶無仰給况此鹽利一止私販復生雖有禁約勢所難遏與其利歸于姦人孰若有助于軍國合無轉達將前項鹽稅著為定例許于袁臨吉三府地方發賣照舊抽稅以供軍餉每年終依期造報餘剩之數解部轉發光祿寺支用以省加派小民如此則姦弊可革軍餉有賴光祿寺供用亦得少資誠所謂一舉而數得矣呈乞照詳轉逹等因具呈到臣查得接管卷內先為處置鹽鐡以充軍餉事江西布政司呈奉總制江西左都御史陳金批查得廣西嶺北二道灘石險惡淮鹽不到啇人往往私販廣鹽射利肥已先蒙總督衙門奏準廣鹽許行南贛三府發賣仰令南雄照引追納采價類解梧州軍門官啇兩便軍餉充足當時止是奏行南贛不曾開載袁臨吉三府合無遵照勑諭便宜處置暫將廣鹽許下三府發賣立厰盤掣以助軍餉隨該布政司管官劉杲等議稱委果于事有益于法無礙具呈詳允批行遵照立厰抽稅等因續該戶部覆議內開廣東鹽課許令南贛二府發賣不許到于袁臨吉三府備行禁革外正德十二年正月十五日臣撫臨贛州隨據副使楊璋呈稱奏調三省官兵夾剿上猶等巢糧餉所費約用數萬石若不早行計處必致有誤軍機查得前項鹽法準行南贛二府販賣果係一時權宜不係洪武年間舊例合無查照先年便宜事例行令前啇許令袁臨吉三府販賣所收銀兩少備軍餉候事少寧另行具題禁止等因呈詳到臣看得即今調兵夾勦糧餉缺乏遵照勑諭徑自區畫事理批行該道暫且照議施行候平定之日照舊停止具題去後隨準戶部覆議將廣東官鹽暫于袁臨吉三府發賣至正德十三年終止行該道官照前抽分將稅課供給軍餉不許多取妄用至期照舊停止等因具題奉聖旨是欽此欽遵已經轉行該道一體欽遵去後今呈前因為照袁吉等地方溪流湍悍灘石峻險淮鹽逆水而上動經旬月之久廣鹽順流而下不過信宿之程故民苦淮鹽之難而惟以廣鹽為便自頃奉例停止官府但有禁革之名其實私鹽無日不行何者因地勢之便從民心之欲非但不能禁之于私每遇水發啇舟動以百數公然蔽河而下如發機之弩官府邏卒寡不敵衆袖手岸傍立視其過孰得而沮遏之故廣鹽行則啇稅集而用資于軍餉賦省于貧民廣鹽止則私販興而弊滋于姦穴利歸于豪右此近事之既驗者今南贛盜賊雖已仰仗天威克平巢穴然漏殄殘黨難保必無且地連三省千數百里之內連峰參天深林蔽日其間已招之新民尚懷反覆未平之賊壘多相勾聮乘間窺竊不時而有方圖保戍之䇿未有撤兵之期况後山從化等處見在調兵征剿臣亦繆承方略之命師行糧食勢所必然今府庫空虗民窮財盡若鹽稅一革軍餉之費苟非科取于貧民必須仰給于內帑夫民巳貧而斂不休是驅之從盜也外巳竭而殫其內是復殘其本也矧內帑之發非徒緩不及事抑恐力有未敷臣切以為宜開復廣鹽著為定例籍其稅課以預備軍餉不時之急積其羡餘以少助內府缺乏之需實亦公私兩便內外兼資夫聚斂以為功臣之所素耻也掊克以招怨臣之所不忍也况臣廢􅍚日深決于求退已可苟避地方之責但其事勢不得不然若已革而復舉是遺後人以所難而于職守為不忠矣願皇上憫地方之瘡痍哀民貧之已甚慮軍資之乏絶察臣心之無他特勑該部俯采所議酌量裁處早賜施行則地方幸甚升廕謝恩疏十四年正月𥘉二日正德十三年六月𥘉六日準兵部咨為捷音事該臣題該本部覆題節該奉聖旨王守仁升右副都御史廕子一人做錦衣衛世襲百户寫勑奬勵欽此備咨欽遵臣竊自念功微賞重深懼冒濫之誅已于本月十八日具本乞恩辭免升廕容照原職致仕復蒙聖旨王守仁才望素著屢次剿賊成功陛官廕子宜勉遵成命不準休致該部知道欽此備咨欽遵臣聞命自天局身無地竊惟因勞而進秩者朝廷賞功之典量能而受祿者人臣自守之節故功宜惟重雖聖帝之寬仁而食浮于行尤君子所深恥陛下之賜行其賞功之典也臣之不敢當者亦惟伸其自守之節而巳軍志有之該罰而請不罰者有誅該賞而請不賞者有誅古之人君執其賞罰堅如金石信如四時是以令之所播如轟霆兵之所加無堅敵而功之所成無愆期今日之事兵事也漢臣趙充國云兵事當為後法臣誠自知貪冒之恥然亦安敢狗一巳之小節以亂陛下之軍政乎但廕子實非常典私心終有所未安黽勉受命憂慚交集自恨疾病之已纏深懼圖報之無日感激洪恩莫知攸措除别行具本請罪乞休外為此具本稱謝乞放歸田里疏十四年正月十四日正德十三年十月𥘉二日準吏部咨該臣奏為久病待罪乞恩休致事奉聖旨王守仁帥師討賊賢勞懋著偶有微􅍚者善調理以副委任所辭不允該部知道欽此備咨欽遵又于本年十二月二十九日準吏部咨該臣奏為乞恩辭免升廕容照原職致仕事奉聖旨王守仁才望素著纍次剿賊成功升官廕子宜勉遵成命不準休致該部知道欽此備咨欽遵除巳具本謝恩外竊惟聖主之任官也因才而器使不強人以其所不能是以上無廢令而下無棄才人臣之受職也量力而承事不強圖其所不任是以言有可底之績而身無鰥曠之誅歷考往昔蓋未有不如此而可以免于愆譴者也臣以狂愚收録擯廢繆蒙推拔授寄軍旅當時極知叨非其分不敢冒膺辭避未伸而迫于公議倉卒就道既已抵任則復黽勉從事私計迂怯終將僨敗遭際聖明德威震赫扶病䇿駑仰遵成算不意偶能集事苟免顛覆實皆出于臆料之外然此僥幸之事豈可恃以為常者哉廟堂之上不暇深察其所以增其祿秩將遂舉而委之人苦不自知耳臣之自量則既審且熟深懼戮亡之無日也譬之懦夫駕破敗之舟以涉險偶遇順風安流幸而獲濟舟中之人既已狼狽失措而岸傍觀者尚未之知以為是或有能焉且將使之積重載衝冒風濤而試洪河大江之中幾何其不淪溺也已今四方多故鑾輿逺出大小臣工惶惶旦暮臣雖鄙劣竭忠效命以死國事亦其素所刻心安忍託故苟求退遁顧力纎負巨如以蒿支棟據非其任遂使殞身徒以敗事亦何益矣且臣比年以來百病交攻近因驅馳賊壘瘴毒侵陵嘔吐潮熱飢骨羸削或時昏昡偃几仆地竟日不惺手足麻痺已成廢人又以百歲祖毋卧病床褥切思一念為訣悲苦積鬱神志耗毦視聽恍惚隔宿之事不復記憶以是求延旦夕之生亦已難矣而况使之當職承務從征討之後其將能乎夫豢畜牛羊細事耳亦且求良牧而付之况于軍務重任生靈休戚之所關乃以疾廢瞶眊之人覆敗之戮臣無足論其如陛下一方之寄何伏願陛下念四省關係之大不可委于匪人察病廢枯杇之才不宜付以重任憐桑榆之短景而使得少遂其烏鳥之私録犬馬之微勞而使得苟延其螻蟻之息别選賢能委以兹任放臣暫歸田里就醫調治倘存餘喘尚有報國之日臣不勝感恩待罪懇切哀望之至王文成公全書卷之十一終王文成公全書卷之六文録三書書三始嘉靖丙戌至戊子寄鄒謙之丙戌比遭家多難工夫極費力因見得良知兩字比舊愈加親切真所謂大本逹道舍此更無學問可講矣隨處體認天理之説大約未嘗不是只要根究下落即未免捕風捉影縱令鞭辟向裏亦與聖門致良知之功尚隔一塵若復失之毫釐便有千里之謬矣四方同志之至此者但以此意提掇之無不即有省發只是著實能透徹者甚亦不易得也世間無志之人既已見驅於聲利詞章之習間有知得自己性分當求者又𬒳一種似是而非之學兜絆羈縻終身不得出頭緣人未有真為聖人之志未免挾有見小欲速之私則此種學問極足支吾眼前得過是以雖在豪傑之士而任重道逺志稍不力即且安頓其中者多矣謙之之學既以得其大原近想涉歷彌久則功夫當益精明矣無因接席一論以資切劘傾企如何范祠之建實亦有禆風教僕於大字本非所長况已久不作所須祠扁必大筆自揮之乃佳也使還值歲冗不𣣔盡言二丙戌承示諭俗禮要大抵一宗文公家禮而簡約之切近人情甚善甚善非吾謙之誠有意於化民成俗未肯汲汲為此也古禮之存於世者老師宿儒當年不能窮其説世之人苦其煩且難遂皆廢置而不行故今之為人上而𣣔導民於禮者非詳且備之為難惟簡切明白而使人易行之為貴耳中間如四代位次及祔祭之類固區區向時欲稍改以從俗者今皆斟酌為之於人情甚協蓋天下古今之人其情一而已矣先王制禮皆因人情而為之節文是以行之萬丗而皆凖其或反之吾心而有所未安者非其傳記之訛闕則必古今風氣習俗之異宜者矣此雖先王未之有亦可以義起三王之所以不相襲禮也若徒拘泥於古不得於心而冥行焉是乃非禮之禮行不著而習不察者矣後世心學不講人失其情難乎與之言禮然良知之在人心則萬古如一日苟順吾心之良知以致之則所謂不知足而為屨我知其不為簣矣非天子不議禮制度今之為此非以議禮為也徒以末世廢禮之極聊為之兆以興起之故特為此簡易之説欲使之易知易從焉耳冠婚喪祭之外附以鄉約其於民俗亦甚有輔至於射禮似宜别為一書以教學者而非所以求諭於俗今以附於其間却恐民間以非所常行視為不切又見其説之難曉遂并其冠婚喪祭之易曉者而棄之也文公家禮所以不及於射或亦此意也歟幸更裁之令先公墓表決不負約但向在紛冗憂病中近復咳患盛作更求假以日月耳施濮兩生知解甚利但已經爐鞲則煆煉為易自此益淬礪之吾見其成之速也書院新成𣣔為諸生擇師此誠盛德之事但劉伯光以家事捉歸魏師伊乃兄適有官務倉卒往視何廷仁近亦歸省惟黃正之尚留彼意以登壇説法非吾謙之身自任之不可須事定後郤與二三同志造訪因而連留旬月相與砥礪開發效匡翼之勞亦所不辭也祠堂位次祔祭之義往年曽與徐曰仁備論曰仁嘗記其略今使録一通奉覽以備採擇或問文公家禮髙曽祖禰之位皆西上以次而東於心切有未安陽明子曰古者廟門皆南向主皆東向合祭之時昭之遷主列於北牖穆之遷主列於南牖皆統於太祖東向之尊是故西上以次而東今祠堂之制既異於古而又無太祖東向之統則西上之説誠有所未安曰然則今當何如曰禮以時為大若事死如事生則宜以髙祖南向而曽祖禰東西分列席皆稍降而弗正對似於人心為安曾見浦江鄭氏之祭四代考妣皆異席髙考妣南向曾祖禰考皆西向妣皆東向各依世次稍退半席其於男女之列尊卑之等兩得其宜今吾家亦如此行但恐民間廳事多淺隘而器物亦有所不備則不能以通行耳又問無後者之祔於己之子姪固可下列矣若在祖宗之行宜何如祔陽明子曰古者大夫三廟不及其髙矣適士二廟不及其曾矣今民間得祀髙曾蓋亦體順人情之至例以古制則既為僣况在其行之無後者乎古者士大夫無子則為之置後無後者鮮矣後世人情偷薄始有棄貧賤而不問者古所為無後皆殤子之類耳祭法王下祭殤五適子適孫適曾孫適玄孫適來孫諸侯下祭三大夫二適士及庶人祭子而止則無後之祔皆子孫屬也今民間既得假四代之祀以義起之雖及弟姪可矣往年湖湘一士人家有曽伯祖與堂叔祖皆賢而無後者𣣔為立嗣則族衆不可欲弗祀則思其賢有所不忍也以問於某某曰不祀二三十年矣而追為之嗣勢有所不行矣若在士大夫家自可依古族屬之義於春秋二社之次特設一祭凡族之無後而親者各以昭穆之次配祔之於義亦可也三丙戌教札時及足慰離索兼示論語講章明白痛快足以發朱注之所未及諸生聼之當有油然而興者矣後世人心陷溺禍亂相尋皆由此學不明之故只將此學字頭腦處指掇得透徹使人洞然知得是自己生身立命之原不假外求如木之有根暢茂條逹自有所不容已則所謂恱樂不愠者皆不待言而喻書院記文整嚴精確逈爾不群皆是直寫胸中實見一洗近儒影響雕飾之習不徒作矣其近來郤見得良知兩字日益真切簡易朝夕與朋輩講習只是發揮此兩字不出緣此兩字人人所自有故雖至愚下品一提便省覺若致其極雖聖人天地不能無憾故説此兩字窮劫不能盡世儒尚有致疑於此謂未足以盡道者只是未嘗實見得耳近有鄉大夫請某講學者云除却良知還有甚麼説得某答云除却良知還有甚麼説得不審邇來謙之於此兩字見得比舊又如何矣無因一面扣之以快傾渴正之去當能略盡鄙懷不能一一後世大患全是士夫以虛文相誑略不知有誠心實意流積成風雖有忠信之質亦且迷溺其間不自知覺是故以之為子則非孝以之為臣則非忠流毒扇禍生民之亂尚未知所抵極今𣣔救之惟有返朴還淳是對症之劑故吾儕今日用工務在鞭辟近裏刪削繁文始得然鞭辟近裏刪削繁文亦非草率可能必須講明致良知之學每以言於同志不識謙之亦以為何如也講學之後望時及之四丙戌正之歸備談政教之善勤勤懇懇開誘來學毅然以斯道為己任其為喜幸如何可言前書虛文相誑之説獨以慨夫後儒之沒溺詞章雕鏤文字以希世盜名雖賢知有所不免而其流毒之深非得根器力量如吾謙之者莫能挽而回之也而謙之顧猶歉然𣣔以猛省寡過此正吾謙之之所以為不可及也欣嘆欣嘆學絶道喪之餘苟有興起向慕於是學者皆可以為同志不必銖稱寸度而求其盡合於此以之待人可也若在我之所以為造端立命者則不容有毫髮之或爽矣道一而已仁者見之謂之仁知者見之謂之知釋氏之所以為釋老氏之所以為老百姓日用而不知皆是道也寧有二乎今古學術之誠偽邪正何啻碔砆美玉然有眩惑終身而不能辨者正以此道之無二而其變動不拘充塞無間縱橫顛倒皆可推之而通世之儒者各就其一偏之見而又飾之以比擬倣像之功文之以章句假借之訓其為習熟既足以自信而條目又足以自安此其所以誑己誑人終身沒溺而不悟焉耳然其毫釐之差而乃致千里之謬非誠有求為聖人之志而從事於惟精惟一之學者莫能得其受病之源而發其神姦之所由伏也若某之不肖蓋亦嘗陷溺於其間者幾年倀倀然既自以為是矣賴天之靈偶有悟於良知之學然後悔其向之所為者固包藏禍機作偽於外而心勞日拙者也十餘年來雖痛自洗剔創艾而病根深痼萌蘖時生所幸良知在我操得其要譬猶舟之得舵雖驚風巨浪顛沛不無尚猶得免於傾覆者也夫舊習之溺人雖已覺悔悟而其克治之功尚且其難若此又况溺而不悟日益以深者亦將何所抵極乎以謙之精神力量又以有覺於良知自當如江河之注海沛然無復能有為之障礙者矣默成深造之餘必有日新之得可以警發昏惰者便間不惜欵欵示及之五丙戌張陳二生來適歸餘姚祭掃遂不及相見殊負深情也隨事體認天理即戒慎恐懼功夫以為尚隔一塵為世之所謂事事物物皆有定理而求之於外者言之耳若致良知之功明則此語亦自無害不然即猶未免於毫釐千里也來喻以為恐主於事者蓋已深燭其弊矣寄示甘泉尊經閣記甚善甚善其間大意亦與區區稽山書院之作相同稽山之作向嘗以寄甘泉自謂於此學頗有分毫發明今甘泉乃謂今之謂聰明知覺不必外求諸經者不必呼而能覺之類則似急於立言而未暇細察鄙人之意矣後世學術之不明非為後人聰明識見之不及古人大抵多由勝心為患不能取善相下明知其説之巳是矣而又務為一説以髙之是以其説愈多而惑人愈甚凡今學術之不明使後學無所適從徒以致人之多言者皆吾黨自相求勝之罪也今良知之説已將學問頭腦説得十分下落只是各去勝心務在共明此學隨人分限以此循循善誘之自當各有所至若只要自立門户外假衛道之名而內行求勝之實不顧正學之因此而益荒人心之因此而愈惑黨同伐異覆短爭長而惟以成其自私自利之謀仁者之心有所不忍也甘泉之意未必由此因事感觸輒漫及之蓋今時講學者大抵多犯此症在鄙人亦或有所未免然不敢不痛自克治也如何如何答友人丙戌君子之學務求在己而已毁譽榮辱之來非獨不以動其心且資之以為切磋砥礪之地故君子無入而不自得正以其無入而非學也若夫聞譽而喜聞毁而戚則將惶惶於外惟日之不足矣其何以為君子往年駕在留都左右交讒某於武廟當時禍且不測僚屬咸危懼謂群疑若此宜圗所以自解者某曰君子不求天下之信己也自信而已吾方求以自信之不暇而暇求人之信己乎某於執事為世交執事之心某素能信之而顧以相訊若此豈亦猶有未能自信也乎雖然執事之心又焉有所不自信者至於洪範之外意料所不及若校人之於子産者亦安能保其必無則執事之懇懇以詢於僕固君子之嚴於自治宜如此也昔楚人有宿於其友之家者其僕竊友人之履以歸楚人不知也適使其僕市履於肆僕私其直而以竊履進楚人不知也他日友人來過見其履在楚人之足大駭曰吾固疑之果然竊吾履遂與之絶逾年而事暴友人踵楚人之門而悔謝曰吾不能知子而繆以疑子吾之罪也請為友如𥘉今執事之見疑於人其有其無某皆不得而知縱或有之亦何傷於執事之自信乎不俟逾年吾見有踵執事之門而悔謝者矣執事其益自信無怠固將無入而非學亦無入而不自得也矣答友人問丙戌問自來儒先皆以學問思辨屬知而以篤行屬行分明是兩截事今先生獨謂知行合一不能無疑曰此事吾巳言之屢屢凡謂之行者只是著實去做這件事若著實做學問思辨的工夫則學問思辨亦便是行矣學是學做這件事問是問做這件事思辨是思辨做這件事則行亦便是學問思辨矣若謂學問思辨之然後去行却如何懸空先去學問思辨得行時又如何去得箇學問思辨的事行之明覺精察處便是知知之真切篤實處便是行若行而不能精察明覺便是冥行便是學而不思則罔所以必須説箇知知而不能真切篤實便是妄想便是思而不學則殆所以必須説箇行元來只是一箇工夫凡古人説知行皆是就一箇工夫上輔偏救弊説不似今人截然分作兩件事做某今説知行合一雖亦是就今時輔偏救弊説然知行體假亦本來如是吾契但著實就身心上體履當下便自知得今却只從言語文義上窺測所以牽制支離轉説轉糊塗正是不能知行合一之弊耳象山論學與晦庵大有同異先生嘗稱象山於學問頭腦處見得直截分明今觀象山之論却有謂學有講明有踐履及以致知格物為講明之事乃與晦庵之説無異而與先生知行合一之説反有不同何也曰君子之學豈有心於同異惟其是而已吾於象山之學有同者非是茍同其異者自不掩其為異也吾於晦庵之論有異者非是求異其同者自不害其為同也假使伯夷柳下惠與孔孟同處一堂之上就其所見之偏全其議論斷亦不能皆合然要之不害其同為聖賢也若後世論學之士則全是黨同伐異私心浮氣所使將聖賢事業作一場兒戲看了也又問知行合一之説是先生論學最要緊處今既與象山之説異矣敢問其所以同曰知行原是兩箇字説一箇工夫這一箇工夫須著此兩箇字方説得完全無弊病若頭腦處見得分明見得原是一箇頭腦則雖把知行分作兩箇説畢竟將來做那一箇工夫則始或未便融會終所謂百慮而一致矣若頭腦見得不分明原看做兩箇了則雖把知行合作一箇説亦恐終未有湊泊處况又分作兩截去做則是從頭至尾更沒討下落處也又問致良知之説真是百世以俟聖人而不惑者象山已於頭腦上見得分明如何於此尚有不同曰致知格物自來儒者皆相沿如此説故象山亦遂相沿得來不復致疑耳然此畢竟亦是象山見得未精一處不可掩也又曰知之真切篤實處便是行行之明覺精察處便是知若知時其心不能真切篤實則其知便不能明覺精察不是知之時只要明覺精察更不要真切篤實也行之時其心不能明覺精察則其行便不能真切篤實不是行之時只要真切篤實更不要明覺精察也知天地之化育心體原是如此乾知大始心體亦原是如此答南元善丙戌别去忽踰三月居嘗思念輒與諸生私相慨嘆計歸程之所及此時當到家久矣太夫人康強貴眷無恙渭南風景當與柴桑無異而元善之識見興趣則又有出於元亮之上者矣近得中途寄來書讀之恍然如接顔色勤勤懇懇惟以得聞道為喜急問學為事恐卒不得為聖人為憂亹亹千數百言略無一字及於得喪榮辱之間此非真有朝聞夕死之志者未易以涉斯境也浣慰何如諸生遞觀傳誦相與嘆仰歆服因而興起者多矣世之髙抗通脫之士捐富貴輕利害棄爵祿決然長往而不顧者亦皆有之彼其或從好於外道詭異之説投情於詩酒山水技藝之樂又或奮發於意氣感激於憤悱牽溺於嗜好有待於物以相勝是以去彼取此而後能及其所之既倦意衡心鬱情隨事移則憂愁悲苦隨之而作果能捐富貴輕利害棄爵祿快然終身無入而不自得巳乎夫惟有道之士真有以見其良知之昭明靈覺圎融洞徹廓然與太虛而同體太虛之中何物不有而無一物能為太虛之障礙蓋吾良知之體本自聰明睿知本自寬𥙿溫柔本自發強剛毅本自齋莊中正文理密察本自溥博淵泉而時出之本無富貴之可慕本無貧賤之可憂本無得喪之可欣戚愛憎之可取舍蓋吾之耳而非良知則不能以聼矣又何有於聰目而非良知則不能以視矣又何有於明心而非良知則不能以思與覺矣又何有於睿知然則又何有於寬𥙿溫柔乎又何有於發強剛毅乎又何有於齋莊中正文理密察乎又何有於溥博淵泉而時出之乎故凡慕富貴憂貧賤欣戚得喪愛憎取舍之類皆足以蔽吾聰明睿知之體而窒吾淵泉時出之用若此者如明目之中而翳之以塵沙聰耳之中而塞之以木楔也其疾痛鬱逆將必速去之為快而何能忍於時刻乎故凡有道之士其於慕富貴憂貧賤欣戚得喪而取舍愛憎也若洗目中之塵而拔耳中之楔其於富貴貧賤得喪愛憎之相值若飄風浮靄之往來變化於太虛而太虛之體固常廓然其無礙也元善今日之所造其殆庶幾於是矣乎是豈有待於物以相勝而去彼取此激昻於一時之意氣者所能強而聲音笑貌以為之乎元善自愛元善自愛關中自古多豪傑其忠信沈毅之質明逹英偉之器四方之士吾見亦多矣未有如關中之盛者也然自橫渠之後此學不講或亦與四方無異矣自此關中之士有所振發興起進其文藝於道德之歸變其氣節為聖賢之學將必自吾元善昆季始也今日之歸謂天為無意乎謂天為無意乎元貞以病不及別簡蓋心同道同而學同吾所以告之亦不能有他説也亮之亮之二丙戌五月𥘉得蘇州書後月適遇王驛丞去草草曽附短啓其時私計行斾到家必已久矣是月三日余門子回復領手教始知六月尚留汴城世途之險澀難料每每若此也賤軀入夏咳作兼以毒暑大旱舟楫無所往日與二三子講息池傍小閣中每及賢昆玉則喟然興嘆而巳郡中今歲之旱比往年尤甚河渠曽蒙開浚者百姓皆得資灌溉之利相與嘖嘖追頌功德然已控籲無及矣彼姦妬憸人號稱士類者乃獨讒疾排搆無所不至曾細民之不若亦獨何哉亦獨何哉色養之暇塤箎協奏切磋講習當日益深造矣里中英俊相從論學者幾人學絶道喪且幾百年居今之時而苟知趨向於是正所謂空谷之足音皆今之豪傑矣便中示知之竊嘗喜晦翁涵育薰陶之説以為今時朋友相與必有此意而後彼此交益近來一二同志與人講學乃有規礪太刻遂相憤戾而去者大抵皆不免於以善服人之病耳楚國寶又爾憂去子京諸友亦不能亟相會一齊衆楚道之不明也我知之矣雖然風雨如晦雞鳴不已至誠而不動者未之有也非賢昆玉疇足以語於斯乎其餘世情真若浮虛之變態亮非元善之所屑聞者也遂不一一及答季明德丙戌書惠逺及以咳恙未平憂念備至感愧良深食薑太多非東南所宜誠然此亦不過暫時劫劑耳近有一友為易貝母丸服之頗亦有效乃終不若來喻用養生之法拔去病根者為得本源之論然此又不但治病為然學問之功亦當如是矣承示立志益堅謂聖人必可以學而至兢兢焉常磨錬於事為朋友之間而厭煩之心比前差少喜幸殊極又謂聖人之學不能無積纍之漸意亦切實中間以堯舜文王孔老諸説發明志學一章之意足知近來進修不懈居有司之煩而能精思力究若此非朋輩所及然此在吾明德自以此意奮起其精神砥切其志意則可矣必𣣔如此節節分疏引證以為聖人進道一定之階級又連掇數聖人𥿄上之陳迹而入之以此一欵條例之中如以堯之試鯀為未能不惑子夏之啓豫為未能耳順之類則是尚有比擬牽滯之纍以此論聖人之亦必由學而至則雖有所發明然其階級懸難反覺髙逺深奧而未見其為人皆可學乃不如末後一節謂至其極而矩之不踰亦不過自此志之不已所積而不踰之上亦必有學可進聖人豈絶然與人異哉又云善者聖之體也害此善者人欲而已人𣣔吾之所本無去其本無之人欲則善在我而聖體全聖無有餘我無不足此以知聖人之必可學也然非有求為聖人之志則亦不能以有成只如此論自是親切簡易以此開喻來學足以興起之矣若如前説未免使柔怯者畏縮而不敢當髙明者希髙而外逐不能無弊也聖賢垂訓固有書不盡言言不盡意者凡看經書要在致吾之良知取其有益於學而已則千經萬典顛倒縱橫皆為我之所用一涉拘執比擬則反為所縳雖或特見妙詣開發之益一時不無而意必之見流注潛伏蓋有反為良知之障蔽而不自知覺者矣其云善者聖之體意固已好善即良知言良知則使人尤為易曉故區區近有心之良知是謂聖之説其間又云人之為學求盡乎天而已此明德之意本𣣔合天人而為一而未免反離而二之也人者天地萬物之心也心者天地萬物之主也心即天言心則天地萬物皆舉之矣而又親切簡易故不若言人之為學求盡乎心而已知行之答大假切實明白詞氣亦平和有足啓發人者惟賢一書識見甚進間有語疵則前所謂意必之見流注潛伏者之為病今既照破久當自融釋矣以效訓學之説凡字義之難通者則以一字之相類而易曉者釋之若今學字之義本自明白不必訓釋今遂以效訓學以學訓效皆無不可不必有所拘執但效字終不若學字之混成耳率性而行則性謂之道修道而學則道謂之教謂修道之為教可也謂修道之為學亦可也自其道之示人無隱者而言則道謂之教自其功夫之修習無違者而言則道謂之學教也學也皆道也非人之所能為也知此則又何訓釋之有所須學記因病未能著筆俟後便為之與王公弼丙戌來書比舊所見益進可喜可喜中間謂棄置富貴與輕於方父兄之命只是一事當棄富貴即棄富貴只是致良知當從父兄之命即從父兄之命亦只是致良知其間權量輕重稍有私意於良知便自不安凡認賊作子者緣不知在良知上用功是以有此若只在良知上體認所謂雖不中不逺矣二丁亥老年得子實出望外承相知愛念勤惓若此又重之以厚儀感愧何可當也兩廣之役積衰久病之餘何能堪此已具本辭免但未知遂能得允否耳來書提醒良知之説甚善甚善所云困勉之功亦只是提醒工夫未能純熟須加人一已百之力然後能無間斷非是提醒之外別有一假困勉之事也與歐陽崇一丙戌正之諸友下第歸備談在京相與之詳近雖仕途紛擾中而功力略無退轉甚難甚難得來書自咎真切論學數條草有定見非獨無退轉且大有所進矣文蔚所疑良不為過孟子謂有諸己之謂信今吾未能有諸己是未能自信也宜乎文蔚之未能信我矣乃勞崇一逐一為我解嘲然又不敢盡謂崇一解嘲之言為口給但在區區則亦未能一一盡如崇一之所解者為不能無愧耳固不敢不勉力也寄陸原靜丙戌原靜雖在憂苦中其學問功夫所謂顛沛必於是者不言可知矣奚必論説講究而後可以為學乎南元善曽將原靜後來論學數條刋入後録中𥘉心甚不𣣔渠如此近日朋輩見之却因此多有省悟始知古人相與辨論窮詰亦不獨要自已明白直𣣔共明此學於天下耳蓋此數條同志中肯用功者亦時有疑及之然非原靜則亦莫肯如此披豁吐露就欲如此披豁吐露亦不能如此曲折詳盡故此原靜一問其有益於同志良不淺淺也自後但有可相啓發者不惜時寄及之幸甚幸甚近得施聘之書意向卓然出於流輩往年嘗竊異其人今果與俗不同也間中曽相往復否大事今冬能舉得便可無他絆繫如聘之者不妨時時一會窮居獨處無朋友相砥切最是大一患也貴鄉有韋友名商臣者聞其用工篤實尤為難得亦曾一相講否答甘泉丙戌音問雖踈道德之聲無日不聞於耳所以啓瞶消鄙者多矣向承狂生之諭𥘉聞極駭彼雖愚悖之甚不應遽至於爾既而細詢其故良亦有因近復來此始得其實蓋此生素有老佛之溺為朋輩所攻激遂髙自矜大以誇愚泄憤蓋亦不過怪誕妖妄如近世方士呼雷斬蛟之説之類而聞者不察又從而增飾之耳近已與之痛絶而此生深自悔責若無所措其躬賴其資性頗可或自此遂能改創未可知也學絶道喪之餘苟以是心至斯受之矣忠信明敏之資絶不可得如生者良亦千百中之一二而又復不免於陷溺若此可如何哉可如何哉龔生來訪自言素沐教極深其資性甚純謹惜無可以進之者今復逺求陶鑄自此當見其有成也答魏師説丁亥師伊至備聞日新之功兼得來書志意懇切喜慰無盡所云任情任意認作良知及作意為之不依本來良知而自謂良知者既巳察識其病矣意與良知當分别明白凡應物起念處皆謂之意意則有是有非能知得意之是與非者則謂之良知依得良知即無有不是矣所疑拘於體面格於事勢等患皆是致良知之心未能誠切專一若能誠切專一自無此也凡作事不能謀始與有輕忽茍且之弊者亦皆致知之心未能誠一亦是見得良知未透徹若見得透徹即體面事勢中莫非良知之妙用除却體面事勢之外亦别無良知矣豈得又為體面所局事勢所格即巳動於私意非復良知之本然矣今時同志中雖皆知得良知無所不在一涉酬應便又將人情物理與良知看作兩事此誠不可以不察也與馬子莘丁亥連得所寄書誠慰傾渴締觀來書其字畫文彩皆有加於疇昔根本盛而枝葉茂理固宜然然草木之花千葉者無實其花繁者其實鮮矣邇來子莘之志得無微有所溺乎是亦不可以不省也良知之説往時亦嘗備講不審邇來能益瑩徹否明道云吾學雖有所受然天理二字却是自家體認出來良知即是天理體認者實有諸己之謂耳非若世之想像講説者之為也近時同志莫不知以良知為説然亦未見有能實體認之者是以尚未免於疑惑蓋有謂良知不足以盡天下之理而必假於窮索以增益之者又以為徒致良知未必能合於天理須以良知講求其所謂天理者而執之以為一定之則然後可以率由而無弊是其為説非實加體認之功而真有以見夫良知者則亦莫能辨其言之似是而非也莆中故多賢國英及志道二三同志之外相與切磋砥礪者亦復幾人良知之外更無知致知之外更無學外良知以求知者邪妄之知矣外致知以為學者異端之學矣道喪千載良知之學久為贅疣今之友朋知以此事日相講求者殆空谷之足音歟想念雖切無因面會一罄此懷臨書惘惘不盡與毛古庵憲副丁亥亟承書惠既荷不遺中間歉然下問之意尤足以仰見賢者進修之功勤勤不懈喜幸何可言也無因促膝一陳鄙見以求是正可勝瞻馳凡鄙人所謂致良知之説與今之所謂體認天理之説本亦無大相逺但微有直截迂曲之差耳譬之種植致良知者是培其根本之生意而逹之枝葉者也體認天理者是茂其枝葉之生意而求以復之根本者也然培其根本之生意固自有以逹之枝葉矣𣣔茂其枝葉之生意亦安能舍根本而別有生意可以茂之枝葉之間者乎吾兄忠信近道之資既自出於儕輩之上近見胡正人備談吾兄平日工夫又皆篤實懇切非若世之徇名逺迹而徒以支離於其外者只如此用力不已自當循循有至所謂殊途而同歸者也亦奚必改途易業而別求所謂為學之方乎惟吾兄益就平日用工得力處進步不息譬之適京都者始在偏州僻壤未免經歷於傍蹊曲徑之中苟志往不懈未有不逹於通衢大路者也病軀咳作不能多及寄去鄙録末後論學一書亦頗發明鄙見暇中幸示及之與黃宗賢丁亥人在仕途比之退處山林時其工夫之難十倍非得良友時時警發砥礪則其平日之所志向鮮有不潛移默奪弛然日就於頽靡者近與誠甫言在京師相與者少二君必須預先相約定彼此但見微有動氣處即須提起致良知話頭互相規切凡人言語正到快意時便截然能忍默得意氣正到發揚時便翕然能收斂得憤怒嗜𣣔正到騰沸時便廓然能消化得此非天下之大勇者不能也然見得良知親切時其工夫又自不難緣此數病良知之所本無只因良知昏昧蔽塞而後有若良知一提醒時即如白日一出而魍魎自消矣中庸謂知耻近乎勇所謂知耻只是耻其不能致得自己良知耳今人多以言語不能屈服得人為耻意氣不能陵軋得人為耻憤怒嗜𣣔不能直意任情得為耻殊不知此數病者皆是蔽塞自己良知之事正君子之所宜深耻者今乃反以不能蔽塞自己良知為耻正是耻非其所當耻而不知耻其所當耻也可不大哀乎諸君皆平日所知厚者區區之心愛莫為助只碩諸君都做箇古之大臣古之所謂大臣者更不稱他有甚知謀才略只是一箇斷斷無他技休休如有容而已諸君知謀才略自是超然出於衆人之上所未能自信者只是未能致得自己良知未全得斷斷休休體假耳今天下事勢如沉痾積痿所望以起死回生者實有在於諸君子若自己病痛未能除得何以能療得天下之病此區區一念之誠所以不能不為諸君一竭盡者也諸君每相見時幸默以此意相規切之須是克去己私真能以天地萬物為一體實康濟得天下挽回三代之治方是不負如此聖明之君方能報得如此知遇不枉了因此一大事來出世一遭也病卧山林只好修藥餌苟延喘息但於諸君出處亦有痛癢相關者不覺縷縷至此幸亮此情也答以乘憲副丁亥此學不明於世久矣而舊聞舊習障蔽纏繞一旦驟聞吾説未有不非詆疑議者然此心之良知昭然不昧萬古一日但肯平心易氣而以吾説反之於心亦未有不洞然明白者然不能即此奮志進步勇脫窠臼而猶依違觀望於其間則舊聞舊習又從而牽滯蔽塞之矣此近時同志中往往皆有是病不識以乘别後意思却如何耳昔有十家之村皆荒其百畝而日惟轉糴於市取其嬴餘以贍朝夕者鄰村之農勸之曰爾朝夕轉糴勞費無期曷若三年耕則餘一年之食數年耕可積而富矣其二人聼之舍糴而田八家之人競相非沮遏室人老幼亦交遍歸謫曰我朝不糴則無以為饔暮不糴則無以為餐朝夕不保安能待秋而食乎其一人力田不顧卒成富家其一人不得已復棄田而糴竟貧餒終身焉今天下之人方皆轉糴於市忽有舍糴而田者寧能免於非謫乎要在深信弗疑力田而不顧乃克有成耳兩承書來皆有邁往直進相信不疑之志殊為浣慰人還附知少致切劘之誠當不以為迂也與戚秀夫丁亥德洪諸友時時談及盛德深情追憶留都之會恍若夢寐中矣盛使逺辱兼以書儀感怍何既此道之在人心皎如白日雖隂晴晦明千態萬狀而白日之光未嘗增減變動足下以邁特之資而能篤志問學勤勤若是其於此道真如掃雲霧而覩白日耳奚假於區區之為問乎病廢既久偶承兩廣之命方具辭疏使還正當紛沓草草不盡鄙懷與陳惟濬丁亥江西之會極草草尚意得同舟旬日從容一談不謂既入省城人事紛沓及登舟時惟濬巳行矣沿途甚怏怏抵牾後即赴南寧日不暇給亦𣣔遣人相期來此早晚略暇時可間話而此中風土絶異炎瘴尤不可當家人輩到此無不病者區區咳患亦因熱大作痰痢腫毒交攻度惟濬斷亦不可以居此又復已之近得聶文蔚書知已入漳患難困苦之餘所以動心忍性增益其所不能者宜必日有所進養之以福正在此時不得空放過也聖賢論學無不可用之工只是致良知三字尤簡易明白有實下手處更無走失近時同志亦巳無不知有致良知之説然能於此實用工者絶少皆緣見得良知未真又將致字看太易了是以多未有得力處雖此往時支離之説稍有頭緒然亦只是五十步百步之間耳就中亦有肯精心體究者不覺又轉入舊時窠臼中反為文義所牽滯工夫不得灑脫精一此君子之道所以鮮也此事必須得師友時時相講習切劘自然意思日新自出山來不覺便是一年山中同志結廬相待者尚數十人時有書來儘令人感動而地方重務勢難輕脫病軀又日狼狽若此不知天意竟如何也文蔚書中所論逈然大進真有一日千里之勢可喜可喜頗有所詢病中草草答大略見時可取視之亦有所發也寄安福諸同志丁亥諸友始為惜隂之會當時惟恐只成虛語邇來乃聞逺近豪傑聞風而至者以百數此可以見良知之同然而斯道大明之幾於此亦可以卜之矣喜慰可勝言耶得虞卿及諸同志寄來書所見比舊又加親切足驗工夫之進可喜可喜只如此用工去當不能有他岐之惑矣明道有云寧學聖人而不至不以一善而成名此為有志聖人而未能真得聖人之學者則可如此説若今日所講良知之説乃真是聖學之的傳但從此學聖人却無有不至者惟恐吾儕尚有一善成名之意未肯專心致志於此耳在會諸同志雖未及一一面見固巳神交於千里之外相見時幸出此共勉之王子茂寄問數條亦皆明切中間所疑在子茂亦是更須誠切用功到融化時并其所疑亦皆釋然沛然不復有相阻礙然後為真得也凡工夫只是要簡易真切愈真切愈簡易愈簡易愈真切病咳中不能多及亦不能一一備列姓字幸以意亮之而已與錢德洪王汝中丁亥家事賴廷豹紏止而德洪汝中又相與薰陶切劘於其間吾可以無內顧矣紹興書院中同志不審近來意向如何德洪汝中既任其責當能振作接引有所興起會講之約但得不廢其間縱有一二懈弛亦可因此夾持不致遂有傾倒餘姚又得應元諸友作興鼓舞想益日異而月不同老夫雖出山林亦每以自慰諸賢皆一日千里之足豈俟區區有所警䇿聊亦以此示鞭影耳即日已抵肇慶去梧不三四日可到方入冗場未能多及千萬心亮紹興書院及餘姚各會同志諸賢不能一一列名字幸亮二戊子地方事幸遂平息相見漸可期矣近來不審同志敘會如何得無法堂前今已草深一丈否想卧龍之會雖不能大有所益亦不宜遂遂荒落且存餼羊後或興起亦未可知餘姚得應元諸友相與倡率為益不小近有人自家鄉來聞龍山之講至今不廢亦殊可喜書到望為寄聲益相與勉之九十弟與正憲輩不審早晚能來親近否或彼自絶望且誘掖接引之諒與人為善之心當不俟多喋也魏廷豹決能不負所托兒輩或不能率教亦望相與夾持之人行匆匆百不一及諸同志不能盡列姓字均致此意三戊子德洪汝中書來見近日工夫之有進足為喜慰而餘姚紹興諸同志又能相聚會講切奮發興起日勤不懈吾道之昌真有火然泉逹之機矣喜幸當何如哉喜幸當何如哉此間地方悉已平靖只因二三大賊巢為兩省盜賊之根株淵藪積為民患者心亦不忍不為一除翦又復遲留二三月今亦了事矣旬月間便當就歸途也守儉守文二弟近承夾持啓迪想亦漸有所進正憲尤極懶惰若不痛加針砭其病未易能去父子兄弟之間情既迫切責善反難其任乃在師友之間想平日骨肉道義之愛當不俟於多囑也書院規制近聞頗加修葺是亦可喜寄去銀二十兩稍助工費墻垣之未堅完及一應合整備者酌量為之餘情面話不久答何廷仁戊子區區病勢日狼狽自至廣城又增水瀉日夜數行不得止今遂兩足不能坐立須稍定即踰嶺而東矣諸友皆不必相候果有山隂之興即須早鼓錢塘之舵得與德洪汝中輩一會聚彼此當必有益區區養病本去已三月旬日後必得旨亦遂發舟而東縱未能遂歸田之碩亦必得一還陽明與諸友一面而别且後會又有可期也千萬勿復遲疑徒耽誤日月揔及隨舟而行沿途官吏送迎請謁斷亦不能有須臾之暇宜悉此意書至即撥冗德洪汝中輩亦可促之早為北上之圗伏枕潦草
