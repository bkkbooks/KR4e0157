body:
  text: 外集四序羅履素詩集序壬戌履素先生詩一帙為篇二百有竒浙大參羅公某以授陽明子某而告之曰是吾祖之作也今詩文之傳皆其崇髙顯赫者也吾祖隱于草野其所存要無愧于古人然世未有知之者而所為詩文又皆淪落止是某將梓而傳焉懼人之以我為僣也吾子以為奚若某曰無傷也孝子仁孫之于其父祖雖其服玩嗜好之微猶將謹守而弗忍廢况乎詩文其精神心術之所寓有足以發聞于後者哉夫先祖有美而弗傳是弗仁也夫孰得而議之蓋昔者夫子之取于詩也非必其皆有聞于天下彰彰然明著者而後取之滄浪之歌採之孺子萍實之謡得諸兒童夫固若是其寬慱也然至于今其傳者不過數語而止則亦豈必其多之貴哉今詩文之傳則誠富矣使有刪述者而去取之其合于道也能幾履素之作吾誠不足以知之顧亦豈無一言之合于道乎夫有一言之合于道是其于世也亦有一言之訓矣又况其不止于是也而又奚為其不可以傳哉吾觀大參公之治吾浙寬而不縱仁而有勇溫文藴藉居然稠衆之中固疑其先必有以開之者乃今觀履素之作而後知其所從來者之逺也世之君子茍未知大參公之所自吾請觀于履素之作茍未知履素之賢吾請觀于大參公之賢無疑矣然則是集也固羅氏之文獻係焉其又可以無傳乎哉大參公起拜曰某固將以為羅氏之書也請遂以吾子之言序之大參公名鑒字某由進士纍今官有厚德長才向用未艾大參之父某亦起家進士而以文學政事顯羅氏之文獻于此益為有證云兩浙觀風詩序壬戌兩浙觀風詩者浙之士夫為僉憲陳公而作也古者天子巡狩而至諸侯之國則命太師陳詩以觀民風其後巡狩廢而陳詩亡春秋之時列國之君大夫相與盟會問遣猶各賦詩以言巳志而相祝頌今觀風之作蓋亦祝頌意也王者之巡狩不獨陳詩觀風而巳其始至方嶽之下則望秩于山川朝見茲土之諸侯同律曆禮樂制度衣服納價以觀民之好惡就見百年者而問得失賞有功罰有罪蓋所以布王政而興治功其事亦大矣哉漢之直指循行唐宋之觀察廉訪採訪之屬及今之按察雖皆謂之觀風而其實代天子以行巡狩之事故觀風王者事也陳公起家名進士自秋官郎擢僉浙臬執操縱豫奪生死榮辱之柄而代天子觀風于一方其亦榮且重哉吁亦難矣公之始至吾浙適歲之旱民不聊生飢者仰而待哺懸者呼而望解病者呻鬱者怨不得其平者鳴弱者強者蹶者囓者梗而孽者狡而竊者乘間投隙沓至而環起當是之時而公無以處之吾見其危且殆也賴公之才明知神武不震不激撫柔摩剔以克有濟期月之間而飢者飽懸者解呻者歌怨者樂不平者申蹶者起囓者馴孽者順竊者靖滌蕩剖刷而率以無事于是乎修廢舉墜問民之疾苦而休息之勞農勸學以興教化然後上會稽登天姥入鴈蕩陟金娥覽觀江山之形勝慨然太息吊子胥之忠誼禮嚴光之髙節希遐躅于隆龎挹流風于倣佛固亦大丈夫得志行道之一樂哉然公之始其憂民之憂也亦既無所不至矣公唯憂民之憂是以民亦樂公之樂而相與歡欣鼓舞以頌公德然則今日觀風之作豈獨見吾人之厚公抑以見公之厚于吾人也雖然公之憂民之憂其惠澤則既無日而可忘矣民之樂公之樂其愛慕亦既與日而俱深矣以公之才器天子其能久容于外乎則公固有時而去也然則其可樂者能幾而可憂者終誰任之則夫今日觀風之作又不徒以頌公之厚于吾人將遂因公而致望于繼公者亦如公焉則公雖去而所以憂其民者尚亦永有所托而因以不墜也山東鄉試録序甲子山東古齊魯宋衛之地而吾夫子之鄉也嘗讀夫子家語其門人髙弟大抵皆出于齊魯宋衛之葉固碩一至其地以觀其山川之靈秀竒特將必有如古人者生其間而吾無從得之也今年為弘治甲子天下當復大比山東巡按監察御史陸稱輩以禮與幣來請守仁為考試官故事司考校者惟務得人𥘉不限以職任其後三四十年來始皆一用學職遂致應名取具事歸外簾而糊名易書之意微自頃言者頗以為不便大臣上其議天子曰然其如故事于是聘禮考校盡如國𥘉之舊而守仁得以部屬來典試事于茲土雖非其人寧不自慶其邅際又况夫子之鄉固其平日所願一至焉者而乃得以盡觀其所謂賢士者之文而考校之豈非平生之大幸歟雖然亦竊有大懼焉夫委重于考校將以求才也求才而心有不盡是不忠也心之盡矣而真才之弗得是弗明也不忠之責吾知盡吾心爾矣不明之罪吾終且奈何哉蓋昔者夫子之時及門之士嘗三千矣身通六藝者七十餘人其尤卓然而顯者德行言語則有顔閔豫賜之徒政事文學則有由求遊夏之屬今所取士其始拔自提學副使陳某者蓋三千有竒而得千有四百既而試之得七十有五人焉嗚呼是三千有竒者其皆夫子鄉人之後進而獲遊于門墻者乎是七十有五人者其皆身通六藝者乎夫今之山東猶古之山東也雖今之不逮于古顧亦寧無一二人如昔賢者而今之所取苟不與焉豈非司考校者不明之罪歟雖然某于諸士亦願有言者夫有其人而弗取是誠司考校者不明之罪矣司考校者以是求之以是取之而諸士之中茍無其人焉以應其求以不負其所取是亦諸士者之耻也雖然豫豈敢謂果無其人哉夫子嘗曰魯無君子者斯焉取斯顔淵曰舜何人也豫何人也有為者亦若是夫為夫子之鄉人苟未能如昔人焉而不耻不若又不知所以自勉是自暴自棄也其名曰不肖夫不肖之與不明其相去何逺乎然則司考校者之與諸士亦均有責焉耳矣嗟夫司考校者之責自今不能以無懼而不可以有為矣若夫諸士之責其不能者猶可以自勉而又懼其或以自畫也諸士無亦曰吾其朂哉無使司考校者終不免于不明也斯無愧于是舉無愧于夫子之鄉人也矣是舉也某某同事于考校而御史稱實司監臨某某司提調某某司監試某某某又相與翊贊防範于外皆與有勞焉不可以不書自餘百執事則已具列于録矣氣候圖序戊辰天地一元之運為十二萬九千六百年分而為十二會會分而為三十運運分而為十二世世分而為三十年年分而為十二月月分而為二氣氣分而為三候候分為五日日分為十二時積四千三百二十時三百六十日而為七十二候會者元之候也世者運之候也月者歲之候也候者月之候也天地之運日月之明寒暑之代謝氣化人物之生息終始盡于此矣月證于月者也氣證于氣者也候證于物者也若孟春之月其氣為立春為雨水其候為東風解凍為蟄蟲始振為魚負氷獺祭魚之類月令諸書可考也氣候之運行雖出于天時而實有關于人事是以古之君臣必謹修其政令以奉若夫天道致察乎氣運以警惕夫人為故至治之世天無疾風肓雨之愆而地無昆蟲草木之孽孔子之作春秋也大雨震電大雨雪則書大水則書無水則書無麥苗則書多麋則書􅈮蜚雨螽蝝生則書六鷁退飛則書隕霜不殺草李梅實則書春無水則書鸜鵒采巢則書凡以見氣候之愆變失常而世道之興衰治亂人事之汙隆得失皆于是乎有證焉所以示世之君臣者恐懼修省之道也大總兵懷柔伯施公命繪工為七十二候圗遣使以幣走龍埸屬守仁敘一言于其間守仁謂使者曰此公臨政之本也善端之發也戒心之萌也使者曰何以知之守仁曰人之情必有所不敢忽也而後著于其念必有所不敢忘也而後存于其心著于其念存于其心而後見之于顔色言論志之于弓矢几杖盤盂劍席繪之于圗畫而日省之于其心是故思馳騁者愛觀夫射獵逰田之物甘逸樂者喜親夫慱局燕飲之具公之見于圗繪者不于彼而于此吾是以知其為善端之發也吾是以知其為戒心之萌也其殆警惕夫人為而謹修其政令也歟其殆致察乎氣運而奉若夫天道也歟夫警惕者萬善之本而衆美之基也公克念于是其可以為賢乎由是因人事以逹于天道因一月之候以觀夫世運會元以探萬物之幽賾而窮天地之始終皆于是乎始吾是以喜聞而樂道之為之敘而不辭也送毛憲副致仕歸桐江書院序戊辰正德已巳夏四月貴州按察司副使毛公承上之命得致其仕而歸先是公嘗卜桐江書院于子陵釣臺之側者幾年矣至是將歸老焉謂其志之始獲遂也甚喜而同僚之良惜公之去乃相與咨嗟不忍集而餞之南門之外酒既行有起而言于公者曰君子之道出與處而巳其出也有所為其處也有所樂公始以名進士從政南部理繁治劇頎然已有公輔之望及為方面于雲貴之間者十餘年內釐其軍民外撫諸戎蠻夷政務舉而德威著雖或以是召嫉取謗而名稱亦用是益顯建立暴于天下斯不謂之有所為乎今茲之歸脫屣聲利垂竿讀書樂泉石之清幽就煙霞而屏迹寵辱無所與而世纍無所加斯不謂之有所樂乎公于出處之際其亦無憾焉耳巳公起拜謝復有言者曰雖然公之出而仕也太夫人老矣先大夫忠襄公又遺未盡之志欲仕則違其母𣣔養則違其父不得已權二者之輕重出而自奮于功業人徒見公之憂勞為國而忘其家不知凡以成忠襄之志而未嘗一日不在于太夫人之養也今而歸告成于忠襄之廟拜太夫人于膝下旦夕承歡伸色養之孝公之願遂矣而其勞國勤民拳拳不舍之念又何能釋然而忘之則公雖𣣔一日遂歸休之樂蓋亦有所未能也公復起拜謝又有言者曰雖然君子之道用之則行舍之則藏用之而不行者往而不返者也舍之而不藏者溺而不止者也公之用也既有以行之其舍之也有弗能藏者乎吾未見夫有其用而無其體者也公又起拜遂行陽明山人聞其言而論之曰始之言道其事也而未及于其心次之言者得公之心矣而未盡于道終之言者盡于道矣不可以有加矣斯公之所允蹈者乎諸大夫皆曰然子盍書之以贈從者恩夀雙慶詩後序戊辰正德丙寅丹徒沙隱王公夀七十配孺人嚴六十有九其年天子以厥子侍御君貴封公監察御史配為孺人在朝之彥咸為歌詩侈上之德以祝公夀美侍御君之賢又明年侍御君奉命巡按貴陽以王事之靡盬將厥父母之弗遑也載是册以俱每陟屺岵望飛雲徘徊瞻戀喟然而興嘆黯然而長思輒取是册而披之而微諷之而長歌詠嘆之以舒其懷見其志雖身在萬里固若稱觴膝下聞詩禮而趨于庭也大夫士之有事于貴陽者自都憲王公而下復相與歌而和之聮為巨帙屬守仁敘于其後夫孝子之于親固有不必捧觴戲彩以為夀不必柔滑旨甘以為養不必候起居奔走扶携以為勞者非子之心謂不必如是也子之心碩如是而親以為不必如是必如彼而後吾之心始樂也子必為是不為彼以拂其情而曰吾以為孝其得為養志乎孝莫大乎養志親之願于其子者曰弘乃德逺乃猶嘻嘻旦夕孰與名垂簡册以顯我于無盡飲食口體孰與澤𬒳生民以張我之能施服勞奔走孰與比迹夔皋以明我之能教非必親之願于其子者咸若是也親以是碩其子而子弗能焉弗可得而碩也子能之而親弗以碩其子焉弗可得而能也以是碩其子者賢父母也以是承于其父母者賢子也二者恆百不一遇焉其庸可冀乎侍御君之在朝則忠愛逹于上其巡按于茲也則德威敷于下凡其宣布恩惠摩赤子起其疾而乳哺之者孰非公與孺人之慈凡其懾大姦使不得肆祛大弊使不復作􅐡梳調服撫諸夷而納之夏以免天子一方之顧慮者孰非侍御君之孝而凡若此者亦孰非侍御君之所以夀于公與孺人之夀哉公孺人之賢靳太史之序詳矣其所以修其身教其家誠可謂有是父有是子是詩之作不為虛與諛故為序之云爾重刋文章軌範序戊辰宋謝枋得氏取古文之有資于埸屋者自漢迄宋凡六十有九篇標揭其篇章句字之法名之曰文章軌範蓋古文之奧不止于是是獨為舉業者設耳世之學者傳習已久而貴陽之士獨未之多見侍御王君汝楫于按歷之暇手録其所記憶求善本而校是之謀諸方伯郭公輩相與捐俸廩之資鋟之梓將以嘉惠貴陽之士曰枋得為宋忠臣固以舉業進者是吾微有訓焉屬守仁敘一言于簡首夫自百家之言興而後有六經自舉業之習起而後有所謂古文古文之去六經逺矣由古文而舉業又加逺焉士君子有志聖賢之學而專求之于舉業何啻千里然中世以是取士士雖有聖賢之學堯舜其君之志不以是進終不大行于天下蓋士之始相見也必以贄故舉業者士君子求見于君之羔雉耳羔雉之弗飾是謂無禮無禮無所庸于交際矣故夫求工于舉業而不事于古作弗可工也弗工于舉業而求于幸進是偽飾羔雉以罔其君也雖然羔雉飾矣而無恭敬之實焉其如羔雉何哉是故飾羔雉者非以求媚于主致吾誠焉耳工舉業者非以要利于君致吾誠焉耳世徒見夫由科第而進者類多徇私媒利無事君之實而遂歸咎于舉業不知方其業舉之時惟𣣔釣聲利弋身家之腴以苟一旦之得而𥘉未嘗有其誠也鄒孟氏曰恭敬者幣之未將者也伊川曰自灑掃應對可以至聖人夫知恭敬之實在于飾羔雉之前則知堯舜其君之心不在于習舉業之後矣知灑掃應對之可以進于聖人則知舉業之可以逹于伊傳周召矣吾懼貴陽之士謂二公之為是舉徒以資其希寵祿之筌蹄也則二公之志荒矣于是乎言五經臆説序戊辰得魚而忘筌醪盡而糟粕棄之魚醪之未得而曰是筌與糟粕也魚與醪終不可得矣五經聖人之學具焉然自其已聞者而言之其于道也亦筌與糟粕耳竊嘗怪夫世之儒者求魚于筌而謂糟粕之為醪也夫謂糟粕之為醪猶近也糟粕之中而醪存求魚于筌則筌與魚逺矣龍埸居南夷萬山中書卷不可携日坐石穴默記舊所讀書而録之意有所得輒為之訓釋期有七月而五經之旨略遍名之曰臆説蓋不必盡合于先賢聊寫其胸臆之見而因以娛情養性焉耳則吾之為是固又忘魚而釣寄興于麯蘖而非誠旨于味者矣嗚呼觀吾之説而不得其心以為是亦筌與糟粕也從而求魚與醪焉則失之矣夫説凡四十六卷經各十而禮之説尚多缺僅六卷云潘氏四封録序辛未歙潘氏之仕于朝者户部主事君選大理寺副君珍戶部員外君旦南大理評事君鑑凡四人正德五年冬珍旦以上三載最選鑑以兩宫徽號旬月之間皆得推恩封其親如其官焉于是敘八制為録修上之賜以光其族裔而來謂某曰德下寵浮若之何其可請一言以永我潘氏某曰一族而四顯來者相望也其盛哉夫一月之間而均𬒳榮渥則又何難也蓋吾聞之大山之木千仞而四幹垂而四峰之巔飛鳥之鳴聲不相及也春氣至而四幹之杪花葉若一則其所出之根同有不期致焉潘氏之在婺聞望自宋元而來其培本則厚四子者固亦潘氏之四幹矣是惟否塞閉晦苟際明期而諧景會其軒竦條逹孰禦則夫寵命之沾暨不約而同也其又足異哉雖然木之生風霆之鼓舞炎暑之酷烈隂寒氷雪之嚴沍剝落俾堅其質而完其氣非獨雨露之沾濡生成之也夫恩寵爵祿雨露也號令宣播風霆也法度政事之苛密煩困炎暑也時之險厄患難顛沛隂寒氷雪之嚴沍剝落也何莫而非生成四子蓋亦略嘗歷之其材中楹柱而任梁棟矣吾願潘氏之益培其根也四子拜而起曰吾其益培之以忠孝乎溉之以誠敬乎植之以義而防之以禮乎某曰然則潘氏之軒竦條逹其益無窮爾已矣某不為應酬詩文餘四年矣寺副君之為暨陽也豫嘗許之文未及為而有南北之别今兹復見于京師而以是責償焉故不得而辭也送章逹德歸東雁序辛未章達德將歸東雁石龍山人為之請于是甘泉子托以考槃陽明子為之賦衡門客有在坐者啞然曰異哉二夫子之言吾不能知之夫閟爾形無瑩爾精也其可矣今兹將惟職業之弗遑而顧雁蕩之懷乎彼章子者雁蕩之産矣則又可以居而弗居依依于京師者數年而未返是二者交相慕乎其外也夫苟遊心恬淡而栖神于流俗塵囂之外環諸之間其無屏霞天柱乎雁蕩又奚必造而後至不然托蹤泉石而利祿羾其中雖廬常雲之頂其得而居諸于是陽明子仰而喟俯而默卒無以應之也志其言以遺章子曰客見吾杜權焉行矣子毋忘客之言亦無以客之言而忘甘泉于之托夀湯雲谷序甲戌弘治壬戌春某西尋句曲與丹陽湯雲谷偕當是時雲谷方為行人留意神仙之學為豫談呼吸屈伸之術凝神化氣之道蓋無所不至及與之登三茅之巔下探葉陽休玉宸感陶隱君之遺迹慨嘆穢濁飄然有脫屣人間之志豫時皆未之許也雲谷意不然之曰子豈有見于吾乎豫曰然子之眉間慘然猶有怛世之色是道也遲之十年庶幾矣雲谷曰子見吾之貌而吾信吾之心既别雲谷尋入為給事中又遷為右給事殫心職務驅逐瘁勞竟以直道抵權姦斥外而豫亦以言事得罪奔走謫鄉不相見者十餘年至是正德癸酉某月豫自吏部徙官南太僕再過丹陽而雲谷已家居三年矣訪之迎謂豫曰尚憶眉間之説乎吾信吾之心而不若子之見吾貌何也今果十年而始出于泥塗是則信矣然謂古之庶幾也則貌益衰年益逝去道益逺獨是若未之盡然耳豫曰乃今則幾矣今吾又聞子之言見子之貌矣又見子之廬矣又見子之鄉人矣雲谷曰異哉言貌既逺矣廬與鄉人亦可以見我乎曰古之有道之士外稿而中澤處隘而心廣纍釋而無所撓其精機忘而無所忤于俗是故其色愈愈其居于于其所邅若清風之披物而莫知其所從往也今子之步徐髮改而貌若益憊然而其精藏矣言下意懇而氣若益衰然而其神守矣室廬無所增益于舊而志意擴然其纍釋矣鄉之人相忘于賢愚貴賤且以為慈母且以為嬰兒其機忘矣夫精藏則太和流神守則天光發纍釋則怡愈而靜機忘則心純而一四者道之證也夫道無在而神無方安常處順其至矣而又何人間之脫屣乎雲谷曰有是哉吾信吾之心乃不若子之見吾廬與吾鄉人也于是雲谷年七十矣是月值其懸弧鄉人方謀所以祝夀者聞豫至皆來請言子曰嘻子之鄉先生既幾于道而尚以夀為賀乎夫夀不足以為子之鄉先生賀子之鄉而有有道之士若子之鄉先生者使爾鄉人之子弟皆有所矜式視效出而事君則師其道以用世入而家居則師其道以善身若射之有的各中乃所向則是先生之夀乃于爾鄉之人復有足賀也巳明年三月豫再官鴻臚而鄉之人復以書來請遂追書之文山别集序甲戌文山别集者宋丞相文山先生自述其勤王之所經歷後人因而採集之以成者也其間所值險阻艱難顛沛萬狀非先生之述固無從而盡知者先生忠節蓋宇宙皆于是而有據後之人因詞考迹感先生之大義油然興起其忠君愛國之心固有泫然泣下裂眥扼腕思喪元首之無地者是集之有益于臣道豈小小哉古之君子之忠于其君求盡吾心焉以自慊而已亦豈屑屑言之以蘄知于世然而仁人之心忠于其君亦𣣔夫人之忠于其君也忠于其君則盡心焉已欲夫人忠于其君而思以吾之忠于其君者啓其良心固有人弗及知之者非自言之何由以及人乎斯先生之所為自述將以教世之忠也當其時仗節死義之士無不備載亦因是以有傳是又與人為善者也是集也在先生之自盡若嫌于蘄世之知以先生之教人則吾惟恐其知之不盡也在先生之自盡若可以無傳以先生之與人為善則吾惟恐其傳之不逺也先生之裔孫今太僕少卿公宗巖復刻是集而屬某為之序某之為廬陵也公之族弟某嘗以序謀茲故不可得而辭嗚呼當顛沛之心而不忘乎與人為善者節之𥙿也致自盡之心而欲人同歸于善者忠之推也不以蘄知為嫌而行其教人之誠者仁之篤也象賢崇德以章其先世之美之謂孝明訓述事以廣其及人之教之謂義吾于是集之序無愧辭耳矣金壇縣志序乙亥麻城劉君天和之尹金壇也三月而政成考邑之故而創志焉曰于乎艱哉吾𣣔觀風氣之所宜民俗之所向而無所證也以諏于鄉老有遺聽焉吾欲觀往昔之得失民俗之急緩弛張先後之無所稽也以詢于閭野有遁情焉吾欲觀山川之條理疆域之所際道路井邑之往來聚散制其經適其變而無所裁也則以之闢荒穢入林麓有遺厯焉亦惟文獻之未足也而爾已矣嗚呼古君子之忠也舊政以告于新尹吾何以盡吾心哉夫政有時而或息焉告有時而或窮焉書之册而世守之斯其為告也不亦逺乎志成使來請序吾觀之秩然其有倫也錯然其有章也天也物之祖也地也物之妣也故先之以天文而次之以地理地必有所産故次之以食貨物産而事興故次之以官政政行而齊之以禮則教立故次之以學校學以興賢故次之以選舉賢興而後才可論也故次之以人物人物必有所居故次之以宫室居必有所事事窮則變變則通故次之以雜志終焉嗚呼此豈獨以志其邑之故君子可以觀政矣夫經之天文所以立其本也紀之地理所以順其利也參之食貨所以遂其養也綜之官政所以均其施也節之典禮所以成其俗也逹之學校所以新其德也作之選舉所以用其才也考之人物所以辨其等也修之宫室所以安其居也通之雜志所以盡其變也故本立而天道可睹矣利順而地道可因矣養遂而民生可厚矣施均而民政可平矣俗成而民志可立矣德新而民性可復矣才用等辨而民治可久矣居安盡變而民義不匱矣修此十者以治逹之邦國天下可也而况于邑乎故曰君子可以觀政矣送南元善入覲序乙酉渭南南侯之守越也越之敝數十年矣巨姦元憝窟據根盤良牧相尋未之能去政積事隳俗因隳靡至是乃斬然翦剔而一新之凶惡貪殘禁不得行而狡偽淫侈遊惰茍安之徒亦皆拂戾失常有所不便相與斐斐緝緝搆讒騰誹城狐社鼠之姦又從而黨比翕張之謗遂大行士夫之為元善危者沮之曰謗甚矣盍已諸元善如不聞也而持之彌堅行之彌決且曰民亦非無是非之心而蔽昧若是固學之不講而教之不明也吾寧無責而獨以咎歸于民則日至學宫進諸生而作之以聖賢之志啓之以身心之學士亦蔽于習染閧然疑怪以駭曰是迂闊之談將廢吾事則又相與斐斐緝緝訾毀而詆議之士夫之為元善危者沮之曰民之謗若火之始炎士又從而膏之孰能以無燼乎蓋遂巳諸元善如不聞也而持之彌堅行之彌決則又緝稽山書院萃其秀潁而日與之諄諄焉亹亹焉越月踰時誠感而意孚三學泊各邑之士亦漸以動日有所覺而月有所悟矣于是爭相奮曰吾乃今知聖賢之必可為矣非侯之至吾其已夫侯真吾師也于是民之謗者亦漸消沮其始猶曰侯之于我利害半我之于侯恩愛半至是惠洽澤流而政益便相與悔曰吾始不知侯之愛我也而反以為殃我也吾始不知侯之拯我也而反以為勞我也我其無人之心乎侯真吾之嚴父也慈母也于是侯且入覲百姓皇皇請留不得相與謀之多士曰吾去慈母吾將安哺乎嚴父吾去吾將安恃乎士曰吁嗟維父與母則生爾身維侯我師實生我心吾寧可以一日而無吾師之臨乎則相與假重于陽明子而乞留焉陽明子曰三年之覲大典也侯焉可留乎雖然此在爾士爾民之心夫承志而無違子之善養也離師友而不背弟子之善學也不然雖居膝下而侍几杖猶為不善養而操戈入室者也奚必以留侯為哉衆皆默然良久曰公之言是也相顧逡巡而退明日復師生相率而來請曰無以輸吾之情願以公言致之于侯庶侯之遄其來旋而有以速諸生之化慰吾民之延頸也送聞人邦允序聞人言邦允者陽明子之表弟也將之官閩之嵢峽而請言陽明子謂之曰重矣勿以進非科第而自輕榮矣勿以官卑而自慢夫進非科第則人之待之也易以輕從而自輕者有矣官卑則人之待之也易以慢從而自慢者有矣夫科第以致身而恃以為暴是厲階也髙位以行道而遽以媒利是盜資也于吾何有哉吾所謂重吾有良貴焉耳非矜與敖之謂也吾所謂榮吾職易舉焉耳非顯與耀之謂也夫以良貴為重舉職為榮則夫人之輕與慢之也亦于吾何有哉行矣吾何言送别省吾林都憲序戊子嘉靖丁亥冬守仁奉命視師思田省吾林君以廣西右轄實與有司既思田來格謀所以緝綏之道咸以為非得寬厚仁恕德威素為諸夷所信服者父臨而母鞠之殆未可以強力詭計劫制于一時而能久于無變者也則莫有踰于省吾者遂以省吾之名上請乞加憲職委之重權以留撫于兹土蓋一年二年而化洽心革朝廷永可以無一方顧也乎則又以為聖天子方側席勵精求卓越之才須更化善治則如省吾之成德夙望大臣且交章論薦或者請未及上而先已有隆委峻擢恐未肯為區區兩府之遺黎淹歲月而借之以重也疏去未踰月而巡撫鄖陽之命果下矣當是時八寨之徭積禍千里且數十年方議進兵討罪省吾將率思田報效之民以先之報聞衆咸為省吾賀且謂得免兵革驅馳之勞也省吾曰不然當事而中輟之仁者忍之乎遇難而茍避之義者為之乎吾既身任其責幸有改命而亟去之以為吾心吾能如是哉遂弗停驅而往冒暑雨犯瘴毒乘危破險竟成八寨之伐而出嗟乎今世士夫計逐功名甚于市井刀錐之較稍有患害可相連及輒設機阱立黨援以巧脫幸免一不遂其私瞋目攘臂以相抵捍鈎摘公然為之曾不以為耻而人亦莫有非之者蓋士風之衰薄至于此而亦極矣而省吾所存獨與時俗相反若是古所謂托孤寄命臨大節而不可奪者省吾有焉正德𥘉某以武選郎抵逆瑾逮錦衣獄而省吾亦以大理評觸時諱在繫相與講易于桎梏之間者彌月蓋晝夜不怠忘其身之為拘囚也至是别已餘二十年而始復會于此省吾貌益充氣益粹議論益平實而其孜孜講學之心則固如昔加懇切焉公事之餘相與訂舊聞而考新得豫自近年偶有見于良知之學遂具以告于省吾而省吾聞之沛然若決江河可謂平生之一快無負于二十年之别也矣今夫天下之不治由于士風之衰薄而士風之衰薄由于學術之不明學術之不明由于無豪傑之士者為之倡焉耳省吾忠信仁厚之質得之于天者既與人殊而其好學之心又能老而不倦若此其德之日以新而業之日以廣也何疑乎自此而明學術變士風以成天下治將不自省吾為之倡也乎于省吾之别庸書此以致切劘之意若夫期望于聲位之間而繫情于去留之際是奚足為省吾道之哉王文成公全書卷二十二終
