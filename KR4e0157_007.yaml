front:
  text: 王文成公全書卷之十二
  hash: sha256:eb240fcc813a517e679da55415c31d28256f72a44e98f29568240b1ab4f7e388
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0157_SBCK_007-1a}
body:
  text: 别録四奏疏飛報寧王謀反疏十四年六月十九日正德十四年六月𥘉五日節該欽奉勑福州三衛軍人進貴等脅衆謀反特命爾暫去彼處地方會同查議處置參奏定奪欽此欽遵臣于本月𥘉九日自贛州啓行至本月十五日行至豐城縣地名黃土腦據該縣知縣等官顧佖等稟稱本月十四日寧府稱亂將孫都御史許副使并都司等官殺死巡按及三司府縣大小官員不從者俱𬒳執縛不知存亡各衙門印信盡數收去庫藏搬搶一空見監重囚俱行釋放舟楫蔽江而下聲言直取南京一靣分兵北上各官皆來沮臣不宜輕進其時臣尚未信然逃亂之民果已四散奔潰人情洶洶臣亦自顧單旅危途勢難復進方爾回程隨有兵卒千餘已夾江並進前來追臣偶遇北風大作臣亦張疑設計整舟安行兵不敢逼幸而獲免本月十八日回至吉安府據知府伍文定等稟稱地方無主乞留暫回區畫逺近軍民亦皆遮擁呼號隨據臨江府并新淦豐城奉新等縣各差人飛報寧府遣兵四出攻掠拘收印信及拿掌印官員調取兵快水兊糧船盡𬒳驅脅而去等因臣奉前旨欲遂徑往福建但天下之事莫急于君父之難若彼順流東下萬一南都失備為彼所襲彼將乘勝北趨旬月之間必且動搖京輔如此則勝負之算未有所歸此誠天下安危之大機慮念及此痛心寒骨義不忍舍之而去故遂入城撫慰軍民督同知府等官武文定等調集兵糧號召義勇又約會致仕鄉官右副都御史王懋中飬病評事羅僑等與之定謀設策收合渙散之心作起忠義之氣相機乘間務為躡後之圖共成掎角之勢牽其舉動而使進不得前搗其巢穴而使退無所據日望天兵之速至庶解東南之倒懸伏望皇上省愆咎巳命將出師因難興邦未必非此臣以弱劣多病屢疏乞休况此地方之責本亦非臣之任今兹扶疾赴閩實亦意圖便道歸省臨發之前已具哀懇齎奏之人去才數日適當君父之急不忍失此事機姑復暫留期紓國難候區畫少定各官略可展布朝廷命師一臨亦遂遵照前旨入閩了事就彼歸省父疾進不避嫌退不避罪惟民是保而利于主臣之心也直行其報國之誠而忘其緩命之罪求伸其哀痛之情而甘冒棄職之誅臣之罪也竊照都御史王懋中評事羅僑忠義自許才識練逹知府伍文定果捷能斷忠勇有謀纍立戰功皆抑而不賞久淹外郡實屈而未伸今江西闔省見無一官若待他求緩無所及乞遂將各官授以緊要職任庶可責之拯溺救焚其餘若裁革兵備副使羅循飬病副使羅欽德郎中曾直御史周魯同知郭祥鵬省親進士郭持平驛丞李中王思等雖皆本土之人咸秉忠貞之節况亦見在同事當多難之日事宜從權庶克有濟再照寧府逆謀既著彼若北趨不遂必將還取兩浙南優湖湘窺留都以斷南北收閩廣以益軍資若不即為控制急遣重兵必將噬臍無及及照撫州府知府陳槐臨江府知府戴德孺贛州府知府邢珣袁州府知府徐璉寧都縣知縣王天與豐城縣知縣顧佖新淦縣知縣李美奉新縣知縣劉守緒泰和縣知縣李楫南安府同知朱憲贛州府同知夏克義龍泉縣知縣陳允諧及闔省各官今見在者乞勑吏部就于其中推輔本省方面知府兵備等官庶可速令供職其有城守之責者亦各量升職銜重其權勢使可展布又照南贛軍餉惟資鹽啇諸稅近因戶部奏革顧募之兵無所仰給悉巳散遣今未兩月即遇此變復欲召募將倚何資輒復遵依勑旨便宜事理仍舊舉行然亦緩不及濟必須先于兩廣積儲軍餉數內量借一十餘萬庶幾軍衆可集地方有賴國難可平緣係飛報地方謀反重情事理為此具本專差舍人來儀親齎謹題請旨再報謀反疏十四年六月二十一日節該欽奉勑福州三衛云云緣係飛報地方謀反重情事理為此具本先于本月十九日專差舍人來儀奏報外但叛黨方盛恐中途為所攔截合再具本專差舍人任光親齎謹題請旨乞便道省葬疏十四年六月二十一日臣以父老祖喪屢疏乞休未蒙憐準近者奉命扶􅍚赴閩意圖了事即從此地冒罪逃歸旬日之前亦巳具奏不意行至中途遭值寧府反叛此係國家大變臣子之義不容舍之而去又闔省撫巡方面等官無一人見在者天下事機間不容髮故復忍死暫留于此為牽制攻討之圖俟命師之至即從𥘉心死無所避臣思祖毋自幼鞠育之恩不及一面為訣每一號慟割裂昏殞日加尫瘠僅存殘喘毋喪權厝祖墓之側今葬祖毋亦欲因此改葬臣父衰老日甚近因祖喪哭泣過節見亦病卧苫廬臣今扶病驅馳兵革往來于廣信南昌之間廣信去家不數日欲從其地不時乘間抵家一哭略為經畫葬事一省父病臣區區報國血誠上通于天不辭滅宗之禍不避形迹之嫌冒非其任以勤國難亦望朝廷鑒臣之心不以法例繩縛使臣得少伸烏鳥之痛臣之感恩死且圖報搶攘哀控不知所云緣係懇乞天恩便道省葬事理為此具本奏聞奏聞宸濠偽造檄榜疏十四年七月𥘉五日正德十四年七月𥘉一日據吉安府知府伍文定申準領哨通判楊昉千戶蕭英在于墨潭地方捉獲寧府齎檄榜官趙承芳等二十員名解送到臣看得檄榜妄言惑衆譏訕主上當即毁裂又以事合聞奏隨即固封以進審據趙承芳供係南昌府學教授六月十三日寧府生日次日各官謝宴突起反謀殺死孫都御史許副使囚死黃參議馬主事其餘大小職官脅從不遂者俱𬒳監禁追奪印信放囚劫庫邀截兊米分遣逋寇四散摽掠聲言要取南京就往北京十六日親出城外迎取安福縣舉人劉飬正十七日迎取致仕都御史李士實該入府內號稱軍師太師名目二十一日將原禁各官放回各司差人看守二十二日令承芳并參政季斆代齎偽檄榜文赴豐城吉安贛州南安并王都御史及廣東南雄等處俱各不寫正德年號止稱大明已卯歲比承芳等不合怕死及因妻子𬒳拘旗校管押只得依聽齎至墨池地方蒙本院防哨官兵將承芳等拿獲隨審季斆供係先任南安府知府近升廣西參政裝帶家小由水路赴任行至省城適遇寧王生日傳令慶賀次日隨衆謝宴變起倉卒俱𬒳監禁比斆自分死國因妻女在船寫書令妻要死夫女俱死毋後因看守愈嚴求死不遂至二十一日放回本船懵死良久方蘇二十二日又將妻女拘執急呼斆進府將前偽檄榜差旗校十二人督押斆與承芳代齎斆計欲投赴軍門脫身報效不期官兵執送前來等因案照先為飛報地方謀反重情事已經二次差人具奏去後今審據前因參照寧王不守藩服敢此稱亂睥眤神器指斥乘輿擅殺大臣放囚劫庫稔不韙之罪犯無將之誅致仕都御史李士實恩遇四朝實託心膂舉人劉飬正舊假恬退之名新叨録用之典今皆反面事讐為之出謀發慮既同狗彘之行難逭斧鉞之誅參政季斆教授趙承芳義未決于舍生令已承于捧檄但暴虐之威恐動于中鷹犬之徒鈐制于外在法固所當罪據情亦有可憫除將趙承芳季斆監禁一面檄召兵民隨機應變竭力討賊一應事宜陸續奏聞處置外臣聞多難興邦殷憂啓聖陛下在位一十四年屢經變難民心騷動尚爾巡逰不已致宗室謀動干戈冀竊大寶且今天下之覬覦豈特一寧王天下之姦雄豈特在宗室言念及此凛骨寒心昔漢武帝有輪臺之悔而天下向治唐德宗下奉天之詔而士民感泣伏望皇上痛自刻責易轍改絃罷出姦諛以回天下豪傑之心絶迹巡逰以杜天下姦雄之望定立國本勵精求治則太平尚有可圖羣臣不勝幸甚為此具本并將偽檄一𥿄封固專差舍人秦沛親齎謹題請旨留用官員疏十四年七月𥘉五日照得江西寧府謀反據城練兵分兵攻劫囚禁方面官員有操戈向闕之勢此君父之大難臣子憤心之日也臣在吉安地方調兵討賊四路阻絶並無堪用官員適遇欽差兩廣清軍御史謝源刷卷御史伍希儒各赴京復命道經該府不能前進各官奮激思效力討賊以報朝廷臣亦思軍務緊急各官俱有印勑方便行事遂留軍前同心戮力經濟大難待事寧之日赴京復命緣係留用官員事理未敢擅便為此具本請旨江西捷音疏十四年七月三十日照得先因寧王圖危宗社興兵作亂巳經具奏請兵征剿外隨看得寧王隂謀不軌巳將十年畜飬死士二萬餘人招誘四方盜賊渠魁亦以萬數舉事之日復驅其護衛黨與并脅從之徒又六七萬人虐熖張熾臣以百數疲弱之卒勢不敢輕舉驟進乃退保吉安姑為宰制之圖時逺近軍民劫於寧王之積威道路以目莫敢出聲臣一面督率吉安府知府伍文定等調集軍民兵快召募四方報效義勇之士會計一應解留錢糧支給糧賞造作軍器戰船奏留公差回任監察御史謝源伍希儒分職任事一面約會該府鄉官先任右副都御史致仕王懋中飬病痊可編修鄒守益刑部郎中曾直評事羅僑丁憂監察御史張鰲山先任浙江僉事今赴部調用劉藍依親進士郭持平軍門參謀驛丞王思李中先任福建按察使致仕劉遜先任參政致仕黃繡先任嘉興府知府間住劉昭等相與激發忠義譬諭禍福移檄逺近布朝廷之深仁暴寧王之罪惡于是豪傑響應人始思奮區畫旬日官兵稍稍四集時寧王聲言先取南京臣慮南京尚未有備恐一時為彼所襲乃先張疑兵于豐城示以欲攻之勢故寧王先遣兵出攻南康九江諸處而自留居省城以禦臣至是七月𥘉二日探知臣等兵尚未集乃留兵萬餘屬其心腹宗支郡王儀賔內官并偽授都督都指揮等官使守江西省城而自引兵向闕臣晝夜促各郡兵期以本月十五日會臨江之樟樹而身督知府伍文定等兵徑下于是知府戴德孺引兵自臨江來知府徐璉引兵自袁州來知府邢珣引兵自贛州來通判胡堯元童琦引兵自瑞州來通判談儲推官王暐徐文英新淦知縣李美泰和知縣李楫寧都知縣王天與萬安知縣王冕亦各以其兵來赴十八日遂至豐城分布哨道使知府伍文定為一哨攻廣潤門入知府邢珣為二哨攻順化門入知府徐璉攻惠民門入知府戴德孺攻永和門入通判胡堯元童琦攻章江門入知縣李美攻德勝門入都指揮余恩攻進賢門入通判談儲推官王暐知縣李楫王天與王冕等各以其兵乘七門之釁傍夾攻擊以佐其勢是日得諜報寧王伏兵千餘於新舊墳厰以備省城之援臣乃遣奉新知縣劉守緒典史徐誠領兵四百從間道夜襲破之以搖城中十九日發市汊臣乃大誓各軍申布朝廷之威再暴寧王之惡約諸將一鼓而附城再鼓而登三鼓而不克誅伍四鼓而不克斬將已誓莫不切齒痛心踴躍激憤薄暮齊發二十日黎明各至信地先是城中為備甚嚴滚木灰瓶火炮石弩機毒之械無不畢具及臣所遣兵已破新舊墳厰敗潰之卒皆奔告城中城中已驚懼至是復聞我師四面驟集皆震駭奪氣我師乘其動搖呼譟並進梯絙而登城中之兵土崩瓦解皆倒戈退奔城遂破擒其居守宜春王栱樤及偽太監萬鋭等千有餘人寧王宫中眷屬聞變縱火自焚延及居民房屋臣當令各官分道救火撫定居民散釋脅從封府庫謹關防搜獲原𬒳劫收大小衙門印信九十六顆三司脅從官布政使胡濂參政劉斐參議許效廉副使唐錦僉事賴鳯都指揮王玘等皆自首投罪除將擒斬功次發御史謝源伍希儒權令審驗紀録一應事宜查審明白陸續具奏及一面分兵四路追躡寧王向往相機擒勦另行奏報外竊照寧王逆熖熏天衆號一十八萬屠城破郡逺近震懾今其猖獗已一月有餘而四方赴難之師尚未有一人應者前項領哨各官及監軍御史本主飬病丁憂致仕等官皆從臣起於顛沛危急之際并心協謀倡率義勇陷陳先登以克破此堅城據其巢穴此雖臣子職分當然亦其激切痛憤之本心但當此物情暌二動搖之日非賞罰無以鼓士氣今逆賊殺人如草芥又挾其厚貨賞賚所及一人動以千萬伏願皇上處變從權速將前項各官量加升賞以勵逺近事勢難為之日覆宗滅族之禍臣且不避况敢避邀賞之嫌乎緣係捷音事理為此具本專差千户詹明親齎謹具題知擒獲宸濠捷音疏十四年七月三十日照得先因寧王圗危宗社興兵作亂巳經具奏請兵征勦外隨看得寧王虐熖張熾臣以百數疲弱之卒未敢輕舉驟進乃退保吉安姑為牽制之圗時逺近軍民劫於寧王之積威道路以目莫敢出聲臣一面督率吉安府知府伍文定等調集軍民兵快召募四方報效義勇之士奏留監察御史謝源伍希儒分職任事一面約會該府鄉官都御史王懋中編修鄒守益郎中曾直評事羅僑監察御史張鰲山僉事劉藍進士郭持平參謀驛丞王思李中按察使劉遜參政黃繡知府劉昭等相與激發忠義移檄逺近布朝廷之深仁暴寧王之罪惡於是豪傑響應人始思奮時寧王聲言先取南京臣慮南京尚未有備恐為所襲乃先張疑兵於豐城示以𣣔攻之勢故寧王先遣兵出攻南康九江而自留居省城以禦臣至七月𥘉二日探知臣等兵尚未集乃留兵萬餘使守江西省城而自引兵向闕臣晝夜促兵期以本月十五日會臨江之樟樹而身督知府伍文定等兵徑下於是知府戴德孺徐璉邢珣通判胡堯元童琦談儲推官王暐徐文英知縣李美李楫王天與王冕各以其兵來赴十八日遂至豐城分哨道使知府伍文定等進攻廣潤等七門是日得諜報寧王伏兵千餘於新舊墳厰以援省城臣乃遣奉新知縣劉守緒等從間道夜襲破之以搖城中十九日發市汊大誓各軍申布朝廷之威再暴寧王之惡莫不切齒痛心踴躍激憤薄暮齊發二十日黎明各至信地先是城中為備甚嚴滚木灰瓶火炮機械無不畢具臣所遣兵巳破新舊墳厰敗潰之卒皆奔告城中城中皆已驚懼至是復聞我師四面驟集益震駭奪氣我師乘其動搖呼譟並進梯絙而登城中之兵皆倒戈退奔城遂破擒其居首宜春王拱樤及偽太監萬鋭等千有餘人寧王宫中眷屬聞變縱火自焚延各居民房屋臣當令各官分道救火散釋脅從封府庫謹關防以撫軍民除將擒斬功次發御史謝源伍希儒權令審驗紀録及一而分兵四路追躡寧王向往相機擒勦於本月二十二日已經具題外當於本日據諜報及據安慶逃回𬒳虜船戶十餘人報稱寧王於十六日攻圍安慶未下自督兵夫運土填塹期在必尅是日有守城軍門官差人來報贛州王都堂已引兵至豐城城中軍民震駭乞作急分兵歸援寧王聞之大恐即𣣔回舟因太師李士實等阻勸以為必須徑往南京既登大寶則江西自服寧王不應次日遂解安慶之圍移兵泊阮子江會議先遣兵二萬歸援江西寧王亦自後督兵隨來等因先是臣等駐兵豐城衆議安慶𬒳圍宜引兵直趨安慶臣以九江南康皆已為賊所據而南昌城中數萬之衆精悍亦且萬餘食貨充積我兵若抵安慶賊必回軍死鬪安慶之兵僅僅自守必不能援我於湖中南昌之兵絶我糧道而九江南康之賊合勢撓躡四方之援又不可望事難圖矣今我師驟集先聲所加城中必已震懾因而并力急攻其勢必下已破南昌賊先破膽奪氣失其根本勢必歸救如此則安慶之圍自解而寧王亦可以坐擒矣至是得報果如臣等所料當臣督同領兵知府會集監軍及倡義各鄉官等官議所以禦之之䇿衆多以寧王兵勢衆盛氣熖所及有如燎毛今四方之援尚未有一人至者彼慿其憤怒悉衆并力而萃於我勢必不支且宜斂兵入城堅壁自守以待四鄰之援然後徐圖進止臣以寧王兵力雖強軍鋒雖鋭然其所過徒恃焚掠屠戮之慘以威劫逺近未嘗逢大敵與之竒正相角所以鼓動扇惑其下者全以進取封爵之利為説今出未旬月而輒退歸士心既已携沮我若先出鋭卒乘其惰歸要迎掩擊一挫其鋒衆將不戰自潰所謂先人有奪人之氣攻瑕則堅者瑕也是日撫州府知府陳槐兵亦至于是遣知府伍文定邢珣徐璉戴德孺合領精兵伍百分道並進擊其不意又遣都指揮余恩以兵四百往來湖上以誘致賊兵知府陳槐通判胡堯元童琦談儲推官王暐徐文英知縣李美李楫王見王軾劉守緒劉源清等使各領兵百餘四面張疑設伏候伍文定等兵交然後四起合擊分布既定臣乃大賑城中軍民慮宗室郡王將軍或為內應生變親慰諭之以安其心又出給告示凡脅從皆不問雖嘗受賊官爵能逃歸者皆免死斬賊徒歸降者給賞使內外居民及鄉道人等四路傳播以解散其黨二十三日復得諜報寧王先鋒已至樵舍風帆蔽江前後數十里不能計其數臣乃分督各兵乘夜趨進使伍文定以正兵當其前余恩繼其後邢珣引兵繞出賊背徐璉戴德孺張兩翼以分其勢二十四日早賊兵鼓譟乘風而前逼黃家渡其氣驕甚伍文定余恩之兵佯北以致之賊爭進趨利前後不相及邢珣之兵前後橫擊直貫其中賊敗走文定恩督兵乘之璉德孺合勢夾攻四面伏兵亦呼譟並起賊不知所為遂大潰追奔十餘里擒斬二千餘級落水死者以萬數賊氣大沮引兵退保八字腦賊衆稍稍遁散寧王震懼乃身自激勵將士賞其當先者以千金𬒳傷者人百兩使人盡發九江南康守城之兵以益師是日建昌知府曽璵引兵亦至臣以九江不破則湖兵終不敢越九江以援我南康不復則我兵亦不能踰南康以躡賊乃遣知府陳槐領兵四百合饒州知府林珹之兵乘間以攻九江知府曾璵領兵四百合廣信知府周朝佐之兵乘間以取南康二十五日賊復并力盛氣挑戰時夙勢不便我兵少却死者數十人臣急令人斬取先却者頭知府伍文定等立於銃炮之間火燎其鬚不敢退奮督各兵殊死並進炮及寧王舟寧王退走遂大敗擒斬二千餘級溺水死者不計其數賊復退保樵舍連舟為方陳盡出其金銀以賞士臣乃夜督伍文定等為火攻之具邢珣擊其左徐璉戴德孺出其右余恩等各官分兵四伏期火發而合二十六日寧王方朝群臣拘集所執三司各官責其間以不致死力坐觀成敗者將引出斬之爭論未決而我兵已奮擊四面而集火及寧王副舟衆遂奔散寧王與妃嬪泣别妃嬪宫人皆赴水死我兵遂執寧王并其世子郡王將軍儀賔及偽太師國師元帥參贊尚書都督都指揮千百户等官李士實劉養正劉吉屠欽王編熊瓊盧珩羅璜丁饋王春吳十三凌十一秦榮葛江劉勳何鏜王信吳國七火信等數百餘人𬒳執脅從宫大監王宏御史王金主事金山按察使楊璋僉事王疇潘鵬參政程果布政梁辰都指揮郟文馬驥白昻等擒斬賊黨三千餘級落水死者約三萬餘棄其衣甲器仗財物與浮尸積聚橫亘若洲焉於是餘賊數下艘四散逃潰臣復遣各官分路追勦毋令逸入他境為患二十七日及之於樵舍大破之又破之於吳城擒斬復千餘級落水死者殆盡二十八日得知府陳槐等報亦各與賊戰於沿湖諸處擒斬各千餘級臣等既擒寧王而入闔城內外軍民聚觀者以數萬歡呼之聲震動天地莫不舉首加額真若解倒懸之苦而出於水火之中也除將寧王并其世子郡王將軍儀賔偽授太師國師元帥都督都指揮等官各另監羈候解𬒳執脅從等官并各宗室别行議奏及將擒斬俘獲功次一萬一千有奇發御史謝源伍希儒暫令審驗紀録另行造册繳報外照得臣節該欽奉敕諭但有盜賊生發即便嚴督各該兵備守備守巡并各軍衛有司設法調兵勦殺其管領兵快人等官員不問文職武職若在軍前違期并逗遛退縮者俱聼以軍法從事生擒盜賊鞠問明白亦聼就行斬首示衆斬獲賊級行令各該兵備守巡守備官即時紀驗明白備行江西按察司造册繳報查照事例升賞激勸欽此及準兵部題稱今後但草賊生發事情緊急該管官司即便依律調撥官軍乘機剿捕應合會捕者亦即調發䇿應等因節奉欽依備咨前來又節該奉敕如或江西别府報有賊情緊急移文至日爾亦要及時遣兵䇿應毋得違誤欽此俱經欽遵外竊照寧王蒸淫姦暴腥穢彰聞賊䃑善類剝害細民數其罪惡世所未有不軌之謀已踰一紀積威所劫逺𬒳四方士夫雖在千里之外皆蔽目搖手莫敢論其是非小人雖在幽僻之中且吞聲飲恨不敢訴其冤抑兼又招納叛亡誘致劇賊渠魁如吳十三凌十一之屬牽引數千餘衆召募四方武藝驍勇力能拔樹排關者亦萬有餘徒又使其黨王春等分齎金銀數萬隂置姦徒於滄州淮揚山東河南之間亦各數十比其起事之日從其護衛姻族連其黨與朋私驅脅商旅軍民分遣其官屬親䁥使各募兵從行多者數千少者數百帆檣蔽江衆號一十八萬其從之東下者實亦不下八九萬餘且又矯稱密旨以脅制逺近偽傳檄諭以搖惑人心故其舉兵倡亂一月有餘而四方震懾畏避皆謂其大事已定莫敢抗義出身與之爭衡從事抱節者僅堅城而自守忠憤者惟集兵以俟時非知謀忠義之不足其氣熖使然也臣以孱弱多病之質才不逮於凡庸知每失之迂繆當茲大變輒敢冒非其任以行旅百數之卒起事於顛沛危疑之中每月之間遂能克復堅城俘擒元惡以萬餘烏合之兵而破強寇十萬之衆是固上天之隂隲宗社之默佑陛下之威靈而廟廊謀議諸臣消禍於將萌而預為之處見幾於未動而潛為之制改臣提督使得扼制上流而凛然有虎豹在山之威申明律例使人自為戰而翕然有臂指相使之形敕臣以及時䇿應不限以地而隱然有常山首尾之勢故臣得以不俟詔旨之下而調集數郡之兵數郡之民亦不待詔旨之督而自有以赴國家之難長驅越境直搗窮追不以非任為嫌是乃伏至險於無形之中藏不測於常制之外人徒見嬖奚之多獲而不知王良之善御有以致之也然則今日之舉廟廊諸臣預謀早計之功其又孰得而先之乎及照御史謝源伍希儒監軍督哨謀畫居多倡勇宣威勞苦備嘗領哨知府伍文定邢珣徐璉戴德孺陳槐曾璵林珹周朝佐署都指揮僉事余恩分哨通判胡堯元童琦談儲推官王暐徐文英知縣李楫李美王冕王軾劉源清劉守緒傳南喬隨哨通判楊昉陳旦指揮麻璽髙睿孟俊知縣張淮應恩王庭顧佖萬士賢馬津等雖效績輸能亦有等列然皆首從義師爭赴國難協謀并力共收全功其間若伍文定邢珣徐璉戴德孺等冒險衝鋒功烈尤懋鄉官都御史王懋中編修鄒守益御史張鰲山郎中曽直評事羅僑僉事劉藍進士郭持平驛丞王思李中按察使劉遜參政黃繡知府劉昭等仗義興兵協張威武運籌贊畫夾輔折衝以上各官功勞雖在尋常征勦亦巳甚為難得况當震恐搖惑四方知勇莫敢一膺其鋒而各官激烈忠憤捐身徇國乃能若此伏願皇上論功朝錫之餘普加爵賞旌擢以勸天下之忠義以勵將來之懦怯仍詔示天下使知姦雄若寧王者蓄其不軌之謀已十有餘年而發之旬月輒就擒滅于以見天命之有在神器之不可窺以定天下之志尤願皇上罷息巡幸建立國本端拱勵精以承宗社之洪休以絶姦雄之覬覦則天下幸甚臣等幸甚緣係捷音事理為此具本專差千户王佐親齎謹具題知奏聞益王助軍餉疏十四年七月三十日近蒙益府長史司呈該本司啓案查寧藩有變巳經啓行外今照見奉提督都御史王案驗內稱本院已於七月𥘉九日領兵前往豐城縣市汊等處住劄刻日進攻省城牌差百戶楊鋭前來建昌府守取掌印官親自統兵毋分日夜兼程前進期本月十五十六日俱赴軍門面授約束并勢追勦及照知府曾璵報稱即日領兵起程前赴軍門聼調進攻等因看得國家之事莫大於戎今寧藩不軌驚動多方提督都御史等官倡義協謀進攻憤忠思勦上以紓朝廷南顧之憂下以解生民荼毒之苦况我殿下國朝分封至親理宜助餉軍門共紓國難具本啓奉令旨發銀一千兩差官胡敬儀衛副陸澄書辦官并旗校官等前去提督軍務王都御史處犒賞敬此敬遵除將銀兩差官管送前來外合行備由呈乞施行等因到臣為照寧王謀叛稔釁多年積威所劫無不萎靡况其舉事之𥘉擅殺重臣衆號一十八萬肆然東下雖平日士夫號稱忠義莫敢指斥今益王殿下乃心宗社出私帑以給軍餉非忠義奮發急於討賊豈能倡言助正以作興軍士之氣如此伏望皇上特勑奬勵以激宗室之義以永益王殿下為善之心以夾輔帝室天下臣民不勝幸甚除將原發白銀一千兩唱名給散軍士外緣係宗室出私帑以給軍餉事理為此具本請旨旱災疏十四年七月三十日據吉安等一十三府所屬廬陵等縣各申稱本年自三月至於秋七月不雨禾苗未及生發盡行枯死夏稅秋糧無從辦納人民愁嘆將及流離理合申乞轉逹寬免等因到臣節差官吏老人踏勘委自三月以來雨澤不降禾苗枯死續該寧王謀反乘釁鼓亂傳布偽命優免租稅小人惟利是趨洶洶思亂臣因通行告示許以奏聞優免稅糧諭以臣子大義申祖宗休飬之德澤暴寧王誅求無厭之惡由是人心稍稍安集背逆趨順老弱居守丁壯出征團保饋餉邑無遺户家無遺夫就使雨暘時若江西之民亦已廢耕耘之業事征戰之苦况軍旅乾旱一時併作雖富室大户不免飢饉下户小民得無轉死溝壑流散四方乎設或飢寒所迫徴輸所苦人自為亂將若之何如蒙乞敕該部暫將江西正德十四年分稅糧通行優免以救殘傷之民以防變亂之階伏望皇上罷冗貟之俸損不急之賞止無名之徴節用省費以足軍國之需天下幸甚請止親征疏十四年八月十七日正德十四年八月十六日準兵部咨該本部等衙門題內開南京守備參贊官連奏十分緊急軍情相應急為議處合無請命將官一員挂平賊將軍印充總兵官關領符嬐旗牌挑選各營精鋭官軍三千餘名各給賞賜銀兩布匹交兊正馱馬匹關給軍火器械上緊前去南京相機戰守再有的報就便會合各路人馬征進再請勑都御史王守仁選調堪用官軍民快親自督領於江西東南要路住劄把截相機行事仍委浙江布政司左參政閔楷選募處州民兵統領定擬住劄地方聽調䇿應勦捕再請敕一道齎付都御史王守仁不妨提督軍務原任兼巡撫江西地方前項所報軍情如果南京守備差人體勘再有的報聼前項領軍官出給榜文告示遍發江西地方張挂傳説曉諭但有能聚集義兵擒敘反逆賊犯者量其功迹大小封拜侯伯及升授都指揮千百户等官世襲賊夥內有能自相擒斬首官者與免本罪具奏定奪等因具題節該奉聖旨這江西寧王謀為不法事情重大你部裏既會官議處停當朕當親率六師奉天征討不必命將王守仁暫且準行欽此欽遵備咨到臣案查先為飛報地方謀反重情事屬者寧王宸濠殺害守臣舉兵謀逆臣於六月十九日具本奏聞之後調集軍兵擇委官屬激勵七氣振揚武勇七月二十日先攻省城墟其巢穴本月二十四等日兵至鄱陽湖與賊連日大戰至二十六日宸濠遂已就擒謀黨李士實等賊首凌十一等俱已擒獲賊從俱已掃蕩閩廣赴調兵士俱已散還地方驚優之民俱已撫帖臣一念忠憤誓不與賊俱生而迂踈薄劣之才實亦何能辦此是皆祖宗在天之靈我皇上聖武之懋昭本兵謀略之素定官屬協力士卒用命所致臣巳節次具本奏報外竊惟宸濠擅作辟威虐焰已張干逺睥睨神器隂謀久蓄於中招納叛亡輦轂之動靜探無遺迹廣致姦細臣下之奏白百無一通發謀之始逆料大駕必將親征先於沿途伏有姦黨期為博浪荆軻之謀今逆不旋踵遂已成擒法宜解赴闕門式昭天討然𣣔付之部下各官押解誠恐舊所潛布之徒尚有存者乘隙竊發或致意外之虞臣死且有遺憾况平賊獻俘固國家之常典亦臣子之職分臣謹於九月十一日親自量帶官軍將宸濠并逆賊情重人犯督解赴闕外緣係獻俘馘以昭聖武事理為此具木專差舍人金升親齎謹具題知奏留朝覲官疏十四年八月十七日正德十四年八月十六日臣駐軍江西省城據各領哨知府吉安府伍文定贛州府邢珣袁州府徐璉臨江府戴德孺撫州府陳槐饒州府林珹廣信府周朝佐建昌府曾璵連名呈稱正德十五年正月𥘉一日例應朝覲近因寧王謀反蒙臣督委各職并各縣掌印正官領兵征討今雖掃平尚留在省防禦及安輯地方未得回任其各縣掌印官雖未曽領兵緣各在任防禦城池措辦糧餉况布按二司及南昌府知府鄭瓛瑞州府宋以方俱自本年六月內先𬒳拘執未經復職管事南康九江二府亦𬒳殘破近方收復前項文册多未成造緣查舊規行期在即恐致遲誤合行呈乞奏知及通行各府州縣將册造完行委佐二首領官員齎繳應朝及布按二司亦乞裁處施行等因到臣據此為照三年述職係朝廷大典例該掌印正官赴京應朝但今叛亂雖平地方未輯徴調尚存瘡痍之民須撫旱荒猶熾意外之患當防况各官在省方圖防守之規未有還任之日若不查例奏留未免顧此失彼後悔無及合準所呈𣣔候奏請命下之日行令各府州縣佐二首領官齎册應朝復恐遲誤除一面通行各府州縣造册完備行委佐二首領官依期啓行其布按二司候有新任官員及南昌府行見在通判陳旦各造册赴朝其九江南康府縣并南康新建二縣委係官俱戴罪聼候吏部徑自裁處外緣係朝覲事理未敢擅便為此具本請旨奏聞淮王助軍餉疏十四年八月十七日近該淮府長史司呈該本司啓案查寧藩有變已經啓行外今照見奉提督都御史王案驗內稱本院已於七月𥘉九日領兵前往豐城縣市汊等處住劄尅日進攻省城牌差百户任全善前來饒州府守取掌印官親自統兵毋分雨夜兼程前進期本月十五十六日俱赴軍門面授約束并勢追勦及照知府林珹報稱即日領兵起程前赴軍門聼調進攻等因看得寧王敢為逆謀肆姦天紀提督都御史王首倡忠義作率智勇身任國家之急事關宗社之虞殿下藩翰之親憂心既切饋餉之助於理為宜具本啓奉令旨長史司將發下銀伍百兩差官胡祥等速齎前去少資提督軍門之用敬此敬遵除將銀兩差官管送前來外合行備由呈乞施行等因到臣照得先該益府出帑餉軍助義效忠已經具題外今淮王殿下亦能不靳私帑以助軍餉良由身同休戚之情心切門庭之寇所致伏望皇上特敕奬勵以彰淮王殿下助正之心以為宗藩為善之勸天下臣民不勝幸甚恤重刑以實軍伍疏十四年八月二十五日據江西按察司呈據本司經歷司呈蒙巡按兩廣監察御史謝源伍希儒各𥿄牌前事俱奉本院送發犯人裘良輔等二百六十六名轉送本司問報等因依蒙問得犯人裘良輔招係南昌府新建縣三十二都民納粟監生給假在家正德九等年月日不等與同在官南昌前左二衛舍餘楊滋楊富軍餘董俞周大貴及指揮何鏜等家人何祥曹成等各不合出入王府生事害人向未事發正德十四年六月十四日寧王謀反良輔與楊滋等各因畏懼寧王威惡各不合知情從逆做兵領受盤費銀二兩米一石跟同前去安慶等處攻打城池各將銀米費用訖於七月十二等日行至湖口等縣思係叛逆懼怕官兵就行四散逃回各𬒳南昌等府縣統兵知府等官并地方人等陸續拿獲解赴提督王都御史處蒙將良輔等一百八十四名轉送謝御史將夏景周大貴熊受等八十二名轉送伍御史俱發按察司審問蒙將良輔等研審前情明白取問罪犯楊滋等二百六十五名各招與裘良輔楊滋楊富王偉夏景黃俞周大貴何祥曹成丁進受楊慶童楊貴萬徐七萬羊七徐四保孫住保周江胡勝福朱潑飬宋貴王明熊明秦蘭王仲鑑張雄朱其添喜蕭崇真朱祥彭隆保徐仕貴郭宣舒鑾萬嶽蕭述羅俊江潮漢魏鳯萬三羅秀熊福蕭曰貴蕭勝雷天富蕭文尹天受胡進保李鑾鄭鳯黃信劉勝殷醮仔甘奇余福童郭進福沈仕英李洪珊許鳯李景良江鑾江仁李欽鄧倫胡福受談黑仔趙正七朱環二鄒秋狗陳良二聶景祥魏仲華王福李壽余與王貫劉松牛才陳珂陳興陳釗劉添鳯余似虎甘朴謝天鳯鄭貴沈昌容萬清向楚秀郭鑾丁勝福萬全龔受熊六保陳諫何晚仔王杰一王琪胡宣楊正曽受王鳯王明雷清皮志淵鄒奎髙馮軒四毛守松熊天祥李伯錦楊子秀陳天一廖進祿魏紹魏天孫吳富陳昭弟李伯奇薑福廖奇四夏天奇陳善五羅勝七郭謹羅璽朱長子陳瑞竹漢王寬冮天友陳良善召一陳子政廬蕭勝馬龍陳大倫陳子偷李錢陳九信徐義徐釗劉儀熊孟華王尚文王天爵傅十二徐受萬奇趙仕奇鄭朴馮軒二馮進祿周孟貞周江劉朋唐朝賢歐陽南馬興周興王毛子泰進興羅興李保一萬元林三十八馬爵張進孫髙四談受吳俊萬鏜熊守貴錢龍胡通金萬春曹太喻欽劉後濟胡二王世通魏友子楊章熊祿熊剋名童保子余景陳四保許虎保熊受蕭文榮楊廷貴羅富丁關保江仕言劉貴丁朋歐陽正王引弟熊富唐天祿王貴周受丘松胡秀李福洪江曽興丘桂劉鎮鄧山蕭清夏勝四夏由孫甘繼張錦謝魯仙熊華謝鳯夏龍婁奇陸仲英余勝虎李進胡勝阮天祥張全彭天祥洪經仔徐受樂福張奇馮進隆馮詔馮喜子楊燁揭文興萬孔湖易忠黃延曹天右徐大貴蕭曰髙蕭曰廣李鑾吳顯二李貴陳英陳升李勝祖蕭天佐陸九成郭欽楊順丁祖李萬杜楊鑾袁富楊黃子吳文張鑾方燦萬天鑾胡進童黃勝德凃祖唐歷所犯除不應輕罪外合依謀反知情故縱者律斬決不待時但寧王平昔威惡慘毒上下人心罔不震懾各犯從逆雖是可惡原情終非得已及照南昌前衛軍餘多係脅從𬒳殺見今軍伍缺人合無將各犯免其前罪俱編發本衛永逺充軍庶使情法交申衛所填實呈詳到臣參看得裘良輔等俱曾從逆應該處斬但該司參稱寧王平昔威惡慘毒上下人心罔不震懾據法在所難容原情亦非得已宥之則失於輕處斬似傷于重合無俯順輿情乞敕該部查照酌量或將各犯免其死罪令其永逺充軍不惟情法得以兩盡抑且軍伍不致缺人緣係恤重刑以實軍伍事理為此具本請旨處置官員署印疏十四年八月二十五日照得先因寧王圖危宗社興兵作亂劫奪江西都布按三司并南昌府縣大小衙門印信臣隨調集各府官軍民快於本年七月二十日攻復省城當於府內搜獲前項印信共計一百六顆到臣收候已經捷報外今照寧王已擒餘黨誅戮地方幸已稍寧所有三司府縣衙門俱係錢糧刑名軍馬城池等項重務關涉匪輕况今兵亂之後人民困苦不可一日缺官幹辦撫輯但三司等官俱係𬒳脅有罪人數若待别除官員到日非惟人心惶惑抑且事無統紀臣遵照欽奉敕諭便宜事理將三司印信布政司暫令布政使胡濓按察司暫令按察使楊璋各戴罪護管隨該新任參議周文光按察使伍文定先後到任各已替管外其都司暫令都指揮馬驥提學道關防令副使唐錦南昌道印信令僉事王疇南昌府印信令知府鄭瓛南新二縣印信令知縣陳大道鄭公奇各戴罪暫且管理外及照南昌前左二衛并各撫所衙門印信俱各無官管理除用木匣收盛封發按察司仍候事寧有官之日該司徑發掌管外緣係處置官員署印以安地方事理為此具本題知二乞便道省葬疏十四年八月二十五日照得先準吏部咨該臣奏稱以父老祖喪屢疏乞休未蒙憐準近者奉命扶疾赴閩意圖了事即從彼地冒罪逃歸旬日之前亦已具奏不意行至中途遭值寧府反叛係國家大變臣子之義不容舍之而去又闔省撫巡方面等官無一人見在者天下事機間不容髮故復忍死暫留於此而為牽制攻討之圖俟命帥之至即從𥘉心死無所避臣思祖母自幼鞠育之恩不及一面為訣每一號慟割裂昏殞日加尫瘠僅存殘喘母喪權厝祖墓之側今葬祖母亦𣣔因此改葬臣父衰老日甚近因祖喪哭泣過節見亦病卧苫廬臣今扶病驅馳兵革往來於廣信南昌之間廣信去家不數日𣣔從其地不時乘間抵家一哭略為經畫葬事一省父病臣區區報國血誠上通於天不辭滅宗之禍不避形迹之嫌冒非其任以勤國難亦望朝廷鑒臣此心不以法例繩縳使臣得少伸烏鳥之痛臣之感恩死且圗報搶攘哀控不知所云等因具本奏奉聖旨王守仁奉命巡視福建行至豐城一聞宸濠反叛忠憤激烈即便倡率所在官司起集義兵合謀勦殺氣節可嘉已有旨著督兵討賊兼巡撫江西地方所奏省親事情待賊平之日來説該部知道欽此備咨到臣除欽遵外近照寧王逆黨皆已仰賴皇上神武廟堂神算悉就擒獲地方亦已平靖百姓室家相慶得免徴調之苦復有更生之樂莫不感激洪恩沾𬒳德澤獨臣以父病日深母喪未葬之故日夜哀苦憂疾轉劇犬馬驅馳之勞不足齒録而烏鳥迫切之情實可矜憫已蒙前旨許待賊平之日來説故敢不避斧鉞復伸前請伏望皇上仁覆曲成容臣暫歸田里一省父病經紀葬事臣不勝哀懇苦切祈望之至處置從逆官貟疏十四年八月二十五日正德十四年七月二十三日據南昌府知府鄭瓛自寧王賊中逃出投到本月二十六日又據領兵官臨江府知府戴德孺等臨陳奪獲先𬒳寧王脅去巡按監察御史王金户部公差主事金山左布政使梁宸參政程杲按察使楊璋副使賀鋭僉事王疇潘鵬都指揮同知馬驥許清都指揮僉事白昻守備南贛都指揮僉事郟文并脅從用事參政王綸及據先𬒳脅從令赴九江用事僉事師夔先𬒳脅從賊敗脫走鎮守太監王宏各投送到臣照得先因寧王宸濠於六月十四日殺害巡撫右副都御史孫燧副使許逵將各官綁縛迫脅時臣奉命福建勘事行至豐城聞變顧惟地方之責雖職各有專而亂賊之討實義不容避遂連夜奔還吉安督同知府伍文定等調集南贛等府軍兵捐軀進勦至七月二十日攻破省城搗其巢穴隨有𬒳脅在城右布政使胡濂參政劉斐參議許效廉副使唐錦僉事賴鳯都指揮僉事王紀各投首到臣彼時軍務方殷暫將各官省候督兵擒獲宸濠并逆黨李士實劉吉凌十一等臣已先後具本奏報去後本年八月二十三日會集知府伍文定等將各事情逐一研審得布政梁宸等各執稱本年六月十三日寧王生日延待各官酒席次日進府謝酒不期寧王謀逆喝令官校多人將前各官并先存後監故户部公差主事馬思聰參議黃宏原任參議今升陜西參政楊學禮等俱各背綁要殺當將孫都御史許副使押出斬首其餘各官俱杻鐐發儀衛司等處監禁王綸留府用事知府鄭瓛先𬒳寧王誣奏見監按察司瑞州府知府宋以方緣事在省本日俱拏監儀衛司差人將各衙門印信搜奪入府後參議黃宏主事馬思聰各不食相繼在監身故寧王差人入監踈放各官杻鐐王疇鄭瓛二人不放本月二十一日將梁宸胡濂劉斐賀鋭各放回本司本日寧王傳檄各處令人寫成布政司咨呈備云檄文轉呈府部自將搜去印信印使付與梁宸僉押梁宸不合畏死聼從僉押訖本月二十三日寧王告廟出師祭旗加授王綸贊理軍務與劉吉等一同領兵王綸不合畏死聼從本日久差柴內官等帶領人衆將兩司庫內官銀強搬入府梁宸賀鋭在司署印不合畏死不行阻當本日將楊璋仍拘儀衛司各官改監湖東道本月二十六七等日寧王差儀賔李琳等將伊收積米榖給散省城軍民以邀人心著令程杲潘鵬監放各不合畏死到彼看放二十七日寧王因先遣承奉屠欽等帶領賊兵往攻南京各賊屯劄鄱陽湖上久候寧王不出自行攻破南康九江掠取財物二府人民走散寧王要得招撫以收人心押令師夔前去曉諭不合畏死往彼安撫本月二十八日寧王因要起程往取南京恐省城變動𣣔結人心又差偽千户朱真送銀五百兩與布政司梁宸胡濂劉斐程杲許效廉各不合畏死暫收入巳又將銀七百兩送按察司楊璋唐錦賀鋭王疇師夔潘鵬賴鳯亦不合畏死暫收入巳又押令劉斐王玘替伊巡守并押令許效廉賴鳯替伊接管放糧各不合畏死守城放米七月𥘉一日差人將胡濂唐錦送還本司楊學禮放令之任將梁宸程杲楊璋賀鋭王疇潘鵬馬驥許清白昻郟文鄭瓛宋以方脅拘上船隨行分投差撥儀賔等官張嵩等帶領舍校看守又將銀二百兩差偽千户吳景賢分送梁宸胡濂劉斐許效廉等及差萬鋭送銀三百兩分送楊璋唐錦賀鋭師夔潘鵬賴鳯各又不合畏死暫收入巳本月𥘉八日至安慶見攻城不克因潘鵬係安慶人差今逃引禮白泓押同潘鵬不合畏死聼從賫捧檄文到彼招降本月十五日寧王因聞提督王都御史兵將至省回兵歸救省城行至鄱陽湖地方屢戰屢敗至二十六日早蒙大兵突至寧王𬒳擒各官因得脫走前來知府宋以方不知存亡等因隨據布按二司呈開布政司梁宸胡濂劉斐程斐許效廉按察使楊璋唐錦賀銃王疇師夔潘鵬賴鳯各令家人首送前銀各在本司貯庫等因尤恐不的吊取見監擒獲逆黨劉吉屠欽凌十一等各供稱相同為照參政王綸脅受贊理僉事潘鵬師夔𬒳脅招降撫民情罪尤重王綸師夔又該直隸湖廣撫按等衙門各具本參奏知府鄭瓛已經别案問結奏請俱合候命下之日遵奉另行外參照布政梁宸參政劉斐程杲參議許效廉副使賀鋭僉事賴鳯都指揮王玘或行咨撫守或盤庫放糧勢雖由於迫脅事已涉於順從鎮守太監王宏御史王金主事金山布政胡濂按察使楊璋副使唐錦僉事王疇都指揮馬驥許清白昻郟文或𬒳拘於城內或脅隨於舟中事雖涉於順從勢實由於迫脅以上各官甘𬒳囚虜而不能死忍受賊賄而不敢拒責以人臣守身之節皆巳不能無虧就其情罪輕重而