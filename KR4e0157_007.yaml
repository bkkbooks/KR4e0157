刀鎗劫去共一十一萬九千二百二十四件九江衛𬒳賊劫去軍器二千六百三十九件演武􅈦軍器一萬六百三十件并響器八十餘件鎮撫監賊犯蔡日竒等七名盡行劫取釋放及燒毀大哨船五隻軍舍房屋七十六間駕去大哨船二隻小哨船十一隻德化縣𬒳賊將縣庫銀共三百二兩零預備倉稻榖一萬七千二百石零縣監輕重囚犯二十名盡行劫放及燒毁官民房屋七百五十九間殺死男婦一十五名潯陽驛𬒳賊燒毀官廳一座耳房二間及站船鋪陳等物惟指揮劉勳將兵備衙門賞功支剩銀三十兩六錢及贓罰銀三十二兩并運軍行糧折銀二十九兩六錢收貯私家捏開在衛𬒳劫事涉侵欺及查九江府鈔厰寄庫銀兩行拘庫子皮廷貴等審供侵分料銀一千一百零六兩四錢情由在官將各犯送府監候拘齊未到人犯追問回報及查得僉事師夔持奉偽檄前至九江安撫因見府衛等官不從偽命駕船去訖續查得該俯所屬湖口縣於六月十七日西時𬒳逆黨熊內官等押兵到縣因無城池知縣章玄梅等帶印暫避縣後嶺背集兵次日對敵殺死逆黨魏清等𬒳賊殺死民快壯丁共一百二十名殺死居民一十一名放出縣監重囚三名輕犯一十一名燒毀房屋二十間民房一千八百三十五間本縣官庫銀兩先已窖藏及各衙門印信俱各見在止𬒳劫去在倉米一百五十九石在庫皮盔鐡銃弓弩三百件鐡彈子三十二斤及衣服靴鈔等物并將逺近年分卷册俱各毀壞彭澤縣於六月十八日卯時𬒳賊蜂擁上街延燒房屋吏舍一百餘間並無虜掠男婦當有知縣潘琨督同巡捕官兵守保印信倉庫錢糧文卷俱全德化縣於六月十七日𬒳從逆護衛指揮丁綱等統帶旗校到屯點取軍丁致𬒳驚散鄉村男婦該縣嚴督兵快人等保守城池俱各無虞除重復查勘明白將湖口彭澤二縣𬒳害人民行令該府斟酌𬒳害重輕將見在錢糧加意賑恤其德化縣𬒳害之家緣無錢可支已行該府徑申本院請發錢糧賑恤使𬒳害殘民得以存濟職等仍行多方撫諭激以忠義戒以勤儉人皆感服遵聽遂有更生之樂等因又據知府曾璵周朝佐呈稱查勘得南康府六月十六日夜𬒳賊船一千餘隻衝入本府彼有該府通判俞椿推官王詡公出未回知府陳霖同知張祿通判蔡讓因見城池新築未完民兵寡少同附郭星子縣掌印佐二并府縣儒學倉場局務等官各帶卬信潛避廬山賊遂入城殺死官舍民快劉大等一十二名𬒳搬劫府庫金一兩五錢零紫陽遺惠倉原貯榖一千七石零劫放府獄重輕囚犯一百一十一名燒毀六房卷宗黃册及掠劫居民房屋家財知府陳霖等潛住各鄉集兵陸續擒斬賊犯共二百三十餘名顆至二十七日餘賊五百餘人奔來河下知府陳霖同州縣各官督兵擒斬賊犯一百餘名顆適遇委官知府曽璵周朝佐各帶官兵自王家渡一路追賊到府協力勦殺各起餘賊又擒殺賊共三百三十餘名顆各解審訖查得星子縣知縣王淵之𬒳賊追跌致死署印縣丞曹時中當將印信付與吏熊正背負同主簿楊本祿俱入廬山曹時中逃躲不知去向兵快胡碧玉等五名𬒳賊殺死及劫虜居民男婦徐仲德等五十八名口焚燒房屋并劫掠居民共五百三十六人家劫放獄囚弓正道等四十四名縣廊庫銀九十七兩零及贓物鈔貫俱𬒳劫去止有銀二百一十三兩四錢八分係庫子戴汶泗收藏回家首出還官陸續擒獲賊犯顔濟等二十名又查得都昌縣原無城池聞賊入境署印主簿王鼎典史王仲祥率兵迎敵保守倉庫俱不曽𬒳劫𬒳賊殺死淹死兵快居民假容等三十一名焚燒劫掠居民共一千二百一十六家又查建昌縣原無城池逆黨儀賔李世英等帶領賊兵三百餘名來縣知縣方鐸縣丞錢惠主簿王鉞同儒學教諭唐汶等見勢不敵各帶印信潛避集兵當𬒳李世英將獄禁囚犯熊澄等八十四名盡行劫放並無劫掠焚燒倉庫錢糧官民房屋隨𬒳方鐸陸續擒獲李世英等一百七十五名口解報訖又查訪勘得安義縣新創城池未完𬒳逆黨旗校火信等領兵到縣將官廳燒毀三間六房文卷俱𬒳棄毀知縣王軾因見賊勢衆多退避集兵主簿董國宣因男董茂隆投入寧府懼罪逃走儒學訓導陳仕端等亦隨縣官避出其倉庫獄禁居民房屋俱不曽𬒳焚劫王軾同各官前後領兵擒斬賊共一千餘名顆轉解訖撫回南康府各屬縣復業逃民一萬二千四百餘家遵奉通行各屬暫令管事及賑恤事宜另行申請等因各呈到臣會同各官訪勘相同臣等議得九江南康府衛所縣大小官員均有守土之寄俱犯失事之律𣣔將各官通革管事待罪緣地方殘破之餘又係朝覲年分無官可委更代姑從權宜暫行管事其各府縣𬒳害人民并缺乏軍資已於先取見在錢糧內量數查發前去賑給外參照九江地方當水陸之衝據湖湘之要朝廷以其控帶南圻屏蔽江右實為要地故既有府衛之守又特為兵備之設其城池三面臨水地勢四圍險固平時守備若嚴臨變必難驟破各該守備官員安於承平寬縱軍士雖預知賊報而倉惶無備及一聞賊至而望風奔走指揮劉勳除監守自盜官錢外與李泮等棄城先遁致賊殘破知府汪潁推官陳深知縣徐志道等因見守戰無兵亦各懷印逃難百户白升等一印不保安望守城副使曹雷職專兵備防守不嚴雖城破之日偶幸不與而失事之責終為有因再照南康地方固稱土瘠民稀然亦負山阻水雖新創之城尚爾修築未完而守土之職惟當效死勿去該府知府陳霖同知陳祿通判蔡讓星子縣主簿楊永祿等畏縮無備逃難棄城湖口建昌二縣知縣章玄梅方鐸聞賊先遁致殘縣治安義縣知縣王軾賊黨在境不知先事之圗後雖有功無救地方之變彭澤縣知縣潘琨都昌縣主簿王鼎等印信倉庫雖獲無虞而都昌𬒳賊殺死兵快彭澤𬒳賊燒劫居民失事之責亦有攸歸星子縣縣丞曹時中安義縣主簿董國宣一則脫逃不首一則縱子投賊至於各該府縣首領儒學倉場局務等官雖無守土之責俱有棄職之罪以上各官求情固有輕重揆義俱犯憲條雖有後獲之功難掩先失之罪及照近年以來士氣不振兵律欠嚴蓋由姑息屢行激勵之方不立規利避害者獲免委身效職者難容是以偷靡成習節義鮮彰伏望皇上大奮乾剛肅清綱紀乞敕法司參詳情罪輕重通將各官究治如律雖或量功末減亦必各示懲創庶有作新之機足為將來之警王文成公全書卷之七文録四序記説别三子序丁卯自程朱諸大儒沒而師友之道遂亡六經分裂於訓詁支離蕪蔓於辭章業舉之習聖學幾於息矣有志之士思起而興之然卒徘徊嗟咨逡巡而不振因弛然自廢者亦志之弗立弗講於師友之道也夫一人為之二人從而翼之已而翼之者益衆焉雖有難為之事其弗成者鮮矣一人為之三人從而危之己而危之者益衆焉雖有易成之功其克濟者亦鮮矣故凡有志之士必求助於師友無師友之助者志之弗立弗求者也自豫始知學即求師於天下而莫豫誨也求友於天下而與豫者寡矣又求同志之士二三子之外邈乎其寥寥也殆豫之志有未立邪蓋自近年而又得蔡希顔朱守中於山隂之白洋得徐曰仁於餘姚之馬堰曰仁豫妹壻也希顔之深潛守中之明敏曰仁之溫恭皆豫所不逮三子者徒以一日之長視豫以先輩豫亦居之而弗辭非能有加也姑𣣔假三子者而為之證遂忘其非有也而三子者亦姑欲假豫而存師友之餼羊不謂其不可也當是之時其相與也亦渺乎難哉豫有歸隱之圖方將與三子就雲霞依泉石追濂洛之遺風求孔顔之真趣灑然而樂超然而遊忽焉而忘吾之老也今年三子者為有司所選一舉而盡之何豫得之之難而有司者襲取之之易也豫未暇以得舉為三子喜而先以失助為豫憾三子亦無喜於其得舉而方且戚於其去豫也􅃮雕開有言吾斯之未能信斯三子之心歟曾點志於詠歌浴沂而夫子喟然與之斯豫與三子之冥然而契不言而得之者歟三子行矣遂使舉進士任職就列吾知其能也然而非所𣣔也使遂不進而歸詠歌優遊有日吾知其樂也然而未可必也天將降大任於是人必先違其所樂而投之於其所不𣣔所以衡心拂慮而增其所不能是玉之成也其在茲行歟三子則焉往而非學矣而豫終寡於同志之助也三子行矣沉潛剛克髙明柔克非箕子之言乎溫恭亦沉潛也三子識之焉往而非學矣苟三子之學成雖不吾邇其為同志之助也不多乎哉增城湛原明宦於京師吾之同道友也三子往見焉猶吾見也巳贈林以吉歸省序辛未陽明子曰求聖人之學而弗成者殆以志之弗立歟天下之人志輪而輪焉志裘而裘焉志巫醫而巫醫焉志其事而弗成者吾未之見也輪裘巫醫遍天下求聖人之學者間數百年而弗一二見為其事之難歟亦其志之難歟弗志其事而能有成者吾亦未之見也林以吉將求聖人之事過豫而論學豫曰子盍論子之志乎志定矣而後學可得而論子閩也將閩是求而豫言子以越之道路弗之聼也豫越也將越是求而子言豫以閩之道路弗之聼也夫久溺於流俗而驟語以求聖人之事其始也必將有自餒而不敢當已而舊習牽焉又必有自眩而不能決已而外議奪焉又必有自沮而或以懈夫餒而求有以勝之眩而求有以信之沮而求有以進之吾見立志之難能也巳志立而學半四子之言聖人之學備矣苟志立而於是乎求焉其切磋講明之益以吉自取之尚其有窮也哉見素先生子諸父也子歸而以豫言正之且以為何如送宗伯喬白巖序辛未大宗伯白巖喬先生將之南都過陽明子而論學陽明子曰學貴專先生曰然豫少而好奕食忘味寢忘寐目無改觀耳無改聼蓋一年而詘鄉之人三年而國中莫有豫當者學貴專哉陽明子曰學貴精先生曰然豫長而好文詞字字而求焉句句而鳩焉研衆史核百氏蓋始而希迹於宋唐終焉浸入於漢魏學貴精哉陽明子曰學貴正先生曰然豫中年而好聖賢之道奕吾悔焉文詞吾愧焉吾無所容心矣子以為奚若陽明子曰可哉學奕則謂之學學文詞則謂之學學道則謂之學然而其歸逺也道大路也外是荆棘之蹊鮮克逹矣是故專於道斯謂之專精於道斯謂之精專於奕而不專於道其專溺也精於文詞而不精於道其精僻也夫道廣矣大矣文詞技能於是乎出而以文詞技能為者去道逺矣是故非專則不能以精非精則不能以明非明則不能以誠故曰惟精惟一精精也專一也精則明矣明則誠矣是故明精之為也誠一之基也一天下之大本也精天下之大用也知天地之化育而况於文詞技能之末乎先生曰然哉豫將終身焉而悔其晚也陽明子曰豈易哉公卿之不講學也久矣昔者衛武公年九十而猶詔於國人曰毋以老耄而棄豫先生之年半於武公而功可倍之也先生其不愧於武公哉某也敢忘國士之交警贈王堯卿序辛未終南王堯卿為諌官三月以病致其事而去交逰之贈言者以十數而猶乞言於豫甚哉吾黨之多言也夫言日茂而行益荒吾𣣔無言也久矣自學術之不明世之君子以名為實凡今之所謂務乎其實皆其務乎其名者也可無察乎堯卿之行人皆以為髙矣才人皆以為美矣學人皆以為博矣是可以無察乎自喜於一節者不足與進於全德之地求免於鄉人者不可以語於聖賢之途氣浮者其志不確心粗者其造不深外誇者其中日陋已矣吾惡夫言之多也虎谷有君子類無言者堯卿過焉其以豫言質之别張常甫序辛未太史張常甫將歸省告别於司封王某曰期之别也何以贈我乎某曰處九月矣未嘗有言焉期之别又多乎哉常甫曰斯邦期之過也雖然必有以贈我某曰工文詞多論説廣探極覽以為博也可以為學乎常甫曰知之辨名物考度數釋經正史以為密也可以為學乎常甫曰知之整容色修辭氣言必信動必果談説仁義以為行也可以為學乎常甫曰知之曰去是三者而恬淡其心專一其氣廓然而虛湛然而定以為靜也可以為學乎常甫默然良久曰亦知之某曰然知之古之君子惟有所不知也而後能知之後之君子惟無所不知是以容有不知也夫道有本而學有要是非之辨精矣義利之間微矣斯吾未之能信焉曷亦姑無以為知之也而姑疑之而姑思之乎常甫曰唯吾姑無以為知之而姑疑之而姑思之期而見吾有以復於子别湛甘泉序壬申顔子沒而聖人之學亡曽子唯一貫之旨傳之孟軻終又二千餘年而周程續自是而後言益詳道益晦析理益精學益支離無本而事於外者益繁以難蓋孟氏患楊墨周程之際釋老大行今世學者皆知宗孔孟賤楊墨擯釋老聖人之道若大明於世然吾從而求之聖人不得而見之矣其能有若墨氏之兼愛者乎其能有若楊氏之為我者乎其能有若老氏之清淨自守釋氏之究心性命者乎吾何以楊墨老釋之思哉彼於聖人之道異然猶有自得也而世之學者章繪句琢以誇俗詭心色取相飾以偽謂聖人之道勞苦無功非復人之所可為而徒取辨於言詞之間古之人有終身不能究者今吾皆能言其略自以為若是亦足矣而聖人之學遂廢則今之所大患者豈非記誦詞章之習而弊之所從來無亦言之太詳析之太精者之過歟夫楊墨老釋學仁義求性命不得其道而偏焉固非若今之學者以仁義為不可學性命之為無益也居今之時而有學仁義求性命外記誦辭章而不為者雖其陷於楊墨老釋之偏吾猶且以為賢彼其心猶求以自得也夫求以自得而後可與之言學聖人之道某幼不問學陷溺於邪僻者二十年而始究心於老釋賴天之靈因有所覺始乃沿周程之説求之而若有得焉顧一二同志之外莫豫翼也岌岌乎仆而後興晚得友於甘泉湛子而後吾之志益堅毅然若不可遏則豫之資於甘泉多矣甘泉之學務求自得者也世未之能知其知者且疑其為禪誠禪也吾猶未得而見而况其所志卓爾若此則如甘泉者非聖人之徒歟多言又烏足病也夫多言不足以病甘泉與甘泉之不為多言病也吾信之吾與甘泉友意之所在不言而會論之所及不約而同期於斯道斃而後巳者今日之别吾容無言夫惟聖人之學難明而易惑習俗之降愈下而益不可回任重道逺雖已無俟於言顧復於吾心若有不容巳也則甘泉亦豈以豫言為綴乎别方叔賢序辛未豫與叔賢處二年見叔賢之學凡三變始而尚辭再變而講説又再變而慨然有志聖人之道方其辭章之尚於豫若氷炭焉講説矣則違合者半及其有志聖人之道而沛然於豫同趣將遂去之西樵山中以成其志叔賢亦可謂善變矣聖人之學以無我為本而勇以成之豫始與叔賢為僚叔賢以郎中故事位吾上及其學之每變而禮豫日恭卒乃自稱門生而待豫以先覺此非脫去世俗之見超然於無我者不能也雖橫渠子之勇徹臯比亦何以加於此獨愧豫之非其人而何以當之夫以叔賢之善變而進之以無我之勇其於聖人之道也何有斯道也絶響於世餘三百年矣叔賢之美有若是是以樂為吾黨道之别王純甫序辛未王純甫之掌教應天也陽明子既勉之以孟氏之言純甫謂未盡也請益曰道未之嘗學而以教為職鰥官其罪矣敢問教何以哉陽明子曰其學乎盡吾之所以學者而教行焉耳曰學何以哉曰其教乎盡吾之所以教者而學成焉耳古之君子有諸巳而後求諸人也曰剛柔淳漓之異質矣而盡之我教其可一乎曰不一所以一之也天之於物也巨微修短之殊位而生成之一也惟技也亦然弓冶不相為能而其足於用亦一也匠斫也陶垣也圬墁也其足以成室亦一也是故立法而考之技也各詣其巧矣而同足於用因人而施之教也各成其材矣而同歸於善仲尼之答仁孝也孟氏之論貨色也可以觀教矣曰然則教無定法乎昔之辨者則何嚴也曰無定矣而以之必天下則弓焉而冶廢匠焉而陶圬廢聖人不欲人人而聖之乎然而質人人殊故辨之嚴者曲之致也是故或失則隘或失則支或失則流矣是故因人而施者定法矣同歸於善者定法矣因人而施質異也同歸於善性同也夫教以復其性而巳由堯舜而來未之有改而謂無定乎别黃宗賢歸天台序壬申君子之學以明其心其心本無昧也而欲為之蔽習為之害故去蔽與害而明復匪自外得也心猶水也汚入之而流濁猶鑒也垢積之而光昧孔子告顔淵克巳復禮為仁孟軻氏謂萬物皆備於我反身而誠夫巳克而誠固無待乎其外也世儒既叛孔孟之説昧於大學格致之訓而徒務博乎其外以求益乎其內皆入汚以求清積垢以求明者也弗可得已守仁幼不知學陷溺於邪僻者二十年疾疚之餘求諸孔子子思孟軻之言而恍若有見其非守仁之能也宗賢於我自為童子即知棄去舉業勵志聖賢之學循世儒之説而窮之愈勤而益難非宗賢之罪也學之難易失得也有原吾嘗為宗賢言之宗賢於吾言猶渴而飲無弗入也每見其溢於面今既豁然吾黨之良莫有及者謝病去不忍豫别而需豫言夫言之而莫豫聼倡之而莫豫和自今失吾助矣吾則忍於宗賢之别而容無言乎宗賢歸矣為我結廬天台鴈蕩之間吾將老焉終不使宗賢之獨往也贈周瑩歸省序乙亥永康周瑩德純嘗學於應子元忠既乃復見陽明子而請益陽明子曰子從應子之所來乎曰然應子則何以教子曰無他言也惟日誨之以希聖希賢之學毋溺於流俗且曰斯吾所嘗就正於陽明子者也子而不吾信則盍親往焉瑩是以不逺千里而來謁曰子之來也猶有所未信乎曰信之曰信之而又來何也曰未得其方也陽明子曰子既得其方矣無所事於吾周生悚然有間曰先生以應子之故望卒賜之教陽明子曰子既得之矣無所事於吾周生悚然而起茫然有間曰瑩愚不得其方先生毋乃以瑩為戲瑩卒賜之教陽明子曰子之自永康而來也程幾何曰千里而遙曰逺矣從舟乎曰從舟而又登陸也曰勞矣當兹六月亦暑乎曰途之暑特甚也曰難矣具資糧從童僕乎曰中途而僕病乃舍貸而行曰茲益難矣曰子之來既逺且勞其難若此也何不遂返而必來乎將亦無有強子者乎曰瑩至於夫子之門勞苦艱難誠樂之寧以是而遂返又俟乎人之強之也乎曰斯吾之所謂子之既得其方也子之志𣣔至於吾門也則遂至於吾門無假於人子而志於聖賢之學有不至於聖賢者乎而假於人乎子之舍舟從陸捐僕貸糧冒毒暑而來也則又安所從受之方也生躍然起拜曰茲乃命之方也已抑瑩由於其方而迷於其説必俟夫子之言而後躍如也則何居陽明子曰子未覩乎爇石以求灰者乎火力具足矣乃得水而遂化子歸就應子而足其火力焉吾將儲擔石之水以俟子之再見贈林典卿歸省序乙亥林典卿與其弟遊於大學且歸辭於陽明子曰元敘嘗聞立誠於夫子矣今兹歸敢請益陽明子曰立誠典卿曰學固此乎天地之大也而星辰麗焉日月明焉四時行焉引類而言之不可窮也人物之富也而草木蕃焉禽獸群焉中國夷狄分焉引類而言之不可盡也夫古之學者殫智慮弊精力而莫究其緒焉靡晝夜極年歲而莫竟其説焉析𧖟絲擢牛尾而莫既其奧焉而曰立誠立誠盡之矣乎陽明子曰立誠盡之矣夫誠實理也其在天地則其麗焉者則其明焉者則其行焉者則其引類而言之不可窮焉者皆誠也其在人物則其蕃焉者則其群焉者則其分焉者則其引類而言之不可盡焉者皆誠也是故殫智慮弊精力而莫究其緒也靡晝夜極年歲而莫竟其説也析蠶絲擢牛尾而莫既其奧也夫誠一而已矣故不可復有所益益之是為二也二則偽故誠不可益不可益故至誠無息典卿起拜曰吾今乃知夫子之教若是其要也請終身事之不敢復有所疑陽明子曰子歸有黃宗賢氏者應元忠氏者方與講學於天台鴈蕩之間倘遇焉其遂以吾言諗之贈陸清伯歸省序乙亥陸清伯澄歸歸安與其友二三子論繹所學贈處焉二三子或曰清伯之學日進矣始吾見清伯其氣揚揚然若浮雲其言滔滔然若流波今而日默默爾日慊慊爾日雍雍爾日休休爾有大徑庭焉以是知其進也或曰清伯始見夫子一月一至既而旬一至又既而五六日三四日而一至又既而遷居於夫子之傍後乃請於夫子掃庾下之室而旦暮侍焉夫德莫淑於尊賢學莫遄於親師故趨權門者日進於勢逰市肆者日進於利清伯於夫子之道日加親附焉吾未遑其他即是可以知其學之進也矣清伯曰有是哉澄則以為日退也澄聞夫子之教而茫然已而歆然忽耿然而疑已而大疑焉又閃然大駭乃忽闖然若有覩也當是時則亦幾有所益矣自是且數月蓋悠焉遊焉業不加修焉反而求焉倀倀然頽頽然昏蔽擴而愈進私纍息而愈興衆妄攻而愈固如上灘之舟屢失屢下力挽而不能前以為日退也明日又辭於陽明子二三子偕焉各言其所以陽明子曰其然乎其然乎謂已為日退者進修之勵善日進矣謂人為日進者與人為善者其善亦日進矣雖然謂已為日退也而意阻焉能無日退乎謂人為日進也而氣歉焉亦能無日退乎斯又進退之機吉凶之所由分也可無慎乎贈周以善歸省序乙亥江山周以善究心格物致知之學有年矣苦其難而不能有所進也聞陽明子之説而異之意其或有見也就而問之聞其説戚然若有所省歸求其故而不合則遲疑旬日又往聞其説則又戚然若有所省歸求其故而不合則又遲疑者旬日如是往復數月求之既無所獲去之又弗能也乃往告之以其故陽明子曰子未聞昔人之論奕乎奕之為數小數也不專心致志則亦不可以得也今子入而聞吾之説出而有鴻鵠之思焉亦何怪乎勤而弗獲矣於是退而齋潔而以弟子之禮請陽明子與之坐蓋默然良久乃告之以立誠之説聳然若仆而興也明日又言之加密焉證之以大學明日又言之加密焉證之以論孟明日又言之加密焉證之以中庸乃躍然喜避席而言曰積今而後無疑於夫子之言而後知聖賢之教若是其深切簡易也而後知所以格物致知以誠吾之身吾喜焉吾悔焉十年之攻徒以斃精神而亂吾之心術也悲夫積將以夫子之言告同志俾及時從事於此無若積之底於悔也庶以報夫子之德而無負於夫子之教居月餘告歸陽明子敘其言以遺之使無忘於得之之難也贈郭善甫歸省序乙亥郭子自黃來學踰年而告歸曰慶聞夫子立志之説亦既知所從事矣今茲將逺去敢請一言以為夙夜朂陽明子曰君子之於學也猶農夫之於田也既善其嘉種矣又深耕易耨去其蝥莠時其灌溉早作而夜思皇皇惟嘉種之是憂也而後可望於有秋夫志猶種也學問思辨而篤行之是耕耨灌溉以求於有秋也志之弗端是荑稗也志端矣而功之弗繼是五榖之弗熟弗如荑稗也吾嘗見子之求嘉種矣然猶懼其或荑稗也見子之勤耕耨矣然猶懼其荑稗之弗如也夫農春種而秋成時也由志學而至於立自春而徂夏也由立而至於不惑去夏而秋矣已過其時猶種之未定不亦大可懼乎過時之學非人一己百未之敢望而猶或作輟焉不亦大可哀乎從吾遊者衆矣雖開説之多未有出於立志者故吾於子之行卒不能舍是而别有所説子亦可以無疑於用力之方矣贈鄭德夫歸省序乙亥西安鄭德夫將學於陽明子聞士大夫之議者以為禪學也復已之則與江山周以善者姑就陽明子之門人而考其説若非禪者也則又姑與就陽明子親聼其説焉蓋旬有九日而後釋然於陽明子之學非禪也始具弟子之禮師事之問於陽明子曰釋與儒孰異乎陽明子曰子無求其異同於儒釋求其是者而學焉可矣曰是與非孰辨乎曰子無求其是非於講説求諸心而安焉者是矣曰心又何以能定是非乎曰無是非之心非人也口之於甘苦也與易牙同目之於妍媸也與離婁同心之於是非也與聖人同其有昧焉者其心之於道不能如口之於味目之於色之誠切也然後私得而蔽之子務立其誠而已子惟慮夫心之於道不能如口之於味目之於色之誠切也而何慮夫甘苦妍媸之無辨也乎曰然則五經之所載四書之所傳其皆無所用乎曰孰為而無所用乎是甘苦妍媸之所在也使無誠心以求之是談味論色而已也又孰從而得甘苦妍媸之真乎既而告歸請陽明子為書其説遂書之紫陽書院集序乙亥豫章熊侯世芳之守徽也既敷政其境內乃大新紫陽書院以明朱子之學萃七校之秀而躬教之於是校士程曽氏採托書院之興廢為集而辨以白鹿之規明政教也來請豫言以諗多士夫為學之方白鹿之規盡矣警勸之道熊侯之意勤矣興廢之故程生之集備矣又奚以豫言為乎然豫聞之德有本而學有要不於其本而泛焉以從事髙之而虛無卑之而支離終亦流蕩失宗勞而無得矣是故君子之學惟求得其心雖至於位天地育萬物未有出於吾心之外也孟氏所謂學問之道無他求其放心而已矣者一言以蔽之故博學者學此者也審問者問此者也慎思者思此者也明辨者辨此者也篤行者行此者也心外無事心外無理故心外無學是故於父子盡吾心之仁於君臣盡吾心之義言吾心之忠信行吾心之篤敬懲心忿窒心𣣔遷心善改心過處事接物無所往而非求盡吾心以自慊也譬之植焉心其根也學也者其培擁之者也灌溉之者也扶植而刪鋤之者也無非有事於根焉耳矣朱子白鹿之規首之以五教之目次之以為學之方又次之以處事接物之要若各為一事而不相蒙者斯殆朱子平日之意所謂隨事精察而力行之庶幾一旦貫通之妙也歟然而世之學者往往遂失之支離瑣屑色莊外馳而流入於口耳聲利之習豈朱子之教使然哉故吾因諸士之請而特原其本以相朂庶幾乎操存講習之有要亦所以發明朱子未盡之意也朱子晚年定論序戊寅洙泗之傳至孟子而息千五百餘年濂溪明道始復追尋其緒自後辨析日詳然亦日就支離決裂旋復湮晦吾嘗深求其故大抵皆世儒之多言有以亂之守仁蚤歲業舉溺志辭章之習既乃稍知從事正學而苦於衆説之紛撓疲爾茫無可入因求諸老釋欣然有會於心以為聖人之學在此矣然於孔子之教間相出入而措之日用往往闕漏無歸依違往返且信且疑其後謫官龍場居夷處困動心忍性之餘恍若有悟體驗探求再更寒暑證諸六經四子沛然若決江河而放之海也然後嘆聖人之道坦如大路而世之儒者妄開竇徑蹈荆棘隨坑塹究其為説反出二氏之下宜乎世之髙明之士厭此而趨彼也此豈二氏之罪哉間嘗以此語同志而聞者競相非議自以為立異好奇雖每痛反深抑務自搜剔斑瑕而愈益精明的確洞然無復可疑獨於朱子之説有相抵牾恆疚於心切疑朱子之賢而豈其於此尚有未察及官留都復取朱子之書而檢求之然後知其晚歲固巳大悟舊説之非痛悔極艾至以為自誑誑人之罪不可勝贖世之所傳集注或問之類乃其中年未定之説自咎以為舊本之誤思改正而未及而其諸語類之屬又其門人挾勝心以附巳見固於朱子平日之説猶有大相繆戾者而世之學者局於見聞不過持循講習於此其於悟後之論槩乎其未有聞則亦何怪乎豫言之不信而朱子之心無以自暴於後世也乎豫既自幸其説之不繆於朱子又喜朱子之先得我心之同然且慨夫世之學者徒守朱子中年未定之説而不復知求其晚歲既悟之論競相呶呶以亂正學不自知其巳入於異端輒採録而裒集之私以示夫同志庶幾無疑於吾説而聖學之明可冀矣别梁日孚序戊寅聖人之道若大路雖有跛蹩行而不巳朱有不至而世之君子顧以為聖人之異於人若彼其甚逺也其為功亦必若彼其甚難也而淺易若此豈其可及乎則從而求之艱深恍愡溺於支離騖於虛髙率以為聖人之道必不可至而甘於其質之所便日以淪於汚下有從而求之者競相嗤訕曰狂誕不自量者也嗚呼其弊也亦豈一朝一夕之故哉孟子云徐行後長者謂之弟疾行先長者謂之不弟夫徐行者豈人所不能哉所不為也世之人不知咎其不為而歸咎於其不能其亦不思而巳矣進士梁日孚携家謁選於京過贛停舟見豫始與之語移時而别明日又來與之語日昃而别又明日又來日入而未忍去又明日則假館而請受業焉同舟之人強之北者開譬百端日孚皆笑而不應莫不囂且異其最親愛者曰子有萬里之行戒僮㒒聚資斧具舟楫又挈其家室經營閲歲而始就道行未數百里而中止此不有大苦必有大樂者乎子亦可以語我乎日孚笑曰吾今則有大苦亦誠有大樂者然未易以語子也子見病狂喪心者乎方其昏逸瞶亂赴湯火蹈荆棘莫不恬然自信以為是也比遇良醫沃之以清冷之漿而投之以神明之劑始蘇然以醒告之以其向之所為又始駭然以苦示之以其所從歸之途又始欣然以喜且恨遇斯人之晚也彼病狂不復者反從而哂唁之以為是變其常今吾與子之事亦何以異於此矣居無何豫以軍旅之役出而逺日孚者且兩月謂日孚既去矣及旋而日孚居然以待既以委其資斧於逆旅歸其家室於故鄉泊然而樂若將終身焉扣其學日有所明而月有所異矣然後益嘆聖人之學非夫自暴自棄未有不可由之而至而日孚出於流俗殆孟子所謂豪傑之士者矣復留餘三月其母使人來謂曰姑北行以畢吾碩然後從爾所好知日孚者亦交以是勸日孚請曰焯焉能一日而去夫子將復赴湯火蹈荆棘矣豫曰其然哉子以聖人之道為有方體乎為可拘之以時限之以地乎世未有既醒之人而復赴湯火蹈荆棘者子務醒其心毋徒湯火荆棘之為懼日孚良久曰焯近之矣聖人之道求之於心故不滯於事出之以理故不泥於物根之以性故不拘以時動之以神故不限以地苟知此矣焉往而非學也奚必恆於夫子之門乎焯請暫辭而北疑而復求正豫莞爾而笑曰近之矣近之矣大學古本序戊寅大學之要誠意而已矣誠意之功格物而已矣誠意之極止至善而巳矣止至善之則致知而已矣正心復其體也修身著其用也以言乎己謂之明德以言乎人謂之親民以言乎天地之間則備矣是故至善也者心之本體也動而後有不善而本體之知未嘗不知也意者其動也物者其事也致其本體之知而動無不善然非即其事而格之則亦無以致其知故致知者誠意之本也格物者致知之實也物格則知致意誠而有以復其本體是之謂止至善聖人懼人之求之於外也而反覆其辭舊本析而聖人之意亡矣是故不務於誠意而徒以格物者謂之支不事於格物而徒以誠意者謂之虛不本於致知而徒以格物誠意者謂之妄支與虛與妄其於至善也逺矣合之以敬而益綴輔之以傳而益離吾懼學之日逺於至善也去分章而復舊本傍為之什以引其義庶幾復見聖人之心而求之者有其要噫乃若致知則存乎心悟致知焉盡矣禮記纂言序庚辰禮也者理也理也者性也性也者命也維天之命於穆不已而其在於人也謂之性其粲然而條理也謂之禮其純然而粹善也謂之仁其截然而裁制也謂之義其昭然而明覺也謂之知其渾然於其性也則理一而已矣故仁也者禮之體也義也者禮之宜也知也者禮之通也經禮三百曲禮三千無一而非仁也無一而非性也天敘天秩聖人何心焉蓋無一而非命也故克己復禮則謂之仁窮理則盡性以至於命盡性則動容周旋中禮矣後之言禮者吾惑焉紛紜器數之爭而牽制刑名之未窮年矻矻弊精於祝吏之糟粕而忘其所謂經綸天下之大經立天下之大本者禮云禮云玉帛云乎而人之不仁也其如禮何哉故老莊之徒外禮以言性而謂禮為道德之衰仁義之失既已墮於空虛渀蕩而世儒之説復外性以求禮遂謂禮止於器數制度之間而議擬倣像於影響形迹以為天下之禮盡在是矣故凡先王之禮煙蒙灰散而卒以煨燼於天下要亦未可專委罪於秦火者僣不自度嘗欲取禮記之所載揭其大經大本而疏其條理節目庶幾器道本末之一致又懼其德之弗任而時亦有所未及也間嘗為之説曰禮之於節文也猶規矩之於方圎也非方圎無以見規矩之用非節文則亦無從而睹所謂禮矣然方圎者規矩之所出而不可遂以方圓為規矩故執規矩以為方圎則方圎不可勝用舍規矩以為方圎而遂以方圎為之規矩則規矩之用息矣故規矩者無一定之方圎而方圎者有一定之規矩此學禮之要盛德者之所以動容周旋而中也宋儒朱仲晦氏慨禮經之蕪亂嘗欲考正而刪定之以儀禮為之經禮記為之傳而其志競亦弗就其後吳幼清氏因而為纂言亦不數數於朱説而於先後輕重之間固已多所發明二子之見其規條指畫則既出於漢儒矣其所謂觀其會通以行其典禮之原則尚恨吾生之晚而未及與聞之也雖然後聖而有作則無所容言矣後聖而未有作也則如纂言者固學禮者之箕裘筌蹄而可以少之乎姻友胡汝登忠信而好禮其為寧國也將以是而施之刻纂言以敷其説而屬序於豫豫將進汝登之道而推之於其本也故為序之若此云象山文集序庚辰聖人之學心學也堯舜禹之相授受曰人心惟危道心惟微惟精惟一允執厥中此心學之源也中也者道心之謂也道心精一之謂仁所謂中也孔孟之學惟務求仁蓋精一之傳也而當時之弊固已有外求之者故子貢致疑於多學而識而以博施濟衆為仁夫子告之以一貫而教以能近取譬蓋使之求諸其心也逮於孟氏之時墨氏之言仁至於摩頂放踵而告子之徒又有仁內義外之説心學大壞孟子闢義外之説而曰仁人心也學問之道無他求其放心而已矣又曰仁義禮智非由外鑠我也我固有之弗思耳矣蓋王道息而伯術行功利之徒外假天理之近似以濟其私而以欺於人曰天理固如是不知既無其心矣而尚何有所謂天理者乎自是而後析心與理而為二而精一之學亡世儒之支離外索於刑名器數之末以求明其所謂物理者而不知吾心即物理𥘉無假於外也佛老之空虛遺棄其人倫事物之常以求明其所謂吾心者而不知物理即吾心不可得而遺也至宋周程二子始復追尋孔顔之宗而有無極而太極定之以仁義中正而主靜之説動亦定靜亦定無內外無將迎之論庶幾精一之旨矣自是而後有象山陸氏雖其純粹和平若不逮於二子而簡易直截真有以接孟子之傳其議論開闢時有異者乃其氣質章見之殊而要其學之必求諸心則一而已故吾嘗斷以陸氏之學孟氏之學也而世之議者以其嘗與晦翁之有同異而遂詆以為禪夫禪之説棄人倫遺物理而要其歸極不可以為天下國家苟陸氏之學而果若是也乃所以為禪也今禪之説與陸氏之説其書具存學者苟取而觀之其是非同異當有不待於辨説者而顧一倡群和勦説雷同如矮人之觀場莫知悲笑之所自豈非貴耳賤目不得於言而勿求諸心者之過歟夫是非同異每起於人持勝心便舊習而是已見故勝心舊習之為患賢者不免焉撫守李茂元氏將重刋象山之文集而請一言為之序豫何所容言哉惟讀先生之文者務求諸心而無以舊習已見先焉則粳粃精鑿之美惡入口而知之矣觀德亭記戊寅君子之於射也內志正外體直持弓矢審固而後可以言中故古者射以觀德德也者得之於其心也君子之學求以得之於其心故君子之於射以存其心也是故懆於其心者其動妄蕩於其心者其視浮歉於其心者其氣餒忽於其心者其貌惰傲於其心者其色矜五者心之不存也不存也者不學也君子之學於射以存其心也是故心端則體正心敬則容肅心平則氣舒心專則視審心通故時而理心純故讓而恪心宏故勝而不張負而不弛七者備而君子之德成君子無所不用其學也於射見之矣故曰為人君者以為君鵠為人臣者以為臣鵠為人父者以為父鵠為人子者以為子鵠射也者射巳之鵠也鵠也者心也各射巳之心也各得其心而巳故曰可以觀德矣作觀德亭記重修文山祠記戊寅宋丞相文山文公之祠舊在廬陵之當田今螺川之有祠實肇於我孝皇之朝然亦因廢為新多缺陋而未稱正德戊寅縣令邵德容始恢其議於郡守伍文定相與白諸巡撫巡按守巡諸司皆以是為風化之所係也爭措財鳩工圗拓而新之協守令之力不再踰月而工萃圮者完隘者闢遺者舉巍然煥然不獨廟貌之改觀而吉之人士奔走瞻嘆翕然益起其忠孝之心則是舉之有益於名教也誠大矣使來請記嗚呼公之忠天下之逹忠也結椎異類猶知敬慕而况其鄉之人乎逆旅經行猶存尸祝而况其鄉之土乎凡有職守皆知尊尚而况其土之官乎然而鄉人之慕之也三有司之崇尚之也文公之沒今且三百年矣吉士之以氣節行義後先炳耀謂非聞公之風而興不可也然忠義之降激而為氣節氣節之弊流而為客氣其上焉者無所為而為固公所謂成仁取義者矣其次有所為矣然猶其氣之近於正者也逮其弊也遂有慿其憤戾粗鄙之氣以行其􅎱嫉𥚹驁之私士流於矯拂民入於健訟人欲熾而天理滅而猶自視以為氣節若是者容有之乎則於公之道非所謂操戈入室者歟吾故備而論之以朂夫兹鄉之後進使之去其偏以歸於全克其私以反於正不愧於公而已矣今巡撫暨諸有司之表勵崇飾固將以行其好德之心振揚風教詩所謂民之秉彛好是懿德者也人亦孰無是心苟能充之公之忠義在我矣而又何羡乎然而時之表勵崇飾有好其實而崇之者有慕其名而崇之者有假其迹而崇之者忠義有諸巳思以喻諸人因而表其祠宇樹之風聲是好其實者也知其美而未能誠諸身姑以修其祠宇彰其事迹是慕其名者也飾之祠宇而壞之於其身矯之文具而敗之於其行姦以掩其外而襲以阱其中是假其迹者也若是者容有之乎則於公之道非所謂毀瓦畫墁者歟吾故備而論之以朂夫後之官兹土者使無徒慕其名而務求其實毋徒修公之祠而務修公之行不愧於公而已矣某嘗令兹邑睹公祠之圯陋而未能恢既有愧於諸有司慨其風聲氣習之或弊而未能講去其偏復有愧於諸人士樂兹舉之有成也推其愧心之言而為之記從吾道人記乙酉海寧董蘿石者年六十有八矣以能詩聞江湖間與其鄉之業詩者十數輩為詩社旦夕操𥿄吟嗚相與求句字之工至廢寢食遺生業時俗共非笑之不顧以為是天下之至樂矣嘉靖甲申春蘿石來遊會稽聞陽明子方與其徒講學山中以杖肩其瓢笠詩卷來訪入門長揖上坐陽明子異其氣貌且年老矣禮敬之又詢知其為董蘿石也與之語連日夜蘿石辭彌謙禮彌下不覺其席之彌側也退謂陽明子之徒何生秦曰吾見世之儒者支離瑣屑修飾邉幅為偶人之狀其下者貪叨爭奪於富貴利欲之場而嘗不屑其所為以為世豈真有所謂聖賢之學乎直假道於是以求濟其私耳故遂篤志於詩而放浪於山水今吾聞夫子良知之説而忽若大寐之得醒然後知吾向之所為日夜弊精勞力者其與世之營營利祿之徒特清濁之分而其間不能以寸也幸哉吾非至於夫子之門則幾於虛此生矣吾將北面夫子而終身焉得無既老而有所不可乎秦起拜賀曰先生之年則老矣先生之志何壯哉入以請於陽明子陽明子喟然嘆曰有是哉吾未或見此翁也雖然齒長於我矣師友一也苟吾言之見信奚必北面而後為禮乎蘿石聞之曰夫子殆以豫誠之未積歟辭歸兩月棄其瓢笠持一縑而來謂秦曰此吾老妻之所織也吾之誠積若茲縷矣夫子其許我乎秦入以請陽明子曰有是哉吾未或見此翁也今之後生晚進苟知執筆為文辭稍記習訓詁則已侈然自大不復知有從師學問之事見有或從師問學者則閧然共非笑指斥若怪物翁以能詩訓後進從之遊者遍於江湖蓋居然先輩矣一旦聞豫言而棄去其數十年之成業如敉屣遂求北面而屈禮焉豈獨今之時而未見若人將古之記傳所載亦未多數也夫君子之學求以變化其氣質焉爾氣質之難變者以客氣之為患而不能以屈下於人遂至自是自欺飾非長敖卒歸於凶頑鄙倍故凡世之為子而不能孝為弟而不能敬為臣而不能忠者其始皆起於不能屈下而客氣之為患耳苟惟理是從而不難於屈下則客氣消而天理行非天下之大勇不足以與於此則如蘿石固吾之師也而吾豈足以師蘿石乎蘿石曰甚哉夫子之拒我也吾不能以俟請矣入而強納拜焉陽明子固辭不獲則計之以師友之間與之探禹穴登爐峯陟秦望尋蘭亭之遺迹徜徉於雲門若耶鑑湖剡曲蘿石日有所聞益充然有得欣然樂而忘歸也其鄉黨之子弟親友與其平日之為社者或笑而非或為詩而招之返且曰翁老矣何乃自苦若是耶蘿石笑曰吾方幸逃於苦海方知憫若之自苦也顧以吾為苦耶吾方揚鬐於渤澥而振羽於雲霄之上安能復投網罟而入樊籠乎去矣吾將從吾之所好遂自號曰從吾道人陽明子聞之嘆曰卓哉蘿石血氣既衰戒之在得矣孰能挺特奮發而復若少年英鋭者之為乎真可謂之能從吾所好矣世之人從其名之好也而競以相髙從其利之好也而貪以相取從其心意耳目之好也而詐以相欺亦皆自以為從吾所好矣而豈知吾之所謂真吾者乎夫吾之所謂真吾者良知之謂也父而慈焉子而孝焉吾良知所好也不慈不孝焉斯惡之矣言而忠信焉行而篤敬焉吾良知所好也不忠信焉不篤敬焉斯惡之矣故夫名利物欲之好私吾之好也天下之所惡也良知之好真吾之好也天下之所同好也是故從私吾之好則天下之人皆惡之矣將心勞日拙而憂苦終身是之謂物之役從真吾之好則天下之人皆好之矣將家國天下無所處而不當富貴貧賤患難夷狄無入而不自得斯之謂能從吾之所好也矣夫子嘗曰吾十有五而志於學是從吾之始也七十而從心所欲不踰矩則從吾而化矣蘿石踰耳順而始知從吾之學毋自以為既晚也充蘿石之勇其進于化也何有哉嗚呼世之營營於物𣣔者聞蘿石之風亦可以知所適從也乎親民堂記乙酉南子元善之治越也過陽明子而問政焉陽明子曰政在親民曰親民何以乎曰在明明德曰明明德何以乎曰在親民曰明德親民一乎曰一也明德者天命之性靈昭不昧而萬理之所從出也人之於其父也而莫不知孝焉於其兄也而莫不知弟焉於凡事物之感莫不有自然之明焉是其靈昭之在人心亘萬古而無不同無或昧者也是故謂之明德其或蔽焉物𣣔也明之者去其物𣣔之蔽以全其本體之明焉耳非能有以增益之也曰何以在親民乎曰德不可以徒明也人之欲明其孝之德也則必親於其父而後孝之德明矣欲明其弟之德也則必親於其兄而後弟之德明矣君臣也夫婦也朋友也皆然也故明明德必在於親民而親民乃所以明其明德也故曰一也曰親民以明其明德修身焉可矣而何家國天下之有乎曰人者天地之心也民者對巳之稱也曰民焉則三才之道舉矣是故親吾之父以及人之父而天下之父子莫不親矣親吾之兄以及人之兄而天下之兄弟莫不親矣君臣也夫婦也朋友也推而至於鳥獸草木也而皆有以親之無非求盡吾心焉以自明其明德也是之謂明明德於天下是之謂家齊國治而天下平曰然則烏在其為止至善者乎昔之人固有𣣔明其明德矣然或失之虗罔空寂而無有乎家國天下之施者是不知明明德之在於親民而二氏之流是矣固有欲親其民者矣然或失之知謀權術而無有乎仁愛惻怛之誠者是不知親民之所以明其明德而五伯功利之徒是矣是皆不知止於至善之過也是故至善也者明德親民之極則也天命之性粹然至善其靈昭不昧者皆其至善之發見是皆明德之本體而所謂良知者也至善之發見是而是焉非而非焉固吾心天然自有之則而不容有所擬議加損於其間也有所擬議加損於其間則是私意小智而非至善之謂矣人惟不知至善之在吾心而用其私智以求之於外是以昧其是非之則至於橫騖決裂人欲肆而天理亡明德親民之學大亂於天下故止至善之於明德親民也猶之規矩之於方圓也尺度之於長短也權衡之於輕重也方圎而不止於規矩爽其度矣長短而不止於尺度乖其制矣輕重而不止於權衡失其凖矣明德親民而不止於至善亡其則矣夫是之謂大人之學大人者以天地萬物為一體也夫然後能以天地萬物為一體元善喟然而嘆曰甚哉大人之學若是其易簡也吾乃今知天地萬物之一體矣吾乃今知天下之為一家中國之為一人矣一夫不𬒳其澤若已推而內諸溝中伊尹其先得我心之同然乎於是名其蒞政之堂曰親民而曰吾以親民為職者也吾務親吾之民以求明吾之明德也夫爰書其言于壁而為之記萬松書院記乙酉萬松書院在浙省南門外當湖山之間弘治𥘉參政周君近仁因廢寺之趾而改為之廟貌規制略如學宮延孔氏之裔以奉祀事近年以來有司相繼緝理地益以勝然亦止為遊觀之所而講誦之道未備也嘉靖乙酉侍御潘君景哲奉命來巡憲度丕肅文風聿新既簡鄉闈收一省之賢而上之南宫矣又以遺才之不能盡取為憾思有以大成之乃增修書院益廣樓居齋舍為三十六楹具其器用置贍田若干頃揭白鹿之規掄彥選俊肄習其間以倡列郡之士而以屬之提學僉事萬君汝信汝信曰是固潮之責也藩臬諸君咸贊厥成使知事嚴綱董其役知府陳力推官陳箎輩相協經理閲月踰旬工訖事舉乃來請言以紀其事惟我皇明自國都至於郡邑咸建廟學群士之秀專官列職而教育之其於學校之制可謂詳且備矣而名區勝地往往復有書院之設何哉所以匡翼夫學校之不逮也夫三代之學皆所以明人倫今之學宫皆以明倫名堂則其所以立學者固未嘗非三代意也然自科舉之業盛士皆馳騖於記誦辭章而功利得喪分惑其心于是師之所教弟子之所學者逐不復知有明倫之意矣懷世道之憂者思挽而復之卒亦未知所措其力譬之兵事當玩弛偷惰之餘則必選將閲伍更其號令旌旗懸非格之賞以倡敢勇然後士氣可得而振也今書院之設固亦此類也歟士之來集於此者其必相與思之曰既進我于學校矣而復優我於是何為乎寧獨以精吾之舉業而巳乎便吾之進取而巳乎則學校之中未嘗不可以精吾之業而進取之心自吾所汲汲非有待於人之從而趨之也是必有進於是者矣是固期我以古聖賢之學也古聖賢之學明倫而已堯舜之相授受曰人心惟危道心惟微惟精惟一允執厥中斯明倫之學矣道心也者率性之謂也人心則偽矣不雜於人偽率是道心而發之於用也以言其情則為喜怒哀樂以言其事則為中節之和為三千三百經曲之禮以言其倫則為父子之親君臣之義夫婦之别長幼之序朋友之信而三才之道盡此矣舜使契為司徒以教天下者教之以此也是固天下古今聖愚之所同具其或未焉者物𣣔蔽之非其中之所有不備而假求之於外者也是固所謂不慮而知其良知也不學而能其良能也孩提之童無不知愛其親者也孔子之聖則曰所求乎子以事父未能也是明倫之學孩提之童亦無不能而及其至也雖聖人有所不能盡也人倫明於上小民親於下家齊國治而天下平矣是故明倫之外無學矣外此而學者謂之異端非此而論者謂之邪説假此而行者謂之伯術飾此而言者謂之文辭背此而馳者謂之功利之徒亂世之政雖今之舉業必自此而精之而謂不愧於敷奏明試雖今之仕進必由此而施之而後無忝於行義逹道斯固國家建學之𥘉意諸君緝書院以興多士之盛心也故為多士誦之稽山書院尊經閣記乙酉經常道也其在於天謂之命其賦於人謂之性其主於身謂之心心也性也命也一也通人物逹四海塞天地亘古今無有乎弗具無有乎弗同無有乎或變者也是常道也其應乎感也則為惻隱為羞惡為辭讓為是非其見於事也則為父子之親為君臣之義為夫婦之别為長幼之序為朋友之信是惻隱也羞惡也辭讓也是非也是親也義也序也别也信也一也皆所謂心也性也命也通人物逹四海塞天也亘古今無有乎弗具無有乎弗同無有乎或變者也是常道也是常道也以言其隂陽消息之行焉則謂之易以言其紀綱政事之施焉則謂之書以言其歌詠性情之發焉則謂之詩以言其條理節文之著焉則謂之禮以言其欣喜和平之生焉則謂之樂以言其誠偽邪正之辨焉則謂之春秋是隂陽消息之行也以至於誠偽邪正之辨也一也皆所謂心也性也命也通人物逹四海塞天地亘古今無有乎弗具無有乎弗同無有乎或變者也夫是之謂六經六經者非他吾心之常道也故易也者志吾心之隂陽消息者也書也者志吾心之紀綱政事者也詩也者志吾心之歌詠性情者也禮也者志吾心之條理節文者也樂也者志吾心之欣喜和平者也春秋也者志吾心之誠偽邪正者也君子之於六經也求之吾心之隂陽消息而時行焉所以尊易也求之吾心之紀綱政事而時施焉所以尊書也求之吾心之歌詠性情而時發焉所以尊詩也求之吾心之條理節文而時著焉所以尊禮也求之吾心之欣喜和平而時生焉所以尊樂也求之吾心之誠偽邪正而時辨焉所以尊春秋也蓋昔者聖人之扶人極憂後世而述六經也猶之富家者之父祖慮其産業庫藏之積其子孫者或至於遺忘散失卒困窮而無以自全也而記籍其家之所有以貽之使之世守其産業庫藏之積而享用焉以免於困窮之患故六經者吾心之記籍也而六經之實則具於吾心猶之産業庫藏之實積種種色色具存於其家其記籍者特名狀數目而已而世之學者不知求六經之實於吾心而徒考索於影響之間牽制於文義之末硜硜然以為是六經矣是猶富家之子孫不務守視享用其産業庫藏之實積日遺忘散失至於窶人丐夫而猶囂囂然指其記籍曰斯吾産業庫藏之積也何以異於是嗚呼六經之學其不明於世非一朝一夕之故矣尚功利崇邪説是謂亂經習訓詁傳記誦沒溺於淺聞小見以塗天下之耳目是謂侮經侈淫辭競詭辨飾姦心盜行逐世壟斷而猶自以為通經是謂賊經若是者是并其所謂記籍者而割裂棄毁之矣寧復知所以為尊經也乎越城舊有稽山書院在卧龍西岡荒廢久矣郡守渭南南君大吉既敷政於民則慨然悼末學之支離將進之以聖賢之道於是使山隂令吳君瀛拓書院而一新之又為尊經之閣於其後曰經正則庶民興庶民興斯無邪慝矣閣成請豫一言以諗多士豫既不獲辭則為記之若是嗚呼世之學者得吾説而求諸其心焉其亦庶乎知所以為尊經也矣重修山隂縣學記乙酉山隂之學歲久彌敝教諭汪君瀚輩以謀於縣尹顧君鐸而一新之請所以詔士之言於豫時豫方在疚辭未有以告也已而顧君入為秋官郎洛陽吳君瀛來代復增其所未備而申前之請昔豫官留都因京兆之請記其學而嘗有説矣其大意以為朝廷之所以養士者不專於舉業而實望之以聖賢之學今殿廡堂舍拓而輯之餼廩條教具而察之者是有司之修學也求天下之廣居安宅者而修諸其身焉此為師為弟子者之修學也其時聞者皆惕然有省然於凡所以為學之説則猶未之及詳今請為吾越之士一言之夫聖人之學心學也學以求盡其心而已堯舜禹之相授受曰人心惟危道心惟微惟精惟一允執厥中道心者率性之謂而未雜於人無聲無臭至微而顯誠之源也人心則雜於人而危矣偽之端矣見孺子之入井而惻隱率性之道也從而內交於其父母焉要譽於鄉黨焉則人心矣飢而食渴而飲率性之道也從而極滋味之美焉恣口腹之叨焉則人心矣惟一者一於道心也惟精者慮道心之不一而或二之以人心也道無不中一於道心而不息是謂允執厥中矣一於道心則存之無不中而發之無不和是故率是道心而發之於父子也無不親發之於君臣也無不義發之於夫婦長幼朋友也無不别無不序無不信是謂中節之和天下之逹道也放四海而皆凖亘古今而不窮天下之人同此心同此性同此逹道也舜使契為司徒而教以人倫教之以此逹道也當是之時人皆君子而比屋可封蓋教者惟以是為教而學者惟以是為學也聖人既沒心學晦而人偽行功利訓詁記誦辭章之徒紛沓而起支離決裂歲盛月新相沿相襲各是其非人心日熾而不復知有道心之微間有覺其紕繆而略知反本求源者則又閧然指為禪學而羣訾之嗚呼心學何由而復明乎夫禪之學與聖人之學皆求盡其心也亦相去毫釐耳聖人之求盡其心也以天地萬物為一體也吾之父子親矣而天下有未親者焉吾心未盡也吾之君臣義矣而天下有未義者焉吾心未盡也吾之夫婦别矣長幼序矣朋友信矣而天下有未别未序未信者焉吾心未盡也吾之一家飽暖逸樂矣而天下有未飽暖逸樂者焉其能以親乎義乎别序信乎吾心未盡也故於是有紀綱政事之設焉有禮樂教化之施焉凡以裁成輔相成巳成物而求盡吾心焉耳心盡而家以齊國以治天下以平故聖人之學不出乎盡心禪之學非不以心為説然其意以為是逹道也者固吾之心也吾惟不昧吾心於其中則亦已矣而亦豈必屑屑於其外其外有未當也則亦豈必屑屑於其中斯亦其所謂盡心者矣而不知已陷於自私自利之偏是以外人倫遺事物以之獨善或能之而要之不可以治家國天下蓋聖人之學無人已無內外一天地萬物以為心而禪之學起於自私自利而未免於內外之分斯其所以為異也今之為心性之學者而果外人倫遺事物則誠所謂禪矣使其未嘗外人倫遺事物而專以存心養性為事則固聖門精一之學也而可謂之禪乎哉世之學者承沿其舉業詞章之習以荒穢戕伐其心既與聖人盡心之學相背而馳日騖日逺莫知其所抵極矣有以心性之説而招之來歸者則顧駭以為禪而反仇讐視之不亦大可哀乎夫不自知其為非而以非人者是舊習之為蔽而未可遽以為罪也有知其非者矣藐然視人之非而不以告人者自私者也既告之矣既知之矣而猶冥然不以自反者自棄者也吾越多豪傑之士其特然無所待而興者為不少矣而亦容有蔽於舊習者乎故吾因諸君之請而特為一言之嗚呼吾豈特為吾越之士一言之而已乎梁仲用默齋説辛未仲用識髙而氣豪既舉進士鋭然有志天下之務一旦責其志曰於呼豫乃太早烏有己之弗治而能治人者於是專心為巳之學深思其氣質之偏而病其言之易也以默名庵過豫而請其方豫亦天下之多言人也豈足以知默之道然豫嘗自驗之氣浮則多言志輕則多言氣浮者耀於外志輕者放其中豫請誦古之訓而仲用自取之夫默有四偽疑而不知問蔽而不知辨冥然以自罔謂之默之愚以不言餂人者謂之默之狡慮人之覘其長短也掩覆以為默謂之默之誣深為之情厚為之貌淵毒阱狠自託於默以售其姦者謂之默之賊夫是之謂四偽又有八誠焉孔子曰君子耻其言而過其行古者言之不出耻躬之不逮也故誠知耻而後知默又曰君子𣣔訥於言而敏於行夫誠敏於行而後欲默矣仁者言也訒非以為默而默存焉又曰默而識之是故必有所識也終日不違如愚者也默而成之是故必有所成也退而省其私亦足以發者也故善默者莫如顔子暗然而日章默之積也不言而信而默之道成矣天何言哉四時行焉萬物生焉而默之道至矣非聖人其孰能與於此哉夫是之謂八誠仲用盍亦知所以自取之示弟立志説乙亥豫弟守文來學告之以立志守文因請次第其語使得時時觀省且請淺近其辭則易於通曉也因書以與之夫學莫先於立志志之不立猶不種其根而徒事培擁灌溉勞苦無成矣世之所以因循苟且隨俗習非而卒歸於汚下者凡以志之弗立也故程子曰有求為聖人之志然後可與共學人苟誠有求為聖人之志則必思聖人之所以為聖人者安在非以其心之純乎天理而無人欲之私歟聖人之所以為聖人惟以其心之純乎天理而無人欲則我之欲為聖人亦惟在於此心之純乎天理而無人欲耳欲此心之純乎天理而無人欲則必去人欲而存天理務去人𣣔而存天理則必求所以去人欲而存天理之方求所以去人欲而存天理之方則必正諸先覺考諸古訓而凡所謂學問之功者然後可得而講而亦有所不容己矣夫所謂正諸先覺者既以其人為先覺而師之矣則當專心致志惟先覺之為聼言有不合不得棄置必從而思之思之不得又從而辨之務求了釋不敢輒生疑惑故記曰師嚴然後道尊道尊然後民知敬學苟無尊崇篤信之心則必有輕忽慢易之意言之而聼之不審猶不聼也聼之而思之不慎猶不思也是則雖曰師之猶不師也夫所謂考諸古訓者聖賢垂訓莫非教人去人欲而存天理之方若五經四書是已吾惟欲去吾之人欲存吾之天理而不得其方是以求之於此則其展卷之際真如飢者之於食求飽而已病者之於藥求愈而巳暗者之於燈求照而已跛者之於杖求行而巳曽有徒事記誦講説以資口耳之弊哉夫立志亦不易矣孔子聖人也猶曰吾十有五而志于學三十而立立者志立也雖至於不踰矩亦志之不踰矩也志豈可易而視哉夫志氣之帥也人之命也木之根也水之源也源不濬則流息根不植則木枯命不續則人死志不立則氣昏是以君子之學無時無處而不以立志為事正目而視之無他見也傾耳而聼之無他聞也如貓捕鼠如雞覆卵精神心思凝聚融結而不復知有其他然後此志常立神氣精明義理昭著一有私𣣔即便知覺自然容住不得矣故凡一毫私欲之萌只責此志不立即私欲便退聼一毫客氣之動只責此志不立即客氣便消除或怠心生責此志即不怠忽心生責此志即不忽懆心生責此志即不懆妬心生責此志即不妬忿心生責此志即不忿貪心生責此志即不貪傲心生責此志即不傲吝心生責此志即不吝蓋無一息而非立志責志之時無一事而非立志責志之地故責志之功其於去人𣣔有如烈火之燎毛太陽一出而魍魎潛消也自古聖賢因時立教雖若不同其用功大指無或少異書謂惟精惟一易謂敬以直內義以方外孔子謂格致誠正博文約禮曽子謂忠恕子思謂尊德性而道問學孟子謂集義飬氣求其放心雖若人自為説有不可強同者而求其要領歸宿合若符契何者夫道一而已道同則心同心同則學同其卒不同者皆邪説也後世大患尤在無志故今以立志為説中間字字句句莫非立志蓋終身問學之功只是立得志而已若以是説而合精一則字字句句皆精一之功以是説而合敬義則字字句句皆敬義之功其諸格致博約忠恕等説無不吻合但能實心體之然後信豫言之非妄也約齋説甲戌滁陽劉生韶既學於陽明子乃自悔其平日所嘗致力者泛濫而無功瑣雜而不得其要也思得夫簡易可久之道而固守之乃以約齋自號求所以為約之説於豫豫曰子欲其約乃所以為煩也其惟循理乎理一而已人欲則有萬其殊是故一則約萬則煩矣雖然理亦萬殊也何以求其一乎理雖萬殊而皆具於吾心心固一也吾惟求諸吾心而巳求諸心而皆出乎天理之公焉斯其行之簡易所以為約也己彼其膠於人𣣔之私則利害相攻毁譽相制得失相形榮辱相纏是非相傾顧瞻牽滯紛紜舛戾吾見其煩且難也然而世之知約者鮮矣孟子曰學問之道無他求其放心而已其知所以為約之道歟吾子勉之吾言則亦以煩見齋説乙亥辰陽劉觀時學於潘子既有見矣復學於陽明子嘗自言曰吾名觀時觀必有所見而吾猶懵懵無睹也扁其居曰見齋以自勵問於陽明子曰道有可見乎曰有有而未嘗有也曰然則無可見乎曰無無而未嘗無也曰然則何以為見乎曰見而未嘗見也觀時曰弟子之惑滋甚矣夫子則明言之以教我乎陽明子曰道不可言也強為之言而益晦道無可見也妄為之見而益逺夫有而未嘗有是真有也無而未嘗無是真無也見而未嘗見是真見也子未觀於天乎謂天為無可見則蒼蒼耳昭昭耳日月之代明四時之錯行未嘗無也謂天為可見則即之而無所指之而無定執之而無得未嘗有也夫天道也道天也風可捉也影可拾也道可見也曰然則吾終無所見乎古之人則亦終無所見乎曰神無方而道無體仁者見之謂之仁知者見之謂之知是有方體者也見之而未盡者也顔子則如有所立卓爾夫謂之如則非有也謂之有則非無也是故雖𣣔從之末由也已故夫顔氏之子為庶幾也文王望道而未之見斯真見也已曰然則吾何所用心乎曰淪於無者無所用其心者也蕩而無歸滯於有者用其心於無用者也勞而無功夫有無之間見與不見之妙非可以言求也而子顧切切焉吾又從而強言其不可見是以瞽導瞽也夫言飲者不可以為醉見食者不可以為飽子求其醉飽則盍飲食之子求其見也其惟人之所不見乎夫亦戒慎乎其所不覩也已斯真覩也已斯求見之道也已矯亭説乙亥君子之行順乎理而已無所事乎矯然有氣質之偏焉偏於柔者矯之以剛然或失則傲偏於慈者矯之以毅然或失則刻偏於奢者矯之以儉然或失則陋凡矯而無節則過過則復為偏故君子之論學也不曰矯而曰克克以勝其私私勝而理復無過不及矣矯猶未免於意必也意必亦私也故克巳則矯不必言矯者未必能盡於克己之道也雖然矯而當其可亦克己之道矣行其克己之實而矯以名焉何傷乎古之君子也其取名也廉後之君子實未至而名先之故不曰克而曰矯亦矯世之意也方君時舉以矯名亭請豫為之説謹齋説君子之學心學也心性也性天也聖人之心純乎天理故無事於學下是則心有不存而汨其性喪其天矣故必學以存其心學以存其心者何求哉求諸其心而已矣求諸其心何為哉謹守其心而已矣博學也審問也慎思也明辨也篤行也皆謹守其心之功也謹守其心者無聲之中而常若聞焉無形之中而常若睹焉故傾耳而聼之惟恐其或繆也注目而視之惟恐其或逸也是故至微而顯至隱而見善惡之萌而纎毫莫遁由其能謹也謹則存存則明明則其察之也精其存之也一昧焉而弗知過焉而弗覺弗之謹也已故謹守其心於其善之萌焉若食之充飽也若抱赤子而履春氷惟恐其或陷也若捧萬金之璧而臨千仞之崖惟恐其或墜也其不善之萌焉若鴆毒之投於羔也若虎蛇橫集而思所以避之也若盜賊之侵陵而思所以勝之也古之君子所以凝至道而成盛德未有不由於斯者雖堯舜文王之聖然且兢兢業業而况於學者乎後之言學者舍心而外求是以支離決裂愈難而愈逺吾甚悲焉吾友侍御楊景瑞以謹名其齋其知所以為學之要矣景瑞嘗遊白沙陳先生之門歸而求之自以為有見又二十年而忽若有得然後知其向之所見猶未也一旦告病而歸將從事焉必底於成而後出君之篤志若此其進於道也孰禦乎君遣其子思元從豫學亦將別豫以歸因論君之所以名齋之義以告思元而遂以為君贈夜氣説乙亥天澤每過輒與之論夜氣之訓津津既有所興起至是告歸請益復謂之曰夜氣之息由於旦晝所養苟梏亡之反復則亦不足以存矣今夫師友之相聚於茲也切磋於道義而砥礪乎德業漸而入焉反而愧焉雖有非僻之萌其所滋也亦已罕矣逮其離群索居情可得肆而莫之警也𣣔可得縱而莫之泥也物交引焉志交喪焉雖有理義之萌其所滋也亦罕矣故曰苟得其養無物不長苟失其養無物不消夫人亦孰無理義之心乎然而不得其養者多矣是以若是其寥寥也天澤勉之修道説戊寅率性之謂道誠者也修道之謂教誠之者也故曰自誠明謂之性自明誠謂之教中庸為誠之者而作修道之事也道也者性也不可須臾離也而過焉不及焉離也是故君子有修道之功戒慎乎其所不睹恐懼乎其所不聞微之顯誠之不可掩也修道之功若是其無間誠之也夫然後喜怒哀樂之未發謂之中發而皆中節謂之和道修而性復矣致中和則大本立而逹道行知天地之化育矣非至誠盡性其孰能與於此哉是修道之極功也而世之言修道者離矣故特著其説自得齋説甲申孟子云君子深造之以道欲其自得之也自得之則居之安居之安則資之深資之深則取之左右逢其原故君子欲其自得之也夫率性之謂道道吾性也性吾生也而何事於外求世之學者業辭章習訓詁工技藝探賾而索隱弊精極力勤苦終身非無所謂深造之者然亦辭章而已耳訓詁而已耳技藝而已耳非所以深造於道也則亦外物而巳耳寧有所謂自得逢原者哉古之君子戒慎不睹恐懼不聞致其良知而不敢須臾或離者斯所以深造乎是矣是以大本立而逹道行天地以位萬物以育於左右逢原乎何有黃勉之省曾氏以自得名齋蓋有志於道者請學於豫而蘄為之説豫不能有出於孟氏之言也為之書孟氏之言嘉靖甲申六月朔博約説乙酉南元真之學於陽明子也聞致知之説而恍若有見矣既而疑於博約先後之訓復來請曰致良知以格物格物以致其良知也則既聞教矣敢問先博我以文而後約我以禮也則先儒之説得無亦有所不同歟陽明子曰理一而已矣心一而已矣故聖人無二教而學者無二學博文以約禮格物以致其良知一也故先後之説後儒支繆之見也夫禮也者天理也天命之性具于吾心其渾然全體之中而條理節目森然畢具是故謂之天理天理之條理謂之禮是禮也其發見於外則有五常百行酬酢變化語默動靜升降周旋隆殺厚薄之屬宣之於言而成章措之於為而成行書之於册而成訓炳然蔚然其條理節目之繁至於不可窮詰是皆所謂文也是文也者禮之見於外者也禮也者文之存於中者也文顯而可見之禮也禮微而難見之文也是所謂體用一源而顯微無間者也是故君子之學也於酬酢變化語默動靜之間而求盡其條理節目焉非他也求盡吾心之天理焉耳矣於升降周旋隆殺厚薄之間而求盡其條理節目焉非他也求盡吾心之天理焉耳矣求盡其條理節目焉者博文也求盡吾心之天理焉者約禮也文散於事而萬殊者也故曰博禮根于心而一本者也故曰約博文而非約之以禮則其文為虛文而後世功利辭章之學矣約禮而非博學於文則其禮為虛禮而佛老空寂之學矣是故約禮必在於博文而博文乃所以約禮二之而分先後焉者是聖學之不明而功利異端之説亂之也昔者顔子之始學於夫子也蓋亦未知道之無方體形像也而以為有方體形像也未知道之無窮盡止極也而以為有窮盡止極也是猶後儒之見事事物物皆有定理者也是以求之仰鑽瞻忽之間而莫得其所謂及聞夫子博約之訓既竭吾才以求之然後知天下之事雖千變萬化而皆不出於此心之一理然後知殊途而同歸百慮而一致然後知斯道之本無方體形像而不可以方體形像求之也本無窮盡止極而不可以窮盡止極求之也故曰雖𣣔從之末由也已蓋顔子至是而始有真實之見矣博文以約禮格物以致其良知也亦寧有二學乎哉惜隂説丙戌同志之在安成者間月為會五日謂之惜隂其志篤矣然五日之外孰非惜隂時乎離羣而索居志不能無少懈故五日之會所以相稽切焉耳嗚呼天道之運無一息之或停吾心良知之運亦無一息之或停良知即天道謂之亦則猶二之矣知良知之運無一息之或停者則知惜隂矣知惜隂者則知致其良知矣子在川上曰逝者如斯天不舍晝夜此其所以學如不及至於發憤忘食也堯舜兢兢業業成湯日新又新文王純亦不已周公坐以待旦惜隂之功寧獨大禹為然子思曰戒慎乎其所不睹恐懼乎其所不聞知微之顯可以入德矣或曰雞鳴而起孳孳為利凶人為不善亦惟日不足然則小人亦可謂之惜隂乎
